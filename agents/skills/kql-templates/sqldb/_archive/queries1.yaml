SqlSkills:
  - id: "4.1"
    # Description: 
    #   This skill analyzes T-SQL execution CPU usage recorded in QDS. If high CPU consumption is detected, it displays the query hash with the highest CPU usage.
    #   If no high CPU consumption is detected, it will also check for query hashes with high CPU usage at 15-minute intervals.
    Prompts:
      - "Query Execution CPU Analysis"
      - "Did SQL query execution consume lots of cpu resouce"
      - "Did SQL query execution cause high cpu"
      - "Did SQL execution cause high cpu"
    KustoQueries:
      - TableName: "SqlQueryCPUPercentageTable1"
        ExecutedQuery: |
          let CPUMessage=(cpu_percent_OverAllUserPoolCPU:real,cpu_percent_ConsumedUserPoolCPU:real)
          {
          let cpu_percent_OverAllUserPoolCPUMessage=strcat("Query execution consumed ", iff(cpu_percent_OverAllUserPoolCPU>=30, "a significant amount of ",""),"CPU resource:",cpu_percent_OverAllUserPoolCPU,"% of total User Pool CPU Capacity, and ",
          cpu_percent_ConsumedUserPoolCPU,"% of utilized User Pool CPU.");
          cpu_percent_OverAllUserPoolCPUMessage
          };
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize totalCPUMillisecond = sum(cpu_time) / 1000.0
          | project cpu_percent_OverAllUserPoolCPU=round(100*totalCPUMillisecond/{SumCpuMillisecondOfAllApp},1),
          cpu_percent_ConsumedUserPoolCPU=round(100*totalCPUMillisecond/{ActualSumCpuMillisecondOfAllApp},1)
          | extend cpuMessage=CPUMessage(cpu_percent_OverAllUserPoolCPU,cpu_percent_ConsumedUserPoolCPU)
          | extend IssueDetected=iff(cpu_percent_OverAllUserPoolCPU>=30 or cpu_percent_ConsumedUserPoolCPU>=50,'true','false')
          | project cpuMessage,IssueDetected
        DisplayedQuery: |
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize totalCPUMillisecond = sum(cpu_time) / 1000.0
          | project cpu_percent_OverAllUserPoolCPU=round(100*totalCPUMillisecond/{SumCpuMillisecondOfAllApp},1),
          cpu_percent_utilizedUserPoolCPU=round(100*totalCPUMillisecond/{ActualSumCpuMillisecondOfAllApp},1)
    MessageForEmptyKustoResult: "We don't have CPU data for this query, as it appears it hasn't been executed within the specified time period."
    QuestionToAI: |-
      -  {{cpuMessage}}, the data type is String.

      ### Rules
      1. Store the value of cpuMessage column in {{cpuMessage}}.
      3. Store the value of IssueDetected column in {{IssueDetected}}.
      3. Set {{ResultMessage}} to {{cpuMessage}}.
    SubSqlSkills:
      - id: "4.11"
        ExecutedWhenParentIssueDetected: true
        IsKusto: true
        Prompts:
          - "Top CPU Queries Analysis"
      - id: "4.12"
        ExecutedWhenParentIssueDetected: true
        IsKusto: true
        Prompts:
          - "Query CPU over time Analysis"

  - id: "4.11"
    # Description: 
    #   This skill identifies the top CPU-consuming query hashes, with a maximum of 50. The number of query hashes retrieved depends on the CPU usage of each query.
    #   Also display the detail of first query hash if QDS CPU is high
    Prompts:
      - "Top CPU Queries Analysis"
      - "Top CPU Queries"
      - "Top Queries by CPU Consumption"
      - "CPU usage of Top query_hash"
      - "What is the CPU usage of Top query_hash?"
      - "Get Top high CPU query_hash"
    KustoQueries:
      - TableName: "MonWiQdsExecStats_TopCpuQueryOverTime"
        ExecutedQuery: |
          let TopQueryHashMessage=(queryHash:string,TotalQueryCPU_Percent_UserPoolCPUCapacity:real,TotalQueryCPU_Percent_UsedUserPoolCPU:real)
          {
          strcat("The top CPU-consuming query hash was ",queryHash,", accounting for ",TotalQueryCPU_Percent_UserPoolCPUCapacity,"% of the User Pool CPU capacity and ",TotalQueryCPU_Percent_UsedUserPoolCPU,"% of the utilized User Pool CPU. Please click the Kusto Query Link to check more details.")
          };
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize TotalQueryCPU_ms = sum(cpu_time) / 1000.0 by query_hash
          | order by TotalQueryCPU_ms desc
          | take 1
          | project TotalQueryCPU_Percent_UserPoolCPUCapacity=round(100*TotalQueryCPU_ms/{SumCpuMillisecondOfAllApp},1),
          TotalQueryCPU_Percent_UsedUserPoolCPU=round(100*TotalQueryCPU_ms/{ActualSumCpuMillisecondOfAllApp},1),query_hash
          | extend topQueryHashMessage=TopQueryHashMessage(query_hash,TotalQueryCPU_Percent_UserPoolCPUCapacity,TotalQueryCPU_Percent_UsedUserPoolCPU)
          | project topQueryHashMessage
        DisplayedQuery: |
          //Top 5 CPU consuming query hash
          let TopQueryHashMessage=(queryHash:string,TotalQueryCPU_Percent_UserPoolCPUCapacity:real,TotalQueryCPU_Percent_UsedUserPoolCPU:real)
          {
          strcat("The top CPU-consuming query hash was ",queryHash,", accounting for ",TotalQueryCPU_Percent_UserPoolCPUCapacity,"% of the User Pool CPU capacity and ",TotalQueryCPU_Percent_UsedUserPoolCPU,"% of the utilized User Pool CPU. Please click the Kusto Query Link to check more details.")
          };
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize TotalQueryCPU_ms = sum(cpu_time) / 1000.0,total_ExecutionCount=sum(execution_count) by query_hash
          | order by TotalQueryCPU_ms desc
          | take 5
          | project TotalQueryCPU_ms,total_ExecutionCount,TotalQueryCPU_Percent_UserPoolCPUCapacity=round(100*TotalQueryCPU_ms/{SumCpuMillisecondOfAllApp},1),
          TotalQueryCPU_Percent_UsedUserPoolCPU=round(100*TotalQueryCPU_ms/{ActualSumCpuMillisecondOfAllApp},1),query_hash;

          //Top 1 Query Hash CPU over time
          let QDSAggIntervalInMin = time(15m);
          let cap_interval = materialize(MonDmRealTimeResourceStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize min(cpu_cap_in_sec) by bin(originalEventTimestamp, QDSAggIntervalInMin));
          let top1QueryHash=(MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize TotalQueryCPU_ms = sum(cpu_time) / 1000.0 by query_hash
          | order by TotalQueryCPU_ms desc
          | take 1
          | project query_hash);
          let cpuUsageOfAllQueries=materialize(MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize cores_per_sec = sum(cpu_time) / (QDSAggIntervalInMin / time(1microsecond)) by bin(originalEventTimestamp, QDSAggIntervalInMin)
          | extend Category='cpuUsageOfAllQueries'
          );
          let cpuUsageOfTop1Query=materialize(MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | join kind = inner (top1QueryHash) on query_hash
          | summarize cores_per_sec = sum(cpu_time) / (QDSAggIntervalInMin / time(1microsecond)) by bin(originalEventTimestamp, QDSAggIntervalInMin)
          | extend Category='top1QueryCpuUsage'
          );
          union kind=outer cpuUsageOfAllQueries,cpuUsageOfTop1Query
          | lookup kind = inner ( cap_interval ) on originalEventTimestamp
          | extend cpu_percent = round(100.0 * cores_per_sec / min_cpu_cap_in_sec, 1)
          | project originalEventTimestamp,Category,cpu_percent
          | order by originalEventTimestamp asc
          | render timechart
    QuestionToAI: |-
      -  {{topQueryHashMessage}}, the data type is String.

      ### Rules
      1. Store the value of topQueryHashMessage column in {{topQueryHashMessage}}.
      3. Set {{IssueDetected}} to True.
      3. Set {{ResultMessage}} to {{topQueryHashMessage}}.
    SubSqlSkills:
      - id: "4.9"
        ExecutedWhenParentIssueDetected: true
        IsKusto: true
        Prompts:
          - "The detail of query PLACEHOLDER"

  - id: "4.12"
    # Description: "This skill check the T-SQL execution CPU usage over time, at 15-minute interval"
    Prompts:
      - "Query CPU over time Analysis"
      - "CPU usage of T-SQL execution over time"
      - "What's CPU usage of SQL execution over time"
      - "Did SQL query consume lots of cpu resouce over time"
      - "Did SQL query execution cause high cpu over time"
      - "Did SQL execution cause high cpu over time"
    MessageForEmptyKustoResult: "We don't have data for this query, as it appears it hasn't been executed within the specified time period."
    KustoQueries:
      - TableName: "sqlqueryCPUOverTimeTable"
        ExecutedQuery: |
          let HighcpuWarningThreshold=70;
          let QDSAggIntervalInMin = time(15m);
          let cap_interval = materialize(MonDmRealTimeResourceStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize min(cpu_cap_in_sec) by bin(originalEventTimestamp, QDSAggIntervalInMin));
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize cores_per_sec = sum(cpu_time) / (QDSAggIntervalInMin / time(1microsecond)) by bin(originalEventTimestamp, QDSAggIntervalInMin)
          | lookup kind = inner ( cap_interval ) on originalEventTimestamp
          | extend cpu_percent = round(100.0 * cores_per_sec / min_cpu_cap_in_sec, 1)
          | extend IsCPUHigh =iff(cpu_percent >=HighcpuWarningThreshold,true,false)
          | extend originalEventTimestamp = format_datetime(originalEventTimestamp, "yyyy-MM-dd HH:mm:ss")
          | summarize max_cpu_percent=arg_max(cpu_percent,originalEventTimestamp),Timestamp_array=make_list(originalEventTimestamp) by IsCPUHigh
          | extend Timestamp_array=iff(IsCPUHigh==false,tostring(originalEventTimestamp),Timestamp_array)
          | extend Timestamp_array=replace(@"""", @"'", Timestamp_array)
          | project max_cpu_percent, IsCPUHigh,Timestamp_array
        DisplayedQuery: |
          let QDSAggIntervalInMin = time(15m);
          let cap_interval = materialize(MonDmRealTimeResourceStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize min(cpu_cap_in_sec) by bin(originalEventTimestamp, QDSAggIntervalInMin));
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize cores_per_sec = sum(cpu_time) / (QDSAggIntervalInMin / time(1microsecond)) by bin(originalEventTimestamp, QDSAggIntervalInMin)
          | lookup kind = inner ( cap_interval ) on originalEventTimestamp
          | extend cpu_percent = round(100.0 * cores_per_sec / min_cpu_cap_in_sec, 1)
          | project originalEventTimestamp,cpu_percent
          | render timechart
    QuestionToAI: |-
      Read the 'sqlqueryCPUOverTimeTable' table, which contains between 1 and 2 rows, and assign values to the variables below based on its data and the following rules
      Besides of previous three variables, there are another 4 variables:
      1.{{HadHighCPU}}, the data type is Boolean, and the default value of {{HadHighCPU}} is 'false'
      2.{{Timestamp_arrayPlaceholder}}, the data type is Datetime.
      3.{{max_cpu_percentPlaceholder}}, the data type is Float.
      4.{{cpu_percentPlaceholder}}, the data type is Float.

      Rules:
      1. If there is a row where the value of IsCPUHigh column is 'true', {{HadHighCPU}} is 'true'.

      2. If {{HadHighCPU}} is 'true', get the values of row where IsCPUHigh column is 'true' and perform following two actions
      2.1). Store the value of Timestamp_array column in {{Timestamp_arrayPlaceholder}}.
      2.2). Store the value of max_cpu_percent column in {{max_cpu_percentPlaceholder}}.

      3. If {{HadHighCPU}} is 'false', get the values of row where IsCPUHigh column is 'false' and perform following two actions
      3.1). Store the value of Timestamp_array column in {{Timestamp_arrayPlaceholder}}.
      3.2). Store the value of max_cpu_percent column in {{max_cpu_percentPlaceholder}}.

      4.If {{HadHighCPU}} is true, then {{IssueDetected}} is 'true' and {{ResultMessage}} will be set to "
      T-SQL execution consumed a significant amount of CPU resources(more than 70%) at the following timestamps:{{Timestamp_arrayPlaceholder}}. The maximum cpu usage is {{cpu_percentPlaceholder}}".

      5.If {{HadHighCPU}} is false, then {{IssueDetected}} is 'false' and {{ResultMessage}} will be set to "
      T-SQL execution didn't consume a significant amount of CPU resources(more than 70%), the maximum CPU usage is {{max_cpu_percentPlaceholder}}% at {{Timestamp_arrayPlaceholder}}. If you'd like to find top cpu queries over time, please type 'CPU usage of top 5 T-SQL execution over time'
      "
    SubSqlSkills:
      - id: "4.121"
        ExecutedWhenParentIssueDetected: true
        IsKusto: true
        Prompts:
          - "Top 5 CPU usage of T-SQL execution over time"

  - id: "4.121"
    Prompts:
      - "Top 5 CPU usage of T-SQL execution over time"
      - "What's CPU usage of top 5 T-SQL execution over time"
    MessageForEmptyKustoResult: "We don't have data for this query, as it appears it hasn't been executed within the specified time period."
    KustoQueries:
      - TableName: "sqlquerytop5CPUOverTimeTable"
        ExecutedQuery: |
          let QDSAggIntervalInMin = time(15m);
          let top_N = materialize(MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | top-nested 5 of query_hash by sum(cpu_time) desc
          | project-away  aggregated_query_hash
          );
          let cap_interval = materialize(MonDmRealTimeResourceStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize min(cpu_cap_in_sec) by bin(originalEventTimestamp, QDSAggIntervalInMin));
          let All_cpu_utilization = materialize(MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize cores_per_sec = sum(cpu_time) / (QDSAggIntervalInMin / time(1microsecond)) by bin(originalEventTimestamp, QDSAggIntervalInMin), query_hash
          | lookup kind = inner ( cap_interval ) on originalEventTimestamp
          | extend TotalQueryCPU_Pct = round(100.0 * cores_per_sec / min_cpu_cap_in_sec, 1)
          | project originalEventTimestamp, query_hash, TotalQueryCPU_Pct);
          let top_N_cpu_utilization = materialize(MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | lookup kind = inner ( top_N ) on query_hash
          | summarize cores_per_sec = sum(cpu_time) / (QDSAggIntervalInMin / time(1microsecond)) by bin(originalEventTimestamp, QDSAggIntervalInMin), query_hash
          | lookup kind = inner ( cap_interval ) on originalEventTimestamp
          | extend TotalQueryCPU_Pct = round(100.0 * cores_per_sec / min_cpu_cap_in_sec, 1)
          | project originalEventTimestamp, query_hash, TotalQueryCPU_Pct
          | union All_cpu_utilization);
          let timestamps = range
          originalEventTimestamp
          from bin(toscalar(top_N_cpu_utilization | summarize min(originalEventTimestamp)), QDSAggIntervalInMin)
          to bin(toscalar(top_N_cpu_utilization | summarize max(originalEventTimestamp)), QDSAggIntervalInMin)
          step QDSAggIntervalInMin;
          let top_N_with_timestamps = timestamps
          | extend tmp_join_col = 1
          | join kind = inner (
          top_N
          | project query_hash
          | extend tmp_join_col = 1
          ) on tmp_join_col
          | project query_hash, originalEventTimestamp;
          top_N_cpu_utilization
          | join kind = rightouter(top_N_with_timestamps) on query_hash, originalEventTimestamp
          | project originalEventTimestamp=originalEventTimestamp1, query_hash=query_hash1, TotalQueryCPU_Pct
          | extend TotalQueryCPU_Pct = case(isnull(TotalQueryCPU_Pct), 0.0, TotalQueryCPU_Pct)
          | sort by originalEventTimestamp asc
        DisplayedQuery: |
          let QDSAggIntervalInMin = time(15m);
          let top_N = materialize(MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | top-nested 5 of query_hash by sum(cpu_time) desc
          | project-away  aggregated_query_hash
          );
          let cap_interval = materialize(MonDmRealTimeResourceStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize min(cpu_cap_in_sec) by bin(originalEventTimestamp, QDSAggIntervalInMin));
          let All_cpu_utilization = materialize(MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize cores_per_sec = sum(cpu_time) / (QDSAggIntervalInMin / time(1microsecond)) by bin(originalEventTimestamp, QDSAggIntervalInMin), query_hash
          | lookup kind = inner ( cap_interval ) on originalEventTimestamp
          | extend TotalQueryCPU_Pct = round(100.0 * cores_per_sec / min_cpu_cap_in_sec, 1)
          | project originalEventTimestamp, query_hash, TotalQueryCPU_Pct);
          let top_N_cpu_utilization = materialize(MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | lookup kind = inner ( top_N ) on query_hash
          | summarize cores_per_sec = sum(cpu_time) / (QDSAggIntervalInMin / time(1microsecond)) by bin(originalEventTimestamp, QDSAggIntervalInMin), query_hash
          | lookup kind = inner ( cap_interval ) on originalEventTimestamp
          | extend TotalQueryCPU_Pct = round(100.0 * cores_per_sec / min_cpu_cap_in_sec, 1)
          | project originalEventTimestamp, query_hash, TotalQueryCPU_Pct
          | union All_cpu_utilization);
          let timestamps = range
          originalEventTimestamp
          from bin(toscalar(top_N_cpu_utilization | summarize min(originalEventTimestamp)), QDSAggIntervalInMin)
          to bin(toscalar(top_N_cpu_utilization | summarize max(originalEventTimestamp)), QDSAggIntervalInMin)
          step QDSAggIntervalInMin;
          let top_N_with_timestamps = timestamps
          | extend tmp_join_col = 1
          | join kind = inner (
          top_N
          | project query_hash
          | extend tmp_join_col = 1
          ) on tmp_join_col
          | project query_hash, originalEventTimestamp;
          top_N_cpu_utilization
          | join kind = rightouter(top_N_with_timestamps) on query_hash, originalEventTimestamp
          | project originalEventTimestamp=originalEventTimestamp1, query_hash=query_hash1, TotalQueryCPU_Pct
          | extend TotalQueryCPU_Pct = case(isnull(TotalQueryCPU_Pct), 0.0, TotalQueryCPU_Pct)
          | sort by originalEventTimestamp asc
          | render timechart
