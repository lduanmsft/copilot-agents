  - id: "4.10"
    # Description:This skill will check the CPU usage of the specified query and display the total CPU time and the percentage of its usage in the User Pool CPU.
    Prompts:
      - "CPU Usage of Query PLACEHOLDER"
      - "CPU Usage of Query PLACEHOLDER Analysis"
      - "CPU Usage of Query analysis"
      - "CPU usage of first query analysis"
      - "What is the CPU Usage of Query PLACEHOLDER"
      - "What is the CPU Usage of Query "
    CustomizedParameters:
      - "query_hash"
      - "query_id"
    MessageForEmptyKustoResult: "We don't have data for this query, as it appears it hasn't been executed within the specified time period."
    KustoQueries:
      - TableName: "CpuUsageofQueryHashTable"
        ExecutedQuery: |
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize totalCPU_ms = sum(cpu_time)/1000,max_cpuTime_ms=max(max_cpu_time)/1000,total_ExecutionCount=sum(execution_count) by query_hash
          | project query_hash,total_ExecutionCount,totalCPU_ms,max_cpuTime_ms,cpu_percent=round(100*totalCPU_ms/{SumCpuMillisecondOfAllApp},3)
          | extend executionStatus=strcat("The query was executed ",total_ExecutionCount," times, accounting for ",cpu_percent,"% of total User Pool CPU Capacity, with a maximum CPU time of ",max_cpuTime_ms,"ms for a single execution.")
          | project executionStatus
        DisplayedQuery: |
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize totalCPU_ms = sum(cpu_time)/1000,max_cpuTime_ms=max(max_cpu_time)/1000,total_ExecutionCount=sum(execution_count) by query_hash
          | project query_hash,total_ExecutionCount,totalCPU_ms,max_cpuTime_ms,cpu_percent_UserPoolCapacity=round(100.0*totalCPU_ms/{SumCpuMillisecondOfAllApp},1),
          cpu_percent_UsedUserPoolCPU=round(100.0*totalCPU_ms/{ActualSumCpuMillisecondOfAllApp},1)
    QuestionToAI: |-
      -  {{executionStatus}}, the data type is String.

      ### Rules
      1.  Store the value of executionStatus column in {{executionStatus}}.
      2.  Set {{IssueDetected}} to 'true'.
      3.  Set {{ResultMessage}} to {{executionStatus}}.

  - id: "4.18"
    # Description: This skill will check the Memory usage of the specified query
    Prompts:
      - "Memory Usage of Query analysis"
      - "Memory Usage of Query placeholder analysis"
      - "Memory usage of first query analysis"
      - "Memory Usage of Query PLACEHOLDER"
      - "What is the Memory Usage of Query placeholder "
    CustomizedParameters:
      - "query_hash"
      - "query_id"
    MessageForEmptyKustoResult: "We don't have data for this query, as it appears it hasn't been executed within the specified time period."
    KustoQueries:
      - TableName: "MonWiQdsExecStats_MemoryUsage"
        ExecutedQuery: |
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize maxMemoryGrantOfSingleExecution_mb=max(max_max_query_memory_pages)*8/1024,totalMemoryGrant_mb = sum(max_query_memory_pages)*8/1024,executionCount=sum(execution_count) by query_hash
        DisplayedQuery: |
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize maxMemoryGrantOfSingleExecution_mb=max(max_max_query_memory_pages)*8/1024,totalMemoryGrant_mb = sum(max_query_memory_pages)*8/1024,executionCount=sum(execution_count) by query_hash