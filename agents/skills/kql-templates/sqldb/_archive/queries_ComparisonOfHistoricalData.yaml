SqlSkills:
  - id: "4.13"
    Prompts:
      - "Query Historical Data Comparison"
      - "Query placeholder Historical Data Comparison"
      - "Query placeholder history Data"
      - "Query placeholder history"
    CustomizedParameters:
      - "query_hash"
      - "query_id"
    MessageForEmptyKustoResult: "Telemetry data from table MonWiQdsExecStats does not exist for the specified time range."
    KustoQueries:
      - TableName: "ComparisonOfHistoricalData_CurrentRange"
        ExecutedQuery: |
          let currentRange0=materialize (MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize sumExecCount=sum(execution_count),avgExecCount= round(avg(execution_count),1),sumCpu=sum(cpu_time),max_cpu_time=max(max_cpu_time),avgCpuTime= round(sum(cpu_time)/sum(execution_count),1),avgElapsedTime=round(sum(elapsed_time)/sum(execution_count),1),
          avgLogicalReads= round(sum(logical_reads)/sum(execution_count),1),avgPhysicalReads= round(sum(physical_reads)/sum(execution_count),1), avgMemoryGrantPages= round(sum(max_query_memory_pages)/sum(execution_count),1),
          minTime=min(originalEventTimestamp),maxTime=max(originalEventTimestamp)
          | extend TimeRange= strcat(format_datetime(minTime,'yyyy-MM-dd HH:mm'),'~',format_datetime(maxTime,'yyyy-MM-dd HH:mm'))
          | extend ID=1
          | project-away ID,minTime,maxTime
          | project-reorder TimeRange
          );
          currentRange0;
      - TableName: "ComparisonOfHistoricalData"
        ExecutedQuery: |
          //Metrics for the time range specified by the user: StartTime to EndTime
          let currentRange=materialize (MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize sumExecCount=sum(execution_count),avgExecCount= round(avg(execution_count),1),sumCpu=sum(cpu_time),max_cpu_time=max(max_cpu_time),avgCpuTime= round(sum(cpu_time)/sum(execution_count),1),avgElapsedTime=round(sum(elapsed_time)/sum(execution_count),1),
          avgLogicalReads= round(sum(logical_reads)/sum(execution_count),1),avgPhysicalReads= round(sum(physical_reads)/sum(execution_count),1), avgMemoryGrantPages= round(sum(max_query_memory_pages)/sum(execution_count),1),avgLogBytes=round(sum(log_bytes_used)/sum(execution_count),1),
          minTime=min(originalEventTimestamp),maxTime=max(originalEventTimestamp)
          | extend TimeRange= strcat(format_datetime(minTime,'yyyy-MM-dd HH:mm'),'~',format_datetime(maxTime,'yyyy-MM-dd HH:mm'))
          | extend ID=1
          | project-away minTime,maxTime
          | project-reorder ID,TimeRange
          );
          //Metrics for the time range: [StartTime - 2h] ~ [StartTime]
          let  ["-2hTostartTime"]=materialize ( MonWiQdsExecStats
          | where {AppNamesNodeNamesWith2HsBeforeStartTimeOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize sumExecCount=sum(execution_count),avgExecCount= round(avg(execution_count),1),sumCpu=sum(cpu_time),max_cpu_time=max(max_cpu_time),avgCpuTime= round(sum(cpu_time)/sum(execution_count),1),avgElapsedTime=round(sum(elapsed_time)/sum(execution_count),1),
          avgLogicalReads= round(sum(logical_reads)/sum(execution_count),1),avgPhysicalReads= round(sum(physical_reads)/sum(execution_count),1), avgMemoryGrantPages= round(sum(max_query_memory_pages)/sum(execution_count),1),avgLogBytes=round(sum(log_bytes_used)/sum(execution_count),1),
          minTime=min(originalEventTimestamp),maxTime=max(originalEventTimestamp)
          | extend TimeRange= strcat(format_datetime(minTime,'yyyy-MM-dd HH:mm'),'~',format_datetime(maxTime,'yyyy-MM-dd HH:mm'))
          | extend ID=2
          | project-away minTime,maxTime
          | project-reorder ID,TimeRange);
          //Metrics for the time range: [StartTime - 4h] ~ [StartTime - 2h]
          let  ["-4hTo-2hBeforeStartTime"]=materialize ( MonWiQdsExecStats
          | where {AppNamesNodeNamesWith4Hs2HsBeforeStartTimeOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize sumExecCount=sum(execution_count),avgExecCount= round(avg(execution_count),1),sumCpu=sum(cpu_time),max_cpu_time=max(max_cpu_time),avgCpuTime= round(sum(cpu_time)/sum(execution_count),1),avgElapsedTime=round(sum(elapsed_time)/sum(execution_count),1),
          avgLogicalReads= round(sum(logical_reads)/sum(execution_count),1),avgPhysicalReads= round(sum(physical_reads)/sum(execution_count),1), avgMemoryGrantPages= round(sum(max_query_memory_pages)/sum(execution_count),1),avgLogBytes=round(sum(log_bytes_used)/sum(execution_count),1),
          minTime=min(originalEventTimestamp),maxTime=max(originalEventTimestamp)
          | extend TimeRange= strcat(format_datetime(minTime,'yyyy-MM-dd HH:mm'),'~',format_datetime(maxTime,'yyyy-MM-dd HH:mm'))
          | extend ID=3
          | project-away minTime,maxTime
          | project-reorder ID,TimeRange);
          //Metrics for the time range: [StartTime - 1d] ~ [EndTime - 1d]
          let OneDayBefore=materialize (MonWiQdsExecStats
          | where {AppNamesNodeNamesWith1DayBeforeStartTimeOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize sumExecCount=sum(execution_count),avgExecCount= round(avg(execution_count),1),sumCpu=sum(cpu_time),max_cpu_time=max(max_cpu_time),avgCpuTime= round(sum(cpu_time)/sum(execution_count),1),avgElapsedTime=round(sum(elapsed_time)/sum(execution_count),1),
          avgLogicalReads= round(sum(logical_reads)/sum(execution_count),1),avgPhysicalReads= round(sum(physical_reads)/sum(execution_count),1), avgMemoryGrantPages= round(sum(max_query_memory_pages)/sum(execution_count),1),avgLogBytes=round(sum(log_bytes_used)/sum(execution_count),1),
          minTime=min(originalEventTimestamp),maxTime=max(originalEventTimestamp)
          | extend TimeRange= strcat(format_datetime(minTime,'yyyy-MM-dd HH:mm'),'~',format_datetime(maxTime,'yyyy-MM-dd HH:mm'))
          | extend ID=4
          | project-away minTime,maxTime
          | project-reorder ID,TimeRange);
          let base=currentRange
          | project baseSumExecCount=sumExecCount,baseavgExecCount=avgExecCount,baseSumCpu=sumCpu,baseMaxCpuTime=max_cpu_time,baseAvgCpuTime=avgCpuTime,baseavgElapsedTime=avgElapsedTime,baseAvgLogicalReads=avgLogicalReads,baseAvgPhysicalReads=avgPhysicalReads, baseAvgMemoryGrantPages=avgMemoryGrantPages,baseAvgLogBytes=avgLogBytes
          | extend joinColumn=1;
          let  ["-2hTostartTimeComparison"] = ["-2hTostartTime"]
          | extend joinColumn=1
          | join kind=inner (base) on $left.joinColumn==$right.joinColumn
          | project ID,TimeRange, sumExecCount,avgExecCount, sumExecCountChange=sumExecCount-baseSumExecCount,avgExecCountChange=avgExecCount-baseavgExecCount,sumCpuChange=sumCpu-baseSumCpu,maxCpuTimeChange=max_cpu_time-baseMaxCpuTime,avgCpuTimeChange=avgCpuTime-baseAvgCpuTime,avgElapsedTimeChange=avgElapsedTime-baseavgElapsedTime,avgLogicalReadsChange=avgLogicalReads-baseAvgLogicalReads,avgPhysicalReadsChange=avgPhysicalReads-baseAvgPhysicalReads, avgMemoryGrantPagesChange=avgMemoryGrantPages-baseAvgMemoryGrantPages,avgLogBytesChange=avgLogBytes-baseAvgLogBytes;
          let  ["-4hTo-2hBeforeStartTimeComparison"] = ["-4hTo-2hBeforeStartTime"]
          | extend joinColumn=1
          | join kind=inner (base) on $left.joinColumn==$right.joinColumn
          | project ID,TimeRange, sumExecCount,avgExecCount, sumExecCountChange=sumExecCount-baseSumExecCount,avgExecCountChange=avgExecCount-baseavgExecCount,sumCpuChange=sumCpu-baseSumCpu,maxCpuTimeChange=max_cpu_time-baseMaxCpuTime,avgCpuTimeChange=avgCpuTime-baseAvgCpuTime,avgElapsedTimeChange=avgElapsedTime-baseavgElapsedTime,avgLogicalReadsChange=avgLogicalReads-baseAvgLogicalReads,avgPhysicalReadsChange=avgPhysicalReads-baseAvgPhysicalReads, avgMemoryGrantPagesChange=avgMemoryGrantPages-baseAvgMemoryGrantPages,avgLogBytesChange=avgLogBytes-baseAvgLogBytes;
          let  OneDayBeforeComparison = OneDayBefore
          | extend joinColumn=1
          | join kind=inner (base) on $left.joinColumn==$right.joinColumn
          | project ID,TimeRange, sumExecCount,avgExecCount, sumExecCountChange=sumExecCount-baseSumExecCount,avgExecCountChange=avgExecCount-baseavgExecCount,sumCpuChange=sumCpu-baseSumCpu,maxCpuTimeChange=max_cpu_time-baseMaxCpuTime,avgCpuTimeChange=avgCpuTime-baseAvgCpuTime,avgElapsedTimeChange=avgElapsedTime-baseavgElapsedTime,avgLogicalReadsChange=avgLogicalReads-baseAvgLogicalReads,avgPhysicalReadsChange=avgPhysicalReads-baseAvgPhysicalReads, avgMemoryGrantPagesChange=avgMemoryGrantPages-baseAvgMemoryGrantPages,avgLogBytesChange=avgLogBytes-baseAvgLogBytes;
          ["-2hTostartTimeComparison"]
          |union ["-4hTo-2hBeforeStartTimeComparison"],OneDayBeforeComparison
          | order by ID asc
          | project-away ID

  - id: "4.131"
    Prompts:
      - "Query Historical Data Comparison 7 days"
      - "Query placeholder Historical Data Comparison 7 days"
    CustomizedParameters:
      - "query_hash"
      - "query_id"
    MessageForEmptyKustoResult: "Telemetry data from table MonWiQdsExecStats does not exist for the specified time range."
    KustoQueries:
      - TableName: "ComparisonOfHistoricalData7Days"
        ExecutedQuery: |
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWith7DayOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize sum_ExecCount=sum(execution_count),avg_ExecCount= round(avg(execution_count),1),['avg_cpuTime']= round(sum(cpu_time)/sum(execution_count),1),
          ['avg_elapsedTime']=round(sum(elapsed_time)/sum(execution_count),1),       avg_logicalReads= round(sum(logical_reads)/sum(execution_count),1),avg_physicalReads= round(sum(physical_reads)/sum(execution_count),1),
          ['avg_memoryGrant(Pages)']= round(sum(max_query_memory_pages)/sum(execution_count),1),       distinctPLans=dcount(query_plan_hash), AllQueryPlans=make_set(query_plan_hash),
          minTime=min(originalEventTimestamp),maxTime=max(originalEventTimestamp),
          avgRowCount=round(sum(rowcount)/sum(execution_count),1),TotalRowCount=sum(rowcount)
          by bin(originalEventTimestamp, 1h),exec_type
          | extend TimeFrame= strcat(format_datetime(minTime,'yyyy-MM-dd HH:mm'),'~',format_datetime(maxTime,'yyyy-MM-dd HH:mm'))
          | project-away minTime,maxTime
          | project-reorder originalEventTimestamp asc,exec_type asc ,TimeFrame
