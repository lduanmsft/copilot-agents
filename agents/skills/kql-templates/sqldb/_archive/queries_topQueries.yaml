SqlSkills:
  - id: "4.8"
    #isLeadSkill: true
    # Description: |
    #   This skill will display the top queries, including wait, cpu, logical read,logical write,memory grant, tempdb usage,log usage,
    #   compilation CPU of successful compilation,Compilation Time of successful compilation,
    #   compilation CPU of failed compilation,Compilation Time of failed compilation
    Prompts:
      - "Query analysis"
    SubSqlSkills:
      - id: "4.81"
        Prompts:
          - "Top wait queries"
      - id: "4.82"
        Prompts:
          - "Top CPU queries"
      - id: "4.83"
        Prompts:
          - "Top logical reads queries"
      - id: "4.84"
        Prompts:
          - "Top logical writes queries"
      - id: "4.85"
        Prompts:
          - "Top memory grant queries"
      - id: "4.86"
        Prompts:
          - "Top tempdb usage queries"
      - id: "4.87"
        Prompts:
          - "Top Log queries"
      - id: "4.52"
        Prompts:
          - "Top Queries by compilation CPU"
      - id: "4.53"
        Prompts:
          - "Top Queries by Compilation Time"
      - id: "4.62"
        Prompts:
          - "Top Failed Compilations by CPU"
      - id: "4.63"
        Prompts:
          - "Top Failed Compilations by Compilation Time"

  - id: "4.81"
    IsDisplayKustoQueryResult: true
    # Description: "This skill display top 5 queries ranked by waiTime"
    Prompts:
      - "Top Wait queries"
      - "Top Wait staticistsc"
    KustoQueries:
      - TableName: "MonWiQdsWaitStatsAllQueries"
        ExecutedQuery: |
          let TopN=5;
          MonWiQdsWaitStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize sum(total_query_wait_time_ms) by query_hash
          | order by sum_total_query_wait_time_ms desc
          | take TopN
        DisplayedQuery: |
          let TopN=5;
          MonWiQdsWaitStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize sum(total_query_wait_time_ms) by query_hash
          | order by sum_total_query_wait_time_ms desc
          | take TopN

  - id: "4.83"
    # Description: "This skill display top 5 queries ranked by logical reads"
    Prompts:
      - "Top Reads queries"
      - "Top Logical reads queries"
    KustoQueries:
      - TableName: "MonWiQdsExecStats_logicalReads_AllQueries"
        ExecutedQuery: |
          let TopN=5;
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize TotalLogical_reads = sum(logical_reads),totalPhysical_reads=sum(physical_reads),totalPhysical_io_reads=sum(physical_io_reads)  by query_hash
          | order by TotalLogical_reads desc nulls first
          | take TopN
        DisplayedQuery: |
          let TopN=5;
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize TotalLogical_reads = sum(logical_reads),totalPhysical_reads=sum(physical_reads),totalPhysical_io_reads=sum(physical_io_reads)  by query_hash
          | order by TotalLogical_reads desc nulls first
          | take TopN

  - id: "4.84"
    # Description: "This skill display top 5 queries ranked by logical writes"
    Prompts:
      - "Top writes queries"
      - "Top logical writes queries"
    KustoQueries:
      - TableName: "MonWiQdsExecStats_logical_writes_AllQueries"
        ExecutedQuery: |
          let TopN=5;
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize TotalLogical_writes = sum(logical_writes) by query_hash
          | order by TotalLogical_writes desc nulls first
          | take TopN
        DisplayedQuery: |
          let TopN=5;
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize TotalLogical_writes = sum(logical_writes) by query_hash
          | order by TotalLogical_writes desc nulls first
          | take TopN

  - id: "4.85"
    IsDisplayKustoQueryResult: true
    # Description: "This skill display top 5 queries ranked by memory grant"
    Prompts:
      - "Top memory queries"
      - "Top memory grant queries"
    KustoQueries:
      - TableName: "MonWiQdsExecStats_MemoryGrant_AllQueries"
        ExecutedQuery: |
          let TopN=5;
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName=~'{LogicalServerName}'
          | summarize maxMemoryGrantOfSingleExecution_mb=max(max_max_query_memory_pages)*8/1024,TotalMemoryGrant_mb= sum(max_query_memory_pages)*8/1024,executionCount=sum(execution_count) by query_hash
          | order by maxMemoryGrantOfSingleExecution_mb desc nulls first
          | take TopN
        DisplayedQuery: |
          let TopN=5;
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName=~'{LogicalServerName}'
          | summarize maxMemoryGrantOfSingleExecution_mb=max(max_max_query_memory_pages)*8/1024,TotalMemoryGrant_mb= sum(max_query_memory_pages)*8/1024,executionCount=sum(execution_count) by query_hash
          | order by maxMemoryGrantOfSingleExecution_mb desc nulls first
          | take TopN

  - id: "4.86"
    # Description: "This skill display top 5 queries ranked by tempdb usage"
    Prompts:
      - "Top tempdb usage queries"
    KustoQueries:
      - TableName: "MonWiQdsExecStats_tempdbUsage_AllQueries"
        ExecutedQuery: |
          let TopN=5;
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName=~'{LogicalServerName}'
          | summarize TotalTempdb_space_used_mb=round(sum(tempdb_space_used)*8/1024,1) by query_hash
          | order by TotalTempdb_space_used_mb desc nulls first
          | take TopN
        DisplayedQuery: |
          let TopN=5;
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName=~'{LogicalServerName}'
          | summarize TotalTempdb_space_used_mb=round(sum(tempdb_space_used)*8/1024,1) by query_hash
          | order by TotalTempdb_space_used_mb desc nulls first
          | take TopN

  - id: "4.87"
    # Description: "This skill display top 5 queries ranked by log usage"
    Prompts:
      - "Top log queries"
      - "Top log_bytes_used queries"
    KustoQueries:
      - TableName: "MonWiQdsExecStats_log_bytes_used_AllQueries"
        ExecutedQuery: |
          let TopN=5;
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName=~'{LogicalServerName}'
          | summarize TotalLogUsed_mb=round(sum(log_bytes_used)/1024.0/1024,1) by query_hash
          | order by TotalLogUsed_mb desc nulls first
          | take TopN
        DisplayedQuery: |
          let TopN=5;
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName=~'{LogicalServerName}'
          | summarize TotalLogUsed_mb=round(sum(log_bytes_used)/1024.0/1024,1) by query_hash
          | order by TotalLogUsed_mb desc nulls first
          | take TopN