SqlSkills:
  - id: "4.3"
    IsDisplayKustoQueryResult: true
    # Description: This skill will check if the specified query has any AntiPatterns and display the type of AntiPattern detected.
    Prompts:
      - "Query Placeholder AntiPattern Analysis"
      - "Query AntiPattern Analysis"
      - "Query Placeholder AntiPattern"
      - "Query AntiPattern"
      - "Did Query Placeholder have AntiPattern"
      - "Did query have AntiPattern"
    CustomizedParameters:
      - "query_hash"
      - "query_id"
    MessageForEmptyKustoResult: >
      AntiPattern was not detected. Please note that we only search MonQueryProcessing from the date one day before and one day after the specified time. To search the entire time range, please type 'Query [QueryHashPlaceholder] AntiPattern Analysis all Time'. Be aware that an 'All Time search' may take a significant amount of time and PerfCopilot may fail due to a timeout.
    KustoQueries:
      - TableName: "antiPatternTable"
        ExecutedQuery: |
          MonQueryProcessing
          | where {LogicalServerAndLogicalDatabaseName}
          | where originalEventTimestamp between (datetime_add('day',-1,datetime({StartTime})) .. datetime_add('day',1,datetime({EndTime})))
          | where event =~ 'query_antipattern'
          | extend query_hash = strcat('0x', toupper(tohex(query_hash_signed)))
          | extend query_plan_hash = strcat('0x', toupper(tohex(query_plan_hash_signed)))
          | where {CustomizedParametersPlaceholder}
          | distinct antipattern_type,query_plan_hash,query_hash
        DisplayedQuery: |
          MonQueryProcessing
          | where {LogicalServerAndLogicalDatabaseName}
          | where originalEventTimestamp between (datetime_add('day',-1,datetime({StartTime})) .. datetime_add('day',1,datetime({EndTime})))
          | where event =~ 'query_antipattern'
          | extend query_hash = strcat('0x', toupper(tohex(query_hash_signed)))
          | extend query_plan_hash = strcat('0x', toupper(tohex(query_plan_hash_signed)))
          | where {CustomizedParametersPlaceholder}
          | distinct antipattern_type,query_plan_hash,query_hash
    QuestionToAI: |-
      Read the 'antiPatternTable' table, which contains only one row, and assign values to the variables below based on its data and the following rules
      Besides of previous three variables, there is another variable:
      1.{{CPU_Percent}}, the data type is Float.
      The {{ResultMessage}} depends on following conditions, When assigning the value to {{ResultMessage}}, please strictly adhere to these conditions and rules and you must replace the variables with actual values:

      {{ResultMessage}} will be set to "AntiPatterns in T-SQL have been detected, which can degrade performance and lead to increased consumption of CPU, memory, and I/O resources. Please optimize the T-SQL query to address these issues."

  - id: "4.31"
    # Description: This skill will check if the specified query has any AntiPatterns from MonQueryProcessing throughout the entire time retention period and display the type of AntiPattern detected. Please note that this Troubleshooting Agent may fail due to a Kusto timeout.
