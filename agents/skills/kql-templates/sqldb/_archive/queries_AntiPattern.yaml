      - "Query AntiPattern Analysis all Time"
    CustomizedParameters:
      - "query_hash"
      - "plan_id"
    KustoQueries:
      - TableName: "antiPatternTableAllTime"
        ExecutedQuery: |
          MonQueryProcessing
          | where {LogicalServerAndLogicalDatabaseName}
