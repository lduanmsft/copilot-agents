  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > datetime("{startTime}") and TIMESTAMP < datetime("{endTime}")

      | where event == "drive_usage_report_load"

      | summarize argmin(originalEventTimestampTo, drive_capacity_in_bytes , drive_usage_percentage) by bin(originalEventTimestampTo, time(10m)), NodeName, ClusterName

      ) on originalEventTimestampTo, NodeName, ClusterName

      | extend rg_quota_usage_mb = min_originalEventTimestampTo_quota_usage_in_bytes / 1024, rg_quota_limit_mb = min_originalEventTimestampTo_quota_limit_in_bytes / 1024, drive_usage_percent = min_originalEventTimestampTo_drive_usage_percentage, drive_capacity_mb = min_originalEventTimestampTo_drive_capacity_in_bytes / 1024 / 1024

      | extend rg_quota_percent = round(10000 * rg_quota_usage_mb / todouble(rg_quota_limit_mb)) / 100

      | project originalEventTimestamp = originalEventTimestampTo, NodeName, rg_quota_percent, rg_quota_usage_mb, rg_quota_limit_mb, drive_usage_percent, drive_capacity_mb, cmd_increase_rg_allocation = strcat(''Update-RgResourceSettings -ClusterName '', ClusterName, '' -NodeName '', NodeName, '' -ApplicationName '', application_name, '' -ResourceType DirQuotaInMb -ResourceValue '', toint(rg_quota_limit_mb + (100 - drive_usage_percent) * drive_capacity_mb), '' -ExtraParam workdata'')

