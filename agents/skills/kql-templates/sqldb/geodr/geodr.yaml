- id: DB-geodr-64
  Topic: GEODR0004-10-InsufficientFreeSpace-_Not-enough-dis
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0004-Stuck-update-SLO/GEODR0004-10-InsufficientFreeSpace-_Not-enough-dis.md
  Prompts:
  - SQL DB RG load activity
