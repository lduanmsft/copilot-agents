- id: DB-geodr-37
  Topic: GEODR0080-[CL]-prolonged-split-brain
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0080-[CL]-prolonged-split-brain.md
  Prompts:
  - SQL DB snapshot status (MI/GeoDR context)
  - SQL DB MonAnalyticsDBSnapshot state event LogicalServerName
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'cluster(clstr).database(''sqlazure1'').MonAnalyticsDBSnapshot

      | where TIMESTAMP > timeBegin and TIMESTAMP < timeEnd

      | where fabric_service_uri startswith "fabric:/Worker.CL"

      | summarize arg_max(TIMESTAMP, managed_database_id = logical_database_id, failover_group_id, managed_server_id = logical_server_id)

      by managed_server_name = logical_server_name, managed_database_name = logical_database_name

      | where failover_group_id != ''''

      | join kind = inner (

      cluster(clstr).database(''sqlazure1'').MonDmDbHadrReplicaStates

      | where TIMESTAMP > timeBegin and TIMESTAMP < timeEnd

      | summarize arg_max(TIMESTAMP, internal_state) by ClusterName, LogicalServerName, managed_database_id = toupper(logical_database_name)

      | where internal_state == 3 // internal_state == 3 means the replica is global primary

      ) on managed_database_id

      | join kind = inner (

      cluster(clstr).database(''sqlazure1'').MonDmDbHadrReplicaStates

      | where TIMESTAMP > timeBegin and TIMESTAMP < timeEnd

      | summarize replicas_exist = count() > 0, global_primary_replica_exists = countif(internal_state == 3) > 0

      by ClusterName, LogicalServerName, managed_database_id = toupper(logical_database_name), bin(TIMESTAMP, 1m)

      | where replicas_exist == true

      | summarize minutes_replicas_exists = count(), minutes_global_primary_exists = countif(global_primary_replica_exists)

      by ClusterName, LogicalServerName, managed_database_id

      | where minutes_global_primary_exists >= thresholdGlobalPrimaryMinutes

      ) on managed_database_id

      | join kind = anti (

      cluster(clstr).database(''sqlazure1'').MonManagementOperations

      | where TIMESTAMP > timeEnd - 2d and TIMESTAMP < timeEnd

      | where operation_type == ''ResumeContinuousCopy''

      | summarize arg_max(TIMESTAMP, event) by request_id

      | where event == ''management_operation_start''

      | join kind = inner (

      cluster(clstr).database(''sqlazure1'').MonManagement

      | where TIMESTAMP > timeBegin and TIMESTAMP < timeEnd

      | where state_machine_type == ''ManagedDatabaseStateMachine''

      | where state != ''''

      | summarize arg_max(TIMESTAMP, state) by keys, request_id

      | where state !in (''Ready'', ''DisablingExternalConnections'', ''WaitingForExternalConnectionsDisabled'', ''NotifyingNodeAgentForExternalConnectionsDisabled'')

      | parse kind=regex keys with * managed_server_id_lower '','' managed_database_id_lower

      | project managed_server_id = toupper(managed_server_id_lower), managed_database_id = toupper(managed_database_id_lower), keys, state, request_id

      ) on request_id

      ) on managed_server_id, managed_database_id'
