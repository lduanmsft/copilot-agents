- id: DB-geodr-12
  Topic: GEODR0044-GeoDR-link-stuck-in-RemovingInstancePart
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0044-GeoDR-link-stuck-in-RemovingInstancePart.md
  Prompts:
  - SQL DB IO virtual file stats status
  - SQL DB MonDmIoVirtualFileStats database_name max_size_mb
  - SQL DB investigate IO virtual file stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where db_name startswith "db_crmcorenam"

      | where PreciseTimeStamp > ago(1h)

      | where type_desc == "ROWS" and db_name !in (''tempdb'', ''master'', ''msdb'')

      | summarize arg_max(PreciseTimeStamp, *), filecount = dcount(file_id) by server_name = LogicalServerName, database_name = db_name

      | where filecount == 1

      | where max_size_mb <> 0

      | extend max_size_bytes = max_size_mb * 1024 * 1024, size_on_disk_mb = size_on_disk_bytes / 1024 / 1024

      | project-away state

      ) on server_name, database_name

      | join kind=inner ('
- id: DB-geodr-13
  Topic: GEODR0044-GeoDR-link-stuck-in-RemovingInstancePart
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0044-GeoDR-link-stuck-in-RemovingInstancePart.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot state logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_database_name startswith \"{DatabaseName}\"

      | summarize arg_max(PreciseTimeStamp, physical_database_id, max_size_bytes, state, create_time ) by server_name = logical_server_name, database_name = logical_database_name

      | extend cms_msb = max_size_bytes

      | project-away max_size_bytes

      ) on server_name, database_name

      | project server_name, database_name, physical_database_id, msb_mb_file = max_size_bytes / 1024 / 1024, msb_mb_bp = database_maxsize_in_bytes_bootpage / 1024 / 1024, msb_mb_cms = cms_msb / 1024 / 1024, spaceused_mb, size_on_disk_mb, state, ClusterName

      | where size_on_disk_mb > msb_mb_bp

      | extend mitigation_cmd = iff(state == ''Copying'',

      strcat("Update-DatabaseMaxSizeInEngine -LogicalServerName "", server_name, "" -LogicalDatabaseName "", database_name,

      "" -PhysicalDatabaseId "", physical_database_id, "" -DatabaseMaxSizeInBytes !!!SMALLEST MAX SIZE >= size_on_disk_mb!!! -OnlyUpdateOnBootPage $true"),

      iff(state == ''Ready'', strcat(''Set-Database -ServerName '', server_name, '' -DatabaseName '', database_name, '' -MaxSizeBytes !!!SMALLEST MAX SIZE >= size_on_disk_mb!!!''), ''Not sure how to mitigate, state not recognized''))'
