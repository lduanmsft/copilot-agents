- id: DB-geodr-107
  Topic: GEODR0063.0-Managed-Instance-Failover-Group-Connectivity-Telemetry
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0063--CL-Managed-Instance-Failover-Group-ConnectivityTSGs/GEODR0063.0-Managed-Instance-Failover-Group-Connectivity-Telemetry.md
  Prompts:
  - SQL DB managed servers errors
  - SQL DB managed servers state logical_server_name LogicalServerName
  - SQL DB troubleshoot ago errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagedServers
    ExecutedQuery: 'let ago_6h = ago(6h);

      let ago_3h = ago(3h);

      let ServerInfo = GetCrossClusterData(''MonManagedServers'')

      | where name in (primaryServerName, secondaryServerName) and TIMESTAMP > ago_6h

      | extend RegionParams = split(ClusterName, ".")

      | extend Region = strcat("wasd-prod-", RegionParams[1])

      | summarize arg_max(PreciseTimeStamp, private_cluster_tenant_ring_name, vnet_dns_record_name, state, subnet_id, is_wcow_managed_server) by name, Region, customer_subscription_id

      | where state == ''Ready''

      | join kind = inner (GetCrossClusterData(''MonGeoDRFailoverGroups'')

      | where failover_group_type == ''ManagedFailoverGroup'' and TIMESTAMP > ago_6h

      | summarize max(PreciseTimeStamp) by failover_group_name, logical_server_name, partner_server_name) on $left.name == $right.logical_server_name

      | project Region, LogicalServerName = name, FabricClusterName = private_cluster_tenant_ring_name, HostName = vnet_dns_record_name, PartnerServerName = partner_server_name, FailoverGroupName = failover_group_name, CustomerSubscriptionId = customer_subscription_id, subnet_id, is_wcow_managed_server

      | join kind = leftouter (GetCrossClusterData(''MonSQLSystemHealth'')

      | where TIMESTAMP > ago_3h and LogicalServerName in (primaryServerName, secondaryServerName) and error_id == ''33111''

      | summarize  count() by LogicalServerName

      | extend IsAKV = iff(count_ > 0, true, false)) on LogicalServerName

      | project-away LogicalServerName1, count_;'
