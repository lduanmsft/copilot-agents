- id: DB-geodr-26
  Topic: GEODR0071--CL-Stuck-managed-failvoer-group-creation,-drop-or-stuck-cross-instance-database-movement
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0071--CL-Stuck-managed-failvoer-group-creation,-drop-or-stuck-cross-instance-database-movement.md
  Prompts:
  - SQL DB management errors
  - SQL DB MonManagement event originalEventTimestamp
  - SQL DB troubleshoot management errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where originalEventTimestamp > ago(2h)

      | where operation_type == ''{operation_type_from_title}''

      | extend server_name = iff ((operation_parameters !has "</ManagedServerName>"), extract("<SourceServerName>(.*)</SourceServerName>", 1, operation_parameters), extract("<ManagedServerName>(.*)</ManagedServerName>", 1, operation_parameters))

      | where server_name == ''{server_name_from_title}''

      | summarize by request_id, server_name

      | join kind=leftanti (MonManagement

      | where originalEventTimestamp > ago(2h)

      | where event == ''management_operation_failure'' or event == ''management_operation_success'' or event == ''management_operation_cancel'' or event == ''management_operation_fatal_error''

      | summarize by request_id

      ) on request_id

      | join kind=inner (MonManagement

      | where originalEventTimestamp > ago(2h)

      | where state_machine_type  == ''ManagedFailoverGroupStateMachine'' or state_machine_type == ''CrossManagedInstanceDatabaseMovementStateMachine''

      | where isnotempty([''state''])

      | summarize arg_max(originalEventTimestamp, [''state'']) by request_id

      ) on request_id

      | where [''state'']  !in (''AddingAndRemovingDatabasesOnPartnerServer'', ''AddingAndRemovingDatabasesOnLocalServer'', ''WaitingForPrimaryToFinishDatabaseOperations'', ''WaitingForTargetDatabaseCreation'', ''CreatingTargetDatabase'')

      | where now() - originalEventTimestamp > 30min

      | where'
