- id: DB-geodr-104
  Topic: GEODR0063.0-Managed-Instance-Failover-Group-Connectivity-Telemetry
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0063--CL-Managed-Instance-Failover-Group-ConnectivityTSGs/GEODR0063.0-Managed-Instance-Failover-Group-Connectivity-Telemetry.md
  Prompts:
  - SQL DB get cross cluster data status (MI/GeoDR context)
  - SQL DB GetCrossClusterData logical_server_name
  - SQL DB investigate get cross cluster data
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: GetCrossClusterData
    ExecutedQuery: 'GetCrossClusterData(''MonDmContinuousCopyStatus'')

      | where KustoCluster != ''sqladhoc''

      | where AppTypeName contains ''Worker.CL'' and TIMESTAMP > ago(2d) and is_target_role == 0 and link_type == ''LAG_REPLICA_LINK_TYPE_CONTINUOUS_COPY''

      | summarize arg_max(PreciseTimeStamp, last_replication, replication_lag_sec, replication_state_desc) by ClusterName, LogicalServerName, partner_database, partner_server, is_target_role

      | where replication_lag_sec == "" or last_replication == ""

      | summarize by ManagedServerName = LogicalServerName, PartnerServerName = partner_server

      | union (GetCrossClusterData(''MonGeoDRFailoverGroups'')

      | where TIMESTAMP > ago(2d) and failover_group_type == ''ManagedFailoverGroup'' and role == ''Primary''

      | summarize by failover_group_name, logical_server_name, partner_server_name

      | join kind = inner (GetCrossClusterData(''MonAnalyticsDBSnapshot'')

      | where TIMESTAMP > ago(2d) and database_type == "SQL.ManagedUserDb"

      | summarize by logical_server_name) on logical_server_name

      | join kind = anti  (GetCrossClusterData(''MonDmContinuousCopyStatus'')

      | where AppTypeName contains ''Worker.CL'' and TIMESTAMP > ago(2d) and is_target_role == 0 and link_type == ''LAG_REPLICA_LINK_TYPE_CONTINUOUS_COPY''

      | summarize by LogicalServerName) on $left.logical_server_name == $right.LogicalServerName

      | summarize by ManagedServerName = logical_server_name, PartnerServerName = partner_server_name)'
- id: DB-geodr-105
  Topic: GEODR0063.0-Managed-Instance-Failover-Group-Connectivity-Telemetry
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0063--CL-Managed-Instance-Failover-Group-ConnectivityTSGs/GEODR0063.0-Managed-Instance-Failover-Group-Connectivity-Telemetry.md
  Prompts:
  - SQL DB get cross cluster data latency (MI/GeoDR context)
  - SQL DB GetCrossClusterData logical_server_name
  - SQL DB troubleshoot get cross cluster data latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: GetCrossClusterData
    ExecutedQuery: 'GetCrossClusterData(''MonDmDbHadrReplicaStates'')

      | where KustoCluster != ''sqladhoc''

      | where synchronization_health_desc == "HEALTHY"

      | where TIMESTAMP > ago(2d) and is_forwarder == 1 and AppTypeName contains "Worker.CL" and secondary_lag_seconds > 1200

      | summarize max(secondary_lag_seconds) by LogicalServerName

      | join kind = inner (GetCrossClusterData(''MonGeoDRFailoverGroups'')

      | where failover_group_type == ''ManagedFailoverGroup'' and TIMESTAMP > ago(6h)

      | summarize max(PreciseTimeStamp) by failover_group_name, logical_server_name, partner_server_name) on $left.LogicalServerName == $right.logical_server_name

      | project ManagedServerName = LogicalServerName, PartnerServerName = partner_server_name, MaxReplicationLatency = max_secondary_lag_seconds'
