SqlSkills:
- id: DB-geodr-1
  Topic: GEODR0047.27--Unhealthy-geo-secondary-due-to-insufficient-HK-memory-(SLO-mismatch)
  Source: TSG-SQL-DB-GeoDr/content/GEODR0047.27--Unhealthy-geo-secondary-due-to-insufficient-HK-memory-(SLO-mismatch).md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where TIMESTAMP > ago(1h)

      | where logical_server_name == "{LogicalServerName}"

      | project logical_server_name, sql_instance_name, service_level_objective'
- id: DB-geodr-2
  Topic: GEODR0005---One-or-more-rings-on-a-cluster-are-una
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0005---One-or-more-rings-on-a-cluster-are-una.md
  Prompts:
  - SQL DB geo DR failover groups status
  - SQL DB MonGeoDRFailoverGroups event logical_server_name
  - SQL DB investigate geo DR failover groups
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonGeoDRFailoverGroups
    ExecutedQuery: 'MonManagement

      | where PreciseTimeStamp >= outageTime

      | where event contains "failover_failover_group_begin"

      | project failover_request_id=request_id, failover_time=tostring(PreciseTimeStamp), failoverInitiatedByCustomer=iff(event startswith "management_workflow", true, false), failover_group_name, logical_server_name

      | join ( MonGeoDRFailoverGroups

      | where PreciseTimeStamp <= outageTime

      | summarize arg_max(PreciseTimeStamp, *) by failover_group_id

      ) on failover_group_name, logical_server_name

      | project failover_request_id, failoverInitiatedByCustomer, failover_time, secondary_server_name=logical_server_name, failover_group_name, failover_group_id, primary_region=partner_region, role, failover_policy, failover_with_data_loss_grace_period_in_minutes

      | join ( cluster(failingCluster).database(''sqlazure1'').MonGeoDRFailoverGroups

      | where PreciseTimeStamp <= outageTime

      | summarize arg_max(PreciseTimeStamp, primary_server_name=logical_server_name, secondary_region=partner_region) by failover_group_id

      ) on failover_group_id

      | where primary_region == failingClusterName

      | join kind = leftouter ( MonAnalyticsDBSnapshot

      | where PreciseTimeStamp <= outageTime

      | summarize by failover_group_id, logical_database_id, logical_database_name, secondary_server_name=logical_server_name

      ) on failover_group_id, secondary_server_name

      | join kind = leftouter ( cluster(failingCluster).database(''sqlazure1'').MonDmDbHadrReplicaStates

      | where PreciseTimeStamp > outageTime - time(1h) and PreciseTimeStamp <= outageTime and is_forwarder == 1

      | summarize lag_timestamp=arg_max(PreciseTimeStamp, secondary_lag_seconds) by primary_server_name=LogicalServerName, logical_database_name, group_database_id

      ) on primary_server_name, logical_database_name

      | summarize db_count=count(), avg(secondary_lag_seconds) by failover_request_id, failoverInitiatedByCustomer, primary_server_name, secondary_server_name, secondary_region, failover_group_name, failover_group_id, role, failover_policy, failover_with_data_loss_grace_period_in_minutes, failover_time

      | join kind = leftouter ( cluster(failingCluster).database(''sqlazure1'').MonManagement

      | where PreciseTimeStamp > outageTime

      | where event contains "failover_failover_group_begin"

      | project failback_request_id=request_id, failback_time=tostring(PreciseTimeStamp), failbackInitiatedByCustomer=iff(event startswith "management_workflow", true, false), failover_group_name, primary_server_name=logical_server_name

      ) on failover_group_name, primary_server_name

      | extend ttf = todatetime(failover_time) - outageTime

      | extend ttfb = todatetime(failback_time) - outageTime

      | project primary_server_name, secondary_server_name, failover_group_name, failover_group_id, failover_policy, failover_with_data_loss_grace_period_in_minutes, secondary_region, db_count, avg_secondary_lag_seconds, failover_time, ttf, failoverInitiatedByCustomer, failover_request_id, failback_time, ttfb, failbackInitiatedByCustomer, failback_request_id

      | extend db_count = iff(db_count == 1 and isnan(avg_secondary_lag_seconds), 0, db_count)'
- id: DB-geodr-3
  Topic: GEODR0012-Logins-failing-on-the-local-secondary-wi
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0012-Logins-failing-on-the-local-secondary-wi.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin event logical_server_name database_name
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where logical_server_name =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | where package  == "xdbgateway" and event == "process_login_finish" / and NodeName == "{NodeName}"

      | where TIMESTAMP >= ago(30m)

      | project originalEventTimestamp, ClusterName, NodeName, connection_id, logical_server_name, database_name, login_flags, fabric_node_name, instance_name, peer_activity_id

      | order by originalEventTimestamp desc'
- id: DB-geodr-4
  Topic: GEODR0038-Read-Scale-Out-Troubleshooting
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0038-Read-Scale-Out-Troubleshooting.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin is_success event logical_server_name
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where logical_server_name == "{logical_server_name}" and database_name contains "{logical_database_name}"

      | where event == "process_login_finish" and package == "xdbgateway" and event == "process_login_finish"

      | extend bit21 = toint(login_flags / 2097152) % 2

      | extend appIntentReadOnly = bit21

      | summarize count() by bin(originalEventTimestamp, time(1h)), is_success, instance_port, appIntentReadOnly

      | project originalEventTimestamp, appIntentReadOnly, is_success, count_, instance_port

      | sort by originalEventTimestamp desc'
- id: DB-geodr-5
  Topic: GEODR0038-Read-Scale-Out-Troubleshooting
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0038-Read-Scale-Out-Troubleshooting.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin event logical_server_name database_name
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where logical_server_name == "{logical_server_name}" and database_name contains "{logical_database_name}"

      | where event == "process_login_finish" and package == "sqlserver"

      | summarize count_success = sum(is_success), count_failure = sum(1 - is_success) by bin(originalEventTimestamp, time(1h)), ClusterName, NodeName

      | project originalEventTimestamp, count_success, count_failure, NodeName, ClusterName

      | sort by originalEventTimestamp desc'
- id: DB-geodr-6
  Topic: GEODR0042-Copy-failing-due-to-insufficient-file-sp
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0042-Copy-failing-due-to-insufficient-file-sp.md
  Prompts:
  - SQL DB management errors
  - SQL DB MonManagement error event error_message
  - SQL DB troubleshoot management errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where event startswith "management_operation_"

      | where operation_type == "StartDatabaseContinousCopy" or operation_type == "StartDatabaseCopy"

      | where operation_parameters contains "{DatabaseName}"

      | project originalEventTimestamp, event, error, message, error_message, operation_parameters

      | top 10 by originalEventTimestamp desc'
- id: DB-geodr-7
  Topic: GEODR0042-Copy-failing-due-to-insufficient-file-sp
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0042-Copy-failing-due-to-insufficient-file-sp.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonDmIoVirtualFileStats LogicalServerName
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where LogicalServerName == "{ServerName}" and db_name == "{DatabaseName}" and is_primary_replica == 1

      | extend file_size_mb = size_on_disk_bytes / 1024 / 1024

      | summarize storage_size_mb = sum(spaceused_mb), file_size_mb = sum(file_size_mb) by end_utc_date, db_name

      | top 10 by end_utc_date desc'
- id: DB-geodr-8
  Topic: GEODR0042-Copy-failing-due-to-insufficient-file-sp
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0042-Copy-failing-due-to-insufficient-file-sp.md
  Prompts:
  - SQL DB resource pool stats analysis
  - SQL DB MonResourcePoolStats LogicalServerName
  - SQL DB investigate resource pool stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonResourcePoolStats
    ExecutedQuery: 'MonResourcePoolStats

      | where LogicalServerName == "{ServerName}" and resource_pool_name == "{ElasticPoolName}"

      | top 5 by TIMESTAMP desc

      | project TIMESTAMP, data_storage_percent, storage_limit_mb = toint(resource_pool_storage_limit) / 1024, storage_used_mb = toint(data_storage_percent) * 0.01 * toint(resource_pool_storage_limit) / 1024

      | extend storage_space_remaining_mb = storage_limit_mb - storage_used_mb'
- id: DB-geodr-9
  Topic: GEODR0042-Copy-failing-due-to-insufficient-file-sp
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0042-Copy-failing-due-to-insufficient-file-sp.md
  Prompts:
  - SQL DB RG load activity
  - SQL DB MonRgLoad event ClusterName TIMESTAMP slo_size
  - SQL DB investigate RG load
  CustomizedParameters:
  - AppName
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where event == "directory_quota_report_load" and application_name contains \"{AppName}\" and target_directory contains "data" and TIMESTAMP > ago(2h)

      | summarize max(quota_usage_in_bytes) by ClusterName, application_name, slo_size, target_directory, quota_limit_in_bytes

      | extend percentage = 100 * (1.0 * max_quota_usage_in_bytes / quota_limit_in_bytes)

      | extend quota_limit_gb = quota_limit_in_bytes / (1024 * 1024 * 1024)

      | extend quota_usage_gb = max_quota_usage_in_bytes / (1024 * 1024 * 1024)

      | project ClusterName, application_name, slo_size, target_directory, quota_limit_gb, quota_usage_gb, percentage'
- id: DB-geodr-10
  Topic: GEODR0042-Copy-failing-due-to-insufficient-file-sp
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0042-Copy-failing-due-to-insufficient-file-sp.md
  Prompts:
  - SQL DB resource pool stats analysis
  - SQL DB MonResourcePoolStats LogicalServerName
  - SQL DB investigate resource pool stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonResourcePoolStats
    ExecutedQuery: 'MonResourcePoolStats

      | where LogicalServerName == "{ServerName}" and resource_pool_name =~ "{ElasticPoolName}"

      | top 1 by TIMESTAMP desc

      | project TIMESTAMP,

      pool_storage_size_mb=toint(todouble(data_storage_percent) / 100.0 * todouble(resource_pool_storage_limit) / 1024.0),

      pool_file_size_mb=toint(todouble(allocated_data_storage_percent) / 100.0 * todouble(resource_pool_storage_limit) / 1024.0),

      pool_storage_limit_mb=todouble(resource_pool_storage_limit) / 1024.0'
