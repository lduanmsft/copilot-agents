  - SQL DB GeoDR failover groups logical_server_name LogicalServerName
  - SQL DB investigate now
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonGeoDRFailoverGroups
    ExecutedQuery: 'let now = now();

      let delay_3h = datetime_add(''hour'', -3, now);

      let interval_start = datetime_add(''hour'', -1, now);

      // All Geo Primary DBs WW

      GetCrossClusterData(''MonGeoDRFailoverGroups'')

      | where KustoCluster != "sqladhoc"

      | where failover_group_type == "ManagedFailoverGroup" and PreciseTimeStamp > interval_start

      | where failover_group_create_time < delay_3h

      | extend region_name = split(ClusterName,''.'')[1]

      | summarize arg_max(PreciseTimeStamp,region_name,logical_server_name, failover_group_name, partner_region, partner_server_name, role, failover_group_create_time) by failover_group_id, ClusterName

      | where role == "Primary"

      | join kind=inner

      (

      GetCrossClusterData(''MonAnalyticsDBSnapshot'')

      | where service_level_objective startswith ''MI'' and logical_database_name !in ("replicatedmaster","managed_model", "msdb") and  PreciseTimeStamp > interval_start

      | where create_time < delay_3h

      | where failover_group_id != ""

      | summarize arg_max(PreciseTimeStamp, service_level_objective, physical_database_id, create_time, [''state''], tenant_ring_name) by logical_server_name, logical_database_name

      | where [''state''] != "WaitingForPhysicalDatabaseCreation"

      ) on logical_server_name

      | join kind=leftanti

      (

      GetCrossClusterData(''MonDmContinuousCopyStatus'')

      | where PreciseTimeStamp > delay_3h

      | summarize by LogicalServerName, physical_database_id, partner_server, partner_database

      ) on $left.partner_server_name == $right.partner_server and $left.logical_database_name == $right.partner_database

      |join kind=inner

      (

      GetCrossClusterData(''MonNodeAgentHeartbeat'')

      | where PreciseTimeStamp  > delay_3h

      | summarize count() by ClusterName

      ) on $left.tenant_ring_name == $right.ClusterName

      | where logical_server_name == ''{server_name}'''
