      let SingleCluster = (clstr: string) {cluster(clstr).database(''sqlazure1'').MonManagedServers

      | where name in (primaryServer, secondaryServer)

      | summarize arg_max(PreciseTimeStamp, SubnetId = subnet_id, ClusterName = private_cluster_tenant_ring_name) by ManagedServerName = name

      | join kind = inner (cluster(clstr).database(''sqlazure1'').MonPrivateClusters

