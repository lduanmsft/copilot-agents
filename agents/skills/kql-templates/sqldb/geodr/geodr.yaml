      virtualNetworkPeering.properties.remoteVirtualNetwork.id, virtualNetworkPeering.properties.remoteVirtualNetworkAddressSpace

      | summarize by vnet_name = name,

      tostring(vnet_address_space),

      tostring(subnet_id),

      tostring(subnet_address_space),

      NSG_id = tostring(subnet_properties_networkSecurityGroup_id),

      RouteTable_id = tostring(subnet_properties_routeTable_id),

