- id: DB-geodr-73
  Topic: GEODR0004-6-Long-recovery
  Source: TSG-SQL-DB-GeoDr/content/GEODR/GEODR0004-Stuck-update-SLO/GEODR0004-6-Long-recovery.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth AppName originalEventTimestamp
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where originalEventTimestamp > datetime({startTime}) and originalEventTimestamp < datetime({endTime})

      | where AppName in (tolower("{target_app_name}"), tolower("{source_app_name}"))

      | extend is_on_source = message contains "Recovery of database ''{source_physical_database_id}''", is_on_target = message contains "Recovery of database ''{target_physical_database_id}''"

      | where is_on_source or is_on_target

      | project message, originalEventTimestamp, is_on_source

      ) on is_on_source

      | where originalEventTimestamp > last_recovery_completion_time

      | summarize duration = max(originalEventTimestamp) - min(originalEventTimestamp) by is_on_source

      | where duration > time(15m)

      | project TSG = iff(is_on_source, ''GEODR0004.6'', ''GEODR0004.7''), Details = strcat(''Recovery in progress for '', duration, '' for physical database '', iff(is_on_source, ''{source_physical_database_id}'', ''{target_physical_database_id}''))'
