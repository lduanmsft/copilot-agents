      cluster(''sqlazurewus2'').database(''sqlazure1'').MonAnalyticsDBSnapshot

      | where TIMESTAMP >= ago(1h)

      | summarize arg_max(TIMESTAMP, tenant_ring_name, sql_instance_name) by tenant_ring_name, sql_instance_name

      | summarize by tenant_ring_name, sql_instance_name

      ) on $left.AppName == $right.sql_instance_name and $left.ClusterName == $right.tenant_ring_name

      | project-away sql_instance_name

      | summarize by ClusterName, LogicalServerName, AppName, partner_server, Role, CertErrorCount, LastErrorTS

      | extend Region = extract("(.*).(.*).(worker|control).(database|sqltest-eg1).(windows.net|chinacloudapi.cn|mscds.com|usgovcloudapi.net|cloudapi.de)", 2, ClusterName, typeof(string))

      | extend EnvCmd = strcat("Select-SqlAzureEnvironment ", iif(ClusterName contains "chinacloudapi", "MCPROD", iif(ClusterName contains "usgovcloudapi", "FFPROD", iif(ClusterName contains "cloudapi.de", "BFPROD", "PROD"))), "; ")

      | extend ClusterCmd = strcat("Select-SqlAzureCluster Wasd-prod-", Region, "-CR1; ")

      | extend JitCmd = strcat("Get-JitAccess -WorkitemSource IcM -WorkItemId 60110617 -Justification "Mitigate instance partner certificate missing"; ")

      | extend MitigationCmd = strcat("Set-SqlAzureFsmState -TableName tbl_sql_instance_partners -Keys @(", """, AppName, "","", partner_server, "") -ExpectedCurrentState Ready -NewState Updating -CabId 60110617 -Force")

      | extend cmd = strcat(EnvCmd, ClusterCmd, JitCmd, MitigationCmd)

      | project-away EnvCmd, ClusterCmd, JitCmd, MitigationCmd

      | order by Region'
- id: DB-geodr-47
  Topic: Mass-upgrade-script
