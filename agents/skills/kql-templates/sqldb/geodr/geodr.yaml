    ExecutedQuery: 'let resource = "/subscriptions/0841bef4-4b5c-4d2c-8a5c-4de3dd759c39/resourceGroups/rg-msyqc-prod-vnets/providers/Microsoft.Network/virtualNetworks/vnet-msysqlqcmi-prod/subnets/snet-sqlmi-prod";

