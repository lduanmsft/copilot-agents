SqlSkills:
- id: LS-UTIL-01
  name: LoadBalancer VIP Availability Check (Port 1433/9000/9003)
  source: SQLLivesiteAgents/Connectivity/connectivity-utilities/loadbalancer-health/SKILL.md
  table: SqlTenant_cache_VIP_tb + geneva_metrics
  RequiredParameters:
  - StartTime
  - EndTime
  - ClusterName
  KustoQueries:
  - TableName: SqlTenant_cache_VIP_tb
    Note: Cache tables always on sqlstage.kusto.windows.net regardless of region. Availability < 90 = LB problem.
    ExecutedQuery: 'let ClusterNameVar = "{ClusterName}";

      let _endTime = datetime({EndTime});

      let _startTime = datetime({StartTime});

      let searchVip =

      cluster(''sqlstage.kusto.windows.net'').database(''sqlazure1'').SqlTenant_cache_VIP_tb

      | where ClusterName =~ ClusterNameVar

      | summarize max(ingestionTime) by ipv4_address

      | distinct ipv4_address

      | project LB_IP = ipv4_address;

      let VIP = toscalar(searchVip);

      let SLB = cluster(''sqlstage.kusto.windows.net'').database(''sqlazure1'').SqlTenantVIPMdMmapping_cache_tb

      | where ipv4_address == VIP

      | summarize max(ingestionTime) by ipv4_address, MdmAccountName;

      let startTime = _startTime;

      let endTime = _endTime;

      let SLBv2MDMAccount = toscalar(SLB | distinct MdmAccountName | take 1);

      let LBquery = strcat(@"metricNamespace(''Health'').metric(''VipAvailability'').dimensions(''IsDipProbeEnabled'',''LoadBalancerArmId'',''PublicIpArmId'',''Reason'',''VipAddress'',''VipOrIlbPA'',''VipPort'',''VnetId'').samplingTypes(''NullableAverage'')
      | where VipAddress == ''", VIP, "''");

      evaluate geneva_metrics_request(SLBv2MDMAccount, LBquery, startTime, endTime)

      | where VipPort in (1433, 9000, 9003)

      | project TimestampUtc, VipPort, Availability = NullableAverage

      '
- id: LS-UTIL-02
  name: LoadBalancer Dashboard URL Generation
  source: SQLLivesiteAgents/Connectivity/connectivity-utilities/loadbalancer-health/SKILL.md
  table: SqlTenant_cache_VIP_tb + VipMetadataSnapshotRecord
  RequiredParameters:
  - ClusterName
  KustoQueries:
  - TableName: SqlTenant_cache_VIP_tb
    Note: Generates DipAvailability, SNAT, and DDOS dashboard links. Requires azslb.kusto.windows.net access.
    ExecutedQuery: "let ClusterNameVar = \"{ClusterName}\";\nlet searchVip1 = cluster('sqlstage.kusto.windows.net').database('sqlazure1').SqlTenant_cache_VIP_tb\n| where ClusterName =~ ClusterNameVar\n\
      | summarize arg_max(ingestionTime, *) by ipv4_address\n| distinct ipv4_address\n| project LB_IP = ipv4_address;\nlet searchVip = toscalar(searchVip1);\nlet sourceTable =\ncluster(\"azslb.kusto.windows.net\"\
      ).database(\"azslbmds\").VipMetadataSnapshotRecord\n| where env_time > ago(6h)\n| where Vip == searchVip or AltAddress == searchVip\n| project Vip, VipUri, Type, SKU, AltAddress, VmLocs, CountHosts,\
      \ Region, env_time\n| summarize arg_max(env_time, *) by Vip\n| top 1 by env_time desc;\nlet muxDetails = cluster(\"azslb.kusto.windows.net\").database(\"azslbmds\").DSMulticastGroupEvent\n| where\
      \ env_time > ago(3h) and SegmentName != \"0.0.0.0_0\" and SegmentName != \"::_0\"\n| where Uri has \"MuxPoolManager\"\n| project env_time, env_cloud_name, SegmentName, GroupIncarnationId, MulticastGroup,\
      \ Uri\n| summarize arg_max(env_time, *) by SegmentName, Uri\n| extend CidrString = replace_string(SegmentName, \"_\", \"/\")\n| extend Ipv4Cidr = iff(CidrString has \":\", \"\", CidrString), Ipv6Cidr\
      \ = iff(CidrString has \":\", CidrString, \"\")\n| where ipv6_is_in_range(searchVip, Ipv6Cidr) or ipv4_is_in_range(searchVip, Ipv4Cidr)\n| extend SlbRing = replace_string(GroupIncarnationId, \"-azr\"\
      , \"-az,r\"), Region = env_cloud_name;\nlet vipSourceTabe = sourceTable | join kind=leftouter muxDetails on Region\n| join kind=leftouter (\n    cluster(\"azslb.kusto.windows.net\").database(\"azslbmds\"\
      ).SlbMetadataVersionRecord\n    | where env_time > ago(1h)\n    | summarize by Region, MdmAccountName\n    | extend HPAccountName = strcat(\"slbhp\", substring(MdmAccountName, 5))\n) on $left.Region\
      \ == $right.Region\n| project-away Region1, Region2, env_time1;\nlet resourceTable_has_records = toscalar(vipSourceTabe | summarize count() > 0);\nunion\n(vipSourceTabe | where resourceTable_has_records\
      \ == true),\n(datatable(Vip:string)[''] | where resourceTable_has_records == false)\n| extend DipAvailbility = strcat('https://portal.microsoftgeneva.com/dashboard/slbv2prod/AzureMonitor/DipAvailability_HealthProbeStatus?overrides=[{\"\
      query\":\"//dataSources\",\"key\":\"account\",\"replacement\":\"', MdmAccountName, '\"},{\"query\":\"//*[id=', \"'VipAddress']\", '\",\"key\":\"value\",\"replacement\":\"', Vip, '\"}]')\n| extend\
      \ SNAT = strcat('https://portal.microsoftgeneva.com/dashboard/slbv2prod/AzureMonitor/SnatAvailability?overrides=[{\"query\":\"//dataSources\",\"key\":\"account\",\"replacement\":\"', HPAccountName,\
      \ '\"},{\"query\":\"//*[id=', \"'VipAddress'\", ']\",\"key\":\"value\",\"replacement\":\"', Vip, '\"}]')\n| extend DDOS = strcat('https://portal.microsoftgeneva.com/dashboard/CNS/CRI?overrides=[{\"\
      query\":\"//*[id=', \"'DestinationVIP'\", ']\",\"key\":\"value\",\"replacement\":\"', Vip, '\"}]')\n| project Pack = bag_pack(\"VIP\", Vip, \"DipAvailbility Link\", DipAvailbility, \"SNAT Link\",\
      \ SNAT, \"DDOS Link\", DDOS, \"IP-Cidr\", Ipv4Cidr, \"VipUri\", VipUri, \"LB SKU\", SKU, \"SLB-Ring\", SlbRing, \"SLB Mdm Account\", MdmAccountName, \"HP Account\", HPAccountName)\n| mv-expand Pack\n\
      | extend Object = tostring(bag_keys(Pack)[0])\n| project Object, List = tostring(Pack[Object])\n"
