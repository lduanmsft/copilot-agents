# Error: 40613 State 13 — XDBHost Login Queue Lock Timeout
#
# This error indicates a failure to enqueue logins within XDBHost.
# XDBHost maintains a queue per SQL instance. The lock has a timeout of 5 seconds.
# A failure to acquire the lock results in the login being failed with 40613/13.
#
# Related errors: 40613/15, 26078/15
#
# Potential causes: Same as error-26078-state-15
# Troubleshooting: Use connectivity-utilities/xdbhost-metric-check skill
