  # ──────────────────────────────────────────────────────
  # TR500 - Automation Actions on Node
  # ──────────────────────────────────────────────────────
  - id: LS-TR500
    name: "Automation Actions on Node (TCP Rejections)"
    source: "SQLLivesiteAgents/Connectivity/xdbhost-high-tcp-rejections/references/queries.md"
    table: MonNonPiiAudit
    RequiredParameters:
      - StartTime
      - EndTime
      - ClusterName
      - DBNodeName
    KustoQueries:
      - TableName: MonNonPiiAudit
        ExecutedQuery: |
          let _startTime = datetime({StartTime});
          let _endTime = datetime({EndTime});
          let _ClusterNameVar = '{ClusterName}';
          let _NodeNameVar = '{DBNodeName}';
          MonNonPiiAudit
          | where TIMESTAMP between (_startTime.._endTime)
          | where * contains _ClusterNameVar and * contains _NodeNameVar
          | where request_action !in~ ('ExecuteCMSQuery', 'FabricClusters()', 'FabricNodes()', 'ExecuteCMSQueryJSON', 'ExecuteQuery') and request_action !startswith 'Get'
