          | order by time_created asc

  # ──────────────────────────────────────────────────────
  # TR600 - Login Count by Instance on Node
  # ──────────────────────────────────────────────────────
  - id: LS-TR600
    name: "Login Count by Instance on Node"
    source: "SQLLivesiteAgents/Connectivity/xdbhost-high-tcp-rejections/references/queries.md"
    table: MonLogin
    RequiredParameters:
      - StartTime
      - EndTime
      - ClusterName
      - DBNodeName
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterNameVar = '{ClusterName}';
          let _NodeNameVar = '{DBNodeName}';
          MonLogin
          | where TIMESTAMP between (StartTime..EndTime)
          | where ClusterName =~ _ClusterNameVar
          | where NodeName =~ _NodeNameVar
          | where event == 'process_login_finish'
          | where package == 'xdbhost'
          | summarize LoginCount = count() by instance_name
          | order by LoginCount desc

