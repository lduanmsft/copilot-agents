  # ──────────────────────────────────────────────────────
  - id: LS-TR610
    name: "Login Volume per XdbHost Process ID (5-min bins)"
    source: "SQLLivesiteAgents/Connectivity/xdbhost-high-tcp-rejections/references/queries.md"
    table: MonLogin
    RequiredParameters:
      - StartTime
      - EndTime
      - ClusterName
      - DBNodeName
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
