# ============================================================================
# SQLDB Connectivity Investigation Skill (CSS 版)
# ============================================================================
# 改编自: SQLLivesiteAgents / Connectivity.agent.md
# 适配: CSS 案例调查 (非 DRI mitigation)
# KQL 引用: kql-templates/sqldb/connectivity/*/kql-livesite.yaml
# ============================================================================
#
# 与工程 DRI 版本的区别:
#   1. 去掉 mitigation 操作 (kill GW, restart XdbHost, CAB 等)
#   2. 去掉 LLM agent guardrails (STOP GATE, enforcement checklists 等)
#   3. 输出为 RCA 摘要 + 如需 escalation 的移交包
#   4. 引用本地 kql-livesite.yaml 而非 .github/skills/ 路径
#   5. 去掉 ICM 特定字段解析 (ObservedStartTime, MitigateTime 等)
#   6. 去掉 report 保存到 ADO repo
#
# 架构:
#   Client → xdbgateway(CR/GW Node) → xdbhost(TR/DB Node) → sqlservr(TR/DB Node)
#   CR = Connectivity Ring (Gateway 集群)
#   TR = Tenant Ring (数据库所在集群)
# ============================================================================

name: "SQLDB Connectivity Investigation"
description: >
  Diagnoses Azure SQL Database connectivity issues including login failures,
  session disconnects, gateway health, and XdbHost restarts.
  All investigation is Kusto-based on Azure backend telemetry.

# ════════════════════════════════════════════════════════
# 1. 输入参数
# ════════════════════════════════════════════════════════
required_inputs:
  - LogicalServerName      # e.g. my-server (不含 .database.windows.net)
  - LogicalDatabaseName    # e.g. my-db
  - StartTime              # UTC, e.g. 2026-01-01 02:00:00
  - EndTime                # UTC, e.g. 2026-01-01 03:00:00
  # 如有 error code 可加速 triage:
  - ErrorCode              # optional, e.g. 40613
  - ErrorState             # optional, e.g. 22

tips:
  - "时间窗口建议在客户报告的时间上下各扩展 1 小时"
  - "如果只有 server name FQDN (xxx.database.windows.net), 取 xxx 部分"
  - "如果客户只说 'intermittent', 建议取最近一次复现的 24h 窗口"

# ════════════════════════════════════════════════════════
# 2. 调查流程
# ════════════════════════════════════════════════════════
workflow:

  # ──────────────────────────────────────────────────────
  # Phase 0: 准备 — 确定 Kusto 集群 + 数据库环境
  # ──────────────────────────────────────────────────────
  - phase: 0
    name: "Kusto 集群解析 + 数据库环境"
    steps:

      - step: "0.1"
        name: "DNS → Region → Kusto Cluster"
        description: >
          通过 DNS 解析 {LogicalServerName}.database.windows.net 确定 region,
          然后查 KustoConnectionConfiguration 得到 Kusto cluster URI + database.
        how: >
          nslookup {LogicalServerName}.database.windows.net → 得到 CNAME 中的 region 关键字
          → 查 config/KustoConnectionConfiguration.xml 或用 execute-kusto-query skill
        output: [KustoClusterUri, KustoDatabase, region]
        critical: "永远不要猜测 Kusto cluster URI. 不同 region 对应不同集群."

      - step: "0.2"
        name: "获取数据库环境信息"
        description: >
          查询 MonSQLTenantSnapshot 获取 AppName, ClusterName, NodeName,
          physical_database_id, fabric_partition_id, SLO, deployment_type 等.
        how: "用 get-db-info skill 或直接查 MonSQLTenantSnapshot"
        output:
          - AppName              # sql_instance_name (如 f24c8d476f1e)
          - ClusterName          # tenant_ring_name (如 tr9591.southcentralus1-a.worker.database.windows.net)
          - NodeName             # DB node (如 _DB_31)
          - deployment_type      # GP/BC, ZR/non-ZR
          - physical_database_id
          - fabric_partition_id
        note: >
          如果时间窗口内数据库有过 SLO 变更或 failover, 可能有多个配置.
          需要为每个配置分别分析.

  # ──────────────────────────────────────────────────────
  # Phase 1: Triage — 确定问题类型
  # ──────────────────────────────────────────────────────
  - phase: 1
    name: "Triage"
    steps:

      - step: "1.1"
        name: "问题分类"
        description: "根据客户描述的关键字 + error code 确定调查路径"
        routing:
          - keywords: ["login failure", "login error", "cannot connect", "authentication", "18456", "40613"]
            route: "login-failure"
          - keywords: ["session disconnect", "connection dropped", "timeout", "existing connection was forcibly closed", "17900"]
            route: "session-disconnect"
          - keywords: ["intermittent", "connectivity issue"]
            route: "login-failure"
            note: "默认路径, 因为 intermittent connectivity 通常在 MonLogin 中有痕迹"
        default: "login-failure"

  # ──────────────────────────────────────────────────────
  # Phase 2: Login Failure 调查 (主路径)
  # ──────────────────────────────────────────────────────
  - phase: 2
    name: "Login Failure Investigation"
    condition: "route == 'login-failure'"
    steps:

      - step: "2.1"
        name: "Check Outage Records"
        description: "查看此 server/database 是否有已记录的 outage"
        kql: "login-triage/kql-livesite.yaml → LS-CONN-BASE-01"
        table: LoginOutages
        what_to_look_for:
          - "如果有 outage record → 问题已被平台识别, 提取 OutageReasonLevel1/2/3"
          - "如果没有 → 继续调查, 问题可能是客户侧或未被 outage 系统捕获"

      - step: "2.2"
        name: "Determine Login Target"
        description: "确定登录请求的目标 TR Ring 和 DB Node"
        kql: "login-triage/kql-livesite.yaml → LS-CONN-BASE-04"
        table: MonLogin
        what_to_look_for:
          - "TargetTRRing — 数据库所在的 Tenant Ring"
          - "TargetDBNode — 数据库所在的 DB 节点"
          - "如果时间窗口内有多个不同的 TargetTRRing → 发生了 failover 或 SLO 变更"

      - step: "2.3"
        name: "Determine Connectivity Ring"
        description: "确定哪些 CR 在处理此 server/database 的登录请求"
        kql: "login-triage/kql-livesite.yaml → LS-CONN-BASE-03"
        table: MonLogin
        what_to_look_for:
          - "通常 2 个 CR 服务一个 data slice"
          - "如果 >2 个 CR → 可能发生了 slice migration"
          - "比较两个 CR 的 TotalLogins vs LoginWithError, 如果差异 >2 倍 → 异常"

      - step: "2.4"
        name: "Connection Type Analysis"
        description: "确定连接类型: Proxy/Redirect, Public/Private/Service Endpoint"
        kql: "login-triage/kql-livesite.yaml → LS-CONN-BASE-07"
        table: MonLogin
        what_to_look_for:
          - "proxy_override → 客户设置的 Connection Policy"
          - "result → 实际使用的连接类型 (e_crContinueSameState=Proxy, e_crContinue=Redirect)"
          - "is_vnet_private_access_address=true → Private Endpoint"
          - "如果 policy 是 Redirect 但实际走了 Proxy → 驱动不支持 或 经过了 NVA/Zscaler"
          - "如果 Private Endpoint + Default + Redirect → 历史 redirection_map_id (参考 SKILL.md)"

      - step: "2.5"
        name: "Determine Prevailing Error"
        description: "筛查 MonLogin 中的主要错误"
        kql: "login-triage/kql-livesite.yaml → LS-CONN-BASE-05"
        table: MonLogin
        what_to_look_for:
          - "区分 is_user_error=true (客户侧) vs false (平台侧)"
          - "如果全是 user error (如 18456) → 客户认证/权限问题, 不需要继续平台侧调查"
          - "如果有 system error → 继续到 step 2.6"
          - "检查 avg_total_time_ms > 4000ms → 某个环节有 delay"
          - "分析 error source: xdbgateway vs xdbhost vs sqlserver"
        branching:
          user_error_only: "→ Phase 5 输出: 客户侧问题 (认证/防火墙/权限)"
          system_error_found: "→ step 2.6"
          error_40613_state_22: "→ step 2.6 + step 2.8 (网络分析)"
          error_17900_state_25: "→ Phase 3 Session Disconnect"

      - step: "2.6"
        name: "Narrow Down by Node"
        description: "进一步按 GW/DB Node 缩小错误范围"
        kql: "login-triage/kql-livesite.yaml → LS-CONN-BASE-06"
        table: MonLogin
        what_to_look_for:
          - "错误集中在单个 node → node-specific 问题"
          - "错误分散在多个 node → infrastructure-level 问题"

      - step: "2.7"
        name: "Error-Specific Analysis"
        description: >
          根据 step 2.5 找到的 top error/state 组合, 进行针对性分析.
          常见 error/state 及其含义:
        error_reference:
          - error: 40613
            state: 10
            meaning: "CantFindRequestedInstance — 实例未找到 (通常伴随 XdbHost 重启)"
          - error: 40613
            state: 22
            meaning: "DueToProxyConnextThrottle — GW proxy 限流, 通常与 SNAT 或网络问题相关"
            action: "必须检查 SNAT (step 2.8) + 网络分析"
          - error: 40613
            state: 84
            meaning: "Proxy connect timeout (SNIOpen failure) — 网络层问题"
            action: "必须做网络分析"
          - error: 40613
            state: 4
            meaning: "WinFabOrSqlAliasLookupFailure — AliasDB 查找失败"
          - error: 40613
            state: 12/13/44/126
            meaning: "XdbHost restart error cascade — 见 XdbHost Restart 分析"
            action: "→ step 2.10 XdbHost Restart 分析"
          - error: 18456
            states: [113, 122, 132, 170]
            meaning: "认证错误 (AAD/密码/用户名) — 通常是 user error"
          - error: 40613
            state: 81
            meaning: "IPv6 prefix mismatch on PaaSv2 clusters"
          - error: 26078
            state: 15
            meaning: "xdbhost 问题, 需要检查 xdbhost metrics"

      - step: "2.8"
        name: "CR Health Check (简化版)"
        description: "检查 Connectivity Ring 的健康状态"
        kql: "gateway-ring-health/kql-livesite.yaml → GW1100-GW1130"
        queries_to_run:
          - id: "GW1100 (LS-GW1100)"
            name: "SNAT Port Exhaustion"
            when: "总是执行 (尤其 40613/22 时必须)"
            note: "需要 azslb.kusto.windows.net 权限 (AznwKustoReader)"
          - id: "GW1110 (LS-GW1110)"
            name: "GW Process Restart"
            when: "总是执行"
          - id: "GW1112 (LS-GW1112)"
            name: "GW Deployment Traces"
            when: "GW process restart detected 或 多节点同时出问题"
          - id: "GW1122 (LS-GW1122)"
            name: "Node Health Events"
            when: "总是执行"
        what_to_look_for:
          - "SNAT events → 网络层问题, 需 escalate 到 Networking"
          - "GW restart → 检查是否与客户报告的时间吻合"
          - "Deployment → 检查是否有版本更新导致的 transient failure"

      - step: "2.9"
        name: "Failover / Availability Cross-Check"
        description: "检查登录失败是否是 failover/availability 事件的副作用"
        how: "查 sqldb/availability/ 下的 failover KQL 模板"
        what_to_look_for:
          - "如果时间窗口内有 failover → 登录失败是 secondary symptom"
          - "RCA 应指向 failover 而非 connectivity"

      - step: "2.10"
        name: "XdbHost Restart Analysis (条件执行)"
        description: "当 step 2.7 发现 40613 state 10/12/13/44/126 error cascade 时执行"
        condition: "40613 state 10/12/13/44/126 found in step 2.5/2.7"
        kql: "xdbhost-restart/kql-livesite.yaml → XR100-XR700"
        sub_steps:
          - "XR100: 确认 MonXdbhost process_id 变化 (无变化 → 不是 restart)"
          - "XR200: 分类触发原因 (crash/stuck/kill)"
          - "XR300: 检查 MonNonPiiAudit 是否有自动化 KillProcess"
          - "XR400/410: 错误分布 (user errors vs restart errors 的时间线)"
          - "XR600: 登录量 (>2500/min = 异常高, 放大 restart 影响)"
          - "XR700: 自愈验证 (SuccessCount 恢复, RestartErrors 降为 0)"
        key_insight: >
          如果 restart 前 user errors >> system errors → 根因是客户认证错误洪水触发了自动化.
          如果 restart 后 40613/22 持续 > 15 min → 有独立的 GW/网络问题.

      - step: "2.11"
        name: "App Health (sqlservr 进程)"
        description: "检查 DB 节点上 sqlservr 进程的健康状态"
        kql: "app-health/kql-livesite.yaml → AH100-AH305"
        sub_steps:
          - "AH100: 检查 sqlservr process_id 变化 (重启)"
          - "AH200: LoginOutages 审计"
          - "AH305: 系统健康告警模式聚合 (I/O 慢, 内存压力, 死锁, stack dump 等)"
          - "AH305-pre: 与事件前 2 小时对比, 区分 chronic vs acute"
        what_to_look_for:
          - "I/O_slow → storage 问题"
          - "Memory_pressure → 内存压力"
          - "StackDump / Crash → sqlservr crash (可能导致 login failure)"
          - "acute (事件窗口才出现) vs chronic (之前就有, 背景噪音)"

  # ──────────────────────────────────────────────────────
  # Phase 3: Session Disconnect 调查
  # ──────────────────────────────────────────────────────
  - phase: 3
    name: "Session Disconnect Investigation"
    condition: "route == 'session-disconnect'"
    steps:

      - step: "3.1"
        name: "Disconnect Events Summary"
        kql: "session-disconnect/kql-livesite.yaml → LS-SD-01"
        table: MonLogin
        description: "统计 proxy_close_connection / process_close_connection 事件"
        what_to_look_for:
          - "Top error/state 组合 — 确定最主要的断连原因"
          - "如果 error 17900 state 25 最多 → TDS protocol error"

      - step: "3.2"
        name: "Connection Trace"
        kql: "session-disconnect/kql-livesite.yaml → LS-SD-02"
        table: MonLogin
        description: "追踪 top 3 connection_peer_id 的完整连接生命周期"
        what_to_look_for:
          - "从 process_login_finish (login 成功) 到 process_close_connection (断连) 的时间线"
          - "kill_reason 字段: TdsProtocolError, NormalLogout, etc."
          - "extra_info 中的 Error_SniRead → SNI 层网络读取错误"
          - "is_mars=true → MARS 连接可能部分关闭导致断连"
        correlation:
          gateway_to_backend: "peer_activity_id + peer_activity_seq"
          xdbhost_to_sqlserver: "connection_peer_id"

      - step: "3.3"
        name: "建议客户操作"
        always_output:
          - "建议客户抓取 client-side networking trace 并联系 Azure Networking CSS 协助分析"
          - "建议客户确认 end-to-end 网络路径 (是否有 NVA, Zscaler, SSL inspection 等)"
          - "如果 error 17900 state 25 → 参考 TSG: https://eng.ms/docs/cloud-ai-platform/azure-data/azure-data-azure-databases/sql-/sql-connectivity/sql-db-connectivity/connection/tds-protocol-error"

  # ──────────────────────────────────────────────────────
  # Phase 4: Utility Queries (按需)
  # ──────────────────────────────────────────────────────
  - phase: 4
    name: "Utility Queries (按需调用)"
    description: "不独立执行, 由其他 step 触发"
    utilities:

      - name: "LoadBalancer VIP Availability"
        kql: "utilities/kql-livesite.yaml → LS-UTIL-01"
        when: "怀疑 LB 问题 或 SNAT exhaustion"
        threshold: "Availability < 90 = LB 有问题"

      - name: "SQL Node to VM Mapping"
        kql: "utilities/kql-livesite.yaml → LS-UTIL-04"
        when: "需要做网络分析 (EagleEye) 或 VM 级别排查"

      - name: "DB Node CPU (VM-level)"
        kql: "utilities/kql-livesite.yaml → LS-UTIL-03"
        when: "怀疑 node 级别 CPU 问题"

  # ──────────────────────────────────────────────────────
  # Phase 5: 输出 — RCA 分类 + 建议
  # ──────────────────────────────────────────────────────
  - phase: 5
    name: "RCA 输出"
    steps:

      - step: "5.1"
        name: "根因分类"
        categories:
          - category: "Platform — Failover/Reconfiguration"
            indicators: "LoginOutages 有记录, failover events, 40613 state 10/12/13/44/126 cascade"
            customer_message: >
              我们确认在 {StartTime} - {EndTime} (UTC) 期间, 您的数据库 {DatabaseName} 
              发生了平台侧的重新配置事件, 导致了短暂的连接中断. 
              这是预期的 HA (High Availability) 行为, 通常在 1-2 分钟内自动恢复.
              建议在应用层实现连接重试逻辑.
            doc: "https://learn.microsoft.com/en-us/azure/azure-sql/database/connectivity-architecture"

          - category: "Platform — Gateway/Network Issue"
            indicators: "SNAT exhaustion, 40613/22, 40613/84, GW process restart, deployment"
            customer_message: >
              我们确认在报告的时间段内, Gateway 基础设施层面出现了 {specific_issue},
              影响了到您数据库的连接. 此问题已 {self-mitigated/been mitigated by platform}.
            escalation: "如未自愈 → escalate 到 Gateway queue 或 Networking"

          - category: "Platform — DB Node Issue"
            indicators: "sqlservr crash (AH100), I/O slow (AH305), memory pressure"
            customer_message: >
              我们确认数据库所在节点在报告的时间段内出现了 {specific_issue}, 
              可能导致了连接问题.

          - category: "Customer — Authentication Error"
            indicators: "is_user_error=true, 18456 states, AAD 认证错误"
            customer_message: >
              根据后端遥测, 登录失败是由客户端认证问题引起的. 
              错误代码 {error} state {state} 表示 {meaning}.
              建议检查: 用户名/密码, AAD 配置, 防火墙规则.

          - category: "Customer — Connection Configuration"
            indicators: "Connection type mismatch, outdated driver, Private Endpoint misconfiguration"
            customer_message: >
              我们发现连接配置可能存在问题: {specific_finding}.
              建议: {recommendation}.

          - category: "Undetermined — Network Path Issue"
            indicators: "Session disconnect, 17900/25, no platform-side anomaly found"
            customer_message: >
              后端遥测未发现平台侧异常. 断连可能发生在 client ↔ Azure 的网络路径上.
              建议抓取 client-side networking trace 并联系 Azure Networking 团队协助分析.

      - step: "5.2"
        name: "Escalation 判断"
        rules:
          - condition: "Platform issue, 未自愈"
            action: "Escalate 到对应工程团队 + 附上调查数据"
          - condition: "Platform issue, 已自愈"
            action: "提供 RCA 给客户, 不需要 escalate"
          - condition: "Customer issue"
            action: "提供建议给客户, 不需要 escalate"
          - condition: "Network path issue"
            action: "建议客户联系 Azure Networking CSS + 提供 EagleEye 链接"

# ════════════════════════════════════════════════════════
# KQL 模板引用汇总
# ════════════════════════════════════════════════════════
kql_references:
  base_path: "kql-templates/sqldb/connectivity"
  files:
    - "login-triage/kql-livesite.yaml"          # 8 skills: CONN-BASE-01 ~ 08
    - "gateway-ring-health/kql-livesite.yaml"    # 12 skills: GW1100 ~ GW1130
    - "xdbhost-restart/kql-livesite.yaml"        # 7 skills: XR100 ~ XR700
    - "session-disconnect/kql-livesite.yaml"     # 2 skills: SD-01, SD-02
    - "app-health/kql-livesite.yaml"             # 6 skills: AH100 ~ AH305
    - "utilities/kql-livesite.yaml"              # 4 skills: UTIL-01 ~ UTIL-04
  total_kql: 39  # CSS 实际使用的 KQL 数量 (39/79)
  not_used:
    - "gateway-node-low-login/  (20 KQL) — ICM monitor alert 专用"
    - "control-ring-unhealthy/  (8 KQL)  — 集群级 alert 专用"
    - "brain-login-alert/       (2 KQL)  — 区域级 SLI alert 专用"
    - "xdbhost-tcp-rejections/  (10 KQL) — 基础设施级 alert 专用"
