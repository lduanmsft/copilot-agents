SqlSkills:

  # ── Step 2: Scope Assessment ──

  - id: LS-GNLSR100
    name: "Per-Node Login Success Rate Across Cluster"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonLogin
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event == "process_login_finish"
          | where AppTypeName =~ 'Gateway'
          | summarize TotalLogins = count(), SystemErrors = countif(is_success == false and is_user_error == false), UserErrors = countif(is_success == false and is_user_error == true), DistinctServers = dcount(logical_server_name) by NodeName
          | extend LoginSuccessRate = round(100.0 * (TotalLogins - SystemErrors) / TotalLogins, 2)
          | extend SystemErrorRate = round(100.0 * SystemErrors / TotalLogins, 2)
          | order by LoginSuccessRate asc

  - id: LS-GNLSR110
    name: "Count Distinct Impacted Servers"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonLogin
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event == "process_login_finish"
          | where is_success == false and is_user_error == false
          | summarize DistinctServersWithErrors = dcount(logical_server_name), TotalSystemErrors = count()

  # ── Step 3: Known Issues ──

  - id: LS-GNLSR200
    name: "Trident Testing in Canary Rings"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonLogin
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event == "process_login_finish"
          | where AppTypeName =~ 'Gateway'
          | where is_success == false
          | where error == 40613 and state == 4
          | summarize NumberOfUniqueServers = dcount(logical_server_name), any(logical_server_name) by lookup_state, resource_group, ClusterName

  - id: LS-GNLSR210
    name: "SQL Alias Failover + Cache Backoff (Error Check)"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonLogin
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event == "process_login_finish"
          | where AppTypeName =~ 'Gateway'
          | where is_success == false
          | where error == 40613 and state == 4
          | summarize count() by error, state, is_success, is_user_error, NodeName, lookup_state, lookup_error_code
          | order by count_ desc

  - id: LS-GNLSR220
    name: "SQL Alias Cache Backoff Timer Activity"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonRedirector
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonRedirector
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonRedirector
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event != 'error_log'
          | summarize count() by strcat(event, '/', NodeName), bin(originalEventTimestamp, 1m)
          | render stackedareachart

  - id: LS-GNLSR230
    name: "SF Version Behavior Change Check"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonLogin
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event == "process_login_finish"
          | where AppTypeName =~ 'Gateway'
          | where is_success == false
          | where error == 40613 and state == 4
          | where lookup_state has "SERVICE_FABRIC-DOES-NOT_EXISTS"
          | summarize count() by NodeName, bin(originalEventTimestamp, 5m)
          | order by originalEventTimestamp asc

  # ── Step 4: Error Distribution ──

  - id: LS-GNLSR300
    name: "Error/State Distribution on Affected Node"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, ClusterName, NodeName]
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          let _NodeName = '{NodeName}';
          MonLogin
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where NodeName =~ _NodeName
          | where event == "process_login_finish"
          | where is_success == false and is_user_error == false
          | extend server_and_dbs = strcat("[", logical_server_name, ", ", database_name, "]")
          | extend fabric_instance_uri_type = extract("fabric:/Worker.(.*)/(.*)/", 2, fabric_instance_uri, typeof(string))
          | summarize total = count(), distinct_dbs = dcount(server_and_dbs), makelist(server_and_dbs) by AppTypeName, error, state, lookup_error_code, lookup_state, fabric_instance_uri_type
          | order by total desc

  - id: LS-GNLSR310
    name: "Server-Level Breakdown with Target Rings"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, ClusterName, NodeName]
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          let _NodeName = '{NodeName}';
          MonLogin
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where NodeName =~ _NodeName
          | where event == "process_login_finish"
          | where is_success == false and is_user_error == false and error > 0
          | extend TargetTRRing = substring(instance_name, indexof(instance_name, ".") + 1)
          | extend sqlInstance = tolower(split(instance_name, '.')[0])
          | summarize error_count = count() by err = strcat("error:", error, " state:", state), sqlInstance, logical_server_name, database_name, fabric_node_name, TargetTRRing
          | order by error_count desc
          | take 20

  - id: LS-GNLSR320
    name: "Most Impacted Logical Servers and Databases"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, ClusterName, NodeName]
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          let _NodeName = '{NodeName}';
          MonLogin
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where NodeName =~ _NodeName
          | where event == "process_login_finish"
          | where is_success == false and is_user_error == false and error > 0
          | where isnotempty(logical_server_name) and isnotempty(database_name)
          | summarize SystemErrors = count(), DistinctErrors = dcount(strcat(error, "_", state)) by logical_server_name, database_name
          | order by SystemErrors desc
          | take 5

  # ── Step 6: SNAT ──

  - id: LS-GNLSR400
    name: "SNAT Port Exhaustion Check (GW Node)"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonFabricClusters + SlbHealthEvent
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonFabricClusters
        Note: "Requires access to azslb.kusto.windows.net (AznwKustoReader)"
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonFabricClusters
          | where name =~ _ClusterName
          | distinct ipv4_address
          | join kind=inner (cluster('azslb.kusto.windows.net').database('azslbmds').SlbHealthEvent
          | where env_time between (StartTime..EndTime)
          | where HealthEventType in ("SnatPortExhaustion", "HighSnatPortUsage")
          | where env_name == "##Microsoft.Networking.Slb.Core.Monitoring.SlbHealthEvent") on $left.ipv4_address == $right.VipOrIlbPA
          | summarize count() by HealthEventType, bin(env_time, 5m)
          | render timechart

  # ── Step 7: Redirector & AliasDB Health ──

  - id: LS-GNLSR600
    name: "Alias Cache ODBC Failures Per Node"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonRedirector
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonRedirector
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonRedirector
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event == "sql_alias_odbc_failure"
          | summarize FailureCount = count() by bin(originalEventTimestamp, 5m), NodeName
          | order by originalEventTimestamp asc

  - id: LS-GNLSR610
    name: "Alias Cache Refresh Activity"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonRedirector
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonRedirector
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonRedirector
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event in ("sql_alias_cache_refresh", "sql_alias_cache_update")
          | summarize Count = count() by bin(originalEventTimestamp, 15m), event, NodeName
          | order by originalEventTimestamp asc

  - id: LS-GNLSR620
    name: "Fabric Resolution Failures"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonRedirector
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonRedirector
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonRedirector
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event == "fabric_end_resolve"
          | where result != 0
          | summarize FailureCount = count(), DistinctPartitions = dcount(partition_id) by bin(originalEventTimestamp, 5m), result, NodeName
          | order by originalEventTimestamp asc

  - id: LS-GNLSR630
    name: "Lookup Retries (Resolution Instability)"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonRedirector
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonRedirector
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonRedirector
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event in ("xdb_lookup_retry_begin", "xdb_lookup_retry_end", "xdb_lookup_retry_cleanup_task_end")
          | summarize Count = count() by bin(originalEventTimestamp, 5m), event, NodeName
          | order by originalEventTimestamp asc

  - id: LS-GNLSR640
    name: "AliasDB SF Application Health State"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonSFEvents
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonSFEvents
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonSFEvents
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event == "HM.ApplicationHealthReportCreated" or event == "HM.ApplicationNewHealthReport"
          | where text has "AliasDB" or text has "SqlAlias"
          | project originalEventTimestamp, NodeName, event, text
          | order by originalEventTimestamp asc

  # ── Step 8: GW Process Health ──

  - id: LS-GNLSR700
    name: "GW Process Restarts (Process ID Changes)"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonLogin
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event == "process_login_finish"
          | where package =~ 'xdbgateway'
          | summarize total_processes = dcount(process_id, 4) by NodeName
          | where total_processes > 1

  - id: LS-GNLSR730
    name: "Node-Specific Resource Usage"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonGatewayResourceStats
    RequiredParameters: [StartTime, EndTime, ClusterName, NodeName]
    KustoQueries:
      - TableName: MonGatewayResourceStats
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          let _NodeName = '{NodeName}';
          MonGatewayResourceStats
          | where TIMESTAMP between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where NodeName =~ _NodeName
          | summarize AvgMemoryUsagePages = avg(memory_usage_pages), MaxMemoryUsagePages = max(memory_usage_pages), AvgThreadCount = avg(thread_count), MaxThreadCount = max(thread_count), AvgAliasCacheEntries = avg(alias_cache_entries), MaxAliasCacheEntries = max(alias_cache_entries), AvgUriCacheEntries = avg(uri_cache_entries), MaxUriCacheEntries = max(uri_cache_entries) by bin(TIMESTAMP, 5m)
          | order by TIMESTAMP asc

  # ── Step 9: Deployment ──

  - id: LS-GNLSR800
    name: "GW Deployment Traces (Node-Level)"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonRolloutProgress
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonRolloutProgress
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonRolloutProgress
          | where originalEventTimestamp between (StartTime..EndTime)
          | where cluster_name =~ _ClusterName
          | where application_type_name == "Gateway" or application_name == "fabric:/Gateway"
          | where event in ("start_upgrade_app_type", "app_instance_upgrade_progress", "start_upgrade_app_instance", "start_pause_upgrade_app_type", "start_resume_upgrade_app_type", "set_start_post_bake_blast")
          | project originalEventTimestamp, event, cluster_name, target_version, rollout_key, upgrade_state, upgrade_progress, bake_start_time, bake_duration
          | extend RolloutKeyCab = extract("^([0-9]*)_(.*)", 1, rollout_key)
          | project-away rollout_key
          | order by originalEventTimestamp asc

  - id: LS-GNLSR810
    name: "Repair Tasks on Nodes"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: WinFabLogs
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: WinFabLogs
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          WinFabLogs
          | where ETWTimestamp between (StartTime..EndTime + 3d)
          | where ClusterName =~ _ClusterName
          | where Text contains "RepairTask[scope=ClusterRepairScopeIdentifier, taskId="
          | parse kind=regex Text with * "taskId=" TaskId ", version" * "state=" State ", flags" * "target=NodeRepairTargetDescription\\[nodeList = \\(" Node "\\)\\], executor" *
          | project ClusterName, ETWTimestamp, TaskId, State, Node
          | evaluate pivot(State, min(ETWTimestamp))

  # ── Step 10: Impact ──

  - id: LS-GNLSR900
    name: "Distinct Impacted Servers and Subscriptions (GW Node)"
    source: "SQLLivesiteAgents/Connectivity/gateway-node-low-login-success-rate/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, ClusterName]
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          let _ClusterName = '{ClusterName}';
          MonLogin
          | where originalEventTimestamp between (StartTime..EndTime)
          | where ClusterName =~ _ClusterName
          | where event == "process_login_finish"
          | where AppTypeName =~ 'Gateway'
          | where is_success == false and is_user_error == false
          | summarize DistinctServersWithErrors = dcount(logical_server_name), DistinctSubscriptions = dcount(subscription_id), TotalSystemErrors = count(), DistinctNodes = dcount(NodeName)
