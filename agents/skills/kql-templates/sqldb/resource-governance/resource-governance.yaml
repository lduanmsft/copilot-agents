  Source: TSG-SQL-DB-RG/content/TSGs/Disk/Kusto-Queries.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP between (datetime(''{p_startTime}'')..datetime(''{p_endTime}''))

      | where AppName contains ''{p_appName}'' and NodeName contains ''{p_nodeName}''  and ClusterName == ''{p_clusterName}''

      | where event == ''aggregated_virtual_files_io_history''

      | extend application_name = strcat(''fabric:/'', AppTypeName, ''/'', AppName)

      | extend size_on_disk_gb = size_on_disk_bytes /1024./1024/1024

      | summarize max(size_on_disk_gb) by application_name, LogicalServerName, AppName, NodeName, file_path

      | summarize app_file_size = sum(max_size_on_disk_gb) by application_name, LogicalServerName, AppName, NodeName

      ) on application_name, NodeName

      | extend stale_file_size_percent = (usage_GB - app_file_size) * 100 / cap_GB

      | where stale_file_size_percent > {p_directoryQuotaStaleFileLimitInPercentage}

      | project usage_GB, app_file_size, stale_file_size_percent

      | take 10'
- id: DB-resource-governance-28
  Topic: Kusto-Queries
  Source: TSG-SQL-DB-RG/content/TSGs/Disk/Kusto-Queries.md
  Prompts:
