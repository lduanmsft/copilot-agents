  - TableName: MonRgManager
    ExecutedQuery: 'MonRgManager

      | where originalEventTimestamp between (startTime..endTime)

      | where ClusterName =~clusterFilter and NodeName =~nodeFilter

      | where event == ''dynamic_rg_cap_change'' and resource == "CPU"

      | where instance_name contains appFilter

      | project originalEventTimestamp, slo_cap, new_cap, old_cap'
- id: DB-resource-governance-10
  Topic: CPUTSG005-Gen8SystemCoreReduction
  Source: TSG-SQL-DB-RG/content/TSGs/CPU/CPUTSG005-Gen8SystemCoreReduction.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonCapacityTenantSnapshot TIMESTAMP vm_size
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCapacityTenantSnapshot
    ExecutedQuery: 'MonCapacityTenantSnapshot

      | where TIMESTAMP > ago(75m)

      | where tenant_ring_name  ==  "tr10526.westus2-a.worker.database.windows.net"

      | summarize arg_max(TIMESTAMP,vm_size, placement_affinity_tag, placement_preference_tag, unit_cpu_capacity) by tenant_ring_name

      | where vm_size contains "GPGen8"

      | where unit_cpu_capacity == 11600000 and isempty(placement_affinity_tag)'
- id: DB-resource-governance-11
  Topic: CPUTSG005-Gen8SystemCoreReduction
  Source: TSG-SQL-DB-RG/content/TSGs/CPU/CPUTSG005-Gen8SystemCoreReduction.md
  Prompts:
  - SQL DB RG manager analysis
  - SQL DB MonRgManager event NodeName ClusterName
  - SQL DB investigate RG manager
  CustomizedParameters:
  - ClusterName
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: 'MonRgManager

      | where TIMESTAMP > ago(30m)

      | where ClusterName == \"{ClusterName}\"

      | where event == ''delta_mcu_reporting'' and exception_hash == 932286277 //DeltaAcuExceedsNodeDBCapacityException

      | distinct ClusterName, NodeName, total_app_mcu_usage, node_mcu_capacity, total_isolated_mcu_used

      | project ClusterName, NodeName

      If the above kusto query returns any row, it verifies this scenario. In that case, proceed to create CAS command for mitigation.


      '
- id: DB-resource-governance-12
  Topic: CPUTSG005-Gen8SystemCoreReduction
  Source: TSG-SQL-DB-RG/content/TSGs/CPU/CPUTSG005-Gen8SystemCoreReduction.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonCapacityTenantSnapshot ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCapacityTenantSnapshot
    ExecutedQuery: '| where TIMESTAMP > ago(30m)

      | where EventType in ("UnplacedReplica")

      | extend app_Name = extract(@"/([^/]+)/SQL\.LogicalServer", 1, Text)

      | where app_Name contains <app_name>

      | extend constraint = extract(@"(NodeCapacity)", 1, Text)

      | where isnotempty(constraint)

      | summarize arg_max(TIMESTAMP, *) by app_Name

      | project TIMESTAMP, ClusterName,app_Name,constraint,Text

      | join kind= inner ( cluster(clstr).database("sqlazure1").MonCapacityTenantSnapshot

      | summarize arg_max(TIMESTAMP, *) by tenant_ring_name

      | where unit_cpu_capacity == 11600000 and isempty(placement_affinity_tag)

      | distinct tenant_ring_name,placement_preference_tag,vm_size) on $left.ClusterName == $right.tenant_ring_name'
