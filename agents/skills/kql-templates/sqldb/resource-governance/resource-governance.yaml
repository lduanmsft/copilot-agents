- id: DB-resource-governance-59
  Topic: RGTSG0006-High-Login-Latency-and-CPU-Spike-after-T79
  Source: TSG-SQL-DB-RG/content/TSGs/InterProcessRG-TSGs/RGTSG0006-High-Login-Latency-and-CPU-Spike-after-T79.md
  Prompts:
  - SQL DB login events
  - SQL DB MonCapacityTenantSnapshot event AppName
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCapacityTenantSnapshot
    ExecutedQuery: 'cluster(clstr).database("sqlazure1").MonCapacityTenantSnapshot

      | where TIMESTAMP > ago(1d)

      | summarize by tenant_ring_name, vm_size, placement_affinity_tag

      | where isnotempty(vm_size)

      | where isempty(placement_affinity_tag)

      | join kind = inner(

      cluster(clstr).database("sqlazure1").MonCounterOneMinute

      | where TIMESTAMP between (_startTime .. 1h)

      | where NodeName contains "DB"

      | where CounterName =~ "\\Processor Information(_Total)\\% Processor Time"

      | summarize percentile(MaxVal, 95) by bin(TIMESTAMP, 5m), ClusterName, NodeName

      // Only look at nodes which had atleast one spike above 90% in a 5 minute window

      | summarize NumOfUniqueIntervalsWithCpuSpike= countif(percentile_MaxVal_95 > 90) by ClusterName, NodeName

      // Nodes with Atleast 5 5minute windows spiking in CPU

      | where NumOfUniqueIntervalsWithCpuSpike >= 6

      ) on $left.tenant_ring_name == $right.ClusterName

      | join kind = inner(

      cluster(clstr).database("sqlazure1").MonLogin

      | where TIMESTAMP between (_startTime .. 1h)

      | where event == "process_login_finish"

      | where package == "sqlserver" or package =~ ''XDB host''

      | summarize AvgLoginTimeInSeconds = avg(total_time_ms/1000.0) by bin(originalEventTimestamp,1m), ClusterName, NodeName, instance_name, AppName

      // Count the number of minutes which have had average login time greater than 9 seconds

      | summarize NumOfUniqueFailureMinutes = countif(AvgLoginTimeInSeconds > 9) by ClusterName, NodeName

      | where NumOfUniqueFailureMinutes > 0

      ) on ClusterName, NodeName

      | project ClusterName, NodeName, vm_size, NumOfUniqueFailureMinutes, NumOfUniqueIntervalsWithCpuSpike'
