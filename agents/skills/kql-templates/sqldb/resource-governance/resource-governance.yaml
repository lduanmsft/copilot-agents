    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP between (datetime(''{p_startTime}'')..datetime(''{p_endTime}''))

      | where LogicalServerName == ''{p_logicalServerName}'' and NodeName == ''{p_nodeName}''

      and AppName == ''{p_appName}'' and ClusterName == ''{p_clusterName}''

      | where event == ''aggregated_virtual_files_io_history''

      | extend isTempDb = iff(database_id == 2, 1, 0)

      | extend isTxnLog = iff(database_id > 4 and type_desc == ''LOG'', 1, 0)

      | extend size_on_disk_GB = size_on_disk_bytes / 1024.0 / 1024 / 1024

      | extend max_size_GB = max_size_mb / 1024.0

      | summarize txn_log_usage = sum(isTxnLog * size_on_disk_GB), tempdb_usage = sum(isTempDb * size_on_disk_GB)

      by bin(TIMESTAMP,5m), physical_database_name, LogicalServerName

      | where txn_log_usage > {p_directoryQuotaLogSpaceLimitInGb}

      | where tempdb_usage / txn_log_usage <2.5

      | project txn_log_usage, tempdb_usage, physical_database_name, LogicalServerName'
