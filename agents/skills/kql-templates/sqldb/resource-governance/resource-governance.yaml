SqlSkills:
- id: DB-resource-governance-1
  Topic: CPUTSG001-C2.5-violation
  Source: TSG-SQL-DB-RG/content/TSGs/CPU/CPUTSG001-C2.5-violation.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB AlrRgManager event NodeName ClusterName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrRgManager
    ExecutedQuery: 'AlrRgManager

      | where TIMESTAMP > startTime and TIMESTAMP < endTime

      | where ClusterName =~ clusterFilter and NodeName =~ nodeFilter

      | where event == ''hot_overbooked_core_violation'' and violation_type == ''ResourceCompetition''

      | project TIMESTAMP, cpu_usage_threshold, violation_duration_threshold, cpu_cap_usage_map, app_usage_map

      | take 1

      With the query above, we can check the app usage map to see which DB is assigned to which core to understand which DB are competing for which resources.'
- id: DB-resource-governance-2
  Topic: CPUTSG002-Cpu-metrics
  Source: TSG-SQL-DB-RG/content/TSGs/CPU/CPUTSG002-Cpu-metrics.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where ClusterName == clusterFilter and NodeName contains nodeFilter

      | where code_package_name == "Code"

      | where application_name contains appName

      | where TIMESTAMP > startTime and TIMESTAMP < endTime

      | where event == "instance_load"

      | extend cpusGroup0 = tostring(parsejson(allocated_cpus).Group0)

      | extend cpusGroup1 = tostring(parsejson(allocated_cpus).Group1)

      | extend isSplitPG = cpusGroup0 != "" and cpusGroup1 != ""

      | project TIMESTAMP, application_name, NodeName, isSplitPG, cpusGroup0, cpusGroup1, cpu_load, cpu_load_peak, cpu_load_cap , cpu_current_cap, slo_size

      | order by TIMESTAMP desc

      | limit 10'
- id: DB-resource-governance-3
  Topic: CPUTSG002-Cpu-metrics
  Source: TSG-SQL-DB-RG/content/TSGs/CPU/CPUTSG002-Cpu-metrics.md
  Prompts:
  - SQL DB cluster load
  - SQL DB MonClusterLoad event TIMESTAMP _endTime
  - SQL DB investigate cluster load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonClusterLoad
    ExecutedQuery: 'let NodeStates = cluster(clstr).database(''sqlazure1'').MonClusterLoad

      | where TIMESTAMP between(_startTime.._endTime) and event == ''node_state_report'' and node_type == ''DB''

      | summarize arg_max(TIMESTAMP, node_status, node_type, node_up_time, health_state, upgrade_domain)

      by ClusterName, node_name, SnapshotTime = bin(TIMESTAMP, 1h) ;'
- id: DB-resource-governance-4
  Topic: CPUTSG003-System-Cores-And-OS-Version
  Source: TSG-SQL-DB-RG/content/TSGs/CPU/CPUTSG003-System-Cores-And-OS-Version.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event ClusterName TIMESTAMP allocated_cpus
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(2d)

      | where ClusterName == "{ClusterName}"

      | where application_type == "RgManagerTenant"

      | where event == "instance_load"

      | summarize min(TIMESTAMP), max(TIMESTAMP) by allocated_cpus'
- id: DB-resource-governance-5
  Topic: CPUTSG003-System-Cores-And-OS-Version
