  Topic: NetworkTSG002-TSG-for-WinHttpError-12029-and-8
  Source: TSG-SQL-DB-RG/content/TSGs/Networking/NetworkTSG002-TSG-for-WinHttpError-12029-and-8.md
  Prompts:
  - SQL DB cluster load
  - SQL DB MonClusterLoad event ClusterName TIMESTAMP
  - SQL DB investigate cluster load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonClusterLoad
    ExecutedQuery: 'MonClusterLoad

      | where TIMESTAMP > ago(1h)

      | where ClusterName == clusterName

      | where node_name == currentNode and event == ''node_state_report''

      | summarize arg_max(TIMESTAMP, fault_domain, upgrade_domain) by node_name

      ) on upgrade_domain

      | where load == 0'
- id: DB-resource-governance-94
  Topic: NetworkTSG004-Verifying-working-of-Dynamic-vRSS
  Source: TSG-SQL-DB-RG/content/TSGs/Networking/NetworkTSG004-Verifying-working-of-Dynamic-vRSS.md
  Prompts:
  - SQL DB RG manager latency
  - SQL DB MonRgManager event NodeName ClusterName
  - SQL DB troubleshoot RG manager latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: 'MonRgManager

      | where event == "rg_violation_statistics"

      | where TIMESTAMP between ([''_startTime''] .. [''_endTime''])

      | where isempty([''_region'']) or tolower(KustoCluster=clstr) in (_region)

      | where isempty([''_tenantRing'']) or ClusterName in (_tenantRing)

      | where isempty([''_nodeName'']) or NodeName in (_nodeName)

      | project ClusterName, NodeName, counter_name, violation_duration, TIMESTAMP, violation_duration_threshold, violation_threshold'
