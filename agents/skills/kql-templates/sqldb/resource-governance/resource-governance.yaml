- id: DB-resource-governance-32
  Topic: Kusto-Queries
  Source: TSG-SQL-DB-RG/content/TSGs/Disk/Kusto-Queries.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB cluster load event originalEventTimestamp TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonClusterLoad
    ExecutedQuery: 'let metrics= (MonClusterLoad

      | where TIMESTAMP between (datetime(''{p_startTime}'')..datetime(''{p_endTime}''))

      | where event ==  ''tenant_ring_capacity_report'' and tenant_ring_name == ''{p_clusterName}''

      | where metric_name in (

      ''AppCpuUsage'',

      ''AppMemoryUsageMB'',

      ''StaticMCU'',

      ''InstanceDiskSpaceUsed'',

      ''MaxCpuUsage'',

      ''DiffStaticMCU'')

      | where capacity_report_type in (''Used'', ''WinfabTotal'') and isempty(role_name)

      | summarize arg_max(originalEventTimestamp, aggregated_capacity) by ts = bin(originalEventTimestamp, 5m), tenant_ring_name, capacity_report_type, metric_name

      | project ts, tenant_ring_name, metric_report_type = strcat(metric_name, ''_'', capacity_report_type), aggregated_capacity

      | evaluate pivot(metric_report_type, sum(aggregated_capacity), ts, tenant_ring_name)

      | extend TotalDiffStaticMcu = column_ifexists(''DiffStaticMCU_WinfabTotal'', 0), UsedDiffStaticMcu = column_ifexists(''DiffStaticMCU_Used'', 0),

      TotalIdsu = column_ifexists(''InstanceDiskSpaceUsed_WinfabTotal'', 0), UsedIdsu = column_ifexists(''InstanceDiskSpaceUsed_Used'', 0)

      | project ts, TotalDiffStaticMcu, UsedDiffStaticMcu, TotalIdsu, UsedIdsu

      | extend DiffStaticMcuUtil = round(100.0* UsedDiffStaticMcu / TotalDiffStaticMcu, 2), IdsuUtil = round(100.0* UsedIdsu / TotalIdsu, 2)

      | project ts, DiffStaticMcuUtil, IdsuUtil

      | summarize maxDiffStaticMcuUtil = max(DiffStaticMcuUtil), maxIdsuUtil = max(IdsuUtil)

      | project maxDiffStaticMcuUtil, maxIdsuUtil);

      let maxDiffStaticMcu = toscalar(metrics | project maxDiffStaticMcuUtil);

      let maxIdsu = toscalar(metrics | project maxIdsuUtil);

      print countNumUDDown = countNumUDDown, maxDiffStaticMcu = maxDiffStaticMcu, maxIdsu= maxIdsu;'
