- id: DB-resource-governance-20
  Topic: Kusto-Queries
  Source: TSG-SQL-DB-RG/content/TSGs/Disk/Kusto-Queries.md
  Prompts:
  - SQL DB RG load activity
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP between (datetime(''{p_startTime}'')..datetime(''{p_endTime}''))

      | where NodeName == ''{p_nodeName}'' and ClusterName == ''{p_clusterName}''

      | where event == ''node_info''

      | summarize by ClusterName, NodeName, node_sku ) on ClusterName, NodeName

      | extend isValidHWDrive = iff(node_sku in~ (''Standard_F72s_v2'',''SQLDCGen6_2'', ''Standard_M128m''),

      iff(drive_name contains ''C'', 1, 0), iff(drive_name contains ''S'', 1, 0))

      | where isValidHWDrive == 1

      | extend drive_capacity_in_gb = (drive_capacity_in_bytes /1024 /1024/1024)

      | extend threshold_drive_usage_percentage = (todouble(drive_capacity_in_gb - 200) / drive_capacity_in_gb) * 100

      | project TIMESTAMP, drive_name, drive_usage_percentage, threshold_drive_usage_percentage

      | summarize arg_max(drive_usage_percentage, threshold_drive_usage_percentage) by drive_name

      | where drive_usage_percentage > max_of(int({p_drive_usage_percent_limit}), threshold_drive_usage_percentage)'
