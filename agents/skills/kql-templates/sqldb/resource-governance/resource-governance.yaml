      | where TIMESTAMP between (datetime(''{p_startTime}'')..datetime(''{p_endTime}''))

      | where event == ''aggregated_virtual_files_io_history''

      | where AppName has ''{p_appName}'' and NodeName == ''{p_nodeName}''

      | where type_desc == ''ROWS''

      | extend size_gb = size_on_disk_bytes / 1024.0 / 1024 / 1024, max_size_gb = max_size_mb / 1024.0,

      usage_percent = size_on_disk_bytes * 100 / (max_size_mb * 1024 * 1024)

      | where usage_percent > real({p_DBDataSizeFullPercent})

      | project database_id, file_id, usage_percent

      | take 10'
