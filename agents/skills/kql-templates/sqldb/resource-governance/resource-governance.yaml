- id: DB-resource-governance-7
  Topic: CPUTSG004-DRG-Cpu
  Source: TSG-SQL-DB-RG/content/TSGs/CPU/CPUTSG004-DRG-Cpu.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP between (startTime..endTime) and event == "node_info"

      | where NodeName == nodeFilter

      | where ClusterName == clusterFilter

      | project TIMESTAMP, node_user_cpu_usage, node_avg_user_cpu_usage, node_system_cpu_usage, node_avg_system_cpu_usage, cpu_total_load_cap, node_user_cpu_allocation

      | render timechart'
- id: DB-resource-governance-8
  Topic: CPUTSG004-DRG-Cpu
  Source: TSG-SQL-DB-RG/content/TSGs/CPU/CPUTSG004-DRG-Cpu.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'let appFilter = "{app_name}"

      let clusterFilter = "{cluster_name}";

      let nodeFilter = "{node_name}";

      let startTime = datetime({start_time});

      let endTime = datetime({end_time});

      cluster(_kusto_cluster).database("sqlazure1").MonRgLoad

      | where code_package_name == "Code" and TIMESTAMP between (startTime..endTime) and event == "instance_load"

      | where application_name cotains appFilter

      | where NodeName == nodeFilter

      | where ClusterName == clusterFilter

      | project TIMESTAMP, cpu_load, cpu_load_cap, cpu_current_cap

      | render timechart'
- id: DB-resource-governance-9
  Topic: CPUTSG004-DRG-Cpu
  Source: TSG-SQL-DB-RG/content/TSGs/CPU/CPUTSG004-DRG-Cpu.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgManager event NodeName ClusterName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
