- id: DB-resource-governance-62
  Topic: RGTSG0006-High-Login-Latency-and-CPU-Spike-after-T79
  Source: TSG-SQL-DB-RG/content/TSGs/InterProcessRG-TSGs/RGTSG0006-High-Login-Latency-and-CPU-Spike-after-T79.md
  Prompts:
  - SQL DB cluster load
  - SQL DB MonClusterLoad event TIMESTAMP ts _endTime
  - SQL DB investigate cluster load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonClusterLoad
    ExecutedQuery: 'let _endTime = now();

      let _region = ''sqlazureneu2'';

      let _startTime = now() - 1hr;

      let _tenantRing = ''tr14467.northeurope1-a.worker.database.windows.net'';

      let NodeStates = cluster(_region).database("sqlazure1").MonClusterLoad

      | where TIMESTAMP between (_startTime.._endTime)

      and event == ''node_state_report'' and node_type == ''DB''

      | summarize arg_max(TIMESTAMP, node_status, node_type, node_up_time, health_state, upgrade_domain)

      by tenant_ring_name, node_name, SnapshotTime = bin(TIMESTAMP, 1h)

      | where tenant_ring_name has _tenantRing

      | extend IsUp = iif (node_status == ''Up'', 1, 0)

      | summarize UpNodeCount = sum(IsUp), TotalNodeCount = dcount(node_name), UDCount = dcount(upgrade_domain),

      PctUpNodes = 100.0 * sum(IsUp) / dcount(node_name),

      NodesInOneUD = dcount(node_name) / dcount(upgrade_domain) + 1

      by tenant_ring_name, SnapshotTime

      | extend IsGreaterThanOneUDDown = (TotalNodeCount - NodesInOneUD) > UpNodeCount

      | where IsGreaterThanOneUDDown == true

      | summarize countNumUDDown = count() by tenant_ring_name;

      let maxSellableUsageMetric=

      cluster(_region).database("sqlazure1").MonClusterLoad

      | where TIMESTAMP between (_startTime.._endTime)

      | where event ==  ''tenant_ring_capacity_report'' and tenant_ring_name == _tenantRing

      | where metric_name in (

      ''AppCpuUsage'',

      ''AppMemoryUsageMB'',

      ''StaticMCU'',

      ''InstanceDiskSpaceUsed'',

      ''MaxCpuUsage'')

      | where capacity_report_type in (''Used'', ''WinfabTotal'') and isempty(role_name)

      | summarize arg_max(originalEventTimestamp, aggregated_capacity)

      by ts = bin(originalEventTimestamp, 5m), tenant_ring_name, capacity_report_type, metric_name

      | project ts, tenant_ring_name, metric_report_type = strcat(metric_name, ''_'', capacity_report_type), aggregated_capacity

      | evaluate pivot(metric_report_type, sum(aggregated_capacity), ts, tenant_ring_name)

      | extend TotalStaticMcu = column_ifexists(''StaticMCU_WinfabTotal'',0), UsedStaticMcu = column_ifexists(''StaticMCU_Used'',0),

      TotalIdsu = column_ifexists(''InstanceDiskSpaceUsed_WinfabTotal'',0), UsedIdsu = column_ifexists(''InstanceDiskSpaceUsed_Used'',0)

      | project ts, TotalStaticMcu, UsedStaticMcu, TotalIdsu, UsedIdsu ,tenant_ring_name

      | extend StaticMcuUtil = round(100.0* UsedStaticMcu / TotalStaticMcu, 2),

      IdsuUtil = round(100.0* UsedIdsu / TotalIdsu, 2)

      | project ts, StaticMcuUtil, IdsuUtil ,tenant_ring_name

      | summarize maxStaticMcuUtil = max(StaticMcuUtil), maxIdsu = max(IdsuUtil) by tenant_ring_name

      | extend maxmetric = iff((maxStaticMcuUtil > maxIdsu), maxStaticMcuUtil, maxIdsu) ,maxMetricType=iff((maxStaticMcuUtil > maxIdsu), "SMCU", "IDSU")

      | project maxmetric, maxMetricType,tenant_ring_name;'
