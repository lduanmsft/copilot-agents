- id: DB-resource-governance-44
  Topic: Kusto-Queries
  Source: TSG-SQL-DB-RG/content/TSGs/Disk/Kusto-Queries.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event database_name
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where TIMESTAMP between (datetime(''{p_baseTime}'') .. datetime(''{p_endTime}''))

      | where originalEventTimestamp between (datetime(''{p_baseTime}'') .. datetime(''{p_endTime}''))

      | where operation_parameters contains \"{ServerName}\" and event !in ("management_operation_rads_signal")

      | where (operation_parameters contains \"{ServerName}\")

      or (operation_type == "CreateLogicalElasticPool" and operation_parameters contains \"{ServerName}\")

      | parse operation_parameters with *''<ResourcePoolName>''pool_name1''</ResourcePoolName>''*

      | parse operation_parameters with *''<LogicalResourcePoolName>''pool_name2''</LogicalResourcePoolName>''*

      | parse operation_parameters with *''<Name>''name''</Name>''*

      | parse operation_parameters with *''<LogicalDatabaseName>''database_name1''</LogicalDatabaseName>''*

      | parse operation_parameters with *''<DatabaseName>''database_name2''</DatabaseName>''*

      | parse operation_parameters with *''<LogicalServerName>''server_name''</LogicalServerName>''*

      | parse operation_parameters with *''<RequestedServiceLevelObjective>''slo1''</RequestedServiceLevelObjective>''*

      | parse operation_parameters with *''<ServiceLevelObjective>''slo2''</ServiceLevelObjective>''*

      | parse operation_parameters with *''<RequestedStorageLimitInMB>''disk_limit1''</RequestedStorageLimitInMB>''*

      | parse operation_parameters with *''<StorageLimitInMB>''disk_limit2''</StorageLimitInMB>''*

      | extend

      pool_name = coalesce(pool_name1, pool_name2, iff(operation_type == "CreateLogicalElasticPool", name, "")),

      database_name = coalesce(database_name1, database_name2),

      slo = iff(operation_type contains "pool", coalesce(slo1, slo2), ""),

      disk_limit = coalesce(disk_limit1, disk_limit2)

      | where database_name startswith \"{DatabaseName}\" or database_name startswith \"{DatabaseName}\" or isempty(database_name)

      | where event == "management_operation_success"

      | project

      originalEventTimestamp,

      event,

      request_id,

      server_name,

      pool_name,

      database_name,

      operation_type,

      slo,

      disk_limit'
- id: DB-resource-governance-45
  Topic: Recent-Known-Issues
  Source: TSG-SQL-DB-RG/content/TSGs/Disk/Recent-Known-Issues.md
  Prompts:
  - SQL DB RG load activity
  - SQL DB MonRgLoad NodeName ClusterName TIMESTAMP
  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP between (datetime(''{p_startTime}'')..datetime(''{p_endTime}''))

      and ClusterName == ''{p_clusterName}''

      and isnotempty(application_name)

      and event == ""reporting_win_fab_metric""

      and metric_name == ""InstanceDiskSpaceUsed""

      and metric_value > 1024

      and application_type in (""Worker.ISO.Premium"")

      | where replica_type != 4 or (replica_type == 4 and json_explanation contains_cs ''""isAppOverrideProposed"" : ""true""'' and json_explanation !contains_cs ''""appOverrideB"" : ""0""'')

      | summarize app_disk_usage_on_node = max(metric_value) by NodeName, application_name, slo_size, replica_type, bin(TIMESTAMP, 1h), application_type, ClusterName

      | summarize

      replica_types = make_set(replica_type),

      nodes = make_set(NodeName),

      max_replica_disk_use = max(app_disk_usage_on_node),

      min_replica_disk_use = min(app_disk_usage_on_node),

      total_disk_use = sum(app_disk_usage_on_node)

      by application_name, slo_size, bin(TIMESTAMP, 1h), application_type, ClusterName

      | extend

      delta_replica_usage = min_replica_disk_use * 1.0 / max_replica_disk_use,

      count_replicas = array_length(nodes)

      | extend aux_full_flag = iff(min_replica_disk_use* 1.0 / max_replica_disk_use >= 0.3 and set_has_element(replica_types, {p_premiumAuxReplicaType}), 1,0)

      | project application_name, total_disk_use, max_replica_disk_use, min_replica_disk_use, aux_full_flag, count_replicas

      | where aux_full_flag == 1'
