- id: DB-resource-governance-56
  Topic: RGTSG0003-Incorrect-Replica-Registration
  Source: TSG-SQL-DB-RG/content/TSGs/InterProcessRG-TSGs/RGTSG0003-Incorrect-Replica-Registration.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event AppName NodeName ClusterName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP >ago(1h)

      | where application_type =~ ''Worker.ISO.Premium''

      | extend ShortTRName = split(ClusterName,''.'',0)[0]

      | extend AppName = extract(''fabric:/Worker.ISO.Premium/(.*)'', 1, application_name)

      | where code_package_name =~ ''Code''

      | where event =~ ''instance_load''

      | where slo_size !~ ''PQUARTER''

      | project TIMESTAMP, ClusterName,AppName, NodeName, application_name, cpu_load_cap, memory_load_cap

      | summarize arg_max(TIMESTAMP, cpu_load_cap, memory_load_cap) by ClusterName, AppName, NodeName

      ) on ClusterName, AppName, NodeName

      | where internal_state_desc in (''ACTIVE_AUXILIARY'' , ''ACTIVE_SECONDARY'')

      // find primary caps

      | extend pri_cpu_load_cap = iff(internal_state_desc == ''ACTIVE_SECONDARY'', cpu_load_cap, real(0))

      | extend pri_memory_load_cap = iff(internal_state_desc == ''ACTIVE_SECONDARY'', memory_load_cap, real(0))

      // find auxiliary caps

      | extend aux_cpu_load_cap = iff (internal_state_desc == ''ACTIVE_AUXILIARY'', cpu_load_cap, real(0))

      | extend aux_memory_load_cap = iff (internal_state_desc == ''ACTIVE_AUXILIARY'', memory_load_cap, real(0))

      | summarize PriCpuLoadCap= max(pri_cpu_load_cap), AuxCpuLoadCap = max(aux_cpu_load_cap),

      PriMemLoadCap = max(pri_memory_load_cap), AuxMemLoadCap= max(aux_memory_load_cap) by AppName

      | where PriCpuLoadCap == AuxCpuLoadCap and PriMemLoadCap  == AuxMemLoadCap'
