- id: DB-telemetry-86
  Topic: How-to-verify-a-database-accessible-and-healthy
  Source: TSG-SQL-DB-Telemetry/content/IM-HowTo/Executive-Incident-Management/How-to-verify-a-database-accessible-and-healthy.md
  Prompts:
  - SQL DB login failures error 1
  - SQL DB MonLogin error state is_success event database_name
  - SQL DB troubleshoot login failures error 1
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where TIMESTAMP > ago(30m)

      | where logical_server_name =~ logicalServer and database_name =~ databaseName

      | where event == ''process_login_finish''

      | where package in (''sqlserver'')

      | project TIMESTAMP, package, NodeName, fabric_node_name, AppName, AppTypeName, is_success, is_user_error, error, state, driver_name, driver_version, application_name, peer_address, LogicalServerName, database_name, login_flags

      //| extend readonly = toint(login_flags / 2097152) % 2

      //| where is_success == 1

      | summarize success_logins = countif(is_success==1),

      login_failed_user_error = count(is_success==0 and is_user_error==1),

      login_failed_system_error = count(is_success==0 and is_user_error==0)

      by bin(TIMESTAMP, 1m)

      | render timechart'
