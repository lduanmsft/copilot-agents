  KustoQueries:
  - TableName: AlrWinFabHealthDeployedServiceEvent
    ExecutedQuery: 'AlrWinFabHealthDeployedServiceEvent

      | where TIMESTAMP >= startTime

      | where TIMESTAMP < endTime

      | where ClusterName contains clustername

      | where Property == ''Heartbeat:MDSAgentMonitorReport'' or Property == ''SharedMonitoringAgent:Status'' // need to add other hps.

      | where AppName == ''NodeMdsAgentTenant'' or AppName == ''NodeMdsAgentControl''

      | where ServiceManifestName == ''SharedMonitoringAgent''

      | where HealthState == ''Warning'' or HealthState == ''Error''

      | extend Region = iff(ClusterName contains "onebox", "onebox", extract("([^.]+).([^.]+).+", 2, ClusterName))

      | summarize min(TIMESTAMP), max(TIMESTAMP) by ClusterName, NodeEntityName, Property, Description, HealthState

      | extend FirstSeenWithinTimeRange=min_TIMESTAMP

      | extend LastSeenWithinTimeRange=max_TIMESTAMP

      | extend ProblemDuration = LastSeenWithinTimeRange - FirstSeenWithinTimeRange

      | where ProblemDuration > 15min

      | project-away min_TIMESTAMP, max_TIMESTAMP'
