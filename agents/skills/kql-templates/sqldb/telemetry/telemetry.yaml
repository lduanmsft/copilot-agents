- id: DB-telemetry-137
  Topic: SHMA0002-2-MA-CPU-Throttling-error-count-increased-over-20percent
  Source: TSG-SQL-DB-Telemetry/content/MA/SHMA0002-2-MA-CPU-Throttling-error-count-increased-over-20percent.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB m a event five minutes AppName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrMAEventFiveMinutes
    ExecutedQuery: 'let currentEvaluation = toscalar(AlrMAEventFiveMinutes

      | where TIMESTAMP > ago(2h)

      | where AppName contains "NodeMDSAgent"

      | where ClusterName contains "lkg"

      | where Message contains "Cpu limit"

      | extend clusterNode = strcat(ClusterName, NodeName)

      | summarize current_error_count = dcount(clusterNode));

      let previousEvaluation = toscalar(AlrMAEventFiveMinutes

      | where TIMESTAMP between (ago(30h) .. ago(24h))

      | where AppName contains "NodeMDSAgent"

      | where ClusterName contains "lkg"

      | where Message contains "Cpu limit"

      | extend clusterNode = strcat(ClusterName, NodeName)

      | summarize previous_error_count = dcount(clusterNode));

      let percentChange = iff(previousEvaluation == 0, 1, (currentEvaluation - previousEvaluation) * 100 / previousEvaluation);

      print CurrentEvaluation = currentEvaluation, PreviousEvaluation = previousEvaluation, Diff = percentChange, IncreasedOver20Percent = percentChange > 20'
