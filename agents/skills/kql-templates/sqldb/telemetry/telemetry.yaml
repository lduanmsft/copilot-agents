    ExecutedQuery: 'MonNonPiiAudit

      | summarize count() by username

      | order by count_'
- id: DB-telemetry-3
  Topic: Basic-Kusto-Queries
  Source: TSG-SQL-DB-Telemetry/content/Bots/Basic-Kusto-Queries.md
  Prompts:
  - SQL DB get runner log analysis
  - SQL DB GetSqlRunnerLog PreciseTimeStamp UserField1
  - SQL DB investigate get runner log
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: GetSqlRunnerLog
    ExecutedQuery: '// x-ms-client-request-id is sent to ARM API headers and is logged in MonManagementResourceProvider client_request_id field.

      // This query generates mon_management_api_query which you run against appropriate region to find request

      GetSqlRunnerLog()

      | where PreciseTimeStamp >= ago(1h)

      | where UserField1 startswith "Executing web request. Method: " and UserField1 contains "x-ms-client-request-id"

      | extend uf_parts = split(UserField1, ",")

      | extend web_method = tostring(split(tostring(uf_parts[0]),  "Method: ")[1])

      | extend target_uri = tostring(split(tostring(uf_parts[1]),  "Uri: ")[1])

      | extend client_request_id = tostring(split(tostring(uf_parts[2]),  "x-ms-client-request-id: ")[1])

      | extend client_request_id = tostring(split(client_request_id, " Request Body:")[0])

      | extend mon_management_api_query = strcat(

      "let request_time_param = datetime(", format_datetime(PreciseTimeStamp, "yyyy-MM-dd HH:mm:ss"), ");\r\n",

      "let client_request_id_param = ''", client_request_id, "'';\r\n\r\n",

      "MonManagementResourceProvider\r\n",

      "| where originalEventTimestamp >= request_time_param-5m and originalEventTimestamp <= request_time_param+5m\r\n",

      "| where client_request_id == client_request_id_param\r\n")

      | take 100'
- id: DB-telemetry-4
  Topic: Basic-Kusto-Queries
  Source: TSG-SQL-DB-Telemetry/content/Bots/Basic-Kusto-Queries.md
  Prompts:
  - SQL DB management resource provider analysis
  - SQL DB MonManagementResourceProvider originalEventTimestamp
  - SQL DB investigate management resource provider
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementResourceProvider
    ExecutedQuery: 'MonManagementResourceProvider

      | where originalEventTimestamp >= request_time_param-5m and originalEventTimestamp <= request_time_param+5m

      | where client_request_id == client_request_id_param'
- id: DB-telemetry-5
  Topic: Bot-SQL-Timeout---HPDB-high-CPU
  Source: TSG-SQL-DB-Telemetry/content/Bots/Bot-SQL-Timeout---HPDB-high-CPU.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats AppName cpu_time query_hash
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where  AppName  in ("eea7cef53e47")

      | project  totaltime = cpu_time  ~* execution_count~ , query_hash

      | summarize  sum(totaltime/1000/3600) by  query_hash'
- id: DB-telemetry-6
  Topic: Bot-SQL-Timeout---HPDB-high-CPU
  Source: TSG-SQL-DB-Telemetry/content/Bots/Bot-SQL-Timeout---HPDB-high-CPU.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats AppName NodeName plan_id
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where  AppName  in ("eea7cef53e47")

      | where  query_hash == "0x9979D5B71565026A"

      and  plan_id  in ("19729406", "19730181", "20628549", "21686779")

      | project  originalEventTimestamp, NodeName, exec_type, cpu_time, elapsed_time, rowcount, execution_count, query_id, plan_id, cpu_time_per_run = cpu_time/execution_count, statement_type, rows_per_run = rowcount/execution_count

      , logical_reads, logical_writes, physical_reads

      | summarize  sum(cpu_time/1000/3600), sum(execution_count)

      by bin(originalEventTimestamp, 1h), tostring(plan_id)

      |render  timechart'
- id: DB-telemetry-7
  Topic: Bot-SQL-Timeout---HPDB-high-CPU
  Source: TSG-SQL-DB-Telemetry/content/Bots/Bot-SQL-Timeout---HPDB-high-CPU.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats database_name LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | where originalEventTimestamp > ago(5d)

      | extend cpu_millisec = 1.0 * cpu_time / 1000

      | extend elapsed_time_millisec = 1.0 * elapsed_time / 1000

      | extend plan_id_string = tostring(plan_id)

      | where query_id == QueryId

      | summarize sum(cpu_millisec)  by bin(originalEventTimestamp, 30min), plan_id_string, statement_type

      | render timechart'
- id: DB-telemetry-8
  Topic: Bot-SQL-Timeout---HPDB-high-CPU
  Source: TSG-SQL-DB-Telemetry/content/Bots/Bot-SQL-Timeout---HPDB-high-CPU.md
  Prompts:
  - SQL DB bot sql timeout hpdb high cpu
  - SQL DB MonGovernorWorkloadGroups database_name
  - SQL DB troubleshoot bot sql timeout hpdb high cpu
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonGovernorWorkloadGroups
    ExecutedQuery: 'MonGovernorWorkloadGroups

      | where  TIMESTAMP > ago(5d)

      | where  LogicalServerName =~ "{ServerName}"

      | where  database_name =~ "{DatabaseName}"

      | where  name  contains  "SloPriDGroup"  or  name  contains  "SloPriSGroup"  or  name  contains  "UserPrimaryGroup"

      | project  end_utc_date, delta_total_request_count, delta_total_query_optimization_count

      | render  timechart'
- id: DB-telemetry-9
  Topic: Bot-SQL-Timeout---HPDB-high-CPU
  Source: TSG-SQL-DB-Telemetry/content/Bots/Bot-SQL-Timeout---HPDB-high-CPU.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats NodeName originalEventTimestamp
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
