- id: DB-telemetry-98
  Topic: KUS0020a---Evaluate-Kusto-Queries
  Source: TSG-SQL-DB-Telemetry/content/Kusto/KUS0020---Kusto-Best-Practices/KUS0020a---Evaluate-Kusto-Queries.md
  Prompts:
  - SQL DB TLS encryption checks
  - SQL DB ExecutionCount Cpu For User Status CountOr
  - SQL DB investigate TLS encryption
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: '| where Application =~ "AzureSQLDB.Mon.{RunnerName}" // For Runners

      // | where Application =~ "SqlPerfTsg" and User == "AAD app id=50f63801-2840-4e59-95e5-743e5431e0fd" // For ASC

      // | where User == "AAD app id=92675115-d414-4f1b-b814-39e97e29e64f" // For an AAD app

      // | where User == "{Alias}@microsoft.com" // For your user account

      // | where ClientActivityId in (''{ID1}'', ''{ID2}'') // If you have specific  ClientActivityIds

      | extend Template = GetQueryTemplate(Text)

      | extend TimeFilterhours = round((todatetime(ScannedExtentsStatistics.MaxDataScannedTime) - todatetime(ScannedExtentsStatistics.MinDataScannedTime)) / 60m)

      | extend QueryLength = strlen(Text)

      | extend CountBrackets = countof(Text, "[")

      | extend IsCrossCluster = Text matches regex "cluster\\(.*\\).database\\(.*\\)"

      | extend HasDifferentLocalAndOrigin = tostring(ClientRequestProperties.OriginClusterName) != tostring(ClientRequestProperties.LocalClusterName)

      | extend CountRegex = countof(Text, @"extract\(|extract_all\(|extract_json\(|indexof_regex\(|matches regex", "regex")

      | extend CountContains = countof(Text, " contains | !contains ", "regex")

      | extend CountOr = countof(Text, @"\sor\s", "regex")

      | extend CountJoin = countof(Text, " join ")

      | extend HasWideTable = Text has_any(''MonManagement'', ''MonSocrates'', ''MonRgManager'', ''MonXlogSrv'', ''MonSqlRgHistory'', ''MonRolloutProgress'')

      | extend HasLargeTable = Text has_any(''MonLogin'', ''AlrMAEventFiveMinutes'', ''MonSqlRgHistory'', ''MonBackup'', ''MonWiQdsExecStats'', ''WinFabLogs'', ''AlrMaQosEventFiveMinutes'', ''MonRgLoad'', ''MonTLSEventLog'', ''MonFabricThrottle'', ''MonCounterOneMinute'', ''MonWiQueryParamData'', ''MonRgManager'', ''MonRecoveryTrace'', ''MonXdbhost'', ''MonDmDbHadrReplicaStates'', ''MonManagement'', ''MonSqlCaches'', ''MonSQLXStore'', ''MonDmRealTimeResourceStats'', ''MonDatabaseMetadata'', ''MonSQLSystemHealth'', ''MonSQLXStoreIOStats'')

      | extend HasProject = Text has_any(''project'', ''summarize'', ''distinct'')

      | extend HasQueryLimitIncrease = Text has_any(''set notruncation'', ''set truncationmaxsize'', ''set truncationmaxrecords'')

      | extend ResultSizeInMb = round(todouble(ResultSetStatistics.TablesStatistics[0].TableSize) / 1024 / 1024, 1)

      | extend ResultRowCount = toint(ResultSetStatistics.TablesStatistics[0].RowCount)

      | summarize

      ExecutionCount = count(),

      MinTime = min(StartedOn),

      MaxTime = max(StartedOn),

      ExampleQuery = any(Text),

      ExampleClientActivityId = any(ClientActivityId),

      Duration = percentile(Duration, 50),

      Cpu = percentile(TotalCpu, 50),

      MemoryInGb = percentile(round(todouble(MemoryPeak) / 1024 / 1024 / 1024, 1), 50),

      TimeFilterhours=percentile(TimeFilterhours, 50),

      QueryLength=percentile(QueryLength, 50),

      CountContains=percentile(CountContains, 50),

      CountOr=percentile(CountOr, 50),

      CountJoin=percentile(CountJoin, 50),

      CountRegex=percentile(CountRegex, 50),

      CountBrackets=percentile(CountBrackets, 50),

      ResultSizeInMb=percentile(ResultSizeInMb, 50),

      ResultRowCount=percentile(ResultRowCount, 50)

      by User, Application, Template, HasLargeTable, HasWideTable, HasProject, IsCrossCluster, HasDifferentLocalAndOrigin, HasQueryLimitIncrease

      | extend DemeritCount = 0

      | extend DemeritCount = iff(QueryLength > 10000, DemeritCount + 1, DemeritCount)

      | extend DemeritCount = iff(CountBrackets > 50 or IsCrossCluster or HasDifferentLocalAndOrigin, DemeritCount + 3, DemeritCount)

      | extend DemeritCount = iff(CountContains > 0, DemeritCount + 1, DemeritCount)

      | extend DemeritCount = iff(CountRegex > 0, DemeritCount + 1, DemeritCount)

      | extend DemeritCount = iff(CountJoin > 3, DemeritCount + 1, DemeritCount)

      | extend DemeritCount = iff(CountOr > 50, DemeritCount + 5, DemeritCount)

      | extend DemeritCount = iff(HasQueryLimitIncrease, DemeritCount + 1, DemeritCount)

      | extend DemeritCount = iff(TimeFilterhours > 1.5 * 24, DemeritCount + 1, DemeritCount)

      | extend DemeritCount = iff(TimeFilterhours > 3 * 24, DemeritCount + 2, DemeritCount)

      | extend DemeritCount = iff(TimeFilterhours > 7 * 24, DemeritCount + 3, DemeritCount)

      | extend DemeritCount = case(HasWideTable and not(HasProject), DemeritCount + 7, not(HasProject), DemeritCount + 6, DemeritCount)

      | extend DemeritCount = iff(HasLargeTable, toint(round(todouble(DemeritCount) * 1.5)), DemeritCount)

      | extend DemeritCount = iff(Cpu > time(00:02:00), DemeritCount + 2, DemeritCount)

      | extend DemeritCount = iff(MemoryInGb > 1, DemeritCount + 1, DemeritCount)

      | extend DemeritCount = iff(Duration > time(00:20:00), DemeritCount + 1, DemeritCount)

      | extend DemeritCount = iff(ResultSizeInMb > 1, DemeritCount + 1, DemeritCount)

      | extend DemeritCount = iff(ResultRowCount > 5000, DemeritCount + 1, DemeritCount)

      | extend DemeritReason = ""

      | extend DemeritReason = iff(QueryLength > 10000, strcat("Query text too long\n", DemeritReason), DemeritReason)

      | extend DemeritReason = iff(CountBrackets > 50 or IsCrossCluster or HasDifferentLocalAndOrigin, strcat("Cross-cluster query\n", DemeritReason), DemeritReason)

      | extend DemeritReason = iff(CountContains > 0, strcat("Uses ''contains''\n", DemeritReason), DemeritReason)

      | extend DemeritReason = iff(CountRegex > 0, strcat("Uses regex\n", DemeritReason), DemeritReason)

      | extend DemeritReason = iff(CountJoin > 3, strcat("Many joins\n", DemeritReason), DemeritReason)

      | extend DemeritReason = iff(CountOr > 50, strcat("Many ''or''\n", DemeritReason), DemeritReason)

      | extend DemeritReason = iff(HasQueryLimitIncrease, strcat("Uses set notruncation or similar\n", DemeritReason), DemeritReason)

      | extend DemeritReason = case(HasWideTable and not(HasProject), strcat("Wide table missing ''project''\n", DemeritReason), not(HasProject), strcat("Missing ''project''\n", DemeritReason), DemeritReason)

      | extend DemeritReason = case(TimeFilterhours > 7 * 24, strcat("Time filter > 7 days\n", DemeritReason), TimeFilterhours > 3 * 24, strcat("Time filter > 3 days\n", DemeritReason), TimeFilterhours > 36, strcat("Time filter > 36 hours\n", DemeritReason), DemeritReason)

      | extend DemeritReason = iff(HasLargeTable and DemeritCount > 0, strcat("Large table with semantic demerits\n", DemeritReason), DemeritReason)

      | extend DemeritReason = iff(Cpu > time(00:02:00), strcat("High CPU usage\n", DemeritReason), DemeritReason)

      | extend DemeritReason = iff(MemoryInGb > 1, strcat("High memory usage\n", DemeritReason), DemeritReason)

      | extend DemeritReason = iff(Duration > time(00:20:00), strcat("Long query duration\n", DemeritReason), DemeritReason)

      | extend DemeritReason = iff(ResultSizeInMb > 1, strcat("Large data response size\n", DemeritReason), DemeritReason)

      | extend DemeritReason = iff(ResultRowCount > 5000, strcat("Large data result size\n", DemeritReason), DemeritReason)

      | extend DemeritReason = trim_end("\n", DemeritReason)

      | extend StatusForColor = case(DemeritCount >= 6, "Error", DemeritCount > 0, "Warning", "Info")

      | extend Status = case(DemeritCount >= 6, "Fail", DemeritCount > 0, "Warning", "Pass")

      | project Status, DemeritCount, DemeritReason, ExampleClientActivityId, ExecutionCount, MinTime, MaxTime, User, Application, ExampleQuery, Cpu, MemoryInGb, TimeFilterhours, QueryLength, CountBrackets, CountRegex, CountContains, CountJoin, CountOr, ResultSizeInMb, ResultRowCount, IsCrossCluster, HasDifferentLocalAndOrigin, HasLargeTable, HasWideTable, HasProject, HasQueryLimitIncrease, StatusForColor

      | order by DemeritCount desc'
