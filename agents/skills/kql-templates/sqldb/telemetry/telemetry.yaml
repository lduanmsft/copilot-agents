- id: DB-telemetry-310
  Topic: RUNNER0038_2-Kusto-queries-fail-with-bad-semantic_
  Source: TSG-SQL-DB-Telemetry/content/Runners/RUNNER0038_2-Kusto-queries-fail-with-bad-semantic_.md
  Prompts:
  - SQL DB get sql runner log analysis
  - SQL DB get sql runner log TIMESTAMP exc start Category UserField2
  - SQL DB investigate ago
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: GetSqlRunnerLog
    ExecutedQuery: 'let start = ago(8h);

      let end = now();

      GetSqlRunnerLog()

      | where TIMESTAMP > start

      | where UserField2 contains ''ExceptionType''

      | extend exc = parse_json(UserField2)

      | where exc.Category==''Kusto''

      | where exc.ExceptionType == ''Kusto.Data.Exceptions.KustoBadRequestException''

      | extend Message = extract(".+?:(.+).+", 1, UserField3)'
