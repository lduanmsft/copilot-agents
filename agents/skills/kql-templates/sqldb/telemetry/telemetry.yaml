- id: DB-telemetry-101
  Topic: Dead-MA
  Source: TSG-SQL-DB-Telemetry/content/MA/Dead-MA.md
  Prompts:
  - SQL DB win fab health deployed service event issues
  - SQL DB AlrWinFabHealthDeployedServiceEvent AppName
  - SQL DB troubleshoot win fab health deployed service event i
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrWinFabHealthDeployedServiceEvent
    ExecutedQuery: 'let ErrorThreshold = 5;

      cluster(clstr).database("sqlazure1").AlrWinFabHealthDeployedServiceEvent

      | where TIMESTAMP > ago(12h)

      | where Property == "Heartbeat:MDSAgentMonitorReport"

      | where ApplicationName !in ("OSAuditPolicyManager", "NodeMdsAgentTenant", "NodeMdsAgentControl")

      | where SourceNamespace !in ("AzDbProdNdMa")

      | summarize TempWarningCount=count() by SourceNamespace, ClusterName, NodeEntityName, ApplicationName, bin(TIMESTAMP, 1h)

      | extend ErrorInstanceCount = iff(TempWarningCount > ErrorThreshold, 1 , 0)

      | extend Region = iff(ClusterName contains "onebox", "onebox", extract("([^.]+).([^.]+).+", 2, ClusterName))

      | parse ClusterName with ring "." *

      | join kind=leftouter (

      cluster(clstr).database("sqlazure1").MonRegionalDeployMgr

      | where TIMESTAMP > ago(12h)

      | where [''type''] == "ApplicationType"

      | summarize by ClusterName, AppName, parent_id, entity_id, product_family

      | parse ClusterName with * "." Region "." *

      | where isnotempty(parent_id)

      | summarize by ring=parent_id, Region, product_family

      ) on ring, Region

      | summarize TempWarningCount=sum(TempWarningCount), TempWarningInstanceCount=count(), TempErrorInstanceCount=sum(ErrorInstanceCount) by SourceNamespace, ring, Region, product_family, ApplicationName, bin(TIMESTAMP,1h)

      | extend WarningCount = iff(isnull(TempWarningCount) ,0 ,TempWarningCount), WarningInstanceCount=iff(isnull(TempWarningInstanceCount), 0, TempWarningInstanceCount) ,

      ErrorInstanceCount = iff(isnull(TempErrorInstanceCount), 0, TempErrorInstanceCount)

      | project SourceNamespace, ring, Region, product_family, TIMESTAMP , WarningCount , WarningInstanceCount , ErrorInstanceCount , BadMA = WarningInstanceCount + ErrorInstanceCount, ApplicationName

      | parse ApplicationName with * "/" apptype1 "/" *

      | parse ApplicationName with * "/" apptype2

      | extend apptype = iff(isempty(apptype1), apptype2, apptype1)

      | summarize BadMA=sum(BadMA), LastSeen=max(TIMESTAMP) by Region, apptype, ApplicationName, product_family'
