- id: DB-telemetry-290
  Topic: R2D2AR0010-Stage-Active-Runner-Migration-Companion
  Source: TSG-SQL-DB-Telemetry/content/R2D2/ActiveRunners/R2D2AR0010-Stage-Active-Runner-Migration-Companion.md
  Prompts:
  - SQL DB get runner log activity
  - SQL DB GetSqlRunnerLog TIMESTAMP Build Region RunnerName
  - SQL DB investigate get runner log
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: GetSqlRunnerLog
    ExecutedQuery: 'let targetEnvironment = "Stage"; // Environment Name ["Stage", "Production", "Fairfax", "Mooncake", "USsec", "USNat"]

      let targetPackage = "AzureSQLDB.Csm.FlexserverBurstableRunner"; // Replace with target package name

      GetSqlRunnerLog()

      | where TIMESTAMP > ago(1d)

      | where UserField2 contains "\"Build\":"

      | extend BuildString = replace_string( tostring(split(UserField2, '','')[3]), "\"Build\":", "")

      | extend CleanedString = split(trim(''"'', BuildString), ''\\'')

      | extend PackageName = tostring(CleanedString[2])

      | where PackageName == targetPackage

      | extend Region = tostring(strcat(split(InstanceName, ''.'')[6]))

      | extend RunnerName = tostring(Name)

      | where InstanceName startswith strcat(targetEnvironment, "v2")

      | extend BuildPrefix = case(

      Environment == "Production", "Official-Prod-",

      Environment == "Fairfax", "Official-Fairfax-",

      Environment == "Mooncake", "Official-Mooncake-",

      Environment == "USSec", "Official-USSec-",

      Environment == "USNat", "Official-USNat-",

      "Official-Stage")

      | extend BuildNumber = strcat_array( array_slice(split(tostring(CleanedString[0]), "-"), 4, 5), "-")

      | extend Build = strcat(BuildPrefix, BuildNumber)

      | project Build, PackageName, RunnerName, Region, InstanceName

      | order by PackageName, RunnerName, Region asc

      | summarize RunnerNames = strcat_array(make_set(RunnerName), ","),

      RegionNames = strcat_array(make_set(Region), ",") by PackageName, Build'
