    ExecutedQuery: 'MonWiQdsExecStats | where  AppName  in ("c1361cb3ffb5", "ef1ff7eb9aa9", "eea7cef53e47")

      | where  originalEventTimestamp > ago(3d)

      and  query_hash == "0x9979D5B71565026A"

      and  plan_id == "19729406"  or  plan_id == "19730181"

