      let KustoStorageCostInUsd = 400000;  // Value as of November 2020. Check with Telemetry team for updated value

      let KustoSizeInTb = toscalar( DD_TableDetails

      | where ProcessedTime > ago(2d)

      | where ClusterName startswith "{ClusterName}" or ClusterName in ("sqladhoc", "sqlstage")

      | summarize max(TotalExtentSize) by ClusterName, TableName

      | summarize sum(max_TotalExtentSize)

