- id: DB-telemetry-270
  Topic: Dump00023-How-to-check-whether-dump-is-throttled-by-Azure-Watson
  Source: TSG-SQL-DB-Telemetry/content/Monitoring/Dump00023-How-to-check-whether-dump-is-throttled-by-Azure-Watson.md
  Prompts:
  - SQL DB ma event five minutes activity
  - SQL DB AlrMAEventFiveMinutes NodeName ClusterName
  - SQL DB investigate ma event five minutes
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrMAEventFiveMinutes
    ExecutedQuery: 'AlrMAEventFiveMinutes

      | where  TIMESTAMP >ago(2d)

      | where  ClusterName  has  "tr7377.eastus2-a.worker.database.windows.net"  and NodeName =~ "{NodeName}"

      | where Stream =~ "CrashDumpMonitor"

      | where Message has "Server replied"

      | extend DumpTypeRequested = extract("iData=([0-9]+),", 1, Message)

      | extend CrashId = extract("CrashId=(.*?),", 1, Message)

      | extend Throttled = (DumpTypeRequested == "0" and CrashId == "-1")

      | project PreciseTimeStamp, Throttled, DumpTypeRequested, CrashId, Message,ClusterName,NodeName

      | extend DumpUID = extract("Server replied for (.*?) \\(", 1, Message)

      | summarize arg_min(PreciseTimeStamp, *) by DumpUID

      | extend DumpOutcome = iff(Throttled, "Throttled", "Requested")

      | where DumpUID==''56c6f634-75ff-44ab-ad63-6bb7ee04d1ad'''
