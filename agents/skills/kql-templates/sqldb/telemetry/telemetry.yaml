- id: DB-telemetry-257
  Topic: Dump00007-Dump-upload-pipeline-monitors
  Source: TSG-SQL-DB-Telemetry/content/Monitoring/Dump00007-Dump-upload-pipeline-monitors.md
  Prompts:
  - SQL DB watson analysis latency
  - SQL DB MonWatsonAnalysis ClusterName TIMESTAMP
  - SQL DB troubleshoot watson analysis latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWatsonAnalysis
    ExecutedQuery: 'let  duration=12h;

      let  stopTime=4h;

      GetCrossClusterData(''MonSqlDumperActivity'')

      |where  TIMESTAMP >ago(stopTime+duration) and  TIMESTAMP<ago(stopTime)

      |where  ClusterName  endswith  ''.database.windows.net''  or  ClusterName  endswith  ''.sqltest-eg1.mscds.com''

      |where  IsDumpAvoided==0

      |join  kind=leftouter (

      cluster(''sqladhoc.kustomfa.windows.net'').database(''sqlazure1'').MonWatsonAnalysis

      | where  TIMESTAMP >ago(stopTime+duration)

      | project  AWTIME=TIMESTAMP,DumpUID

      ) on  DumpUID

      |parse  ClusterName  with  Ring  ''.''  d_Region

      |project  AWTIME, IsFailed,IsWatsonInvoke,IsSubmitFailed,SubmitResult,d_Region,

      d_Environment=case( ClusterName  endswith  ''.sqltest-eg1.mscds.com'', ''Stage'',''Prod'')

      |summarize  m_DumpTotal=count(),

      m_CreateSuccess= countif(IsFailed==0),

      m_ShouldUpload= countif(IsFailed==0 and  IsWatsonInvoke==1),

      m_InWERReportQueue=countif(IsFailed==0 and  IsWatsonInvoke==1 and  IsSubmitFailed==0 and

      // 1:WerReportQueued, 2:WerReportUploaded, 1001:AWDumpLink, 1002:AWDumpMove, 1003:AWDumpCopy

      (SubmitResult ==1 or  SubmitResult ==2 or  SubmitResult ==1001 or  SubmitResult ==1002 or  SubmitResult ==1003)),

      m_InAzureWatson=countif(IsFailed==0 and  IsWatsonInvoke==1 and  IsSubmitFailed==0 and

      (SubmitResult ==1 or  SubmitResult ==2 or  SubmitResult ==1001 or  SubmitResult ==1002 or  SubmitResult ==1003) and  isempty(AWTIME)==false)

      by  d_Environment, d_Region

      |where  m_DumpTotal >0

      |extend  TIMESTAMP=now()

      |extend  m_DumpCreateSuccessPercentage= case(m_DumpTotal>0, m_CreateSuccess*100/(m_DumpTotal),100)

      |extend  m_InWERReportQueuePercentage= case(m_ShouldUpload >0, m_InWERReportQueue*100/m_ShouldUpload,100)

      |extend  m_InAzureWatsonPercentage=case(m_ShouldUpload >0, m_InAzureWatson*100/m_ShouldUpload,100)'
- id: DB-telemetry-258
  Topic: Dump00008-1-Case-Study-Dump-upload-to-Azure-Watson-rate-low
  Source: TSG-SQL-DB-Telemetry/content/Monitoring/Dump00008-1-Case-Study-Dump-upload-to-Azure-Watson-rate-low.md
  Prompts:
  - SQL DB watson analysis latency
  - SQL DB MonWatsonAnalysis ClusterName TIMESTAMP
  - SQL DB troubleshoot watson analysis latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWatsonAnalysis
    ExecutedQuery: 'let duration=24h;

      let stopTime=4h;

      GetCrossClusterData(''MonSqlDumperActivity'')

      |where  TIMESTAMP >ago(stopTime+duration)  and  TIMESTAMP<ago(stopTime)

      |where  ClusterName endswith  ''.database.windows.net'' or  ClusterName endswith  ''.sqltest-eg1.mscds.com''

      |where  IsDumpAvoided==0 |join  kind=leftouter

      ( cluster(''sqladhoc.kustomfa.windows.net'').database(''sqlazure1'').MonWatsonAnalysis

      |  where  TIMESTAMP >ago(stopTime+duration)

      |  project  AWTIME=TIMESTAMP,DumpUID )  on  DumpUID

      |parse  ClusterName with Ring  ''.''  d_Region

      |project  AWTIME, IsFailed,IsWatsonInvoke,IsSubmitFailed,SubmitResult,d_Region,

      d_Environment=case( ClusterName endswith  ''.sqltest-eg1.mscds.com'',  ''Stage'',''Prod''),

      ProcessName=substring(TargetFullName,1+strlen(TargetFullName) - indexof(reverse(TargetFullName), reverse("\\")) - strlen("\\"))

      |summarize  m_DumpTotal=count(),  m_ShouldUpload= countif(IsFailed==0 and  IsWatsonInvoke==1),

      // 1:WerReportQueued, 2:WerReportUploaded, 1001:AWDumpLink, 1002:AWDumpMove, 1003:AWDumpCopy //

      m_InAzureWatson=countif(IsFailed==0 and  IsWatsonInvoke==1 and  IsSubmitFailed==0 and  (SubmitResult ==1 or  SubmitResult ==2 or  SubmitResult ==1001 or  SubmitResult ==1002 or  SubmitResult ==1003)

      and   isempty(AWTIME)==false)

      by  d_Environment, d_Region,ProcessName

      |where  m_DumpTotal >0 |extend  TIMESTAMP=now()

      |extend  m_InAzureWatsonPercentage=case(m_ShouldUpload >0, m_InAzureWatson*100/m_ShouldUpload,100)

      |project  TIMESTAMP, Environment=d_Environment,Region=d_Region,ProcessName, DumpsShouldUpload=m_ShouldUpload,

      DumpsInAzureWatson=m_InAzureWatson, DumpsMissing=m_ShouldUpload-m_InAzureWatson, UploadSucessPercentage=m_InAzureWatsonPercentage

      |order by  DumpsShouldUpload desc'
