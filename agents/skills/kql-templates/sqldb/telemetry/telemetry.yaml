SqlSkills:
- id: DB-telemetry-2
  Topic: Accessing-CAS-Audit-Logs
  Source: TSG-SQL-DB-Telemetry/content/Bots/Accessing-CAS-Audit-Logs.md
  Prompts:
  - SQL DB audit analysis
  - SQL DB MonNonPiiAudit username
  - SQL DB investigate audit
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
