- id: DB-telemetry-185
  Topic: CRI020-No-metrics-in-portal-for-DB-or-elastic-pool
  Source: TSG-SQL-DB-Telemetry/content/Metrics-and-CRI/CRI020-No-metrics-in-portal-for-DB-or-elastic-pool.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName avgCpuUsage
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where event == "node_info" and NodeName =~ "{NodeName}" and ClusterName =~ "{ClusterName}"

      | project TIMESTAMP, cpu_total_load_cap

      | extend cpuLoadPerCore = parsejson(cpu_total_load_cap).CPULoadPerCore

      | mvexpand cpuLoadPerCore

      | extend rg_core_index = toint(cpuLoadPerCore[0])

      //| extend pg_index = rg_core_index / CoresInPG, core_index = rg_core_index % CoresInPG

      | extend allocatedCore = todouble(cpuLoadPerCore[1])

      | extend avgCpuUsage = todouble(cpuLoadPerCore[3])

      | extend currentCpuUsage = todouble(cpuLoadPerCore[4])

      | extend kernelUsage = todouble(cpuLoadPerCore[5])

      | where rg_core_index == 6

      | project TIMESTAMP, avgCpuUsage, currentCpuUsage'
