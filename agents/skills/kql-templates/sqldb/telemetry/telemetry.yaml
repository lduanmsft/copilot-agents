- id: DB-telemetry-118
  Topic: MDS9999-Geneva-End-point-outage
  Source: TSG-SQL-DB-Telemetry/content/MA/MDS9999-Geneva-End-point-outage.md
  Prompts:
  - SQL DB get cross cluster data activity
  - SQL DB GetCrossClusterData ClusterName left right
  - SQL DB investigate get cross cluster data
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: GetCrossClusterData
    ExecutedQuery: 'GetCrossClusterData(''AlrMaQosEventFiveMinutes'')

      | where SourceNamespace == "WASD2Prod"

      | extend ingesetionTime = ingestion_time()

      | where ingesetionTime  > todatetime(''2019-10-31 00:00:00'') and ingesetionTime  < todatetime(''2019-10-31 03:00:00'')

      | summarize  ["Before"] =  count()  by ClusterName

      |join (GetCrossClusterData(''AlrMaQosEventFiveMinutes'')

      | where SourceNamespace == "WASD2Prod"

      | extend ingesetionTime = ingestion_time()

      | where ingesetionTime  > todatetime(''2019-10-31 00:00:00'') and ingesetionTime  < todatetime(''2019-10-31 03:00:00'')

      //| where ingesetionTime  > todatetime(''2019-10-17 12:00:00'') and ingesetionTime < todatetime(''2019-10-17 15:00:00'')

      | summarize ["Now"] = count()  by ClusterName ) on $left.ClusterName  == $right.ClusterName

      | extend  ["Percent"] =  ( ["Now"] * 1.0 / ["Before"] * 1.0)

      | where Percent < 0.8'
