      , logical_reads, logical_writes, physical_reads

      | summarize  max(cpu_time), sum(execution_count)

      by bin(originalEventTimestamp, 1h), tostring(plan_id)'
- id: DB-telemetry-10
  Topic: Bot-SQL-Timeout---HPDB-high-CPU
  Source: TSG-SQL-DB-Telemetry/content/Bots/Bot-SQL-Timeout---HPDB-high-CPU.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats AppName NodeName plan_id
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where  AppName  in ("eea7cef53e47")

      | where  query_hash == "0x9979D5B71565026A"

      | project  originalEventTimestamp, NodeName, exec_type, cpu_time, elapsed_time, rowcount, execution_count, query_id, plan_id, cpu_time_per_run = cpu_time/execution_count, statement_type, rows_per_run = rowcount/execution_count

