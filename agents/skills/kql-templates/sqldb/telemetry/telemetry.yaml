  - ServerName
  KustoQueries:
  - TableName: GetSqlRunnerLog
    ExecutedQuery: 'let runners= GetSqlRunnerLog()

      | where TIMESTAMP >ago(1d)

      | where UserField1 == "RunnerHeartbeat"

      | extend build=parsejson(UserField2).Build

      | where build contains "[Bld-fs-ds-29-01tfsSQLAzureProactiveAnalyticsDev-OnPrem-A3Proactive Analytics - A320190812.6](file://Bld-fs-ds-29-01/tfs/SQLAzure/ProactiveAnalytics/Dev-OnPrem-A3/Proactive%20Analytics%20-%20A3/20190812.6)"

      | summarize min(TIMESTAMP) by Name;runners

      | join kind=inner (GetSqlRunnerLog()

      |where TIMESTAMP > ago(6h)) on Name

      |where InstanceName contains "InstanceProd" or InstanceName contains "Global"

      |where TIMESTAMP > min_TIMESTAMP

      | where Status !="Information"

      | distinct Name,InstanceName, Status,UserField1, UserField2, UserField3'
