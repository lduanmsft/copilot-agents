  - id: LS-STATE127-100
    name: "State 127 — Error Volume and Duration"
    source: "SQLLivesiteAgents/Availability/error-40613-state-127/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, LogicalServerName, LogicalDatabaseName]
    IssueDetection:
      transient: "OverallDurationSeconds < 60 → expected transient warmup"
      stuck: "OverallDurationSeconds > 300 → stuck warmup"
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          MonLogin
          | where originalEventTimestamp between (StartTime .. EndTime)
          | where logical_server_name =~ "{LogicalServerName}"
          | where database_name =~ "{LogicalDatabaseName}"
          | where error == 40613 and state == 127
          | where package =~ "sqlserver" or package =~ "xdbhost"
          | where event == 'process_login_finish'
          | summarize ErrorCount = count(), FirstError = min(originalEventTimestamp), LastError = max(originalEventTimestamp) by bin(originalEventTimestamp, 1m), NodeName, logical_server_name, database_name, package, instance_name, error, state, AppName, ClusterName
          | summarize TotalErrorCount = sum(ErrorCount), OverallFirstError = min(FirstError), OverallLastError = max(LastError), AppName = any(AppName), ClusterName = any(ClusterName) by logical_server_name, database_name, NodeName, error, state
          | extend OverallDurationSeconds = datetime_diff('second', OverallLastError, OverallFirstError)
          | order by OverallFirstError asc

  - id: LS-STATE127-200
