# ============================================================================
# kql-livesite.yaml — Error 40613 KQL Templates from SQLLivesiteAgents
# ============================================================================
# Priority: P1 (highest)
# Source: SQLLivesiteAgents / Availability / error-40613-state-{126,127,129}
# Distilled: 2026-05-01
# ============================================================================
# State 126: Stuck role transition (database being transitioned)
# State 127: Stuck warmup/recovery (database warming up after failover)
# State 129: HADR subsystem unavailable
# ============================================================================

SqlSkills:

  # ════════════════════════════════════════════════════
  # STATE 126 — Stuck Role Transition
  # ════════════════════════════════════════════════════

  - id: LS-STATE126-100
    name: "State 126 — Error Volume and Duration"
    source: "SQLLivesiteAgents/Availability/error-40613-state-126/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, LogicalServerName, LogicalDatabaseName]
    IssueDetection:
      transient: "OverallDurationSeconds < 30 → expected transient"
      stuck: "OverallDurationSeconds > 120 → stuck transition"
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          MonLogin
          | where originalEventTimestamp between (StartTime .. EndTime)
          | where logical_server_name =~ "{LogicalServerName}"
          | where database_name =~ "{LogicalDatabaseName}"
          | where error == 40613 and state == 126
          | where package =~ "sqlserver" or package =~ "xdbhost"
          | summarize ErrorCount = count(), FirstError = min(originalEventTimestamp), LastError = max(originalEventTimestamp) by bin(originalEventTimestamp, 1m), NodeName, logical_server_name, database_name, package, instance_name, error, state, AppName, ClusterName
          | summarize TotalErrorCount = sum(ErrorCount), OverallFirstError = min(FirstError), OverallLastError = max(LastError), AppName = any(AppName), ClusterName = any(ClusterName) by logical_server_name, database_name, NodeName, error, state
          | extend OverallDurationSeconds = datetime_diff('second', OverallLastError, OverallFirstError)
          | order by OverallFirstError asc

  - id: LS-STATE126-110
    name: "State 126 — Error Summary by Time Window"
    source: "SQLLivesiteAgents/Availability/error-40613-state-126/references/queries.md"
    table: MonLogin
    RequiredParameters: [StartTime, EndTime, LogicalServerName, LogicalDatabaseName]
    KustoQueries:
      - TableName: MonLogin
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          MonLogin
          | where originalEventTimestamp between (StartTime .. EndTime)
          | where logical_server_name =~ "{LogicalServerName}"
          | where database_name =~ "{LogicalDatabaseName}"
          | where error == 40613 and state == 126
          | where package =~ "sqlserver" or package =~ "xdbhost"
          | summarize ErrorCount = count(), MinTime = min(originalEventTimestamp), MaxTime = max(originalEventTimestamp) by bin(originalEventTimestamp, 1m)
          | order by MinTime asc
          | serialize
          | extend GapToPrevious = MinTime - prev(MaxTime)
          | project originalEventTimestamp, ErrorCount, MinTime, MaxTime, GapToPrevious

  - id: LS-STATE126-200
    name: "State 126 — Correlate with SqlFailovers"
    source: "SQLLivesiteAgents/Availability/error-40613-state-126/references/queries.md"
    table: SqlFailovers
    RequiredParameters: [StartTime, EndTime, LogicalServerName, LogicalDatabaseName]
    KustoQueries:
      - TableName: SqlFailovers
        ExecutedQuery: |
          SqlFailovers
          | where FailoverStartTime between (datetime({StartTime}) .. datetime({EndTime}))
          | where logical_server_name =~ "{LogicalServerName}"
          | where logical_database_name =~ "{LogicalDatabaseName}"
          | project FailoverStartTime, FailoverEndTime, FailoverDurationSeconds = datetime_diff('second', FailoverEndTime, FailoverStartTime), ReconfigurationType, CRMAction, OldPrimary, NewPrimary, PartitionId
          | order by FailoverStartTime asc

  - id: LS-STATE126-300
    name: "State 126 — Role Change XEvents"
    source: "SQLLivesiteAgents/Availability/error-40613-state-126/references/queries.md"
    table: MonFabricApi
    RequiredParameters: [StartTime, EndTime, AppName, fabric_partition_id]
    KustoQueries:
      - TableName: MonFabricApi
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          MonFabricApi
          | where TIMESTAMP between (StartTime .. EndTime)
          | where AppName =~ "{AppName}" and partition_id =~ "{fabric_partition_id}"
          | where event in ("hadr_fabric_api_replicator_begin_change_role", "hadr_fabric_api_replicator_end_change_role")
          | project PreciseTimeStamp, NodeName, event, new_role_desc, current_state_desc, result_desc, work_id, process_id, partition_id
          | order by PreciseTimeStamp asc

  - id: LS-STATE126-400
    name: "State 126 — Database Recovery Status"
    source: "SQLLivesiteAgents/Availability/error-40613-state-126/references/queries.md"
    table: MonSQLSystemHealth
    RequiredParameters: [StartTime, EndTime, AppName, DatabaseId]
    KustoQueries:
      - TableName: MonSQLSystemHealth
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          MonSQLSystemHealth
          | where PreciseTimeStamp between (StartTime .. EndTime)
          | where AppName =~ "{AppName}"
          | where logical_database_guid != '00000000-0000-0000-0000-000000000000'
          | where message contains "Recovery completed" or message contains "recovery completed"
          | extend DatabaseID = toint(extract(@"database ID (\d+)", 1, message))
          | where DatabaseID == {DatabaseId}
          | project RecoveryTime = PreciseTimeStamp, NodeName, message, process_id, logical_database_guid, DatabaseID
          | order by RecoveryTime asc

  - id: LS-STATE126-410
    name: "State 126 — Recovery Progress Messages"
    source: "SQLLivesiteAgents/Availability/error-40613-state-126/references/queries.md"
    table: MonSQLSystemHealth
    RequiredParameters: [StartTime, EndTime, AppName, DatabaseId]
    KustoQueries:
      - TableName: MonSQLSystemHealth
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          MonSQLSystemHealth
          | where PreciseTimeStamp between (StartTime .. EndTime)
          | where AppName =~ "{AppName}"
          | where logical_database_guid != '00000000-0000-0000-0000-000000000000'
          | where message has_any ("Starting up database", "Recovery", "redo", "undo", "Parallel redo")
          | extend DatabaseID = toint(extract(@"database ID (\d+)", 1, message))
          | where DatabaseID == {DatabaseId}
          | project PreciseTimeStamp, NodeName, message, process_id, logical_database_guid, DatabaseID
          | order by PreciseTimeStamp asc

  - id: LS-STATE126-500
    name: "State 126 — LoginOutages Impact"
    source: "SQLLivesiteAgents/Availability/error-40613-state-126/references/queries.md"
    table: LoginOutages
    RequiredParameters: [StartTime, EndTime, LogicalServerName, LogicalDatabaseName]
    KustoQueries:
      - TableName: LoginOutages
        ExecutedQuery: |
          LoginOutages
          | where outageStartTime between (datetime({StartTime}) - 5m .. datetime({EndTime}) + 5m)
          | where logical_server_name =~ "{LogicalServerName}"
          | where database_name =~ "{LogicalDatabaseName}"
          | project outageStartTime, outageEndTime, durationSeconds, OutageType, OutageReasonLevel1, OutageReasonLevel2, OutageReasonLevel3, OwningTeam
          | order by outageStartTime asc

