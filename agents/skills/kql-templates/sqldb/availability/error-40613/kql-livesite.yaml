          let EndTime = datetime({EndTime});
          MonSQLSystemHealth
          | where PreciseTimeStamp between (StartTime .. EndTime)
          | where AppName =~ "{AppName}"
          | where message contains "{physical_database_id}" or message contains "Error:"
          | where message has_any ("Error:", "error", "failed", "timeout", "cannot", "unable", "exception")
          | project originalEventTimestamp = PreciseTimeStamp, NodeName, message, process_id
          | order by originalEventTimestamp asc

  - id: LS-STATE127-510
    name: "State 127 — Tempdb Recovery"
    source: "SQLLivesiteAgents/Availability/error-40613-state-127/references/queries.md"
    table: MonSQLSystemHealth
    RequiredParameters: [StartTime, EndTime, AppName, DBNodeName]
    KustoQueries:
