          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          MonFabricApi
          | where originalEventTimestamp between (StartTime .. EndTime)
          | where AppName =~ "{AppName}" and physical_database_id =~ "{physical_database_id}"
          | where event in ("hadr_fabric_api_replicator_begin_change_role", "hadr_fabric_api_replicator_end_change_role")
          | project originalEventTimestamp, NodeName, event, new_role_desc, current_state_desc, result_desc, work_id, process_id, partition_id, physical_database_id
          | order by originalEventTimestamp asc

  - id: LS-STATE127-400
    name: "State 127 — Database Recovery Messages"
    source: "SQLLivesiteAgents/Availability/error-40613-state-127/references/queries.md"
    table: MonSQLSystemHealth
    RequiredParameters: [StartTime, EndTime, AppName, physical_database_id, sql_database_id]
    KustoQueries:
      - TableName: MonSQLSystemHealth
        ExecutedQuery: |
          let StartTime = datetime({StartTime});
          let EndTime = datetime({EndTime});
          MonSQLSystemHealth
          | where PreciseTimeStamp between (StartTime .. EndTime)
          | where AppName =~ "{AppName}"
          | where logical_database_guid != '00000000-0000-0000-0000-000000000000'
          | where message contains "{physical_database_id}"
          | where message has_any ("Starting up database", "Recovery completed", "recovery completed", "Parallel redo")
          | extend DatabaseID = toint(extract(@"database ID (\d+)", 1, message))
          | where DatabaseID == {sql_database_id}
          | project originalEventTimestamp = PreciseTimeStamp, NodeName, message, process_id, logical_database_guid, DatabaseID
          | order by originalEventTimestamp asc

  - id: LS-STATE127-500
    name: "State 127 — SQL Error Log Messages"
    source: "SQLLivesiteAgents/Availability/error-40613-state-127/references/queries.md"
    table: MonSQLSystemHealth
    RequiredParameters: [StartTime, EndTime, AppName, physical_database_id]
    KustoQueries:
