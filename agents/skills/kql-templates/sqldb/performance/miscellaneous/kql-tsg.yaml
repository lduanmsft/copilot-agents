      | where TIMESTAMP &gt; datetime({StartTime}) and TIMESTAMP &lt; datetime({EndTime})


      | where LogicalServerName =~ "{LogicalServerName}" and AppName =~ "{AppName}" and NodeName =~ "{NodeName}"


      | where event == "errorlog_written"


      | where message !contains "DecryptCurrDEK"

      '
- id: DB-performance-154
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth event LogicalServerName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: "MonSQLSystemHealth\n\n| where TIMESTAMP &gt; datetime({StartTime}) and TIMESTAMP &lt; datetime({EndTime})\n\n| where LogicalServerName =~ \"{LogicalServerName}\" and AppName =~ \"{AppName}\"\
      \ and NodeName =~ \"{NodeName}\"\n\n| where event == \"systemmetadata_written\"\n\n| where message contains \"I/O requests taking er than 15 seconds\" or message contains \"Wait for replica catchup\
      \ for\"\n\nor message contains \"Error:\" or message contains \"is not currently available\" \n\nor message contains \"[DbrSubscriber] Switching role to primary\" \n\nor message contains \"is changing\
      \ roles from\"\n\nor message contains \"A connection timeout has occurred\"\n\nor message contains \"DBR Subscriber is now invoking switch role\"\n\nor message contains \"CHadrTransportReplica State\
      \ change from\"\n\nor message contains \"latch\"\n\nor message contains \"dbg\"\n\nor message contains \"yield\"\n\nor (message contains \"701\" and message contains \"Error\" )\n\nor message contains\
      \ \"FAIL_\" \n\nor message contains \"limit for the database\"\n\n| extend msg_TIMESTAMP = extract(@\"(20[0-9]{2}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2}.[0-9]{2})\", 1, message)\n\n| extend\
      \ msg_TIMESTAMP = todatetime(msg_TIMESTAMP) \n\n| project PreciseTimeStamp, msg_TIMESTAMP, NodeName, message\n\n| order by PreciseTimeStamp asc nulls last , msg_TIMESTAMP asc nulls last// E.06\n"
- id: DB-performance-169
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB RG load activity
  - SQL DB MonRgLoad NodeName ClusterName drive_name
