    ExecutedQuery: 'MonClusterLoad


      | where PreciseTimeStamp &gt; ago(2h)


      | where ClusterName == ''{ClusterName}'' and node_name == ''{NodeName}''


      | where metric_name == ''InstanceDiskSpaceUsed''


      | project PreciseTimeStamp, node_load = [''load''] / 1024, node_cap = [''capacity''] / 1024, node_name


