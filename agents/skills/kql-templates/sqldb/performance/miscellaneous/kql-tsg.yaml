SqlSkills:
- id: DB-performance-7
  Topic: All-impacted-databases
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/All-impacted-databases.md
  Prompts:
  - SQL DB database metadata activity
  - SQL DB MonDatabaseMetadata LogicalServerName AppName
  - SQL DB investigate database metadata
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      | where table_name == "sysidxstats" and (type == 5 or type == 6)

      | summarize by AppName, LogicalServerName

      | project AppName

      )'
- id: DB-performance-8
  Topic: All-potentially-affected-customers-that-are-on-the
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/All-potentially-affected-customers-that-are-on-the.md
  Prompts:
  - SQL DB database metadata activity
  - SQL DB MonDatabaseMetadata AppName ClusterName
  - SQL DB investigate database metadata
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'let queryCluster = (clusterName: string, databaseName: string)

      { cluster(clusterName).database(databaseName).MonDatabaseMetadata

      | where table_name == "sysidxstats" and (type == 5 or type == 6)

      | where TIMESTAMP > ago(1d)

      | where code_package_version startswith "14.0.6"

      | summarize by AppName, ClusterName'
- id: DB-performance-14
  Topic: CPU-Pressure-Detection
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/CPU-Pressure-Detection.md
  Prompts:
  - SQL DB positive slope rq analysis
  - SQL DB PositiveSlopeRQ LogicalServerName AppName
  - SQL DB investigate positive slope rq
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: PositiveSlopeRQ
    ExecutedQuery: 'let RqViolation = PositiveSlopeRQ

      | join kind = fullouter HighSpikeRq on TIMESTAMP, AppName;

      let RunnableQPressure = WorkersUsed

      | join kind = inner RqViolation on TIMESTAMP, LogicalServerName, AppName

      | join kind = leftouter HighLoad on TIMESTAMP, LogicalServerName, AppName

      | project TIMESTAMP, LogicalServerName, AppName, HighWorkersViolation, GradualViolation, HighLoadViolation, HighSpikeRqViolation'
- id: DB-performance-22
  Topic: CSS-Feedback-for-ASC-Perf-troubleshooter_Insights
