- id: DB-performance-433
  Topic: Slow-Index-Maintenance
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Other-Waits-and-Issues/Slow-Index-Maintenance.md
  Prompts:
  - SQL DB wi index defragmentatIOn latency
  - SQL DB MonWiIndexDefragmentation LogicalServerName
  - SQL DB troubleshoot wi index defragmentatIOn latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiIndexDefragmentation
    ExecutedQuery: 'MonWiIndexDefragmentation

      | where originalEventTimestamp between (startDay..endDay)

      | where LogicalServerName =~ serverName

      | where logical_database_name =~ databaseName

      | where index_build_duration_sec > 0

      | summarize arg_max(originalEventTimestamp, index_build_duration_sec) by LogicalServerName, logical_database_name, object_id, index_id

      | summarize total_index_build_time = sum(index_build_duration_sec)

      ,index_build_start_time = min(originalEventTimestamp)

      by LogicalServerName, logical_database_name, object_id

      | extend index_build_end_time = datetime_add(''second'', total_index_build_time, index_build_start_time)

      | summarize build_start_time = min(index_build_start_time), build_end_time = max(index_build_end_time)

      by LogicalServerName, database_name = logical_database_name;'
