      \n| extend version_store_usage_mb=round((version_store_reserved_page_count)*8.0/1024,0) \n\n| project PreciseTimeStamp, version_store_usage_mb\n\n| render timechart // tempdb.02\n"
- id: DB-performance-177
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB errors reported errors
