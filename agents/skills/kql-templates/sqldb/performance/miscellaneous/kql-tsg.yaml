    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_server_name =~ "{ServerName}"

      and sql_instance_name =~ "fd674a61b413"

      | summarize arg_max(TIMESTAMP, sql_instance_name, service_level_objective, logical_resource_pool_id, tenant_ring_name)

      by logical_database_name, logical_database_id, physical_database_id, logical_server_name

      | extend update_pool_storage_limit = strcat(

      "Set-DatabasePropertyOverride -LogicalServerName ''", logical_server_name,

      "'' -LogicalDatabaseName ''", logical_database_name,

      "'' -CategoryName ''SloPropertyBag'' -OverrideValue ''<SloRgMapping><pool_max_data_space_kb>5586812928</pool_max_data_space_kb></SloRgMapping>''")

      | project update_pool_storage_limit, service_level_objective, logical_resource_pool_id'
