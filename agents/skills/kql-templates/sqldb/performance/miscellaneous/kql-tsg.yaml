- id: DB-performance-152
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth event LogicalServerName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: "MonSQLSystemHealth\n\n| where TIMESTAMP &gt; datetime({StartTime}) and TIMESTAMP &lt; datetime({EndTime})\n\n| where LogicalServerName =~ \"{LogicalServerName}\" and AppName =~ \"{AppName}\"\
      \ and NodeName =~ \"{NodeName}\"\n\n| where event == \"systemmetadata_written\"\n\n| where message notcontains \"[INFO]\" and message notcontains \"[TDE] SetDbeState\" and message notcontains \"Log\
      \ was backed up\" and message notcontains \"created in FSLOG\"\n\n| where message notcontains \"accepting vlf header\" and message notcontains \"Log writer started sending\" and message notcontains\
      \ \"DbMgrPartnerCommitPolicy::SetSyncAndRecoveryPoint\"\n\n| where message notcontains \"Started XE session\" and message notcontains \"[CFabricReplicaManager::GetHadrSessionTimeout] HADR Session\
      \ Timeout\"\n\n| where message notcontains \"[CFabricReplicaManager::GetHadrPingFrequency] HADR Ping Frequency\" and message notcontains \"Zeroing completed on\"\n\n| where message notcontains \"\
      HADR_FQDR_XRF: Sending the extended recovery forks to secondary\" and message notcontains \"Cleaning up conversations for\"\n\n| where message notcontains \"[CFabricReplicaManager::Start] Registered\
      \ service type\" and message notcontains \"Backup\" and message notcontains \"Recovery of database\"\n\n| where strlen(extract(@\"Backup(.*)s+processed\",1,message))&lt;=0 // Backup(b394e9a7-1ae7-48e6-b2d6-0725e6b3e7a7):\
      \ 10 percent (405405696/4053934080 by tes) processed\n\n| where strlen(extract(@\"Backup(.*)s+LSN\",1,message))&lt;=0 // Backup(b394e9a7-1ae7-48e6-b2d6-0725e6b3e7a7): Last LSN: 11817791:18192:1\n\n\
      | where strlen(extract(@\"Backup(.*)s+Estimated\",1,message))&lt;=0 // Backup(b394e9a7-1ae7-48e6-b2d6-0725e6b3e7a7): Estimated total size = 4665073664 by tes (data size = 0 by tes, log size = 4665073664\
      \ by tes)\n\n| where strlen(extract(@\"Zeroing(.*)s+from page\",1,message))&lt;=0 // Zeroing ... from page\n\n| where strlen(extract(@\"Backup(.*)s+WITH DIFFERENTIAL\",1,message))&lt;=0\n\n| where\
      \ strlen(extract(@\"[DecryptCurrDEK] (.*)s+Logical Database Name\",1,message))&lt;=0\n\n| where strlen(extract(@\"Backup(.*)s+Copying\",1,message))&lt;=0 \n\n| extend msg = case (strlen(extract(@\"\
      \ spid[0-9]{1,9}[s]{0,1}s+([^$]*)\",1,message))&gt;0, extract(@\" spid[0-9]{1,9}[s]{0,1}s+([^$]*)\",1,message), message)\n\n| summarize min(TIMESTAMP), max(TIMESTAMP), count() by msg\n\n| order by\
      \ count_ desc nulls last \n"
- id: DB-performance-153
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
