- id: DB-performance-32
  Topic: IHS-Telemetry-Troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/IHS-Telemetry-Troubleshooting.md
  Prompts:
  - SQL DB instance history store analysis
  - SQL DB MonInstanceHistoryStore event LogicalServerName
  - SQL DB investigate instance history store
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonInstanceHistoryStore
    ExecutedQuery: 'MonInstanceHistoryStore

      | where event == "ihs_inserts"

      | project TIMESTAMP, ClusterName, NodeName, MachineName, LogicalServerName, AppName, AppTypeName, metric_name

      -   ihs_analytics: tracks the scenario name (*scenario_name*), config name (config_name) for which analysis is being done. The result value of the analysis (*result_uint32_val, result_uint64_val*),
      time it took for doing the analysis (*analysis_time_ms*) and whether the analysis value has been persisted in ICS (*is_config_persisted*).'
- id: DB-performance-33
  Topic: IHS-Telemetry-Troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/IHS-Telemetry-Troubleshooting.md
  Prompts:
  - SQL DB instance history store analysis
  - SQL DB MonInstanceHistoryStore event LogicalServerName
  - SQL DB investigate instance history store
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonInstanceHistoryStore
    ExecutedQuery: 'MonInstanceHistoryStore

      | where event == "ihs_analytics"

      | project TIMESTAMP, ClusterName, NodeName, MachineName, LogicalServerName, AppName, AppTypeName,

      scenario_name, config_name, result_uint32_val, result_uint64_val, analysis_time_ms, is_config_persisted

      -   ihs_apply: tracks the scenario name (*scenario_name*), config name (*config_name*) for which ihs is trying to apply. The initial value of the config (*previous_uint32_val, previous_uint64_val)*,
      ihs recommended value(*ihs_recommended_uint32_val, ihs_recommended_uint64_val*), has the config been tuned to the ihs recommended value (*is_tuned*), if not tuned why (*tuning_skipped_reason*)'
- id: DB-performance-34
  Topic: IHS-Telemetry-Troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/IHS-Telemetry-Troubleshooting.md
  Prompts:
  - SQL DB instance history store analysis
  - SQL DB MonInstanceHistoryStore event LogicalServerName
  - SQL DB investigate instance history store
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonInstanceHistoryStore
    ExecutedQuery: 'MonInstanceHistoryStore

      | where event == "ihs_apply"

      | project TIMESTAMP, ClusterName, NodeName, MachineName, LogicalServerName, AppName, AppTypeName,

      scenario_name, config_name, ihs_recommended_uint32_val, ihs_recommended_uint64_val, previous_uint32_val, previous_uint64_val, is_tuned, tuning_skipped_reason

      -   ihs_deletes: captures num of files deleted (*num_files_deleted)* with the deletion logic that by default runs every once in 24 hours, num of files left (num_files_after_deletion) for the particular
      metric (metric_name) in the storage container. It also tracks the time it took for the deletion logic to run (deletion_time_ms) and timestamp of oldest ihs file (timestamp_of_oldest_file) for the
      metric in the storage container.'
