- id: DB-performance-122
  Topic: How-to-find-table-sizes
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/How-to-find-table-sizes.md
  Prompts:
  - SQL DB wi partitIOn stats activity
  - SQL DB MonWiDmDbPartitionStats AppName name id
  - SQL DB investigate wi partitIOn stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiDmDbPartitionStats
    ExecutedQuery: 'let myAppName="{AppName}";

      let PartitionStats=materialize(MonWiDmDbPartitionStats

      | where AppName contains myAppName and logical_database_name !=''master'' and index_id in (0,1)

      | summarize used_page_count=max(used_page_count), row_count=max(row_count) by database_id, logical_database_name, object_id, index_id, partition_number, data_date=bin(TIMESTAMP, 1d));

      let FilteredResults=materialize(MonDatabaseMetadata

      | where AppName contains myAppName and logical_db_name != ''master''

      | where (table_name==''sysclsobjs'' and class==50) or (table_name==''sysschobjs'' and [''type'']==''U '') or (table_name==''sysidxstats'' and indid in (0,1))

      | project TIMESTAMP, table_name, class, [''type''], id, name, nsid, indid);

      let schemas=FilteredResults

      | where (table_name==''sysclsobjs'' and class==50)

      | summarize by schema_id=id, schema_name=tolower(name);

      let tables=FilteredResults

      | where (table_name==''sysschobjs'' and [''type'']==''U '')

      | summarize by schema_id=nsid, object_id=id, table_name=name;

      let indexes=FilteredResults

      | where (table_name==''sysidxstats'' and indid in (0,1))

      | extend index_type_desc=iff([''type'']==0, ''HEAP'', iff([''type'']==1, ''CLUSTERED'', iff([''type'']==5, ''CCI'', tostring([''type'']))))

      | summarize by object_id=id,index_id=indid,index_type=type,index_type_desc;'
