      '
- id: DB-performance-180
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB backup status
  - SQL DB AlrBackup AppName NodeName originalEventTimestamp
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrBackup
    ExecutedQuery: "AlrBackup\n\n| where AppName == \"{AppName}\"\n\n| where TIMESTAMP &gt; datetime({StartTime}) and TIMESTAMP &lt; datetime({EndTime}) \n\n| where  event_type == \"BACKUP_METADATA_DETAILS\"\
      \ and (backup_type == \"Full\" or backup_type == \"Diff\")\n\n| project originalEventTimestamp ,  NodeName,  backup_type ,  backup_start_date , backup_end_date ,  backup_size , uncompressed_backup_size\n\
      \n, backup_path //,  AppName ,  logical_database_id , logical_database_name// Recovery\n"
- id: DB-performance-182
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB node trace diagnostics
  - SQL DB MonNodeTraceETW NodeName gt Pid
  - SQL DB investigate node trace diagnostics
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
