- id: DB-performance-170
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB cluster load
  - SQL DB MonClusterLoad ClusterName PreciseTimeStamp
  - SQL DB investigate cluster load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
