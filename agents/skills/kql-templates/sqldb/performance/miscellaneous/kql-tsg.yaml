- id: DB-performance-575
  Topic: Is-it-a-BC-candidate
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Is-it-a-BC-candidate.md
  Prompts:
  - SQL DB IO virtual file stats activity
  - SQL DB MonDmIoVirtualFileStats database_name NodeName
  - SQL DB investigate IO virtual file stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'let bc_database_storage_size_utilization = MonDmIoVirtualFileStats

      | where LogicalServerName =~ "{ServerName}"

      | where database_id > 4

      | where TIMESTAMP <= p_end_incident

      | where db_name =~ p_database

      | project TIMESTAMP = end_utc_date, database_name = db_name, type_desc, spaceused_mb, NodeName, file_id, size_on_disk_bytes

      | summarize hint.shufflekey=database_name sum(spaceused_mb), sum(size_on_disk_bytes), files = dcount(file_id, 2) by bin(TIMESTAMP, 1s), database_name, NodeName, type_desc

      | summarize gb_used = max(sum_spaceused_mb)/1024., gb = max(sum_size_on_disk_bytes)/(1024.*1024.*1024), files = max(files) by database_name, type_desc

      | extend bc = iff(type_desc == ''LOG'' and gb > 5 or type_desc == ''ROWS'' and gb_used / files > 256, 1, 0)

      | summarize hint.shufflekey=database_name bc = sum(bc) by database_name'
