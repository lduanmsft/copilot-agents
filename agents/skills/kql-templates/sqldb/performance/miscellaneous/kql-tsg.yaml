      | project TIMESTAMP,logical_server_name, pool_name=name, resource_pool_dtu_guarantee, database_dtu_cap


      | order by logical_server_name , pool_name// EP.02

      '
- id: DB-performance-172
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsRPSnapshot logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsRPSnapshot
    ExecutedQuery: 'MonAnalyticsRPSnapshot


      | where logical_server_name == "{LogicalServerName}"


      | summarize min(TIMESTAMP) by logical_server_name,resource_pool_name=name, resource_pool_dtu_guarantee, database_dtu_cap


      ) on resource_pool_name


      | project AppFirstAppearTime, logical_server_name , database_name , AppName , resource_pool_name, resource_pool_dtu_guarantee , database_dtu_cap ;

      '
- id: DB-performance-173
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonDmDbHadrReplicaStates LogicalServerName
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbHadrReplicaStates
    ExecutedQuery: 'MonDmDbHadrReplicaStates


      | where LogicalServerName =~ "{LogicalServerName}" and logical_database_name =~ "{LogicalDatabaseName}"


      | where is_primary_replica == 1


      | where AppName notcontains "b-"


      | order by TIMESTAMP asc nulls first


      | serialize


      | extend prevNodeName=prev(NodeName)


      | extend nextNodeName = next(NodeName)


      | extend isFirst= (NodeName != prevNodeName)


      | extend isLast=(NodeName != nextNodeName)


      | where isFirst == true or isLast == true


      | extend EndTime=next(TIMESTAMP)


      | extend StartTime=TIMESTAMP


      | where isFirst ==true


      | extend codeversion=extract("^(.*)-WASD", 1, code_package_version)


      | extend PrimaryNodeName=NodeName, PrimaryNodeFirstAppearTime=StartTime, PrimaryNodeLastAppearTime=EndTime


      | project ClusterName, LogicalServerName, logical_database_name, PrimaryNodeName, AppName, PrimaryNodeFirstAppearTime, PrimaryNodeLastAppearTime, codeversion


      | join kind= leftouter (


      PoolInfo


      ) on AppName


      | project ClusterName, LogicalServerName, logical_database_name, AppName, PrimaryNodeName, PrimaryNodeFirstAppearTime, PrimaryNodeLastAppearTime, codeversion, resource_pool_name, resource_pool_dtu_guarantee,
      database_dtu_cap


      | order by PrimaryNodeFirstAppearTime asc nulls last // EP.03

      '
