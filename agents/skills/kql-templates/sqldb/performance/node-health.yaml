  - TableName: MonSqlRmRingBuffer
    ExecutedQuery: 'cluster(clstr).database(''sqlazure1'').MonSqlRmRingBuffer

      | where originalEventTimestamp between (startTime .. endTime)

      | where ClusterName ==  "{ClusterName}"

