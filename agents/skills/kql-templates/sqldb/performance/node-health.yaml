    ExecutedQuery: 'MonDmCloudDatabaseWaitStats

      | where TIMESTAMP between (ago({TimeRange})..datetime(2024-05-21 18:11))

      | where wait_time_ms > 100000

      | where wait_type contains "FT_IFTS_SRCH_FD_MANAGER"

      | where LogicalServerName =~ "{ServerName}"

      | where AppName =="{AppName}"'
