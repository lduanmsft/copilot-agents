- id: DB-performance-896
  Topic: XE0012-IcM-AzureDBProduction-XEStuckDispatcher
  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0012-IcM-AzureDBProduction-XEStuckDispatcher.md
  Prompts:
