SqlSkills:
- id: DB-performance-25
  Topic: Generating-commands
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Generating-commands.md
  Prompts:
  - SQL DB timeout analysis
  - SQL DB MonDmRealTimeResourceStats LogicalServerName
  - SQL DB troubleshoot timeout
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where TIMESTAMP > ago({TimeRange})

      | where replica_type == 0

      | summarize any(database_name) by AppName, LogicalServerName, AppTypeName) on AppName

      | where AppName !in (''b18a995afd74'')

      | extend sql_cmd = strcat("sqlcmd -S"", LogicalServerName,".database.windows.net" -d"",any_database_name,"" -U"Foo" -P"Bar"")

      | extend cas_restart = strcat("Get-FabricNode -NodeName ",NodeName," -NodeClusterName ",ClusterName," | Kill-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/",AppTypeName,"/", AppName)

      | extend cas_dump = strcat("Get-FabricNode -NodeName ",NodeName," -NodeClusterName ",ClusterName," | Dump-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/",AppTypeName,"/", AppName)

      | extend cas_XDB hostdump = strcat("Get-FabricNode -NodeName ",NodeName," -NodeClusterName ",ClusterName," | Dump-Process -ProcessName XDB hostmain.exe -ApplicationNameUri fabric:/Worker")

      | extend cas_XDB hostdump_if = strcat("$cmdOutput = cmd /c ", sql_cmd, " ''2>&1''; $shouldMitigate = "$cmdOutput" -Like ''*timeout*''; $shouldMitigate; if ($shouldMitigate) { ", cas_XDB hostdump,
      "; $LatestCommands += ''", cas_XDB hostdump, "'' }")

      | extend cas_restart_if = strcat("$cmdOutput = cmd /c ", sql_cmd, " ''2>&1''; $shouldMitigate = "$cmdOutput" -Like ''*timeout*''; $shouldMitigate; if ($shouldMitigate) { ", cas_restart, "; $LatestCommands
      += ''", cas_restart, "'' }")

      | project max_TIMESTAMP, total_errors, NodeName, AppName, LogicalServerName, database_name = any_database_name, cas_restart_if , cas_XDB hostdump_if, sql_cmd,cas_restart, cas_dump, ClusterName

      | order by max_TIMESTAMP desc'
- id: DB-performance-26
  Topic: Generating-commands
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Generating-commands.md
  Prompts:
  - SQL DB timeout analysis
  - SQL DB MonDmRealTimeResourceStats LogicalServerName
  - SQL DB troubleshoot timeout
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where TIMESTAMP > ago(60m)

      | where replica_type == 0

      | summarize any(database_name) by AppName, LogicalServerName, AppTypeName) on AppName

      | where AppName !in (''b18a995afd74'', ''d498eb6add71'', ''d9bb3e5c4310'', ''b1dec80c0a37'', ''c2cc55074d67'' )

      | extend sql_cmd = strcat("sqlcmd -S"", LogicalServerName,".database.windows.net" -d"",any_database_name,"" -U"Foo" -P"Bar"")

      | extend cas_restart = strcat("Get-FabricNode -NodeName ",NodeName," -NodeClusterName ",ClusterName," | Kill-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/",AppTypeName,"/", AppName)

      | extend cas_dump = strcat("Get-FabricNode -NodeName ",NodeName," -NodeClusterName ",ClusterName," | Dump-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/",AppTypeName,"/", AppName)

      | extend cas_XDB hostdump = strcat("Get-FabricNode -NodeName ",NodeName," -NodeClusterName ",ClusterName," | Dump-Process -ProcessName XDB hostmain.exe -ApplicationNameUri fabric:/Worker")

      | extend cas_XDB hostdump_if = strcat("$cmdOutput = cmd /c ", sql_cmd, " ''2>&1''; $shouldMitigate = "$cmdOutput" -Like ''*timeout*''; $shouldMitigate; if ($shouldMitigate) { ", cas_XDB hostdump,
      "; $LatestCommands += ''", cas_XDB hostdump, "'' }")

      | extend cas_restart_if = strcat("$cmdOutput = cmd /c ", sql_cmd, " ''2>&1''; $shouldMitigate = "$cmdOutput" -Like ''*timeout*''; $shouldMitigate; if ($shouldMitigate) { ", cas_restart, "; $LatestCommands
      += ''", cas_restart, "'' }")

      | extend add_to_list_if = strcat("$cmdOutput = cmd /c ", sql_cmd, " ''2>&1''; $shouldMitigate = "$cmdOutput" -Like ''*timeout*''; $shouldMitigate; if ($shouldMitigate) { ''", AppName, "''; $InstanceList
      += ''", AppName, "'' }")

      | project TIMESTAMP, ClusterName, total_errors, NodeName, AppName, LogicalServerName, database_name = any_database_name, add_to_list_if, cas_restart_if , cas_XDB hostdump_if, sql_cmd,cas_restart,
      cas_dump

      | order by TIMESTAMP desc'
- id: DB-performance-35
  Topic: IHS-Telemetry-Troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/IHS-Telemetry-Troubleshooting.md
  Prompts:
  - SQL DB instance history store errors
  - SQL DB MonInstanceHistoryStore event LogicalServerName
  - SQL DB troubleshoot instance history store errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonInstanceHistoryStore
    ExecutedQuery: 'MonInstanceHistoryStore

      | where event == "ihs_deletes"

      | project TIMESTAMP, ClusterName, NodeName, MachineName, LogicalServerName, AppName, AppTypeName,

      num_files_with_delete_error, num_files_deleted, num_files_after_deletion, deletion_time_ms, timestamp_of_oldest_file

      We have an additional xevent ihs_delete_file_on_drop_instance stored in MonManagement Kusto table that captures the number of ihs files that got deleted for an instance being dropped.'
- id: DB-performance-41
  Topic: IHS-Tempdb-presizing
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/IHS-Tempdb-presizing.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonSqlRgHistory event AppName NodeName spaceused_mb
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP < ago(1d) // check for data before ihs_analytics xevent

      | where event == "aggregated_virtual_files_io_history"

      | where database_id == 2

      | where file_id != 2

      | extend size_on_disk_mb = round(size_on_disk_bytes/1024/1024, 0)

      | where AppName == ''{p_appname}''

      | where is_primary_replica == 1

      | project TIMESTAMP, AppName, NodeName, file_id, spaceused_mb, size_on_disk_mb

      | summarize sum(spaceused_mb) by TIMESTAMP, AppName

      | where sum_spaceused_mb >0

      | order by sum_spaceused_mb asc

      | summarize percentiles(sum_spaceused_mb, 80) by AppName, KustoCluster'
- id: DB-performance-105
  Topic: Connectivity-loss-causing-failover
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Connectivity-loss-causing-failover.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonDmDbHadrReplicaStates LogicalServerName
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbHadrReplicaStates
    ExecutedQuery: 'MonDmDbHadrReplicaStates

      | where LogicalServerName =~ "{LogicalServerName}"  and  logical_database_name  =~ "{LogicalDatabaseName}"

      | where TIMESTAMP > datetime({StartTime}) and TIMESTAMP < datetime({EndTime})

      | project TIMESTAMP, NodeName , synchronization_state_desc , synchronization_health_desc

      | order by TIMESTAMP asc nulls last'
- id: DB-performance-283
  Topic: Why-Failover-Occurred
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Why-Failover-Occurred.md
  Prompts:
  - SQL DB dump activity
  - SQL DB MonSqlDump LogicalServerName AppName NodeName
  - SQL DB investigate dump
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlDump
    ExecutedQuery: 'MonSqlDump

      | where LogicalServerName =~ "{LogicalServerName}" and AppName == "{AppName}"

      | where CompleteFileName endswith ".dmp"

      | where TIMESTAMP > datetime({StartTime})

      | summarize TIMESTAMP=min(TIMESTAMP) by NodeName, CompleteFileName

      | order by TIMESTAMP asc

      | project TIMESTAMP, NodeName, CompleteFileName;'
- id: DB-performance-438
  Topic: Troubleshooting-Invoice-Cloud-High-Shard-Count
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Other-Waits-and-Issues/Troubleshooting-Invoice-Cloud-High-Shard-Count.md
  Prompts:
  - SQL DB real time resource stats activity
  - SQL DB MonDmRealTimeResourceStats database_name
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where LogicalServerName =~ "{ServerName}" and database_name startswith \"{DatabaseName}\"

      | where NodeName =~ targetNodeName

      | where originalEventTimestamp > now(-1h)

      | summarize arg_max(originalEventTimestamp, ClusterName, AppTypeName, AppName) by database_name

      | summarize dcount(database_name) by ClusterName, AppTypeName, AppName

      | extend killCommand = strcat("Get-FabricNode -NodeName ", targetNodeName, " -NodeClusterName ", ClusterName,

      " | Kill-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/", AppTypeName, "/", AppName)

      | project ClusterName, targetNodeName, AppName, dcount_database_name, killCommand

      | order by dcount_database_name desc

      2. Check in SFE/XTS to ensure each application has moved to a different node.  If each application has moved successfully, wait for 15 minutes and run the Troubleshooting query again to ensure the
      shard count has dropped below 500 for the target node.

      3. If Kill-Process results in an in-place restart and an application remains on the same node, repeat the Kill-Process command(s) until you have successfully moved the application(s) off the node.

      4. If you are unable to move the application(s) to another node with the Kill-Process command(s), try executing Restart-FabricNode as a last resort.  Use the results of the query from Step 1 to build
      the command:'
- id: DB-performance-491
  Topic: TSG-012-Frequent-FdHost-Restart-Issue
  Source: TSG-SQL-DB-Performance/content/Fulltext/TSG-012-Frequent-FdHost-Restart-Issue.md
  Prompts:
  - SQL DB cloud database wait stats analysis
  - SQL DB MonDmCloudDatabaseWaitStats LogicalServerName
  - SQL DB investigate cloud database wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
