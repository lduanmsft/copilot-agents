- id: DB-performance-821
  Topic: AzureWatsonNYBucketChange
  Source: TSG-SQL-DB-Performance/content/SOS/Debugging-Notes/Non-yielding-stuck-or-stalled-threads/AzureWatsonNYBucketChange.md
  Prompts:
  - SQL DB watson bug filer activity activity
  - SQL DB MonWatsonBugFilerActivity BugId cause bug_id
  - SQL DB investigate watson bug filer activity
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWatsonBugFilerActivity
    ExecutedQuery: 'MonWatsonBugFilerActivity

      | where BugId == bug_id

      | extend cause = replace(@"SQLSERVER_STALLED_", "", BucketString)

      | summarize arg_max(TIMESTAMP, BugId, BugUrl, BucketString, cause) by cause

      | distinct new_bucket_string = BucketString, new_bug_url = BugUrl, new_bug_id = BugId, cause

      | join kind=leftouter ('
- id: DB-performance-822
  Topic: AzureWatsonNYBucketChange
  Source: TSG-SQL-DB-Performance/content/SOS/Debugging-Notes/Non-yielding-stuck-or-stalled-threads/AzureWatsonNYBucketChange.md
  Prompts:
  - SQL DB watson bug filer activity
  - SQL DB MonWatsonBugFiler BugId cause BugUrl new_bug_id
  - SQL DB investigate watson bug filer
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWatsonBugFiler
    ExecutedQuery: 'MonWatsonBugFiler

      | where BucketString contains "SQLSERVER_NON_YIELDING"

      | extend cause = replace(@"SQLSERVER_NON_YIELDING_", "", BucketString)

      | summarize arg_max(TIMESTAMP, BugId, BugUrl, BucketString, cause) by cause

      | distinct old_bucket_string = BucketString, old_bug_id = BugId, old_bug_url = BugUrl, cause

      ) on cause

      | distinct  new_bucket_string, new_bug_id, new_bug_url, old_bucket_string, old_bug_id, old_bug_url'
- id: DB-performance-823
  Topic: NonYieldSchedulerDebugging
  Source: TSG-SQL-DB-Performance/content/SOS/Debugging-Notes/Non-yielding-stuck-or-stalled-threads/NonYieldSchedulerDebugging.md
  Prompts:
  - SQL DB rm ring buffer analysis
  - SQL DB MonSqlRmRingBuffer event AppName NodeName
  - SQL DB investigate rm ring buffer
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRmRingBuffer
    ExecutedQuery: 'MonSqlRmRingBuffer

      | where TIMESTAMP between (t-10m .. t+10m)

      | where AppName == {AppName} and NodeName == {NodeName}

      | where event == ''nonyield_copiedstack_ring_buffer_recorded''

      | project  PreciseTimeStamp, AppName, NodeName, id, scheduler_id, worker, user_mode_time, kernel_mode_time,  StackFrames = stack_frames, dispatcher_pool_name

      | order by worker, PreciseTimeStamp asc

      | extend same_stack_as_before = iff(StackFrames == prev(StackFrames),1,0)'
