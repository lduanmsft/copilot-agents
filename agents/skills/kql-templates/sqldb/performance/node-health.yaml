- id: DB-performance-898
  Topic: XE0013-XE-Stuck-Dispatcher-DMV-Collector-TempDB-Log-Held
  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0013-XE-Stuck-Dispatcher-DMV-Collector-TempDB-Log-Held.md
  Prompts:
  - SQL DB tran active transactIOns latency
  - SQL DB MonDmTranActiveTransactions LogicalServerName
  - SQL DB troubleshoot tran active transactIOns latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmTranActiveTransactions
    ExecutedQuery: 'cluster(clstr).database("sqlazure1").MonDmTranActiveTransactions

      | where LogicalServerName has \"{ServerName}\"

      | where TIMESTAMP > ago(12h)

      | where program_name == "DmvCollector"

      | extend duration_hour = (end_utc_date - transaction_begin_time) / time(1h)

      | summarize max_duration_hour = arg_max(duration_hour, NodeName, session_id, transaction_id, transaction_begin_time, transaction_type, transaction_state, program_name, status,LogicalServerName

      ) by AppName, accessed_tempdb

      | where max_duration_hour > 10

      | sort by max_duration_hour desc'
- id: DB-performance-899
  Topic: XE0013-XE-Stuck-Dispatcher-DMV-Collector-TempDB-Log-Held
  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0013-XE-Stuck-Dispatcher-DMV-Collector-TempDB-Log-Held.md
  Prompts:
  - SQL DB rm ring buffer activity
  - SQL DB MonSqlRmRingBuffer event TIMESTAMP
  - SQL DB investigate rm ring buffer
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRmRingBuffer
    ExecutedQuery: 'let SingleCluster = (clstr: string) {

      let NonYieldAllAppsPastHour = cluster(clstr).database(''sqlazure1'').MonSqlRmRingBuffer

      | where TIMESTAMP > ago(2h)

      | where event == "nonyield_copiedstack_ring_buffer_recorded"

      | where dispatcher_pool_name == "DISP_POOL_XE_LONG_RUNNING_TARGETS"

      | summarize count = count()'
- id: DB-performance-900
  Topic: XE0013-XE-Stuck-Dispatcher-DMV-Collector-TempDB-Log-Held
  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0013-XE-Stuck-Dispatcher-DMV-Collector-TempDB-Log-Held.md
  Prompts:
  - SQL DB rm ring buffer activity
  - SQL DB MonSqlRmRingBuffer event LogicalServerName
  - SQL DB investigate rm ring buffer
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRmRingBuffer
    ExecutedQuery: '| where count > 3

      | summarize

      total_nonyield_count = sum(count),

      start_time = min(TIMESTAMP),

      end_time = max(TIMESTAMP),

      nonyield_percentage = 100.0 * count() / 12

      by AppName, ClusterName, nonyield_type, NodeName, LogicalServerName, AppTypeName;

      let CallStack = cluster(clstr).database(''sqlazure1'').MonSqlRmRingBuffer

      | where originalEventTimestamp > ago(2h)

      | where event == "nonyield_copiedstack_ring_buffer_recorded"

      | summarize count_ = count() by AppName, ClusterName, NodeName, stack_frames

      | summarize stack_frame_count = arg_max(count_, stack_frames) by AppName, ClusterName, NodeName

      | order by stack_frame_count desc;

      let XEventFileBLobOverrride = cluster(clstr).database("sqlazure1").MonConfigLogicalServerOverrides

      | where Property_Name contains "XEventEventFileBlobRollingDelete"

      | extend LogicalServerName = Logical_Server_Name

      | summarize by  ClusterName,LogicalServerName, Property_Value;

      let DMVCollectorMonActiveXeSessionBytes = cluster(clstr).database("sqlazure1").MonConfigLogicalServerOverrides

      | where Property_Name contains "DMVCollector_ViewOverrides"

      | where Property_Value contains "MonActiveXeSessionBytes"

      | extend LogicalServerName = Logical_Server_Name

      | extend DMVCollector_MonActiveXeSessionBytes =Property_Value

      | summarize by  ClusterName,LogicalServerName, DMVCollector_MonActiveXeSessionBytes;'
