- id: DB-performance-892
  Topic: XE0002-Troubleshooting-XEvent-Waits
  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0002-Troubleshooting-XEvent-Waits.md
  Prompts:
  - SQL DB os wait stats analysis
  - SQL DB MonDmOsWaitStats AppName start_utc_date
  - SQL DB investigate os wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsWaitStats
    ExecutedQuery: 'MonDmOsWaitStats

      | where AppName == appName and PreciseTime between (startTime..endTime)

      | where wait_type in (''XE_SQL_TEXT_PREDICATE'',''XE_SQL_TEXT_HEAP_FREE'',''XE_SQL_TEXT_HEAP_ALLOC'', ''XE_PREDICATE_HEAP_FREE'', ''XE_PREDICATE_HEAP_ALLOC'')

      | where waiting_tasks_count > 0

      | project start_utc_date, wait_type, waiting_tasks_count"'
- id: DB-performance-893
  Topic: XE0008-Disable-NO_EVENT_LOSS-event-retention-mode
  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0008-Disable-NO_EVENT_LOSS-event-retention-mode.md
  Prompts:
  - SQL DB cloud database wait stats analysis
  - SQL DB MonDmCloudDatabaseWaitStats database_name
  - SQL DB investigate cloud database wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: 'MonDmCloudDatabaseWaitStats

      | where AppName =~  appName

      | where PreciseTimeStamp>startTime and PreciseTimeStamp < endTime

      | where LogicalServerName =~ ServerName and database_name =~ DatabaseName

      | top-nested of bin(PreciseTimeStamp, 30m) by sum(delta_wait_time_ms) asc

      , top-nested 5 of wait_type by total_wait_time_ms_per_sec = round(sum(delta_wait_time_ms)/(time(30m)/1s),0) desc

      | sort by PreciseTimeStamp asc nulls last

      | project PreciseTimeStamp, wait_type, total_wait_time_ms_per_sec

      | render timechart'
- id: DB-performance-895
