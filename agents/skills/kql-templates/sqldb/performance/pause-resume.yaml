      | where TIMESTAMP > datetime(3/4/2021 12:50:00) and TIMESTAMP < datetime(3/4/2021 20:20:00)

      | where event == "set_reclaim_target"

      | where AppName == "{AppName}"

      | where NodeName == "{NodeName}"

