      | project TIMESTAMP, caller_function, caller_file, caller_ip_address, caller_line, logical_server_name, logical_database_name'
- id: DB-performance-151
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth event LogicalServerName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: "MonSQLSystemHealth\n\n| where TIMESTAMP &gt; datetime({StartTime}) and TIMESTAMP &lt; datetime({EndTime})\n\n| where LogicalServerName =~ \"{LogicalServerName}\" and AppName =~ \"{AppName}\"\
      \ and NodeName =~ \"{NodeName}\"\n\n| where event == \"systemmetadata_written\"\n\n| where message notcontains \"[INFO]\" and message notcontains \"[TDE] SetDbeState\" and message notcontains \"Log\
      \ was backed up\" and message notcontains \"created in FSLOG\"\n\n| where message notcontains \"accepting vlf header\" and message notcontains \"Log writer started sending\" and message notcontains\
      \ \"DbMgrPartnerCommitPolicy::SetSyncAndRecoveryPoint\"\n\n| where message notcontains \"Started XE session\" and message notcontains \"[CFabricReplicaManager::GetHadrSessionTimeout] HADR Session\
      \ Timeout\"\n\n| where message notcontains \"[CFabricReplicaManager::GetHadrPingFrequency] HADR Ping Frequency\" and message notcontains \"Zeroing completed on\"\n\n| where message notcontains \"\
      HADR_FQDR_XRF: Sending the extended recovery forks to secondary\" and message notcontains \"Cleaning up conversations for\"\n\n| where message notcontains \"[CFabricReplicaManager::Start] Registered\
      \ service type\" and message notcontains \"Backup\" and message notcontains \"Recovery of database\"\n\n| where message notcontains \"[DynamicDeactivationTask::DoDbOperation] DynamicFileAllocationDetectionUnderLockTask\
      \ was called\"\n\n| where message notcontains \"No Changes detected from manager notification\"\n\n| where strlen(extract(@\"Backup(.*)s+processed\",1,message))&lt;=0 \n\n| where strlen(extract(@\"\
      Backup(.*)s+LSN\",1,message))&lt;=0 \n\n| where strlen(extract(@\"Backup(.*)s+Estimated\",1,message))&lt;=0 \n\n| where strlen(extract(@\"Zeroing(.*)s+from page\",1,message))&lt;=0 \n\n| where strlen(extract(@\"\
      Zeroing(.*)s+from page\",1,message))&lt;=0 \n\n| where strlen(extract(@\"Backup(.*)s+WITH DIFFERENTIAL\",1,message))&lt;=0\n\n| where strlen(extract(@\"[DecryptCurrDEK] (.*)s+Logical Database Name\"\
      ,1,message))&lt;=0\n\n| where strlen(extract(@\"(Received|Sending) page request (from|to) (.*)s+for Undo or APR for page\",1,message))&lt;=0 \n\n| extend msg_TIMESTAMP = extract(@\"(20[0-9]{2}-[0-9]{2}-[0-9]{2}\
      \ [0-9]{2}:[0-9]{2}:[0-9]{2}.[0-9]{2})\", 1, message)\n\n| extend msg_TIMESTAMP = todatetime(msg_TIMESTAMP) \n\n| project PreciseTimeStamp, msg_TIMESTAMP, NodeName, message\n\n| order by PreciseTimeStamp\
      \ asc nulls last , msg_TIMESTAMP asc nulls lastMonSQLSystemHealth\n\n| where TIMESTAMP &gt; datetime({StartTime}) and TIMESTAMP &lt; datetime({EndTime})\n\n| where LogicalServerName =~ \"{LogicalServerName}\"\
      \ and AppName =~ \"{AppName}\" and NodeName =~ \"{NodeName}\"\n\n| project PreciseTimeStamp , message\n\n| where message contains \"stack\"\n"
- id: DB-performance-181
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB recovery trace analysis
  - SQL DB MonRecoveryTrace database_name LogicalServerName
  - SQL DB investigate recovery trace
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRecoveryTrace
    ExecutedQuery: "MonRecoveryTrace\n\n| where TIMESTAMP &gt; datetime({StartTime}) and TIMESTAMP &lt; datetime({EndTime}) \n\n| where LogicalServerName == \"{LogicalServerName}\" and AppName == \"{AppName}\"\
      \ //and database_name =~ \"{DatabaseName}\"\n\n| where database_name !in(\"msdb\",\"master\",\"model\",\"tempdb\", \"mssqlsystemresource\",\"model_userdb\", \"model_masterdb\")\n\n| order by originalEventTimestamp\
      \ asc\n\n| serialize\n\n| extend PrevTimestamp=prev(originalEventTimestamp, 1)\n\n| extend elapse_time_sec = (originalEventTimestamp - PrevTimestamp) / 1s\n\n| project elapse_time_sec, originalEventTimestamp,\
      \ database_name, trace_message\n\n| order by originalEventTimestamp asc nulls last\n\n//| order by elapse_time_sec asc  <tr class=\"even\">Long Activation issue //*\n"
- id: DB-performance-269
  Topic: RGDD008-20-Check-For-Sql-Alias,-SqlAlias-Cache-Record-Outage
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/RGDD008-20-Check-For-Sql-Alias,-SqlAlias-Cache-Record-Outage.md
  Prompts:
  - SQL DB management latency
  - SQL DB MonManagement event originalEventTimestamp
  - SQL DB troubleshoot management latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where originalEventTimestamp > startTime and originalEventTimestamp < endTime

      | where event startswith "cas_workflow_activate_" | summarize by request_id

      ) on request_id

      | summarize cnt(), arg_max(duration_min, request_id) by stack_trace, keys

      | top 20 by count_ desc'
- id: DB-performance-270
  Topic: RGDD008-Mitigating-stuck-_de_activation-workflow
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/RGDD008-Mitigating-stuck-_de_activation-workflow.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where TIMESTAMP > _startTime and TIMESTAMP < _endTime

      | where operation_type in (_operationtype)

      | extend px = parse_xml(operation_parameters)

      | extend servername = tostring(px.InputParameters.LogicalServerName)

      | extend dbname = tostring(px.InputParameters.DatabaseName)

      | where servername =~ _servername and dbname =~ _databasename

      | where error_code == "45320" and error_message contains "Azure Key Vault key" and error_message contains "disabled"

      | project originalEventTimestamp, event, request_id,operation_type, error_code, error_message'
- id: DB-performance-271
  Topic: RGDD008-Mitigating-stuck-_de_activation-workflow
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/RGDD008-Mitigating-stuck-_de_activation-workflow.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth
  - SQL DB investigate SQL system health
