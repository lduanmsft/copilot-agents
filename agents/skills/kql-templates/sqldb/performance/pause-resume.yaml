- id: DB-performance-367
  Topic: MM0001-6-Serverless-OOMs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Memory/MM0001-6-Serverless-OOMs.md
  Prompts:
  - SQL DB idle mem collector stats analysis
