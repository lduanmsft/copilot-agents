- id: DB-performance-370
  Topic: MM0001-8-Summarized-OOM-snapshot
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Memory/MM0001-8-Summarized-OOM-snapshot.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth event AppName AppTypeName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where AppName == appName

      | where originalEventTimestamp between (incidentStartTime .. incidentEndTime)

      | where event == "summarized_oom_snapshot"

      | extend topClerks = parse_json(top_memory_clerks)

      | extend topPools = parse_json(top_memory_pools)

      | extend top1Clerk_size_mb=tolong(topClerks[0][''page_allocated_mb''])+tolong(topClerks[0][''vm_committed_mb''])

      | extend top1Pool_target_mb=tolong(topPools[0][''pool_target_mb''])

      | extend ratioOftop1Clerk_poolTarget=round(top1Clerk_size_mb*100.0/top1Pool_target_mb,1)

      | extend non_sos_usage_pct = non_sos_usage_mb * 100 / current_job_cap_mb

      | extend oom_pool_name = parse_json(oom_memory_pool).pool_name

      | extend is_oom_pool_system_pool = oom_pool_name !contains "SloSharedPool" and  oom_pool_name !contains "UserPool"

      // Temporary fix to give precedence to SYSTEM_POOL (10) over NON_SOS_MEMORY_LEAK as oomCause if non-sos usage is less than 60% and oom_factor is OomMemoryPool, and it is a system pool

      | extend oom_cause = iff(non_sos_usage_pct < 60 and oom_factor == 5 and is_oom_pool_system_pool, 10, oom_cause)

      | extend oomCause = case(oom_cause == 1, ''HEKATON_POOL_MEMORY_LOW'', oom_cause == 2, ''MEMORY_LOW'', oom_cause == 3, ''OS_MEMORY_PRESSURE'',

      oom_cause == 4, ''OS_MEMORY_PRESSURE_SQL'', oom_cause == 5, ''NON_SOS_MEMORY_LEAK'', oom_cause == 6, ''SERVERLESS_MEMORY_RECLAMATION'',

      oom_cause == 7, ''MEMORY_LEAK'', oom_cause == 8, ''SLOW_BUFFER_POOL_SHRINK'', oom_cause == 9, ''INTERNAL_POOL'', oom_cause == 10, ''SYSTEM_POOL'',

      oom_cause == 11, ''QUERY_MEMORY_GRANTS'', oom_cause == 12, ''REPLICAS_AND_AVAILABILITY'', ''UNKNOWN'')

      | project originalEventTimestamp, ClusterName, NodeName, AppTypeName, instance_rg_size,

      is_non_sos_usage_leaked, oom_factor, oomCause, available_physical_memory_mb, current_job_cap_mb, process_memory_usage_mb,

      non_sos_usage_mb, committed_target_mb, committed_mb, allocation_potential_memory_mb,

      topClerks[0], topClerks[1], topClerks[2], topPools[0], oom_memory_pool,ratioOftop1Clerk_poolTarget,leaked_memory_clerk'
- id: DB-performance-407
  Topic: Serverless-TSG-001-Login-Outages-During-Memory-Reclamation-Flush
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Memory/Serverless-TSG-001-Login-Outages-During-Memory-Reclamation-Flush.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_server_name == _LogicalServerName

      | where sql_instance_name == _AppName

      | where logical_database_name == _DatabaseName

      | distinct service_level_objective

      If service_level_objective contains "_S_", then database is serverless, if not, then this TSG cannot be applicable.'
- id: DB-performance-408
  Topic: Serverless-TSG-001-Login-Outages-During-Memory-Reclamation-Flush
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Memory/Serverless-TSG-001-Login-Outages-During-Memory-Reclamation-Flush.md
  Prompts:
  - SQL DB idle mem collector stats analysis
  - SQL DB MonSqlIdleMemCollectorStats event LogicalServerName
  - SQL DB investigate idle mem collector stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlIdleMemCollectorStats
    ExecutedQuery: 'MonSqlIdleMemCollectorStats

      | where TIMESTAMP between (_startTime .. _endTime) // Time range filtering

      | where LogicalServerName == _LogicalServerName

      | where AppName == _AppName

      | where event == "flush_user_dbs_caches" or event == "flush_all_caches"

      | where reclaim_target_pages > 0

      | project originalEventTimestamp

      If there are no rows in the output, then there might not be any flush happening or flush is already disabled.'
- id: DB-performance-409
  Topic: Serverless-TSG-001-Login-Outages-During-Memory-Reclamation-Flush
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Memory/Serverless-TSG-001-Login-Outages-During-Memory-Reclamation-Flush.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonSqlIdleMemCollectorStats event LogicalServerName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlIdleMemCollectorStats
    ExecutedQuery: 'MonSqlIdleMemCollectorStats

      | where TIMESTAMP between (_startTime .. _endTime) // Time range filtering

      | where LogicalServerName == _LogicalServerName

      | where AppName == _AppName

      | where event == "shrink_if_needed" or event == "shrink_user_dbs_externalcaches"

      | where reclaim_target_set_in_sos == true and reclaim_target_pages > 0

      | project originalEventTimestamp

      If there are no rows in the output, then, there might not be any memory reclamation happening or it is already disabled.'
- id: DB-performance-410
  Topic: Serverless-TSG-002-High-Billing-Issues
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Memory/Serverless-TSG-002-High-Billing-Issues.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_server_name == _LogicalServerName

      | where sql_instance_name == _AppName

      | where logical_database_name == _DatabaseName

      | where service_level_objective contains "_GP_S_"

      | distinct service_level_objective, logical_resource_pool_id

      If the result is empty, then, the database is NOT serverless, this TSG is not applicable.

      If database is serverless, and logical_resource_pool_id field is EMPTY, then database is singleton serverless. Follow next steps.

      If service_level_objective contains "_S_" AND logical_resource_pool_id field is NOT EMPTY, then it is Serverless Elastic Pool, this TSG won''t be helpful in this case, please reach out to below Contact
      Information.'
- id: DB-performance-411
  Topic: Serverless-TSG-002-High-Billing-Issues
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Memory/Serverless-TSG-002-High-Billing-Issues.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonSqlIdleMemCollectorStats event LogicalServerName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlIdleMemCollectorStats
    ExecutedQuery: 'MonSqlIdleMemCollectorStats

      | where TIMESTAMP between (_startTime .. _endTime) // Time range filtering

      | where LogicalServerName == _LogicalServerName

      | where AppName == _AppName

      | where event == "shrink_if_needed"

      | extend cache_reclaim_policy = tostring(iff(cache_reclaim_policy == 3, "Work Relative Reclamation", "Cache Activeness"))

      | where cache_reclaim_policy == "Cache Activeness"

      In the output, check the latest record based on timestamp, and if cache_reclaim_policy is "Cache Activeness", then go to next step to verify memory is indeed not getting reclaimed, and if cache_reclaim_policy
      is "Work Relative Reclamation", then, this mitigation won''t help, please reach out on below Contact Information.'
