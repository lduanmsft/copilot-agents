SqlSkills:
- id: DB-performance-106
  Topic: Debug-Pause_Resume-CRIs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Debug-Pause_Resume-CRIs.md
  Prompts:
  - SQL DB biz management latency
  - SQL DB MonBizManagement event logical_server_name
  - SQL DB troubleshoot biz management latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBizManagement
    ExecutedQuery: 'MonBizManagement

      | where originalEventTimestamp > ago()

      | where event == "management_workflow_database_deactivation_complete"

      | where logical_server_name == serverName

      | where logical_database_name == dbName

      | project logical_database_name, logical_server_name, round(elapsed_time_sec=elapsed_time_milliseconds/1000,1)

      | summarize count(), avg(elapsed_time_sec)'
- id: DB-performance-107
  Topic: Debug-Pause_Resume-CRIs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Debug-Pause_Resume-CRIs.md
  Prompts:
  - SQL DB login failures
  - SQL DB MonLogin error state lookup_state lookup_error_code
  - SQL DB troubleshoot login failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where logical_server_name =~ "" and database_name ==""

      | where event == "process_login_finish"

      | where error <> 0

      | project originalEventTimestamp , database_name , AppName , MachineName , package , event, error , state, is_user_error , peer_address , lookup_error_code, lookup_state, application_name'
- id: DB-performance-108
  Topic: Debug-Pause_Resume-CRIs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Debug-Pause_Resume-CRIs.md
  Prompts:
  - SQL DB management status
  - SQL DB MonManagement event logical_server_name
  - SQL DB investigate management
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement // activation rqeuests

      | where originalEventTimestamp > ago(12h)

      | where (event == ''track_activate_physical_database_request'')

      | where logical_database_name == dbName

      | project originalEventTimestamp, logical_database_name, logical_server_name, caller_line, caller_function, caller_address, caller_file, caller_keys, caller_state_machine_type, package'
