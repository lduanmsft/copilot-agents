- id: DB-performance-678
  Topic: Bot-to-move-Lowly-used-IO-databases-to-XStore
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/Bot-to-move-Lowly-used-IO-databases-to-XStore.md
  Prompts:
  - SQL DB total xIO based latency
  - SQL DB totalXIOBasedDb logical_server_name AppName
  - SQL DB troubleshoot total xIO based latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'let deactivatedDB = totalXIOBasedDb

      | where physical_database_state == "Deactivated";

      let dbsWithIOInPast6days = MonDmRealTimeResourceStats

      | where originalEventTimestamp >= filter_dtu_usage_start_inclusive

      | where avg_data_io_percent > 0 or avg_log_write_percent > 0

      | extend region = extract("[ct]r[0-9]+[.]([^.]+)[.]", 1, ClusterName, typeof(string))

      | extend logical_server_name = LogicalServerName, logical_database_name = database_name

      | summarize makeset( slo_name), sum(avg_data_io_percent), sum(avg_log_write_percent) by logical_server_name, logical_database_name, region, SourceNamespace;

      let dbsNeedingXIOPast6days = MonDmRealTimeResourceStats

      | where originalEventTimestamp >= filter_dtu_usage_start_inclusive

      | where avg_data_io_percent > filter_xio_dtu_percentage

      | extend region = extract("[ct]r[0-9]+[.]([^.]+)[.]", 1, ClusterName, typeof(string))

      | extend logical_server_name = LogicalServerName, logical_database_name = database_name

      | summarize makeset( slo_name), sum(avg_data_io_percent), sum(avg_log_write_percent), samples = count() by logical_server_name, logical_database_name, region, SourceNamespace

      | extend duration = samples * time(15s)

      | where duration > filter_xio_max_duration;

      let dbsWithZeroIOInPast6Days = totalXIOBasedDb

      | join kind=leftanti dbsWithIOInPast6days on logical_server_name, logical_database_name, region, SourceNamespace;

      let dbsWithZeroDataIOInPast6Days = totalXIOBasedDb

      | join kind=leftanti ( dbsWithIOInPast6days | where ( sum_avg_data_io_percent != 0) ) on logical_server_name, logical_database_name, region, SourceNamespace;

      let dbsActiveWithZeroDataIOInPast6Days = totalXIOBasedDb

      | where physical_database_state <> "Deactivated"

      | join kind=leftanti ( dbsWithIOInPast6days | where ( sum_avg_data_io_percent != 0) ) on logical_server_name, logical_database_name, region, SourceNamespace;

      let active_xstore_candidates = totalXIOBasedDb

      | where physical_database_state <> "Deactivated"

      | join kind=leftanti ( dbsNeedingXIOPast6days ) on logical_server_name, logical_database_name, region, SourceNamespace;

      let db_map = MonAnalyticsDBSnapshot

      | where TIMESTAMP >= snapshot_start_inclusive and TIMESTAMP < snapshot_end_exclusive

      | where edition !in ( ''Premium'', ''DataWarehouse'', ''Stretch'', ''System'' )

      | where AppTypeName == ''Worker.ISO''

      | project TIMESTAMP, ClusterName, AppName, AppTypeName, physical_database_id, logical_server_name, logical_database_name, SourceNamespace

      | extend region = extract(''[ct]r[0-9]+[.]([^.]+)[.]'', 1, ClusterName, typeof(string))

      | summarize by SourceNamespace, region, AppName, AppTypeName, physical_database_id, logical_server_name, logical_database_name'
