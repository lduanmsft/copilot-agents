  Prompts:
  - SQL DB management analysis
  - SQL DB MonManagement event logical_server_name
  - SQL DB investigate management
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where TIMESTAMP between ({startTime} .. {endTime} )

      | where event contains "track_activate_physical_database_request"

