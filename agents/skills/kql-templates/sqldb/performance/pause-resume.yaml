  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where AppName contains _appName

      | where event in ("errorlog_written", "systemmetadata_written")

      | where message contains "Error: 33183" or message contains "Failed WRAP access" or message contains "WrapKeyUsingRsaKey operation failed" or'
- id: DB-performance-272
  Topic: RGDD008-Mitigating-stuck-_de_activation-workflow
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/RGDD008-Mitigating-stuck-_de_activation-workflow.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event error_message
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where TIMESTAMP > _startTime and TIMESTAMP < _endTime

      | where operation_parameters contains _servername and operation_parameters contains _databasename

      | project originalEventTimestamp, event, request_id, operation_type, error_code, error_message,  operation_parameters, message, exception_message, stack_trace

      | sort by originalEventTimestamp desc'
- id: DB-performance-273
  Topic: RGDD008-Mitigating-stuck-_de_activation-workflow
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/RGDD008-Mitigating-stuck-_de_activation-workflow.md
  Prompts:
  - SQL DB management status
  - SQL DB MonManagement event originalEventTimestamp
  - SQL DB investigate management
  CustomizedParameters:
