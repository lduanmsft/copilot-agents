  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where request_id =~ "25224F6B-32B1-4984-B3A2-8790EAF69160"

      | project originalEventTimestamp, event, state_machine_type, keys, action, old_state, new_state, message, stack_trace

      | sort by originalEventTimestamp asc'
- id: DB-performance-363
  Topic: MM0001-6-Serverless-OOMs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Memory/MM0001-6-Serverless-OOMs.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth AppName NodeName TIMESTAMP
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'let appName = "{AppName}";

      //let nodeName = "DB.44";

      let tag = "MSR-";

      //let tag = "MSExtra-"; // Uncomment this if you also want to see the extra info

      let MemoryDumpTable = MonSQLSystemHealth

      | where TIMESTAMP > datetime(3/4/2021 18:50:00) and TIMESTAMP < datetime(3/4/2021 19:20:00)

      | where AppName == appName

      //| where NodeName == nodeName

      | where message contains tag

      | extend MSRNumber = strcat(tag, extract(strcat(tag, "([0-9]+)"), 1, message, typeof(int)))

      | project originalEventTimestamp, NodeName, MSRNumber, message;'
