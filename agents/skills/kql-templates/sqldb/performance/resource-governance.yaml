SqlSkills:
- id: DB-performance-3
  Topic: '40613'
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/40613.md
  Prompts:
  - SQL DB real time resource stats activity
  - SQL DB MonDmRealTimeResourceStats database_name
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where originalEventTimestamp > ago(10h)

      | where replica_type == 0

      | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | summarize min(PreciseTimeStamp) by ClusterName, AppName, NodeName, replica_type, slo_name, dtu_limit, code_package_version, bin(originalEventTimestamp, 10min)'
- id: DB-performance-38
  Topic: IHS-Tempdb-presizing
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/IHS-Tempdb-presizing.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonSqlRgHistory event AppName TIMESTAMP
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP between (datetime(''{p_startTime}'')..datetime(''{p_endTime}''))

      | where event == "aggregated_virtual_files_io_history"

      | where database_id == 2 // tempdb

      | where file_id != 2 // exclude tempdb log file

      | extend size_on_disk_mb = round(size_on_disk_bytes/1024/1024, 0)

      | where AppName == ''{p_appname}''

      | where is_primary_replica == 1'
- id: DB-performance-39
  Topic: IHS-Tempdb-presizing
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/IHS-Tempdb-presizing.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event AppName AppTypeName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where event == "aggregated_virtual_files_io_history"

      | where TIMESTAMP > ago(1d)

      | where database_id == 2

      | where spaceused_mb != -1

      | where AppTypeName == "Worker.ISO"

      | where AppName == ''{p_appname}''

      | summarize max(file_id) by AppName

      | extend num_tempdb_data_files = max_file_id - 1

      | extend initial_tempdb_size_mb = num_tempdb_data_files * 16

      | summarize by num_tempdb_data_files, initial_tempdb_size_mb'
- id: DB-performance-50
  Topic: Incident-59546911-_CSS-CASE-SEV-A_-_Prem_-_V12-and
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Incident-59546911-_CSS-CASE-SEV-A_-_Prem_-_V12-and.md
  Prompts:
  - SQL DB real time resource stats analysis
  - SQL DB MonDmRealTimeResourceStats database_name
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where TIMESTAMP > ago(48h)

      | where replica_type == 0

      | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | project originalEventTimestamp, ClusterName, AppName, NodeName, slo_name, dtu_limit, code_package_version

      | order by originalEventTimestamp desc

      | serialize

      | extend next_NodeName = next(NodeName, 1, ""), next_AppName = next(AppName, 1, ""), next_slo_name = next(slo_name, 1, ""), next_dtu_limit = next(dtu_limit, 1, ""), next_code_package_version = next(code_package_version,
      1, "")

      | where NodeName != next_NodeName or AppName != next_AppName or slo_name != next_slo_name or dtu_limit != next_dtu_limit or code_package_version != next_code_package_version

      | project originalEventTimestamp, ClusterName, AppName, NodeName, slo_name, dtu_limit, code_package_version'
- id: DB-performance-64
  Topic: Query-to-check-where-are-Domino_s-DBs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Query-to-check-where-are-Domino_s-DBs.md
  Prompts:
  - SQL DB real time resource stats activity
  - SQL DB MonDmRealTimeResourceStats database_name
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'cluster(clusterName).database(databaseName).MonDmRealTimeResourceStats

      | where (InputLogicalServerName <> "" and LogicalServerName =~ InputLogicalServerName) or InputLogicalServerName == ""

      | where (InputDatabaseName <> "" and database_name =~ InputDatabaseName) or InputDatabaseName == ""

      | where (InputAppName <> "" and AppName =~ InputAppName) or InputAppName == ""

      | where (InputSubscriptionId <> "" and SubscriptionId =~ InputSubscriptionId) or InputSubscriptionId == ""

      | where database_name <> ""

      | summarize argmax(TIMESTAMP, *) by AppName, LogicalServerName, database_name

      | take 10

      | extend Cluster = extract("[ct]r[0-9]+[.]([^.]+)[.]", 1, max_TIMESTAMP_ClusterName, typeof(string))

      | extend ClusterFullName = max_TIMESTAMP_ClusterName,

      TR = extract("([ct]r[0-9]+)[.][^.]+[.]", 1, max_TIMESTAMP_ClusterName, typeof(string)),

      is_production = max_TIMESTAMP_ClusterName contains ".worker.database.windows.net",

      LastSeen = max_TIMESTAMP,

      SubscriptionId = toupper(max_TIMESTAMP_SubscriptionId),

      physical_database_guid = max_TIMESTAMP_physical_database_guid,

      CodePackageVersion=max_TIMESTAMP_code_package_version,

      AppTypeName=max_TIMESTAMP_AppTypeName,

      NodeName=max_TIMESTAMP_NodeName,

      SloName=max_TIMESTAMP_slo_name

      | extend Environments = iff(is_production, strcat("Wasd-prod-", Cluster, ".Wasd-prod-", Cluster), strcat("Wasd-stage-", Cluster, ".Wasd-stage-", Cluster, ",Wasd-test-stage-", Cluster, ".Wasd-test-stage-",
      Cluster, ",Wasd-test-stage01-", Cluster, ".Wasd-test-stage01-", Cluster, ",Wasd-test-stage02-", Cluster, ".Wasd-test-stage02-", Cluster)),

      Type = iff(is_production, "Production", "Stage")

      | join kind=leftouter (

      cluster(clusterName).database(databaseName).MonDatabaseMetadata

      | where table_name == "sysdbreg" and [''id''] > 4

      | extend database_name = name

      | project TIMESTAMP, cmptlevel, LogicalServerName, database_name, AppName

      | summarize argmax(TIMESTAMP, *) by LogicalServerName, database_name, AppName

      | project cmptlevel=max_TIMESTAMP_cmptlevel, LogicalServerName, database_name, AppName

      ) on LogicalServerName, database_name, AppName

      | extend compatibility_level = iff(tostring(cmptlevel) == "", "UNKNOWN", tostring(cmptlevel))

      | where database_name <> ""

      | order by LastSeen

      | project

      Active = iff(LastSeen > ago(30min), "Yes", "No"),

      Type,

      Cluster,

      TR,

      LogicalServerName,

      database_name,

      AppName,

      NodeName,

      compatibility_level,

      AppTypeName,

      SloName,

      SubscriptionId,

      physical_database_guid,

      CodePackageVersion,

      last_seen=LastSeen,

      ClusterFullName,

      KustoCluster'
