- id: DB-performance-741
  Topic: PPBOT-038-IO-RG-Delay-Alert
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-038-IO-RG-Delay-Alert.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin event LogicalServerName AppName
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where event == "process_login_finish"

      | where total_time_ms > 10000

      | where message contains "PAGEIOLATCH_SH" and message != ""

      | project TIMESTAMP, message, total_time_ms, AppName, LogicalServerName, SourceNamespace

      | extend ws = split(message, "<wait ")

      | mvexpand ws

      | where ws <> "" and ws <> ""

      | extend json = ws_to_json(tostring(ws))

      | extend j = parsejson(json)

      | extend wait_type = tostring(j["wait"].["name"])

      | where wait_type == ''PAGEIOLATCH_SH''

      | extend io_wait_time_ms = tolong(j["wait"].["time"])

      | extend max_time_ms = tolong(j["wait"].["maxTime"])

      | project-away ws, json, j

      | summarize avg(total_time_ms), max(total_time_ms), login_max_max_wait_ms = max(max_time_ms), max(io_wait_time_ms)

      , any(message) by AppName, LogicalServerName, bin(TIMESTAMP, 1m), SourceNamespace

      ) on AppName , LogicalServerName, SourceNamespace

      | project-away AppName1, LogicalServerName1, SourceNamespace1

      | where TIMESTAMP >= start_utc_date and TIMESTAMP < ( end_utc_date + 5m)

      | summarize avg(max_io_wait_time_ms), count() by LogicalServerName, AppName, bin(TIMESTAMP, 1h), ClusterName

      | where count_ > 5'
