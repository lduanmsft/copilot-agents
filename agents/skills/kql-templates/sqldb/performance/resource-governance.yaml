- id: DB-performance-353
  Topic: IO001-IO-troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/IO/IO001-IO-troubleshooting.md
  Prompts:
  - SQL DB rg history analysis
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory


      | where TIMESTAMP &gt;ago(2h)


      | where LogicalServerName =~ "{ServerName}" and AppName =~ "{AppName}"


      | where NodeName == "{NodeName}"


      | where database_id !in (1,2,3,4)


      //| where database_id in (5)


      | where event in ("aggregated_virtual_files_io_history")


      | project TIMESTAMP, delta_io_stall_queued_read_ms , delta_io_stall_read_ms, delta_io_stall_queued_write_ms , delta_io_stall_write_ms, DBid_FILEid=strcat(database_id,":", file_id )


      | render timechart <tr class="even">Q8 IO Delays &amp; IO RG IO Delays(TSQL)/*This query will compute detal IO stalls It takes a snapshot of sys.dm_io_virtual_file_stats, waits for 5 minutes (time
      can be adjusted) and take another snapshot.*/SELECT getdate() as runtime, * into #tmp1 FROM sys.dm_io_virtual_file_stats(DB_ID(N''demo2''), null); waitfor delay ''0:05:0''SELECT getdate() as runtime,
      * into #tmp2 FROM sys.dm_io_virtual_file_stats(DB_ID(N''demo2''), null);  --Query to Identify IO delays--delta_io_stall_read_ms, delta_io_stall_write_ms are total delays--delta_io_stall_queued_read_ms,
      delta_io_stall_queued_read_ms are delayes induced by IO governanceselect t1.runtime ''StartTime'', t2.runtime ''EndTime'', T1.database_id, T1.file_id,(t2.io_stall_read_ms-t1.io_stall_read_ms ) as
      ''delta_io_stall_read_ms'',(t2.io_stall_write_ms-t1.io_stall_write_ms ) as ''delta_io_stall_write_ms'',(t2.io_stall_queued_read_ms-t1.io_stall_queued_read_ms ) as ''delta_io_stall_queued_read_ms'',(t2.io_stall_queued_write_ms-t1.io_stall_queued_write_ms
      ) as ''delta_io_stall_queued_read_ms''from #tmp1 t1 join #tmp2 t2 on t1.database_id=t2.database_id and t1.file_id=t2.file_id<tr class="odd">Q9 Azure Remote Storage Throttling// IO.01

      '
- id: DB-performance-421
  Topic: Debugging-Incorrect-Disk-Space-Usage-Reporting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Other-Waits-and-Issues/Debugging-Incorrect-Disk-Space-Usage-Reporting.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP > ago(1d)

      | where AppTypeName == "Worker.ISO" or AppTypeName == "Worker.ISO.Premium"

      | where event == "fcb_space_usage"

      | where codepath_used == 4 // 4 -> PATH_FULLLSCAN_PARALLEL_RESET

      | extend pages_used_cached = prev_pages_allocated_at_fullscan + prev_cached_page_allocs - prev_cached_page_deallocs

      | where pages_used_cached != 0

      | extend gap_in_calc_pages =  abs(pages_used_cached - pages_used)

      | extend gap_in_calc_perc = round(gap_in_calc_pages * 100.0 / pages_used,3)

      | where gap_in_calc_perc > 10

      | summarize min(originalEventTimestamp), max(originalEventTimestamp), max(gap_in_calc_pages), max(gap_in_calc_perc), count() by LogicalServerName, NodeName, AppName, AppTypeName, database_id, file_id

      | order by gap_in_calc_perc desc'
- id: DB-performance-422
  Topic: Debugging-Incorrect-Disk-Space-Usage-Reporting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Other-Waits-and-Issues/Debugging-Incorrect-Disk-Space-Usage-Reporting.md
  Prompts:
  - SQL DB rg history analysis
  - SQL DB MonSqlRgHistory event AppName NodeName app
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory| where originalEventTimestamp between (starttime..endtime)

      | where AppName == app

      | where NodeName == node

      | where database_id == dbid and file_id == fileid

      | where event == "fcb_space_usage"

      | extend pgs_used_cached = prev_pages_allocated_at_fullscan + prev_cached_page_allocs - prev_cached_page_deallocs

      | extend gap_in_calc_pgs =  abs(pgs_used_cached - pages_used)

      | extend gap_in_calc_perc = round(gap_in_calc_pgs * 100.0 / pages_used, 3)

      | extend prev_pgs_at_fs_gb = round(prev_pages_allocated_at_fullscan * 8.0 / 1024.0 / 1024.0, 0)

      | extend total_alloc_dealloc_gb = round((prev_cached_page_allocs + prev_cached_page_deallocs) * 8.0 / 1024.0 / 1024.0, 3)

      | extend perc_alloc_dealloc = round(total_alloc_dealloc_gb * 100.0 / prev_pgs_at_fs_gb, 3)

      | project originalEventTimestamp, event, NodeName, database_id, file_id, codepath_used, prev_pages_allocated_at_fullscan, prev_cached_page_allocs, prev_cached_page_deallocs, pgs_used_cached, pages_used,
      gap_in_calc_pgs, total_alloc_dealloc_gb, perc_alloc_dealloc

      | order by originalEventTimestamp asc'
