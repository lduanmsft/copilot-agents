      | join kind = leftouter('
- id: DB-performance-100
  Topic: ASC-Queries-for-TxLog-Insights
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/ASC-Queries-for-TxLog-Insights.md
  Prompts:
  - SQL DB rg history latency
  - SQL DB MonSqlRgHistory event AppTypeName type_desc
  - SQL DB troubleshoot rg history latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where end_aggregated_sample > start_time and end_aggregated_sample <= datetime({EndTime})

      | where {AppNamesOnly}

      | where event contains ''file'' and event contains ''aggregated''

      | where database_id > 4

      | where AppTypeName in (''Worker.ISO.Premium'',''Worker.ISO'' )

      | where duration_time_ms > 0

      | where type_desc == ''LOG''

      | extend wkb = delta_num_of_bytes_written / ((0.001 + delta_num_of_writes) * 1024)

      | extend TIMESTAMP = bin(end_aggregated_sample, 15m), mbs = delta_num_of_bytes_written / (1024 * 1024 * duration_time_ms * 0.001)

      | summarize mbs = sum(mbs)

      , wkb = sum(delta_num_of_bytes_written) / (1024. * (0.001 + sum(delta_num_of_writes)))

      , avg_write_ms = sum(delta_write_stall_total_ms) / (1. * (0.001 + sum(delta_num_of_writes)))

      , num_of_writes_per_second_max = max(num_of_writes_per_second_max)

      by bin(TIMESTAMP, p_sample_interval), AppName, NodeName, AppTypeName

      ) on AppName, NodeName, TIMESTAMP

      | where wkb <= small_log_write_kb

      | join kind = leftouter('
- id: DB-performance-101
  Topic: ASC-Queries-for-TxLog-Insights
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/ASC-Queries-for-TxLog-Insights.md
  Prompts:
  - SQL DB rg history latency
  - SQL DB MonSqlRgHistory event AppName AppTypeName
  - SQL DB troubleshoot rg history latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where end_aggregated_sample > start_time and end_aggregated_sample <= datetime({EndTime})

      | where {AppNamesOnly}

      | where event contains ''aggregated'' and event contains ''group''

      | where AppTypeName in ( ''Worker.ISO.Premium'' , ''Worker.ISO'' )

      | where duration_time_ms > 0

      | extend TIMESTAMP = bin(end_aggregated_sample, 15m)

      | summarize by tes_per_commit = sum(delta_log_bytes_used_total) / (0.001 + sum(delta_log_commits_tracked_total)) by bin(TIMESTAMP, p_sample_interval), NodeName, AppName

      ) on TIMESTAMP, NodeName, AppName

      | where (slo_name contains ''SQLDB'' and by tes_per_commit <= 3000 ) or (slo_name !contains ''SQLDB'' and by tes_per_commit <= 7000 )

      | summarize samples = count()

      , samples_good_latency = countif( iff(AppTypeName == ''Worker.ISO.Premium'', avg_write_ms <= 2, avg_write_ms <= 5))

      , max(avg_log_write_percent)

      , avg(avg_write_ms)

      , max(avg_write_ms)

      , avg(wkb)

      , max(wkb)

      , avg(num_of_writes_per_second_max)

      , max(num_of_writes_per_second_max)

      // by AppName, slo_name, cap_mbs, AppTypeName

      | where samples >= 4'
- id: DB-performance-228
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB resource governance activity
  - SQL DB MonDmDbResourceGovernance ClusterName tr
  - SQL DB investigate resource governance
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbResourceGovernance
    ExecutedQuery: 'MonDmDbResourceGovernance


      | where ClusterName !startswith "cr"


      | extend Gen=extract("(SQLG[0-9])",1,slo_name)


      | extend Region=extract(@".(.*).worker",1,ClusterName)


      | extend tr=extract("tr([0-9]{1,2})", 1, ClusterName)


      | extend tr=toint(tr)


      | summarize HardwareGen=makeset(Gen) by Region, tr, ClusterName


      | order by Region asc, tr asc, ClusterName asc nulls last '
