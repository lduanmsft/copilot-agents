- id: DB-performance-574
  Topic: Is-it-a-BC-candidate
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Is-it-a-BC-candidate.md
  Prompts:
  - SQL DB real time resource stats activity
  - SQL DB real time resource stats database_name LogicalServerName
  - SQL DB investigate datetime
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'let p_database = ''db_crmcoreemea_20180108_11090289_a226'';

      let p_start_incident = datetime(2019-11-18 00:10:15.4808353);

      let p_end_incident = datetime(2019-11-18 19:00:45.4808353);

      let bc_utilization_candidates = MonDmRealTimeResourceStats

      | where LogicalServerName =~ "{ServerName}"

      | where replica_type == 0

      | where slo_name contains ''SQLDB_GP''

      | where database_name =~ p_database

      | where TIMESTAMP <= p_end_incident

      | summarize hint.shufflekey=AppName avg(avg_log_write_percent), avg(avg_data_background_io_percent), avg(avg_data_io_percent)

      , avg_io_percent = avg(avg_data_background_io_percent + avg_data_io_percent)

      by bin(TIMESTAMP, 15m), slo_name, AppName, database_name, io_cap, log_cap

      | extend bc = iff( (avg_avg_log_write_percent > 25 and log_cap > 20*1024*1024)

      or (avg_io_percent > 50 or avg_io_percent * 0.01 * io_cap > 4000 )

      or (avg_avg_data_background_io_percent > 25 and io_cap > 7500), 1, 0)

      | summarize hint.shufflekey=AppName samples = count(), bc = sum(bc) by AppName, database_name, slo_name

      | summarize samples = count(), bc=sum(bc), apps = dcount(AppName,2), slo_name = any(slo_name) by database_name'
