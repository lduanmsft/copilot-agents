      | summarize mbs = sum(mbs) by bin(TIMESTAMP, p_sample_interval), AppName, NodeName, physical_database_guid = physical_database_name

      | join kind = inner ('
- id: DB-performance-97
  Topic: ASC-Queries-for-TxLog-Insights
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/ASC-Queries-for-TxLog-Insights.md
  Prompts:
  - SQL DB real time resource stats activity
  - SQL DB MonDmRealTimeResourceStats TIMESTAMP start_time
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where TIMESTAMP > start_time and TIMESTAMP <= datetime({EndTime})

      | where {LogicalServerAndDatabaseName}

      | where replica_type == 0

      | summarize db_mbs = avg(avg_log_write_percent * 0.01 * log_cap / (1024 * 1024.)),log_cap_mbps = avg(log_cap / 1024 / 1024)

      by bin(TIMESTAMP, p_sample_interval), NodeName, slo_name, AppName, physical_database_guid, database_name, LogicalServerName

      ) on NodeName, AppName, physical_database_guid, TIMESTAMP

      | summarize samples_non_effective_log_rg = countif(mbs > p_non_effective_min_generation_compared_with_desired_limit * db_mbs and mbs > p_non_effective_min_ratio_disk_rg * log_cap_mbps),

      samples_extreme_log_generation = countif(mbs > p_extreme_log_generation_min_generation_compared_with_desired_limit * db_mbs and mbs > p_extreme_log_generation_min_ratio_disk_rg * log_cap_mbps)

      by database_name //,log_cap_mbps, slo_name

      | where samples_extreme_log_generation > p_min_samples_for_confidence'
- id: DB-performance-98
  Topic: ASC-Queries-for-TxLog-Insights
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/ASC-Queries-for-TxLog-Insights.md
  Prompts:
