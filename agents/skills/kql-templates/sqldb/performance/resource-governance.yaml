      | where end_aggregated_sample > start_time and end_aggregated_sample <= datetime({EndTime})

      | where {AppNamesOnly}

      | where event contains ''file'' and event contains ''aggregated''

      | where database_id > 4

      | where AppTypeName in ( ''Worker.ISO.Premium'', ''Worker.ISO'' )

      | where duration_time_ms > 0

      | where type_desc == ''LOG''

