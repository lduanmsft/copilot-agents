- id: DB-performance-769
  Topic: PPTSG-VHD01B-Dynamic-VHD-Grower-Too-Many-Nodes-Gro
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPTSG-VHD01B-Dynamic-VHD-Grower-Too-Many-Nodes-Gro.md
  Prompts:
  - SQL DB RG manager activity
  - SQL DB MonRgManager event NodeName ClusterName
  - SQL DB investigate RG manager
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: 'MonRgManager

      | where event == "vhd_growth_chunk_written"

      | where originalEventTimestamp > p_start_utc_date and originalEventTimestamp <= p_end_utc_date

      | summarize count() by NodeName, ClusterName, TIMESTAMP_sample =bin(TIMESTAMP, p_aggregation_interval) // count nodes growing per hour

      | summarize nodes_growing = make_set(NodeName), nodes_growing_count = count() by ClusterName, TIMESTAMP_sample // Count number of nodes growing on same ring during that hour

      | join kind=leftouter (MonRgLoad

      | where TIMESTAMP > p_nodes_in_cluster_detection

      | summarize total_nodes_count = dcount(NodeName) by ClusterName) on ClusterName

      | extend nodes_growing_percent = (nodes_growing_count * 1.0 / total_nodes_count * 1.0) * 100

      | extend sample_violation = nodes_growing_percent > p_max_nodes_growing_percent

      | extend max_nodes_allowed_growing = ((p_max_nodes_growing_percent / 100.0) * total_nodes_count * 1.0)

      | extend num_recommended_nodes_to_stop = ceiling(nodes_growing_count - max_nodes_allowed_growing)

      | summarize nodes_growing_count = arg_max(nodes_growing_count, nodes_growing, nodes_growing_percent, max_nodes_allowed_growing, num_recommended_nodes_to_stop), samples_violation = sum(sample_violation)
      by ClusterName, total_nodes_count

      | extend huge_percentage_growing = nodes_growing_count > ((p_huge_node_growth_threshold_percent / 100.0) * total_nodes_count * 1.0)

      | where samples_violation > p_num_samples_for_detection or huge_percentage_growing

      | extend region = strcat(

      iff(ClusterName contains ''sqltest'' or ClusterName contains ''lkgtst'', ''stage'', ''prod''),

      ''-'',

      extract(''([0-9A-Za-z]*).([0-9A-Za-z_-]*).([0-9A-Za-z_]*)'', 2, ClusterName))

      | extend recommended_severity = case(not(region contains ''prod''), "sev4", total_nodes_count < p_small_ring_threshold or not(huge_percentage_growing), "sev3", "sev2")

      | extend p_max_nodes_growing_percent, p_huge_node_growth_threshold_percent, p_num_samples_for_detection

      | extend tsg_name = "PPTSG-VHD01B"'
- id: DB-performance-770
  Topic: PPTSG-VHD01B-Dynamic-VHD-Grower-Too-Many-Nodes-Gro
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPTSG-VHD01B-Dynamic-VHD-Grower-Too-Many-Nodes-Gro.md
  Prompts:
  - SQL DB RG manager activity
  - SQL DB RG manager event NodeName ClusterName originalEventTimestamp
  - SQL DB investigate a
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: 'a.  MonRgManager

      | where originalEventTimestamp > ago(1h) and event == "vhd_growth_chunk_written"

      | summarize count() by NodeName, ClusterName, TIMESTAMP_by_hour=bin(TIMESTAMP, 15m)

      | summarize nodes_growing = make_set(NodeName), nodes_growing_count = count() by ClusterName, TIMESTAMP_by_hour'
- id: DB-performance-771
  Topic: PPTSG-VHD02-Detect-Possible-Dynamic-VHD-growth
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPTSG-VHD02-Detect-Possible-Dynamic-VHD-growth.md
  Prompts:
  - SQL DB RG manager activity
  - SQL DB MonRgManager event NodeName ClusterName
  - SQL DB investigate RG manager
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: 'MonRgManager

      | where TIMESTAMP > start_time and TIMESTAMP < end_time and iff(node_name != "", NodeName == name_of_node, true) and iff(ring_name != "", ClusterName == ring_name, true)

      | where event == "max_idsu_update"

      // Find max values at some interval

      | summarize (max_idsu, original_timestamp) = argmax(max_idsu, TIMESTAMP) by bin(TIMESTAMP, search_granularity), NodeName, ClusterName

      // Get top and bottom numbers

      | summarize (min_idsu, min_timestamp) = argmin(max_idsu, original_timestamp), (max_idsu, max_timestamp) = argmax(max_idsu, original_timestamp) by bin(TIMESTAMP, interval_granularity), NodeName, ClusterName

      | extend increasingIDSU = (max_timestamp > min_timestamp and max_idsu > min_idsu)

      | extend resetIDSU = (max_timestamp < min_timestamp and max_idsu > min_idsu)

      | summarize intervals_total = count(), intervals_increasing = countif(increasingIDSU), intervals_reset = countif(resetIDSU) by NodeName, ClusterName'
- id: DB-performance-772
  Topic: PPTSG-VHD02-Detect-Possible-Dynamic-VHD-growth
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPTSG-VHD02-Detect-Possible-Dynamic-VHD-growth.md
  Prompts:
  - SQL DB counter one minute activity
  - SQL DB MonCounterOneMinute NodeName ClusterName
  - SQL DB investigate counter one minute
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'MonCounterOneMinute

      | where ClusterName == p_cluster_name and NodeName == p_node_name

      | where TIMESTAMP <= start_incident

      | where CounterName == p_counter_name

      | project TIMESTAMP, CounterName, CounterValue, NodeName

      | summarize before_incident = min(CounterValue) by CounterName, NodeName

      ) on CounterName , NodeName

      | project-away CounterName1, NodeName1

      | extend vhd_growth_possible = iff(min_incident < before_incident, 1, 0)'
- id: DB-performance-909
  Topic: VectorIndex002-Resource-Governance
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex002-Resource-Governance.md
  Prompts:
  - SQL DB rg history latency
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB troubleshoot rg history latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where event == ''aggregated_workload_groups_plus_history''

      | where group_name == "VectorIndexGroup"

      | summarize

      total_reads = sum(delta_reads_completed_total),

      total_writes = sum(delta_writes_completed_total),

      total_read_bytes = sum(delta_read_bytes_total_sum),

      total_write_bytes = sum(delta_write_bytes_total_sum),

      total_read_stall_ms = sum(delta_read_stall_total_ms_sum),

      total_write_stall_ms = sum(delta_write_stall_total_ms_sum),

      total_background_writes = sum(delta_background_writes_total),

      total_log_bytes = sum(delta_log_bytes_used_total)

      by TIMESTAMP = bin(TIMESTAMP, 15m), LogicalServerName, AppName

      | extend

      read_mb = round(total_read_bytes / 1048576.0, 2),

      write_mb = round(total_write_bytes / 1048576.0, 2),

      log_mb = round(total_log_bytes / 1048576.0, 2),

      avg_read_latency_ms = iif(total_reads == 0, real(null), round(todouble(total_read_stall_ms) / total_reads, 2)),

      avg_write_latency_ms = iif(total_writes == 0, real(null), round(todouble(total_write_stall_ms) / total_writes, 2))

      | project TIMESTAMP, LogicalServerName, AppName,

      total_reads, total_writes,

      read_mb, write_mb, log_mb,

      avg_read_latency_ms, avg_write_latency_ms'
- id: DB-performance-911
  Topic: VectorIndex002-Resource-Governance
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex002-Resource-Governance.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where event == ''aggregated_workload_groups_plus_history''

      | where group_name == "VectorIndexGroup"

      | summarize

      reads_queued = sum(delta_reads_queued_total_sum),

      reads_issued = sum(delta_reads_issued_total_sum),

      reads_completed = sum(delta_reads_completed_total),

      writes_queued = sum(delta_writes_queued_total_sum),

      writes_issued = sum(delta_writes_issued_total_sum),

      writes_completed = sum(delta_writes_completed_total),

      read_stall_queued_ms = sum(delta_read_stall_queued_ms_sum),

      reads_throttled_max = max(reads_throttled_total_max)

      by TIMESTAMP = bin(TIMESTAMP, 15m), LogicalServerName, AppName

      | extend

      read_queue_depth = reads_queued - reads_completed,

      write_queue_depth = writes_queued - writes_completed,

      is_throttled = reads_throttled_max > 0 or read_stall_queued_ms > 0

      | where is_throttled or read_queue_depth > 10 or write_queue_depth > 10

      | project TIMESTAMP, LogicalServerName, AppName,

      reads_queued, reads_completed, read_queue_depth,

      writes_queued, writes_completed, write_queue_depth,

      reads_throttled_max, read_stall_queued_ms'
