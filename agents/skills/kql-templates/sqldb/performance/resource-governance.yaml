      | where AppName contains "<AppName>"

      | where TIMESTAMP >= ago({TimeRange}) and TIMESTAMP < now()

      | where session_id != -1

      | extend duration_hour = (end_utc_date - transaction_begin_time) / time(1h)

      | summarize max_duration_hour = arg_max(duration_hour, NodeName, session_id, transaction_id, transaction_begin_time, transaction_type, transaction_state, program_name, status

      ) by user_db_name, database_id, accessed_tempdb

      | sort by max_duration_hour desc'
