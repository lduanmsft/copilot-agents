  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: '| where AppName == "{AppName}"


      | where NodeName == "{NodeName}"


      | where TIMESTAMP between (ago({TimeRange}) .. datetime(2019-01-23 13:05:00))


      | where event == "aggregated_workload_groups_plus_history"


      | project TIMESTAMP, group_name,


      cpu_usage_percent = delta_total_cpu_usage_ms / &lt;number of cores&gt; / duration_time_ms * 100.0,


      read_mpbs_max = read_bytes_total_per_second_max / 1024. / 1024.,


      write_mpbs_max = write_bytes_total_per_second_max / 1024. / 1024.,


      read_throughput = delta_read_bytes_total / datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample) / 1024. / 1024.,


      write_throughput = delta_write_bytes_total / datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample) / 1024. / 1024.


      | project TIMESTAMP, group_name, cpu_usage_percent


      | render timechart MonSqlRgHistory


      | where AppName == "{AppName}"


      | where event == "aggregated_resource_pools_plus_history"


      | where pool_name contains "DBId"


      | where NodeName == "{NodeName}"


      | project TIMESTAMP, NodeName, pool_name, target_memory_kb_avg, memory_cap_kb  <tr class="odd">MonDmOsSpinlockStats MonDmOsSpinlockStats | where TIMESTAMP &gt; ago(1d)| where AppName == "{AppName}"|
      where NodeName == "{NodeName}"| where delta_collisions &gt; 100000| project TIMESTAMP , name , delta_collisions , delta_spins , spins_per_collision | render timechart<tr class="even">MonDatabaseMetadataFind
      DB scoped maxdop.MonDatabaseMetadata| where LogicalServerName=~ "{ServerName}" and AppName =~ "{AppName}" //logical_db_name =~ "{DatabaseName}"| where table_name== "sysobjvalues" and valclass ==7
      and objid == 1032 //DB_CONFIG_MAX_DOP | project TIMESTAMP, MAXDOP=value<tr class="odd">MonSqlIdleMemCollectorStats1.       Check potential memory pressure.2.       Check potential memory leaks   MonSqlIdleMemCollectorStats


      | where event == "sql_memory_perf_stats"


      | where AppName == "{AppName}"


      | where NodeName == "{NodeName}"


      | project TIMESTAMP, initial_job_memory_cap_kb=initial_job_memory_cap*8, current_job_memory_cap_kb=current_job_memory_cap*8, node_available_physical_memory_kb=node_available_physical_memory*8, ideal_target_kb=ideal_target*8,
      current_target_kb=current_target*8, memory_usage_kb=memory_usage*8, current_commit_kb=current_commit*8, non_sos_usage_kb=non_sos_usage*8, memory_pressure  Check potential memory leaksMonSqlIdleMemCollectorStats


      | where event == "sql_suspect_memory_clerk_leaks" and estimated_line_slope &gt; 0 and memory_usage_match_line_percent &gt; 0.95


      | project TIMESTAMP, AppName, NodeName, ClusterName, estimated_line_slope, estimated_line_offset, memory_usage_match_line_percent, memory_clerk_type <tr class="even">   '
- id: DB-performance-246
  Topic: MMSOP-Memory-Management-SOPs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/MMSOP-Memory-Management-SOPs.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth LogicalServerName AppName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'let oomApps = MonSQLSystemHealth

      | where AppTypeName == "Worker.ISO.Premium" or AppTypeName == "Worker.ISO"

      | where message contains "Failed allocate pages: FAIL_PAGE_ALLOCATION" or message contains "Failed Virtual Allocate Bytes: FAIL_VIRTUAL_RESERVE"

      | summarize oom_count=count(message) by ClusterName, AppTypeName, AppName, LogicalServerName, NodeName, bin(TIMESTAMP, 15m);

      let singleDbApps = MonDmDbResourceGovernance

      | where AppTypeName == "Worker.ISO.Premium" or AppTypeName == "Worker.ISO"

      | where slo_name !startswith "M"

      | summarize by ClusterName, AppTypeName, AppName, LogicalServerName, NodeName, slo_name;

      let oomSingleDbs = oomApps

      | join kind= inner (singleDbApps) on ClusterName, AppTypeName, AppName, LogicalServerName, NodeName

      | project-away ClusterName1, AppTypeName1, AppName1, LogicalServerName1, NodeName1;'
