      | where avg_used_mem_pct > 90 and count_ > 2

      | join kind = leftouter ('
- id: DB-performance-752
  Topic: PPBOT-043-Login-pool-high-memory-alert
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-043-Login-pool-high-memory-alert.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonDmOsMemoryClerks LogicalServerName AppName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsMemoryClerks
    ExecutedQuery: 'MonDmOsMemoryClerks

      | where [''type''] == "USERSTORE_TOKENPERM" and name == "TokenAndPermUserStore"

      | project TIMESTAMP , [''type''] , pages_kb, AppName, LogicalServerName, NodeName, ClusterName, code_package_version

      | summarize avg(pages_kb) by AppName, LogicalServerName, NodeName, ClusterName, code_package_version

      ) on LogicalServerName, AppName, NodeName

      | extend high_token_perm = avg_pages_kb * 1.0 / avg_used_memory_kb > 0.9

      | extend routing_team = iff(high_token_perm == true and min_max_memory_percent>= 35, "Security", "Performance")

      | extend avg_used_memory_mb = avg_used_memory_kb / 1024

      | extend avg_max_memory_mb = avg_max_memory_kb / 1024'
- id: DB-performance-753
  Topic: PPBOT-043-Login-pool-high-memory-alert
