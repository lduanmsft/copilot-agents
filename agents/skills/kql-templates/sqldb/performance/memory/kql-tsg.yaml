      | extend ClusterShortName = extract(''(.*?)[.](.*?)[.]'', 2, tostring(ClusterName))

      | where total >5000000

      | join (

      cluster(clusterName).database(databaseName).MonDatabaseMetadata

      | where table_name == "sysidxstats" and (type == 5 or type == 6)

      | summarize by AppName, LogicalServerName

      | project AppName

      ) on AppName

      | summarize by AppName, ClusterName, SubscriptionId , NodeName, ClusterShortName, LogicalServerName

      | project

      LogicalServerName,

      AppName,

      ClusterShortName,

      ''Select-SqlAzureEnvironment Prod; '',

