  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsMemoryClerks
    ExecutedQuery: 'MonDmOsMemoryClerks

      | where LogicalServerName =~ "{ServerName}" and NodeName == "{NodeName}"

      | where TIMESTAMP  > ago({TimeRange})

      | where TIMESTAMP  < now()

      | where [''type''] in ("MEMORYCLERK_SQLQERESERVATIONS","MEMORYCLERK_SQLBUFFERPOOL","MEMORYCLERK_XTP","MEMORYCLERK_SQLQUERYEXEC")

      | summarize sum(pages_kb) by bin(TIMESTAMP, 10s), [''type''], NodeName

      | render timechart'
- id: DB-performance-266
  Topic: Query-with-High-Memory-Grants
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Query-with-High-Memory-Grants.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonQPTelemetry LogicalServerName Ratio query_hash
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQPTelemetry
    ExecutedQuery: 'MonQPTelemetry

      | where LogicalServerName =~ "{ServerName}"

      | where telemetry_package_name == "QueryMemoryGrantEventInfo"

      | extend QueryMemoryGrantEventInfoJson = parsejson(extract(''{"QueryMemoryGrantEventInfo":(.*)}'', 1, telemetry_package_json))

      | extend IdealMemoryMb = QueryMemoryGrantEventInfoJson.IdealMemory / 1024.0

      | extend GrantedMemoryMb = QueryMemoryGrantEventInfoJson.GrantedMemory / 1024.0

      | extend MaxUsedMemoryMb = QueryMemoryGrantEventInfoJson.MaxUsedMemory / 1024.0

      | extend Ratio = GrantedMemoryMb /MaxUsedMemoryMb

      | where GrantedMemoryMb > 100

      | project query_hash, query_plan_hash, IdealMemoryMb, GrantedMemoryMb, MaxUsedMemoryMb, Ratio'
