      | where name contains "InMemXdbLoginPool" and max_memory_kb > 0

      | project TIMESTAMP, used_memory_kb, max_memory_kb, max_memory_percent, AppName , LogicalServerName, NodeName, ClusterName

      | summarize avg(used_memory_kb), avg(max_memory_kb), min(max_memory_percent), count() by LogicalServerName, AppName, NodeName, ClusterName

