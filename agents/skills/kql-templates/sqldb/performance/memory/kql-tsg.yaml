- id: DB-performance-402
  Topic: MM0007-Investigating-SOS-Target-Values
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Memory/MM0007-Investigating-SOS-Target-Values.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonSqlIdleMemCollectorStats event AppName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlIdleMemCollectorStats
    ExecutedQuery: 'MonSqlIdleMemCollectorStats

      | where AppName == _appName and NodeName == _nodeName

      | where originalEventTimestamp between (_startTime .. _endTime)

      | where event == "sql_memory_perf_stats"

      | extend current_job_memory_cap_mb=current_job_memory_cap * 8 / 1024

      | extend non_sos_usage_mb=non_sos_usage * 8 / 1024

      | extend current_commit_mb=current_commit * 8 / 1024

      | extend current_target_mb = current_target * 8 / 1024

      | extend ideal_target_mb = current_job_memory_cap_mb - max_of(_minSosGapWithJobMemLimitMB, non_sos_usage_mb + _jobLowMemorySignalThresholdMB)

      | extend low_mem_signal_mb = current_job_memory_cap_mb - non_sos_usage_mb - _jobLowMemorySignalThresholdMB

      | extend high_mem_signal_mb = current_job_memory_cap_mb - max_of(_minSosGapWithJobMemLimitMB, non_sos_usage_mb + _jobLowMemorySignalThresholdMB * 2)

      | project

      TIMESTAMP,

      current_job_memory_cap_mb,

      current_commit_mb,

      current_target_mb,

      ideal_target_mb,

      low_mem_signal_mb'
