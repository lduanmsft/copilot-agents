      &gt; datetime(2018-06-06 01:30) and PreciseTimeStamp &lt; datetime(2018-06-06 07:30)| where AppName == "{AppName}" | where NodeName == "{NodeName}"| where pool_id == 2000000012| project TIMESTAMP,
