- id: DB-performance-757
  Topic: PPBOT-049-High-Cpu-Usage-Node
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-049-High-Cpu-Usage-Node.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName app_cpu
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where event == "cpu_total_load_cap_per_core" and NodeName startswith "DB"

      | where originalEventTimestampTo > ago(20m)

      | summarize avg(toint(node_used_commit_mem_mb)) , avg(toint(node_total_commit_mem_mb)) , any(node_sku),

      avg_node_user_cpu_usage = avg(iff(isnull(node_user_cpu_usage) or node_user_cpu_usage == "", 0, node_user_cpu_usage)) by ClusterName , NodeName

      | extend memory_usage_percentage = avg_node_used_commit_mem_mb * 1.0 / avg_node_total_commit_mem_mb

      | where memory_usage_percentage < 0.5 and avg_node_user_cpu_usage < 0.5 * iff(any_node_sku contains "G3", 1400 , iff(any_node_sku contains "G4", 2200, iff(any_node_sku contains "G5", 7200, 2800)))

      | summarize (least_cpu_node_load, least_cpu_node) = argmin(avg_node_user_cpu_usage, NodeName) by ClusterName

      ) on ClusterName

      | project ClusterName , NodeName , delta_cpu , app_uri, app_cpu, app_memory, least_cpu_node, least_cpu_node_load

      | extend app_move_cas_command = iff(isnull(least_cpu_node) or least_cpu_node == "",

      "No available node found in current TR. Following MSSOP0021 to move app to the other TR.",

      strcat("Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, " | Move-Replica -ApplicationUri ", app_uri, " -TargetNodeName ", least_cpu_node))

      | extend app_move_sf_command = iff(isnull(least_cpu_node) or least_cpu_node == "", "",

      strcat("Move-ServiceFabricPrimaryReplica -NodeName ", NodeName, " -ServiceName ''marker_service_name'' -IgnoreConstraints $true"))'
- id: DB-performance-778
  Topic: Query-to-get-ww-status
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/Query-to-get-ww-status.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonCapacityTenantSnapshot ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCapacityTenantSnapshot
    ExecutedQuery: 'cluster(clusterName).database(databaseName).MonCapacityTenantSnapshot

      | where TIMESTAMP >= ago(2h)

      | where tenant_ring_name startswith ''tr''

      | where tenant_ring_name !contains ''mscds''

      | extend cores_cap = iff(total_cpu_capacity < current_cpu_capacity, total_cpu_capacity, current_cpu_capacity)/100000.0 * sellable_ratio_percentage/100.0

      | extend cores_load = used_cpu_capacity/100000.0 * overbooking_ratio_percentage/100.0

      | extend cores_left = (cores_cap - cores_load)

      | extend factor = iff(vm_size == ''SQLG5'', 2.0, 1.0)

      | summarize arg_max(TIMESTAMP, vm_size, placement_affinity_tag, FabricClusterName=toupper(fabric_controller_name), tenant_name, total_cores = cores_cap/factor, remaining_cores = cores_left/factor)
      by tenant_ring_name

      | join Upgraded on $left.tenant_name == $right.TenantName

      | parse tenant_ring_name with * ''.'' region_name

      | join kind = leftouter (

      cluster(clusterName).database(databaseName).MonMLWDHealthProperties

      | where PropertyName contains "" "AcceleratedNetworking:"

      | where Message contains "OK"

      | project tenant_ring_name = ClusterName

      | distinct tenant_ring_name

      | extend sriov = 1

      ) on tenant_ring_name

      // Gets the number of cold instances per tenant ring

      //| join kind=leftouter (queryClusterColdInstances(clusterName, databaseName)) on tenant_ring_name

      //| project FabricClusterName, tenant_ring_name, region_name, vm_size, placement_affinity_tag, slo_size, affected_cold, total_cpu_load_cap_cold, affected_very_cold, total_cpu_load_cap_very_cold, affected_extremely_cold,
      total_cpu_load_cap_extremely_cold, max_replicas

      | join kind=inner (queryClusterHotInstances(clusterName, databaseName)) on tenant_ring_name

      | project FabricClusterName, tenant_ring_name, sriov, tenant_name, region_name, vm_size, placement_affinity_tag, affected_mild, total_cpu_load_cap_mild, affected_hot, total_cpu_load_cap_hot, affected_very_hot,
      total_cpu_load_cap_very_hot, max_replicas'
- id: DB-performance-817
  Topic: SQP001-Socrates-QP-Pushdown-Overview
  Source: TSG-SQL-DB-Performance/content/Socrates-QP-Pushdown/SQP001-Socrates-QP-Pushdown-Overview.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonSocratesQp event LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocratesQp
    ExecutedQuery: 'MonSocratesQp

      | where originalEventTimestamp > ago(1d)

      | where LogicalServerName =~ ''{LogicalServerName}''

      | where logical_database_guid =~ ''{LogicalDatabaseGuid}''

      | where event == ''hyperscale_pushdown_aggregated_stats''

      | extend query_hash = strcat("0x", toupper(tohex(query_hash,16)))

      | extend query_plan_hash = strcat("0x", toupper(tohex(query_plan_hash,16)))

      | project originalEventTimestamp

      , session_id, query_hash, query_plan_hash, node_id, physical_operator, has_filter, dop

      , sent_requests, succeeded_requests, failed_requests

      , sent_subrequests, succeeded_subrequests, retried_subrequests, failed_subrequests

      , num_pages_pushed, pushed_page_server_reads, pushed_rows_read, pushed_rows_returned, response_size_bytes, used_pages_peak

      , rbpex_hits_pushed, pages_never_pushed, single_rows_retried, ranges_retried, logical_reads, rows_returned

      , duration_ms, cpu_time_ms'
