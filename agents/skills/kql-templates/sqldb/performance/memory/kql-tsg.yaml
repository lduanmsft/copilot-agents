- id: DB-performance-406
  Topic: Recent-known-leaks-impact-SQL-DBs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Memory/Recent-known-leaks-impact-SQL-DBs.md
  Prompts:
  - SQL DB SQL system health
