- id: DB-performance-315
  Topic: CPU001-CPU-Troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/CPU/CPU001-CPU-Troubleshooting.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonCounterOneMinute NodeName ClusterName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'MonCounterOneMinute

      | where TIMESTAMP > datetime({StartTime}) and TIMESTAMP < datetime({EndTime})

      | where NodeName =~ "{NodeName}" and ClusterName =~ "{ClusterName}"

      | extend Category = case(CounterName =~ @"MemoryAvailable MBytes", "Memory",

      strlen(extract(@"Processor([0-9]{1,2})% (Privileged Time|Processor Time)", 0, CounterName, typeof(string))) >0, "Processor",

      strlen(extract(@"Processor(_Total)% (Processor Time|Privileged Time)", 0, CounterName, typeof(string))) >0, "Total Processor",

      strlen(extract(@"LogicalDisk([A-Z]:)Avg. Disk sec/(Read|Write)", 0, CounterName, typeof(string))) >0, "Disk", "Other")

      | where Category !in ( "Other", "Memory", "Disk")

      | summarize avg(CounterValue) by bin(TIMESTAMP, 5min), CounterName, Category

      | render timechart'
- id: DB-performance-325
  Topic: CPU102-Readable-Secondary-CPU-troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/CPU/CPU102-Readable-Secondary-CPU-troubleshooting.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB query_hash database_name LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: '//*MonDmRealTimeResourceStats


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"


      | where replica_type == 0


      | summarize avg(avg_cpu_percent) , avg(avg_data_io_percent), avg(avg_log_write_percent), avg(avg_memory_usage_percent) by bin(TIMESTAMP, 1min)


      | render timechart  <tr class="even">Q3 -- Query text form Query Hash using DMV-- Insert desired &lt;query_hash&gt; belowselect getdate() runtime, * from(SELECT query_stats.query_hash,       SUM(query_stats.total_worker_time)
      ''total_worker_time'',                SUM(query_stats.execution_count) ''execution_count'',                sum(total_logical_reads) ''total_logical_reads'',    REPLACE (REPLACE (MIN(query_stats.statement_text),  CHAR(10),
      '' ''), CHAR(13), '' '') AS "Statement_Text"  FROM       (SELECT QS.*,       SUBSTRING(ST.text, (QS.statement_start_offset/2) + 1,      ((CASE statement_end_offset           WHEN -1 THEN DATALENGTH(ST.text)          ELSE
      QS.statement_end_offset END               - QS.statement_start_offset)/2) + 1) AS statement_text       FROM sys.dm_exec_query_stats AS QS       CROSS APPLY sys.dm_exec_sql_text(QS.sql_handle) as ST)
      as query_stats                   group by query_hash) t                where query_hash=&lt;query_hash&gt;) '
