- id: DB-performance-31
  Topic: IHS-Memory-knob-tuning
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/IHS-Memory-knob-tuning.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonSqlIdleMemCollectorStats event AppName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - NodeName
  - ServerName
  KustoQueries:
  - TableName: MonSqlIdleMemCollectorStats
    ExecutedQuery: 'MonSqlIdleMemCollectorStats

      | where AppName ==  "<p_appName>" and NodeName ==  \"{NodeName}\"

      | where event== "sql_memory_perf_stats"

      | where TIMESTAMP between (<p_startTime> ... <p_endTime>)

      | extend overcommit= case(current_commit>current_target current_commit-current_target,0)

      | extend overcommit_mb = overcommit/128.0

      | extend non_sos_usage_mb = non_sos_usage / 128.0

      | project TIMESTAMP, non_sos_usage_mb, overcommit_mb

      | render  timechart'
- id: DB-performance-42
  Topic: Incident-39825673-Leak-in-MEMORYCLERK_SQLQUERYEXE-1
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Incident-39825673-Leak-in-MEMORYCLERK_SQLQUERYEXE-1.md
  Prompts:
