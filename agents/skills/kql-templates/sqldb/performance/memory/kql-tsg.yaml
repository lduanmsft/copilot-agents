      | where AppName == _appName

      | where NodeName == _nodeName

      | where TIMESTAMP between (_startTime .. _endTime)

      | where store_type == "CACHESTORE_OBJCP"

      | where event == "clock_hand_stats"

      | order by clock_hand_id, TIMESTAMP asc

