- id: DB-performance-30
  Topic: IHS-Memory-knob-tuning
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/IHS-Memory-knob-tuning.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonInstanceHistoryStore event AppName p_appName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonInstanceHistoryStore
    ExecutedQuery: 'MonInstanceHistoryStore

      | where AppName contains  "<p_appName>"

      | where event == "ihs_analytics" and scenario_name == "ihs_mem_usage"

