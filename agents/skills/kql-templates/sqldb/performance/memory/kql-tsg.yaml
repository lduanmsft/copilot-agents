- id: DB-performance-27
  Topic: IHS-Memory-knob-tuning
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/IHS-Memory-knob-tuning.md
  Prompts:
  - SQL DB instance history store analysis
  - SQL DB MonInstanceHistoryStore event LogicalServerName
  - SQL DB investigate instance history store
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonInstanceHistoryStore
    ExecutedQuery: 'MonInstanceHistoryStore

      | where TIMESTAMP between (datetime(''{p_startTime}'')..datetime(''{p_endTime}''))

      | where AppName == ''{p_appname}''

      | where event == "ihs_apply"

      | where scenario_name == "ihs_mem_usage"

      | project TIMESTAMP, ClusterName, NodeName, MachineName, LogicalServerName, AppName, AppTypeName,

      scenario_name, config_name, ihs_recommended_uint64_val, previous_uint64_val, is_tuned, tuning_skipped_reason'
