- id: DB-performance-19
  Topic: CRI-DBHS-Mitigate-T49-MdmTarget-memory-leak
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/CRI-DBHS-Mitigate-T49-MdmTarget-memory-leak.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonDmDbHadrReplicaStates AppName AppTypeName
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbHadrReplicaStates
    ExecutedQuery: 'MonDmDbHadrReplicaStates

      | where TIMESTAMP > ago(30m)

      | where AppName == "{AppName}"

      | where is_primary_replica == 0

      | where database_state_desc != ""

      | summarize by ClusterName, AppName, AppTypeName, NodeName

      | extend appUri = strcat("fabric:/", AppTypeName, "/", AppName)

      | extend prefix = split(split(NodeName, ".")[0], "_")[1]

      | extend query = strcat(''Kill-Process2 -FabricNode '', NodeName, '' -NodeClusterName '', prefix, ''.'', ClusterName, '' -ProcessName sqlservr.exe -ApplicationNameUri '', ''"'', appUri, ''"'' )

      | project query'
