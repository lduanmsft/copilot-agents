- id: DB-performance-219
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB rg history latency
  - SQL DB MonSqlRgHistory event AppName NodeName type_desc
  - SQL DB troubleshoot rg history latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: "MonSqlRgHistory\n\n| where AppName == \"{AppName}\" // and NodeName == \"{NodeName}\"\n\n//| where physical_database_name =~ \"{physical_database_id}\" // user database\n\n| where database_id\
      \ == 2 //tempdb\n\n| where (end_aggregated_sample &gt;= datetime({StartTime}) and end_aggregated_sample &lt;= datetime({EndTime}))\n\n// or end_aggregated_sample &gt;= datetime({StartTime2}) and end_aggregated_sample\
      \ &lt;= datetime({EndTime2})\n\n| where event == 'aggregated_virtual_files_io_history'\n\n| where type_desc =~ \"ROWS\"\n\n//| where delta_num_of_reads &gt; 0 and delta_num_of_writes &gt; 0\n\n| extend\
      \ IOStallMsPerIO = round(delta_io_stall*1.0/(delta_num_of_writes + delta_num_of_reads),1)\n\n| extend IOStallWriteMsPerWrite = round(delta_io_stall_write_ms*1.0/delta_num_of_writes,1)\n\n| extend\
      \ IOStallQueueMsPerWrite = round (delta_io_stall_queued_write_ms*1.0/delta_num_of_writes,2)\n\n| extend IOStallQueueMsPerRead = round (delta_io_stall_queued_read_ms*1.0/delta_num_of_reads,2)\n\n|\
      \ extend IOStallReadMsPerRead = round(delta_io_stall_read_ms*1.0/delta_num_of_reads,1)\n\n| extend duration = round(duration_time_ms / 1000.,1)\n\n| extend TotalMbps = round((delta_num_of_bytes_read\
      \ + delta_num_of_bytes_written)/ (duration * 1024.0*1024),1)\n\n| extend ReadMbps = round((delta_num_of_bytes_read )/ (duration * 1024.0*1024),1)\n\n| extend WriteMbps = round((delta_num_of_bytes_written)/\
      \ (duration * 1024.0*1024),1)\n\n| extend KbPerWrite = round(delta_num_of_bytes_written*1.0/delta_num_of_writes/1024.0,1)\n\n| extend KbPerread = round(delta_num_of_bytes_read*1.0/delta_num_of_reads/1024.0,1)\n\
      \n| extend IOStallreadMs_Per_Read_Outside_RG=IOStallReadMsPerRead-IOStallQueueMsPerRead\n\n| extend IOStallreadMs_Per_Write_Outside_RG=IOStallWriteMsPerWrite-IOStallQueueMsPerWrite\n\n| where IOStallMsPerIO&gt;0\
      \ and TotalMbps&gt;0\n\n| project end_utc_date = end_aggregated_sample\n\n,IOStallReadMsPerRead, IOStallWriteMsPerWrite\n\n, IOStallQueueMsPerRead, IOStallQueueMsPerWrite\n\n, IOStallreadMs_Per_Read_Outside_RG,\
      \ IOStallreadMs_Per_Write_Outside_RG\n\n, KbPerWrite, KbPerread, IOStallMsPerIO\n\n, TotalMbps, ReadMbps, WriteMbps\n\n, type_desc\n\n <tr class=\"odd\">CLR related// CLR &amp; Global query\n"
