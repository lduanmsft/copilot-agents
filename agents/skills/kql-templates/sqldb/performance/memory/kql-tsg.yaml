    ExecutedQuery: 'MonRgLoad

      | where event contains "instance_load"

      | where TIMESTAMP > ago(7d) and ClusterName == {ClusterName} and NodeName == {NodeName} | where allocated_cpus == 6144

      | project TIMESTAMP, application_name , code_package_name , service_manifest_name , memory_load , memory_load_cap

      | where application_name == "fabric:/Worker" and code_package_name == "Host" and service_manifest_name == "Host"

      //| where application_name == "fabric:/Worker" and code_package_name == "Code" and service_manifest_name == "RgManager"

      | summarize any(memory_load), any(memory_load_cap) by bin(TIMESTAMP, 1s)

