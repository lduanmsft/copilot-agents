      new_target_kb=new_target*8 <tr class="even">MonRgLoadTotal process consumption (SOS + non-SOS)MonRgLoad| where application_name has "a0949cb3798d" and event == "instance_load" and code_package_name
      == "Code"| where TIMESTAMP &gt;= ago(1h)| project TIMESTAMP , NodeName, memory_load , memory_load_cap , cpu_load , cpu_load_cap, memory_current_cap, allocated_cpus Affinity is specified in allocated_cpus<tr
