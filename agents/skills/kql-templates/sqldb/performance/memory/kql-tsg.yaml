  - TableName: MonSqlCaches
    ExecutedQuery: 'MonSqlCaches

      | where AppName == _appName and NodeName == _nodeName

      | where TIMESTAMP between (_startTime .. _endTime)

      | where store_type == "CACHESTORE_PHDR"

      | extend store_soft_quota_kb = store_soft_quota * 8.0, store_hard_quota_kb = (store_hard_quota * 8.0)

      | summarize max(cache_pages_kb), min(store_soft_quota_kb), min(store_hard_quota_kb) by bin(TIMESTAMP, 5m), AppName, NodeName

      | extend soft_quota_reached=(max_cache_pages_kb >= min_store_soft_quota_kb), hard_quota_reached=(max_cache_pages_kb >= min_store_hard_quota_kb)

      | project TIMESTAMP, AppName, NodeName, hard_quota_reached

      | render columnchart;'
