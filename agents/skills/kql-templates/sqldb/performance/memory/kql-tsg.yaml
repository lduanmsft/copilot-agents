  - ServerName
  KustoQueries:
  - TableName: MonDmOsMemoryClerks
    ExecutedQuery: 'cluster(clusterName).database(databaseName).MonDmOsMemoryClerks

      | where TIMESTAMP > ago(30min)

      | where ["type"] == "MEMORYCLERK_SQLQUERYEXEC"

      | extend total = pages_kb + virtual_memory_committed_kb

      | project TIMESTAMP, [''type''], total , code_package_version, NodeName, AppName, LogicalServerName, ClusterName, SubscriptionId

