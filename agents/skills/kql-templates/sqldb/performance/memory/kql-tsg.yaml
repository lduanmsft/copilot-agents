- id: DB-performance-420
  Topic: TSGMLD01-Memory-Leak-Detected
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Memory/TSGMLD01-Memory-Leak-Detected.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB sql idle mem collector stats event LogicalServerName AppName AppTypeName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlIdleMemCollectorStats
    ExecutedQuery: 'let startTime = ago(1h); // How long ago to consider

      let endTime = now(); // How recent to consider

      let windowTime = 4h; // The window period from reporting time to calculate the memory growth

      let memoryUsagePercentMin = 0.95; // Min percent that usage matches line

      let percentOfJobCap = 0.10; // Percent of Job Cap that memory has grown required to throw error

      // Query to get the job cap for memory clerks

      let jobCap = MonSqlIdleMemCollectorStats

      | where TIMESTAMP >= startTime and TIMESTAMP <= endTime

      | where event == "sql_memory_perf_stats"

      | summarize by AppName, NodeName, initial_job_memory_cap;

      // Query to get the memory usage for memory clerks

      let memoryClerkStats = MonSqlMemoryClerkStats

      | where TIMESTAMP >= startTime - windowTime and TIMESTAMP <= endTime

      | project statTimestamp = TIMESTAMP, AppName, NodeName, memory_clerk_name, memory_clerk_type, memory_kb = peak_pages_kb + vm_committed_kb;

      // Query to get the list of memory clerk leaks

      let memoryClerkAlerts = MonSqlIdleMemCollectorStats

      | where TIMESTAMP >= startTime and TIMESTAMP  <= endTime

      | where event == "sql_suspect_memory_clerk_leaks"

      and estimated_line_slope > 0

      and memory_usage_match_line_percent >= memoryUsagePercentMin

      and memory_clerk_type !in ("CACHESTORE_PHDR", "MEMORYCLERK_XTP", "MEMORYCLERK_SQLQERESERVATIONS", "NON-SOS MEMORY")

      | join hint.strategy = broadcast kind = inner memoryClerkStats on AppName, NodeName, memory_clerk_type, memory_clerk_name

      | where statTimestamp >= TIMESTAMP - windowTime and statTimestamp <= TIMESTAMP // Keep only rows within window

      | summarize (start_time, start_memory_kb) = arg_min(statTimestamp, memory_kb), (end_time, end_memory_kb) = arg_max(statTimestamp, memory_kb) by AppName, NodeName, ClusterName,

      memory_clerk_name, memory_clerk_type, AppTypeName, LogicalServerName, estimated_line_slope, estimated_line_offset, memory_usage_match_line_percent

      | join kind = inner jobCap on AppName, NodeName

      | extend growth_memory_kb = end_memory_kb - start_memory_kb, memory_load_cap_kb = toreal(initial_job_memory_cap * 8), memory_load_cap_threshold_kb = toreal(initial_job_memory_cap * 8 * percentOfJobCap)

      | where growth_memory_kb > 0 and growth_memory_kb >= memory_load_cap_threshold_kb

      | project start_time, end_time, AppName, NodeName, ClusterName, AppTypeName, LogicalServerName, estimated_line_slope, estimated_line_offset,

      memory_usage_match_line_percent, memory_clerk_name, memory_clerk_type, start_memory_kb, end_memory_kb, growth_memory_kb, memory_load_cap_kb, memory_load_cap_threshold_kb;

      // Non-SOS query to get the initial job cap and the non sos usage for an app

      let nonSos = MonSqlIdleMemCollectorStats

      | where TIMESTAMP >= startTime - windowTime and TIMESTAMP <= endTime

      | where event == "sql_memory_perf_stats"

      | project nonSosTimestamp = TIMESTAMP, AppName, NodeName, initial_job_memory_cap, non_sos_usage;

      // Non-SOS query to get the list of non-sos memory leaks

      let nonSosAlerts = MonSqlIdleMemCollectorStats

      | where TIMESTAMP >= startTime and TIMESTAMP  <= endTime

      | where event == "sql_suspect_memory_clerk_leaks"

      and memory_clerk_type == "NON-SOS MEMORY"

      and memory_clerk_name == "NON-SOS MEMORY"

      and estimated_line_slope > 0

      and memory_usage_match_line_percent >= memoryUsagePercentMin

      | join hint.strategy = broadcast kind = inner nonSos on AppName, NodeName

      | where nonSosTimestamp >= TIMESTAMP - windowTime and nonSosTimestamp <= TIMESTAMP

      | summarize (start_time, start_memory) = arg_min(nonSosTimestamp, non_sos_usage), (end_time, end_memory) = arg_max(nonSosTimestamp, non_sos_usage)

      by AppName, NodeName, ClusterName, memory_clerk_name, memory_clerk_type, AppTypeName, LogicalServerName, estimated_line_slope,

      estimated_line_offset, memory_usage_match_line_percent, initial_job_memory_cap

      | extend start_memory_kb = start_memory * 8, end_memory_kb = end_memory * 8, memory_load_cap_kb = toreal(initial_job_memory_cap * 8)

      | extend growth_memory_kb = end_memory_kb - start_memory_kb, memory_load_cap_threshold_kb = memory_load_cap_kb * percentOfJobCap

      | where growth_memory_kb >= memory_load_cap_threshold_kb

      | project start_time, end_time, AppName, NodeName, ClusterName, AppTypeName, LogicalServerName, estimated_line_slope, estimated_line_offset,

