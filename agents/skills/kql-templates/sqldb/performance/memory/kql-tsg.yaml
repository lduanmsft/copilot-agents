  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSqlIdleMemCollectorStats



      | where event == "sql_memory_perf_stats"



      | where AppName == "{AppName}"



      | where NodeName == "{NodeName}"



      | project TIMESTAMP, non_sos_usage_kb=non_sos_usage*8, current_job_memory_cap_kb=current_job_memory_cap*8





      If no results returned from above query, then it is likely the SQL DB is an sub-core. For sub-core, we don''t emit the event.





      Now check if there was an oom, then estimate non sos usage = Peak Process Memory Used (in by tes) - Target Committed (in KB). If its usage is dominated compared to Job Memory Limit (in by tes), then
      it is non sos usage leak.





      let appName = "{AppName}";



      //let nodeName = "DB.44";



      let tag = "MSR-";



      //let tag = "MSExtra-"; // Uncomment this if you also want to see the extra info



      let MemoryDumpTable = MonSQLSystemHealth



      | where AppName == appName



      //| where NodeName == nodeName



      | where message contains tag



      | extend MSRNumber = strcat(tag, extract(strcat(tag, "([0-9]+)"), 1, message, typeof(int)))



      | project originalEventTimestamp, NodeName, MSRNumber, message;


      '
