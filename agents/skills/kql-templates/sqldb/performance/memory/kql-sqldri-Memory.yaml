  - id: "2.2"
    HandlingFunction: "OOMAnalysis"
    Prompts:
      - "OOM Analysis"
      - "OOM summary"
      - "Did the server have OOM"
      - "Did the server suffer from OOM issue"
    MessageForEmptyKustoResult: "OOM is not detected"
    KustoQueries:
      - TableName: "OOMTable"
        ExecutedQuery: |
          MonSQLSystemHealth
          | where AppName in ({AppNames})
          | where LogicalServerName =~ '{LogicalServerName}'
          | where event == 'summarized_oom_snapshot'
          | where originalEventTimestamp between(datetime({StartTime})..datetime({EndTime}))
          | extend topClerks = parse_json(top_memory_clerks)
          | extend topPools = parse_json(top_memory_pools)
          | extend non_sos_usage_pct = non_sos_usage_mb * 100 / current_job_cap_mb
          | extend oom_pool_name = parse_json(oom_memory_pool).pool_name
          | extend is_oom_pool_system_pool = oom_pool_name !contains "SloSharedPool" and  oom_pool_name !contains "UserPool"
          | extend oom_cause = iff(non_sos_usage_pct  < 60 and oom_factor == 5 and is_oom_pool_system_pool, 10, oom_cause)
          | extend oomCause = case(oom_cause == 1, 'HEKATON_POOL_MEMORY_LOW', oom_cause == 2, 'MEMORY_LOW', oom_cause == 3, 'OS_MEMORY_PRESSURE',
          oom_cause == 4, 'OS_MEMORY_PRESSURE_SQL', oom_cause == 5, 'NON_SOS_MEMORY_LEAK', oom_cause == 6, 'SERVERLESS_MEMORY_RECLAMATION',
          oom_cause == 7, 'MEMORY_LEAK', oom_cause == 8, 'SLOW_BUFFER_POOL_SHRINK', oom_cause == 9, 'INTERNAL_POOL', oom_cause == 10, 'SYSTEM_POOL',
          oom_cause == 11, 'QUERY_MEMORY_GRANTS', oom_cause == 12, 'REPLICAS_AND_AVAILABILITY', 'UNKNOWN')
          | extend oom_factor_desc = case(
          oom_factor == 0, "Undefined",
          oom_factor == 1, "AllocationPotential",
          oom_factor == 2, "BlockAllocator",
          oom_factor == 3, "EscapeTimeout",
          oom_factor == 4, "FailFast",
          oom_factor == 5, "MemoryPool",
          oom_factor == 6, "EmergencyAllocator",
          oom_factor == 7, "VirtualAlloc",
          oom_factor == 8, "Simulated",
          oom_factor == 9, "BufAllocator",
          oom_factor == 10, "QueryMemQueue",
          oom_factor == 11, "Fragment",
          oom_factor == 12, "InitDescriptor",
          oom_factor == 13, "MemoryPoolPressure", "Unknown")
          | extend top1Pool=tostring(topPools[0]['pool_name'])
          | extend top2Pool=tostring(topPools[1]['pool_name'])
          | extend top1Clerk=tostring(topClerks[0]['clerk_type_name']),top1Clerk_size_mb=tolong(topClerks[0]['page_allocated_mb'])+tolong(topClerks[0]['vm_committed_mb'])
          | extend top2Clerk=tostring(topClerks[1]['clerk_type_name']),top2Clerk_size_mb=tolong(topClerks[1]['page_allocated_mb'])+tolong(topClerks[1]['vm_committed_mb'])
          | extend ratioOftop1_jobCap=round(top1Clerk_size_mb*100.0/current_job_cap_mb,1)
          | extend ratioOftop2_jobCap=round(top2Clerk_size_mb*100.0/current_job_cap_mb,1)
          | summarize oomCount=count(),LastTime=max(originalEventTimestamp), FirstTime=arg_min(originalEventTimestamp,NodeName, is_non_sos_usage_leaked, oom_factor,oom_factor_desc, top1Clerk,top1Clerk_size_mb,ratioOftop1_jobCap,top2Clerk, top2Clerk_size_mb,ratioOftop2_jobCap,top2Pool,
          oom_memory_pool,available_physical_memory_mb, current_job_cap_mb, process_memory_usage_mb,
          non_sos_usage_mb, committed_target_mb, committed_mb, allocation_potential_memory_mb) by oomCause,top1Pool,top1Clerk
          | order by oomCount desc nulls first
        DisplayedQuery: |
          MonSQLSystemHealth
          | where AppName in ({AppNames})
          | where LogicalServerName =~ '{LogicalServerName}'
          | where event == 'summarized_oom_snapshot'
          | where originalEventTimestamp between(datetime({StartTime})..datetime({EndTime}))
          | extend topClerks = parse_json(top_memory_clerks)
          | extend topPools = parse_json(top_memory_pools)
          | extend non_sos_usage_pct = non_sos_usage_mb * 100 / current_job_cap_mb
          | extend oom_pool_name = parse_json(oom_memory_pool).pool_name
          | extend is_oom_pool_system_pool = oom_pool_name !contains "SloSharedPool" and  oom_pool_name !contains "UserPool"
          | extend oom_cause = iff(non_sos_usage_pct  < 60 and oom_factor == 5 and is_oom_pool_system_pool, 10, oom_cause)
          | extend oomCause = case(oom_cause == 1, 'HEKATON_POOL_MEMORY_LOW', oom_cause == 2, 'MEMORY_LOW', oom_cause == 3, 'OS_MEMORY_PRESSURE',
          oom_cause == 4, 'OS_MEMORY_PRESSURE_SQL', oom_cause == 5, 'NON_SOS_MEMORY_LEAK', oom_cause == 6, 'SERVERLESS_MEMORY_RECLAMATION',
          oom_cause == 7, 'MEMORY_LEAK', oom_cause == 8, 'SLOW_BUFFER_POOL_SHRINK', oom_cause == 9, 'INTERNAL_POOL', oom_cause == 10, 'SYSTEM_POOL',
          oom_cause == 11, 'QUERY_MEMORY_GRANTS', oom_cause == 12, 'REPLICAS_AND_AVAILABILITY', 'UNKNOWN')
          | extend oom_factor_desc = case(
          oom_factor == 0, "Undefined",
          oom_factor == 1, "AllocationPotential",
          oom_factor == 2, "BlockAllocator",
          oom_factor == 3, "EscapeTimeout",
          oom_factor == 4, "FailFast",
          oom_factor == 5, "MemoryPool",
          oom_factor == 6, "EmergencyAllocator",
          oom_factor == 7, "VirtualAlloc",
          oom_factor == 8, "Simulated",
          oom_factor == 9, "BufAllocator",
          oom_factor == 10, "QueryMemQueue",
          oom_factor == 11, "Fragment",
          oom_factor == 12, "InitDescriptor",
          oom_factor == 13, "MemoryPoolPressure", "Unknown")
          | extend top1Pool=tostring(topPools[0]['pool_name'])
          | extend top2Pool=tostring(topPools[1]['pool_name'])
          | extend top1Clerk=tostring(topClerks[0]['clerk_type_name']),top1Clerk_size_mb=tolong(topClerks[0]['page_allocated_mb'])+tolong(topClerks[0]['vm_committed_mb'])
          | extend top2Clerk=tostring(topClerks[1]['clerk_type_name']),top2Clerk_size_mb=tolong(topClerks[1]['page_allocated_mb'])+tolong(topClerks[1]['vm_committed_mb'])
          | extend ratioOftop1_jobCap=round(top1Clerk_size_mb*100.0/current_job_cap_mb,1)
          | extend ratioOftop2_jobCap=round(top2Clerk_size_mb*100.0/current_job_cap_mb,1)
          | project originalEventTimestamp,NodeName, is_non_sos_usage_leaked, oom_factor,oom_factor_desc, oomCause,top1Pool, top1Clerk,top1Clerk_size_mb,ratioOftop1_jobCap,top2Clerk, top2Clerk_size_mb,ratioOftop2_jobCap,top2Pool,
          oom_memory_pool,available_physical_memory_mb, current_job_cap_mb, process_memory_usage_mb,
          non_sos_usage_mb, committed_target_mb, committed_mb, allocation_potential_memory_mb
          | summarize count(),LastTime=max(originalEventTimestamp), FirstTime=arg_min(originalEventTimestamp, is_non_sos_usage_leaked, oom_factor,oom_factor_desc,top1Clerk_size_mb,ratioOftop1_jobCap,top2Clerk, top2Clerk_size_mb,ratioOftop2_jobCap,top2Pool,
          oom_memory_pool,available_physical_memory_mb, current_job_cap_mb, process_memory_usage_mb,
          non_sos_usage_mb, committed_target_mb, committed_mb, allocation_potential_memory_mb) by oomCause,top1Pool,top1Clerk,NodeName
          | project-reorder FirstTime,LastTime,count_
          | order by count_ desc nulls first
    TSGs:
      - Title: "TSG:MM0001-8 Summarized OOM snapshot"
        Link: "https://aka.ms/OOM_Debug_TSG"
