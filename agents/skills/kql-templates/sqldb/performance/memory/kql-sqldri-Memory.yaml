  - id: "2.4"
    Prompts:
      - "SLOW_BUFFER_POOL_SHRINK"
      - "SLOW BUFFER POOL SHRINK"
    MessageForEmptyKustoResult: |
      The issue was due to a result of memory overcommit. Some workloads might require a large amount of memory in a short period of time. In order to compensate for this large memory growth, SQL engine will try to shrink cache memory such as Buffer Pool. However, there are times when the memory growth exceeds the rate that SQL engine can shrink the cache memory.
      When this scenario occurs, overall memory usage might hit the memory resource cap assigned to the database which results in an Out of Memory. To mitigate this issue, we need to increased config setting JobLowMemorySignalThresholdMB which will allow SQL engine to proactively shrink cache memory so that Out of Memory will be best prevented. And you may also try to enable auto-adjusts feature(IHS) that this config based on amount of memory requested by workload.
      SqlSOS team is also working on other improvements that would handle the sudden burst of memory requests better without causing any unavailability.

  - id: "2.4"
    IsPublicSkill: false
    IsDisplayKustoQueryResult: true
    Prompts:
      - "USERSTORE_SXC"
    MessageForEmptyKustoResult: "No data was returned from MonWiQueryParamData"
    KustoQueries:
      - TableName: "MonSqlMemoryClerkStats_SpecificClerk"
        ExecutedQuery: |
          MonWiQueryParamData
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName =~'{ServerName}'
          | where originalEventTimestamp between (datetime({startTime})..datetime({endTime}))
          | project PreciseTimeStamp,query_hash,parameterized_values_count
          | order by parameterized_values_count
          | take 10
        DisplayedQuery: |
          MonWiQueryParamData
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName =~'{ServerName}'
          | where originalEventTimestamp between (datetime({startTime})..datetime({endTime}))
          | project PreciseTimeStamp,query_hash,parameterized_values_count
          | order by parameterized_values_count
          | take 10
    QuestionToAI: |-
      ### Rules
      1. Set {{IssueDetected}} to 'true'.
      2. Set {{ResultMessage}} to "Large USERSTORE_SXC was a User workload issue. Please engage customer to tune their queries: The amount of memory allocated to store a request in SQL Server depends on:
      The batch size (number of RPCs per request).
      The number of parameters used in the T-SQL.
      The type of parameters. For certain types of parameters (for example, sql_variant), SQL Server can save the requests in memory in a potentially inefficient manner. When a client sends a large batch of requests that use these types of parameters, multiple RPCs can be sent in one request. In this scenario, the server accumulates the whole request in memory before it's executed. This could potentially lead to the 701 error discussed in Symptoms.".
    TSGs:
      - Title: "TSG:mm0001-7-large-userstore_sxc-usage"
        Link: "https://eng.ms/docs/cloud-ai-platform/azure-data/azure-data-azure-databases/sql-/sql-db-performance-queue-common-tsgs/self-help-tsgs/memory/mm0001-7-large-userstore_sxc-usage"

  - id: "2.4"
    IsPublicSkill: false
    Prompts:
      - "Memory usage of MemoryClerk PLACEHOLDER"
      - "Usage of MemoryClerk PLACEHOLDER"
      - "Memory usage of clerk PLACEHOLDER"
      - "Memory usage of clerk MEMORYCLERK_SQLBUFFERPOOL"
    CustomizedParameters:
      - "memory_clerk_type"
    KustoQueries:
      - TableName: "MonSqlMemoryClerkStats_SpecificClerk"
        ExecutedQuery: |
          let AggInterval_do_NOT_change = time(5m);
          MonSqlMemoryClerkStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName=~'{LogicalServerName}'
          | where {CustomizedParametersPlaceholder}
          | summarize MemoryInMB=sum(pages_kb)/1024 by bin(originalEventTimestamp, AggInterval_do_NOT_change), memory_clerk_type
        DisplayedQuery: |
          let AggInterval_do_NOT_change = time(5m);
          MonSqlMemoryClerkStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName=~'{LogicalServerName}'
          | where {CustomizedParametersPlaceholder}
          | summarize MemoryInMB=sum(pages_kb)/1024 by bin(originalEventTimestamp, AggInterval_do_NOT_change), memory_clerk_type
          | render timechart
    MessageForEmptyKustoResult: "MonSqlMemoryClerkStats doesn't have data"

  - id: "2.4"
    IsPublicSkill: false
    Prompts:
      - "Usage of CacheStore store_type PLACEHOLDER"
    CustomizedParameters:
      - "store_type"
    MessageForEmptyKustoResult: "MonSqlCaches doesn't have data"
    KustoQueries:
      - TableName: "MonSqlCaches_Usage_OF_Specificstore_type"
        ExecutedQuery: |
          let AggInterval_do_NOT_change = time(5m);
          MonSqlCaches
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName=~'{LogicalServerName}'
          | where {CustomizedParametersPlaceholder}
          | where event == "clock_hand_stats"
          | order by clock_hand_id, TIMESTAMP asc
          | where clock_hand_id == prev(clock_hand_id)
          | extend delta_entries_evicted = max_of(removed_all_rounds - prev(removed_all_rounds), 0)
          | summarize sum(delta_entries_evicted) by bin(TIMESTAMP, AggInterval_do_NOT_change), clock_hand_id
          | project TIMESTAMP, tostring(clock_hand_id), sum_delta_entries_evicted
        DisplayedQuery: |
          let AggInterval_do_NOT_change = time(5m);
          MonSqlCaches
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName=~'{LogicalServerName}'
          | where {CustomizedParametersPlaceholder}
          | where event == "clock_hand_stats"
          | order by clock_hand_id, TIMESTAMP asc
          | where clock_hand_id == prev(clock_hand_id)
          | extend delta_entries_evicted = max_of(removed_all_rounds - prev(removed_all_rounds), 0)
          | summarize sum(delta_entries_evicted) by bin(TIMESTAMP, AggInterval_do_NOT_change), clock_hand_id
          | project TIMESTAMP, tostring(clock_hand_id), sum_delta_entries_evicted
          | render timechart
    SubSqlSkills:
      - id: "4.18"
        ExecutedWhenParentIssueDetected: true
        IsKusto: true
        AlwaysDisplayResult: true
        Reasoning: "As Cache Store entries were purge, we are going to check if Instance level cache store size limit is reached"
        Prompts:
          - "Instance level cache store size limit"
      - id: "4.18"
        ExecutedWhenParentIssueDetected: true
        IsKusto: true
        AlwaysDisplayResult: true
        Reasoning: "As Cache Store entries were purge, we are going to check if entry limit is reached"
        Prompts:
          - "CacheStore store_type PLACEHOLDER entry limit"

  - id: "2.4"
    IsPublicSkill: false
    Prompts:
      - "CacheStore store_type PLACEHOLDER entry limit"
    CustomizedParameters:
      - "store_type"
    MessageForEmptyKustoResult: "The store cache has not reached its entry limit."
    KustoQueries:
      - TableName: "MonSqlCaches_NumberofEntryLimit"
        ExecutedQuery: |
          let AggInterval_do_NOT_change = time(5m);
          MonSqlCaches
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName=~'{LogicalServerName}'
          | where {CustomizedParametersPlaceholder}
          | where event == "clock_hand_stats"
          | summarize max(store_entries), max(entries_soft_quota) by originalEventTimestamp , store_type
          | where max_store_entries >max_entries_soft_quota
          | summarize count()
          | where count_>0
          | extend purgeStatus=strcat("The store cache has reached its entry limit", count_," time(s), that has causes internal memory pressure and lead the cache entries be purged")
          | project purgeStatus
        DisplayedQuery: |
          let AggInterval_do_NOT_change = time(5m);
          MonSqlCaches
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName=~'{LogicalServerName}'
          | where {CustomizedParametersPlaceholder}
          | where event == "clock_hand_stats"
          | summarize max(store_entries), max(entries_soft_quota) by originalEventTimestamp , store_type
          | where max_store_entries >max_entries_soft_quota
          | take 10
    QuestionToAI: |-
      -  {{exceededLimitStatus}}, the data type is String.

      ### Rules
      1. Store the value of exceededLimitStatus column to {{exceededLimitStatus}}.
      2. Set {{IssueDetected}} to 'true'.
      3. Set {{ResultMessage}} to exceededLimitStatus.

  - id: "2.4"
    Prompts:
      - "instance level cache store size limit"
    MessageForEmptyKustoResult: "instance level internal cache size limit is not reached."
    KustoQueries:
      - TableName: "MonSqlIdleMemCollectorStats_instanceLevelInternalCacheSizeLimit"
        ExecutedQuery: |
          let ExceededLimitStatus = (countOfExceedLimit:int,countOfNegativeAllocationPotentialWhenExceedLimit:int)
          {
          let exceededLimitStatus=iif(countOfExceedLimit>0,strcat("The size of internal caches exceeded the cache limit ",countOfExceedLimit," time(s)"),"Internal caches didn't exceed the size cache limit");
          let negativeAllocationPotentialStatus=case(countOfNegativeAllocationPotentialWhenExceedLimit>0,strcat(", while AllocationPotential dropped to negative ",countOfNegativeAllocationPotentialWhenExceedLimit," time(s)"),",while AllocationPotential didn't drop to negative");
          strcat(exceededLimitStatus,negativeAllocationPotentialStatus)
          };
          MonSqlIdleMemCollectorStats
          | where  (AppName =~'dd5dae7452d1' and originalEventTimestamp between (datetime(8/12/2025 03:00:01 AM)..datetime(8/12/2025 5:59:54 AM)) and ClusterName =~'tr889.indiasouth1-a.worker.database.windows.net' and NodeName =~'_DB_67')
          | where LogicalServerName=~'spartan-srv-ind-crmcoreind-a7f735156dac'
          | where event == "sql_memory_perf_stats"
          | summarize countOfExceedLimit=countif(internal_caches_kb>internal_caches_limit_kb),countOfNegativeAllocationPotentialWhenExceedLimit=countif(internal_caches_kb>internal_caches_limit_kb and 0>allocation_potential_kbs),countOfNegativeAllocationPotential=countif(0>allocation_potential_kbs)
          | where countOfExceedLimit>0
          | extend exceededLimitStatus=ExceededLimitStatus(countOfExceedLimit,countOfNegativeAllocationPotentialWhenExceedLimit)
          | project exceededLimitStatus
        DisplayedQuery: |
          MonSqlIdleMemCollectorStats
          | where  (AppName =~'dd5dae7452d1' and originalEventTimestamp between (datetime(8/12/2025 03:00:01 AM)..datetime(8/12/2025 5:59:54 AM)) and ClusterName =~'tr889.indiasouth1-a.worker.database.windows.net' and NodeName =~'_DB_67')
          | where LogicalServerName=~'spartan-srv-ind-crmcoreind-a7f735156dac'
          | where event == "sql_memory_perf_stats"
          | project originalEventTimestamp,internal_caches_mb=internal_caches_kb/1024,internal_caches_limit_mb=internal_caches_limit_kb/1024,allocation_potential_kbs
    QuestionToAI: |-
      -  {{exceededLimitStatus}}, the data type is String.

      ### Rules
      1. Store the value of exceededLimitStatus column to {{exceededLimitStatus}}.
      2. Set {{IssueDetected}} to 'true'.
      3. Set {{ResultMessage}} to exceededLimitStatus.

  - id: "2.4"
