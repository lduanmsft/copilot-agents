  - id: "2.0"
    # Description: This skill will check memory status, covering Buffer Pool, abnormal memory clerks, and identify the root cause if bottleneck are detected.
    Prompts:
      - "Memory Pressure Analysis"
    EvaluationTrueMessage: "Memory pressure is detected."
