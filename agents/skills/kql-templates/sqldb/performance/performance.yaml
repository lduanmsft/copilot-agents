- id: DB-performance-440
  Topic: Query-Slowness-Troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Query-Performance/Query-Slowness-Troubleshooting.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats database_name LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where AppName =~ "{AppName}"

      | where NodeName =~ "{NodeName}"

      | where PreciseTimeStamp between (datetime({StartTime})..datetime({EndTime}))

      | where LogicalServerName=~ ''{ServerName}'' and  database_name =~ ''{DatabaseName}''

      //| where query_id  in (?)

      //| where query_hash  in (?)

      //| where plan_id in (?)

      //| where query_plan_hash  in (?)

      | extend avg_elapse_time_seconds= round(elapsed_time/execution_count/1000.0/1000,1)

      | extend max_elapsed_time_seconds=round(max_elapsed_time/1000.0/1000,1)

      | extend avg_cputime_seconds= round(cpu_time/execution_count/1000.0/1000,1)

      | extend max_cpu_time_seconds= round(max_cpu_time/1000.0/1000,1)

      | extend avg_dop= dop/execution_count

      | extend avg_logical_reads= round(logical_reads/execution_count,1)

      | extend avg_logical_reads_GB= round(logical_reads/execution_count*8/1024/1024,1)

      | extend avg_logical_writes= round(logical_writes/execution_count,1)

      | extend avg_logical_writes_GB= round(logical_writes/execution_count*8/1024/1024,1)

      | extend avg_query_memory_mb=max_query_memory_pages*8/1024

      | extend avg_rowcount=rowcount/execution_count

      | project PreciseTimeStamp,avg_elapse_time_seconds,avg_cputime_seconds,max_elapsed_time_seconds,max_cpu_time_seconds,avg_dop,avg_logical_reads,avg_logical_writes,avg_query_memory_mb,avg_rowcount,execution_count'
