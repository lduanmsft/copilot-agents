- id: DB-performance-878
  Topic: SingleCoreCPUSpikes
  Source: TSG-SQL-DB-Performance/content/SOS/Scheduler/SingleCoreCPUSpikes.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where event == "instance_load"

      | where ClusterName == "{ClusterName}"

      | where NodeName == "{NodeName}"

      | where TIMESTAMP between (datetime({StartTime}) .. datetime({EndTime}))

      | extend allocated_cpus_d = parse_json(allocated_cpus)

      | mv-expand bagexpansion=array allocated_cpus_d

      | extend group = allocated_cpus_d[0], cpus = allocated_cpus_d[1]

      | summarize max(TIMESTAMP), min(TIMESTAMP) by tostring(group), tostring(cpus), application_name

      | join kind=inner (t) on group and cpus

      | project group, cpus, application_name, min_TIMESTAMP, max_TIMESTAMP

      | order by min_TIMESTAMP asc'
- id: DB-performance-879
  Topic: SingleCoreCPUSpikes
  Source: TSG-SQL-DB-Performance/content/SOS/Scheduler/SingleCoreCPUSpikes.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > datetime({StartTime}) and TIMESTAMP < datetime({EndTime})

      | where NodeName == "{NodeName}"

      | where ClusterName == "{ClusterName}"

      | join kind=inner(t2) on application_name

      | where event == "instance_load"

      | where code_package_name == "Code"

      | where service_manifest_name == "SQL"

      | extend kernel_cpu_load_percent = (kernel_load * 1.0 / cpu_load_cap) * 100

      | extend cpu_load_percent = (cpu_load * 1.0 / cpu_load_cap) * 100

      | project TIMESTAMP, application_name, cpu_load_percent, kernel_cpu_load_percent

      | render timechart'
- id: DB-performance-880
  Topic: SingleCoreCPUSpikes
  Source: TSG-SQL-DB-Performance/content/SOS/Scheduler/SingleCoreCPUSpikes.md
  Prompts:
  - SQL DB counter one minute analysis
  - SQL DB MonCounterOneMinute NodeName ClusterName
  - SQL DB investigate counter one minute
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'MonCounterOneMinute

      | where TIMESTAMP between (datetime({StartTime}) .. datetime({EndTime}))

      | where ClusterName == "{ClusterName}"

      | where NodeName == "{NodeName}"

      | extend Category =

      case(

      strlen(extract (@''\\Processor Information\([^_]+\)\\% Processor Time'',  0, CounterName, typeof(string))) > 0, "Processor Time",

      //strlen(extract (@''\\Processor Information\([^_]+\)\\% Privileged Time'', 0, CounterName, typeof(string))) > 0, "Privileged Time",

      //strlen(extract (@''\\Processor Information\([^_]+\)\\Interrupts/sec'',    0, CounterName, typeof(string))) > 0, "Interrupts/sec",

      "")

      | where Category != ""

      | project TIMESTAMP, CounterName, MaxVal

      | render timechart'
