    ExecutedQuery: 'MonRgLoad

      | where event contains "instance_load"

      | where TIMESTAMP > ago(8h) and ClusterName == {ClusterName} and NodeName == {NodeName}

      | where allocated_cpus == 6144

      | project TIMESTAMP, application_name , code_package_name , service_manifest_name , memory_load , memory_load_cap

      | summarize any(memory_load), any(memory_load_cap) by application_name , code_package_name , service_manifest_name , bin(TIMESTAMP, 1s)

