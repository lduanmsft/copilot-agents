- id: DB-performance-817
  Topic: SQP001-Socrates-QP-Pushdown-Overview
  Source: TSG-SQL-DB-Performance/content/Socrates-QP-Pushdown/SQP001-Socrates-QP-Pushdown-Overview.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonSocratesQp event LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocratesQp
    ExecutedQuery: 'MonSocratesQp

      | where originalEventTimestamp > ago(1d)

      | where LogicalServerName =~ ''{LogicalServerName}''

      | where logical_database_guid =~ ''{LogicalDatabaseGuid}''

      | where event == ''hyperscale_pushdown_aggregated_stats''

      | extend query_hash = strcat("0x", toupper(tohex(query_hash,16)))

      | extend query_plan_hash = strcat("0x", toupper(tohex(query_plan_hash,16)))

      | project originalEventTimestamp

      , session_id, query_hash, query_plan_hash, node_id, physical_operator, has_filter, dop

      , sent_requests, succeeded_requests, failed_requests

      , sent_subrequests, succeeded_subrequests, retried_subrequests, failed_subrequests

      , num_pages_pushed, pushed_page_server_reads, pushed_rows_read, pushed_rows_returned, response_size_bytes, used_pages_peak

