- id: DB-performance-325
  Topic: CPU102-Readable-Secondary-CPU-troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/CPU/CPU102-Readable-Secondary-CPU-troubleshooting.md
  Prompts:
