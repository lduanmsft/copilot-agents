- id: DB-performance-555
  Topic: Backfill-data-files-for-CRM-GP-DB
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Backfill-data-files-for-CRM-GP-DB.md
  Prompts:
  - SQL DB transaction log usage
  - SQL DB MonDmIoVirtualFileStats LogicalServerName
  - SQL DB investigate transaction log usage
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: '//let region = "northeurope";

      let target_file_count = 4;

      let target_grow_size_gb = 250;

      let max_pool_storage_factor = 0.9;

      let DBFileStats = MonDmIoVirtualFileStats

      | where originalEventTimestamp >= ago(2d)

      | where is_primary_replica == 1 and type_desc == "ROWS" and AppTypeName == "Worker.ISO" and LogicalServerName =~ "{ServerName}"

      //| where LogicalServerName =~ "{ServerName}" and db_name == "db_crmcoreemea_20181124_07284712_a284"

      | summarize arg_max (TIMESTAMP , *) by LogicalServerName, db_name, file_id

      | project TIMESTAMP , ClusterName, LogicalServerName, db_name , AppName, database_id , file_id

      , spaceused_gb = spaceused_mb / 1024.0

      , file_maxsize_gb = max_size_mb / 1024.0

      , sizeondisk_gb = (size_on_disk_bytes) / (1024.0 * 1024.0 * 1024.0)

      | extend database_name = db_name

      | extend Region = tostring(split(ClusterName , ".")[1])

      | summarize file_count = dcount(file_id), max_file_id = max(file_id)

      , sum(sizeondisk_gb)

      , sum(spaceused_gb)

      , sum(file_maxsize_gb)

      , max(sizeondisk_gb)

      , max(spaceused_gb) by Region, AppName, database_name, LogicalServerName

      | where max_spaceused_gb > 256'
