- id: DB-performance-39
  Topic: IHS-Tempdb-presizing
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/IHS-Tempdb-presizing.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event AppName AppTypeName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where event == "aggregated_virtual_files_io_history"

      | where TIMESTAMP > ago(1d)

      | where database_id == 2

      | where spaceused_mb != -1

      | where AppTypeName == "Worker.ISO"

      | where AppName == ''{p_appname}''

      | summarize max(file_id) by AppName

      | extend num_tempdb_data_files = max_file_id - 1

      | extend initial_tempdb_size_mb = num_tempdb_data_files * 16

      | summarize by num_tempdb_data_files, initial_tempdb_size_mb'
