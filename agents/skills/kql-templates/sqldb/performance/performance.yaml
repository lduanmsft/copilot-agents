- id: DB-performance-145
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonCounterOneMinute NodeName ClusterName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'MonCounterOneMinute


      | where TIMESTAMP &gt; datetime({StartTime}) and TIMESTAMP &lt; datetime({EndTime})


      | where NodeName =~ "{NodeName}" and ClusterName =~ "{ClusterName}"


      | extend Category = case(CounterName =~ @"MemoryAvailable MBytes", "Memory",


      strlen(extract(@"Processor([0-9]{1,2})% (Privileged Time|Processor Time)", 0, CounterName, typeof(string))) &gt;0, "Processor",


      strlen(extract(@"Processor(_Total)% (Processor Time|Privileged Time)", 0, CounterName, typeof(string))) &gt;0, "Total Processor",


      strlen(extract(@"LogicalDisk([A-Z]:)Avg. Disk sec/(Read|Write)", 0, CounterName, typeof(string))) &gt;0, "Disk", "Other")


      | where Category != "Other"


      | top-nested of bin(TIMESTAMP, 5min) by avg(CounterValue), top-nested of Category by avg(CounterValue), top-nested 5 of CounterName by Avg_CounterValue=avg(CounterValue) desc


      | sort by TIMESTAMP asc nulls last


      | project TIMESTAMP, CounterName , Avg_CounterValue


      | render timechart


      // N.02

      '
- id: DB-performance-146
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
