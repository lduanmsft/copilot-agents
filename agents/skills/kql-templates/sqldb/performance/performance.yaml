- id: DB-performance-41
  Topic: IHS-Tempdb-presizing
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/IHS-Tempdb-presizing.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonSqlRgHistory event AppName NodeName spaceused_mb
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP < ago(1d) // check for data before ihs_analytics xevent

      | where event == "aggregated_virtual_files_io_history"

      | where database_id == 2

      | where file_id != 2

      | extend size_on_disk_mb = round(size_on_disk_bytes/1024/1024, 0)

      | where AppName == ''{p_appname}''

      | where is_primary_replica == 1

      | project TIMESTAMP, AppName, NodeName, file_id, spaceused_mb, size_on_disk_mb

      | summarize sum(spaceused_mb) by TIMESTAMP, AppName

      | where sum_spaceused_mb >0

      | order by sum_spaceused_mb asc

      | summarize percentiles(sum_spaceused_mb, 80) by AppName, KustoCluster'
- id: DB-performance-42
  Topic: Incident-39825673-Leak-in-MEMORYCLERK_SQLQUERYEXE-1
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Incident-39825673-Leak-in-MEMORYCLERK_SQLQUERYEXE-1.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonDmOsMemoryClerks LogicalServerName AppName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsMemoryClerks
    ExecutedQuery: 'cluster(clusterName).database(databaseName).MonDmOsMemoryClerks

      | where TIMESTAMP > ago(30min)

      | where ["type"] == "MEMORYCLERK_SQLQUERYEXEC"

      | extend total = pages_kb + virtual_memory_committed_kb

      | project TIMESTAMP, [''type''], total , code_package_version, NodeName, AppName, LogicalServerName, ClusterName, SubscriptionId

      | extend key = strcat(NodeName, " , ", code_package_version, ", " , AppName)

      | extend ClusterShortName = extract(''(.*?)[.](.*?)[.]'', 2, tostring(ClusterName))

      | where total >5000000

      | join (

      cluster(clusterName).database(databaseName).MonDatabaseMetadata

      | where table_name == "sysidxstats" and (type == 5 or type == 6)

      | summarize by AppName, LogicalServerName

      | project AppName

      ) on AppName

