 TIMESTAMP between {StartTime}..{EndTime} and ClusterName =~ '{Cluster}' and NodeName =~ '{NodeName}'| where LogicalServerName =~ '{ServerName}' and logical_database_name =~ '{DatabaseName}'| where event =~ 'query_store_db_settings_and_state'| top 1 by TIMESTAMP desc | extend ActualState = case (db_state_actual == 0, 'Off', db_state_actual == 1, 'ReadOnly', db_state_actual == 2, 'ReadWrite', db_state_actual == 3, 'Error', 'Other')| extend DesiredState = case (db_state_desired == 0, 'Off', db_state_desired == 1, 'ReadOnly', db_state_desired == 2, 'ReadWrite', db_state_desired == 3, 'Error', 'Other')| extend CaptureMode = case (capture_policy_mode =~ 'x_qdsCaptureModeAuto', 'Auto', capture_policy_mode =~ 'x_qdsCaptureModeAll', 'All',                            capture_policy_mode =~ 'x_qdsCaptureModeNone', 'None',  capture_policy_mode =~ 'x_qdsCaptureModeCustom', 'Custom', 'Other') | extend ReadOnlyReason = case (binary_and(query_store_read_only_reason, 0x8) == 0x8, 'Secondary',                                query_store_read_only_reason == 0x0, 'None',                               binary_and(query_store_read_only_reason, 0x00010000) == 0x00010000, 'DiskSizeLimit',                               binary_and(query_store_read_only_reason, 0x00020000) == 0x00020000, 'StmtHashMapMemoryLimit',                               binary_and(query_store_read_only_reason, 0x00040000) == 0x00040000, 'BufferedItemsMemoryLimit',                               binary_and(query_store_read_only_reason, 0x00080000) == 0x00080000, 'DbDiskSizeLimit',                               'Other')| project Packed = pack(  'ActualState', ActualState,  'DesiredState', DesiredState,  'ReadOnlyReason', ReadOnlyReason,  'CaptureMode', CaptureMode)| mvexpand Packed| parse tostring(Packed) with '{x22'Property'x22:x22'Value'x22}'| project Property, Value| serialize row = row_number(1)),(MonQueryStoreInfo| where AppName =~ '{AppName}' and TIMESTAMP between {StartTime}..{EndTime} and ClusterName =~ '{Cluster}' and NodeName =~ '{NodeName}'| where LogicalServerName =~ '{ServerName}' and logical_database_name =~ '{DatabaseName}'| where event =~ 'query_store_background_task_persist_started'| take 1| summarize count()| project Property = 'HasExhaustData', Value = case(count_ == 0, 'false', 'true'), row = 101),(MonAutomaticTuning| where TIMESTAMP &gt; ago(2h)| where AppName =~ '{AppName}' and NodeName =~ '{NodeName}'| where AppTypeName !contains 'Worker.Vldb.Storage'| where LogicalServerName =~ '{ServerName}' and logical_database_name =~ '{DatabaseName}'| where event =~ 'automatic_tuning_diagnostics'| where phase_code =~ 'DetectionCheck'| top 1 by TIMESTAMP desc| project is_detection_enabled, is_correction_enabled| project Packed = pack(  'is_APRC_detection_enabled', is_detection_enabled,  'is_APRC_correction_enabled', is_correction_enabled)| mvexpand Packed| parse tostring(Packed) with '{x22'Property'x22:'Value'}'| project Property, Value| serialize row = row_number(201))| order by row asc | project-away row//QueryName:'Query Store and APRC Information'<tr class=\"odd\">Query Store Failures// Query Store failure countsMonQueryStoreFailures| where AppName =~ '{AppName}' and TIMESTAMP between {StartTime}..{EndTime} and ClusterName =~ '{Cluster}' and NodeName =~ '{NodeName}'| where LogicalServerName =~ '{ServerName}' and logical_database_name =~ '{DatabaseName}'| summarize Failure_Count=count() by event//QueryName:'Query Store Failures'<tr class=\"even\">Query Store Plan Forcing TimeoutMonQueryStoreFailures| where AppName =~ '{AppName}' and TIMESTAMP between {StartTime}..{EndTime} and ClusterName =~ '{Cluster}' and NodeName =~ '{NodeName}'| where LogicalServerName =~ '{ServerName}' and logical_database_name =~ '{DatabaseName}'| where event =~ 'query_store_plan_forcing_failed_core' and error_number == 8684| summarize first_occurance = min(TIMESTAMP), last_occurance = max(TIMESTAMP), count() by query_id, plan_id| project last_occurance, first_occurance, query_id, plan_id, count = count_| order by last_occurance desc//QueryName:'Query Store Plan Forcing Timeout'<tr class=\"odd\">Database Version Change History// Version change// if you see more than one entry, it means this App has version change (either major upgrade or hotpatch)MonDmRealTimeResourceStats| where AppName =~ '{AppName}' and TIMESTAMP between {StartTime}..{EndTime} and ClusterName =~ '{Cluster}' and NodeName =~ '{NodeName}'| where LogicalServerName =~ '{ServerName}' and database_name =~ '{DatabaseName}'| where AppTypeName != 'Worker.Vldb.Storage'| summarize FirstSeen=min(TIMESTAMP), LastSeen=max(TIMESTAMP) by LogicalServerName, code_package_version, hotpatch_data_package_version| project StartTime=FirstSeen, EndTime=LastSeen, code_package_version, hotpatch_data_package_version| order by StartTime asc//QueryName:'Database Version Change History'<tr class=\"even\">Database SLO Change History// Slo change historyMonDmRealTimeResourceStats| where AppName =~ '{AppName}' and TIMESTAMP between {StartTime}..{EndTime} and ClusterName =~ '{Cluster}' and NodeName =~ '{NodeName}'| where LogicalServerName =~ '{ServerName}' and database_name =~ '{DatabaseName}'| where AppTypeName != 'Worker.Vldb.Storage' and AppTypeName != 'Worker.Vldb.XLog'| summarize StartTime=min(TIMESTAMP), EndTime=max(TIMESTAMP) by AppName, slo_name| lookup kind=leftouter (MonDmDbResourceGovernance| where AppName =~ '{AppName}' and TIMESTAMP between {StartTime}..{EndTime} and ClusterName =~ '{Cluster}' and NodeName =~ '{NodeName}'| extend MaxCPUCores = case (primary_bucket_fill_rate_cpu == 0, (primary_group_max_cpu*min_cores)/100.0, primary_bucket_fill_rate_cpu/1000.0)| extend MaxMemoryMB = case (min_memory == 0, max_db_memory/1024.0, min_memory/1024.0)| extend MaxMemoryGB = round(MaxMemoryMB/1024.0, 2)| extend MaxIOPS = primary_group_max_io | extend WorkersLimit = primary_group_max_workers| extend SessionsLimit = max_sessions| extend MaxDbDizeGb = max_db_max_size_in_mb/1024| extend MaxLogKbps = primary_max_log_rate/1024.0| summarize MaxCPUCores=any(MaxCPUCores), MaxMemoryGB=any(MaxMemoryGB), MaxIOPS=any(MaxIOPS), MaxLogKbps=any(MaxLogKbps),     MaxDbDizeGb=any(MaxDbDizeGb), WorkersLimit=any(WorkersLimit), SessionsLimit=any(SessionsLimit), DatabaseDTULimit=any(dtu_limit) by slo_name) on slo_name| project StartTime, EndTime, AppName, slo_name, MaxCPUCores, MaxMemoryGB, MaxIOPS, MaxLogKbps, MaxDbDizeGb, WorkersLimit, SessionsLimit, DatabaseDTULimit| order by StartTime asc//QueryName:'Database SLO Change History'<tr class=\"odd\">Failover History for Primary NodeMonFabricApi| where TIMESTAMP &gt;= ago(7d)| where LogicalServerName =~ '{ServerName}'| where AppName in ({AppNames}) and NodeName in ({NodeNames})| where AppTypeName !contains 'Worker.Vldb.Storage'| where event in ('hadr_fabric_api_replicator_begin_change_role', 'hadr_fabric_api_replica_end_change_role')| order by TIMESTAMP asc| where event == 'hadr_fabric_api_replicator_begin_change_role'| where new_role_desc == 'PRIMARY'| project TIMESTAMP, AppName, NodeName, previous_role = current_state_desc, new_role = new_role_desc, code_package_version, process_id//QueryName:'Failover History for Primary Node'<tr class=\"even\">Feature Switch and Config Override History// We are assuming logs are collected every 24 hours. If the collection interval is changed, we need to modify this value.\n\n// log_collection_interval is used to find out both min_cutoff_time and max_cutoff_time (See the comments of these two variables for description).\n\n// It is also used to determine whether two consecutive events have any time gap (ie. Time gap happens when someone removed a config override, \n\n// but added it back more than 24 hours later). If there is any time gap, we should record them and assign value '1' at the 'gap_detected_before' column.\n\nlet log_collection_interval = 24;\n\nlet fudge_factor = 1.5; // Used to determine if there is a time gap between two consecutive events\n\n// The earliest TIMESTAMP of all logs in the table\n\nlet earliest_log_time\
      \ = toscalar(\n"
