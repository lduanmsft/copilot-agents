    ExecutedQuery: 'MonSQLXStore

      | where TIMESTAMP > p_range

      | where event == ''pfs_rest_action''

      | where pfs_access_type == 1

      | where last_error == 0

      | distinct LogicalServerName, AppName

      | summarize total_apps_scaled = count(), joiner = 1

      ) on joiner

