  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: 'MonRgManager

      | where originalEventTimestamp > ago(1h)

      | where event == "global_directory_quota_governance_begin" or event == "process_directory_quota_governance_begin"

      | summarize start_cnt = count(), last_start = max(originalEventTimestamp) by ClusterName , event , NodeName , application_name, code_package_name

      | join kind= leftouter ('
- id: DB-performance-739
  Topic: PPBOT-037-PerfProcessDirectoryQuotaFailure
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-037-PerfProcessDirectoryQuotaFailure.md
  Prompts:
  - SQL DB ppbot 037 perf process directory quota failure
  - SQL DB MonRgManager event NodeName ClusterName
  - SQL DB troubleshoot ppbot 037 perf process directory quota
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: 'MonRgManager

      | where originalEventTimestamp > ago(1h)

      | where (event == "global_directory_quota_governance_end" and exception_hash == 0)

      or (event == "process_directory_quota_governance_end" and success == 1)

      | summarize end_count = count(), last_end_time = max(originalEventTimestamp) by ClusterName , event , NodeName , application_name, code_package_name

      ) on ClusterName, NodeName, application_name , code_package_name

      | extend end_cnt = iff(event1 == "", 0, end_count), last_end = iff(event1 == "", ago(1h), last_end_time)

      | where end_cnt < start_cnt and last_end < last_start

      | extend app_name = strcat(application_name, "_", code_package_name)

      | summarize app_set = makeset(app_name) by ClusterName , NodeName , event'
- id: DB-performance-740
  Topic: PPBOT-038-IO-RG-Delay-Alert
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-038-IO-RG-Delay-Alert.md
  Prompts:
  - SQL DB governor workload groups activity
  - SQL DB MonGovernorWorkloadGroups LogicalServerName
  - SQL DB investigate governor workload groups
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonGovernorWorkloadGroups
    ExecutedQuery: 'MonGovernorWorkloadGroups

      | where TIMESTAMP > start_inclusive

      | where name == "XdbLoginGroup" and pool_id != 1

      | project end_utc_date , start_utc_date , delta_read_stall_total_ms , delta_read_stall_queued_ms , delta_reads_completed_total , AppName, LogicalServerName , NodeName , ClusterName, SourceNamespace

      | where delta_read_stall_total_ms > 5000

      | extend queue_stalled_percent = ((1.0 * delta_read_stall_queued_ms) / (1.0 * delta_read_stall_total_ms)) * 100.0

      | where queue_stalled_percent > 25

      | summarize count(), avg(queue_stalled_percent), max(queue_stalled_percent)

      by AppName, LogicalServerName, NodeName, bin( end_utc_date, 5m) , bin( start_utc_date, 5m), SourceNamespace, ClusterName

      | join kind = leftouter ('
- id: DB-performance-741
  Topic: PPBOT-038-IO-RG-Delay-Alert
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-038-IO-RG-Delay-Alert.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin event LogicalServerName AppName
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where event == "process_login_finish"

      | where total_time_ms > 10000

      | where message contains "PAGEIOLATCH_SH" and message != ""

      | project TIMESTAMP, message, total_time_ms, AppName, LogicalServerName, SourceNamespace

      | extend ws = split(message, "<wait ")

      | mvexpand ws

      | where ws <> "" and ws <> ""

      | extend json = ws_to_json(tostring(ws))

      | extend j = parsejson(json)

      | extend wait_type = tostring(j["wait"].["name"])

      | where wait_type == ''PAGEIOLATCH_SH''

      | extend io_wait_time_ms = tolong(j["wait"].["time"])

      | extend max_time_ms = tolong(j["wait"].["maxTime"])

      | project-away ws, json, j

      | summarize avg(total_time_ms), max(total_time_ms), login_max_max_wait_ms = max(max_time_ms), max(io_wait_time_ms)

      , any(message) by AppName, LogicalServerName, bin(TIMESTAMP, 1m), SourceNamespace

      ) on AppName , LogicalServerName, SourceNamespace

      | project-away AppName1, LogicalServerName1, SourceNamespace1

      | where TIMESTAMP >= start_utc_date and TIMESTAMP < ( end_utc_date + 5m)

      | summarize avg(max_io_wait_time_ms), count() by LogicalServerName, AppName, bin(TIMESTAMP, 1h), ClusterName

      | where count_ > 5'
- id: DB-performance-742
  Topic: PPBOT-038-IO-RG-Delay-Alert
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-038-IO-RG-Delay-Alert.md
