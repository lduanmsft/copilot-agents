- id: DB-performance-180
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB backup status
  - SQL DB AlrBackup AppName NodeName originalEventTimestamp
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrBackup
    ExecutedQuery: "AlrBackup\n\n| where AppName == \"{AppName}\"\n\n| where TIMESTAMP &gt; datetime({StartTime}) and TIMESTAMP &lt; datetime({EndTime}) \n\n| where  event_type == \"BACKUP_METADATA_DETAILS\" and (backup_type == \"Full\" or backup_type == \"Diff\")\n\n| project originalEventTimestamp ,  NodeName,  backup_type ,  backup_start_date , backup_end_date ,  backup_size , uncompressed_backup_size\n\n, backup_path //,  AppName ,  logical_database_id , logical_database_name// Recovery\n"
- id: DB-performance-181
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB recovery trace analysis
  - SQL DB MonRecoveryTrace database_name LogicalServerName
  - SQL DB investigate recovery trace
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRecoveryTrace
    ExecutedQuery: "MonRecoveryTrace\n\n| where TIMESTAMP &gt; datetime({StartTime}) and TIMESTAMP &lt; datetime({EndTime}) \n\n| where LogicalServerName == \"{LogicalServerName}\" and AppName == \"{AppName}\" //and database_name =~ \"{DatabaseName}\"\n\n| where database_name !in(\"msdb\",\"master\",\"model\",\"tempdb\", \"mssqlsystemresource\",\"model_userdb\", \"model_masterdb\")\n\n| order by originalEventTimestamp asc\n\n| serialize\n\n| extend PrevTimestamp=prev(originalEventTimestamp, 1)\n\n| extend elapse_time_sec = (originalEventTimestamp - PrevTimestamp) / 1s\n\n| project elapse_time_sec, originalEventTimestamp, database_name, trace_message\n\n| order by originalEventTimestamp asc nulls last\n\n//| order by elapse_time_sec asc  <tr class=\"even\">Long Activation issue //*\n"
