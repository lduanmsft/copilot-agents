- id: DB-performance-568
  Topic: High-PAGEIOLATCH__-for-Data-File
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/High-PAGEIOLATCH__-for-Data-File.md
  Prompts:
  - SQL DB rg history latency
  - SQL DB MonSqlRgHistory event AppName type_desc
  - SQL DB troubleshoot rg history latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where event =~ ''aggregated_virtual_files_io_history''

      | where TIMESTAMP > ago({TimeRange}) - 1d and TIMESTAMP < now() + 1d

      | where AppName == "{AppName}"

      // | where NodeName == "{NodeName}"

      | where database_id > 0

      | where database_id == 585

      | where type_desc == ''ROWS''

      | extend duration_time_ms_read = min_of(delta_io_stall_read_ms, duration_time_ms)

      | extend duration_time_ms_write = min_of(delta_io_stall_write_ms, duration_time_ms)

      | extend storage_read_ms_per_page = (delta_io_stall_read_ms - delta_io_stall_queued_read_ms)/(round(delta_num_of_bytes_read/(8*1024),2))

      | extend storage_write_ms_per_page = (delta_io_stall_write_ms - delta_io_stall_queued_write_ms)/(round(delta_num_of_bytes_written/(8*1024),2))

      | project end_aggregated_sample, file_id = tostring(file_id)

      , read_mbs = round(delta_num_of_bytes_read / (duration_time_ms_read * 0.001 * 1024. * 1024),2)

      , write_mbs = round(delta_num_of_bytes_written / (duration_time_ms_write * 0.001 * 1024. * 1024),2)

      , max_read_mbs = num_of_bytes_read_per_second_max / (1024. * 1024)

      , max_write_mbs = num_of_bytes_written_per_second_max / (1024. * 1024)

      , iops = round((delta_num_of_reads +delta_num_of_writes) / (duration_time_ms * 0.001),2)

      , riops = round((delta_num_of_reads) / (duration_time_ms_read * 0.001),2)

      , wiops = round((delta_num_of_writes) / (duration_time_ms_write * 0.001),2)

      , delta_io_stall_read_ms, delta_io_stall_queued_read_ms, delta_io_stall_write_ms, delta_io_stall_queued_write_ms

      , delta_num_of_reads, delta_num_of_writes

      , num_of_reads_per_second_max

      , num_of_writes_per_second_max

      , num_of_reads_per_second_min

      , num_of_writes_per_second_min

      , num_of_bytes_read_per_second_min

      , num_of_bytes_written_per_second_min

      , duration_time_ms

      , NodeName

      , avg_kb_read = delta_num_of_bytes_read / (1024 * delta_num_of_reads)

      , avg_kb_write = delta_num_of_bytes_written / (1024 * delta_num_of_writes)

      , storage_read_ms_per_page

      , storage_write_ms_per_page

      | extend mbs = read_mbs + write_mbs

      | extend storage_read_ms = round((delta_io_stall_read_ms - delta_io_stall_queued_read_ms)*1./delta_num_of_reads,2)

      | extend storage_write_ms = round((delta_io_stall_write_ms - delta_io_stall_queued_write_ms)*1./delta_num_of_writes,2)

      | extend rg_read_ms = (delta_io_stall_queued_read_ms)/delta_num_of_reads

      | extend rg_write_ms = (delta_io_stall_queued_write_ms)/delta_num_of_writes

      | extend blob_known_ok = mbs > 0.75*200 or iops > 0.75*5000 or ( (storage_read_ms < 15 or storage_read_ms_per_page < 0.5)

      and (storage_write_ms < 30 or storage_write_ms_per_page < 0.5) )

      | extend blob_ok_spike = max_read_mbs > 0.75*200

      or max_write_mbs > 0.75*200

      or num_of_reads_per_second_max > 0.75*5000

      or num_of_writes_per_second_max > 0.75*5000

      | extend read_active_percent = round(min_of(100., delta_io_stall_read_ms*100./duration_time_ms),2)

      | extend write_active_percent = round(min_of(100., delta_io_stall_write_ms*100./duration_time_ms),2)

      | project end_aggregated_sample, file_id

      , storage_read_ms, round(storage_read_ms_per_page, 2), rg_read_ms

      , storage_write_ms, round(storage_write_ms_per_page,2), rg_write_ms

      , blob_known_ok, blob_ok_spike

      , rg_dominates = rg_read_ms > storage_read_ms or rg_write_ms > storage_write_ms

      , round(num_of_reads_per_second_min, 2)

      , round(num_of_writes_per_second_min,2)

      , min_rmbs = round(num_of_bytes_read_per_second_min / (1024 * 1024), 2)

      , min_wmbs = round(num_of_bytes_written_per_second_min / (1024 * 1024), 2)

      , iops

      , read_mbs

      , round(avg_kb_read, 2)

      , write_mbs

      , round(avg_kb_write, 2)

      , read_active_percent

      , write_active_percent

      , NodeName

      | extend high_rg = rg_read_ms > 1000 or rg_write_ms > 1000

      | extend good_storage = ( (storage_read_ms < 15 or storage_read_ms_per_page < 0.5) and (storage_write_ms < 30 or storage_write_ms_per_page < 0.5) )

      | extend label = iff( blob_known_ok == 1 and rg_dominates == 0, ''ideal''

      , iff(blob_known_ok == 1 and rg_dominates == 1 , ''demand high; BC or balancing needed''

      , iff(blob_known_ok == 0 and rg_dominates == 0 and blob_ok_spike == 0 and good_storage == 0, ''check storage''

      , iff(rg_dominates == 1 and good_storage == 1, ''storage OK, demand high/bursty demand; reduce demand, more IOPS are needed; update slo, BC can give more IOPS''

      , iff(high_rg == 1 and good_storage == 1, ''check rg''

      , iif(rg_dominates == 1 and good_storage == 0, ''check blob tier, XIO throttling or network, but BC, bigger caps can help''

      , iif(rg_dominates == 0 and good_storage == 0, ''check blob tier, XIO throttling or network''

      , ''unk/mixed'')))))))'
- id: DB-performance-570
  Topic: Incorrect-TelemetryPath-no-upgrade
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Incorrect-TelemetryPath-no-upgrade.md
  Prompts:
  - SQL DB dump signal activity
  - SQL DB MonSqlDumpSignal LogicalServerName AppName
  - SQL DB investigate dump signal
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlDumpSignal
    ExecutedQuery: 'let impactedApps = cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").MonSqlDumpSignal

      | where TIMESTAMP > ago(1h)

      | where ResolvedCallStack contains "ContextAccessor::FHasMsqlXact" //"InstanceHistoryStore" or ResolvedCallStack contains "IHS"

      | summarize min(TIMESTAMP), max(TIMESTAMP) by LogicalServerName, AppName, ClusterName

      | extend AppName = tostring(split(AppName, "/")[2])

      | extend LogicalServerName = tostring(split(LogicalServerName, ".")[0]);

      //| extend update_cmd = strcat("Raise-SqlAzureFsmEvent3 -TableName tbl_sql_instances -Keys @(\"", AppName, "\") -EventName UpdateTelemetryContainer -CabId 123456 -VerifiedSafe -Force")'
- id: DB-performance-571
  Topic: Incorrect-TelemetryPath-no-upgrade
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Incorrect-TelemetryPath-no-upgrade.md
  Prompts:
  - SQL DB SQL XStore activity
  - SQL DB SQL XStore LogicalServerName file_path
  - SQL DB investigate set
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: '| join kind = leftouter (MonSQLXStore

      | where file_path contains "tlm" and file_path !contains "cac" and file_path !contains ".xel"

      | summarize by LogicalServerName, file_path

      | where file_path !endswith "/"

      ) on LogicalServerName

      | project-away LogicalServerName1

      | extend mitigation_cmd = strcat("$arr = [system.Text.Encoding]::UTF8.GetBytes(\"", file_path, "\"); Set-WinfabProperty -FabricClusterName ", ClusterName, " -FabricNameUri fabric:/Worker.ISO/", AppName," -PropertyName TelemetryPath -PropertyValue $arr")'
- id: DB-performance-572
  Topic: Infra-upgrade-for-Storage-AAD-cert-rotation
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Infra-upgrade-for-Storage-AAD-cert-rotation.md
  Prompts:
  - SQL DB certificate watchdog rotation
  - SQL DB MonMachineLocalWatchdog component NodeName
  - SQL DB investigate certificate watchdog rotation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonMachineLocalWatchdog
    ExecutedQuery: 'MonMachineLocalWatchdog

      | where TIMESTAMP > ago(2d)

      | where component == "CertificateWatchdog"

      | where ClusterName contains "cr2.southeastasia"

      | extend  new_message = message_resourcename

      | summarize argmax(TIMESTAMP, new_message) by ClusterName, NodeName, new_message

      | extend tokens=split(max_TIMESTAMP_new_message, ";")

      | extend Subject=extract("Subject=(.*)", 1, tostring(tokens[1]))

      | extend Thumbprint=extract("Thumbprint=(.*)", 1, tostring(tokens[2]))

      | extend Created=extract("Created=(.*)", 1, tostring(tokens[3]))

      | extend Expires=extract("Expires=(.*)", 1, tostring(tokens[4]))

      | extend LogicalName = iff(arraylength(tokens) > 4, extract("RegistryLogicalName=(.*)", 1, tostring(tokens[5])) , "")

      | extend CertStore = iff(arraylength(tokens) > 5, extract("CertStore=(.*)", 1, tostring(tokens[6])) , "")

      | extend Key = strcat(ClusterName, "_", NodeName)

      | where Subject contains "Storage"

      | summarize NodeCount=dcount(Key), LastSeen=max(max_TIMESTAMP) by ClusterName, Thumbprint, Subject, todatetime(Created),todatetime(Expires), LogicalName, CertStore

      | sort by Expires  asc'
- id: DB-performance-573
  Topic: Is-XIO-throttling-impactful
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Is-XIO-throttling-impactful.md
  Prompts:
  - SQL DB sqlx store IO stats activity
  - SQL DB MonSQLXStoreIOStats originalEventTimestamp
  - SQL DB investigate sqlx store IO stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: 'MonSQLXStoreIOStats

      | where file_path contains file_path

      | where originalEventTimestamp >= start_time and originalEventTimestamp <= end_time

      | extend type_desc = iff(file_path contains ''ldf'', ''LOG'', iff(file_path contains ''mdf'' or file_path contains ''ndf'', ''ROWS'', ''UNK''))

      | summarize requests = sum(total_requests), retries = sum(total_retries) by bin(originalEventTimestamp, kpi_sample)

      | extend io_retry_ratio = round(retries / (0.001 + requests), 2)

      ) on originalEventTimestamp

      | extend io_retry_ratio = iff(isnotnull(originalEventTimestamp1), io_retry_ratio, 0.)

      | project originalEventTimestamp, time_throttled_ratio, max_retries_per_io_scaled_to_10 = max_retries_per_io / 10.0, io_retry_ratio, impact

      | order by originalEventTimestamp asc'
- id: DB-performance-574
  Topic: Is-it-a-BC-candidate
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Is-it-a-BC-candidate.md
  Prompts:
  - SQL DB real time resource stats activity
  - SQL DB real time resource stats database_name LogicalServerName
  - SQL DB investigate datetime
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'let p_database = ''db_crmcoreemea_20180108_11090289_a226'';

      let p_start_incident = datetime(2019-11-18 00:10:15.4808353);

      let p_end_incident = datetime(2019-11-18 19:00:45.4808353);

      let bc_utilization_candidates = MonDmRealTimeResourceStats

      | where LogicalServerName =~ "{ServerName}"

      | where replica_type == 0

      | where slo_name contains ''SQLDB_GP''

      | where database_name =~ p_database

      | where TIMESTAMP <= p_end_incident

      | summarize hint.shufflekey=AppName avg(avg_log_write_percent), avg(avg_data_background_io_percent), avg(avg_data_io_percent)

      , avg_io_percent = avg(avg_data_background_io_percent + avg_data_io_percent)

      by bin(TIMESTAMP, 15m), slo_name, AppName, database_name, io_cap, log_cap

      | extend bc = iff( (avg_avg_log_write_percent > 25 and log_cap > 20*1024*1024)

      or (avg_io_percent > 50 or avg_io_percent * 0.01 * io_cap > 4000 )

      or (avg_avg_data_background_io_percent > 25 and io_cap > 7500), 1, 0)

      | summarize hint.shufflekey=AppName samples = count(), bc = sum(bc) by AppName, database_name, slo_name

      | summarize samples = count(), bc=sum(bc), apps = dcount(AppName,2), slo_name = any(slo_name) by database_name'
- id: DB-performance-575
  Topic: Is-it-a-BC-candidate
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Is-it-a-BC-candidate.md
  Prompts:
  - SQL DB IO virtual file stats activity
  - SQL DB MonDmIoVirtualFileStats database_name NodeName
  - SQL DB investigate IO virtual file stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'let bc_database_storage_size_utilization = MonDmIoVirtualFileStats

      | where LogicalServerName =~ "{ServerName}"

      | where database_id > 4

      | where TIMESTAMP <= p_end_incident

      | where db_name =~ p_database

      | project TIMESTAMP = end_utc_date, database_name = db_name, type_desc, spaceused_mb, NodeName, file_id, size_on_disk_bytes

      | summarize hint.shufflekey=database_name sum(spaceused_mb), sum(size_on_disk_bytes), files = dcount(file_id, 2) by bin(TIMESTAMP, 1s), database_name, NodeName, type_desc

      | summarize gb_used = max(sum_spaceused_mb)/1024., gb = max(sum_size_on_disk_bytes)/(1024.*1024.*1024), files = max(files) by database_name, type_desc

      | extend bc = iff(type_desc == ''LOG'' and gb > 5 or type_desc == ''ROWS'' and gb_used / files > 256, 1, 0)

      | summarize hint.shufflekey=database_name bc = sum(bc) by database_name'
- id: DB-performance-576
  Topic: Is-it-a-BC-candidate
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Is-it-a-BC-candidate.md
  Prompts:
  - SQL DB cloud database wait stats activity
  - SQL DB MonDmCloudDatabaseWaitStats database_name
  - SQL DB investigate cloud database wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: 'let wait_io_symptom = MonDmCloudDatabaseWaitStats

      | where LogicalServerName =~ "{ServerName}"

      | where database_name != ''master''

      | where end_utc_date >= p_start_incident and start_utc_date <= p_end_incident

      | where database_name =~ p_database

      | where delta_wait_time_ms > 1000

      | summarize hint.shufflekey=database_name sum(delta_wait_time_ms), sum(delta_signal_wait_time_ms), sum(delta_waiting_tasks_count)

      by TIMESTAMP = bin(end_utc_date, 15m), wait_type, database_name

      | extend avg_wait_ms = round(sum_delta_wait_time_ms * 1./ sum_delta_waiting_tasks_count, 2)

      | extend avg_signal_wait_ms = round(sum_delta_signal_wait_time_ms * 1. / sum_delta_waiting_tasks_count, 2)

      | where (wait_type in (''WRITELOG'', ''LOGBUFFER'', ''LATCH_EX'', ''IO_COMPLETION'') or wait_type startswith ''PAGEIOLATCH'' or wait_type contains "LOG_RATE")

      | extend bc = iff(

      ((sum_delta_wait_time_ms > 5*60*1000 and avg_wait_ms < 7) or (avg_wait_ms > 20 and sum_delta_wait_time_ms > 5000))

      and (wait_type in (''WRITELOG'', ''LOGBUFFER'') or wait_type startswith ''PAGEIOLATCH'' or wait_type contains "LOG_RATE"), 1, 0)

      // | where bc == 1

      | summarize hint.shufflekey=database_name samples = count()

      , bc = sum(bc)

      , waits = makeset(wait_type)

      , argmax(sum_delta_wait_time_ms, avg_wait_ms, avg_signal_wait_ms, wait_type)

      , argmax(avg_wait_ms, avg_wait_ms, avg_signal_wait_ms, wait_type)

      , argmax(sum_delta_waiting_tasks_count, avg_wait_ms, avg_signal_wait_ms, wait_type)'
- id: DB-performance-577
  Topic: Is-it-a-BC-candidate
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Is-it-a-BC-candidate.md
  Prompts:
  - SQL DB resource governance latency
  - SQL DB MonDmDbResourceGovernance database_name
  - SQL DB troubleshoot resource governance latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbResourceGovernance
    ExecutedQuery: 'MonDmDbResourceGovernance

      | where database_name =~ p_database

      | summarize arg_max(end_utc_date

      , primary_group_max_io

      , pool_max_io

      , primary_max_log_rate

      , instance_max_log_rate

      , checkpoint_rate_io

      , checkpoint_rate_mbps

      , volume_local_iops

      , volume_managed_xstore_iops

      , volume_external_xstore_iops) by database_name

      | join kind=leftouter ( bc_utilization_candidates ) on database_name

      | project-away database_name1

      | project database_name, bc_io_utilization_candidate_signal = bc, slo_name

      | join kind=leftouter ( bc_database_storage_size_utilization ) on database_name

      | project-away database_name1

      | project database_name, slo_name, bc_io_utilization_candidate_signal, bc_size_candidate_signal = bc

      | join kind=leftouter ( wait_io_symptom ) on database_name

      | project-away database_name1

      // The signals are not comparable as is in magnitude

      | project database_name

      , slo_name

      , bc_io_utilization_candidate_signal

      , bc_size_candidate_signal

      , bc_io_wait_signal = bc

      , waits = tostring(waits)

      , example_bottleneck_wait_type = max_sum_delta_wait_time_ms_wait_type

      , example_bottleneck_wait_type_avg_wait_ms = max_sum_delta_wait_time_ms_avg_wait_ms

      , example_bottleneck_wait_type_avg_signal_wait_ms = max_sum_delta_wait_time_ms_avg_signal_wait_ms

      , example_high_latency_wait_type = max_avg_wait_ms_wait_type

      , example_high_latency_wait_type_avg_wait_ms = max_avg_wait_ms_avg_wait_ms

      , example_high_latency_wait_type_avg_signal_wait_ms = max_avg_wait_ms_avg_signal_wait_ms

      , example_high_count_wait_type = max_sum_delta_waiting_tasks_count_wait_type

      , example_high_count_wait_type_avg_wait_ms = max_sum_delta_waiting_tasks_count_avg_wait_ms

      , example_high_count_wait_type_avg_signal_wait_ms = max_sum_delta_waiting_tasks_count_avg_signal_wait_ms'
