- id: DB-performance-428
  Topic: Resource-Semaphore-Waits
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Other-Waits-and-Issues/Resource-Semaphore-Waits.md
  Prompts:
  - SQL DB blocking investigation
  - SQL DB MonDmOsMemoryClerks LogicalServerName AppName
  - SQL DB troubleshoot blocking investigation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsMemoryClerks
    ExecutedQuery: 'MonDmOsMemoryClerks


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where LogicalServerName =~ "{LogicalServerName}" and AppName =~ "{AppName}" and NodeName =~ "{NodeName}"


      | extend MemoryInMB = round(pages_kb/1024.0,1)


      | top-nested of bin(TIMESTAMP, 5min) by sum(MemoryInMB), top-nested 5 of type by TotalMemInMB=sum(MemoryInMB) desc


      | sort by TIMESTAMP asc nulls last


      | project TIMESTAMP, type, TotalMemInMB


      | render timechart <tr class="even">Q4 queries with high memory grant potentialselect IDENTITY( INT, 1, 1 ) rowId, cast (query_plan as xml) query_planINTO #tmpfrom sys.query_store_plan p join sys.query_store_runtime_stats r on p.plan_id = r.plan_idjoin sys.query_store_runtime_stats_interval i on r.runtime_stats_interval_id = i.runtime_stats_interval_idwhere start_time &gt; ''2017-08-25 14:00:00.0000000'' and end_time &lt;''2017-08-25 20:00:00.0000000''  go ;WITH cte AS(SELECT rowId, query_plan,-- m.c.value (''@SerialRequiredMemory'', ''INT'' ) AS SerialRequiredMemory, m.c.value (''@SerialDesiredMemory'', ''INT'' ) AS SerialDesiredMemoryFROM #tmp t CROSS APPLY t.query_plan.nodes ( ''//*:MemoryGrantInfo[@SerialDesiredMemory[. &gt; 0]]'' ) m(c)), cte2 AS (SELECT *FROM cte)SELECT TOP 50 rowId, query_plan, CAST( SerialDesiredMemory / 1024. AS DECIMAL(10,2) ) SerialDesiredMemory_MBFROM cte2ORDER BY SerialDesiredMemory DESC go--customer ready;WITH cte AS(SELECT query_id, query_plan, m.c.value (''@SerialDesiredMemory'', ''INT'' ) AS SerialDesiredMemoryFROM #tmp t CROSS APPLY t.query_plan.nodes ( ''//*:MemoryGrantInfo[@SerialDesiredMemory[. &gt; 0]]'' ) m(c))SELECT TOP 50 cte.query_id, t.query_sql_text, cte.query_plan, CAST( SerialDesiredMemory / 1024. AS DECIMAL(10,2) ) SerialDesiredMemory_MBFROM cte JOIN sys.query_store_query q ON cte.query_id = q.query_id JOIN sys.query_store_query_text t ON q.query_text_id = t.query_text_idORDER BY SerialDesiredMemory DESC<tr class="odd">Q5 Top memory grants (user query)print ''-- top 10 query memory grants --'' SELECT top 10 CONVERT (varchar(30), getdate(), 121) as runtime, <pr.session_id , r.blocking_session_id , r.cpu_time , r.total_elapsed_time , r.reads , r.writes , r.logical_reads , r.row_count , wait_time , wait_type , r.command<p, object_name(txt.objectid,txt.dbid) ''Object_Name'' , ltrim(rtrim(replace(replace (substring (SUBSTRING(text, (r.statement_start_offset/2)+1, ((CASE r.statement_end_offset WHEN -1 THEN DATALENGTH(text) ELSE r.statement_end_offset END - r.statement_start_offset)/2) + 1), 1, 1000), char(10), '' ''), char(13), '' ''))) [stmt_text] , mg.dop --Degree of parallelism  , mg.request_time --Date and time when this query requested the memory grant. , mg.grant_time --NULL means memory has not been granted , mg.requested_memory_kb/ 1024.0 requested_memory_mb --Total requested amount of memory in megabytes , mg.granted_memory_kb / 1024.0 AS granted_memory_mb --Total amount of memory actually granted in megabytes. NULL if not granted , mg.required_memory_kb / 1024.0 AS required_memory_mb--Minimum memory required to run this query in megabytes.  , max_used_memory_kb / 1024.0 AS max_used_memory_mb , mg.query_cost --Estimated query cost. , mg.timeout_sec --Time-out in seconds before this query gives up the memory grant request. , mg.resource_semaphore_id --Nonunique ID of the resource semaphore on which this query is waiting. , mg.wait_time_ms --Wait time in milliseconds. NULL if the memory is already granted. , CASE mg.is_next_candidate --Is this process the next candidate for a memory grant WHEN 1 THEN ''Yes'' WHEN 0 THEN ''No'' ELSE ''Memory has been granted'' END AS ''Next Candidate for Memory Grant''<p, qp.query_planFROM sys.dm_exec_requests r JOIN sys.dm_exec_query_memory_grants mg ON r.session_id = mg.session_id and r.request_id=mg.request_id CROSS APPLY sys.dm_exec_sql_text (mg.sql_handle ) AS txt<pcross apply sys.dm_exec_query_plan (r.plan_handle) qp<porder by mg.granted_memory_kb desc'
