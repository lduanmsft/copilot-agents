  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where TIMESTAMP between (varStartTime .. varEndTime)

      | where logical_server_name == varLogicalServerName

      | where sql_instance_name == varAppName

      | summarize min(TIMESTAMP), max(TIMESTAMP) by logical_database_id, physical_database_id, edition, service_level_objective

      | project-reorder min_TIMESTAMP, max_TIMESTAMP

      | sort by min_TIMESTAMP asc'
- id: DB-performance-293
  Topic: SQL-Perf-Trending-Issue-Tracker
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/SQL-Perf-Trending-Issue-Tracker.md
  Prompts:
  - SQL DB recovery trace activity
  - SQL DB MonRecoveryTrace event LogicalServerName
  - SQL DB investigate recovery trace
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRecoveryTrace
    ExecutedQuery: 'cluster(clstr).database("sqlazure1").MonRecoveryTrace

      | where TIMESTAMP > ago(2h) //between (datetime(2025-11-13 00:00:00)..datetime(2025-11-15 00:00:00))

      | where event == "redo_kill_blocked"

      | where resource_type == "OBJECT" and mode == "IX"

      | where redo_kill_blocked_iteration > 1200

      | summarize max(redo_kill_blocked_iteration) by ClusterName, LogicalServerName, database_id, AppName, NodeName'
- id: DB-performance-294
  Topic: SQL-Perf-Trending-Issue-Tracker
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/SQL-Perf-Trending-Issue-Tracker.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where AppName =~"{AppName}" and ((PreciseTimeStamp between (datetime(10/9/2025 12:00:14 AM)..datetime(10/10/2025 9:19:26 AM)) and ClusterName =~"{ClusterName}" and NodeName =~"{NodeName}")or (PreciseTimeStamp between (datetime(10/10/2025 9:19:50 AM)..datetime(10/11/2025 1:59:50 AM)) and ClusterName =~"{ClusterName}" and NodeName =~"{NodeName}"))

      | where LogicalServerName =~ "{ServerName}"

      | where event == "aggregated_workload_groups_plus_history"

      | extend

      tempdb_data_space_gb = tempdb_data_space_kb / 1024.0 / 1024.0,

      peak_tempdb_data_space_gb = peak_tempdb_data_space_kb / 1024.0 / 1024.0

      | summarize max(round(tempdb_data_space_gb,0)), max(round(peak_tempdb_data_space_gb,0)),sum(total_tempdb_data_limit_violation_count)   by bin(originalEventTimestamp,15m)'
- id: DB-performance-295
  Topic: SQL-Perf-Trending-Issue-Tracker
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/SQL-Perf-Trending-Issue-Tracker.md
  Prompts:
  - SQL DB transaction log usage
  - SQL DB MonSqlRgHistory LogicalServerName AppName
  - SQL DB investigate transaction log usage
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where AppName =~"{AppName}" and ((PreciseTimeStamp between (datetime(10/9/2025 12:00:14 AM)..datetime(10/10/2025 9:19:26 AM)) and ClusterName =~"{ClusterName}" and NodeName =~"{NodeName}")or (PreciseTimeStamp between (datetime(10/10/2025 9:19:50 AM)..datetime(10/11/2025 1:59:50 AM)) and ClusterName =~"{ClusterName}" and NodeName =~"{NodeName}"))

      | where LogicalServerName =~ "{ServerName}"

      | where database_id == 2 and type_desc == ''ROWS''

      | summarize

      sum_spaceused_mb = sum(spaceused_mb),

      sum_size_on_disk_mb = sum(size_on_disk_bytes/1024/1024),

      sum_max_size_mb = sum(max_size_mb)

      by bin(originalEventTimestamp, 5m), LogicalServerName,AppName,AppTypeName,NodeName

      | summarize breachcount = countif(sum_spaceused_mb  > (sum_max_size_mb * 0.9)), sum_spaceused_gb=max(sum_spaceused_mb/1024),sum_size_on_disk_gb=max(sum_size_on_disk_mb/1024),sum_max_size_gb= max(sum_max_size_mb/1024) by LogicalServerName,AppName, MachineName=NodeName , bin(originalEventTimestamp, 5m)

      |project originalEventTimestamp,sum_spaceused_gb,sum_size_on_disk_gb//,sum_max_size_gb'
- id: DB-performance-296
  Topic: SQL-Perf-Trending-Issue-Tracker
