  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: '//*MonDmRealTimeResourceStats


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"


      | where replica_type == 0


      | summarize avg(avg_cpu_percent) , avg(avg_data_io_percent), avg(avg_log_write_percent), avg(avg_memory_usage_percent) by bin(TIMESTAMP, 1min)


      | render timechart  <tr class="even">Q3 -- Query text form Query Hash using DMV-- Insert desired &lt;query_hash&gt; belowselect getdate() runtime, * from(SELECT query_stats.query_hash,       SUM(query_stats.total_worker_time) ''total_worker_time'',                SUM(query_stats.execution_count) ''execution_count'',                sum(total_logical_reads) ''total_logical_reads'',    REPLACE (REPLACE (MIN(query_stats.statement_text),  CHAR(10), '' ''), CHAR(13), '' '') AS "Statement_Text"  FROM       (SELECT QS.*,       SUBSTRING(ST.text, (QS.statement_start_offset/2) + 1,      ((CASE statement_end_offset           WHEN -1 THEN DATALENGTH(ST.text)          ELSE QS.statement_end_offset END               - QS.statement_start_offset)/2) + 1) AS statement_text       FROM sys.dm_exec_query_stats AS QS       CROSS APPLY sys.dm_exec_sql_text(QS.sql_handle) as ST) as query_stats                   group by query_hash) t                where query_hash=&lt;query_hash&gt;) '
