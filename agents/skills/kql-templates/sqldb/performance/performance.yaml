- id: DB-performance-238
  Topic: MMSOP-Memory-Management-SOPs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/MMSOP-Memory-Management-SOPs.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth AppName NodeName gt lt
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: '<col style="width: 33%" /><col style="width: 33%" /><col style="width: 33%" /><tr class="odd">NameDescriptionQuery examples<tr class="even">MonSQLSystemHealthOOM status dump.Each memory status dump in errorlog has been tagged with "MSR-*". Run the following query to get the very first memory status dump let appName = "{AppName}";


      //let nodeName = "DB.44";


      let tag = "MSR-";


      //let tag = "MSExtra-"; // Uncomment this if you also want to see the extra info


      let MemoryDumpTable = MonSQLSystemHealth


      | where AppName == appName


      //| where NodeName == nodeName


      | where message contains tag


      | extend MSRNumber = strcat(tag, extract(strcat(tag, "([0-9]+)"), 1, message, typeof(int)))


      | project originalEventTimestamp, NodeName, MSRNumber, message;


      MemoryDumpTable


      | order by originalEventTimestamp desc nulls last


      | take 1


      | project NodeName, MSRNumber


      | join kind=inner (


      MemoryDumpTable


      ) on NodeName, MSRNumber


      | project originalEventTimestamp, NodeName, message<tr class="odd">MonSqlMemoryClerkStatsCheck memory usage for memory clerks.let oomApp="c33123432d7f";


      let oomNode="DB.29";


      let startTime=ago(30d);


      let endTime=now();


      let topConsumers=MonSqlMemoryClerkStats


      | where TIMESTAMP &gt; startTime and TIMESTAMP &lt; endTime


      | where AppName == oomApp and NodeName == oomNode


      | where peak_pages_kb &gt; 200000 or vm_committed_kb &gt; 200000


      | summarize by memory_clerk_type;

      '
- id: DB-performance-239
  Topic: MMSOP-Memory-Management-SOPs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/MMSOP-Memory-Management-SOPs.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonSqlMemoryClerkStats AppName NodeName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlMemoryClerkStats
    ExecutedQuery: 'MonSqlMemoryClerkStats


      | where TIMESTAMP &gt; startTime and TIMESTAMP &lt; endTime


      | where AppName == oomApp and NodeName == oomNode


      | join kind= inner (


      topConsumers


      ) on memory_clerk_type


      | extend type_per_node = strcat(memory_clerk_type, "_", memory_clerk_name, "_Node_id_", tostring(memory_node_id))


      | project TIMESTAMP, type_per_node, memory_kb = peak_pages_kb + vm_committed_kb


      | render timechart  <tr class="even">MonSqlRmRingBufferResource monitor ring buffer. Check memory pressure notifications such as MEMPHYSICAL_LOW. indicators1 -&gt; MEMPHYSICAL_HIGH2 -&gt; MEMPHYSICAL_LOW4 -&gt; MEMVIRTUAL_LOWRun the following query to find out if the memory pressure is coming from system, or process, or pool for memory physical low event at the given time period.MonSqlRmRingBuffer| where TIMESTAMP &gt; now(-6h)| where notification == "MEMPHYSICAL_LOW"| where AppName == "{AppName}" and NodeName == "{NodeName}"| project TIMESTAMP, process_indicators, system_indicators, pool_indicators| render timechart When target kb &lt; the pages committed kb, SQL should shrink itself at first.MonSqlRmRingBuffer| where TIMESTAMP &gt; datetime(2017-09-05 20:00)| where AppName == "{AppName}" | where NodeName == "{NodeName}"| where notification == "MEMPHYSICAL_LOW"| extend pages_committed=committed_kb+shared_committed_kb+awe_kb | project TIMESTAMP, target_kb, pages_committed| where target_kb &lt; pages_committed <tr class="odd">1.       MonSqlCaches1.       Find out why cache entries are dropped. Column clock_hand_id has two values, 0 and 1. 0 indicates external memory pressure, e.g. system wide, or process wide, or memory pool wide. 1 indicates internal (cache itself). 2.       Note that we are adding more columns in the telemetry so that we can tell if it is system or process or pool for external memory pressure cases.1.       Run the following query to find information about internal/external memory pressure and how many entries are visited and removed for caches.1.       MonSqlCaches

      '
- id: DB-performance-240
  Topic: MMSOP-Memory-Management-SOPs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/MMSOP-Memory-Management-SOPs.md
