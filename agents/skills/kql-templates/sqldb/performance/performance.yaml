- id: DB-performance-279
  Topic: TSG-for-larger-than-4TB-support-on-Gen5-or-higher_
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/TSG-for-larger-than-4TB-support-on-Gen5-or-higher_.md
  Prompts:
  - SQL DB RG load analysis
  - SQL DB MonRgLoad application_name
  - SQL DB investigate RG load
  CustomizedParameters:
  - AppName
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where application_name contains \"{AppName}\"

      and TIMESTAMP > ago(1h)

      and event == "directory_quota_report_load"'
- id: DB-performance-280
  Topic: TSG-for-larger-than-4TB-support-on-Gen5-or-higher_
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/TSG-for-larger-than-4TB-support-on-Gen5-or-higher_.md
  Prompts:
  - SQL DB real time resource stats activity
  - SQL DB MonDmRealTimeResourceStats LogicalServerName
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where replica_type == 0 and originalEventTimestamp > ago(30m)

      | where LogicalServerName =~ "{ServerName}"

      and database_name =~ "{DatabaseName}"

      | summarize arg_max(originalEventTimestamp, AppName, NodeName, physical_database_guid, ClusterName, LogicalServerName, database_name)

      | extend checkMaxSizeCas = strcat("Get-FabricNode -NodeName ", NodeName,

      " -NodeClusterName ", ClusterName,

      " | Invoke-DbccCommand -AppName ", AppName,

      " -Command DBINFO -PhysicalDatabaseId ", physical_database_guid)

      | extend updateMaxSizeCas = strcat("Update-DatabaseMaxSizeInEngine -LogicalServerName \"", LogicalServerName,

      "\" -LogicalDatabaseName \"", database_name,

      "\" -PhysicalDatabaseId \"", physical_database_guid,

      "\" -DatabaseMaxSizeInBytes ", 5455872 * 1024 * 1024)

      | project AppName, checkMaxSizeCas, updateMaxSizeCas'
- id: DB-performance-281
  Topic: TSG-for-larger-than-4TB-support-on-Gen5-or-higher_
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/TSG-for-larger-than-4TB-support-on-Gen5-or-higher_.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_server_name =~ "{ServerName}"

      and sql_instance_name =~ "fd674a61b413"

      | summarize arg_max(TIMESTAMP, sql_instance_name, service_level_objective, logical_resource_pool_id, tenant_ring_name)

      by logical_database_name, logical_database_id, physical_database_id, logical_server_name

      | extend update_pool_storage_limit = strcat(

      "Set-DatabasePropertyOverride -LogicalServerName ''", logical_server_name,

      "'' -LogicalDatabaseName ''", logical_database_name,

      "'' -CategoryName ''SloPropertyBag'' -OverrideValue ''<SloRgMapping><pool_max_data_space_kb>5586812928</pool_max_data_space_kb></SloRgMapping>''")

      | project update_pool_storage_limit, service_level_objective, logical_resource_pool_id'
- id: DB-performance-282
  Topic: Turn-on-memory-leakage-detection
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Turn-on-memory-leakage-detection.md
  Prompts:
