- id: DB-performance-308
  Topic: High-Alias-DB-CPU
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Alias-DB/High-Alias-DB-CPU.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonDmRealTimeResourceStats AppName name
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where AppName =~ "<app name>"

      | summarize max(avg_cpu_percent)

      ,max(avg_sos_instance_cpu_percent)

      ,max(avg_instance_cpu_percent)

      by bin(originalEventTimestamp, 1h), AppName

      | render timechart'
- id: DB-performance-309
  Topic: High-Alias-DB-CPU
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Alias-DB/High-Alias-DB-CPU.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats AppName name query_exec_cpu_pct
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where AppName =~ "<app name>"

      | summarize

      avg_cpu_time_per_sec_interval = (sum(cpu_time)*1.0/(1000))/1000/60/aggIntervalMins

      by TIMESTAMP=bin(TIMESTAMP, aggIntervalTimespanMins)

      | extend query_exec_cpu_pct = (avg_cpu_time_per_sec_interval / vCoreCount) * 100.0

      | project TIMESTAMP, query_exec_cpu_pct

      | render timechart'
- id: DB-performance-310
  Topic: High-Alias-DB-CPU
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Alias-DB/High-Alias-DB-CPU.md
