- id: DB-performance-644
  Topic: TSGRS-SC04---Resolving-apps-stuck-unable-to-dynami
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS-SC04---Resolving-apps-stuck-unable-to-dynami.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB AlrSQLErrorsReported state event LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrSQLErrorsReported
    ExecutedQuery: 'cluster(regionName).database(databaseName).AlrSQLErrorsReported

      | where TIMESTAMP > ago(1d)

      | where error_number == 12707

      | where state == 9

      | join

      (cluster(regionName).database(databaseName).MonSqlRgHistory

      | where TIMESTAMP > ago(1d)

      | where event == ''pfs_size_history''

      | extend pfs_total_gb = (pfs_total_space_bytes) / 1024 / 1024 / 1024

      | extend pfs_usage_gb = (pfs_total_space_bytes - pfs_free_space_bytes) / 1024 / 1024 / 1024

      | extend fs_name = extract("([a-zA-Z0-9]+).file.core.windows.net([a-zA-Z0-9]+)", 2, file_share_path)

      ) on LogicalServerName, AppName

      | join

      (cluster(regionName).database(databaseName).MonResourcePoolStats

      | where event == ''resource_pool_stats''

      | distinct LogicalServerName, AppName, resource_pool_cpu_limit, resource_pool_dtu_limit

      ) on LogicalServerName, AppName

      | join

      (cluster(regionName).database(databaseName).MonAnalyticsRPSnapshot

      ) on $left.fs_name == $right.file_share_name'
