- id: DB-performance-95
  Topic: ASC-Queries-for-TxLog-Insights
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/ASC-Queries-for-TxLog-Insights.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot AppName TIMESTAMP
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where TIMESTAMP > start_time and TIMESTAMP <= datetime({EndTime})

      | where logical_database_name =~ ''{DatabaseName}''

      | summarize by AppName = sql_instance_name, logical_database_name, logical_resource_pool_id, service_level_objective

      | extend isEP = iff(isnotnull(logical_resource_pool_id) and isnotempty(logical_resource_pool_id), 1, 0)

      | extend isVcore = iff(service_level_objective contains ''SQLDB_'', 1, 0)

      ) on AppName

      | extend isDTUSingleton = isVcore == 0 and isEP == 0 and isWI

      // For DTU singleton, POOL_LOG_RATE_GOVERNOR/LOG_RATE_GOVERNOR get mixed here and actually they both indicate DB log rate limit hit.

      // So here we change POOL_LOG_RATE_GOVERNOR to LOG_RATE_GOVERNOR if it is DTU singleton.

      // Note the reason we do this weird change is that the logic/query can be tricky if we take updateSLO into consideration here. For now the summarize (aggregation) is done

      // only on wait_type, which doesn''t distinguish SLOs or EP or etc. If we want to check details for different apps, app types, EP or not EP here, it would be better to plot a chart

      // for these log related waits. This is a future improvement.

      //

      | extend wait_type = iff(wait_type == ''POOL_LOG_RATE_GOVERNOR'' and isDTUSingleton, ''LOG_RATE_GOVERNOR'', wait_type)

      | summarize delta_wait_time_ms = sum(delta_wait_time_ms),

      delta_waiting_tasks_count = sum(delta_waiting_tasks_count) by wait_type,

      bin(TIMESTAMP, p_sample_interval)

      | extend avg_ms = round(delta_wait_time_ms / (1. * delta_waiting_tasks_count), 2)

      | extend insight_level = iff(delta_wait_time_ms > p_wait_ms_per_sample or avg_ms > p_average_wait_per_sample, 1, 0)

      | summarize throttled_samples = count(),

      impacted_samples = countif(insight_level > 0) by wait_type

      | where throttled_samples > p_throttled_samples_threshold or impacted_samples > p_impacted_samples_threshold

      | extend throttling_desc = iff(wait_type in (''POOL_LOG_RATE_GOVERNOR'', ''INSTANCE_LOG_RATE_GOVERNOR''), ''Pool/Instance log rate limits hit'',

      iff(wait_type == ''LOG_RATE_GOVERNOR'', ''DB log rate limit hit'',

      iff(wait_type == ''THROTTLE_LOG_RATE_LOG_STORAGE'', ''Log size limit hit'',

      iff(wait_type == ''HADR_THROTTLE_LOG_RATE_MISMATCHED_SLO'', ''Geodr replicas (maybe with smaller capabilities) cant catch up'',

      ''Replication not able to keep up or something prevents log from truncation''))))

      | extend suggestion = iff(wait_type in (''POOL_LOG_RATE_GOVERNOR'', ''INSTANCE_LOG_RATE_GOVERNOR''), ''For elastic pools check overall utilization, not only database; most common mitigation update SLO'',

      iff(wait_type == ''LOG_RATE_GOVERNOR'', ''Update SLO'',

      iff(wait_type == ''THROTTLE_LOG_RATE_LOG_STORAGE'', ''If MI, increase the log size to provision a larger log; Otherwise involve availability team if wait analysis or the incident specifically targets these waits'',

      iff(wait_type == ''HADR_THROTTLE_LOG_RATE_MISMATCHED_SLO'', ''Upgrade the geo replicas to match(or have higher SLOs than) the source'',

      ''Reroute/Involve availability team if wait analysis or the incident specifically targets these waits''))))

      | extend status = iff(wait_type in (''LOG_RATE_GOVERNOR'', ''HADR_THROTTLE_LOG_RATE_MISMATCHED_SLO''), ''Warning'', ''Info'')

      | project wait_type, throttling_desc, status, suggestion'
