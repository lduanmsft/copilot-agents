- id: DB-performance-767
  Topic: PPTSG-VHD01A-Dynamic-VHD-Grower-VHD-File-erroneous
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPTSG-VHD01A-Dynamic-VHD-Grower-VHD-File-erroneous.md
  Prompts:
  - SQL DB RG manager errors
  - SQL DB MonRgManager event ClusterName error_message
  - SQL DB troubleshoot RG manager errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: 'MonRgManager

      | where originalEventTimestamp > p_start_utc_date and originalEventTimestamp <= p_end_utc_date

      | where event == "vhd_growth_error" and error_message contains_cs "VHD growth file erroneously present."

      | summarize nodes_erroring = make_set(NodeName), cas_commands = make_set(strcat(''Update-RgResourceSettings -ClusterName '', ClusterName, '' -NodeName '', NodeName, @'' -ApplicationName fabric:RgManagerTenant -ResourceType DynamicVHDGrowerStart -ResourceValue 0'')), most_recent_error_timestamp = max(TIMESTAMP), num_file_present_errors = count() by ClusterName, TIMESTAMP_sample=bin(TIMESTAMP, p_aggregation_interval)

      | where num_file_present_errors > p_num_violations_per_interval_for_detection

      | summarize nodes_erroring = make_set(nodes_erroring), cas_commands = make_set(cas_commands), most_recent_error_timestamp = max(most_recent_error_timestamp), num_file_present_errors = sum(num_file_present_errors) by ClusterName

      | extend region = strcat(

      iff(ClusterName contains ''sqltest'' or ClusterName contains ''lkgtst'', ''stage'', ''prod''),

      ''-'',

      extract(''([0-9A-Za-z]*).([0-9A-Za-z_-]*).([0-9A-Za-z_]*)'', 2, ClusterName))

      | extend recommended_severity = iff(not(region contains ''prod''), "sev4", "sev3"), p_num_violations_per_interval_for_detection // Set severity is lower for stage

      | extend tsg_name = "PPTSG-VHD01A"'
- id: DB-performance-768
  Topic: PPTSG-VHD01A-Dynamic-VHD-Grower-VHD-File-erroneous
