  - TableName: MonSqlCaches
    ExecutedQuery: 'MonSqlCaches

      | where AppName == _appName and NodeName == _nodeName

      | where TIMESTAMP between (_startTime .. _endTime)

      | where store_type == "CACHESTORE_PHDR"

      | extend store_soft_quota_kb = store_soft_quota * 8.0, store_hard_quota_kb = (store_hard_quota * 8.0)

