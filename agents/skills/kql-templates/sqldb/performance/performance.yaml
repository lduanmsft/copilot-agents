- id: DB-performance-504
  Topic: TSG-PFS-General-Debugging-Queries
  Source: TSG-SQL-DB-Performance/content/IORG/PremiumFileShare/TSG-PFS-General-Debugging-Queries.md
  Prompts:
  - SQL DB counter one minute analysis
  - SQL DB MonCounterOneMinute TIMESTAMP iops MaxVal
  - SQL DB investigate counter one minute
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'let shareName = "{file_share_name}";

      let accountName = "{storage_account_name}";

      let c0 = MonCounterOneMinute

      | where TIMESTAMP > datetime("{startTime}") and TIMESTAMP < datetime("{endTime}")

      | where CounterName contains "SMB" and CounterName contains accountName and CounterName contains shareName

      | where CounterName contains "Avg. sec/Read"

      | project TIMESTAMP, MinVal , MaxVal, CounterValue

      | extend readLatecnyMs = CounterValue * 1000

      | project TIMESTAMP , readLatecnyMs;

      let c1 = MonCounterOneMinute

      | where TIMESTAMP > datetime("{startTime}") and TIMESTAMP < datetime("{endTime}")

      | where CounterName contains "SMB" and CounterName contains accountName and CounterName contains shareName

      | where CounterName contains "Avg. sec/Write"

      | project TIMESTAMP, MinVal , MaxVal, CounterValue

      | extend writeLatecnyMs = CounterValue * 1000

      | project TIMESTAMP , writeLatecnyMs;

      let c2 = MonCounterOneMinute

      | where TIMESTAMP > datetime("{startTime}") and TIMESTAMP < datetime("{endTime}")

      | where CounterName contains "SMB" and CounterName contains accountName and CounterName contains shareName

      | where CounterName contains "Read Bytes/sec"

      | where CounterValue > 0

      | project TIMESTAMP, MinVal , MaxVal, CounterValue

      | extend read_mbps = toint(CounterValue / 1024 / 1024)

      | extend read_max_mbps = toint(MaxVal / 1024 / 1024)

      | project TIMESTAMP , read_mbps , read_max_mbps ;

      let c3 = MonCounterOneMinute

      | where TIMESTAMP > datetime("{startTime}") and TIMESTAMP < datetime("{endTime}")

      | where CounterName contains "SMB" and CounterName contains accountName and CounterName contains shareName

      | where CounterName contains "Write Bytes/sec"

