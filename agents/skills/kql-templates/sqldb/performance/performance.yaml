- id: DB-performance-283
  Topic: Why-Failover-Occurred
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Why-Failover-Occurred.md
  Prompts:
  - SQL DB dump activity
  - SQL DB MonSqlDump LogicalServerName AppName NodeName
