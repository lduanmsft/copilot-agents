    ExecutedQuery: 'AlrRgManager

      | where TIMESTAMP >= ago(30m)

      | where ClusterName == "{tr_full_name}" and NodeName == "{node_name}"

      | where event == "hot_overbooked_core_violation" and violation_type == "ResourceCompetition"

      | project originalEventTimestamp, ClusterName , NodeName , event , violation_type , app_usage_map'
- id: DB-performance-737
  Topic: PPBOT-034-B-C1C2-Violations
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-034-B-C1C2-Violations.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB AlrRgManager event NodeName ClusterName
