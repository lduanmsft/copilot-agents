- id: DB-performance-300
  Topic: Storage Types
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Storage Types.md
  Prompts:
  - SQL DB rg history analysis
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where PreciseTimeStamp >= iterationStartTime and PreciseTimeStamp <= iterationEndTime

      | where AppTypeName in (split(replace_string(appType, '' '', ''''), '','')) // support multiple app type names separated by comma

      | where event == "aggregated_virtual_files_io_history"

      | extend pfs_storage_account_name = extract(@"https://([^\.]+)\.blob\.core\.windows\.net|\\\\([^\.]+)\.file\.core", 1, file_path)

