- id: DB-performance-241
  Topic: MMSOP-Memory-Management-SOPs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/MMSOP-Memory-Management-SOPs.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB sql caches event AppName NodeName PreciseTimeStamp
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - AppName
  - DatabaseName
  - NodeName
  - ServerName
  KustoQueries:
  - TableName: MonSqlCaches
    ExecutedQuery: '| where AppName == "{AppName}"


      | where event == "memory_cache_hash_table_stats"


      | where NodeName == "{NodeName}"


      | project PreciseTimeStamp, tag_id, store_name, store_type, store_address, table_level, buckets_count, buckets_in_use_count, buckets_min_length, buckets_max_length, buckets_avg_length, buckets_max_length_ever, hits_count, misses_count, buckets_avg_scan_hit_length, buckets_avg_scan_miss_length  Identify slow shrink. Also identify when object stores has less cached entries and thus most entries are in use.MonSqlCaches


      | where TIMESTAMP &gt; datetime(10/26/2019 2:28:54 PM) and TIMESTAMP &lt; datetime(10/26/2019 7:28:54 PM)


      | where AppName == "{AppName}"


      | where event == "clock_hand_stats"


      | where NodeName == "{NodeName}"


      | where store_type == "OBJECTSTORE_LOCK_MANAGER"


      | extend removed_ratio = removed_last_round*1.0/visited_last_round


      | project PreciseTimeStamp, removed_ratio, visited_last_round, removed_last_round  <tr class="even">MonDmExecCachedPlansSummaryCheck cached plan summaryMonDmExecCachedPlansSummary| where PreciseTimeStamp &gt; datetime(2018-06-06 01:30) and PreciseTimeStamp &lt; datetime(2018-06-06 07:30)| where AppName == "{AppName}" | where NodeName == "{NodeName}"| where pool_id == 2000000012| project TIMESTAMP, objtype, size_in_megabytes_max | render timechart  Adhoc and Prepared for plan cache<tr class="odd">MonSqlBrokerRingBufferPool memory adjustment algorithm. Find out broker''s status such as last notification, current allocations, target, overall limit for the memory poolFind out all the pool metadata id''s and choose one that is interesting. For instance, for single DB, we are looking for SLO user pool metadata id.MonSqlBrokerRingBuffer| where NodeName == \"{NodeName}\" and AppName == "{AppName}"| summarize by pool_metadata_id Find out notifications, allocations etc.MonSqlBrokerRingBuffer


      | where TIMESTAMP &gt; datetime(2017-05-31 22:15:00)


      | where NodeName == "{NodeName}" and AppName == "{AppName}"


      | where pool_metadata_id == 2000000012


      | project TIMESTAMP, broker, notification, currently_allocated_kb=currently_allocated*8, previously_allocated_kb=previously_allocated*8, overall_kb=overall*8, currently_predicated_kb=currently_predicated*8, new_target_kb=new_target*8 <tr class="even">MonRgLoadTotal process consumption (SOS + non-SOS)MonRgLoad| where application_name has "a0949cb3798d" and event == "instance_load" and code_package_name == "Code"| where TIMESTAMP &gt;= ago(1h)| project TIMESTAMP , NodeName, memory_load , memory_load_cap , cpu_load , cpu_load_cap, memory_current_cap, allocated_cpus Affinity is specified in allocated_cpus<tr class="odd">   <tr class="even">Non-SOS memory consumptionNon-SOS memory consumption= (total consumption) memory_load from MonRgLoad - (committed_kb/1024) from MonSqlRmRingBuffer (SOS consumption) MonSqlRmRingBuffer| where TIMESTAMP &gt; now(-6h)| where notification == "MEMPHYSICAL_LOW"| where AppName == "{AppName}" and NodeName == "{NodeName}"| project TIMESTAMP, committed_kb , target_kb , job_object_limit_job_mem_kb , peak_job_memory_used_kb MonRgLoad| where application_name contains \"{AppName}\" and event == "instance_load" and code_package_name == "Code"| where TIMESTAMP &gt;= ago(1h)| project TIMESTAMP , NodeName, memory_load , memory_load_cap , cpu_load , cpu_load_cap  <tr class="odd">Memory grant per group MonGovernorWorkloadGroups

