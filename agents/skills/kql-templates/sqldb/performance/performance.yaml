    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | where TIMESTAMP >= ago({TimeRange}) and TIMESTAMP <= now()

      | where replica_type == 0

      | top 1 by TIMESTAMP desc

      | project cpu_cap_in_sec );'
- id: DB-performance-57
  Topic: Monitor-for-woolworth-upgrade-_ICM-59546911_
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Monitor-for-woolworth-upgrade-_ICM-59546911_.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats database_name LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | where TIMESTAMP >= ago({TimeRange}) and TIMESTAMP <= now()

      | where is_primary == 1

      | summarize total_cpu_ms=(sum(cpu_time)*1.0/(1000)), total_exec_count=sum(execution_count), total_logical_reads=sum(logical_reads) by TIMESTAMP=bin(TIMESTAMP, 15min)

      | order by TIMESTAMP asc nulls first

      | serialize

      | extend PrevTimestamp=prev(TIMESTAMP, 1)

      | where isnull(PrevTimestamp) == false

      | extend elapsed_second = datetime_diff (''second'', TIMESTAMP, PrevTimestamp)

      | extend cpu_percent_over_dtu=round((total_cpu_ms*100.0/1000)/(elapsed_second* cpu_cap_in_sec),2)

      | extend exec_count_per_cpu_per_sec=total_exec_count/(elapsed_second* cpu_cap_in_sec)

      | extend logical_reads_per_cpu_per_sec=total_logical_reads/(elapsed_second* cpu_cap_in_sec)

      | project TIMESTAMP, cpu_percent_over_dtu,exec_count_per_cpu_per_sec //, logical_reads_per_cpu_per_sec

      | render timechart'
- id: DB-performance-58
  Topic: Monitor-for-woolworth-upgrade-_ICM-59546911_
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Monitor-for-woolworth-upgrade-_ICM-59546911_.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats database_name LogicalServerName
  - SQL DB troubleshoot CPU pressure
