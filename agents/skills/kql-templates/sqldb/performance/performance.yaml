- id: DB-performance-243
  Topic: MMSOP-Memory-Management-SOPs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/MMSOP-Memory-Management-SOPs.md
  Prompts:
  - SQL DB deadlock analysis
  - SQL DB MonWiQdsWaitStats event database_name AppName
  - SQL DB troubleshoot deadlock
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsWaitStats
    ExecutedQuery: "MonWiQdsWaitStats\n\n| where originalEventTimestamp &gt; ago(1h)\n\n| summarize all_total_query_wait_time_ms=sum(total_query_wait_time_ms) by ClusterName, AppTypeName, AppName, LogicalServerName, NodeName\n\n) on ClusterName, AppTypeName, AppName, LogicalServerName, NodeName\n\n| where app_mem_compil_total_query_wait_time_ms * 1.0 / all_total_query_wait_time_ms &gt; 0.30\n\n| project ClusterName, AppTypeName, AppName, LogicalServerName, NodeName, wait_category, all_total_query_wait_time_ms, app_mem_compil_total_query_wait_time_ms   <tr class=\"even\">MonWiQdsExecStatsCheck query memory grants from QDSTop 10 queries with CPU usages.MonWiQdsExecStats\n\n| where TIMESTAMP &gt; datetime(2019-01-16 10:00:00) and TIMESTAMP &lt; datetime(2019-01-16 19:00:00)\n\n| where AppName == \"{AppName}\"\n\n| where NodeName == \"{NodeName}\"\n\n| summarize sum(execution_count), sum(cpu_time), sum(max_query_memory_pages) by query_hash, plan_id, query_id\n\n| order by sum_cpu_time desc\n\n| take 10  Check the top 10 queries with largest memory grants in incident time periodMonWiQdsExecStats| where TIMESTAMP &gt; ago(6h)| where AppName == \"{AppName}\" and database_name =~ \"{DatabaseName}\" | summarize sum(execution_count), sum(cpu_time), sum(max_query_memory_pages), sum(max_logical_writes), sum(max_logical_reads) by query_id, plan_id| project query_id, plan_id, sum_execution_count, sum_max_query_memory_pages, sum_max_logical_writes, sum_max_logical_reads | order by sum_max_logical_writes, sum_max_logical_reads| take 10 Then check if the query workload has changed recentlyMonWiQdsExecStats | where originalEventTimestamp &gt; now(-3d)| where AppName == \"{AppName}\"| where query_id == 535| summarize sum(execution_count) by bin(originalEventTimestamp, 15min)| render timechart  Check query memory grants for each plan given a query id.MonWiQdsExecStats | where originalEventTimestamp &gt; datetime(2017-06-01 11:00:00) and originalEventTimestamp &lt; datetime(2017-06-01 13:30:00)| where AppName == \"{AppName}\"| where query_id == 1033165| summarize sum(execution_count), sum(cpu_time), sum(max_query_memory_pages) by plan_id| extend avg_cpu_time_milliseconds = sum_cpu_time / sum_execution_count / 1000| extend avg_max_query_memory_megabytes = 8 * sum_max_query_memory_pages / sum_execution_count / 1024| project plan_id, sum_execution_count, avg_cpu_time_milliseconds, avg_max_query_memory_megabytes Check execution countMonWiQdsExecStats | where TIMESTAMP &gt; datetime(2017-05-31 15:00:00)| where AppName == \"{AppName}\"| where query_id == 1033165 and plan_id == 671255| project originalEventTimestamp, execution_count <tr class=\"odd\">MonBlockedProcessReportFilteredBlocked process reportsMonBlockedProcessReportFiltered \n\n| where LogicalServerName == \"{ServerName}\" and logical_database_name == \"{DatabaseName}\"\n\n| where originalEventTimestamp &gt;= datetime(06-14-2017 22:25:00) and originalEventTimestamp &lt; datetime(06-15-2017 01:00:00)\n\n| parse blocked_process_filtered with anystr:string\"&lt;blocking-process&gt;\" blocking:string \"&lt;executionStack/&gt;\" ExcType:string\n\n| parse blocked_process_filtered with anystr:string\"&lt;blocked-process&gt;\" blocked:string \"/&gt;\" ExcType:string\n\n| parse blocked with anystr:string\"&lt;frame queryhash=\"\"query_hash:string\"\" queryplanhash=\"\"query_plan_hash:string\"\"\"anystr:string\n\n| parse blocking with anystr:string\"spid=\"\"blocking_spid:string\"\"\"anystr:string\"xactid=\"\"blocking_xactid:string\"\"\"anystr:string MonBlockedProcessReportFiltered\n\n| where TIMESTAMP &gt; ago(1d)\n\n| where AppName == \"{AppName}\"\n\n| where NodeName == \"{NodeName}\"\n\n| project TIMESTAMP, duration, database_name, object_id, index_id, lock_mode, transaction_id, resource_owner_type, blocked_process_filtered<tr class=\"even\">MonWiQueryParamData  <tr class=\"odd\">MonResourcePoolStatsElastic pool instance level statsMonResourcePoolStats\n\n| where TIMESTAMP &gt; ago(2h)\n\n| where LogicalServerName =~ \"{ServerName}\" and resource_pool_name == \"P25M1000\"\n\n| project start_time, avg_cpu_percent, avg_data_io_percent, avg_log_write_percent, avg_memory_usage_percent, data_storage_percent, peak_worker_percent, peak_session_percent\n\n| render timechart<tr class=\"even\">MonQPTelemetry  <tr class=\"odd\">MonDeadlockReportsFiltered  <tr class=\"even\">MonAttentions Check if there are cancellations from client driverMonAttentions\n\n| where AppName == \"{AppName}\"\n\n| where client_hostname == \"CAZURED365POC\"\n\n| project TIMESTAMP, NodeName, duration, database_name, client_app_name, session_id, client_hostname , event, sessionName <tr class=\"odd\">MonQueryProcessing MonQueryProcessing with query_memory_grants, query_memory_grant_resource_semaphores, query_memory_grant_wait_timeout<tr class=\"even\">MonSqlFrontend MonSqlFrontend| where event == \"frontend_memory_usage\" | where AppName == \"{AppName}\"| order by originalEventTimestamp desc<tr class=\"odd\">MonDmUserActivityDetectionCheck if deflation has applied to a DB.MonDmUserActivityDetection| where event like “defl” and AppName == “?” and database_name == “?” and LogicalServerName == “?”| project TimeSTAMP, instance_rg_slo_name If instance_rg_slo_name is Pquarter, then it is deflated.<tr class=\"even\">MonBlockedProcessReportFiltered  let blockingchain=MonBlockedProcessReportFiltered \n\n//| where TIMESTAMP &gt; datetime(2017-10-06 12:54:00) and TIMESTAMP &lt; datetime(2017-10-06 12:55:00)\n\n| where TIMESTAMP &gt; datetime(2017-10-05 19:50:00)  and TIMESTAMP &lt; datetime(2017-10-05 23:16:54.5890000)\n\n| where LogicalServerName =~ \"{ServerName}\" and AppName =~ \"{AppName}\" and NodeName =~\"{NodeName}\" and logical_database_name =~ \"{DatabaseName}\" \n\n| extend monitorLoop = extract(\"monitorLoop=\"([0-9]+)\"\", 1, blocked_process_filtered, typeof(int))\n\n| parse blocked_process_filtered with anystr3:string \"&lt;blocked-process&gt;\" blockee \"&lt;/blocked-process&gt;\" discard1\n\n| parse blocked_process_filtered with anystr4:string\"&lt;blocking-process&gt;\" blocker \"&lt;/blocking-process&gt;\" discard2\n\n| extend blockee_session_id = extract(\"spid=\"([0-9]+)\"\", 1, blockee, typeof(int))\n\n| extend blockee_status = extract(\"status=\"(.*?)\"\", 1, blockee, typeof(string))\n\n| extend blockee_waittime = extract(\"waittime=\"([0-9]+)\"\", 1, blockee, typeof(int))\n\n| extend blockee_trancount = extract(\"trancount=\"([0-9]+)\"\", 1, blockee, typeof(int))\n\n| extend blockee_lasttranstarted = extract(\"lasttranstarted=\"(.*?)\"\", 1, blockee, typeof(datetime))\n\n| extend blockee_queryhhash = extract(\"queryhash=\"(.*?)\"\", 1, blockee, typeof(string))\n\n| extend blockee_isolationlevel = extract(\"isolationlevel=\"(.*?)\"\", 1, blockee, typeof(string))\n\n| extend blockee_lastattention = extract(\"lastattention=\"(.*?)\"\", 1, blockee, typeof(datetime))\n\n| extend blockee_lastattention = extract(\"lastattention=\"(.*?)\"\", 1, blockee, typeof(datetime))\n\n| extend blockee_lastbatchstarted = extract(\"lastbatchstarted=\"(.*?)\"\", 1, blockee, typeof(datetime))\n\n| extend blockee_waitresource = extract(\"waitresource=\"(.*?)\"\", 1, blockee, typeof(string))\n\n| extend blocker_session_id = extract(\"spid=\"([0-9]+)\"\", 1, blocker, typeof(int))\n\n| extend blocker_status = extract(\"status=\"(.*?)\"\", 1, blocker, typeof(string))\n\n| extend blocker_waittime = extract(\"waittime=\"([0-9]+)\"\", 1, blocker, typeof(int))\n\n| extend blocker_trancount = extract(\"trancount=\"([0-9]+)\"\", 1, blocker, typeof(int))\n\n| extend blocker_lasttranstarted = extract(\"lasttranstarted=\"(.*?)\"\", 1, blocker, typeof(datetime))\n\n| extend blocker_queryhhash = extract(\"queryhash=\"(.*?)\"\", 1, blocker, typeof(string))\n\n| extend blocker_isolationlevel = extract(\"isolationlevel=\"(.*?)\"\", 1, blocker, typeof(string))\n\n| extend blocker_lastattention = extract(\"lastattention=\"(.*?)\"\", 1, blocker, typeof(datetime))\n\n| extend blocker_lastattention = extract(\"lastattention=\"(.*?)\"\", 1, blocker, typeof(datetime))\n\n| extend blocker_lastbatchstarted = extract(\"lastbatchstarted=\"(.*?)\"\", 1, blocker, typeof(datetime))\n\n//| project PreciseTimeStamp, monitorLoop, blockee_session_id , blocker_session_id\n\n| order by monitorLoop asc nulls last;\n\nlet leadblockers=\n\nblockingchain\n\n| join kind= rightanti (\n\nblockingchain\n\n) on $left.monitorLoop == $right.monitorLoop and $left.blockee_session_id==$right.blocker_session_id\n\n| extend lead_blocker_session_id = blocker_session_id\n\n| distinct monitorLoop, lead_blocker_session_id;\n\nleadblockers\n\n| join kind= inner (\n\nblockingchain\n\n) on $left.monitorLoop == $right.monitorLoop and $left.lead_blocker_session_id==$right.blocker_session_id\n\n| order by TIMESTAMP asc nulls last\n\n| project PreciseTimeStamp, lead_blocker_session_id, blocker_session_id, blocker_trancount, blocker_lastattention , blocker_queryhhash=toupper(blocker_queryhhash), blocker_status ,\n\nblockee_session_id, blockee_waitresource , blockee_queryhhash=toupper(blockee_queryhhash) , blockee_waittime , blockee_status, blocked_process_filtered=toupper(blocked_process_filtered)<tr class=\"odd\">MonSqlSampledBufferPoolDescriptorsCheck buffer pool page types.Check buffer pool page typesMonSqlSampledBufferPoolDescriptors\n\n| where AppName == \"{AppName}\"\n\n| where NodeName == \"{NodeName}\"\n\n| summarize count(), min(TIMESTAMP) by tag_id, page_type\n\n| project-away tag_id\n\n| project min_TIMESTAMP, page_type , count_\n"
- id: DB-performance-245
  Topic: MMSOP-Memory-Management-SOPs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/MMSOP-Memory-Management-SOPs.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB cpu_usage_percent event LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: '| where AppName == "{AppName}"


      | where NodeName == "{NodeName}"


      | where TIMESTAMP between (ago({TimeRange}) .. datetime(2019-01-23 13:05:00))


      | where event == "aggregated_workload_groups_plus_history"


      | project TIMESTAMP, group_name,


      cpu_usage_percent = delta_total_cpu_usage_ms / &lt;number of cores&gt; / duration_time_ms * 100.0,


      read_mpbs_max = read_bytes_total_per_second_max / 1024. / 1024.,


      write_mpbs_max = write_bytes_total_per_second_max / 1024. / 1024.,


      read_throughput = delta_read_bytes_total / datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample) / 1024. / 1024.,


      write_throughput = delta_write_bytes_total / datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample) / 1024. / 1024.


      | project TIMESTAMP, group_name, cpu_usage_percent


      | render timechart MonSqlRgHistory


      | where AppName == "{AppName}"


      | where event == "aggregated_resource_pools_plus_history"


      | where pool_name contains "DBId"


      | where NodeName == "{NodeName}"


      | project TIMESTAMP, NodeName, pool_name, target_memory_kb_avg, memory_cap_kb  <tr class="odd">MonDmOsSpinlockStats MonDmOsSpinlockStats | where TIMESTAMP &gt; ago(1d)| where AppName == "{AppName}"| where NodeName == "{NodeName}"| where delta_collisions &gt; 100000| project TIMESTAMP , name , delta_collisions , delta_spins , spins_per_collision | render timechart<tr class="even">MonDatabaseMetadataFind DB scoped maxdop.MonDatabaseMetadata| where LogicalServerName=~ "{ServerName}" and AppName =~ "{AppName}" //logical_db_name =~ "{DatabaseName}"| where table_name== "sysobjvalues" and valclass ==7 and objid == 1032 //DB_CONFIG_MAX_DOP | project TIMESTAMP, MAXDOP=value<tr class="odd">MonSqlIdleMemCollectorStats1.       Check potential memory pressure.2.       Check potential memory leaks   MonSqlIdleMemCollectorStats


      | where event == "sql_memory_perf_stats"


      | where AppName == "{AppName}"


      | where NodeName == "{NodeName}"


      | project TIMESTAMP, initial_job_memory_cap_kb=initial_job_memory_cap*8, current_job_memory_cap_kb=current_job_memory_cap*8, node_available_physical_memory_kb=node_available_physical_memory*8, ideal_target_kb=ideal_target*8, current_target_kb=current_target*8, memory_usage_kb=memory_usage*8, current_commit_kb=current_commit*8, non_sos_usage_kb=non_sos_usage*8, memory_pressure  Check potential memory leaksMonSqlIdleMemCollectorStats


      | where event == "sql_suspect_memory_clerk_leaks" and estimated_line_slope &gt; 0 and memory_usage_match_line_percent &gt; 0.95


      | project TIMESTAMP, AppName, NodeName, ClusterName, estimated_line_slope, estimated_line_offset, memory_usage_match_line_percent, memory_clerk_type <tr class="even">   '
- id: DB-performance-246
  Topic: MMSOP-Memory-Management-SOPs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/MMSOP-Memory-Management-SOPs.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth LogicalServerName AppName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'let oomApps = MonSQLSystemHealth

      | where AppTypeName == "Worker.ISO.Premium" or AppTypeName == "Worker.ISO"

      | where message contains "Failed allocate pages: FAIL_PAGE_ALLOCATION" or message contains "Failed Virtual Allocate Bytes: FAIL_VIRTUAL_RESERVE"

      | summarize oom_count=count(message) by ClusterName, AppTypeName, AppName, LogicalServerName, NodeName, bin(TIMESTAMP, 15m);

      let singleDbApps = MonDmDbResourceGovernance

      | where AppTypeName == "Worker.ISO.Premium" or AppTypeName == "Worker.ISO"

      | where slo_name !startswith "M"

      | summarize by ClusterName, AppTypeName, AppName, LogicalServerName, NodeName, slo_name;

      let oomSingleDbs = oomApps

      | join kind= inner (singleDbApps) on ClusterName, AppTypeName, AppName, LogicalServerName, NodeName

      | project-away ClusterName1, AppTypeName1, AppName1, LogicalServerName1, NodeName1;'
- id: DB-performance-247
  Topic: Memory-grants
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Memory-grants.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats AppName NodeName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where TIMESTAMP > ago({TimeRange}) and TIMESTAMP < now()

      | where NodeName == "{NodeName}" and AppName == "{AppName}"

      | summarize sum(execution_count), sum(cpu_time), sum(max_query_memory_pages) by query_id, plan_id

      | project query_id, plan_id, sum_execution_count, sum_max_query_memory_pages

      | order by sum_max_query_memory_pages

      | take 10'
- id: DB-performance-248
  Topic: Memory-grants
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Memory-grants.md
  Prompts:
  - SQL DB QDS exec stats activity
  - SQL DB MonWiQdsExecStats AppName originalEventTimestamp
  - SQL DB investigate QDS exec stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where originalEventTimestamp > now(-3d)

      | where AppName == "{AppName}"

      | where query_id == 535

      | summarize sum(execution_count) by bin(originalEventTimestamp, 15min)

