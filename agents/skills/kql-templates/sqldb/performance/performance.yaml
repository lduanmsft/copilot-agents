- id: DB-performance-252
  Topic: PERFTS014-Sub-core-Insights
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/PERFTS014-Sub-core-Insights.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonDmRealTimeResourceStats event AppName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'let p_aggregation_window = 15m;

      let p_high_single_consumption = 90.0;

      let p_high_workers = 30.0;

      let p_high_workers_correlated_consumption = 60.0;

      let p_high_multi_dimensions = 180.0;

      let usergroup_usage = MonDmRealTimeResourceStats

      | where {AppNamesNodeNamesWithTimeRange}

      | where AppTypeName == ''Worker.ISO'' and (slo_name startswith ''Basic_'' or slo_name startswith ''S0_'' or slo_name startswith ''S1_'' or slo_name startswith ''S2_'')

      | extend slo_name = iff(slo_name startswith ''Basic_'', ''Basic'', iff(slo_name startswith ''S0_'', ''S0'', iff(slo_name startswith ''S1_'', ''S1'', iff(slo_name startswith ''S2_'', ''S2'', ''''))))

      | where replica_type == 0

      | extend high_cpu = avg_cpu_percent > p_high_single_consumption, high_io = avg_data_io_percent > p_high_single_consumption, high_log_writes = avg_log_write_percent > p_high_single_consumption,

      high_sessions = max_session_percent > p_high_single_consumption,

      high_workers = max_worker_percent > p_high_workers and(avg_cpu_percent > p_high_workers_correlated_consumption or avg_data_io_percent > p_high_workers_correlated_consumption),

      high_multi_dimensions = avg_cpu_percent + avg_data_io_percent + avg_log_write_percent > p_high_multi_dimensions

      | summarize cnt = count() * 1.0, high_cpu_cnt = countif(high_cpu), high_io_cnt = countif(high_io), high_log_writes_Cnt = countif(high_log_writes),

      high_sessions_cnt = countif(high_sessions), high_workers_cnt = countif(high_workers), high_multi_dimensions_cnt = countif(high_multi_dimensions)

      by slo_name, bin(TIMESTAMP, p_aggregation_window)

      | extend CPU = (p_aggregation_window/1m)*high_cpu_cnt/cnt, IO = (p_aggregation_window/1m)*high_io_cnt/cnt, LogWrites = (p_aggregation_window/1m)*high_log_writes_Cnt/cnt,

      Sessions = (p_aggregation_window/1m)*high_sessions_cnt/cnt, Workers = (p_aggregation_window/1m)*high_workers_cnt/cnt, MultiDimensions = (p_aggregation_window/1m)*high_multi_dimensions_cnt/cnt

      | project TIMESTAMP, slo_name, CPU, IO, LogWrites, Sessions, Workers, MultiDimensions;

      let cpu_table = usergroup_usage

      | project TIMESTAMP, key = strcat(slo_name, ''_'', ''CPU''), value = CPU

      | where value > 0;

      let io_table = usergroup_usage

      | project TIMESTAMP, key = strcat(slo_name, ''_'', ''IO''), value = IO

      | where value > 0;

      let log_table = usergroup_usage

      | project TIMESTAMP, key = strcat(slo_name, ''_'', ''LogWrites''), value = LogWrites

      | where value > 0;

      let session_table = usergroup_usage

      | project TIMESTAMP, key = strcat(slo_name, ''_'', ''Sessions''), value = Sessions

      | where value > 0;

      let worker_table = usergroup_usage

      | project TIMESTAMP, key = strcat(slo_name, ''_'', ''Workers''), value = Workers

      | where value > 0;

      let multiDimension_table = usergroup_usage

      | project TIMESTAMP, key = strcat(slo_name, ''_'', ''MultiDimensions''), value = MultiDimensions

      | where value > 0;

      //

      // Part 2: Check high instance cpu usage.

      let p_high_instance_consumption = 95.0;

      let p_kernel_threshold = 40.0;

      let p_sample_window = 5m;

      let instance_cpu_mem_table = MonRgLoad

      | extend TIMESTAMP = originalEventTimestampFrom

      | where {ApplicationNamesNodeNames}

      | where event == ''instance_load'' and code_package_name == ''Code''

      | where application_type == ''Worker.ISO'' and slo_size in (''Test25S0'',''Test25B'',''Test50S1'', ''Test50'')

      | extend slo_name = iff(slo_size == ''Test25B'', ''Basic'', iff(slo_size == ''Test25S0'', ''S0'', iff(slo_size == ''Test50S1'', ''S1'', iff(slo_size == ''Test50'', ''S2'', ''''))))

      | extend AppName = extract(''fabric:/Worker.ISO/(.+)'', 1, application_name)

      | extend external_pressure = (memory_current_cap != memory_load_cap) or (memory_load*1.0/ memory_load_cap < 0.7)

      | extend high_instance_cpu = cpu_load * 100.0 / cpu_load_cap > p_high_instance_consumption, high_kernel = kernel_load*100.0/cpu_load_cap > p_kernel_threshold

      | summarize cnt = count()*1.0, high_instance_cpu_cnt = countif(high_instance_cpu), high_kernel_cnt = countif(high_kernel), external_pressure = countif(external_pressure) by AppName,slo_name, bin(TIMESTAMP, p_sample_window)

      | join kind = leftouter('
- id: DB-performance-253
  Topic: PERFTS014-Sub-core-Insights
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/PERFTS014-Sub-core-Insights.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB instance_cpu_mem_table AppName NodeName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where {AppNamesNodeNamesWithTimeRange}

      | where instance_rg_size in (''Test25S0'',''Test25B'',''Test50S1'', ''Test50'')

      | where (message contains ''MSR'' and message contains ''Memory Manager'') or (message contains ''Error: 701'' and message contains ''There is insufficient system memory in resource pool ''UserPool'')

      | project TIMESTAMP, AppName, NodeName, message

      | extend UserPoolPressure = iff(message contains ''Error: 701'', 1, 0)

      | extend OOMFactor = extract(''Last OOM Factor(.+)'', 1, message, typeof(long))

      | summarize process_pressure = countif(OOMFactor == 1), pool_pressure = countif(OOMFactor == 5), user_pool = sum(tolong(UserPoolPressure)) by AppName, bin(TIMESTAMP, p_sample_window)

      | where process_pressure > 0 or (pool_pressure > 0 and user_pool > 0)

      | summarize oom_cnt = count() by AppName, bin(TIMESTAMP, p_sample_window)

      ) on TIMESTAMP, AppName

      | extend exclude_pressure = iff(external_pressure > 0, 0, 1)

      | extend high_memory_cnt = iff(oom_cnt > 0, cnt, high_kernel_cnt*1.0)

      | summarize cnt = sum(cnt) * 1.0, high_memory_cnt = sum(high_memory_cnt*exclude_pressure), high_instance_cpu_cnt = sum(high_instance_cpu_cnt) by slo_name, bin(TIMESTAMP, p_aggregation_window)

      | extend Memory = high_memory_cnt/cnt * (p_aggregation_window/1m), InstanceCpu = high_instance_cpu_cnt/cnt* (p_aggregation_window/1m)

      | project TIMESTAMP, slo_name, Memory, InstanceCpu;

      let instance_cpu_table = instance_cpu_mem_table

      | project TIMESTAMP, key = strcat(slo_name,''_'',''InstanceCpu''), value = InstanceCpu

      | where value > 0;

      let mem_table = instance_cpu_mem_table

      | project TIMESTAMP, key = strcat(slo_name,''_'',''Memory''), value = Memory

      | where value > 0;'
- id: DB-performance-254
  Topic: Query-Store-queries-_Managed-Instance_
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Query-Store-queries-_Managed-Instance_.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats LogicalServerName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where TIMESTAMP >= datetime({StartTime}) and TIMESTAMP <= datetime({EndTime})

      | where LogicalServerName =~ "{LogicalServerName}"

      | where is_primary == 1

      | summarize cpu_time_ms = sum(cpu_time) / 1000.0

      , elapsed_time_ms = sum(elapsed_time) / 1000.0

      , sum(logical_reads), sum(execution_count)

      , Total_Memory_MB=sum(max_query_memory_pages*8/1024.0)

      , total_physical_reads=sum(physical_reads)

      , total_num_physical_io_reads=sum(num_physical_io_reads)

      , total_rowcount=sum(rowcount)

      , total_tempdb_space_used_MB=round(sum(tempdb_space_used)*8.0/1024,1)

      by TIMESTAMP=bin(PreciseTimeStamp, 15min)

      | render timechart

      // total exec count'
