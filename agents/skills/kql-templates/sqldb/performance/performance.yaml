  Topic: All-impacted-databases
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/All-impacted-databases.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonDmOsMemoryClerks LogicalServerName AppName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsMemoryClerks
    ExecutedQuery: 'MonDmOsMemoryClerks

      | where ["type"] == "MEMORYCLERK_SQLQUERYEXEC"

      | extend total = pages_kb + virtual_memory_committed_kb

