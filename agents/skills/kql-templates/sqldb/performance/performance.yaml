- id: DB-performance-55
  Topic: Monitor-for-woolworth-upgrade-_ICM-59546911_
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Monitor-for-woolworth-upgrade-_ICM-59546911_.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago({TimeRange}) and TIMESTAMP < now()

      | where NodeName =~ "{NodeName}" and ClusterName =~ "{ClusterName}" and application_name contains ("b837d6424a70")

      | where event == "instance_load" and code_package_name == "Code" and service_manifest_name == "SQL"

      | extend KernelLoadOfCapPercentage = (kernel_load *1.0 / cpu_load_cap) * 100

      | extend CpuUsagePercentage = (cpu_load * 1.0 / cpu_load_cap) * 100

      | extend IOPsLoadPercentage = (app_iops_load*1.0/app_iops_load_cap) * 100

      | extend MemoryLoadPercentage = (app_memory_load*1.0/app_memory_load_cap) * 100

      | extend WorkingSetLoadPercentage = (app_working_set_load*1.0/app_working_set_load_cap) * 100

      | summarize avg(KernelLoadOfCapPercentage) , avg(CpuUsagePercentage) by bin(TIMESTAMP, 1m)

      | render timechart'
- id: DB-performance-56
  Topic: Monitor-for-woolworth-upgrade-_ICM-59546911_
