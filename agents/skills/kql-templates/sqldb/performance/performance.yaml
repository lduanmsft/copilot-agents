      cluster(clstr).database("sqlazure1").MonDmIoVirtualFileStats

      | where //AppName =~"{AppName}" and

      TIMESTAMP > ago(2d) | where spaceused_mb != 0 and database_id >4

      | summarize arg_max(TIMESTAMP, spaceused_gb = spaceused_mb/1024, size_on_disk_gb = size_on_disk_bytes/1024/1024/1024, max_size_gb = max_size_mb/1024) by AppName, NodeName, database_id, type_desc, file_id

      | summarize TIMESTAMP = max(TIMESTAMP), spaceused_gb = sum(spaceused_gb), size_on_disk_gb = sum(size_on_disk_gb), max_size_gb = sum(max_size_gb) by AppName, NodeName

      | summarize arg_max(TIMESTAMP, spaceused_gb) by AppName

      ) on AppName

      | join kind = inner(

      cluster(clstr).database("sqlazure1").MonRgLoad | where TIMESTAMP > ago(1h) and event == "directory_quota_report_load" and target_directory endswith "data"

      | project TIMESTAMP, NodeName, event, target_directory, quota_limit_in_gb = quota_limit_in_bytes/1024/1024/1024, quota_usage_in_gb = quota_usage_in_bytes/1024/1024/1024, quota_usage_in_gb_peak = quota_usage_in_bytes_peak/1024/1024/1024, ClusterName, application_name

      | summarize arg_max(TIMESTAMP, quota_usage_in_gb_peak, quota_usage_in_gb, quota_limit_in_gb) by NodeName, ClusterName, application_name

      ) on application_name

      | extend newQuotaInMb = iif(quota_limit_in_gb*1024 > dirQuotaMB, quota_limit_in_gb*1024, dirQuotaMB)

      | extend newPoolLimitKb = iif(isnotempty(resource_pool_storage_limit) and resource_pool_storage_limit > poolStorageLimitKb, resource_pool_storage_limit, iif(isnotempty(resource_pool_storage_limit) , poolStorageLimitKb, 0))

      | extend casUpdateDirQuota = iif(newQuotaInMb > quota_limit_in_gb*1024, strcat("Update-RgResourceSettings -ClusterName ", ClusterName, " -NodeName ", NodeName, " -ApplicationName ", application_name, " -CodePackagename Code -ManifestName SQL -ResourceType DirQuotaInMb -ResourceValue ", newQuotaInMb, " -ExtraParam workdata"), "")

      | extend casUpdatePoolLimit = iif(isnotempty(resource_pool_storage_limit) and newPoolLimitKb > resource_pool_storage_limit,

      strcat("Set-DatabasePropertyOverride -LogicalServerName ''", logical_server_name, "'' -LogicalDatabaseName ''", logical_database_name, "'' -CategoryName ''SloPropertyBag'' -OverrideValue ''<SloRgMapping><pool_max_data_space_kb>", newPoolLimitKb, "</pool_max_data_space_kb></SloRgMapping>''")

      ,"")

      | summarize arg_max(TIMESTAMP,spaceused_gb, quota_usage_in_gb, quota_usage_in_gb_peak) by logical_server_name, logical_database_name, AppName, quota_limit_in_gb, newQuotaInGb = newQuotaInMb/1024, pool_storage_limit_gb, newPoolLimitGb = newPoolLimitKb/1024/1024, casUpdateDirQuota, casUpdatePoolLimit, ClusterName

      | extend region = strcat(

      iff(ClusterName contains ''sqltest'' or ClusterName contains ''lkgtst'', ''stage'', ''prod''),

      ''-'',

      extract(''([0-9A-Za-z]*).([0-9A-Za-z_-]*).([0-9A-Za-z_]*)'', 2, ClusterName))

      | project logical_server_name, logical_database_name, AppName, TIMESTAMP,spaceused_gb, quota_usage_in_gb, quota_usage_in_gb_peak, quota_limit_in_gb, newQuotaInGb, pool_storage_limit_gb, newPoolLimitGb, casUpdateDirQuota, casUpdatePoolLimit, region'
