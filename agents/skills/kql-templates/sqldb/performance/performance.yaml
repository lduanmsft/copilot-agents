  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0013-XE-Stuck-Dispatcher-DMV-Collector-TempDB-Log-Held.md
  Prompts:
  - SQL DB rm ring buffer activity
  - SQL DB MonSqlRmRingBuffer event TIMESTAMP
  - SQL DB investigate rm ring buffer
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRmRingBuffer
    ExecutedQuery: 'let SingleCluster = (clstr: string) {

      let NonYieldAllAppsPastHour = cluster(clstr).database(''sqlazure1'').MonSqlRmRingBuffer

      | where TIMESTAMP > ago(2h)

      | where event == "nonyield_copiedstack_ring_buffer_recorded"

      | where dispatcher_pool_name == "DISP_POOL_XE_LONG_RUNNING_TARGETS"

      | summarize count = count()'
- id: DB-performance-900
  Topic: XE0013-XE-Stuck-Dispatcher-DMV-Collector-TempDB-Log-Held
  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0013-XE-Stuck-Dispatcher-DMV-Collector-TempDB-Log-Held.md
  Prompts:
  - SQL DB rm ring buffer activity
  - SQL DB MonSqlRmRingBuffer event LogicalServerName
  - SQL DB investigate rm ring buffer
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRmRingBuffer
    ExecutedQuery: '| where count > 3

      | summarize

      total_nonyield_count = sum(count),

      start_time = min(TIMESTAMP),

      end_time = max(TIMESTAMP),

      nonyield_percentage = 100.0 * count() / 12

      by AppName, ClusterName, nonyield_type, NodeName, LogicalServerName, AppTypeName;

      let CallStack = cluster(clstr).database(''sqlazure1'').MonSqlRmRingBuffer

      | where originalEventTimestamp > ago(2h)

      | where event == "nonyield_copiedstack_ring_buffer_recorded"

      | summarize count_ = count() by AppName, ClusterName, NodeName, stack_frames

      | summarize stack_frame_count = arg_max(count_, stack_frames) by AppName, ClusterName, NodeName

      | order by stack_frame_count desc;

      let XEventFileBLobOverrride = cluster(clstr).database("sqlazure1").MonConfigLogicalServerOverrides

      | where Property_Name contains "XEventEventFileBlobRollingDelete"

      | extend LogicalServerName = Logical_Server_Name

      | summarize by  ClusterName,LogicalServerName, Property_Value;

      let DMVCollectorMonActiveXeSessionBytes = cluster(clstr).database("sqlazure1").MonConfigLogicalServerOverrides

      | where Property_Name contains "DMVCollector_ViewOverrides"

      | where Property_Value contains "MonActiveXeSessionBytes"

      | extend LogicalServerName = Logical_Server_Name

      | extend DMVCollector_MonActiveXeSessionBytes =Property_Value

      | summarize by  ClusterName,LogicalServerName, DMVCollector_MonActiveXeSessionBytes;'
- id: DB-performance-901
  Topic: XE0013-XE-Stuck-Dispatcher-DMV-Collector-TempDB-Log-Held
  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0013-XE-Stuck-Dispatcher-DMV-Collector-TempDB-Log-Held.md
  Prompts:
  - SQL DB real time resource stats activity
  - SQL DB MonDmRealTimeResourceStats AppName ClusterName
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'cluster(clstr).database("sqlazure1").MonDmRealTimeResourceStats

      | where TIMESTAMP > ago(1h)

      | where replica_role ==0

      | where AppName in ("affected applications from your investigation")

      | summarize arg_max(TIMESTAMP, LogicalServerName,NodeName,ClusterName, AppTypeName) by AppName, geo=substring(ClusterName,indexof(ClusterName, ".")+1,(indexof(ClusterName, "-")-2-indexof(ClusterName, ".")));'
- id: DB-performance-902
  Topic: VectorIndex001-Monitoring-and-Telemetry
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex001-Monitoring-and-Telemetry.md
  Prompts:
  - SQL DB query processing latency
  - SQL DB MonQueryProcessing event TIMESTAMP timeFilter
  - SQL DB troubleshoot query processing latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: 'MonQueryProcessing

      | where event == "vector_index_update_dml_aggregated_telemetry"

      | where TIMESTAMP >= ago(timeFilter)

      | extend

      DatabaseId = tolong(database_id),

      ObjectId = tolong(object_id),

      AvgDurationMs = tolong(avg_operation_duration_ms)

      | where AvgDurationMs > performanceThreshold

      | summarize

      SlowOperationCount = count(),

      WorstAvgDuration = max(AvgDurationMs),

      RecentTimestamp = max(TIMESTAMP)

      by DatabaseId, ObjectId

      | order by WorstAvgDuration desc'
- id: DB-performance-903
  Topic: VectorIndex001-Monitoring-and-Telemetry
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex001-Monitoring-and-Telemetry.md
  Prompts:
  - SQL DB query processing errors
  - SQL DB MonQueryProcessing event error_message TIMESTAMP
  - SQL DB troubleshoot query processing errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: 'MonQueryProcessing

      | where event == "vector_index_update_dml_aggregated_telemetry"

      | where TIMESTAMP >= ago(timeFilter)

      | where isnotempty(error_message) and error_message != ""

      | extend

      DatabaseId = tolong(database_id),

      ObjectId = tolong(object_id),

      ErrorTimestamp = TIMESTAMP

      | summarize

      ErrorCount = count(),

      LastErrorTime = max(TIMESTAMP),

      LastError = any(error_message)

      by DatabaseId, ObjectId

      | order by ErrorCount desc, LastErrorTime desc'
- id: DB-performance-904
  Topic: VectorIndex001-Monitoring-and-Telemetry
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex001-Monitoring-and-Telemetry.md
  Prompts:
  - SQL DB query processing activity
  - SQL DB MonQueryProcessing event TIMESTAMP timeFilter
  - SQL DB investigate query processing
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: 'MonQueryProcessing

      | where event == "vector_index_update_dml_aggregated_telemetry"

      | where TIMESTAMP >= ago(timeFilter)

      | extend

      DatabaseId = tolong(database_id),

      ObjectId = tolong(object_id),

      Inserts = tolong(total_vectors_inserted),

      Deletes = tolong(total_vectors_deleted),

      Hour = bin(TIMESTAMP, 1h)

      | summarize

      TotalInserts = sum(Inserts),

      TotalDeletes = sum(Deletes)

      by Hour, DatabaseId, ObjectId

      | extend InsertDeleteRatio = todouble(TotalInserts) / todouble(TotalDeletes + 1) // +1 to avoid division by zero

      | order by Hour desc

      | render timechart'
- id: DB-performance-905
  Topic: VectorIndex002-Resource-Governance
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex002-Resource-Governance.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB SQL RG history event LogicalServerName TIMESTAMP _endTime
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let _startTime = ago(24h);

      let _endTime = now();

      let _serverName = "<LogicalServerName>"; // Replace with your logical server name

      // Get VectorIndexGroup workload group metrics

      let VectorIndexGroupMetrics = MonSqlRgHistory

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where event == ''aggregated_workload_groups_plus_history''

      | where group_name == "VectorIndexGroup"

      | summarize

      vector_cpu_usage_ms = sum(delta_total_cpu_usage_ms),

      vector_cpu_violations = sum(delta_total_cpu_delayed_ms),

      vector_requests = sum(delta_total_request_count),

      vector_queued = sum(active_request_count)

      by TIMESTAMP = bin(end_aggregated_sample, 15m), LogicalServerName, AppName;

      // Get UserPool total capacity

      let UserPoolCapacity = MonSqlRgHistory

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where event =~ ''aggregated_resource_pools_plus_history''

      | where pool_name == ''SloSharedPool1'' // UserPool

      | summarize

      pool_cpu_usage_ms = sum(delta_total_cpu_usage_ms),

      start_sample = min(start_aggregated_sample),

      end_sample = max(end_aggregated_sample)

      by TIMESTAMP = bin(end_aggregated_sample, 15m), LogicalServerName, AppName

      | extend pool_avg_cores = pool_cpu_usage_ms / ((end_sample - start_sample) / 1ms);

      // Combine to calculate VectorIndexGroup percentage of UserPool'
- id: DB-performance-906
  Topic: VectorIndex002-Resource-Governance
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex002-Resource-Governance.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB SQL RG history event LogicalServerName TIMESTAMP _endTime
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let _startTime = ago(24h);

      let _endTime = now();

      let _serverName = "<LogicalServerName>";

      // Get VectorIndexGroup resource violations

      let VectorGroupViolations = MonSqlRgHistory

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where event == ''aggregated_workload_groups_plus_history''

      | where group_name == "VectorIndexGroup"

      | summarize

      cpu_violations = sum(delta_total_cpu_delayed_ms),

      queued_requests = sum(active_request_count),

      active_requests = avg(active_request_count)

      by TIMESTAMP = bin(end_aggregated_sample, 15m), LogicalServerName;

      // Get Vector Index Update Task telemetry for same period

      let VectorIndexActivity = MonQueryProcessing

      | where event == "vector_index_update_dml_aggregated_telemetry"

      | where TIMESTAMP between (_startTime .. _endTime)

      | extend

      DatabaseId = tolong(database_id),

      BatchCount = tolong(batch_count),

      AvgDuration = tolong(avg_operation_duration_ms),

      TotalInserts = tolong(total_vectors_inserted),

      TotalDeletes = tolong(total_vectors_deleted)

      | summarize

      total_batches = sum(BatchCount),

      avg_operation_duration = avg(AvgDuration),

      total_insert_volume = sum(TotalInserts),

      total_delete_volume = sum(TotalDeletes),

      affected_databases = dcount(DatabaseId)

      by TIMESTAMP = bin(TIMESTAMP, 15m);

      // Correlate violations with vector activity'
- id: DB-performance-907
  Topic: VectorIndex002-Resource-Governance
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex002-Resource-Governance.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where event == ''scheduler_data_snapshot''

      | where group_name == "VectorIndexGroup"

      | summarize

      avg_workers = avg(current_workers_count),

      max_workers = max(current_workers_count),

      avg_runnable_tasks = avg(runnable_tasks_count),

      max_runnable_tasks = max(runnable_tasks_count),

      worker_limit = avg(ideal_workers_limit)

      by TIMESTAMP = bin(TIMESTAMP, 15m), LogicalServerName, AppName

      | extend

      worker_utilization_percent = round((avg_workers * 100.0) / worker_limit, 2)

      | project TIMESTAMP, LogicalServerName, AppName,

      avg_workers,

      max_workers,

      worker_limit,

      worker_utilization_percent,

      avg_runnable_tasks'
- id: DB-performance-908
  Topic: VectorIndex002-Resource-Governance
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex002-Resource-Governance.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let _startTime = ago(24h);

      let _endTime = now();

      let _serverName = "<LogicalServerName>";

      let _clusterName = "sqladhoc";

      cluster(_clusterName).database(''sqlazure1'').MonSqlRgHistory

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where event == ''scheduler_data_snapshot''

      | summarize

      sum_runnable_tasks = sum(runnable_tasks_count),

      sum_signal_wait_time = sum(delta_total_signal_wait_time_ms),

      sum_workers = sum(current_workers_count),

      workers_limit = sum(ideal_workers_limit)

      by TIMESTAMP = bin(TIMESTAMP, 1m), AppName, LogicalServerName

      | extend workers_used_percent = (sum_workers * 100.0) / workers_limit

      | summarize

      max_runnable_tasks = max(sum_runnable_tasks),

      avg_runnable_tasks = avg(sum_runnable_tasks),

      max_workers_percent = max(workers_used_percent),

      avg_signal_wait_ms = avg(sum_signal_wait_time)

      by TIMESTAMP = bin(TIMESTAMP, 15m), LogicalServerName, AppName

      | where max_workers_percent > 80 or max_runnable_tasks > 50

      | project TIMESTAMP, LogicalServerName, AppName, max_runnable_tasks,

      avg_runnable_tasks, max_workers_percent, avg_signal_wait_ms

      | order by TIMESTAMP desc'
- id: DB-performance-909
  Topic: VectorIndex002-Resource-Governance
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex002-Resource-Governance.md
  Prompts:
  - SQL DB rg history latency
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB troubleshoot rg history latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where event == ''aggregated_workload_groups_plus_history''

      | where group_name == "VectorIndexGroup"

      | summarize

      total_reads = sum(delta_reads_completed_total),

      total_writes = sum(delta_writes_completed_total),

      total_read_bytes = sum(delta_read_bytes_total_sum),

      total_write_bytes = sum(delta_write_bytes_total_sum),

      total_read_stall_ms = sum(delta_read_stall_total_ms_sum),

      total_write_stall_ms = sum(delta_write_stall_total_ms_sum),

      total_background_writes = sum(delta_background_writes_total),

      total_log_bytes = sum(delta_log_bytes_used_total)

      by TIMESTAMP = bin(TIMESTAMP, 15m), LogicalServerName, AppName

      | extend

      read_mb = round(total_read_bytes / 1048576.0, 2),

      write_mb = round(total_write_bytes / 1048576.0, 2),

      log_mb = round(total_log_bytes / 1048576.0, 2),

      avg_read_latency_ms = iif(total_reads == 0, real(null), round(todouble(total_read_stall_ms) / total_reads, 2)),

      avg_write_latency_ms = iif(total_writes == 0, real(null), round(todouble(total_write_stall_ms) / total_writes, 2))

      | project TIMESTAMP, LogicalServerName, AppName,

      total_reads, total_writes,

      read_mb, write_mb, log_mb,

      avg_read_latency_ms, avg_write_latency_ms'
- id: DB-performance-910
  Topic: VectorIndex002-Resource-Governance
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex002-Resource-Governance.md
  Prompts:
  - SQL DB timeout analysis
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB troubleshoot timeout
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where event == ''aggregated_workload_groups_plus_history''

      | where group_name == "VectorIndexGroup"

      | summarize

      avg_used_memory_kb = avg(used_memory_kb),

      max_used_memory_kb = max(used_memory_kb),

      avg_cache_memory_kb = avg(cache_memory_kb),

      avg_memgrant_kb = avg(used_memgrant_kb),

      max_memgrant_kb = max(used_memgrant_kb),

      total_memgrant_count = sum(delta_total_memgrant_count),

      total_memgrant_timeout_count = sum(delta_total_memgrant_timeout_count),

      total_reduced_memgrant = sum(delta_total_reduced_memgrant_count_sum),

      avg_active_memgrant_count = avg(active_memgrant_count)

      by TIMESTAMP = bin(TIMESTAMP, 15m), LogicalServerName, AppName

      | extend

      avg_used_memory_mb = round(avg_used_memory_kb / 1024.0, 2),

      max_used_memory_mb = round(max_used_memory_kb / 1024.0, 2),

      avg_cache_memory_mb = round(avg_cache_memory_kb / 1024.0, 2)

      | project TIMESTAMP, LogicalServerName, AppName,

      avg_used_memory_mb, max_used_memory_mb, avg_cache_memory_mb,

      avg_memgrant_kb, max_memgrant_kb,

      total_memgrant_count, total_memgrant_timeout_count,

      total_reduced_memgrant'
- id: DB-performance-911
  Topic: VectorIndex002-Resource-Governance
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex002-Resource-Governance.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where event == ''aggregated_workload_groups_plus_history''

      | where group_name == "VectorIndexGroup"

      | summarize

      reads_queued = sum(delta_reads_queued_total_sum),

      reads_issued = sum(delta_reads_issued_total_sum),

      reads_completed = sum(delta_reads_completed_total),

      writes_queued = sum(delta_writes_queued_total_sum),

      writes_issued = sum(delta_writes_issued_total_sum),

      writes_completed = sum(delta_writes_completed_total),

      read_stall_queued_ms = sum(delta_read_stall_queued_ms_sum),

      reads_throttled_max = max(reads_throttled_total_max)

      by TIMESTAMP = bin(TIMESTAMP, 15m), LogicalServerName, AppName

      | extend

      read_queue_depth = reads_queued - reads_completed,

      write_queue_depth = writes_queued - writes_completed,

      is_throttled = reads_throttled_max > 0 or read_stall_queued_ms > 0

      | where is_throttled or read_queue_depth > 10 or write_queue_depth > 10

      | project TIMESTAMP, LogicalServerName, AppName,

      reads_queued, reads_completed, read_queue_depth,

      writes_queued, writes_completed, write_queue_depth,

      reads_throttled_max, read_stall_queued_ms'
- id: DB-performance-912
  Topic: VectorIndex002-Resource-Governance
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex002-Resource-Governance.md
  Prompts:
  - SQL DB deadlock analysis
  - SQL DB MonDeadlockReportsFiltered LogicalServerName
  - SQL DB troubleshoot deadlock
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDeadlockReportsFiltered
    ExecutedQuery: 'MonDeadlockReportsFiltered

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where xml_report_filtered contains "vector"'
- id: DB-performance-913
  Topic: VectorIndex002-Resource-Governance
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex002-Resource-Governance.md
  Prompts:
  - SQL DB block reporting analysis
  - SQL DB MonBlockReporting logical_server_name TIMESTAMP
  - SQL DB investigate block reporting
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBlockReporting
    ExecutedQuery: 'MonBlockReporting

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName or logical_server_name == _serverName

      | where most_recent_sql_handle contains "vector"'
- id: DB-performance-914
  Topic: VectorIndex002-Resource-Governance
  Source: TSG-SQL-DB-Performance/content/Vector/VectorIndex002-Resource-Governance.md
  Prompts:
  - SQL DB deadlock analysis
  - SQL DB query processing event LogicalServerName error_message
  - SQL DB troubleshoot deadlock
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: 'let _startTime = ago(7d);

      let _endTime = now();

      let _serverName = "<LogicalServerName>";

      // Get vector index task failures

      let VectorTaskFailures = MonQueryProcessing

      | where event == "vector_index_update_dml_aggregated_telemetry"

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where isnotempty(error_message) and error_message != ""

      | extend

      DatabaseId = tolong(database_id),

      ObjectId = tolong(object_id)

      | project TIMESTAMP, LogicalServerName, DatabaseId, ObjectId,

      failed_task_count, error_message;

      // Get deadlocks in the same time window

      let DeadlockEvents = MonDeadlockReportsFiltered

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where xml_report_filtered contains "vector"'
