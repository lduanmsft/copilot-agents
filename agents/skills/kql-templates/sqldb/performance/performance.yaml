- id: DB-performance-352
  Topic: IO001-IO-troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/IO/IO001-IO-troubleshooting.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB RG database_name LogicalServerName gt lt
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: '<col style="width: 50%" /><col style="width: 50%" /><tr class="odd">Q1 Data or Log IO usageMonDmRealTimeResourceStats


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"


      | where replica_type == 0


      | summarize avg(avg_data_io_percent), avg(avg_log_write_percent) by bin(TIMESTAMP, 1min)


      | render timechart <tr class="even">Q2 Top Data IO queries MonWiQdsExecStats


      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"


      | where is_primary == 1


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | summarize total_num_physical_io_reads=sum(num_physical_io_reads) by query_hash


      | top 10 by total_num_physical_io_reads desc nulls last <tr class="odd">Q3 Data or log IO usage (User query)-- IO saturated? select avg_data_io_percent, avg_log_write_percent from sys.dm_db_resource_stats order by end_time desc  -- shows active query consuming IOselect reads, writes, logical_reads, * from sys.dm_exec_requests r cross apply sys.dm_exec_sql_text (r.sql_handle)<tr class="even">Q4 Top IO queries (user query) -- top data IO-- Please adjust the time by changing rsi.start_time &gt;= DATEADD(hour, -2, GETUTCDATE())--WITH AggregatedDataIOAS(SELECT q.query_hash, sum (count_executions*avg_physical_io_reads) as total_physical_io_reads,sum (count_executions*avg_log_bytes_used) as total_log_bytes_used,COUNT (distinct p.plan_id) AS number_of_distinct_plans,count (distinct p.query_id) as number_of_distinct_query_ids,sum (case when rs.execution_type_desc=''Aborted'' then count_executions else 0 end) as Aborted_Execution_Count,sum (case when rs.execution_type_desc=''Regular'' then count_executions else 0 end) as Regular_Execution_Count,sum (case when rs.execution_type_desc=''Exception'' then count_executions else 0 end) as Exception_Execution_Count,sum (count_executions) as total_executions,min(qt.query_sql_text) as sampled_query_textFROM sys.query_store_query_text AS qt JOIN sys.query_store_query AS qON qt.query_text_id = q.query_text_idJOIN sys.query_store_plan AS p ON q.query_id = p.query_idJOIN sys.query_store_runtime_stats AS rs ON rs.plan_id = p.plan_idJOIN sys.query_store_runtime_stats_interval AS rsiON rsi.runtime_stats_interval_id = rs.runtime_stats_interval_idWHERE rs.execution_type_desc in( ''Regular'' , ''Aborted'', ''Exception'') andrsi.start_time &gt;= DATEADD(hour, -2, GETUTCDATE())GROUP BY q.query_hash),OrderedDataIOAS(SELECT query_hash, total_physical_io_reads, number_of_distinct_plans, number_of_distinct_query_ids, total_executions,Aborted_Execution_Count,Regular_Execution_Count, Exception_Execution_Count, sampled_query_text,ROW_NUMBER () OVER (ORDER BY total_physical_io_reads DESC, query_hash asc) AS RNFROM AggregatedDataIO)SELECT * from OrderedDataIO ODWHERE OD.RN &lt;=15 ORDER BY total_physical_io_reads DESC go <tr class="odd">Q5Top Log IO queriesMonWiQdsExecStats


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"


      | where is_primary == 1


      | summarize sum(log_bytes_used) by query_hash


      | top 10 by sum_log_bytes_used desc <tr class="even">Q6 Total log by tes used (user query)-- top log used-- please adjust time window by changing rsi.start_time &gt;= DATEADD(hour, -2, GETUTCDATE())WITH AggregatedLogUsedAS(SELECT q.query_hash, SUM(count_executions * avg_cpu_time / 1000.0) AS total_cpu_millisec,SUM(count_executions * avg_cpu_time / 1000.0) /SUM(count_executions) as avg_cpu_millisec,sum (count_executions*avg_log_bytes_used) as total_log_bytes_used,max(rs.max_cpu_time/1000.00) as max_cpu_millisec,max(max_logical_io_reads) max_logical_reads,COUNT (distinct p.plan_id) AS number_of_distinct_plans,count (distinct p.query_id) as number_of_distinct_query_ids,sum (case when rs.execution_type_desc=''Aborted'' then count_executions else 0 end) as Aborted_Execution_Count,sum (case when rs.execution_type_desc=''Regular'' then count_executions else 0 end) as Regular_Execution_Count,sum (case when rs.execution_type_desc=''Exception'' then count_executions else 0 end) as Exception_Execution_Count,sum (count_executions) as total_executions,min(qt.query_sql_text) as sampled_query_textFROM sys.query_store_query_text AS qt JOIN sys.query_store_query AS qON qt.query_text_id = q.query_text_idJOIN sys.query_store_plan AS p ON q.query_id = p.query_idJOIN sys.query_store_runtime_stats AS rs ON rs.plan_id = p.plan_idJOIN sys.query_store_runtime_stats_interval AS rsiON rsi.runtime_stats_interval_id = rs.runtime_stats_interval_idWHERE rs.execution_type_desc in( ''Regular'' , ''Aborted'', ''Exception'') andrsi.start_time &gt;= DATEADD(hour, -2, GETUTCDATE())GROUP BY q.query_hash),OrderedLogUsedAS(SELECT query_hash, total_log_bytes_used, number_of_distinct_plans, number_of_distinct_query_ids, total_executions,Aborted_Execution_Count,Regular_Execution_Count, Exception_Execution_Count, sampled_query_text,ROW_NUMBER () OVER (ORDER BY total_log_bytes_used DESC, query_hash asc) AS RNFROM AggregatedLogUsed)SELECT * from OrderedLogUsed ODWHERE OD.RN &lt;=15 ORDER BY total_log_bytes_used DESC go<tr class="odd">Q7 IO delays &amp; RG IO delays// Virtual File Stats IO delays

      '
- id: DB-performance-353
  Topic: IO001-IO-troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/IO/IO001-IO-troubleshooting.md
  Prompts:
  - SQL DB rg history analysis
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory


      | where TIMESTAMP &gt;ago(2h)


      | where LogicalServerName =~ "{ServerName}" and AppName =~ "{AppName}"


      | where NodeName == "{NodeName}"


      | where database_id !in (1,2,3,4)


      //| where database_id in (5)


      | where event in ("aggregated_virtual_files_io_history")


      | project TIMESTAMP, delta_io_stall_queued_read_ms , delta_io_stall_read_ms, delta_io_stall_queued_write_ms , delta_io_stall_write_ms, DBid_FILEid=strcat(database_id,":", file_id )


      | render timechart <tr class="even">Q8 IO Delays &amp; IO RG IO Delays(TSQL)/*This query will compute detal IO stalls It takes a snapshot of sys.dm_io_virtual_file_stats, waits for 5 minutes (time can be adjusted) and take another snapshot.*/SELECT getdate() as runtime, * into #tmp1 FROM sys.dm_io_virtual_file_stats(DB_ID(N''demo2''), null); waitfor delay ''0:05:0''SELECT getdate() as runtime, * into #tmp2 FROM sys.dm_io_virtual_file_stats(DB_ID(N''demo2''), null);  --Query to Identify IO delays--delta_io_stall_read_ms, delta_io_stall_write_ms are total delays--delta_io_stall_queued_read_ms, delta_io_stall_queued_read_ms are delayes induced by IO governanceselect t1.runtime ''StartTime'', t2.runtime ''EndTime'', T1.database_id, T1.file_id,(t2.io_stall_read_ms-t1.io_stall_read_ms ) as ''delta_io_stall_read_ms'',(t2.io_stall_write_ms-t1.io_stall_write_ms ) as ''delta_io_stall_write_ms'',(t2.io_stall_queued_read_ms-t1.io_stall_queued_read_ms ) as ''delta_io_stall_queued_read_ms'',(t2.io_stall_queued_write_ms-t1.io_stall_queued_write_ms ) as ''delta_io_stall_queued_read_ms''from #tmp1 t1 join #tmp2 t2 on t1.database_id=t2.database_id and t1.file_id=t2.file_id<tr class="odd">Q9 Azure Remote Storage Throttling// IO.01

      '
