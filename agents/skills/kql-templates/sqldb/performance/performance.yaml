- id: DB-performance-488
  Topic: TSG-002-Fullext-index-is-not-being-populated
  Source: TSG-SQL-DB-Performance/content/Fulltext/TSG-002-Fullext-index-is-not-being-populated.md
  Prompts:
  - SQL DB timedelta activity
  - SQL DB timedelta LogicalServerName AppName NodeName
  - SQL DB investigate timedelta
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: '| extend

      timedelta = last_pending_change - first_pending_change,

      pending_changes_delta = pending_changes - pending_changes1

      // Filter out the row if timedelta is zero

      | where timedelta > time(00:00:00) and pending_changes_delta >= 0

      // For the same database_id, there could be multiple object_id that has issue, we only need to pick one object_id.

      // Pick the object_id with max pending_changes.

      | summarize arg_max(pending_changes, object_id) by ClusterName, AppName, NodeName, LogicalServerName, database_id

      // Join with MonDmCloudDatabaseWaitStats to get physical database id

      | join (MonDmCloudDatabaseWaitStats

      | where TIMESTAMP >= ago(90m)

      | summarize arg_max(TIMESTAMP, physical_database_guid) by AppName, database_id)

      on $left.AppName == $right.AppName, $left.database_id == $right.database_id

      | project

      ClusterName,

      AppName,

      NodeName,

      LogicalServerName,

      database_id,

      object_id,

      pending_changes'
