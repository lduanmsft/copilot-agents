      | where is_primary == 1

      | where database_name =~ "{LogicalDatabaseName}" and query_hash =~ "{query_hash}"

      | summarize total_cpu_ms=(sum(cpu_time)*1.0/(1000)), total_exec_count=sum(execution_count), total_logical_reads=sum(logical_reads),

      all_plan_ids=makeset(plan_id), all_query_ids=makeset(query_id)

