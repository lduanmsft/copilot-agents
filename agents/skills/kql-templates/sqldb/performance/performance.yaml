      | summarize arg_max(TIMESTAMP, service_level_objective, logical_server_name, logical_database_name, tenant_ring_name, service_level_objective) by sql_instance_name, logical_resource_pool_id

      | project logical_server_name, logical_database_name, AppName = sql_instance_name

