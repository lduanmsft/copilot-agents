- id: DB-performance-276
  Topic: TSG-for-Auto-Stats-update-waits
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/TSG-for-Auto-Stats-update-waits.md
  Prompts:
  - SQL DB cloud database wait stats activity
  - SQL DB MonDmCloudDatabaseWaitStats database_name
  - SQL DB investigate cloud database wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: 'MonDmCloudDatabaseWaitStats

      | where TIMESTAMP >= datetime({StartTime}) and TIMESTAMP <= datetime({EndTime})

      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}" and NodeName =~ "{NodeName}" and AppName =~ "{AppName}"

      | summarize sum(delta_wait_time_ms) by wait_type

      | top 10 by sum_delta_wait_time_ms desc nulls last

      | project wait_type, wait_time_ms_per_sec'
- id: DB-performance-277
  Topic: TSG-for-Auto-Stats-update-waits
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/TSG-for-Auto-Stats-update-waits.md
  Prompts:
  - SQL DB QDS wait stats activity
  - SQL DB MonWiQdsWaitStats database_name LogicalServerName
  - SQL DB investigate QDS wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsWaitStats
    ExecutedQuery: 'MonWiQdsWaitStats

      | where TIMESTAMP >= datetime({StartTime}) and TIMESTAMP <= datetime({EndTime})

      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}" and AppName == "{AppName}"

      | where is_primary == 1

      | summarize sum(total_query_wait_time_ms) by wait_category

      | top 10 by sum_total_query_wait_time_ms desc nulls last'
- id: DB-performance-278
  Topic: TSG-for-Auto-Stats-update-waits
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/TSG-for-Auto-Stats-update-waits.md
  Prompts:
