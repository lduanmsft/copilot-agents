    ExecutedQuery: 'MonWiQdsExecStats

      | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | where TIMESTAMP >= ago({TimeRange}) and TIMESTAMP <= now()

      | where is_primary == 1

      | where query_hash == "0xA407D4263FBCF491"

      | summarize max_cpu_time_ms=max(max_cpu_time)/1000.0, avg_cpu_time_ms=sum(cpu_time)/1000.0/sum(execution_count) by bin(TIMESTAMP, 1h)

      | render timechart'
