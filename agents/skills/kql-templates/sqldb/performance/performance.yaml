      | project TIMESTAMP, MinVal , MaxVal, CounterValue

      | extend write_mbps = toint(CounterValue / 1024 / 1024)

      | extend write_max_mbps = toint(MaxVal / 1024 / 1024)

      | project TIMESTAMP , write_mbps , write_max_mbps ;

      let c4 = MonCounterOneMinute

      | where TIMESTAMP > datetime("{startTime}") and TIMESTAMP < datetime("{endTime}")

      | where CounterName contains "SMB" and CounterName contains accountName and CounterName contains shareName

      | where CounterName contains "Data Requests/sec"

      | project TIMESTAMP, MinVal , MaxVal, CounterValue

      | extend iops = CounterValue

      | project TIMESTAMP , iops ;'
