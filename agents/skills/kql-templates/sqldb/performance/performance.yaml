      -   ihs_deletes: captures num of files deleted (*num_files_deleted)* with the deletion logic that by default runs every once in 24 hours, num of files left (num_files_after_deletion) for the particular metric (metric_name) in the storage container. It also tracks the time it took for the deletion logic to run (deletion_time_ms) and timestamp of oldest ihs file (timestamp_of_oldest_file) for the metric in the storage container.'
