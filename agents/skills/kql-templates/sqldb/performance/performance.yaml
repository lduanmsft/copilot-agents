    ExecutedQuery: 'MonSQLXStore

      | where TIMESTAMP >= ago(30d) //between (st..et)

      | where LogicalServerName == logicalServerName

      | where AppName == appName

      | where strlen(tostring(http_errorcode)) > 0

      | extend file_path_chunks = split(file_path, "/")

      | where array_length(file_path_chunks) >= 4

      | extend file_path_prefix = strcat(file_path_chunks[0], "/", file_path_chunks[1], "/", file_path_chunks[2], "/", file_path_chunks[3])

      | summarize

      count()'
