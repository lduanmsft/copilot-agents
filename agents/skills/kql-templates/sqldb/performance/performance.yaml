- id: DB-performance-648
  Topic: TSGRS-Throttle-Backup-to-mitigate-severe-XIO-throt
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS-Throttle-Backup-to-mitigate-severe-XIO-throt.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBackup LogicalServerName AppName AppTypeName
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonSQLXStore

      | where originalEventTimestamp > ago(1d)

      | where http_errorcode == "503" and file_path endswith "df" and AppTypeName in ("Worker.ISO")

      | extend ClusterRegion = extract(@"w+.(.+).worker", 1, ClusterName)

      | summarize count() by bin(TIMESTAMP, 1h), AppName, LogicalServerName, AppTypeName, ClusterRegion

      | where count_ > 10000

      | summarize num_hours_with_high_xio_errors = count(), last_hour_with_xio_errors = max(TIMESTAMP) by AppName, LogicalServerName, AppTypeName, ClusterRegion

      | where last_hour_with_xio_errors > ago(6h)

      | join kind=leftouter

      (cluster(clusterName).database(databaseName).MonBackup

      | where originalEventTimestamp > ago(1d)

      and backup_type == "Full" or backup_type == "Diff" and event_type == ''BACKUP_START''

      | summarize backup_attempts = count(), firstBackupAttempt = min(originalEventTimestamp), lastBackupAttempt = max(originalEventTimestamp) by AppName)

      on $left.AppName == $right.AppName'
- id: DB-performance-649
  Topic: TSGRS-Throttle-Backup-to-mitigate-severe-XIO-throt
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS-Throttle-Backup-to-mitigate-severe-XIO-throt.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBackup LogicalServerName AppName AppTypeName
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonSQLXStore

      | where originalEventTimestamp > ago(1d)

      | where http_errorcode == "503" and (file_path endswith "mdf" or file_path endswith "ndf")

      | summarize count() by bin(TIMESTAMP, 1h), ClusterName, LogicalServerName, AppName, AppTypeName, file_path

      | where count_ > 10000 and AppTypeName == "Worker.ISO"

      | summarize num_hours_with_high_xio_errors = count(), last_hour_with_xio_errors = max(TIMESTAMP) by ClusterName, LogicalServerName, AppName, AppTypeName, file_path

      | where last_hour_with_xio_errors > ago(6h)

      | join kind=leftouter

      (cluster(clusterName).database(databaseName).MonBackup

      | where originalEventTimestamp > ago(1d)

      and (backup_type == "Full" or backup_type == "Diff") and event_type == "BACKUP_START"

      | summarize backup_attempts = count(), numDbs = dcount(database_name), firstBackupAttempt = min(originalEventTimestamp), lastBackupAttempt = max(originalEventTimestamp) by AppName, SubscriptionId

      | extend backupRetriesPerDb = backup_attempts / numDbs

      | project AppName, backupRetriesPerDb, SubscriptionId)

      on $left.AppName == $right.AppName

      | join kind=leftouter

      (cluster(clusterName).database(databaseName).MonSqlDump

      | where PreciseTimeStamp > ago(1d)

      | where CompleteFileName endswith ".dmp"

      | summarize dump_count = dcount(CompleteFileName) by AppName

      | project AppName, dump_count)

      on $left.AppName == $right.AppName

      | join kind=leftouter

      (cluster(clusterName).database(databaseName).MonBackup

      | where originalEventTimestamp > ago(1d)

      | where AppTypeName == "Worker.ISO"

      | summarize dcount(process_id), dcount(NodeName) by AppName

      | extend total_restarts_in_last_day = dcount_process_id - dcount_NodeName

      | project AppName, total_restarts_in_last_day)

      on $left.AppName == $right.AppName

      | where total_restarts_in_last_day > 1

      | project ClusterName, LogicalServerName, AppName, total_restarts_in_last_day, backupRetriesPerDb, dump_count'
