- id: DB-performance-249
  Topic: OOM-DUMP-Summary
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/OOM-DUMP-Summary.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth AppName NodeName tag
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'let appName = "{AppName}";

      //let nodeName = "DB.44";

      let tag = "MSR-";

      //let tag = "MSExtra-"; // Uncomment this if you also want to see the extra info

      let MemoryDumpTable = MonSQLSystemHealth

      | where AppName == appName

      //| where NodeName == nodeName

      | where message contains tag

      | extend MSRNumber = strcat(tag, extract(strcat(tag, "([0-9]+)"), 1, message, typeof(int)))

      | project originalEventTimestamp, NodeName, MSRNumber, message;'
- id: DB-performance-250
  Topic: PERFTS004-CPU-tab
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/PERFTS004-CPU-tab.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonDmRealTimeResourceStats database_name
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: '| summarize delta_total_cpu_usage_ms=sum(delta_total_cpu_usage_ms), start_aggregated_sample=min(start_aggregated_sample), end_aggregated_sample=max(end_aggregated_sample) by TIMESTAMP=bin (end_aggregated_sample, aggInterval_doNOTchange), group_name

      | extend avg_cores_sec=delta_total_cpu_usage_ms/((end_aggregated_sample-start_aggregated_sample)/1ms)

      | project-away delta_total_cpu_usage_ms

      | lookup kind=leftouter let aggInterval_doNOTchange= time(15m) ;

      let cap_interval=materialize(MonDmRealTimeResourceStats

      | where AppName !startswith ''b-'' and AppName !startswith ''v-''

      | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | where TIMESTAMP >= ago({TimeRange}) and TIMESTAMP <= now()

      | where replica_type == 0

      | summarize min(cpu_cap_in_sec) by bin (TIMESTAMP,aggInterval_doNOTchange));'
