      | summarize app_memory_load = avg(app_memory_load), app_cpu_load = avg(app_cpu_load) by ClusterName , NodeName , application_name

      ) on ClusterName , NodeName

      | where app_cpu_load > delta_cpu

      | where overbook_ratio > 1.05 or (overbook_ratio <= 1.05 and app_cpu_load * 1.0 / node_cpu_cap < 0.3)

      | summarize (app_cpu, app_uri, app_memory) = argmin(app_cpu_load, application_name, app_memory_load) by ClusterName, NodeName, delta_cpu

      | join kind= leftouter ('
- id: DB-performance-757
  Topic: PPBOT-049-High-Cpu-Usage-Node
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-049-High-Cpu-Usage-Node.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName app_cpu
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where event == "cpu_total_load_cap_per_core" and NodeName startswith "DB"

      | where originalEventTimestampTo > ago(20m)

      | summarize avg(toint(node_used_commit_mem_mb)) , avg(toint(node_total_commit_mem_mb)) , any(node_sku),

      avg_node_user_cpu_usage = avg(iff(isnull(node_user_cpu_usage) or node_user_cpu_usage == "", 0, node_user_cpu_usage)) by ClusterName , NodeName

      | extend memory_usage_percentage = avg_node_used_commit_mem_mb * 1.0 / avg_node_total_commit_mem_mb

      | where memory_usage_percentage < 0.5 and avg_node_user_cpu_usage < 0.5 * iff(any_node_sku contains "G3", 1400 , iff(any_node_sku contains "G4", 2200, iff(any_node_sku contains "G5", 7200, 2800)))

      | summarize (least_cpu_node_load, least_cpu_node) = argmin(avg_node_user_cpu_usage, NodeName) by ClusterName

      ) on ClusterName

      | project ClusterName , NodeName , delta_cpu , app_uri, app_cpu, app_memory, least_cpu_node, least_cpu_node_load

      | extend app_move_cas_command = iff(isnull(least_cpu_node) or least_cpu_node == "",

      "No available node found in current TR. Following MSSOP0021 to move app to the other TR.",

      strcat("Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, " | Move-Replica -ApplicationUri ", app_uri, " -TargetNodeName ", least_cpu_node))

      | extend app_move_sf_command = iff(isnull(least_cpu_node) or least_cpu_node == "", "",

      strcat("Move-ServiceFabricPrimaryReplica -NodeName ", NodeName, " -ServiceName ''marker_service_name'' -IgnoreConstraints $true"))'
