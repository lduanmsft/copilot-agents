  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: 'MonSQLXStoreIOStats

      | where AppName == "{AppName}"

      | where file_path endswith "df"

      | where page_blob_tier != ""

      | summarize arg_max(TIMESTAMP, page_blob_tier, inferred_tier) by file_path , AppName , LogicalServerName

      | where page_blob_tier != "P30" and inferred_tier == 1'
- id: DB-performance-719
  Topic: PPBOT-015---Long-Time-Overbooked-Node
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-015---Long-Time-Overbooked-Node.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(15m) and event == "application_load" and ClusterName == ClusterName and NodeName == NodeName

      | where slo_size != "" and slo_size !contains "zombie"

      | extend appCap = iff(app_cpu_load_cap == 60, 50, iff(app_cpu_load_cap == 30 ,25, tolong(app_cpu_load_cap)))

      | summarize by ClusterName, NodeName, application_name , appCap

      | sort by appCap asc'
- id: DB-performance-720
  Topic: PPBOT-015---Long-Time-Overbooked-Node
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-015---Long-Time-Overbooked-Node.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(30m) and event == "cpu_total_load_cap_per_core" and ClusterName == ClusterName and NodeName == NodeName

      | extend node_cap = iff(node_sku contains "G3", 1400, iff(node_sku contains "G4", 2200, 2800))

      | extend cap_load_percent = node_user_cpu_allocation * 1.0 / node_cap

      | extend highly_overbooked = iff(cap_load_percent > 1.2, 1, 0)

      | summarize sum(highly_overbooked), peak_alloc_ratio = max(cap_load_percent), node_cpu_cap = any(node_cap), node_cpu_alloc = any(node_user_cpu_allocation) by ClusterName, NodeName, node_sku

      | where sum_highly_overbooked > 0

      | extend node_cpu_cap = node_cpu_cap * 1

      | extend ExtraAppsToBeRemoved = node_cpu_alloc - node_cpu_cap

      | project ClusterName, NodeName , node_sku, node_cpu_cap, node_cpu_alloc, peak_alloc_ratio, ExtraAppsToBeRemoved'
- id: DB-performance-721
  Topic: PPBOT-015---Long-Time-Overbooked-Node
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-015---Long-Time-Overbooked-Node.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(30m) and event == "cpu_total_load_cap_per_core" and ClusterName == ClusterName and NodeName startswith "DB"

      | extend node_cap = iff(node_sku contains "G3", 1400, iff(node_sku contains "G4", 2200, 2800))

      | summarize node_cpu_alloc = max(node_user_cpu_allocation), node_cap = 1 * any(node_cap) by ClusterName, NodeName

      | sort by node_cpu_alloc asc

      | where node_cpu_alloc > 0

      | extend absorb_cores = node_cap - node_cpu_alloc'
- id: DB-performance-722
  Topic: PPBOT-015---Long-Time-Overbooked-Node
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-015---Long-Time-Overbooked-Node.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(1h) and event == "cpu_total_load_cap_per_core" and NodeName startswith "DB"

      | project ClusterName, NodeName, node_sku, node_user_cpu_allocation

      | extend node_cap = iff(node_sku contains "G3", 1400, iff(node_sku contains "G4", 2200, 2800))

      | extend cap_load_percent = node_user_cpu_allocation * 1.0 / node_cap

      | extend highly_overbooked = iff(cap_load_percent > 1.2, 1, 0)

      | summarize sum(highly_overbooked), count(), peak_load = max(cap_load_percent) by ClusterName, NodeName, node_sku

      | where sum_highly_overbooked * 1.0 / count_ > 0.85

      | project ClusterName, NodeName, node_sku, peak_load'
- id: DB-performance-723
  Topic: PPBOT-016---High-Memory-Usage-Nodes
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-016---High-Memory-Usage-Nodes.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName node_sku
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where originalEventTimestampTo > ago(30m)

      | where event == "cpu_total_load_cap_per_core" and NodeName startswith "DB"

      | project node_sku, node_total_commit_mem_mb,

      node_used_commit_mem_mb,

      node_physical_mem_mb,

      ClusterName , NodeName, originalEventTimestampTo

      | summarize avg(toint(node_used_commit_mem_mb)) , avg(toint(node_total_commit_mem_mb)) , avg(toint(node_physical_mem_mb)), any(node_sku) by ClusterName , NodeName, bin(originalEventTimestampTo, time(5m))

      | extend node_used_commit_mem_ratio = 1.0 * avg_node_used_commit_mem_mb / avg_node_total_commit_mem_mb

      | extend is_violated = iff(node_used_commit_mem_ratio > 0.95, 1, 0)

      | summarize cnt = count() , violations = sum(is_violated) , delta_mb = avg(avg_node_used_commit_mem_mb) - avg(avg_node_total_commit_mem_mb) * 0.95 by ClusterName , NodeName

      | join kind = inner ('
