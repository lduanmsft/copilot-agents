- id: DB-performance-774
  Topic: Query-to-get-ww-status
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/Query-to-get-ww-status.md
  Prompts:
  - SQL DB root he update informatIOnal event etw table analysi
  - SQL DB RootHEUpdateInformationalEventEtwTable TIMESTAMP
  - SQL DB investigate root he update informatIOnal event etw t
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: RootHEUpdateInformationalEventEtwTable
    ExecutedQuery: 'let mt = 0.65; // mild

      let ht = 0.70; // hot threshold

      let vht = 0.8; // very hot threshold

      let ct = 0.20; // cold threshold

      let vct = 0.15; // very cold threshold

      let ect = 0.10; // extremely cold threshold

      let snapshotTimestamp = ago(1m);

      // Gets clusters that were already upgraded

      let UpgradedCM = materialize(

      cluster("azurecm").database("AzureCM").RootHEUpdateInformationalEventEtwTable

      | where TIMESTAMP > ago(90d) and EventName == "RootHE_NewHERolloutScheduled" and Message contains "171013-0913" and Message contains "RDOSAzureHost" and Message contains "TenantImpact: ''True''" and (Tenant contains "App" or Tenant contains "DDC")

      | parse Message with * "OwnerMetadata: ''" DeploymentId:long *

      | extend Message2 = replace("rn","", Message)

      | extend Message2 = replace(" ","", Message2)

      | extend Message2 = replace("''", """, Message2)

      | extend Message2 = replace(",}", "}", Message2)

      | extend Message2 = replace(" {", "{", Message2)

      | parse kind = regex Message2 with * "NodeAllocationType:"" NodeAllocationType'
- id: DB-performance-775
  Topic: Query-to-get-ww-status
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/Query-to-get-ww-status.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event TIMESTAMP application_name
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'cluster(clusterName).database(databaseName).MonRgLoad

      | where TIMESTAMP < snapshotTimestamp

      | where TIMESTAMP > snapshotTimestamp-30m

      | where event == ''application_load''

      | where application_type contains ''Worker.ISO''

      | summarize app_cpu_load_cap = min(app_cpu_load_cap), replicas = dcount(NodeName) by application_name, bin(TIMESTAMP, 30s)

      | summarize app_cpu_load_cap = min(app_cpu_load_cap), replicas = min(replicas) by application_name

      | extend total_cpu_load_cap = app_cpu_load_cap * replicas'
- id: DB-performance-776
  Topic: Query-to-get-ww-status
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/Query-to-get-ww-status.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'cluster(clusterName).database(databaseName).MonRgLoad

      | where TIMESTAMP < snapshotTimestamp

      | where ClusterName startswith "{ClusterName}"

      | where code_package_name == "Code" and service_manifest_name == ''SQL''

      | where event == ''instance_load''

      | where cpu_count > 1 or cpu_load_cap >= 100

      | where application_type contains ''Worker.ISO''

      | extend cpu_load_perc = cpu_load/cpu_load_cap

      | summarize cpu_load_perc = avg(cpu_load_perc) by application_name, slo_size, ClusterName, NodeName, bin(TIMESTAMP, 10m)

      | summarize cpu_load_perc = max(cpu_load_perc) by application_name, slo_size, ClusterName, bin(TIMESTAMP, 10m)

      | where cpu_load_perc > mt

      | extend very_hot = iff(cpu_load_perc > vht, 6, 0)

      | extend hot = iff(very_hot == 0 and cpu_load_perc > ht, 1, 0)

      | extend mild = iff(very_hot == 0 and hot == 0 and cpu_load_perc > mt, 1, 0)

      | extend hot_score = hot + very_hot, mild_score = mild+hot+very_hot, only_hot_score = hot, only_mild_score = mild

      | summarize hot_score = sum(hot_score), mild_score = sum(mild_score), only_hot_score = sum(only_hot_score), very_hot_score = sum(very_hot), only_mild_score = sum(only_mild_score), max_cpu_load_perc = max(cpu_load_perc) by application_name, slo_size, ClusterName, bin(TIMESTAMP, 1h)

      | summarize hot_score = max(hot_score), mild_score = max(mild_score), only_hot_score = max(only_hot_score), very_hot_score = max(very_hot_score), only_mild_score = max(only_mild_score), max_cpu_load_perc= max(max_cpu_load_perc) by application_name, slo_size, ClusterName

      | join (queryClusterAliveInstances(clusterName, databaseName)) on application_name

      | summarize affected_very_hot = countif(very_hot_score >= 6), total_cpu_load_cap_very_hot = sumif(total_cpu_load_cap, very_hot_score >= 6),

      affected_hot = countif(hot_score >= 6), total_cpu_load_cap_hot = sumif(total_cpu_load_cap, hot_score >= 6),

      affected_mild = countif(mild_score >= 6), total_cpu_load_cap_mild = sumif(total_cpu_load_cap, mild_score >= 6),

      max(replicas) by tenant_ring_name = ClusterName'
- id: DB-performance-777
  Topic: Query-to-get-ww-status
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/Query-to-get-ww-status.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event ClusterName TIMESTAMP slo_size
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'cluster(clusterName).database(databaseName).MonRgLoad

      | where TIMESTAMP < snapshotTimestamp

      | where ClusterName startswith "{ClusterName}"

      | where code_package_name == "Code" and service_manifest_name == ''SQL''

      | where event == ''instance_load''

      | where application_type contains ''Worker.''

      | extend cpu_load_perc = cpu_load/cpu_load_cap

      | summarize max(cpu_load_perc) by application_name, slo_size, ClusterName

      | join (queryClusterAliveInstances(clusterName, databaseName)) on application_name

      | summarize affected_extremely_cold = countif(max_cpu_load_perc < ect), total_cpu_load_cap_extremely_cold = sumif(total_cpu_load_cap, max_cpu_load_perc < ect),

      affected_very_cold = countif(max_cpu_load_perc < vct), total_cpu_load_cap_very_cold = sumif(total_cpu_load_cap, max_cpu_load_perc < vct),

      affected_cold = countif(max_cpu_load_perc < ct), total_cpu_load_cap_cold = sumif(total_cpu_load_cap, max_cpu_load_perc < ct),

      max(replicas) by tenant_ring_name = ClusterName, slo_size'
- id: DB-performance-778
  Topic: Query-to-get-ww-status
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/Query-to-get-ww-status.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonCapacityTenantSnapshot ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCapacityTenantSnapshot
    ExecutedQuery: 'cluster(clusterName).database(databaseName).MonCapacityTenantSnapshot

      | where TIMESTAMP >= ago(2h)

      | where tenant_ring_name startswith ''tr''

      | where tenant_ring_name !contains ''mscds''

      | extend cores_cap = iff(total_cpu_capacity < current_cpu_capacity, total_cpu_capacity, current_cpu_capacity)/100000.0 * sellable_ratio_percentage/100.0

      | extend cores_load = used_cpu_capacity/100000.0 * overbooking_ratio_percentage/100.0

      | extend cores_left = (cores_cap - cores_load)

      | extend factor = iff(vm_size == ''SQLG5'', 2.0, 1.0)

      | summarize arg_max(TIMESTAMP, vm_size, placement_affinity_tag, FabricClusterName=toupper(fabric_controller_name), tenant_name, total_cores = cores_cap/factor, remaining_cores = cores_left/factor) by tenant_ring_name

      | join Upgraded on $left.tenant_name == $right.TenantName

      | parse tenant_ring_name with * ''.'' region_name

      | join kind = leftouter (

      cluster(clusterName).database(databaseName).MonMLWDHealthProperties

      | where PropertyName contains "" "AcceleratedNetworking:"

      | where Message contains "OK"

      | project tenant_ring_name = ClusterName

      | distinct tenant_ring_name

      | extend sriov = 1

      ) on tenant_ring_name

      // Gets the number of cold instances per tenant ring

      //| join kind=leftouter (queryClusterColdInstances(clusterName, databaseName)) on tenant_ring_name

      //| project FabricClusterName, tenant_ring_name, region_name, vm_size, placement_affinity_tag, slo_size, affected_cold, total_cpu_load_cap_cold, affected_very_cold, total_cpu_load_cap_very_cold, affected_extremely_cold, total_cpu_load_cap_extremely_cold, max_replicas

      | join kind=inner (queryClusterHotInstances(clusterName, databaseName)) on tenant_ring_name

      | project FabricClusterName, tenant_ring_name, sriov, tenant_name, region_name, vm_size, placement_affinity_tag, affected_mild, total_cpu_load_cap_mild, affected_hot, total_cpu_load_cap_hot, affected_very_hot, total_cpu_load_cap_very_hot, max_replicas'
