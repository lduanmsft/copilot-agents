- id: DB-performance-242
  Topic: MMSOP-Memory-Management-SOPs
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/MMSOP-Memory-Management-SOPs.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB SQL memory OOM ring buffer o o m LogicalServerName AppName AppTypeName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlMemNodeOomRingBufferOOM
    ExecutedQuery: '| project originalEventTimestamp , query_id , plan_id ,exec_type , cpu_time , elapsed_time , dop, max_dop , logical_reads , logical_writes , physical_reads, execution_count , memory_grant_kb = max_max_query_memory_pages * 8, query_hash , query_plan_hash<tr class="odd">(DMV) Thread-level committed memoryThis is useful for live analysis only (we don''t have history of this data in Kusto/MDS)SELECTCOUNT(*) num_of_threads,started_by_sqlservr,CAST(SUM(CAST(stack_bytes_committed as bigint))/(1024*1024.0) as decimal(10,3)) total_stack_mb_committed,CAST(SUM(CAST(stack_bytes_used as bigint))/(1024*1024.0) as decimal(10,3)) total_stack_mb_used            FROM sys.dm_os_threads GROUP BY started_by_sqlservr<tr class="even">MonSqlMemNodeOomRingBufferOOM eventsCheck fail, OOM factor, pool id, etc.MonSqlMemNodeOomRingBuffer


      | where AppName == "{AppName}"


      | project TIMESTAMP, AppName, LogicalServerName, failure, factor, last_error, task, pool_metadata_id, committed_kb, job_object_limit_job_mem_kb, is_system_physical_memory_low, instance_rg_size   Roughly check non-SOS memory usage when OOM occurs.MonSqlMemNodeOomRingBuffer


      | where AppName == "{AppName}" and NodeName == "{NodeName}"


      | extend nonSosMemKb=job_object_limit_job_mem_kb - committed_kb


      | project TIMESTAMP, job_object_limit_job_mem_kb, committed_kb, nonSosMemKb


      | render timechart<tr class="odd">MonSQLSystemHealth To check the very first memory status dump.MonSQLSystemHealth


      | where AppName == "{AppName}"


      | where message contains "MSR-1" // replace to "MSR-" in case multiple dumps.


      | project originalEventTimestamp, message OOM single DBs for a cluster in the past 7 dayslet oomApps = MonSQLSystemHealth| where AppTypeName == "Worker.ISO.Premium" or AppTypeName == "Worker.ISO"| where message contains "Failed allocate pages: FAIL_PAGE_ALLOCATION" or message contains "Failed Virtual Allocate Bytes: FAIL_VIRTUAL_RESERVE" | summarize oom_count=count(message) by ClusterName, AppTypeName, AppName, LogicalServerName, NodeName, bin(TIMESTAMP, 15m);let singleDbApps = MonDmDbResourceGovernance| where AppTypeName == "Worker.ISO.Premium" or AppTypeName == "Worker.ISO"| where slo_name !startswith "M" | summarize by ClusterName, AppTypeName, AppName, LogicalServerName, NodeName, slo_name;let oomSingleDbs = oomApps| join kind= inner (singleDbApps) on ClusterName, AppTypeName, AppName, LogicalServerName, NodeName| project-away ClusterName1, AppTypeName1, AppName1, LogicalServerName1, NodeName1;oomSingleDbs| order by oom_count desc<tr class="even">MonDmDbResourceGovernanceCheck RG settings, e.g. min_sos_gap_with_job_mem_limit_in_mb.MonDmDbResourceGovernance


      | where TIMESTAMP &gt; datetime(2017-05-19 18:00:00)


      | where AppName == "{AppName}"


      | project job_low_memory_signal_threshold_mb, min_sos_gap_with_job_mem_limit_in_mb, TIMESTAMP<tr class="odd">MonDmOsMemoryManagerCountersMemory countersMonDmOsMemoryManagerCounters


      | summarize by counter_name<tr class="odd">counter_name<tr class="even">Connection Memory (KB)<tr class="odd">Database Cache Memory (KB)<tr class="even">External benefit of memory<tr class="odd">Free Memory (KB)<tr class="even">Granted Workspace Memory (KB)<tr class="odd">Lock Blocks<tr class="even">Lock Blocks Allocated<tr class="odd">Lock Memory (KB)<tr class="even">Lock Owner Blocks<tr class="odd">Lock Owner Blocks Allocated<tr class="even">Log Pool Memory (KB)<tr class="odd">Maximum Workspace Memory (KB)<tr class="even">Memory Grants Outstanding<tr class="odd">Memory Grants Pending<tr class="even">Optimizer Memory (KB)<tr class="odd">Reserved Server Memory (KB)<tr class="even">SQL Cache Memory (KB)<tr class="odd">Stolen Server Memory (KB)<tr class="even">Target Server Memory (KB)<tr class="odd">Total Server Memory (KB)<tr class="even">MonDmOsBPoolPerfCountersBuffer pool countersMonDmOsBPoolPerfCounters | where AppName == "{AppName}"


      | summarize by counter_name<tr class="odd">counter_name<tr class="even">Buffer cache hit ratio<tr class="odd">Buffer cache hit ratio base<tr class="even">Page lookups/sec<tr class="odd">Free list stalls/sec<tr class="even">Database pages<tr class="odd">Target pages<tr class="even">Integral Controller Slope<tr class="odd">Lazy writes/sec<tr class="even">Readahead pages/sec<tr class="odd">Readahead time/sec<tr class="even">Page reads/sec<tr class="odd">Page writes/sec<tr class="even">Checkpoint pages/sec<tr class="odd">Background writer pages/sec<tr class="even">Page life expectancy<tr class="odd">Extension page writes/sec<tr class="even">Extension page reads/sec<tr class="odd">Extension outstanding IO counter<tr class="even">Extension page evictions/sec<tr class="odd">Extension allocated pages<tr class="even">Extension free pages<tr class="odd">Extension in use as percentage<tr class="even">Extension page unreferenced time<tr class="odd">MonWiQdsWaitStatsCheck memory wait statsQDS wait category mapping to wait types, <a href="https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-query-store-wait-stats-transact-sql#wait-categories-mapping-table">https://docs.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-query-store-wait-stats-transact-sql#wait-categories-mapping-table MonWiQdsWaitStats | where TIMESTAMP &gt; datetime(2017-05-31 15:00:00)| where AppName == "{AppName}" and wait_category in ("MEMORY")//, "CPU")| summarize sum(total_query_wait_time_ms) by query_hash, query_id, wait_category, PreciseTimeStamp //, statement_type| order by sum_total_query_wait_time_ms desc nulls last | take 10 Check top wait stats at the timeMonWiQdsWaitStats | where originalEventTimestamp &gt; datetime(2017-06-01 11:00:00) and originalEventTimestamp &lt; datetime(2017-06-01 13:30:00)| where AppName == "{AppName}"| summarize sum(total_query_wait_time_ms) by query_hash, query_id, plan_id, wait_category| top 10 by sum_total_query_wait_time_ms desc   Check if memory or compilation for apps that is more than 30% of total wait for 1 hour period.MonWiQdsWaitStats


