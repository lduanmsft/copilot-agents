- id: DB-performance-205
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB blocking investigation
  - SQL DB MonQueryProcessing event LogicalServerName
  - SQL DB troubleshoot blocking investigation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: "MonQueryProcessing \n\n| where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime}) \n\n| where LogicalServerName =~ \"{LogicalServerName}\" and AppName == \"{AppName}\"\n\n| where event =~ \"query_memory_grant_blocking\"\n\n| extend sampled_mem_waiter_query_hash =strcat('0x',toupper(tohex(blocking_query_hash)))\n\n| extend session_id=blocking_session_id, requested_memory_mb=requested_memory_kb/1024, required_memory_mb=required_memory_kb/1024, ideal_memory_mb=ideal_memory_kb/1024\n\n| extend total_granted_memory_mb=total_granted_memory_kb/1024, max_query_memory_allowed_per_query_mb=max_query_memory_kb/1024, total_available_memory_mb=total_available_memory_kb/1024, total_max_memory_mb=total_max_memory_kb/1024\n\n| extend query_cost=round(query_cost, 1)\n\n| project TIMESTAMP, sampled_mem_waiter_query_hash, session_id,dop, wait_time_sec, query_cost, requested_memory_mb,required_memory_mb,ideal_memory_mb,total_granted_memory_mb,max_query_memory_allowed_per_query_mb, total_available_memory_mb, total_max_memory_mb,pool_name, total_waiter_count , total_grantee_count<tr class=\"odd\">Waits//*\n"
