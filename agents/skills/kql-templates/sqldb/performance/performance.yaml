- id: DB-performance-590
  Topic: Pull-status
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Pull-status.md
  Prompts:
  - SQL DB sqlx store IO stats errors
  - SQL DB MonSQLXStoreIOStats event LogicalServerName
  - SQL DB troubleshoot sqlx store IO stats errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: 'cluster(regionName).database(databaseName).MonSQLXStoreIOStats

      | where TIMESTAMP > ago(24h)

      | where event == "xstore_io_stats"

      | where AppTypeName == "Worker.ISO"

      | where NodeRole == "DB" and (file_path endswith "mdf" or file_path endswith "ldf" or file_path endswith "ndf") and file_path contains "prs"

      | summarize arg_max(TIMESTAMP, page_blob_tier, inferred_tier) by file_path , AppName , LogicalServerName , ClusterName

      | join kind= leftouter (

      cluster(regionName).database(databaseName).MonSQLXStore

      | where TIMESTAMP > ago(24h) and http_errorcode == 503

      | where NodeRole == "DB" and event== "xio_failed_request"

      | summarize count(), max(retry_count)  by file_path  , AppName , LogicalServerName

      | where max_retry_count > 0 or count_  > 30

      | extend is_impacted = 1

      ) on AppName , file_path, LogicalServerName

      | join kind= leftouter (

      cluster(regionName).database(databaseName).MonDmRealTimeResourceStats

      | where TIMESTAMP > ago(24h)

      | summarize slo_name=any(slo_name) by AppName , LogicalServerName

      ) on AppName , LogicalServerName

      | where slo_name !startswith "System"

      | extend storage_account_name = substring(split(file_path , ".")[0], 8)

      | extend Region = tostring(split(ClusterName , ".")[1])

      | extend mdf_file_path = replace(@''_(\d+).[ln]df'', @''_1.mdf'', file_path)

      //| extend is_not_fixed = iff(page_blob_tier != "P30" and page_blob_tier != "P40" and page_blob_tier != "P50" and page_blob_tier != "P60" and page_blob_tier != "P70" and page_blob_tier != "P80", 1 , 0)

      | extend is_not_fixed = ( inferred_tier == 0 and page_blob_tier == "P10")

      | extend is_log = iff(file_path endswith "ldf", 1, 0)

      | summarize sum(is_not_fixed), sum(is_impacted), sum(is_log) by mdf_file_path, Region

      | summarize Total_DBs=countif(sum_is_log > 0) , DBs_Remaining=countif(sum_is_not_fixed > 0), DBs_Remaining_Throttled=countif(sum_is_not_fixed > 0 and sum_is_impacted > 0), DBs_Remaining_NotThrottled=countif(sum_is_not_fixed > 0 and sum_is_impacted == 0) by Region

      | order by Total_DBs asc'
