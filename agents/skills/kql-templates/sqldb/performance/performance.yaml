- id: DB-performance-725
  Topic: PPBOT-016---High-Memory-Usage-Nodes
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-016---High-Memory-Usage-Nodes.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(30m)

      | where event == "cpu_total_load_cap_per_core"

      | summarize by node_sku, ClusterName, NodeName

      ) on ClusterName, NodeName

      | extend LowMemroyThreshold = iff(node_sku contains "G3", 4096, 6000)

      | extend LowMemroyThreshold2 = iff(node_sku contains "G3", 4096, 6656)

      | extend IsLowMemeory = iff(CounterValue <= LowMemroyThreshold, 1, 0)

      | extend IsPossibleLowMemory = iff(CounterValue <= LowMemroyThreshold2, 1, 0)

      | join kind = leftouter ('
- id: DB-performance-726
  Topic: PPBOT-016---High-Memory-Usage-Nodes
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-016---High-Memory-Usage-Nodes.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonSqlRmRingBuffer event AppName NodeName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRmRingBuffer
    ExecutedQuery: 'MonSqlRmRingBuffer

      | where TIMESTAMP > ago(30m)

      | where event == "resource_monitor_ring_buffer_recorded" and notification == "MEMPHYSICAL_LOW" and system_indicators == 1

      | project TIMESTAMP, ClusterName, NodeName, AppName //committed_kb , target_kb

      | summarize SignalCnt = count() by ClusterName, NodeName

      ) on ClusterName, NodeName

      | extend LowMemorySignal = iff(isnotempty(SignalCnt), 1, 0)

      | extend IsLowMemeory = iff(IsLowMemeory > 0, IsLowMemeory, IsPossibleLowMemory * LowMemorySignal)

      | summarize sum(IsLowMemeory), count(), min(CounterValue), any(node_sku) by NodeName, ClusterName

      ) on ClusterName, NodeName

      | extend isHighCommitedMemoryPressure = iff(violations * 1.0 / cnt > 0.8, "true", "false")

      | extend isHighPhysicalMemoryPressure = iff(sum_IsLowMemeory * 1.0 / count_ > 0.8, "true", "false")

      | where isHighCommitedMemoryPressure == "true" or isHighPhysicalMemoryPressure == "true"

      | project ClusterName, NodeName, delta_mb, isHighCommitedMemoryPressure, isHighPhysicalMemoryPressure

      | join kind= leftouter ('
- id: DB-performance-727
  Topic: PPBOT-016---High-Memory-Usage-Nodes
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-016---High-Memory-Usage-Nodes.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName delta_mb
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where originalEventTimestampTo > ago(20m)

      | where event == "application_load" and NodeName startswith "DB" and application_type startswith "Worker.ISO"

      | summarize app_memory_load = avg(app_memory_load), app_cpu_load = avg(app_cpu_load) by ClusterName , NodeName , application_name

      ) on ClusterName , NodeName

      | where app_memory_load > delta_mb

      | summarize (app_cpu, app_uri, app_memory) = argmin(app_cpu_load, application_name, app_memory_load) by ClusterName, NodeName, delta_mb

      | join kind= leftouter ('
- id: DB-performance-728
  Topic: PPBOT-016---High-Memory-Usage-Nodes
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-016---High-Memory-Usage-Nodes.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName app_cpu
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where event == "cpu_total_load_cap_per_core" and NodeName startswith "DB"

      | where originalEventTimestampTo > ago(20m)

      | summarize avg(toint(node_used_commit_mem_mb)) , avg(toint(node_total_commit_mem_mb)) , any(node_sku),

      avg_node_user_cpu_usage = avg(iff(isnull(node_user_cpu_usage) or node_user_cpu_usage == "", 0, node_user_cpu_usage)) by ClusterName , NodeName

      | extend memory_usage_percentage = avg_node_used_commit_mem_mb * 1.0 / avg_node_total_commit_mem_mb

      | where memory_usage_percentage < 0.5 and avg_node_user_cpu_usage < 0.5 * iff(any_node_sku contains "G3", 1400 , iff(any_node_sku contains "G4", 2200, -1))

      | summarize (least_memory_load, least_memory_node) = argmin(memory_usage_percentage, NodeName) by ClusterName

      ) on ClusterName

      | project ClusterName , NodeName , delta_mb , app_uri, app_cpu, app_memory, least_memory_node

      | extend app_move_cas_command = iff(isnull(least_memory_node) or least_memory_node == "",

      "No available node found in current TR. Following MSSOP0021 to move app to the other TR.",

      strcat("Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, " | Move-Replica -ApplicationUri ", app_uri, " -TargetNodeName ", least_memory_node))

      | extend app_move_sf_command = iff(isnull(least_memory_node) or least_memory_node == "", "",

      strcat("Move-ServiceFabricPrimaryReplica -NodeName ", NodeName, " -ServiceName ''marker_service_name'' -IgnoreConstraints $true"))'
- id: DB-performance-729
  Topic: PPBOT-024---High-System-Workload-Memory-Node
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-024---High-System-Workload-Memory-Node.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
