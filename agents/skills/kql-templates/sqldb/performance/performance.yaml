    ExecutedQuery: 'a.  MonRgManager

      | where originalEventTimestamp > ago(1h) and NodeName == {NodeName} and ClusterName == {ClusterName}

      | where event == "vhd_growth_error" and error_message == "VHD growth file erroneously present."'
- id: DB-performance-769
  Topic: PPTSG-VHD01B-Dynamic-VHD-Grower-Too-Many-Nodes-Gro
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPTSG-VHD01B-Dynamic-VHD-Grower-Too-Many-Nodes-Gro.md
  Prompts:
  - SQL DB RG manager activity
  - SQL DB MonRgManager event NodeName ClusterName
  - SQL DB investigate RG manager
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: 'MonRgManager

      | where event == "vhd_growth_chunk_written"

      | where originalEventTimestamp > p_start_utc_date and originalEventTimestamp <= p_end_utc_date

      | summarize count() by NodeName, ClusterName, TIMESTAMP_sample =bin(TIMESTAMP, p_aggregation_interval) // count nodes growing per hour

      | summarize nodes_growing = make_set(NodeName), nodes_growing_count = count() by ClusterName, TIMESTAMP_sample // Count number of nodes growing on same ring during that hour

      | join kind=leftouter (MonRgLoad

      | where TIMESTAMP > p_nodes_in_cluster_detection

      | summarize total_nodes_count = dcount(NodeName) by ClusterName) on ClusterName

      | extend nodes_growing_percent = (nodes_growing_count * 1.0 / total_nodes_count * 1.0) * 100

      | extend sample_violation = nodes_growing_percent > p_max_nodes_growing_percent

      | extend max_nodes_allowed_growing = ((p_max_nodes_growing_percent / 100.0) * total_nodes_count * 1.0)

      | extend num_recommended_nodes_to_stop = ceiling(nodes_growing_count - max_nodes_allowed_growing)

      | summarize nodes_growing_count = arg_max(nodes_growing_count, nodes_growing, nodes_growing_percent, max_nodes_allowed_growing, num_recommended_nodes_to_stop), samples_violation = sum(sample_violation) by ClusterName, total_nodes_count

      | extend huge_percentage_growing = nodes_growing_count > ((p_huge_node_growth_threshold_percent / 100.0) * total_nodes_count * 1.0)

      | where samples_violation > p_num_samples_for_detection or huge_percentage_growing

      | extend region = strcat(

      iff(ClusterName contains ''sqltest'' or ClusterName contains ''lkgtst'', ''stage'', ''prod''),

      ''-'',

      extract(''([0-9A-Za-z]*).([0-9A-Za-z_-]*).([0-9A-Za-z_]*)'', 2, ClusterName))

      | extend recommended_severity = case(not(region contains ''prod''), "sev4", total_nodes_count < p_small_ring_threshold or not(huge_percentage_growing), "sev3", "sev2")

      | extend p_max_nodes_growing_percent, p_huge_node_growth_threshold_percent, p_num_samples_for_detection

      | extend tsg_name = "PPTSG-VHD01B"'
- id: DB-performance-770
  Topic: PPTSG-VHD01B-Dynamic-VHD-Grower-Too-Many-Nodes-Gro
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPTSG-VHD01B-Dynamic-VHD-Grower-Too-Many-Nodes-Gro.md
  Prompts:
