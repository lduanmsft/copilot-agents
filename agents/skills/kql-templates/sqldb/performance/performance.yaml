- id: DB-performance-437
  Topic: Troubleshooting-Invoice-Cloud-High-Shard-Count
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Other-Waits-and-Issues/Troubleshooting-Invoice-Cloud-High-Shard-Count.md
  Prompts:
  - SQL DB real time resource stats activity
  - SQL DB MonDmRealTimeResourceStats database_name
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where LogicalServerName =~ "{ServerName}" and database_name startswith \"{DatabaseName}\"

      | where originalEventTimestamp > now(-1h)

      | summarize arg_max(originalEventTimestamp, ClusterName, NodeName, AppName) by database_name

      | summarize dcount(AppName), dcount(database_name) by ClusterName, NodeName

      | order by dcount_database_name desc

      | where dcount_database_name >= 500'
- id: DB-performance-438
  Topic: Troubleshooting-Invoice-Cloud-High-Shard-Count
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Other-Waits-and-Issues/Troubleshooting-Invoice-Cloud-High-Shard-Count.md
  Prompts:
  - SQL DB real time resource stats activity
  - SQL DB MonDmRealTimeResourceStats database_name
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where LogicalServerName =~ "{ServerName}" and database_name startswith \"{DatabaseName}\"

      | where NodeName =~ targetNodeName

      | where originalEventTimestamp > now(-1h)

      | summarize arg_max(originalEventTimestamp, ClusterName, AppTypeName, AppName) by database_name

      | summarize dcount(database_name) by ClusterName, AppTypeName, AppName

      | extend killCommand = strcat("Get-FabricNode -NodeName ", targetNodeName, " -NodeClusterName ", ClusterName,

      " | Kill-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/", AppTypeName, "/", AppName)

      | project ClusterName, targetNodeName, AppName, dcount_database_name, killCommand

      | order by dcount_database_name desc

      2. Check in SFE/XTS to ensure each application has moved to a different node.  If each application has moved successfully, wait for 15 minutes and run the Troubleshooting query again to ensure the shard count has dropped below 500 for the target node.

      3. If Kill-Process results in an in-place restart and an application remains on the same node, repeat the Kill-Process command(s) until you have successfully moved the application(s) off the node.

      4. If you are unable to move the application(s) to another node with the Kill-Process command(s), try executing Restart-FabricNode as a last resort.  Use the results of the query from Step 1 to build the command:'
- id: DB-performance-439
  Topic: Tuple-Mover-Activity
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Other-Waits-and-Issues/Tuple-Mover-Activity.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonApollo database_name LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonApollo
    ExecutedQuery: 'MonApollo

      | where LogicalServerName =~ serverName and database_name =~ dbName

      | where originalEventTimestamp between(RequestStartTimeWithAdditionalTimeToObserve..RequestEndTimeWithAdditionalTimeToObserve)

      | where

      event == ''columnstore_tuple_mover_compression_stats'' or

      event == "columnstore_rowgroup_merge_complete" or

      event == "columnstore_tuple_mover_end_compress" or

      event == "columnstore_rowgroup_merge_failed"

      | extend failed_merge=iff(event == "columnstore_rowgroup_merge_failed",1,0)

      | extend tm_work_end_time = originalEventTimestamp

      | extend tm_work_start_time = case(

      event == "columnstore_rowgroup_merge_complete", datetime_add(''Microsecond'', -cpu_time, originalEventTimestamp),

      event == "columnstore_tuple_mover_end_compress", datetime_add(''Millisecond'', -duration, originalEventTimestamp),

