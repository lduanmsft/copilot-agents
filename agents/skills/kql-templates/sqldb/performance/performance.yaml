    ExecutedQuery: 'MonDmIoVirtualFileStats


      | where AppName =~ "{AppName}" // and NodeName =~ "{NodeName}"


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where db_name !in("tempdb", "msdb", "master", "model")


      | extend file_id_str=tostring(file_id)


      | summarize sum(delta_io_stall_queued_write_ms), sum(delta_io_stall_queued_read_ms), sum(delta_num_of_bytes_written), sum(delta_num_of_bytes_read) by TIMESTAMP=bin(TIMESTAMP, 1min), file_id_str


      | project TIMESTAMP, file_id_str, Packed=pack(''delta_io_stall_queued_write_ms'', sum_delta_io_stall_queued_write_ms, ''delta_io_stall_queued_read_ms'', sum_delta_io_stall_queued_read_ms, ''delta_num_of_bytes_written'', sum_delta_num_of_bytes_written, ''delta_num_of_bytes_read'', sum_delta_num_of_bytes_read)


      | mvexpand Packed


      | parse tostring(Packed) with ''{"''Category''":''Value:double''}''


