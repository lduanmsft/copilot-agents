- id: DB-performance-260
  Topic: Query-Store-queries-_Managed-Instance_
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Query-Store-queries-_Managed-Instance_.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQueryParamData LogicalServerName AppName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQueryParamData
    ExecutedQuery: 'MonWiQueryParamData

      | where LogicalServerName =~ "{LogicalServerName}"

      | where AppName == "{AppName}" and NodeName =~ "{NodeName}"

      | where TIMESTAMP >= datetime({StartTime}) and TIMESTAMP <= datetime({EndTime})

      | extend compile_cpu_time_ms = compile_cpu_time / 1000

      | extend compile_duration_ms = compile_duration / 1000

      | summarize total_cpu_ms=sum(compile_cpu_time_ms) by TIMESTAMP=bin(TIMESTAMP, 5min)

      | order by TIMESTAMP asc nulls first

      | serialize

      | extend PrevTimestamp=prev(TIMESTAMP, 1)

      | where isnull(PrevTimestamp) == false

      | extend elapsed_second = datetime_diff (''second'', TIMESTAMP, PrevTimestamp)

      | project TIMESTAMP, cpu_percent_over_dtu=round((total_cpu_ms*100.0/1000)/(elapsed_second* cpu_cap_in_sec),4)

      | render timechart

      // QDS.06'
- id: DB-performance-261
  Topic: Query-Store-queries-_Managed-Instance_
