- id: DB-performance-2
  Topic: '40613'
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/40613.md
  Prompts:
  - SQL DB QDS exec stats analysis
  - SQL DB MonWiQdsExecStats AppName originalEventTimestamp
  - SQL DB investigate QDS exec stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where originalEventTimestamp > ago(10h)

      | where AppName == "{AppName}"

      | where originalEventTimestamp > ago({TimeRange}) and originalEventTimestamp < now()

      //| where originalEventTimestamp == datetime(2018-02-08 11:00:00.0000000)'
- id: DB-performance-3
  Topic: '40613'
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/40613.md
  Prompts:
  - SQL DB real time resource stats activity
  - SQL DB MonDmRealTimeResourceStats database_name
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where originalEventTimestamp > ago(10h)

      | where replica_type == 0

      | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | summarize min(PreciseTimeStamp) by ClusterName, AppName, NodeName, replica_type, slo_name, dtu_limit, code_package_version, bin(originalEventTimestamp, 10min)'
- id: DB-performance-4
  Topic: '40613'
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/40613.md
  Prompts:
  - SQL DB QDS exec stats activity
  - SQL DB MonWiQdsExecStats AppName originalEventTimestamp
  - SQL DB investigate QDS exec stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where originalEventTimestamp > ago(10h)

      | where AppName == "{AppName}"

      | where exec_type != 0

      | summarize sum(execution_count) by bin(TIMESTAMP, 15min), exec_type

      | extend exec_type = tostring(exec_type)'
