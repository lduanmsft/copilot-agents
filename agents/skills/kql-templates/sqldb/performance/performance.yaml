- id: DB-performance-25
  Topic: Generating-commands
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Generating-commands.md
  Prompts:
  - SQL DB timeout analysis
  - SQL DB MonDmRealTimeResourceStats LogicalServerName
  - SQL DB troubleshoot timeout
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where TIMESTAMP > ago({TimeRange})

      | where replica_type == 0

      | summarize any(database_name) by AppName, LogicalServerName, AppTypeName) on AppName

      | where AppName !in (''b18a995afd74'')

      | extend sql_cmd = strcat("sqlcmd -S"", LogicalServerName,".database.windows.net" -d"",any_database_name,"" -U"Foo" -P"Bar"")

      | extend cas_restart = strcat("Get-FabricNode -NodeName ",NodeName," -NodeClusterName ",ClusterName," | Kill-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/",AppTypeName,"/", AppName)

      | extend cas_dump = strcat("Get-FabricNode -NodeName ",NodeName," -NodeClusterName ",ClusterName," | Dump-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/",AppTypeName,"/", AppName)

      | extend cas_XDB hostdump = strcat("Get-FabricNode -NodeName ",NodeName," -NodeClusterName ",ClusterName," | Dump-Process -ProcessName XDB hostmain.exe -ApplicationNameUri fabric:/Worker")

      | extend cas_XDB hostdump_if = strcat("$cmdOutput = cmd /c ", sql_cmd, " ''2>&1''; $shouldMitigate = "$cmdOutput" -Like ''*timeout*''; $shouldMitigate; if ($shouldMitigate) { ", cas_XDB hostdump, "; $LatestCommands += ''", cas_XDB hostdump, "'' }")

      | extend cas_restart_if = strcat("$cmdOutput = cmd /c ", sql_cmd, " ''2>&1''; $shouldMitigate = "$cmdOutput" -Like ''*timeout*''; $shouldMitigate; if ($shouldMitigate) { ", cas_restart, "; $LatestCommands += ''", cas_restart, "'' }")

      | project max_TIMESTAMP, total_errors, NodeName, AppName, LogicalServerName, database_name = any_database_name, cas_restart_if , cas_XDB hostdump_if, sql_cmd,cas_restart, cas_dump, ClusterName

      | order by max_TIMESTAMP desc'
- id: DB-performance-26
  Topic: Generating-commands
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Generating-commands.md
  Prompts:
