- id: DB-performance-464
  Topic: PERFTS003-Config--Change-History-Tab
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Tools-and-Tips/ASC/PERFTS003-Config--Change-History-Tab.md
  Prompts:
  - SQL DB config logical server overrides activity
  - SQL DB MonConfigLogicalServerOverrides AppName
  - SQL DB investigate config logical server overrides
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonConfigLogicalServerOverrides
    ExecutedQuery: 'MonConfigLogicalServerOverrides


      | where AppName !startswith ''b-'' and AppName !startswith ''v-''


      | where Logical_Server_Name =~ ''{ServerName}''


      | project TIMESTAMP, Property_Name, Property_Value


      | order by Property_Name asc, TIMESTAMP asc // Must sort by both Property_Name and TIMESTAMP in asc. order for the rest of the query to work


      | serialize next_TIMESTAMP = next(TIMESTAMP),


      prev_TIMESTAMP = prev(TIMESTAMP),


      next_name = next(Property_Name),


      prev_name = prev(Property_Name),


      next_value = next(Property_Value),


      prev_value = prev(Property_Value)


      | extend first_config = Property_Name != prev_name // The first row (ie. earliest event (out of the past 7 days)) of a config setting


      | extend last_config = Property_Name != next_name // The last row (ie. last event (out of the past 7 days)) of a config setting


      | extend same_config_new_value = not(first_config) and Property_Value != prev_value // The first row (ie. earliest event) when the config has its new value


      | extend same_config_before_value_change = not(last_config) and Property_Value != next_value // The last row (ie. last event) when the config has its old value, before it is changed


      | extend is_prev_gap = not(first_config) and (datetime_diff(''hour'', TIMESTAMP, prev_TIMESTAMP) &gt; log_collection_interval * fudge_factor) // Check if there is a time gap right before the current event


      | extend is_next_gap = not(last_config) and (datetime_diff(''hour'', next_TIMESTAMP, TIMESTAMP) &gt; log_collection_interval * fudge_factor) // Check if there is a time gap right after the current event


      | where first_config


      or last_config


      or same_config_new_value


      or same_config_before_value_change


      or is_prev_gap


      or is_next_gap


      | extend first_logged_time = TIMESTAMP


      // There are few scenarios to consider when populating ''last_logged_time'' column:


      // (1) There is ONLY one event for the config setting with its current value. If so, we set last_logged_time = first_logged_time


      // * This scenario happens when this condition is TRUE -&gt; (first_config OR same_config_new_value OR is_prev_gap) AND (last_config OR same_config_before_value_change OR is_next_gap)


      // (2) There are consecutive events for the current config with the same value, and the current event is the first row (ie. earliest event).


      // If so, we set last_logged_time = next(TIMESTAMP) since we want to merge the next row (which must the last row) with the current row.


      // * This scenario happens when this condition is TRUE -&gt; (first_config OR same_config_new_value OR is_prev_gap) AND not(last_config OR same_config_before_value_change OR is_next_gap)


      // (3) Similar scenario as scenario (2), except now the current event is the last row for a config setting (ie. last event).


      // Since we will be discarding the last row in the final result, we do not really care about what TIMESTAMP is used to populate ''last_logged_time'' here.


      | extend last_logged_time = case(last_config or same_config_before_value_change or is_next_gap, // Scenario (1)


      first_logged_time,


      next(TIMESTAMP)) // Scenario (2) or Scenario (3)


      | extend gap_detected_before = case(is_prev_gap, 1, int(null)) // Checking if there is a time gap between the current event and the previous event for the same config setting


      | where first_config or same_config_new_value or is_prev_gap


      | extend first_logged_time = case(first_logged_time &lt; min_cutoff_time,


      datetime(null),


      first_logged_time)


      | extend last_logged_time = case(last_logged_time &gt; max_cutoff_time,


      datetime(null),


      last_logged_time)


      | project Property_Name, Property_Value, first_logged_time, last_logged_time, gap_detected_before


      //QueryName:''Feature Switch and Config Override History''<tr class="odd">Number of Databases in an Elastic Pool Trend (only shown if database is part of an elastic pool)MonDmRealTimeResourceStats | where AppName =~ ''{AppName}''| summarize dcount(database_name) by bin(TIMESTAMP, 30m)| order by TIMESTAMP asc//QueryName:''Number of Databases in an Elastic Pool Trend''<tr class="even">Crash DumpsMonSqlDump | where AppName =~ ''{AppName}'' and TIMESTAMP between {StartTime}..{EndTime} and ClusterName =~ ''{Cluster}'' and NodeName =~ ''{NodeName}''| where CompleteFileName endswith ''.dmp'' | summarize TIMESTAMP = min(TIMESTAMP) by AppName, ClusterName, NodeName, CompleteFileName| project TIMESTAMP, AppName, ClusterName, NodeName, CompleteFileName | order by TIMESTAMP asc//QueryName:''Crash Dumps''<tr class="odd">Database Metadata Change SummaryMonQueryProcessing| where TIMESTAMP &gt;= {StartTime} and TIMESTAMP &lt;= {EndTime}| where AppName !startswith ''b-'' and AppName !startswith ''v-''| where event == ''metadata_change''| extend database_name=logical_database_name | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"| summarize change_count = count() by operation_type, database_name| project operation_type, change_count//QueryName:''Database Metadata Change Summary''<tr class="even">100 Database Metadata Change DetailMonQueryProcessing| where TIMESTAMP &gt;= {StartTime} and TIMESTAMP &lt;= {EndTime}| where AppName !startswith ''b-'' and AppName !startswith ''v-''| where event == ''metadata_change''| extend database_name=logical_database_name | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"| project TIMESTAMP, database_name, object_id, operation_type, operation_code| order by TIMESTAMP desc| take 100//QueryName:''100 Database Metadata Change Detail'''
- id: DB-performance-465
  Topic: PERFTS004-CPU-tab
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Tools-and-Tips/ASC/PERFTS004-CPU-tab.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonSqlRgHistory event AppName NodeName ClusterName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where AppName !startswith ''b-'' and AppName !startswith ''v-''

      |where event == ''aggregated_workload_groups_plus_history''

      | extend TIMESTAMP = end_aggregated_sample

      | where (AppName =~ "{AppName}" and ( (NodeName =~ "{NodeName}" and ClusterName =~ "{ClusterName}" and TIMESTAMP between (datetime(7/28/2019 12:17:09 AM)..datetime(7/31/2019 2:29:15 PM)))

      or (NodeName =~ "{NodeName}" and ClusterName =~ "{ClusterName}" and TIMESTAMP between (datetime(7/31/2019 2:29:34 PM)..datetime(8/1/2019 12:19:58 AM)))

      )

      )

      (cap_interval) on TIMESTAMP

      | extend PercentOverUserCap = round(100.0*avg_cores_sec/min_cpu_cap_in_sec,3)

      | project TIMESTAMP,group_name, PercentOverUserCap

      | order by TIMESTAMP asc

      | render timechart'
