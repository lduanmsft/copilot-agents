      '
- id: DB-performance-183
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB login failures error 0
  - SQL DB MonLogin event LogicalServerName AppName
  - SQL DB troubleshoot login failures error 0
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin


      |where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where LogicalServerName =~ "{LogicalServerName}" and AppName == "{AppName}"


      | where event == "process_login_finish" and package == "sqlserver"


      | where is_user_error == 0


      | extend success=case(is_success == 1, 1, 0)


      | extend failure=case(is_success == 0, 1, 0)


      | extend failure_enqueue_time_ms=case(is_success == 1, total_time_ms, 0)


      | summarize Successful_Login_Count=sum(success), Failed_Login_Count=sum(failure), FailureRate=sum(failure)*100/(sum(success)+sum(failure)), avg_failure_enqueue_time_ms=sum(failure_enqueue_time_ms)/sum(failure), Avg_Login_Time_ms=avg(total_time_ms), Avg_Enqueu_Time_ms=avg(enqueue_time_ms) by bin(originalEventTimestamp, 1min)


      | render timechart // L.02

      '
- id: DB-performance-184
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB login failures
  - SQL DB MonLogin is_success event LogicalServerName
  - SQL DB troubleshoot login failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: "MonLogin\n\n|where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})\n\n| where LogicalServerName =~ \"{LogicalServerName}\" and AppName == \"{AppName}\"\n\n| where event == \"process_login_finish\" and package == \"sqlserver\"\n\n| where (is_success == false and is_user_error == false) or total_time_ms &gt; 14000\n\n| project TIMESTAMP , enqueue_time_ms ,total_time_ms, find_login_ms, message// L.03\n\n// Login resource usage comparison// Use xdb for rgGroupPrefix \n\n|where event == 'aggregated_workload_groups_plus_history'\n\n| where AppName == \"{AppName}\" and NodeName =~ \"{NodeName}\" // and LogicalServerName =~ \"{LogicalServerName}}\"\n\n| where end_aggregated_sample &gt;= datetime({StartTime}) and end_aggregated_sample &lt;= datetime({EndTime})\n\n| where group_name contains \"{rgGroupPrefix}\" or ( \"{rgGroupPrefix}\" == \"SloPri\" and group_name contains \"UserPrimaryGroup\" )\n\n// or ( \"{rgGroupPrefix}\" == \"SloSec\" and group_name contains \"UserSecondaryGroup\" )\n\n| where delta_total_cpu_usage_ms &lt;&gt; total_cpu_usage_ms\n\n| project end_utc_date = end_aggregated_sample , name = group_name , start_utc_date = start_aggregated_sample , delta_total_cpu_usage_ms, delta_total_request_count, active_request_count = active_request_count_max , active_session_count = active_session_count_max , delta_writes_completed_total, delta_reads_completed_total,\n\ndelta_log_bytes_used_total, delta_log_temp_db_bytes_used_total, used_databasepages_kb = 0 , physical_database_name\n\n| extend duration = (end_utc_date - start_utc_date)/time(1s)\n\n| extend CpuCoreUsage = (delta_total_cpu_usage_ms/1000.0)/ duration\n\n| extend TotalRequests = (delta_total_request_count *1.0) /1.0\n\n| extend ActiveRequests = (active_request_count *1.0) /1.0\n\n| extend ActiveSessions = (active_session_count *1.0) /1.0\n\n| extend TotalIOPS = ((delta_reads_completed_total + delta_writes_completed_total)*1.0)/duration\n\n| extend ReadIOPS = (delta_reads_completed_total*1.0)/duration\n\n| extend WriteIOPS = (delta_writes_completed_total*1.0)/duration\n\n| extend LogKbps = (delta_log_bytes_used_total)/(1024.0*duration)\n\n| extend TempDbLogKbps = (delta_log_temp_db_bytes_used_total)/(1024.0*duration)\n\n| extend UsedDatabasePagesMb = used_databasepages_kb*1.0/(1024)\n\n| top-nested of bin(end_utc_date, 5min) by avg(CpuCoreUsage), top-nested 5 of name by avg_cpucoreusage=avg(CpuCoreUsage) desc\n\n| order by end_utc_date desc\n\n//| project end_utc_date, name, CpuCoreUsage, TotalIOPS, ReadIOPS, WriteIOPS, LogKbps, TempDbLogKbps, TotalRequests, ActiveRequests, ActiveSessions, UsedDatabasePagesMb\n"
