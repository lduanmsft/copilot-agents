    ExecutedQuery: 'MonSQLXStoreIOStats


      | where LogicalServerName == "{LogicalServerName}" and AppName == "{AppName}"


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where event == ''xstore_io_stats''


      | where (file_path contains "ldf") or (file_path contains "mdf")


      | project TIMESTAMP, iops = total_requests/30.


      , niops = total_xio_requests/30.


      , file_path , NodeName


