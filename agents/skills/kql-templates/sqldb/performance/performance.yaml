    ExecutedQuery: 'MonSqlIdleMemCollectorStats

      | where TIMESTAMP between (_startTime .. _endTime) // Time range filtering

      | where LogicalServerName == _LogicalServerName

      | where AppName == _AppName

      | where event == "shrink_if_needed"

      | extend cache_reclaim_policy = tostring(iff(cache_reclaim_policy == 3, "Work Relative Reclamation", "Cache Activeness"))

      | where cache_reclaim_policy == "Cache Activeness"

      In the output, check the latest record based on timestamp, and if cache_reclaim_policy is "Cache Activeness", then go to next step to verify memory is indeed not getting reclaimed, and if cache_reclaim_policy is "Work Relative Reclamation", then, this mitigation won''t help, please reach out on below Contact Information.'
