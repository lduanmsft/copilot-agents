- id: DB-performance-784
  Topic: QP010-3-Correct-conversion-semantics-corruptions
  Source: TSG-SQL-DB-Performance/content/QP/QP010-3-Correct-conversion-semantics-corruptions.md
  Prompts:
  - SQL DB database metadata status
  - SQL DB MonDatabaseMetadata LogicalServerName TIMESTAMP
  - SQL DB investigate database metadata
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      | where TIMESTAMP > ago(1d)

      | where LogicalServerName == logical_server

      | where logical_db_name == logical_database

      | where table_name == "sysiscols"

      | where idmajor == table_id

      | where idminor in ( index_ids )

      | distinct idminor, subid, intprop, tinyprop1, status

      ) on $left.colid == $right.intprop

      | extend column_id = colid

      | extend index_id = idminor

      | extend index_column_id = subid

