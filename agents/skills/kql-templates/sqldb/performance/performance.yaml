  - SQL DB MonWiQdsExecStats AppName query_id
  - SQL DB investigate QDS exec stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where AppName == "{AppName}"// and query_id == "2341"'
