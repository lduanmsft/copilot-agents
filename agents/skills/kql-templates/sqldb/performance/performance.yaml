- id: DB-performance-734
  Topic: PPBOT-033---Premium-Replica-Reduction-Broken-Assum
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-033---Premium-Replica-Reduction-Broken-Assum.md
  Prompts:
  - SQL DB seed traces latency
  - SQL DB MonDbSeedTraces event AppTypeName ClusterName
  - SQL DB troubleshoot seed traces latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDbSeedTraces
    ExecutedQuery: 'MonDbSeedTraces

      | where TIMESTAMP > ago(7d)

      | where AppTypeName == "Worker.ISO.Premium" and database_id > 4 and ClusterName endswith ".worker.database.windows.net"

      | where event == "hadr_physical_seeding_progress" and internal_state_desc == "Success" and role_desc == "Source"

      | extend seedingTimeSec = (seeding_end_time - seeding_start_time) / time(1s)

      | extend dbSizeGb = database_size_bytes / (1024. * 1024 * 1024)

      | where seedingTimeSec > 0 and dbSizeGb <= 20

      | summarize percentile(seedingTimeSec, 99)

      | extend is_seeding_time_assumption_broken = percentile_seedingTimeSec_99 > 600, d = 1

      | join kind= fullouter ('
- id: DB-performance-735
  Topic: PPBOT-033---Premium-Replica-Reduction-Broken-Assum
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-033---Premium-Replica-Reduction-Broken-Assum.md
  Prompts:
  - SQL DB seed traces errors
  - SQL DB MonDbSeedTraces event AppTypeName ClusterName
  - SQL DB troubleshoot seed traces errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDbSeedTraces
    ExecutedQuery: 'MonDbSeedTraces

      | where TIMESTAMP > ago(7d)

      | where AppTypeName == "Worker.ISO.Premium" and database_id > 4 and ClusterName endswith ".worker.database.windows.net"

      | where event == "hadr_physical_seeding_progress" and role_desc == "Source"

      | extend dbSizeGb = database_size_bytes / (1024. * 1024 * 1024)

      | where dbSizeGb <= 20

      | where failure_code == 0 or (failure_code != 14 and failure_code <= 1000)

      | summarize count_failed = countif(internal_state_desc == "Failed") , count_success = countif(internal_state_desc == "Success" and failure_code == 0)

      | extend seeding_success_rate = 100.0 * count_success / (count_success +count_failed )

      | extend is_seeding_success_rate_assumption_broken = seeding_success_rate < 90, d = 1

      ) on d

      | where is_seeding_success_rate_assumption_broken > 0 or is_seeding_time_assumption_broken > 0'
- id: DB-performance-736
  Topic: PPBOT-034---Handle-Resource-Competition-Violation
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-034---Handle-Resource-Competition-Violation.md
  Prompts:
  - SQL DB RG manager analysis
  - SQL DB AlrRgManager event NodeName ClusterName
  - SQL DB investigate RG manager
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
