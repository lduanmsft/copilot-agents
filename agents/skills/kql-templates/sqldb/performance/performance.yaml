- id: DB-performance-731
  Topic: PPBOT-026---High-Load-CR-Instance
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-026---High-Load-CR-Instance.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(1h)

      | where event == "instance_load" and ClusterName startswith "{ClusterName}"

      | summarize avg(cpu_load), avg(cpu_load_cap) , avg(memory_load), avg(memory_load_cap) by

      ClusterName , NodeName, NodeRole, application_name, code_package_name, service_manifest_name, bin(originalEventTimestampFrom, 15m)

      | extend is_high_cpu = ((avg_cpu_load_cap > 0) and (100.0 * avg_cpu_load / avg_cpu_load_cap > 80))

      | extend is_high_memory = ((service_manifest_name != "SQL") and (avg_memory_load_cap > 0) and (100.0 * avg_memory_load / avg_memory_load_cap > 80))

      | where is_high_memory == true or is_high_cpu == true

      | project originalEventTimestampFrom , ClusterName , NodeName ,NodeRole, application_name, code_package_name, service_manifest_name, avg_cpu_load , avg_cpu_load_cap, toint(is_high_cpu) , avg_memory_load , avg_memory_load_cap , toint(is_high_memory)

      | where code_package_name == "Gateway.Code" or code_package_name == "ManagementService.Code"'
- id: DB-performance-732
  Topic: PPBOT-026---High-Load-CR-Instance
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-026---High-Load-CR-Instance.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(1h)

      | where event == "instance_load" and ClusterName startswith "{ClusterName}"

      | where code_package_name == "Gateway.Code"

      | where service_manifest_name == "Gateway"

      | summarize avg(memory_load), avg(memory_load_cap) by

      ClusterName , NodeName, NodeRole, application_name, code_package_name, service_manifest_name, bin(originalEventTimestampFrom, 15m)

      | extend percent_memory = 100.0 * avg_memory_load / avg_memory_load_cap

      | project originalEventTimestampFrom , ClusterName , NodeName ,NodeRole, avg_memory_load , avg_memory_load_cap , percent_memory

      | order by percent_memory desc'
