      | project TIMESTAMP, MAXDOP=value // C.07_2 MAXDOP server level for Managed Instance


      // MAXDOP, 0 means MAXDOP is not set. MAXDOP=# processors// Backend query equivalent: select * from sys.configurations where configuration_id = 1539MonDatabaseMetadata


      | where LogicalServerName=~ "{LogicalServerName}" and AppName =~ "{AppName}" //logical_db_name =~ "{LogicalDatabaseName}"


