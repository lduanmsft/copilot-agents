      | where TIMESTAMP >= start_inclusive and TIMESTAMP < end_exclusive

      | where event == "hot_overbooked_core_violation" and violation_type != ""

      | summarize core_map = argmax(originalEventTimestamp, cpu_cap_usage_map) , app_map = argmax(originalEventTimestamp, app_usage_map), last_exception = argmax(originalEventTimestamp, exception) by NodeName, ClusterName, cpu_usage_threshold, violation_duration_threshold, violation_type'
- id: DB-performance-738
  Topic: PPBOT-037-PerfProcessDirectoryQuotaFailure
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-037-PerfProcessDirectoryQuotaFailure.md
  Prompts:
  - SQL DB ppbot 037 perf process directory quota failure
  - SQL DB MonRgManager event NodeName ClusterName
