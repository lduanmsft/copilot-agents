- id: DB-performance-586
  Topic: Last-attempt
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Last-attempt.md
  Prompts:
  - SQL DB sqlx store errors
  - SQL DB MonSQLXStore event LogicalServerName AppName
  - SQL DB troubleshoot sqlx store errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: 'cluster(clstr).database("sqlazure1").MonSQLXStore

      | where originalEventTimestamp >= ago(24h) and http_errorcode == 503 and AppTypeName == "Worker.ISO"

      | where NodeRole == "DB" and (file_path endswith "mdf" or file_path endswith "ldf" or file_path endswith "ndf") and file_path contains "prs" and file_path !contains "prsmi"

      | summarize samples = cnt(), retry_count = max(retry_count)

      by AppName, bin(originalEventTimestamp, small_sample)

      | summarize minutes_throttled = count()

      , samples = sum(samples)

      , retry_count = max(retry_count)

      by AppName, bin(originalEventTimestamp, kpi_sample)

      | extend impact = (samples > acceptable_throtle_minute_at_hour_level * kpi_sample/time(1m) / 2 and minutes_throttled > acceptable_micro_samples_throttled )

      and retry_count >= max_retry_count

      | where impact == 1

      | summarize minutes_throttled=max(minutes_throttled), samples=max(samples), retry_count=max(retry_count) by AppName

      | extend time_throttled_ratio = round(minutes_throttled * (small_sample / time(1m)) / (kpi_sample / time(1min)), 2), max_retries_per_io = retry_count + 1

      | join kind=inner (

      cluster(clstr).database("sqlazure1").MonSQLXStoreIOStats

      | where TIMESTAMP > ago(24h)

      | where event == "xstore_io_stats" and AppTypeName == "Worker.ISO"

      | where NodeRole == "DB" and (file_path endswith "mdf" or file_path endswith "ldf" or file_path endswith "ndf") and file_path contains "prs"

      | summarize arg_max(TIMESTAMP, page_blob_tier, inferred_tier) by file_path , AppName , LogicalServerName , ClusterName

      | where page_blob_tier == "P10"

      | summarize by AppName , LogicalServerName , ClusterName

      ) on AppName

      | extend Region = tostring(split(ClusterName , ".",1)[0])

      | summarize count() by Region'
