      | extend MaxQueryMemoryMB=round(max_max_query_memory_pages*8.0/1024,1)


      | summarize max(MaxQueryMemoryMB) by query_hash


      | top 20 by max_MaxQueryMemoryMB desc nulls last // Sampled query memory grant waiter


      // G.03


