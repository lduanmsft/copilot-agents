      | summarize

      sum(cpu_time)

      by query_hash, query_plan_hash

      | top 5 by sum_cpu_time desc'
- id: DB-performance-311
  Topic: Root-Cause-Analysis
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Blocking/Root-Cause-Analysis.md
  Prompts:
  - SQL DB cloud database wait stats analysis
  - SQL DB MonDmCloudDatabaseWaitStats database_name
  - SQL DB investigate cloud database wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: 'MonDmCloudDatabaseWaitStats

      | where  TIMESTAMP >= startTime

      | where  TIMESTAMP <= endTime

      | where LogicalServerName =~ srv

      | where database_name =~ db

      | where delta_wait_time_ms > 100 or delta_max_wait_time_ms > 100

      //| where wait_type startswith "LCK"

      | project TIMESTAMP, start_utc_date, end_utc_date, NodeName, AppName, LogicalServerName, ResourcePoolName, database_id, database_name, wait_type, wait_time_ms, delta_wait_time_ms, max_wait_time_ms, delta_max_wait_time_ms, signal_wait_time_ms, delta_signal_wait_time_ms'
- id: DB-performance-312
  Topic: Root-Cause-Analysis
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Blocking/Root-Cause-Analysis.md
  Prompts:
  - SQL DB cloud database wait stats activity
  - SQL DB MonDmCloudDatabaseWaitStats database_name
  - SQL DB investigate cloud database wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: 'MonDmCloudDatabaseWaitStats

      | where  TIMESTAMP >= startTime

      | where  TIMESTAMP <= endTime

      | where LogicalServerName =~ srv

      | where database_name =~ db

      | where delta_wait_time_ms > 100 or delta_max_wait_time_ms > 100

      //| where wait_type startswith "LCK"

      | summarize sum(delta_wait_time_ms) by bin(end_utc_date, 5min), wait_type

      | sort by end_utc_date asc nulls last

      | project end_utc_date, wait_type, sum_delta_wait_time_ms

      | render timechart'
- id: DB-performance-313
  Topic: Root-Cause-Analysis
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Blocking/Root-Cause-Analysis.md
  Prompts:
  - SQL DB blocking investigation
  - SQL DB blocked process report LogicalServerName TIMESTAMP srv endTime
  - SQL DB troubleshoot blocking investigation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBlockedProcessReportFiltered
    ExecutedQuery: 'let startTime = ago({TimeRange});

      let endTime = now();

      let srv = "{ServerName}";

      let db = "{DatabaseName}";

      let blockingchain=MonBlockedProcessReportFiltered

      | where TIMESTAMP > startTime

      | where TIMESTAMP < endTime

      | where LogicalServerName =~ srv

      | where logical_database_name  =~ db

      //| where AppName =~ "{AppName}" //and NodeName =~"{NodeName}"

      | extend monitorLoop = extract("monitorLoop=\"([0-9]+)\"", 1, blocked_process_filtered, typeof(int))

      | parse blocked_process_filtered with anystr3:string "<blocked-process>" blockee "</blocked-process>" discard1

      | parse blocked_process_filtered with anystr4:string"<blocking-process>" blocker "</blocking-process>" discard2

      | extend blockee_clientapp = extract(''clientapp=\x22(.*?)\x22'', 1, blockee, typeof(string))

      | extend blockee_lastattention = extract(''lastattention=\x22(.*?)\x22'', 1, blockee, typeof(datetime))

      | extend blockee_lastbatchcompleted = extract(''lastbatchcompleted=\x22(.*?)\x22'', 1, blockee, typeof(datetime))

      | extend blockee_lastbatchstarted = extract(''lastbatchstarted=\x22(.*?)\x22'', 1, blockee, typeof(datetime))

      | extend blockee_lasttranstarted = extract(''lasttranstarted=\x22(.*?)\x22'', 1, blockee, typeof(datetime))

      | extend blockee_isolationlevel = extract(''isolationlevel=\x22(.*?)\x22'', 1, blockee, typeof(string))

      | extend blockee_lockmode = extract(''lockMode=\x22(.*?)\x22'', 1, blockee, typeof(string))

      | extend blockee_queryhash = extract(''queryhash=\x22(.*?)\x22'', 1, blockee, typeof(string))

      | extend blockee_status = extract(''status=\x22(.*?)\x22'', 1, blockee, typeof(string))

      | extend blockee_session_id = extract(''spid=\x22([0-9]+)\x22'', 1, blockee, typeof(int))

      | extend blockee_trancount = extract(''trancount=\x22([0-9]+)\x22'', 1, blockee, typeof(int))

      | extend blockee_transactionId = extract(''xactid=\x22(.*?)\x22'', 1, blockee, typeof(int))

      | extend blockee_transactionname = extract(''transactionname=\x22(.*?)\x22'', 1, blockee, typeof(string))

      | extend blockee_waitresource = extract(''waitresource=\x22(.*?)\x22'', 1, blockee, typeof(string))

      | extend blockee_waittime_ms = extract(''waittime=\x22([0-9]+)\x22'', 1, blockee, typeof(int))

      | extend blocker_clientapp = extract(''clientapp=\x22(.*?)\x22'', 1, blocker, typeof(string))

      | extend blocker_lastattention = extract(''lastattention=\x22(.*?)\x22'', 1, blocker, typeof(datetime))

      | extend blocker_lastbatchstarted = extract(''lastbatchstarted=\x22(.*?)\x22'', 1, blocker, typeof(datetime))

      | extend blocker_lastbatchcompleted = extract(''lastbatchcompleted=\x22(.*?)\x22'', 1, blocker, typeof(datetime))

      | extend blocker_lasttranstarted = extract(''lasttranstarted=\x22(.*?)\x22'', 1, blocker, typeof(datetime))

      | extend blocker_isolationlevel = extract(''isolationlevel=\x22(.*?)\x22'', 1, blocker, typeof(string))

      | extend blocker_lockmode = extract(''lockMode=\x22(.*?)\x22'', 1, blocker, typeof(string))

      | extend blocker_queryhash = extract(''queryhash=\x22(.*?)\x22'', 1, blocker, typeof(string))

      | extend blocker_status = extract(''status=\x22(.*?)\x22'', 1, blocker, typeof(string))

      | extend blocker_session_id = extract(''spid=\x22([0-9]+)\x22'', 1, blocker, typeof(int))

      | extend blocker_trancount = extract(''trancount=\x22([0-9]+)\x22'', 1, blocker, typeof(int))

      | extend blocker_transactionId = extract(''xactid=\x22(.*?)\x22'', 1, blocker, typeof(int))

      | extend blocker_transactionname = extract(''transactionname=\x22(.*?)\x22'', 1, blocker, typeof(string))

      | extend blocker_waitresource = extract(''waitresource=\x22(.*?)\x22'', 1, blocker, typeof(string))

      | extend blocker_waittime_ms = extract(''waittime=\x22([0-9]+)\x22'', 1, blocker, typeof(int))

      | order by monitorLoop asc nulls last;

      let leadblockers='
- id: DB-performance-314
  Topic: CPU001-CPU-Troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/CPU/CPU001-CPU-Troubleshooting.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonDmDbHadrReplicaStates LogicalServerName
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbHadrReplicaStates
    ExecutedQuery: 'MonDmDbHadrReplicaStates

      | where LogicalServerName =~ "{LogicalServerName}" and logical_database_name =~ "{LogicalDatabaseName}"

      | where is_primary_replica == 1

      | where AppName notcontains "b-"

      | order by TIMESTAMP asc nulls first

      | serialize

      | extend prevNodeName=prev(NodeName)

      | extend nextNodeName = next(NodeName)

      | extend isFirst= (NodeName != prevNodeName)

      | extend isLast=(NodeName != nextNodeName)

      | where isFirst == true or isLast == true

      | extend EndTime=next(TIMESTAMP)

      | extend StartTime=TIMESTAMP

      | where isFirst ==true

      | extend codeversion=extract("^(.*)-WASD", 1, code_package_version)

      | extend PrimaryNodeName=NodeName, PrimaryNodeFirstAppearTime=StartTime, PrimaryNodeLastAppearTime=EndTime

      | extend fake="fake"

      | project ClusterName, LogicalServerName, logical_database_name, PrimaryNodeName, AppName, PrimaryNodeFirstAppearTime, PrimaryNodeLastAppearTime, codeversion, fake, primary_group_database_id=group_database_id'
- id: DB-performance-315
  Topic: CPU001-CPU-Troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/CPU/CPU001-CPU-Troubleshooting.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonCounterOneMinute NodeName ClusterName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'MonCounterOneMinute

      | where TIMESTAMP > datetime({StartTime}) and TIMESTAMP < datetime({EndTime})

      | where NodeName =~ "{NodeName}" and ClusterName =~ "{ClusterName}"

      | extend Category = case(CounterName =~ @"MemoryAvailable MBytes", "Memory",

      strlen(extract(@"Processor([0-9]{1,2})% (Privileged Time|Processor Time)", 0, CounterName, typeof(string))) >0, "Processor",

      strlen(extract(@"Processor(_Total)% (Processor Time|Privileged Time)", 0, CounterName, typeof(string))) >0, "Total Processor",

      strlen(extract(@"LogicalDisk([A-Z]:)Avg. Disk sec/(Read|Write)", 0, CounterName, typeof(string))) >0, "Disk", "Other")

      | where Category !in ( "Other", "Memory", "Disk")

      | summarize avg(CounterValue) by bin(TIMESTAMP, 5min), CounterName, Category

      | render timechart'
