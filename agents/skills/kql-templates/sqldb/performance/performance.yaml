- id: DB-performance-700
  Topic: PP0004-The-LoginLimit-limit-for-the-database-is-12
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PP0004-The-LoginLimit-limit-for-the-database-is-12.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth LogicalServerName AppName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where message contains "The LoginLimit limit for the database is 120"

      | where TIMESTAMP > ago(2h)

      | summarize by AppName, NodeName,ClusterName, instance_rg_size, LogicalServerName

      | extend KillCmd= strcat("Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, " | Kill-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/Worker.ISO/",AppName)

      | project ClusterName, NodeName, instance_rg_size, LogicalServerName, AppName, KillCmd'
- id: DB-performance-701
  Topic: PP0006---Mitigate-Space-Issue-Due-to-underreported
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PP0006---Mitigate-Space-Issue-Due-to-underreported.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot | where sql_instance_name == "e8d31d007daa"

      | summarize min(TIMESTAMP), max(TIMESTAMP) by sql_instance_name, db_name=logical_database_name, service_level_objective, physical_database_state, [''state''], physical_database_id, logical_server_name, logical_resource_pool_id

      | join kind=inner(MonAnalyticsRPSnapshot | summarize min(TIMESTAMP), max(TIMESTAMP) by resource_pool_storage_limit_in_gb, logical_resource_pool_id | project min_resource_pool_storage_limit_time = min_TIMESTAMP, max_resource_pool_storage_limit_time = max_TIMESTAMP , resource_pool_storage_limit_in_gb, logical_resource_pool_id)'
- id: DB-performance-702
  Topic: PP0006---Mitigate-Space-Issue-Due-to-underreported
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PP0006---Mitigate-Space-Issue-Due-to-underreported.md
  Prompts:
  - SQL DB IO virtual file stats activity
  - SQL DB MonDmIoVirtualFileStats LogicalServerName
  - SQL DB investigate IO virtual file stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where ClusterName == "{ClusterName}"

      | where AppName == "{AppName}"

      | where type_desc == "ROWS"

      | project originalEventTimestamp, ClusterName, NodeName, AppName, size_on_disk_bytes, num_of_bytes_written, db_name, logical_database_id, spaceused_mb, LogicalServerName , file_id

      | extend size_on_disk_gb = size_on_disk_bytes / 1024 / 1024/1024, spaceused_gb = spaceused_mb/1024

      | summarize arg_min(originalEventTimestamp, size_on_disk_gb, spaceused_gb), arg_max(originalEventTimestamp, size_on_disk_gb, spaceused_gb) by NodeName, db_name, LogicalServerName , file_id

      | summarize sum(size_on_disk_gb), sum(spaceused_gb) by NodeName, LogicalServerName'
- id: DB-performance-703
  Topic: PP0006-2-Manually-check-and-fake-IDSU-_in-case-BOT
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PP0006-2-Manually-check-and-fake-IDSU-_in-case-BOT.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth event AppTypeName NodeName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where TIMESTAMP > ago(1h)

      | where AppTypeName == "Worker.ISO.Premium"

      | where event == "errorlog_written"

      | where message contains "Error: 3257,"

      | extend application_name = strcat("fabric:/", AppTypeName, "/", AppName)

      | summarize min(TIMESTAMP), arg_max(TIMESTAMP, message) by application_name, ClusterName, NodeName

      | sort by TIMESTAMP desc'
- id: DB-performance-704
  Topic: PP0006-2-Manually-check-and-fake-IDSU-_in-case-BOT
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PP0006-2-Manually-check-and-fake-IDSU-_in-case-BOT.md
  Prompts:
  - SQL DB RG load activity
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'let A = MonRgLoad

      | where TIMESTAMP > ago(1h)

      | where ClusterName == "{ClusterName}"

      | where event == ''reporting_win_fab_metric''

      | where application_name == ''fabric:/Worker.ISO.Premium/b3909259c4d5''

      | where metric_name == ''InstanceDiskSpaceUsed''

      | summarize (Timestamp, metric_value) = argmax(TIMESTAMP, metric_value)

      by application_name, ClusterName, NodeName, metric_name, application_type, event, slo_size

      | extend idsu_in_bytes = tolong(metric_value * 1024 * 1024)

      | project Timestamp, metric_name, metric_value, idsu_in_bytes, NodeName, application_name, slo_size,

      application_type, ClusterName, event

      | sort by metric_value desc;

      let max_idsu = toscalar(A | summarize max(idsu_in_bytes));'
- id: DB-performance-705
  Topic: PP0006-2-Manually-check-and-fake-IDSU-_in-case-BOT
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PP0006-2-Manually-check-and-fake-IDSU-_in-case-BOT.md
  Prompts:
  - SQL DB RG manager activity
  - SQL DB MonRgManager event NodeName ClusterName
  - SQL DB investigate RG manager
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: 'MonRgManager

      | where TIMESTAMP > ago(1d)

      | where event == "update_resource_settings"

      | where code_package_name == "Code" and service_manifest_name == "SQL"  and extra_param == "InstanceDiskSpaceUsed" and (resource_type == "FabricMetric" or resource_type == "ClearFabricMetric")

