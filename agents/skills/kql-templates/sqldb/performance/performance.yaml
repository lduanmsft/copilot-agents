- id: DB-performance-638
  Topic: TSGRS-SC03---Investigating-PFS-dynamic-scaling-ale
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS-SC03---Investigating-PFS-dynamic-scaling-ale.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event AppName TIMESTAMP
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP > p_range

      | where event == ''pfs_size_history''

      | extend provisioned_gb = pfs_total_space_bytes / 1024. / 1024. / 1024.

      | extend used_gb = (pfs_total_space_bytes - pfs_free_space_bytes) / 1024. / 1024. / 1024.

      | summarize avg(provisioned_gb), avg(used_gb) by AppName, bin(TIMESTAMP, 1h)

      | summarize count(), sum(avg_provisioned_gb), sum(avg_used_gb), dcount(AppName, 2) by bin(TIMESTAMP, 1h)

      | order by TIMESTAMP asc

      | serialize

      | extend x=row_number()

      | where x > 1 // exclude first sample, often is truncated (small sampel size) and affects calculations

      | extend avg_gb = round(sum_avg_provisioned_gb / dcount_AppName, 2)

      | extend avg_used_gb = round(sum_avg_used_gb / dcount_AppName, 2)

      | summarize argmin(TIMESTAMP, sum_avg_provisioned_gb, avg_gb, avg_used_gb, dcount_AppName), argmax(TIMESTAMP, sum_avg_provisioned_gb, avg_gb, avg_used_gb, dcount_AppName)

      | extend ratio_provisioned_total = round(max_TIMESTAMP_sum_avg_provisioned_gb / min_TIMESTAMP_sum_avg_provisioned_gb, 3)

      | extend ratio_average_provisioned_gb = round(max_TIMESTAMP_avg_gb / min_TIMESTAMP_avg_gb, 3)

      | extend ratio_average_used_gb = round(max_TIMESTAMP_avg_used_gb / min_TIMESTAMP_avg_used_gb, 3)

      | extend estimated_dolar_monthly_saving = 0.01 * ( min_TIMESTAMP_sum_avg_provisioned_gb - max_TIMESTAMP_sum_avg_provisioned_gb )

      | project min_TIMESTAMP_avg_used_gb, min_TIMESTAMP_avg_gb, max_TIMESTAMP_avg_used_gb, max_TIMESTAMP_avg_gb'
