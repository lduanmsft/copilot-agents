- id: DB-performance-806
  Topic: QP013-2-High-LCK_M_X-waits-with-PSP-workload
  Source: TSG-SQL-DB-Performance/content/QP/QP013-2-High-LCK_M_X-waits-with-PSP-workload.md
  Prompts:
  - SQL DB sql locking activity
  - SQL DB sql locking event LogicalServerName TIMESTAMP _endTime
  - SQL DB investigate ago
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlLocking
    ExecutedQuery: 'let _logicalServerName = "servername";

      let _logicalDatabaseName = "dbname";

      // Time window

      let _startTime = ago(8h);

      let _endTime = now();

      // Thresholds

      let _pspThreshold = 0.2;

      let _lockWaitThreshold = 800;

      let _metadataThreshold = 1000;

      let _minExecTotal = 1000;

      // Servers with dominant + high METADATA locking

      let MetadataHeavyServers = MonSqlLocking

      | where TIMESTAMP between (_startTime .. _endTime)

      | where event == "aggregate_lock_requests"

      | where LogicalServerName == _logicalServerName

      | summarize

      MetadataLocks = sumif(lock_requests_agg_value, resource_type == "METADATA"),

      OtherLocks = sumif(lock_requests_agg_value, resource_type != "METADATA")'
- id: DB-performance-807
  Topic: QP013-2-High-LCK_M_X-waits-with-PSP-workload
  Source: TSG-SQL-DB-Performance/content/QP/QP013-2-High-LCK_M_X-waits-with-PSP-workload.md
  Prompts:
  - SQL DB cloud database wait stats activity
  - SQL DB MonDmCloudDatabaseWaitStats database_name
  - SQL DB investigate cloud database wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: '| where MetadataLocks > (_metadataThreshold * 1000000)

      | where MetadataLocks > 2 * OtherLocks

      | project LogicalServerName;

      // Databases with high LCK_M_X waits

      let highLockWaits = MonDmCloudDatabaseWaitStats

      | where TIMESTAMP between (_startTime .. _endTime)

      | where wait_type == "LCK_M_X"

      | where server_name == _logicalServerName and database_name == _logicalDatabaseName

      | summarize

      avg_wait_ms_per_sec = round(sum(delta_wait_time_ms) / ((_endTime - _startTime) / 1s), 0)

      by server_name, database_name

      | where avg_wait_ms_per_sec > _lockWaitThreshold;

      // Databases with high PSP execution share

      let highPspShare = MonWiQdsExecStats

      | where TIMESTAMP between (_startTime .. _endTime)

      | where server_name == _logicalServerName and database_name == _logicalDatabaseName

      | summarize

      exec_psp = sumif(execution_count, dispatcher_plan_id > 0),

      exec_total = sum(execution_count)

      by server_name, database_name

      | where exec_total > _minExecTotal

      | extend psp_share = todouble(exec_psp) / exec_total

      | where psp_share > _pspThreshold;

      // Final intersection'
