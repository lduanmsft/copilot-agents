      \ = extract(\"lasttranstarted=\"(.*?)\"\", 1, blockee, typeof(datetime))\n\n| extend blockee_queryhhash = extract(\"queryhash=\"(.*?)\"\", 1, blockee, typeof(string))\n\n| extend blockee_isolationlevel\
      \ = extract(\"isolationlevel=\"(.*?)\"\", 1, blockee, typeof(string))\n\n| extend blockee_lastattention = extract(\"lastattention=\"(.*?)\"\", 1, blockee, typeof(datetime))\n\n| extend blockee_lastattention\
      \ = extract(\"lastattention=\"(.*?)\"\", 1, blockee, typeof(datetime))\n\n| extend blockee_lastbatchstarted = extract(\"lastbatchstarted=\"(.*?)\"\", 1, blockee, typeof(datetime))\n\n| extend blockee_waitresource\
      \ = extract(\"waitresource=\"(.*?)\"\", 1, blockee, typeof(string))\n\n| extend blocker_session_id = extract(\"spid=\"([0-9]+)\"\", 1, blocker, typeof(int))\n\n| extend blocker_status = extract(\"\
      status=\"(.*?)\"\", 1, blocker, typeof(string))\n\n| extend blocker_waittime = extract(\"waittime=\"([0-9]+)\"\", 1, blocker, typeof(int))\n\n| extend blocker_trancount = extract(\"trancount=\"([0-9]+)\"\
      \", 1, blocker, typeof(int))\n\n| extend blocker_lasttranstarted = extract(\"lasttranstarted=\"(.*?)\"\", 1, blocker, typeof(datetime))\n\n| extend blocker_queryhhash = extract(\"queryhash=\"(.*?)\"\
      \", 1, blocker, typeof(string))\n\n| extend blocker_isolationlevel = extract(\"isolationlevel=\"(.*?)\"\", 1, blocker, typeof(string))\n\n| extend blocker_lastattention = extract(\"lastattention=\"\
      (.*?)\"\", 1, blocker, typeof(datetime))\n\n| extend blocker_lastattention = extract(\"lastattention=\"(.*?)\"\", 1, blocker, typeof(datetime))\n\n| extend blocker_lastbatchstarted = extract(\"lastbatchstarted=\"\
      (.*?)\"\", 1, blocker, typeof(datetime))\n"
- id: DB-performance-205
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB blocking investigation
  - SQL DB MonQueryProcessing event LogicalServerName
  - SQL DB troubleshoot blocking investigation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: "MonQueryProcessing \n\n| where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime}) \n\n| where LogicalServerName =~ \"{LogicalServerName}\" and AppName == \"\
      {AppName}\"\n\n| where event =~ \"query_memory_grant_blocking\"\n\n| extend sampled_mem_waiter_query_hash =strcat('0x',toupper(tohex(blocking_query_hash)))\n\n| extend session_id=blocking_session_id,\
      \ requested_memory_mb=requested_memory_kb/1024, required_memory_mb=required_memory_kb/1024, ideal_memory_mb=ideal_memory_kb/1024\n\n| extend total_granted_memory_mb=total_granted_memory_kb/1024, max_query_memory_allowed_per_query_mb=max_query_memory_kb/1024,\
      \ total_available_memory_mb=total_available_memory_kb/1024, total_max_memory_mb=total_max_memory_kb/1024\n\n| extend query_cost=round(query_cost, 1)\n\n| project TIMESTAMP, sampled_mem_waiter_query_hash,\
      \ session_id,dop, wait_time_sec, query_cost, requested_memory_mb,required_memory_mb,ideal_memory_mb,total_granted_memory_mb,max_query_memory_allowed_per_query_mb, total_available_memory_mb, total_max_memory_mb,pool_name,\
      \ total_waiter_count , total_grantee_count<tr class=\"odd\">Waits//*\n"
