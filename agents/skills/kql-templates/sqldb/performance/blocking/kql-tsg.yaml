- id: DB-performance-618
  Topic: TSGRS-A19-Skip-container-drop-workflow-during-logical-server-drop
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS-A19-Skip-container-drop-workflow-during-logical-server-drop.md
  Prompts:
  - SQL DB blocking investigation
  - SQL DB MonManagementFSMInternal event TIMESTAMP
  - SQL DB troubleshoot blocking investigation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementFSMInternal
    ExecutedQuery: 'MonManagementFSMInternal

      | where TIMESTAMP > ago(2d)

      | where event == "fsm_begin_transaction"

      | where transaction_id in (blocked_txn)

      | join ( MonCmsBlockedProcessReport

      | where TIMESTAMP > ago(2d)

      ) on $left.server_transaction_id == $right.transaction_id

      | extend server_transaction_ids = extractall(''.*xactid="([0-9]*)".*'', blocked_process_filtered)

      | extend blocking_server_transaction_id = tolong(server_transaction_ids[1])

      | join ( MonManagementFSMInternal

      | where TIMESTAMP > ago(2d)

      | where event == "fsm_begin_transaction"

      | project blocking_server_transaction_id=server_transaction_id, blocking_transaction_id=transaction_id, blocking_request_id=request_id

      ) on blocking_server_transaction_id

      | project server_transaction_id, transaction_id, request_id, blocking_server_transaction_id, blocking_transaction_id, blocking_request_id'
