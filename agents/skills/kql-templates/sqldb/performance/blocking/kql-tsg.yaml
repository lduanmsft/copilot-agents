- id: DB-performance-43
  Topic: Incident-44705285-TempDB-Latch-Contention
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Incident-44705285-TempDB-Latch-Contention.md
  Prompts:
  - SQL DB blocked process report activity
  - SQL DB MonBlockedProcessReportFiltered LogicalServerName
  - SQL DB investigate blocked process report
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBlockedProcessReportFiltered
    ExecutedQuery: 'MonBlockedProcessReportFiltered

      | where blocked_process_filtered contains "2:1:132"

      | project TIMESTAMP, ClusterName , SubscriptionId, LogicalServerName , logical_database_name , AppName , blocked_process_filtered

      | summarize count(), dcount(logical_database_name) by ClusterName, SubscriptionId,LogicalServerName , AppName'
- id: DB-performance-44
  Topic: Incident-44705285-TempDB-Latch-Contention
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Incident-44705285-TempDB-Latch-Contention.md
  Prompts:
  - SQL DB cloud database wait stats activity
  - SQL DB MonDmCloudDatabaseWaitStats database_name
  - SQL DB investigate cloud database wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: 'MonDmCloudDatabaseWaitStats

      | where SubscriptionId in ({list_of_subscriptions_from_first_Kusto_query} )

      | where TIMESTAMP > ago({time_interval})

      | where wait_type in ("LATCH_SH", "LATCH_EX")

      | summarize delta_wait_time_ms = sum(delta_wait_time_ms), delta_task_count = sum(delta_waiting_tasks_count) by bin(TIMESTAMP, 20min), SubscriptionId, AppName, database_name

      | where delta_task_count > 1000 and delta_wait_time_ms > 100000

      | summarize dcount(database_name) by SubscriptionId'
