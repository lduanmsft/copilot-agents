- id: DB-performance-477
  Topic: Investigation-tips
  Source: TSG-SQL-DB-Performance/content/Fulltext/Investigation-tips.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth LogicalServerName AppName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where TIMESTAMP >= ago({TimeRange})

      | where TIMESTAMP <= now()

      | where LogicalServerName =~ "{ServerName}"

      | where message contains "FDHost"

      | project AppName, PreciseTimeStamp , TIMESTAMP , LogicalServerName , message'
- id: DB-performance-480
  Topic: Investigation-tips
  Source: TSG-SQL-DB-Performance/content/Fulltext/Investigation-tips.md
  Prompts:
  - SQL DB RG load analysis
  - SQL DB MonRgLoad iops_load iops_load_cap
  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad | where code_package_name == "FullTextSearchService"

      and event == "instance_load" and application_name == "fabric:/Worker.ISO.Premium/f978ec7fa418"

      | project TIMESTAMP, , iops_percent = (iops_load * 1.0 /iops_load_cap) * 100

      | render timechart'
