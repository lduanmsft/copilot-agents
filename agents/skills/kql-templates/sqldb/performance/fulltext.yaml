- id: DB-performance-469
  Topic: ICM-206607397-_Sev2__
  Source: TSG-SQL-DB-Performance/content/Fulltext/ICM-206607397-_Sev2__.md
  Prompts:
  - SQL DB fulltext index fragment status
  - SQL DB MonFulltextIndexFragment LogicalServerName
  - SQL DB investigate fulltext index fragment
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonFulltextIndexFragment
    ExecutedQuery: 'MonFulltextIndexFragment

      | where TIMESTAMP > ago(7d)

      | where LogicalServerName =~ "{ServerName}" and AppName == "{AppName}" and object_id == "1285579618" and status == 4

      | project TIMESTAMP,num_fragment

      | render timechart'
- id: DB-performance-470
  Topic: ICM-206607397-_Sev2__
  Source: TSG-SQL-DB-Performance/content/Fulltext/ICM-206607397-_Sev2__.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth LogicalServerName AppName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where TIMESTAMP > ago(7d)

      | where LogicalServerName =~ "{ServerName}" and AppName == "{AppName}"

      | where message contains "full" or message contains "recovery" or message contains "text"

      | where message !contains "HkRecoveryLSN"

      | project TIMESTAMP,message

      | order by TIMESTAMP asc'
