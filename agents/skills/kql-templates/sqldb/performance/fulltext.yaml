SqlSkills:
- id: DB-performance-466
  Topic: '48831606'
  Source: TSG-SQL-DB-Performance/content/Fulltext/48831606.md
  Prompts:
  - SQL DB full text info analysis
  - SQL DB MonFullTextInfo
  - SQL DB investigate full text info
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonFullTextInfo
    ExecutedQuery: 'MonFullTextInfo

      \| where AppName == "{AppName}"

      //and logical_database_name != "master"

      \| where LogicalServerName =~ "{ServerName}"

      \| where TIMESTAMP \> ago(2h)\

      \| order by PreciseTimeStamp desc'
