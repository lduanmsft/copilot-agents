      - "Top Wait queries"
      - "Top Wait staticistsc"
    KustoQueries:
      - TableName: "MonWiQdsWaitStatsAllQueries"
        ExecutedQuery: |
          let TopN=5;
          MonWiQdsWaitStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize sum(total_query_wait_time_ms) by query_hash
          | order by sum_total_query_wait_time_ms desc
          | take TopN
        DisplayedQuery: |
          let TopN=5;
          MonWiQdsWaitStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
