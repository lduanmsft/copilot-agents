    MessageForEmptyKustoResult: "MonWiQdsWaitStats didn't have record."
    KustoQueries:
      - TableName: "TopWaitTypesWithHighestTotalWaitTime_MonWiQdsWaitStatsTimeOutTable"
        ExecutedQuery: |
          let totalWaitTime_ms=toscalar(MonWiQdsWaitStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | summarize sum(total_query_wait_time_ms));
          MonWiQdsWaitStats
