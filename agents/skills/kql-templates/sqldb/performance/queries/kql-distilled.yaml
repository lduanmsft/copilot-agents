# ── Merged from queries_Wait.yaml ──
SqlSkills:
  - id: "81.16"
    Prompts:
      - "Query placeholder execution summary"
    CustomizedParameters:
      - "query_hash"
      - "query_id"
    MessageForEmptyKustoResult: "It appears this query has not been executed yet."
    KustoQueries:
      - TableName: "MonWiQdsExecStats"
        ExecutedQuery: |
          let ExecSummary=(totalExecCount:long, errorCount:long, failedRatio:real)
          {
          case(errorCount==0,strcat("The query has been executed ",PluralOrSingular(totalExecCount,"time")," without any error."),
          strcat("Please note, ",failedRatio,"% of query execution failed, here is the detail: ",errorCount," of ",totalExecCount," executions failed.")
          )
          //Sample output1:Please note, 0.1% of query execution failed, here is the detail: 94 of 65533 executions failed.
          //Sample output2:The query has been executed 1000 times without any error.
          };
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize totalExecCount = sum(execution_count), errorCount = sumif(execution_count, exec_type != 0)
          | where totalExecCount > 0
          | extend failedRatio=round(errorCount*100.0/totalExecCount,1)
          | extend execSummary=ExecSummary( totalExecCount, errorCount, failedRatio)
          | extend IssueDetected=iff(errorCount >0,'true','false')
          | project execSummary,IssueDetected
        DisplayedQuery: |
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize totalExecCount = sum(execution_count), abortCount = sumif(execution_count, exec_type == 3), errorCount = sumif(execution_count, exec_type == 4)
    QuestionToAI: |-
      - {{execSummary}}, the data type is string.

      ### Rules
      1. Store the value of execSummary column in {{execSummary}}.
      2. Store the value of IssueDetected column in {{IssueDetected}}.
      3. Set {{ResultMessage}} to {{execSummary}}

  - id: "81.161"
    # Description: "This skill compares the ratio of elapsed time to execution time and check top waitype if needed. A higher ratio indicates that the query is waiting on resources or being blocked rather than actively running."
    Prompts:
      - "Query Placeholder Wait Type summary"
      - "Query Placeholder Wait Type analysis"
      - "Elapsed time and CPU time analysis of query analysis"
      - "Display the Wait Type of query PLACEHOLDER"
      - "Show me the Wait Type of query PLACEHOLDER"
    MessageForEmptyKustoResult: "It appears this query has not been executed yet."
    CustomizedParameters:
      - "query_hash"
      - "query_id"
    KustoQueries:
      - TableName: "RatioOfElapsedtimeToCPUTime"
        ExecutedQuery: |
          let WaitSummary=(sum_ExecutionTime_ms:long,sum_CpuTime_ms:long,total_wait_time_ms:long,ratio:real)
          {
          let waitSummary=strcat("The query experienced",
          case(ratio>=0.3," significant",ratio>=0.2," moderate"," minimal"),
          " waits, with a wait time to CPU time ratio of ",ratio,", indicating that it spent ",round(ratio*100,1),"% of its execution time either waiting for resources or being blocked.");
          let actionPlan=strcat(case(ratio>=0.3," That significantly impact the performance,",ratio>=0.2," If this is a concern,",""),   " please review and apply the suggested action plans outlined in the sub-items below to address this wait issue.");
          let parallelMessage=case(sum_CpuTime_ms>sum_ExecutionTime_ms and total_wait_time_ms>sum_CpuTime_ms," (You may notice that execution time is less than the CPU time, this is because this query used parallel execution plan)","");
          strcat(waitSummary,iff(0.1>=ratio,"",actionPlan),parallelMessage);
          //Sample output1:The query experienced significant waits, with a wait time to CPU time ratio of 2.25, indicating that it spent 225.0% of its execution time either waiting for resources or being blocked. That significantly impact the performance, please review and apply the suggested action plans outlined in the sub-items below to address this wait issue. (You may notice that execution time is less than the CPU time, this is because this query used parallel execution plan)
          //Sample output2:The query experienced moderate waits, with a wait time to CPU time ratio of 0.25, indicating that it spent 25.0% of its execution time either waiting for resources or being blocked. If this is a concern, please review and apply the suggested action plans outlined in the sub-items below to address this wait issue
          //Sample output3:The query experienced minimal waits, with a wait time to CPU time ratio of 0.1, indicating that it spent 10.0% of its execution time either waiting for resources or being blocked.
          };
          let total_wait_time_ms=toscalar(MonWiQdsWaitStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize sum(total_query_wait_time_ms)
          );
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize sum_CpuTime_ms=sum(cpu_time)/1000,sum_ExecutionTime_ms=sum(elapsed_time)/1000,count=count()
          | where count>0
          | extend ratio=round(total_wait_time_ms*1.0/sum_CpuTime_ms,2)
          | extend waitSummary=WaitSummary(sum_ExecutionTime_ms,sum_CpuTime_ms,total_wait_time_ms,ratio)
          | extend IssueDetected=iff(ratio>0.1,'true','false')
          | project IssueDetected,waitSummary
        DisplayedQuery: |
          let total_wait_time_ms=toscalar(MonWiQdsWaitStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize sum(total_query_wait_time_ms)
          );
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize sum_CpuTime_ms=round(sum(cpu_time)/1000,1),executionTime_ms=round(sum(elapsed_time)/1000,1)
          | extend total_wait_time_ms
    QuestionToAI: |-
      - {{waitSummary}}, the data type is String.

      ### Rules
      1. Store the value of waitSummary column in {{waitSummary}}.
      2. Store the value of IssueDetected column in {{IssueDetected}}.
      3. Set {{ResultMessage}} to {{waitSummary}}.
    SubSqlSkills:
      - id: "81.162"
        ExecutedWhenParentIssueDetected: true
        Prompts:
          - "Wait type of query PLACEHOLDER"

  - id: "81.162"
    Prompts:
      - "Wait type of query PLACEHOLDER"
      - "Wait type of query "
      - "Query placeholder waittype"
      - "Query waittype"
      - "Top wait type of query PLACEHOLDER"
      - "Top wait type of query "
      - "Top Query Placeholder Wait Type"
      - "Top query wait type"
    CustomizedParameters:
      - "query_hash"
      - "query_id"
    MessageForEmptyKustoResult: "Oops, telemetry data from the MonWiQdsWaitStats table does not exist. It appears the query executed extremely quickly, without being blocked or waiting on any resources."
    KustoQueries:
      - TableName: "MonWiQdsWaitStats"
        ExecutedQuery: |
          let WaitTypeSummary=(dcount_wait_category:int,Top2WaitTypeNames:string,top1WaitTypeName:string,top2WaitTypeName:string,total_wait_time_ms:long,top1WaitType_wait_time_ms:long,top2WaitType_wait_time_ms:long)
          {
          let WaitTypeSummary_onlyOneWaitType=case(dcount_wait_category==1,strcat("The Top 1 Waitype of this query was ",top1WaitTypeName,", and this was the only waitType detected. The total wait time of ",total_wait_time_ms," milliseconds."),"");
          let WaitTypeSummary_twoWaitType=case(dcount_wait_category==1,"",strcat("The top 2 wait types were:",Top2WaitTypeNames,". The [",top1WaitTypeName,"] accounted ",top1WaitType_wait_time_ms, " milliseconds of wait time, representing ",round(top1WaitType_wait_time_ms*100.0/total_wait_time_ms,1),
          "% of total; The second one [",top2WaitTypeName,"] account for ",round(top2WaitType_wait_time_ms*100.0/total_wait_time_ms,1),"% of the total wait time."));
          strcat(WaitTypeSummary_onlyOneWaitType,WaitTypeSummary_twoWaitType)
          //Sample output1:The top 2 wait types were:["PARALLELISM","CPU"]. The [PARALLELISM] accounted 1315363883 milliseconds of wait time, representing 70.1% of total; The second one [CPU] account for 13.6% of the total wait time.
          };
          let total_wait_time_ms=toscalar(MonWiQdsWaitStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize sum(total_query_wait_time_ms)
          );
          MonWiQdsWaitStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize individual_query_wait_time_ms=sum(total_query_wait_time_ms) by wait_category
          | order by individual_query_wait_time_ms desc nulls first
          | take 2
          | summarize dcount_wait_category=dcount(wait_category),Top2WaitTypeNames=make_set(wait_category) ,(top1WaitType_wait_time_ms,top1WaitTypeName)=arg_max(individual_query_wait_time_ms,wait_category),(top2WaitType_wait_time_ms,top2WaitTypeName)=arg_min(individual_query_wait_time_ms,wait_category)
          | extend waitTypeSummary=WaitTypeSummary(dcount_wait_category,Top2WaitTypeNames,top1WaitTypeName,top2WaitTypeName,total_wait_time_ms,top1WaitType_wait_time_ms,top2WaitType_wait_time_ms)
          | extend Keywords=FilterMakeSetResult(Top2WaitTypeNames)
          | project waitTypeSummary,Keywords
        DisplayedQuery: |
          MonWiQdsWaitStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | summarize sum(total_query_wait_time_ms) by wait_category,query_hash,query_id
          | order by sum_total_query_wait_time_ms desc nulls first
          | project-reorder query_hash,query_id
          | take 5
    SubSqlSkills:
      - ExecutedWhenParentIssueDetected: true
        Keywords: "PARALLELISM"
        IsKusto: false
        Prompts:
          - "Wait Category:PARALLELISM"
      - ExecutedWhenParentIssueDetected: true
        Keywords: "cpu"
        IsKusto: false
        Prompts:
          - "Wait Category:CPU"
      - ExecutedWhenParentIssueDetected: true
        Keywords: "BUFFERLATCH"
        IsKusto: true
        Prompts:
          - "Wait Category:BUFFERLATCH"
      - ExecutedWhenParentIssueDetected: true
        Keywords: "NETWORKIO"
        IsKusto: true
        Prompts:
          - "Wait Category:NETWORKIO"
    QuestionToAI: |-
      - {{waitTypeSummary}}, the data type is String.

      ### Rules
      1. Store the value of waitTypeSummary column in {{waitTypeSummary}}.
      2. Store the value of Keywords column in {{Keywords}}.
      3. Set {{IssueDetected}} to true.
      4. Set {{ResultMessage}} to {{waitTypeSummary}}.
    TSGs:
      - Title: "sys.query_store_wait_stats"
        Link: "https://learn.microsoft.com/en-us/sql/relational-databases/system-catalog-views/sys-query-store-wait-stats-transact-sql?view=sql-server-ver16"
        Description: "Please check section 'Wait categories mapping table'"
