  - id: "4.83"
    # Description: "This skill display top 5 queries ranked by logical reads"
    Prompts:
      - "Top Reads queries"
      - "Top Logical reads queries"
    KustoQueries:
      - TableName: "MonWiQdsExecStats_logicalReads_AllQueries"
        ExecutedQuery: |
          let TopN=5;
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
