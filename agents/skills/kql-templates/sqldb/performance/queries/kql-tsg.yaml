SqlSkills:
- id: DB-performance-816
  Topic: SQP001-Socrates-QP-Pushdown-Overview
  Source: TSG-SQL-DB-Performance/content/Socrates-QP-Pushdown/SQP001-Socrates-QP-Pushdown-Overview.md
  Prompts:
  - SQL DB qp telemetry analysis
  - SQL DB MonQPTelemetry LogicalServerName query_hash
  - SQL DB investigate qp telemetry
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQPTelemetry
    ExecutedQuery: 'MonQPTelemetry

      | where originalEventTimestamp > ago(1d)

      | where telemetry_package_name == ''SocratesQpPushdownTelemetryInfo''

      | where LogicalServerName =~ ''{LogicalServerName}''

      | where logical_database_name =~ ''{LogicalDatabaseName}''

      | extend query_hash = strcat("0x", toupper(tohex(query_hash_signed,16)))

      | extend NoPushdownReason = extractjson("$.SocratesQpPushdownTelemetryInfo.NoPushdownReason", telemetry_package_json, typeof(int))

      | project originalEventTimestamp, query_hash, query_plan_hash, NoPushdownReason'
