SqlSkills:
- id: DB-performance-166
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQueryParamData LogicalServerName problem_level
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQueryParamData
    ExecutedQuery: 'MonWiQueryParamData


      | where LogicalServerName =~ ''{LogicalServerName}'' and logical_database_name =~ ''{LogicalDatabaseName}''


      | summarize count(), dcount(statement_sql_hash), dcount(query_hash), dcount(query_plan_hash), avg(compile_cpu_time), max(compile_cpu_time), avg(compile_duration), max(compile_duration) by query_param_type


      | extend statement_query_ratio = todouble(dcount_statement_sql_hash) / todouble(dcount_query_hash)


      | extend parameterization_type = iff(query_param_type == 0, ''NONE'', iff(query_param_type == 1, ''USER'', iff(query_param_type == 2, ''SIMPLE'', ''FORCED'')))


      | extend problem_level = iff(query_param_type &lt;&gt; 0 and query_param_type &lt;&gt; 1, ''X'', iff(statement_query_ratio &gt; 1000, ''Extremely High'', iff(statement_query_ratio &gt; 100, ''High'',
      iff(statement_query_ratio &gt; 20, ''Medium'', iff(statement_query_ratio &gt; 10, ''Low'', ''No problem'')))))


      | extend compiles_count = count_


      | project query_param_type, parameterization_type, problem_level, statement_query_ratio, compiles_count, dcount_statement_sql_hash, dcount_query_hash, dcount_query_plan_hash, avg_compile_cpu_time,
      max_compile_cpu_time, avg_compile_duration, max_compile_duration


      | order by query_param_type asc nulls last // PARAM.02

      '
- id: DB-performance-167
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQueryParamData LogicalServerName query_hash
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQueryParamData
    ExecutedQuery: 'MonWiQueryParamData


      | where LogicalServerName =~ ''{LogicalServerName}'' and logical_database_name =~ ''{LogicalDatabaseName}''


      | summarize count(), dcount(statement_sql_hash), dcount(template_hash), dcount(query_plan_hash), avg(compile_cpu_time), max(compile_cpu_time), avg(compile_duration), max(compile_duration), makeset(query_plan_hash),
      argmax(originalEventTimestamp, ClusterName), argmax(originalEventTimestamp, NodeName), argmax(originalEventTimestamp, AppName) by query_hash, query_param_type


      | extend parameterization_type = iff(query_param_type == 0, ''NONE'', iff(query_param_type == 1, ''USER'', iff(query_param_type == 2, ''SIMPLE'', ''FORCED'')))


      | extend compiles_count = count_


      | project query_hash, parameterization_type, query_param_type, compiles_count, dcount_statement_sql_hash, dcount_template_hash, dcount_query_plan_hash, avg_compile_cpu_time, max_compile_cpu_time,
      avg_compile_duration, max_compile_duration, set_query_plan_hash, last_known_cluster=max_originalEventTimestamp_ClusterName, last_known_node_name=max_originalEventTimestamp_NodeName, last_known_app_name=max_originalEventTimestamp_AppName


      | order by compiles_count desc


      | limit 100 <tr class="odd">Disk space usage //*

      '
- id: DB-performance-189
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB SQL system health event database_name LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: '| where TIMESTAMP &gt; datetime({EndTime})


      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"


      | where is_primary == 1


      | where query_hash =~ "0x6919447CA6760071"


      | extend cpu_time_ms=round(cpu_time/1024.0,0), elapsed_time_ms=round(elapsed_time/1024.0,0)


      | summarize exec_count=count(), avg_row_count=round(avg(rowcount),0), avg_cpu_ms=round(avg(cpu_time_ms),0), max_cpu_ms=max(cpu_time_ms) by exec_type| project TIMESTAMP, query_hash, cpu_time_ms, elapsed_time_ms
      , rowcount, exec_type , statement_type


      | top 100 by cpu_time_ms desc nulls last MonSQLSystemHealth


      | where TIMESTAMP &gt; datetime({StartTime}) and TIMESTAMP &lt; datetime({EndTime})


      | where LogicalServerName =~ "{LogicalServerName}" and AppName =~ "{AppName}" and NodeName =~ "{NodeName}"


      | where event == "errorlog_written"


      | where message contains "KILL" or message contains "kill" MonWiQueryParamData


      | where query_hash =~"0x6919447CA6760071"| where query_plan_hash == "0x73bca08b2c86e1c6"MonQPTelemetry | where query_plan_hash == "0x73bca08b2c86e1c6"<tr class="odd">Instance &amp; DB Over all Resource
      Usage//*

      '
