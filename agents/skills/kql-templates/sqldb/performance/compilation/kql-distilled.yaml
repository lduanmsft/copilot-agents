SqlSkills:
  - id: "67.5"
    Prompts:
      - "Successful compilation CPU Analysis"
      - "CPU usage of successful compilation"
      - "What's the CPU usage of successful compilation"
      - "What's the CPU percentage of successful compilation"
      - "Did successful compilation caused high CPU usage?"
      - "Did successful compilation consume lots of CPU resouce?"
    MessageForEmptyKustoResult: "We don't have data for this query, as it appears no successful recompile/compile happened."
    KustoQueries:
      - TableName: "CPU_MonWiQueryParamData"
        ExecutedQuery: |
          MonWiQueryParamData
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndLogicalDatabaseName}
          | extend compile_code=iff(compile_code =='Success','Compilation','Recompile')
          | summarize compile_cpu_time_ms=sum(compile_cpu_time+auto_update_stats_cpu_time)/1000
          | project CPU_Percent = round(100.0 * (compile_cpu_time_ms/{SumCpuMillisecondOfAllApp}), 1)
        DisplayedQuery: |
          MonWiQueryParamData
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndLogicalDatabaseName}
          | extend compile_code=iff(compile_code =='Success','Compilation','Recompile')
          | summarize compile_cpu_time_ms=sum(compile_cpu_time+auto_update_stats_cpu_time)/1000
          | project CPU_Percent = round(100.0 * (compile_cpu_time_ms/{SumCpuMillisecondOfAllApp}), 1)
    QuestionToAI: |-
      -  {{CPU_Percent}}, the data type is Float.

      ### Rules
      1. Store the value of CPU_Percent column in {{CPU_Percent}}.
      2. If {{CPU_Percent}} is greater than or equal to 10, then set {{IssueDetected}} to 'True', else set {{IssueDetected}} to 'false'.
      3. If {{IssueDetected}}  is 'true', set {{ResultMessage}} to "Successful compilation consumed a significant amount of CPU resources, accounting for {{CPU_Percent}}%. Identifying high CPU usage from query compilations."
      4. If {{IssueDetected}}  is 'false', set {{ResultMessage}} to "Successful compilation did not consume a significant amount of CPU resources, with usage at {{CPU_Percent}}%"
    SubSqlSkills:
      - id: "67.52"
        ExecutedWhenParentIssueDetected: true
        IsKusto: true
        Prompts:
          - "Top Queries by compilation CPU"

  - id: "67.51"
    # #Description: 
    #   This skill will check the successful recompile/compile of the specified query,
    #   including compile count,max_compile_duration_sec,max_compile_cpu_time_sec,max_compile_memory_mb,
    #   query_plan_hash,is_forced,is_recompiled.
    #   Note,MonWiQueryParamData doesn't have query_id column
    Prompts:
      - "Compile statistics of query PLACEHOLDER"
      - "Compile stats of query PLACEHOLDER"
      - "Recompile statistics of query PLACEHOLDER"
      - "Recompile stats of query PLACEHOLDER"
      - "Query PLACEHOLDERCompile statistics"
      - "Query PLACEHOLDERCompile stats"
      - "Query PLACEHOLDERRecompile statistics"
      - "Query PLACEHOLDERRecompile stats"
      - "Compile statistics of query"
      - "Compile stats of query"
      - "Recompile statistics of query"
      - "Recompile stats of query"
      - "Query Compile statistics"
      - "Query Compile stats"
      - "Query Recompile statistics"
      - "Query Recompile stats"
    CustomizedParameters:
      - "query_hash"
      - "query_id"
    MessageForEmptyKustoResult: "We don't have data for this query, as it appears no recompile/compile happened."
    KustoQueries:
      - TableName: "MonWiQueryParamDataOfSingleQuery"
        ExecutedQuery: |
          let queryHashes=(
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | distinct query_hash
          );
          MonWiQueryParamData
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndLogicalDatabaseName}
          | join kind=inner (queryHashes) on query_hash
          | extend compileDuration_Sec=round(compile_duration/1000.0/1000,1)
          | extend compileCpuTime_Sec=round(compile_cpu_time/1000.0/1000,1)
          | extend compileMemory_mb=round(compile_memory/1024,1)
          | summarize count=count(),maxcompileDuration_Sec=max(compileDuration_Sec),
          maxcompileCpuTime_Sec=max(compileCpuTime_Sec),
          maxCompileMemoryMb=max(compileMemory_mb)
          by query_hash,query_plan_hash,is_forced, compile_code,is_recompiled
          | order by count
          | project count,compile_code,is_recompiled,is_forced,maxcompileCpuTime_Sec,maxcompileDuration_Sec,maxCompileMemoryMb, query_hash,query_plan_hash
        DisplayedQuery: |
          let queryHashes=(
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | distinct query_hash
          );
          MonWiQueryParamData
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndLogicalDatabaseName}
          | join kind=inner (queryHashes) on query_hash
          | extend compileDuration_Sec=round(compile_duration/1000.0/1000,1)
          | extend compileCpuTime_Sec=round(compile_cpu_time/1000.0/1000,1)
          | extend compileMemory_mb=round(compile_memory/1024,1)
          | summarize count=count(),maxcompileDuration_Sec=max(compileDuration_Sec),
          maxcompileCpuTime_Sec=max(compileCpuTime_Sec),
          maxCompileMemoryMb=max(compileMemory_mb)
          by query_hash,query_plan_hash,is_forced, compile_code,is_recompiled
          | order by count
          | project count,compile_code,is_recompiled,is_forced,maxcompileCpuTime_Sec,maxcompileDuration_Sec,maxCompileMemoryMb, query_hash,query_plan_hash

