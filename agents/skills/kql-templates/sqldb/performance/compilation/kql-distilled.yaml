  - id: "67.64"
    #Description: "This skill will display failed compilation queries"
    Prompts:
      - "Failed Compilation Summary"
      - "Failed Compilation queries"
      - "Failed to compile queries"
    MessageForEmptyKustoResult: "No failed compilation detected"
    KustoQueries:
      - TableName: "LongCPUTimeMonQueryProcessing"
        ExecutedQuery: |
          MonQueryProcessing
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndLogicalDatabaseName}
          | extend query_hash = strcat('0x', toupper(tohex(query_hash_signed, 16)))
          | where event =~'failed_compilation'
          | summarize FailedCount=count()
          | where FailedCount > 0
        DisplayedQuery: |
          // This query displays the failed compilation queries with error code
          MonQueryProcessing
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndLogicalDatabaseName}
          | extend query_hash = strcat('0x', toupper(tohex(query_hash_signed, 16)))
          | where event =~'failed_compilation'
          | summarize FailedCount=count() by error_code;

          //This query displays the failed compilation queries with compile_cpu and compile_duration
          MonQueryProcessing
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndLogicalDatabaseName}
          | extend query_hash = strcat('0x', toupper(tohex(query_hash_signed, 16)))
          | where event =~'failed_compilation'
          | summarize compile_cpu_ms=sum(compile_cpu),compile_duration_ms=sum(compile_duration),FailedCount=count() by query_hash
    QuestionToAI: |-
      -  {{FailedCount}}, the data type is Integer.

      ### Rules
      1. If {{FailedCount}} is greater than 0, then {{IssueDetected}} is 'true', else {{IssueDetected}} is 'false'.
      2. If {{IssueDetected}} is 'true', then set {{ResultMessage}} to  "Compilation failed {{FailedCount}} time(s)".
