  - id: "67.61"
    #Description: "This skill will check the failed recompile/compile of the specified query. Note,MonQueryProcessing doesn't have query_id column"
    Prompts:
      - "Failed compile statistics of query PLACEHOLDER"
      - "Failed compile stats of query PLACEHOLDER"
      - "Query PLACEHOLDER Failed compile statistics"
      - "Failed compile statistics of query"
      - "Failed compile stats of query"
      - "Query Failed compile statistics"
    CustomizedParameters:
      - "query_hash"
      - "query_id"
    MessageForEmptyKustoResult: "This query didn't have failed compilation"
    KustoQueries:
      - TableName: "failed_compilation_MonQueryProcessing_SingleQuery"
        ExecutedQuery: |
          let queryHashes=(
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | distinct query_hash
          );
          let totalError=materialize(MonQueryProcessing
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndLogicalDatabaseName}
          | extend query_hash = strcat('0x', toupper(tohex(query_hash_signed, 16)))
          | join kind=inner (queryHashes) on query_hash
          | where event =~'failed_compilation'
          | summarize count=count() by error_code
          | extend joinedColumn=1);
          let totalErrorStats=totalError|summarize totalCount=sum(count),dcount=dcount(error_code) by joinedColumn;
          totalError
          | join  kind=inner(totalErrorStats) on joinedColumn
          | top 1 by count desc
          | project error_code,totalCount,dcount,count
        DisplayedQuery: |
          let queryHashes=(
          MonWiQdsExecStats
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndDatabaseName}
          | where {CustomizedParametersPlaceholder}
          | distinct query_hash
          );
          MonQueryProcessing
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where {LogicalServerAndLogicalDatabaseName}
          | extend query_hash = strcat('0x', toupper(tohex(query_hash_signed, 16)))
          | join kind=inner (queryHashes) on query_hash
          | where event =~'failed_compilation'
          | project originalEventTimestamp,error_code,compile_cpu,compile_duration,tasks_count,forced_plan_id
          | summarize count() by error_code
    QuestionToAI: |-
      -  {{totalCount}}, the data type is Integer.
      -  {{dcount}}, the data type is Integer.
      -  {{count}}, the data type is Integer.
      -  {{error_code}}, the data type is Integer.

      ### Rules
      1. Store the value of totalCount column in {{totalCount}}.
      2. Store the value of dCount column in {{dCount}}.
      3. Store the value of count column in {{count}}.
      4. Store the value of error_code column in {{error_code}}.
      5. Set {{IssueDetected}} to 'true'.
      6. If {{dCount}} is equal to1, then set {{ResultMessage}} to "The query failed to compile {{totalCount}} time(s), all linked to a single error(error_code:{{error_code}})".
      7. If {{dCount}} is greater than 1,  then set {{ResultMessage}} to "The query failed to compile {{totalCount}} time(s), caused by {{dcount}} distinct errors. The most frequent error was error_code {{error_code}}, occurring {{count}} times".

