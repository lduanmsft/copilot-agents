# ── Merged from Filefulll.yaml ──
SqlSkills:
  - id: "17"
    Prompts:
      - "Tempdb Full Analysis"
      - "Tempdb Full"
      - "Is Tempdb full"
      - "Is Temp Database Full"
      - "Is Temp Database File Full"
    KustoQueries:
      - TableName: "TempdbFileFull"
        ExecutedQuery: |
          let AllocationErrorCount=toscalar( MonSQLSystemHealth
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName =~ '{LogicalServerName}'
          | where error_id in (1101,1104,1105,5149)
          | count
          );
          let AggInterval_do_NOT_change = time(15m);
          MonSqlRgHistory
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName =~ '{LogicalServerName}'
          | where event=='aggregated_virtual_files_io_history'
          | where database_id == 2
          | where type_desc =~'ROWS'
          | where AllocationErrorCount>0
          | summarize
          spaceused_gb = round(sum(spaceused_mb / 1024.0),1),
          size_on_disk_gb = round(sum(size_on_disk_bytes / 1024.0 / 1024.0 / 1024.0),1),
          max_size_gb=round(sum(max_size_mb/1024.0),1)
          by  type_desc, bin(originalEventTimestamp, AggInterval_do_NOT_change)
          | project originalEventTimestamp,file_type=type_desc,spaceused_gb,size_on_disk_gb,max_size_gb
          | where size_on_disk_gb==max_size_gb
          | extend Timestamp=originalEventTimestamp
          | summarize Timestamp=max(Timestamp),count=count()
        DisplayedQuery: |
          let AllocationErrorCount=toscalar( MonSQLSystemHealth
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName =~ '{LogicalServerName}'
          | where error_id in (1101,1104,1105,5149)
          | count
          );
          let AggInterval_do_NOT_change = time(15m);
          MonSqlRgHistory
          | where {AppNamesNodeNamesWithOriginalEventTimeRange}
          | where LogicalServerName =~ '{LogicalServerName}'
          | where event=='aggregated_virtual_files_io_history'
          | where database_id == 2
          | where type_desc =~'ROWS'
          | where AllocationErrorCount>0
          | summarize
          spaceused_gb = round(sum(spaceused_mb / 1024.0),1),
          size_on_disk_gb = round(sum(size_on_disk_bytes / 1024.0 / 1024.0 / 1024.0),1),
          max_size_gb=round(sum(max_size_mb/1024.0),1)
          by  type_desc, bin(originalEventTimestamp, AggInterval_do_NOT_change)
          | project originalEventTimestamp,file_type=type_desc,spaceused_gb,size_on_disk_gb,max_size_gb
          | where size_on_disk_gb==max_size_gb
          | extend Timestamp=originalEventTimestamp
          | summarize Timestamp=max(Timestamp),count=count()
    TSGs:
      - Title: "tempdb full"
        Link: "https://aka.ms/tempdb1"
    QuestionToAI: |-
      Read the 'UserPoolCPUTable' and 'tempdbLogFull' tables, each containing a single row, and assign values to the variables below based on its data and the following rules
      Besides of previous three variables, there are another 5 variables:
      1.{{TimestampTempdbFileFull}}, the data type is Datetime.
      2.{{countTempdbFileFull}}, the data type is Integer.
      3.{{TimestampTempdbLogFull}}, the data type is Datetime.
      4.{{messageTempdbLogFull}}, the data type is String.
      5.{{countTempdbLogFull}}, the data type is Integer.

      Rules:
      1. Store the value of Timestamp column of 'tempdbFileFull' table in {{TimestampTempdbFileFull}}.
      2. Store the value of count column of 'tempdbFileFull' table in {{countTempdbFileFull}}.
      3. Store the value of Timestamp column of 'tempdbLogFull' table in {{TimestampTempdbLogFull}}.
      4. Store the value of message column of 'tempdbLogFull' table in {{messageTempdbLogFull}}.
      5. Store the value of count column 'tempdbLogFull' table in {{countTempdbLogFull}}.
      6. If either {{countTempdbFileFull}} or {{countTempdbLogFull}} is greater than 0, then {{IssueDetected}} is 'true', else {{IssueDetected}} is 'false'.
      7. The {{ResultMessage}} depends on following conditions, When assigning the value to {{ResultMessage}}, please strictly adhere to these conditions and rules and you must replace the variables with actual values:
      8. If {{countTempdbFileFull}} is greater  than 0, then {{ResultMessage}} will be set to "Tempdb database file was full, with first occurrence around {{TimestampTempdbFileFull}}. "
      9. If {{countTempdbLogFull}} is greater  than 0, then following string will be appended to {{ResultMessage}} "Tempdb log file was full, with first occurrence at {{TimestampTempdbLogFull}}. Here is the corresponding message:{{messageTempdbLogFull}}."
      10. if {{IssueDetected}} is 'false', then {{ResultMessage}} will be set to "Tempdb is not full."
    SubSqlSkills:
      - ExecutedWhenParentIssueDetected: true
        IsKusto: true
        Prompts:
          - "tempdb file size"
      - id: "17.2"
        ExecutedWhenParentIssueDetected: true
        IsKusto: true
        Prompts:
          - "Tempdb Space Usage"

# ── Merged from Storage_XStore.yaml ──
SqlSkills:
  - id: "232.1"
    Prompts:
      - "XStore Error Analysis"
      - "XStore Outage Analysis"
    MessageForEmptyKustoResult: "We didn't detect any XStore related errors."
    KustoQueries:
      - TableName: "MonSQLXStore_xio_failed_request"
        ExecutedQuery: |
          let ErrorMessage=(totalCount: int,errorcodeArray:string,
          count_TopError: int,mapped_errorcode: int,dcount_errorcode: int
          )
          {
          let summary=strcat(
          "The Azure DB Storage run into error ",totalCount, iif(totalCount == 1, " time", " times"),
          " with ",dcount_errorcode, iif(dcount_errorcode == 1, " single error ", " different errors"),errorcodeArray,".");
          let topError=iif(dcount_errorcode ==1,"",
          strcat(" The top error was ",mapped_errorcode, ", happening ",count_TopError, iif(count_TopError == 1, " time", " times")));
          strcat(summary,topError)
          };
          MonSQLXStore
          | where AppName in ({AppNames})
          | where LogicalServerName =~ '{LogicalServerName}'
          | where TIMESTAMP between (datetime({StartTime})..datetime({EndTime}))
          | where event =='xio_failed_request
          | where file_path contains '.mdf' or file_path contains '.ndf' or file_path contains '.ldf'
          | summarize count_=count() by mapped_errorcode
          | summarize totalCount=sum(count_),errorcodeArray=make_set(mapped_errorcode),count_TopError=arg_max(count_, mapped_errorcode),dcount_errorcode=dcount(mapped_errorcode)
          | where totalCount >0
          | extend errorMessage=ErrorMessage(totalCount,errorcodeArray,count_TopError,mapped_errorcode,dcount_errorcode)
          | project errorMessage
        DisplayedQuery: |
          MonSQLXStore
          | where AppName in ({AppNames})
          | where LogicalServerName =~ '{LogicalServerName}'
          | where TIMESTAMP between (datetime({StartTime})..datetime({EndTime}))
          | where event =='xio_failed_request'
          | project originalEventTimestamp,request_type, errorcode,error_response,http_errorcode,mapped_errorcode,ssl_errorcode,retry_count,retry_reason,correlation_id,primary_correlation_id
    QuestionToAI: |-
      -  {{errorMessage}}, the data type is String.

      ### Rules
      1. Store the value of errorMessage column in {{errorMessage}}.
      2. Set {{IssueDetected}} to 'true'.
      3. Set {{ResultMessage}} to {{errorMessage}}.

