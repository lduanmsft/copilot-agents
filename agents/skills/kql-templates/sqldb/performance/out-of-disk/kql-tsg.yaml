- id: DB-performance-613
  Topic: TSGRS-A11-Severe-Xstore-throttling
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS-A11-Severe-Xstore-throttling.md
  Prompts:
  - SQL DB sqlx store IO stats analysis
  - SQL DB MonSQLXStoreIOStats event LogicalServerName
  - SQL DB investigate sqlx store IO stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: 'MonSQLXStoreIOStats

      | where TIMESTAMP > ago(1d)

      | where event == ''xstore_io_stats'' and AppTypeName == "Worker.ISO"

      | where file_path endswith ".mdf" or file_path endswith ".ndf" or file_path endswith ".ldf"

      | where file_path endswith "{file name from file_path}"

      | extend region = extract("[ct]r[0-9]+[.]([^.]+)[.]", 1, ClusterName, typeof(string))

      | project TIMESTAMP , total_requests , total_xio_requests, total_requested_bytes, is_page_blob, page_blob_tier, file_path , AppName , LogicalServerName, period_ms, region

      | extend rps = round(total_requests / (period_ms * 0.001), 2)

      | extend xio_rps = round(total_xio_requests / (period_ms * 0.001), 2)

      | extend rmbps = round(total_requested_bytes / (1024 * 1024 * period_ms * 0.001), 2)

      | project TIMESTAMP, rps, xio_rps, rmbps'
