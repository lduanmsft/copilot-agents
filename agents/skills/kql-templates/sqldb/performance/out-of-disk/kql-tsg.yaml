- id: DB-performance-423
  Topic: List-of-High-Pri-larger-then-4TB-CRM-databases
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Other-Waits-and-Issues/List-of-High-Pri-larger-then-4TB-CRM-databases.md
  Prompts:
  - SQL DB transaction log usage
  - SQL DB MonAnalyticsDBSnapshot event logical_server_name
  - SQL DB investigate transaction log usage
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'cluster(clstr).database("sqlazure1").MonAnalyticsDBSnapshot

      | where (logical_server_name =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}")

      or (logical_server_name =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}")

      or (logical_server_name =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}")

      or (logical_server_name =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}")

      or (logical_server_name =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}")

      or (logical_server_name =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}")

      or (logical_server_name =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}")

      or (logical_server_name =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}")

      or (logical_server_name =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}")

      or sql_instance_name in ("b02111298e1c", "b4cd3b65cd68", "cd7b4b94c1a2", "e45abcb9d71f", "f3e2ef8487fd", "a120b2f5e68f", "c179fec56679")

      | summarize arg_max(TIMESTAMP, service_level_objective, logical_server_name, logical_database_name, tenant_ring_name, service_level_objective) by sql_instance_name, logical_resource_pool_id

      | project logical_server_name, logical_database_name, AppName = sql_instance_name

      | extend application_name = strcat("fabric:/Worker.ISO.Premium/", AppName)

      | join kind = leftouter (

      cluster(clstr).database("sqlazure1").MonResourcePoolStats

      | where AppTypeName =~"Worker.ISO.Premium"

      | where originalEventTimestamp > ago(10h) | summarize arg_max(originalEventTimestamp, pool_storage_limit_gb = tolong(resource_pool_storage_limit)/1024/1024, tolong(resource_pool_storage_limit)) by
      NodeName, AppName

      ) on AppName

      | join kind = leftouter(

      cluster(clstr).database("sqlazure1").MonDmIoVirtualFileStats

      | where //AppName =~"{AppName}" and

      TIMESTAMP > ago(2d) | where spaceused_mb != 0 and database_id >4

      | summarize arg_max(TIMESTAMP, spaceused_gb = spaceused_mb/1024, size_on_disk_gb = size_on_disk_bytes/1024/1024/1024, max_size_gb = max_size_mb/1024) by AppName, NodeName, database_id, type_desc,
      file_id

      | summarize TIMESTAMP = max(TIMESTAMP), spaceused_gb = sum(spaceused_gb), size_on_disk_gb = sum(size_on_disk_gb), max_size_gb = sum(max_size_gb) by AppName, NodeName

      | summarize arg_max(TIMESTAMP, spaceused_gb) by AppName

      ) on AppName

      | join kind = inner(

      cluster(clstr).database("sqlazure1").MonRgLoad | where TIMESTAMP > ago(1h) and event == "directory_quota_report_load" and target_directory endswith "data"

      | project TIMESTAMP, NodeName, event, target_directory, quota_limit_in_gb = quota_limit_in_bytes/1024/1024/1024, quota_usage_in_gb = quota_usage_in_bytes/1024/1024/1024, quota_usage_in_gb_peak = quota_usage_in_bytes_peak/1024/1024/1024,
      ClusterName, application_name

      | summarize arg_max(TIMESTAMP, quota_usage_in_gb_peak, quota_usage_in_gb, quota_limit_in_gb) by NodeName, ClusterName, application_name

      ) on application_name

      | extend newQuotaInMb = iif(quota_limit_in_gb*1024 > dirQuotaMB, quota_limit_in_gb*1024, dirQuotaMB)

      | extend newPoolLimitKb = iif(isnotempty(resource_pool_storage_limit) and resource_pool_storage_limit > poolStorageLimitKb, resource_pool_storage_limit, iif(isnotempty(resource_pool_storage_limit)
      , poolStorageLimitKb, 0))

      | extend casUpdateDirQuota = iif(newQuotaInMb > quota_limit_in_gb*1024, strcat("Update-RgResourceSettings -ClusterName ", ClusterName, " -NodeName ", NodeName, " -ApplicationName ", application_name,
      " -CodePackagename Code -ManifestName SQL -ResourceType DirQuotaInMb -ResourceValue ", newQuotaInMb, " -ExtraParam workdata"), "")

      | extend casUpdatePoolLimit = iif(isnotempty(resource_pool_storage_limit) and newPoolLimitKb > resource_pool_storage_limit,

      strcat("Set-DatabasePropertyOverride -LogicalServerName ''", logical_server_name, "'' -LogicalDatabaseName ''", logical_database_name, "'' -CategoryName ''SloPropertyBag'' -OverrideValue ''<SloRgMapping><pool_max_data_space_kb>",
      newPoolLimitKb, "</pool_max_data_space_kb></SloRgMapping>''")

      ,"")

      | summarize arg_max(TIMESTAMP,spaceused_gb, quota_usage_in_gb, quota_usage_in_gb_peak) by logical_server_name, logical_database_name, AppName, quota_limit_in_gb, newQuotaInGb = newQuotaInMb/1024,
      pool_storage_limit_gb, newPoolLimitGb = newPoolLimitKb/1024/1024, casUpdateDirQuota, casUpdatePoolLimit, ClusterName

      | extend region = strcat(

      iff(ClusterName contains ''sqltest'' or ClusterName contains ''lkgtst'', ''stage'', ''prod''),

      ''-'',

      extract(''([0-9A-Za-z]*).([0-9A-Za-z_-]*).([0-9A-Za-z_]*)'', 2, ClusterName))

      | project logical_server_name, logical_database_name, AppName, TIMESTAMP,spaceused_gb, quota_usage_in_gb, quota_usage_in_gb_peak, quota_limit_in_gb, newQuotaInGb, pool_storage_limit_gb, newPoolLimitGb,
      casUpdateDirQuota, casUpdatePoolLimit, region'
