- id: DB-performance-609
  Topic: TSGRS-A11-Severe-Xstore-throttling
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS-A11-Severe-Xstore-throttling.md
  Prompts:
  - SQL DB sqlx store errors
  - SQL DB MonSQLXStore event LogicalServerName AppName
  - SQL DB troubleshoot sqlx store errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: 'MonSQLXStore

      | where TIMESTAMP > ago(1h)

      | where event == "xio_failed_request" and http_errorcode == 503 and AppTypeName == "Worker.ISO"

      | where file_path endswith ''.ldf'' or file_path endswith ''.mdf'' or file_path endswith ''.ndf''

      | extend StorageAccount = extract("https://([0-9,a-z]+).blob.*", 1, file_path, typeof(string))

      | where StorageAccount like ''rs''

      | extend Region = extract("[ct]r[0-9]+[.]([^.]+)[.]", 1, ClusterName, typeof(string))

      | summarize count(), max(retry_count) by Region, StorageAccount, AppName, LogicalServerName, file_path, bin(originalEventTimestamp, 5min)

      | where max_retry_count > 5

      | summarize total_throttling_count = sum(count_), throttling_windows_5m_outof_1h = count(), max(max_retry_count) by Region, StorageAccount, AppName, LogicalServerName, file_path, bin(originalEventTimestamp,
      time(1h))

      | where throttling_windows_5m_outof_1h > 8

      | summarize by Region, StorageAccount, LogicalServerName, AppName, file_path'
