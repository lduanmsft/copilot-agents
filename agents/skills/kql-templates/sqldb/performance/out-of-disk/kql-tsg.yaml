- id: DB-performance-568
  Topic: High-PAGEIOLATCH__-for-Data-File
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/High-PAGEIOLATCH__-for-Data-File.md
  Prompts:
  - SQL DB rg history latency
  - SQL DB MonSqlRgHistory event AppName type_desc
  - SQL DB troubleshoot rg history latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where event =~ ''aggregated_virtual_files_io_history''

      | where TIMESTAMP > ago({TimeRange}) - 1d and TIMESTAMP < now() + 1d

      | where AppName == "{AppName}"

      // | where NodeName == "{NodeName}"

      | where database_id > 0

      | where database_id == 585

      | where type_desc == ''ROWS''

      | extend duration_time_ms_read = min_of(delta_io_stall_read_ms, duration_time_ms)

      | extend duration_time_ms_write = min_of(delta_io_stall_write_ms, duration_time_ms)

      | extend storage_read_ms_per_page = (delta_io_stall_read_ms - delta_io_stall_queued_read_ms)/(round(delta_num_of_bytes_read/(8*1024),2))

      | extend storage_write_ms_per_page = (delta_io_stall_write_ms - delta_io_stall_queued_write_ms)/(round(delta_num_of_bytes_written/(8*1024),2))

      | project end_aggregated_sample, file_id = tostring(file_id)

      , read_mbs = round(delta_num_of_bytes_read / (duration_time_ms_read * 0.001 * 1024. * 1024),2)

      , write_mbs = round(delta_num_of_bytes_written / (duration_time_ms_write * 0.001 * 1024. * 1024),2)

      , max_read_mbs = num_of_bytes_read_per_second_max / (1024. * 1024)

      , max_write_mbs = num_of_bytes_written_per_second_max / (1024. * 1024)

      , iops = round((delta_num_of_reads +delta_num_of_writes) / (duration_time_ms * 0.001),2)

      , riops = round((delta_num_of_reads) / (duration_time_ms_read * 0.001),2)

      , wiops = round((delta_num_of_writes) / (duration_time_ms_write * 0.001),2)

      , delta_io_stall_read_ms, delta_io_stall_queued_read_ms, delta_io_stall_write_ms, delta_io_stall_queued_write_ms

      , delta_num_of_reads, delta_num_of_writes

      , num_of_reads_per_second_max

      , num_of_writes_per_second_max

      , num_of_reads_per_second_min

      , num_of_writes_per_second_min

      , num_of_bytes_read_per_second_min

      , num_of_bytes_written_per_second_min

      , duration_time_ms

      , NodeName

      , avg_kb_read = delta_num_of_bytes_read / (1024 * delta_num_of_reads)

      , avg_kb_write = delta_num_of_bytes_written / (1024 * delta_num_of_writes)

      , storage_read_ms_per_page

      , storage_write_ms_per_page

      | extend mbs = read_mbs + write_mbs

      | extend storage_read_ms = round((delta_io_stall_read_ms - delta_io_stall_queued_read_ms)*1./delta_num_of_reads,2)

      | extend storage_write_ms = round((delta_io_stall_write_ms - delta_io_stall_queued_write_ms)*1./delta_num_of_writes,2)

      | extend rg_read_ms = (delta_io_stall_queued_read_ms)/delta_num_of_reads

      | extend rg_write_ms = (delta_io_stall_queued_write_ms)/delta_num_of_writes

      | extend blob_known_ok = mbs > 0.75*200 or iops > 0.75*5000 or ( (storage_read_ms < 15 or storage_read_ms_per_page < 0.5)

      and (storage_write_ms < 30 or storage_write_ms_per_page < 0.5) )

      | extend blob_ok_spike = max_read_mbs > 0.75*200

      or max_write_mbs > 0.75*200

      or num_of_reads_per_second_max > 0.75*5000

      or num_of_writes_per_second_max > 0.75*5000

      | extend read_active_percent = round(min_of(100., delta_io_stall_read_ms*100./duration_time_ms),2)

      | extend write_active_percent = round(min_of(100., delta_io_stall_write_ms*100./duration_time_ms),2)

      | project end_aggregated_sample, file_id

      , storage_read_ms, round(storage_read_ms_per_page, 2), rg_read_ms

      , storage_write_ms, round(storage_write_ms_per_page,2), rg_write_ms

      , blob_known_ok, blob_ok_spike

      , rg_dominates = rg_read_ms > storage_read_ms or rg_write_ms > storage_write_ms

      , round(num_of_reads_per_second_min, 2)

      , round(num_of_writes_per_second_min,2)

      , min_rmbs = round(num_of_bytes_read_per_second_min / (1024 * 1024), 2)

      , min_wmbs = round(num_of_bytes_written_per_second_min / (1024 * 1024), 2)

      , iops

      , read_mbs

      , round(avg_kb_read, 2)

      , write_mbs

      , round(avg_kb_write, 2)

      , read_active_percent

      , write_active_percent

      , NodeName

      | extend high_rg = rg_read_ms > 1000 or rg_write_ms > 1000

      | extend good_storage = ( (storage_read_ms < 15 or storage_read_ms_per_page < 0.5) and (storage_write_ms < 30 or storage_write_ms_per_page < 0.5) )

      | extend label = iff( blob_known_ok == 1 and rg_dominates == 0, ''ideal''

      , iff(blob_known_ok == 1 and rg_dominates == 1 , ''demand high; BC or balancing needed''

      , iff(blob_known_ok == 0 and rg_dominates == 0 and blob_ok_spike == 0 and good_storage == 0, ''check storage''

      , iff(rg_dominates == 1 and good_storage == 1, ''storage OK, demand high/bursty demand; reduce demand, more IOPS are needed; update slo, BC can give more IOPS''

      , iff(high_rg == 1 and good_storage == 1, ''check rg''

      , iif(rg_dominates == 1 and good_storage == 0, ''check blob tier, XIO throttling or network, but BC, bigger caps can help''

      , iif(rg_dominates == 0 and good_storage == 0, ''check blob tier, XIO throttling or network''

      , ''unk/mixed'')))))))'
- id: DB-performance-571
