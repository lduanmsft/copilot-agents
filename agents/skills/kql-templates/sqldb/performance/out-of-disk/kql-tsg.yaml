      | project ClusterName, LogicalServerName, AppName, db_name, resource, marker_file_name, metadata_marker_file_value, metadata_sql_stored_value

      , cas_get_marker_files = strcat("Get-PhysicalDatabaseMarkerFiles ", "-LogicalServerName ", LogicalServerName, " -LogicalDatabaseName ", db_name)

      , cas_update_marker_files = strcat("Update-PhysicalDatabaseMarkerFile ", "-LogicalServerName ", LogicalServerName, " -LogicalDatabaseName ", db_name,

