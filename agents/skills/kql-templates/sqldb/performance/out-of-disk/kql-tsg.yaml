- id: DB-performance-658
  Topic: TSGRS16-Detected-Large-Number-of-Stuck-Storage-FSM-Workflows
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS16-Detected-Large-Number-of-Stuck-Storage-FSM-Workflows.md
  Prompts:
  - SQL DB management status
  - SQL DB MonManagement state originalEventTimestamp
  - SQL DB investigate management
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where originalEventTimestamp >= ago(7d)

      | where isnotempty(stack_trace) and isnotempty(state_machine_type)

      | where state_machine_type == ''AzureStorageAccountStateMachine'' or state_machine_type == ''AzureStorageContainerStateMachine'' or state_machine_type == ''AzureFileShareStateMachine''

      | summarize min_ts=min(originalEventTimestamp), max_ts=max(originalEventTimestamp), hit_count=count() by state_machine_type, exception_type, request_id, state, [''keys'']

      | where hit_count > 100 and min_ts < ago(6d) and max_ts > ago(1h)'
- id: DB-performance-659
  Topic: TSGRS16-Detected-Large-Number-of-Stuck-Storage-FSM-Workflows
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS16-Detected-Large-Number-of-Stuck-Storage-FSM-Workflows.md
  Prompts:
  - SQL DB management status
  - SQL DB MonManagement state ClusterName TIMESTAMP
  - SQL DB investigate management
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where originalEventTimestamp >= ago(7d)

      | where isnotempty(stack_trace) and isnotempty(state_machine_type)

      | where state_machine_type in (''AzureStorageAccountStateMachine'', ''AzureStorageContainerStateMachine'', ''AzureFileShareStateMachine'')

      | extend storage_account_name = tostring(split([''keys''], '','')[1])

      | where (keys contains ''prs'' or keys contains ''pfs'') and keys !contains ''pfse'' and keys !contains ''pfsg'' and keys !contains ''prsmi''

      | summarize min_ts=min(originalEventTimestamp), max_ts=max(originalEventTimestamp), hit_count=count() by state_machine_type, exception_type, request_id, state, [''keys''], ClusterName, storage_account_name,
      stack_trace, message

      | where hit_count > 100

      | join (MonStorageAccountContainerSnapshot

      | where TIMESTAMP >= ago(1d) and private_cluster_subscription_affinity_tag == ''''

      | summarize by storage_account_name, storage_account_purpose

      ) on storage_account_name

      | where storage_account_purpose in (''RemoteStorage'', ''PFS'')'
