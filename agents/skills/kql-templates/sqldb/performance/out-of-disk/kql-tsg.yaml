SqlSkills:
- id: DB-performance-54
  Topic: Incident-59546911-_CSS-CASE-SEV-A_-_Prem_-_V12-and
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Incident-59546911-_CSS-CASE-SEV-A_-_Prem_-_V12-and.md
  Prompts:
  - SQL DB transaction log usage
  - SQL DB MonDmIoVirtualFileStats LogicalServerName
  - SQL DB investigate transaction log usage
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where TIMESTAMP >= ago(48h)

      | where AppName == "{AppName}"

      | where db_name == "tempdb" and type_desc == "ROWS"

      | where NodeName in ("DB.19", "DB.18", "DB.42", "DB.21")

      | extend percent_of_max_size = 100.0 * (todouble(spaceused_mb)/todouble(max_size_mb))

      | project TIMESTAMP, ClusterName, NodeName, LogicalServerName, AppTypeName, AppName, spaceused_mb//, max_size_mb, percent_of_max_size

      | summarize max(spaceused_mb) by ClusterName, NodeName, LogicalServerName, AppTypeName, AppName, bin(TIMESTAMP, 30m)

      | project TIMESTAMP, NodeName, AppName, max_spaceused_mb

      | order by TIMESTAMP asc

      | render timechart'
- id: DB-performance-59
  Topic: PearlAbyss-xperf-1500-hrs-UTC--_--3-minutes-_
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/PearlAbyss-xperf-1500-hrs-UTC--_--3-minutes-_.md
  Prompts:
  - SQL DB RG load activity
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where application_name startswith "fabric:/NodeAgentTenant"

      | where ClusterName startswith "{ClusterName}" and NodeName == "{NodeName}"

      //| where ClusterName startswith "{ClusterName}" and NodeName == "{NodeName}"

      | where TIMESTAMP > ago(2h)

      | where event == "directory_quota_report_load" or (event == "reporting_win_fab_metric" and metric_name == "InstanceDiskSpaceUsed")

      | where target_directory contains "[log](file://log/)"

      | extend quota_limit_gb = quota_limit_in_bytes / (1024. * 1024. * 1024.), quota_usage_gb = quota_usage_in_bytes / (1024. * 1024. * 1024.), metric_value_gb = metric_value / (1024.)

      | project TIMESTAMP , NodeName , event , application_name , slo_size , metric_name , metric_value_gb , target_directory , quota_usage_gb, quota_limit_gb , ClusterName

      | summarize max(quota_usage_gb), max(quota_limit_gb) by ClusterName , NodeName, application_name, slo_size, metric_name, metric_value_gb, target_directory'
- id: DB-performance-116
  Topic: Helping-Dynamic_Ax-to-mitigate_RCA-out-of-space-is
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Helping-Dynamic_Ax-to-mitigate_RCA-out-of-space-is.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event AppName NodeName type_desc
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where AppName == "{AppName}"

      | where originalEventTimestamp> ago(3d) and NodeName == "{NodeName}"

      | where event contains "file" and (database_id > 4 or

      database_id == 2)

      | project originalEventTimestamp, NodeName, file_id, database_id, type_desc,

      size_on_disk__gb = size_on_disk_bytes/1024/1024/1024

      , max_size_gb = max_size_mb/1024

      | summarize arg_max(size_on_disk__gb, max_size_gb, originalEventTimestamp) by database_id, file_id, type_desc

      | extend space_left_on_file_gb = max_size_gb - size_on_disk__gb'
- id: DB-performance-117
  Topic: Helping-Dynamic_Ax-to-mitigate_RCA-out-of-space-is
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Helping-Dynamic_Ax-to-mitigate_RCA-out-of-space-is.md
  Prompts:
  - SQL DB RG load activity
  - SQL DB MonRgLoad NodeName ClusterName TIMESTAMP
  - SQL DB investigate RG load
  CustomizedParameters:
  - AppName
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where application_name contains \"{AppName}\" and target_directory endswith "workdata" and TIMESTAMP >ago(1h) and NodeName == "{NodeName}"

      | project TIMESTAMP, NodeName, quota_limit_in_gb = quota_limit_in_bytes/1024/1024/1024, quota_usage_in_gb = quota_usage_in_bytes/1024/1024/1024, quota_usage_in_bytes, target_directory, ClusterName

      | extend space_left_in_dir_gb = quota_limit_in_gb - quota_usage_in_gb

      | summarize arg_max(quota_usage_in_bytes, *)'
- id: DB-performance-118
  Topic: Helping-Dynamic_Ax-to-mitigate_RCA-out-of-space-is
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Helping-Dynamic_Ax-to-mitigate_RCA-out-of-space-is.md
  Prompts:
  - SQL DB RG load activity
  - SQL DB MonRgLoad NodeName ClusterName TIMESTAMP
  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP < now() and ClusterName == "{ClusterName}" and drive_name startswith "S:" and NodeName == "{NodeName}"

      | project TIMESTAMP, NodeName, drive_capacity_in_bytes, drive_usage_percentage, space_left_gb = drive_capacity_in_bytes* (100.00 - drive_usage_percentage)/100.00/1024/1024/1024

      | summarize arg_max(drive_usage_percentage, *)'
- id: DB-performance-119
  Topic: Helping-Dynamic_Ax-to-mitigate_RCA-out-of-space-is
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Helping-Dynamic_Ax-to-mitigate_RCA-out-of-space-is.md
  Prompts:
  - SQL DB tran active transactIOns latency
  - SQL DB MonDmTranActiveTransactions AppName NodeName
  - SQL DB troubleshoot tran active transactIOns latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmTranActiveTransactions
    ExecutedQuery: 'MonDmTranActiveTransactions

      | where AppName == "{AppName}"

      | where TIMESTAMP > ago(1d)

      | project TIMESTAMP, NodeName, end_utc_date, transaction_begin_time, transaction_id, transaction_state, transaction_type, session_id, database_id, accessed_tempdb

      | extend duration_hr = toint((end_utc_date - transaction_begin_time)/time(1s)/60/60)

      | summarize arg_max(duration_hr, *) by database_id, session_id, transaction_id

      | top 3 by duration_hr'
- id: DB-performance-121
  Topic: Helping-Dynamic_Ax-to-mitigate_RCA-out-of-space-is
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Helping-Dynamic_Ax-to-mitigate_RCA-out-of-space-is.md
  Prompts:
