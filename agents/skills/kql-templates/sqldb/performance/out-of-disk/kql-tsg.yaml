    ExecutedQuery: 'cluster(regionName).database(databaseName).MonSQLXStoreIOStats

      | where TIMESTAMP > ago(24h)

      | where event == "xstore_io_stats"

      | where AppTypeName == "Worker.ISO"

      | where NodeRole == "DB" and (file_path endswith "mdf" or file_path endswith "ldf" or file_path endswith "ndf") and file_path contains "prs"

      | summarize arg_max(TIMESTAMP, page_blob_tier, inferred_tier) by file_path , AppName , LogicalServerName , ClusterName

      | join kind= leftouter (

      cluster(regionName).database(databaseName).MonSQLXStore

      | where TIMESTAMP > ago(24h) and http_errorcode == 503

      | where NodeRole == "DB" and event== "xio_failed_request"

      | summarize count(), max(retry_count)  by file_path  , AppName , LogicalServerName

      | where max_retry_count > 0 or count_  > 30

      | extend is_impacted = 1

      ) on AppName , file_path, LogicalServerName

      | join kind= leftouter (

      cluster(regionName).database(databaseName).MonDmRealTimeResourceStats

      | where TIMESTAMP > ago(24h)

      | summarize slo_name=any(slo_name) by AppName , LogicalServerName

