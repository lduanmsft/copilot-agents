- id: DB-performance-677
  Topic: Bot-to-move-Lowly-used-IO-databases-to-XStore
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/Bot-to-move-Lowly-used-IO-databases-to-XStore.md
  Prompts:
  - SQL DB analytics DB snapshot latency
  - SQL DB analytics DB snapshot state logical_server_name ClusterName
  - SQL DB troubleshoot now latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: ' let snapshot_start_inclusiv*e = ago(1h);

      let snapshot_end_exclusive = now();

      let elimination_snapshot_start_inclusive = ago(1d);

      let elimination_snapshot_end_exclusive = now();

      let filter_dtu_usage_start_inclusive = ago(6d);

      let filter_xio_dtu_percentage = 1;

      let filter_xio_max_duration = time(1m);

      let maxDatabaseGB = 5 \ 1024 * 1024 * 1024;

      let maxLogGenerationRate = 50.0;

      let snapshot = MonAnalyticsDBSnapshot

      | where ClusterName contains "east"

      | where TIMESTAMP >= snapshot_start_inclusive and TIMESTAMP < snapshot_end_exclusive

      | extend region = extract("[ct]r[0-9]+[.]([^.]+)[.]", 1, ClusterName, typeof(string))

      | summarize argmax(end_utc_date, storage_account_name, [''state''], physical_database_state, edition, service_level_objective, storage_account_name)

      by logical_server_name, logical_database_name, region, SourceNamespace

      | extend state = max_end_utc_date_state

      | extend physical_database_state = max_end_utc_date_physical_database_state

      | extend edition = max_end_utc_date_edition

      | extend service_level_objective = max_end_utc_date_service_level_objective

      | extend storage_account_name = max_end_utc_date_storage_account_name

      | extend TIMESTAMP = max_end_utc_date

      | project TIMESTAMP, logical_server_name, logical_database_name, physical_database_state, region, state , edition , service_level_objective , storage_account_name, SourceNamespace;

      let totalXIOBasedDb = snapshot

      | where ([''state''] == "Ready" or [''state''] == "Disabled") and storage_account_name contains "prs"

      | extend isMalmo = service_level_objective contains "M"

      | summarize argmax(TIMESTAMP, edition) , argmax(TIMESTAMP, service_level_objective) by logical_server_name, logical_database_name, physical_database_state, region, isMalmo, SourceNamespace

      | extend id = strcat( logical_server_name, '' '', logical_database_name, '' '', region )

      | extend edition = max_TIMESTAMP_edition

      | extend service_level_objective = max_TIMESTAMP_service_level_objective'
- id: DB-performance-679
  Topic: Bot-to-move-Lowly-used-IO-databases-to-XStore
