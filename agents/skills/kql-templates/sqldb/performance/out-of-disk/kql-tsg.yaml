- id: DB-performance-759
  Topic: PPBOT-062-High-Disk-Usage
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-062-High-Disk-Usage.md
  Prompts:
  - SQL DB RG load activity
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(1h)

      | where event == "node_info"

      | summarize node_sku=any(node_sku) by ClusterName, NodeName

      )

      on ClusterName, NodeName

      | extend dataDrive = iff(node_sku == "SQLG5", "C:WFRoot", "C:")

