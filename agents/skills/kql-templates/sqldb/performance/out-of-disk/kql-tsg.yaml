    ExecutedQuery: 'MonSqlRgHistory

      | where AppName in ("ccbd0cf4f61f")

      and originalEventTimestamp > ago(2d)

      | where event == "aggregated_workload_groups_plus_history"

      //and group_name =="InMemBackupGroup"

      | project originalEventTimestamp, group_name,ClusterName,NodeName,

      delta_io_mb = (delta_read_bytes_total+delta_write_bytes_total)/1024/1024, code_package_version, duration_time_sec = duration_time_ms/1000

      | extend delta_io_mbps = delta_io_mb/duration_time_sec

      | project originalEventTimestamp, group_name, delta_io_mbps | render timechart'
- id: DB-performance-647
  Topic: TSGRS-Throttle-Backup-to-mitigate-severe-XIO-throt
