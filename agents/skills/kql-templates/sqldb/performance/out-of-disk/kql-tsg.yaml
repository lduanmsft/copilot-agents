    ExecutedQuery: 'MonManagement

      | where originalEventTimestamp >= ago(1d)

      | where isnotempty(stack_trace) and isnotempty(state_machine_type)

      | where state_machine_type in (''SqlNSPCoordinatorStateMachine'', ''SqlNSPProfileStateMachine'')

      | extend profile_name = iif(state_machine_type == ''SqlNSPProfileStateMachine'', tostring(split(keys, '','')[3]), '''')

      | extend region = strcat(extract(''[ct]r[0-9]+[.]([^.]+)[.]'', 1, ClusterName, typeof(string)))

      | summarize min_ts=min(originalEventTimestamp), max_ts=max(originalEventTimestamp), hit_count=count() by state_machine_type, exception_type, state, exception, exception_message, profile_name, region,
      keys

      | where hit_count > 100'
