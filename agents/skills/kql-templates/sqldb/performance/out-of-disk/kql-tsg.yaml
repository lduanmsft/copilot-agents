- id: DB-performance-606
  Topic: TSGRS-A01-Mitigate-stuck-storage-account-creation_
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS-A01-Mitigate-stuck-storage-account-creation_.md
  Prompts:
  - SQL DB certificate watchdog rotation
  - SQL DB MonMachineLocalWatchdog component NodeName
  - SQL DB investigate certificate watchdog rotation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonMachineLocalWatchdog
    ExecutedQuery: 'MonMachineLocalWatchdog

      | where TIMESTAMP > ago(3d)

      | where component == "CertificateWatchdog"

      | extend new_message = message_resourcename

      | summarize argmax(TIMESTAMP, new_message) by ClusterName, NodeName, new_message

      | extend tokens=split(max_TIMESTAMP_new_message, ";")

      | extend Subject=extract("Subject=(.*)", 1, tostring(tokens[1]))

      | extend Thumbprint=extract("Thumbprint=(.*)", 1, tostring(tokens[2]))

      | extend Created=extract("Created=(.*)", 1, tostring(tokens[3]))

      | extend Expires=extract("Expires=(.*)", 1, tostring(tokens[4]))

      | extend LogicalName = iff(arraylength(tokens) > 4, extract("RegistryLogicalName=(.*)", 1, tostring(tokens[5])) , "")

      | extend CertStore = iff(arraylength(tokens) > 5, extract("CertStore=(.*)", 1, tostring(tokens[6])) , "")

      | extend Key = strcat(ClusterName, "_", NodeName)

      | summarize NodeCount=dcount(Key), LastSeen=max(max_TIMESTAMP) by Thumbprint, Subject, todatetime(Created),todatetime(Expires), LogicalName, CertStore

      // | where Subject contains "storageaad"

      //| where Subject contains "chinaeast2"

      | where LogicalName contains "AzureManagement" or LogicalName contains "WorkerManagement" or LogicalName contains "StorageAadApplication"'
