- id: DB-performance-557
  Topic: Backfill-data-files-for-CRM-GP-DB
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Backfill-data-files-for-CRM-GP-DB.md
  Prompts:
  - SQL DB resource pool stats activity
  - SQL DB MonResourcePoolStats LogicalServerName AppName
  - SQL DB investigate resource pool stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonResourcePoolStats
    ExecutedQuery: 'MonResourcePoolStats

      | where PreciseTimeStamp >= ago(2d) and AppTypeName == "Worker.ISO"

      //| where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | summarize arg_max(PreciseTimeStamp, *) by LogicalServerName, AppName

      | project LogicalServerName, resource_pool_name, AppName, resource_pool_storage_limit, allocated_data_storage_percent, data_storage_percent

      ) on LogicalServerName, AppName

      | project-away LogicalServerName1, AppName1

      | where (max_file_id == 1 and file_count == 1) or (file_count > 1 and max_file_id == file_count + 1)

      | where file_count < target_file_count

      | extend growth_gb = target_grow_size_gb * (target_file_count-file_count)

      | summarize sum(growth_gb), db_to_grow = count() by Region, AppName, LogicalServerName, data_storage_percent, allocated_data_storage_percent, resource_pool_storage_limit

      | extend is_pool_instance = resource_pool_storage_limit != ""

      | extend pool_storage_limit_gb = todouble(resource_pool_storage_limit) / (1024. * 1024)

      | extend pool_free_space_gb = pool_storage_limit_gb * (100.-allocated_data_storage_percent) / 100.

      | extend new_allocated_storage_percent = (pool_storage_limit_gb * allocated_data_storage_percent + sum_growth_gb * 100.) / pool_storage_limit_gb

      | extend pool_out_of_space = iff(is_pool_instance and pool_free_space_gb * max_pool_storage_factor < sum_growth_gb, 1, 0)'
