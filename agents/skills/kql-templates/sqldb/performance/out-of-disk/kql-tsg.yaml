- id: DB-performance-707
  Topic: PP0009-2-Useful-Kusto-queries
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PP0009-2-Useful-Kusto-queries.md
  Prompts:
  - SQL DB RG load analysis
  - SQL DB MonRgLoad event NodeName ClusterName
  - SQL DB investigate RG load
  CustomizedParameters:
  - AppName
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where originalEventTimestampFrom > ago(1d) and ClusterName == "{tr_name}" and NodeName == "{node_name}"

      | where event == "directory_quota_report_load" and application_name contains \"{AppName}\" and target_directory endswith "data"

      | project originalEventTimestampFrom , NodeName , application_name , target_directory ,

      used_mb = quota_usage_in_bytes / 1024.0 / 1024, limit_mb = quota_limit_in_bytes / 1024.0 / 1024'
- id: DB-performance-708
  Topic: PP0009-2-Useful-Kusto-queries
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PP0009-2-Useful-Kusto-queries.md
  Prompts:
  - SQL DB IO virtual file stats activity
  - SQL DB MonDmIoVirtualFileStats AppName NodeName
  - SQL DB investigate IO virtual file stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where originalEventTimestamp > ago(1d) and ClusterName == "{tr_name}"

      | where AppName == "{instance_name}"

      | extend size_on_disk_gb = size_on_disk_bytes/1024.0/1024/1024, spaceused_gb = spaceused_mb/1024.0

      | summarize max(size_on_disk_gb), max(spaceused_gb) by AppName, NodeName, db_name, file_id

      | summarize size_on_disk_gb = sum(max_size_on_disk_gb), spaceused_gb = sum(max_spaceused_gb) by NodeName

      // Load reporting 1: SQL side'
- id: DB-performance-717
  Topic: PPBOT-009---Xio-accounts-throwing-AccountQuotaExce
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-009---Xio-accounts-throwing-AccountQuotaExce.md
  Prompts:
  - SQL DB sqlx store errors
  - SQL DB MonSQLXStore event LogicalServerName AppName
  - SQL DB troubleshoot sqlx store errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: 'MonSQLXStore

      | where event == "xio_failed_request" and errorcode == "AccountQuotaExceeded"

      | extend StorageAccount = extract("<https://(%5B0-9,a-z%5D+).blob.*>", 1, file_path, typeof(string))

      | where StorageAccount contains "prs" and StorageAccount !contains "prsmi" or StorageAccount contains "pdw"

      | summarize count(TIMESTAMP) by StorageAccount, AppName, AppTypeName, LogicalServerName , ClusterName, request_type

      | extend FailureCount = count_TIMESTAMP

      | project StorageAccount, AppName , AppTypeName, FailureCount, LogicalServerName, ClusterName, request_type'
- id: DB-performance-718
  Topic: PPBOT-009---Xio-accounts-throwing-AccountQuotaExce
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-009---Xio-accounts-throwing-AccountQuotaExce.md
  Prompts:
  - SQL DB sqlx store IO stats activity
  - SQL DB MonSQLXStoreIOStats LogicalServerName AppName
  - SQL DB investigate sqlx store IO stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: 'MonSQLXStoreIOStats

      | where AppName == "{AppName}"

      | where file_path endswith "df"

      | where page_blob_tier != ""

      | summarize arg_max(TIMESTAMP, page_blob_tier, inferred_tier) by file_path , AppName , LogicalServerName

      | where page_blob_tier != "P30" and inferred_tier == 1'
- id: DB-performance-738
  Topic: PPBOT-037-PerfProcessDirectoryQuotaFailure
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-037-PerfProcessDirectoryQuotaFailure.md
