      | where slo_name !startswith "System"

      | extend storage_account_name = substring(split(file_path , ".")[0], 8)

      | extend Region = tostring(split(ClusterName , ".")[1])

      | extend mdf_file_path = replace(@''_(\d+).[ln]df'', @''_1.mdf'', file_path)

      //| extend is_not_fixed = iff(page_blob_tier != "P30" and page_blob_tier != "P40" and page_blob_tier != "P50" and page_blob_tier != "P60" and page_blob_tier != "P70" and page_blob_tier != "P80", 1
      , 0)

      | extend is_not_fixed = ( inferred_tier == 0 and page_blob_tier == "P10")

      | extend is_log = iff(file_path endswith "ldf", 1, 0)

      | summarize sum(is_not_fixed), sum(is_impacted), sum(is_log) by mdf_file_path, Region

      | summarize Total_DBs=countif(sum_is_log > 0) , DBs_Remaining=countif(sum_is_not_fixed > 0), DBs_Remaining_Throttled=countif(sum_is_not_fixed > 0 and sum_is_impacted > 0), DBs_Remaining_NotThrottled=countif(sum_is_not_fixed
      > 0 and sum_is_impacted == 0) by Region

      | order by Total_DBs asc'
