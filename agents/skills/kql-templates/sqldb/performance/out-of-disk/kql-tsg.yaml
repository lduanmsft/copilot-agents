- id: DB-performance-168
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB RG load activity
  - SQL DB MonRgLoad event NodeName application_name
  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad


      | where application_name contains "{AppName}"


      | where event =="directory_quota_report_load"


      | summarize arg_max(TIMESTAMP, *) by NodeName, application_name


      | extend quota_limit_in_GB= quota_limit_in_bytes/1024/1024/1024, quota_usage_in_GB=quota_usage_in_bytes/1024/1024/1024, peak_quota_usage_in_GB = peak_quota_usage_in_bytes/1024/1024/1024


      | project TIMESTAMP, NodeName, application_name, quota_limit_in_GB, quota_usage_in_GB, peak_quota_usage_in_GB// D.02

      '
- id: DB-performance-214
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB sqlx store errors
  - SQL DB MonSQLXStore AppName NodeName gt lt file_path
  - SQL DB troubleshoot sqlx store errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: 'MonSQLXStore


      | where AppName == "{AppName}" // and NodeName == "{NodeName}"


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where http_errorcode == 503


      | top-nested of bin(TIMESTAMP,5m) by count(), top-nested 5 of file_path by Error_Count=count() desc


      | order by TIMESTAMP asc nulls last


      | project TIMESTAMP, file_path, Error_Count


      | render timechart// IO.02

      '
- id: DB-performance-217
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB sqlx store errors
  - SQL DB MonSQLXStore event LogicalServerName AppName
  - SQL DB troubleshoot sqlx store errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: 'MonSQLXStore


      | where LogicalServerName == "{LogicalServerName}" and AppName == "{AppName}"


      | where event == ''xio_failed_request''


      | where http_errorcode == ''503''


      | where file_path contains "mdf"


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | summarize count(), retry_count = max(retry_count) by bin(TIMESTAMP, 1m), file_byte_offset, file_path, request_type, NodeName


      | summarize ios_throtled = count(), throtles = sum(count_), max(retry_count), percentiles(retry_count, 95, 99, 99.9) by bin(TIMESTAMP, 5m) , file_path, NodeName


      | where max_retry_count &gt; 0// IO.05

      '
- id: DB-performance-218
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB sqlx store IO stats analysis
  - SQL DB MonSQLXStoreIOStats event LogicalServerName
  - SQL DB investigate sqlx store IO stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: 'MonSQLXStoreIOStats


      | where LogicalServerName == "{LogicalServerName}" and AppName == "{AppName}"


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where event == ''xstore_io_stats''


      | where (file_path contains "ldf") or (file_path contains "mdf")


      | project TIMESTAMP, iops = total_requests/30.


      , niops = total_xio_requests/30.


      , file_path , NodeName


      | where file_path !contains ''ldf''


      | where ( niops &gt; 1.1 * iops and niops &gt; 50 ) or niops &gt; 250 // IO being governed

      '
