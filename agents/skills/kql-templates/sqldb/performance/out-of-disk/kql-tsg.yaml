- id: DB-performance-572
  Topic: Infra-upgrade-for-Storage-AAD-cert-rotation
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Infra-upgrade-for-Storage-AAD-cert-rotation.md
  Prompts:
  - SQL DB certificate watchdog rotation
  - SQL DB MonMachineLocalWatchdog component NodeName
  - SQL DB investigate certificate watchdog rotation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonMachineLocalWatchdog
    ExecutedQuery: 'MonMachineLocalWatchdog

      | where TIMESTAMP > ago(2d)

      | where component == "CertificateWatchdog"

      | where ClusterName contains "cr2.southeastasia"

      | extend  new_message = message_resourcename

      | summarize argmax(TIMESTAMP, new_message) by ClusterName, NodeName, new_message

      | extend tokens=split(max_TIMESTAMP_new_message, ";")

      | extend Subject=extract("Subject=(.*)", 1, tostring(tokens[1]))

      | extend Thumbprint=extract("Thumbprint=(.*)", 1, tostring(tokens[2]))

      | extend Created=extract("Created=(.*)", 1, tostring(tokens[3]))

      | extend Expires=extract("Expires=(.*)", 1, tostring(tokens[4]))

      | extend LogicalName = iff(arraylength(tokens) > 4, extract("RegistryLogicalName=(.*)", 1, tostring(tokens[5])) , "")

      | extend CertStore = iff(arraylength(tokens) > 5, extract("CertStore=(.*)", 1, tostring(tokens[6])) , "")

      | extend Key = strcat(ClusterName, "_", NodeName)

      | where Subject contains "Storage"

      | summarize NodeCount=dcount(Key), LastSeen=max(max_TIMESTAMP) by ClusterName, Thumbprint, Subject, todatetime(Created),todatetime(Expires), LogicalName, CertStore

      | sort by Expires  asc'
- id: DB-performance-573
  Topic: Is-XIO-throttling-impactful
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Is-XIO-throttling-impactful.md
  Prompts:
  - SQL DB sqlx store IO stats activity
  - SQL DB MonSQLXStoreIOStats originalEventTimestamp
  - SQL DB investigate sqlx store IO stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: 'MonSQLXStoreIOStats

      | where file_path contains file_path

      | where originalEventTimestamp >= start_time and originalEventTimestamp <= end_time

      | extend type_desc = iff(file_path contains ''ldf'', ''LOG'', iff(file_path contains ''mdf'' or file_path contains ''ndf'', ''ROWS'', ''UNK''))

      | summarize requests = sum(total_requests), retries = sum(total_retries) by bin(originalEventTimestamp, kpi_sample)

      | extend io_retry_ratio = round(retries / (0.001 + requests), 2)

      ) on originalEventTimestamp

      | extend io_retry_ratio = iff(isnotnull(originalEventTimestamp1), io_retry_ratio, 0.)

      | project originalEventTimestamp, time_throttled_ratio, max_retries_per_io_scaled_to_10 = max_retries_per_io / 10.0, io_retry_ratio, impact

      | order by originalEventTimestamp asc'
- id: DB-performance-577
  Topic: Is-it-a-BC-candidate
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Is-it-a-BC-candidate.md
  Prompts:
  - SQL DB resource governance latency
  - SQL DB MonDmDbResourceGovernance database_name
  - SQL DB troubleshoot resource governance latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbResourceGovernance
    ExecutedQuery: 'MonDmDbResourceGovernance

      | where database_name =~ p_database

      | summarize arg_max(end_utc_date

      , primary_group_max_io

      , pool_max_io

      , primary_max_log_rate

      , instance_max_log_rate

      , checkpoint_rate_io

      , checkpoint_rate_mbps

      , volume_local_iops

      , volume_managed_xstore_iops

      , volume_external_xstore_iops) by database_name

      | join kind=leftouter ( bc_utilization_candidates ) on database_name

      | project-away database_name1

      | project database_name, bc_io_utilization_candidate_signal = bc, slo_name

      | join kind=leftouter ( bc_database_storage_size_utilization ) on database_name

      | project-away database_name1

      | project database_name, slo_name, bc_io_utilization_candidate_signal, bc_size_candidate_signal = bc

      | join kind=leftouter ( wait_io_symptom ) on database_name

      | project-away database_name1

      // The signals are not comparable as is in magnitude

      | project database_name

      , slo_name

      , bc_io_utilization_candidate_signal

      , bc_size_candidate_signal

      , bc_io_wait_signal = bc

      , waits = tostring(waits)

      , example_bottleneck_wait_type = max_sum_delta_wait_time_ms_wait_type

      , example_bottleneck_wait_type_avg_wait_ms = max_sum_delta_wait_time_ms_avg_wait_ms

      , example_bottleneck_wait_type_avg_signal_wait_ms = max_sum_delta_wait_time_ms_avg_signal_wait_ms

      , example_high_latency_wait_type = max_avg_wait_ms_wait_type

      , example_high_latency_wait_type_avg_wait_ms = max_avg_wait_ms_avg_wait_ms

      , example_high_latency_wait_type_avg_signal_wait_ms = max_avg_wait_ms_avg_signal_wait_ms

      , example_high_count_wait_type = max_sum_delta_waiting_tasks_count_wait_type

      , example_high_count_wait_type_avg_wait_ms = max_sum_delta_waiting_tasks_count_avg_wait_ms

      , example_high_count_wait_type_avg_signal_wait_ms = max_sum_delta_waiting_tasks_count_avg_signal_wait_ms'
- id: DB-performance-584
  Topic: Last-attempt
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Last-attempt.md
  Prompts:
  - SQL DB sqlx store IO stats activity
  - SQL DB MonSQLXStoreIOStats event LogicalServerName
  - SQL DB investigate sqlx store IO stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: 'cluster(clstr).database("sqlazure1").MonSQLXStoreIOStats

      | where TIMESTAMP > ago(24h)

      | where event == "xstore_io_stats" and AppTypeName == "Worker.ISO"

      | where (file_path endswith "mdf" or file_path endswith "ldf" or file_path endswith "ndf") and file_path contains "prs"

      | summarize arg_max(TIMESTAMP, page_blob_tier, inferred_tier) by file_path , AppName , LogicalServerName , ClusterName

      | where inferred_tier == 0 and page_blob_tier in("P10", "P20")// explicit tier

      | join kind= inner (

      cluster(clstr).database("sqlazure1").MonDmRealTimeResourceStats

      | where TIMESTAMP > ago(24h)

      | summarize slo_name = any(slo_name) by AppName , LogicalServerName

      ) on AppName , LogicalServerName

      //| where LogicalServerName like "spartan"

      | where slo_name !startswith "System" and slo_name != "Basic"

      | extend storage_account_name = substring(split(file_path , ".")[0], 8)

      | extend Region = tostring(split(ClusterName , ".",1)[0])

      | extend mdf_file_path = replace(@''_(\d+).[ln]df'', @''_1.mdf'', file_path)

      | extend is_not_fixed = iff(page_blob_tier !in ("P30","P40" , "P50", "P60" , "P70", "P80"), 1 , 0)

      | extend is_log = iff(file_path endswith "ldf", 1, 0)

      | where is_not_fixed == 1

      | summarize count() by Region'
