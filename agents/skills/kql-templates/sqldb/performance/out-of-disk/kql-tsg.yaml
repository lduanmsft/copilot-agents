    ExecutedQuery: 'MonRgManager

      | where originalEventTimestamp > ago(1h)

      | where event == "global_directory_quota_governance_begin" or event == "process_directory_quota_governance_begin"

      | summarize start_cnt = count(), last_start = max(originalEventTimestamp) by ClusterName , event , NodeName , application_name, code_package_name

      | join kind= leftouter ('
- id: DB-performance-739
  Topic: PPBOT-037-PerfProcessDirectoryQuotaFailure
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-037-PerfProcessDirectoryQuotaFailure.md
  Prompts:
  - SQL DB ppbot 037 perf process directory quota failure
  - SQL DB MonRgManager event NodeName ClusterName
  - SQL DB troubleshoot ppbot 037 perf process directory quota
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: 'MonRgManager

      | where originalEventTimestamp > ago(1h)

      | where (event == "global_directory_quota_governance_end" and exception_hash == 0)

      or (event == "process_directory_quota_governance_end" and success == 1)

      | summarize end_count = count(), last_end_time = max(originalEventTimestamp) by ClusterName , event , NodeName , application_name, code_package_name

      ) on ClusterName, NodeName, application_name , code_package_name

      | extend end_cnt = iff(event1 == "", 0, end_count), last_end = iff(event1 == "", ago(1h), last_end_time)

      | where end_cnt < start_cnt and last_end < last_start

      | extend app_name = strcat(application_name, "_", code_package_name)

      | summarize app_set = makeset(app_name) by ClusterName , NodeName , event'
- id: DB-performance-743
  Topic: PPBOT-039-Directory-Quota-Alert
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-039-Directory-Quota-Alert.md
  Prompts:
  - SQL DB RG load activity
  - SQL DB MonRgLoad NodeName ClusterName TIMESTAMP
  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(1h)

      | where application_type == "Worker" and target_directory endswith "[log](file://log)" and target_directory contains "Worker_App"

      | where quota_limit_in_bytes != 0

      | extend percentage = ((quota_usage_in_bytes * 1.0 ) / (quota_limit_in_bytes * 1.0)) * 100.0

      | where percentage > 90

      | summarize argmax(TIMESTAMP, percentage) by ClusterName, NodeName, target_directory'
- id: DB-performance-744
  Topic: PPBOT-039-Directory-Quota-Alert
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-039-Directory-Quota-Alert.md
  Prompts:
  - SQL DB RG load analysis
  - SQL DB MonRgLoad NodeName ClusterName TIMESTAMP
  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(1h) and ClusterName == "{ClusterName}" and NodeName == "{NodeName}"

      | where application_type == "Worker" and target_directory endswith "[log](file://log)" and target_directory contains "Worker_App"

      | extend percentage = ((quota_usage_in_bytes * 1.0 ) / (quota_limit_in_bytes * 1.0)) * 100.0

      | project TIMESTAMP, ClusterName, NodeName, target_directory, percentage, quota_usage_in_bytes, quota_limit_in_bytes'
- id: DB-performance-745
  Topic: PPBOT-040-Tempdb-Out-of-Data-Space
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-040-Tempdb-Out-of-Data-Space.md
  Prompts:
  - SQL DB errors reported errors
  - SQL DB AlrSQLErrorsReported LogicalServerName AppName
  - SQL DB troubleshoot errors reported errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrSQLErrorsReported
    ExecutedQuery: 'AlrSQLErrorsReported

      | where error_number == 1105 or error_number == 1101 or error_number == 3949 or error_number == 3958

      | where AppName == appname

      | where TIMESTAMP > ago(1h)

      | project TIMESTAMP , AppName, error_number , LogicalServerName , message, NodeName

      | summarize count() by bin(TIMESTAMP, 5m) , NodeName, LogicalServerName'
- id: DB-performance-746
  Topic: PPBOT-040-Tempdb-Out-of-Data-Space
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-040-Tempdb-Out-of-Data-Space.md
  Prompts:
  - SQL DB transaction log usage
  - SQL DB MonDmIoVirtualFileStats LogicalServerName
  - SQL DB investigate transaction log usage
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where TIMESTAMP > _StartTime and TIMESTAMP < _EndTime

      | where LogicalServerName =~ _ServerName and AppName =~ _AppName and NodeName =~ _NodeName

      | where db_name in ("tempdb")

      | extend size_on_disk_mb=(size_on_disk_bytes*1.0/1024/1024)

      | project TIMESTAMP , database_id ,file_id , spaceused_mb, size_on_disk_mb , max_size_mb, type_desc

      | order by TIMESTAMP asc nulls last , file_id asc nulls last'
- id: DB-performance-747
  Topic: PPBOT-041-Tempdb-Out-of-Log-Space
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/PPBOT-041-Tempdb-Out-of-Log-Space.md
  Prompts:
  - SQL DB errors reported errors
  - SQL DB AlrSQLErrorsReported LogicalServerName AppName
  - SQL DB troubleshoot errors reported errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrSQLErrorsReported
    ExecutedQuery: 'AlrSQLErrorsReported

      | where error_number == 9002

      | where AppName == appname

      | where message contains "tempdb"

      | where TIMESTAMP > ago(1h)

      | project TIMESTAMP , AppName, error_number , LogicalServerName , message, NodeName

      | summarize count() by bin(TIMESTAMP, 5m) , NodeName, LogicalServerName'
