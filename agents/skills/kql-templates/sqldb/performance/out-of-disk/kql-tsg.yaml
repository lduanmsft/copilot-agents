- id: DB-performance-289
  Topic: PERFTS016-Directory-Quota-Near-Full-Alert
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/PERFTS016-Directory-Quota-Near-Full-Alert.md
  Prompts:
  - SQL DB RG load analysis
  - SQL DB MonRgLoad event NodeName ClusterName TIMESTAMP
  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP> {StartTime} and TIMESTAMP< {EndTime}

      | where NodeName== {NodeName}

      | where target_directory contains ''data''

      | where ClusterName == {ClusterName}

      | where event == "directory_quota_report_load"

      | project TIMESTAMP , application_name , cap_GB = quota_limit_in_bytes / (1024.0 * 1024*1024), usage_GB = quota_usage_in_bytes / (1024.0 * 1024*1024)

      | extend usage_percent = usage_GB * 1.0 / cap_GB

      | where usage_percent > {DirectoryQuotaUsedFromIcMTitle} / 100

      //| render timechart'
- id: DB-performance-290
  Topic: PERFTS016-Directory-Quota-Near-Full-Alert
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/PERFTS016-Directory-Quota-Near-Full-Alert.md
  Prompts:
  - SQL DB transaction log usage
  - SQL DB MonSqlRgHistory event AppName type_desc
  - SQL DB investigate transaction log usage
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where logical_database_id =~ logicalDBId and AppName =~ appName

      |where event == ''aggregated_virtual_files_io_history'' and type_desc ==''LOG''

      |where TIMESTAMP >= startTime and TIMESTAMP <= endTime

      |extend size_on_disk_gb = round(size_on_disk_bytes/(1024*1024*1024.0),2) , max_size_gb = round(max_size_mb/1024,2), space_used_gb = round(spaceused_mb/1024.0,2)

      |extend space_used_gb_percent = round(space_used_gb/size_on_disk_gb,4)*100

      |summarize arg_max(originalEventTimestamp,*) by bin(originalEventTimestamp,5m)

      |project originalEventTimestamp, logical_database_id, space_used_gb,size_on_disk_gb, max_size_gb,space_used_gb_percent

      |order by originalEventTimestamp asc

      If the space_used_gb of a Log file is considerably less compared to size_on_disk_gb then shrink the log file to free up disk space using [Shrink TSG](https://eng.ms/docs/cloud-ai-platform/azure-data/azure-data-azure-databases/sql-/sql-availability-and-geodr/sql-db-availability-tsgs-new/sql-db-availability-tsgs/storageengine/shrink)
      and mitigate the incident.

      Otherwise, refer to the TSG below for mitigation steps to find which feature is holding log truncation.:'
- id: DB-performance-291
  Topic: PERFTS016-Directory-Quota-Near-Full-Alert
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/PERFTS016-Directory-Quota-Near-Full-Alert.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event AppName NodeName type_desc
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP> {StartTime} - 5min and TIMESTAMP< {StartTime} + 5min

      | where AppName == "{AppName}" and NodeName == "{NodeName}"

      | where database_id == 2

      | where event == ''aggregated_virtual_files_io_history''

      | extend size_on_disk_GB = size_on_disk_bytes / 1024.0 / 1024 / 1024

      | extend max_size_GB = max_size_mb / 1024.0

      | summarize max(max_size_GB), max(size_on_disk_GB) by type_desc, file_id, database_id, physical_database_name, storage_account_name

      | summarize sum(max_max_size_GB), sum(max_size_on_disk_GB) by 1

      | where sum_max_size_on_disk_GB > 500'
- id: DB-performance-292
  Topic: PERFTS016-Directory-Quota-Near-Full-Alert
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/PERFTS016-Directory-Quota-Near-Full-Alert.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where TIMESTAMP between (varStartTime .. varEndTime)

      | where logical_server_name == varLogicalServerName

      | where sql_instance_name == varAppName

      | summarize min(TIMESTAMP), max(TIMESTAMP) by logical_database_id, physical_database_id, edition, service_level_objective

      | project-reorder min_TIMESTAMP, max_TIMESTAMP

      | sort by min_TIMESTAMP asc'
- id: DB-performance-295
  Topic: SQL-Perf-Trending-Issue-Tracker
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/SQL-Perf-Trending-Issue-Tracker.md
  Prompts:
  - SQL DB transaction log usage
  - SQL DB MonSqlRgHistory LogicalServerName AppName
  - SQL DB investigate transaction log usage
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where AppName =~"{AppName}" and ((PreciseTimeStamp between (datetime(10/9/2025 12:00:14 AM)..datetime(10/10/2025 9:19:26 AM)) and ClusterName =~"{ClusterName}" and NodeName =~"{NodeName}")or (PreciseTimeStamp
      between (datetime(10/10/2025 9:19:50 AM)..datetime(10/11/2025 1:59:50 AM)) and ClusterName =~"{ClusterName}" and NodeName =~"{NodeName}"))

      | where LogicalServerName =~ "{ServerName}"

      | where database_id == 2 and type_desc == ''ROWS''

      | summarize

      sum_spaceused_mb = sum(spaceused_mb),

      sum_size_on_disk_mb = sum(size_on_disk_bytes/1024/1024),

      sum_max_size_mb = sum(max_size_mb)

      by bin(originalEventTimestamp, 5m), LogicalServerName,AppName,AppTypeName,NodeName

      | summarize breachcount = countif(sum_spaceused_mb  > (sum_max_size_mb * 0.9)), sum_spaceused_gb=max(sum_spaceused_mb/1024),sum_size_on_disk_gb=max(sum_size_on_disk_mb/1024),sum_max_size_gb= max(sum_max_size_mb/1024)
      by LogicalServerName,AppName, MachineName=NodeName , bin(originalEventTimestamp, 5m)

      |project originalEventTimestamp,sum_spaceused_gb,sum_size_on_disk_gb//,sum_max_size_gb'
- id: DB-performance-298
  Topic: SQL-Perf-Trending-Issue-Tracker
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/SQL-Perf-Trending-Issue-Tracker.md
  Prompts:
