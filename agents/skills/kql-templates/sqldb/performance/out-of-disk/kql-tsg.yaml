- id: DB-performance-652
  Topic: TSGRS-XIO01-Increase-Xio-blob-tier-to-mitigate-sto
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS-XIO01-Increase-Xio-blob-tier-to-mitigate-sto.md
