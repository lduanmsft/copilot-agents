- id: DB-performance-636
  Topic: TSGRS-SC03---Investigating-PFS-dynamic-scaling-ale
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS-SC03---Investigating-PFS-dynamic-scaling-ale.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonResourcePoolStats event LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonResourcePoolStats
    ExecutedQuery: 'MonResourcePoolStats

      | where TIMESTAMP > p_startdate

      | where TIMESTAMP < p_enddate

      | where AppTypeName == ''Worker.ISO''

      | where event == ''resource_pool_stats'' // this event will contain dtu or vCore for app

      | extend dtuInitialQuota = iff(toint(resource_pool_dtu_limit) > 100, 3 * p_multicore_gb_per_100dtu * toint(resource_pool_dtu_limit) / 100,

      iff(toint(resource_pool_dtu_limit) > 0 , 3 * p_subcore_gb_per_100dtu * toint(resource_pool_dtu_limit) / 100,

      0)) // calculate initial quota, if app is using dtu SLO

      | extend vCoreInitialQuota = resource_pool_cpu_limit * p_gb_per_vcore // calculate initial quota, if app is using vCore SLO

      | extend actualInitialQuota = max_of(dtuInitialQuota, vCoreInitialQuota) // get actual quota (one will be 0, for SLO that app doesn''t use)

      | summarize arg_max(TIMESTAMP, *) by LogicalServerName, AppName

      ) on LogicalServerName, AppName

      | summarize arg_max(TIMESTAMP, HourlyQuota = pfs_total_gb, InitQuota = actualInitialQuota) by LogicalServerName, AppName, bin(TIMESTAMP, 1h)

      | summarize SumOfHourlyQuota = sum(HourlyQuota), SumOfInitialQuota = sum(InitQuota), sum(HourlyQuota) * 1.0 / sum(InitQuota) by bin(TIMESTAMP, 1h)

      | project signal = SumOfHourlyQuota > 0 and SumOfHourlyQuota * 1.0 / SumOfInitialQuota > 1.25 // check if sum of all current quotas is > 1.25 * sum of all initial quotas

      | summarize alert = countif(signal == 1) * 1.0 / count() > 0.3 // emit alert if signal emitted more than 30% of time'
- id: DB-performance-637
  Topic: TSGRS-SC03---Investigating-PFS-dynamic-scaling-ale
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/TSGRS-SC03---Investigating-PFS-dynamic-scaling-ale.md
  Prompts:
