    ExecutedQuery: 'MonSQLXStore

      | where TIMESTAMP > ago(1d)

      | where event == "pfs_metadata_consistency_validation" and metadata_validation_result == 0 and metadata_key ==''x-ms-meta-sqlxfcbleaseorderid''

      | summarize max(TIMESTAMP), count() by ClusterName, LogicalServerName, AppName, metadata_sql_stored_value, metadata_marker_file_value, resource, metadata_key

      | join kind = innerunique (MonSqlRgHistory

      | where TIMESTAMP > ago(1d)

