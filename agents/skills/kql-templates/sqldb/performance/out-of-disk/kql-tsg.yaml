      | project ClusterName, NodeName, node_sku, drive_name, drive_capacity_gb, drive_usage_percentage, originalEventTimestampTo'
- id: DB-performance-780
  Topic: SOP-move-S3-standard-singleton-from-XSTORE-to-XIO
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/SOP-move-S3-standard-singleton-from-XSTORE-to-XIO.md
  Prompts:
  - SQL DB analytics DB snapshot status
  - SQL DB analytics DB snapshot state logical_server_name LogicalServerName
  - SQL DB investigate ago
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'let snapshot_start_inclusive = ago(2h);

      let snapshot_end_exclusive = now();

      //snapshot of S3+ singletone SQL DB in ready state

      let snapshot = MonAnalyticsDBSnapshot

      | where TIMESTAMP >= snapshot_start_inclusive and TIMESTAMP < snapshot_end_exclusive

      | where edition in ("Standard") and storage_account_name <>""

      and service_level_objective startswith "S" and service_level_objective notcontains "M" and service_level_objective notcontains "SQL" and service_level_objective !in ("S0", "S1", "S2")

      | extend region = extract(".(.*?).",1,ClusterName)

      | summarize argmax(end_utc_date, storage_account_name, [''state''], physical_database_state, edition, service_level_objective, storage_account_name, sql_instance_name)

      by ClusterName, logical_server_name, logical_database_name, logical_database_id, region, SourceNamespace

      | extend state = max_end_utc_date_state

      | extend physical_database_state = max_end_utc_date_physical_database_state

      | extend sql_instance_name = max_end_utc_date_sql_instance_name

      | extend edition = max_end_utc_date_edition

      | extend service_level_objective = max_end_utc_date_service_level_objective

      | extend storage_account_name = max_end_utc_date_storage_account_name

      | extend TIMESTAMP = max_end_utc_date

      | where[''state''] == "Ready" and physical_database_state == "Ready"

      | project TIMESTAMP, ClusterName, logical_server_name, logical_database_name, logical_database_id, physical_database_state, region, state, edition, service_level_objective, storage_account_name, SourceNamespace,
      sql_instance_name;

      //DBs on xstore from snapshot above

      let totalDBsonXStore = snapshot

      | where[''state''] == "Ready" and physical_database_state == "Ready"

      | extend isOnXIO = storage_account_name contains "prs"

      | where edition in ("Standard") and storage_account_name <>""

      and service_level_objective startswith "S" and service_level_objective notcontains "M" and service_level_objective notcontains "SQL" and service_level_objective !in ("S0", "S1", "S2")

      | summarize argmax(TIMESTAMP, *) by ClusterName, logical_server_name, logical_database_name, service_level_objective, logical_database_id, physical_database_state, region, SourceNamespace, storage_account_name,
      edition

      | where max_TIMESTAMP_isOnXIO == 0;

      // join with billingsnapshot to get slo_id

      let billingDBs = MonBillingDatabaseStatus2

      | where TIMESTAMP >= snapshot_start_inclusive and TIMESTAMP < snapshot_end_exclusive

      | where edition in ("Standard")

      and service_level_objective startswith "S" and service_level_objective notcontains "M" and service_level_objective notcontains "SQL" and service_level_objective !in ("S0", "S1", "S2")

      | summarize argmax(end_utc_date, edition, service_level_objective, service_level_objective_id)

      by ClusterName, database_id, SourceNamespace

      | extend logical_database_id = database_id

      | extend edition = max_end_utc_date_edition

      | extend service_level_objective = max_end_utc_date_service_level_objective

      | extend service_level_objective_id = max_end_utc_date_service_level_objective_id

      | extend TIMESTAMP = max_end_utc_date

      | project TIMESTAMP, ClusterName, logical_database_id, edition, service_level_objective, service_level_objective_id;

      //generate cas for move

      let distinct_xio_candidates = totalDBsonXStore | join kind=inner(billingDBs) on logical_database_id, edition, service_level_objective

      | summarize by ClusterName, LogicalServerName = logical_server_name,LogicalDatabaseName = logical_database_name, ServiceLevelObjective = service_level_objective, LogicalDatabaseId = logical_database_id,
      max_TIMESTAMP_sql_instance_name, storage_account_name, service_level_objective_id

      | extend region = extract("[ct]r[0-9]+[.]([^.]+)[.]", 1, ClusterName, typeof(string))

      | extend cmd = strcat("Set-Database -ServerName ", LogicalServerName, " -DatabaseName ", LogicalDatabaseName, " -Edition Standard -ServiceObjective ", service_level_objective_id, " -Settings ''{"RequestedTargetStorageAccountType":"Premium_LRS"}''
      ")

      //| summarize count() by region'
- id: DB-performance-888
  Topic: XE0001-Stuck-dispatcher-for-sessions-with-long-running-targets
  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0001-Stuck-dispatcher-for-sessions-with-long-running-targets.md
  Prompts:
  - SQL DB sqlx store errors
  - SQL DB MonSQLXStore LogicalServerName AppName TIMESTAMP
  - SQL DB troubleshoot sqlx store errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: 'MonSQLXStore

      | where TIMESTAMP >= ago(30d) //between (st..et)

      | where LogicalServerName == logicalServerName

      | where AppName == appName

      | where strlen(tostring(http_errorcode)) > 0

      | extend file_path_chunks = split(file_path, "/")

      | where array_length(file_path_chunks) >= 4

      | extend file_path_prefix = strcat(file_path_chunks[0], "/", file_path_chunks[1], "/", file_path_chunks[2], "/", file_path_chunks[3])

      | summarize

      count()'
- id: DB-performance-889
  Topic: XE0001-Stuck-dispatcher-for-sessions-with-long-running-targets
  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0001-Stuck-dispatcher-for-sessions-with-long-running-targets.md
  Prompts:
  - SQL DB sqlx store errors
  - SQL DB MonSQLXStore event LogicalServerName AppName
  - SQL DB troubleshoot sqlx store errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: 'MonSQLXStore

      | where TIMESTAMP >= ago(30d)

      | where LogicalServerName == logicalServerName

      | where AppName == appName

      | where event == "xio_failed_request"

      | where file_path startswith_cs "https://rxcmnqaauditblob.blob.core.windows.net/sqldbauditlogs"

      | where http_errorcode == 400

      | where mapped_errorcode == 87 // ERROR_INVALID_PARAMETER

      | summarize

      count()'
- id: DB-performance-894
  Topic: XE0008-Disable-NO_EVENT_LOSS-event-retention-mode
  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0008-Disable-NO_EVENT_LOSS-event-retention-mode.md
  Prompts:
  - SQL DB xevents telemetry analysis
  - SQL DB MonXeventsTelemetry event database_name
  - SQL DB investigate xevents telemetry
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonXeventsTelemetry
    ExecutedQuery: 'MonXeventsTelemetry

      | where AppName in (''appName'')

      | where PreciseTimeStamp between (startTime..endTime)

      | where LogicalServerName=~ServerName

      | where event != ''xio_failed_request''

      | join kind=leftouter (mapping) on buffer_flush_policy

      | project TIMESTAMP, database_name, event, session_name, EVENT_RETENTION_MODE, NodeName, ClusterName

      | order by TIMESTAMP

      | take 10'
- id: DB-performance-897
  Topic: XE0012-IcM-AzureDBProduction-XEStuckDispatcher
  Source: TSG-SQL-DB-Performance/content/SOS/XEvents-in-Azure-SQL/XE0012-IcM-AzureDBProduction-XEStuckDispatcher.md
