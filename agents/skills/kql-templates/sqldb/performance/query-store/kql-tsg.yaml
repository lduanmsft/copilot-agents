- id: DB-performance-781
  Topic: QP-015-%3A-QDS-goes-to-Read-only-mode
  Source: TSG-SQL-DB-Performance/content/QP/QP-015-%3A-QDS-goes-to-Read-only-mode.md
  Prompts:
  - SQL DB query store analysis
  - SQL DB MonQueryStoreInfo AppName originalEventTimestamp
  - SQL DB investigate query store
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryStoreInfo
    ExecutedQuery: '_let elasticPoolAppName = "{AppName}"; // ex: a944475868a7

      let startTime = ago({TimeRange});

      let endTime = now();

      cluster(''sqlazureuk2'').database(''sqlazure1'').MonQueryStoreInfo

      | where originalEventTimestamp between(startTime..endTime)

      | where AppName == elasticPoolAppName

      |where logical_database_name =~ "{DatabaseName}"

      | where isnotnull(current_size_kb) and isnotnull(max_size_kb) and current_size_kb != 0

      | summarize max(current_size_kb) by logical_database_name, bin(originalEventTimestamp, 1h)

      | summarize sum(max_current_size_kb) by originalEventTimestamp

      | render timechart_'
