- id: DB-performance-274
  Topic: Resource_Semaphore-waits
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Resource_Semaphore-waits.md
  Prompts:
  - SQL DB blocking investigation
  - SQL DB WITH
  - SQL DB troubleshoot blocking investigation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsMemoryManagerCounters
    ExecutedQuery: "|  Q1 Memory Manager counters \n \n \n \n \n | MonDmOsMemoryManagerCounters \n  | where TIMESTAMP > datetime({StartTime}) and TIMESTAMP < datetime({EndTime}) \n  | where NodeName ==\
      \ \"{NodeName}\" and ClusterName == \"{ClusterName}\" \n  | where LogicalServerName =~ \"{LogicalServerName}\" and AppName =~ \"{AppName}\" \n  | summarize avg(cntr_value) by bin(TIMESTAMP, 10min),\
      \ counter_name, NodeName \n  | render timechart  |\n|  Q2 Instance Memory Cap \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n | MonDmDbResourceGovernance \n  | where AppName =~ \"{AppName}\"\
      \ \n  | extend MaxCPUCores = case ( primary_bucket_fill_rate_cpu == 0, (primary_group_max_cpu*min_cores)/100 , primary_bucket_fill_rate_cpu/1000.0) \n  | extend MaxMemoryMB = case (min_memory==0,\
      \ max_db_memory/1024.0, min_memory/1024.0) \n  | extend MaxMemoryGB = round(MaxMemoryMB /1024.0,2) \n  | extend MaxIOPS = primary_group_max_io \n  | extend WorkersLimit = primary_group_max_workers\
      \ \n  | extend SessionsLimit=max_sessions \n  | extend MaxDbDizeGb = max_db_max_size_in_mb/1024 \n  | extend MaxLogKbps = primary_max_log_rate/1024.0 \n  //| distinct slo_name, MaxCPUCores,MaxMemoryGB,\
      \ MaxIOPS, MaxLogKbps,MaxDbDizeGb, WorkersLimit, SessionsLimit // , LogicalServerName \n  | summarize StartTime=min(TIMESTAMP), EndTime=max(TIMESTAMP) by LogicalServerName, AppName, slo_name, MaxCPUCores,MaxMemoryGB,\
      \ MaxIOPS, MaxLogKbps,MaxDbDizeGb, WorkersLimit, SessionsLimit \n  | order by StartTime asc \n  | join kind= leftouter ( \n  MonDmRealTimeResourceStats \n  | where LogicalServerName =~ \"{LogicalServerName}\"\
      \ and database_name =~ \"{LogicalDatabaseName}\" and AppName =~ \"{AppName}\" \n  | filter replica_type == 0 \n  | summarize arg_min(TIMESTAMP, *) by AppName, database_name \n  ) on AppName \n  |\
      \ project StartTime, EndTime, LogicalServerName, AppName, database_name, slo_name, MaxCPUCores,MaxMemoryGB, MaxIOPS, MaxLogKbps,MaxDbDizeGb, WorkersLimit, SessionsLimit, cpu_cap_in_sec |\n|  Q3 Memory\
      \ clerk \n \n \n \n \n \n \n \n | // top N memory clerks \n  MonDmOsMemoryClerks \n  | where TIMESTAMP >= datetime({StartTime}) and TIMESTAMP <= datetime({EndTime}) \n  | where LogicalServerName =~\
      \ \"{LogicalServerName}\" and AppName =~ \"{AppName}\" and NodeName =~ \"{NodeName}\" \n  | extend MemoryInMB = round(pages_kb/1024.0,1) \n  | top-nested of bin(TIMESTAMP, 5min) by sum(MemoryInMB),\
      \ top-nested 5 of type by TotalMemInMB=sum(MemoryInMB) desc \n  | sort by TIMESTAMP asc nulls last \n  | project TIMESTAMP, type, TotalMemInMB \n  | render timechart  |\n|  Q4 queries with high memory\
      \ grant potential \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n\
      \ \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n |  \n \n  select IDENTITY( INT, 1, 1 ) rowId, cast (query_plan as xml) query_plan\
      \ \n \n  INTO #tmp \n \n  from sys.query_store_plan p join sys.query_store_runtime_stats r on p.plan_id = r.plan_id \n \n  join sys.query_store_runtime_stats_interval i on r.runtime_stats_interval_id\
      \ = i.runtime_stats_interval_id \n \n  where start_time > '2017-08-25 14:00:00.0000000' and end_time <'2017-08-25 20:00:00.0000000' \n \n    \n \n    \n \n  go \n \n    \n \n   \n \n  ;WITH cte AS\
      \ \n \n  ( \n \n  SELECT \n \n   rowId, \n \n   query_plan, \n \n  -- m.c.value ('@SerialRequiredMemory', 'INT' ) AS SerialRequiredMemory, \n \n   m.c.value ('@SerialDesiredMemory', 'INT' ) AS SerialDesiredMemory\
      \ \n \n   \n \n  FROM #tmp t \n \n   CROSS APPLY t.query_plan.nodes ( '//*:MemoryGrantInfo[@SerialDesiredMemory[. > 0]]' ) m(c) \n \n  ), cte2 AS ( \n \n  SELECT * \n \n  FROM cte \n \n  ) \n \n \
      \ SELECT TOP 50 \n \n   rowId, \n \n   query_plan, \n \n   CAST( SerialDesiredMemory / 1024. AS DECIMAL(10,2) ) SerialDesiredMemory_MB \n \n  FROM cte2 \n \n  ORDER BY SerialDesiredMemory DESC \n\
      \ \n    \n \n  go \n \n  --customer ready \n \n  ;WITH cte AS \n \n  ( \n \n  SELECT \n \n   query_id, \n \n   query_plan, \n \n   m.c.value ('@SerialDesiredMemory', 'INT' ) AS SerialDesiredMemory\
      \ \n \n  FROM #tmp t \n \n   CROSS APPLY t.query_plan.nodes ( '//*:MemoryGrantInfo[@SerialDesiredMemory[. > 0]]' ) m(c) \n \n  ) \n \n  SELECT TOP 50 \n \n   cte.query_id, \n \n   t.query_sql_text,\
      \ \n \n   cte.query_plan, \n \n   CAST( SerialDesiredMemory / 1024. AS DECIMAL(10,2) ) SerialDesiredMemory_MB \n \n  FROM cte JOIN sys.query_store_query q ON cte.query_id = q.query_id \n \n   JOIN\
      \ sys.query_store_query_text t ON q.query_text_id = t.query_text_id \n \n  ORDER BY SerialDesiredMemory DESC |\n|  Q5 Top memory grants (user query) \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n\
      \ \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n | print '-- top\
      \ 10 query memory grants --' \n \n    \n \n  SELECT top 10 CONVERT (varchar(30), getdate(), 121) as runtime,  \n \n  r.session_id \n \n   , r.blocking_session_id \n \n   , r.cpu_time \n \n   , r.total_elapsed_time\
      \ \n \n   , r.reads \n \n   , r.writes \n \n   , r.logical_reads \n \n   , r.row_count \n \n   , wait_time \n \n   , wait_type \n \n   , r.command \n \n  , object_name(txt.objectid,txt.dbid) 'Object_Name'\
      \ \n \n   , ltrim(rtrim(replace(replace (substring (SUBSTRING(text, (r.statement_start_offset/2)+1, ((CASE r.statement_end_offset WHEN -1 THEN DATALENGTH(text) ELSE r.statement_end_offset END - r.statement_start_offset)/2)\
      \ + 1), 1, 1000), char(10), ' '), char(13), ' '))) [stmt_text] \n \n   , mg.dop --Degree of parallelism  \n \n   , mg.request_time --Date and time when this query requested the memory grant. \n \n\
      \   , mg.grant_time --NULL means memory has not been granted \n \n   , mg.requested_memory_kb/ 1024.0 requested_memory_mb --Total requested amount of memory in megabytes \n \n   , mg.granted_memory_kb\
      \ / 1024.0 AS granted_memory_mb --Total amount of memory actually granted in megabytes. NULL if not granted \n \n   , mg.required_memory_kb / 1024.0 AS required_memory_mb--Minimum memory required\
      \ to run this query in megabytes.  \n \n   , max_used_memory_kb / 1024.0 AS max_used_memory_mb \n \n   , mg.query_cost --Estimated query cost. \n \n   , mg.timeout_sec --Time-out in seconds before\
      \ this query gives up the memory grant request. \n \n   , mg.resource_semaphore_id --Nonunique ID of the resource semaphore on which this query is waiting. \n \n   , mg.wait_time_ms --Wait time in\
      \ milliseconds. NULL if the memory is already granted. \n \n   , CASE mg.is_next_candidate --Is this process the next candidate for a memory grant \n \n   WHEN 1 THEN 'Yes' \n \n   WHEN 0 THEN 'No'\
      \ \n \n   ELSE 'Memory has been granted' \n \n   END AS 'Next Candidate for Memory Grant' \n \n  , qp.query_plan \n \n  FROM sys.dm_exec_requests r \n \n   JOIN sys.dm_exec_query_memory_grants mg\
      \ \n \n   ON r.session_id = mg.session_id and r.request_id=mg.request_id \n \n   CROSS APPLY sys.dm_exec_sql_text (mg.sql_handle ) AS txt \n \n  cross apply sys.dm_exec_query_plan (r.plan_handle)\
      \ qp \n \n  order by mg.granted_memory_kb desc |"
