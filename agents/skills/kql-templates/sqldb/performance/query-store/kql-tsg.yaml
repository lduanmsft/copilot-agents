- id: DB-performance-256
  Topic: Query-Store-queries-_Managed-Instance_
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Query-Store-queries-_Managed-Instance_.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats LogicalServerName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where LogicalServerName =~ "{LogicalServerName}"

      | where TIMESTAMP >= datetime({StartTime}) and TIMESTAMP <= datetime({EndTime})

      | where is_primary == 1

      | summarize total_cpu_ms=(sum(cpu_time)*1.0/(1000)), total_exec_count=sum(execution_count), total_logical_reads=sum(logical_reads) by TIMESTAMP=bin(TIMESTAMP, 15min)

      | order by TIMESTAMP asc nulls first

      | serialize

      | extend PrevTimestamp=prev(TIMESTAMP, 1)

      | where isnull(PrevTimestamp) == false

      | extend elapsed_second = (TIMESTAMP - PrevTimestamp) / 1s

      | extend cpu_percent_used = round((total_cpu_ms*100.0/1000)/(elapsed_second * cpu_cap_in_sec),2)

      | extend exec_count_per_cpu_per_sec=total_exec_count/(elapsed_second* cpu_cap_in_sec)

      | extend logical_reads_per_cpu_per_sec=total_logical_reads/(elapsed_second* cpu_cap_in_sec)

      | project TIMESTAMP, cpu_percent_used, exec_count_per_cpu_per_sec //, logical_reads_per_cpu_per_sec

      | render timechart

