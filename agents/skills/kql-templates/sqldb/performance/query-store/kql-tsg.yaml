      \ =~ 'x_qdsCaptureModeAuto', 'Auto', capture_policy_mode =~ 'x_qdsCaptureModeAll', 'All',                            capture_policy_mode =~ 'x_qdsCaptureModeNone', 'None',  capture_policy_mode =~\
      \ 'x_qdsCaptureModeCustom', 'Custom', 'Other') | extend ReadOnlyReason = case (binary_and(query_store_read_only_reason, 0x8) == 0x8, 'Secondary',                                query_store_read_only_reason\
      \ == 0x0, 'None',                               binary_and(query_store_read_only_reason, 0x00010000) == 0x00010000, 'DiskSizeLimit',                               binary_and(query_store_read_only_reason,\
      \ 0x00020000) == 0x00020000, 'StmtHashMapMemoryLimit',                               binary_and(query_store_read_only_reason, 0x00040000) == 0x00040000, 'BufferedItemsMemoryLimit',               \
      \                binary_and(query_store_read_only_reason, 0x00080000) == 0x00080000, 'DbDiskSizeLimit',                               'Other')| project Packed = pack(  'ActualState', ActualState,\
      \  'DesiredState', DesiredState,  'ReadOnlyReason', ReadOnlyReason,  'CaptureMode', CaptureMode)| mvexpand Packed| parse tostring(Packed) with '{x22'Property'x22:x22'Value'x22}'| project Property,\
