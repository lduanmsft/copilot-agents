      \ where LogicalServerName =~ '{ServerName}' and logical_database_name =~ '{DatabaseName}'| where event =~ 'automatic_tuning_diagnostics'| where phase_code =~ 'DetectionCheck'| top 1 by TIMESTAMP desc|\
      \ project is_detection_enabled, is_correction_enabled| project Packed = pack(  'is_APRC_detection_enabled', is_detection_enabled,  'is_APRC_correction_enabled', is_correction_enabled)| mvexpand Packed|\
      \ parse tostring(Packed) with '{x22'Property'x22:'Value'}'| project Property, Value| serialize row = row_number(201))| order by row asc | project-away row//QueryName:'Query Store and APRC Information'<tr\
      \ class=\"odd\">Query Store Failures// Query Store failure countsMonQueryStoreFailures| where AppName =~ '{AppName}' and TIMESTAMP between {StartTime}..{EndTime} and ClusterName =~ '{Cluster}' and\
      \ NodeName =~ '{NodeName}'| where LogicalServerName =~ '{ServerName}' and logical_database_name =~ '{DatabaseName}'| summarize Failure_Count=count() by event//QueryName:'Query Store Failures'<tr class=\"\
      even\">Query Store Plan Forcing TimeoutMonQueryStoreFailures| where AppName =~ '{AppName}' and TIMESTAMP between {StartTime}..{EndTime} and ClusterName =~ '{Cluster}' and NodeName =~ '{NodeName}'|\
      \ where LogicalServerName =~ '{ServerName}' and logical_database_name =~ '{DatabaseName}'| where event =~ 'query_store_plan_forcing_failed_core' and error_number == 8684| summarize first_occurance\
      \ = min(TIMESTAMP), last_occurance = max(TIMESTAMP), count() by query_id, plan_id| project last_occurance, first_occurance, query_id, plan_id, count = count_| order by last_occurance desc//QueryName:'Query\
      \ Store Plan Forcing Timeout'<tr class=\"odd\">Database Version Change History// Version change// if you see more than one entry, it means this App has version change (either major upgrade or hotpatch)MonDmRealTimeResourceStats|\
