      \ true)| project TIMESTAMP, LogicalServerName, logical_db_name, cmptlevel, is_auto_create_stats_on, is_auto_update_stats_on, is_parameterization_forced, is_auto_update_stats_async_on, is_auto_create_stats_incremental_on\
      \ | top 1 by TIMESTAMP desc| project Packed = pack('cmptlevel', cmptlevel,'is_auto_create_stats_on', is_auto_create_stats_on,'is_auto_update_stats_on', is_auto_update_stats_on,'is_parameterization_forced',\
      \ is_parameterization_forced,'is_auto_update_stats_async_on', is_auto_update_stats_async_on,'is_auto_create_stats_incremental_on', is_auto_create_stats_incremental_on)| mvexpand Packed| parse tostring(Packed)\
      \ with '{x22'Property'x22:'Value'}'| project Property, Value| order by Property asc//QueryName:'Latest database options'<tr class=\"even\">Query Store and APRC Information// query_store_read_only_reason\
      \ (8 means geo-secondary)// db_state_actual    0 = OFF 1 = READ_ONLY 2 = READ_WRITE 3 = ERRORunion (MonQueryStoreInfo| where AppName =~ '{AppName}' and TIMESTAMP between {StartTime}..{EndTime} and\
      \ ClusterName =~ '{Cluster}' and NodeName =~ '{NodeName}'| where LogicalServerName =~ '{ServerName}' and logical_database_name =~ '{DatabaseName}'| where event =~ 'query_store_db_settings_and_state'|\
