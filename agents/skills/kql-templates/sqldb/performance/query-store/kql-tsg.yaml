- id: DB-performance-162
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQueryParamData database_name LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQueryParamData
    ExecutedQuery: 'MonWiQueryParamData


      | where LogicalServerName =~ "{LogicalServerName}" and logical_database_name =~ "{LogicalDatabaseName}"


      | where AppName == "{AppName}" and NodeName =~ "{NodeName}"


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | extend compile_cpu_time_ms = compile_cpu_time / 1000


      | extend compile_duration_ms = compile_duration / 1000


      | summarize total_cpu_ms=sum(compile_cpu_time_ms) by TIMESTAMP=bin(TIMESTAMP, 5min)


      | order by TIMESTAMP asc nulls first


      | serialize


      | extend PrevTimestamp=prev(TIMESTAMP, 1)


      | where isnull(PrevTimestamp) == false


      | extend elapsed_second = datetime_diff (''second'', TIMESTAMP, PrevTimestamp)


      | project TIMESTAMP, cpu_percent_over_dtu=round((total_cpu_ms*100.0/1000)/(elapsed_second* cpu_cap_in_sec),4)


      | render timechart // QDS.06


      // Specific Query CPU % and exec count per cpu per sec MonWiQdsExecStats


      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where is_primary == 1


      | where query_hash =~ "0x9BC439A657945628"


      | summarize total_cpu_ms=(sum(cpu_time)*1.0/(1000)), total_exec_count=sum(execution_count), total_logical_reads=sum(logical_reads),distinct_plan_count=dcount(plan_id),


      distinct_query_id_count=dcount(query_id), all_plan_ids=makeset(plan_id), all_query_ids=makeset(query_id)// QDS.06.A

      '
- id: DB-performance-163
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats database_name LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats


      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where is_primary == 1


      | where query_hash =~ "0x9BC439A657945628"


      | summarize total_cpu_ms=(sum(cpu_time)*1.0/(1000)), total_exec_count=sum(execution_count), total_logical_reads=sum(logical_reads),


      all_plan_ids=makeset(plan_id), all_query_ids=makeset(query_id)


      by TIMESTAMP=bin(TIMESTAMP, 15min)


      | order by TIMESTAMP asc nulls first


      | serialize


      | extend PrevTimestamp=prev(TIMESTAMP, 1)


      | where isnull(PrevTimestamp) == false


      | extend elapsed_second = datetime_diff (''second'', TIMESTAMP, PrevTimestamp)


      | extend cpu_percent_over_dtu=round((total_cpu_ms*100.0/1000)/(elapsed_second* cpu_cap_in_sec),2)


      | extend exec_count_per_cpu_per_sec=total_exec_count/(elapsed_second* cpu_cap_in_sec)


      | extend logical_reads_per_cpu_per_sec=total_logical_reads/(elapsed_second* cpu_cap_in_sec)


      | project TIMESTAMP, cpu_percent_over_dtu,exec_count_per_cpu_per_sec, all_plan_ids, all_query_ids //, logical_reads_per_cpu_per_sec


      | render timechart // QDS.07

      '
- id: DB-performance-164
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats database_name LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats


      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where is_primary == 1


      | where query_hash =~ "0x9BC439A657945628"


      | extend key=strcat("query_hash:", query_hash, "plan_id:", plan_id)


      | summarize total_cpu_ms=(sum(cpu_time)*1.0/(1000)), total_exec_count=sum(execution_count), total_logical_reads=sum(logical_reads)


      by TIMESTAMP=bin(TIMESTAMP, 15min),key


      | order by key asc nulls first , TIMESTAMP asc nulls first


      | serialize


      | extend PrevTimestamp=prev(TIMESTAMP, 1), prev_key=prev(key, 1)


      | where isnull(PrevTimestamp) == false


      | where key == prev_key


      | extend elapsed_second = datetime_diff (''second'', TIMESTAMP, PrevTimestamp)


      | extend cpu_percent_over_dtu=round((total_cpu_ms*100.0/1000)/(elapsed_second* cpu_cap_in_sec),2)


      | extend exec_count_per_cpu_per_sec=total_exec_count/(elapsed_second* cpu_cap_in_sec)


      | extend logical_reads_per_cpu_per_sec=total_logical_reads/(elapsed_second* cpu_cap_in_sec)


      | project TIMESTAMP,key, cpu_percent_over_dtu,exec_count_per_cpu_per_sec //, logical_reads_per_cpu_per_sec


      | render timechart // QDS.08


      // Specific query absolute value usageMonWiQdsExecStats


      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where is_primary == 1


      | where query_hash =~ "0x6919447CA6760071"

      '
