      \ =~ '{DatabaseName}'| where AppTypeName != 'Worker.Vldb.Storage'| summarize FirstSeen=min(TIMESTAMP), LastSeen=max(TIMESTAMP) by LogicalServerName, code_package_version, hotpatch_data_package_version|\
      \ project StartTime=FirstSeen, EndTime=LastSeen, code_package_version, hotpatch_data_package_version| order by StartTime asc//QueryName:'Database Version Change History'<tr class=\"even\">Database\
      \ SLO Change History// Slo change historyMonDmRealTimeResourceStats| where AppName =~ '{AppName}' and TIMESTAMP between {StartTime}..{EndTime} and ClusterName =~ '{Cluster}' and NodeName =~ '{NodeName}'|\
      \ where LogicalServerName =~ '{ServerName}' and database_name =~ '{DatabaseName}'| where AppTypeName != 'Worker.Vldb.Storage' and AppTypeName != 'Worker.Vldb.XLog'| summarize StartTime=min(TIMESTAMP),\
      \ EndTime=max(TIMESTAMP) by AppName, slo_name| lookup kind=leftouter (MonDmDbResourceGovernance| where AppName =~ '{AppName}' and TIMESTAMP between {StartTime}..{EndTime} and ClusterName =~ '{Cluster}'\
      \ and NodeName =~ '{NodeName}'| extend MaxCPUCores = case (primary_bucket_fill_rate_cpu == 0, (primary_group_max_cpu*min_cores)/100.0, primary_bucket_fill_rate_cpu/1000.0)| extend MaxMemoryMB = case\
      \ (min_memory == 0, max_db_memory/1024.0, min_memory/1024.0)| extend MaxMemoryGB = round(MaxMemoryMB/1024.0, 2)| extend MaxIOPS = primary_group_max_io | extend WorkersLimit = primary_group_max_workers|\
      \ extend SessionsLimit = max_sessions| extend MaxDbDizeGb = max_db_max_size_in_mb/1024| extend MaxLogKbps = primary_max_log_rate/1024.0| summarize MaxCPUCores=any(MaxCPUCores), MaxMemoryGB=any(MaxMemoryGB),\
      \ MaxIOPS=any(MaxIOPS), MaxLogKbps=any(MaxLogKbps),     MaxDbDizeGb=any(MaxDbDizeGb), WorkersLimit=any(WorkersLimit), SessionsLimit=any(SessionsLimit), DatabaseDTULimit=any(dtu_limit) by slo_name)\
      \ on slo_name| project StartTime, EndTime, AppName, slo_name, MaxCPUCores, MaxMemoryGB, MaxIOPS, MaxLogKbps, MaxDbDizeGb, WorkersLimit, SessionsLimit, DatabaseDTULimit| order by StartTime asc//QueryName:'Database\
      \ SLO Change History'<tr class=\"odd\">Failover History for Primary NodeMonFabricApi| where TIMESTAMP &gt;= ago(7d)| where LogicalServerName =~ '{ServerName}'| where AppName in ({AppNames}) and NodeName\
      \ in ({NodeNames})| where AppTypeName !contains 'Worker.Vldb.Storage'| where event in ('hadr_fabric_api_replicator_begin_change_role', 'hadr_fabric_api_replica_end_change_role')| order by TIMESTAMP\
      \ asc| where event == 'hadr_fabric_api_replicator_begin_change_role'| where new_role_desc == 'PRIMARY'| project TIMESTAMP, AppName, NodeName, previous_role = current_state_desc, new_role = new_role_desc,\
      \ code_package_version, process_id//QueryName:'Failover History for Primary Node'<tr class=\"even\">Feature Switch and Config Override History// We are assuming logs are collected every 24 hours.\
      \ If the collection interval is changed, we need to modify this value.\n\n// log_collection_interval is used to find out both min_cutoff_time and max_cutoff_time (See the comments of these two variables\
