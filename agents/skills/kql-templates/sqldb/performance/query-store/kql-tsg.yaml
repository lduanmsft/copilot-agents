  - SQL DB MonQueryStoreInfo TIMESTAMP logical_database_name
  - SQL DB investigate query store
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryStoreInfo
    ExecutedQuery: 'MonQueryStoreInfo

      | where logical_database_name =~ "{DatabaseName}"

      | where TIMESTAMP > ago(2d) and stale_query_threshold_days != ""

      | project TIMESTAMP, stale_query_threshold_days'
