- id: DB-performance-127
  Topic: Kusto-Queries-for-Perf-by-jackli
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf-by-jackli.md
  Prompts:
  - SQL DB query store analysis
  - SQL DB MonDatabaseMetadata LogicalServerName AppName
  - SQL DB investigate query store
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      //| where TIMESTAMP > datetime({StartTime}) and TIMESTAMP < datetime({EndTime})

      | where LogicalServerName =~ "{LogicalServerName}" and logical_db_name =~ "{LogicalDatabaseName}" // and AppName =~ "{AppName}" and

      | where table_name== "sysdbreg"

      | extend is_parameterization_forced = (binary_and(status2, 0x08000000) == 0x08000000)

      | extend is_auto_create_stats_on = (binary_and(status2, 0x1000000) == 0x1000000)

      | extend is_auto_create_stats_incremental_on = (binary_and(status2, 0x00400000) == 0x00400000)

      | extend is_auto_update_stats_async_on = (binary_and(status2, 0x80000000) == 0x80000000)

      | extend is_auto_update_stats_async_on = (binary_and(status2, 0x80000000) == 0x80000000)

      | extend is_query_store_on= (binary_and(status2, 0x00000010) == 0x00000010) //DBR_QDSENABLED

      | extend is_auto_update_stats_on= iif((status2/1073741824) % 2 == 0, false, true)

      | project TIMESTAMP, LogicalServerName, logical_db_name, cmptlevel, is_query_store_on, is_auto_create_stats_on, is_auto_update_stats_on, is_parameterization_forced, is_auto_update_stats_async_on,
      is_auto_create_stats_incremental_on

      | top 1 by TIMESTAMP desc nulls last'
