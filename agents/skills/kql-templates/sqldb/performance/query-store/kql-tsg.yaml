      | where LogicalServerName =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"


      | where is_primary == 1


      | summarize sum(log_bytes_used) by query_hash


      | top 10 by sum_log_bytes_used desc <tr class="even">Q6 Total log by tes used (user query)-- top log used-- please adjust time window by changing rsi.start_time &gt;= DATEADD(hour, -2, GETUTCDATE())WITH
      AggregatedLogUsedAS(SELECT q.query_hash, SUM(count_executions * avg_cpu_time / 1000.0) AS total_cpu_millisec,SUM(count_executions * avg_cpu_time / 1000.0) /SUM(count_executions) as avg_cpu_millisec,sum
      (count_executions*avg_log_bytes_used) as total_log_bytes_used,max(rs.max_cpu_time/1000.00) as max_cpu_millisec,max(max_logical_io_reads) max_logical_reads,COUNT (distinct p.plan_id) AS number_of_distinct_plans,count
      (distinct p.query_id) as number_of_distinct_query_ids,sum (case when rs.execution_type_desc=''Aborted'' then count_executions else 0 end) as Aborted_Execution_Count,sum (case when rs.execution_type_desc=''Regular''
      then count_executions else 0 end) as Regular_Execution_Count,sum (case when rs.execution_type_desc=''Exception'' then count_executions else 0 end) as Exception_Execution_Count,sum (count_executions)
      as total_executions,min(qt.query_sql_text) as sampled_query_textFROM sys.query_store_query_text AS qt JOIN sys.query_store_query AS qON qt.query_text_id = q.query_text_idJOIN sys.query_store_plan
      AS p ON q.query_id = p.query_idJOIN sys.query_store_runtime_stats AS rs ON rs.plan_id = p.plan_idJOIN sys.query_store_runtime_stats_interval AS rsiON rsi.runtime_stats_interval_id = rs.runtime_stats_interval_idWHERE
      rs.execution_type_desc in( ''Regular'' , ''Aborted'', ''Exception'') andrsi.start_time &gt;= DATEADD(hour, -2, GETUTCDATE())GROUP BY q.query_hash),OrderedLogUsedAS(SELECT query_hash, total_log_bytes_used,
      number_of_distinct_plans, number_of_distinct_query_ids, total_executions,Aborted_Execution_Count,Regular_Execution_Count, Exception_Execution_Count, sampled_query_text,ROW_NUMBER () OVER (ORDER BY
      total_log_bytes_used DESC, query_hash asc) AS RNFROM AggregatedLogUsed)SELECT * from OrderedLogUsed ODWHERE OD.RN &lt;=15 ORDER BY total_log_bytes_used DESC go<tr class="odd">Q7 IO delays &amp; RG
      IO delays// Virtual File Stats IO delays

