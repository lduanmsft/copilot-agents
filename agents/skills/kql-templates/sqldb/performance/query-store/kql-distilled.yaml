          | where {LogicalServerAndLogicalDatabaseName}
          | where event=='query_store_stmt_hash_map_over_memory_limit' or
          ( event=='query_store_resource_total_over_instance_limit' and query_store_resource_type=='x_QdsResourceType_StmtHashMapMemory')
          | project originalEventTimestamp,logical_database_name,event,query_store_resource_type,current_stmt_hash_map_size_mb=current_stmt_hash_map_size_kb/1024,max_stmt_hash_map_size_mb=max_stmt_hash_map_size_kb/1024,current_instance_total_resource_size_mb=current_instance_total_resource_size_kb/1024,max_instance_total_resource_size_mb=max_instance_total_resource_size_kb/1024, max_memory_available_mb=max_memory_available_kb/1024,memory_percentage_limit
