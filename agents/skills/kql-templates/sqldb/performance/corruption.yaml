      | extend restore_request_id = tolower(restore_request_id)

      | where restore_request_id in (restore_request_ids)

      | distinct restore_request_id, point_in_time

      | join ('
- id: DB-performance-798
  Topic: QP010-Triangulating-approximate-corruption-time
  Source: TSG-SQL-DB-Performance/content/QP/QP010-Triangulating-approximate-corruption-time.md
  Prompts:
  - SQL DB restore status
  - SQL DB MonRestoreEvents error indexid tableid point_in_time
  - SQL DB investigate restore
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: 'MonRestoreEvents

      | where restore_request_id in (restore_request_ids)

      | where restore_database_progress contains "(ID 36911203)"

      | extend error = toint(extract("Error (895[12])", 1, restore_database_progress))

      | extend tableid = toint(extract("ID ([0-9]+).+ID ", 1, restore_database_progress))

      | extend indexid = toint(extract("ID .+ID ([0-9]+)", 1, restore_database_progress))

      | summarize count() by restore_request_id, error, tableid, indexid

      ) on restore_request_id

      | project restore_request_id, point_in_time, error, tableid, indexid, count_'
