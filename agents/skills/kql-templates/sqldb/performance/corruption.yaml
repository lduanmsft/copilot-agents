- id: DB-performance-787
  Topic: QP010-DBCC-checkDB-error-from-restore-verification
  Source: TSG-SQL-DB-Performance/content/QP/QP010-DBCC-checkDB-error-from-restore-verification.md
  Prompts:
  - SQL DB qp010 dbcc check db error from restore verification
  - SQL DB MonDatabaseMetadata LogicalServerName TIMESTAMP
  - SQL DB troubleshoot qp010 dbcc check db error from restore
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      | where TIMESTAMP > ago(1d)

      | where LogicalServerName =~ ''{LogicalServer}''

      | where logical_database_guid =~ ''{LogicalDatabaseGuid}''

      | where table_name == ''syscolpars''

      | where [''id''] == {ObjectId}

      | where xtype in (59, 62) // REAL and FLOAT

      | summarize dcount(colid)

      | project Result = case(dcount_colid > 0

      , "Table has FLOAT and/or REAL columns"

      , "Table DOESN''T have FLOAT and/or REAL columns")'
- id: DB-performance-788
  Topic: QP010-DBCC-checkDB-error-from-restore-verification
  Source: TSG-SQL-DB-Performance/content/QP/QP010-DBCC-checkDB-error-from-restore-verification.md
  Prompts:
  - SQL DB qp010 dbcc check db error from restore verification
  - SQL DB MonDatabaseMetadata LogicalServerName TIMESTAMP
  - SQL DB troubleshoot qp010 dbcc check db error from restore
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      | where TIMESTAMP > ago(1d)

      | where LogicalServerName =~ server_name

      | where logical_database_guid =~ db_guid

      | where table_name == "sysidxstats"

      | where [''type''] in (3, 4)

      | summarize arg_max(TIMESTAMP, [''type'']) by [''id''], indid

      | summarize count() by [''type'']

      | extend type_desc = case([''type''] == 3, ''XML Index'', [''type''] == 4, ''Spatial Index'', '''')

      ), ('
- id: DB-performance-790
  Topic: QP010-IndexCorruption-or-QPError8630-or-QPError8646-Alerts
  Source: TSG-SQL-DB-Performance/content/QP/QP010-IndexCorruption-or-QPError8630-or-QPError8646-Alerts.md
  Prompts:
  - SQL DB qp010 index corruption or qp error8630 or qp error86
  - SQL DB AlrSQLErrorsReported database_name LogicalServerName
  - SQL DB troubleshoot qp010 index corruption or qp error8630
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrSQLErrorsReported
    ExecutedQuery: 'AlrSQLErrorsReported

      | where TIMESTAMP > ago(1d)

      | where LogicalServerName =~ "{LogicalServerName}"

      | where

      (error_number == 8646) or

      (error_number == 8630 and [''state''] == 1) or

      (error_number == 9100)

      | project TIMESTAMP, error_number, [''state''], AppTypeName, AppName, LogicalServerName, database_name'
- id: DB-performance-791
  Topic: QP010-IndexCorruption-or-QPError8630-or-QPError8646-Alerts
  Source: TSG-SQL-DB-Performance/content/QP/QP010-IndexCorruption-or-QPError8630-or-QPError8646-Alerts.md
  Prompts:
  - SQL DB qp010 index corruption or qp error8630 or qp error86
  - SQL DB MonDatabaseMetadata LogicalServerName name
  - SQL DB troubleshoot qp010 index corruption or qp error8630
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      | where PreciseTimeStamp > ago(1d)

      | where LogicalServerName =~ ''{LogicalServerName}''

      | where table_name == ''sysschobjs''

      | where id == {object_id} and name =~ ''object_name''

      | project id, name, logical_db_name'
- id: DB-performance-793
  Topic: QP010-Start-Here---QPError8630,-QPError8646-and-Du
  Source: TSG-SQL-DB-Performance/content/QP/QP010-Start-Here---QPError8630,-QPError8646-and-Du.md
  Prompts:
  - SQL DB restore status
  - SQL DB can
  - SQL DB investigate restore
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRestoreRequests
    ExecutedQuery: '| RestoreRequestId | The restore verification guid; can be used with MonRestoreRequests and MonRestoreEvents to get more information. |

      | IsInconclusive | If true, the results of this restore verification should be ignored. |

      | RestoreSuccess | If true, the restore succeeded. If false, the results should be ignored. This doesn''t indicate whether there was a corruption. |

      | VerificationSuccess | If true, the CHECKDB passes with no errors. If false, the CHECKDB found a corruption. |

      | AllocationErrors | The number of allocation errors found by CHECKDB. This value may vary at different points in time if there are multiple corruptions. |

      | ConsistencyErrors | The number of consistency errors found by CHECKDB. This value may vary at different points in time if there are multiple corruptions. |'
- id: DB-performance-794
  Topic: QP010-Triangulating-approximate-corruption-time
  Source: TSG-SQL-DB-Performance/content/QP/QP010-Triangulating-approximate-corruption-time.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonRestoreRequests point_in_time operation_details
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRestoreRequests
    ExecutedQuery: 'MonRestoreRequests

      | where restore_request_id contains "dfefeb33-f6b4-4a26-80d2-b2e7b2f8103d"

      | project TIMESTAMP, point_in_time, operation_details

      Non retriable error occurred while restoring backup with index 1 - 3634 The operating system returned the error ''86(The specified network password is not correct.)'' while attempting ''RestoreContainer::ValidateTargetForCreation'' on ''https://wasd2prodbrso1aprs1656.blob.core.windows.net/data-spartan-srv-sam-crmco-7b74b5d7-be6c-4892-ab6e-2868f5b470c0/data/1cdea2e0-97da-422b-97a0-e8b1af9f5e75_3.ndf''.'
- id: DB-performance-795
  Topic: QP010-Triangulating-approximate-corruption-time
  Source: TSG-SQL-DB-Performance/content/QP/QP010-Triangulating-approximate-corruption-time.md
  Prompts:
  - SQL DB restore status
  - SQL DB MonRestoreEvents originalEventTimestamp
  - SQL DB investigate restore
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: 'MonRestoreEvents

      | where restore_request_id == "c196a7ec-3706-42cd-902c-9c2fb5b8bfbf"

      | project originalEventTimestamp, message = coalesce(restore_database_progress, message)

      | where isnotempty(message)'
- id: DB-performance-796
  Topic: QP010-Triangulating-approximate-corruption-time
  Source: TSG-SQL-DB-Performance/content/QP/QP010-Triangulating-approximate-corruption-time.md
  Prompts:
  - SQL DB restore status
  - SQL DB MonRestoreEvents originalEventTimestamp
  - SQL DB investigate restore
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: 'MonRestoreEvents

      | where restore_request_id == "c196a7ec-3706-42cd-902c-9c2fb5b8bfbf"

      | where restore_database_progress has_any (''successfully verified'', ''failed to verify'', ''has failed verification'')

      | project originalEventTimestamp, restore_database_progress'
