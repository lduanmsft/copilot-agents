SqlSkills:
- id: DB-performance-62
  Topic: Potentially-Impacted-Customers
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/Potentially-Impacted-Customers.md
  Prompts:
  - SQL DB database metadata activity
  - SQL DB MonDatabaseMetadata LogicalServerName ClusterName
  - SQL DB investigate database metadata
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      | where TIMESTAMP > ago(2d)

      | where table_name == "syscolpars"

      | where logical_db_name !in ("msdb", "tempdb", "master", "model")

      | where isnotempty(collationid)

      | where collationid in (2051,2064,2065,2084,2091,2094,2095,65539,65552,65553,65572,65579,65582,65583,133168,133169,133170,133171,133172,133182,133184,196656,196657,196658,196659,196660,196670,196672,264256,264257,264258,264259,264260,264261,264262,264264,264265,327744,327745,327746,327747,327748,327749,327750,327752,327753,395336,395337,458824,458825)

      | summarize by LogicalServerName, logical_db_name, collationid, ClusterName

      | summarize count() by ClusterName

      | extend ClusterShortName = tostring(parsejson(extract(''(.*?)[.](.*)'', 2, tostring(ClusterName))))

      | project count_, ClusterShortName'
- id: DB-performance-280
  Topic: TSG-for-larger-than-4TB-support-on-Gen5-or-higher_
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/TSG-for-larger-than-4TB-support-on-Gen5-or-higher_.md
  Prompts:
  - SQL DB real time resource stats activity
  - SQL DB MonDmRealTimeResourceStats LogicalServerName
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where replica_type == 0 and originalEventTimestamp > ago(30m)

      | where LogicalServerName =~ "{ServerName}"

      and database_name =~ "{DatabaseName}"

      | summarize arg_max(originalEventTimestamp, AppName, NodeName, physical_database_guid, ClusterName, LogicalServerName, database_name)

      | extend checkMaxSizeCas = strcat("Get-FabricNode -NodeName ", NodeName,

      " -NodeClusterName ", ClusterName,

      " | Invoke-DbccCommand -AppName ", AppName,

      " -Command DBINFO -PhysicalDatabaseId ", physical_database_guid)

      | extend updateMaxSizeCas = strcat("Update-DatabaseMaxSizeInEngine -LogicalServerName \"", LogicalServerName,

      "\" -LogicalDatabaseName \"", database_name,

      "\" -PhysicalDatabaseId \"", physical_database_guid,

      "\" -DatabaseMaxSizeInBytes ", 5455872 * 1024 * 1024)

      | project AppName, checkMaxSizeCas, updateMaxSizeCas'
- id: DB-performance-783
  Topic: QP010-3-Correct-conversion-semantics-corruptions
  Source: TSG-SQL-DB-Performance/content/QP/QP010-3-Correct-conversion-semantics-corruptions.md
  Prompts:
  - SQL DB database metadata status
  - SQL DB MonDatabaseMetadata LogicalServerName TIMESTAMP
  - SQL DB investigate database metadata
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      | where TIMESTAMP > ago(1d)

      | where LogicalServerName == logical_server

      | where logical_db_name == logical_database

      | where table_name == "syscolpars"

      | where id == table_id

      | where binary_and(status, 16) == 16 // computed column

      | where binary_and(status, 64) == 0 // not persisted

      | distinct colid, name

      | join ('
- id: DB-performance-784
  Topic: QP010-3-Correct-conversion-semantics-corruptions
  Source: TSG-SQL-DB-Performance/content/QP/QP010-3-Correct-conversion-semantics-corruptions.md
  Prompts:
  - SQL DB database metadata status
  - SQL DB MonDatabaseMetadata LogicalServerName TIMESTAMP
  - SQL DB investigate database metadata
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      | where TIMESTAMP > ago(1d)

      | where LogicalServerName == logical_server

      | where logical_db_name == logical_database

      | where table_name == "sysiscols"

      | where idmajor == table_id

      | where idminor in ( index_ids )

      | distinct idminor, subid, intprop, tinyprop1, status

      ) on $left.colid == $right.intprop

      | extend column_id = colid

      | extend index_id = idminor

      | extend index_column_id = subid

      | extend key_ordinal = tinyprop1

      | extend is_included_column = (binary_and(status,16) == 16)

      | project column_id, index_id, index_column_id, key_ordinal, is_included_column, name'
- id: DB-performance-785
  Topic: QP010-3-Correct-conversion-semantics-corruptions
  Source: TSG-SQL-DB-Performance/content/QP/QP010-3-Correct-conversion-semantics-corruptions.md
  Prompts:
