- id: DB-performance-576
  Topic: Is-it-a-BC-candidate
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Is-it-a-BC-candidate.md
  Prompts:
  - SQL DB cloud database wait stats activity
  - SQL DB MonDmCloudDatabaseWaitStats database_name
  - SQL DB investigate cloud database wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: 'let wait_io_symptom = MonDmCloudDatabaseWaitStats

      | where LogicalServerName =~ "{ServerName}"

      | where database_name != ''master''

      | where end_utc_date >= p_start_incident and start_utc_date <= p_end_incident

      | where database_name =~ p_database

      | where delta_wait_time_ms > 1000

      | summarize hint.shufflekey=database_name sum(delta_wait_time_ms), sum(delta_signal_wait_time_ms), sum(delta_waiting_tasks_count)

      by TIMESTAMP = bin(end_utc_date, 15m), wait_type, database_name

      | extend avg_wait_ms = round(sum_delta_wait_time_ms * 1./ sum_delta_waiting_tasks_count, 2)

      | extend avg_signal_wait_ms = round(sum_delta_signal_wait_time_ms * 1. / sum_delta_waiting_tasks_count, 2)

      | where (wait_type in (''WRITELOG'', ''LOGBUFFER'', ''LATCH_EX'', ''IO_COMPLETION'') or wait_type startswith ''PAGEIOLATCH'' or wait_type contains "LOG_RATE")

      | extend bc = iff(

      ((sum_delta_wait_time_ms > 5*60*1000 and avg_wait_ms < 7) or (avg_wait_ms > 20 and sum_delta_wait_time_ms > 5000))

      and (wait_type in (''WRITELOG'', ''LOGBUFFER'') or wait_type startswith ''PAGEIOLATCH'' or wait_type contains "LOG_RATE"), 1, 0)

      // | where bc == 1

      | summarize hint.shufflekey=database_name samples = count()

      , bc = sum(bc)

      , waits = makeset(wait_type)

      , argmax(sum_delta_wait_time_ms, avg_wait_ms, avg_signal_wait_ms, wait_type)

      , argmax(avg_wait_ms, avg_wait_ms, avg_signal_wait_ms, wait_type)

      , argmax(sum_delta_waiting_tasks_count, avg_wait_ms, avg_signal_wait_ms, wait_type)'
- id: DB-performance-592
  Topic: Script-for-Singleton-set-tier-if-fails-set-database
  Source: TSG-SQL-DB-Performance/content/IORG/RemoteStorage/Script-for-Singleton-set-tier-if-fails-set-database.md
