SqlSkills:
- id: DB-performance-9
  Topic: CPU-Pressure-Detection
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Archive/CPU-Pressure-Detection.md
  Prompts:
  - SQL DB deadlock analysis
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB troubleshoot deadlock
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let PositiveSlopeRQ = cluster(_clusterName).database(''sqlazure1'').MonSqlRgHistory

      | where event == ''scheduler_data_snapshot''

      | where LogicalServerName == _serverName

      | where TIMESTAMP between (_startTime .. _endTime)

      | summarize sum(delta_total_signal_wait_time_ms), sum(runnable_tasks_count), sum(current_workers_count), sum(ideal_workers_limit) by AppName, NodeName, LogicalServerName, bin (TIMESTAMP, 1m)

      | sort by AppName, TIMESTAMP asc

      | extend prev_sum_runnable_tasks = prev(sum_runnable_tasks_count)

      | extend prev_sum_total_signal_wait_time_ms = prev(sum_delta_total_signal_wait_time_ms)

      | extend eqn = case((prev_sum_runnable_tasks <= sum_runnable_tasks_count) and

      (prev_sum_total_signal_wait_time_ms <= sum_delta_total_signal_wait_time_ms) and

      (prev(AppName) == AppName) and (prev(LogicalServerName) == LogicalServerName), 1, 0)

      | extend consecutive_violation = row_cumsum(eqn, eqn != prev(eqn))

      | summarize max(consecutive_violation) by AppName, LogicalServerName, bin (TIMESTAMP,15m)

      | extend percent_runnable_queue_pressure = max_consecutive_violation * 100 / 15

      | where percent_runnable_queue_pressure > 80

      | extend GradualViolation = strcat("Gradual Increase Runnable Queue = ", percent_runnable_queue_pressure, " %")

      | project TIMESTAMP, LogicalServerName, AppName, GradualViolation;

      let WorkersUsed = cluster(_clusterName).database(''sqlazure1'').MonSqlRgHistory

      | where event == ''scheduler_data_snapshot''

      | where LogicalServerName == _serverName

      | where TIMESTAMP between (_startTime .. _endTime)

      | summarize sum(current_workers_count), sum(ideal_workers_limit) by AppName, LogicalServerName, NodeName, bin (TIMESTAMP, 1m)

      | extend workers_used_percent = (sum_current_workers_count * 100) / sum_ideal_workers_limit

      | summarize max(workers_used_percent) by AppName, LogicalServerName, NodeName, bin (TIMESTAMP,15m)

      | where max_workers_used_percent > 80

      | extend HighWorkersViolation = strcat("High Workers Used = ", max_workers_used_percent, " %")

      | project TIMESTAMP, AppName, LogicalServerName, NodeName, HighWorkersViolation;

      let HighLoad = cluster(_clusterName).database(''sqlazure1'').MonSqlRgHistory

      | where event == ''scheduler_data_snapshot''

      | where TIMESTAMP between (_startTime .. _endTime)

      | summarize max(load_factor) by AppName, LogicalServerName, NodeName, bin (TIMESTAMP, 1m)

      | summarize min(max_load_factor), avg(max_load_factor), max(max_load_factor) by AppName, LogicalServerName, NodeName, bin(TIMESTAMP, 15m)

      | where max_max_load_factor > 10 * min_max_load_factor and avg_max_load_factor > 0.3 * max_max_load_factor

      | extend HighLoadViolation = strcat("High Load = ", max_max_load_factor)

      | project TIMESTAMP, LogicalServerName, AppName, HighLoadViolation;

      let HighSpikeRq = cluster(_clusterName).database(''sqlazure1'').MonSqlRgHistory

      | where event == ''scheduler_data_snapshot''

      | where LogicalServerName == _serverName

      | where TIMESTAMP between (_startTime .. _endTime)

      | summarize sum(runnable_tasks_count)  by AppName, LogicalServerName, NodeName, bin (TIMESTAMP, 1m)

      | summarize min(sum_runnable_tasks_count), avg(sum_runnable_tasks_count), max(sum_runnable_tasks_count) by AppName, LogicalServerName, NodeName, bin(TIMESTAMP, 15m)

      | where max_sum_runnable_tasks_count > 10 * min_sum_runnable_tasks_count and min_sum_runnable_tasks_count > 20 and avg_sum_runnable_tasks_count > 0.3 * max_sum_runnable_tasks_count

      | extend HighSpikeRqViolation = strcat("Sudden Increase 10x Runnable Queue", max_sum_runnable_tasks_count / min_sum_runnable_tasks_count, " x")

      | project TIMESTAMP, LogicalServerName, AppName, HighSpikeRqViolation;

      let CPUUtilization = cluster(_clusterName).database(''sqlazure1'').MonResourcePoolStats

      | summarize avg(avg_cpu_percent), avg(avg_instance_cpu_percent) by LogicalServerName, AppName, bin(TIMESTAMP, 15m);

      let RqViolation = PositiveSlopeRQ

      | join kind = fullouter HighSpikeRq on TIMESTAMP, AppName;

      let RunnableQPressure = WorkersUsed

      | join kind = inner RqViolation on TIMESTAMP, LogicalServerName, AppName

      | join kind = leftouter HighLoad on TIMESTAMP, LogicalServerName, AppName

      // | join kind = inner CPUUtilization on TIMESTAMP, LogicalServerName, AppName

      | project TIMESTAMP, LogicalServerName, AppName, HighWorkersViolation, GradualViolation, HighLoadViolation, HighSpikeRqViolation;//, avg_cpu_percent = avg_avg_cpu_percent, avg_instance_cpu_percent
      = avg_avg_instance_cpu_percent;

      let VCores = materialize (cluster(_clusterName).database(''sqlazure1'').MonDmRealTimeResourceStats

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | join kind = inner(RunnableQPressure) on LogicalServerName, AppName

      | summarize min(cpu_cap_in_sec) by bin (TIMESTAMP, 15m));

      let RQPSpinlock = cluster(_clusterName).database(''sqlazure1'').MonDmOsSpinlockStats

      | where TIMESTAMP between (_startTime.._endTime)

      | where LogicalServerName == _serverName

      | summarize sum(delta_spins) by bin(TIMESTAMP, 15m), AppName, LogicalServerName

      | join kind=leftouter (VCores) on TIMESTAMP

      | extend spins_per_ms_vcore = (sum_delta_spins / (900 * 1000 * min_cpu_cap_in_sec))

      | extend violation = spins_per_ms_vcore  > 20000

      | extend vcores = min_cpu_cap_in_sec

      | join kind= inner (RunnableQPressure) on $left.LogicalServerName == $right.LogicalServerName,

      $left.AppName == $right.AppName, TIMESTAMP

      | join kind = leftouter (

      cluster(_clusterName).database(''sqlazure1'').MonSqlRmRingBuffer

      | where TIMESTAMP between (_startTime .. _endTime)

      | where LogicalServerName == _serverName

      | where event has_any ("nonyield", "deadlock")

      | summarize non_yield_deadlock_count = count() by LogicalServerName, AppName, bin (TIMESTAMP, 15m)

      ) on LogicalServerName, AppName;

      cluster(_clusterName).database(''sqlazure1'').MonSqlRgHistory

      | where TIMESTAMP between (_startTime.._endTime)

      | where event =~ ''aggregated_resource_pools_plus_history''

      | extend TIMESTAMP = end_aggregated_sample

      | extend pool_type = iff(pool_name == ''SloSharedPool1'', ''User Pool'', ''System Pool'')

      | summarize delta_total_cpu_usage_ms = sum(delta_total_cpu_usage_ms), start_aggregated_sample = min(start_aggregated_sample), end_aggregated_sample = max(end_aggregated_sample)

      by TIMESTAMP = bin(end_aggregated_sample, 15m), pool_name, AppName, LogicalServerName

      | extend avg_cores_sec = delta_total_cpu_usage_ms/((end_aggregated_sample-start_aggregated_sample)/1ms)

      | project-away delta_total_cpu_usage_ms

      | lookup kind=leftouter (VCores) on TIMESTAMP

      | extend PercentCPU = round(100.0*avg_cores_sec/min_cpu_cap_in_sec,3)

      | project TIMESTAMP, pool_name, PercentCPU, LogicalServerName, AppName

      | join kind=inner(RQPSpinlock) on TIMESTAMP, LogicalServerName, AppName

      | project TIMESTAMP, LogicalServerName, AppName, PercentCPU, pool_name, spins_per_ms_vcore, GradualViolation, HighWorkersViolation, HighLoadViolation, HighSpikeRqViolation, non_yield_deadlock_count'
