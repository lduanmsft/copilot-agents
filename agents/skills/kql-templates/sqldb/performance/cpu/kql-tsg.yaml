- id: DB-performance-861
  Topic: High_CPU_Azure_Profiler_Collection
  Source: TSG-SQL-DB-Performance/content/SOS/Scheduler/High_CPU_Azure_Profiler_Collection.md
  Prompts:
  - SQL DB SQL system health status
  - SQL DB SQL system health is_success event LogicalServerName
  - SQL DB investigate datetime
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'let _ServerName = ''sqlneufpsec'';

      let _startTime = datetime(2025-03-17T08:00:00Z);

      let _endTime = datetime(2025-03-17T14:00:00Z);

      let _AppName = "{AppName}";

      let _NodeName = "{NodeName}";

      let _clusterName= toscalar(MonSQLSystemHealth

      | where LogicalServerName == _ServerName

      | where TIMESTAMP between (_startTime .. _endTime)

      | where AppName == _AppName and NodeName == _NodeName

      | distinct ClusterName

      | take 1);

      let rg_server_traces = MonRgManager

      | where event == ''rg_process_azure_profiler_request''

      | where TIMESTAMP between (_startTime - 5m .. _endTime + 5m)

      | where application_name has _AppName and ClusterName == _clusterName and NodeName == _NodeName

      | extend trace_name = tostring(split(message, ":", 1)[0])

      | where is_success

      | project TIMESTAMP, ClusterName, NodeName, trace_name;

      let node_agent_traces = MonManagement

      | where event =~ "cas_workflow_take_azure_profiler_trace_complete"

      | where TIMESTAMP between (_startTime - 5m .. _endTime + 5m)

      | where ring_name == _clusterName and node_name == _NodeName

      | extend ClusterName = ring_name

      | extend NodeName = node_name

      | extend trace_name = strcat(_NodeName,"_",_clusterName)

      | project TIMESTAMP, ClusterName, NodeName, trace_name;'
