- id: DB-performance-331
  Topic: CPU104-Scheduler-Imbalances
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/CPU/CPU104-Scheduler-Imbalances.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event AppName NodeName ClusterName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > startTime and TIMESTAMP < endTime

      | where ClusterName == clusterFilter and NodeName contains nodeFilter

      | where event == "node_info"

      | extend cpuLoadPerCore = parsejson(cpu_total_load_cap).CPULoadPerCore

      | project ClusterName, NodeName, TIMESTAMP=originalEventTimestampTo, AppName, cpuLoadPerCore, process_id

      | order by TIMESTAMP desc

      | mvexpand cpuLoadPerCore

      | extend rg_core_index = toint(cpuLoadPerCore[0])

      | extend pg_index = rg_core_index / CoresInPG, core_index = rg_core_index % CoresInPG

      | extend numApps = toint(ceiling(cpuLoadPerCore[1] / 100.0))

      | extend avgCpuUsage = toint(cpuLoadPerCore[3])

      | extend currentCpuUsage = toint(cpuLoadPerCore[4])

      | extend kernelUsage = toint(cpuLoadPerCore[5])

      | join kind= inner Core_Ids on ClusterName, NodeName, rg_core_index

      | project-away cpuLoadPerCore, ClusterName1, NodeName1, rg_core_index1 // project after this line to see raw numbers as opposed to graph

      // | where rg_core_index in (rg_coreFilter) // uncomment this line to use rg_coreFilter

      | summarize avgCpuUsage=avg(avgCpuUsage) by bin(TIMESTAMP, 1m), x=strcat(NodeName, "_core", rg_core_index, "_numApps", numApps)

      | where avgCpuUsage > 0

      | render timechart'
- id: DB-performance-439
  Topic: Tuple-Mover-Activity
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/Other-Waits-and-Issues/Tuple-Mover-Activity.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonApollo database_name LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonApollo
    ExecutedQuery: 'MonApollo

      | where LogicalServerName =~ serverName and database_name =~ dbName

      | where originalEventTimestamp between(RequestStartTimeWithAdditionalTimeToObserve..RequestEndTimeWithAdditionalTimeToObserve)

      | where

      event == ''columnstore_tuple_mover_compression_stats'' or

      event == "columnstore_rowgroup_merge_complete" or

      event == "columnstore_tuple_mover_end_compress" or

      event == "columnstore_rowgroup_merge_failed"

      | extend failed_merge=iff(event == "columnstore_rowgroup_merge_failed",1,0)

      | extend tm_work_end_time = originalEventTimestamp

      | extend tm_work_start_time = case(

      event == "columnstore_rowgroup_merge_complete", datetime_add(''Microsecond'', -cpu_time, originalEventTimestamp),

      event == "columnstore_tuple_mover_end_compress", datetime_add(''Millisecond'', -duration, originalEventTimestamp),

      event == ''columnstore_tuple_mover_compression_stats'', datetime_add(''Millisecond'', -duration, originalEventTimestamp)'
