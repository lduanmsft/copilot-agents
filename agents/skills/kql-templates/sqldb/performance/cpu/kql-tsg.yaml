- id: DB-performance-314
  Topic: CPU001-CPU-Troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/CPU/CPU001-CPU-Troubleshooting.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonDmDbHadrReplicaStates LogicalServerName
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbHadrReplicaStates
    ExecutedQuery: 'MonDmDbHadrReplicaStates

      | where LogicalServerName =~ "{LogicalServerName}" and logical_database_name =~ "{LogicalDatabaseName}"

      | where is_primary_replica == 1

      | where AppName notcontains "b-"

      | order by TIMESTAMP asc nulls first

      | serialize

      | extend prevNodeName=prev(NodeName)

      | extend nextNodeName = next(NodeName)

      | extend isFirst= (NodeName != prevNodeName)

      | extend isLast=(NodeName != nextNodeName)

      | where isFirst == true or isLast == true

      | extend EndTime=next(TIMESTAMP)

      | extend StartTime=TIMESTAMP

      | where isFirst ==true

      | extend codeversion=extract("^(.*)-WASD", 1, code_package_version)

      | extend PrimaryNodeName=NodeName, PrimaryNodeFirstAppearTime=StartTime, PrimaryNodeLastAppearTime=EndTime

      | extend fake="fake"

      | project ClusterName, LogicalServerName, logical_database_name, PrimaryNodeName, AppName, PrimaryNodeFirstAppearTime, PrimaryNodeLastAppearTime, codeversion, fake, primary_group_database_id=group_database_id'
- id: DB-performance-316
  Topic: CPU001-CPU-Troubleshooting
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/Self-Help-TSGs/CPU/CPU001-CPU-Troubleshooting.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonSqlRgHistory event LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      |where event == ''aggregated_workload_groups_plus_history''

      | where AppName == "{AppName}" and NodeName =~ "{NodeName}" // and LogicalServerName =~ "{LogicalServerName}"

      | where end_aggregated_sample >= datetime({StartTime}) and end_aggregated_sample <= datetime({EndTime})

      //| where group_name contains "{rgGroupPrefix}" or ( "{rgGroupPrefix}" == "SloPri" and group_name contains "UserPrimaryGroup" )

      //| where group_name contains "UserPrimaryGroup"

      // or ( "{rgGroupPrefix}" == "SloSec" and group_name contains "UserSecondaryGroup" )

      | where delta_total_cpu_usage_ms <> total_cpu_usage_ms

      | project end_utc_date = end_aggregated_sample , name = group_name , start_utc_date = start_aggregated_sample , delta_total_cpu_usage_ms, delta_total_request_count, active_request_count = active_request_count_max
      , active_session_count = active_session_count_max , delta_writes_completed_total, delta_reads_completed_total,

      delta_log_bytes_used_total, delta_log_temp_db_bytes_used_total, used_databasepages_kb = 0 , physical_database_name

      | extend duration = (end_utc_date - start_utc_date)/time(1s)

      | extend CpuCoreUsage = (delta_total_cpu_usage_ms/1000.0)/ duration

      | extend TotalRequests = (delta_total_request_count *1.0) /1.0

      | extend ActiveRequests = (active_request_count *1.0) /1.0

      | extend ActiveSessions = (active_session_count *1.0) /1.0

      | extend TotalIOPS = ((delta_reads_completed_total + delta_writes_completed_total)*1.0)/duration

      | extend ReadIOPS = (delta_reads_completed_total*1.0)/duration

      | extend WriteIOPS = (delta_writes_completed_total*1.0)/duration

      | extend LogKbps = (delta_log_bytes_used_total)/(1024.0*duration)

      | extend TempDbLogKbps = (delta_log_temp_db_bytes_used_total)/(1024.0*duration)

      | extend UsedDatabasePagesMb = used_databasepages_kb*1.0/(1024)

      | top-nested of bin(end_utc_date, 5min) by avg(CpuCoreUsage), top-nested 5 of name by avg_cpucoreusage=avg(CpuCoreUsage) desc

      | order by end_utc_date desc

      //| project end_utc_date, name, CpuCoreUsage, TotalIOPS, ReadIOPS, WriteIOPS, LogKbps, TempDbLogKbps, TotalRequests, ActiveRequests, ActiveSessions, UsedDatabasePagesMb

      //| project end_utc_date, CpuCoreUsage, name

      | project end_utc_date, avg_cpucoreusage, name

      | render timechart'
