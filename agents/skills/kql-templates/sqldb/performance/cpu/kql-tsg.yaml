- id: DB-performance-213
  Topic: Kusto-Queries-for-Perf
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/Kusto-Queries-for-Perf.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonDmOsSpinlockStats LogicalServerName AppName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsSpinlockStats
    ExecutedQuery: 'MonDmOsSpinlockStats


      | where TIMESTAMP &gt;= datetime({StartTime}) and TIMESTAMP &lt;= datetime({EndTime})


      | where LogicalServerName =~ "{LogicalServerName}" and AppName =~ "{AppName}" and NodeName =~ "{NodeName}"


      | summarize sum(delta_spins) by name


      | extend elapsed_second = datetime_diff (''second'', datetime({EndTime}), datetime({StartTime}))


      | extend delta_spins_per_sec_per_cpu=round((sum_delta_spins*1.0)/(elapsed_second*cpu_cap_in_sec),0)


      | top 10 by delta_spins_per_sec_per_cpu desc nulls last


      | project name, delta_spins_per_sec_per_cpu


      | order by delta_spins_per_sec_per_cpu desc nulls last


      | render columnchart <tr class="even">//*

      '
- id: DB-performance-250
  Topic: PERFTS004-CPU-tab
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/PERFTS004-CPU-tab.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonDmRealTimeResourceStats database_name
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: '| summarize delta_total_cpu_usage_ms=sum(delta_total_cpu_usage_ms), start_aggregated_sample=min(start_aggregated_sample), end_aggregated_sample=max(end_aggregated_sample) by TIMESTAMP=bin
      (end_aggregated_sample, aggInterval_doNOTchange), group_name

      | extend avg_cores_sec=delta_total_cpu_usage_ms/((end_aggregated_sample-start_aggregated_sample)/1ms)

      | project-away delta_total_cpu_usage_ms

      | lookup kind=leftouter let aggInterval_doNOTchange= time(15m) ;

      let cap_interval=materialize(MonDmRealTimeResourceStats

      | where AppName !startswith ''b-'' and AppName !startswith ''v-''

      | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | where TIMESTAMP >= ago({TimeRange}) and TIMESTAMP <= now()

      | where replica_type == 0

      | summarize min(cpu_cap_in_sec) by bin (TIMESTAMP,aggInterval_doNOTchange));'
- id: DB-performance-251
  Topic: PERFTS004-CPU-tab
  Source: TSG-SQL-DB-Performance/content/Common-Perf-Queue-TSGs/CRI-Flowchart/PERFTS004-CPU-tab.md
  Prompts:
  - SQL DB rg history analysis
  - SQL DB MonSqlRgHistory event AppName NodeName ClusterName
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where AppName !startswith ''b-'' and AppName !startswith ''v-''

      |where event == ''aggregated_workload_groups_plus_history''

      | extend TIMESTAMP = end_aggregated_sample

