- id: DB-performance-668
  Topic: AzureProfiler
  Source: TSG-SQL-DB-Performance/content/Predictable-Performance/AzureProfiler.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName TIMESTAMP allocated_cpus
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(1h)

      | where event =="instance_load" and code_package_name == "Code" and service_manifest_name == "SQL"

      | where application_name == "fabric:/Worker.ISO/b47d5d0aeb96"

      | summarize by application_name, NodeName, allocated_cpus

      | extend CPUS = parse_json(allocated_cpus)

      | extend G0 = toint(CPUS.Group0)

      | extend G1 = toint(CPUS.Group1)

      | extend CPU = range(0,39)

      | mv-expand CPU

      | extend bits = tolong(exp2(toint(CPU)))

      | extend G0_unmaskedCPU = binary_and(G0, bits) > 0

      | extend G1_unmaskedCPU = binary_and(G1, bits) > 0

      | summarize Group_0 = make_list_if(CPU , G0_unmaskedCPU), Group_1 = make_list_if(CPU+40 , G1_unmaskedCPU) by application_name, NodeName, allocated_cpus

      | extend Group_0 = tostring(Group_0), Group_1 = tostring(Group_1)'
