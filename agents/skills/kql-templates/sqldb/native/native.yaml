- id: DB-native-33
  Topic: mitigate-capacity-pressure
  Source: TSG-SQL-DB-Native/TSG/tsgs/capacity/mitigate-capacity-pressure.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonCapacityTenantSnapshot event PreciseTimeStamp
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCapacityTenantSnapshot
    ExecutedQuery: "let SingleCluster = (clstr: string){\ncluster(clstr).database(\"sqlazure1\").MonCapacityTenantSnapshot\n| where TIMESTAMP > ago(2h)\n| where placement_preference_tag == \"TridentNative\"\n| summarize by tenant_ring_name\n| join kind = innerunique (cluster(clstr).database(\"sqlazure1\").MonClusterLoad\n| where PreciseTimeStamp >= ago(2h)\n//| where tenant_ring_name == \"tr2428.useuapeast2-a.worker.database.windows.net\"\n| where event ==  'tenant_ring_capacity_report'\n| where metric_name in ('AppCpuUsage','AppMemoryUsageMB','StaticMCU','InstanceDiskSpaceUsed','MaxCpuUsage')\n| where capacity_report_type in ('Used', 'WinfabTotal') and isempty(role_name)\n| project originalEventTimestamp, tenant_ring_name, aggregated_capacity, capacity_report_type, metric_name\n| summarize arg_max(originalEventTimestamp, aggregated_capacity) by ts = bin(originalEventTimestamp, 15m), tenant_ring_name, capacity_report_type, metric_name\n| project ts, tenant_ring_name, metric_report_type = strcat(metric_name, '_', capacity_report_type), aggregated_capacity\n| evaluate pivot(metric_report_type, sum(aggregated_capacity), ts, tenant_ring_name)\n| extend UsedStaticMcu = StaticMCU_Used, TotalStaticMcu = StaticMCU_WinfabTotal,\nUsedIdsu = InstanceDiskSpaceUsed_Used, TotalIdsu = InstanceDiskSpaceUsed_WinfabTotal,\nUsedCPU = AppCpuUsage_Used, TotalCPU = AppCpuUsage_WinfabTotal,\nUsedMemoryMB = AppMemoryUsageMB_Used, TotalMemoryMB = AppMemoryUsageMB_WinfabTotal, d_tenant_ring_name = tenant_ring_name\n| where d_tenant_ring_name == \"tr3232.indiacentral1-a.worker.database.windows.net\"\n| project now(), d_tenant_ring_name, UsedStaticMcu, TotalStaticMcu,UsedIdsu, TotalIdsu, UsedCPU, TotalCPU,UsedMemoryMB, TotalMemoryMB) on $left.tenant_ring_name == $right.d_tenant_ring_name\n| project now(), d_tenant_ring_name, m_CPUUtil = tolong(round(100.0 * UsedCPU/TotalCPU)), m_MemoryUtil = tolong(round(100.0 * UsedMemoryMB/TotalMemoryMB)), m_DiskUtil = tolong(round(100.0 * UsedIdsu/TotalIdsu)), tolong(m_StaticCPUUtil = round(100.0 * UsedStaticMcu/TotalStaticMcu))\n//| take 10\n};_ExecuteForProdAndStageClusters()\n+ \tCheck the dashboard below to see if there is a spike in CPU, Memory or Disk utilization."
