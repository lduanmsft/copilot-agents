    ExecutedQuery: 'let region = "westus";

      let startTime = ago({TimeRange});

      let endTime = now();

      cluster("https://pbipam.kusto.windows.net").database("pbip").table("StandardizedServerReporting")

      | union cluster("https://pbipapac.kusto.windows.net").database("pbip").table("StandardizedServerReporting")

      | union cluster("https://pbipeu.kusto.windows.net").database("pbip").table("StandardizedServerReporting")

      | union cluster("https://pbipafrica.southafricanorth.kusto.windows.net").database("pbip").table("StandardizedServerReporting")

      | union cluster("https://pbipuk.uksouth.kusto.windows.net").database("pbip").table("StandardizedServerReporting")

      | union cluster("https://pbipinternal.kusto.windows.net").database("pbip").table("StandardizedServerReporting")

      | union cluster("https://pbipkustppe.kusto.windows.net").database("pbipppe").table("StandardizedServerReporting")

      | where TIMESTAMP >= startTime and TIMESTAMP <= endTime

      | where ActivityStatus == "Succeeded"

      | where DurationMs between (90000 .. 100000)

      | where Region has region

      | where OriginatingService has "SQLDbNative"

      | where ActivityName contains "CreateDatabase"'
- id: DB-native-81
  Topic: database-provisioning-latency-analysis-from-reliability-dashboard
  Source: TSG-SQL-DB-Native/TSG/tsgs/crud/database-provisioning-latency-analysis-from-reliability-dashboard.md
  Prompts:
  - SQL DB management resource provider latency
  - SQL DB MonManagementResourceProvider event ClusterName
  - SQL DB troubleshoot management resource provider latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementResourceProvider
    ExecutedQuery: 'let startTime = ago({TimeRange});

      let endTime = now();

      cluster(sqlKustoCluster).database(sqlKustoDb).MonManagementResourceProvider

      | where ClusterName contains sqlClusterFilterStr

      | where originalEventTimestamp > startTime and originalEventTimestamp < endTime

      | where event == "arm_operation_begin"

      | where (request_url contains "renzo-srv-" or request_url contains "fleet-srv-")and http_verb == "PUT"

      | where resource_type == "Databases"

      | parse extra_parameters with "ElasticPoolId\": \""poolid"\","*

      | parse extra_parameters with "artifactId\": \""artifactId"\","*

      | parse extra_parameters with "tenantId\": \""tenantId"\","*

      | extend poolName = tostring(split(poolid, "/")[10])

      | project originalEventTimestamp, ClusterName, db_request_id = request_id, tenantId, artifactId, serverName=logical_server_name, poolName, logical_database_name

      | join (

      cluster(sqlKustoCluster).database(sqlKustoDb).MonManagementOperations

      | where ClusterName contains sqlClusterFilterStr

      | where originalEventTimestamp > startTime and originalEventTimestamp < endTime

      | where operation_parameters contains \"{ServerName}\" or operation_parameters contains \"{ServerName}\"

      | where event in ("management_operation_start", "management_operation_success")

      | where operation_type == "CreateLogicalDatabase"

      | extend startTime = iff(event == "management_operation_start", originalEventTimestamp, datetime(null)), endTime = iff(event == "management_operation_success", originalEventTimestamp, datetime(null))

      | parse operation_parameters with "LogicalServerName>"serverName"</LogicalServerName"*

      | parse operation_parameters with "<DatabaseName>"dbName"</DatabaseName>"*

      | summarize db_start_time = max(startTime), db_end_time = max(endTime), db_create_duration_ms = max(elapsed_time_milliseconds) by db_request_id = request_id, dbName, serverName

      ) on db_request_id, serverName

      | join kind=leftouter (

      cluster(sqlKustoCluster).database(sqlKustoDb).MonManagementOperations

      | where ClusterName contains sqlClusterFilterStr

      | where originalEventTimestamp > startTime and originalEventTimestamp < endTime

      | where operation_parameters contains \"{ServerName}\" or operation_parameters contains \"{ServerName}\"

      //         | where operation_type == "CreateLogicalElasticPool"

      | parse operation_parameters with "<Name>"poolName"</Name>"*

      | parse operation_parameters with "LogicalServerName>"serverName"</LogicalServerName"*

      | extend startTime = iff(event == "management_operation_start", originalEventTimestamp, datetime(null)), endTime = iff(event == "management_operation_success", originalEventTimestamp, datetime(null))

      | summarize pool_start_time = max(startTime), pool_end_time = max(endTime), pool_create_duration_ms = max(elapsed_time_milliseconds) by pool_request_id = request_id, poolName, serverName

      ) on serverName, poolName

      | join kind=leftouter (

      cluster(sqlKustoCluster).database(sqlKustoDb).MonManagement

      | where ClusterName contains sqlClusterFilterStr

      | where originalEventTimestamp > startTime and originalEventTimestamp < endTime

      | where event == "fsm_creating_state_machine" and state_machine_type == "MoveElasticPoolBetweenServersRequestStateMachine"

      | project moveOperationKeys = keys, pool_request_id = request_id

      ) on pool_request_id

      | join (

      cluster(mwcKustoCluster).database(mwcKustoDb).'
- id: DB-native-82
  Topic: database-provisioning-latency-analysis-from-reliability-dashboard
  Source: TSG-SQL-DB-Native/TSG/tsgs/crud/database-provisioning-latency-analysis-from-reliability-dashboard.md
  Prompts:
  - SQL DB renzo cp latency
  - SQL DB MonSqlRenzoCp database_name ClusterName
  - SQL DB troubleshoot renzo cp latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRenzoCp
    ExecutedQuery: '| where TIMESTAMP >= startTime and TIMESTAMP <= endTime

      | where MarkerName has_any ("FleetManagement.CreateDatabaseAsync", "RenzoClient.CreateDatabaseAsync","RenzoClient.GetFleetspaceAsync")

      | extend artifactId = tostring(ExecutionContext.ArtifactObjectID), TenantId=tostring(ExecutionContext.CustomerTenantId), CapacityId=tostring(ExecutionContext.CustomerCapacityObjectId),

      WorkspaceId=tostring(ExecutionContext.WorkspaceObjectId)

      | extend mwc_request_start = iff(MessageText contains "Monitored scope start." and MarkerName has "FleetManagement.CreateDatabaseAsync", PreciseTimeStamp, datetime(null))

      | extend mwc_get_fleetspace_start  = iff(MessageText contains "Monitored scope start." and MarkerName has "RenzoClient.GetFleetspaceAsync", PreciseTimeStamp, datetime(null))

      | extend mwc_create_db_start = iff(MessageText contains "Monitored scope start." and MarkerName has "RenzoClient.CreateDatabaseAsync", PreciseTimeStamp, datetime(null))

      | extend mwc_create_db_end = iff(MessageText contains "Monitored scope end" and MarkerName has "RenzoClient.CreateDatabaseAsync", PreciseTimeStamp, datetime(null))

      | extend duration_ms = iff(MessageText contains "Monitored scope end" and MarkerName has "FleetManagement.CreateDatabaseAsync", toreal(DurationMs), 0.0)

      | extend mwc_request_end = iff(MessageText contains "Monitored scope end" and MarkerName has "FleetManagement.CreateDatabaseAsync", PreciseTimeStamp, datetime(null))

      | extend mwc_request_end_string_timestamp = iff(MessageText contains "Monitored scope end" and MarkerName has "FleetManagement.CreateDatabaseAsync", OriginalTimestamp, "null")

      | summarize mwc_request_start=max(mwc_request_start), mwc_get_fleetspace_start=max(mwc_get_fleetspace_start), mwc_create_db_start= max(mwc_create_db_start), mwc_create_db_end=max(mwc_create_db_end),

      mwc_request_end = max(mwc_request_end), mwc_duration_ms = max(duration_ms) by RolloutFQDN, artifactId, TenantId, CapacityId, WorkspaceId

      ) on artifactId

      | join

      (

      cluster(sqlKustoCluster).database(sqlKustoDb).MonSqlRenzoCp

      | where ClusterName contains sqlClusterFilterStr

      | where originalEventTimestamp > startTime and originalEventTimestamp < endTime

      | where display_name == "CreateOrUpdate"

      | extend tags=parse_json(tags)

      | extend database_name = tostring(tags.databaseName), request_id = tostring(tags.requestId)

      | where database_name != ""

      | join kind=leftouter (

      cluster(sqlKustoCluster).database(sqlKustoDb).MonAnalyticsDBSnapshot

      | where TIMESTAMP > ago(7d)

      | where isnotempty(trident_artifact_id)

      | summarize ArtifactId = take_any(trident_artifact_id) by logical_database_name

      ) on $left.database_name == $right.logical_database_name

      | project trace_id, ArtifactId, database_name

      | join

      (

      cluster(sqlKustoCluster).database(sqlKustoDb).MonSqlRenzoCp

      | where originalEventTimestamp > startTime and originalEventTimestamp < endTime

      | where display_name == "IslandRequest"

      | extend operationTags=parse_json(tags)

      | where operationTags.eventName == "OperationCompleteEvent"

      | extend renzo_cp_end = originalEventTimestamp

      | project trace_id, renzo_cp_end

      ) on $left.trace_id == $right.trace_id

      | join

      (

      cluster(sqlKustoCluster).database(sqlKustoDb).MonSqlRenzoTraceEvent

      | where ClusterName contains sqlClusterFilterStr

      | where PreciseTimeStamp > startTime and PreciseTimeStamp < endTime

      | extend customObj = todynamic(customDimensions)

      | extend WorkType = tostring(customObj.WorkType), WorkId = tostring(customObj.WorkId)

      | where WorkType in ("CreateDatabase", "CreateDatabasePool", "CreateOrUpdate")

      | parse message with "Database "renzo_srv_db" is being created via ManagementClient..."*

      | extend db_create_start=iff(message contains "is being created via ManagementClient" and renzo_srv_db != "", PreciseTimeStamp, datetime(null))

      | summarize min(PreciseTimeStamp), max(PreciseTimeStamp), max(db_create_start), duration = max(PreciseTimeStamp)-min(PreciseTimeStamp) by WorkType,  activityId, correlationId

      | extend pool_create_start = iff(WorkType == "CreateDatabasePool", min_PreciseTimeStamp, datetime(null)), pool_create_end = iff(WorkType == "CreateDatabasePool", max_PreciseTimeStamp, datetime(null)),

      pool_create_duration_ms=iff(WorkType == "CreateDatabasePool", duration/1ms, real(0)),

      db_create_start = max_db_create_start,

      db_create_end = iff(WorkType == "CreateDatabase" or WorkType == "CreateOrUpdate", max_PreciseTimeStamp, datetime(null)),

      db_create_duration_ms=iff(WorkType == "CreateDatabase" or WorkType == "CreateOrUpdate", duration/1ms, real(0))

      | summarize renzo_pool_create_start = max(pool_create_start), renzo_pool_create_end = max(pool_create_end), renzo_pool_create_duration_ms = max(pool_create_duration_ms),

      renzo_db_create_start = max(db_create_start), renzo_db_create_end = max(db_create_end), renzo_db_create_duration = max(db_create_duration_ms) by correlationId=tostring(split(correlationId, "_")[0])

      ) on $left.trace_id == $right.correlationId

      ) on $left.artifactId == $right.ArtifactId and $left.logical_database_name == $right.database_name

      | project RolloutFQDN, tenantId, artifactId, serverName, logical_database_name, consumed_from_cache = moveOperationKeys != "", mwc_get_fleetspace_start, mwc_request_start, mwc_create_db_start,

      renzo_pool_create_start, pool_start_time, pool_end_time, renzo_pool_create_end,

      renzo_db_create_start, db_start_time, db_end_time, renzo_db_create_end, renzo_cp_end,

      mwc_create_db_end, mwc_request_end

      | project sqlClusterFilterStr, RolloutFQDN, tenantId, artifactId, serverName, logical_database_name, consumed_from_cache, mwc_request_start,

      mwc_start_to_end = mwc_request_end-mwc_request_start,

      mwc_start_to_renzo_end = renzo_cp_end - mwc_request_start,

      mwc_get_fleetspace_start_offset = mwc_get_fleetspace_start-mwc_request_start,

      mwc_create_db_start_offset = mwc_create_db_start-mwc_request_start,

      renzo_pool_create_start_offset = renzo_pool_create_start-mwc_request_start,

      sql_pool_create_start_offset = pool_start_time-mwc_request_start,

      sql_pool_create_end_offset=pool_end_time-mwc_request_start,

      renzo_pool_create_end_offset = renzo_pool_create_end-mwc_request_start,

      renzo_db_create_start_offset = renzo_db_create_start-mwc_request_start,

      sql_db_create_start_offset = db_start_time-mwc_request_start,

      sql_db_create_end_offset = db_end_time-mwc_request_start,

      renzo_db_create_end_offset = renzo_db_create_end-mwc_request_start,

      mwc_create_db_end_offset = mwc_create_db_end-mwc_request_start,

      mwc_request_end_offset = mwc_request_end-mwc_request_start,

      mwc_start_to_fleetspace_start = mwc_get_fleetspace_start-mwc_request_start,

      mwc_fleetspace_start_to_mwc_db_start=mwc_create_db_start-mwc_get_fleetspace_start,

      mwc_db_start_to_renzo_pool_start=renzo_pool_create_start-mwc_create_db_start,

      renzo_pool_start_to_Sql_pool_start=pool_start_time-renzo_pool_create_start,

      sql_pool_start_to_sql_pool_end=pool_end_time-pool_start_time,

      sql_pool_end_to_renzo_pool_end=renzo_pool_create_end-pool_end_time,

      renzo_pool_end_to_renzo_db_start=renzo_db_create_start-renzo_pool_create_end,

      renzo_db_start_to_sql_db_start=db_start_time-renzo_db_create_start,

      sql_db_start_to_sql_db_end=db_end_time-db_start_time,

      sql_db_end_to_renzo_db_end=renzo_db_create_end-db_end_time,

      renzo_db_end_to_renzo_cp_end=renzo_cp_end-renzo_db_create_end,

      renzo_cp_end_to_mwc_db_end=mwc_create_db_end-renzo_cp_end,

      mwc_db_end_to_mwc_request_end=mwc_request_end-mwc_create_db_end'
