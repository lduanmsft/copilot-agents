      | where tostring(customDimensions.src) has ''sqldb''

      or tostring(customDimensions.src) has ''pbisql''

      | extend browserTabId = tostring(customDimensions.browserTabId),

      effectiveType = tostring(customDimensions.effectiveType),

      rtt = toint(customDimensions.rtt),

      downlink = todouble(customDimensions.downlink);'
- id: DB-native-110
  Topic: Fabric Link Useful Queries
  Source: TSG-SQL-DB-Native/TSG/tsgs/fabric-link/Fabric Link Useful Queries.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_database_name contains ''{dbName}''

      | extend AppNameExt = extract("fabric:/[^/]+/(.*)", 1, fabric_application_uri)

      | summarize max(TIMESTAMP), min(TIMESTAMP) by logical_server_name, logical_database_name, AppNameExt, physical_database_id, logical_database_id, fabric_application_uri, tenant_ring_name, NodeName

      | extend Jit = replace_strings(''Get-JitAccess -WorkitemSource IcM -WorkItemId <icm_id> -Justification "Need to Reseed Database"'', dynamic(["<icm_id>"]), pack_array(''{icmId}''))

      | extend ActivateDatabaseCas = replace_strings(''Activate-Database -LogicalServerName <logical_server_name> -DatabaseName ""{DatabaseName}"" -isForce Force'',

      dynamic([''<logical_server_name>'', ''"{DatabaseName}"'']),

      pack_array(logical_server_name, logical_database_name)

      )

      | extend ReseedDatabase = replace_strings(''Invoke-DatabaseMirroringAutoReseed -PhysicalDatabaseId <database_id> -operation init -SqlInstanceName'',

      dynamic(["<database_id>"]),

      pack_array(physical_database_id))

      | extend GetReseedState = replace_strings(''Get-ChangeFeedDbReseedState  -LogicalDatabaseName "{dbName}" -LogicalServerName <logical_server_name>'',

      dynamic(["<logical_server_name>"]),

      pack_array(logical_server_name))

      | extend KillSqlServer = replace_strings(''Invoke-DumpAndKillSqlProcess -ApplicationNameUri <fabric_url> -FabricClusterName <tenant_ring_name> -ProcessName sqlservr.exe -NodeName _DB_24'',

      dynamic(["<fabric_url>", "<tenant_ring_name>"]),

      pack_array(fabric_application_uri, tenant_ring_name))

      | order by max_TIMESTAMP desc'
- id: DB-native-111
