- id: DB-native-36
  Topic: subscription-capacity
  Source: TSG-SQL-DB-Native/TSG/tsgs/capacity/subscription-capacity.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot ClusterName end_utc_date
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'let subs = subsInfo | project SubscriptionId;

      (cluster(clstr).database("sqlazure1").MonAnalyticsDBSnapshot

      | where customer_subscription_id in~  (subs)

      | distinct  customer_subscription_id, ClusterName, end_utc_date

      | summarize arg_max(end_utc_date, customer_subscription_id, ClusterName) by customer_subscription_id, ClusterName

      | join kind=innerunique

      (cluster(clstr).database("sqlazure1").MonAnalyticsDBSnapshot

      | where customer_subscription_id in~  (subs)

      | distinct  customer_subscription_id, resource_group, ClusterName, end_utc_date)

      on $left.ClusterName == $right.ClusterName and $left.end_utc_date == $right.end_utc_date, $left.customer_subscription_id == $right.customer_subscription_id

      | project end_utc_date, customer_subscription_id, resource_group)

      | join kind=leftouter (subsInfo) on $left.customer_subscription_id == $right.SubscriptionId

      | project customer_subscription_id, Location, end_utc_date, resource_group

      | summarize count_distinct(resource_group), count_distinct(customer_subscription_id), make_set(customer_subscription_id) by Location, end_utc_date

      | project now(), d_location = Location, m_resource_group_count = count_distinct_resource_group, m_subscription_count = count_distinct_customer_subscription_id, m_rg_percentage_ratio = (count_distinct_resource_group * 100) / (count_distinct_customer_subscription_id * 900), set_customer_subscription_id

      };_ExecuteForProdAndStageClusters()'
