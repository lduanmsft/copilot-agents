- id: DB-native-12
  Topic: renzo-resource-cleanup
  Source: TSG-SQL-DB-Native/TSG/sops/renzo-resource-cleanup.md
  Prompts:
  - SQL DB renzo cp activity
  - SQL DB MonSqlRenzoCp TIMESTAMP tags endTime requestId
  - SQL DB investigate renzo cp
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRenzoCp
    ExecutedQuery: 'cluster(clusterName).database("SqlAzure1").MonSqlRenzoCp

      | where TIMESTAMP >= startTime and TIMESTAMP <= endTime

      | parse ClusterName with ringNumber "." AzureRegion "." url

      | extend FabricRegion = case(   AzureRegion contains "lkgtst1", "PPE: onebox | int3 | edog" ,

      AzureRegion contains "useuapeast2", "Daily",

      "")

      | where FabricRegion contains "PPE" or FabricRegion contains "Daily"

      | project-away AppName, AppTypeName, ClusterName, component, LogicalServerName, MachineName, NodeName, NodeRole, ResourceGroup, sessionName, SourceMoniker, SourceNamespace, SourceVersion, SubscriptionId, package, message_format

      | extend tags=parse_json(tags)

      | project FabricRegion, AzureRegion, display_name, request_id=tags.requestId, fleetspace_name=tags.fleetspaceName, tostring(database_name=tags.databaseName), tags, message

      | join kind=leftouter (

      cluster(clusterName).database("SqlAzure1").MonAnalyticsDBSnapshot

      | where TIMESTAMP > startTime

      | where isnotempty(trident_artifact_id)

      | summarize ArtifactId = take_any(trident_artifact_id) by logical_database_name

      ) on $left.database_name == $right.logical_database_name

      | project-away logical_database_name

      | where isnotempty(ArtifactId)

      | project FabricRegion, AzureRegion, display_name, renzo_request_id=tags.requestId, fleetspace_name=tostring(tags.fleetspaceName), tostring(database_name=tags.databaseName), ArtifactId, message, tags

      | where (display_name == "CreateDatabase" or display_name == "CreateOrUpdate") and fleetspace_name startswith "fs-"

      | extend FabricRegion = case(   FabricRegion contains "PPE" and fleetspace_name contains "63edfc36-023e-4218-80e9-546779c31ffb", "INT3" ,

      FabricRegion contains "PPE" and fleetspace_name contains "04125a35-dfba-49a1-b4fd-98c473beb065", "Onebox | EDOG" ,

      FabricRegion contains "PPE" and fleetspace_name contains "34f92457-fe9d-4c36-92a8-499fdfaf0f8f", "EDOG" ,

      FabricRegion contains "PPE" and fleetspace_name contains "99fcb295-50fb-4fe3-aabc-0703e96134c7", "CST" ,

      FabricRegion contains "PPE" and fleetspace_name contains "f37dbc86-bb03-4776-881e-0441250add7c", "CST" ,

      FabricRegion)

      | summarize num_dbs=count() by FabricRegion, AzureRegion, fleetspace_name

      | order by num_dbs desc'
