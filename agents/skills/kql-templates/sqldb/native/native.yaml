    ExecutedQuery: 'let rootActivityId = ''<Enter RAID here>''; // e.g. 0a9ef3d4-089e-4d00-adbe-e02a74c091cc

      let startTime = ago({TimeRange})-1h; // update with start of time range

      let endTime = now()+1h; // update with end of time range

      let folderName = toscalar(cluster(''biazure.kusto.windows.net'').database(''BIAzureKustoProd'').PbiToMwcEndToEndProdTraces(rootActivityId, startTime, endTime)

      | where EventText_Or_MessageText has "Cannot create a new SQL project"

      | parse kind=regex EventText_Or_MessageText with ''System.ArgumentException: Cannot create a new SQL project as \'''' FolderName ''\\\\.*.sqlproj\''''*

      | project FolderName);

      cluster(''pbipinternal.kusto.windows.net'').database(''pbip'').ASTraceAll

      | where TIMESTAMP between (startTime .. endTime)

      | where ProcessName == ''Microsoft.Trident.Workload.SqlToolsCore.EntryPoint''

