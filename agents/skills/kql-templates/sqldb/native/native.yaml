- id: DB-native-85
  Topic: database-provisioning-latency-analysis-from-reliability-dashboard
  Source: TSG-SQL-DB-Native/TSG/tsgs/crud/database-provisioning-latency-analysis-from-reliability-dashboard.md
  Prompts:
  - SQL DB renzo trace event status
  - SQL DB MonSqlRenzoTraceEvent PreciseTimeStamp TIMESTAMP
  - SQL DB investigate renzo trace event
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRenzoTraceEvent
    ExecutedQuery: 'MonSqlRenzoTraceEvent

      | where TIMESTAMP between (startTime..endTime)

      | parse correlationId with trace_id "_" *

      | where trace_id == traceId

      | extend customDimObj = todynamic(customDimensions)

      | extend messageObj = todynamic(message)

      | extend WorkType = iif (activityName == "ProcessWorkActivity", iif(customDimObj.WorkType == "", "Root", customDimObj.WorkType), iif(activityName  == "", "Root", activityName))

      // define subwork category

      | extend SubWorkType = case(

      eventName == "ServiceClientEnterMethod", strcat(messageObj.class, ".", messageObj.method),

      eventName == "ServiceClientRequest", "RestRequest",

      eventName == "ServiceClientResponse", "RestResponse",

      eventName == "SpartanException", "Exception",

      message contains "Obtained access token", "GetAccessToken",

      message contains "Attempting to update work state for", "WorkStateChange",

      message contains "Pool does not match pool filter", "PoolFiltering",

      message contains "Start populating all pool an db metadata of server", "PopulateLogicalServerStateMachine",

      message contains "Listed all active pools in server, count is", "PopulateLogicalServerStateMachine",

      message contains "Populated all pool an db metadata of sever", "PopulateLogicalServerStateMachine",

      "Root")

      // build details for the Subwork

      | parse message with * "providers/" requestOperation "?" *

      | extend SubworkDetail = case(

      SubWorkType == "RestRequest", strcat(requestOperation, ".", messageObj.requestMethod),

      SubWorkType == "RestResponse", messageObj.responseStatusCode,

      messageObj.class)

      | where SubWorkType != "Exception" or messageObj.Exception != "AmqpException"// filter out AmpqExceptions as they will dilute slicing

      | project Timestamp = PreciseTimeStamp, Service = serviceName, activity_request_id=activityId, WorkType, SubWorkType, SubworkDetail, message

      )

      | union

      // Get a timeline branch for Management Service

      ('
