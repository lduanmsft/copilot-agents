- id: DB-native-55
  Topic: conn-011-external-dataplane-endpoint
  Source: TSG-SQL-DB-Native/TSG/tsgs/connectivity/conn-011-external-dataplane-endpoint.md
  Prompts:
  - SQL DB evt5653745998362568492 analysis
  - SQL DB Evt5653745998362568492 TIMESTAMP Id is to
  - SQL DB investigate evt5653745998362568492
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: Evt5653745998362568492
    ExecutedQuery: 'let sharedDatabase = ''BIAzureKustoProd'';

      let workspaceIdsWithSqlDbArtifacts = cluster("biazure").database(sharedDatabase).Evt5653745998362568492

      | where TIMESTAMP > ago(1d)

      | where viewName contains "PR_ArtifactsView"

      | where eventText contains "\"ArtifactType\":\"14000\""

      | project Tenant, WorkspaceId = tostring(parse_json(eventText).FolderId)

      | distinct Tenant, WorkspaceId;

      let workspaceIdsWithEdpes = cluster("biazure").database(sharedDatabase).Evt5653745998362568492

      | where TIMESTAMP > ago(1d)

      | where viewName contains "PR_PrivateLinkExternalDataPlaneEndpointsView"

      | project Tenant, e=parse_json(eventText)

      | project Tenant, WorkspaceId=tostring(e.FolderId), TypeLabel=tostring(e.TypeLabel), InstanceLabel=tostring(e.InstanceLabel)

      | where TypeLabel contains "sqldb" and InstanceLabel contains "primary"

      | distinct Tenant, WorkspaceId;

      let folderIds = cluster("biazure").database(sharedDatabase).Evt5653745998362568492

      | where TIMESTAMP > ago(1d)

      | where viewName contains "PR_FoldersView"

      | project Tenant, e=parse_json(eventText)

      | where e.Id in (workspaceIdsWithSqlDbArtifacts | distinct  WorkspaceId) // limit workspaces to only those that could have a SqlDbArtifact, note this is not taking into account tenant yet

      | distinct Tenant, WorkspaceId=tostring(e.Id), WorkspaceObjectId=tostring(e.ObjectId);

      let workspacesWithSqlArtifactsAndWithoutAnEdpe = workspaceIdsWithSqlDbArtifacts

      | join kind=leftanti (workspaceIdsWithEdpes) on Tenant, WorkspaceId

      | project Tenant, WorkspaceId;'
