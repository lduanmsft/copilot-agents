- id: DB-native-140
  Topic: replicator-stopped-on-capacity-SKU-change
  Source: TSG-SQL-DB-Native/TSG/tsgs/fabric-link/replicator-stopped-on-capacity-SKU-change.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB ASTrace s trace s trace PreciseTimeStamp TIMESTAMP Status endTime
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: ASTrace
    ExecutedQuery: 'let startTime = now()-5d; //configure the starttime and endtime based on the incident.

      let endTime = now();

      let capacities = ASTrace

      | where TIMESTAMP between (startTime..endTime)

      | where MarkerName has ''ScalingCapacity''

      | where MessageText has ''Updating virtual service'' and MessageText has ''hosting capacity''

      | parse MessageText with * ''Updating virtual service '' virtualServiceName:string '' hosting capacity to'' *

      | distinct virtualServiceName;

      let cids = macro-expand MwcDiagTopologyStandard as X (

      X.CapacityStatusFromGlobalStats)

      | where TIMESTAMP between (startTime..endTime)

      | where VirtualServiceName in (capacities)

      | summarize arg_max(TIMESTAMP, *) by VirtualServiceObjectId, VirtualServiceName

      | summarize make_list(VirtualServiceObjectId);

      let activeArtifactIds = CapacityCpuPerWorkloadOperation

      | where CpuTimeCapacityUnitMs  > 0

      | project artifactId = tolower(ArtifactId);

      let activeCapacities = CapacitiesIncludingGen2(startTime, endTime)

      | where Status == ''Active''

      | project capacityId = tolower(VirtualServiceObjectId);

      let replicators = materialize(StandardizedServerReporting

      | where ActivityAttributes has_all (''replicatorSourceType'', ''SQLDbNative'')

      and FeatureName == ''Replicator''

      and ActivityName in (

      ''RecoverRuntimeEngineEnd'',

      ''RecoverRuntimeEngineStart'',

      ''RecoverReplicator'',

      ''Replicating'',

      ''StartReplicator'',

      ''StartingReplicator'',

      ''StopReplicator'',

      ''Succeeded'',

      ''StopReplicatorByForce'')

      and strlen(CorrelationId) >= 36

      | extend SourceType = tostring(parse_json(ActivityAttributes)[''replicatorSourceType''])

      | extend CorrelationId = substring(CorrelationId, strlen(CorrelationId) - 36)

      | project PreciseTimeStamp,

      ActivityName,

      CorrelationId,

      PremiumCapacityId,

      ActivityStatus,

      ResultCode,

      SourceType);'
