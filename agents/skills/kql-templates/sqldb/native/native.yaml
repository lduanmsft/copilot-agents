- id: DB-native-2
  Topic: clean-up-orphaned-resources
  Source: TSG-SQL-DB-Native/TSG/sops/clean-up-orphaned-resources.md
  Prompts:
  - SQL DB evt5653745998362568492 status
  - SQL DB Evt5653745998362568492 state logical_server_name
  - SQL DB investigate evt5653745998362568492
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: Evt5653745998362568492
    ExecutedQuery: 'let fabricCluster = "https://biazure.kusto.windows.net";

      let fabricDatabase = "BIAzureKustoProd";

      let fabricEnv = "daily";

      let sqlCluster = "https://sqlazureeus22.kusto.windows.net";

      let sqlDatabase = "SqlAzure1";

      let startTime = ago(5d);

      let endTime = ago(1d);      // Evt5653745998362568492 only refreshes 1-2x a day, safest to start from a few days back

      let activeSqlDbArtifacts =

      cluster(fabricCluster).database(fabricDatabase).Evt5653745998362568492

      | where TIMESTAMP >= startTime

      | where viewName == "IPowerBIDatabaseContext.Viewers.PR_ArtifactsView"

      | where Tenant has fabricEnv

      | extend ec = todynamic(eventText)

      | extend SnapshotTime=todatetime(ec.SnapshotTime), ArtifactId=tostring(ec.ObjectId), CreatedDate=todatetime(ec.CreatedDate), ArtifactType=tostring(ec.ArtifactType), ProvisionState=toint(ec.ProvisionState)

      | where ArtifactType == "14000"     // SQL DB

      | where ProvisionState == 1     // Active

      | where SnapshotTime >= startTime and SnapshotTime <= endTime

      | project ArtifactId, SnapshotTime, ProvisionState, FabricCreatedDate=CreatedDate

      | summarize FabricLastSnapshotTime=arg_max(SnapshotTime, *) by ArtifactId, ProvisionState, FabricCreatedDate

      | distinct ArtifactId, FabricLastSnapshotTime, FabricCreatedDate;

      let activeSqlDbDatabases =

      cluster(sqlCluster).database(sqlDatabase).MonAnalyticsDBSnapshot

      | where logical_server_name startswith \"{ServerName}\" or logical_server_name startswith \"{ServerName}\"

      | where isnotempty(trident_artifact_id)

      | where state == "Ready"

      | where TIMESTAMP >= startTime and TIMESTAMP <= endTime

      | project ArtifactId = trident_artifact_id, end_utc_date, SqlCreatedDate=create_time, SqlDatabaseName=logical_database_name

      | summarize SqlLastSnapshotTime=arg_max(end_utc_date, *) by ArtifactId, SqlCreatedDate, SqlDatabaseName

      | distinct ArtifactId, SqlLastSnapshotTime, SqlCreatedDate, SqlDatabaseName;'
