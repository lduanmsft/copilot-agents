- id: DB-native-131
  Topic: configure-replication-failing
  Source: TSG-SQL-DB-Native/TSG/tsgs/fabric-link/configure-replication-failing.md
  Prompts:
  - SQL DB a s trace analysis
  - SQL DB a s trace TIMESTAMP region timeRange ArtifactId
  - SQL DB investigate ago
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: ASTrace
    ExecutedQuery: 'let timeRange = ago(3h); // <-- Change this

      let region = "uksouth"; // <-- Change this

      let targetArtifactId = "{artifactId}";  // <-- Change this

      // Step 1: Get RootActivityId(s) for the given ArtifactId

      let targetRootActivityIds = ASTrace

      | where TIMESTAMP >= timeRange

      | where RolloutFQDN contains region

      | where MarkerName contains "ConfigureSelectiveMirroring"

      | extend CustomDataParsed = parse_json(CustomData)

      | where tostring(CustomDataParsed.ArtifactId) == targetArtifactId

      | distinct RootActivityId;

      // Step 2: Get parent activities using RootActivityId (same as Version 1)

      let parentActivities = ASTrace

      | where TIMESTAMP >= timeRange

      | where RolloutFQDN contains region

      | where MarkerName contains "ConfigureSelectiveMirroring"

      | where RootActivityId in (targetRootActivityIds);

      // Step 3: Get child activities

      let childActivities = ASTrace

      | where TIMESTAMP >= timeRange

      | where RolloutFQDN contains region

      | where ParentActivityId in (parentActivities | project CurrentActivityId);

      union parentActivities, childActivities

      | project-reorder TIMESTAMP, MarkerName, MessageText, CustomData, RootActivityId, ParentActivityId, CurrentActivityId

      | order by RootActivityId, TIMESTAMP asc'
