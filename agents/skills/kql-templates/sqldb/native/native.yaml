- id: DB-native-107
  Topic: extension-iframe-load-reliability-below-threshold
  Source: TSG-SQL-DB-Native/TSG/tsgs/extension/extension-iframe-load-reliability-below-threshold.md
  Prompts:
  - SQL DB timeout analysis
  - SQL DB customEvents lookback eventName timestamp
  - SQL DB troubleshoot timeout
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: customEvents
    ExecutedQuery: 'let targetSessionId = "<paste session_Id>";

      let lookback = {TimeRange};

      // Run this directly on the alert''s cluster (north-europe → pbiclientseu.northeurope)

      cluster(''pbiclientseu.northeurope'').database(''appinsights'').customEvents

      | where timestamp >= ago(lookback)

      | where session_Id == targetSessionId

      | where tostring(customDimensions.extensionName) in ("sqldb", "SQLDbNative")

      or tostring(customDimensions.eventName) in ("IFrameTimeout", "IFrameTiming")

      | extend eventName = tostring(customDimensions.eventName)

      | project timestamp, eventName,

      pageHidden = tostring(customDimensions.pageHidden),

      initBy = tostring(customDimensions.initBy)

      | order by timestamp asc'
- id: DB-native-108
  Topic: openartifact-ux-timeout
  Source: TSG-SQL-DB-Native/TSG/tsgs/extension/openartifact-ux-timeout.md
  Prompts:
  - SQL DB timeout analysis
  - SQL DB customEvents name end src start eventName
  - SQL DB troubleshoot timeout
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: customEvents
    ExecutedQuery: 'let start = datetime(2026-04-05);  // adjust to your window

      let end = datetime(2026-04-12);

      let failures =

      union cluster(''pbiclients.eastus'').database(''appinsights'').customEvents,

      cluster(''pbiclientseu.northeurope'').database(''appinsights'').customEvents

      | where timestamp between (start .. end)

      | where name == ''DiagnosticTrace''

      | where tostring(customDimensions.eventName) == ''SQLDbNative.EndToEnd openArtifact''

      | where tostring(customDimensions.activityStatus) == ''Failed''

      | where tostring(customDimensions.isTestMode) != ''true''

      | extend correlationId = tostring(customDimensions.correlationId),

      durationMs = todouble(customDimensions.durationMs),

      extensionIframeState = tostring(customDimensions.extensionIframeState),

      extensionWorkerIframeState = tostring(customDimensions.extensionWorkerIframeState),

      pageHidden = tostring(customDimensions.pageHidden),

      browserTabId = tostring(customDimensions.browserTabId),

      region = tostring(customDimensions.region)

      // Bundle-never-loaded: main iframe never reached ''initialized''

      | where extensionIframeState in (''initializing'', ''none'')

      // Exclude abandoned tabs (user hid the page, extreme duration)

      | where not(pageHidden == ''true'' and durationMs > 120000)

      // Exclude fast-fails (backend errors, not load failures)

      | where durationMs > 10000

      | project timestamp, correlationId, durationMs,

      extensionIframeState, extensionWorkerIframeState,

      pageHidden, browserTabId, region;

      // Join with IFrameFetch for network quality

      let networkData =

      union cluster(''pbiclients.eastus'').database(''appinsights'').customEvents,

      cluster(''pbiclientseu.northeurope'').database(''appinsights'').customEvents

      | where timestamp between (start .. end)

      | where name == ''DiagnosticTrace''

      | where tostring(customDimensions.eventName) == ''IFrameFetch''

      | where tostring(customDimensions.src) has ''sqldb''

      or tostring(customDimensions.src) has ''pbisql''

      | extend browserTabId = tostring(customDimensions.browserTabId),

      effectiveType = tostring(customDimensions.effectiveType),

      rtt = toint(customDimensions.rtt),

      downlink = todouble(customDimensions.downlink),

      deviceMemory = tostring(customDimensions.deviceMemory),

      hardwareConcurrency = tostring(customDimensions.hardwareConcurrency);

      // Join with onExtensionLoadTimeout for resource count

      let timeoutData =

      union cluster(''pbiclients.eastus'').database(''appinsights'').customEvents,

      cluster(''pbiclientseu.northeurope'').database(''appinsights'').customEvents

      | where timestamp between (start .. end)

      | where name == ''DiagnosticTrace''

      | where tostring(customDimensions.eventName) == ''onExtensionLoadTimeout''

      | where tostring(customDimensions.extensionName) == ''sqldb''

      | extend browserTabId = tostring(customDimensions.tabId),

      extTimingsNum = toint(customDimensions.extTimingsNum);'
