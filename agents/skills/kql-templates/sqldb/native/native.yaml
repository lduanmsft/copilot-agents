- id: DB-native-57
  Topic: conn-012-connection-is-closed-10054
  Source: TSG-SQL-DB-Native/TSG/tsgs/connectivity/conn-012-connection-is-closed-10054.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB login error TIMESTAMP ClientCIDR peer_address
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where TIMESTAMP between (ago(7d) .. now())

      | where peer_address startswith ClientCIDR

      | where error == 10054

      | summarize Failures=count(),

      FirstSeen=min(TIMESTAMP),

      LastSeen=max(TIMESTAMP)

      by peer_address, driver_name, driver_version, logical_server_name

      2.1, if it is the client that dropped the connection, refer to "Dropped connections" in [Azure SQL DB Connectivity TSGs](https://supportability.visualstudio.com/AzureSQLDB/_wiki/wikis/AzureSQLDB.wiki/357822/Connectivity-Troubleshoot-DB-Availability-and-Connection-Errors) to help troubleshoot.

      2.2, if client IP does not drop the connection, one reference [IcM](https://portal.microsofticm.com/imp/v5/incidents/details/705225776/summary).

      3, If Azure SQLDB dropped the connection, this could be a performance issue. The problem is the CPU/memory/IO is over used by the query, if this is a heavy-reading query, it will take huge memory and IO usage. Since this backend database is general purpose, the hand disk is not local but a remote storage. Use below query to check whether the process is killed and restarted during the query is running. This query is looking at resource used by AppTypeName: Worker.ISO, Package:  sqlserver.

      let TargetServer = "fleet-srv-ac6b94da-defb-438d-9303-8b4573b11e16-37f9b2590288";

      let PoolName = "fleet-stdpool-37c3ad33-5670-4b49-a634-97db3a2f4ad9";

      let T0 = datetime(2025-10-30 19:13:46.720); // datetime(2025-11-05 04:09:00Z);

      let ST = T0 - 35m;

      let ET = T0 + 35m;'
- id: DB-native-58
  Topic: conn-012-connection-is-closed-10054
  Source: TSG-SQL-DB-Native/TSG/tsgs/connectivity/conn-012-connection-is-closed-10054.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgServerless originalEventTimestamp PoolName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgServerless
    ExecutedQuery: 'MonRgServerless

      | where originalEventTimestamp between (ST .. ET)

      | where instance_logical_server_name == TargetServer and instance_target_name == PoolName

      | summarize

      NormalizedCPU   = sum(app_cpu_billed) / 100.0,

      NormalizedMemGB = sum(app_memory_billed_gb / 3.0),

      NormalizedBill  = sum(app_cpu_billed_normalized)

      by bin(originalEventTimestamp, 1m)

      | order by originalEventTimestamp asc

      | render timechart with (title="Capacity: CPU / Memory / Bill (1-min bins)")

      From the graph generated by the above query, if the memory dropped during the query was running, it could be because the process is killed. Another proof is the process_id or NodeName is changed.

      4, confirm the process_id is changed during the above time range for AppTypeName: Worker.ISO, Package:  sqlserver. When process_id is changed, all logins failed with the new process_id for about 10 mins. Later on the logins are successful.

      let artifactIdOrName = ''Datalake_Dev-d27db8b6-dcc2-4d7a-9439-601b175abfbb'';'
- id: DB-native-59
  Topic: conn-012-connection-is-closed-10054
  Source: TSG-SQL-DB-Native/TSG/tsgs/connectivity/conn-012-connection-is-closed-10054.md
  Prompts:
  - SQL DB login failures
  - SQL DB login is_success event database_name
  - SQL DB troubleshoot login failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp  between (ago({TimeRange}) - 10m .. datetime(2025-10-30 19:17:00.0000000) + 14m)

      | where database_name contains artifactIdOrName

      | where event == "process_login_finish"// and is_success==false

      | project

      originalEventTimestamp ,

      ClusterName, AppTypeName, package, event, connection_id,server_name,extra_info, message, error_message, connection_peer_id , peer_address, process_id, NodeName, AppName, is_success, code_package_version, application_name

      | extend TimeET = datetime_utc_to_local(originalEventTimestamp , "US/Eastern")

      | project-reorder originalEventTimestamp , TimeET ,is_success, code_package_version, NodeName, application_name, process_id

      | extend Level = iif(is_success, 4, 3)

      | where AppTypeName == "Worker.ISO"

      5, another proof on the process is restarte. If process is restarted, there are transient error code 40613 or 33155. They appeared when the memory dropped and raised again.

      let T0 = datetime(2025-10-30 19:13:46.720); // datetime(2025-11-05 04:09:00Z);

      let ST = T0 - 35m;

      let ET = T0 + 35m;'
