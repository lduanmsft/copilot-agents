- id: DB-native-148
  Topic: pre-and-post-deployment-scripts
  Source: TSG-SQL-DB-Native/TSG/tsgs/git-integration/pre-and-post-deployment-scripts.md
  Prompts:
  - SQL DB a s trace analysis
  - SQL DB a s trace TIMESTAMP endTime has_any TenantId
  - SQL DB investigate table
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: ASTrace
    ExecutedQuery: 'let startTime = datetime("<Enter Start Time>");

      let endTime = datetime("<Enter End Time>");

      cluster("https://pbipam.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipeastus.eastus.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipcentralus.centralus.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipapac.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipnortheurope.northeurope.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipeu.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipafrica.southafricanorth.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipuk.uksouth.kusto.windows.net").database("pbip").table("ASTrace")

      | where TIMESTAMP between (startTime .. endTime)

      | where MarkerName has_any ("Workload.SQLDb.Alm.ExportDefinition", "Workload.SqlToolsCore.Controllers.DacFx.ExtractApi", "Workload.SqlToolsCore.DacFx.Extract")

      | where RolloutFQDN == "<Enter RolloutFQDN>"

      | where ProcessName !contains "testhost"

      | extend WorkspaceId=tostring(CustomData.WorkspaceId), ArtifactId=tostring(CustomData.ArtifactId), TenantId=tostring(ExecutionContext.CustomerTenantId), CapacityId=tostring(ExecutionContext.CustomerCapacityObjectId)

      | project startTime, endTime, RootActivityId, RolloutFQDN, MessageText, WorkspaceId, ArtifactId, TenantId, CapacityId

      | where MessageText contains "AddDeploymentScriptsToProject"

      | join kind=leftouter (

      cluster("https://sqldbnative.westus2.kusto.windows.net").database("sqldbnativewus2").AllTenantsList2()

      | project TenantObjectId, TenantName, HasTenantName, IsTestTenant

      ) on $left.TenantId == $right.TenantObjectId

      | project startTime, endTime, RootActivityId, RolloutFQDN, MessageText, WorkspaceId, ArtifactId, TenantId, TenantName, HasTenantName, IsTestTenant, CapacityId'
- id: DB-native-149
  Topic: pre-and-post-deployment-scripts
  Source: TSG-SQL-DB-Native/TSG/tsgs/git-integration/pre-and-post-deployment-scripts.md
  Prompts:
  - SQL DB a s trace errors
  - SQL DB a s trace TIMESTAMP Region endTime has_any TenantId
  - SQL DB troubleshoot table errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: ASTrace
    ExecutedQuery: 'let startTime = datetime("<Enter Start Time>");

      let endTime = datetime("<Enter End Time>");

      cluster("https://pbipam.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipeastus.eastus.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipcentralus.centralus.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipapac.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipnortheurope.northeurope.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipeu.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipafrica.southafricanorth.kusto.windows.net").database("pbip").table("ASTrace")

      | union cluster("https://pbipuk.uksouth.kusto.windows.net").database("pbip").table("ASTrace")

      | where TIMESTAMP between (startTime .. endTime)

      | where MarkerName has_any ("Workload.SQLDb.Alm.ExportDefinition", "Workload.SqlToolsCore.Controllers.DacFx.ExtractApi", "Workload.SqlToolsCore.DacFx.Extract")

      | where RolloutFQDN == "<Enter RolloutFQDN>"

      | where ProcessName !contains "testhost"

      | extend WorkspaceId=tostring(CustomData.WorkspaceId), ArtifactId=tostring(CustomData.ArtifactId), TenantId=tostring(ExecutionContext.CustomerTenantId), CapacityId=tostring(ExecutionContext.CustomerCapacityObjectId)

      | where MessageText contains "AddDeploymentScriptsToProject"

      | parse RolloutFQDN with Region "." *

      | summarize StartTime=min(TIMESTAMP), EndTime=max(TIMESTAMP), WorkspaceId=take_any(WorkspaceId), ArtifactId=take_any(ArtifactId), CapacityId=take_any(CapacityId), MinSeverity=min(Severity) by RootActivityId, RolloutFQDN, Region, TenantId

      | extend ActivityStatus=iff(MinSeverity <= 2, "Failure", "Success")

      | join kind=leftouter (

      cluster("https://sqldbnative.westus2.kusto.windows.net").database("sqldbnativewus2").AllTenantsList2()

      | project TenantObjectId, TenantName, HasTenantName, IsTestTenant

      ) on $left.TenantId == $right.TenantObjectId

      | extend TenantName=iff(isempty(TenantName), strcat("Unknown Tenant (", TenantId, ")"), TenantName)

      | summarize Success=countif(ActivityStatus == "Success"), Failure=countif(ActivityStatus == "Failure"), Total=count() by Region, TenantName, TenantId, HasTenantName, IsTestTenant

      | order by Region asc, Failure desc, Success desc'
