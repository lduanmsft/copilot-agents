- id: DB-native-17
  Topic: Auditing-retention-cleanup-failing
  Source: TSG-SQL-DB-Native/TSG/tsgs/auditing/Auditing-retention-cleanup-failing.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot TIMESTAMP _since
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'let _since =  {startTime};

      let extract_artifact_from_path    = (p:string) { extract(@"^https?://[^/]+/[0-9a-fA-F-]{36}/([0-9a-fA-F-]{36})/", 1, p) };

      // Lookup: map logical_database_name → ArtifactId via MonAnalyticsDBSnapshot (avoids dependency on database naming convention)

      let artifactLookup = cluster(clstr).database("sqlazure1").MonAnalyticsDBSnapshot

      | where TIMESTAMP > _since

      | where isnotempty(trident_artifact_id)

      | summarize trident_artifact_id = take_any(trident_artifact_id) by logical_database_name;'
- id: DB-native-18
  Topic: Auditing-retention-cleanup-failing
  Source: TSG-SQL-DB-Native/TSG/tsgs/auditing/Auditing-retention-cleanup-failing.md
  Prompts:
  - SQL DB audit analysis
  - SQL DB MonAuditRuntime AppTypeName TIMESTAMP _since
  - SQL DB investigate audit
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAuditRuntime
    ExecutedQuery: 'let MonAuditRuntimeAgg =

      cluster(clstr).database("sqlazure1").MonAuditRuntime

      | where TIMESTAMP > _since

      | where audit_name has "SqlDbAuditing_Audit"

      | where AppTypeName == "Worker.ISO"

      | where file_path has "onelake"

      | extend Endpoint = extract("^[^.]*\\.([^.]*)\\.", 1, ClusterName)  // e.g., useuapeast2-a

      | join kind=leftouter (artifactLookup) on logical_database_name

      | extend ArtifactId = coalesce(

      trident_artifact_id,

      extract_artifact_from_path(file_path))

      | where successful_blob_deletes > 0 or failed_blob_deletes > 0

      | extend total_blob_deletion_requests = successful_blob_deletes + failed_blob_deletes

      | where total_blob_deletion_requests > 0

      | summarize

      total_retention_cleanup_successful = sum(successful_blob_deletes),

      total_retention_cleanup_failed     = sum(failed_blob_deletes),

      total_retention_cleanup_requests   = sum(total_blob_deletion_requests)

      by ArtifactId, Endpoint;'
- id: DB-native-19
  Topic: Auditing-retention-cleanup-failing
  Source: TSG-SQL-DB-Native/TSG/tsgs/auditing/Auditing-retention-cleanup-failing.md
  Prompts:
  - SQL DB sqlx store errors
  - SQL DB MonSQLXStore event originalEventTimestamp
  - SQL DB troubleshoot sqlx store errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: '// ---------- MonSQLXStore side: count existing issue with delete failures by ArtifactId + Endpoint ----------

      let MonSQLXStoreAgg =

      cluster(clstr).database("sqlazure1").MonSQLXStore

      | where originalEventTimestamp > _since

      | where event == "xio_failed_request"

      | where mapped_errorcode == 13

      | where request_type == "XIOTypeDeleteFile"

      | where file_path contains "onelake"

      | extend ArtifactId = extract_artifact_from_path(file_path)

      | extend Endpoint = extract("^[^.]*\\.([^.]*)\\.", 1, ClusterName)  // e.g., useuapeast2-a

      | summarize MonSQLXStore_delete_failures = count()

      by ArtifactId, Endpoint;'
- id: DB-native-20
  Topic: Auditing-retention-cleanup-failing
  Source: TSG-SQL-DB-Native/TSG/tsgs/auditing/Auditing-retention-cleanup-failing.md
  Prompts:
  - SQL DB audit analysis
  - SQL DB MonAuditRuntimeAgg
  - SQL DB investigate audit
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAuditRuntimeAgg
    ExecutedQuery: 'MonAuditRuntimeAgg

      | join kind= inner MonSQLXStoreAgg on ArtifactId, Endpoint

      | extend Total_failures_except_DirectoryIsNotEmptyErrors = total_retention_cleanup_failed - MonSQLXStore_delete_failures

      //| project ArtifactId, Endpoint, total_retention_cleanup_requests, total_retention_cleanup_successful, total_retention_cleanup_failed, MonSQLXStore_delete_failures, Total_failures_except_DirectoryIsNotEmptyErrors

      // exclude DirectoryIsNotEmptyErrors - known issue - will modify query once fixed as par to task- https://msdata.visualstudio.com/Database%20Systems/_workitems/edit/4762058

      | extend final_total_successful_retention_cleanup = total_retention_cleanup_requests-Total_failures_except_DirectoryIsNotEmptyErrors

      | summarize sum(total_retention_cleanup_requests), sum(total_retention_cleanup_successful), sum(total_retention_cleanup_failed), sum (MonSQLXStore_delete_failures),

      sum(Total_failures_except_DirectoryIsNotEmptyErrors),    sum(final_total_successful_retention_cleanup) ,

      // New: distinct ArtifactId counts by failure condition

      ArtifactsWithRetentionCleanupFailures = dcountif(ArtifactId, Total_failures_except_DirectoryIsNotEmptyErrors > 0),

      ArtifactsWithRetentionCleanupSuccessful = dcountif(ArtifactId, Total_failures_except_DirectoryIsNotEmptyErrors == 0),

      TotalArtifactsWhereRetentionCleanupTriggered = dcount(ArtifactId)'
- id: DB-native-21
  Topic: Auditing-retention-cleanup-failing
  Source: TSG-SQL-DB-Native/TSG/tsgs/auditing/Auditing-retention-cleanup-failing.md
  Prompts:
  - SQL DB audit analysis
  - SQL DB MonAuditRuntimeAgg Endpoint ArtifactId total_failed
  - SQL DB investigate audit
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAuditRuntimeAgg
    ExecutedQuery: 'MonAuditRuntimeAgg

      | join kind= inner MonSQLXStoreAgg on ArtifactId, Endpoint

      | extend Total_failures_except_DirectoryIsNotEmptyErrors = total_failed - MonSQLXStore_delete_failures

      | project ArtifactId, Endpoint, total_requests, total_successful, total_failed, MonSQLXStore_delete_failures, Total_failures_except_DirectoryIsNotEmptyErrors

      // exclude DirectoryIsNotEmptyErrors - known issue - will modify query once fixed as par to task- https://msdata.visualstudio.com/Database%20Systems/_workitems/edit/4762058

      | extend Final_success_pct = round(100.0 * (total_requests-Total_failures_except_DirectoryIsNotEmptyErrors) / total_requests, 2),

      Final_failure_pct = round(100.0 * Total_failures_except_DirectoryIsNotEmptyErrors     / total_requests, 2)'
- id: DB-native-22
