    ExecutedQuery: 'let lastSynapseLinkError = _ExecuteForProdAndStageClusters

      | where ArtifactId in (artifacts);

      let capacities = cluster("{pbiCluster}.kusto.windows.net").database("pbip").OnelakeRequests

      | where tolower(ClientArtifactId) in (artifacts)

      | where isnotempty( ClientCapacityObjectId )

      | distinct ArtifactId=tolower(ClientArtifactId), TenantId=ClientTenantId, PremiumCapacityId=toupper(ClientCapacityObjectId);

