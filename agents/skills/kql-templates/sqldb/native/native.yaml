- id: DB-native-14
  Topic: validate-billing-meters
  Source: TSG-SQL-DB-Native/TSG/sops/validate-billing-meters.md
  Prompts:
  - SQL DB all meters status
  - SQL DB AllMeters BigId dummy Ignore meters Feature
  - SQL DB investigate all meters
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AllMeters
    ExecutedQuery: 'let skuName = ''SQL database in Microsoft Fabric'';

      cluster(''https://pav2data.eastus.kusto.windows.net'').database(''aipusageaudit'').AllMeters

      | where ServiceName == "Microsoft Fabric"

      | where not(MeterName has "Fabric Meter") // Ignore dummy meters

      | extend EffectiveDate = todatetime(EffectiveDate)

      | where now() > EffectiveDate

      | summarize arg_max(EffectiveDate, *) by BigId, ApiSkuID, AvailabilityRegion

      | project EffectiveDate, ServiceName, ProductName, ServiceType, ServiceFamily, Feature, SkuName, MeterType, AvailabilityRegion, BillingRegion, BillingMeterId, MeterName, MeterStatus, MeterState, DirectUOM, CurrentRate

      | where SkuName in ("Compute Pool", skuName)

      | summarize make_set(SkuName), dcount(SkuName) by AvailabilityRegion

      | where dcount_SkuName  < 3 and set_SkuName !has skuName

      - Replace the skuName parameter with the appropriate sku name determined [here](#get-sku-name-from-meter-name)

      - The query results should be empty. If not, reach out to [point of contact](#contacts)'
