  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: "MonRgLoad  \n| where event == \"drive_usage_report_load\" and TIMESTAMP > now() - time(15m) and ClusterName !contains \"onebox\"  \n| summarize avg(drive_usage_percentage) by ClusterName,\
      \ NodeName, drive_name  \n| extend RingName = toupper(extract(\"(.*).(.*).(worker|control).(database|sqltest-eg1).(windows.net|chinacloudapi.cn|mscds.com)\", 1, ClusterName, typeof(string)))  \n|\
      \ extend Cluster = extract(\"(.*).(.*).(worker|control).(database|sqltest-eg1).(windows.net|chinacloudapi.cn|mscds.com)\", 2, ClusterName, typeof(string))  \n| extend Select = strcat(\"Select-SqlAzureCluster\
      \ wasd-prod-\", Cluster, \"-\", RingName)  \n| extend Command = strcat(\"Get-FabricNode -NodeName \", NodeName,\" -NodeClusterName \", ClusterName, \" | Remove-FabricNodeFile -Directory C:WFRootlogPerformanceCountersBinary\
      \ -Filename fabric_counters_*.blg\")  \n| where avg_drive_usage_percentage >= 70  \n| where drive_name contains \"C:\"  \n| extend DiskUsage = avg_drive_usage_percentage  \n| project ClusterName,\
      \ Cluster, RingName, NodeName, DiskUsage, drive_name, Command, Select  \n| order by DiskUsage"
