      | order by cpu_usage_before_forced_param desc

      | take 10

      | extend total_compile_cpu_ms_before, total_compile_cpu_ms_after

      | extend percentage_compile_before = iif (''UserPrimaryGroup.DBId5'' == group_name, total_compile_cpu_ms_before*1.0/cpu_usage_before_forced_param*100,-1.0)

      | extend percentage_compile_after =  iif (''UserPrimaryGroup.DBId5'' == group_name,total_compile_cpu_ms_after*1.0/cpu_usage_before_forced_param*100,-1.0)'
