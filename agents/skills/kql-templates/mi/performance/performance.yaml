- id: MI-performance-248
  Topic: Connection-errors-and-not-able-to-change-network-settings
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Performance-and-Query-Execution/Other-errors-and-exceptions/Connection-errors-and-not-able-to-change-network-settings.md
  Prompts:
  - MI Connection-errors-and-not-able-to-change-network-settings
  - Managed Instance Connection-errors-and-not-able-to-change-network-settings
  CustomizedParameters:
  - ClusterName
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'MonCounterOneMinute

      | where TIMESTAMP between (datetime(2022-10-17 18:00)..datetime(2022-10-25 18:00)

      | where NodeName =~ "DB4C.0" and ClusterName =~ "{ClusterName}"

      | extend Category = case(CounterName =~  @"\Memory\Available MBytes", "Memory"

      strlen(extract(@"\\Processor\([0-9]{1,2}\)\\% (Privileged Time|Processor Time)", 0, CounterName, typeof(string))) >0, "Processor"

      strlen(extract(@"\\Processor\(_Total\)\\% (Processor Time|Privileged Time)", 0, CounterName, typeof(string))) >0, "Total Processor"

      strlen(extract(@"\\LogicalDisk\([A-Z]:\)\\Avg. Disk sec/(Read|Write)", 0, CounterName, typeof(string))) >0, "Disk", "Other")

      | where Category !in ( "Other", "Memory", "Disk")

      | summarize avg(CounterValue) by bin(TIMESTAMP, 5min),  CounterName, Category

      | render timechart'
- id: MI-performance-249
  Topic: Connection-errors-and-not-able-to-change-network-settings
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Performance-and-Query-Execution/Other-errors-and-exceptions/Connection-errors-and-not-able-to-change-network-settings.md
  Prompts:
  - MI Connection-errors-and-not-able-to-change-network-settings
  - Managed Instance Connection-errors-and-not-able-to-change-network-settings
  CustomizedParameters:
  - ClusterName
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where ClusterName startswith "{ClusterName}"

      | where originalEventTimestamp >= issue_time - 2d

      | where event == "process_login_finish"

      | where is_success == 0

      | where total_time_ms > ssl_treshold

      | where isnotempty(message)

      | project event, AppName, message

      | extend parsed = parse_xml(message)

      | project event, AppName, parsed_wait_stats = parsed.waitstats.wait

      | mv-expand parsed_wait_stats

      | extend wait_stat_name = tostring(parsed_wait_stats["@name"])

      | extend wait_stat_max_time = toint(parsed_wait_stats["@maxTime"])

      | project event, AppName, wait_stat_name, wait_stat_max_time

      | summarize total_wait_stat_time = sum(wait_stat_max_time), avg_wait_stat_time = sum(wait_stat_max_time) / count() by AppName, wait_stat_name'
