- id: MI-performance-225
  Topic: Storage-latency-troubleshooting
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Performance-and-Query-Execution/High-IO-utilization/Storage-latency-troubleshooting.md
  Prompts:
  - MI Storage-latency-troubleshooting
  - Managed Instance Storage-latency-troubleshooting
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: 'MonSQLXStoreIOStats

      | where originalEventTimestamp between (datetime(2023-09-27 08:00:00)..datetime(2023-09-27 10:30:00))

      | where LogicalServerName =~ "{ServerName}" // managed instance name

      | where file_path contains "b93bef6a-b74a-4246-9143-68cdb3164afb" // You can get this from the first query in the previous section

      | where event == ''xstore_io_stats''

      | where file_path endswith ''.ldf'' or file_path endswith''.mdf'' or file_path endswith ''.ndf''

      | extend period_ms = column_ifexists(''period_ms'',-1)

      | extend period_ms = iif(isempty(period_ms), -1, period_ms)

      | extend periodSeconds = iif(period_ms==-1, 30., period_ms/1000.)

      | parse kind=regex file_path with* ''/data/'' file_name:string

      | project TIMESTAMP, LogicalServerName, AppName, NodeName, file_path, file_name, period_ms, periodSeconds,

      total_reads, total_writes, total_read_bytes, total_write_bytes, total_read_microsec, total_write_microsec, total_retries, total_retry_wait_time_ms, total_outstanding_io, page_blob_tier

      | where file_name !in(''replicatedmaster_1.mdf'', ''msdb_1.mdf'', ''managed_model_1.mdf'', ''replicatedmaster_2.ldf'', ''msdb_2.ldf'', ''managed_model_2.ldf'')

      | extend

      // IOPS data, read, write and total

      R_IOPS = round(1. * (total_reads) / periodSeconds, 2),

      W_IOPS = round(1. * (total_writes) / periodSeconds, 2),

      IOPS = round(1. * (total_writes+total_reads) / periodSeconds, 2),

      // Throughput, read, write and total

      R_MBPS = round(1. * (total_read_bytes) / periodSeconds/ 1024. / 1024., 2),

      W_MBPS = round(1. * (total_write_bytes) / periodSeconds/ 1024. / 1024., 2),

      MBPS = round(1. * (total_write_bytes+total_read_bytes) / periodSeconds/ 1024. / 1024., 2),

      // Latencies in ms, read, write and total

      r_io_lat_ms = round(1. * (total_read_microsec) / 1000. / (total_reads), 2),

      w_io_lat_ms = round(1. * (total_write_microsec) / 1000. / (total_writes), 2),

      io_lat_ms = round(1. * (total_write_microsec+total_read_microsec) / 1000. / (total_writes+total_reads), 2),

      // Avg IO size for reads, writes and total

      r_io_size_kb = round(1. * (total_read_bytes) / 1024. / (total_reads), 2),

      w_io_size_kb = round(1. * (total_write_bytes) / 1024. / (total_writes), 2),

      io_size_kb = round(1. * (total_write_bytes+total_read_bytes) / 1024. / (total_writes+total_reads)'
