  - Check MonManagedInstanceResourceStats ClusterName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedInstanceResourceStats
    ExecutedQuery: "let startTime = datetime(2020-10-09 02:10:13);  \nlet endTime = datetime(2020-10-15 03:12:11);  \nlet srvrName = 'pccsql-use2-prod-w26-cli0010';  \nlet clusName = 'tr5433.eastus2-a.worker.database.windows.net';\
      \  \nMonManagedInstanceResourceStats  \n| where TIMESTAMP>=startTime and TIMESTAMP<=endTime  \n| where LogicalServerName == srvrName  \n| project TIMESTAMP, LogicalServerName, ClusterName, NodeName\
      \  \n| summarize by bin(TIMESTAMP,5m), LogicalServerName, ClusterName, NodeName  \n| join kind=inner (  \nMonCounterOneMinute  \n| where TIMESTAMP>=startTime and TIMESTAMP<=endTime  \n| where ClusterName\
      \ == clusName  \n| where CounterName startswith '[Network](file://Network) Interface(Microsoft Hyper-V' and (CounterName endswith '[Bytes](file://Bytes) Received/sec' or CounterName endswith '[Bytes](file://Bytes)\
      \ Sent/sec')  \n| project TIMESTAMP, ClusterName, NodeName, Cnt = iif (CounterName endswith '[Bytes](file://Bytes) Received/sec', 'Received', 'Sent'), round(MBps = CounterValue / 1024. / 1024., 2)\
      \  \n| summarize avg(MBps), max(MBps) by bin(TIMESTAMP,5m), ClusterName, NodeName, Cnt  \n) on TIMESTAMP, ClusterName, NodeName  \n| parse NodeName with 'DB' core_count:int 'C.' *  \n| extend core_count=iif(isempty(\
      \ core_count), 80, core_count)  \n| extend netLimitMBps = 62.5 * core_count  \n| extend avg_netPerc = 1. * avg_MBps / netLimitMBps, max_netPerc = 1. * max_MBps / netLimitMBps  \n| project TIMESTAMP,\
      \ LogicalServerName, NodeName, Cnt, round(avg_MBps,2), round(max_MBps,2), netLimitMBps, round(avg_netPerc,2), round(max_netPerc,2)"
