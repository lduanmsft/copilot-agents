  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where LogicalServerName =~ ServerName

      | where TIMESTAMP > ago(daysAgo)

      | extend orig_query_hash = query_hash, orig_plan_hash = query_plan_hash

      | lookup kind = leftouter (Top5QueriesAndPlans | distinct query_hash, aggregated_query_hash) on query_hash

      | extend query_hash = iff(isnull(aggregated_query_hash), ''OTHERS'', query_hash)

      | extend statement_type = iff(isnull(aggregated_query_hash), '''', statement_type)

      | lookup kind = leftouter (Top5QueriesAndPlans | project-away aggregated_query_hash) on query_hash, query_plan_hash

      | extend query_plan_hash = iff(isnull(aggregated_query_plan_hash), ''OTHERS'', query_plan_hash)

      | summarize query_ids = make_set(query_id, 4), plan_ids = make_set(plan_id, 4)

      , DistinctQueryHashes = dcount(orig_query_hash), DistinctPlanHashes = dcount(orig_plan_hash)

      , TotalExecutions = sum(execution_count)

      , TotalTimeouts = sumif(execution_count, exec_type == 3), TotalErrors = sumif(execution_count, exec_type == 4)

      , TotalQueryDuration_ms = sum(elapsed_time) / 1000.0, MaxQueryDuration_ms = max(max_elapsed_time) / 1000.0

      , TotalQueryCPU_ms = sum(cpu_time) / 1000.0, MaxQueryCPU_ms = max(max_cpu_time) / 1000.0

      , TotalLogicalReads = sum(logical_reads), MaxLogicalReads = sum(max_logical_reads)

      , TotalLog_MB = sum(log_bytes_used) / 1024.0 / 1024.0, MaxLog_MB = sum(max_log_bytes_used) / 128.0 / 1024.0

      , TotalMemoryGrant_MB = sum(max_query_memory_pages) / 128.0, MaxMemoryGrant_MB = max(max_max_query_memory_pages)

      , TotalDop = sum(dop)

      by query_hash, query_plan_hash, statement_type, aggregated_query_hash, aggregated_query_plan_hash

      | lookup kind = leftouter ('
- id: MI-performance-336
  Topic: Useful-Kusto-queries
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful-Kusto-queries
  - Managed Instance Useful-Kusto-queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsWaitStats
    ExecutedQuery: 'MonWiQdsWaitStats

      | where LogicalServerName =~ ServerName

      | where TIMESTAMP > ago(daysAgo)

      | lookup kind = leftouter (Top5QueriesAndPlans | distinct query_hash, aggregated_query_hash) on query_hash

      | extend query_hash = iff(isnull(aggregated_query_hash), ''OTHERS'', query_hash)

      | lookup kind = leftouter (Top5QueriesAndPlans | project-away aggregated_query_hash) on query_hash, query_plan_hash

      | extend query_plan_hash = iff(isnull(aggregated_query_plan_hash), ''OTHERS'', query_plan_hash)

      | summarize category_wait_time_ms = sum(total_query_wait_time_ms)

      , max_category_wait_time = max(max_query_wait_time_ms)

      by query_hash, query_plan_hash, wait_category

      | sort by category_wait_time_ms desc

      | extend wait_pack = pack(wait_category, category_wait_time_ms)

      | summarize TotalWaits_ms = sum(category_wait_time_ms)

      , MaxWaits_ms = sum(max_category_wait_time)

      , Top_3_WaitCategories_total_ms = tostring(make_list(wait_pack, 3))

      by query_hash, query_plan_hash

      ) on query_hash, query_plan_hash

      | extend query_hash = iff(query_hash =~ ''OTHERS'', strcat(''OTHERS ('', DistinctQueryHashes, '' query hashes)''), query_hash)

      | extend query_plan_hash = iff(query_plan_hash =~ ''OTHERS'', strcat(''OTHERS ('', DistinctPlanHashes, '' plan hashes)''), query_plan_hash)

      | extend query_ids = iff(array_length(query_ids) > 3, strcat(''['',strcat_array(array_slice(query_ids, 0, 2), '',''), '',...]''), query_ids)

      | extend plan_ids = iff(array_length(plan_ids) > 3, strcat(''['',strcat_array(array_slice(plan_ids, 0, 2), '',''), '',...]''), plan_ids)

      | extend TotalQueryCPU_Pct = round(100.0 * (TotalQueryCPU_ms / (345669 * 1000.0)), 1)

      | extend AvgQueryCPU_ms = round(TotalQueryCPU_ms / TotalExecutions, 1), MaxQueryCPU_ms = round(MaxQueryCPU_ms, 1)

      | extend AvgQueryDuration_ms = round(TotalQueryDuration_ms / TotalExecutions, 1), MaxQueryDuration_ms = round(MaxQueryDuration_ms, 1)

      | extend TotalWaits_ms = iff(isnull(TotalWaits_ms), 0, TotalWaits_ms), MaxWaits_ms = iff(isnull(MaxWaits_ms), 0, MaxWaits_ms)

      | extend AvgWaits_ms = round(toreal(TotalWaits_ms) / TotalExecutions, 1)

      | extend AvgLogicalReads = round(TotalLogicalReads / TotalExecutions, 0)

      | extend TotalLog_MB = round(TotalLog_MB, 1), AvgLog_MB = round(TotalLog_MB / TotalExecutions, 1), MaxLog_MB = round(MaxLog_MB, 1)

      | extend AvgMemoryGrant_MB = round(TotalMemoryGrant_MB / TotalExecutions, 1), MaxMemoryGrant_MB = round(MaxMemoryGrant_MB, 1)

      | extend AvgDop = round(TotalDop * 1.0 / TotalExecutions, 1)

      | sort by aggregated_query_hash desc nulls last, aggregated_query_plan_hash desc nulls last

      | project query_hash, query_plan_hash, query_ids, plan_ids

      , statement_type = trim_start(''x_estyp'', statement_type), TotalExecutions, TotalTimeouts, TotalErrors

      , TotalQueryCPU_Pct, AvgQueryCPU_ms, MaxQueryCPU_ms, AvgQueryDuration_ms, MaxQueryDuration_ms

      , TotalWaits_ms, AvgWaits_ms, MaxWaits_ms, Top_3_WaitCategories_total_ms

      , TotalLogicalReads, AvgLogicalReads, MaxLogicalReads, TotalLog_MB, AvgLog_MB, MaxLog_MB

      , AvgMemoryGrant_MB, MaxMemoryGrant_MB, AvgDop'
