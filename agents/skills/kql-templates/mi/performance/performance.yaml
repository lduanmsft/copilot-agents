      | project originalEventTimestamp, message, parsed_message

      | summarize count(), min(originalEventTimestamp), max(originalEventTimestamp), any(message) by parsed_message

      | order by count_ desc

      | project min_originalEventTimestamp, max_originalEventTimestamp, count_, parsed_message, any_message'
- id: MI-performance-305
  Topic: How-to-work-on-the-MI-OOM-issue
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/How-to-work-on-the-MI-OOM-issue.md
  Prompts:
  - MI How-to-work-on-the-MI-OOM-issue
  - Managed Instance How-to-work-on-the-MI-OOM-issue
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: Monitor
    ExecutedQuery: '| `oom_cause_desc` | nvarchar(30), not null | Description of `oom_cause`, one of:  
0. UNKNOWN - OOM cause could not be determined  
1. HEKATON_POOL_MEMORY_LOW - Insufficient memory
      in the resource pool used for In-Memory OLTP. For more information, see [Monitor In-Memory OLTP](https://learn.microsoft.com/en-us/azure/azure-sql/database/in-memory-oltp-monitor-space?view=azuresql-db&preserve-view=true).  
2.
      MEMORY_LOW - Insufficient memory available to the database engine process  
3. OS_MEMORY_PRESSURE - OOM due to external memory pressure from the operating system  
4. OS_MEMORY_PRESSURE_SQL
      - OOM due to external memory pressure from other database engine instance(s)  
5. NON_SOS_MEMORY_LEAK - OOM due to a leak in non-SOS memory, for example, loaded modules  
6. SERVERLESS_MEMORY_RECLAMATION
      - OOM related to memory reclamation in a serverless database  
7. MEMORY_LEAK - OOM due to a leak in SOS memory  
8. SLOW_BUFFER_POOL_SHRINK - OOM due to the buffer pool not releasing memory
      fast enough under memory pressure  
9. INTERNAL_POOL - Insufficient memory in the internal resource pool  
10. SYSTEM_POOL - Insufficient memory in a system resource pool  
11. QUERY_MEMORY_GRANTS
      - OOM due to large memory grants held by queries  
12. REPLICAS_AND_AVAILABILITY - OOM due to workloads in SloSecSharedPool resource pool |

      | --- | --- | --- |'
