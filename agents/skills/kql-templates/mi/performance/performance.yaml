      \ DB4C.2  \n| where event == \"directory_cleanup_file_delete\" or event == \"directory_cleanup_done\"  \n| where file_path contains \"Worker.CL\" or (target_directory contains \"Worker.CL\")  \n|\
      \ where file_path contains '[workdata](file://work/data/)'  \n| where application_name == \"StaleDirectory\"  \n| project TIMESTAMP, file_path, file_size_mb = file_size/1024./1024., file_spared"
- id: MI-performance-228
  Topic: TSGCL0258-High-disk-usage-due-to-stale-tempdb-file
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0258-High-disk-usage-due-to-stale-tempdb-file.ipynb
  Prompts:
  - MI tempdb usage analysis by node
  - MonRgManager TIMESTAMP ClusterName NodeName
  - Check MonRgManager ClusterName NodeName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: "MonRgManager  \n| where TIMESTAMP > ago(3h)  \n| where ClusterName == \"{ClusterName}\" //ex. tr7310.eastus1-a.worker.database.windows.net  \n| where NodeName == \"{NodeName}\" //ex.\
      \ DB4C.2  \n| where event == \"directory_cleanup_file_delete\" or event == \"directory_cleanup_done\"  \n| where file_path contains \"Worker.CL\" or (target_directory contains \"Worker.CL\")  \n|\
      \ where file_path contains '[workdata](file://work/data/)'  \n| where application_name == \"StaleDirectory\"  \n| parse file_path with * '?' path 'data' *  \n| extend dirPath = strcat(path, 'data')\
      \  \n| summarize num_files = count(), dirSizeMb = sumif(file_size/1024./1024., file_spared == 1) by dirPath, bin(TIMESTAMP, 1m)"
- id: MI-performance-229
  Topic: TSGCL0258-High-disk-usage-due-to-stale-tempdb-file
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0258-High-disk-usage-due-to-stale-tempdb-file.ipynb
  Prompts:
  - MI tempdb usage analysis by server
  - MonCounterFiveMinute usage_treshold appFolderCount
  - Check MonCounterFiveMinute usage_treshold appFolderCount
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterFiveMinute
    ExecutedQuery: 'let queryCluster = (clusterName: string, databaseName: string)

      {

      let clusterNodes =

      (

      cluster(clusterName).database(databaseName).

      MonCounterFiveMinute

      | where TIMESTAMP > ago(1h)

      | where NodeName startswith "DB"

      | summarize nodes_in_role = dcount(NodeName) by ClusterName, NodeRole

      );

      let miRgStaleData =

      (

      cluster(clusterName).database(databaseName).

      MonRgManager

      | where TIMESTAMP > ago(3h)

      | where event == ''directory_cleanup_file_delete'' or event == ''directory_cleanup_done''

      | where file_path contains ''Worker.CL'' or (target_directory contains ''Worker.CL'')

      | where file_path contains ''\\work\\data\\''

      | where application_name == ''StaleDirectory''

      | where file_spared == 1

      | summarize arg_max(TIMESTAMP, file_size) by file_path, ClusterName, NodeName, NodeRole

      );

      let miNodesWithHdrStaleFiles = (

      miRgStaleData

      | where file_path endswith ''.hdr''

      | summarize hdrMaxTimestamp = max(TIMESTAMP) by ClusterName, NodeName, NodeRole

      );

      let miRingsSloInfo =

      (

      cluster(clusterName).database(databaseName).

      MonManagedInstanceResourceStats

      | where TIMESTAMP > ago(1h)

      | summarize by ClusterName, cpu_cap_per_second, sku, NodeRole, server_name

      | summarize has_bc = dcountif(sku, sku == ''BusinessCritical'') by ClusterName, NodeRole

      );

      let nodesWithReplica =

      (

      cluster(clusterName).database(databaseName).

      MonDmDbHadrReplicaStates

      | where TIMESTAMP > ago(1h)

      | where AppTypeName == ''Worker.CL''

      | summarize by ClusterName, NodeName

      );

      miRgStaleData

      | join kind = inner (

      miNodesWithHdrStaleFiles

      ) on ClusterName, NodeName

      | where abs(datetime_diff("minute", TIMESTAMP, hdrMaxTimestamp)) < 5

      // Calculate usage percentage, num of app folders and estimate node size

      | extend file_size_gb = file_size*1.0/1024/1024/1024

      | parse NodeName with ''DB'' node_size:int ''C.'' rest

      | extend node_size = iif(isnull( node_size), 80, node_size)

      | extend disk_size_gb = iif(node_size >= 80 , 5200, node_size * 40)

      | parse file_path with * ''\\Worker.CL_App'' AppId ''\\'' *

      | summarize overhead_gbsum=sum(file_size_gb), appFolderCount = dcount(AppId) by NodeName, ClusterName, disk_size_gb, NodeRole

      | extend usage_pct = round(overhead_gbsum/disk_size_gb * 100, 2)

      // BC instances are higher risk

      | join kind=inner (

      miRingsSloInfo

      ) on ClusterName, NodeRole

      | extend usage_treshold = iff (has_bc == 1, 5, 30)

      | where usage_pct > usage_treshold

      // Nodes with active replica are not actionable

      | join kind=leftanti (

      nodesWithReplica

      ) on ClusterName, NodeName

      | join kind = inner (

      clusterNodes

      ) on ClusterName, NodeRole

      };

      (queryCluster("https://sqlazureau2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazurebr2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazureca2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazureince2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazurecus2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazureeas2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazureeus12.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazureeus22.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazurefra.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazureinso2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazureinwe2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazureja2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazurencus3.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazureneu2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazurescus2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazureseas2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazrwcus.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazureweu2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazurewus2.kustomfa.windows.net", "sqlazure1"))

      | union (queryCluster ("https://sqlazurekor.kustomfa.windows.net", "sqlazure1"))

