- id: MI-performance-201
  Topic: SOPCL00193-CloudLifter-High-disk-usage-detection
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/SOPCL00193-CloudLifter-High-disk-usage-detection.ipynb
  Prompts:
