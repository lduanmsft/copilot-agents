- id: MI-performance-235
  Topic: TSGCLHE004-Broken_Esan_Volume_Group_Endpoint
  Source: TSG-SQL-MI-Performance/content/Hermes/TSGCLHE004-Broken_Esan_Volume_Group_Endpoint.md
  Prompts:
  - MI login and connection errors
  - MonSQLSystemHealth originalEventTimestamp instance_rg_size
  - Check MonSQLSystemHealth originalEventTimestamp
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'let startDate = ago(1h);

      let replMasterClaimFailureCapture = "Failed to claim ownership on shared managed disks, initiating SQL Exit.";

      let connectFailurePattern = @"IscsiPsVolumeConnector::Connect\].*finished execution, status 0x[0-9a-fA-F]*[1-9a-fA-F]";

      let loginUnsuccessfulPattern = @"Login\s+unsuccessful";

      let connectSuccessPattern = @"IscsiPsVolumeConnector::Connect\].*finished execution, status 0x0+($|[^0-9a-fA-F])";

      let minFailedConnectThreshold = 3;

      let FailedClaimSqlExit =

      MonSQLSystemHealth

      | where originalEventTimestamp >= startDate

      | where instance_rg_size startswith "MIWCOW" and instance_rg_size contains "HE"

      | where message contains replMasterClaimFailureCapture

      | project instance_rg_size, LogicalServerName, ClusterName, NodeRole, AppName, AppTypeName, SqlExitTs = originalEventTimestamp;'
