- id: MI-performance-192
  Topic: 1.-Managed-Instance-network-throughput-saturated-_
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/1.-Managed-Instance-network-throughput-saturated-_.ipynb
  Prompts:
  - MI connectivity and networking by server
  - MonDmRealTimeResourceStats slo_name LogicalServerName
  - Check MonDmRealTimeResourceStats slo_name NodeName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: "let SvmManagedServersWhichDidNotChangeNodes = MonDmRealTimeResourceStats  \n| where FilterFunc (TIMESTAMP, ago(QueryTimeWindow), true, AppTypeName, ClusterName, ClusterNameParam, NodeName)\
      \  \n| where slo_name contains 'MIGP' and slo_name contains 'G5_NP'  \n| summarize by LogicalServerName, NodeName  \n| summarize dcount(NodeName) by LogicalServerName  \n| project LogicalServerName;\n\
      // SVM total input network throughput"
- id: MI-performance-193
  Topic: 1.-Managed-Instance-network-throughput-saturated-_
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/1.-Managed-Instance-network-throughput-saturated-_.ipynb
  Prompts:
  - MI connectivity and networking by server
  - MonCounterOneMinute CounterName slo_name
  - Check MonCounterOneMinute CounterName slo_name
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: "let TotalNetworkThroughput = MonCounterOneMinute  \n| where FilterFunc (TIMESTAMP, ago(QueryTimeWindow), false, '', ClusterName, ClusterNameParam, NodeName)  \n| where CounterName startswith\
      \ '[Network](file://Network) Interface(Microsoft Hyper-V' and CounterName endswith '[Bytes](file://Bytes) Received/sec'  \n| summarize avg(CounterValue) by ClusterName, NodeName  \n| extend AvgTotalNetworkThroughputMBPerS\
      \ = avg_CounterValue / 1024. / 1024 // the counters get reported as total bytes per second  \n| join kind=inner (  \nMonDmRealTimeResourceStats  \n| where FilterFunc (TIMESTAMP, ago(QueryTimeWindow),\
      \ true, AppTypeName, ClusterName, ClusterNameParam, NodeName)  \n| summarize arg_max(TIMESTAMP, ClusterName, NodeName, slo_name) by LogicalServerName  \n| where slo_name contains 'MIGP' and slo_name\
      \ contains 'G5_NP'  \n| join kind=inner (\n    SvmManagedServersWhichDidNotChangeNodes \n) on LogicalServerName  \n| project LogicalServerName, ClusterName, NodeName, Slo = slo_name  \n) on ClusterName,\
      \ NodeName  \n| parse NodeName with 'DB' VMVCoreCount:int 'C.' *  \n| extend MaxTotalNetworkThroughputMBPerS = VMVCoreCount * NodeNetworkThroughputPerVCoreParam  \n| project ClusterName, NodeName,\
      \ LogicalServerName, Slo, VMVCoreCount, AvgTotalNetworkThroughputMBPerS , MaxTotalNetworkThroughputMBPerS;\n// #1 “ Detect SVM Managed Servers which have total network throughput saturated  \n// We\
      \ only get data for SVM sizes less than 80 (no full nodes) \nTotalNetworkThroughput \n| where AvgTotalNetworkThroughputMBPerS > PercentageOfNetworkTakenInOrderToProclaimSaturation * MaxTotalNetworkThroughputMBPerS\n\
      | where VMVCoreCount < 80"
- id: MI-performance-194
  Topic: 2.-Managed-Instance-log-growth-in-danger-of-fillin
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
  Prompts:
