    ExecutedQuery: "let BackupsInProgress = MonBackup  \n| where FilterFunc (TIMESTAMP, ago(BackupInProgressQueryTimeWindow), true, AppTypeName, ClusterName, ClusterNameParam, NodeName)  \n| where package\
      \ == 'XdbBackupServiceXEvents'  \n| where event_type in ('BACKUP_START', 'BACKUP_END', 'BACKUP_ERROR')  \n| where backup_type=='Full'  \n| where database_name !in ('msdb','replicatedmaster','managed_model',\
      \ 'master','')  \n| summarize by logical_server_name, database_name, originalEventTimestamp, event_type  \n| summarize arg_max (originalEventTimestamp, event_type) by logical_server_name, database_name\
      \  \n| where event_type=='BACKUP_START'  \n| project LogicalServerName = logical_server_name, DatabaseNameGuid = database_name, BackupStartTimestamp = originalEventTimestamp;\n// Data about throughput\
      \ of backups for databases under backup"
- id: MI-performance-196
  Topic: 2.-Managed-Instance-log-growth-in-danger-of-fillin
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
  Prompts:
  - MI backup status and duration by server
  - MonSqlRgHistory event TIMESTAMP ReadThroughput
  - Check MonSqlRgHistory event ReadThroughput
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: "let BackupsInProgressDataInfo = BackupsInProgress  \n| join kind=inner (  \nMonSqlRgHistory  \n| where FilterFunc (TIMESTAMP, ago(BackupInProgressQueryTimeWindow), true, AppTypeName,\
      \ ClusterName, ClusterNameParam, NodeName)  \n| where event == 'aggregated_workload_groups_plus_history' and group_name == 'InMemFullBackupGroup'  \n| project TIMESTAMP, LogicalServerName, ReadThroughput\
      \ = delta_read_bytes_total / datetime_diff('second', end_aggregated_sample, start_aggregated_sample) / 1024. / 1024.  \n) on LogicalServerName  \n| where TIMESTAMP >= BackupStartTimestamp;\n// Data\
      \ about completed MBs of backups for databases under backup  \nlet BackupsInProgressCompletedData = BackupsInProgressDataInfo  \n| summarize AvgBackupDiskThroughputSinceBackupStartMBPerS=avg(ReadThroughput)\
      \ by LogicalServerName, DatabaseNameGuid, BackupStartTimestamp  \n| extend BackupDurationInS = (now()-BackupStartTimestamp) / 1s  \n| extend EstimatedBackupDoneInMB = AvgBackupDiskThroughputSinceBackupStartMBPerS\
      \ * BackupDurationInS  \n| project LogicalServerName, DatabaseNameGuid, AvgBackupDiskThroughputSinceBackupStartMBPerS, BackupDurationInS, EstimatedBackupDoneInMB;\n// Data about throughputs of backups\
      \ for databases under backup"
- id: MI-performance-197
  Topic: 2.-Managed-Instance-log-growth-in-danger-of-fillin
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
