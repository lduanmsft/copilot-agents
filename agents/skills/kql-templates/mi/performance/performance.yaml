      | where  (AppName =~  "appname" and ((PreciseTimeStamp between (datetime(2024-01-07 07:35:04)..datetime(2024-01-10 10:04:19)) and ClusterName =~ "{ClusterName}" and NodeName =~ ''nodename'')

      )

      )

      | extend version_store_usage_gb = round((version_store_reserved_page_count) * 8.0 /1024/1024, 0)//This should be 0 as ADR is enabled by default

