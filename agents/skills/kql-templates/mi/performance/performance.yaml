  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'let startTime = datetime(2024-03-10 10:00:00.00);

      let endTime = datetime(2024-04-03 13:00:00.00);

      let logicalServerName = ''ish34-pre-db01'';

      MonWiQdsExecStats

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      | where LogicalServerName == logicalServerName

      | where event == "query_store_runtime_stats_update"

      | project TIMESTAMP, LogicalServerName, database_name, logical_database_guid,'
