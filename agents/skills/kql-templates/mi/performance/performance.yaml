  - MonWiQdsExecStats LogicalServerName TIMESTAMP query_hash
  - Check MonWiQdsExecStats query_hash statement_type
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where LogicalServerName =~ "{ServerName}"

      //| where database_name =~ "{DatabaseName}"

      | filter TIMESTAMP>= datetime(2022-01-03 20:00:00Z)

      | where query_hash in("0x516F006C6387B0D1","0x28C6F06865991807","0xDBDC1B28B5F0329A","0xF535BDE5B722B68E","0x41730528F28C94BB")

