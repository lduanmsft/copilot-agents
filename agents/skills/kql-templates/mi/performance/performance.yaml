- id: MI-performance-362
  Topic: Useful-Kusto-queries
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful-Kusto-queries
  - Managed Instance Useful-Kusto-queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      | where AppName !startswith ''b-'' and AppName !startswith ''v-''

      | where TIMESTAMP > ago(daysAgo)

      | where LogicalServerName =~ ServerName

      //| where table_name== ''sysdbreg''

      | extend is_parameterization_forced = (binary_and(status2, 0x08000000) == 0x08000000)

      | extend is_auto_create_stats_on = (binary_and(status2, 0x1000000) == 0x1000000)

      | extend is_auto_create_stats_incremental_on = (binary_and(status2, 0x00400000) == 0x00400000)

      | extend is_auto_update_stats_async_on = (binary_and(status2, 0x80000000) == 0x80000000)

      | extend is_auto_update_stats_async_on = (binary_and(status2, 0x80000000) == 0x80000000)

      | extend is_query_store_on= (binary_and(status2, 0x00000010) == 0x00000010) //DBR_QDSENABLED

      | extend is_auto_update_stats_on= iif((status2/1073741824) % 2 == 0, false, true)

      | project TIMESTAMP, LogicalServerName, logical_db_name, cmptlevel, is_query_store_on, is_auto_create_stats_on, is_auto_update_stats_on, is_parameterization_forced, is_auto_update_stats_async_on,
      is_auto_create_stats_incremental_on

      | top 1 by TIMESTAMP desc

      | project Packed = pack(

      ''cmptlevel'', cmptlevel,

      ''is_query_store_on'', is_query_store_on,

      ''is_auto_create_stats_on'', is_auto_create_stats_on,

      ''is_auto_update_stats_on'', is_auto_update_stats_on,

      ''is_parameterization_forced'', is_parameterization_forced,

      ''is_auto_update_stats_async_on'', is_auto_update_stats_async_on,

      ''is_auto_create_stats_incremental_on'', is_auto_create_stats_incremental_on

      )

      | mvexpand Packed

      | parse tostring(Packed) with ''{\x22''Property''\x22:''Value''}''

      | project Property, Value

      | order by Property asc'
