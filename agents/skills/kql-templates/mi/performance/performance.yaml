    ExecutedQuery: 'MonLogin

      | where TIMESTAMP > ago({TimeRange}) and TIMESTAMP < now()

      | where LogicalServerName =~ "{ServerName}" or logical_server_name =~ "{ServerName}"

      | where event == "process_login_finish" and package == "xdbgateway" and event == "process_login_finish"

      | extend bit21 = toint(login_flags / 2097152) % 2

      | extend appIntentReadOnly = bit21

      //| summarize count() by bin(originalEventTimestamp, time(1h)), is_success, instance_port, appIntentReadOnly, NodeName

      | project originalEventTimestamp, appIntentReadOnly, is_success, instance_port, instance_name, application_name

      | where appIntentReadOnly == 1

      | sort by originalEventTimestamp desc'
- id: MI-performance-242
  Topic: Tempdb-size-increase-after-failover-on-Business-Critical
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Tempdb-size-increase-after-failover-on-Business-Critical.md
  Prompts:
  - MI Tempdb-size-increase-after-failover-on-Business-Critical
  - Managed Instance Tempdb-size-increase-after-failover-on-Business-Critical
  CustomizedParameters:
  - ClusterName
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let AggInterval_do_NOT_change = time(15m);

      let FileSizes = materialize(MonSqlRgHistory

      | where  (AppName =~  "appname" and ((originalEventTimestamp between (datetime(2024-01-05 07:35:04)..datetime(2024-01-10 10:04:19)) and ClusterName =~ "{ClusterName}" and NodeName =~ ''NodeName'')

      )

      )

      | where event==''aggregated_virtual_files_io_history''

      | where database_id == 2

      | summarize file_space_used_gb =

      sum(spaceused_mb / 1024.0),//Actual space used.

      file_space_reserved_gb = sum(size_on_disk_bytes / 1024.0 / 1024.0 / 1024.0),//File size on the disk.

      maximum_gb=sum(max_size_mb/1024.0)//the maximum size to which files can grow.

      by  type_desc,bin(originalEventTimestamp, AggInterval_do_NOT_change), NodeName);

      let LogSize = FileSizes

      | where type_desc == ''LOG''

      | extend log_space_used_gb = round(file_space_used_gb,1),

      log_space_reserved_gb = round(file_space_reserved_gb,1),

      log_maximum_gb = round(maximum_gb,1);

      let DataSize = FileSizes

      | where type_desc == ''ROWS''

      | extend data_space_used_gb = round(file_space_used_gb,1),

      data_space_reserved_gb = round(file_space_reserved_gb,1),

      data_maximum_gb = round(maximum_gb,1);'
- id: MI-performance-243
  Topic: Tempdb-size-increase-after-failover-on-Business-Critical
