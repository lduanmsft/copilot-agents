      \ == 'ROWS'  \n| summarize arg_max(TIMESTAMP, spaceused_mb, size_on_disk_bytes ) by LogicalServerName, db_name, file_id  \n| summarize sum(spaceused_mb), sum(size_on_disk_bytes ) by LogicalServerName,\
