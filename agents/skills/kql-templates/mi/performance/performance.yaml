- id: MI-performance-192
  Topic: 1.-Managed-Instance-network-throughput-saturated-_
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/1.-Managed-Instance-network-throughput-saturated-_.ipynb
  Prompts:
  - MI connectivity and networking by server
  - MonDmRealTimeResourceStats slo_name LogicalServerName
  - Check MonDmRealTimeResourceStats slo_name NodeName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: "let SvmManagedServersWhichDidNotChangeNodes = MonDmRealTimeResourceStats  \n| where FilterFunc (TIMESTAMP, ago(QueryTimeWindow), true, AppTypeName, ClusterName, ClusterNameParam, NodeName)\
      \  \n| where slo_name contains 'MIGP' and slo_name contains 'G5_NP'  \n| summarize by LogicalServerName, NodeName  \n| summarize dcount(NodeName) by LogicalServerName  \n| project LogicalServerName;\n\
      // SVM total input network throughput"
- id: MI-performance-193
  Topic: 1.-Managed-Instance-network-throughput-saturated-_
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/1.-Managed-Instance-network-throughput-saturated-_.ipynb
  Prompts:
  - MI connectivity and networking by server
  - MonCounterOneMinute CounterName slo_name
  - Check MonCounterOneMinute CounterName slo_name
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: "let TotalNetworkThroughput = MonCounterOneMinute  \n| where FilterFunc (TIMESTAMP, ago(QueryTimeWindow), false, '', ClusterName, ClusterNameParam, NodeName)  \n| where CounterName startswith\
      \ '[Network](file://Network) Interface(Microsoft Hyper-V' and CounterName endswith '[Bytes](file://Bytes) Received/sec'  \n| summarize avg(CounterValue) by ClusterName, NodeName  \n| extend AvgTotalNetworkThroughputMBPerS\
      \ = avg_CounterValue / 1024. / 1024 // the counters get reported as total bytes per second  \n| join kind=inner (  \nMonDmRealTimeResourceStats  \n| where FilterFunc (TIMESTAMP, ago(QueryTimeWindow),\
      \ true, AppTypeName, ClusterName, ClusterNameParam, NodeName)  \n| summarize arg_max(TIMESTAMP, ClusterName, NodeName, slo_name) by LogicalServerName  \n| where slo_name contains 'MIGP' and slo_name\
      \ contains 'G5_NP'  \n| join kind=inner (\n    SvmManagedServersWhichDidNotChangeNodes \n) on LogicalServerName  \n| project LogicalServerName, ClusterName, NodeName, Slo = slo_name  \n) on ClusterName,\
      \ NodeName  \n| parse NodeName with 'DB' VMVCoreCount:int 'C.' *  \n| extend MaxTotalNetworkThroughputMBPerS = VMVCoreCount * NodeNetworkThroughputPerVCoreParam  \n| project ClusterName, NodeName,\
      \ LogicalServerName, Slo, VMVCoreCount, AvgTotalNetworkThroughputMBPerS , MaxTotalNetworkThroughputMBPerS;\n// #1 “ Detect SVM Managed Servers which have total network throughput saturated  \n// We\
      \ only get data for SVM sizes less than 80 (no full nodes) \nTotalNetworkThroughput \n| where AvgTotalNetworkThroughputMBPerS > PercentageOfNetworkTakenInOrderToProclaimSaturation * MaxTotalNetworkThroughputMBPerS\n\
      | where VMVCoreCount < 80"
- id: MI-performance-194
  Topic: 2.-Managed-Instance-log-growth-in-danger-of-fillin
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
  Prompts:
  - MI connectivity and networking by server
  - MonCounterOneMinute CounterName slo_name
  - Check MonCounterOneMinute CounterName slo_name
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: "let TotalNetworkThroughput = MonCounterOneMinute  \n| where FilterFunc (TIMESTAMP, ago(QueryTimeWindow), false, '', ClusterName, ClusterNameParam, NodeName)  \n| where CounterName startswith\
      \ '[Network](file://Network) Interface(Microsoft Hyper-V' and CounterName endswith '[Bytes](file://Bytes) Received/sec'  \n| summarize avg(CounterValue) by ClusterName, NodeName  \n| extend AvgTotalNetworkThroughputMBPerS\
      \ = avg_CounterValue / 1024. / 1024 // the counters get reported as total bytes per second  \n| join kind=inner (  \nMonDmRealTimeResourceStats  \n| where FilterFunc (TIMESTAMP, ago(QueryTimeWindow),\
      \ true, AppTypeName, ClusterName, ClusterNameParam, NodeName)  \n| summarize arg_max(TIMESTAMP, ClusterName, NodeName, slo_name) by LogicalServerName  \n| where slo_name contains 'MIGP' and slo_name\
      \ contains 'G5_NP'  \n| join kind=inner (  \n    SvmManagedServersWhichDidNotChangeNodes \n) on LogicalServerName  \n| project LogicalServerName, ClusterName, NodeName, Slo = slo_name  \n) on ClusterName,\
      \ NodeName  \n| parse NodeName with 'DB' VMVCoreCount:int 'C.' *  \n| extend MaxTotalNetworkThroughputMBPerS = VMVCoreCount * NodeNetworkThroughputPerVCoreParam  \n| project ClusterName, NodeName,\
      \ LogicalServerName, Slo, VMVCoreCount, AvgTotalNetworkThroughputMBPerS , MaxTotalNetworkThroughputMBPerS;\n// SVM databases under backup"
- id: MI-performance-195
  Topic: 2.-Managed-Instance-log-growth-in-danger-of-fillin
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
  Prompts:
  - MI backup status by backup type by database
  - MonBackup package event_type backup_type Full
  - Check package Full
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: "let BackupsInProgress = MonBackup  \n| where FilterFunc (TIMESTAMP, ago(BackupInProgressQueryTimeWindow), true, AppTypeName, ClusterName, ClusterNameParam, NodeName)  \n| where package\
      \ == 'XdbBackupServiceXEvents'  \n| where event_type in ('BACKUP_START', 'BACKUP_END', 'BACKUP_ERROR')  \n| where backup_type=='Full'  \n| where database_name !in ('msdb','replicatedmaster','managed_model',\
      \ 'master','')  \n| summarize by logical_server_name, database_name, originalEventTimestamp, event_type  \n| summarize arg_max (originalEventTimestamp, event_type) by logical_server_name, database_name\
      \  \n| where event_type=='BACKUP_START'  \n| project LogicalServerName = logical_server_name, DatabaseNameGuid = database_name, BackupStartTimestamp = originalEventTimestamp;\n// Data about throughput\
      \ of backups for databases under backup"
- id: MI-performance-196
  Topic: 2.-Managed-Instance-log-growth-in-danger-of-fillin
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
  Prompts:
  - MI backup status and duration by server
  - MonSqlRgHistory event TIMESTAMP ReadThroughput
  - Check MonSqlRgHistory event ReadThroughput
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: "let BackupsInProgressDataInfo = BackupsInProgress  \n| join kind=inner (  \nMonSqlRgHistory  \n| where FilterFunc (TIMESTAMP, ago(BackupInProgressQueryTimeWindow), true, AppTypeName,\
      \ ClusterName, ClusterNameParam, NodeName)  \n| where event == 'aggregated_workload_groups_plus_history' and group_name == 'InMemFullBackupGroup'  \n| project TIMESTAMP, LogicalServerName, ReadThroughput\
      \ = delta_read_bytes_total / datetime_diff('second', end_aggregated_sample, start_aggregated_sample) / 1024. / 1024.  \n) on LogicalServerName  \n| where TIMESTAMP >= BackupStartTimestamp;\n// Data\
      \ about completed MBs of backups for databases under backup  \nlet BackupsInProgressCompletedData = BackupsInProgressDataInfo  \n| summarize AvgBackupDiskThroughputSinceBackupStartMBPerS=avg(ReadThroughput)\
      \ by LogicalServerName, DatabaseNameGuid, BackupStartTimestamp  \n| extend BackupDurationInS = (now()-BackupStartTimestamp) / 1s  \n| extend EstimatedBackupDoneInMB = AvgBackupDiskThroughputSinceBackupStartMBPerS\
      \ * BackupDurationInS  \n| project LogicalServerName, DatabaseNameGuid, AvgBackupDiskThroughputSinceBackupStartMBPerS, BackupDurationInS, EstimatedBackupDoneInMB;\n// Data about throughputs of backups\
      \ for databases under backup"
- id: MI-performance-197
  Topic: 2.-Managed-Instance-log-growth-in-danger-of-fillin
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
  Prompts:
  - MI backup history and status by server
  - MonSQLXStoreIOStats event file_path TIMESTAMP
  - Check MonSQLXStoreIOStats event file_path
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: "let BackupsInProgressLogData = BackupsInProgress  \n| join kind=inner (  \nMonSQLXStoreIOStats  \n| where FilterFunc (TIMESTAMP, ago(BackupInProgressQueryTimeWindow), true, AppTypeName,\
      \ ClusterName, ClusterNameParam, NodeName)  \n| where event == 'xstore_io_stats'  \n| where file_path endswith '.ldf'  \n| project TIMESTAMP, LogicalServerName, total_MB_write = total_write_bytes\
      \ / 1024. /1024, file_path  \n| parse file_path with * '/data/' db_name '_' *  \n| where db_name !in ('msdb','replicatedmaster','managed_model', 'master','')  \n| summarize sum(total_MB_write) by\
      \ LogicalServerName, db_name, bin(TIMESTAMP, 10m)  \n| project TIMESTAMP, LogicalServerName , total_MB_write = sum_total_MB_write , DatabaseNameGuid = db_name  \n) on LogicalServerName, DatabaseNameGuid\
      \  \n| where TIMESTAMP >= BackupStartTimestamp  \n| where TIMESTAMP >= ago(QueryTimeWindow)  \n| summarize LogWritesTotalMB=sum(total_MB_write) by LogicalServerName, DatabaseNameGuid, BackupStartTimestamp\
      \  \n| extend LogWritesAvgMBPerS = LogWritesTotalMB / (1.* ((ago(0s)-BackupStartTimestamp) / 1s))  \n| project LogicalServerName, DatabaseNameGuid, BackupStartTimestamp, LogWritesTotalMB, LogWritesAvgMBPerS;\n\
      // Database sizes"
- id: MI-performance-198
  Topic: 2.-Managed-Instance-log-growth-in-danger-of-fillin
  Source: TSG-SQL-MI-Performance/content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
