      \ == 'database_backup'  \n| where isnotnull(toguid(database_name))  \n| where event_type in ('BACKUP_START', 'BACKUP_END', 'BACKUP_ERROR','BACKUP_METADATA_DETAILS')  \n| project AppName, TIMESTAMP,\
      \ event_type, database_name, backup_type, backup_size_gb = todouble(backup_size) / (1024. * 1024 * 1024), backup_start_date, backup_end_date, duration =todatetime(backup_end_date)-todatetime(backup_start_date)\
      \  \n| extend avg_backup_throughput_Mbs = backup_size_gb*1024. / (duration/1s)"
