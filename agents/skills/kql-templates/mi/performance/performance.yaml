- id: MI-performance-264
  Topic: TSGCLPerfScale002_Hekaton_memory_leak_detected
  Source: TSG-SQL-MI-Performance/content/sql_cloud_lifter_notebook/TSGCLPerfScale002_Hekaton_memory_leak_detected.md
  Prompts:
  - MI memory pressure and OOM analysis by server
  - MonDmRealTimeResourceStats _type LogicalServerName NodeName
  - Check MonDmRealTimeResourceStats _type NodeName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'let lookbackPeriod = 7d;

      let serverName = ''txprodsql02'';

      let lastFailoverTime = toscalar(

      let timestampOfInterest = toscalar(max\_of(lastFailoverTime, ago(lookbackPeriod)));

      let latestHekatonMemoryUsagePercent = toscalar(

      MonDmRealTimeResourceStats

      | where replica\_type == 0

      | where TIMESTAMP &lt; observed\_period\_end

      | where LogicalServerName == serverName and database\_name == ''master''

      | project originalEventTimestamp, ClusterName, AppName, NodeName, slo\_name, code\_package\_version

      | order by originalEventTimestamp asc

      | extend next\_NodeName = next(NodeName, 1, ''''), next\_AppName = next(AppName, 1, ''''), next\_slo\_name = next(slo\_name, 1, ''''), next\_code\_package\_version = next(code\_package\_version, 1,
      '''')

      | where NodeName != next\_NodeName or AppName != next\_AppName or slo\_name != next\_slo\_name or code\_package\_version != next\_code\_package\_version

      | where isnotempty(next\_NodeName)

      | summarize max(originalEventTimestamp));

      // We will need what was maximum usage accross usage at last emitted time just before observed period ends'
- id: MI-performance-265
  Topic: TSGCLPerfScale002_Hekaton_memory_leak_detected
  Source: TSG-SQL-MI-Performance/content/sql_cloud_lifter_notebook/TSGCLPerfScale002_Hekaton_memory_leak_detected.md
  Prompts:
  - MI memory pressure and OOM analysis by server
  - MonSqlRgHistory LogicalServerName _name _memory
  - Check MonSqlRgHistory _name _memory
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let estimatedLine =

      MonSqlRgHistory

      | where TIMESTAMP between (timestampOfInterest..observed\_period\_end)

      | where LogicalServerName == serverName

      | where pool\_name == ''SloHkPool''

      | project TIMESTAMP , used\_memory\_percent = 100.00 \* used\_memory\_kb\_max / target\_memory\_kb\_max, NodeName

      | summarize arg\_max(TIMESTAMP, used\_memory\_percent) by NodeName

      | summarize max(used\_memory\_percent));'
- id: MI-performance-266
  Topic: TSGCLPerfScale002_Hekaton_memory_leak_detected
  Source: TSG-SQL-MI-Performance/content/sql_cloud_lifter_notebook/TSGCLPerfScale002_Hekaton_memory_leak_detected.md
  Prompts:
  - MI memory pressure and OOM analysis by server
  - MonSqlRgHistory LogicalServerName _name _memory
  - Check MonSqlRgHistory _name _memory
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP between (timestampOfInterest..observed\_period\_end)

      | where LogicalServerName == serverName

      | where pool\_name == ''SloHkPool''

      | project TIMESTAMP , used\_memory\_percent = 100.00 \* used\_memory\_kb\_max / target\_memory\_kb\_max, NodeName

      | make-series max(used\_memory\_percent) on TIMESTAMP from timestampOfInterest to observed\_period\_end step 15m by NodeName

      // Try to fit line to estimate when issue will happen

      | extend (confidence,slope,variance,rvariance,interception,lineseries) = series\_fit\_line(max\_used\_memory\_percent)

      | project confidence, slope, interception, lineseries, max\_used\_memory\_percent, NodeName, TIMESTAMP;'
