      \ ClusterName, ClusterNameParam, NodeName)  \n| where event == 'xstore_io_stats'  \n| where file_path endswith '.ldf'  \n| project TIMESTAMP, LogicalServerName, total_MB_write = total_write_bytes\
      \ / 1024. /1024, file_path  \n| parse file_path with * '/data/' db_name '_' *  \n| where db_name !in ('msdb','replicatedmaster','managed_model', 'master','')  \n| summarize sum(total_MB_write) by\
      \ LogicalServerName, db_name, bin(TIMESTAMP, 10m)  \n| project TIMESTAMP, LogicalServerName , total_MB_write = sum_total_MB_write , DatabaseNameGuid = db_name  \n) on LogicalServerName, DatabaseNameGuid\
      \  \n| where TIMESTAMP >= BackupStartTimestamp  \n| where TIMESTAMP >= ago(QueryTimeWindow)  \n| summarize LogWritesTotalMB=sum(total_MB_write) by LogicalServerName, DatabaseNameGuid, BackupStartTimestamp\
      \  \n| extend LogWritesAvgMBPerS = LogWritesTotalMB / (1.* ((ago(0s)-BackupStartTimestamp) / 1s))  \n| project LogicalServerName, DatabaseNameGuid, BackupStartTimestamp, LogWritesTotalMB, LogWritesAvgMBPerS;\n\
      // Database sizes"
