    ExecutedQuery: '| extend example_message = strcat("The transaction log for database ''", '''', "'' is full due to ''", '''', "'' and the holdup lsn is (", '''', ")")

      | extend error = tostring(coalesce(tolong(tostring(extract("Error: (\\d+),", 1, message))), -1)) // Extract the error code as a string and convert it to a long

      | extend severity = tostring(coalesce(tolong(tostring(extract("Severity: (\\d+),", 1, message))), -1)) // Extract the severity as a string and convert it to a long

      | extend state = tostring(coalesce(tolong(tostring(extract("State: (\\d+),", 1, message))), -1)) // Extract the state as a string and convert it to a long

      | extend reason = tostring(extract(".*spid\\d+s*\\s+.+The transaction log for database ''(.+)'' is full due to ''(.+)'' and the holdup lsn is (.+)", 2, message))

      | extend reason = iif(isempty(reason), tostring(extract(".*spid\\d+s*\\s+.+The transaction log for database ''(.+)'' is full due to (.+)", 2, message)), reason)

      | join kind=inner (MonAnalyticsDBSnapshot

      | where logical_server_name =~ ServerName

      and logical_database_name =~ DatabaseName

      and PreciseTimeStamp >= ago(1d)

      | summarize by logical_database_guid=toupper(logical_database_id), logical_database_name)'
- id: MI-performance-354
  Topic: Useful-Kusto-queries
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
