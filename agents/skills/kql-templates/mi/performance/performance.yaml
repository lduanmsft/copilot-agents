- id: MI-performance-255
  Topic: TSG-PLATVLDT-ErrorNode-DiskWatchdog-FullDisk
  Source: TSG-SQL-MI-Performance/content/sql_cloud_lifter_notebook/TSG-PLATVLDT-ErrorNode-DiskWatchdog-FullDisk.md
  Prompts:
  - MI resource usage analysis by node
  - MonRgLoad ClusterName NodeName event
  - Check MonRgLoad ClusterName NodeName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'let startTime = datetime(2023-01-23);

      let endTime = datetime(2023-02-09);

      let clusterName = ''tr33514.eastus1-a.worker.database.windows.net'';

      let nodeNames = dynamic([''DB4C.1'']);

      let timestampBinInterval = 30min;

      let thresholdPercentage = 15;

      MonRgLoad

      | where TIMESTAMP between (startTime .. endTime)

      | where ClusterName == clusterName

      | where NodeName in (nodeNames)

      | where event == ''directory_quota_report_load''

      | extend quota_usage_in_gb = quota_usage_in_bytes / 1024. / 1024. / 1024.

      | extend quota_limit_in_gb = quota_limit_in_bytes / 1024. / 1024. / 1024.

      | extend quota_usage_percentage = 100. * quota_usage_in_gb / todouble(quota_limit_in_gb)

      | where quota_usage_percentage > thresholdPercentage

      | project TIMESTAMP, NodeName, application_name, target_directory, quota_usage_percentage, quota_usage_in_gb, quota_limit_in_gb, top_monitored_directory

      | summarize arg_max(TIMESTAMP, quota_usage_percentage, quota_usage_in_gb, quota_limit_in_gb)'
