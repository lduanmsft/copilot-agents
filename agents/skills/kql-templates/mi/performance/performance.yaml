      | extend internal_object_reserved_gb= round((internal_object_reserved_page_count) * 8.0 /1024/1024, 0)

      | summarize userObject_gb=sum(userObject_gb),internal_object_reserved_gb=sum(internal_object_reserved_gb),version_store_usage_gb=sum(version_store_usage_gb) by bin(PreciseTimeStamp,AggregationInterval)
      NodeName

      | order by PreciseTimeStamp asc'
