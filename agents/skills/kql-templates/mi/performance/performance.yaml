- id: MI-performance-286
  Topic: Check-IO-throttling
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/Check-IO-throttling.md
  Prompts:
  - MI Check-IO-throttling
  - Managed Instance Check-IO-throttling
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let endTime = now();
let startTime = ago({TimeRange});
MonSqlRgHistory

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      | where LogicalServerName == srvrName

      | where AppTypeName == ''Worker.CL.WCOW.SQL22''

      | where event == ''aggregated_workload_groups_plus_history''

      | where datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample) >= 1

      | extend LogicalServerName, NodeName, group_id, group_name,

      R_IOPS = 1. * (delta_reads_completed_total) / datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample),

      W_IOPS = 1. * (delta_writes_completed_total) / datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample),

      B_W_IOPS = 1. * (delta_background_writes_total) / datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample),

      IOPS = 1. * (delta_reads_completed_total+delta_writes_completed_total) / datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample),

      R_MBPS = 1. * (delta_read_bytes_total) / 1024. / 1024. / datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample),

      W_MBPS = 1. * (delta_write_bytes_total) / 1024. / 1024. / datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample),

      B_W_MBPS = 1. * (delta_background_write_bytes_total) / 1024. / 1024. / datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample),

      MBPS = 1. * (delta_read_bytes_total+delta_write_bytes_total) / 1024. / 1024. / datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample),

      io_stall_ms = 1. * (delta_read_stall_total_ms + delta_write_stall_total_ms) / (delta_reads_completed_total + delta_writes_completed_total),

      r_io_stall_ms = 1. * (delta_read_stall_total_ms) / (delta_reads_completed_total),

      r_io_stall_queued_ms =  1. * (delta_read_stall_queued_ms) / (delta_reads_completed_total),

      r_io_stall_disk_ms = 1. * (delta_read_stall_total_ms - delta_read_stall_queued_ms) / (delta_reads_completed_total),

      w_io_stall_ms = 1. * (delta_write_stall_total_ms) / (delta_writes_completed_total),

      io_size_kb = 1. * (delta_write_bytes_total + delta_read_bytes_total) / (delta_writes_completed_total + delta_reads_completed_total) / 1024.

      | project TIMESTAMP, NodeName, group_id, group_name,

      round(R_IOPS,2), round(W_IOPS,2), round(B_W_IOPS,2), round(IOPS,2),

      round(R_MBPS,2), round(W_MBPS,2), round(B_W_MBPS,2), round(MBPS,2),

      round(r_io_stall_ms,2), round(r_io_stall_queued_ms,2), round(r_io_stall_disk_ms,2),

      round(w_io_stall_ms,2),

      round(io_stall_ms,2),

      round(io_size_kb,2)

      | where r_io_stall_ms > 10

      | order by r_io_stall_ms desc

      | take 40'
