- id: MI-performance-313
  Topic: MonSqlRgHistory-(Compile-telemetry)
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/MonSqlRgHistory-(Compile-telemetry).md
  Prompts:
  - MI MonSqlRgHistory-(Compile-telemetry)
  - Managed Instance MonSqlRgHistory-(Compile-telemetry)
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let appName = "{AppName}"; MonSqlRgHistory

      | where  TIMESTAMP > change_timestamp-analyzed_period

      | where NodeName == nodeName

      | where  AppName =~  appName

      | where event == "aggregated_workload_groups_plus_history"

      | project TIMESTAMP, delta_total_cpu_usage_ms, group_name

      | summarize cpu_usage_before_forced_param = sumif(delta_total_cpu_usage_ms, TIMESTAMP > change_timestamp-analyzed_period and TIMESTAMP <= change_timestamp)

