- id: MI-io-storage-7
  Topic: TSGCL0270-GP-Log-Rates-Mitigation-options-_MIPerf2
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0270-GP-Log-Rates-Mitigation-options-_MIPerf2.ipynb
  Prompts:
  - MI TSGCL0270 GP Log Rates Mitigation options _MIPerf2
  - Managed Instance TSGCL0270 GP Log Rates Mitigation options _MIPerf2
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: "MonSQLXStoreIOStats\n| where event == 'xstore_io_stats'\n| where LogicalServerName =~ \"{ServerName}\"\n| where TIMESTAMP > ago(4h) and TIMESTAMP < datetime(2020-03-09 22:01:18.9993556)\n\
      | where file_path endswith \".ldf\"\n| extend file_path = split(file_path,'/')[5]\n| project TIMESTAMP , rps = total_requests / (period_ms/1000.0),  \nnrps = total_xio_requests / (period_ms/1000.0)\
      \ ,  \nmbs = (total_read_bytes + total_write_bytes)/ (1024. * 1024 * period_ms/1000.0),  \nmbsw = (total_write_bytes)/ (1024. * 1024 * period_ms/1000.0),  \nmbsr = (total_read_bytes)/ (1024. * 1024\
      \ * period_ms/1000.0),  \navgio_kb = (total_read_bytes + total_write_bytes)/1024./ total_xio_requests,total_xio_requests,  \ntotal_retries,  \nfile_path, page_blob_tier\n| render timechart"
- id: MI-io-storage-8
  Topic: TSGCL0270-GP-Log-Rates-Mitigation-options-_MIPerf2
