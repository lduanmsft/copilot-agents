- id: MI-io-storage-14
  Topic: Storage-latency-troubleshooting
  Source: Performance-and-Query-Execution/High-IO-utilization/Storage-latency-troubleshooting.md
  Prompts:
  - MI Storage latency troubleshooting
  - Managed Instance Storage latency troubleshooting
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: |-
      MonSqlRgHistory
      | where LogicalServerName =~ "{ServerName}"
      | where originalEventTimestamp between (datetime(2024-02-27 00:34:05.0599807)..datetime(2024-02-27 16:34:05.0599807))
      | where event == 'volume_entity_stats'
      | where is_agg_volume == 0 and is_categorized == 1
      | where total_io_count > 0
      // In case of BC, remove volume_name filter and change volume_type to 0
      | where volume_name contains "Volume Name From Previous Query"
      | where volume_type == 2 // 0-SSD, 2-XIO
      | extend max_ms = max_of(latency_max_us_very_high, target_latency_very_high_us) / 1000.
      | summarize hint.strategy=shuffle
- id: MI-io-storage-15
  Topic: Storage-latency-troubleshooting
  Source: Performance-and-Query-Execution/High-IO-utilization/Storage-latency-troubleshooting.md
  Prompts:
  - MI Storage latency troubleshooting
  - Managed Instance Storage latency troubleshooting
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: |-
      MonSqlRgHistory
      | where LogicalServerName =~ "{ServerName}"
      | where originalEventTimestamp between (datetime(2024-02-27 00:34:05.0599807)..datetime(2024-02-27 16:34:05.0599807))
      | where event == 'aggregated_virtual_files_io_history'
      | where type_desc =~ "ROWS"
      | where database_id == 5 and file_id == 1 // Change for the database and file id you are investigating
      | extend IOStallMsPerIO = round(delta_io_stall*1.0/(delta_num_of_writes + delta_num_of_reads),1)
      | extend IOStallWriteMsPerWrite = round(delta_io_stall_write_ms*1.0/delta_num_of_writes,1)
      | extend IOStallQueueMsPerWrite = round (delta_io_stall_queued_write_ms*1.0/delta_num_of_writes,2)
      | extend IOStallQueueMsPerRead = round (delta_io_stall_queued_read_ms*1.0/delta_num_of_reads,2)
      | extend IOStallReadMsPerRead = round(delta_io_stall_read_ms*1.0/delta_num_of_reads,1)
      | where IOStallMsPerIO > 0
      | project end_utc_date = end_aggregated_sample
- id: MI-io-storage-16
  Topic: Storage-latency-troubleshooting
  Source: Performance-and-Query-Execution/High-IO-utilization/Storage-latency-troubleshooting.md
  Prompts:
  - MI Storage latency troubleshooting
  - Managed Instance Storage latency troubleshooting
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: |-
      MonSqlRgHistory
      | where AppName =~ "{AppName}"
      | where originalEventTimestamp between (datetime(2023-09-27 08:00:00)..datetime(2023-09-27 10:30:00))
      | where event == 'aggregated_workload_groups_plus_history'
      | project end_aggregated_sample, AppName, delta_ios_group_iops_delayed, NodeName, group_name, delta_writes_issued_total, delta_reads_issued_total
      | summarize writes = sum(delta_writes_issued_total), reads = sum(delta_reads_issued_total) by bin(end_aggregated_sample, 15m) , group_name
      | render timechart
- id: MI-io-storage-17
  Topic: Storage-latency-troubleshooting
  Source: Performance-and-Query-Execution/High-IO-utilization/Storage-latency-troubleshooting.md
  Prompts:
  - MI Storage latency troubleshooting
  - Managed Instance Storage latency troubleshooting
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: |-
      MonSQLXStore
      | where TIMESTAMP between (datetime(2023-09-27 08:00:00)..datetime(2023-09-27 10:30:00))
      | where AppName =~ "{AppName}"
      | where event == "xio_failed_request"
      | summarize count(), max(retry_count) by request_type, http_errorcode, mapped_errorcode, bin(TIMESTAMP, binTime)
      | extend request_mapped_http = strcat(request_type, "_", mapped_errorcode, "_", http_errorcode)
- id: MI-io-storage-18
  Topic: Storage-latency-troubleshooting
  Source: Performance-and-Query-Execution/High-IO-utilization/Storage-latency-troubleshooting.md
  Prompts:
  - MI Storage latency troubleshooting
  - Managed Instance Storage latency troubleshooting
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: |-
      MonSQLXStoreIOStats
      | where originalEventTimestamp between (datetime(2023-09-27 08:00:00)..datetime(2023-09-27 10:30:00))
      | where LogicalServerName =~ "{ServerName}" // managed instance name
      | where file_path contains "b93bef6a-b74a-4246-9143-68cdb3164afb" // You can get this from the first query in the previous section
      | where event == 'xstore_io_stats'
      | where file_path endswith '.ldf' or file_path endswith'.mdf' or file_path endswith '.ndf'
      | extend period_ms = column_ifexists('period_ms',-1)
      | extend period_ms = iif(isempty(period_ms), -1, period_ms)
      | extend periodSeconds = iif(period_ms==-1, 30., period_ms/1000.)
      | parse kind=regex file_path with* '/data/' file_name:string
      | project TIMESTAMP, LogicalServerName, AppName, NodeName, file_path, file_name, period_ms, periodSeconds,
