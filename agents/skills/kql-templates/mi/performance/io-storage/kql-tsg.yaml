SqlSkills:
- id: MI-io-storage-1
  Topic: 2_-Managed-Instance-log-growth-in-danger-of-fillin
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
  Prompts:
  - MI 2. Managed Instance log growth in danger of fillin
  - Managed Instance 2. Managed Instance log growth in danger of fillin
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: |-
      let BackupsInProgress = MonBackup
      | where FilterFunc (TIMESTAMP, ago(BackupInProgressQueryTimeWindow), true, AppTypeName, ClusterName, ClusterNameParam, NodeName)
      | where package == 'XdbBackupServiceXEvents'
      | where event_type in ('BACKUP_START', 'BACKUP_END', 'BACKUP_ERROR')
      | where backup_type=='Full'
      | where database_name !in ('msdb','replicatedmaster','managed_model', 'master','')
      | summarize by logical_server_name, database_name, originalEventTimestamp, event_type
      | summarize arg_max (originalEventTimestamp, event_type) by logical_server_name, database_name
      | where event_type=='BACKUP_START'
      | project LogicalServerName = logical_server_name, DatabaseNameGuid = database_name, BackupStartTimestamp = originalEventTimestamp;
      // Data about throughput of backups for databases under backup
- id: MI-io-storage-2
  Topic: 2_-Managed-Instance-log-growth-in-danger-of-fillin
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
  Prompts:
  - MI 2. Managed Instance log growth in danger of fillin
  - Managed Instance 2. Managed Instance log growth in danger of fillin
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: "let BackupsInProgressDataInfo = BackupsInProgress\n| join kind=inner (  \nMonSqlRgHistory\n| where FilterFunc (TIMESTAMP, ago(BackupInProgressQueryTimeWindow), true, AppTypeName, ClusterName,\
      \ ClusterNameParam, NodeName)\n| where event == 'aggregated_workload_groups_plus_history' and group_name == 'InMemFullBackupGroup'\n| project TIMESTAMP, LogicalServerName, ReadThroughput = delta_read_bytes_total\
      \ / datetime_diff('second', end_aggregated_sample, start_aggregated_sample) / 1024. / 1024.  \n) on LogicalServerName\n| where TIMESTAMP >= BackupStartTimestamp;\n// Data about completed MBs of backups\
      \ for databases under backup  \nlet BackupsInProgressCompletedData = BackupsInProgressDataInfo\n| summarize AvgBackupDiskThroughputSinceBackupStartMBPerS=avg(ReadThroughput) by LogicalServerName,\
      \ DatabaseNameGuid, BackupStartTimestamp\n| extend BackupDurationInS = (now()-BackupStartTimestamp) / 1s\n| extend EstimatedBackupDoneInMB = AvgBackupDiskThroughputSinceBackupStartMBPerS * BackupDurationInS\n\
      | project LogicalServerName, DatabaseNameGuid, AvgBackupDiskThroughputSinceBackupStartMBPerS, BackupDurationInS, EstimatedBackupDoneInMB;\n// Data about throughputs of backups for databases under\
      \ backup"
- id: MI-io-storage-3
  Topic: 2_-Managed-Instance-log-growth-in-danger-of-fillin
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
  Prompts:
  - MI 2. Managed Instance log growth in danger of fillin
  - Managed Instance 2. Managed Instance log growth in danger of fillin
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: "let BackupsInProgressLogData = BackupsInProgress\n| join kind=inner (  \nMonSQLXStoreIOStats\n| where FilterFunc (TIMESTAMP, ago(BackupInProgressQueryTimeWindow), true, AppTypeName,\
      \ ClusterName, ClusterNameParam, NodeName)\n| where event == 'xstore_io_stats'\n| where file_path endswith '.ldf'\n| project TIMESTAMP, LogicalServerName, total_MB_write = total_write_bytes / 1024.\
      \ /1024, file_path\n| parse file_path with * '/data/' db_name '_' *\n| where db_name !in ('msdb','replicatedmaster','managed_model', 'master','')\n| summarize sum(total_MB_write) by LogicalServerName,\
      \ db_name, bin(TIMESTAMP, 10m)\n| project TIMESTAMP, LogicalServerName , total_MB_write = sum_total_MB_write , DatabaseNameGuid = db_name  \n) on LogicalServerName, DatabaseNameGuid\n| where TIMESTAMP\
      \ >= BackupStartTimestamp\n| where TIMESTAMP >= ago(QueryTimeWindow)\n| summarize LogWritesTotalMB=sum(total_MB_write) by LogicalServerName, DatabaseNameGuid, BackupStartTimestamp\n| extend LogWritesAvgMBPerS\
      \ = LogWritesTotalMB / (1.* ((ago(0s)-BackupStartTimestamp) / 1s))\n| project LogicalServerName, DatabaseNameGuid, BackupStartTimestamp, LogWritesTotalMB, LogWritesAvgMBPerS;\n// Database sizes"
