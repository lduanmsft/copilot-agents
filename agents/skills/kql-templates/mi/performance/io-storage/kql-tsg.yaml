- id: MI-io-storage-10
  Topic: TSGCLHE005-Stuck_Database_Drop_Hermes_Drive_Path_Mismatch
  Source: content/Hermes/TSGCLHE005-Stuck_Database_Drop_Hermes_Drive_Path_Mismatch.md
  Prompts:
  - MI TSGCLHE005 Stuck_Database_Drop_Hermes_Drive_Path_Mismatch
  - Managed Instance TSGCLHE005 Stuck_Database_Drop_Hermes_Drive_Path_Mismatch
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: |-
      MonSqlRgHistory
      | where TIMESTAMP > ago(7d)
      | where AppName == "<AppName_from_Step1>"
      | where event == "aggregated_virtual_files_io_history"
      | where file_path has "<file_guid>"  // GUID from file_container_path, e.g. "8abaf587"
      | summarize arg_max(TIMESTAMP, size_on_disk_bytes) by file_path
      | extend size_on_disk_gb = round(size_on_disk_bytes / 1073741824.0, 2)
      | project file_path, size_on_disk_gb, TIMESTAMP
      | order by file_path
