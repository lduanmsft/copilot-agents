- id: MI-ASMI-IO-STORAGE-03
  Topic: GP Storage - IOPS & throughput
  Source: kusto-queries/GP Storage - IOPS & throughput.md
  Prompts:
  - MI XStore IO telemetry for xstore io stats
  - MonSQLXStoreIOStats LogicalServerName event file_path mdf
  - Investigate GP Storage IOPS & throughput
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: 'MonSQLXStoreIOStats

      | where TIMESTAMP between(ago(1d)..now())

      | where LogicalServerName =~ "{ServerName}" // managed instance name

      | where file_path contains "https://wasdpwus1aprsmi8591.blob.core.windows.net/managedserver-0a8d89c3-c2af-446d-890a-ae3972932ca9/data/e08bc1d0-83b2-4bdb-b54c-c6deba2d728d_1.mdf"
      // You can get this from the first query in the previous section

      | where event == ''xstore_io_stats''

      | where file_path endswith ''.ldf'' or file_path endswith''.mdf'' or file_path endswith ''.ndf'''
