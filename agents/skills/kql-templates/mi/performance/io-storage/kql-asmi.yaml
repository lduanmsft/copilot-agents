SqlSkills:
- id: MI-ASMI-IO-STORAGE-01
  Topic: GP IO Throttling
  Source: kusto-queries/GP IO Throttling.md
  Prompts:
  - MonSQLXStore by LogicalServerName, ServerName
  - MonSQLXStore LogicalServerName ServerName file_path mdf
  - Investigate GP IO Throttling
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: 'MonSQLXStore

      | where LogicalServerName =~ "{ServerName}" and file_path endswith ".mdf"'
