- id: MI-ASMI-IO-STORAGE-10
  Topic: Storage (MonSQLXStore
  Source: kusto-queries/Storage (MonSQLXStore.md
  Prompts:
  - MonSQLXStore for xio failed request
  - MonSQLXStore event dbfaac3fffa1 xio_failed_request mapped_errorcode
  - Investigate Storage (MonSQLXStore
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: 'MonSQLXStore

      | where originalEventTimestamp > ago(7d)

      | where AppName =~ "{AppName}"//"dbfaac3fffa1"

      | where event == "xio_failed_request" and mapped_errorcode == 12002'
