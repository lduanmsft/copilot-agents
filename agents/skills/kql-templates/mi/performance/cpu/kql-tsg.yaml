SqlSkills:
- id: MI-cpu-1
  Topic: 1_-Managed-Instance-network-throughput-saturated-
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/1.-Managed-Instance-network-throughput-saturated-_.ipynb
  Prompts:
  - MI 1. Managed Instance network throughput saturated _
  - Managed Instance 1. Managed Instance network throughput saturated _
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: |-
      let SvmManagedServersWhichDidNotChangeNodes = MonDmRealTimeResourceStats
      | where FilterFunc (TIMESTAMP, ago(QueryTimeWindow), true, AppTypeName, ClusterName, ClusterNameParam, NodeName)
      | where slo_name contains 'MIGP' and slo_name contains 'G5_NP'
      | summarize by LogicalServerName, NodeName
      | summarize dcount(NodeName) by LogicalServerName
      | project LogicalServerName;
      // SVM total input network throughput
- id: MI-cpu-2
  Topic: 1_-Managed-Instance-network-throughput-saturated-
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/1.-Managed-Instance-network-throughput-saturated-_.ipynb
  Prompts:
  - MI 1. Managed Instance network throughput saturated _
  - Managed Instance 1. Managed Instance network throughput saturated _
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: "let TotalNetworkThroughput = MonCounterOneMinute\n| where FilterFunc (TIMESTAMP, ago(QueryTimeWindow), false, '', ClusterName, ClusterNameParam, NodeName)\n| where CounterName startswith\
      \ '[Network](file://Network) Interface(Microsoft Hyper-V' and CounterName endswith '[Bytes](file://Bytes) Received/sec'\n| summarize avg(CounterValue) by ClusterName, NodeName\n| extend AvgTotalNetworkThroughputMBPerS\
      \ = avg_CounterValue / 1024. / 1024 // the counters get reported as total bytes per second\n| join kind=inner (  \nMonDmRealTimeResourceStats\n| where FilterFunc (TIMESTAMP, ago(QueryTimeWindow),\
      \ true, AppTypeName, ClusterName, ClusterNameParam, NodeName)\n| summarize arg_max(TIMESTAMP, ClusterName, NodeName, slo_name) by LogicalServerName\n| where slo_name contains 'MIGP' and slo_name contains\
      \ 'G5_NP'\n| join kind=inner (\n    SvmManagedServersWhichDidNotChangeNodes \n) on LogicalServerName\n| project LogicalServerName, ClusterName, NodeName, Slo = slo_name  \n) on ClusterName, NodeName\n\
      | parse NodeName with 'DB' VMVCoreCount:int 'C.' *\n| extend MaxTotalNetworkThroughputMBPerS = VMVCoreCount * NodeNetworkThroughputPerVCoreParam\n| project ClusterName, NodeName, LogicalServerName,\
      \ Slo, VMVCoreCount, AvgTotalNetworkThroughputMBPerS , MaxTotalNetworkThroughputMBPerS;\n// #1 “ Detect SVM Managed Servers which have total network throughput saturated  \n// We only get data for\
      \ SVM sizes less than 80 (no full nodes) \nTotalNetworkThroughput\n| where AvgTotalNetworkThroughputMBPerS > PercentageOfNetworkTakenInOrderToProclaimSaturation * MaxTotalNetworkThroughputMBPerS\n\
      | where VMVCoreCount < 80"
