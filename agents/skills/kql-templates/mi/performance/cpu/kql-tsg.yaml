- id: MI-cpu-15
  Topic: Useful-Kusto-queries
  Source: Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful Kusto queries
  - Managed Instance Useful Kusto queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: |-
      MonDmRealTimeResourceStats
      | where AppName !startswith 'b-' and AppName !startswith 'v-'
      | where LogicalServerName =~ ServerName
      | where replica_type == 0
      | summarize StartTime=min(TIMESTAMP), EndTime=max(TIMESTAMP) by AppName, slo_name, io_cap
      | lookup kind=leftouter
- id: MI-cpu-16
  Topic: Useful-Kusto-queries
  Source: Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful Kusto queries
  - Managed Instance Useful Kusto queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmDbResourceGovernance
    ExecutedQuery: |-
      MonDmDbResourceGovernance
      | where AppName !startswith 'b-' and AppName !startswith 'v-'
      | extend MaxCPUCores = case (primary_bucket_fill_rate_cpu == 0, (primary_group_max_cpu*min_cores)/100.0, primary_bucket_fill_rate_cpu/1000.0)
      | summarize MaxCPUCores=any(MaxCPUCores) by slo_name
- id: MI-cpu-17
  Topic: Useful-Kusto-queries
