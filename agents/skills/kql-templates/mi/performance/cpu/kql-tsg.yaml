      \ '[Network](file://Network) Interface(Microsoft Hyper-V' and CounterName endswith '[Bytes](file://Bytes) Received/sec'\n| summarize avg(CounterValue) by ClusterName, NodeName\n| extend AvgTotalNetworkThroughputMBPerS\
      \ = avg_CounterValue / 1024. / 1024 // the counters get reported as total bytes per second\n| join kind=inner (  \nMonDmRealTimeResourceStats\n| where FilterFunc (TIMESTAMP, ago(QueryTimeWindow),\
      \ true, AppTypeName, ClusterName, ClusterNameParam, NodeName)\n| summarize arg_max(TIMESTAMP, ClusterName, NodeName, slo_name) by LogicalServerName\n| where slo_name contains 'MIGP' and slo_name contains\
      \ 'G5_NP'\n| join kind=inner (  \n    SvmManagedServersWhichDidNotChangeNodes \n) on LogicalServerName\n| project LogicalServerName, ClusterName, NodeName, Slo = slo_name  \n) on ClusterName, NodeName\n\
      | parse NodeName with 'DB' VMVCoreCount:int 'C.' *\n| extend MaxTotalNetworkThroughputMBPerS = VMVCoreCount * NodeNetworkThroughputPerVCoreParam\n| project ClusterName, NodeName, LogicalServerName,\
      \ Slo, VMVCoreCount, AvgTotalNetworkThroughputMBPerS , MaxTotalNetworkThroughputMBPerS;\n// SVM databases under backup"
- id: MI-cpu-4
  Topic: 2_-Managed-Instance-log-growth-in-danger-of-fillin
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
  Prompts:
  - MI 2. Managed Instance log growth in danger of fillin
  - Managed Instance 2. Managed Instance log growth in danger of fillin
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: |-
      let SvmManagedServersWhichDidNotChangeSize = MonDmRealTimeResourceStats
      | where FilterFunc (TIMESTAMP, ago(SloChangeQueryTimeWindow), true, AppTypeName, ClusterName, ClusterNameParam, NodeName)
      | where slo_name contains 'MIGP' and slo_name contains 'G5_NP'
      | summarize by LogicalServerName, NodeName
      | parse NodeName with 'DB' VMVCoreCount:int 'C.' *
      | summarize by LogicalServerName , VMVCoreCount
      | summarize count() by LogicalServerName
      | where count_==1
      | project LogicalServerName;
      // #4 - Detect SVM Managed Servers which have total network throughput saturated and are under full backup
- id: MI-cpu-5
  Topic: SOPCL00193-CloudLifter-High-disk-usage-detection
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/SOPCL00193-CloudLifter-High-disk-usage-detection.ipynb
  Prompts:
  - MI SOPCL00193 CloudLifter High disk usage detection
  - Managed Instance SOPCL00193 CloudLifter High disk usage detection
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: |-
      MonRgLoad
      | where event == "drive_usage_report_load" and TIMESTAMP > now() - time(15m) and ClusterName !contains "onebox"
      | summarize avg(drive_usage_percentage) by ClusterName, NodeName, drive_name
      | extend RingName = toupper(extract("(.*).(.*).(worker|control).(database|sqltest-eg1).(windows.net|chinacloudapi.cn|mscds.com)", 1, ClusterName, typeof(string)))
      | extend Cluster = extract("(.*).(.*).(worker|control).(database|sqltest-eg1).(windows.net|chinacloudapi.cn|mscds.com)", 2, ClusterName, typeof(string))
      | extend Select = strcat("Select-SqlAzureCluster wasd-prod-", Cluster, "-", RingName)
      | extend Command = strcat("Get-FabricNode -NodeName ", NodeName," -NodeClusterName ", ClusterName, "
      | Remove-FabricNodeFile -Directory C:WFRootlogPerformanceCountersBinary -Filename fabric_counters_*.blg")
      | where avg_drive_usage_percentage >= 70
      | where drive_name contains "C:"
      | extend DiskUsage = avg_drive_usage_percentage
      | project ClusterName, Cluster, RingName, NodeName, DiskUsage, drive_name, Command, Select
      | order by DiskUsage
- id: MI-cpu-6
  Topic: SOPCL00193-CloudLifter-High-disk-usage-detection
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/SOPCL00193-CloudLifter-High-disk-usage-detection.ipynb
  Prompts:
  - MI SOPCL00193 CloudLifter High disk usage detection
  - Managed Instance SOPCL00193 CloudLifter High disk usage detection
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: |-
      MonRgLoad
      | where event == "drive_usage_report_load" and TIMESTAMP > now() - time(15m) and ClusterName !contains "onebox"
      | where drive_name contains "C:"
      | extend DiskUsage = drive_usage_percentage
      | where ClusterName == "{ClusterName}"
      | where NodeName == "WF2C.0"
      | project TIMESTAMP, ClusterName, NodeName, drive_name, DiskUsage
      | order by TIMESTAMP
      | take 10
- id: MI-cpu-7
  Topic: TSGCL0156-SVM-Network-Throughput-Saturation
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0156-SVM-Network-Throughput-Saturation.ipynb
  Prompts:
  - MI TSGCL0156 SVM Network Throughput Saturation
  - Managed Instance TSGCL0156 SVM Network Throughput Saturation
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: "MonDmRealTimeResourceStats\n| where TIMESTAMP between (todatetime(\"{StartTime}\")..todatetime(\"{EndTime}\"))\n| where LogicalServerName == \"{ServerName}\"\n| distinct NodeName, ClusterName\n\
      | join kind=inner (  \nMonCounterOneMinute  \n) on NodeName, ClusterName\n| where TIMESTAMP between (todatetime(\"{StartTime}\")..todatetime(\"{EndTime}\"))\n| where CounterName startswith '[Network](file://Network)\
      \ Interface(Microsoft Hyper-V' and CounterName endswith '[Bytes](file://Bytes) Received/sec'\n| project TIMESTAMP, CounterName, NodeName, CounterValue/1024./1024.\n| render timechart"
- id: MI-cpu-8
  Topic: TSG-PLATVLDT-ErrorNode-DiskWatchdog-FullDisk
  Source: content/sql_cloud_lifter_notebook/TSG-PLATVLDT-ErrorNode-DiskWatchdog-FullDisk.md
  Prompts:
  - MI TSG PLATVLDT ErrorNode DiskWatchdog FullDisk
  - Managed Instance TSG PLATVLDT ErrorNode DiskWatchdog FullDisk
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: |-
      MonRgLoad
      | where TIMESTAMP between (startTime .. endTime)
      | where ClusterName == clusterName
      | where NodeName in (nodeNames)
      | where event == 'drive_usage_report_load'
      | extend drive = strcat(NodeName, '_', substring(drive_name, 0, 1))
      | summarize max(drive_usage_percentage), max(drive_usage_alert_threshold_percentage) by bin(TIMESTAMP, timestampBinInterval), drive
      | render timechart
