- id: MI-ASMI-QUERIES-09
  Topic: Investigation memory incidents
  Source: kusto-queries/Investigation memory incidents.md
  Prompts:
  - MonWiQdsExecStats by query_id, plan_id
  - MonWiQdsExecStats query_id plan_id exec_type cpu_time
  - Investigate Investigation memory incidents
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where AppName =~ "{AppName}"

      | project originalEventTimestamp , query_id , plan_id ,exec_type , cpu_time , elapsed_time , dop, max_dop , logical_reads , logical_writes , physical_reads,
      execution_count , memory_grant_kb = max_max_query_memory_pages * 8, query_hash , query_plan_hash'
