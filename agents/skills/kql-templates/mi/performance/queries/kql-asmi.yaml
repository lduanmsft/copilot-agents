- id: MI-ASMI-QUERIES-11
  Topic: Investigation memory incidents
  Source: kusto-queries/Investigation memory incidents.md
  Prompts:
  - MonWiQdsWaitStats by LogicalServerName, app_mem_compil_total_query_wait_time_ms
  - MonWiQdsWaitStats LogicalServerName app_mem_compil_total_query_wait_time_ms wait_category all_total_query_wait_time_ms
  - Investigate Investigation memory incidents
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsWaitStats
    ExecutedQuery: 'MonWiQdsWaitStats

      | where originalEventTimestamp > ago(1h)

      | where wait_category in ("MEMORY", "COMPILATION")

      | summarize app_mem_compil_total_query_wait_time_ms=sum(total_query_wait_time_ms) by ClusterName, AppTypeName, AppName, LogicalServerName, NodeName, wait_category

      | where app_mem_compil_total_query_wait_time_ms > 100

      | join kind= inner (

      MonWiQdsWaitStats

      | where originalEventTimestamp > ago(1h)

      | summarize all_total_query_wait_time_ms=sum(total_query_wait_time_ms) by ClusterName, AppTypeName, AppName, LogicalServerName, NodeName

      ) on ClusterName, AppTypeName, AppName, LogicalServerName, NodeName

      | where app_mem_compil_total_query_wait_time_ms * 1.0 / all_total_query_wait_time_ms > 0.30

      | project ClusterName, AppTypeName, AppName, LogicalServerName, NodeName, wait_category, all_total_query_wait_time_ms, app_mem_compil_total_query_wait_time_ms'
- id: MI-ASMI-QUERIES-12
  Topic: Investigation memory incidents
  Source: kusto-queries/Investigation memory incidents.md
  Prompts:
  - MonWiQdsExecStats by execution_count, cpu_time
  - MonWiQdsExecStats execution_count cpu_time max_query_memory_pages query_hash
  - Investigate Investigation memory incidents
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where TIMESTAMP > ago(1d)

      | where AppName =~ "{AppName}"

      | where NodeName == "{NodeName}"

      | summarize sum(execution_count), sum(cpu_time), sum(max_query_memory_pages) by query_hash, plan_id, query_id

      | order by sum_cpu_time desc

      | take 10'
