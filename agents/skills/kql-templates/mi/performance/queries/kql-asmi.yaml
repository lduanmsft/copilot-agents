- id: MI-ASMI-QUERIES-07
  Topic: Execution Stats (MonWiQdsExecStats
  Source: kusto-queries/Execution Stats (MonWiQdsExecStats.md
  Prompts:
  - MonWiQdsExecStats for query store runtime stats update
  - MonWiQdsExecStats LogicalServerName event logicalServerName let
  - Investigate Execution Stats (MonWiQdsExecStats
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'let logicalServerName = ''ish34-pre-db01'';

      MonWiQdsExecStats

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      | where LogicalServerName == logicalServerName

      | where event == "query_store_runtime_stats_update"'
