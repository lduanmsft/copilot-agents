SqlSkills:
- id: MI-queries-1
  Topic: Query-fails-with-OOM-_2D-high-SQLQERESERVATION-memory-clerk
  Source: Performance-and-Query-Execution/Other-errors-and-exceptions/Query-fails-with-OOM-%2D-high-SQLQERESERVATION-memory-clerk.md
  Prompts:
  - MI Query fails with OOM %2D high SQLQERESERVATION memory clerk
  - Managed Instance Query fails with OOM %2D high SQLQERESERVATION memory clerk
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: |-
      MonWiQdsExecStats
      | where  TIMESTAMP >= datetime({StartTime}) and  TIMESTAMP <= datetime({EndTime})
      | where LogicalServerName =~ "{LogicalServerName}" and   database_name  =~ "{LogicalDatabaseName}" and AppName == "{AppName}"
      | where is_primary  == 1
      | extend MaxQueryMemoryMB=round(max_max_query_memory_pages*8.0/1024,1)
      | summarize max(MaxQueryMemoryMB) by query_hash
      | top 20 by max_MaxQueryMemoryMB  desc nulls last
- id: MI-queries-2
  Topic: Workflow-for-other-Errors-and-exceptions
  Source: Performance-and-Query-Execution/Other-errors-and-exceptions/Workflow-for-other-Errors-and-exceptions.md
  Prompts:
  - MI Workflow for other Errors and exceptions
  - Managed Instance Workflow for other Errors and exceptions
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: |-
      MonWiQdsExecStats
      | where TIMESTAMP > ago(6h)
      | where AppName == "{AppName}" and database_name =~ "{DatabaseName}"
      | summarize sum(execution_count), sum(cpu_time), sum(max_query_memory_pages), sum(max_logical_writes), sum(max_logical_reads) by query_id, plan_id
      | project query_id, plan_id, sum_execution_count, sum_max_query_memory_pages, sum_max_logical_writes, sum_max_logical_reads
      | order by sum_max_logical_writes, sum_max_logical_reads
      | take 10
- id: MI-queries-3
  Topic: Intermittent-timeout-or-long-execution-time-due-to-Auto-Stats
  Source: Performance-and-Query-Execution/Query-timeouts/Intermittent-timeout-or-long-execution-time-due-to-Auto-Stats.md
  Prompts:
  - MI Intermittent timeout or long execution time due to Auto Stats
  - Managed Instance Intermittent timeout or long execution time due to Auto Stats
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQueryParamData
    ExecutedQuery: |-
      MonWiQueryParamData
      | where TIMESTAMP > datetime(2025-09-10 00:15)  and TIMESTAMP < datetime(2025-09-10 23:32)
      | where LogicalServerName =~ "<Server Name>" and database_name  == "<database name>"
      | where query_hash == "<Query Hash>"
      | project TIMESTAMP, NodeName, AppName, LogicalServerName, logical_database_name, compile_cpu_time, compile_duration, auto_create_stats_cpu_time, auto_create_stats_elapsed_time, auto_update_stats_cpu_time, auto_update_stats_elapsed_time
- id: MI-queries-4
  Topic: Lock-Request-Timeout-Error-1222-State-51
  Source: Performance-and-Query-Execution/Query-timeouts/Lock-Request-Timeout-Error-1222-State-51.md
  Prompts:
  - MI Lock Request Timeout Error 1222 State 51
  - Managed Instance Lock Request Timeout Error 1222 State 51
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: |-
      MonWiQdsExecStats
      | where TIMESTAMP between ({StartDateTime}..{EndDateTime})
      | where LogicalServerName =~ "{MIName}" //Input customer server name
      | summarize total_query_execution_count = sum(execution_count)
      , timeout_query_count = sumif(execution_count, exec_type == 3)
      , error_query_count = sumif(execution_count, exec_type == 4)
- id: MI-queries-5
  Topic: Different-execution-plan-when-executing-from-SSMS
  Source: Performance-and-Query-Execution/Query-tuning/Different-execution-plan-when-executing-from-SSMS.md
  Prompts:
  - MI Different execution plan when executing from SSMS
  - Managed Instance Different execution plan when executing from SSMS
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQueryParamData
    ExecutedQuery: |-
      MonWiQueryParamData
      | where LogicalServerName =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}"
      | where query_hash == ""
      | project TIMESTAMP, plan_id, compile_code
- id: MI-queries-6
  Topic: Error-8623-_2D-The-query-processor-ran-out-of-internal-resources-and-could-not-p
  Source: Performance-and-Query-Execution/Query-tuning/Error-8623-%2D-The-query-processor-ran-out-of-internal-resources-and-could-not-produce-a-query-plan.md
  Prompts:
  - MI Error 8623 %2D The query processor ran out of internal resources and could not produce a query plan
  - Managed Instance Error 8623 %2D The query processor ran out of internal resources and could not produce a query plan
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: |-
      MonQueryProcessing
      | where LogicalServerName =~ serverName and logical_database_name =~ dbName //and AppName =~ appName
      and originalEventTimestamp between (datetime(2025-11-26 11:00:00) ..datetime(2025-11-28 17:00:00) )
      and event =~ "failed_compilation"
      //and error_code in (3617,8684,8698)
      | extend query_hash = strcat("0x", toupper(tohex(query_hash_signed)))
      //| where query_hash == "0x4AA6B6F03E8D46B8"
      | extend compile_duration_seconds = round(compile_duration/1000.0,1)
      | extend compile_cpu_seconds      = round(compile_cpu/1000.0,1)
      | project originalEventTimestamp, session_id, tasks_count, error_code, query_hash, query_id, compile_duration_seconds, compile_cpu_seconds, event;
      // Second Period:2025-08-19~2025-08-21
