  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: |-
      MonWiQdsExecStats
      | where TIMESTAMP > datetime(2021-05-26 22:09:38.0994729)-15m and TIMESTAMP < datetime(2021-05-26 22:09:38.0994729)+15m
      | where AppName == "Appname"
      | summarize sum(execution_count), sum(cpu_time), sum(max_query_memory_pages), sum(max_logical_writes), sum(max_logical_reads) by plan_id, query_hash
      | project  query_hash, plan_id, sum_execution_count, sum_max_query_memory_pages
      | order by sum_max_query_memory_pages desc
      | take 5
