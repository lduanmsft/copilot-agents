- id: MI-queries-8
  Topic: Check-IO-throttling
  Source: Performance-and-Query-Execution/Reference/Check-IO-throttling.md
  Prompts:
  - MI Check IO throttling
  - Managed Instance Check IO throttling
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: |-
      MonWiQdsExecStats
      | where TIMESTAMP >= startTime - 30min
      | where TIMESTAMP <= endTime + 30min
      | where LogicalServerName == logicalServerName
      | where database_name =~ "{DatabaseName}"
      | project TIMESTAMP, query_hash, query_plan_hash, max_num_physical_io_reads, num_physical_io_reads, max_physical_reads, max_logical_reads, execution_count, rowcount, tempdb_space_used, elapsed_time, max_elapsed_time
      | order by max_num_physical_io_reads desc
      | take 5
