      MonWiQdsExecStats
      | where (originalEventTimestamp >= startTime and originalEventTimestamp <= endTime)
      | where LogicalServerName =~ instanceName
      | summarize TotalExecutions = sum(execution_count), TotalLogicalReads = sum(logical_reads), AverageLogicalReads=round(sum(logical_reads)/sum(execution_count))by DatabaseName=database_name, QueryHash=query_hash
      | top 10 by TotalLogicalReads desc
- id: MI-queries-16
  Topic: Useful-Kusto-queries
  Source: Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful Kusto queries
  - Managed Instance Useful Kusto queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: |-
      MonWiQdsExecStats
      | where LogicalServerName =~ ServerName
      | where TIMESTAMP > ago(daysAgo)
      | top-nested 5 of query_hash by sum(logical_reads) desc, top-nested 5 of query_plan_hash by sum(logical_reads) desc
- id: MI-queries-17
  Topic: Useful-Kusto-queries
  Source: Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful Kusto queries
  - Managed Instance Useful Kusto queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: |-
      MonWiQdsExecStats
      | where LogicalServerName =~ ServerName
      | where TIMESTAMP > ago(daysAgo)
      | extend orig_query_hash = query_hash, orig_plan_hash = query_plan_hash
      | lookup kind = leftouter (Top5QueriesAndPlans
      | distinct query_hash, aggregated_query_hash) on query_hash
      | extend query_hash = iff(isnull(aggregated_query_hash), 'OTHERS', query_hash)
      | extend statement_type = iff(isnull(aggregated_query_hash), '', statement_type)
      | lookup kind = leftouter (Top5QueriesAndPlans
      | project-away aggregated_query_hash) on query_hash, query_plan_hash
      | extend query_plan_hash = iff(isnull(aggregated_query_plan_hash), 'OTHERS', query_plan_hash)
      | summarize query_ids = make_set(query_id, 4), plan_ids = make_set(plan_id, 4)
- id: MI-queries-18
  Topic: Useful-Kusto-queries
  Source: Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful Kusto queries
  - Managed Instance Useful Kusto queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsWaitStats
    ExecutedQuery: |-
      MonWiQdsWaitStats
      | where LogicalServerName =~ ServerName
      | where TIMESTAMP > ago(daysAgo)
      | lookup kind = leftouter (Top5QueriesAndPlans
      | distinct query_hash, aggregated_query_hash) on query_hash
      | extend query_hash = iff(isnull(aggregated_query_hash), 'OTHERS', query_hash)
      | lookup kind = leftouter (Top5QueriesAndPlans
      | project-away aggregated_query_hash) on query_hash, query_plan_hash
      | extend query_plan_hash = iff(isnull(aggregated_query_plan_hash), 'OTHERS', query_plan_hash)
      | summarize category_wait_time_ms = sum(total_query_wait_time_ms)
- id: MI-queries-19
  Topic: Useful-Kusto-queries
  Source: Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful Kusto queries
  - Managed Instance Useful Kusto queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: |-
      let querySummary = materialize(MonWiQdsExecStats
      | where  (originalEventTimestamp >= startTime and originalEventTimestamp <= endTime)
      | where LogicalServerName =~ instanceName
      | summarize TotalQueryCPU_ms = sum(cpu_time) by query_hash
      | top 20 by TotalQueryCPU_ms desc);
- id: MI-queries-20
  Topic: Useful-Kusto-queries
  Source: Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful Kusto queries
  - Managed Instance Useful Kusto queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: |-
      MonQueryProcessing
      | where (originalEventTimestamp >= startTime and originalEventTimestamp <= endTime)
      | where LogicalServerName =~ instanceName
      | where event =~ 'query_antipattern'
      | extend query_hash = strcat('0x', toupper(tohex(query_hash_signed)))
      | where query_hash in ((querySummary
      | project query_hash))
      | summarize occurrences = count() by query_hash, antipattern_type, logical_database_name
      | extend occurrences_by_antipattern_type = strcat(antipattern_type, ': ', tostring(occurrences))
      | summarize occurrences_by_antipattern_type = make_set(occurrences_by_antipattern_type)  by query_hash, logical_database_name
      | join kind=inner querySummary on query_hash
      | project DatabaseName=logical_database_name, QueryHash=query_hash, TotalQueryCPU_ms
      | order by TotalQueryCPU_ms desc
- id: MI-queries-21
  Topic: Useful-Kusto-queries
  Source: Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful Kusto queries
  - Managed Instance Useful Kusto queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: |-
      MonWiQdsExecStats
      | where LogicalServerName =~ ServerName
      and database_name =~ DatabaseName
      and originalEventTimestamp >= ago(daysAgo)
      and query_hash =~ QueryHash
      | extend Timeout = iif(exec_type == 3, 'Yes','No')
      , Error = iif(exec_type == 4, 'Yes','No')
      | summarize min_elapsed_time_s=min(min_elapsed_time)/1000/1000
- id: MI-queries-22
  Topic: Useful-Kusto-queries
  Source: Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful Kusto queries
  - Managed Instance Useful Kusto queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsWaitStats
    ExecutedQuery: |-
      MonWiQdsWaitStats
      | where LogicalServerName =~ ServerName
      and database_name =~ DatabaseName
      and originalEventTimestamp >= ago(daysAgo)
      and query_hash =~ QueryHash
      | summarize max_query_wait_time_ms=max(max_query_wait_time_ms) by wait_category, bin(originalEventTimestamp,1m), query_hash, query_plan_hash
      | summarize wait_category=make_list(strcat(wait_category, ': ', max_query_wait_time_ms)), max_query_wait_time_ms=make_list(max_query_wait_time_ms)
