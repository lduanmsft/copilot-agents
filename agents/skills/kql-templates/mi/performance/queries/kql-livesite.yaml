# Ported from SQLDB SQLLivesiteAgents, adapted for Managed Instance (MI)
# kql-livesite.yaml — Queries KQL Templates from SQLLivesiteAgents
# ============================================================================
# Priority: P1 (highest)
# Source: SQLLivesiteAgents / Performance / Queries / references/
# Distilled: 2026-04-30
# ============================================================================

SqlSkills:

  # ──────────────────────────────────────────────────────
  # 1. Query Execution CPU Analysis
  # Source: Performance/Queries/references/query-execution-cpu-analysis.md
  # Threshold: >=30% of capacity OR >=50% of utilized
  # ──────────────────────────────────────────────────────
  - id: MI-LS-QUERIES-01
    name: "Query Execution CPU Analysis"
    source: "SQLLivesiteAgents/Performance/Queries/references/query-execution-cpu-analysis.md"
    table: MonWiQdsExecStats
    thresholds:
      high_capacity: 30
      high_utilized: 50
    KustoQueries:
      - TableName: MonWiQdsExecStats
        ExecutedQuery: |
          MonWiQdsExecStats
          | where LogicalServerName =~ '{ServerName}' and originalEventTimestamp between (datetime({StartTime})..datetime({EndTime}))
          | where database_name =~ '{DatabaseName}'
          | summarize totalCPU_ms = sum(cpu_time) / 1000.0
          | project cpu_percent_OverAllUserPoolCPU=round(100*totalCPU_ms/1 // MI: CPU capacity placeholder not available, raw values used,1),
          cpu_percent_ConsumedUserPoolCPU=round(100*totalCPU_ms/1 // MI: actual CPU capacity placeholder not available, raw values used,1)
          | extend IssueDetected=iff(cpu_percent_OverAllUserPoolCPU>=30 or cpu_percent_ConsumedUserPoolCPU>=50,'true','false')
          | project IssueDetected,totalCPU_ms,cpu_percent_OverAllUserPoolCPU,cpu_percent_ConsumedUserPoolCPU
    OutputFields: [totalCPU_ms, cpu_percent_OverAllUserPoolCPU, cpu_percent_ConsumedUserPoolCPU, IssueDetected]

  # ──────────────────────────────────────────────────────
  # 2. Top CPU Queries
  # Source: Performance/Queries/references/top-cpu-queries.md
  # ──────────────────────────────────────────────────────
  - id: MI-LS-QUERIES-02
    name: "Top CPU Queries"
    source: "SQLLivesiteAgents/Performance/Queries/references/top-cpu-queries.md"
    table: MonWiQdsExecStats
    parameters:
      TopN: 5
    KustoQueries:
      - TableName: MonWiQdsExecStats
        ExecutedQuery: |
          MonWiQdsExecStats
          | where LogicalServerName =~ '{ServerName}' and originalEventTimestamp between (datetime({StartTime})..datetime({EndTime}))
          | where database_name =~ '{DatabaseName}'
          | summarize TotalQueryCPU_ms = sum(cpu_time) / 1000.0,dcount(query_plan_hash) by query_hash
          | project TotalQueryCPU_Percent_UserPoolCPUCapacity=round(100*TotalQueryCPU_ms/1 // MI: CPU capacity placeholder not available, raw values used,1),
          TotalQueryCPU_Percent_UsedUserPoolCPU=round(100*TotalQueryCPU_ms/1 // MI: actual CPU capacity placeholder not available, raw values used,1),,dcount_query_plan_hash,query_hash
          | order by TotalQueryCPU_ms desc
          | take {TopN}
    OutputFields: [query_hash, TotalQueryCPU_Percent_UserPoolCPUCapacity, TotalQueryCPU_Percent_UsedUserPoolCPU, dcount_query_plan_hash]

  # ──────────────────────────────────────────────────────
  # 3. Top CPU Queries Over Time
  # Source: Performance/Queries/references/top-cpu-queries-over-time.md
  # ──────────────────────────────────────────────────────
  - id: MI-LS-QUERIES-03
    name: "Top CPU Queries Over Time"
    source: "SQLLivesiteAgents/Performance/Queries/references/top-cpu-queries-over-time.md"
    tables: [MonWiQdsExecStats, MonDmRealTimeResourceStats]
    parameters:
      TopN: 5
    KustoQueries:
      - TableName: MonWiQdsExecStats
        ExecutedQuery: |
          let QDSAggIntervalInMin = time(15m);
          let top_N = materialize(MonWiQdsExecStats
          | where LogicalServerName =~ '{ServerName}' and originalEventTimestamp between (datetime({StartTime})..datetime({EndTime}))
          | where database_name =~ '{DatabaseName}'
          | top-nested {TopN} of query_hash by sum(cpu_time) desc
          | project-away  aggregated_query_hash
          );
          let cap_interval = materialize(MonDmRealTimeResourceStats
          | where LogicalServerName =~ '{ServerName}' and originalEventTimestamp between (datetime({StartTime})..datetime({EndTime}))
          | where database_name =~ '{DatabaseName}'
          | summarize min(cpu_cap_in_sec) by bin(originalEventTimestamp, QDSAggIntervalInMin));
          let All_cpu_utilization = materialize(MonWiQdsExecStats
          | where LogicalServerName =~ '{ServerName}' and originalEventTimestamp between (datetime({StartTime})..datetime({EndTime}))
          | where database_name =~ '{DatabaseName}'
          | summarize cores_per_sec = sum(cpu_time) / (QDSAggIntervalInMin / time(1microsecond)) by bin(originalEventTimestamp, QDSAggIntervalInMin), query_hash
          | lookup kind = inner ( cap_interval ) on originalEventTimestamp
          | extend TotalQueryCPU_Pct = round(100.0 * cores_per_sec / min_cpu_cap_in_sec, 1)
          | project originalEventTimestamp, query_hash, TotalQueryCPU_Pct);
          let top_N_cpu_utilization = materialize(MonWiQdsExecStats
          | where LogicalServerName =~ '{ServerName}' and originalEventTimestamp between (datetime({StartTime})..datetime({EndTime}))
          | where database_name =~ '{DatabaseName}'
          | lookup kind = inner ( top_N ) on query_hash
          | summarize cores_per_sec = sum(cpu_time) / (QDSAggIntervalInMin / time(1microsecond)) by bin(originalEventTimestamp, QDSAggIntervalInMin), query_hash
          | lookup kind = inner ( cap_interval ) on originalEventTimestamp
          | extend TotalQueryCPU_Pct = round(100.0 * cores_per_sec / min_cpu_cap_in_sec, 1)
          | project originalEventTimestamp, query_hash, TotalQueryCPU_Pct
          | union All_cpu_utilization);
          let timestamps = range
          originalEventTimestamp
          from bin(toscalar(top_N_cpu_utilization | summarize min(originalEventTimestamp)), QDSAggIntervalInMin)
          to bin(toscalar(top_N_cpu_utilization | summarize max(originalEventTimestamp)), QDSAggIntervalInMin)
          step QDSAggIntervalInMin;
          let top_N_with_timestamps = timestamps
          | extend tmp_join_col = 1
          | join kind = inner (
          top_N
          | project query_hash
          | extend tmp_join_col = 1
          ) on tmp_join_col
          | project query_hash, originalEventTimestamp;
          top_N_cpu_utilization
          | join kind = rightouter(top_N_with_timestamps) on query_hash, originalEventTimestamp
          | project originalEventTimestamp=originalEventTimestamp1, query_hash=query_hash1, TotalQueryCPU_Pct
          | extend TotalQueryCPU_Pct = case(isnull(TotalQueryCPU_Pct), 0.0, TotalQueryCPU_Pct)
          | sort by originalEventTimestamp asc

  # ──────────────────────────────────────────────────────
  # 4. Top Memory Queries
  # Source: Performance/Queries/references/top-memory-queries.md
  # ──────────────────────────────────────────────────────
  - id: MI-LS-QUERIES-04
    name: "Top Memory Queries"
    source: "SQLLivesiteAgents/Performance/Queries/references/top-memory-queries.md"
    table: MonWiQdsExecStats
    parameters:
      TopN: 5
    KustoQueries:
      - TableName: MonWiQdsExecStats
        ExecutedQuery: |
          MonWiQdsExecStats
          | where LogicalServerName =~ '{ServerName}' and originalEventTimestamp between (datetime({StartTime})..datetime({EndTime}))
          | where database_name =~ '{DatabaseName}'
          | summarize maxMemoryGrantOfSingleExecution_mb=max(max_max_query_memory_pages)*8/1024,TotalMemoryGrant_mb= sum(max_query_memory_pages)*8/1024,executionCount=sum(execution_count) by query_hash
          | order by maxMemoryGrantOfSingleExecution_mb desc nulls first
          | take {TopN}
  # ──────────────────────────────────────────────────────
  # 5. Top Wait Queries
  # Source: Performance/Queries/references/top-wait-queries.md
  # ──────────────────────────────────────────────────────
  - id: MI-LS-QUERIES-05
    name: "Top Wait Queries"
    source: "SQLLivesiteAgents/Performance/Queries/references/top-wait-queries.md"
    table: MonWiQdsWaitStats
    parameters:
      TopN: 5
    KustoQueries:
      - TableName: MonWiQdsWaitStats
        ExecutedQuery: |
          MonWiQdsWaitStats
          | where LogicalServerName =~ '{ServerName}' and originalEventTimestamp between (datetime({StartTime})..datetime({EndTime}))
          | where database_name =~ '{DatabaseName}'
          | summarize sum(total_query_wait_time_ms) by query_hash
          | order by sum_total_query_wait_time_ms desc
          | take {TopN}

  # ──────────────────────────────────────────────────────
  # 6. Top Reads Queries
  # Source: Performance/Queries/references/top-reads-queries.md
  # ──────────────────────────────────────────────────────
  - id: MI-LS-QUERIES-06
    name: "Top Logical Reads Queries"
    source: "SQLLivesiteAgents/Performance/Queries/references/top-reads-queries.md"
    table: MonWiQdsExecStats
    parameters:
      TopN: 5
    KustoQueries:
      - TableName: MonWiQdsExecStats
        ExecutedQuery: |
          MonWiQdsExecStats
          | where LogicalServerName =~ '{ServerName}' and originalEventTimestamp between (datetime({StartTime})..datetime({EndTime}))
          | where database_name =~ '{DatabaseName}'
          | summarize TotalLogical_reads = sum(logical_reads),totalPhysical_reads=sum(physical_reads),totalPhysical_io_reads=sum(physical_io_reads)  by query_hash
          | order by TotalLogical_reads desc nulls first
          | take {TopN}

  # ──────────────────────────────────────────────────────
  # 7. Top Writes Queries
  # Source: Performance/Queries/references/top-writes-queries.md
  # ──────────────────────────────────────────────────────
  - id: MI-LS-QUERIES-07
    name: "Top Logical Writes Queries"
    source: "SQLLivesiteAgents/Performance/Queries/references/top-writes-queries.md"
    table: MonWiQdsExecStats
    parameters:
      TopN: 5
    KustoQueries:
      - TableName: MonWiQdsExecStats
        ExecutedQuery: |
          MonWiQdsExecStats
          | where LogicalServerName =~ '{ServerName}' and originalEventTimestamp between (datetime({StartTime})..datetime({EndTime}))
          | where database_name =~ '{DatabaseName}'
          | summarize TotalLogical_writes = sum(logical_writes) by query_hash
          | order by TotalLogical_writes desc nulls first
          | take {TopN}

  # ──────────────────────────────────────────────────────
  # 8. Top Tempdb Usage Queries
  # Source: Performance/Queries/references/top-tempdb-usage-queries.md
  # ──────────────────────────────────────────────────────
  - id: MI-LS-QUERIES-08
    name: "Top Tempdb Usage Queries"
    source: "SQLLivesiteAgents/Performance/Queries/references/top-tempdb-usage-queries.md"
    table: MonWiQdsExecStats
    parameters:
      TopN: 5
    KustoQueries:
