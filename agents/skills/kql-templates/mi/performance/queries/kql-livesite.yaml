          | where LogicalServerName =~ '{ServerName}' and originalEventTimestamp between (datetime({StartTime})..datetime({EndTime}))
          | where database_name =~ '{DatabaseName}'
          | summarize TotalTempdb_space_used_mb=round(sum(tempdb_space_used)*8/1024,1) by query_hash
          | order by TotalTempdb_space_used_mb desc nulls first
          | take {TopN}

  # ──────────────────────────────────────────────────────
  # 9. Top Log Usage Queries
  # Source: Performance/Queries/references/top-log-queries.md
  # ──────────────────────────────────────────────────────
  - id: MI-LS-QUERIES-09
    name: "Top Log Usage Queries"
    source: "SQLLivesiteAgents/Performance/Queries/references/top-log-queries.md"
    table: MonWiQdsExecStats
    parameters:
      TopN: 5
    KustoQueries:
      - TableName: MonWiQdsExecStats
        ExecutedQuery: |
          MonWiQdsExecStats
          | where LogicalServerName =~ '{ServerName}' and originalEventTimestamp between (datetime({StartTime})..datetime({EndTime}))
          | summarize TotalLogUsed_mb=round(sum(log_bytes_used)/1024.0/1024,1) by query_hash
          | order by TotalLogUsed_mb desc nulls first
