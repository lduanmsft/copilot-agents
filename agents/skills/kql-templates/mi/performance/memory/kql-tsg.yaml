  - Managed Instance How to work on the MI OOM issue
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: |-
      MonSQLSystemHealth
      | where PreciseTimeStamp >= datetime(****) and PreciseTimeStamp <= datetime(****)
      | where AppName == "****"
      | where message != ""
      | where message contains "Error:"
      | where not(message matches regex "Error: (35262|40613|913|18401|17187),")
      | extend parsed_message = replace("[0-9-]+[ \t]+[0-9:.]+[ \t]+[a-zA-Z0-9]+[ ]+", "", message)
      | project originalEventTimestamp, message, parsed_message
      | summarize count(), min(originalEventTimestamp), max(originalEventTimestamp), any(message) by parsed_message
      | order by count_ desc
