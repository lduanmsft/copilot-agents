- id: MI-memory-5
  Topic: TSGCLHE004-Broken_Esan_Volume_Group_Endpoint
  Source: content/Hermes/TSGCLHE004-Broken_Esan_Volume_Group_Endpoint.md
  Prompts:
  - MI TSGCLHE004 Broken_Esan_Volume_Group_Endpoint
  - Managed Instance TSGCLHE004 Broken_Esan_Volume_Group_Endpoint
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: |-
      let startDate = ago(1h);
      let replMasterClaimFailureCapture = "Failed to claim ownership on shared managed disks, initiating SQL Exit.";
      let connectFailurePattern = @"IscsiPsVolumeConnector::Connect\].*finished execution, status 0x[0-9a-fA-F]*[1-9a-fA-F]";
      let loginUnsuccessfulPattern = @"Login\s+unsuccessful";
      let connectSuccessPattern = @"IscsiPsVolumeConnector::Connect\].*finished execution, status 0x0+($|[^0-9a-fA-F])";
      let minFailedConnectThreshold = 3;

      let FailedClaimSqlExit =
          MonSQLSystemHealth
      | where originalEventTimestamp >= startDate
      | where instance_rg_size startswith "MIWCOW" and instance_rg_size contains "HE"
      | where message contains replMasterClaimFailureCapture
      | project instance_rg_size, LogicalServerName, ClusterName, NodeRole, AppName, AppTypeName, SqlExitTs = originalEventTimestamp;

      let FailedConnects =
          MonRgManager
      | where originalEventTimestamp >= startDate
      | where event startswith "rg_managed_disks" and isnotempty(message)
      | where message matches regex connectFailurePattern
      | where message matches regex loginUnsuccessfulPattern
      | extend VolumeName = extract(@"For volume '([^']+)'", 1, message, typeof(string))
      | project ClusterName, NodeRole, VolumeName, FailedConnectMsg = message, FailedConnectTs = originalEventTimestamp;

      let SuccessfulConnects =
          MonRgManager
      | where originalEventTimestamp >= startDate
      | where event startswith "rg_managed_disks" and isnotempty(message)
      | where message matches regex connectSuccessPattern
      | extend VolumeName = extract(@"For volume '([^']+)'", 1, message, typeof(string))
      | project ClusterName, NodeRole, VolumeName, SuccessConnectTs = originalEventTimestamp;

      let FailedVolumeSummary =
          FailedConnects
      | summarize FailedConnectCnt = count(),
                      FirstFailedConnectTs = min(FailedConnectTs),
                      LastFailedConnectTs  = max(FailedConnectTs),
                      FailedConnectMsg     = take_any(FailedConnectMsg)
              by ClusterName, NodeRole, VolumeName
      | where FailedConnectCnt >= minFailedConnectThreshold;

      let RecoveredVolumes =
          FailedVolumeSummary
      | join kind=inner SuccessfulConnects on ClusterName, NodeRole, VolumeName
      | where SuccessConnectTs > FirstFailedConnectTs
      | distinct ClusterName, NodeRole, VolumeName;

      let BrokenVolumeEndpoints =
          FailedVolumeSummary
      | join kind=leftanti RecoveredVolumes on ClusterName, NodeRole, VolumeName;

      FailedClaimSqlExit
      | join kind=inner BrokenVolumeEndpoints on ClusterName, NodeRole
      | where SqlExitTs >= FirstFailedConnectTs
      | summarize FailuresCnt = count(),
                  FirstDetectionTime = min(FirstFailedConnectTs),
                  FailedConnectCnt = max(FailedConnectCnt),
                  FailedConnectMsg = take_any(FailedConnectMsg)
          by instance_rg_size, LogicalServerName, ClusterName, AppName, AppTypeName, NodeRole, VolumeName
