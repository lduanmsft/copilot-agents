- id: MI-ASMI-MEMORY-07
  Topic: Investigation memory incidents
  Source: kusto-queries/Investigation memory incidents.md
  Prompts:
  - MonSqlCaches for clock hand stats
  - MonSqlCaches event removed_ratio removed_last_round visited_last_round
  - Investigate Investigation memory incidents
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlCaches
    ExecutedQuery: 'MonSqlCaches

      | where TIMESTAMP > ago(1d)

      | where AppName =~ "{AppName}"

      | where event == "clock_hand_stats"

      | where NodeName == "{NodeName}"

      | where store_type == "OBJECTSTORE_LOCK_MANAGER"

      | extend removed_ratio = removed_last_round*1.0/visited_last_round

      | project PreciseTimeStamp, removed_ratio, visited_last_round, removed_last_round'
