- id: MI-ASMI-MEMORY-32
  Topic: OOM
  Source: kusto-queries/OOM.md
  Prompts:
  - MonSqlMemNodeOomRingBuffer by LogicalServerName, job_object_limit_job_mem_kb
  - MonSqlMemNodeOomRingBuffer LogicalServerName job_object_limit_job_mem_kb min_sos_gap_with_job_mem_limit_in_mb UserAppName
  - Investigate OOM
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlMemNodeOomRingBuffer
    ExecutedQuery: 'MonSqlMemNodeOomRingBuffer

      | where TIMESTAMP > ago(1d)

      | where AppName == UserAppName

      | project TIMESTAMP, ClusterName, AppName, AppTypeName, LogicalServerName, NodeName, factor, failure, pool_metadata_id, committed_kb, job_object_limit_job_mem_kb,
      is_system_physical_memory_low, is_process_physical_memory_low, is_process_virtual_memory_low

      | join kind= inner (

      MonDmDbResourceGovernance

      | where AppName == UserAppName

      | summarize by ClusterName, AppTypeName, AppName, LogicalServerName, NodeName, slo_name, min_sos_gap_with_job_mem_limit_in_mb

      ) on ClusterName, AppTypeName, AppName, LogicalServerName, NodeName

      | extend MaxPoolSizeKb=job_object_limit_job_mem_kb-min_sos_gap_with_job_mem_limit_in_mb*1024

      | project TIMESTAMP, AppName, AppTypeName, LogicalServerName, NodeName, factor, failure, pool_metadata_id, committed_kb, job_object_limit_job_mem_kb, MaxPoolSizeKb,
      min_sos_gap_with_job_mem_limit_in_mb, slo_name Table 2'
- id: MI-ASMI-MEMORY-33
  Topic: OOM
  Source: kusto-queries/OOM.md
  Prompts:
  - MonSqlMemNodeOomRingBuffer by LogicalServerName, UserAppName
  - MonSqlMemNodeOomRingBuffer LogicalServerName UserAppName job_object_limit_job_mem_kb min_sos_gap_with_job_mem_limit_in_mb
  - Investigate OOM
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlMemNodeOomRingBuffer
    ExecutedQuery: 'let UserAppName="d1a1607bb400";

      MonSqlMemNodeOomRingBuffer

      | where TIMESTAMP > ago(1d)

      | where AppName == UserAppName

      | project TIMESTAMP, ClusterName, AppName, AppTypeName, LogicalServerName, NodeName, factor, failure, pool_metadata_id, committed_kb, job_object_limit_job_mem_kb,
      is_system_physical_memory_low, is_process_physical_memory_low, is_process_virtual_memory_low

      | join kind= inner (

      MonDmDbResourceGovernance

      | where AppName == UserAppName

      | summarize by ClusterName, AppTypeName, AppName, LogicalServerName, NodeName, slo_name, min_sos_gap_with_job_mem_limit_in_mb

      ) on ClusterName, AppTypeName, AppName, LogicalServerName, NodeName

      | extend MaxPoolSizeKb=job_object_limit_job_mem_kb-min_sos_gap_with_job_mem_limit_in_mb*1024

      | project TIMESTAMP, AppName, AppTypeName, LogicalServerName, NodeName, factor, failure, pool_metadata_id, committed_kb, job_object_limit_job_mem_kb, MaxPoolSizeKb,
      min_sos_gap_with_job_mem_limit_in_mb, slo_name'
- id: MI-ASMI-MEMORY-34
  Topic: Performance Counter + Alias ODBC failure
  Source: kusto-queries/Performance Counter + Alias ODBC failure.md
  Prompts:
  - MI one-minute performance counter telemetry by let, tr52896
  - MonCounterOneMinute let tr52896 eastus1 Specify
  - Investigate Performance Counter + Alias ODBC failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'let clusterName = ''tr52896.eastus1''; //Specify affected cluster name

      MonCounterOneMinute

      | where AppName =~ "{AppName}"

      | where TIMESTAMP > ago(6d)

      | where ClusterName contains clusterName

      | where NodeName contains ''WF''

      | where CounterName == ''\\Memory\\Available MBytes'''
