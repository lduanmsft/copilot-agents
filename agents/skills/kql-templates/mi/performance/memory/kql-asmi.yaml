SqlSkills:
- id: MI-ASMI-MEMORY-01
  Topic: Fulltext
  Source: kusto-queries/Fulltext.md
  Prompts:
  - MI resource governor manager telemetry
  - MonRgManager
  - Investigate Fulltext
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRgManager
    ExecutedQuery: 'MonRgManager

      | where LogicalServerName =~ "{ServerName}"

      | where originalEventTimestamp > ago(1h)'
- id: MI-ASMI-MEMORY-02
  Topic: Investigation memory incidents
  Source: kusto-queries/Investigation memory incidents.md
  Prompts:
  - MI memory clerk stats by LogicalServerName, ServerName
  - MonSqlMemoryClerkStats LogicalServerName ServerName let daysAgo
  - Investigate Investigation memory incidents
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlMemoryClerkStats
    ExecutedQuery: 'let ServerName = "{ServerName}" ;

      let AggInterval_do_NOT_change=time(5m);

      let daysAgo=3d;

      MonSqlMemoryClerkStats

      | where LogicalServerName =~ ServerName

      | where TIMESTAMP > ago(daysAgo)

      | lookup kind = leftouter (

      MonSqlMemoryClerkStats

      | where LogicalServerName =~ ServerName

      | where TIMESTAMP > ago(daysAgo)

      | top-nested 5 of memory_clerk_type by sum(pages_kb) desc

      ) on memory_clerk_type'
- id: MI-ASMI-MEMORY-03
  Topic: Investigation memory incidents
  Source: kusto-queries/Investigation memory incidents.md
  Prompts:
  - MonSqlRmRingBuffer by notification, MEMPHYSICAL_LOW
  - MonSqlRmRingBuffer notification MEMPHYSICAL_LOW
  - Investigate Investigation memory incidents
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRmRingBuffer
    ExecutedQuery: 'MonSqlRmRingBuffer

      | where TIMESTAMP > now(-6h)

      | where notification == "MEMPHYSICAL_LOW"

      | where AppName =~ "{AppName}" and NodeName == "{NodeName}"'
- id: MI-ASMI-MEMORY-04
  Topic: Investigation memory incidents
  Source: kusto-queries/Investigation memory incidents.md
  Prompts:
  - MonSqlCaches for clock hand stats
  - MonSqlCaches event clock_hand_stats store_type CP
  - Investigate Investigation memory incidents
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlCaches
    ExecutedQuery: 'MonSqlCaches

      | where AppName =~ "{AppName}"

      | where event == "clock_hand_stats"

      | where NodeName == "{NodeName}"

      | where store_type endswith "CP"

      | project PreciseTimeStamp, store_name, clock_hand_id, rounds_count, visited_last_round, removed_last_round, is_system_physical_memory_low, is_process_physical_memory_low,
      is_process_virtual_memory_low, pool_physical_memory_indicator_mask'
