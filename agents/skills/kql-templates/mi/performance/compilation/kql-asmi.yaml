- id: MI-ASMI-COMPILATION-05
  Topic: MonQueryProcessing(Statistic & Index create & drop
  Source: kusto-queries/MonQueryProcessing(Statistic & Index create & drop.md
  Prompts:
  - MonQueryProcessing for metadata change
  - MonQueryProcessing LogicalServerName logical_database_name event DatabaseName
  - Investigate MonQueryProcessing(Statistic & Index create & drop
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: 'let serverName = "{ServerName}";

      let DatabaseName = "{DatabaseName}";

      MonQueryProcessing

      | where TIMESTAMP between(ago(1d)..now())

      | where event == "metadata_change"

      | where LogicalServerName == serverName and logical_database_name == DatabaseName'
- id: MI-ASMI-COMPILATION-06
  Topic: MonQueryProcessing(Statistic & Index create & drop
  Source: kusto-queries/MonQueryProcessing(Statistic & Index create & drop.md
  Prompts:
  - MonQueryProcessing for metadata change / {ServerName}
  - MonQueryProcessing LogicalServerName database_name logical_database_name event
  - Investigate MonQueryProcessing(Statistic & Index create & drop
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: MonQueryProcessing | where (originalEventTimestamp > ago(1d)) | where AppName !startswith 'b-' and AppName !startswith 'v-' | where event == 'metadata_change' | extend database_name=logical_database_name
      | where LogicalServerName =~ '{ServerName}' | project originalEventTimestamp, database_name, object_id,object_name, operation_type, operation_code | order by originalEventTimestamp desc
- id: MI-ASMI-COMPILATION-07
  Topic: MonQueryProcessing(Statistic & Index create & drop
  Source: kusto-queries/MonQueryProcessing(Statistic & Index create & drop.md
  Prompts:
  - MonQueryProcessing for metadata change
  - MonQueryProcessing event b v metadata_change
  - Investigate MonQueryProcessing(Statistic & Index create & drop
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: 'MonQueryProcessing

      | where (originalEventTimestamp > ago(1d))

      | where AppName !startswith ''b-'' and AppName !startswith ''v-''

      | where event == ''metadata_change'''
- id: MI-ASMI-COMPILATION-08
  Topic: Query Compile & Recompile - Parameterization
  Source: kusto-queries/Query Compile & Recompile - Parameterization.md
  Prompts:
  - MonWiQueryParamData by LogicalServerName, logical_database_name
  - MonWiQueryParamData LogicalServerName logical_database_name ServerName DatabaseName
  - Investigate Query Compile & Recompile Parameterization
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQueryParamData
    ExecutedQuery: 'MonWiQueryParamData

      | where LogicalServerName =~ "{ServerName}"

      | where logical_database_name =~ "{DatabaseName}"'
