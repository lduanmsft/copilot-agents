SqlSkills:
- id: MI-ASMI-COMPILATION-01
  Topic: Memory grant feedback
  Source: kusto-queries/Memory grant feedback.md
  Prompts:
  - MonQueryProcessing for memory grant updated by feedback
  - MonQueryProcessing LogicalServerName logical_database_name event let
  - Investigate Memory grant feedback
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: 'let sname = "<server name>";

      let dname = "<db name>";

      let aname = "<app name>";

      let phash = tolong("<hex plan hash>");

      let startTime = "<start time>";

      let endTime = "<end time>";

      MonQueryProcessing

      | where originalEventTimestamp between(startTime..endTime)

      | where AppName == aname

      | where logical_database_name == dname

      | where LogicalServerName == sname

      | where query_plan_hash_signed == phash

      | where event == "memory_grant_updated_by_feedback"

      | mv-expand parse_json(memory_summary_by_operator_kb)'
