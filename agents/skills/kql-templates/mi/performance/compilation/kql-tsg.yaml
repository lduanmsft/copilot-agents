SqlSkills:
- id: MI-compilation-1
  Topic: Memory-Grant-Feedback-Persistence-and-Percentile-grant
  Source: Performance-and-Query-Execution/Reference/Memory-Grant-Feedback-Persistence-and-Percentile-grant.md
  Prompts:
  - MI Memory Grant Feedback Persistence and Percentile grant
  - Managed Instance Memory Grant Feedback Persistence and Percentile grant
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: |-
      MonQueryProcessing
      |   where   originalEventTimestamp  between(startTime..endTime)
      |   where   AppName == aname
      |   where   logical_database_name == dname
      |   where   LogicalServerName == sname
      |   where   query_plan_hash_signed == phash
      |   where   event ==   "memory_grant_updated_by_feedback"
      |   mv-expand   parse_json(memory_summary_by_operator_kb)
      |   extend   ni = parse_json(memory_summary_by_operator_kb)
      |   where   tolong(ni.Granted) == tolong(ni.Used)   and   tolong(ni.Granted) >   1024
      |   project   TIMESTAMP, ideal_additional_memory_before_kb, ideal_additional_memory_after_kb, memory_summary_by_operator_kb
- id: MI-compilation-2
  Topic: Memory-Grant-Feedback-Persistence-and-Percentile-grant
  Source: Performance-and-Query-Execution/Reference/Memory-Grant-Feedback-Persistence-and-Percentile-grant.md
  Prompts:
  - MI Memory Grant Feedback Persistence and Percentile grant
  - Managed Instance Memory Grant Feedback Persistence and Percentile grant
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: |-
      MonQueryProcessing
      |   where   originalEventTimestamp  between(startTime..endTime)
      |   where   AppName == aname
      |   where   logical_database_name == dname
      |   where   LogicalServerName == sname
      |   where   query_plan_hash_signed == phash
      |   where   event ==   "memory_grant_updated_by_feedback"
      |   extend   overestimate_kb = ideal_additional_memory_before_kb - ideal_additional_memory_after_kb
      |   where   overestimate_kb >   0
      |   project   TIMESTAMP, overestimate_kb, ideal_additional_memory_before_kb, ideal_additional_memory_after_kb
