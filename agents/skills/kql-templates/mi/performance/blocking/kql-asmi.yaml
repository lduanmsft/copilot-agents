- id: MI-ASMI-BLOCKING-07
  Topic: Deadlock
  Source: kusto-queries/Deadlock.md
  Prompts:
  - MonEventLog for database xml deadlock report
  - MonEventLog LogicalServerName event ServerName database_xml_deadlock_report
  - Investigate Deadlock
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonEventLog
    ExecutedQuery: 'MonEventLog

      | where LogicalServerName =~ "{ServerName}"

      | where event== "database_xml_deadlock_report"'
- id: MI-ASMI-BLOCKING-08
  Topic: Investigation memory incidents
  Source: kusto-queries/Investigation memory incidents.md
  Prompts:
  - MonBlockedProcessReportFiltered by LogicalServerName, logical_database_name
  - MonBlockedProcessReportFiltered LogicalServerName logical_database_name string anystr
  - Investigate Investigation memory incidents
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBlockedProcessReportFiltered
    ExecutedQuery: 'MonBlockedProcessReportFiltered

      | where LogicalServerName =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}"

      | where TIMESTAMP > ago(1d)

      | parse blocked_process_filtered with anystr:string"<blocking-process>" blocking:string "" ExcType:string

      | parse blocked_process_filtered with anystr:string"<blocked-process>" blocked:string "/>" ExcType:string

      | parse blocked with anystr:string"<frame queryhash=\""query_hash:string"\" queryplanhash=\""query_plan_hash:string"\""anystr:string

      | parse blocking with anystr:string"spid=\""blocking_spid:string"\""anystr:string"xactid=\""blocking_xactid:string"\""anystr:string'
- id: MI-ASMI-BLOCKING-09
  Topic: Investigation memory incidents
  Source: kusto-queries/Investigation memory incidents.md
  Prompts:
  - MonBlockedProcessReportFiltered by database_name, duration
  - MonBlockedProcessReportFiltered database_name duration object_id index_id
  - Investigate Investigation memory incidents
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBlockedProcessReportFiltered
    ExecutedQuery: 'MonBlockedProcessReportFiltered

      | where TIMESTAMP > ago(1d)

      | where AppName =~ "{AppName}"

      | where NodeName == "{NodeName}"

      | project TIMESTAMP, duration, database_name, object_id, index_id, lock_mode, transaction_id, resource_owner_type, blocked_process_filtered'
