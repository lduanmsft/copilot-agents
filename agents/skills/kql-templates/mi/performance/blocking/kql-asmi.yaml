SqlSkills:
- id: MI-ASMI-BLOCKING-01
  Topic: Blocking
  Source: kusto-queries/Blocking.md
  Prompts:
  - MonGovernorWorkloadGroups by whereAppName, WF
  - MonGovernorWorkloadGroups whereAppName WF
  - Investigate Blocking
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonGovernorWorkloadGroups
    ExecutedQuery: 'MonGovernorWorkloadGroups

      | where AppName =~ "{AppName}"//and NodeName == "WF.5"'
- id: MI-ASMI-BLOCKING-02
  Topic: Blocking
  Source: kusto-queries/Blocking.md
  Prompts:
  - MonBlockedProcessReportFiltered by whereTIMESTAMP
  - MonBlockedProcessReportFiltered whereTIMESTAMP
  - Investigate Blocking
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBlockedProcessReportFiltered
    ExecutedQuery: 'MonBlockedProcessReportFiltered

      | where LogicalServerName =~ "{ServerName}"

      | where TIMESTAMP > ago(1d)'
- id: MI-ASMI-BLOCKING-03
  Topic: Deadlock
  Source: kusto-queries/Deadlock.md
  Prompts:
  - MonDeadlockReportsFiltered
  - Investigate Deadlock
  - MI performance MonDeadlockReportsFiltered
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDeadlockReportsFiltered
    ExecutedQuery: 'MonDeadlockReportsFiltered

      | where LogicalServerName =~ "{ServerName}"

      | where TIMESTAMP > ago(1d)

      | limit 100'
