      | project TIMESTAMP, iops_per_volume_cap
- id: MI-blocking-10
  Topic: TSGCL0167-CloudLifter-Latch-timeout
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0167-CloudLifter-Latch-timeout.ipynb
  Prompts:
  - MI TSGCL0167 CloudLifter Latch timeout
  - Managed Instance TSGCL0167 CloudLifter Latch timeout
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: |-
      MonSQLSystemHealth
      | where TIMESTAMP > ago(4d)
      | where AppTypeName == 'Worker.CL'
      | where error_id in (846, 847)
      | summarize count() by bin(TIMESTAMP,1h), LogicalServerName
- id: MI-blocking-11
  Topic: TSGCL0167-CloudLifter-Latch-timeout
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0167-CloudLifter-Latch-timeout.ipynb
  Prompts:
  - MI TSGCL0167 CloudLifter Latch timeout
  - Managed Instance TSGCL0167 CloudLifter Latch timeout
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: "let startTime = datetime(YYYY-MM-DD HH:mm:ss);  \nlet endTime = datetime(YYYY-MM-DD HH:mm:ss);  \nlet srvrName = '<managed_server_name>';  \nMonSQLXStore\n| where TIMESTAMP > startTime\n\
      | where TIMESTAMP < endTime\n| where LogicalServerName == srvrName\n| where file_path endswith \".mdf\" or file_path endswith \".ndf\" or file_path endswith \".ldf\"\n| where event == 'xio_failed_request'\n\
      | where http_errorcode == '503'\n| summarize max(retry_count), count() by bin(TIMESTAMP, 5m), file_path\n| top 5 by count_ desc"
- id: MI-blocking-12
  Topic: TSGCL0167-CloudLifter-Latch-timeout
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0167-CloudLifter-Latch-timeout.ipynb
  Prompts:
  - MI TSGCL0167 CloudLifter Latch timeout
  - Managed Instance TSGCL0167 CloudLifter Latch timeout
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: "let startTime = datetime(YYYY-MM-DD HH:mm:ss);  \nlet endTime = datetime(YYYY-MM-DD HH:mm:ss);\nlet srvrName = '<managed_server_name>';  \nMonSQLXStore\n| where TIMESTAMP > startTime\n\
      | where TIMESTAMP < endTime\n| where LogicalServerName == srvrName\n| where file_path endswith \"df\"\n| where event == 'xio_failed_request'\n| summarize max(retry_count), count() by bin(TIMESTAMP,\
      \ 5m), file_path, request_type\n| top 5 by count_ desc"
- id: MI-blocking-13
  Topic: TSGCL0167-CloudLifter-Latch-timeout
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0167-CloudLifter-Latch-timeout.ipynb
  Prompts:
  - MI TSGCL0167 CloudLifter Latch timeout
  - Managed Instance TSGCL0167 CloudLifter Latch timeout
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: "MonSQLXStoreIOStats\n| where TIMESTAMP between (datetime(YYYY-MM-DD HH:mm:ss) .. datetime(YYYY-MM-DD HH:mm:ss))\n| where event == 'xstore_io_stats'\n| where file_path == file_path_from_previous_query\n\
      | extend MBpS_write = total_write_bytes / 30. / 1024. / 1024., MBpS_read = total_read_bytes / 30. / 1024. / 1024., IOPS_W = total_writes / 30., IOPS_R = total_reads / 30.\n| extend MBpS = MBpS_write\
      \ + MBpS_read, IOPS = IOPS_W + IOPS_R\n| extend w_size_kb = total_write_bytes / 1024. / (total_writes + 0.000001), r_size_kb = total_read_bytes / 1024. / (total_reads + 0.00001)\n| extend avg_w_lat\
      \ = total_write_microsec / 1000. / total_writes, avg_r_lat = total_read_microsec / 1000. / total_reads\n| project TIMESTAMP, round(MBpS_write,2), round(MBpS_read,2), round(MBpS,2), round(IOPS_W,2),\
      \ round(IOPS_R,2), round(IOPS,2),  \nround(w_size_kb,2), round(r_size_kb,2), round(avg_w_lat,2), round(avg_r_lat,2), total_writes, total_reads, total_outstanding_io, page_blob_tier"
- id: MI-blocking-14
  Topic: TSGCL0167-CloudLifter-Latch-timeout
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0167-CloudLifter-Latch-timeout.ipynb
  Prompts:
  - MI TSGCL0167 CloudLifter Latch timeout
  - Managed Instance TSGCL0167 CloudLifter Latch timeout
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: "let startTime = datetime(YYYY-MM-DD HH:mm:ss);  \nlet endTime = datetime(YYYY-MM-DD HH:mm:ss);  \nlet srvrName = '<managed_server_name>';  \nMonSqlRgHistory\n| where TIMESTAMP > startTime\n\
      | where TIMESTAMP < endTime\n| where AppTypeName == \"Worker.CL\"\n| where LogicalServerName == srvrName\n| where event == \"aggregated_resource_pools_plus_history\"\n| summarize sum(delta_read_bytes_total),\
      \ sum(delta_read_io_issued_total) by event, group_name, pool_name, bin(TIMESTAMP, 5m)\n| render timechart"
- id: MI-blocking-15
  Topic: TSGCL0167-CloudLifter-Latch-timeout
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0167-CloudLifter-Latch-timeout.ipynb
  Prompts:
  - MI TSGCL0167 CloudLifter Latch timeout
