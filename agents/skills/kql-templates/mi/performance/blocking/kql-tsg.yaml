SqlSkills:
- id: MI-blocking-1
  Topic: TSGCL0144-Latch-timeouts-on-GP-instance
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0144-Latch-timeouts-on-GP-instance.ipynb
  Prompts:
  - MI TSGCL0144 Latch timeouts on GP instance
  - Managed Instance TSGCL0144 Latch timeouts on GP instance
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: |-
      MonSQLSystemHealth
      | where (error_id == long(823) or error_id == long(845)) and AppName == "{AppName}"
      | summarize count(), min(TIMESTAMP), max(TIMESTAMP) by process_id
- id: MI-blocking-2
  Topic: TSGCL0144-Latch-timeouts-on-GP-instance
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0144-Latch-timeouts-on-GP-instance.ipynb
  Prompts:
  - MI TSGCL0144 Latch timeouts on GP instance
  - Managed Instance TSGCL0144 Latch timeouts on GP instance
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: |-
      MonAnalyticsDBSnapshot
      | where service_level_objective startswith 'MI'
      | extend AppName = extract('fabric:/.*/(.*)', 1, fabric_application_uri)
      | where AppName == "{AppName}"
      | extend DatabasePartitionId = tolower(fabric_partition_id), physical_db_id = tolower(physical_database_id), logical_database_id = tolower(logical_database_id), database_name = tolower(iff(fabric_service_type_name contains 'UserDb', logical_database_id , logical_database_name ))
      | summarize MinLastUpdateTime = min(last_update_time) by AppName, DatabasePartitionId, physical_db_id, logical_database_name, logical_server_name, tenant_ring_name, create_time, logical_database_id, SubscriptionId = customer_subscription_id, service_level_objective, database_name
- id: MI-blocking-3
  Topic: TSGCL0144-Latch-timeouts-on-GP-instance
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0144-Latch-timeouts-on-GP-instance.ipynb
  Prompts:
  - MI TSGCL0144 Latch timeouts on GP instance
  - Managed Instance TSGCL0144 Latch timeouts on GP instance
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: |-
      MonSQLXStore
      | where AppName == "{AppName}"
      | where file_path contains "{LogicalDatabaseId}"
      | where file_path endswith ".mdf" or file_path endswith ".ldf"
      | summarize by file_path
- id: MI-blocking-4
  Topic: TSGCL0144-Latch-timeouts-on-GP-instance
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0144-Latch-timeouts-on-GP-instance.ipynb
  Prompts:
  - MI TSGCL0144 Latch timeouts on GP instance
  - Managed Instance TSGCL0144 Latch timeouts on GP instance
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: |-
      MonSQLXStore
      | where AppName == "{AppName}"
      | where file_path == '{filepath}'
      | where event == 'xio_failed_request'
      | where http_errorcode == '503'
      | summarize count(), max(retry_count) by bin(TIMESTAMP, 5m)
      | render timechart
- id: MI-blocking-5
  Topic: TSGCL0144-Latch-timeouts-on-GP-instance
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0144-Latch-timeouts-on-GP-instance.ipynb
  Prompts:
  - MI TSGCL0144 Latch timeouts on GP instance
  - Managed Instance TSGCL0144 Latch timeouts on GP instance
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: |-
      MonSQLXStoreIOStats
      | where LogicalServerName == "{LogicalServerName}"
      | where event == 'xstore_io_stats'
      | where file_path == '{filepath}'
      | project file_path, TIMESTAMP , rps = total_requests / 30, nrps = total_xio_requests / 30 , mbs = (total_read_bytes  + total_write_bytes)/ (1024. * 1024 * 30)
      | summarize avg(rps), avg(nrps), avg(mbs) by bin(TIMESTAMP, 5m)
- id: MI-blocking-6
  Topic: TSGCL0144-Latch-timeouts-on-GP-instance
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0144-Latch-timeouts-on-GP-instance.ipynb
  Prompts:
  - MI TSGCL0144 Latch timeouts on GP instance
  - Managed Instance TSGCL0144 Latch timeouts on GP instance
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: "MonDmIoVirtualFileStats\n| where database_id > 4 and database_id < 30000 and LogicalServerName == \"{ServerName}\"\n| where type_desc == 'ROWS' or type_desc == 'LOG'\n| where db_name\
      \ == \"{logical_database_id}\"\n| summarize gb = max(size_on_disk_bytes)/1024./1024/1024., used_gb = max(spaceused_mb)/1024. by bin(end_utc_date, 5m), db_name, \ntype_desc"
- id: MI-blocking-7
  Topic: TSGCL0144-Latch-timeouts-on-GP-instance
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0144-Latch-timeouts-on-GP-instance.ipynb
  Prompts:
  - MI TSGCL0144 Latch timeouts on GP instance
  - Managed Instance TSGCL0144 Latch timeouts on GP instance
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: |-
      MonDmRealTimeResourceStats
      | where LogicalServerName startswith "{svr_name}"
      | distinct NodeName, replica_type
      | join kind=inner (
       MonSqlRgHistory
      | where event == "aggregated_virtual_files_io_history"
      ) on NodeName
      | where LogicalServerName startswith "{svr_name}"
      | where physical_database_name startswith "c75"
      //| where type_desc in ('ROWS', 'LOG')
      | where isnotempty(toguid(physical_database_name))
      | where TIMESTAMP <= datetime(2018-11-28 10:42:19.7100000)
      | where type_desc in ('ROWS', 'LOG')
      | project TIMESTAMP, delta_io_stall_queued_read_ms, delta_num_of_reads
      | where delta_num_of_reads > 0
      | project
       start_utc_date = TIMESTAMP
       , rg_read_avg_response = (delta_io_stall_queued_read_ms * 1.0) / delta_num_of_reads
      | where rg_read_avg_response > 0
- id: MI-blocking-8
  Topic: TSGCL0144-Latch-timeouts-on-GP-instance
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0144-Latch-timeouts-on-GP-instance.ipynb
  Prompts:
  - MI TSGCL0144 Latch timeouts on GP instance
  - Managed Instance TSGCL0144 Latch timeouts on GP instance
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: |-
      MonBackup
      | where package == "XdbBackupServiceXEvents" and AppTypeName == "Worker.CL"
      | where (event_type == "BACKUP_START" or event_type == "BACKUP_END" or event_type == "BACKUP_ERROR") and LogicalServerName == "{ServerName}" and database_name == tostring(toguid(database_name))
      | where backup_type != "Log"
      | summarize by backup_type, tostring(originalEventTimestamp), event_type, exception_message, database_name
- id: MI-blocking-9
  Topic: TSGCL0144-Latch-timeouts-on-GP-instance
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0144-Latch-timeouts-on-GP-instance.ipynb
  Prompts:
  - MI TSGCL0144 Latch timeouts on GP instance
  - Managed Instance TSGCL0144 Latch timeouts on GP instance
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: |-
      MonSqlRgHistory
      | where LogicalServerName =~ "{ServerName}"
      | where event == "aggregated_resource_pools_plus_history"
