  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: "let startTime = datetime(YYYY-MM-DD HH:mm:ss);  \nlet endTime = datetime(YYYY-MM-DD HH:mm:ss);  \nlet srvrName = '<managed_server_name>';  \nMonSqlRgHistory\n| where TIMESTAMP > startTime\n\
      | where TIMESTAMP < endTime\n| where AppTypeName == \"Worker.CL\"\n| where LogicalServerName == srvrName\n| where event == \"aggregated_resource_pools_plus_history\"\n| summarize sum(delta_write_bytes_total),\
      \ sum(delta_write_io_issued_total) by pool_name, bin(TIMESTAMP, 5m)\n| render timechart"
- id: MI-blocking-16
  Topic: Full-text-crawl-blocking-drop-view
  Source: Performance-and-Query-Execution/Blocking-and-deadlocks/Full-text-crawl-blocking-drop-view.md
  Prompts:
  - MI Full text crawl blocking drop view
  - Managed Instance Full text crawl blocking drop view
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonFulltextActiveCatalogs
    ExecutedQuery: |-
      MonFulltextActiveCatalogs
      | where AppName == "appname"
      | where PreciseTimeStamp  between (datetime(2023-05-03 00:00:00)..datetime(2023-05-03 08:00:00))
      | where LogicalServerName =~ "{ServerName}"
      | project PreciseTimeStamp, LogicalServerName, database_id, catalog_id, name, is_paused, is_enabled, status, crawl_start_date, crawl_end_date, has_crawl_completed
      | sort by PreciseTimeStamp desc
- id: MI-blocking-17
  Topic: No-deadlock-information
  Source: Performance-and-Query-Execution/Blocking-and-deadlocks/No-deadlock-information.md
  Prompts:
  - MI No deadlock information
  - Managed Instance No deadlock information
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: AlrSQLErrorsReported
    ExecutedQuery: |-
      AlrSQLErrorsReported
      | where LogicalServerName =~ "{ServerName}"
      | where error_number == 3617
      | where TIMESTAMP > ago(3d)
- id: MI-blocking-18
  Topic: No-deadlock-information
  Source: Performance-and-Query-Execution/Blocking-and-deadlocks/No-deadlock-information.md
  Prompts:
  - MI No deadlock information
  - Managed Instance No deadlock information
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: |-
      MonSQLSystemHealth
      | where LogicalServerName =~ "{ServerName}"
      | where TIMESTAMP > ago(3d)
      | where message contains "Version cleaner snapshotted aborted transactions"
      | project PreciseTimeStamp, NodeName, message
- id: MI-blocking-19
  Topic: Query-with-suboptimal-plan-causing-blocking
  Source: Performance-and-Query-Execution/Query-tuning/Query-with-suboptimal-plan-causing-blocking.md
  Prompts:
  - MI Query with suboptimal plan causing blocking
  - Managed Instance Query with suboptimal plan causing blocking
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: |-
      MonWiQdsExecStats
      | where LogicalServerName == ""
      | where query_hash == ""
      | project TIMESTAMP, query_hash, plan_id, forced_plan_id, plan_forcing_type
- id: MI-blocking-20
  Topic: Scalar-UDF-Inlining-not-working-due-to-UDF-complexity
  Source: Performance-and-Query-Execution/Query-tuning/Scalar-UDF-Inlining-not-working-due-to-UDF-complexity.md
  Prompts:
  - MI Scalar UDF Inlining not working due to UDF complexity
  - Managed Instance Scalar UDF Inlining not working due to UDF complexity
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: |-
      MonQueryProcessing
      | where LogicalServerName  == "{ServerName}"
      | where event == "tsql_scalar_udf_not_inlineable"
      | where udf_name contains "{UDFName}"
      | distinct  blocked_reason, udf_name, object_id
      | join (MonQueryProcessing
      | where LogicalServerName  == "{ServerName}" and event == "tsql_scalar_udf_inlining_threshold"
      | where threshold_type == "UdfInlineNodesLimit"
      | distinct object_id, threshold_type, value) on object_id
- id: MI-blocking-21
  Topic: Useful-Kusto-queries
  Source: Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful Kusto queries
  - Managed Instance Useful Kusto queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBlockedProcessReportFiltered
    ExecutedQuery: |-
      let blockingchain=MonBlockedProcessReportFiltered
      //| where TIMESTAMP > datetime(2017-10-06 12:54:00) and TIMESTAMP < datetime(2017-10-06 12:55:00)
      | where TIMESTAMP > ago(5d)
      | where LogicalServerName =~ "{ServerName}"
      | extend monitorLoop = extract("monitorLoop=\"([0-9]+)\"", 1, blocked_process_filtered, typeof(int))
      | parse blocked_process_filtered with anystr3:string "<blocked-process>" blockee "</blocked-process>" discard1
      | parse blocked_process_filtered with anystr4:string"<blocking-process>" blocker "</blocking-process>" discard2
      | extend blockee_session_id = extract("spid=\"([0-9]+)\"", 1, blockee, typeof(int))
      | extend blockee_status = extract("status=\"(.*?)\"", 1, blockee, typeof(string))
      | extend blockee_waittime = extract("waittime=\"([0-9]+)\"", 1, blockee, typeof(int))
      | extend blockee_trancount = extract("trancount=\"([0-9]+)\"", 1, blockee, typeof(int))
      | extend blockee_lasttranstarted = extract("lasttranstarted=\"(.*?)\"", 1, blockee, typeof(datetime))
      | extend blockee_queryhhash = extract("queryhash=\"(.*?)\"", 1, blockee, typeof(string))
      | extend blockee_isolationlevel = extract("isolationlevel=\"(.*?)\"", 1, blockee, typeof(string))
      | extend blockee_lastattention = extract("lastattention=\"(.*?)\"", 1, blockee, typeof(datetime))
      | extend blockee_lastattention = extract("lastattention=\"(.*?)\"", 1, blockee, typeof(datetime))
      | extend blockee_lastbatchstarted = extract("lastbatchstarted=\"(.*?)\"", 1, blockee, typeof(datetime))
      | extend blockee_waitresource = extract("waitresource=\"(.*?)\"", 1, blockee, typeof(string))
      | extend blocker_session_id = extract("spid=\"([0-9]+)\"", 1, blocker, typeof(int))
      | extend blocker_status = extract("status=\"(.*?)\"", 1, blocker, typeof(string))
      | extend blocker_waittime = extract("waittime=\"([0-9]+)\"", 1, blocker, typeof(int))
      | extend blocker_trancount = extract("trancount=\"([0-9]+)\"", 1, blocker, typeof(int))
      | extend blocker_lasttranstarted = extract("lasttranstarted=\"(.*?)\"", 1, blocker, typeof(datetime))
      | extend blocker_queryhhash = extract("queryhash=\"(.*?)\"", 1, blocker, typeof(string))
      | extend blocker_isolationlevel = extract("isolationlevel=\"(.*?)\"", 1, blocker, typeof(string))
      | extend blocker_lastattention = extract("lastattention=\"(.*?)\"", 1, blocker, typeof(datetime))
      | extend blocker_lastattention = extract("lastattention=\"(.*?)\"", 1, blocker, typeof(datetime))
      | extend blocker_lastbatchstarted = extract("lastbatchstarted=\"(.*?)\"", 1, blocker, typeof(datetime))
      //| project PreciseTimeStamp, monitorLoop, blockee_session_id , blocker_session_id
      | order by monitorLoop asc nulls last;
