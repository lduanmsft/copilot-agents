- id: MI-miscellaneous-14
  Topic: Connection-errors-and-not-able-to-change-network-settings
  Source: Performance-and-Query-Execution/Other-errors-and-exceptions/Connection-errors-and-not-able-to-change-network-settings.md
  Prompts:
  - MI Connection errors and not able to change network settings
  - Managed Instance Connection errors and not able to change network settings
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: |-
      MonLogin
      | where ClusterName startswith "tr4487"
      | where originalEventTimestamp >= issue_time - 2d
      | where event == "process_login_finish"
      | where is_success == 0
      | where total_time_ms > ssl_treshold
      | where isnotempty(message)
      | project event, AppName, message
      | extend parsed = parse_xml(message)
      | project event, AppName, parsed_wait_stats = parsed.waitstats.wait
      | mv-expand parsed_wait_stats
      | extend wait_stat_name = tostring(parsed_wait_stats["@name"])
      | extend wait_stat_max_time = toint(parsed_wait_stats["@maxTime"])
      | project event, AppName, wait_stat_name, wait_stat_max_time
      | summarize total_wait_stat_time = sum(wait_stat_max_time), avg_wait_stat_time = sum(wait_stat_max_time) / count() by AppName, wait_stat_name
