- id: MI-miscellaneous-17
  Topic: Lock-Request-Timeout-Error-1222-State-51
  Source: Performance-and-Query-Execution/Query-timeouts/Lock-Request-Timeout-Error-1222-State-51.md
  Prompts:
  - MI Lock Request Timeout Error 1222 State 51
  - Managed Instance Lock Request Timeout Error 1222 State 51
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: AlrSQLErrorsReported
    ExecutedQuery: |-
      AlrSQLErrorsReported
      | where TIMESTAMP between ({StartDateTime}..{EndDateTime})
      | where LogicalServerName == "{MIName}" //Input customer server name
      | where error_number == '1222'
      | project originalEventTimestamp, NodeName, database_name, ['state'], code_package_version
      | summarize count() by bin(originalEventTimestamp, 1h), database_name
      | render timechart
- id: MI-miscellaneous-18
  Topic: Lock-Request-Timeout-Error-1222-State-51
  Source: Performance-and-Query-Execution/Query-timeouts/Lock-Request-Timeout-Error-1222-State-51.md
  Prompts:
  - MI Lock Request Timeout Error 1222 State 51
  - Managed Instance Lock Request Timeout Error 1222 State 51
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: |-
      MonLogin
      | where TIMESTAMP between ({StartDateTime}..{EndDateTime})
      | where logical_server_name == "{MIName}" //Input customer server name
      | where event == "process_login_finish"   and package == "sqlserver"
      | where is_user_error == 0
      | extend success=case(is_success == 1, 1, 0)
      | extend failure=case(is_success == 0, 1, 0)
      | extend failure_enqueue_time_ms=case(is_success == 1, total_time_ms, 0)
      | summarize Successful_Login_Count=sum(success), Failed_Login_Count=sum(failure) by bin(originalEventTimestamp, 1min)
      | render timechart
