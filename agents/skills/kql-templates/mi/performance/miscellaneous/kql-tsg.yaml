SqlSkills:
- id: MI-miscellaneous-1
  Topic: TSGCLHE004-Broken_Esan_Volume_Group_Endpoint
  Source: content/Hermes/TSGCLHE004-Broken_Esan_Volume_Group_Endpoint.md
  Prompts:
  - MI TSGCLHE004 Broken_Esan_Volume_Group_Endpoint
  - Managed Instance TSGCLHE004 Broken_Esan_Volume_Group_Endpoint
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: |-
      MonSQLSystemHealth
      | where originalEventTimestamp >= startDate
      | where instance_rg_size startswith "MIWCOW" and instance_rg_size contains "HE"
      | where message contains replMasterClaimFailureCapture
      | project instance_rg_size, LogicalServerName, ClusterName, NodeRole, AppName, AppTypeName, SqlExitTs = originalEventTimestamp;
- id: MI-miscellaneous-2
  Topic: TSG-Increase-SQL-MI-reserved-storage-on-the-fly
  Source: content/sql_cloud_lifter_notebook/TSG-Increase-SQL-MI-reserved-storage-on-the-fly.md
  Prompts:
  - MI TSG Increase SQL MI reserved storage on the fly
  - Managed Instance TSG Increase SQL MI reserved storage on the fly
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedServers
    ExecutedQuery: |-
      MonManagedServers
      | where name == '{LogicalServerName}'
      | top 1 by TIMESTAMP desc
      | project TIMESTAMP, edition
- id: MI-miscellaneous-3
  Topic: TSG-PLATVLDT-ErrorNode-DiskWatchdog-FullDisk
  Source: content/sql_cloud_lifter_notebook/TSG-PLATVLDT-ErrorNode-DiskWatchdog-FullDisk.md
  Prompts:
  - MI TSG PLATVLDT ErrorNode DiskWatchdog FullDisk
  - Managed Instance TSG PLATVLDT ErrorNode DiskWatchdog FullDisk
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: |-
      MonSQLSystemHealth
      | where TIMESTAMP between (startTime .. endTime)
      | where ClusterName == clusterName
      | where NodeName in (nodeNames)
      | where AppName == appName
      | summarize count(), take_any(message) by error_id, AppName
      | where count_ > countThreshold
      | project count_, error_id, message, AppName
      | sort by count_
- id: MI-miscellaneous-4
  Topic: TSGCL0279-Hermes-Managed-server-encountered-a-stuck-upsert-operation
  Source: content/sql_cloud_lifter_notebook/TSGCL0279-Hermes-Managed-server-encountered-a-stuck-upsert-operation.md
  Prompts:
  - MI TSGCL0279 Hermes Managed server encountered a stuck upsert operation
  - Managed Instance TSGCL0279 Hermes Managed server encountered a stuck upsert operation
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: |-
      MonManagement
      | where TIMESTAMP > ago(4d)
      | where event startswith "managed_disk_azure_operation"
      | where operation_type == "UpdateVMDataDiskConfig"
      | where resource_group_name contains "tr54572"
      | project originalEventTimestamp, event, operation_type, request_method, request_body //, response_body (add response_body for more details), I filtered it out in TSG for simplicity
- id: MI-miscellaneous-5
  Topic: TSGCL0279-Hermes-Managed-server-encountered-a-stuck-upsert-operation
  Source: content/sql_cloud_lifter_notebook/TSGCL0279-Hermes-Managed-server-encountered-a-stuck-upsert-operation.md
