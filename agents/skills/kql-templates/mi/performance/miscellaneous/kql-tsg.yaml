- id: MI-miscellaneous-7
  Topic: Customer-complains-about-used-space-is-growing-or-too-high
  Source: Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Customer-complains-about-used-space-is-growing-or-too-high.md
  Prompts:
  - MI Customer complains about used space is growing or too high
  - Managed Instance Customer complains about used space is growing or too high
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiDmDbPartitionStats
    ExecutedQuery: |-
      let PartitionStats=materialize(MonWiDmDbPartitionStats
      | where AppName contains myAppName and logical_database_name !='master' and logical_database_name =~ dbName and index_id in (0,1)
      | summarize used_page_count=max(used_page_count), row_count=max(row_count) by database_id, logical_database_name, object_id, index_id, partition_number, data_date=bin(TIMESTAMP, 1d));
- id: MI-miscellaneous-8
  Topic: Customer-complains-about-used-space-is-growing-or-too-high
  Source: Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Customer-complains-about-used-space-is-growing-or-too-high.md
  Prompts:
  - MI Customer complains about used space is growing or too high
  - Managed Instance Customer complains about used space is growing or too high
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: |-
      let FilteredResults=materialize(MonDatabaseMetadata
      | where AppName contains myAppName and logical_db_name != 'master'
      | where (table_name=='sysclsobjs' and class==50) or (table_name=='sysschobjs' and ['type']=='U ') or (table_name=='sysidxstats' and indid in (0,1))
      | project TIMESTAMP, table_name, class, ['type'], id, name, nsid, indid);
