- id: MI-ASMI-MISCELLANEOUS-27
  Topic: MonLogin - most used
  Source: kusto-queries/MonLogin - most used.md
  Prompts:
  - MI MonLogin - most used
  - Managed Instance MonLogin - most used
  - Investigate MonLogin - most used
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let timeBucket = iff(datetime_diff(''second'', datetime(2024-05-06 00:15:00), datetime(2024-05-06 05:30)) < 1000, 1s iff(datetime_diff(''minute'',  datetime(2024-05-06 00:15), datetime(2024-05-06
      05:30)) < 1000, 1m, 1h));

      MonLogin

      | where originalEventTimestamp between(datetime(2024-05-06 00:15).. datetime(2024-05-06 05:30))

      | where event == ''process_login_finish''

      | where logical_server_name =~ "{ServerName}"// and database_name =~ "{DatabaseName}"

      | summarize count() by bin(originalEventTimestamp, timeBucket), iff(is_success == true, strcat(''Successful_'', package), strcat(''Failed_'', package, ''_'', error, ''_'', state)),AppName'
- id: MI-ASMI-MISCELLANEOUS-28
  Topic: MonLogin - most used
  Source: kusto-queries/MonLogin - most used.md
  Prompts:
  - MI MonLogin - most used
  - Managed Instance MonLogin - most used
  - Investigate MonLogin - most used
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp > datetime(2024-05-15 08:20) and originalEventTimestamp < datetime(2024-05-15 09:00)

      | where LogicalServerName =~ "{ServerName}" or logical_server_name =~ "{ServerName}"

      | where event=="process_login_finish"

      | summarize Success = countif(is_success == 1), UserFailed = countif(is_success == 0 and is_user_error == 1), TrueFailed = countif(is_success == 0 and is_user_error == 0) by bin(PreciseTimeStamp,
      1min)'
