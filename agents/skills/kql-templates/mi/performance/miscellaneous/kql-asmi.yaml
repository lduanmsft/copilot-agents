- id: MI-ASMI-MISCELLANEOUS-31
  Topic: Performance Counter + Alias ODBC failure
  Source: kusto-queries/Performance Counter + Alias ODBC failure.md
  Prompts:
  - MI Performance Counter + Alias ODBC failure
  - Managed Instance Performance Counter + Alias ODBC failure
  - Investigate Performance Counter + Alias ODBC failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'let startTime = todatetime(''2024-08-18 2:00:00'');

      let endTime = todatetime(''2024-08-24 02:01:00'');

      let clusterName = ''tr52896.eastus1''; //Specify affected cluster name

      MonCounterOneMinute

      | where TIMESTAMP > ago(6d)

      | where ClusterName contains clusterName

      | where NodeName contains ''WF''

      | where CounterName == ''\\Memory\\Available MBytes''

      | project PreciseTimeStamp, AvailableMemory=CounterValue, NodeName'
- id: MI-ASMI-MISCELLANEOUS-32
  Topic: Performance Counter + Alias ODBC failure
  Source: kusto-queries/Performance Counter + Alias ODBC failure.md
  Prompts:
  - MI Performance Counter + Alias ODBC failure
  - Managed Instance Performance Counter + Alias ODBC failure
  - Investigate Performance Counter + Alias ODBC failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRedirector
    ExecutedQuery: 'MonRedirector

      | where TIMESTAMP > ago(6d)

      | where ClusterName contains clusterName

      | where event == ''sql_alias_odbc_failure'' or event == ''sql_alias_cache_refresh''

      | where error_code != ''FABRIC_E_SERVICE_DOES_NOT_EXIST''

      | make-series SqlAliasErrorCount = count() on originalEventTimestamp from bin(startTime, 1m) to bin(endTime, 1m) step 1m

      | mv-expand originalEventTimestamp, SqlAliasErrorCount

      | project todatetime(originalEventTimestamp), toint(SqlAliasErrorCount)'
