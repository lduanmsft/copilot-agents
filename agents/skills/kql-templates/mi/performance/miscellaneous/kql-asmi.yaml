SqlSkills:
- id: MI-ASMI-MISCELLANEOUS-01
  Topic: AAD authentication
  Source: kusto-queries/AAD authentication.md
  Prompts:
  - MI login event telemetry by logical_server_name, database_name
  - MonLogin logical_server_name database_name let starttime
  - Investigate AAD authentication
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let starttime= ago(1d);

      let endtime= now();

      let server= ''myazepmdb0011'';

      let database= ''MerlotCADemo'';

      MonLogin

      | where originalEventTimestamp>= starttime and originalEventTimestamp<= endtime

      | where logical_server_name=~ server //and database_name=~ database'
- id: MI-ASMI-MISCELLANEOUS-02
  Topic: AAD authentication
  Source: kusto-queries/AAD authentication.md
  Prompts:
  - MonFedAuthTicketService for fedauth webtoken failure
  - MonFedAuthTicketService event starttime endtime fedauth_webtoken_failure
  - Investigate AAD authentication
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonFedAuthTicketService
    ExecutedQuery: 'MonFedAuthTicketService

      | where LogicalServerName =~ "{ServerName}"

      | where originalEventTimestamp>= starttime and originalEventTimestamp<= endtime

      | where event== ''fedauth_webtoken_failure'''
- id: MI-ASMI-MISCELLANEOUS-03
  Topic: AAD authentication
  Source: kusto-queries/AAD authentication.md
  Prompts:
  - MonAzureActivDirService by logical_server_name, database_name
  - MonAzureActivDirService logical_server_name database_name databaseName startTime
  - Investigate AAD authentication
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonAzureActivDirService
    ExecutedQuery: 'MonAzureActivDirService

      | where originalEventTimestamp between(startTime..endTime)

      | where logical_server_name =~ serverName and (isempty(databaseName) or database_name =~ databaseName)'
- id: MI-ASMI-MISCELLANEOUS-04
  Topic: Code Package Version & Primary Node history
  Source: kusto-queries/Code Package Version & Primary Node history.md
  Prompts:
