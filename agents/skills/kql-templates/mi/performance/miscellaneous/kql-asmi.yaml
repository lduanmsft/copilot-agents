    ExecutedQuery: 'MonManagedServers

      | where name =~ "lulimi2" or LogicalServerName =~ "{ServerName}"'
- id: MI-ASMI-MISCELLANEOUS-05
  Topic: Database Options (MonDatabaseMetadata
  Source: kusto-queries/Database Options (MonDatabaseMetadata.md
  Prompts:
  - MI database metadata telemetry by LogicalServerName, ServerName
  - MonDatabaseMetadata LogicalServerName ServerName let daysAgo
  - Investigate Database Options (MonDatabaseMetadata
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'let ServerName = "{ServerName}" ;

      let daysAgo=7d;

      MonDatabaseMetadata

      | where AppName !startswith ''b-'' and AppName !startswith ''v-''

      | where TIMESTAMP > ago(daysAgo)

      | where LogicalServerName =~ ServerName'
