SqlSkills:
- id: MI-ASMI-OUT-OF-DISK-01
  Topic: Disk space usage
  Source: kusto-queries/Disk space usage.md
  Prompts:
  - MonSqlRgHistory by LogicalServerName, database_name
  - MonSqlRgHistory LogicalServerName database_name only ServerName
  - Investigate Disk space usage
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP > ago(1d)

      | where LogicalServerName =~ ''{ServerName}'' //server name

      | where db_name =~ "{DatabaseName}" // database_name

      | where type_desc == "ROWS" //looking only for data only

      | where is_primary_replica == 1'
- id: MI-ASMI-OUT-OF-DISK-02
  Topic: Disk space usage
  Source: kusto-queries/Disk space usage.md
  Prompts:
  - MonSqlRgHistory by LogicalServerName, database_name
  - MonSqlRgHistory LogicalServerName database_name ServerName server
  - Investigate Disk space usage
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP > ago(1d)

      | where LogicalServerName =~ "{ServerName}" //server name

      | where db_name =~ "{DatabaseName}" // database_name

      | where type_desc == "ROWS" //looking only for data'
- id: MI-ASMI-OUT-OF-DISK-03
