    ExecutedQuery: |-
      MonDmIoVirtualFileStats
      | where originalEventTimestamp > lookBack
      | project-rename tenant_ring_name = ClusterName, sql_instance_name = AppName, logical_server_name_1 = LogicalServerName, db_name = db_name
