SqlSkills:
- id: MI-out-of-disk-1
  Topic: 2_-Managed-Instance-log-growth-in-danger-of-fillin
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
  Prompts:
  - MI 2. Managed Instance log growth in danger of fillin
  - Managed Instance 2. Managed Instance log growth in danger of fillin
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: |-
      let DatabaseSizes = MonDmIoVirtualFileStats
      | where FilterFunc (TIMESTAMP, ago(FileSizeQueryTimeWindow), true, AppTypeName, ClusterName, ClusterNameParam, NodeName)
      | where type_desc == 'ROWS'
      | summarize arg_max(TIMESTAMP, spaceused_mb, size_on_disk_bytes ) by LogicalServerName, db_name, file_id
      | summarize sum(spaceused_mb), sum(size_on_disk_bytes ) by LogicalServerName, db_name
      | extend DatabaseSizeUsedMB = sum_spaceused_mb, DatabaseSizeOnDiskMB = sum_size_on_disk_bytes / 1024. / 1024.
      | project LogicalServerName, DatabaseNameGuid = db_name, DatabaseSizeUsedMB, DatabaseSizeOnDiskMB;
      // Log sizes
- id: MI-out-of-disk-2
  Topic: 2_-Managed-Instance-log-growth-in-danger-of-fillin
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/2.-Managed-Instance-log-growth-in-danger-of-fillin.ipynb
  Prompts:
  - MI 2. Managed Instance log growth in danger of fillin
  - Managed Instance 2. Managed Instance log growth in danger of fillin
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: "let LogSizes = MonDmIoVirtualFileStats\n| where FilterFunc (TIMESTAMP, ago(FileSizeQueryTimeWindow), true, AppTypeName, ClusterName, ClusterNameParam, NodeName)\n| where type_desc ==\
      \ 'LOG'\n| summarize arg_max(TIMESTAMP, spaceused_mb, size_on_disk_bytes ) by LogicalServerName, db_name, file_id\n| summarize sum(spaceused_mb), sum(size_on_disk_bytes ) by LogicalServerName, db_name\n\
      | extend LogSizeUsedMB = sum_spaceused_mb, LogSizeOnDiskMB = sum_size_on_disk_bytes / 1024. / 1024.\n| project LogicalServerName, DatabaseNameGuid = db_name, LogSizeUsedMB, LogSizeOnDiskMB;\n// SVM\
      \ Managed Servers used and reserved storage space  \nlet InstanceUsedSpaceAndReservedSpace = MonManagedInstanceResourceStats\n| where FilterFunc (TIMESTAMP, ago(QueryTimeWindow), true, AppTypeName,\
      \ ClusterName, ClusterNameParam, NodeName)\n| summarize arg_max(TIMESTAMP, storage_space_used_mb, reserved_storage_mb) by LogicalServerName\n| project LogicalServerName, InstanceUsedSpaceMB=storage_space_used_mb,\
      \ InstanceReservedSpaceMB=reserved_storage_mb;\n// SVMs which did not change SVM size in the last SloChangeQueryTimeWindow hours"
- id: MI-out-of-disk-3
  Topic: SOPCL00193-CloudLifter-High-disk-usage-detection
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/SOPCL00193-CloudLifter-High-disk-usage-detection.ipynb
  Prompts:
  - MI SOPCL00193 CloudLifter High disk usage detection
  - Managed Instance SOPCL00193 CloudLifter High disk usage detection
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: |-
      MonDmIoVirtualFileStats
      | where TIMESTAMP > ago(1h)
      | where ClusterName == "{ClusterName}" //ex. tr7310.eastus1-a.worker.database.windows.net
      | where NodeName == "{NodeName}" //ex. DB4C.2
      | where db_name =~ "{DatabaseName}"
      | where type_desc == "ROWS"
      | project TIMESTAMP, file_id, max_size_mb, size_on_disk_mb = size_on_disk_bytes/1024./1024., spaceused_mb
- id: MI-out-of-disk-4
  Topic: TSGCL0156-SVM-Network-Throughput-Saturation
  Source: content/Azure SQL Managed Instance (CloudLifter) Performance TSGs and SOPs/TSGCL0156-SVM-Network-Throughput-Saturation.ipynb
  Prompts:
  - MI TSGCL0156 SVM Network Throughput Saturation
  - Managed Instance TSGCL0156 SVM Network Throughput Saturation
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedInstanceResourceStats
    ExecutedQuery: "let startTime = datetime(2020-10-09 02:10:13);  \nlet endTime = datetime(2020-10-15 03:12:11);  \nlet srvrName = 'pccsql-use2-prod-w26-cli0010';  \nlet clusName = 'tr5433.eastus2-a.worker.database.windows.net';\
      \  \nMonManagedInstanceResourceStats\n| where TIMESTAMP>=startTime and TIMESTAMP<=endTime\n| where LogicalServerName == srvrName\n| project TIMESTAMP, LogicalServerName, ClusterName, NodeName\n| summarize\
      \ by bin(TIMESTAMP,5m), LogicalServerName, ClusterName, NodeName\n| join kind=inner (  \nMonCounterOneMinute\n| where TIMESTAMP>=startTime and TIMESTAMP<=endTime\n| where ClusterName == clusName\n\
      | where CounterName startswith '[Network](file://Network) Interface(Microsoft Hyper-V' and (CounterName endswith '[Bytes](file://Bytes) Received/sec' or CounterName endswith '[Bytes](file://Bytes)\
      \ Sent/sec')\n| project TIMESTAMP, ClusterName, NodeName, Cnt = iif (CounterName endswith '[Bytes](file://Bytes) Received/sec', 'Received', 'Sent'), round(MBps = CounterValue / 1024. / 1024., 2)\n\
      | summarize avg(MBps), max(MBps) by bin(TIMESTAMP,5m), ClusterName, NodeName, Cnt  \n) on TIMESTAMP, ClusterName, NodeName\n| parse NodeName with 'DB' core_count:int 'C.' *\n| extend core_count=iif(isempty(\
      \ core_count), 80, core_count)\n| extend netLimitMBps = 62.5 * core_count\n| extend avg_netPerc = 1. * avg_MBps / netLimitMBps, max_netPerc = 1. * max_MBps / netLimitMBps\n| project TIMESTAMP, LogicalServerName,\
      \ NodeName, Cnt, round(avg_MBps,2), round(max_MBps,2), netLimitMBps, round(avg_netPerc,2), round(max_netPerc,2)"
