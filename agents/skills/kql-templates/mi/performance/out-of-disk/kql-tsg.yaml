      | project tenant_ring_name, file_id, sql_instance_name , NodeName , logical_server_name_1, db_name , type_desc, originalEventTimestamp, logical_database_id , spaceused_gb = round(spaceused_mb / 1024.0, 2), max_size_mb , size_on_disk_Gb = round(size_on_disk_bytes / 1024.0 / 1024 / 1024, 2)
      | summarize arg_max(originalEventTimestamp, *) by NodeName, logical_server_name_1, db_name, type_desc, file_id
      | extend
      free_percentage = round(iif(spaceused_gb == 0, 0.0 , 100 - spaceused_gb / (size_on_disk_Gb / 100)),2)
