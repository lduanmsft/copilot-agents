  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0093-BackupSLA-placeholder.md
  Prompts:
  - MI backup history and status by server
  - MonManagedServers name state_machine_type event
  - Check MonManagedServers name state_machine_type
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedServers
    ExecutedQuery: 'let serverName = ''<server_name>'';

      let backupTypes = dynamic([''Full'']); // Keep only backup types you wish to check.

      let filterOnlyBackupAbortEvents = true; // Set to true if you only want to see BACKUP_SQL_ERROR events

      let startTime = ago(2d); // Find latest MI start time and use that.

      let endTime = now(); // Find last full backup end time after MI start and use that.

      let databaseIds = dynamic([

      let serverId = toscalar(MonManagedServers

      let StartStopEvents = MonManagement

      let BackupsAndAlerts = MonBackup

      | where end_utc_date between (startTime .. endTime)

      | where name =~ serverName

      | summarize arg_max(end_utc_date, *) by managed_server_id

      | project tolower(managed_server_id));

      | where originalEventTimestamp between (startTime .. endTime)

      | where state_machine_type == ''ManagedServerStateMachine'' and keys =~ serverId

      | where event == ''fsm_fired_event'' and fsm_event in (''Start'', ''Stop'')

      | project originalEventTimestamp, request_id, fsm_event, is_manual = case(isempty(caller_state_machine_type), '''', iff(caller_state_machine_type == ''ManagementOperationStateMachine'', ''Manual'',
      ''Scheduled''));

      | where originalEventTimestamp between (startTime .. endTime)

      | where LogicalServerName =~ serverName and (array_length(databaseIds) == 0 or logical_database_id in~ (databaseIds))

      | where (event == ''backup_alert'' and alert_type !contains ''RETENTION'' and alert_type !in (''NO_LOG_BACKUP_FOR_NEW_DATABASE'', ''DIFF_BACKUP_OUT_OF_SLA''))'
- id: MI-backup_restore-141
  Topic: TSGMIBR0093-BackupSLA-placeholder
