  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: Unknown
    ExecutedQuery: 'let startTime = ago(30d);

      let serverNames = dynamic([

      let RunnerLogs =

      let ServerInfo = materialize(

      | where PreciseTimeStamp >= startTime

      | where InstanceName contains ''BackupOnSecondaryReplicaAlert''

      | project PreciseTimeStamp, InstanceName, Pid, RunId, Iteration, Message = UserField1;

      RunnerLogs

      | where Message has_any (serverNames) and Message has_cs ''greater or equal to the threshold value''

      | parse Message with ''Failure rate of '' BackupType '' backup on secondary replica on server: '' ServerName '' is '' FailureRatePct : double ''% which is greater or equal to the threshold value for
      this backup type: '' ThresholdPct : double ''%.''

      | project-away Message

      );

      RunnerLogs

      | parse-where Message with * ''query time period ['' QueryStartTime : datetime '' .. '' QueryEndTime : datetime ''].''

      | project QueryTimePeriodMessageTimestamp = PreciseTimeStamp, InstanceName, Pid, RunId, Iteration, QueryStartTime, QueryEndTime

      | lookup kind = inner ServerInfo on InstanceName, Pid, RunId, Iteration

      | summarize arg_min(QueryTimePeriodMessageTimestamp, *) by InstanceName, Pid, RunId, Iteration, ServerName, BackupType

      | project-away QueryTimePeriodMessageTimestamp

      | project-reorder InstanceName, ServerName, BackupType, PreciseTimeStamp, FailureRatePct, ThresholdPct

      | order by InstanceName asc, ServerName asc, BackupType asc, PreciseTimeStamp asc'
