- id: MI-backup-restore-125
  Topic: TSGMIBR0090-Backup-schedule
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0090-Backup-schedule.md
  Prompts:
  - MI TSGMIBR0090-Backup-schedule
  - Managed Instance TSGMIBR0090-Backup-schedule
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let getBackupEvents = (backupTypes : dynamic, startTime : datetime, endTime : datetime) {

      MonBackup

      | where originalEventTimestamp between (startTime .. endTime)

      | where LogicalServerName in (serverNames)

      | where event startswith ''database_backup''

      | where event_type !contains ''METADATA'' and event_type !contains ''SKIP'' and event_type !contains ''LTR'' and event_type != ''BACKUP_TURNED_OFF''

      | where backup_type in (backupTypes)

      | project timestamp = originalEventTimestamp, server = LogicalServerName, value = iff(event_type == ''BACKUP_START'', 1, -1)

      | order by server asc, timestamp asc

      //

      // Filter out duplicate events. This is necessary as event signal generation relies on previous events.

      // The approach extends the duration as much as possible:

      //

      // 1) START event gets moved as EARLY as possible.

      // 2) END event gets moved as LATE as possible.

      //

      | where server != prev(server) or server != next(server) or iff(value == 1, prev(value) != 1, next(value) != -1)'
