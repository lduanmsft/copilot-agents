- id: MI-backup_restore-393
  Topic: Helpful-Queries
  Source: TSG-SQL-MI-BackupRestore/content/On-call-Helpers/Helpful-Queries.md
  Prompts:
  - MI restore request status
  - MonManagementOperations originalEventTimestamp
  - Check MonManagementOperations originalEventTimestamp
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'let parameterValue= ''"{OperationParameter}"'';

      MonManagementOperations

      | where originalEventTimestamp >= ago(2d)

      | where operation_type !in (''GetPurviewScanRunInfo'')

      | where operation_parameters has strcat(''>'', parameterValue, ''<'')

      | project originalEventTimestamp, elapsed_time, operation_type, request_id, event, is_user_error, error_code, error_severity, error_message, operation_parameters, operation_result

      | extend InputParameters = parse_xml(operation_parameters).InputParameters

      | extend OutputParameters = parse_xml(operation_result).OutputParameters

      | project-away operation_parameters, operation_result

      | mv-apply InputParameters on (

      mv-expand bagexpansion = array InputParameters

      | where not(InputParameters[0] startswith ''@xmlns:'')

      | where not(coalesce(tobool(InputParameters[1][''@xsi:nil'']), false))

      | summarize InputParameters = make_bag(bag_pack(tostring(InputParameters[0]), InputParameters[1]))

      )

      | mv-apply OutputParameters on (

      mv-expand bagexpansion = array OutputParameters

      | where not(OutputParameters[0] startswith ''@xmlns:'')

      | where not(coalesce(tobool(OutputParameters[1][''@xsi:nil'']), false))

      | summarize OutputParameters = make_bag(bag_pack(tostring(OutputParameters[0]), OutputParameters[1]))

      )

      | evaluate bag_unpack(InputParameters, columnsConflict = ''replace_source'')

      | evaluate bag_unpack(OutputParameters, columnsConflict = ''keep_source'')

      | summarize start_time = min(originalEventTimestamp), end_time = arg_max(originalEventTimestamp, *) by request_id'
