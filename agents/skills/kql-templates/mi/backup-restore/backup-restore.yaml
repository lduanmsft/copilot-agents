- id: MI-backup_restore-405
  Topic: TSGMIBR0041-Restore-investigation
  Source: TSG-SQL-MI-BackupRestore/content/Restore/TSGMIBR0041-Restore-investigation.md
  Prompts:
  - MI restore request status
  - MonRestoreEvents be state restore
  - Check MonRestoreEvents be state
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: '| | |

      |---|---|

      | **What you see** | `FabricServiceStateMachine` shows state `Resolving` for a long time, minutes, hours, or even days. |

      | **What''s actually happening** | After the fabric service is created (`Creating`), the FSM enters `Resolving` where it polls Service Fabric to check replica status. This is by design: `Resolving`
      is the normal state for the fabric service during the entire restore. The FSM does NOT transition to `Ready` until the restore is fully complete and the database is online with all replicas. For Business
      Critical instances, this includes waiting for secondary replicas to be seeded. |

      | **When to worry** | `Resolving` alone is never a reason to escalate. The duration depends on the restore type:<br/>- PITR / Native: Usually completes within hours. Check `MonRestoreEvents` for progress.<br/>-
      LRS / ExternalBackupV2 (migrations): Can be in `Resolving` for days. This is expected as logs are continuously replayed.<br/>- Only worry if the restore itself shows no progress (no new events in
      `MonRestoreEvents` for >1 hour). |

      | **What NOT to do** | Do not restart the service, do not fail the restore, do not escalate to provisioning based on `Resolving` state alone. |'
