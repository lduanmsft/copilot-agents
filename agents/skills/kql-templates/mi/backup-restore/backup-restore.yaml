      logical_database_guid, fileid

      )) on managed_database_id, fileid

      | as FileInfo

      | lookup kind = inner (('
- id: MI-backup_restore-285
  Topic: TSGMIBR0111-SRB-Low-backup-on-secondary-rate-[DEPRECATED]
  Source: TSG-SQL-MI-BackupRestore/content/Deprecated/TSGMIBR0111-SRB-Low-backup-on-secondary-rate-[DEPRECATED].md
  Prompts:
  - MI backup history and status
  - MonManagedDatabases start_utc_date managed_database_id
  - Check MonManagedDatabases start_utc_date managed_database_id
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedDatabases
    ExecutedQuery: 'MonManagedDatabases

      | where start_utc_date >= ago(6h)

      | where managed_database_id in (FileInfo | distinct managed_database_id)

      | distinct managed_server_id, managed_database_id, managed_database_name

      )) on managed_database_id

      | project-reorder managed_server_id, managed_database_id, managed_server_name, managed_database_name

      | order by managed_server_name, managed_database_name, fileid'
