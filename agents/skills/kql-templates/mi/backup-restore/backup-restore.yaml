      | where type_desc == ''ROWS''

      | summarize sizeOfDataInGB=sum(max_TIMESTAMP_spaceused_GB) by db_name

      | extend estimatedHoursToCompleteFull = sizeOfDataInGB * 1024. / 100. / 3600.

