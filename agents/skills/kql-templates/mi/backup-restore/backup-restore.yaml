  - Check MonSQLSystemHealth error_id originalEventTimestamp
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'let serverName = ''<server_name>'';

      let startTime = ago(6h); // Use recent start time if there are many backups aborted.

      let endTime = now(); // Usually there is no need to change this.

      MonSQLSystemHealth

      | where originalEventTimestamp between (startTime .. endTime)

      | where LogicalServerName =~ serverName

      | where error_id in (18100, 3041)

      | project originalEventTimestamp, Source = ''SQL'', NodeName, process_id, error_id, message

      ),'
