      /// &lt;param name="connectionString"&gt;&lt;/param&gt;<br>[6047](http://sqlsrc/ds_main_dev/xref/Sql/xdb/manifest/svc/backuprestore/BackupService/BackupService.cs#6047) /// &lt;param name="databaseInfo"&gt;&lt;/param&gt;<br>[6048](http://sqlsrc/ds_main_dev/xref/Sql/xdb/manifest/svc/backuprestore/BackupService/BackupService.cs#6048)
      /// &lt;param name="backupType"&gt;&lt;/param&gt;<br>[6049](http://sqlsrc/ds_main_dev/xref/Sql/xdb/manifest/svc/backuprestore/BackupService/BackupService.cs#6049) /// &lt;param name="backupFiles"&gt;&lt;/param&gt;<br>[6050](http://sqlsrc/ds_main_dev/xref/Sql/xdb/manifest/svc/backuprestore/BackupService/BackupService.cs#6050)
      /// &lt;returns&gt;&lt;/returns&gt;<br>[6051](http://sqlsrc/ds_main_dev/xref/Sql/xdb/manifest/svc/backuprestore/BackupService/BackupService.cs#6051) **private** [BackupMetadata ](http://sqlsrc/ds_main_dev/s?defs=BackupMetadata)
      [**DoGetBackupMetadata**](http://sqlsrc/ds_main_dev/xref/Sql/xdb/manifest/svc/backuprestore/BackupService/BackupService.cs#DoGetBackupMetadata)(**string** [connectionString](http://sqlsrc/ds_main_dev/s?defs=connectionString),
      [DatabaseInfo ](http://sqlsrc/ds_main_dev/s?defs=DatabaseInfo) [databaseInfo](http://sqlsrc/ds_main_dev/s?defs=databaseInfo), **char** [backupType](http://sqlsrc/ds_main_dev/s?defs=backupType), [List](http://sqlsrc/ds_main_dev/s?defs=List)&lt;<strong>string</strong>&gt;  [backupFiles](http://sqlsrc/ds_main_dev/s?defs=backupFiles))<br>We
      are setting infinite timeout on that query. Since customer has access to MSDB he can get a lock on the rows we are trying to select and we would be infinitely stuck. The most interesting part is that
      we are currently expected to get 0 rows, as we do not log any history for automated backups in MSDB. We should put a very small timeout here so we do not affect current backup loop. With the current
      design no backups would happen on the database if only one backup is stuck.<br>[6064](http://sqlsrc/ds_main_dev/xref/Sql/xdb/manifest/svc/backuprestore/BackupService/BackupService.cs#6064) [sqlCmd](http://sqlsrc/ds_main_dev/s?defs=sqlCmd).[CommandTimeout](http://sqlsrc/ds_main_dev/s?defs=CommandTimeout)
