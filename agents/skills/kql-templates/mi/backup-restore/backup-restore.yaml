let startTime = ago({TimeRange});
MonDmIoVirtualFileStats

      | where TIMESTAMP between (startTime .. endTime)

      | where AppName =~ appName

      | where is_remote == 1 // check only remote storage files; this eliminates files from: master (physical master), tempdb, model, model_msdb and model_replicatedmaster databases

