      | extend ImpactAction = parse_json(Jobs).ImpactAction

      | extend JobStatus = parse_json(Jobs).JobStatus

      | extend CurrentUD = parse_json(Jobs).CurrentUD

      | extend CurrentlyImpactedRoleInstances = parse_json(Jobs).CurrentlyImpactedRoleInstances

      | extend IsNodeAdded = iff(CurrentlyImpactedRoleInstances contains "InstanceAddition", 1, 0)

      | extend IsNodeRemoved = iff(CurrentlyImpactedRoleInstances contains "InstanceRemoval", 1, 0)

      | extend IsAppUpdate = iff(CurrentlyImpactedRoleInstances contains "ApplicationUpdate", 1, 0)

      | extend IsGuestOSUpdate = iff(CurrentlyImpactedRoleInstances contains "OSUpdate", 1, 0)

      | extend IsImpactfull = IsAppUpdate == 1 or IsGuestOSUpdate == 1

      | extend PendingActions = parse_json(Jobs).PendingActions

      | extend AllowedActions = parse_json(Jobs).AllowedActions

      | where JobStatus == "Executing"

      | where ImpactAction == "TenantUpdate"

      | summarize JobStartTime = min(PreciseTimeStamp), JobEndTime = max(PreciseTimeStamp), ApplicationUpdate = max(IsAppUpdate), GuestOSUpdateWithOrWithoutGuestAgent = max(IsGuestOSUpdate), Impactfull
      = max(IsImpactfull), IsNodeRemoved = max(IsNodeRemoved), IsNodeAdded = max(IsNodeAdded) by tostring(JobId)

      | extend Id = 1

      | join kind = leftouter ('
