- id: MI-backup-restore-405
  Topic: TSGMIBR0041-Restore-investigation
  Source: TSG-SQL-MI-BackupRestore/content/Restore/TSGMIBR0041-Restore-investigation.md
  Prompts:
  - MI TSGMIBR0041-Restore-investigation
  - Managed Instance TSGMIBR0041-Restore-investigation
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: '| | |

      |---|---|

      | **What you see** | `FabricServiceStateMachine` shows state `Resolving` for a long time, minutes, hours, or even days. |

      | **What''s actually happening** | After the fabric service is created (`Creating`), the FSM enters `Resolving` where it polls Service Fabric to check replica status. This is by design: `Resolving`
      is the normal state for the fabric service during the entire restore. The FSM does NOT transition to `Ready` until the restore is fully complete and the database is online with all replicas. For Business
      Critical instances, this includes waiting for secondary replicas to be seeded. |

      | **When to worry** | `Resolving` alone is never a reason to escalate. The duration depends on the restore type:<br/>- PITR / Native: Usually completes within hours. Check `MonRestoreEvents` for progress.<br/>-
      LRS / ExternalBackupV2 (migrations): Can be in `Resolving` for days. This is expected as logs are continuously replayed.<br/>- Only worry if the restore itself shows no progress (no new events in
      `MonRestoreEvents` for >1 hour). |

      | **What NOT to do** | Do not restart the service, do not fail the restore, do not escalate to provisioning based on `Resolving` state alone. |'
- id: MI-backup-restore-406
  Topic: TSGMIBR0041-Restore-investigation
  Source: TSG-SQL-MI-BackupRestore/content/Restore/TSGMIBR0041-Restore-investigation.md
  Prompts:
  - MI TSGMIBR0041-Restore-investigation
  - Managed Instance TSGMIBR0041-Restore-investigation
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: '| Error / Symptom | TSG |

      |----------------|-----|

      | `Cannot open backup device ''...'' Operating system error <N>` | [TSGMIBR0009: Errors accessing storage account](https://eng.ms/docs/cloud-ai-platform/azure-data/azure-data-azure-databases/sql-/sql-backup-restore/sql-backup-restore-mi/miscellaneous/tsgmibr0009-errors-accessing-storage-account)
      |

      | Storage account not accessible due to customer network misconfiguration | [TSGMIBR0009A: Storage account not accessible](https://eng.ms/docs/cloud-ai-platform/azure-data/azure-data-azure-databases/sql-/sql-backup-restore/sql-backup-restore-mi/miscellaneous/tsgmibr0009a-storage-account-not-accessible-due-to-customer-network-misconfiguration)
      |

      | `RequestBodyTooLarge` or Error 3202 with "parameter is incorrect" | [TSGMIBR0057: RequestBodyTooLarge for big MAXTRANSFERSIZE](https://eng.ms/docs/cloud-ai-platform/azure-data/azure-data-azure-databases/sql-/sql-backup-restore/sql-backup-restore-mi/restore/tsgmibr0057-requestbodytoolarge-for-big-maxtransfersize)
      |

      | `Logical file ''xtp'' is not part of database` | This is a retry error. Find the original error in MonRestoreEvents using query 4b |

      | `The restore plan is broken because firstLsn ... is not equal to lastLsn` | LSN gap in log backups. Customer must fix backup chain ordering |

      | `Backup set in 2 is broken` / SQL error code 4335 | [TSGMIBR0102: Backup set broken](https://eng.ms/docs/cloud-ai-platform/azure-data/azure-data-azure-databases/sql-/sql-backup-restore/sql-backup-restore-mi/restore/tsgmibr0102-unable-to-pit-restore-due-to-backup-set-in-2-is-broken-sql-error-code-4335)
      |

