    ExecutedQuery: 'MonManagedDatabases

      | summarize arg_max(TIMESTAMP, backup_retention_days) by managed_database_id, managed_database_name

      )

      on $left.logical_database_id == $right.managed_database_id

      | where managed_database_name != ""

      | order by managed_database_name, originalEventTimestamp asc

      | extend isNewChain = iif(backup_type == "Full" or prev(managed_database_name, 1) != managed_database_name, 1, 0)

      | extend chainId = row_cumsum(isNewChain)

      | project-away managed_database_id, logical_database_id, isNewChain;

      BackupData

      | join kind=leftouter (

      BackupData

      | summarize ChainEndTime=max(originalEventTimestamp), ChainStartTime=min(originalEventTimestamp) by chainId, backup_retention_days

      | extend isBilled = ChainEndTime > ago(backup_retention_days * 1d)

      | summarize by chainId, ChainStartTime, ChainEndTime, isBilled, backup_retention_days

