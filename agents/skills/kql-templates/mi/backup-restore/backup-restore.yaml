- id: MI-backup_restore-305
  Topic: TSGMIBR0091D-Backup-Watchdog-alert-LOG_BACKUP_OUT_OF_SLA
  Source: TSG-SQL-MI-BackupRestore/content/Deprecated/TSGMIBR0091-Backup-Watchdog-alerts/TSGMIBR0091D-Backup-Watchdog-alert-LOG_BACKUP_OUT_OF_SLA.md
  Prompts:
  - MI backup history and status
