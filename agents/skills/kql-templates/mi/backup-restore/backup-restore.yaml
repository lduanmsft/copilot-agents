      | parse br_error_details with "Database doesn''t have log backup since " sourceDateTimeString

      | extend SourceDateTime = todatetime(sourceDateTimeString)

      | extend BackupMissingForDuration = originalEventTimestamp - SourceDateTime

      | where BackupMissingForDuration > 2h

      | summarize arg_max(originalEventTimestamp, SourceDateTime, BackupMissingForDuration) by logical_database_id, LogicalServerName

      | join kind=leftouter ('
