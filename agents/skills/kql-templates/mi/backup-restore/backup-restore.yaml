- id: MI-backup_restore-122
  Topic: TSGMIBR0090-Backup-schedule
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0090-Backup-schedule.md
  Prompts:
  - MI backup history and status by server
  - MonManagedInstanceResourceStats LogicalServerName
  - Check MonManagedInstanceResourceStats throughput_in_mbps_bc
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedInstanceResourceStats
    ExecutedQuery: 'let getThroughputMbpsBC = (startTime : datetime, endTime : datetime) {

      let read_throughput_per_core = 48;

      MonManagedInstanceResourceStats

      | where originalEventTimestamp between (startTime .. endTime)

      | where LogicalServerName in (serverNames)

      | summarize arg_max(originalEventTimestamp, *) by server = LogicalServerName

      //

      // BC instances are often placed on larger VMs due to required disk size. This means increased throughput as throughput is directly correlated to vCore count.

      // VMs without vCore count in NodeName (ex: DB.0) are full node VMs and have at least 80 vCores.

      //

      | extend num_cores = extract(''DB([0-9]+)C.*'', 1, NodeName, typeof(long))

      | extend num_cores = iff(isempty(num_cores), 80, num_cores)

      | extend throughput_in_mbps_bc = num_cores * read_throughput_per_core

      | project server, throughput_in_mbps_bc'
