- id: MI-backup_restore-288
  Topic: TSGMIBR0111-SRB-Low-backup-on-secondary-rate-[DEPRECATED]
  Source: TSG-SQL-MI-BackupRestore/content/Deprecated/TSGMIBR0111-SRB-Low-backup-on-secondary-rate-[DEPRECATED].md
  Prompts:
  - MI backup history and status
  - Unknown AffectedBackupTypes BackupType FailureRate
  - Check Unknown AffectedBackupTypes BackupType
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: Unknown
    ExecutedQuery: 'let LowBackupOnSecondaryReplicaRateHPI =

      let PerServerHealthPropertyInfo = materialize(LowBackupOnSecondaryReplicaRateHPI

      let InvalidWithOptionErrors = materialize(

      | project ShortClusterName = ClusterName, PropertyId, IncidentId, ICMIncidentId = coalesce(AgiICMIncidentId, ICMIncidentId), UpdateCount, IsCurrent, HPIsExpired, IIsExpired = coalesce(AgiIsExpired,
      IIsExpired), SourceTime, LastModified, Details

      | extend Details = parse_json(Details)

      | evaluate bag_unpack(Details, columnsConflict = ''replace_source'')

      | extend FailureRate = todouble(FailureRate), Threshold = todouble(Threshold)

      | evaluate bag_unpack(LatestBackupStats, columnsConflict = ''replace_source'')

      | evaluate bag_unpack(FailureRateStats, columnsConflict = ''replace_source'')

      //     | project-reorder ShortClusterName, ClusterName, AppTypeName, AppName, NodeName, ServerName, BackupType

      | order by ShortClusterName asc, ServerName asc, SourceTime asc

      | summarize HPCount = count(), AffectedBackupTypes = make_set(BackupType), AllHPSourceTimes = make_list(SourceTime), LastHPSourceTime = arg_max(SourceTime, *) by ShortClusterName, ServerName

      | order by HPIsExpired asc, ShortClusterName asc, ServerName asc);'
- id: MI-backup_restore-289
