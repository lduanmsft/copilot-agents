      size_on_disk_GB <= 513., 512.

      size_on_disk_GB <= 1025., 1024.

      size_on_disk_GB <= 2049., 2048.

      size_on_disk_GB <= 4097., 4096.

      size_on_disk_GB <= 8193., 8192., -1.)

      | summarize TotalSizeOnDiskGB = sum(size_on_disk_GB), TotalUsedStorageSpaceGB = sum(used_storage_space_GB), InvalidFileCount = countif(used_storage_space_GB == -1) by end_utc_date

