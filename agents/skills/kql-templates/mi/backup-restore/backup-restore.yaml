  - Check MonSQLSystemHealth originalEventTimestamp
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where originalEventTimestamp > datetime(2024-10-17 23:00:00)

      | where originalEventTimestamp < datetime(2024-10-18 15:00:00)

      | where LogicalServerName =~ "{ServerName}"

      | parse-where message with * "spid" thread_id: int " Backup(" db_id:guid "): BACKUP LOG " log_state:string

      | extend backupStarted = iff(log_state has "started", originalEventTimestamp, datetime(null))

      | extend backupEnded = iff(log_state has "finished", originalEventTimestamp, datetime(null))

