  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedDatabases
    ExecutedQuery: 'MonManagedDatabases

      | summarize arg_max(end_utc_date, managed_database_name) by logical_database_id = tolower(managed_database_id)

      | project dbname = managed_database_name, logical_database_id

      ) on $left.dbss == $right.logical_database_id

      | where isnotempty(dbname)

      | sort by originalEventTimestamp, idx asc

      | summarize backup_queue = make_list(dbname) by originalEventTimestamp

      | sort by originalEventTimestamp asc

      | extend added_to_queue = set_difference(backup_queue, prev(backup_queue)), removed_from_queue = set_difference(prev(backup_queue), backup_queue)

      | where array_length(added_to_queue) > 0 or array_length(removed_from_queue) > 0

