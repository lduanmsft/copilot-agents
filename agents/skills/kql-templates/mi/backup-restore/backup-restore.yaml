- id: MI-backup_restore-248
  Topic: TSGMIBR0040D-Investigating-backup-billing
  Source: TSG-SQL-MI-BackupRestore/content/Deprecated/TSGMIBR0040D-Investigating-backup-billing.md
  Prompts:
  - MI backup history and size by database by server
  - MonAnalyticsDBSnapshot logical_server_name SizeGB_Cumulative
  - Check MonAnalyticsDBSnapshot logical_database_name
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_server_name contains "cargodb1"

      | summarize max_timestamp = max(TIMESTAMP) by logical_database_id, logical_database_name, create_time

      | extend logical_database_id = iff(logical_database_name =~ "{DatabaseName}", "00000000-0000-0000-0000-000000000004", logical_database_id)

      | extend logical_database_id = iff(logical_database_name =~ "{DatabaseName}", "00000000-0000-0000-0000-000000032763", logical_database_id)

      | extend logical_database_id = iff(logical_database_name =~ "{DatabaseName}", "00000000-0000-0000-0000-000000032760", logical_database_id)

      ) on logical_database_id

      | extend backup_sizeGB = todouble(backup_size)/1024.0/1024.0/1024.0

      | summarize SizeGB = sum(backup_sizeGB) by bin(originalEventTimestamp, 6h), backup_type, logical_database_name

      | where logical_database_name =~ "{DatabaseName}"

      | order by backup_type, originalEventTimestamp asc

      | serialize SizeGB_Cumulative = row_cumsum(SizeGB, prev(backup_type) != backup_type )

      | extend key = strcat(logical_database_name, ''-'', backup_type)

      | project originalEventTimestamp, key, SizeGB_Cumulative

      | render timechart kind=stacked'
