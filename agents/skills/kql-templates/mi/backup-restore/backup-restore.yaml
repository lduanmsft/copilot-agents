      | ·         There is only one queue for full/diff backups. This means that it is possible that some other database is currently taking a full/diff backup. <br /> <br /> ·         If database is very
      large (for example larger than 4 TB), process of taking full backup can take more than 12 hours. If there are any failovers it will restart from beginning. <br /> <br />   <br /> <br /> <br /> <br
      /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> | In this case, incident is transient. You can check MonBackup <br />    <br /> <br
