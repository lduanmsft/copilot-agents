  KustoQueries:
  - TableName: Unknown
    ExecutedQuery: 'let events = getBackupEvents((''Full''), startTime, endTime);

      let getRunningSignal = (events : (timestamp: datetime, server: string, value: long)) {

      | summarize arg_min(timestamp, value) by server

      | where value == -1

      | extend timestamp = startTime, value = 1

      )

      //

      // Get the first and last event (events are of type: start: 1, end: -1) in a bin and serialize by timestamp.

      //

      | summarize (firstEventTime, firstEvent) = arg_min(timestamp, value), (lastEventTime, lastEvent) = arg_max(timestamp, value) by bin(timestamp, tick), server

      | project-away firstEventTime, lastEventTime

      | order by server asc, timestamp asc

      //

      // Next we introduce missing bins. This will enable end event propagation.

      // Note: take_any is used as there is at most one row in each bin.

      //

      | make-series take_any(firstEvent), take_any(lastEvent) default = 0 on timestamp from startTime to endTime step tick by server

      | mv-expand timestamp to typeof(datetime), firstEvent to typeof(long), lastEvent to typeof(long)

      | partition hint.strategy = native by server'
