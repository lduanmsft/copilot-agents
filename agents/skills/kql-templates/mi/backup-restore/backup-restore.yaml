  - Managed Instance TSGMIBR0073-Backup-performance-investigation
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'let startTime = datetime(2022-08-07 23:30:31.9688184);

      let endTime = datetime(2022-08-08 03:10:57.6606841);

      let tenantRingName = "<tenantRingName>";

      let networkBandwidthPerNodeCoreMBps = 62.5;

      MonCounterOneMinute

      | where TIMESTAMP >= startTime and TIMESTAMP <= endTime

      | where ClusterName == tenantRingName

      | where CounterName startswith "\\Network Interface(Microsoft Hyper-V"

      | where CounterName endswith "Bytes Received/sec" or CounterName endswith "Bytes Sent/sec"

      | project TIMESTAMP, ClusterName, NodeName, Cnt = iif (CounterName endswith ''Bytes Received/sec'', ''Received'', ''Sent''), round(MBps = CounterValue / 1024. / 1024., 2)

      | summarize avg(MBps), max(MBps) by bin(TIMESTAMP,5m), ClusterName, NodeName, Cnt

      | parse NodeName with ''DB'' NodeCoreCount:int ''C.'' *

      | extend NodeCoreCount = iif(isempty(NodeCoreCount), 80, NodeCoreCount)

      | extend networkBandwidthLimit =  networkBandwidthPerNodeCoreMBps * NodeCoreCount

      | extend avgUsagePercentage = 100. * avg_MBps / networkBandwidthLimit, maxUsagePercentage = 100. * max_MBps / networkBandwidthLimit

      | project TIMESTAMP, NodeName, Cnt, round(avg_MBps, 2), round(max_MBps, 2), networkBandwidthLimit, round(avgUsagePercentage, 2), round(maxUsagePercentage, 2)

      // filter for timechart, remove below rows for raw data

      | project TIMESTAMP, NodeName, avgUsagePercentage, maxUsagePercentage

      | render timechart with (title = "Network usage on the cluster")'
