- id: MI-backup-restore-55
  Topic: TSGMIBR0043-Tail-log-backup-stuck
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0043-Tail-log-backup-stuck.md
  Prompts:
