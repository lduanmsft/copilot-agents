  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where TIMESTAMP between (startTime..endTime)

      ) on $left.request_id == $right.request_id

      | project Timestamp = originalEventTimestamp, Service = "ManagementService", WorkType = operation_type, SubWorkType = event, SubworkDetail = "", activity_request_id = request_id, message = operation_parameters,
      client_request_id, elapsed_time_milliseconds

      )

      // filter what you don''t need to visualize

      | where SubWorkType != "GetAccessToken" and SubWorkType != "SqlManagementClient.GetAsync" and (WorkType != "Renzo.WorkerPkg" or SubWorkType != "Root" or message !has "Retry-After header")

      //| where Service != "RenzoCP" // for example you can filter out Renzo or MS

      // Project to timepivot

      | project Timestamp, Service, WorkType, SubWorkType, SubworkDetail, activity_request_id, message, elapsed_time_milliseconds

      | render timepivot with (series = Service, WorkType, SubWorkType)'
