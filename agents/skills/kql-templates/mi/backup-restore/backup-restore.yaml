- id: MI-backup-restore-291
  Topic: TSGMIBR0091A-Backup-Watchdog-alert-NO_FULL_BACKUP_FOR_NEW_DATABASE
  Source: TSG-SQL-MI-BackupRestore/content/Deprecated/TSGMIBR0091-Backup-Watchdog-alerts/TSGMIBR0091A-Backup-Watchdog-alert-NO_FULL_BACKUP_FOR_NEW_DATABASE.md
  Prompts:
  - MI TSGMIBR0091A-Backup-Watchdog-alert-NO_FULL_BACKUP_FOR_NEW_DATABASE
  - Managed Instance TSGMIBR0091A-Backup-Watchdog-alert-NO_FULL_BACKUP_FOR_NEW_DATABASE
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: '|                                                                                                                                                                                                                                                                                                                                                                                                              |                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       |                                                                                                                    |

      |--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|-------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|--------------------------------------------------------------------------------------------------------------------|

      |  Issue                                                                                                                                                                                                                                                                                                                                                                                                         |
      Detection                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              |
      RCA                                                                                                                 |

      | ·         There is only one queue for full/diff backups. This means that it is possible that some other database is currently taking a full/diff backup. <br /> <br /> ·         If database is very
      large (for example larger than 4 TB), process of taking full backup can take more than 12 hours. If there are any failovers it will restart from beginning. <br /> <br />   <br /> <br /> <br /> <br
      /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> | In this case, incident is transient. You can check MonBackup <br />    <br /> <br
      />  <span style="   color:blue">MonBackup</span> <br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">LogicalServerName</span> =\~ <span style="color:firebrick">"\<Logical
      server name\>"</span> <br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">event</span> == <span style="color:firebrick">"database\_backup"</span> <br />  \| <span style="color:red">where
      </span><span style="color:mediumvioletred">backup\_type</span> == <span style="color:firebrick">"Full" </span><span style="color:blue">or </span><span style="color:mediumvioletred">backup\_type</span>
      == <span style="color:firebrick">"Diff"</span> <br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">event\_type</span> == <span style="color:firebrick">"BACKUP\_START"
      </span><span style="color:blue">or </span><span style="color:mediumvioletred">event\_type</span> == <span style="color:firebrick">"BACKUP\_END" </span><span style="color:blue">or </span><span style="color:mediumvioletred">event\_type</span>
      contains <span style="color:firebrick">"BACKUP\_ERROR"</span> <br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">PreciseTimeStamp</span> \> <span style="color:blue">"\<Issue
      start time\>"</span> <br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">PreciseTimeStamp</span> \< <span style="color:blue">"\<Issue end time\>"</span> <br />  \|
      <span style="color:red">project </span><span style="color:blue">strcat</span>(<span style="color:mediumvioletred">database\_name</span>,<span style="color:firebrick">"\_\_\_"</span>, <span style="color:mediumvioletred">backup\_type</span>),
      <span style="color:mediumvioletred">originalEventTimestamp</span>, <span style="color:blue">iff</span>(<span style="color:mediumvioletred">event\_type</span> == <span style="color:firebrick">"BACKUP\_START"</span>,
      1, <span style="color:blue">iff</span>(<span style="color:mediumvioletred">event\_type</span> == <span style="color:firebrick">"BACKUP\_END"</span>, 2, 0)) <br />  <span style="color:blue"> <br />
      <br />  </span>  <br /> <br />  <span style="   color:blue"> </span> <br /> <br />  <span style="   color:blue"> <br />  </span>There should be one backup that started, and still isn’t finished. You
      can render this query as a timechart to get a good graphical representation. You can also check backup progress in MonSqlSystemHealth: <br />    <br /> <br />  <span style="   color:blue">MonSQLSystemHealth</span>
      <br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">message </span><span style="color:blue">contains </span><span style="color:firebrick">"\<your database GUID\>"</span>
      <br /> <br />    | Existing incidents: <br /> <br />  [<span style="background:white">103330092</span>](https://icm.ad.msft.net/imp/v3/incidents/details/103330092/home) <br /> <br />  [119320407](https://icm.ad.msft.net/imp/v3/incidents/details/119320407/home)
      <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> |

      | ·         It is possible that backup was interrupted by failover. <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br
      /> <br /> <br /> | In that case process that started backup should change Proces\_id, and start again: <br />    <br /> <br />  <span style="   color:blue">MonBackup</span> <br />  \| <span style="color:red">where
      </span><span style="color:mediumvioletred">LogicalServerName</span> =\~ <span style="color:firebrick">"\<Logical server name\>"</span> <br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">event</span>
      == <span style="color:firebrick">"database\_backup"</span> <br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">backup\_type</span> == <span style="color:firebrick">"Full"
      </span><span style="color:blue">or </span><span style="color:mediumvioletred">backup\_type</span> == <span style="color:firebrick">"Diff"</span> <br />  \| <span style="color:red">where </span><span
      style="color:mediumvioletred">event\_type</span> == <span style="color:firebrick">"BACKUP\_START" </span><span style="color:blue">or </span><span style="color:mediumvioletred">event\_type</span> ==
      <span style="color:firebrick">"BACKUP\_END" </span><span style="color:blue">or </span><span style="color:mediumvioletred">event\_type</span> == <span style="color:firebrick">"BACKUP\_ERROR"</span>
      <br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">PreciseTimeStamp</span> \> <span style="color:blue">"\<Issue start time\>"</span> <br />  \| <span style="color:red">where
      </span><span style="color:mediumvioletred">PreciseTimeStamp</span> \< <span style="color:blue">"\<Issue end time\>"</span> <br />  \| summarize by TIMESTAMP, event\_type, process\_id, exception\_stack\_trace
      <br /> <br /> <br />    <br /> <br />  Example: <br /> <br />  ![](../.media/TSGCL0048A1-_BRDB0017_-Backup-Watchdog-alerts---NO_FULL_BACKUP_FOR_NEW_DATABASE-image001.gif) <br /> <br /> <br /> <br
      />    |   <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> |

      | ·         It is possible that backup was interrupted by COPY_ONLY (full) backup | Find the dedicated spid for full backup on database in question and look at its logs. <br /> Logs about <span style="color:turquoise">
      system (automatic) backups feature logical_database_id </span>, but logs about <span style="color:red">user initiated (COPY_ONLY) backups </span> have logical_database_name instead of id. <br /> <br
      /> <span style="color:blue">MonSQLSystemHealth</span><br/>  \| <span style="color:red">where </span><span style="color:mediumvioletred">originalEventTimestamp</span><span style="color:blue"> \> </span><span
      style="color:firebrick">ago(2d) </span><br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">LogicalServerName</span> =\~ <span style="color:firebrick">"\<Logical server
      name\>"<span><br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">message </span><span style="color:blue">contains </span><span style="color:firebrick">"\<your database
      GUID\>"<span><br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">message </span><span style="color:blue">contains </span><span style="color:firebrick">"\<spid related
      to full backup\>"<span><br />  \| <span style="color:red;background:white">project </span><span style="color:mediumvioletred;   background:white">originalEventTimestamp</span>, <span style="color:mediumvioletred;   background:white">process_id</span>,
      <span style="color:mediumvioletred;background:white">NodeName</span> ,<span style="color:mediumvioletred;   background:white">message</span> <br /> <br /> ![](../.media/TSGCL0048A1-_BRDB0017_-Backup-Watchdog-alerts---NO_FULL_BACKUP_FOR_NEW_DATABASE-image002.png)
      | [370848895](https://portal.microsofticm.com/imp/v3/incidents/details/370848895/home) |

      | ·         There could be some error or exception full backup is hitting. <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> | You can check MonBackup or MonSqlSystemHealth
      for errors, however backup errors are usually a consequence of some other issue: <br />    <br /> <br />  <span style="color:blue">MonBackup</span> <br />  \| <span style="color:red">where </span><span
      style="color:mediumvioletred">database\_name </span><span style="color:blue">== </span><span style="color:firebrick">"\<your database GUID\>"</span> <br />  \| <span style="color:red">where </span><span
      style="color:mediumvioletred">event</span> == <span style="color:firebrick">"database\_backup"</span> <br />  \| <span style="color:red">where </span><span style="color:mediumvioletred">event\_type</span>
      == <span style="color:firebrick">"BACKUP\_ERROR"</span> <br /> <br />  <span style="   color:firebrick"> </span> <br /> <br />  <span style="   color:blue">MonSQLSystemHealth</span> <br />  \| <span
      style="color:red">where </span><span style="color:mediumvioletred">message </span><span style="color:blue">contains </span><span style="color:firebrick">"\<your database GUID\>"</span> <br /> <br
      />    |   <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> |

      | ·         Full backup fails, however backup service considers it successful. This causes all log backup to fail for that databases, creating a lot of OutOfSLA incidents. <br /> <br /> <br /> <br
      /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br
      /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> <br /> | <span style="   color:#333333;background:white">So far SQL
      error found it be linked with this incident is:</span> <br /> <br />  message <br /> <br />  2020-07-08 14:53:15.63 spid89      Error: 3023, Severity: 16, State: 1. <br /> <br />  2020-07-08 14:53:15.63
      spid89      Backup, file manipulation operations (such as ALTER DATABASE ADD FILE) and encryption changes on a database must be serialized. Reissue the statement after the current backup or file manipulation
      operation is completed. <br /> <br />  <span style="   color:#333333;background:white"> </span> <br /> <br />  <span style="   color:#333333;background:white">CMS query to see which databases per
      managed server don''t have first\_backup\_time updated:</span> <br /> <br />  select d.managed\_database\_name, d.managed\_database\_id, d.state, d.created\_time, d.first\_backup\_time from managed\_servers
      s, managed\_databases d <br /> <br />  where d.first\_backup\_time is null and s.managed\_server\_id = d.managed\_server\_id  <br /> <br />  and s.name = ''sqlmib''  <br /> <br />  <span style="   color:#333333;background:white">
      </span> <br /> <br />  <span style="   color:#333333;background:white">But there is BACKUP\_START, BACKUP\_END in MonBackup</span> <br /> <br />  <span style="   color:darkorchid;background:white">MonBackup</span>
      <br /> <br />  \| <span style="color:red;background:white">where</span> <span style="color:mediumvioletred;   background:white">AppName</span> == <span style="font-size:   10.0pt;color:firebrick;background:white">''aea727320cb7''</span>
      <span style="color:green;background:white">//and database\_name == ''2e34ccaf-064f-4d28-a6c5-f2ec8a1fbc12''</span><span style="color:black;background:white"> <br />  \| </span><span style="color:red;   background:white">where</span>
