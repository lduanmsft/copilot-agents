- id: MI-backup_restore-124
  Topic: TSGMIBR0090-Backup-schedule
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0090-Backup-schedule.md
  Prompts:
  - MI backup history and status by server
  - MonManagedInstanceResourceStats LogicalServerName sku
  - Check MonManagedInstanceResourceStats sku max_throughput
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedInstanceResourceStats
    ExecutedQuery: 'let getThroughputUtilization = (startTime : datetime, endTime : datetime) {

      let sku_name_general_purpose = ''GeneralPurpose'';

      MonManagedInstanceResourceStats

      | where originalEventTimestamp between (startTime .. endTime)

      | where LogicalServerName in (serverNames)

      | extend throughput_mbps = 1. * ((io_bytes_read + io_bytes_written) / 1024. / 1024.) / (actual_interval_ms / 1000.)

      | summarize max_throughput = max(throughput_mbps) by bin(originalEventTimestamp, tick), server = LogicalServerName, sku

      | lookup getThroughputMbpsBC(startTime, endTime) on server

      | lookup getThroughputMbpsGP(startTime, endTime) on server

      | extend theoretical_max_throughput = iff(sku == sku_name_general_purpose, throughput_in_mbps_gp, throughput_in_mbps_bc)

      | order by originalEventTimestamp asc

      | summarize timestamp = make_list(originalEventTimestamp), sku = take_any(sku), signal = make_list(100 * max_throughput / theoretical_max_throughput) by server'
- id: MI-backup_restore-125
  Topic: TSGMIBR0090-Backup-schedule
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0090-Backup-schedule.md
  Prompts:
  - MI backup status by backup type by server
  - MonBackup LogicalServerName event event_type
  - Check MonBackup event event_type
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let getBackupEvents = (backupTypes : dynamic, startTime : datetime, endTime : datetime) {

      MonBackup

      | where originalEventTimestamp between (startTime .. endTime)

      | where LogicalServerName in (serverNames)

      | where event startswith ''database_backup''

      | where event_type !contains ''METADATA'' and event_type !contains ''SKIP'' and event_type !contains ''LTR'' and event_type != ''BACKUP_TURNED_OFF''

      | where backup_type in (backupTypes)

      | project timestamp = originalEventTimestamp, server = LogicalServerName, value = iff(event_type == ''BACKUP_START'', 1, -1)

      | order by server asc, timestamp asc

      //

      // Filter out duplicate events. This is necessary as event signal generation relies on previous events.

      // The approach extends the duration as much as possible:

      //

      // 1) START event gets moved as EARLY as possible.

      // 2) END event gets moved as LATE as possible.

      //

      | where server != prev(server) or server != next(server) or iff(value == 1, prev(value) != 1, next(value) != -1)'
