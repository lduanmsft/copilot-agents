- id: MI-backup_restore-253
  Topic: TSGMIBR0086-ExcessiveBackupRetention-detected-on-server
  Source: TSG-SQL-MI-BackupRestore/content/Deprecated/TSGMIBR0086-ExcessiveBackupRetention-detected-on-server.md
  Prompts:
  - MI backup history and status by server
  - MonBackup originalEventTimestamp LogicalServerName
  - Check MonBackup originalEventTimestamp message_type
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where originalEventTimestamp > ago(8d) and AppTypeName in ("Worker.CL")

      | where LogicalServerName contains "<server_name>"

      | project originalEventTimestamp, AppName, AppTypeName, LogicalServerName, message_type, [''details''], process_id

      // Row looks like:

      // CleanupFiles - Policy for database [ce22d61b-a258-4f41-ae74-e359a65d0798, BusinessCritical] = delete backups files before 09/24/2018 23:16:02

      | where message_type == ''INFO''  and [''details''] startswith  ''CleanupFiles - Policy for database''

      | extend logical_database_id = toguid(extract(@''(?i)[([0-9A-F]{8}-(?:[0-9A-F]{4}[-]){3}[0-9A-F]{12}),'', 1, [''details'']))

      | extend cleanupPolicy = todatetime(extract(@''d{2,2}/d{2,2}/d{4,4} d{2,2}:d{2,2}:d{2,2}$'', 0, [''details'']))

      | project LogicalServerName, cleanupPolicyTime=originalEventTimestamp, AppName, AppTypeName, [''details''], logical_database_id, cleanupPolicy, process_id

      | extend cleanup_backup_retention_days = floor((cleanupPolicyTime - cleanupPolicy)/1d, 1)

      | where logical_database_id contains ""{DatabaseGuid}""

      | summarize by cleanupPolicyTime, logical_database_id, cleanup_backup_retention_days'
