  - Managed Instance TSGMIBR0086-ExcessiveBackupRetention-detected-on-server
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: Unknown
    ExecutedQuery: 'let queryCluster = (clusterName: string, databaseName: string)

      let  lookbackPeriod = ago(1d);

      | where  originalEventTimestamp > ago(1d) and  AppTypeName  in ("Worker.CL")

      | project  originalEventTimestamp, AppName, AppTypeName, LogicalServerName, message_type, [''details'']

      // Row looks like:

      // CleanupFiles - Policy for database [ce22d61b-a258-4f41-ae74-e359a65d0798, BusinessCritical] = delete backups files before 09/24/2018 23:16:02

      | where  message_type == ''INFO''  and [''details''] startswith  ''CleanupFiles - Policy for database''

      | extend  logical_database_id = toguid(extract(@''(?i)[([0-9A-F]{8}-(?:[0-9A-F]{4}[-]){3}[0-9A-F]{12}),'', 1, [''details'']))

      | extend  cleanupPolicy = todatetime(extract(@''d{2,2}/d{2,2}/d{4,4} d{2,2}:d{2,2}:d{2,2}$'', 0, [''details'']))

      | project  LogicalServerName, cleanupPolicyTime=originalEventTimestamp, AppName, AppTypeName, [''details''], logical_database_id, cleanupPolicy

      // Find the databases whose cleanup policy does not align with the backup retention that was emitted from CMS immediately after cleanup occurred

      | join  kind=inner'
