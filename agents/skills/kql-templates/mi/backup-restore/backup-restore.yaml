SqlSkills:
- id: MI-backup-restore-1
  Topic: Backup
  Source: asmi-troubleshooter-package/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where TIMESTAMP >= ago(72h)

      | where event == ''database_backup''

      | where LogicalServerName =~ "{ServerName}"

      | where logical_database_name =~ "{DatabaseName}"

      //| where backup_type == ''Full''

      | project originalEventTimestamp, logical_database_name, backup_type,event_type, br_exception_message'
- id: MI-backup-restore-2
  Topic: Backup
  Source: asmi-troubleshooter-package/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where PreciseTimeStamp >= datetime(2023-07-19 17:50) and PreciseTimeStamp <= datetime(2023-07-19 18:20)

      | where logical_server_name =~ {ServerName}  //source server

      | where logical_database_name =~ {logical_database_guid}  //source database guid

      | where event_type == ''BACKUP_METADATA_DETAILS''

      | extend BackupSizeMB = round(todecimal(backup_size)/1024/1024,2)'
- id: MI-backup-restore-3
  Topic: Backup
  Source: asmi-troubleshooter-package/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where LogicalServerName =~ ''{serverName}'' or logical_server_name == ''{serverName}''

      | where logical_database_name == ''{databaseName}''  //this is the source db from where the PiTR is requested

      | summarize max(TIMESTAMP) by logical_database_name, physical_database_id, logical_database_id, backup_retention_days, create_time, create_mode'
- id: MI-backup-restore-4
  Topic: Backup
  Source: asmi-troubleshooter-package/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where originalEventTimestamp >= ago(10d)

      | where LogicalServerName =~ "{ServerName}"

      | where event startswith ''database_backup''

      | where event_type == ''BACKUP_METADATA_DETAILS''

      | where backup_type != ''Log''

      | where logical_database_id =~ {logical_database_id}    //can be fetched from ASC Resource Explorer under MI/DB properties as ''Managed Database Id''

      | extend backup_size_gb = todouble(uncompressed_backup_size) / 1024.0 /1024.0 /1024.0'
- id: MI-backup-restore-5
  Topic: Backup
  Source: asmi-troubleshooter-package/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedServers
    ExecutedQuery: 'let instanceName = ''sqlmi'';

      MonManagedServers

      | where LogicalServerName =~ instanceName or name =~ instanceName

      | extend config_params = parse_xml(configuration_parameters).ConfigurationParameters'
- id: MI-backup-restore-6
  Topic: Backup
  Source: asmi-troubleshooter-package/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let topNumber=10;

      let backuptype = ''Log''; //Change this to ''Diff'' when looking for Differential backups

      let MIName = ''{ServerName}'';

      let DBName = ''{DatabaseName}'';

      let AllDatabases = materialize( MonBackup

      | where TIMESTAMP >= ago(2d)

      | where logical_server_name =~ MIName

      | where backup_type =~ backuptype

      | where event_type == ''BACKUP_METADATA_DETAILS''

      | extend BackupSizeMB = round(todecimal(backup_size)/1024/1024,2)'
- id: MI-backup-restore-7
  Topic: Backup
  Source: asmi-troubleshooter-package/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_server_name =~ MIName

      | summarize arg_max(TIMESTAMP,*) by logical_database_id'
- id: MI-backup-restore-8
  Topic: Backup
  Source: asmi-troubleshooter-package/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: Unknown
    ExecutedQuery: 'let topX = (AllDatabases | summarize sum(BackupSizeMB) by DatabaseName

      | top topNumber by sum_BackupSizeMB | project DatabaseName);'
- id: MI-backup-restore-9
  Topic: Backup
  Source: asmi-troubleshooter-package/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where  TIMESTAMP >= ago(2d)

      | where LogicalServerName contains "{ServerName}"

      | where logical_database_name =~ "{logical_database_guid}"

      | where event == "database_backup"

      | where event_type == ''BACKUP_SKIPPED_DATABASE_BACKUP''

      | where backup_type == "Log"

      |summarize count() by skipped_backup_reason'
