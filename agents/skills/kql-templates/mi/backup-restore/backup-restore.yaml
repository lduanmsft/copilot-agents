- id: MI-backup-restore-250
  Topic: TSGMIBR0040D-Investigating-backup-billing
  Source: TSG-SQL-MI-BackupRestore/content/Deprecated/TSGMIBR0040D-Investigating-backup-billing.md
  Prompts:
  - MI TSGMIBR0040D-Investigating-backup-billing
  - Managed Instance TSGMIBR0040D-Investigating-backup-billing
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDwBilling
    ExecutedQuery: 'MonDwBilling

      | where AppTypeName contains "Worker.CL"

      | where storage_container_name != ""

      | where details_format !contains "Billing refresh not needed because previous refresh has not expired"

      | where logical_database_id !in ("00000000-0000-0000-0000-000000000004", "00000000-0000-0000-0000-000000032760", "00000000-0000-0000-0000-000000032763")

      | parse storage_container_name with something "/Full/" FullBackupTakenDate "T" FullBackupTakenTime "_0.bak"

      | extend ChainDateTime = todatetime(strcat(FullBackupTakenDate, "T", replace("-", ":", FullBackupTakenTime)))

      | summarize argmax(TIMESTAMP, *) by LogicalServerName, storage_container_name, logical_database_id, file_type, sizeGB = size_in_bytes/1024/1024/1024, ChainDateTime

      | where max_TIMESTAMP > ago(12h)

      | summarize by LogicalServerName, logical_database_id = toupper(logical_database_id), storage_container_name, file_type, sizeGB, ChainDateTime

      | order by LogicalServerName, logical_database_id

      | extend FullSize = iff(file_type contains "Full", sizeGB, 0.0)

      | extend DiffSize = iff(file_type contains "Diff", sizeGB, 0.0)

      | extend LogSize = iff(file_type contains "Log", sizeGB, 0.0)

      | summarize sum(FullSize), sum(DiffSize), sum(LogSize) by logical_database_id, ChainDateTime

      ) on logical_database_id

      | where TIMESTAMP > ChainDateTime

      | extend FullSize = iff(backup_type contains "Full", todouble(backup_size), 0.0)

      | extend DiffSize = iff(backup_type contains "Diff", todouble(backup_size), 0.0)

      | extend LogSize = iff(backup_type contains "Log", todouble(backup_size), 0.0)

      | summarize MonBackupFull = sum(FullSize)/1024/1024/1024, MonBackupDiff = sum(DiffSize)/1024/1024/1024, MonBackupLog = sum(LogSize)/1024/1024/1024 by logical_database_id, sum_FullSize, sum_DiffSize,
      sum_LogSize, LogicalServerName

      | summarize by LogicalServerName, logical_database_id, FullSizeDiff = sum_FullSize - MonBackupFull, DiffSizeDiff = sum_DiffSize - MonBackupDiff, LogSizeDiff = sum_LogSize - MonBackupLog'
- id: MI-backup-restore-251
  Topic: TSGMIBR0063-Customer-used-large-MTS
  Source: TSG-SQL-MI-BackupRestore/content/Deprecated/TSGMIBR0063-Customer-used-large-MTS.md
  Prompts:
  - MI TSGMIBR0063-Customer-used-large-MTS
  - Managed Instance TSGMIBR0063-Customer-used-large-MTS
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where TIMESTAMP > ago(3h)

      | where AppTypeName == ''Worker.CL''

      | project TIMESTAMP, SubscriptionId, ClusterName, LogicalServerName, message

      | where message contains ''Backup('' and message contains ''Effective options:''

      | parse kind=regex message with * ''\\('' dbname:string ''\\): Effective options:'' * '', MaxTransferSize='' MTS_KB:int '' KB.''

      | where dbname !in (''replicatedmaster'', ''msdb'', ''managed_model'')

      // Backend initiated backups always have guid as dbname

      | where isempty(toguid(dbname))

      | distinct SubscriptionId, ClusterName, LogicalServerName, dbname, MTS_KB

      | where MTS_KB > 4096'
- id: MI-backup-restore-252
