SqlSkills:
- id: MI-ASMI-BACKUP-RESTORE-01
  Topic: Backup
  Source: kusto-queries/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  - Investigate Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where TIMESTAMP >= ago(72h)

      | where event == ''database_backup''

      | where LogicalServerName =~ "{ServerName}"

      | where logical_database_name =~ "{DatabaseName}"

      //| where backup_type == ''Full''

      | project originalEventTimestamp, logical_database_name, backup_type,event_type, br_exception_message'
- id: MI-ASMI-BACKUP-RESTORE-02
  Topic: Backup
  Source: kusto-queries/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  - Investigate Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where PreciseTimeStamp >= datetime(2023-07-19 17:50) and PreciseTimeStamp <= datetime(2023-07-19 18:20)

      | where logical_server_name =~ {ServerName}  //source server

      | where logical_database_name =~ {logical_database_guid}  //source database guid

      | where event_type == ''BACKUP_METADATA_DETAILS''

      | extend BackupSizeMB = round(todecimal(backup_size)/1024/1024,2)'
- id: MI-ASMI-BACKUP-RESTORE-03
  Topic: Backup
  Source: kusto-queries/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  - Investigate Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where LogicalServerName =~ ''{serverName}'' or logical_server_name == ''{serverName}''

      | where logical_database_name == ''{databaseName}''  //this is the source db from where the PiTR is requested

      | summarize max(TIMESTAMP) by logical_database_name, physical_database_id, logical_database_id, backup_retention_days, create_time, create_mode'
- id: MI-ASMI-BACKUP-RESTORE-04
  Topic: Backup
  Source: kusto-queries/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  - Investigate Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where originalEventTimestamp >= ago(10d)

      | where LogicalServerName =~ "{ServerName}"

      | where event startswith ''database_backup''

      | where event_type == ''BACKUP_METADATA_DETAILS''

      | where backup_type != ''Log''

      | where logical_database_id =~ {logical_database_id}    //can be fetched from ASC Resource Explorer under MI/DB properties as ''Managed Database Id''

      | extend backup_size_gb = todouble(uncompressed_backup_size) / 1024.0 /1024.0 /1024.0'
- id: MI-ASMI-BACKUP-RESTORE-05
  Topic: Backup
  Source: kusto-queries/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  - Investigate Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedServers
    ExecutedQuery: 'let instanceName = ''sqlmi'';

      MonManagedServers

      | where LogicalServerName =~ instanceName or name =~ instanceName

      | extend config_params = parse_xml(configuration_parameters).ConfigurationParameters'
- id: MI-ASMI-BACKUP-RESTORE-06
  Topic: Backup
  Source: kusto-queries/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  - Investigate Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let topNumber=10;

      let backuptype = ''Log''; //Change this to ''Diff'' when looking for Differential backups

      let MIName = ''{ServerName}'';

      let DBName = ''{DatabaseName}'';

      let AllDatabases = materialize( MonBackup

      | where TIMESTAMP >= ago(2d)

      | where logical_server_name =~ MIName

      | where backup_type =~ backuptype

      | where event_type == ''BACKUP_METADATA_DETAILS''

      | extend BackupSizeMB = round(todecimal(backup_size)/1024/1024,2)'
- id: MI-ASMI-BACKUP-RESTORE-07
  Topic: Backup
  Source: kusto-queries/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  - Investigate Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_server_name =~ MIName

      | summarize arg_max(TIMESTAMP,*) by logical_database_id'
- id: MI-ASMI-BACKUP-RESTORE-08
  Topic: Backup
  Source: kusto-queries/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  - Investigate Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: Unknown
    ExecutedQuery: 'let topX = (AllDatabases | summarize sum(BackupSizeMB) by DatabaseName

      | top topNumber by sum_BackupSizeMB | project DatabaseName);'
- id: MI-ASMI-BACKUP-RESTORE-09
  Topic: Backup
  Source: kusto-queries/Backup.md
  Prompts:
  - MI Backup
  - Managed Instance Backup
  - Investigate Backup
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where  TIMESTAMP >= ago(2d)

      | where LogicalServerName contains "{ServerName}"

      | where logical_database_name =~ "{logical_database_guid}"

      | where event == "database_backup"

      | where event_type == ''BACKUP_SKIPPED_DATABASE_BACKUP''

      | where backup_type == "Log"

      |summarize count() by skipped_backup_reason'
- id: MI-ASMI-BACKUP-RESTORE-10
  Topic: LTR
  Source: kusto-queries/LTR.md
  Prompts:
  - MI LTR
  - Managed Instance LTR
  - Investigate LTR
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLtrConfiguration
    ExecutedQuery: 'MonLtrConfiguration

      | where server_type =~ ''ManagedInstance''

      | where TIMESTAMP > datetime(2024-09-25 21:30:00) and TIMESTAMP < datetime(2024-09-26 09:46:18)'
- id: MI-ASMI-BACKUP-RESTORE-11
  Topic: PVS
  Source: kusto-queries/PVS.md
  Prompts:
  - MI PVS
  - Managed Instance PVS
  - Investigate PVS
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlTransactions
    ExecutedQuery: 'MonSqlTransactions

      | where AppName in( "f9c4f0a401a0")

      | where database_id== 5

      | where persisted_version_store_kb> 0

      | project PreciseTimeStamp,database_id, persisted_version_store_kb'
- id: MI-ASMI-BACKUP-RESTORE-12
  Topic: PVS
  Source: kusto-queries/PVS.md
  Prompts:
  - MI PVS
  - Managed Instance PVS
  - Investigate PVS
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlTransactions
    ExecutedQuery: 'MonSqlTransactions

      | where AppName== "f9c4f0a401a0"

      //| where database_id == 7

      | where isnotempty(pvs_off_row_page_skipped_oldest_active_xdesid)

      | where TIMESTAMP> ago(3d)

      | extend pvs_size_gb_heldup_by_active_scan_or_tx= (pvs_off_row_page_skipped_oldest_active_xdesid+pvs_off_row_page_skipped_low_water_mark+pvs_off_row_page_skipped_min_useful_xts+pvs_off_row_page_skipped_oldest_snapshot)*8/(1024*1024)'
- id: MI-ASMI-BACKUP-RESTORE-13
  Topic: PVS
  Source: kusto-queries/PVS.md
