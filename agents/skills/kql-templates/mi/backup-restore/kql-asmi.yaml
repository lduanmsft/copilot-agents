- id: MI-ASMI-BACKUP-RESTORE-27
  Topic: Shrink
  Source: kusto-queries/Shrink.md
  Prompts:
  - MI Shrink
  - Managed Instance Shrink
  - Investigate Shrink
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlShrinkInfo
    ExecutedQuery: MonSqlShrinkInfo| where TIMESTAMP >= ago(3d)| where LogicalServerName =~ "{ServerName}"//| where database_id == long(5)//| where file_id == 1| where AppName == "ad8977560ab9"//| where
      isnotempty(failure_reason) or status  == "shrink_fail"| project TIMESTAMP, LogicalServerName, AppName, database_id, file_id, shrink_id, tag, status, target_mb = (toint(target_size)/128), file_size_mb
      = (toint(file_size)/128), diffingb = ((toint(file_size)-toint(target_size))*8/1024/1024), percent_complete, failure_reason, code_package_version| order by TIMESTAMP ascMonSqlShrinkInfo| where shrink_id
      == "FF5CF3FB-45D8-4421-AC9F-1DF6404E4FAD" //shrink hit exception 3908, state 1//| where shrink_id == "C932BD1D-B383-4E4E-8F49-40D4B514F3D7"//shrink hit exception 1205, state 18//| where shrink_id
      == "4C4F31A4-9FB4-4B9B-9B44-9B4FACC47C0A"//shrink hit exception 3617, state 145| project originalEventTimestamp, AppName, database_id, file_id, shrink_id, tag, status, failure_reasonMonSqlShrinkInfo|
      where TIMESTAMP >= ago(3d)| where LogicalServerName =~ "{ServerName}"| where status contains "shrink_last_pages_columnstore"| project TIMESTAMP, LogicalServerName, AppName, database_id, file_id, shrink_id,
      tag, status, target_mb = (toint(target_size)/128), file_size_mb = (toint(file_size)/128), diffingb = ((toint(file_size)-toint(target_size))*8/1024/1024), percent_complete, failure_reason, code_package_version|
      order by TIMESTAMP asc(refer to Shrink Database that have ColumnStore Indexes - Overview (visualstudio.com)) MonSQLSystemHealth| where TIMESTAMP >= ago(3d)| where LogicalServerName =~ "{ServerName}"|
      where message contains "Page information during shrink" and message contains "IsColumnstore 1"| project TIMESTAMP, messageMonSqlDumperActivity| where TargetLogicalServerName =~ "{ServerName}"| project
      PreciseTimeStamp,NodeName,DumpUID,DumperStartTime,DumperEndTime,DumpErrorDetails,TargetAppName,ClusterName| extend WatsonLink = strcat('https://azurewatson.microsoft.com/DUMPUID/',DumpUID )| sort
      by PreciseTimeStamp ascAlrSQLErrorsReported| where LogicalServerName =~ "{ServerName}"| where error_number in (3908,1205,3617)| where TIMESTAMP >= ago(7d)| project TIMESTAMP, error_number,severity,state,user_defined,session_id,database_id,is_azure_connection,query_hash,query_plan_hash,sessionName,origin
