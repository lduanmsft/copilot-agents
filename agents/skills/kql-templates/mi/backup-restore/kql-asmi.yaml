  - Managed Instance PVS
  - Investigate PVS
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where AppName== "f9c4f0a401a0"

      | where database_id in(4,5)

      | where TIMESTAMP>= ago(60min)

      | where isnotempty(physical_database_name)

      | summarize arg_max(TIMESTAMP, size_on_disk_bytes, max_size_mb, code_package_version, hotpatch_data_package_version) by LogicalServerName, database_id, AppName, type_desc, file_id'
- id: MI-ASMI-BACKUP-RESTORE-14
  Topic: PVS
  Source: kusto-queries/PVS.md
