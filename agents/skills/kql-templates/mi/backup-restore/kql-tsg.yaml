- id: MI-backup-restore-294
  Topic: Backup-storage-redundancy-update-operation-is-stuck
  Source: Troubleshooting-Guides/Backup-and-Restore/Automated-backups-or-point%2Din%2Dtime-restore/Backup-storage-redundancy-update-operation-is-stuck.md
  Prompts:
  - MonManagedServers by backup_storage_account_type, name
  - MonManagedServers backup_storage_account_type name sqlmi managed_server_id
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedServers
    ExecutedQuery: 'MonManagedServers

      | where name =~ ''sqlmi''

      | project TIMESTAMP ,name, managed_server_id,backup_storage_account_type

      | order by TIMESTAMP asc

      | serialize

      | extend isTheSame = iif(prev(backup_storage_account_type) == backup_storage_account_type,1,0)

      | where isTheSame == 0

      | project Setting_since = TIMESTAMP, name, managed_server_id, backup_storage_account_type

      Sample output:

      | Setting_since | name | managed_server_id | backup_storage_account_type |

      | --- | --- | --- | --- |

      | 2024-11-13 18:07:27.7822207 | sqlmi | xxx | Standard_RAGRS |

      | 2024-12-02 11:59:27.3379086 | sqlmi | xxx | Standard_ZRS |'
