- id: MI-backup-restore-379
  Topic: '[One-Pager]-Error-41935-Reached-the-total-capacity-of-storage-account'
  Source: Troubleshooting-Guides/Backup-and-Restore/Restore-database-from-URL/[One-Pager]-Error-41935-Reached-the-total-capacity-of-storage-account.md
  Prompts:
  - MonSQLXStore for xio failed request / AccountQuotaExceeded
  - MonSQLXStore LogicalServerName event StorageAccount FailureCount
  - Investigate [One Pager] Error 41935 Reached the total capacity of storage account
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: 'MonSQLXStore

      | where AppName =~ ''{AppName}''

      | where event == ''xio_failed_request'' and errorcode == ''AccountQuotaExceeded''

      | extend StorageAccount = extract("https://([0-9,a-z]+).blob.*", 1, file_path, typeof(string))

      | where StorageAccount contains ''prs'' or StorageAccount contains ''pdw''

      | summarize min(TIMESTAMP), max(TIMESTAMP), count(TIMESTAMP) by StorageAccount, AppName, AppTypeName, LogicalServerName , ClusterName

      | extend FailureCount = count_TIMESTAMP

      | project StorageAccount, AppName , AppTypeName, FailureCount, LogicalServerName, ClusterName, min_TIMESTAMP, max_TIMESTAMP

      | where max_TIMESTAMP >= ago(10h)'
