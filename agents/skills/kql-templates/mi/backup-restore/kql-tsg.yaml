- id: MI-backup-restore-181
  Topic: Helpful-Queries
  Source: TSG-SQL-MI-BackupRestore/content/On-call-Helpers/Helpful-Queries.md
  Prompts:
  - MI failover group configuration by logical_server_name, role
  - MonGeoDRFailoverGroups logical_server_name role serverName delta_fn
  - Investigate Helpful Queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
