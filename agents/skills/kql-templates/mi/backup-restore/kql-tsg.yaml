- id: MI-backup-restore-13
  Topic: TSGMIBR0076-Log-backup-failure-due-backup-or-file-manipulation-operation
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0076-Log-backup-failure-due-backup-or-file-manipulation-operation.md
  Prompts:
  - MonBackup for database backup / backup sql query details
  - MonBackup LogicalServerName event let vAppName
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let vAppName = ''<AppName>'';

      let vLogicalServerName = ''<server_name>'';

      let vStartDateTime = ago(1d);

      let vDatabaseId = ''<database_id>'';

      MonBackup

      | where AppName == vAppName

      | where LogicalServerName contains vLogicalServerName

      | where PreciseTimeStamp >= vStartDateTime

      | where backup_type == ''Log''

      | where event == "database_backup" or event == ''backup_sql_query_details'' or event == ''database_backup_error''

      | where * contains vDatabaseId

      | summarize by TIMESTAMP,backup_type, event_type, skipped_backup_reason, sql_error_number, sql_error_severity, sql_error_state, sql_error_message'
