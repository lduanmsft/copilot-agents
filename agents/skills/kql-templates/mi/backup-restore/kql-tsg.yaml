- id: MI-backup-restore-304
  Topic: How-to-check-automated-backup-schedule-override
  Source: Troubleshooting-Guides/Backup-and-Restore/Automated-backups-or-point%2Din%2Dtime-restore/How-to-check-automated-backup-schedule-override.md
  Prompts:
  - MonManagedServers by LogicalServerName, SQL
  - MonManagedServers LogicalServerName SQL name a
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedServers
    ExecutedQuery: 'let instanceName = ''sqlmi'';

      MonManagedServers

      | where LogicalServerName =~ instanceName or name =~ instanceName

      | extend config_params = parse_xml(configuration_parameters).ConfigurationParameters

      | summarize arg_max(TIMESTAMP,*) by name

      | project a = parse_json(config_params).ConfigurationParameter

      | mv-apply a on (

      project name = a[''@name''], value = a[''@value'']

      )

      Sample output:

      | name | value |

      | --- | --- |

      | SQL.Config_BackupService_FullBackupWindowStartDay | Sunday |

      | SQL.Config_BackupService_FullBackupWindowStartTime | 22:00:00 |

      | SQL.Config_BackupService_FullBackupWindowDuration | 23:59:59 |

      | SQL.Config_BackupService_FullBackupWindowRetryPolicy | Immediate |

      | SQL.Config_BackupService_DatabaseCountForBalancingFullBackups | 1000 |

      | SQL.Config_BackupService_FullBackupWindowIsScheduledByRunner | False |'
