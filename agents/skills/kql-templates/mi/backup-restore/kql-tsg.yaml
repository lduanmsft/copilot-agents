- id: MI-backup-restore-48
  Topic: TSGMIBR0090-Backup-schedule
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0090-Backup-schedule.md
  Prompts:
  - MI IO virtual file stats by LogicalServerName, db_name
  - MonDmIoVirtualFileStats LogicalServerName db_name type_desc estimatedHoursToCompleteAllFulls
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'let logicalServerName = ''<instance_name>'';

      MonDmIoVirtualFileStats

      | where TIMESTAMP > ago(3h)

      | where is_primary_replica == 1

      | where LogicalServerName == logicalServerName

      | project TIMESTAMP, db_name, file_id, type_desc, spaceused_GB = round(spaceused_mb/1024.,2)

      | summarize argmax(TIMESTAMP, spaceused_GB) by db_name, type_desc, file_id

      | where type_desc == ''ROWS''

      | summarize sizeOfDataInAllDatabasesGB=sum(max_TIMESTAMP_spaceused_GB), databaseCount=dcount(db_name)

      | extend estimatedHoursToCompleteAllFulls = sizeOfDataInAllDatabasesGB * 1024. / 100. / 3600.

      | extend estimatedHoursToCompleteAllFullsBuffered = estimatedHoursToCompleteAllFulls * (100./90.)

      | extend estimatedTimeToCompleteAllFulls = format_timespan(estimatedHoursToCompleteAllFulls * 1h, ''HH:mm:ss'')

      | extend estimatedTimeToCompleteAllFullsBuffered = format_timespan(estimatedHoursToCompleteAllFullsBuffered * 1h, ''HH:mm:ss'')'
- id: MI-backup-restore-49
  Topic: TSGMIBR0090-Backup-schedule
