- id: MI-backup-restore-158
  Topic: TSGMIBR0111-SRB-Low-backup-on-secondary-rate-[DEPRECATED]
  Source: TSG-SQL-MI-BackupRestore/content/Deprecated/TSGMIBR0111-SRB-Low-backup-on-secondary-rate-[DEPRECATED].md
  Prompts:
  - MI database metadata telemetry counts by LogicalServerName, managed_database_name
  - MonDatabaseMetadata LogicalServerName managed_database_name message managed_database_id
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'let serverName = ''{ServerName}'';

      MonDatabaseMetadata

      | where PreciseTimeStamp >= ago(7d)

      | where table_name == ''sysprufiles''

      | where LogicalServerName == serverName

      | project managed_server_name = LogicalServerName, managed_database_id = logical_database_guid, fileid, fileguid, lname, pname, grpid, filetype, status, internalstatus,
      filestate, size, maxsize, growth, diffbaseguid, diffbasetime

      | lookup kind = inner ((

      MonSQLSystemHealth

      | where LogicalServerName == serverName

      | where message has_cs "An error occurred while processing ''BrickFile'' metadata for database"

      | parse message with * '' file id '' fileid: long ''.'' *

      | project originalEventTimestamp, LogicalServerName, instance_rg_size, ClusterName, AppTypeName, AppName, NodeName, error_id, logical_database_guid, fileid

      | summarize ErrorCount = count(), FirstErrorTime = min(originalEventTimestamp), LastErrorTime = arg_max(originalEventTimestamp, *) by managed_server_name =
      LogicalServerName, managed_database_id = logical_database_guid, fileid

      )) on managed_database_id, fileid

      | as FileInfo

      | lookup kind = inner ((

      MonManagedDatabases

      | where start_utc_date >= ago(6h)

      | where managed_database_id in (FileInfo | distinct managed_database_id)

      | distinct managed_server_id, managed_database_id, managed_database_name

      )) on managed_database_id

      | project-reorder managed_server_id, managed_database_id, managed_server_name, managed_database_name

      | order by managed_server_name, managed_database_name, fileid'
