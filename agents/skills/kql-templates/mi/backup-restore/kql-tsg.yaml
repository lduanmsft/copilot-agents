- id: MI-backup-restore-124
  Topic: TSGMIBR0087-PrematureBackupDeletion-detected-on-srv
  Source: TSG-SQL-MI-BackupRestore/content/Deprecated/TSGMIBR0087-PrematureBackupDeletion-detected-on-srv.md
  Prompts:
  - MonBackup by LogicalServerName, logical_server_name
  - MonBackup LogicalServerName logical_server_name logical_database_id let
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let lookBackPeriodStart = <impact_start> - 12h;

      let lookBackPeriodEnd = now();

      let serverName = ''{ServerName}'';

      let databaseId = ''<managed_database_id>'';

      MonBackup

      | where originalEventTimestamp between (lookBackPeriodStart .. lookBackPeriodEnd) and (AppTypeName in (''Worker.ISO'', ''Worker.ISO.Premium'') or AppTypeName
      startswith ''Worker.CL'')

      | where LogicalServerName =~ serverName

      | project originalEventTimestamp, AppTypeName, AppName, NodeName, logical_server_name=LogicalServerName, message_type, [''details'']

      | where message_type == ''INFO'' and details startswith ''CleanupFiles - Policy for database''

      | parse details with "CleanupFiles - Policy for database [" logical_database_id ", " Edition "] = delete backups files before " backupsCleanedUpBeforeDate

      | where logical_database_id == databaseId

      | extend logical_database_id = toguid(logical_database_id), backupsCleanedUpBeforeDate = todatetime(backupsCleanedUpBeforeDate)

      | project backupsCleanupTimestamp=originalEventTimestamp, AppTypeName, AppName, NodeName, logical_server_name, Edition, logical_database_id, backupsRetentionDayUsed
      = toint((originalEventTimestamp - backupsCleanedUpBeforeDate)/1d - 8)'
