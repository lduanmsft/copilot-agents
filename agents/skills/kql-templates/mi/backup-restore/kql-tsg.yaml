- id: MI-backup-restore-182
  Topic: Helpful-Queries
  Source: TSG-SQL-MI-BackupRestore/content/On-call-Helpers/Helpful-Queries.md
  Prompts:
  - MonBackup trend by event_type, signal
  - MonBackup event_type signal backup_type databaseId
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let databaseId = ''managed_database_id'';

      MonBackup

      | where originalEventTimestamp >= ago(1d)

      | where logical_database_id =~ databaseId

      | where event_type in (''BACKUP_START'', ''BACKUP_END'', ''BACKUP_SQL_ERROR'')

      | project originalEventTimestamp, backup_type, event_type

      | extend signal = iff(event_type == ''BACKUP_START'', dynamic([0, 1]), dynamic([1, 0]))

      | project-away event_type

      | mv-expand signal

      | extend signal = signal * case(backup_type == ''Full'', 3, backup_type == ''Diff'', 2, 1)

      | render timechart'
