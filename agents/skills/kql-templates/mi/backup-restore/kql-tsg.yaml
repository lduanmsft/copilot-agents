- id: MI-backup-restore-243
  Topic: TSGMIBR0067-Slow-PITR
  Source: TSG-SQL-MI-BackupRestore/content/Restore/TSGMIBR0067-Slow-PITR.md
  Prompts:
  - MonRestoreEvents by TimeParts, todouble
  - MonRestoreEvents TimeParts todouble restore_database_progress round
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: 'MonRestoreEvents

      | where restore_request_id contains "ee84363e-80a1-45e6-84c1-e341358ce3cd"

      | where restore_database_progress contains " has been restored in "

      | project TIMESTAMP,restore_database_progress, uncompressed_backup_size_GB = round(tolong(uncompressed_backup_size) / 1024. / 1024. / 1024.,3), compressed_backup_size_GB
      = round(tolong(compressed_backup_size) / 1024. / 1024. / 1024.,3), elapsed_time

      | extend TimeParts = split(elapsed_time, '':'')

      | extend Hours = todouble(TimeParts[0])

      | extend Minutes = todouble(TimeParts[1])

      | extend Seconds = todouble(split(TimeParts[2], ''.'')[0])

      | extend Milliseconds = todouble(split(TimeParts[2], ''.'')[1])/10000000

      | extend TotalHours = Hours + Minutes/60 + Seconds/3600 + Milliseconds/3600

      | project TIMESTAMP, restore_database_progress, uncompressed_backup_size_GB, compressed_backup_size_GB, TotalHours, speed = round(compressed_backup_size_GB/TotalHours,
      3)'
- id: MI-backup-restore-244
  Topic: TSGMIBR0067-Slow-PITR
  Source: TSG-SQL-MI-BackupRestore/content/Restore/TSGMIBR0067-Slow-PITR.md
  Prompts:
  - MonSqlRgHistory for aggregated virtual files io history
  - MonSqlRgHistory LogicalServerName event let physical_database_name
  - Investigate point-in-time restore
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let startTime = ago(1d);

      let endTime = now() + 48h;

      let srvrName =''hpsuatdwsqlmi01'';

      let dbid = ''ffd4c368-bb66-4cd9-82c6-109285eb41bd'';

      MonSqlRgHistory

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      | where LogicalServerName == srvrName

      | where AppTypeName contains ''Worker.CL''

      | where event == ''aggregated_virtual_files_io_history''

      | where physical_database_name !in (''managed_model'',''master'',''model'',''model_msdb'',''msdb'',''replicatedmaster'',''tempdb'')

      | where datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample) >= 1

      | where isnotempty(physical_database_name)

      | extend key = strcat(physical_database_name, "_", file_id, ".", iif(type_desc == ''LOG'', ''ldf'', iif(file_id == 1, ''mdf'', ''ndf'')))

      | extend LogicalServerName, NodeName, key,'
