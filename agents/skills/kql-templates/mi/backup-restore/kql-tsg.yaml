- id: MI-backup-restore-38
  Topic: TSGMIBR0085-High-Regional-Backup-storage-Billing
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0085-High-Regional-Backup-storage-Billing.md
  Prompts:
  - MonDwBilling for billing metric calculated
  - MonDwBilling LogicalServerName logical_server_name logical_database_name event
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDwBilling
    ExecutedQuery: 'MonDwBilling

      | where LogicalServerName =~ ''{ServerName}'' and AppTypeName contains "CL"

      | where event == ''billing_metric_calculated''

      | summarize argmax(TIMESTAMP, *) by storage_container_name, file_type, logical_database_id

      | summarize sum(max_TIMESTAMP_size_in_bytes) by logical_database_id

      | project db_Id = toupper(logical_database_id), sizeGb = sum_max_TIMESTAMP_size_in_bytes/1024.0/1024.0/1024.0

      | join (

      MonAnalyticsDBSnapshot

      | where logical_server_name =~ ''{ServerName}''

      | summarize max_timestamp = max(TIMESTAMP) by logical_database_id, logical_database_name, create_time

      | extend db_Id = iff(logical_database_name =~ "{DatabaseName}", "00000000-0000-0000-0000-000000000004", logical_database_id)

      | extend db_Id = iff(logical_database_name =~ "{DatabaseName}", "00000000-0000-0000-0000-000000032763", db_Id)

      | extend db_Id = iff(logical_database_name =~ "{DatabaseName}", "00000000-0000-0000-0000-000000032760", db_Id)

      )

      on db_Id

      | extend Tombstoned = iff(max_timestamp < ago(2h), 1, 0)'
