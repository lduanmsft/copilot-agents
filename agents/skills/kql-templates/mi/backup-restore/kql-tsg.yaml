- id: MI-backup-restore-207
  Topic: Helpful-Queries
  Source: TSG-SQL-MI-BackupRestore/content/On-call-Helpers/Helpful-Queries.md
  Prompts:
  - MonManagedServers by LogicalServerName, managed_database_name
  - MonManagedServers LogicalServerName managed_database_name isempty managed_server_id
  - Investigate Helpful Queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedServers
    ExecutedQuery: 'let server_name = '''';

      let server_id = '''';

      let db_name = '''';

      let db_id = '''';

      let SingleCluster=(clstr: string)

      cluster(clstr).database(''sqlazure1'').MonManagedServers

      | where isempty(server_name) or name =~ server_name

      | where isempty(server_id) or managed_server_id =~ server_id

      | extend ServerSnapshot = end_utc_date, LogicalServerName = name

      | summarize arg_max(ServerSnapshot, private_cluster_tenant_ring_name, ServerState = state) by name, toguid(managed_server_id)

      | extend LogicalServerName = name

      | lookup kind=leftouter(

      cluster(clstr).database(''sqlazure1'').MonManagedDatabases

      | where isempty(db_name) or managed_database_name =~ db_name

      | where isempty(db_id) or managed_database_id =~ db_id

      | summarize arg_max(end_utc_date, managed_database_name, state) by toguid(managed_database_id), toguid(managed_server_id)

      | project managed_database_name, managed_database_id, DatabaseState = state, managed_server_id, DbSnapshot = end_utc_date

      ) on managed_server_id

      | project ServerSnapshot, LogicalServerName, managed_server_id, private_cluster_tenant_ring_name, ServerState, DbSnapshot, managed_database_name, managed_database_id,
      DatabaseState

      | where not(isempty(managed_database_name) and isempty(managed_database_id))

      };

      _ExecuteForProdClusters'
- id: MI-backup-restore-208
  Topic: Helpful-Queries
  Source: TSG-SQL-MI-BackupRestore/content/On-call-Helpers/Helpful-Queries.md
  Prompts:
  - MonRestoreEvents by restore_request_id, time_elapsed_min
  - MonRestoreEvents restore_request_id time_elapsed_min let clstr
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: 'let threshold_min = 30;

      let time_ago = ago(7d);

      let SingleCluster = (clstr: string)

      cluster(clstr).database(''sqlazure1'').MonRestoreEvents

      | project originalEventTimestamp, ClusterName, restore_request_id, details

      | where restore_request_id in~ (

      cluster(clstr).database(''sqlazure1'').MonRestoreEvents

      | where originalEventTimestamp > time_ago

      | where details startswith ''Restore header only could not populate metadata for backup''

      | distinct restore_request_id

      )

      | sort by restore_request_id asc, originalEventTimestamp asc

      | extend previousTimestamp = prev(originalEventTimestamp)

      | where details startswith ''Restore header only could not populate metadata for backup''

      | extend time_elapsed_min = datetime_diff(''minute'', originalEventTimestamp, previousTimestamp)

      | project-reorder originalEventTimestamp, previousTimestamp, time_elapsed_min, ClusterName

      | where time_elapsed_min > threshold_min

      };

      _ExecuteForProdClusters

      | order by time_elapsed_min desc'
