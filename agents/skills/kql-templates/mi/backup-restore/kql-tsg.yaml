- id: MI-backup-restore-301
  Topic: Get-Backup-information
  Source: Troubleshooting-Guides/Backup-and-Restore/Automated-backups-or-point%2Din%2Dtime-restore/Get-Backup-information.md
  Prompts:
  - MonBackup by logical_server_name, logical_database_name
  - MonBackup logical_server_name logical_database_name let backuptype
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let backuptype = '''';//Possible values: '''', ''Full'', ''Diff'' or ''Log''

      let MIName = ''<instance name>'';

      let lookBack = ago(1h);

      MonBackup

      | where TIMESTAMP > lookBack

      | where logical_server_name =~ MIName

      | where backup_type =~ backuptype or backuptype == ''''

      | where event_type == ''BACKUP_METADATA_DETAILS''

      | where toupper(logical_database_id) == toupper(logical_database_name)//To include system DBs, comment this line

      | extend BackupSizeMB = round(todecimal(backup_size)/1024/1024,2)

      | extend backup_size_GB = round(todecimal(backup_size)/1024/1024/1024,2)

      | project PreciseTimeStamp, logical_database_id=tolower(logical_database_name), BackupSizeMB, backup_size_GB, backup_start_date, backup_end_date, backup_type

      | join kind=leftouter'
