- id: MI-backup-restore-269
  Topic: TSGMIBR0116-Trident-Native-server-marked-incorrectly
  Source: TSG-SQL-MI-BackupRestore/content/Trident-Native/TSGMIBR0116-Trident-Native-server-marked-incorrectly.md
  Prompts:
  - MonManagement by logical_server_name, logical_database_id
  - MonManagement logical_server_name logical_database_id keyss action
  - Investigate Trident backup issues
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where TIMESTAMP between (ago(7h)..ago(1h))

      | extend keyss = split(keys, '','')

      | extend logical_server_name = tostring(keyss[0])

      | extend logical_database_id = tostring(keyss[1])

      | where action == ''EventInitiateCrossServerMove'' or action == ''EventDrop'' or action == ''EventCompleteCrossServerMove''

      | summarize by logical_database_id = toupper(logical_database_id)

      ) on logical_database_id

      | where (TridentServerType == ''NativeServer'' and logical_server_name startswith ''tridentcacheserver'') or (TridentServerType == ''CacheServer'' and logical_server_name
      !startswith ''tridentcacheserver'')

      | where state != ''PerformingCrossServerMove''

      | extend CAS_IsTridentNative = strcat(''Set-WinfabProperty -FabricClusterName '', ClusterName, '' -FabricNameUri fabric:/'', AppTypeName, ''/'', AppName, ''
      -PropertyName "IsTridentNativeServer" -PropertyValue 0x01 -SkipWorkerIsoAppCheck $true -Force'', ''\n'','
