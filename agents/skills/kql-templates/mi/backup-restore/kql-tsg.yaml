- id: MI-backup-restore-88
  Topic: TSGMIBR0123-LOG_BACKUP_OUT_OF_SLA
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0123-LOG_BACKUP_OUT_OF_SLA.md
  Prompts:
  - MonBackup for sql connection query error
  - MonBackup event exception_message query_api_name error
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where TIMESTAMP > TimeAgo and AppTypeName contains "Worker.CL" and isnotempty(exception_message) and event == "sql_connection_query_error"

      | extend NodeOrDNSIssueInstance = iff(exception_message startswith "Cannot open backup device " and exception_message contains "Operating system error 50(The
      request is not supported.).", true, false)

      | extend BoSReplicaIssueInstance = iff(exception_message == "Execution Timeout Expired. The timeout period elapsed prior to completion of the operation or the
      server is not responding." and query_api_name == "GetHealthySecondaryReplicaInfo", true, false)

      | extend WriteFailFaultyNodeInstance = iff(exception_message contains "12030(failed to retrieve text for this error. Reason: 317)" and query_api_name == "ExecuteBackupStatement",
      true, false)

      | extend ChimeraIssueInstance = iff(exception_message contains "This BACKUP or RESTORE command is not supported on a database mirror or secondary replica."
      and query_api_name == "ExecuteBackupStatement", true, false)

      | extend DNSIssueInstance = iff(exception_message contains "Operating system error 12007(failed to retrieve text for this error. Reason: 317)." and query_api_name
      == "ExecuteBackupStatement", true, false)

      | extend MemoryIssuesInstance = iff(exception_message contains "Operating system error 8(Not enough memory resources are available to process this command.)."
      and query_api_name == "ExecuteBackupStatement", true, false)

      | extend HekatonIssueInstance = iff(exception_message contains "Backup failed because there is a mismatch in file metadata for file 65537" and query_api_name
      == "ExecuteBackupStatement", true, false)

      | summarize'
