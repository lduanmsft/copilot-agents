    ExecutedQuery: 'let getThroughputMbpsGP = (startTime : datetime, endTime : datetime) {

      MonSqlRgHistory

      | where originalEventTimestamp between (startTime .. endTime)

      | where LogicalServerName in (serverNames)

      | where AppTypeName startswith ''Worker.CL''

