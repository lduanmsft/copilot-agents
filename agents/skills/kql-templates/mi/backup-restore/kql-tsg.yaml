  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'let logicalServerName = ''<instance_name>'';

      MonDmIoVirtualFileStats

      | where TIMESTAMP > ago(3h)

      | where is_primary_replica == 1

      | where LogicalServerName == logicalServerName

      | project TIMESTAMP, db_name, file_id, type_desc, spaceused_GB = round(spaceused_mb/1024.,2)

      | summarize argmax(TIMESTAMP, spaceused_GB) by db_name, type_desc, file_id

      | where type_desc == ''ROWS''

      | summarize sizeOfDataInGB=sum(max_TIMESTAMP_spaceused_GB) by db_name

      | extend estimatedHoursToCompleteFull = sizeOfDataInGB * 1024. / 100. / 3600.

      | extend estimatedHoursToCompleteFullBuffered = estimatedHoursToCompleteFull * (100./90.)

      | extend estimatedTimeToCompleteFull = format_timespan(estimatedHoursToCompleteFull * 1h, ''HH:mm:ss'')

      | extend estimatedTimeToCompleteFullBuffered = format_timespan(estimatedHoursToCompleteFullBuffered * 1h, ''HH:mm:ss'')

      | order by sizeOfDataInGB desc'
