- id: MI-backup-restore-343
  Topic: Troubleshooting-LTR-restore-issue
  Source: Troubleshooting-Guides/Backup-and-Restore/Long%2Dterm-backup-retention/Troubleshooting-LTR-restore-issue.md
  Prompts:
  - MI management operations telemetry for management operation start
  - MonManagementOperations event inputParams InputParameters operation_parameters
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where TIMESTAMP > ago(1d)

      | where operation_type == ''CreateManagedRestoreFromLtrBackupRequest''

      | where event == ''management_operation_start''

      | extend inputParams = parse_xml(operation_parameters)

      | extend restore_request_id = inputParams.InputParameters.RestoreId

      | extend TargetServerName = inputParams.InputParameters.TargetManagedServerName

      | extend TargetDatabaseName = inputParams.InputParameters.TargetManagedDatabaseName

      | extend ArchivedBackupResourceId = inputParams.InputParameters.ArchivedBackupResourceId

      | extend StartTime = originalEventTimestamp

      | extend SourceServer = extract(''/longTermRetentionManagedInstances/(.*)/longTermRetentionDatabases/'', 1, operation_parameters)

      | extend SourceDatabase = extract(''/longTermRetentionDatabases/(.*)/longTermRetentionManagedInstanceBackups/'', 1, operation_parameters)

      | project request_id, restore_request_id, StartTime, TargetServerName, TargetDatabaseName, ArchivedBackupResourceId, SourceServer, SourceDatabase

      | where TargetServerName =~ ''{ServerName}'' or SourceServer =~ ''{ServerName}''

      | where isempty(''{DatabaseName}'') or TargetDatabaseName =~ ''{DatabaseName}'' or SourceDatabase =~ ''{DatabaseName}''

      | join (

      MonManagementOperations

      | where operation_type == ''CreateManagedRestoreFromLtrBackupRequest''

      | where event contains ''management_operation_''

      | where event !in (''management_operation_start'', ''management_operation_progress'')

      | extend EndTime = originalEventTimestamp

      | extend end_event = event

      | extend opResult = parse_xml(operation_result)

      | extend OperationDetails = opResult.OutputParameters.OperationDetails

      | extend CreatedDate = opResult.OutputParameters.CreatedDate

      | extend Result=replace(@''management_operation_*'', @''\1'', event)

      ) on request_id

      | project StartTime, EndTime, Result, request_id, restore_request_id'
