  - Investigate restore failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let startTime = ago(1d);

      let endTime = now() + 48h;

      let srvrName =''sqlmi01'';

      let dbid = ''ffd4c368-bb66-4cd9-82c6-109285eb41bd'';

      MonSqlRgHistory

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      | where LogicalServerName == srvrName

      | where AppTypeName contains ''Worker.CL''

      | where event == ''aggregated_virtual_files_io_history''

      | where physical_database_name !in (''managed_model'',''master'',''model'',''model_msdb'',''model_replicatedmaster'',''msdb'',''replicatedmaster'',''tempdb'')

      | where datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample) >= 1

      | where isnotempty(physical_database_name)

      | extend key = strcat(physical_database_name, "_", file_id, ".", iif(type_desc == ''LOG'', ''ldf'', iif(file_id == 1, ''mdf'', ''ndf'')))

      | extend LogicalServerName, NodeName, key,'
