- id: MI-backup-restore-54
  Topic: TSGMIBR0090-Backup-schedule
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0090-Backup-schedule.md
  Prompts:
  - MI managed instance resource stats by LogicalServerName, startTime
  - MonManagedInstanceResourceStats LogicalServerName startTime endTime server
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedInstanceResourceStats
    ExecutedQuery: 'let getThroughputUtilization = (startTime : datetime, endTime : datetime) {

      let sku_name_general_purpose = ''GeneralPurpose'';

      MonManagedInstanceResourceStats

      | where originalEventTimestamp between (startTime .. endTime)

      | where LogicalServerName in (serverNames)

      | extend throughput_mbps = 1. * ((io_bytes_read + io_bytes_written) / 1024. / 1024.) / (actual_interval_ms / 1000.)

      | summarize max_throughput = max(throughput_mbps) by bin(originalEventTimestamp, tick), server = LogicalServerName, sku

      | lookup getThroughputMbpsBC(startTime, endTime) on server

      | lookup getThroughputMbpsGP(startTime, endTime) on server

      | extend theoretical_max_throughput = iff(sku == sku_name_general_purpose, throughput_in_mbps_gp, throughput_in_mbps_bc)

      | order by originalEventTimestamp asc

      | summarize timestamp = make_list(originalEventTimestamp), sku = take_any(sku), signal = make_list(100 * max_throughput / theoretical_max_throughput) by server

      };'
