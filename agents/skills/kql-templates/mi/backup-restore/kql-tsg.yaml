SqlSkills:
- id: MI-backup-restore-1
  Topic: TSGMIBR0043-Tail-log-backup-stuck
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0043-Tail-log-backup-stuck.md
  Prompts:
  - MonBackup by event, db_id
  - MonBackup event db_id logical_database_id backup_type
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let db_id = ''database_id'';

      MonBackup

      | where originalEventTimestamp > ago(5d)

      | where logical_database_id =~ db_id

      | where backup_type =~ ''Log''

      | project originalEventTimestamp, NodeName, process_id, collect_current_thread_id, logical_database_id, event, event_type, backup_type, skipped_backup_reason,
      details, exception, br_exception_message, br_exception_stack_trace, sql_error_message'
- id: MI-backup-restore-2
  Topic: TSGMIBR0043-Tail-log-backup-stuck
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0043-Tail-log-backup-stuck.md
  Prompts:
  - MI management operations telemetry for management operation start
  - MonManagementOperations event let lookback servername
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'let lookback = ago(1d);

      let servername = ''{ServerName}'';

      MonManagementOperations

      | where originalEventTimestamp > lookback

      | where operation_type != "GetPurviewScanRunInfo"

      | where operation_parameters contains strcat(''>'', servername, ''<'')

      | where event == "management_operation_start"'
- id: MI-backup-restore-3
  Topic: TSGMIBR0073-Backup-performance-investigation
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0073-Backup-performance-investigation.md
  Prompts:
  - MonManagedServers by name, pccsql
  - MonManagedServers name pccsql use2 prod
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedServers
    ExecutedQuery: 'MonManagedServers

      | where name=="pccsql-use2-prod-ssv-tscon19"

      |where TIMESTAMP >ago(2h)

      |summarize by name,service_level_objective, reserved_storage_iops, reserved_storage_throughput_mbps'
- id: MI-backup-restore-4
  Topic: TSGMIBR0073-Backup-performance-investigation
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0073-Backup-performance-investigation.md
  Prompts:
  - MonSqlRgHistory trend for aggregated virtual files io history
  - MonSqlRgHistory LogicalServerName event let startTime
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let startTime = <startTime>;

      let endTime = <endTime>;

      let managedServerName = "<managedServerName>";

      let managedDatabaseId = "<managedDatabaseId>";

      MonSqlRgHistory

      | where TIMESTAMP >= startTime and TIMESTAMP <= endTime

      | where LogicalServerName == managedServerName

      | where AppTypeName startswith ''Worker.CL''

      | where event == ''aggregated_virtual_files_io_history''

      | where physical_database_name =~ managedDatabaseId

      | extend sample_duration = datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample)

      | where sample_duration >= 1

      | extend key = file_path

      | extend IOPS = round(1. * (delta_num_of_reads + delta_num_of_writes) / sample_duration)

      | project TIMESTAMP, key, IOPS

      | render timechart'
- id: MI-backup-restore-5
  Topic: TSGMIBR0073-Backup-performance-investigation
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0073-Backup-performance-investigation.md
  Prompts:
  - MonSqlRgHistory trend for aggregated virtual files io history
  - MonSqlRgHistory LogicalServerName event sample_duration let
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let startTime = <startTime>;

      let endTime = <endTime>;

      let managedServerName = "<managedServerName>";

      let managedDatabaseId = "<managedDatabaseId>";

      MonSqlRgHistory

      | where TIMESTAMP >= startTime and TIMESTAMP <= endTime

      | where LogicalServerName == managedServerName

      | where AppTypeName == ''Worker.CL''

      | where event == ''aggregated_virtual_files_io_history''

      | where physical_database_name =~ managedDatabaseId

      | extend sample_duration = datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample)

      | where sample_duration >= 1

      | extend key = file_path

      | extend MBps = round(1. * (delta_num_of_bytes_read + delta_num_of_bytes_written) / 1024. / 1024. / sample_duration)

      | extend Read_MBps = round(1. * (delta_num_of_bytes_read ) / 1024. / 1024. / sample_duration)

      | extend Write_MBps = round(1. * (delta_num_of_bytes_written) / 1024. / 1024. / sample_duration)

      | project TIMESTAMP, key, MBps, Read_MBps, Write_MBps

      | render timechart'
- id: MI-backup-restore-6
  Topic: TSGMIBR0073-Backup-performance-investigation
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0073-Backup-performance-investigation.md
  Prompts:
  - MonSqlRgHistory trend for aggregated workload groups plus history
  - MonSqlRgHistory LogicalServerName event let startTime
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let startTime = <startTime>;

      let endTime = <endTime>;

      let managedServerName = "<managedServerName>";

      let managedDatabaseId = "<managedDatabaseId>";

      MonSqlRgHistory

      | where TIMESTAMP >= startTime and TIMESTAMP <= endTime

      | where LogicalServerName == managedServerName

      | where AppTypeName == ''Worker.CL''

      | where event == ''aggregated_workload_groups_plus_history''

      | where group_name == "InMemFullBackupGroup"

      | extend sample_duration = datetime_diff(''second'', end_aggregated_sample, start_aggregated_sample)

      | where sample_duration >= 1

      | extend r_io_size_kb = 1. * (delta_read_bytes_total) / (delta_reads_completed_total) / 1024.

      | extend w_io_size_kb = 1. * (delta_write_bytes_total) / (delta_writes_completed_total) / 1024.

      | extend io_size_kb = 1. * (delta_write_bytes_total + delta_read_bytes_total) / (delta_writes_completed_total + delta_reads_completed_total) / 1024.

      | project TIMESTAMP, io_size_kb, r_io_size_kb, w_io_size_kb

      | render timechart'
