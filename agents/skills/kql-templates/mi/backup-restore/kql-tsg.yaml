      | project ClusterName, LogicalServerName, NodeName, AppName, database_id, error_code,message

      | take 50'
- id: MI-backup-restore-12
  Topic: TSGMIBR0075-Log-backup-cannot-be-taken-due-to-AKV
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0075-Log-backup-cannot-be-taken-due-to-AKV.md
  Prompts:
  - MonBackup for database backup
  - MonBackup LogicalServerName logical_database_name event backup_type
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where TIMESTAMP > ago(1h)

      | where package == ''XdbBackupServiceXEvents''

      | where event == "database_backup"

      | where LogicalServerName == logicalServerName

      | project TIMESTAMP, logical_database_name, logical_database_id, backup_type, event_type, exception_message, exception_stack_trace, br_exception_message, br_exception_stack_trace

