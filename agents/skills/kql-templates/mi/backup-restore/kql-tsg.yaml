- id: MI-backup-restore-18
  Topic: TSGMIBR0078-Full-backup-skipped-after-Geo-Failover
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0078-Full-backup-skipped-after-Geo-Failover.md
  Prompts:
  - MI management operations telemetry for management operation failure
  - MonManagementOperations event error_code operation_parameters_json InputParameters
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'let StartTime = <start_time>;

      let EndTime = <end_time>;

      let ManagedServerName = ''<managed_server_name>'';

      MonManagementOperations

      | where originalEventTimestamp between (StartTime .. EndTime)

      | where operation_type =~ ''CreateManagedRestoreRequest''

      | where event =~ ''management_operation_failure''

      | where error_code == 1200010

      | extend operation_parameters_json = parse_xml(operation_parameters)

      | extend TargetManagedServerName = operation_parameters_json.InputParameters.TargetManagedServerName

      | where TargetManagedServerName =~ ManagedServerName

      | extend TargetManagedDatabaseName = operation_parameters_json.InputParameters.TargetManagedDatabaseName

      | extend SourceManagedServerName = operation_parameters_json.InputParameters.SourceManagedServerName

      | extend SourceManagedDatabaseName = operation_parameters_json.InputParameters.SourceManagedDatabaseName

      | extend PointInTime = operation_parameters_json.InputParameters.PointInTime

      | extend RestoreId = operation_parameters_json.InputParameters.RestoreId

      | extend operation_result_json = parse_xml(operation_result)

      | extend OperationDetails = operation_result_json.OutputParameters.OperationDetails

      | project originalEventTimestamp, request_id, event, SourceManagedServerName, TargetManagedServerName, SourceManagedDatabaseName, TargetManagedDatabaseName,
      PointInTime, OperationDetails'
- id: MI-backup-restore-19
  Topic: TSGMIBR0078-Full-backup-skipped-after-Geo-Failover
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0078-Full-backup-skipped-after-Geo-Failover.md
  Prompts:
  - MI management operations telemetry by LogicalServerName, event
  - MonManagementOperations LogicalServerName event request_id ManagedServerName
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'let ManagedServerName = ''<managed_server_name>'';

      MonManagementOperations

      | where operation_type =~ ''FailoverManagedFailoverGroup''

      | summarize min(originalEventTimestamp), max(originalEventTimestamp), make_list(event), take_any(operation_parameters) by request_id

      | where list_event has ''management_operation_success''

      | extend opj = parse_xml(operation_parameters)

      | where opj.InputParameters.LogicalServerName =~ ManagedServerName

      | summarize arg_max(min_originalEventTimestamp, max_originalEventTimestamp, request_id)

      | project-rename StartTime = min_originalEventTimestamp, EndTime = max_originalEventTimestamp, RequestId = request_id'
- id: MI-backup-restore-20
  Topic: TSGMIBR0078-Full-backup-skipped-after-Geo-Failover
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0078-Full-backup-skipped-after-Geo-Failover.md
  Prompts:
  - MonBackup for database backup metadata / BACKUP METADATA DETAILS
  - MonBackup LogicalServerName event let change
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let LastFailoverTime = ''<StartTime_from_previous_result>''; // change this

      let ManagedServerName = ''<managed_server_name>''; // change this

      let BackupServiceDatabaseId = ''<managed_database_id_or_backup_service_db_id_for_system_dbs>''; // change this

      let LastFullBackupBeforeFailoverTime = MonBackup

      let StartTime = min_of(coalesce(toscalar(LastFullBackupBeforeFailoverTime | project FullBackupStartTime), LastFailoverTime) - 5m, LastFailoverTime - 5m); //
      do NOT change this

      let EndTime = LastFailoverTime + 1h; // do NOT change this

      MonBackup

      | where originalEventTimestamp between (StartTime .. EndTime)

      | where LogicalServerName =~ ManagedServerName

      | where logical_database_id =~ BackupServiceDatabaseId

      | where event =~ ''database_backup_metadata'' and event_type =~ ''BACKUP_METADATA_DETAILS''

      | order by originalEventTimestamp asc

      | project originalEventTimestamp, AppName, NodeName, event, event_type, backup_type, details, backup_start_date, backup_end_date, first_lsn, last_lsn, uncompressed_backup_size,
      database_backup_lsn, backup_set_guid'
- id: MI-backup-restore-21
  Topic: TSGMIBR0078-Full-backup-skipped-after-Geo-Failover
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0078-Full-backup-skipped-after-Geo-Failover.md
  Prompts:
  - MonBackup by LogicalServerName, let
  - MonBackup LogicalServerName let ManagedServerName change
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let ManagedServerName = ''<managed_server_name>''; // change this

      let BackupServiceDatabaseId = ''<managed_database_id_or_backup_service_db_id_for_system_dbs>''; // change this

      MonBackup

      | where originalEventTimestamp >= ago(30m)

      | where LogicalServerName =~ ManagedServerName

      | where logical_database_id =~ BackupServiceDatabaseId

      | summarize arg_max(originalEventTimestamp, *)

      | parse ClusterName with TenantRing ''.'' Cluster ''.worker.database.windows.net''

      | project'
- id: MI-backup-restore-22
  Topic: TSGMIBR0078-Full-backup-skipped-after-Geo-Failover
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0078-Full-backup-skipped-after-Geo-Failover.md
  Prompts:
  - MonBackup by LogicalServerName, database_name
  - MonBackup LogicalServerName database_name full_backup_time let
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let lastFailoverTime = datetime(<last_failover_time>);

      let serverName = ''{ServerName}'';

      MonBackup

      | where originalEventTimestamp >= lastFailoverTime

      | where LogicalServerName == serverName

      | where database_name !in (''msdb'', ''managed_model'', ''replicatedmaster'')

      | where event_type == ''BACKUP_END''

      | summarize arg_max(originalEventTimestamp, *) by logical_database_id

      | parse backup_path with * ''/backup/'' managed_database_id ''/'' backup_type ''/'' full_backup_time ''/'' *

      | project originalEventTimestamp, backup_type, logical_database_id, full_backup_time = todatetime(strcat(full_backup_time, ''Z''))'
