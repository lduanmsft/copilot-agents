- id: MI-backup-restore-174
  Topic: TSGMIBR0010A-Log-Backup-Latency
  Source: TSG-SQL-MI-BackupRestore/content/Miscellaneous/TSGMIBR0010A-Log-Backup-Latency.md
  Prompts:
  - MonManagedDatabases by LogicalServerName, logical_server_name
  - MonManagedDatabases LogicalServerName logical_server_name managed_database_name state
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedDatabases
    ExecutedQuery: 'let queryInterval = 6h;

      let endTime = now();

      let readyDbs = (clusterName: string, databaseName: string, endTime: datetime)

      cluster(clusterName).database(databaseName).MonManagedDatabases

      | where TIMESTAMP > ago(60m) and first_backup_time != datetime(1601-01-01 00:00:00.0000000) //and last_restorable_point != datetime(1601-01-01 00:00:00.0000000)

      | project TIMESTAMP, state, managed_server_id, managed_database_name, ClusterName, logical_database_id=managed_database_id, first_backup_time

      | summarize arg_max(TIMESTAMP, ClusterName, state, managed_database_name) by managed_server_id, logical_database_id

      | where state == ''Ready'' and managed_database_name !in (''managed_model'', ''replicatedmaster'', ''msdb'')

      | parse ClusterName with ''cr'' * ''.'' region ''.control.'' sufix

      | project-away ClusterName, sufix

      | where region != ''''

      | join kind=inner (cluster(clusterName).database(databaseName).MonManagedServers

      | summarize arg_max(TIMESTAMP, LogicalServerName=name, state) by managed_server_id

      | where state == ''Ready''

      | join kind=leftouter (cluster(clusterName).database(databaseName).MonGeoDRFailoverGroups

      | where PreciseTimeStamp > ago(60m)

      | summarize arg_max(PreciseTimeStamp, role) by LogicalServerName = logical_server_name

      ) on LogicalServerName

      | where role != ''Secondary''

      | project-away LogicalServerName1, role, state, PreciseTimeStamp

      ) on managed_server_id

      | project-away TIMESTAMP, managed_server_id, managed_server_id1, [''state'']

      };'
