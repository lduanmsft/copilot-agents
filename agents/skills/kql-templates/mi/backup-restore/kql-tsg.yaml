- id: MI-backup-restore-25
  Topic: TSGMIBR0080-Backup-LTR-Errors
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0080-Backup-LTR-Errors.md
  Prompts:
  - MonBackup for database backup
  - MonBackup LogicalServerName event ServerName database_backup
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

