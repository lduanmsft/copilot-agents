  - Investigate restore failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDbSeedTraces
    ExecutedQuery: 'let serverName = ''{ServerName}'';

      MonDbSeedTraces

      | where TIMESTAMP > ago(1d)

      | where LogicalServerName =~ serverName

      | where database_name =~ ''{DatabaseName}'' and role_desc == ''Source'' //logical database guid

      | summarize min(originalEventTimestamp), arg_max(originalEventTimestamp, transferred_size_bytes, total_disk_io_wait_time_ms, total_network_wait_time_ms) by
      database_size_bytes, local_seeding_guid, database_name

      | extend seedingDuration = originalEventTimestamp - min_originalEventTimestamp

      | extend seedingDurationInSeconds = seedingDuration/1s

      | extend seedingSpeedInMbs = database_size_bytes/1024/1024/seedingDurationInSeconds

      | extend transferSpeedInMbs = transferred_size_bytes/1024/1024/seedingDurationInSeconds

      | project database_name, database_size_bytes, local_seeding_guid, startTime = min_originalEventTimestamp, endTime = originalEventTimestamp, seedingDuration,
      seedingDurationInSeconds, seedingSpeedInMbs, transferSpeedInMbs, total_disk_io_wait_time_ms, total_network_wait_time_ms

