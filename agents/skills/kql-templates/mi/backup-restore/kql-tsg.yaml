  - MonRestoreEvents TimeParts todouble restore_database_progress round
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: 'MonRestoreEvents

      | where restore_request_id contains "ee84363e-80a1-45e6-84c1-e341358ce3cd"

      | where restore_database_progress contains " backup files have been restored in "

      |project TIMESTAMP,restore_database_progress, uncompressed_backup_size_GB = round(tolong(uncompressed_backup_size) / 1024. / 1024. / 1024.,3), compressed_backup_size_GB
      = round(tolong(compressed_backup_size) / 1024. / 1024. / 1024.,3), elapsed_time

      | extend TimeParts = split(elapsed_time, '':'')

      | extend Hours = todouble(TimeParts[0])

      | extend Minutes = todouble(TimeParts[1])

      | extend Seconds = todouble(split(TimeParts[2], ''.'')[0])

      | extend Milliseconds = todouble(split(TimeParts[2], ''.'')[1])/10000000

      | extend TotalHours = Hours + Minutes/60 + Seconds/3600 + Milliseconds/3600

      | project TIMESTAMP, restore_database_progress, uncompressed_backup_size_GB, compressed_backup_size_GB, TotalHours, speed = round(compressed_backup_size_GB/TotalHours,
