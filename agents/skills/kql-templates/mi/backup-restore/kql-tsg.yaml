- id: MI-backup-restore-280
  Topic: '[OnePager]-Automated-backups-leading-to-Performance-issue'
  Source: Troubleshooting-Guides/Backup-and-Restore/Automated-backups-or-point%2Din%2Dtime-restore/[OnePager]-Automated-backups-leading-to-Performance-issue.md
  Prompts:
  - MonBackup by LogicalServerName, event
  - MonBackup LogicalServerName event backup_type logical_database_id
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where originalEventTimestamp >= ago(10d)

      | where LogicalServerName =~ "{ServerName}"

      | where event startswith ''database_backup''

      | where event_type == ''BACKUP_METADATA_DETAILS''

      | where backup_type != ''Log''

      | where logical_database_id =~ {logical_database_id}

      | extend backup_size_gb = todouble(uncompressed_backup_size) / 1024.0 /1024.0 /1024.0

      | extend start_time = todatetime(backup_start_date)

      | extend end_time = todatetime(backup_end_date)

      | extend backup_duration_h = todouble(datetime_diff(''second'', end_time, start_time)) / 60.0 / 60.0

      | project originalEventTimestamp, backup_type, backup_start_date, backup_end_date, backup_size_gb, backup_duration_h

      | order by originalEventTimestamp desc'
- id: MI-backup-restore-281
  Topic: '[OnePager]-Automated-backups-leading-to-Performance-issue'
