  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let serverName = ''{ServerName}'';

      let startTime = ago(1d); // Get query start time from Kusto runner logs.

      let timeOffset = startTime - startofday(startTime);

      let endTime = iff(startofday(now()) + timeOffset > now() - 1h, startofday(ago(1d)), startofday(now())) + timeOffset;

      let IgnorableGetHealthySecondaryReplicaInfoErrors = dynamic([''233_20_0'', ''978_14_1'', ''976_14_1'', ''983_14_1'', ''988_14_1'']);

      let DatabasesWithFailedGetHealthySecondaryReplicaInfo =

      MonBackup

      | where originalEventTimestamp between (startTime .. endTime)

      | where LogicalServerName == serverName

      | where query_api_name == ''GetHealthySecondaryReplicaInfo'' and event == ''sql_connection_query_error''

      | where strcat(sql_error_number, ''_'', sql_error_severity, ''_'', sql_error_state) in (IgnorableGetHealthySecondaryReplicaInfoErrors)

      | extend binned_timestamp = bin(originalEventTimestamp, 10m)

      | distinct LogicalServerName, logical_database_id, binned_timestamp;'
