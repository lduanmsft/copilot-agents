  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let serverName = ''{ServerName}'';

      let databaseId = ''<database_id>'';

      MonBackup

      | where LogicalServerName =~ serverName or logical_database_name =~ serverName

      | where (details startswith ''ConfigurableBackupRetention enabled for database'' and details contains ''but retention setting could not be found'') or details
      startswith ''Couldn\''t find container metadata in container''

      | where details contains databaseId

      | extend type = iff(details startswith ''ConfigurableBackupRetention'', 1, 0)

      | sort by originalEventTimestamp asc

      | serialize sum = row_cumsum(type)

      | summarize Start = min(originalEventTimestamp), End = max(originalEventTimestamp) by NodeName, Message = details, sum

      | project Start, End, NodeName, Message'
