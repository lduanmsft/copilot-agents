    ExecutedQuery: 'let serverName = ''{ServerName}'';

      let backupTypes = datatable (type: string) [ ''Log'' ]; // , ''Full'', ''CopyOnlyFull''

      MonBackup

      | where originalEventTimestamp >= ago(12h)

      | where LogicalServerName == serverName

      | where details startswith ''Using'' and details contains ''thread''

