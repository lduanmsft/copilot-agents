  Source: Troubleshooting-Guides/Backup-and-Restore/Restore-database-from-URL/Error-41935-Reached-the-total-capacity-of-storage-account.md
  Prompts:
  - MI IO virtual file stats by let, sizegb
  - MonDmIoVirtualFileStats let sizegb startTime issue
  - Investigate Error 41935 Reached the total capacity of storage account
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'let startTime = ago(1d); // issue start time

      let endTime = now(); // issue end time (scope this as much as possible)

      let appName = ''{AppName}'';

      MonDmIoVirtualFileStats

      | where TIMESTAMP between (startTime .. endTime)

      | where AppName =~ appName

      | where is_remote == 1 // check only remote storage files; this eliminates files from: master (physical master), tempdb, model, model_msdb and model_replicatedmaster
      databases

      | summarize max(TIMESTAMP), max(size_on_disk_bytes) by database_id, file_id

      | extend sizegb = max_size_on_disk_bytes / 1024.0 / 1024.0 / 1024.0

      | extend allocgb = iff(sizegb < 128.0, 128.0, sizegb)'
