- id: MI-backup-restore-82
  Topic: TSGMIBR0119-Backup-Reaching-Allowed-Blocks-Limit-MI
  Source: TSG-SQL-MI-BackupRestore/content/Backup/TSGMIBR0119-Backup-Reaching-Allowed-Blocks-Limit-MI.md
  Prompts:
  - MI XStore IO telemetry for xstore io stats
  - MonSQLXStoreIOStats LogicalServerName event string period_ms
  - Investigate backup failure
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLXStoreIOStats
    ExecutedQuery: 'let srvrName = ''sqlmi-eus2-prsntcs-prod-001'';

      MonSQLXStoreIOStats

      | where TIMESTAMP >= ago(24h)

      | where LogicalServerName == srvrName

      | where event == ''xstore_io_stats''

      | where file_path endswith ".bak" or file_path endswith ".diff"

      | parse kind=regex file_path with * ''/backup/'' temp1:string

      | parse kind=regex temp1 with temp2:string ''\\.'' backup_ext:string

      | parse kind=regex temp2 with temp3:string ''_'' stripe:int

      | parse kind=regex temp3 with temp4:string ''_S'' stripeCount:int

      | parse kind=regex temp4 with * ''/'' temp5:string

      | parse kind=regex temp5 with backup_type:string ''/'' backup_time:string

      | extend period_ms = column_ifexists(''period_ms'',-1)

      | extend period_ms = iif (isempty(period_ms), -1, period_ms)

      | extend periodSeconds = iif (period_ms==-1, 30., period_ms/1000.)

      | project TIMESTAMP, backup_type, backup_time, stripeCount, stripe, total_writes, total_write_bytes

      | summarize sum(total_write_bytes), sum(total_writes) by backup_type, backup_time, stripeCount, stripe

      | extend avg_io_size_KB = 1. * sum_total_write_bytes/sum_total_writes / 1024.'
