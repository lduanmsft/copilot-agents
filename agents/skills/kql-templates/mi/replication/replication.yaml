      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      | where connection_peer_id =~ "482E2337-4FFA-431E-81AE-F48902A18289" or peer_activity_id =~ "BA3C6416-8F56-4377-9096-E435287E1665"

      | project TIMESTAMP, logical_server_name, database_name, application_name, event, connection_peer_id, peer_activity_id, extra_info

      | order by TIMESTAMP asc'
