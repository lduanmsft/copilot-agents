- id: MI-replication-61
  Topic: Error-8510-Enlist-operation-failed
  Source: Troubleshooting-Guides/Data-Import,-Export,-Replication-and-Transactions/Distributed-Transactions/Error-8510-Enlist-operation-failed.md
  Prompts:
  - MonGlobalTransactions for dtc transaction
  - MonGlobalTransactions LogicalServerName event message transaction_id
  - Investigate Error 8510 Enlist operation failed
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonGlobalTransactions
    ExecutedQuery: 'MonGlobalTransactions

      | where LogicalServerName =~ "{ServerName}"

      | where message contains "InitForEnlist failed"

      | where TIMESTAMP > ago(30m)

      | extend SourceNodeName = NodeName

      | extend SourceAppName = AppName

      | extend transaction_id = unit_of_work_id

      | summarize cnt() by transaction_id, SourceNodeName, SourceAppName

      | join (

      MonGlobalTransactions

      | where LogicalServerName =~ "{ServerName}"

      | where event == "dtc_transaction"

      | where transaction_state == "Creating a new DTC transaction"

      | where TIMESTAMP > ago(30m)

      | extend TargetNodeName = NodeName

      | extend TargetAppName = AppName

      | extend transaction_id = unit_of_work_id

      | summarize cnt() by transaction_id , TargetNodeName , TargetAppName

      ) on transaction_id'
