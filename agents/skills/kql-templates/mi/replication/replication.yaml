  Prompts:
  - MI login event telemetry by logical_server_name, database_name
  - MonLogin logical_server_name database_name event let
  - Investigate Snapshot Agent failing Connection is broken
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let startTime = ago(1d);

      let endTime = now();

      let srv = "instancename";

      let db = "publisherdatabasename";

      MonLogin

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      | where logical_server_name =~ srv

      | where database_name =~ db

      | where application_name startswith "MIHLI.8F08E6D34D3B.DATABASE"

      | project TIMESTAMP, logical_server_name, database_name, application_name, event, connection_peer_id, peer_activity_id, extra_info

      | order by TIMESTAMP asc'
