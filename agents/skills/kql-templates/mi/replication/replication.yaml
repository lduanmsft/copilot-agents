  Topic: Snapshot-Agent-failing-Connection-is-broken
  Source: Troubleshooting-Guides/Data-Import,-Export,-Replication-and-Transactions/Transactional-Replication/Snapshot-Agent-failing-Connection-is-broken.md
  Prompts:
  - MI login event telemetry by logical_server_name, database_name
