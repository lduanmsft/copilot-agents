- id: MI-replication-24
  Topic: TSGTRCL00044-CDC-Capture-Job-Not-Running-After-Geo-Failover-on-SQL-Managed-Instance
  Source: TSG-SQL-MI-TransactionalReplication/TransactionalReplication/TSGTRCL00044-CDC-Capture-Job-Not-Running-After-Geo-Failover-on-SQL-Managed-Instance.md
  Prompts:
  - MI real-time resource telemetry by LogicalServerName, logical_database_name
  - MonDmRealTimeResourceStats LogicalServerName logical_database_name replica_role block
  - Troubleshoot CDC capture issues
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where LogicalServerName =~ "{ServerName}"

      | where logical_database_name =~ "{DatabaseName}"

      | where replica_role == 0

      | where TIMESTAMP > ago(30d)

      | sort by TIMESTAMP asc

      | extend gap = iff(TIMESTAMP - prev(TIMESTAMP) > 1h, 1, 0)

      | extend block = row_cumsum(gap)

      | summarize primary_from=min(TIMESTAMP), primary_to=max(TIMESTAMP) by block

      | project-away block'
