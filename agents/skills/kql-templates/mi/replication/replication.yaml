- id: MI-replication-28
  Topic: CDC-14-Insights-from-Kusto
  Source: Troubleshooting-Guides/Data-Import,-Export,-Replication-and-Transactions/Change-Data-Capture-and-Change-Tracking/CDC-14-Insights-from-Kusto.md
  Prompts:
  - MonAnalyticsDBSnapshot by let, startTime
