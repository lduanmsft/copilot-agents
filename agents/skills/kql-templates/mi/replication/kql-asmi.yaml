SqlSkills:
- id: MI-ASMI-REPLICATION-01
  Topic: CDC & CT
  Source: kusto-queries/CDC & CT.md
  Prompts:
  - MI CDC & CT
  - Managed Instance CDC & CT
  - Investigate CDC & CT
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCDCTraces
    ExecutedQuery: 'MonCDCTraces

      | where TIMESTAMP > ago(2d)

      | where LogicalServerName =~ "{ServerName}"

      | where logical_database_name =~ "{DatabaseName}"

      | where event == "cdc_session"

      | summarize max(TIMESTAMP), max(tran_count), max(log_record_count), max(latency) by session_id'
- id: MI-ASMI-REPLICATION-02
  Topic: CDC & CT
  Source: kusto-queries/CDC & CT.md
  Prompts:
