- id: MI-ASMI-REPLICATION-21
  Topic: Replication
  Source: kusto-queries/Replication.md
  Prompts:
  - MI Replication
  - Managed Instance Replication
  - Investigate Replication
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlAgent
    ExecutedQuery: 'let srv = "{ServerName}";  // Distributor instance name

      let startTime = datetime(2022-12-19 06:00:00Z);

      let endTime = datetime(2022-12-20 23:00:00Z);

      let timeRange = ago(7d);

      MonSqlAgent

      | where  TIMESTAMP >= startTime

      | where  TIMESTAMP <= endTime

      //| where  TIMESTAMP >= timeRange

      | where LogicalServerName =~ srv

      | where message_type in~ ("ERROR", "STARTUP_MSG", "WARNING")

      //| where message_type !in~ ("INFORMATION", "STARTUP_MSG")

      | project TIMESTAMP, AppName, LogicalServerName, event, resource_id, message_type, message'
