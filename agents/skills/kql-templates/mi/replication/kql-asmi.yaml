- id: MI-ASMI-REPLICATION-23
  Topic: Replication
  Source: kusto-queries/Replication.md
  Prompts:
  - MI Replication
  - Managed Instance Replication
  - Investigate Replication
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'let srv = "{ServerName}";     // Subscriber server

      let db  = "{DatabaseName}";   // Subscriber database

      let startTime = datetime(2024-05-08 12:00:00Z);

      let endTime   = datetime(2024-05-28 12:00:00Z);

      let timeRange = ago(7d);

      MonWiQdsExecStats

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      // | where TIMESTAMP >= timeRange

      | where LogicalServerName =~ srv

      | where database_name =~ db

      | where statement_type in ("x_estypInsertBulk")

      //| where statement_type in ("x_estypInsertBulk", "x_estypInsert")

      | extend interval_start_time_date = interval_start_time / 4294967296'
