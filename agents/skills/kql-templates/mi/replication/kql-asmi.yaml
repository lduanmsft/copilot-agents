  - Managed Instance CDC & CT
  - Investigate CDC & CT
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCDCTraces
    ExecutedQuery: 'MonCDCTraces

      | where SubscriptionId =~ "{SubscriptionId}"

      //| where LogicalServerName =~ "{ServerName}"

      //| where LogicalServerName =~ "{ServerName}" | where logical_database_name =~ "{DatabaseName}"

      //| where LogicalServerName =~ "{ServerName}" | where logical_database_name =~ "{DatabaseName}"//"BPSOA01"//

      | where event =~ "cdc_db_enable"

      | summarize by originalEventTimestamp, LogicalServerName, logical_database_name, enabled'
