- id: MI-availability-22
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MI SQL dump telemetry by RelativePath, max_TIMESTAMP
  - MonSqlDump RelativePath max_TIMESTAMP min_TIMESTAMP dmp
  - Investigate SQL dump
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlDump
    ExecutedQuery: 'MonSqlDump

      | where AppName =~ "{AppName}"

      | where RelativePath endswith ".dmp"

      | summarize min(TIMESTAMP), max(TIMESTAMP) by RelativePath, NodeName

      | project datetime_diff(''minute'', max_TIMESTAMP, min_TIMESTAMP), min_TIMESTAMP, max_TIMESTAMP, RelativePath, NodeName'
