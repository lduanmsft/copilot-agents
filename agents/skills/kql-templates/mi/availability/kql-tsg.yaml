- id: MI-availability-124
  Topic: TSGCLAVAIL0004-UnhealthyWorkerCLApp
  Source: TSG-SQL-MI-Availability/content/Index/Availability/TSGCLAVAIL0004-UnhealthyWorkerCLApp.md
