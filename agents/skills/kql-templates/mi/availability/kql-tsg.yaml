  - Investigate TSGCLAVAIL0005 UnhealthyWorkerAliasDbPdcApp
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: AlrWinFabHealthServiceState
    ExecutedQuery: 'AlrWinFabHealthServiceState

