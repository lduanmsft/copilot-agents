- id: MI-availability-5
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MonAnalyticsDBSnapshot by logical_server_name, database_name
  - MonAnalyticsDBSnapshot logical_server_name database_name logical_database_name tolower
  - Investigate HA Debug queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where service_level_objective startswith ''MI''

      | extend AppName = extract(''fabric:/.*/(.*)'', 1, fabric_application_uri)

      | where AppName == "{appName}"

      | extend DatabasePartitionId = tolower(fabric_partition_id), physical_db_id = tolower(physical_database_id), logical_database_id = tolower(logical_database_id),
      database_name = tolower(iff(fabric_service_type_name contains ''UserDb'', logical_database_id , logical_database_name ))

      | summarize MinLastUpdateTime = min(last_update_time) by AppName, DatabasePartitionId, physical_db_id, logical_database_name, logical_server_name, tenant_ring_name,
      create_time, logical_database_id, SubscriptionId = customer_subscription_id, service_level_objective, database_name'
- id: MI-availability-6
  Topic: HA-Debug-queries
