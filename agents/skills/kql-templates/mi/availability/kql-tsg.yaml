      | where PreciseTimeStamp > {startTime}

      | where request contains {appname} or parameters contains {appname}

      | where request_action in (''KillProcess'', ''ExecuteKillProcess'')

      | summarize BotActionsCounter = countif(username =~ "sqlrunner.database.windows.net"), BotActionsTimestamps = make_set_if(tostring(PreciseTimeStamp), username
      =~ "sqlrunner.database.windows.net") , OncallEngineerActionsCounter = countif(username != "sqlrunner.database.windows.net"), OncallEngineers = make_set_if(username,
      username != "sqlrunner.database.windows.net"), OncallEngineerTimestampss = make_set_if(strcat("Oncall ", username, " performed action at ", tostring(PreciseTimeStamp)),
      username != "sqlrunner.database.windows.net")

      | extend Result = iif(BotActionsCounter > 0, strcat("Number of performed bot actions is ", tostring(BotActionsCounter), ".\nTimestapms of bot actions: ", BotActionsTimestamps,
      "\n"), "")

      | extend Result = iif(OncallEngineerActionsCounter > 0, strcat(Result, "\nNumber of performed actions from oncall engineers is ", tostring(OncallEngineerActionsCounter),
      ".\nTimestapms of oncall engineer actions: ", OncallEngineerTimestampss, "\n"), "")'
