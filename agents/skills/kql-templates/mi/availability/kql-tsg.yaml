- id: MI-availability-29
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MonManagement by LogicalServerName, event
  - MonManagement LogicalServerName event op FailoverGroupId
  - Investigate MI failover
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'let getServerOperations = (clusterName: string, databaseName: string, serverName : string)

      cluster(clusterName).database(databaseName).MonManagement

      | where operation_parameters contains serverName

      | extend op = parse_xml(operation_parameters).InputParameters

      | project ClusterName, originalEventTimestamp, event, elapsed_time_milliseconds, elapsed_time, request_id, operation_type, op, operation_category

      | extend IsForcedFailover = op.IsForcedFailover

      | extend FailoverGroupName = op.FailoverGroupName

      | extend FailoverGroupId = op.FailoverGroupId

      | extend BackupLog = op.BackupLog

      | extend LogicalServerName = op.LogicalServerName

      | extend LogicalDatabaseName = op.LogicalDatabaseName

      | extend LocalDatabaseId = op.LocalDatabaseId

      | extend AvailabilityGroupId = op.AvailabilityGroupId

      | extend PartnerDatabaseId = op.PartnerDatabaseId

      | extend FreshnessNumber = op.FreshnessNumber

      | extend LocalReplicationRole = op.LocalReplicationRole

      | extend PartnerReplicationRole = op.PartnerReplicationRole

      | extend DatabaseType = op.DatabaseType

      | extend FailoverGroupId = op.FailoverGroupId

      | extend BackupLog = op.BackupLog

      | extend NewPrimaryServerName = op.NewPrimaryServerName

      | extend ManagedServerName = op.ManagedServerName

      | extend ManagedDatabaseName = op.ManagedDatabaseName

      | extend SubmitResourceHydration = op.SubmitResourceHydration

      | extend DropIfExists = op.DropIfExists

      | extend Settings_FailoverGroupId = op.Settings.FailoverGroupId

      | extend Settings_ManagedDatabaseId = op.Settings.ManagedDatabaseId

      | extend PartnerLogicalDatabaseId = op.PartnerLogicalDatabaseId

      | extend ReplicationMode = op.ReplicationMode

      | extend IsUserInitiated = op.IsUserInitiated

      | extend LogicalDatabaseName = iif(isnull(ManagedDatabaseName), LogicalDatabaseName, ManagedDatabaseName)

      | extend LogicalServerName = iif(isnull(ManagedServerName), LogicalServerName, ManagedServerName)

      | project ClusterName, originalEventTimestamp, event, elapsed_time_milliseconds, elapsed_time, request_id, operation_type, operation_category, IsForcedFailover,
      FailoverGroupName, FailoverGroupId, BackupLog,LogicalServerName,LogicalDatabaseName,LocalDatabaseId, AvailabilityGroupId, PartnerDatabaseId, FreshnessNumber,
      LocalReplicationRole,PartnerReplicationRole,DatabaseType, NewPrimaryServerName,SubmitResourceHydration, DropIfExists, Settings_FailoverGroupId,Settings_ManagedDatabaseId,
      PartnerLogicalDatabaseId, ReplicationMode,IsUserInitiated//, op

      };'
- id: MI-availability-30
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MonRecoveryTrace trend by Tokens, trace_message
  - MonRecoveryTrace Tokens trace_message hold up
  - Investigate HA Debug queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRecoveryTrace
    ExecutedQuery: 'MonRecoveryTrace

      | where AppName =~ ''{AppName}''

      | where database_id == 5

      | where originalEventTimestamp> ago(1d)

      | where trace_message contains "hold up by"

      | extend Tokens = extract_all(''About to log Checkpoint begin on dbid 5, current log space used ([0-9]+) MB, hold up by ([A-Z_]+)'', trace_message)[0]

      | project originalEventTimestamp, NodeName, LogSpaceUsed = tolong(tostring(Tokens[0])), HoldUp = tostring(Tokens[1])

      | render timechart with (xcolumn=originalEventTimestamp, ycolumns=LogSpaceUsed, series=NodeName, HoldUp)'
- id: MI-availability-31
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MI database metadata telemetry by LogicalServerName, type
  - MonDatabaseMetadata LogicalServerName type object_id schema_id
  - Investigate HA Debug queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      | where LogicalServerName =~ "{ServerName}"

      | where table_name == "sysschobjs"

      | where type == "U "

      | extend object_id = id, schema_id = nsid

      | project LogicalServerName, logical_db_name, AppName, TIMESTAMP, object_id, schema_id, type, name,'
- id: MI-availability-32
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MI login event telemetry counts for process login finish
  - MonLogin event is_success Worker CL
  - Investigate HA Debug queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where ClusterName == ''{ClusterName}''

      | where TIMESTAMP > ago(1d)

      | where event == "process_login_finish"

      | where AppTypeName == "Worker.CL" or AppTypeName == "Worker.CL.WCOW.SQL22"

      | extend read_only_connection = binary_and(login_flags, binary_shift_left(1, 21)) > 0

      | where is_success == 0

