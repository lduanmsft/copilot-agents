- id: MI-availability-25
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MonDmContinuousCopyStatus by varAppName, LastReportedAt
  - MonDmContinuousCopyStatus varAppName LastReportedAt replication_state_desc physical_database_id
  - Investigate replica health
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmContinuousCopyStatus
    ExecutedQuery: 'let varAppName = "{AppName}";

      MonDmContinuousCopyStatus

      | where AppName == varAppName

      | where link_type == "LAG_REPLICA_LINK_TYPE_CONTINUOUS_COPY"

      | where PreciseTimeStamp < ago(1d)

      | summarize LastReportedAt=argmax(PreciseTimeStamp, replication_state_desc, last_replication, replication_lag_sec) by physical_database_id, partner_server,
      partner_database, partner_replica_id

      | project LastReportedAt, physical_database_id, partner_server, partner_database, partner_replica_id, replication_state_desc = max_PreciseTimeStamp_replication_state_desc,
      last_replication_time = max_PreciseTimeStamp_last_replication, replication_lag_seconds = max_PreciseTimeStamp_replication_lag_sec'
