- id: MI-availability-160
  Topic: TSGCLAVAIL0015-Long-wait-on-replica-controller-cache
  Source: TSG-SQL-MI-Availability/content/Index/Availability/TSGCLAVAIL0015-Long-wait-on-replica-controller-cache.md
  Prompts:
  - MonWorkerWaitStats counts by wait, text_data
  - MonWorkerWaitStats wait text_data FABRIC_REPLICA_CONTROLLER_STATE_AND_CONFIG waits
  - Investigate replica health
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWorkerWaitStats
    ExecutedQuery: 'let appName = "{AppName}";

      MonWorkerWaitStats

      | where AppName == appName

      | where AppTypeName contains "Worker.CL"

      | where text_data contains ''FABRIC_REPLICA_CONTROLLER_STATE_AND_CONFIG''

      | extend waits = parse_xml(text_data)

      | extend wait = waits[''waitstats''][''wait'']

      | mv-expand wait

      | extend wait_name = wait[''@name'']

      | extend wait_time = wait[''@time'']

      | where wait_name == ''FABRIC_REPLICA_CONTROLLER_STATE_AND_CONFIG''

      | where wait_time > 30000

      | summarize count(), max(originalEventTimestamp), StuckDuration=max(originalEventTimestamp) - min(originalEventTimestamp) by ClusterName, AppTypeName, AppName,
      NodeName

      | where count_ > 100

      | where max_originalEventTimestamp > ago(30m)'
