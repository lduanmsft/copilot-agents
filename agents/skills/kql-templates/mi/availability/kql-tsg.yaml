SqlSkills:
- id: MI-availability-1
  Topic: TSGCL0139-Torn-affinity-on-BC-instance
  Source: TSG-SQL-MI-Availability/content/Index/Availability/deprecated/TSGCL0139-Torn-affinity-on-BC-instance.md
  Prompts:
  - MI login event telemetry for process login finish
  - MonLogin logical_server_name event ServerName tolower
  - Investigate MI failover
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where logical_server_name =~ "{ServerName}" or tolower(logical_server_name) in (failoverGroups)

      | where event == "process_login_finish"'
- id: MI-availability-2
  Topic: TSGCLAVAIL0005-UnhealthyWorkerAliasDbPdcApp
  Source: TSG-SQL-MI-Availability/content/Index/Availability/deprecated/TSGCLAVAIL0005-UnhealthyWorkerAliasDbPdcApp.md
  Prompts:
  - AlrWinFabHealthApplicationState trend by state, HealthState
  - AlrWinFabHealthApplicationState state HealthState cluster_name ApplicationName
  - Investigate TSGCLAVAIL0005 UnhealthyWorkerAliasDbPdcApp
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: AlrWinFabHealthApplicationState
    ExecutedQuery: 'AlrWinFabHealthApplicationState

      | where PreciseTimeStamp > ago(45min)

      | where ClusterName == {cluster_name}

      | where ApplicationName == "fabric:/Worker.AliasDb.PDC/{app_name}"

      | order by PreciseTimeStamp desc

      | extend state = iff(HealthState == "Ok", 2, iff(HealthState == "Warning", 1, 0))

      | project PreciseTimeStamp, state

      | render timechart'
- id: MI-availability-3
  Topic: TSGCLAVAIL0005-UnhealthyWorkerAliasDbPdcApp
  Source: TSG-SQL-MI-Availability/content/Index/Availability/deprecated/TSGCLAVAIL0005-UnhealthyWorkerAliasDbPdcApp.md
  Prompts:
  - MI SQL dumper activity by cluster_name, WF
  - MonSqlDumperActivity cluster_name WF TargetProcess xdbhostmain
  - Investigate SQL dump
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlDumperActivity
    ExecutedQuery: 'MonSqlDumperActivity

      | where ClusterName contains {cluster_name}

      | where TIMESTAMP > ago(2h)

      | where NodeName contains "WF"

      | where TargetProcess == "xdbhostmain.exe"'
- id: MI-availability-4
  Topic: TSGCLAVAIL0005-UnhealthyWorkerAliasDbPdcApp
  Source: TSG-SQL-MI-Availability/content/Index/Availability/deprecated/TSGCLAVAIL0005-UnhealthyWorkerAliasDbPdcApp.md
  Prompts:
  - AlrWinFabHealthServiceState trend by state, HealthState
