- id: MI-availability-66
  Topic: TRDB0102-CL-LongRecovery-RCA
  Source: TSG-SQL-MI-Availability/content/Index/Availability/TRDB0102-CL-LongRecovery-RCA.md
  Prompts:
  - MonRecoveryTrace by LogicalServerName, database_name
  - MonRecoveryTrace LogicalServerName database_name trace_message int
  - Investigate MI unavailability
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRecoveryTrace
    ExecutedQuery: 'MonRecoveryTrace

      | where AppTypeName == "Worker.CL"

      | where AppName == "<app_name>" and database_name == tolower("<database_id>")

      | where trace_message startswith "Dirty Page Table summary" or trace_message startswith "Estimate: Redo =" or trace_message == "Starting database recovery."
      or trace_message startswith "Recovery completed for database" or trace_message == "Redo phase done."

      | parse trace_message with "Dirty Page Table summary: page count = " dirtyPages:int "."

      | parse trace_message with "Recovery completed" * "(analysis " analysisMs:int " ms, redo " redoMs:int " ms, undo " undoMs:int " ms.)" *

      | parse trace_message with "Estimate: REDO = " redoLogBytes:int64 " bytes of log, UNDO = " undoTransactions:int " transactions and " undoLogRecords:int " log
      records." *

      | order by SubscriptionId, LogicalServerName, database_name, originalEventTimestamp asc

      | extend recoveryStart = iif(trace_message == "Starting database recovery.", 1, 0)

      | extend prev_server = prev(LogicalServerName), prev_db = prev(database_name)

      | extend recoveryNumber = row_cumsum(recoveryStart, LogicalServerName != prev_server or database_name != prev_db)

      | where recoveryNumber != 0

      | summarize max(analysisMs), max(redoMs), max(undoMs), max(dirtyPages), max(undoTransactions), redoLogMb = max(redoLogBytes) / 1024.0 / 1024, max(undoLogRecords),
      min(TIMESTAMP), max(TIMESTAMP)

      by SubscriptionId, LogicalServerName, database_name, recoveryNumber

      | extend unavailabilitySeconds = (max_analysisMs + max_redoMs) / 1000.0'
