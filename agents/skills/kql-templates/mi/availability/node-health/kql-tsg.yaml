SqlSkills:
- id: MI-node-health-1
  Topic: TSGCLHE005-Stuck_Database_Drop_Hermes_Drive_Path_Mismatch
  Source: content/Hermes/TSGCLHE005-Stuck_Database_Drop_Hermes_Drive_Path_Mismatch.md
  Prompts:
  - MI TSGCLHE005 Stuck_Database_Drop_Hermes_Drive_Path_Mismatch
  - Managed Instance TSGCLHE005 Stuck_Database_Drop_Hermes_Drive_Path_Mismatch
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedInstanceInfo
    ExecutedQuery: |-
      MonManagedInstanceInfo
      | where TIMESTAMP > ago(1d)
      | where logical_server_name =~ '<ManagedServerName>'
      | summarize arg_max(TIMESTAMP, ClusterName, NodeName, AppName) by logical_server_name
- id: MI-node-health-2
  Topic: TSGCLHE005-Stuck_Database_Drop_Hermes_Drive_Path_Mismatch
  Source: content/Hermes/TSGCLHE005-Stuck_Database_Drop_Hermes_Drive_Path_Mismatch.md
  Prompts:
  - MI TSGCLHE005 Stuck_Database_Drop_Hermes_Drive_Path_Mismatch
  - Managed Instance TSGCLHE005 Stuck_Database_Drop_Hermes_Drive_Path_Mismatch
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonNodeAgentEvents
    ExecutedQuery: |-
      MonNodeAgentEvents
      | where TIMESTAMP > ago(1h)
      | where NodeName == "<NodeName_from_Step1b>"
      | where message has "<file_guid>"  // e.g. "ebb39c11" or "56b816d0"
      | project TIMESTAMP, event, message
      | order by TIMESTAMP desc
- id: MI-node-health-3
  Topic: TSGCLHE005-Stuck_Database_Drop_Hermes_Drive_Path_Mismatch
  Source: content/Hermes/TSGCLHE005-Stuck_Database_Drop_Hermes_Drive_Path_Mismatch.md
  Prompts:
  - MI TSGCLHE005 Stuck_Database_Drop_Hermes_Drive_Path_Mismatch
  - Managed Instance TSGCLHE005 Stuck_Database_Drop_Hermes_Drive_Path_Mismatch
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: |-
      let _ClusterName = "<tenant_ring_name>";
      let _NodeName = "<NodeName_from_Step1b>";
      let _DriveLetter = "N:";  // from Step 1 DriveLetter column
      let _StartTime = datetime(<before_cleanup_time>);
      let _EndTime = datetime(<after_cleanup_time>);
      MonCounterOneMinute
      | where TIMESTAMP between(_StartTime .. _EndTime)
      | where ClusterName == _ClusterName
      | where NodeName == _NodeName
      | where CounterName in (
          strcat("\\LogicalDisk(", _DriveLetter, ")\\% Free Space"),
          strcat("\\LogicalDisk(", _DriveLetter, ")\\Free Megabytes")
        )
      | project TIMESTAMP, CounterName, CounterValue
      | render timechart
