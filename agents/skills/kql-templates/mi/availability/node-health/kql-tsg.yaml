- id: MI-node-health-12
  Topic: Useful-Kusto-queries
  Source: Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful Kusto queries
  - Managed Instance Useful Kusto queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: |-
      MonCounterOneMinute
      | where TIMESTAMP between(datetime(2024-10-01 20:00:00)..datetime(2024-10-02 05:00:00))
      //
      | where TIMESTAMP > ago(30d)
      | where ClusterName == tenantRingName
      | where NodeName == nodeName
      | where CounterName endswith "Rejected Connections/sec"
      | project TIMESTAMP, NodeName, CounterValue
      | render timechart
- id: MI-node-health-13
  Topic: Useful-Kusto-queries
  Source: Performance-and-Query-Execution/Reference/Useful-Kusto-queries.md
  Prompts:
  - MI Useful Kusto queries
  - Managed Instance Useful Kusto queries
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlDump
    ExecutedQuery: |-
      MonSqlDump
      | where LogicalServerName =~ ServerName
      | where TIMESTAMP > ago(7d)
      | where CompleteFileName endswith '.dmp'
      | summarize TIMESTAMP = min(TIMESTAMP) by AppName, ClusterName, NodeName, CompleteFileName
      | project TIMESTAMP, AppName, ClusterName, NodeName, CompleteFileName
      | order by TIMESTAMP asc
