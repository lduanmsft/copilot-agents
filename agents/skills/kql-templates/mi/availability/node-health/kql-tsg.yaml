- id: MI-node-health-7
  Topic: TSGCL0279-Hermes-Managed-server-encountered-a-stuck-upsert-operation
  Source: content/sql_cloud_lifter_notebook/TSGCL0279-Hermes-Managed-server-encountered-a-stuck-upsert-operation.md
  Prompts:
  - MI TSGCL0279 Hermes Managed server encountered a stuck upsert operation
  - Managed Instance TSGCL0279 Hermes Managed server encountered a stuck upsert operation
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonNodeAgentEvents
    ExecutedQuery: |-
      MonNodeAgentEvents
      | where TIMESTAMP > ago(7d)
      | where ClusterName == "{ClusterName}"
      | where message contains "CheckIfDisksBecameLocallyVisible" and message contains "script output"
      | summarize arg_max(TIMESTAMP, *) by NodeName
      | project originalEventTimestamp, NodeName, message
- id: MI-node-health-8
  Topic: Transaction-log-usage-increases-during-failover
  Source: Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Transaction-log-usage-increases-during-failover.md
  Prompts:
  - MI Transaction log usage increases during failover
  - Managed Instance Transaction log usage increases during failover
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: |-
      MonSQLSystemHealth
      | where TIMESTAMP  between (datetime(2023-03-07 12:00:00)..datetime(2023-03-07 17:00:00))
      | where LogicalServerName =~ "{ServerName}"
      | summarize min(PreciseTimeStamp), max(PreciseTimeStamp) by ClusterName, NodeName, process_id
- id: MI-node-health-9
  Topic: Transaction-log-usage-increases-during-failover
  Source: Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Transaction-log-usage-increases-during-failover.md
  Prompts:
  - MI Transaction log usage increases during failover
  - Managed Instance Transaction log usage increases during failover
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonClusterLoad
    ExecutedQuery: |-
      MonClusterLoad
      | where ClusterName contains "{cluster_name}"
      | where TIMESTAMP  between (datetime(2023-03-07 12:00:00)..datetime(2023-03-07 17:00:00))
      | where node_type == "DB"
      | where event == "node_state_report"
      | project SnapshotTimestamp, node_name, code_version, config_version, health_state, node_status, node_type, node_up_time, upgrade_domain
      | summarize min(SnapshotTimestamp), max(SnapshotTimestamp) by  node_status, upgrade_domain, config_version, code_version, node_name, bin(SnapshotTimestamp,1h)
