- id: MI-availability-239
  Topic: TSGCHIMERA0003-IsHybridLag-Deadlock
  Source: TSG-SQL-MI-Availability/content/Index/Chimera/TSGCHIMERA0003-IsHybridLag-Deadlock.md
  Prompts:
  - MI deadlock reports by node
  - MonWorkerWaitStats AppName AppTypeName text_data
  - Check MonWorkerWaitStats AppName AppTypeName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonWorkerWaitStats
    ExecutedQuery: 'let appName = {app name from the ICM};

      MonWorkerWaitStats

      | where AppName == appName

      | where AppTypeName contains "Worker.CL"

      | where text_data contains ''FABRIC_REPLICA_CONTROLLER_STATE_AND_CONFIG''

      | extend waits = parse_xml(text_data)

      | extend wait = waits[''waitstats''][''wait'']

      | mv-expand wait

      | extend wait_name = wait[''@name'']

      | extend wait_time = wait[''@time'']

      | where wait_name == ''FABRIC_REPLICA_CONTROLLER_STATE_AND_CONFIG''

      | where wait_time > 30000

      | summarize count(), max(originalEventTimestamp), StuckDuration=max(originalEventTimestamp) - min(originalEventTimestamp) by ClusterName, AppTypeName, AppName, NodeName

      | where count_ > 100

      | where max_originalEventTimestamp > ago(30m)'
