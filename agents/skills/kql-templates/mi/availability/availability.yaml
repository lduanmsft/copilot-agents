  Source: asmi-troubleshooter-package/SLO history.md
  Prompts:
  - MI database CPU and memory stats
  - MonDmDbResourceGovernance primary_bucket_fill_rate_cpu
  - Check MonDmDbResourceGovernance primary_bucket_fill_rate_cpu
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmDbResourceGovernance
    ExecutedQuery: 'MonDmDbResourceGovernance

      | where AppName !startswith ''b-'' and AppName !startswith ''v-''

      | extend MaxCPUCores = case (primary_bucket_fill_rate_cpu == 0, (primary_group_max_cpu*min_cores)/100.0, primary_bucket_fill_rate_cpu/1000.0)'
