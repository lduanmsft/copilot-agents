  - Check MonSqlMemoryClerkStats memory_clerk_type MemoryInGB
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlMemoryClerkStats
    ExecutedQuery: 'MonSqlMemoryClerkStats

      | where  TIMESTAMP >= ago(12h)

      | where LogicalServerName =~ {server_name}

      | extend MemoryInGB = round(pages_kb/1024.0/1024,1)

      | top-nested of bin(TIMESTAMP, 5min) by max(MemoryInGB), top-nested 10 of memory_clerk_type by MaxMemInGB=max(MemoryInGB) desc

      | sort by TIMESTAMP asc nulls last

      | project TIMESTAMP, memory_clerk_type, MaxMemInGB

      | render timechart'
