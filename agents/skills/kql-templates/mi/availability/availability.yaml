- id: MI-availability-111
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MI login and connection errors by database
  - MonUcsConnections PreciseTimeStamp LogicalServerName
  - Check MonUcsConnections physical_database_id cnt
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonUcsConnections
    ExecutedQuery: 'MonUcsConnections

      | where PreciseTimeStamp > seeding_start_time

      | where PreciseTimeStamp < now()

      | where LogicalServerName =~ server_name_from_mo

      | where address !contains "net:5022"

      | project PreciseTimeStamp, event, connection_id, setup_event, address

      | extend DatabaseGUID = toupper(extract(@";Database=\[(.*?)\]", 1, address))

      | summarize arg_max(PreciseTimeStamp, *) by DatabaseGUID

      )  on $left.physical_database_id == $right.DatabaseGUID

      | parse address with "TCP://" part_before_server ";Server=" server ";Database=" database

      | project address, part_before_server, logical_database_name, physical_database_id

      | summarize cnt = count_distinct(part_before_server) by  logical_database_name

      | project logical_database_name, cnt ,  has_alias_issues = iff ( cnt == 1, true, false )

      | where has_alias_issues == true'
- id: MI-availability-112
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MI memory pressure and OOM analysis by node
  - MonCounterOneMinute ClusterName NodeName CounterName
  - Check MonCounterOneMinute ClusterName NodeName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'let startTime = datetime(2025-12-23 20:00:55.9860468);

      let endTime = datetime(2025-12-23 21:00:55.9860468);

      let tenantRing = "tr40260.eastus2-a.worker.database.windows.net";

      let nodeName = ''_DB32C_0''; //WF or DB

      MonCounterOneMinute

      | where TIMESTAMP between (startTime .. endTime)

      | where ClusterName == tenantRing

      | where NodeName contains nodeName

      | where CounterName == ''\\Memory\\Available MBytes''

      | project PreciseTimeStamp, AvailableMemory=MinVal, NodeName

      | summarize min(AvailableMemory) by bin(PreciseTimeStamp, 1min), NodeName

      | order by PreciseTimeStamp asc, NodeName asc

      | join kind=inner (MonCounterOneMinute

      | where TIMESTAMP between(startTime..endTime)

      | where ClusterName contains tenantRing

      | where NodeName contains nodeName

      | where CounterName == ''\\Processor Information(_Total)\\% Processor Time''

      | project PreciseTimeStamp, MaxVal, NodeName

      | summarize max_CPU=max(MaxVal) by bin(PreciseTimeStamp, 1min), NodeName

      | order by PreciseTimeStamp asc, NodeName asc)

      on PreciseTimeStamp

      | project PreciseTimeStamp, NodeName, min_AvailableMemory, max_CPU

      | render timechart with (ysplit=panels)'
- id: MI-availability-113
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MI resource usage analysis by node
  - Unknown ClusterName Text TaskName
  - Check Unknown ClusterName Text
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: Unknown
    ExecutedQuery: 'let startTime =  datetime(2025-09-20 14:30);

      let endTime = datetime(2025-09-20 15:30);

      let appName = "fb09a6e1fa0c";

      let clusterName = "tr10209.japaneast1-a.worker.database.windows.net";

      let nodeName = "_DB4C_0";

      let opNotFinishedTag = "NotFinished";

      let ncCreationStartTraces = WinFabLogs

      let ncCreationEndTraces = WinFabLogs

      let podCreationStartTraces = WinFabLogs

      let podCreationEndTraces = WinFabLogs

      let contCreationStartTraces = WinFabLogs

      let contCreationEndTraces = WinFabLogs

      | where ETWTimestamp between (startTime .. endTime)

      | where ClusterName =~ clusterName

      | where Text contains "Worker.CL.WCOW"

      | where TaskName =~ "Hosting"

      | where EventType =~ "ByoVnetProvider"

      | where NodeName =~ nodeName

      | where Text startswith "ManageNetworkContainersAsyncOperation"

      | parse Text with "ManageNetworkContainersAsyncOperation" * "Action = " Action " " * "ApplicationName = " FullAppName " " * "PodName = " PodName " " * "NetworkContainerId = " NcId " " *

      | where FullAppName contains appName

      | where Action =~ "Assign"

      | project NcCreationStartTime = ETWTimestamp, ClusterName, NodeName, FullAppName, NcId = tolower(NcId), PodName = tolower(PodName);

      | where ETWTimestamp between (startTime .. endTime)

      | where ClusterName =~ clusterName

      | where TaskName =~ "Hosting"

      | where EventType =~ "ByoVnetProvider"

      | where Text startswith "End(ValidateCreateNetworkContainer)"

      | parse Text with "End(ValidateCreateNetworkContainer)" *"ContainerId=" NcId " " * "ErrorCode=" ErrorCode " " ErrorMessage

      | extend NcErrorMessage = iif(ErrorCode == ''S_OK'', '''', ErrorMessage)

      | parse NcErrorMessage with * "ErrorCode = " NcErrorCodeLvl1 " " * "Message = " NcErrorMessageLvl1 "HttpStatus" *

      | project NcCreationEndTime = ETWTimestamp, ClusterName, NodeName, NcId = tolower(NcId), ErrorCode, NcErrorMessage, NcErrorCodeLvl1, NcErrorMessageLvl1;

      | where ETWTimestamp between (startTime .. endTime)

      | where ClusterName =~ clusterName

      | where TaskName =~ "Hosting"

      | where EventType =~ "CriContainerActivator"

      | where Text startswith "Creating Pod"

      | parse Text with "Creating Pod. Name=" PodName ","  *

      | project PodCreationStartTime = ETWTimestamp, ClusterName, NodeName, PodName = tolower(PodName);

      | where ETWTimestamp between (startTime .. endTime)

      | where ClusterName =~ clusterName

      | where TaskName =~ "Hosting"

      | where EventType =~ "CriContainerActivator"

      | where Text startswith "OnRunPodSandbox"

      | parse Text with "OnRunPodSandbox" * "PodName=" PodName ","  * "PodId=" PodId "," * "Error=" PodErrorCode "," * "ErrorMessage=" PodErrorMessage

      | extend PodErrorMessage = iif(PodErrorMessage == ''.'', "", PodErrorMessage)

      | project PodCreationEndTime = ETWTimestamp, ClusterName, NodeName, PodName = tolower(PodName), PodId = tolower(PodId), PodErrorCode, PodErrorMessage;

      | where ETWTimestamp between (startTime .. endTime)

      | where ClusterName =~ clusterName

      | where TaskName =~ "Hosting"

      | where EventType =~ "CriContainerActivator"

      | where Text contains "CreateContainerRequest JSON" and Text contains "Worker.CL.Wcow"

      | parse Text with "ContainerName=" ContainerName "\t" * "\"podSandboxId\": \"" PodId "\"" *

      | project ContCreationStartTime = ETWTimestamp, ClusterName, NodeName, ContainerName = tolower(ContainerName), PodId = tolower(PodId);

      | where ETWTimestamp between (startTime .. endTime)

      | where ClusterName =~ clusterName

      | where TaskName =~ "Hosting"

      | where EventType =~ "CriContainerActivator"

      | where Text startswith "OnContainerStarted"

      | parse Text with "OnContainerStarted" * "ContainerName=" ContainerName ","  * "Error=" ContErrorCode "," * "ErrorMessage=" ContErrorMessage

      | extend ContErrorMessage = iif(ContErrorMessage == ''.'', "", ContErrorMessage)

      | project ContCreationEndTime = ETWTimestamp, ClusterName, NodeName, ContainerName = tolower(ContainerName), ContErrorCode, ContErrorMessage;'
