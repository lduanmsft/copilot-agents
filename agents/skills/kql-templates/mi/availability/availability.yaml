- id: MI-availability-107
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MI replica health and role by database
  - MonDmDbHadrReplicaStates PreciseTimeStamp is_forwarder
  - Check MonDmDbHadrReplicaStates is_forwarder
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmDbHadrReplicaStates
    ExecutedQuery: 'MonDmDbHadrReplicaStates

      | where PreciseTimeStamp > startTime and PreciseTimeStamp < endTime

      | extend Name1 = LogicalServerName

      | where last_hardened_lsn != 0

      //| where LogicalServerName in (''tokens-ctplegacy-4-prod-centralus'', ''tokens-ctplegacy-3-prod-centralus'', ''tokens-ctplegacy-2-prod-centralus'', ''tokens-ctplegacy-1-prod-centralus'')

      | where is_forwarder == 1

      | summarize arg_max(PreciseTimeStamp, last_hardened_lsn) by LogicalServerName, logical_database_name, Name1

      //| where last_hardened_lsn != 0

      | extend logical_database_id = toupper(logical_database_name)) on Name1, logical_database_id

      // Get last hardened LSN on the old primary before split brain was resolved

      | join kind = leftouter (MonDmDbHadrReplicaStates

      | where PreciseTimeStamp > startTime and PreciseTimeStamp < endTime

      //| where LogicalServerName in (''tokens-ctplegacy-4-prod-centralus'', ''tokens-ctplegacy-3-prod-centralus'', ''tokens-ctplegacy-2-prod-centralus'', ''tokens-ctplegacy-1-prod-centralus'')

      | where is_forwarder == 0 and is_primary_replica == 1

      | where internal_state_desc == "GLOBAL_PRIMARY"

      summarize arg_max(PreciseTimeStamp, last_hardened_lsn) by LogicalServerName, logical_database_name

      | extend logical_database_id = toupper(logical_database_name))

      on logical_database_id, LogicalServerName

      | project logical_database_name, logical_server_name, last_hardened_lsn, last_hardened_lsn1, customer_subscription_id, role, failover_performed

      | extend has_data_loss = (iff (last_hardened_lsn != last_hardened_lsn1 and failover_performed == 1, 1, 0))

      | order by has_data_loss desc

      | project subscription_id = customer_subscription_id, server = logical_server_name, db = logical_database_name, last_common_lsn = last_hardened_lsn, last_old_primary_lsn = last_hardened_lsn1, role,
      failover_performed'
