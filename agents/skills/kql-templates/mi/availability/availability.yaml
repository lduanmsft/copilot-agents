      | where request_action in (''KillProcess'', ''ExecuteKillProcess'')

      | summarize BotActionsCounter = countif(username =~ "sqlrunner.database.windows.net"), BotActionsTimestamps = make_set_if(tostring(PreciseTimeStamp), username =~ "sqlrunner.database.windows.net")
      , OncallEngineerActionsCounter = countif(username != "sqlrunner.database.windows.net"), OncallEngineers = make_set_if(username, username != "sqlrunner.database.windows.net"), OncallEngineerTimestampss
