- id: MI-availability-78
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MI resource usage analysis
  - WinFabLogs TIMESTAMP ClusterName TaskName Primary
  - Check TIMESTAMP Primary
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: WinFabLogs
    ExecutedQuery: 'let NodeNames=WinFabLogs

      | where TIMESTAMP > ago(7d)

      | where ClusterName == ''{ClusterName}''

      | where TaskName == ''FM'' and EventType == ''NodeState'' and Text contains ''NodeName:''

      | extend NodeId = Id

      | extend MappedNodeName = extract(''NodeName: ([^\n\t\r ]+)'', 1, Text)

      | where MappedNodeName startswith ''DB''

      | distinct NodeId, MappedNodeName;

      WinFabLogs

      | where EventType == "Operation" and TaskName == "CRM"

      | extend Reason = extract("Phase: *([A-z]+)", 1, Text)

      | extend Action = extract("Action: *([A-z]+)", 1, Text)

      | extend AppName = extract("fabric:/Worker.CL/(.+)/(.+)/(.+)", 1, Text)

      | extend ServiceName = extract("fabric:/Worker.CL/.+? ", 0, Text)

      | extend SourceNodeId = extract("SourceNode: *([A-z0-9]+)", 1, Text)

      | extend TargetNodeId = extract("TargetNode: *([A-z0-9]+)", 1, Text)

      | extend PartitionId = extract("PartitionId: *([A-z\\-0-9]+)", 1, Text)

      | where ClusterName== "{ClusterName}"

      | project ETWTimestamp, ClusterName,  Id, Reason, Text, AppName, Action, SourceNodeId, TargetNodeId, PartitionId, ServiceName

      | extend DecisionId = extract("DecisionId: *([a-z\\-0-9]+)", 1, Text)

      | join kind= inner (

      WinFabLogs

      | extend DecisionId = Id

      | summarize by DecisionId, Text

      ) on DecisionId

      | project ETWTimestamp , Text , Text1, Action, Reason, SourceNodeId, TargetNodeId, PartitionId, ServiceName

      | where Text contains "Primary"

      | join kind=leftouter(NodeNames) on $left.SourceNodeId == $right.NodeId

      | join kind=leftouter(NodeNames) on $left.TargetNodeId == $right.NodeId

      | project ETWTimestamp,Reason, Action, PartitionId, ServiceName, SourceNode = MappedNodeName, TargetNode = MappedNodeName1'
