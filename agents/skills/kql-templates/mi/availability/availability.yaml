      <span style="color:   mediumvioletred">NodeId</span> = <span style="color:mediumvioletred">NodeIdArr</span> <br />  \| <span style="color:red">project </span><span style="color:mediumvioletred">PartitionId</span>
      = <span style="color:mediumvioletred">Id</span>, <span style="color:mediumvioletred">IsUp</span> = <span style="color:blue">tostring</span>(<span style="color:mediumvioletred">IsUp</span>), <span
      style="color:mediumvioletred">NodeId</span> = <span style="color:blue">tostring</span>(<span style="color:mediumvioletred">NodeId</span>) <br />  \| <span style="color:red">join </span><span style="color:#2B91AF">kind</span>=<span
      style="color:blue">leftouter</span> (<span style="color:purple">NodeInfo</span>) <span style="color:blue">on </span><span style="color:mediumvioletred">NodeId</span> <br />  \| <span style="color:red">where
