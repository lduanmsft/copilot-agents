    ExecutedQuery: 'MonRecoveryTrace

      | where AppName == "{AppName}"

      | where database_name =~ "{LogicalDatabaseId}"

      | where event == "database_recovery_times"

      | project TIMESTAMP, recovery_time, recovery_step'
- id: MI-availability-13
  Topic: Dump
  Source: asmi-troubleshooter-package/Dump.md
  Prompts:
  - MI dump and crash analysis by server
  - MonSqlDump LogicalServerName TIMESTAMP CompleteFileName
  - Check MonSqlDump CompleteFileName MonSqlDump
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlDump
    ExecutedQuery: 'let ServerName = "{ServerName}" ;let daysAgo=7d;MonSqlDump| where LogicalServerName =~ ServerName| where TIMESTAMP > ago(7d)| where CompleteFileName endswith ''.dmp''| summarize TIMESTAMP
      = min(TIMESTAMP) by AppName, ClusterName, NodeName, CompleteFileName| project TIMESTAMP, AppName, ClusterName, NodeName, CompleteFileName

      let ServerName = "{ServerName}" ;

      let daysAgo=7d;

      MonSqlDump

      | where LogicalServerName =~ ServerName

      | where TIMESTAMP > ago(7d)

      | where CompleteFileName endswith ''.dmp''

      | summarize TIMESTAMP = min(TIMESTAMP) by AppName, ClusterName, NodeName, CompleteFileName'
