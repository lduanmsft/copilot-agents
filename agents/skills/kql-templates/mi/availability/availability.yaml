- id: MI-availability-12
  Topic: Recovery
  Source: asmi-troubleshooter-package/Recovery.md
  Prompts:
  - MI seeding progress and failures by database
  - MonRecoveryTrace AppName database_name event
  - Check MonRecoveryTrace AppName database_name
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
