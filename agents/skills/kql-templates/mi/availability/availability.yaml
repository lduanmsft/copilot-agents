- id: MI-availability-63
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MI rollout and upgrade status
  - Unknown ClusterName TaskName EventType
  - Check Unknown ClusterName TaskName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: Unknown
    ExecutedQuery: 'let varClusterName = @"tr48.australiasoutheast1-a.worker.database.windows.net";

      | where ClusterName ==  varClusterName

      | where TaskName == "FM"

      | where EventType == "DeactivateNode"

      | extend InfraUpgrade = iff(Text contains "PlatformUpdate" or TaskName contains "TenantUpdate", 1, 0)

      | union (

      WinFabLogs

      | where ClusterName ==  varClusterName

      | where TaskName == "PLB"

      | where EventType == "UpdateUpgradeCompletedUDs"

      | project TIMESTAMP, Text

      | summarize arg_min(TIMESTAMP, Text) by Text

      | project TIMESTAMP, Text1

      | summarize UDsInUpgrade = count() by bin(TIMESTAMP, 1h)

      )

      | union (

      WinFabLogs

      | where ClusterName ==  varClusterName

      | where TaskName == "PLB"

      | where EventType contains "UpdateApplication"

      | where Text contains "upgradeInProgress: true"

      | project TIMESTAMP, Id

      )

      | summarize InfraUpgrade = iff(max(InfraUpgrade) > 0, 1, 0), SFUpgrade = iff(count() > 0, 1, 0), AppUpgrade = iff(dcount(Id) > 0, 1, 0) by bin(TIMESTAMP, 1h)

