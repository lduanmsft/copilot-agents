      | extend Result = iif(BotActionsCounter > 0, strcat("Number of performed bot actions is ", tostring(BotActionsCounter), ".\nTimestapms of bot actions: ", BotActionsTimestamps, "\n"), "")

      | extend Result = iif(OncallEngineerActionsCounter > 0, strcat(Result, "\nNumber of performed actions from oncall engineers is ", tostring(OncallEngineerActionsCounter), ".\nTimestapms of oncall engineer
