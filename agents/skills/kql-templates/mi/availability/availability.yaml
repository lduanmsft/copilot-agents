- id: MI-availability-160
  Topic: TSGCL0178-Long-running-dumps-detected
  Source: TSG-SQL-MI-Availability/content/Index/Availability/TSGCL0178-Long-running-dumps-detected.md
  Prompts:
  - MI dump and crash analysis
  - MonSqlDump AppName CompleteFileName RelativePath
  - Check MonSqlDump AppName CompleteFileName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlDump
    ExecutedQuery: 'MonSqlDump

      | where AppName == ''{AppName}''

      | where CompleteFileName endswith "dmp"

      | summarize min(TIMESTAMP), max(TIMESTAMP) by RelativePath'
- id: MI-availability-161
  Topic: TSGCL0178-Long-running-dumps-detected
  Source: TSG-SQL-MI-Availability/content/Index/Availability/TSGCL0178-Long-running-dumps-detected.md
