- id: MI-availability-96
  Topic: HA-Debug-queries
  Source: TSG-SQL-MI-Availability/content/Index/Availability/HA-Debug-queries.md
  Prompts:
  - MI rollout and upgrade status
  - MonRolloutProgress PreciseTimeStamp event
  - Check MonRolloutProgress event winfab_cluster_name
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRolloutProgress
    ExecutedQuery: 'MonRolloutProgress

      | where PreciseTimeStamp > datetime(2023-05-30 06:59) and PreciseTimeStamp < datetime(2023-05-30 09:59)

      | where event == ''winfab_infra_status_changed''

      | where winfab_cluster_name in (''tr11263.northeurope1-a.worker.database.windows.net'')

      //| project originalEventTimestamp, winfab_infra_old_status, winfab_infra_new_status, winfab_cluster_name

      | extend Jobs = parse_json(winfab_infra_new_status).Jobs

      | mv-expand Jobs

      | extend IsActive = parse_json(Jobs).IsActive

      | extend JobId = tostring(parse_json(Jobs).Id)

      | extend ImpactAction = tostring(parse_json(Jobs).ImpactAction)

      | extend ImpactStep = parse_json(Jobs).ImpactStep

      | extend AcknowledgementStatus = parse_json(Jobs).AcknowledgementStatus

      | extend ActionStatus = parse_json(Jobs).NotExecuted

      | extend CurrentUD = tostring(parse_json(Jobs).CurrentUD)

      | extend CurrentlyImpactedRoleInstances = parse_json(Jobs).CurrentlyImpactedRoleInstances

      | extend PendingActions = parse_json(Jobs).PendingActions

      | extend AllowedActions = parse_json(Jobs).AllowedActions

      | mv-expand parse_json(Jobs).CurrentlyImpactedRoleInstances

      | extend Node = tostring(parse_json(Jobs_CurrentlyImpactedRoleInstances).Name)

      | extend ImpactTypes = tostring(parse_json(Jobs_CurrentlyImpactedRoleInstances).ImpactTypes)

      | summarize arg_min(originalEventTimestamp,*) by JobId, ImpactAction, CurrentUD, Node, ImpactTypes

      | project ImpactStartTime = originalEventTimestamp, JobId, ImpactAction, CurrentUD, Node, ImpactTypes

      | order by ImpactStartTime asc'
