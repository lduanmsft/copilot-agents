      style="color:mediumvioletred">NodeName </span><span style="color:blue">contains </span><span style="color:purple">vCores</span> <br />  <span style="color:blue">and </span><span style="color:mediumvioletred">State</span>
      == <span style="color:firebrick">"RD"</span> <br />  <span style="color:blue">and </span><span style="color:mediumvioletred">CurrRole</span> == <span style="color:firebrick">"S"</span> <br />  <span
      style="color:blue">and </span><span style="color:mediumvioletred">NodeFd </span><span style="color:blue">in</span> (<span style="color:purple">CandidateFDs</span>) <br />  <span style="color:blue">and
      </span><span style="color:mediumvioletred">NodeUd </span><span style="color:blue">in</span> (<span style="color:purple">CandidateUDs</span>) <br />  \| <span style="color:red">summarize </span><span
      style="color:blue">by </span><span style="color:mediumvioletred">PartitionId</span>, <span style="color:mediumvioletred">ServiceName</span>, <span style="color:mediumvioletred">NodeName</span>, <span
      style="color:mediumvioletred">NodeFd</span>, <span style="color:mediumvioletred">NodeUd</span>, <span style="color:mediumvioletred">CrossJoin</span> <br />  \| <span style="color:red">join </span><span
      style="color:#2B91AF">kind</span> = <span style="color:blue">inner</span> ( <br />  <span style="color:purple">CandidateReplicas </span><span style="color:green">// Extend with FD/UD list of all replicas
      in a partition</span> <br />  \| <span style="color:red">summarize </span><span style="color:mediumvioletred">AllReplicaFD</span> = <span style="color:blue">makeset</span>(<span style="color:mediumvioletred">NodeFd</span>),
      <span style="color:mediumvioletred">AllReplicaUD</span> = <span style="color:blue">makeset</span>(<span style="color:mediumvioletred">NodeUd</span>) <span style="color:blue">by </span><span style="color:mediumvioletred">PartitionId</span>
      <br />  \| <span style="color:red">project </span><span style="color:mediumvioletred">AllReplicaFD</span> = <span style="color:blue">tostring</span>(<span style="color:mediumvioletred">AllReplicaFD</span>),
      <span style="color:mediumvioletred">AllReplicaUD</span> = <span style="color:blue">tostring</span>(<span style="color:mediumvioletred">AllReplicaUD</span>), <span style="color:mediumvioletred">PartitionId</span>
      <br />  ) <span style="color:blue">on </span><span style="color:mediumvioletred">PartitionId</span> <br />  \| <span style="color:red">project </span><span style="color:mediumvioletred">PartitionId</span>,
      <span style="color:mediumvioletred">SourceNodeName</span> = <span style="color:mediumvioletred">NodeName</span>, <span style="color:mediumvioletred">ServiceName</span>, <span style="color:mediumvioletred">SourceNodeFd</span>
      = <span style="color:mediumvioletred">NodeFd</span>, <span style="color:mediumvioletred">SourceNodeUd</span> = <span style="color:mediumvioletred">NodeUd</span>, <span style="color:mediumvioletred">AllReplicaFD</span>,
      <span style="color:mediumvioletred">AllReplicaUD</span>, <span style="color:mediumvioletred">CrossJoin</span> <br />  \| <span style="color:red">join </span><span style="color:#2B91AF">kind</span>=<span
      style="color:blue">inner</span> (<span style="color:purple">CandidateNodes</span>) <span style="color:blue">on </span><span style="color:mediumvioletred">CrossJoin</span> <br />  \| <span style="color:red">where</span>
      (<span style="color:mediumvioletred">SourceNodeFd</span> == <span style="color:mediumvioletred">TargetNodeNameFd</span> <span style="color:blue">and </span><span style="color:mediumvioletred">AllReplicaUD
      </span><span style="color:blue">!contains </span><span style="color:mediumvioletred">TargetNodeNameUd</span>) <br />  <span style="color:blue">or</span> (<span style="color:mediumvioletred">SourceNodeUd</span>
      == <span style="color:mediumvioletred">TargetNodeNameUd </span><span style="color:blue">and </span><span style="color:mediumvioletred">AllReplicaFD </span><span style="color:blue">!contains </span><span
      style="color:mediumvioletred">TargetNodeNameFd</span>) <br />  <span style="color:blue">or</span> (<span style="color:mediumvioletred">AllReplicaFD </span><span style="color:blue">!contains </span><span
      style="color:mediumvioletred">TargetNodeNameFd</span> <span style="color:blue">and </span><span style="color:mediumvioletred">AllReplicaUD </span><span style="color:blue">!contains </span><span style="color:mediumvioletred">TargetNodeNameUd</span>)
      <br />  \| <span style="color:red">extend </span><span style="color:mediumvioletred">MoveCommand</span> = <span style="color:blue">strcat</span>(<span style="color:firebrick">@"Move-ServiceFabricSecondaryReplica
      -CurrentSecondaryNodeName """</span>,<span style="color:mediumvioletred">SourceNodeName</span>,<span style="color:firebrick">@""" -NewSecondaryNodeName """</span>, <br />  <span style="color:mediumvioletred">TargetNodeName</span>,<span
      style="color:firebrick">@""" -PartitionId """</span>,<span style="color:mediumvioletred">PartitionId</span>,<span style="color:firebrick">@""" -ServiceName """</span>,<span style="color:mediumvioletred">ServiceName</span>,<span
      style="color:firebrick">@""""</span>,<span style="color:firebrick">@" -IgnoreConstraints \$true"</span>) <br />  \| <span style="color:red">project </span><span style="color:mediumvioletred">MoveCommand</span>,
      <span style="color:mediumvioletred">ServiceName</span>, <span style="color:mediumvioletred">SourceNodeName</span>, <span style="color:mediumvioletred">TargetNodeName</span>, <span style="color:mediumvioletred">PartitionId</span>,
      <span style="color:mediumvioletred">SourceNodeFd</span>, <span style="color:mediumvioletred">SourceNodeUd</span>, <span style="color:mediumvioletred">TargetNodeNameFd</span>, <span style="color:mediumvioletred">TargetNodeNameUd</span>,
      <span style="color:mediumvioletred">AllReplicaFD</span>, <span style="color:mediumvioletred">AllReplicaUD</span> <br />  <span style="color:green">// Oreder by dPrefer movement of smaller replica/database</span>
      <br />  \| <span style="color:red">join </span><span style="color:#2B91AF">kind</span>=<span style="color:blue">leftouter</span> (<span style="color:purple">NodeUtilization</span>) <span style="color:blue">on
      </span><span style="color:purple">\$left</span>.<span style="color:mediumvioletred">SourceNodeName</span> == <span style="color:purple">\$right</span>.<span style="color:mediumvioletred">NodeName</span>
      <br />  \| <span style="color:red">project </span><span style="color:mediumvioletred">MoveCommand</span>, <span style="color:mediumvioletred">ServiceName</span>, <span style="color:mediumvioletred">SourceNodeName</span>,
      <span style="color:mediumvioletred">TargetNodeName</span>, <span style="color:mediumvioletred">IDSULoad</span>, <span style="color:mediumvioletred">PartitionId</span>, <span style="color:mediumvioletred">SourceNodeFd</span>,
      <span style="color:mediumvioletred">SourceNodeUd</span>, <span style="color:mediumvioletred">TargetNodeNameFd</span>, <span style="color:mediumvioletred">TargetNodeNameUd</span>, <span style="color:mediumvioletred">AllReplicaFD</span>,
      <span style="color:mediumvioletred">AllReplicaUD</span> <br />  \| <span style="color:red">order </span><span style="color:blue">by </span><span style="color:mediumvioletred">IDSULoad </span><span
      style="color:blue">asc</span> |'
