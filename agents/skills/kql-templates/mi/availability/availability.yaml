  Source: asmi-troubleshooter-package/SLO history.md
  Prompts:
  - MI resource usage analysis by server
  - MonDmRealTimeResourceStats LogicalServerName replica_type
  - Check MonDmRealTimeResourceStats replica_type AppName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
