- id: MI-networking-16
  Topic: investigate-problems-on-gateway
  Source: TSG-SQL-MI-Networking/content/connectivity/investigate-problems-on-gateway.md
  Prompts:
  - MI login event telemetry trend counts for process login start
  - MonLogin event let startTime endTime
  - Investigate gateway connectivity
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let startTime = ago(1d);

      let endTime = now();

      let tenantRing = ''tr12345.region-a.worker.database.windows.net'';

      MonLogin

      | where originalEventTimestamp between(startTime..endTime)

      | where ClusterName == tenantRing

      | where AppTypeName startswith ''Gateway.PDC''

      | where event == ''process_login_start''

      | summarize StartCount = count() by bin(originalEventTimestamp, 1m)

      | join kind=leftouter (

      MonLogin

      | where originalEventTimestamp between(startTime..endTime)

      | where ClusterName == tenantRing

      | where AppTypeName startswith ''Gateway.PDC''

      | where event == ''process_login_finish''

      | summarize FinishCount = count() by bin(originalEventTimestamp, 1m)

      ) on $left.originalEventTimestamp == $right.originalEventTimestamp

      | extend PendingLogins = StartCount - FinishCount

      | where PendingLogins > 10

      | render timechart'
