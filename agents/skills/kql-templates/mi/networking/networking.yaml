- id: MI-networking-136
  Topic: Kusto-Telemetry-for-troubleshooting-common-issues-for-SQL-Ledger
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Security,-Privacy-and-Compliance/SQL-Ledger/Kusto-Telemetry-for-troubleshooting-common-issues-for-SQL-Ledger.md
  Prompts:
  - MI Kusto-Telemetry-for-troubleshooting-common-issues-for-SQL-Ledger
