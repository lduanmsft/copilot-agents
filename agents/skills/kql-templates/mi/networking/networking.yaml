SqlSkills:
- id: MI-networking-1
  Topic: tsgminw1005-aia-gateway-aliasdb-connectivity-troubleshooting
  Source: TSG-SQL-MI-Networking/content/connectivity/Deprecated/tsgminw1005-aia-gateway-aliasdb-connectivity-troubleshooting.md
  Prompts:
  - MI one-minute performance counter telemetry trend by let, lookBackTime
  - MonCounterOneMinute let lookBackTime Update AvailableMemory
  - Investigate gateway connectivity
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'let lookBackTime = todatetime(ago(4h)); //Update time as per need

      let clusterName = ''tr5896.southeastasia1-a.worker.database.windows.net''; //Update tenant ring

      MonCounterOneMinute

      | where TIMESTAMP > lookBackTime

      | where ClusterName == clusterName

      | where NodeName contains ''WF''

      | where CounterName == ''\\Memory\\Available MBytes''

      | project PreciseTimeStamp, AvailableMemory=CounterValue, NodeName

      | summarize avg(AvailableMemory) by bin(PreciseTimeStamp, 5min), NodeName

      | order by PreciseTimeStamp asc, NodeName asc

      | render timechart'
