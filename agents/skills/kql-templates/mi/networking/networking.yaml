- id: MI-networking-129
  Topic: live-site-runners-and-monitors
  Source: TSG-SQL-MI-Networking/content/operational/live-site-runners-and-monitors/live-site-runners-and-monitors.md
  Prompts:
  - MI connectivity and networking
  - Monitor
  - Investigate connectivity errors
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: Monitor
    ExecutedQuery: '| Criteria | Geneva/BRAIN Monitor | ICM Automation | SqlTelemetry Runner |

      |----------|---------------------|---------------|---------------------|

      | Logic complexity | Threshold-based SLI/SLO rules | Simple Kusto queries | Complex logic, multi-step |

      | Data source | MDM (hot path, < 1 min latency) | Kusto (warm path) | Kusto, CMS, MDS |

      | Detection speed | Fast (sub-minute via MDM metrics) | Medium (Kusto query interval) | Medium (runner execution interval) |

      | Actions | Fire IcM incidents | IcM annotation, email reports | Auto-mitigation, CAS calls, AKV |

      | Auto-mitigation | No | No | Yes |

      | Source control | Geneva portal config | No built-in source control | Full Git-based source control |

      | Connectors | MDM, IcM, BRAIN | Kusto, IcM, MDS, MDM, Geneva Actions | Kusto, CAS, IcM, MDS, MDM, VCS, SF, AKV |

      | Best for | Regional outage detection, SLI-based alerting | Quick prototypes, IcM enrichment | Production-grade alerting & mitigation |'
