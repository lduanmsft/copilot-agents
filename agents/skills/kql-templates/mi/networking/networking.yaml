- id: MI-networking-19
  Topic: tsgminw1004-gateway-connections-stuck
  Source: TSG-SQL-MI-Networking/content/connectivity/tsgminw1004-gateway-connections-stuck.md
  Prompts:
  - MI login event telemetry counts for connectivity ring buffer recorded / process login finish
  - MonLogin logical_server_name event process_login_finish BufferConnection
  - Investigate gateway connectivity
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let lookBackPeriod = ago(2h);

      let clusterName = "";

      MonLogin

      | where originalEventTimestamp > lookBackPeriod

      | where ClusterName == clusterName

      | where AppTypeName startswith "Gateway.PDC.WCOW"

      | where event in ("connectivity_ring_buffer_recorded","process_login_finish")

      | extend BufferConnection = iif(event contains "connectivity_ring_buffer_recorded", strcat(NodeName," ","BufferedConnection"),"")

      | extend LoginConnection = iif(event contains "process_login_finish" and logical_server_name != "", strcat(NodeName," ",''Login''),"")

      | extend ProbeConnection = iif(event contains "process_login_finish" and logical_server_name == "", strcat(NodeName," ",''Probe''),"")

      | summarize count() by BufferConnection, LoginConnection, ProbeConnection

      | order by BufferConnection asc, LoginConnection asc, ProbeConnection asc'
