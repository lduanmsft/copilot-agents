- id: MI-networking-123
  Topic: tsgminw1012-xdbhost-socket-duplication-stuck-frozen-gateway
  Source: TSG-SQL-MI-Networking/content/operational/active-production-problems/tsgminw1012-xdbhost-socket-duplication-stuck-frozen-gateway.md
  Prompts:
  - MI login and connection errors by node
  - MonCounterOneMinute PreciseTimeStamp CounterName NodeName
  - Check MonCounterOneMinute CounterName NodeName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'MonCounterOneMinute

      | where PreciseTimeStamp > ago(15m)

      | where CounterName contains "\\Microsoft Winsock BSP\\Rejected Connections/sec"

      | where NodeName contains "WF"

      | summarize max(MaxVal), all=count(), nonZeroCount=countif(MaxVal > 0) by ClusterName, NodeName

      | extend percDrops = nonZeroCount * 1.0 / all * 100

      | where percDrops > 80'
