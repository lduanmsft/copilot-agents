- id: MI-networking-62
  Topic: gateway-uses-stale-SQL-replica-due-to-SF-error
  Source: TSG-SQL-MI-Networking/content/operational/active-production-problems/gateway-uses-stale-SQL-replica-due-to-SF-error.md
  Prompts:
  - MI login event telemetry counts by logical_server_name, database_name
  - MonLogin logical_server_name database_name d ReadOnlyIntent
  - Investigate gateway connectivity
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let SingleCluster=(clstr: string)

      MonLogin

      | where TIMESTAMP > ago(1h)

      | where AppTypeName == ''Gateway.PDC.WCOW''

      | where result == ''e_crContinue''

      | extend RedirectDnsBase = extract("^(\\d+d\\d+d\\d+d\\d+)\\.(.+)$", 2, instance_name)

      | where RedirectDnsBase == ClusterName

      | extend RedirectIP = replace_string(extract("^(\\d+d\\d+d\\d+d\\d+)\\.(.+)$", 1, instance_name), "d", ".")

      | extend ReadOnlyIntent = (toint(login_flags / 2097152) % 2) != 0 // (>> 21) % 2

      | extend Database = iif(ReadOnlyIntent, database_name, "") // There is known bug in gateway that redirects on different replica per database

      | project originalEventTimestamp, ClusterName, NodeName, instance_name, RedirectIP, RedirectDnsBase, ReadOnlyIntent, logical_server_name, Database

      | summarize RedirectIPs = make_set(RedirectIP), RedirectMappings = make_set(strcat(NodeName,"-", RedirectIP)) by bin(originalEventTimestamp, 5min), ClusterName
      , logical_server_name, ReadOnlyIntent, Database

      | where array_length(RedirectIPs) > 1

      | summarize Errors = count(), min(originalEventTimestamp), max(originalEventTimestamp), RedirectMappings = make_set(RedirectMappings) by ClusterName, logical_server_name,
      ReadOnlyIntent, Database

      | where Errors > 3

      };

      _ExecuteForProdClusters

      | ClusterName | logical_server_name | ReadOnlyIntent | Database | Errors | min_originalEventTimestamp | max_originalEventTimestamp | RedirectMappings |

      | :-----------: | :-----------: | :-----------: | :------------ | :------------ | :-----------: | :-----------: | :-----------: |

      | tr18699.northeurope1-a.worker.database.windows.net | neodeuatsqlmi-01 | FALSE | | 31 | 2026-02-28 02:30:00.0000000 | 2026-02-28 05:20:00.0000000 | [ "_WF2C_2-10.103.51.146",
      "_WF2C_1-10.103.51.147", "_WF2C_3-10.103.1.146" ] |'
