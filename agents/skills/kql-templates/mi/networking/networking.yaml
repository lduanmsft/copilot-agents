- id: MI-networking-22
  Topic: gateway-throttling-analysis
  Source: TSG-SQL-MI-Networking/content/analysis/gateway-throttling-analysis.md
  Prompts:
  - MI login and connection errors
  - AlrLogin
  - Investigate login failures
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: AlrLogin
    ExecutedQuery: '| XEvent | Purpose | Key Fields |

      |--------|---------|------------|

      | `report_login_proxyconn_throttling` | Per-connection throttling state | `logical_server_name`, `database_name`, `action`, `total_task_count`, `open_running_count` |

      | `login_proxy_throttling_dispatching` | Dispatch metrics (MDM `AlrLogin`) | `LogicalServerName`, `DatabaseName`, `dispatcher_pool_size`, `open_running_count` |

      | `login_proxy_throttling_count` | Total throttled disconnects | `LogicalServerName`, `DatabaseName`, `ClusterName` |

      | Login event | Connection details | `proxy_open_time_ms`, `proxy_dispacther_wait_list_time_ms`, `instance_port`, `is_success` |'
- id: MI-networking-23
  Topic: initial-investigation-steps-for-connectivity
  Source: TSG-SQL-MI-Networking/content/connectivity/initial-investigation-steps-for-connectivity.md
  Prompts:
  - MI connectivity and networking by server
  - MonLogin ClusterName event error
  - Check MonLogin ClusterName event
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let startTime = datetime(2026-02-11 00:00);

      let endTime = datetime(2026-02-11 12:00);

      let tenantRing = ''tr12345.region-a.worker.database.windows.net'';

      let serverName = ''myserver'';

      MonLogin

      | where originalEventTimestamp between(startTime..endTime)

      | where ClusterName == tenantRing

      | where event == ''process_login_finish''

      | where error != 0 or is_success == 0

      | where AppTypeName startswith ''Gateway.PDC''

      | where logical_server_name =~ serverName'
- id: MI-networking-24
  Topic: initial-investigation-steps-for-connectivity
  Source: TSG-SQL-MI-Networking/content/connectivity/initial-investigation-steps-for-connectivity.md
  Prompts:
  - MI connectivity and networking by node
  - MonCounterOneMinute TIMESTAMP ClusterName NodeName
  - Check MonCounterOneMinute ClusterName NodeName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'let nodeName = ''DB80C_4'';

      let tenantRingName = ''tr4959.westus2-a.worker.database.windows.net'';

      MonCounterOneMinute

      | where TIMESTAMP > ago(1h)

      | where ClusterName == tenantRingName

      | where NodeName == nodeName

      | where CounterName endswith "Rejected Connections/sec"

