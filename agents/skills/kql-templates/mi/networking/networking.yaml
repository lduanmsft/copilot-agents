- id: MI-networking-3
  Topic: tsgminw1016-long-gateway-startup
  Source: TSG-SQL-MI-Networking/content/connectivity/Deprecated/tsgminw1016-long-gateway-startup.md
  Prompts:
  - MI redirector telemetry by Gateway, PDC
  - MonRedirector Gateway PDC WCOW text
  - Investigate gateway connectivity
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRedirector
    ExecutedQuery: 'MonRedirector

      | where TIMESTAMP > ago(1h)

      | where AppName == "Gateway.PDC.WCOW"

      | where text contains "[CertificateValidationCallback] Thumbprint validation failed."

