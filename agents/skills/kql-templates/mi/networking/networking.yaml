  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      | where LogicalServerName =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}"

      | extend is_ledger_updateable = binary_and(status2, 0x00040000) == 0x00040000, is_ledger_append_only = binary_and(status2, 0x00080000) == 0x00080000

