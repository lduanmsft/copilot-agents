SqlSkills:
- id: MI-networking-1
  Topic: Gateway issue
  Source: asmi-troubleshooter-package/Gateway issue.md
  Prompts:
  - MI login and connection errors by server
  - MonLogin event logical_server_name is_success
  - Check MonLogin event is_success
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let timeBucket = iff(datetime_diff(''second'', datetime(2024-03-20 00:15:00), datetime(2024-03-26 02:30)) < 1000, 1s, iff(datetime_diff(''minute'',  datetime(2024-03-20 00:15), datetime(2024-03-26
      02:30)) < 1000, 1m, 1h));

      MonLogin

      | where originalEventTimestamp between(datetime(2024-03-20 00:15).. datetime(2024-03-26 02:30))

      | where event == ''process_login_finish''

      | where logical_server_name =~ "{ServerName}"// and database_name =~ "{DatabaseName}"

      | summarize count() by bin(originalEventTimestamp, timeBucket), iff(is_success == true, strcat(''Successful_'', package), strcat(''Failed_'', package, ''_'', error, ''_'', state)),AppName'
