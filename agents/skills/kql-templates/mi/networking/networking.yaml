  Source: TSG-SQL-MI-Networking/content/operational/active-production-problems/slow-crl-import-on-wf-nodes.md
  Prompts:
  - MI resource usage analysis by server
  - MonContainerShare TIMESTAMP ClusterName NodeRole
  - Check MonContainerShare ClusterName NodeRole
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonContainerShare
    ExecutedQuery: 'MonContainerShare

      | where TIMESTAMP > ago(2h)

      | where ClusterName == ''tr11840.westus2-a.worker.database.windows.net''

      | where NodeRole == ''WF2C''

      | where host_environment_type == ''Container''

      | summarize arg_max(originalEventTimestamp,*) by process_id, AppTypeName, AppName, LogicalServerName, ClusterName, NodeName

      | project originalEventTimestamp, event, process_id, AppTypeName, AppName, LogicalServerName, ClusterName, NodeRole, NodeName

      | where event contains "crl" or event has "certificate"

      | summarize count() by AppTypeName, AppName, LogicalServerName, ClusterName, NodeName

      | where AppTypeName startswith "Worker" or AppTypeName startswith "Gateway"'
- id: MI-networking-118
  Topic: tsgminw1012-xdbhost-socket-duplication-stuck-frozen-gateway
  Source: TSG-SQL-MI-Networking/content/operational/active-production-problems/tsgminw1012-xdbhost-socket-duplication-stuck-frozen-gateway.md
  Prompts:
  - MI login and connection errors
  - MonLogin the frozen
  - Check MonLogin the frozen
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: '| Layer | Signal | What you see |

      |-------|--------|--------------|

      | Customer (Private Endpoint) | TDS login | Login timeouts / SSMS hangs for instances whose PE traffic is hashed to the frozen gateway. |

      | Customer (Public Endpoint) | TDS login | **Healthy** — SLB has already excluded the frozen GW from rotation. |

      | GatewayBeacon | Gateway liveness | **Healthy** — this is the giveaway. PE keeps using the bad GW because beacon does not detect freeze. |

      | SLB probe (`MonLogin` → `Gateway.PDC.WCOW`, `connectivity_ring_buffer_recorded` from `168.63.129.xx:1433`) | Probe results | Drop to **zero** for the affected GW node for ≥15 minutes. |

      | Gateway (`MonRedirector`) | `Gateway.PDC.WCOW` events | Process is logging *some* events (so it''s alive), but `process_login_finish` is **zero** for ≥15 minutes. |

      | Backend node (`MonXdbhost`) | Socket-duplication | `***[ERROR]Current socket Duplicate task stuck:` on the backend (`*C*`) nodes whose connections are being handed off by the frozen GW. |'
- id: MI-networking-119
  Topic: tsgminw1012-xdbhost-socket-duplication-stuck-frozen-gateway
  Source: TSG-SQL-MI-Networking/content/operational/active-production-problems/tsgminw1012-xdbhost-socket-duplication-stuck-frozen-gateway.md
