      | where nsid != 4 // Ignoring system tables

      | project name, is_ledger_updateable, is_ledger_append_only'
- id: MI-networking-137
  Topic: How-to-check-TDE-encryption-status-of-MI-DB
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Security,-Privacy-and-Compliance/TDE-and-Customer-Managed-Key-(CMK)/How-to-check-TDE-encryption-status-of-MI-DB.md
  Prompts:
  - MI How-to-check-TDE-encryption-status-of-MI-DB
  - Managed Instance How-to-check-TDE-encryption-status-of-MI-DB
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDatabaseEncryptionKeys
    ExecutedQuery: 'MonDatabaseEncryptionKeys

      | where TIMESTAMP >= {StartDateTime} and TIMESTAMP <= {EndDateTime}

      | where LogicalServerName == {MIName}

      | where logical_database_id =~ {DB_guid}

      | extend encryption_state_desc = case(

      encryption_state == 1, ''Unencrypted''

      encryption_state == 2, ''Encryption in progress''

      encryption_state == 3, ''Encrypted''

      encryption_state == 4, ''Key change in progress''

      encryption_state == 5, ''Decryption in progress''

      encryption_state == 6, ''Protection change in progress''

      ''No database encryption key present, no encryption'')

      | project TIMESTAMP, PreciseTimeStamp, end_utc_date, start_utc_date, is_primary_replica, is_encrypted, encryption_state, encryption_state_desc, encryptor_thumbprint, encryptor_type, percent_complete'
- id: MI-networking-138
  Topic: The-Azure-Key-Vault-client-encountered-an-error-with-message
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Security,-Privacy-and-Compliance/TDE-and-Customer-Managed-Key-(CMK)/The-Azure-Key-Vault-client-encountered-an-error-with-message.md
  Prompts:
  - MI The-Azure-Key-Vault-client-encountered-an-error-with-message
  - Managed Instance The-Azure-Key-Vault-client-encountered-an-error-with-message
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where originalEventTimestamp >= ago(1d)

      | where LogicalServerName =~ "{ServerName}"

      | where event == "systemmetadata_written"

      | where message contains ''The Azure Key Vault client encountered an error with message'' or message contains ''AKV''

      | parse message with * "The Azure Key Vault client encountered an error with message ''[error:" error ", info:"  info ", state:" state "] " msg1

      | parse message with * " [AzureKeyVaultClientHelper::CheckDbAkvWrapUnwrap]: Failed WRAP access check with msg: [error:" error ", info:"  info ", state:" state "] " msg2

      | project originalEventTimestamp, ClusterName, AppName, LogicalServerName, error, info, msg1, msg2'
