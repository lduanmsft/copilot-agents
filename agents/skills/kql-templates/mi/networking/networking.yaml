  Source: Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Database-x-on-server-y-is-not-currently-available-(Error-40613)/Error-40613-State-22.md
  Prompts:
  - MI login event telemetry by state, DueToProxyConnextThrottle
  - MonLogin state DueToProxyConnextThrottle records show
  - Investigate gateway connectivity
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin records show state 22 with description *DueToProxyConnextThrottle* like:

      | package | error | state | state_desc |

      | ----------|-------| ----- | ------------------------- |

      |xdbgateway |40613 | 22 | DueToProxyConnextThrottle |'
- id: MI-networking-80
  Topic: Workflow-for-Error-40613
  Source: Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Database-x-on-server-y-is-not-currently-available-(Error-40613)/Workflow-for-Error-40613.md
  Prompts:
  - MI login event telemetry by LogicalServerName, logical_server_name
  - MonLogin LogicalServerName logical_server_name database_name logical_database_name
  - Investigate login failures
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where TIMESTAMP >=ago(1d)

      | where connection_id =~ ''930C8965-E5C1-4139-ACCE-B3E3F4529295''

      | project originalEventTimestamp, NodeName, package, error, state, state_desc, logical_server_name, logical_database_name, LogicalServerName, database_name,
      server_name, connection_peer_id'
- id: MI-networking-81
  Topic: Error-926%3A-Database-'X'-cannot-be-opened.-It-has-been-marked-SUSPECT-by-recovery
  Source: Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Other-error-not-listed/Error-926%3A-Database-'X'-cannot-be-opened.-It-has-been-marked-SUSPECT-by-recovery.md
  Prompts:
  - MI SQL system health telemetry by LogicalServerName, message
  - MonSQLSystemHealth LogicalServerName message let startTime
  - Investigate Error 926%3A Database 'X' cannot be opened. It has been marked SUSPECT by recovery
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'let startTime = ago(1d);

      let endTime = now();

      let instanceName = ''X'';

      MonSQLSystemHealth

      | where originalEventTimestamp between (startTime .. endTime)

      | where LogicalServerName == tolower(instanceName)

      | where message has "Error: 926"

      | project originalEventTimestamp, NodeName, AppName, message'
- id: MI-networking-82
  Topic: Investigate-RHC-metrics
  Source: Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Resource-Health-events/Investigate-RHC-metrics.md
  Prompts:
  - MI login event telemetry for process login finish
  - MonLogin LogicalServerName logical_server_name database_name event
  - Investigate gateway connectivity
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp >= ago (1h)

      | where LogicalServerName =~ ''{ServerName}'' or logical_server_name =~ ''{ServerName}''

      | where event == "process_login_finish"

      | where is_user_error == 0

      | where database_name =~ ''{DatabaseName}''

      | where (package == "xdbgateway" and is_success == 0) or package == "sqlserver"

      | project originalEventTimestamp, NodeName, package, is_success, database_name, AppTypeName'
