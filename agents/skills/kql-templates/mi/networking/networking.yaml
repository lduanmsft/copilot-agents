- id: MI-networking-101
  Topic: tsgminw3009-cluster-certificate-expired
  Source: TSG-SQL-MI-Networking/content/networking/tsgminw3009-cluster-certificate-expired.md
  Prompts:
  - MI login and connection errors by server
  - MonLogin TIMESTAMP event AppTypeName
  - Check MonLogin event AppTypeName
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let lookBackTime = ago(60min);

      let errorThreshhold = 100;

      MonLogin

      | where TIMESTAMP > lookBackTime

      | where event contains "login_finish"

      | where AppTypeName =~ "Gateway.PDC"

      | where error == 26078

      | project ClusterName, logical_server_name, connection_peer_id

      | join kind=inner (MonLogin

      | where TIMESTAMP > lookBackTime

      | where event contains "login_finish"

      | where AppTypeName contains "Worker.CL"

      | where error == 17830 and state == 105

      | project connection_peer_id)

      on connection_peer_id

      | summarize count() by ClusterName, logical_server_name

      | where count_ > errorThreshhold

      | project ClusterName, LogicalServerName = logical_server_name

      | join kind=inner (MonDmDbHadrReplicaStates

      | where TIMESTAMP > lookBackTime

      | where internal_state_desc  == ''PRIMARY''

      | distinct ClusterName, LogicalServerName, NodeName, AppName, AppTypeName)

      on ClusterName, LogicalServerName

      | project ClusterName, NodeName, ApplicationName = strcat("fabric:/",AppTypeName,"/",AppName)'
