- id: MI-networking-103
  Topic: tsgminw3012-GatewayCloudLifterCertificate-expired
  Source: TSG-SQL-MI-Networking/content/networking/tsgminw3012-GatewayCloudLifterCertificate-expired.md
  Prompts:
  - MI resource usage analysis by node
  - MonMachineLocalWatchdog ClusterName component TIMESTAMP
  - Check MonMachineLocalWatchdog ClusterName component
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonMachineLocalWatchdog
    ExecutedQuery: 'let clusterName = ""; //tr21813.northeurope1-a.worker.database.windows.net

      MonMachineLocalWatchdog

      | where ClusterName == ClusterName

      | where component == "CertificateWatchdog"

      | where TIMESTAMP > ago(10h)

      | parse message_resourcename with *"Subject=CN=" Subject "," * "Thumbprint=" Thumbprint ";" * "Expires="ExpireDateStr";" * "RegistryLogicalName=" CertificateName ";" *

      | where not(isempty(Subject))

      | where not(isempty(Thumbprint))

      | where not(isempty(ExpireDateStr))

      | where CertificateName == "GatewayCloudLifterCertificate"

      | extend ExpireDate = todatetime(ExpireDateStr)

      | extend Expired = ExpireDate < now()

      | summarize arg_max(ExpireDate, Thumbprint, Expired) by Subject, ClusterName, NodeName

      | where ExpireDate < (now() + 7d)'
