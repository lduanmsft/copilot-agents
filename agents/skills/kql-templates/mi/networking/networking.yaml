      | where originalEventTimestamp > ago(1h)

      | where NodeName contains "C"

      | where text contains "***[ERROR]Current socket Duplicate task stuck:"

      | summarize count(), arg_max(originalEventTimestamp, text) by ClusterName, NodeName'
