- id: MI-networking-123
  Topic: Error-926%3A-Database-'X'-cannot-be-opened.-It-has-been-marked-SUSPECT-by-recovery
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Other-error-not-listed/Error-926%3A-Database-'X'-cannot-be-opened.-It-has-been-marked-SUSPECT-by-recovery.md
  Prompts:
  - MI MI Error 926: Database 'X' cannot be opened. It has been marked SUSPECT by recovery
  - Managed Instance Error-926:-Database-'X'-cannot-be-opened.-It-has-been-marked-SUSPECT-by-recovery
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'let instanceName = "{ServerName}"; let endTime = now();
let startTime = ago({TimeRange});
MonSQLSystemHealth

      | where originalEventTimestamp between (startTime .. endTime)

      | where LogicalServerName == tolower(instanceName)

      | where message has "Error: 926"

      | project originalEventTimestamp, NodeName, AppName, message'
- id: MI-networking-124
  Topic: Verification-of-Availability-metrics-graph-on-portal
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Resource-Health-events/Verification-of-Availability-metrics-graph-on-portal.md
  Prompts:
  - MI Verification-of-Availability-metrics-graph-on-portal
  - Managed Instance Verification-of-Availability-metrics-graph-on-portal
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let db = "{DatabaseName}"; MonLogin

      | where TIMESTAMP between (datetime(2024-01-07 00:01:00) .. datetime(2024-01-08 09:10:00))

      | where logical_server_name =~ "" and database_name =~ "" and event =~ "process_login_finish"

      //| summarize  min(TIMESTAMP) , max(TIMESTAMP), count() by error, state, package, is_success, is_user_error, database_name, bin(TIMESTAMP, 1h)

      | project TIMESTAMP, error ,state, package, is_success, is_user_error, database_name

      | where not (is_success == ''False'' and error == 0)

      | where (package in (''xdbhost'',''xdbgateway'') and is_success == ''False'' ) or package == ''sqlserver''

      //| summarize  min(TIMESTAMP) , max(TIMESTAMP), count() by error, state, package, is_success, is_user_error//, bin(TIMESTAMP, 1m)

      | summarize min(TIMESTAMP) , max(TIMESTAMP), count(), make_set(is_user_error), make_set(is_success) by bin(TIMESTAMP, 1m), database_name

      | where set_is_user_error !contains "true" and set_is_success !contains "true"

      | extend IST = TIMESTAMP + 330m // To convert the timestamp to local time.'
