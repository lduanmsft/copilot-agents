- id: MI-ASMI-NETWORKING-12
  Topic: Linked Server
  Source: kusto-queries/Linked Server.md
  Prompts:
  - MI Linked Server
  - Managed Instance Linked Server
  - Investigate Linked Server
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLinkedServerInfo
    ExecutedQuery: 'MonLinkedServerInfo

      | where LogicalServerName == "mi name" or LogicalServerName == "server name"

      | where linked_server_name startswith "10.1.9.60"

      | where originalEventTimestamp > ago(10d)

      | project originalEventTimestamp, LogicalServerName, linked_server_name, provider_name'
