- id: MI-ASMI-NETWORKING-09
  Topic: Gateway issue
  Source: kusto-queries/Gateway issue.md
  Prompts:
  - MI Gateway issue
  - Managed Instance Gateway issue
  - Investigate Gateway issue
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let tenantRing = ''tr5896.southeastasia1-a.worker.database.windows.net'';

      let serverName = ''thazefmdb0029'';

      MonLogin

      | where originalEventTimestamp > ago(7d)

      | where ClusterName == tenantRing

      | where event == ''process_login_finish''

      | where error != 0 or is_success == 0

      | where AppTypeName startswith ''Gateway.PDC''

      | where logical_server_name =~ serverName'
