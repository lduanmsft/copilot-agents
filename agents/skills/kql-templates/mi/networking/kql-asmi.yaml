- id: MI-ASMI-NETWORKING-17
  Topic: Tips with Azure Network team
  Source: kusto-queries/Tips with Azure Network team.md
  Prompts:
  - MI Tips with Azure Network team
  - Managed Instance Tips with Azure Network team
  - Investigate Tips with Azure Network team
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonCapacityTenantSnapshot
    ExecutedQuery: 'let clusterName = ''tr11909.westus2-a.worker.database.windows.net'';

      let timestape = ago(5d);

      MonCapacityTenantSnapshot

      | where TIMESTAMP > timestape

      | summarize arg_max(TIMESTAMP, *) by tenant_ring_name, tenant_name'
