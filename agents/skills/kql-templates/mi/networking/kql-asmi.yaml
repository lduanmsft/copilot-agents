SqlSkills:
- id: MI-ASMI-NETWORKING-01
  Topic: AAD authentication
  Source: kusto-queries/AAD authentication.md
  Prompts:
  - MI AAD authentication
  - Managed Instance AAD authentication
  - Investigate AAD authentication
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where TIMESTAMP >= datetime(2024-05-06 00:39:00Z) | where TIMESTAMP < datetime(2024-05-06 14:15:53Z)'
- id: MI-ASMI-NETWORKING-02
  Topic: AAD authentication
  Source: kusto-queries/AAD authentication.md
  Prompts:
  - MI AAD authentication
  - Managed Instance AAD authentication
  - Investigate AAD authentication
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let starttime= ago(1d);

      let endtime= now();

      let server= ''myazepmdb0011'';

      let database= ''MerlotCADemo'';

      MonLogin

      | where originalEventTimestamp>= starttime and originalEventTimestamp<= endtime

      | where logical_server_name=~ server //and database_name=~ database

      //| where event == ''process_login_finish''

      //| where error == 18456 and [''state''] == 132

      | extend AADUser= iif( fedauth_adal_workflow> 0 or fedauth_library_type> 0, "AAD", "SQL")'
- id: MI-ASMI-NETWORKING-03
  Topic: AAD authentication
  Source: kusto-queries/AAD authentication.md
  Prompts:
  - MI AAD authentication
  - Managed Instance AAD authentication
  - Investigate AAD authentication
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonFedAuthTicketService
    ExecutedQuery: 'MonFedAuthTicketService

      | where originalEventTimestamp>= starttime and originalEventTimestamp<= endtime

      | where event== ''fedauth_webtoken_failure''

      | project sql_connection_id, database_name, logical_database_name, JSONWebTokenErrorState= error_state, error_message'
- id: MI-ASMI-NETWORKING-04
  Topic: AAD authentication
  Source: kusto-queries/AAD authentication.md
  Prompts:
  - MI AAD authentication
  - Managed Instance AAD authentication
  - Investigate AAD authentication
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonAzureActivDirService
    ExecutedQuery: 'MonAzureActivDirService

      | where originalEventTimestamp between(startTime..endTime)

      | where logical_server_name =~ serverName and (isempty(databaseName) or database_name =~ databaseName)

      | project originalEventTimestamp, logical_database_name, NodeName, AppName, event'
