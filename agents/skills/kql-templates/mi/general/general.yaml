  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'let subscriptionId = ''x'';

      let startTime = ago(2d);

      let endTime = now();

      MonManagementOperations

      | where originalEventTimestamp between(startTime .. endTime)

      | where operation_category =~ ''ManagedInstancePool''

      | where subscription_id =~ subscriptionId

      | where event == ''management_operation_start''

      | extend InputParams = tostring(parse_xml(operation_parameters).InputParameters)

