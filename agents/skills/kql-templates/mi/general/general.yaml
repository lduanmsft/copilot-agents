- id: MI-general-128
  Topic: November-2022-Feature-Wave
  Source: Troubleshooting-Guides/Missing-Features-and-Functionalities/I-need-the-following-feature-or-functionality/November-2022-Feature-Wave.md
  Prompts:
  - MonMachineLocalWatchdog by ResultsAsJson, DnsResponseCode
  - MonMachineLocalWatchdog ResultsAsJson DnsResponseCode DnsName DnsServer
  - Investigate SQL error
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonMachineLocalWatchdog
    ExecutedQuery: 'let tenant_ring_name = ''X'';

      MonMachineLocalWatchdog

      | where TIMESTAMP > ago(7d)

      | where ClusterName =~ tenant_ring_name

      | where message_systemmetadata contains "AzureDnsResults"

      | extend ResultsAsJson = parse_json(message_systemmetadata)

      | extend DnsName = tostring(ResultsAsJson["DnsName"])

      | extend DnsServer = tostring(ResultsAsJson["DnsServer"])

      | extend DnsResponseCode = toint(ResultsAsJson["DnsResponseCode"])

      | extend ServerResult = tostring(ResultsAsJson["Results"])

      | extend AzureDnsResult = tostring(ResultsAsJson["AzureDnsResults"])

      | extend DnsError = tostring(ResultsAsJson["DnsError"])

      | extend AzureDnsError = tostring(ResultsAsJson["AzureDnsError"])

      | project originalEventTimestamp, ClusterName, DnsName, DnsServer, DnsResponseCode, ServerResult, AzureDnsResult, DnsError, AzureDnsError

      | extend HasDNSIssue = iif((ServerResult == ''[]'' and AzureDnsResult != ''[]'') or DnsResponseCode != 0, 1 ,0)

      | where HasDNSIssue == 1'
- id: MI-general-129
  Topic: November-2022-Feature-Wave
  Source: Troubleshooting-Guides/Missing-Features-and-Functionalities/I-need-the-following-feature-or-functionality/November-2022-Feature-Wave.md
  Prompts:
  - MonMachineLocalWatchdog by ResultsAsJson, DnsName
  - MonMachineLocalWatchdog ResultsAsJson DnsName DnsServer DnsResponseCode
  - Investigate SQL error
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonMachineLocalWatchdog
    ExecutedQuery: 'let tenant_ring_name = ''X'';

      MonMachineLocalWatchdog

      | where TIMESTAMP > ago(7d)

      | where ClusterName =~ tenant_ring_name

      | where message_systemmetadata contains "AzureDnsResults"

      | extend ResultsAsJson = parse_json(message_systemmetadata)

      | extend DnsName = tostring(ResultsAsJson["DnsName"])

      | extend DnsServer = tostring(ResultsAsJson["DnsServer"])

      | extend DnsResponseCode = toint(ResultsAsJson["DnsResponseCode"])

      | extend ServerResult = tostring(ResultsAsJson["Results"])

      | extend AzureDnsResult = tostring(ResultsAsJson["AzureDnsResults"])

      | extend DnsError = tostring(ResultsAsJson["DnsError"])

      | extend AzureDnsError = tostring(ResultsAsJson["AzureDnsError"])

      | project originalEventTimestamp, ClusterName, DnsName, DnsServer, DnsResponseCode, ServerResult, AzureDnsResult, DnsError, AzureDnsError

      | summarize make_set(ServerResult), make_set(AzureDnsResult) by DnsName, DnsServer

      | extend Diff = set_difference(set_ServerResult, set_AzureDnsResult), TheSame = set_intersect(set_ServerResult, set_AzureDnsResult)

      | extend DiffCount = array_length(Diff), SameCount = array_length(TheSame)

      | project DnsName, DnsServer, DiffCount, SameCount, set_ServerResult, set_AzureDnsResult, Diff, TheSame'
