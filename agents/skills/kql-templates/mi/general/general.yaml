- id: MI-general-100
  Topic: 1.4-%2D-Database-already-exists
  Source: Troubleshooting-Guides/Migration-and-Move/Azure-SQL-Managed-Instance-Link/1.4-%2D-Database-already-exists.md
  Prompts:
  - MonAnalyticsDBSnapshot by logical_server_name, logical_database_name
  - MonAnalyticsDBSnapshot logical_server_name logical_database_name logical_database_id let
  - Investigate 1.4 %2D Database already exists
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'let serverName = ''{ServerName}'';

      let startTime = {startTime};

      let endTime = {endTime};

      let databaseName = ('''');

      MonAnalyticsDBSnapshot

      | where TIMESTAMP between(startTime..endTime)

      | where logical_server_name =~ serverName

      | where isempty(databaseName) or logical_database_name =~ databaseName

      | project PreciseTimeStamp, logical_database_name, logical_database_id, state, physical_database_id

      | order by logical_database_id, PreciseTimeStamp asc

      | serialize

      | extend isSameState = iif(prev(logical_database_id) == logical_database_id and prev(state) == state,1,0)

      | where isSameState == 0

      | project-away isSameState

      | order by PreciseTimeStamp asc

      | PreciseTimeStamp | logical_database_name | logical_database_id | state | physical_database_id |

      | --- | --- | --- | --- | --- |

      | 2023-11-20 17:05:37.3048858 | test | 65709FE8-F9E5-4492-8DB4-F089C9966308 | **Copying** | 50CA50E9-5112-4D5A-BB57-533EA61D43AD |'
