SqlSkills:
- id: MI-general-1
  Topic: CMW-ring
  Source: Troubleshooting-Guides/Maintenance/References/CMW-ring.md
  Prompts:
  - MonManagedServers by name, let
  - MonManagedServers name let CMW_pattern custom_maintenance_window_scheduler_pattern
  - Investigate maintenance issue
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedServers
    ExecutedQuery: 'let mi_name = {InstanceName};

      let subId = {subscripionId};

      let FabricClusters = MonFabricClusters

      MonManagedServers

      | where TIMESTAMP >= ago(1h)

      | where name =~ mi_name or customer_subscription_id =~ subId

      | join kind=leftouter (FabricClusters) on $left.private_cluster_tenant_ring_name == $right.name

      | extend CMW_pattern = iff(isnotempty(custom_maintenance_window_scheduler_pattern),custom_maintenance_window_scheduler_pattern, custom_maintenance_window_recurring_pattern)

      | summarize TelemetryAt = arg_max(TIMESTAMP,*) by name,managed_server_id, subnet_id, resource_group, maintenance_policy_id,CMW_pattern,custom_maintenance_window_scheduler_pattern,
      custom_maintenance_window_recurring_pattern

      | extend cmw = parse_xml(CMW_pattern).WindowScheduler.ScheduledDays

      | project name,managed_server_id, maintenance_policy_id, cmw, customer_subscription_id, subnet_id, resource_group, TelemetryAt

      Sample output:

      | name | managed_server_id | maintenance_policy_id | cmw |

      | --- | --- | --- | --- |

      | <InstanceName1> | 9202E914-BEEC-4EAD-AA76-9B75A55C5370 | | { "DayOfWeek": "Saturday" } |

      | <InstanceName2> | EA88A785-4E34-4361-A03D-49D7F5E63721 | | { "DayOfWeek": "Saturday" } |

      | <InstanceName3> | 8A2ED9E7-E5C6-4638-8BA2-3B13E1B39AF7 | | { "DayOfWeek": "Friday" } |'
- id: MI-general-2
  Topic: Error-45336-The-operation-could-not-be-completed-because-is-an-invalid-Server-Key-name
  Source: Troubleshooting-Guides/Create,-Scale,-Stop,-Start-or-Delete-Resources/ARM-template-issues-or-questions/Error-45336-The-operation-could-not-be-completed-because-is-an-invalid-Server-Key-name.md
  Prompts:
  - MI management operations telemetry for management operation start
  - MonManagementOperations event subscription let MI
  - Investigate SQL error
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'let subscription = ''{SubscriptionId}'';

      let MI = ''>{ResourceName}<'';

      cluster(''{kustoCluster}'').database(''{kustoDatabase}'').MonManagementOperations

      | where subscription_id =~ subscription or SubscriptionId =~ subscription

      | where TIMESTAMP > ago(1d)

      | where event == ''management_operation_start''

      | where operation_parameters contains MI

      | project PreciseTimeStamp, request_id, operation_type, operation_parameters

      | join kind = leftouter'
- id: MI-general-3
  Topic: '[OnePager]-Cannot-delete-DB-(doesn’t-exist)-and-cannot-create-new-DB-(already-exists)'
  Source: Troubleshooting-Guides/Create,-Scale,-Stop,-Start-or-Delete-Resources/Database/[OnePager]-Cannot-delete-DB-(doesn’t-exist)-and-cannot-create-new-DB-(already-exists).md
  Prompts:
  - MonBackup by LogicalServerName, event
  - MonBackup LogicalServerName event ServerName logical_database_id
  - Investigate SQL error
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where LogicalServerName =~ "{ServerName}"

      | where logical_database_id =~ "<DatabaseGuid>"

      | where event contains "database_backup" and event_type contains "error"

      | project TIMESTAMP, backup_type, sql_error_message'
- id: MI-general-4
  Topic: Can't-delete-(doesn't-exist)-can't-create-new-(already-exist)
  Source: Troubleshooting-Guides/Create,-Scale,-Stop,-Start-or-Delete-Resources/Database/Can't-delete-(doesn't-exist)-can't-create-new-(already-exist).md
  Prompts:
  - MonManagement
  - MonManagement event error_code message request_id
  - Investigate SQL error
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where originalEventTimestamp >= {startTime} and originalEventTimestamp <= {endTime}

      | where request_id =~ ''<drop request_id>''

      | where action == ''MarkDatabaseDropped''

      | where state_machine_type == ''ManagedDatabaseStateMachine''

      | project originalEventTimestamp, request_id, event, operation_type, elapsed_time, operation_parameters, operation_result, is_user_error, error, error_code,
      error_message, error_classification, [''state''], state_desc, message, exception_message, deployment_message, action, state_machine_type, exception_type, stack_trace'
- id: MI-general-5
  Topic: Can't-delete-(doesn't-exist)-can't-create-new-(already-exist)
  Source: Troubleshooting-Guides/Create,-Scale,-Stop,-Start-or-Delete-Resources/Database/Can't-delete-(doesn't-exist)-can't-create-new-(already-exist).md
  Prompts:
  - MonBackup by LogicalServerName, event
  - MonBackup LogicalServerName event let managed_database_id
  - Investigate SQL error
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let managed_database_id = ''<logicalDatabaseGuid>'';

      let serverName = ''{ServerName}'';

      MonBackup

      | where TIMESTAMP >= ago(5d)

      | where LogicalServerName =~ serverName

      | where tolower(logical_database_id) =~ tolower(managed_database_id)

      | where event contains ''database_backup'' and event_type contains ''error'''
- id: MI-general-6
  Topic: Can't-delete-(doesn't-exist)-can't-create-new-(already-exist)
  Source: Troubleshooting-Guides/Create,-Scale,-Stop,-Start-or-Delete-Resources/Database/Can't-delete-(doesn't-exist)-can't-create-new-(already-exist).md
  Prompts:
  - MI SQL system health telemetry by LogicalServerName, message
  - MonSQLSystemHealth LogicalServerName message serverName let
  - Investigate SQL error
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'let serverName = ''{ServerName}'';

      MonSQLSystemHealth

      | where TIMESTAMP > ago(1d)

      | where LogicalServerName == serverName

      | where message has_cs ''was killed''

      | project originalEventTimestamp, source = ''SQL'', NodeName, process_id, error_id, message = trim(@''\s*'', message)

      | union'
