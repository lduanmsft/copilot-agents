- id: MI-general-65
  Topic: How-to-check-Managed-Instance-tags
  Source: Troubleshooting-Guides/Create,-Scale,-Stop,-Start-or-Delete-Resources/Reference/How-to-check-Managed-Instance-tags.md
  Prompts:
  - MonBillingManagedServerStatus by managed_database_name, ServerName
  - MonBillingManagedServerStatus managed_database_name ServerName DatabaseName managed_server_id
  - Investigate How to check Managed Instance tags
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonBillingManagedServerStatus
    ExecutedQuery: 'let ServerName = ''{ServerName}'';

      let DatabaseName = ''{DatabaseName}'';

      MonBillingManagedServerStatus

      | where managed_server_name =~ ServerName

      | project managed_server_id

      | take 1

      | join kind= inner (

      MonManagedDatabases

      | where managed_database_name =~ DatabaseName

      | project managed_server_id, resource_tags, TIMESTAMP) on managed_server_id

      | summarize min(TIMESTAMP) by resource_tags'
