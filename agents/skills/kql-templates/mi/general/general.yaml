- id: MI-general-174
  Topic: Billing
  Source: kusto-queries/Billing.md
  Prompts:
  - MI real-time resource telemetry by LogicalServerName, database_name
  - MonDmRealTimeResourceStats LogicalServerName database_name logical_database_id dt
  - Investigate Billing
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'let dt = ago(2h);MonDmRealTimeResourceStats| where TIMESTAMP > dt| where LogicalServerName =~ "{ServerName}" //and database_name =~ "{DatabaseName}"|
      extend myAppName = extract(@''(\w+)'', 1, AppName)| summarize oTime = any(TIMESTAMP) by myAppName| join kind=leftouter (MonDwBilling| where TIMESTAMP > dt|
      extend myAppName = extract(@''(\w+)'', 1, AppName)| summarize oTime = any(TIMESTAMP) by myAppName, logical_database_id| where logical_database_id != "") on
      myAppName| join kind=leftouter (MonBillingBackupDatabaseSize| summarize max(todouble(size_bytes)) by ClusterName, LogicalServerName, SubscriptionId, logical_database_id,
      physical_database_name, file_type, bin(TIMESTAMP, 1h), AppName| summarize DatabaseSizeInGB = sum(max_size_bytes) / (1024.0 * 1024.0 * 1024.0), DatabaseSizeRecordCount
      = count(logical_database_id) by TIMESTAMP, ClusterName, LogicalServerName, SubscriptionId, logical_database_id) on logical_database_id| join kind=leftouter
      (MonBillingSnapshotSize | summarize max(todouble(size_bytes)) by ClusterName, LogicalServerName, SubscriptionId, logical_database_id, physical_database_name,
      file_type, backup_time, bin(TIMESTAMP, 1h), AppName| summarize BackupSizeInGB = sum(max_size_bytes) / (1024.0 * 1024.0 * 1024.0), BackupSizeRecordCount = count(logical_database_id)
      by TIMESTAMP, ClusterName, LogicalServerName, SubscriptionId, logical_database_id) on TIMESTAMP, ClusterName, LogicalServerName, SubscriptionId, logical_database_id|
      join kind=leftouter (MonBillingGeoSnapshotSize| summarize max(todouble(size_bytes)) by ClusterName, LogicalServerName, SubscriptionId, logical_database_id,
      physical_database_name, file_type, bin(TIMESTAMP, 1h), AppName| summarize GeoBackupSizeInGB = sum(max_size_bytes) / (1024.0 * 1024.0 * 1024.0), GeoBackupSizeRecordCount
      = count(logical_database_id) by TIMESTAMP, ClusterName, LogicalServerName, SubscriptionId, logical_database_id) on TIMESTAMP, ClusterName, LogicalServerName,
      SubscriptionId, logical_database_id| project TIMESTAMP, DatabaseSizeInGB, BackupSizeInGB, GeoBackupSizeInGB

      let dt = ago(2h);

      MonDmRealTimeResourceStats

      | where TIMESTAMP > dt

      | where LogicalServerName =~ "{ServerName}" //and database_name =~ "{DatabaseName}"'
