- id: MI-general-12
  Topic: Database-CRUD-failing-or-hanged-due-to-AKV
  Source: Troubleshooting-Guides/Create,-Scale,-Stop,-Start-or-Delete-Resources/Database/Database-CRUD-failing-or-hanged-due-to-AKV.md
  Prompts:
  - MI SQL system health telemetry counts by LogicalServerName, message
  - MonSQLSystemHealth LogicalServerName message Error parsed_message
  - Investigate SQL error
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'let startTime = ago(1d);

      let endTime = now();

      let serverName = "{ServerName}";

      MonSQLSystemHealth

      | where TIMESTAMP > startTime

      | where TIMESTAMP < endTime

      | where LogicalServerName =~ serverName

      | where message contains "Error:"

      | where not(message matches regex "Error: (35262|40613|913|18401|17187),")

      | extend parsed_message = replace("[0-9-]+[ \t]+[0-9:.]+[ \t]+[a-zA-Z0-9]+[ ]+", "", message)

      | summarize count(), min(originalEventTimestamp), max(originalEventTimestamp), any(message) by AppName, NodeName, parsed_message

      | order by count_ desc

      | project min_originalEventTimestamp, max_originalEventTimestamp, count_, AppName, NodeName, parsed_message, any_message

      Sample output:

      | min_originalEventTimestamp | max_originalEventTimestamp | count_ | AppName | NodeName | parsed_message | any_message |

      | --- | --- | --- | --- | --- | --- | --- |

      | 2025-04-03 07:23:41.4952466 | 2025-04-03 10:12:57.8321689 | 33 | be0f939223c7 | _DB8C_0 | **Error: 37412, Severity: 16, State: 1. InitAKVUsingThumbprintAndRsaKey
      operation failed for .vault.azure.net. Error code: 12029.** | 2025-04-03 07:58:30.06 spid116 Error: 37412, Severity: 16, State: 1. 2025-04-03 07:58:30.06 spid116
      InitAKVUsingThumbprintAndRsaKey operation failed for .vault.azure.net. Error code: 12029. |

      | 2025-04-03 07:23:41.4958444 | 2025-04-03 10:12:57.8326748 | 33 | be0f939223c7 | _DB8C_0 | **[AzureKeyVaultClientHelper::CheckAkvGetWrapUnwrap]: Failed server
      level GET access check with msg: [error:106, info:12029, state:0] Cannot send a request due to network error.. Key URI: https://.vault.azure.net/keys/keyvaultkey/3213aec27ba842f385e6f4585bc7a337**
      | 2025-04-03 07:58:30.06 spid116 [AzureKeyVaultClientHelper::CheckAkvGetWrapUnwrap]: Failed server level GET access check with msg: [error:106, info:12029,
      state:0] Cannot send a request due to network error.. Key URI: https://.vault.azure.net/keys/keyvaultkey/3213aec27ba842f385e6f4585bc7a337 |'
