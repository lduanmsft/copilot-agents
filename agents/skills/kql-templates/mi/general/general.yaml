- id: MI-general-48
  Topic: '[One-Pager]-Long-running-scale-operation-on-geo-secondary'
  Source: Troubleshooting-Guides/Create,-Scale,-Stop,-Start-or-Delete-Resources/Instance-scaling-and-service-tier-changes/[One-Pager]-Long-running-scale-operation-on-geo-secondary.md
  Prompts:
