- id: MI-general-27
  Topic: Create-Instance-failed-due-to-previously-deployed-Azure-SQL-Server
  Source: Troubleshooting-Guides/Create,-Scale,-Stop,-Start-or-Delete-Resources/Instance-create-or-drop/Create-Instance-failed-due-to-previously-deployed-Azure-SQL-Server.md
  Prompts:
