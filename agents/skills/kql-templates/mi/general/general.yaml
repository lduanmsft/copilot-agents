  - MonDbSeedTraces LogicalServerName logical_server_name database_name logical_database_name
  - Investigate scale operation
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDbSeedTraces
    ExecutedQuery: 'let startTime = ago(2d);

      let serverName = ''{ServerName}''; //scaling secondary instance

      MonDbSeedTraces

      | where PreciseTimeStamp >= startTime

      | where LogicalServerName =~ serverName

      | where database_size_bytes > 0

      | summarize min_time=min(originalEventTimestamp), max_time=max(originalEventTimestamp) by database_name, database_size_bytes

      | project min_time, max_time, database_id=tolower(database_name), database_size_bytes

      | join kind=leftouter(MonAnalyticsDBSnapshot

      | where TIMESTAMP >= startTime

      | where logical_server_name =~ serverName

      | summarize arg_max(TIMESTAMP,*) by logical_database_name, database_id=tolower(logical_database_id)) on database_id

      | project min_time, max_time, database_id, logical_database_name, database_size_bytes'
