      =~ ''SubscriptionsData.getRegionsEnabledForFeaturePack.parsedResponse''| where message has subscriptionId| order by TIMESTAMP desc | take 1| parse message with "SubscriptionsData.getRegionsEnabledForFeaturePack.parsedResponse:
      " RegionsEnabledForFeatureWave| project TIMESTAMP, RegionsEnabledForFeatureWave = parse_json(RegionsEnabledForFeatureWave)| mv-expand RegionsEnabledForFeatureWave| where RegionsEnabledForFeatureWave
      has subscriptionIdOr check under ASC:

      let subscriptionId = "32beb3f0-c4b9-4e25-a89e-5f7a042c1433";

      | where TIMESTAMP >= ago(30d)

      | where area =~ ''SubscriptionsData.getRegionsEnabledForFeaturePack.parsedResponse''

      | where message has subscriptionId

      | order by TIMESTAMP desc | take 1

      | parse message with "SubscriptionsData.getRegionsEnabledForFeaturePack.parsedResponse: " RegionsEnabledForFeatureWave

