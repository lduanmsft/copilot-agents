- id: MI-ASMI-GENERAL-18
  Topic: DB info (MonManagedDatabases
  Source: kusto-queries/DB info (MonManagedDatabases.md
  Prompts:
  - MI DB info (MonManagedDatabases
  - Managed Instance DB info (MonManagedDatabases
  - Investigate DB info (MonManagedDatabases
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedDatabases
    ExecutedQuery: 'let startTime = ago(12d);

      let endTime = ago(5d);

      let serverId = ''<managed_server_id>'';

      let databaseName = ''<Databasename>'';

      MonManagedDatabases

      | where PreciseTimeStamp >= startTime and PreciseTimeStamp <= endTime

      | where managed_server_id == serverId

      | where managed_database_name == databaseName

      | summarize arg_max(TIMESTAMP,*) by [''state'']'
