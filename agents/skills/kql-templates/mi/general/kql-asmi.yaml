  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonAuditOperational
    ExecutedQuery: 'MonAuditOperational

      //| where logical_server_name == ''<MI name>''

      | where audit_name == "<Audit Name>"

      | summarize min(TIMESTAMP), max(TIMESTAMP) by logical_server_name,audit_name,event'
