SqlSkills:
- id: MI-ASMI-GENERAL-01
  Topic: Audit
  Source: kusto-queries/Audit.md
  Prompts:
  - MI Audit
  - Managed Instance Audit
  - Investigate Audit
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonAuditSessionStatus
    ExecutedQuery: 'let serverName = ''<MI_name>'';

      MonAuditSessionStatus

      | where TIMESTAMP > ago(100d)

      | where LogicalServerName =~ serverName

      | where audit_name == "SQL_DB_EAE_AUDIT"

      //| where audit_name !has ''SqlDbThreatDetection''

      | summarize min(originalEventTimestamp),max(originalEventTimestamp) by audit_name, status'
- id: MI-ASMI-GENERAL-02
  Topic: Audit
