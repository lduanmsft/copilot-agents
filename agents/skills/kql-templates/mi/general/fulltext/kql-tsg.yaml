SqlSkills:
- id: MI-fulltext-1
  Topic: Fulltext-Investigation-Tips
  Source: Performance-and-Query-Execution/Other-errors-and-exceptions/Fulltext-Investigation-Tips.md
  Prompts:
  - MI Fulltext Investigation Tips
  - Managed Instance Fulltext Investigation Tips
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: |-
      MonSQLSystemHealth
      | where TIMESTAMP >= datetime(2016-11-01 10:30:00Z)
      | where TIMESTAMP <= datetime(2016-11-23 18:50:00Z)
      | where LogicalServerName =~ "{ServerName}"
      | where message contains"FDHost"
      | project AppName, PreciseTimeStamp , TIMESTAMP , LogicalServerName , message
- id: MI-fulltext-2
  Topic: Fulltext-Investigation-Tips
  Source: Performance-and-Query-Execution/Other-errors-and-exceptions/Fulltext-Investigation-Tips.md
  Prompts:
  - MI Fulltext Investigation Tips
  - Managed Instance Fulltext Investigation Tips
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonFullTextInfo
    ExecutedQuery: |-
      MonFullTextInfo
      |summarize ErrorCount = countif(error_number > 0) by ClusterName, LogicalServerName, database_name
      | where ErrorCount > 50
      | top 50 by ErrorCount desc
- id: MI-fulltext-3
  Topic: Fulltext-Investigation-Tips
  Source: Performance-and-Query-Execution/Other-errors-and-exceptions/Fulltext-Investigation-Tips.md
  Prompts:
  - MI Fulltext Investigation Tips
  - Managed Instance Fulltext Investigation Tips
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDmOsExceptionStats
    ExecutedQuery: |-
      MonDmOsExceptionStats
      | where LogicalServerName =~ "{ServerName}" and exception_id == 30046
      | where AppName == "{AppName}"
      | where TIMESTAMP > ago(30m)
      | order by TIMESTAMP desc
- id: MI-fulltext-4
  Topic: Fulltext-Investigation-Tips
  Source: Performance-and-Query-Execution/Other-errors-and-exceptions/Fulltext-Investigation-Tips.md
  Prompts:
  - MI Fulltext Investigation Tips
  - Managed Instance Fulltext Investigation Tips
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonFulltextActiveCatalogs
    ExecutedQuery: |-
      MonFulltextActiveCatalogs
      | where TIMESTAMP > datetime(2020-06-11 02:40:27)
      | where TIMESTAMP < datetime(2020-06-11 03:40:27)
      | where LogicalServerName =~ "{ServerName}"
      | where has_crawl_completed == 0
      | where catalog_id == 5
      | where is_enabled == 1
      | project TIMESTAMP, AppName, database_id, catalog_id, active_fts_index_count, auto_population_count, manual_population_count, object_id,
