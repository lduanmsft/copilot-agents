- id: MI-fulltext-6
  Topic: Fulltext-incremental-crawl-stopped-error-30098
  Source: Performance-and-Query-Execution/Other-errors-and-exceptions/Fulltext-incremental-crawl-stopped-error-30098.md
  Prompts:
  - MI Fulltext incremental crawl stopped error 30098
  - Managed Instance Fulltext incremental crawl stopped error 30098
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonFullTextCrawlLog
    ExecutedQuery: |-
      MonFullTextCrawlLog
      | where LogicalServerName =~ "{ServerName}"
      //| where error_id > 30000 and error_id != 30096
      //| where TIMESTAMP > ago(10d)
      //| where TIMESTAMP >= datetime(2023-12-15 20:30:00)
      //| where TIMESTAMP <= datetime(2023-12-15 23:00:00)
