- id: DB-data-integration-12
  Topic: BRDB0005-1-Hyperscale-restore-stuck_failure
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0005-1-Hyperscale-restore-stuck_failure.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event originalEventTimestamp
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where event == ''management_operation_start''

      | where request_id == ''<request_id>''

      | extend opParams = parse_xml(operation_parameters)

      | extend TargetBackupStoragetype = tostring(opParams.InputParameters.TargetStorageAccountTypeForBackup)

      | extend SourceLogicalDatabaseId = tolower(tostring(opParams.InputParameters.SourceLogicalDatabaseId))

      | project originalEventTimestamp, request_id, TargetBackupStoragetype, SourceLogicalDatabaseId

      | join kind=inner (MonAnalyticsDBSnapshot

      | extend logical_database_id = tolower(logical_database_id)

      | summarize arg_max(TIMESTAMP, active_backup_storage_type) by logical_database_id)

      on $left.SourceLogicalDatabaseId == $right.logical_database_id

      | project-away logical_database_id, TIMESTAMP

      | extend isDeepCopy = iff(isempty(TargetBackupStoragetype), "false",

      iff(active_backup_storage_type == TargetBackupStoragetype, "false", "true"))'
- id: DB-data-integration-13
  Topic: BRDB0005-7StuckVInstance
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0005-7StuckVInstance.md
  Prompts:
