- id: DB-data-integration-289
  Topic: SYNCALRT002-SYNC_APP_UNHEALTHY_ALERT
  Source: TSG-SQL-DB-DataIntegration/DataSync/SYNCALRT002-SYNC_APP_UNHEALTHY_ALERT.md
