- id: DB-data-integration-379
  Topic: Repl-Perf-RCA
  Source: TSG-SQL-DB-DataIntegration/Replication/content/Repl-Perf-RCA.md
  Prompts:
  - SQL DB log reader traces latency
  - SQL DB MonLogReaderTraces LogicalServerName TIMESTAMP
  - SQL DB troubleshoot log reader traces latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogReaderTraces
    ExecutedQuery: 'MonLogReaderTraces

      | where TIMESTAMP between(startTime..endTime)

      | where LogicalServerName =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}"

      | where phase_number in (2, 7)   and max_trans == maxtran and phase_state_name == "phase_end"

      | summarize arg_max(originalEventTimestamp, session_id, max_trans, phase_number, tran_count, log_record_count, command_count, end_lsn, phase_state_name), min(start_time), max(start_lsn) by session_id

      | summarize arg_max(originalEventTimestamp, session_id, max_trans, phase_number, tran_count, log_record_count, command_count, end_lsn, phase_state_name), min(min_start_time), min(max_start_lsn) by session_id / iff(max_trans < 10000, 1000, 100)

      | extend start_lsn = min_max_start_lsn, start_time = min_min_start_time

      | project originalEventTimestamp, session_id, max_trans, phase_number, tran_count, log_record_count, command_count, start_lsn, end_lsn, phase_state_name, start_time,

      vlfcount = (toint(strcat("0x", substring(end_lsn, 0, 8)))-toint(strcat("0x", substring(start_lsn, 0, 8)))),

      duration = ((todatetime(originalEventTimestamp)-todatetime(start_time))/time(1s)),

      scan_rate_mBps = (toint(strcat("0x", substring(end_lsn, 0, 8)))-toint(strcat("0x", substring(start_lsn, 0, 8)))) * vlf_size_mb / ((todatetime(originalEventTimestamp)-todatetime(start_time))/time(1s))

      | where scan_rate_mBps != 0 and vlfcount > 2

      | summarize avg(vlfcount), avg(duration), avg(scan_rate_mBp)'
- id: DB-data-integration-380
  Topic: Repl-Perf-RCA
  Source: TSG-SQL-DB-DataIntegration/Replication/content/Repl-Perf-RCA.md
  Prompts:
  - SQL DB log reader traces status
  - SQL DB MonLogReaderTraces event LogicalServerName
  - SQL DB investigate log reader traces
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogReaderTraces
    ExecutedQuery: 'MonLogReaderTraces

      | where TIMESTAMP between (startTime .. endTime)

      | where LogicalServerName =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}"

      | where (phase_state_name in ( "phase_end") and phase_number in (1,2,7)) or (event == "repldone_session")

      | extend waitdata = parse_xml(wait_stats)["waitstats"]["wait"]

      | mv-expand waitdata

      | extend waittime = tolong(waitdata["@time"])/1000.0, waitname = tostring(waitdata["@name"]);'
- id: DB-data-integration-381
  Topic: Repl-Perf-RCA
  Source: TSG-SQL-DB-DataIntegration/Replication/content/Repl-Perf-RCA.md
  Prompts:
