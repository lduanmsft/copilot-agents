- id: DB-data-integration-195
  Topic: BRDB0550-Stale-BMS-Records-and-xStore-Backups
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0550-Stale-BMS-Records-and-xStore-Backups.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonRgLoad event AppName NodeName ClusterName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(30m)

      | extend AppName = tostring(split(application_name, ''/'')[2])

      | where AppName == ''<app_name>''

      | where event == ''instance_load'' and code_package_name contains ''satellite''

      | project TIMESTAMP, memory_load_cap, AppName, memory_current_cap, memory_load, ClusterName, NodeName, application_name, code_package_name, service_manifest_name

      | summarize arg_max(TIMESTAMP, *) by AppName, NodeName

      | extend memory_cap_increase = max_of(toint(memory_load_cap) + 1536, toint(memory_current_cap))

      | extend script = strcat(''Update-RgResourceSettings -ClusterName '', ClusterName, '' -NodeName '', NodeName, '' -ApplicationName '', application_name, '' -ResourceType CommitMemCapInMb -CodePackagename SqlSatelliteRunner -ManifestName SQL -ResourceValue '', memory_cap_increase)

      | project AppName, memory_load_cap, memory_current_cap, memory_cap_increase, memory_load, script'
