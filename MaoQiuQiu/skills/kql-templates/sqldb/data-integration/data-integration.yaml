    ExecutedQuery: 'MonImportExport

      | where event == "ImportExportScrubbedExceptionXEvent"

      | where Level == "Critical" // We only care about exceptions which are causing the process to terminate

      | where isnotempty(ExceptionErrorClassification) // This value is only emitted on the first exception in the stack. Remove this line if you want to see all exceptions.

      | where ExceptionType !in // These exception types are too broad to be particularly interesting

      (

      "System.Data.SqlClient.SqlException",

      "System.AggregateException",

      "System.Fabric.FabricElementNotFoundException"'
- id: DB-data-integration-305
  Topic: IESOP2004-Platform-OS-Upgrade
  Source: TSG-SQL-DB-DataIntegration/ImportExport/SOP/IESOP2004-Platform-OS-Upgrade.md
  Prompts:
  - SQL DB get batched nodes out of sla activity
  - SQL DB GetBatchedNodesOutOfSLA do is It to us we
  - SQL DB investigate get batched nodes out of sla
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: GetBatchedNodesOutOfSLA
    ExecutedQuery: 'let jobsPerIteration = 100;

      GetBatchedNodesOutOfSLA(@''AzureSQLDB/Import/ExportService'')

      | where EscalationId =~ "azuresqldb/import/exportservice"

      | where isnotempty(PendingSinceDays)

      | project-rename Tenant=Cluster, SQLRingTenant=TenantName, nodeId=NodeId, Freshness=PendingSinceDays

      | summarize arg_max(Freshness, Region, Tenant) by SQLRingTenant, nodeId // Strip out duplicates for a given node

      | where Freshness > 14 // Our SLA is 50 days. It''s nice to Compute to do them ASAP, but we wait a few days to allow us to do some batching.

      | partition hint.strategy=native by SQLRingTenant (top jobsPerIteration by Freshness)'
