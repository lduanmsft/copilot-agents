- id: DB-data-integration-401
  Topic: SL0002-SynapseLinkErrors
  Source: TSG-SQL-DB-DataIntegration/Replication/content/SL0002-SynapseLinkErrors.md
  Prompts:
  - SQL DB sl0002 synapse link errors
  - SQL DB MonSynapseLinkTraces AppName has_any event_details
  - SQL DB troubleshoot sl0002 synapse link errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSynapseLinkTraces
    ExecutedQuery: 'let EnabledTableIds = MonSynapseLinkTraces

      | where AppName == ''{appname}''

      | where event_details startswith "SynapseLinkTimerTask : LandingZone::UpdateTableStatusIfNotDisabled Updating status for dbId" and event_details contains ''SYNAPSE_CHANGE_TABLE_EXPORTING''

      | order by PreciseTimeStamp desc

      | extend Table_ID_Number = extract("tableID ([0-9.]+)", 1, event_details)

      | distinct Table_ID_Number, AppName;

      let traces = MonSynapseLinkTraces

      | where AppName == ''{appname}'';

      let SnapshotCompletedTableIds = traces

      | where event_details contains "SynapseLinkSnapshotWorkItem : UpdateTableStatus for" and event_details contains "SYNAPSE_CHANGE_TABLE_EXPORTED"

      | where event_details has_any (EnabledTableIds)

      | extend Table_ID_Number1 = extract("tableID ([0-9.]+)", 1, event_details)

      | distinct Table_ID_Number1;'
