- id: DB-data-integration-213
  Topic: HSLTR0002-LTR_backup_out_of_SLA
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/HSLTR0002-LTR_backup_out_of_SLA.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonManagement event originalEventTimestamp
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where state_machine_type =~ ''LtrConfigurationStateMachine''

      | where keys =~ ''<logical_server_id>,<logical_database_id>''

      | where event =~ ''fsm_changed_state''

      | summarize arg_max(originalEventTimestamp, *) by keys

      | where originalEventTimestamp < ago(1d)

      | project old_state, new_state, request_id

      | take 1

      - If new_state is WaitingForNewLtrBackup, then backup is stuck. Follow [HSLTR0003 - Stuck LTR backup](./HSLTR0003-Stuck-_LTR_backup.md)

      - If new_state is Ready then backup is most probably failing constantly. Follow [HSLTR0004 - Failed LTR backup](./HSLTR0004-Failed_LTR_backup.md)'
