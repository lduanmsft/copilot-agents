- id: DB-data-integration-233
  Topic: LTR0011.1-LTR-Backup-Audit-Query
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/LTR0011.1-LTR-Backup-Audit-Query.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBackup originalEventTimestamp event_type
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where originalEventTimestamp > ago(MON_BACKUP_RETENTION)

      | where event_type == "BACKUP_END"

      | where backup_type == "Full"

      | parse backup_path with * ''Full/'' full_backup_time ''_S'' * ''.bak''

      | extend full_backup_time = todatetime(strcat(full_backup_time, "Z"))

      | summarize set_full_backups = make_set(full_backup_time), num_full_backups = dcount(full_backup_time) by logical_database_id

      | extend logical_database_id = toupper(logical_database_id)

      ) on logical_database_id

      | project-away logical_database_id1

      // Add enhanced cluster and investigation commands

      | parse ClusterName with ring_name "." region_name "." *

      | extend dsc_cluster_name = strcat("wasd-prod-", region_name)

      | extend select_sql_azure_cluster_cas = strcat("Select-SqlAzureCluster ", dsc_cluster_name)

      | project-away ring_name, region_name, dsc_cluster_name

      | extend get_ltr_backups_cas = strcat(''(Get-LtrBackup -SubscriptionId '', customer_subscription_id,'' -LogicalServerName '', logical_server_name,'' -LogicalDatabaseName '', logical_database_name,'') | Select-Object BackupTime, BackupExpirationTime, BackupState'')

      | extend get_ltr_backups_with_cluster_cas = strcat(select_sql_azure_cluster_cas, "; ", get_ltr_backups_cas)

      | extend extend_internal_retention_cas = strcat("Update-DatabaseShortTermRetentionPolicy -LogicalServerName \"", logical_server_name, "\" -LogicalDatabaseName \"", logical_database_name, "\" -RetentionDays 35 -IsCustomerVisible $false")

      | extend extend_internal_retention_with_cluster_cas = strcat(select_sql_azure_cluster_cas, "; ", extend_internal_retention_cas)

      | extend query_lms_cas = strcat("Query-LMS -Query \"SELECT backup_time, backup_expiration_time, state FROM ltr_backups WHERE logical_database_id = ''", logical_database_id, "''\"")

      | parse weekly_retention with "P" weekly_retention_in_weeks "W"

      | parse weekly_retention with "P" weekly_retention_in_months "M"

      | parse weekly_retention with "P" weekly_backup_retention_in_years "Y"

      | extend num_expected_weekly_backups = iff(isnotempty(weekly_retention_in_weeks),

      min_of(toint(weekly_retention_in_weeks), EXPECTED_WEEKLY_BACKUPS),

      iff(isnotempty(weekly_retention_in_months) or isnotempty(weekly_backup_retention_in_years),

      EXPECTED_WEEKLY_BACKUPS'
- id: DB-data-integration-234
  Topic: LTR0011.1-LTR-Backup-Audit-Query
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/LTR0011.1-LTR-Backup-Audit-Query.md
  Prompts:
  - SQL DB backup status
  - SQL DB backup at HS if is of are bit but can
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: '| extend num_weeks_since_policy_change = floor((now() - last_policy_change_time) / 7d, 1)

      | extend num_expected_weekly_backups = min_of(num_weeks_since_policy_change - 1, num_expected_weekly_backups)

      | extend num_expected_month_backups = iff(monthly_retention != "PT0S", 1, 0) // Regardless of the policy, we will most likely only see one backup at max in MonBackup for monthly LTR

      | extend is_ltr_policy_new = last_policy_change_time > now() - MON_BACKUP_RETENTION // These will possibly be false positives, since the policy change might account for any missing backups

      | extend num_expected_backups = max_of(num_expected_weekly_backups, num_expected_month_backups)

      | extend is_missing_backups = count_all_known_captured_backups < num_expected_backups

      // Try to interpret the dropped time based on when the DB disappeared from MonAnalyticsDBSnapshot

      | extend was_dropped_before_backup = not(last_mon_analytics_report_time > ago(1d)) and last_mon_analytics_report_time between(ltr_last_backup_taken - 1.5h .. ltr_next_backup_time + 1.5h)

      | where is_missing_backups == true

      | where was_dropped_before_backup == false // DBs which were dropped between LTR backups are likely false positives

      | where ltr_next_backup_time > now() - 7d // For the purpose of this investigation, filter out DBs which have at least taken some recent backup

      | where server_type == "SqlDB" // There are lots of hits for ManagedInstance but I can''t validate that those are true positives

      | where service_level_objective !contains "HS" // HS backups are not tracked in MonBackup, ignore for this investigation

      | where not(is_ltr_policy_new) // This filter is a bit aggressive. Maybe upgrade the num_expected_backups based on the policy if the policy is new.

      );

      let logical_database_ids_with_potentially_missing_backups = toscalar(ResultsWithPotentialMissingLtrBackups | summarize make_set(logical_database_id));

      // Do deeper (expensive) analysis on missing backups after this line'
