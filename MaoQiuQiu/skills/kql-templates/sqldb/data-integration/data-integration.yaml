- id: DB-data-integration-220
  Topic: HSLTR_Important_Queries_and_Telemetry
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/HSLTR_Important_Queries_and_Telemetry.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonLtrConfiguration state logical_server_name
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLtrConfiguration
    ExecutedQuery: 'MonLtrConfiguration

      //| where PreciseTimeStamp > ago(2d)

      | where logical_database_id = {ldb_id}

      | where is_vldb == 1

      | where is_geodr_secondary == 0

      | where state =~ ''Ready'' or state =~ ''WaitingForNewLtrBackup'' or (state =~ ''ReadyToPurge'' and next_backup_time <= db_dropped_time)

      | where not((weekly_retention == ''PT0S'' and monthly_retention == ''PT0S'' and yearly_retention == ''PT0S'')

      or (weekly_retention == '''' and monthly_retention == '''' and yearly_retention == ''''))

      | extend backup_date_with_buffer = datetime_add(''day'', 3, next_backup_time)

      | where PreciseTimeStamp > datetime_add(''day'', 3, next_backup_time)

      | extend logical_database_id = toupper(logical_database_id)

      | summarize arg_max(PreciseTimeStamp, *) by logical_server_id, logical_database_id

      | project PreciseTimeStamp, ClusterName, AppName, NodeName, logical_server_id, logical_database_id, logical_server_name, logical_database_name,

      weekly_retention, monthly_retention, yearly_retention, week_of_year,

      is_vldb, last_backup_time, state, db_dropped_time, create_time, next_backup_time'
