- id: DB-data-integration-303
  Topic: IESOP2003-Run-On-Demand-Import-Export-Deployment
  Source: TSG-SQL-DB-DataIntegration/ImportExport/SOP/IESOP2003-Run-On-Demand-Import-Export-Deployment.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event PreciseTimeStamp
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where PreciseTimeStamp > ago(2d)

      | where operation_type in (''ImportToNewDatabase'', ''ImportToExistingDatabase'', ''ExportDatabase'')

      | where event != "management_operation_start"

      | extend ServerName = extract(@"<ServerName>([^<]*)", 1, operation_parameters)

      | extend ServerName = strcat(ServerName, ".database.windows.net")

      | summarize NewServiceSuccesses=countif(event == "management_operation_success"), NewServiceFailures=countif(event == "management_operation_failure") by bin(originalEventTimestamp, 24hr)

      | extend PassRate = NewServiceSuccesses / todouble(NewServiceSuccesses + NewServiceFailures)'
- id: DB-data-integration-304
