- id: DB-data-integration-181
  Topic: BRDB0500-SRB-Low-Backup-Rate-On-Secondary
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0500-SRB-Low-Backup-Rate-On-Secondary.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBackup LogicalServerName AppTypeName
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where TIMESTAMP > startofday(ago(8d)) and TIMESTAMP < startofday(ago(1d))

      | where AppTypeName == ''Worker.ISO.Premium''

      | where LogicalServerName == serverName

      | where logical_database_id =~ dbId

      | where message_type == ''INFO''

      | where details startswith_cs ''BackupConfiguration.EnableLogBackupOnSecondaryReplicaInBackupService = True''

      or details startswith_cs ''BackupConfiguration.EnableDiffBackupOnSecondaryReplicaInBackupService = True''

      or details startswith_cs ''BackupConfiguration.EnableFullBackupOnSecondaryReplicaInBackupService = True''

      | extend secondary_replica_id = extract(@"Backup will be taken on the secondary replica ID = ''?([^''\.\s]+)", 1, details)

      | extend backupIsTakenOnSecondary = isnotempty(secondary_replica_id)

      | summarize

      PriCount = countif(backupIsTakenOnSecondary == false),

      SecCount = countif(backupIsTakenOnSecondary == true)

      by ClusterName, LogicalServerName, logical_database_id, logical_database_name, bin(TIMESTAMP, 1d)

      | extend TotalCount = (PriCount + SecCount)

      | extend SecRate = SecCount * 1.0 / TotalCount, HitCount = count() by ClusterName, LogicalServerName, logical_database_id, logical_database_name

      | where HitCount == 7'
