- id: DB-data-integration-257
  Topic: Mitigate-Stuck-Restored-CMS
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/Mitigate-Stuck-Restored-CMS.md
  Prompts:
  - SQL DB restore status
  - SQL DB MonRestoreEvents AppTypeName TIMESTAMP cmd1
  - SQL DB investigate restore
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: 'MonRestoreEvents

      | where AppTypeName =="Worker.ISO.Control"

      | where restore_database_progress !=""

      | where TIMESTAMP >ago(2h)

      | where restore_database_progress contains "SELECT"

      | order by TIMESTAMP desc

      | extend Cluster=extract(@"cr.\.(.+\-[a-z]).+", 1, ClusterName), ControlRingName=extract(@"(cr\d).+", 1, ClusterName)

      // CasSelectEnv e.g. Select-SqlAzureCluster wasd-prod-northcentralus1-a-cr3

      //| extend CASSelectEnv=strcat("Select-SqlAzureEnvironment Prod")

      | extend CASSelectCluster=strcat("Select-SqlAzureCluster wasd-prod-", Cluster, "-", ControlRingName)

      | limit 1

      | extend cmd = strcat(" Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, '' |Kill-Process -ProcessName SqlSatelliteRunnerHost.exe -ApplicationNameUri fabric:/Worker.ISO.Control/'', AppName)

      | extend cmd1= strcat(CASSelectCluster,";", cmd,";")

      |project cmd1'
