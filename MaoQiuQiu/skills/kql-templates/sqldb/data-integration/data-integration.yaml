- id: DB-data-integration-368
  Topic: Increase-Transaction-Log-Size
  Source: TSG-SQL-DB-DataIntegration/Replication/content/Increase-Transaction-Log-Size.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where TIMESTAMP between (_startTime.._endTime) and sql_instance_name !startswith ''v-'' and sql_instance_name !startswith ''b-''

      | where logical_database_name ==_databaseName

      | where logical_server_name ==_logicalServerName

      | where max_size_bytes != -1

      | where database_type == "SQL.UserDb"

      | summarize arg_max(TIMESTAMP, logical_database_name, logical_server_name, fabric_service_uri, max_size_bytes) by physical_database_id

      | extend maxDatabaseSizeMbs = max_size_bytes / (1024 * 1024)

      | project TIMESTAMP, fabric_service_uri, maxDatabaseSizeMbs

      | extend targetMaxLogSizeGbs = ceiling((maxDatabaseSizeMbs  * 30.0) / (100 * 1024))     // Make sure we round the target size to the next GB

      | extend targetMaxLogSizeGbs = max_of(min_of(targetMaxLogSizeGbs , 1024), 180)     // We apply a maximum of one TB and a minimum of 180 GBs

      | project TIMESTAMP, fabric_service_uri, DefaultMaxLogSizeForTheSLO = targetMaxLogSizeGbs

      - Write LogSize,  MaxLogSize and DefaultMaxLogSize to IcM'
