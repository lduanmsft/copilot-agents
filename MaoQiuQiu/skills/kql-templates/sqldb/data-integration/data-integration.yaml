- id: DB-data-integration-261
  Topic: PITR-Trace-File-Template
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/PITR-Trace-File-Template.md
  Prompts:
  - SQL DB backup status
  - SQL DB AlrBackup event logical_server_name AppTypeName
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrBackup
    ExecutedQuery: 'AlrBackup

      | where AppTypeName in~ ("Worker.ISO", "Worker.Iso.Premium") and logical_database_name != "master"

      | where event=~ "database_backup" and event_type =~ "BACKUP_METADATA_DETAILS"

      | where SubscriptionId =~ subscriptionId

      | project originalEventTimestamp, logical_server_name, logical_database_id, logical_database_name, backup_type, backup_path

      | order by logical_server_name, logical_database_id, originalEventTimestamp desc

      | extend rn = row_number(1, prev(logical_database_id) != logical_database_id or prev(logical_server_name) != logical_server_name)

      | project rn, originalEventTimestamp, logical_server_name, logical_database_id, logical_database_name, backup_type, backup_path

      | where rn <= 3

      | project logical_server_name,logical_database_id, logical_database_name, backup_timestamp=originalEventTimestamp, backup_type, backup_path'
- id: DB-data-integration-262
  Topic: PITR-Trace-File-Template
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/PITR-Trace-File-Template.md
