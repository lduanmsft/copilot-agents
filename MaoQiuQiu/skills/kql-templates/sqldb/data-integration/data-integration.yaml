- id: DB-data-integration-79
  Topic: BRDB0062-Validate-New-Region-Backup-Billing
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0062-Validate-New-Region-Backup-Billing.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBillingPitrBackupSize database_name is
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBillingPitrBackupSize
    ExecutedQuery: 'MonBillingPitrBackupSize

      // Stage billing only flows for certain clusters

      //| where ClusterName has_any ("southeastasia1", "lkgtst1")

      | where originalEventTimestamp between(startTime .. endTime)

      | where backup_storage_size_mb > 0 or backup_lrs_storage_size_mb > 0 or backup_zrs_storage_size_mb > 0

      | extend backup_storage_size_mb = backup_storage_size_mb + backup_lrs_storage_size_mb + backup_zrs_storage_size_mb

      | extend backup_storage_size_gb = backup_storage_size_mb / 1024.0

      | extend max_size_bytes_gb = max_size_bytes / 1024.0 / 1024.0 / 1024.0

      | extend billable_backup_size_gb = max_of(0, backup_storage_size_gb - max_size_bytes_gb)

      | summarize arg_max(billable_backup_size_gb, *) by database_id, bin(originalEventTimestamp, 1h) // "Max of hour" billing model

      | extend billable_backup_size_gb = billable_backup_size_gb / (31 * 24) // Divide by hours per month to convert to GB / hour / month billing units

      | where billable_backup_size_gb > 0

      | summarize num_input_billing_records=dcount(request_id), oldest_billing_input_data=min(end_utc_date), newest_billing_input_data=max(end_utc_date), billable_backup_size_gb=sum(billable_backup_size_gb), take_any(backup_retention_days, active_backup_storage_type, database_name, billing_server_name, edition, resource_pool_id) by database_id

      | extend is_pool_db = isnotempty(resource_pool_id)

      | project billing_server_name, database_name, database_id, edition, backup_retention_days, billable_backup_size_gb, active_backup_storage_type, is_pool_db, oldest_billing_input_data, newest_billing_input_data, num_input_billing_records

      | where is_pool_db == false // Pool database billing is more complicated since the amount of storage size discount is based on the fraction of size that the database contributes

      | extend total_quantity = 0.0

      | extend output_data_found = false

      | extend database_id = toupper(database_id)

      | join kind=leftouter ([''OroProcessed-VCoreBackup-production-DatabaseVCoreBackupStorageSizeProcessor'']

      | where EventDateTime between(startTime .. endTime)

      | summarize sum(Quantity) by DatabaseId

      | extend DatabaseId = toupper(DatabaseId)

      ) on $left.database_id == $right.DatabaseId

      | extend output_data_found = output_data_found or isnotnull(sum_Quantity)

      | extend total_quantity = iff(isnotnull(sum_Quantity), total_quantity + sum_Quantity, total_quantity)

      | project-away DatabaseId, sum_Quantity

      // Due to the different cadence of emitting billing data vs. Oro emission, allow some fudge factor of billing accuracy.

      // Billing data will always be present, Oro data may lag by a few hours depending on which bucket the billing data is assigned.

      | extend skip_due_to_oro_delay = newest_billing_input_data - oldest_billing_input_data <= ALLOWED_DELAY_FOR_ORO_INGESTION

      | extend billing_tolerance = billable_backup_size_gb * BILLING_COMPARISON_FUDGE_FACTOR

      | extend is_within_tolerance = billable_backup_size_gb + billing_tolerance > total_quantity and total_quantity > billable_backup_size_gb - billing_tolerance

      | extend should_alert_due_to_value_difference = not(is_within_tolerance or skip_due_to_oro_delay)

      | summarize total_dbs = dcount(database_id), num_dbs_not_reporting_data = countif(should_alert_due_to_value_difference), dbs_not_reporting_data = make_set_if(database_id, should_alert_due_to_value_difference)

      | extend dbs_not_reporting_data_fraction = num_dbs_not_reporting_data * 1.0 / total_dbs

      | extend should_alert = dbs_not_reporting_data_fraction > ALLOWED_NON_REPORTING_DBS_FRACTION'
