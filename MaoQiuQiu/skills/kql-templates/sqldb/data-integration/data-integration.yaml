- id: DB-data-integration-147
  Topic: BRDB0400-PrematureBackupDeletion_ExcessiveBackupRe
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0400-PrematureBackupDeletion_ExcessiveBackupRe.md
  Prompts:
  - SQL DB backup status (MI/GeoDR context)
  - SQL DB MonBackup logical_server_name LogicalServerName
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where originalEventTimestamp between (lookBackPeriodStart .. lookBackPeriodEnd)

      | where AppTypeName in (''Worker.ISO'', ''Worker.ISO.Premium'', ''Worker.MD'') or AppTypeName startswith ''Worker.CL''

      | where message_type == ''INFO''

      | where [''details''] contains '' - Policy for database ['' and [''details''] contains ''delete backups files before''

      //| {regionFilter}

      | project originalEventTimestamp, ClusterName, NodeName, AppName, AppTypeName, logical_server_name=LogicalServerName, message_type, [''details'']

      // Row looks like:

      // CleanupFiles/BackupCleanup - Policy for database [ce22d61b-a258-4f41-ae74-e359a65d0798, BusinessCritical] = delete backups files before 09/24/2018 23:16:02. BackupRetentionInDays = 7, BackupRetentionBufferInDays = 2

      | parse [''details''] with * '' - Policy for database ['' logical_database_id '', '' Edition ''] = delete backups files before '' remainderToBeParsed

      | parse remainderToBeParsed with backupsCleanedUpBeforeDate ''. BackupRetentionInDays = '' trRetentionDays '', BackupRetentionBufferInDays = '' bufferInDays

      | extend backupsCleanedUpBeforeDate = iff(isempty(backupsCleanedUpBeforeDate), remainderToBeParsed, backupsCleanedUpBeforeDate)

      // Number of *extra* days in addition to the policy which the backup service will use when cleaning up backups. Might vary per-region.

      | extend tr_retention_days = toint(trRetentionDays)

      | extend bufferInDays = iff(isnotempty(bufferInDays), toint(bufferInDays) * 1d, iff([''details''] startswith ''CleanupFiles'', oldCleanupBuffer, bmsCleanupBuffer))

      | extend logical_database_id = toguid(logical_database_id), backupsCleanedUpBeforeDate = todatetime(backupsCleanedUpBeforeDate)

      | where isnotempty(logical_database_id)

      // Get only the latest cleanup information for each database

      | summarize arg_max(originalEventTimestamp, AppName, AppTypeName, ClusterName, NodeName, [''details''], backupsCleanedUpBeforeDate, bufferInDays, tr_retention_days) by logical_server_name, logical_database_id

      | project backupsCleanupTimestamp=originalEventTimestamp, ClusterName, NodeName, AppName, AppTypeName, logical_server_name, [''details''], logical_database_id, backupsCleanedUpBeforeDate, tr_retention_days, bufferInDays

      // Create a column which tells us how many days ago the backups were cleaned up. We will compare this to the customer-defined policy set in CMS

      // Round the calculated timespans to the nearest day. There is no methods for operating on timespans in Kusto, so convert to long

      | extend buffered_tr_retention_days = round((backupsCleanupTimestamp - backupsCleanedUpBeforeDate) / 1d, 0)

      // This is the backup policy as the tenant ring is exercising it. This may be different from the customer-defined policy in CMS!

      | extend tr_retention_days = iff(isnotempty(tr_retention_days), tr_retention_days, toint(round((backupsCleanupTimestamp - backupsCleanedUpBeforeDate - bufferInDays) / 1d, 0)))

      | where logical_database_id = {your_logical_database_id}

      | where logical_server_name = {your_logical_server_name}'
- id: DB-data-integration-148
  Topic: BRDB0400-PrematureBackupDeletion_ExcessiveBackupRe
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0400-PrematureBackupDeletion_ExcessiveBackupRe.md
  Prompts:
