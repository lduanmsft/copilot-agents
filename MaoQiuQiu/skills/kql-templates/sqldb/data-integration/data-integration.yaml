- id: DB-data-integration-385
  Topic: Repl-Perf-RCA
  Source: TSG-SQL-DB-DataIntegration/Replication/content/Repl-Perf-RCA.md
  Prompts:
  - SQL DB log reader traces latency
  - SQL DB MonLogReaderTraces event LogicalServerName
  - SQL DB troubleshoot log reader traces latency
  CustomizedParameters:
