  - ServerName
  KustoQueries:
  - TableName: MonNonPiiAudit
    ExecutedQuery: 'MonNonPiiAudit

      | where request_id =~ ''bb57fc86-fc63-4034-be46-9c30b4ad6587''

      | project username'
- id: DB-data-integration-14
  Topic: BRDB0005-8-BRAIN-restore-failures
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0005-8-BRAIN-restore-failures.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event originalEventTimestamp
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where originalEventTimestamp between(ago(1d) .. now()) // Update as needed

      | where operation_type in ("CreateRestoreFromLtrBackupRequest", "CreateRestoreRequest")

      //| where subscription_id in ("<guid1>", "<guid2>", ...) // Uncomment and add some subscriptions here if you wish to limit results to a few customers

      | where event in ("management_operation_success", "management_operation_cancel", "management_operation_failure", "management_operation_timeout") // These are the events which the BRAIN SLO watches

      | extend error_message = iff(isnotempty(error_message), error_message, exception_message)

      | extend IsRestoreVerification = tobool(extract("<IsVerificationRequest>([^<]+)</IsVerificationRequest>", 1, operation_parameters))

      | extend IsRestoreVerification = iff(isempty(IsRestoreVerification), False, True)

      | summarize

      Total = count(),

      Successes = countif(event == "management_operation_success"),

      Failures = countif(event == "management_operation_failure"),

      Cancels = countif(event == "management_operation_cancel"),

      Timeouts = countif(event == "management_operation_timeout")'
- id: DB-data-integration-15
  Topic: BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space.md
  Prompts:
  - SQL DB restore status
  - SQL DB MonRestoreEvents originalEventTimestamp
  - SQL DB investigate restore
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: 'MonRestoreEvents

      | where restore_request_id =~ restoreRequestIdFilter

      | where originalEventTimestamp > ago(12h)

      | where message contains "There is insufficient free space on disk volume" and message contains "file.core.windows.net"

      | summarize arg_max(TIMESTAMP, AppName, AppTypeName, LogicalServerName, SubscriptionId, message),

      count()

      by ClusterName = tostring(split(ClusterName, ''.'')[1]),

      RestoreRequestId = toupper(restore_request_id)

      | join kind=inner

      ('
- id: DB-data-integration-16
  Topic: BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event ClusterName
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where TIMESTAMP > ago(30d)

      | where operation_type contains "CreateRestoreRequest" or operation_type contains "CreateRecoverRequest"

      | where event == "management_operation_start"

      | extend SourceLogicalDatabaseName = toupper(tostring(parse_xml(operation_parameters).InputParameters.SourceLogicalDatabaseName))

      | extend SourceLogicalServerName = tostring(parse_xml(operation_parameters).InputParameters.SourceLogicalServerName)

      | extend SourceDatabaseDroppedTime = tostring(parse_xml(operation_parameters).InputParameters.SourceDatabaseDroppedTime)

      | extend TargetLogicalServerName = toupper(tostring(parse_xml(operation_parameters).InputParameters.TargetLogicalServerName))

      | extend TargetLogicalDatabaseName = toupper(tostring(parse_xml(operation_parameters).InputParameters.TargetLogicalDatabaseName))

      | extend RestoreRequestId = tostring(parse_xml(operation_parameters).InputParameters.RestoreId)

      | extend PointInTime = tostring(parse_xml(operation_parameters).InputParameters.PointInTime)

      | extend SourceLogicalDatabaseId = tostring(parse_xml(operation_result).OutputParameters.SourceLogicalDatabaseId)

      | extend TargetLogicalElasticPoolName = tostring(parse_xml(operation_parameters).InputParameters.TargetLogicalElasticPoolName)

      | project originalEventTimestamp, operation_type, event, request_id,

      RestoreRequestId = toupper(RestoreRequestId),

      SourceLogicalServerName, SourceLogicalDatabaseName, SourceDatabaseDroppedTime, SourceLogicalDatabaseId,

      TargetLogicalServerName, TargetLogicalDatabaseName, TargetLogicalElasticPoolName, PointInTime

      ) on RestoreRequestId

      | project ClusterName, RestoreRequestId, request_id, operation_type, event,

      RestoreRequestStartTime = originalEventTimestamp,

      LastFailureTime = TIMESTAMP,

      NumberOfFailedAttempts = count_,

      SubscriptionId, SourceLogicalServerName, SourceLogicalDatabaseName, SourceLogicalDatabaseId,

      TargetLogicalServerName, TargetLogicalDatabaseName, TargetLogicalElasticPoolName, PointInTime

      | join kind=leftanti

      ('
- id: DB-data-integration-17
  Topic: BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event ClusterName
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where TIMESTAMP > ago(30d)

      | where operation_type contains "CreateRestoreRequest" or operation_type contains "CreateRecoverRequest"

      | where event == "management_operation_failure" or event == "management_operation_success" or event == "management_operation_canceled"

      | extend RestoreRequestId = tostring(parse_xml(operation_parameters).InputParameters.RestoreId)

      | project TIMESTAMP, event, request_id, RestoreRequestId

      ) on request_id

      | extend RunTime = now() - RestoreRequestStartTime

      | project ClusterName, RestoreRequestId, request_id, operation_type,

      LastFailureTime, NumberOfFailedAttempts,

      SubscriptionId, TargetLogicalServerName, TargetLogicalDatabaseName, TargetLogicalElasticPoolName, PointInTime,

      RestoreRequestStartTime, RunTime'
- id: DB-data-integration-18
  Topic: BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space.md
