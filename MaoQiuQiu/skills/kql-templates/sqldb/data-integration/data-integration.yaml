- id: DB-data-integration-435
  Topic: TL0001-OneLake-Client-workflow-and-troubleshooting
  Source: TSG-SQL-DB-DataIntegration/Replication/content/TL0001-OneLake-Client-workflow-and-troubleshooting.md
  Prompts:
  - SQL DB as trace all status
  - SQL DB ASTraceAll TIMESTAMP since group_id MarkerName
  - SQL DB investigate as trace all
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: ASTraceAll
    ExecutedQuery: 'let since = ago(720h);

      let group_id = "37b43397-2c0e-4ce5-a45c-6d6fc0bb95a7"; // Table group id (aka mirror artifact id, update it BEFORE a first run. You can also hardcode CapacityObjectId below if you know it to speedup query)

      let capacity_id = tostring(toscalar(cluster(''pbipam'').database(''pbip'').ASTraceAll | where TIMESTAMP > since and ServiceName == group_id | project CapacityObjectId = tostring(CustomData.CapacityObjectId) | where CapacityObjectId != "" | take 1));

      cluster(''pbipam'').database(''pbip'').ASTraceAll

      | where TIMESTAMP > since

      | project TIMESTAMP, MarkerName, MessageText, ProcessName

      | where (MessageText contains "OnCustomerCapacityDeprovisionAsync" and MessageText contains group_id)

      or (ProcessName contains "aspaas" and MessageText contains "new state" and MarkerName contains "Worker-Fabric-Capacity" and MessageText contains capacity_id)

      | project TIMESTAMP, GroupId = group_id, CapacityId = capacity_id, MarkerName, ProcessName, MessageText

      | take 10'
