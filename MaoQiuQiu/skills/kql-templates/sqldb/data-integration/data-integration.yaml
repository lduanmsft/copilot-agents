- id: DB-data-integration-441
  Topic: TL0005-AutoReseed-DB-Troubleshooting
  Source: TSG-SQL-DB-DataIntegration/Replication/content/TL0005-AutoReseed-DB-Troubleshooting.md
  Prompts:
  - SQL DB synapse link traces activity
  - SQL DB MonSynapseLinkTraces LogicalServerName TIMESTAMP
  - SQL DB investigate synapse link traces
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSynapseLinkTraces
    ExecutedQuery: 'MonSynapseLinkTraces

      | where TIMESTAMP >= ago(1d)

      | where LogicalServerName =~ "{ServerName}"

      | where logical_database_name =~ "{DatabaseName}"

      | where (event_details contains "sp_change_feed_reseed_db_init : Executing internal proc") or (event_details contains "sp_change_feed_reseed_db_init : Completed internal proc")

      | summarize MaxReseedInitStartTime = maxif(originalEventTimestamp, event_details contains "sp_change_feed_reseed_db_init : Executing internal proc")

      , MaxReseedInitEndTime = maxif(originalEventTimestamp, (event_details contains "sp_change_feed_reseed_db_init : Completed internal proc"))

      - If MaxReseedInitEndTime is empty or MaxReseedInitEndTime < MaxReseedInitStartTime - 5sec, then it means the reseed proc execution has started but it is stuck. Continue with steps below

      - If MaxReseedInitStartTime is empty, indicating reseed proc never got triggered, go to Case 3'
- id: DB-data-integration-442
  Topic: TL0005-AutoReseed-DB-Troubleshooting
