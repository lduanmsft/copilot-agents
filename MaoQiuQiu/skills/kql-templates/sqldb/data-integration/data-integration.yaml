- id: DB-data-integration-404
  Topic: SL0003-SynapseGWClientError
  Source: TSG-SQL-DB-DataIntegration/Replication/content/SL0003-SynapseGWClientError.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonRgLoad event NodeName TIMESTAMP application_name
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(36h)

      | where event == "instance_load" and application_name == "fabric:/Worker.ISO/c9b34dec3178" and code_package_name == "Code"

      | project TIMESTAMP, //NodeName,

      memory_load_cap, memory_load, job_name

      | order by TIMESTAMP asc

      | serialize

      | extend PidChanged = prev(job_name)

      | extend PidChanged = iff(PidChanged != job_name and isnotempty(PidChanged), toint(memory_load_cap), 0)

      | project-away job_name

      //| where PidChanged != 0

      | render timechart

