- id: DB-data-integration-130
  Topic: BRDB0180-Apps-cannot-access-storage-account
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0180-Apps-cannot-access-storage-account.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBackup LogicalServerName AppName AppTypeName
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'let SingleCluster = (clstr:string){

      cluster(clstr).database("sqlazure1").MonBackup

      | parse-where details with * "host has failed to respond " ip_address ":443" *

      | summarize totalErrorCount = count(), max(originalEventTimestamp), min(originalEventTimestamp) by ip_address, LogicalServerName, NodeName, ClusterName, AppTypeName , AppName

      | where max_originalEventTimestamp > ago(1d)

      | extend cas = strcat("Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, "| Kill-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/", AppTypeName, "/", AppName)

      | join kind=leftouter ( cluster(clstr).database("sqlazure1").MonBackup

      | where TIMESTAMP >= ago(1d)

      | where isnotempty(logical_database_id)

      | extend logical_database_id=tolower(logical_database_id)

      | summarize by logical_database_id, AppName

      | summarize totalDbCountInApp = count() by AppName ) on AppName

      | project ip_address, LogicalServerName, AppName, NodeName, ClusterName, AppTypeName, totalDbCountInApp, totalErrorCount, min_originalEventTimestamp, max_originalEventTimestamp, cas

      | join kind=leftouter ( cluster(clstr).database("sqlazure1").MonBackup

      | where TIMESTAMP >= ago(1d)

      | parse-where details with "Getting full backups for " logicalDbId " under container https://" serverContainerAccountName ".blob.core.windows.net/" serverContainerName "/backup"

      | summarize arg_max(TIMESTAMP, serverContainerAccountName, serverContainerName) by AppName) on AppName

      | project-away AppName1, TIMESTAMP

      | where max_originalEventTimestamp >= ago(4h)

      | extend test_cmd=strcat("Test-TcpConnectionFromNodeAgent -FabricClusterName ", ClusterName, " -NodeName ", NodeName, " -TargetHostName ", ip_address, " -TargetPort 443")

      | extend clusterXtsName=strcat("wasd-prod-", tostring(split(ClusterName, ".")[1]), "-", tostring(split(ClusterName, ".")[0]))

      | extend kill_sql_cmd = strcat("Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, "| Kill-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/", AppTypeName, "/", AppName)

      | extend blocklist_select_node_cmd=strcat("Select-SqlAzureCluster ", clusterXtsName)

      | extend blocklist_node_cmd=strcat("Perform-BlocklistNodeThroughCAS -EnvironmentName Prod -ClusterName ", clusterXtsName," -NodeName ", NodeName," -ICMnumber $ICMNumber")'
- id: DB-data-integration-131
  Topic: BRDB0181-Solicited-Full-Backups-With-Incorrect-Container
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0181-Solicited-Full-Backups-With-Incorrect-Container.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBackup logical_server_name LogicalServerName
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where originalEventTimestamp > ago(10d)

      | where logical_server_name =~ logical_server_name_filter and logical_database_id =~ logical_database_id_filter

      | where backup_type in (''Full'')

      | where event_type == ''BACKUP_METADATA_DETAILS''

      | extend BackupStartDateTime = todatetime(backup_start_date)

      | summarize arg_max(originalEventTimestamp, backup_account_name, BackupStartDateTime) by logical_server_name = LogicalServerName, logical_database_id = toupper(logical_database_id)

      | extend backup_account_name = tostring(split(backup_account_name,''.'')[0])

      | join kind = inner ( MonStorageAccountContainerSnapshot

      | where PreciseTimeStamp > ago(3d)

      | summarize arg_max(PreciseTimeStamp, storage_account_type) by storage_account_name

      | project-away PreciseTimeStamp) on $left.backup_account_name == $right.storage_account_name

      | project logical_server_name, logical_database_id, BackupStartDateTime, storage_account_name, LatestBackupStorageAccountType = storage_account_type'
