- id: DB-data-integration-159
  Topic: BRDB0406-RestoredCMSReadLatency
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0406-RestoredCMSReadLatency.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonRestoreEvents AppName AppTypeName ClusterName
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: 'MonRestoreEvents

      | where originalEventTimestamp >= ago(7d)

      | where AppTypeName == ''Worker.ISO.Control'' and

      (restore_database_progress contains "Restore information of ''ClusterMetadataStore" or restore_database_progress endswith ''for CMS restore.''

      or restore_database_progress == ''CMS restore finished...'' or restore_database_progress == ''Report restore status Failed.'')

      | project originalEventTimestamp, restore_database_progress, ClusterName, AppName

      | extend instance = iff(restore_database_progress contains ''ClusterMetadataStore_2'', 2, 1),

      type = iff(restore_database_progress endswith ''for CMS restore.'', 2, iff(restore_database_progress == ''CMS restore finished...'', 3, iff(restore_database_progress == ''Report restore status Failed.'', 4, 1)))

      | order by ClusterName, AppName, originalEventTimestamp asc

      // Scan and accumulate data for a few indicator, visiting row after row

      | scan declare(restoreid: long = 0, activeinstance: int = 0, lastend: datetime, activerestore: bool = false, myapp: string, failed: bool = false) with

      (step s1: true =>

      restoreid = iff(type == 2 and(instance != s1.activeinstance or AppName != s1.myapp), s1.restoreid + 1, s1.restoreid),

      activeinstance = iff(type == 2  or AppName != s1.myapp, instance, s1.activeinstance),

      lastend = iff(type == 3, originalEventTimestamp, iff(AppName != s1.myapp, datetime(null), s1.lastend)),

      activerestore = iff(type == 3  or AppName != s1.myapp, false, iff(type == 2, true, s1.activerestore)),

      failed = iff(type == 4, true, iff(type == 2, false, s1.failed)),

      myapp = AppName;

      )

      | where activeinstance > 0 and type != 3 and isnotempty(lastend)

      | extend restore_start_time = todatetime(extract(""Restore information of ''ClusterMetadataStore.*'':\\(state:0,Last restore time:(.*),backup."", 1, restore_database_progress))

      | extend backup_start_time = todatetime(extract(""Restore information of ''ClusterMetadataStore.*'':\\(state:0,Last restore time:.*,backup start time:([^,]*),?"", 1, restore_database_progress))

      | summarize originalEventTimestamp = arg_max(originalEventTimestamp, activeinstance, activerestore, failed) ,

      first_restore_starttime = min(restore_start_time) , last_restore_starttime = max(restore_start_time),

      first_backup_starttime = min(backup_start_time) , last_backup_starttime = max(backup_start_time)

      by restoreid, ClusterName, AppName

      | order by ClusterName,AppName,originalEventTimestamp asc

      | extend first_backup_starttime = iff(isempty(first_backup_starttime), prev(last_backup_starttime), first_backup_starttime),

      first_restore_starttime = iff(isempty(first_restore_starttime), prev(last_restore_starttime), first_restore_starttime)

      | extend cmslag = iff(activerestore, datetime_diff(''minute'', now() , first_backup_starttime) , datetime_diff(''minute'', originalEventTimestamp , first_backup_starttime))

      | summarize totalcmscycle_av = avg(cmslag), timeChecked = arg_max(originalEventTimestamp, active_cmscycle_lag = cmslag, lastBackupStart = last_backup_starttime,

      timeSinceLastStartedRestore = now() - last_restore_starttime), restoreFailures = countif(failed == true) by ClusterName, AppName

      | project ClusterName, AppName, timeChecked, totalcmscycle_av, active_cmscycle_lag, restoreFailures

      | join kind = leftouter

      ( // We use MonRestoreEvents again to extract the account name associated with the activity itself'
