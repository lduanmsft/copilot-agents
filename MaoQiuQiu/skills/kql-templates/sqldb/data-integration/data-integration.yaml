      |where TIMESTAMP >ago(10d)

      | where event_type ==''BACKUP_METADATA_DETAILS''

      |where LogicalServerName ==\"{ServerName}\" and AppName ==''App name'' and logical_database_id =~''logical database Id''

      |where backup_type ==''Log''  // Change ''Log'' to ''Full'' to find the latest Full backup

      |top 1 by originalEventTimestamp

      |project originalEventTimestamp, ClusterName, NodeName, AppName, logical_database_id, logical_database_name,  event_type, backup_type, backup_start_date, backup_end_date, database_backup_lsn, first_lsn, last_lsn, last_log_backup_attempted_time'
- id: DB-data-integration-54
  Topic: BRDB0050-Set-up-Geo-Pairing-on-Sterling
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0050-Set-up-Geo-Pairing-on-Sterling.md
  Prompts:
  - SQL DB certificate watchdog rotation
  - SQL DB MonMachineLocalWatchdog component NodeName
  - SQL DB investigate certificate watchdog rotation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonMachineLocalWatchdog
    ExecutedQuery: 'MonMachineLocalWatchdog

      | where TIMESTAMP> ago(1d)

      | where component== "CertificateWatchdog"

      | extend new_message= message_resourcename

      | where new_message contains "instancemanagersmk."

      | extend  new_message = message_resourcename

      | summarize arg_max(TIMESTAMP, new_message) by ClusterName, NodeName, new_message

      | extend tokens=split(new_message, ";")

      | extend Subject=extract("Subject=(.*)", 1, tostring(tokens[1]))

      | extend Thumbprint=extract("Thumbprint=(.*)", 1, tostring(tokens[2]))

      | extend Created=extract("Created=(.*)", 1, tostring(tokens[3]))

      | extend Expires=extract("Expires=(.*)", 1, tostring(tokens[4]))

      | parse new_message with * "DSMSPath=" * "dsms/" secretStorePath ";"*

      | extend LogicalName = iff(arraylength(tokens) > 4, extract("RegistryLogicalName=(.*)", 1, tostring(tokens[5])) , "")

      | extend CertStore = iff(arraylength(tokens) > 5, extract("CertStore=(.*)", 1, tostring(tokens[6])) , "")

      | extend Key = strcat(ClusterName, "_", NodeName)

      | summarize NodeCount=dcount(Key),  LastSeen=max(TIMESTAMP) by Thumbprint, Subject, todatetime(Created),todatetime(Expires), LogicalName, CertStore, ClusterName, secretStorePath

      | where ClusterName contains ClusterNameFilter and Subject contains ClusterNameFilter and LogicalName contains "instancemanagersmk"'
- id: DB-data-integration-55
  Topic: BRDB0051-1-SINGLE_STORAGE_ACCOUNT_ERROR-exceeding_
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0051-1-SINGLE_STORAGE_ACCOUNT_ERROR-exceeding_.md
  Prompts:
  - SQL DB backup status
  - SQL DB AlrBackup database_name to this modify account
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrBackup
    ExecutedQuery: 'AlrBackup | where TIMESTAMP > ago(20m)

      | where database_name != ''SBS''

      | where exception_message contains ''Cannot open backup device'' or exception_message contains ''Storage Errorcode'' or exception_message contains ''The request could not be performed because of an I/O device error'' or (exception_message contains ''Write on'' and exception_message contains ''failed'') or br_exception_message contains ''Cannot open backup device'' or br_exception_message contains ''Storage Errorcode'' or br_exception_message contains ''The request could not be performed because of an I/O device error'' or (br_exception_message contains ''Write on'' and br_exception_message contains ''failed'') | where event_type == ''BACKUP_ERROR'' | extend storage_account = substring(backup_path, 8, indexof(backup_path, ''blob.core'') - 9)

      | summarize count_errors = count() by storage_account

      | where storage_account == "xx" //modify this to throttled storage account'
- id: DB-data-integration-56
  Topic: BRDB0051-Backup-Errors-Exceeding-Threshold
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0051-Backup-Errors-Exceeding-Threshold.md
  Prompts:
  - SQL DB backup status
  - SQL DB AlrBackup logical_server_name AppName AppTypeName
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrBackup
    ExecutedQuery: 'AlrBackup

      | where event_type == "BACKUP_ERROR" and exception_message !contains "Login" and TIMESTAMP > ago(3h)

      | extend storage_account = extract("https://([a-z,0-9]+)", 1, exception_stack_trace)

      | extend clean_ex = replace(@''https://[^s''''"]+'', @"https://", coalesce(exception_message, br_exception_message) )

      | extend clean_ex = replace(@"[Dd]atabase [''""][^''""]+[''""]", @"Database ",clean_ex)

      | extend clean_ex = replace(@"database ID d+", @"database ID ", clean_ex)

      | extend clean_ex = replace(@"page (d+:d+)", @"page ", clean_ex)

      | extend clean_ex = replace(@"(Group ID:s+-?d+)", @"(Group ID: )", clean_ex)

      | extend clean_ex = replace(@"user ''[^'']+''", @"user ''''", clean_ex)

      | extend clean_ex = replace(@"device ''https.*?''", @"device ",clean_ex)

      | extend clean_ex = replace(@"attempting to connect to this server was -.*$", @"attempting to connect to this server was - ",clean_ex)

      | extend clean_ex = replace(@"[""''][^""'']+WFRootDB[^""'']+[""'']", @"''<WinFabPath>''",clean_ex)

      | extend clean_ex = replace(@"offset (0x)?[0-9a-fA-F]+", @"offset ",clean_ex)

      | extend clean_ex = replace(@"LSN (0x[^)]+)", @"LSN ",clean_ex)

      | extend clean_ex = replace(@"Process ID d+", @"Process Id ",clean_ex)

      | extend short_error = trim("s+", tostring(split(clean_ex, "n")[0]))

      | project TIMESTAMP, AppTypeName, logical_server_name, logical_database_name, AppName, ClusterName, logical_database_id , short_error

      | summarize count() by AppTypeName, short_error

      | where count_ > 100

      | sort by count_ desc nulls last'
