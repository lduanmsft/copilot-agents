- id: DB-data-integration-75
  Topic: BRDB0061-4-Investigate-Hyperscale-STR-Backup-Billing-Charges
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0061-4-Investigate-Hyperscale-STR-Backup-Billing-Charges.md
  Prompts:
  - SQL DB QDS exec stats status
  - SQL DB MonWiQdsExecStats AppName originalEventTimestamp
  - SQL DB investigate QDS exec stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where originalEventTimestamp between (START_TIME .. 12h)

      | where AppName == "{AppName}" // replace with instance/app name

