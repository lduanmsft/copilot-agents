- id: DB-data-integration-70
  Topic: BRDB0061-4-Investigate-Hyperscale-STR-Backup-Billing-Charges
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0061-4-Investigate-Hyperscale-STR-Backup-Billing-Charges.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonAnalyticsDBSnapshot logical_server_name
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | extend region = extract(@"cr[\d]+.([^\.]+).*", 1 ,ClusterName)

      | where edition == "Hyperscale"

      | extend AppName = sql_instance_name

      | extend AppTypeName = extract("[^/]*/([^/]*)/[^/]*", 1, fabric_application_uri)

      | where array_length(subscriptions_to_investigate) == 0 or customer_subscription_id in~ (subscriptions_to_investigate)

      | where array_length(logical_database_ids_to_investigate) == 0 or logical_database_id in~ (logical_database_ids_to_investigate)

      | summarize arg_max(TIMESTAMP, region, create_time) by logical_database_id, customer_subscription_id, logical_database_name, logical_server_name, backup_retention_days

      | project-away TIMESTAMP

      | extend logical_database_id = tolower(logical_database_id)

      | join kind=inner (MonBackupBilling

      | where originalEventTimestamp >= queryWindowStartTime

      | where billing_metric_name contains "VldbBackupBillingInfo"

      | where details_format  contains "capped snapshot size"

      | parse details_format with * "capped snapshot size is " snapshotSizeCapMB:double ", original snapshot size is " snapshotSizeInMB:double ", backup retention " retentionDays ", cap ratio: " ratio ", xlog size: " xlogSizeInMB:double ", base blob size: " base_blob_size_mb:double

      ",modified page size: " modifiedPagesInMB:double ",modified page size with V1 discount: " modifiedPageV1Discount:long ",database size V2: " allocated_database_size_mb:long ",capped modified page size is " modifiedPagesCapMB:long ",storage version: " StorageVersion:string

      | extend capvssnap = snapshotSizeCapMB/snapshotSizeInMB

      | extend snapshotVsMpRatio = iif(modifiedPagesInMB >0, snapshotSizeInMB/modifiedPagesInMB, 0.0)

      | project originalEventTimestamp, request_id, snapshotSizeCapMB, snapshotSizeInMB, modifiedPagesInMB,

      snapshotVsMpRatio, xlogSizeInMB,  base_blob_size_mb, allocated_database_size_mb, logical_database_id, modifiedPagesCapMB

      | extend modified_page_discounted_with_blob_size = iff(modifiedPagesInMB  + allocated_database_size_mb > base_blob_size_mb, modifiedPagesInMB + allocated_database_size_mb - base_blob_size_mb, 0.0)

      | extend capped_snapshot_size = min_of(snapshotSizeInMB, snapshotSizeCapMB)

      | extend capped_modified_pages_size = min_of(modifiedPagesInMB, modifiedPagesCapMB)

      | extend snapshot_billable_backup_quantity = capped_snapshot_size + xlogSizeInMB + base_blob_size_mb

      | extend modified_pages_billable_backup_quantity = capped_modified_pages_size + xlogSizeInMB + allocated_database_size_mb

      ) on logical_database_id

      | project-away logical_database_id1

      | extend snapshotLargerThanModifiedPage = snapshot_billable_backup_quantity > modified_pages_billable_backup_quantity'
