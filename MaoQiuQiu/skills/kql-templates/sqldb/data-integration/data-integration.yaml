- id: DB-data-integration-53
  Topic: BRDB0022--Skip-taillogbackup-by-CAB
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0022--Skip-taillogbackup-by-CAB.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBackup LogicalServerName AppName NodeName
