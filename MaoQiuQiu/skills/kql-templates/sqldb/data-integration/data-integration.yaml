- id: DB-data-integration-176
  Topic: BRDB0415-Per-DB-Backup-File-Deletion-Failures
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0415-Per-DB-Backup-File-Deletion-Failures.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBackupCleanup AppTypeName TIMESTAMP no
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackupCleanup
    ExecutedQuery: 'MonBackupCleanup

      | where TIMESTAMP > ago(lookback)

      | where AppTypeName in (''Worker.ISO'', ''Worker.ISO.Premium'')

      | where cleanup_event_type == ''STATISTICS''

      | extend Region = extract(@''\.(\w+\d+-\w)\.'', 1, ClusterName)

      | summarize

      SuccessFiles = sumif(tolong(file_count), cleanup_event_status == ''SUCCESS''),

      FailedFiles  = sumif(tolong(file_count), cleanup_event_status == ''FAILED''),

      FailedEvents = countif(cleanup_event_status == ''FAILED''),

      FirstSeen = min(originalEventTimestamp),

      LastSeen = max(originalEventTimestamp)

      by Region, AppName

      | extend TotalFiles = SuccessFiles + FailedFiles

      | extend FailRatePct = iff(TotalFiles > 0, round(100.0 * FailedFiles / TotalFiles, 2), 0.0)

      | where FailedFiles >= 10 and FailRatePct >= 5.0 // consider changing the threshold of query returns no data

      | order by FailRatePct desc, FailedFiles desc'
