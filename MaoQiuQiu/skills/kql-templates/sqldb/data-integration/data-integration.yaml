    ExecutedQuery: 'MonSqlTransactions

      | where TIMESTAMP > ago({TimeRange}) and TIMESTAMP < now()

      | where AppName == "{AppName}"

      | where event == "large_repl_transactions"

      | project originalEventTimestamp, xdes_beginTimestamp, xdes_beginLsn, xdes_firstReplLsn, xdes_lastLsn, xdes_KBOfLogBetweenBeginLsnAndFirstReplLsn,

      transaction_size_mb=(toint(strcat("0x", substring(xdes_lastLsn, 0, 8))) - toint(strcat("0x", substring(xdes_beginLsn, 0, 8)))) * vlf_size_mb'
- id: DB-data-integration-382
  Topic: Repl-Perf-RCA
  Source: TSG-SQL-DB-DataIntegration/Replication/content/Repl-Perf-RCA.md
  Prompts:
  - SQL DB log reader traces latency
  - SQL DB MonLogReaderTraces event LogicalServerName
  - SQL DB troubleshoot log reader traces latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogReaderTraces
    ExecutedQuery: 'MonLogReaderTraces

      | where TIMESTAMP > ago({TimeRange}) and TIMESTAMP < now()

      | where LogicalServerName =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}"

      | where (event == "repl_logscan_session" and phase_number in (1, 2, 7) and phase_state_name == "phase_end")

      | project originalEventTimestamp, session_id, phase_number ,phase_state_name, max_trans, tran_count, command_count,log_record_count,round((command_count/todouble(log_record_count))*100,1), start_lsn, end_lsn, start_time,

      vlfs = toint(strcat("0x", substring(end_lsn, 0, 8)))-toint(strcat("0x", substring(start_lsn, 0, 8))),

      duration = todatetime(originalEventTimestamp)-todatetime(start_time), wait_stats

      | order by originalEventTimestamp asc'
- id: DB-data-integration-383
  Topic: Repl-Perf-RCA
  Source: TSG-SQL-DB-DataIntegration/Replication/content/Repl-Perf-RCA.md
  Prompts:
  - SQL DB TLS encryption checks
  - SQL DB MonSqlTransactions event AppName TIMESTAMP
  - SQL DB investigate TLS encryption
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: MonSqlTransactions
    ExecutedQuery: 'MonSqlTransactions

      | where TIMESTAMP between (ago({TimeRange})..datetime(2024-07-23 23:59:00))

      | where AppName == "{AppName}"

      | where event == "large_repl_transactions"

      | project originalEventTimestamp, xdes_beginTimestamp, xdes_beginLsn, xdes_firstReplLsn, xdes_lastLsn, xdes_KBOfLogBetweenBeginLsnAndFirstReplLsn,

      Size_in_gb = (toint(strcat("0x", substring(xdes_lastLsn, 0, 8))) - toint(strcat("0x", substring(xdes_beginLsn, 0, 8)))) * 2'
