SqlSkills:
- id: DB-data-integration-1
  Topic: BMSRestoreFailureForExtraLogBackup
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BMSRestoreFailureForExtraLogBackup.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonRestoreEvents ID restore_request_id
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: 'MonRestoreEvents

      | where restore_request_id =~ ''<<Restore request ID>>''

      | where restore_database_progress =~ ''Backup metadata provider BmsMetadataProvider produced the restore plan'''
- id: DB-data-integration-2
  Topic: BMSRestoreFailureForExtraLogBackup
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BMSRestoreFailureForExtraLogBackup.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonRestoreEvents event ID exception_type
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: 'MonRestoreEvents

      | where event == "restoring_database_failure"

      | where exception_type == "SqlException"

      | where message contains "which is too recent to apply to the database. An earlier log backup that includes LSN"

      | where restore_request_id =~ ''<<Restore request ID>>'''
