- id: DB-data-integration-463
  Topic: cdc-aggresive-log-truncation-usefulness
  Source: TSG-SQL-DB-DataIntegration/Replication/content/cdc-aggresive-log-truncation-usefulness.md
  Prompts:
  - SQL DB log reader traces latency
  - SQL DB MonLogReaderTraces event LogicalServerName
  - SQL DB troubleshoot log reader traces latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogReaderTraces
    ExecutedQuery: 'MonLogReaderTraces

      | where TIMESTAMP between (startTime..endTime)

      | where LogicalServerName =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}"

      | where AppTypeName in ("Worker.ISO", "Worker.ISO.Premium", "Worker.Vldb.Compute")

      | where phase_number !in (1,2,6) and (phase_state_name == "phase_end" or repldone_phase_name in("repldone_start", "repldone_end"))

      | sort by todatetime(originalEventTimestamp) asc

      | extend repl_begin_lsn = iff(repl_begin_lsn == "", prev(repl_begin_lsn), repl_begin_lsn)

      | where repl_begin_lsn != "00000000:00000000:0000" and repl_begin_lsn != ""

      | project TIMESTAMP, todatetime(originalEventTimestamp), LogicalServerName, logical_database_guid, logical_database_name,session_id, event, phase_number, phase_state, repldone_phase, repldone_phase_name, repl_begin_lsn

      | summarize min(TIMESTAMP) , max(TIMESTAMP) , scan_count = countif(phase_number == 7) by logical_database_guid, repl_begin_lsn

      | extend truncation_holdup_duration = (max_TIMESTAMP - min_TIMESTAMP)/time(1s)

      | where truncation_holdup_duration > 60*30'
