    ExecutedQuery: 'MonRestoreRequests

      | where PreciseTimeStamp  between (lookback_window_start .. lookback_window_end)

      | summarize arg_max(PreciseTimeStamp, *) by restore_request_id

      | where state in (''Failed'',''Succeeded'')

      | where operation_type !in

      (

      ''CreateExternalManagedBackupRestoreV2Request'', // Filter out managed restores

      ''CreateManagedRestoreRequest'',

      ''CreateManagedRecoverRequest'',

      ''CreateManagedRestoreFromLtrBackupRequest'''
- id: DB-data-integration-170
  Topic: BRDB0413-restore-failure-over-regional-threshold
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0413-restore-failure-over-regional-threshold.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations PreciseTimeStamp
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where PreciseTimeStamp  between (extended_lookback_window_start .. lookback_window_end)

      | where operation_type == ''CreateRecoverRequest''

      | where operation_parameters has ''<IsDbCopyTarget>true</IsDbCopyTarget>''

      or operation_parameters has ''<CreateDatabaseAsGeoDrSecondary>true</CreateDatabaseAsGeoDrSecondary>''

      | distinct request_id = toupper(request_id)

      )on request_id

      // Group the failed restore operations by the source resource and target resource

      | extend restoreTempFilter = iif(state == ''Succeeded'', request_id, tostring(guid(null)))

      | extend isRestoreRunnerServer = source_logical_server_name contains \"{ServerName}\" or target_logical_server_name  contains \"{ServerName}\"

      | summarize arg_max(PreciseTimeStamp, *),

      RestoreRunnerFailureCount = dcountif(request_id, state == ''Failed'' and isRestoreRunnerServer)

      by operation_type, state, // operation details

      source_edition, source_logical_server_name, source_logical_database_name, point_in_time, archived_backup_resource_id, //Source resource

      target_edition, target_logical_server_name, //Target resource

      restoreTempFilter, bin(PreciseTimeStamp, 6h)

      | extend Edition = iff(isnotempty( target_edition), target_edition, iff(isnotempty( source_edition), source_edition, ''Standard''))

      | where isnotempty( Edition) and Edition in (''Hyperscale'', ''Premium'', ''Standard'', ''Basic'', ''GeneralPurpose'', ''BusinessCritical'')

      | extend EditionType = iff(Edition in ( ''Standard'', ''Basic'', ''GeneralPurpose'',''Premium'', ''BusinessCritical''), ''Sterling'', ''Hyperscale'')

      | summarize

      FailedCount = countif(state == ''Failed''),

      SuccessCount = countif(state == ''Succeeded''),

      // Identify how many different resources are failing

      DistinctSourceFailuresCount = dcountif(strcat(source_logical_server_name, source_logical_database_name, point_in_time, archived_backup_resource_id), state==''Failed''),

      DistinctTargetFailuresCount = dcountif(strcat(target_logical_server_name, target_logical_database_name), state==''Failed''),

      RestoreRunnerFailureCount = sum(RestoreRunnerFailureCount),

      // Restore failure details

      SampleRestoreRequests = make_set_if(request_id, state == ''Failed'', 20),

      SetErrorCodes =  make_set_if(error_code, state == ''Failed'', 20),

      restoreTypes = make_set_if(operation_type, state == ''Failed''),

      SampleErrorMessages = make_set_if(error_message, state == ''Failed'', 20)

      by ClusterName, EditionType

      | extend PassRate = round(SuccessCount * 100.0/(SuccessCount + FailedCount), 2),

      TotalCount = SuccessCount + FailedCount

      | extend IsIncidentActive = (TotalCount > minimum_restore_count )

      and ((DistinctSourceFailuresCount > 1 and DistinctTargetFailuresCount > 1) or RestoreRunnerFailureCount > 1)

      and (PassRate < pass_rate_threshold_percent)

      | project

      ClusterName,

      EditionType,

      IsIncidentActive,

      PassRate,

      TotalCount,

      SuccessCount,

      FailedCount,

      restoreTypes,

      SampleRestoreRequests,

      DistinctSourceFailuresCount,

      DistinctTargetFailuresCount,

      RestoreRunnerFailureCount,

      SetErrorCodes'
- id: DB-data-integration-171
  Topic: BRDB0414-Regional-Backup-Cleanup-Failure-Rate
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0414-Regional-Backup-Cleanup-Failure-Rate.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBackupCleanup AppTypeName TIMESTAMP
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackupCleanup
    ExecutedQuery: 'MonBackupCleanup

      | where TIMESTAMP > ago(24h)

      | where AppTypeName in (''Worker.ISO'', ''Worker.ISO.Premium'')

      | where cleanup_event_type in (''CLEANUP_FILES'', ''DELETE_BACKUP'')

      | where (cleanup_event_type == ''CLEANUP_FILES'' and cleanup_event_status in (''END'', ''FAILED''))

      or (cleanup_event_type == ''DELETE_BACKUP'' and cleanup_event_status in (''SUCCESS'', ''FAILED''))

      | extend IsSuccess = case(

      cleanup_event_type == ''CLEANUP_FILES'' and cleanup_event_status == ''END'', true,

      cleanup_event_type == ''DELETE_BACKUP'' and cleanup_event_status == ''SUCCESS'', true,

      false)

      | extend Region = extract(@''\.(\w+\d+-\w)\.'', 1, ClusterName)

      | summarize

      TotalApps = dcount(AppName),

      SuccessApps = dcountif(AppName, IsSuccess),

      FailedApps  = dcountif(AppName, IsSuccess == false)

      by Region, cleanup_event_type

      | extend FailRatePct = iff(TotalApps > 0, round(100.0 * FailedApps / TotalApps, 2), 0.0)'
- id: DB-data-integration-172
  Topic: BRDB0414-Regional-Backup-Cleanup-Failure-Rate
