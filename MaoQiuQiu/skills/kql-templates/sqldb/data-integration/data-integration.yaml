- id: DB-data-integration-287
  Topic: SYNCALRT001-SYNC_OVERALL_SUCCESS_RATE
  Source: TSG-SQL-DB-DataIntegration/DataSync/SYNCALRT001-SYNC_OVERALL_SUCCESS_RATE.md
  Prompts:
  - SQL DB certificate rotation
  - SQL DB MonDataSync error TIMESTAMP an as _dss_
  - SQL DB investigate certificate rotation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDataSync
    ExecutedQuery: 'MonDataSync

      | where TIMESTAMP > ago(1d) // as an example time range

      | where ComponentAction == ''CommandAndControlService_TaskDetails'' and TaskType == 2 and TaskState == "Failed"

      | where Detail !contains ''is offline'' and Detail !contains ''Invalid column name'' and Detail !contains ''Invalid object name''

      | where Detail !contains ''There are some intermittent issues detected during our communication with the underlying database''

      | where Detail !contains ''Database is not currently available'' and Detail !contains ''SqlError Number:18456. Message: Login failed''

      | where Detail !contains ''The current operation could not be completed because the database is not provisioned for sync or you not have permissions to the sync configuration tables''

      | where Detail !contains ''Membership information of this database in your sync group is corrupted''

      | where Detail !contains ''Snapshot isolation transaction failed''

      | where Detail !contains ''by tes which is greater than the maximum supported value of''

      | where (Detail matches regex ''SqlError Number:3952.*snapshot isolation is not allowed in this database'') == false

      | where (Detail matches regex ''SqlError Number:10928.*The request limit for the database is.*and has been reached'') == false

      | where (Detail matches regex ''Cannot find a valid scope with the name.*in table'') == false

      | where (Detail matches regex ''conflicting constraints or incompatible data types that may prevent sync from succeeding'') == false

      | where Detail !contains ''SqlError Number:-2''

      | where Detail !contains ''SqlError Number:53''

      | where Detail !contains ''The wait operation timed out''

      | where Detail !contains ''A transport-level error has occurred when''

      | where Detail !contains ''The network connection was aborted''

      | where Detail !contains ''The specified network name is no longer available.''

      | where Detail !contains ''The server was not found or was not accessible.''

      | where Detail !contains ''Cannot continue the execution because the session is in the kill state.''

      | where Detail !contains ''Database is unknown to Microsoft SQL Data Sync Windows service.''

      | where Detail !contains ''Cannot open server requested by the login. Client is not allowed to access the server.''

      | where Detail !contains ''Message: CERTIFICATE_NOT_EXIST''

      | where (Detail matches regex ''Table \''.*\'' cannot be found in database'') == false

      | where (Detail matches regex ''Expected column \''.*\'' was not found on the DataTable to be applied to the destination table \''.*\'''') == false

      | where (Detail matches regex ''The stored procedure \''\\[DataSync\\].*\'' doesn\''t exist.'') == false

      | where (Detail matches regex ''The EXECUTE permission was denied on the object \''.*_dss_.*\'''') == false

      | where (Detail matches regex ''Directory \''.*DSS2_.*\'' does not exist\\.'') == false

      | where (Detail matches regex ''The row of size [0-9]+KB from table \''.*\'' cannot fit within the specified batch size of [0-9]+KB.'') == false

      | where (Detail matches regex ''The transaction log for database \''.*\'' is full due to \''.*\'''') == false

      | where (Detail matches regex ''Login failed for user \''.+\'''') == false'
