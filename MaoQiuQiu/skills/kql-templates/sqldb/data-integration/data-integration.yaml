- id: DB-data-integration-250
  Topic: LTR0016-LTR-metadata-store-enable-entraid-only
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/LTR0016-LTR-metadata-store-enable-entraid-only.md
  Prompts:
  - SQL DB AAD auth failures
  - SQL DB MonLogin is_success event database_name
  - SQL DB troubleshoot AAD auth failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp > ago(12h)

      | where database_name startswith \"{DatabaseName}\"

      | where event == "process_login_finish"

      | where AppName != "Gateway"

      | where isnotempty( fedauth_library_type)

      | extend fedauth_library_type_desc =

      case(

      fedauth_library_type == 0, "SQL Server Authentication",

      fedauth_library_type == 2, "Entra Token Base Authentication",

      fedauth_library_type == 3 and fedauth_adal_workflow == 1, "Entra Password Authentication",

      fedauth_library_type == 3 and fedauth_adal_workflow == 2, "Entra Integrated Authentication",

      fedauth_library_type == 3 and fedauth_adal_workflow == 3, "Entra Universal Authentication",

      strcat(tostring(fedauth_library_type) , "-" , tostring(fedauth_adal_workflow), ''-Other'')

      )

      | project originalEventTimestamp, fedauth_library_type,  fedauth_library_type_desc, AppName, database_name, peer_address, is_success, is_user_error

      | summarize count(), countif(is_success) by fedauth_library_type_desc,  database_name

      | extend count_is_failure = count_ - countif_is_success'
- id: DB-data-integration-251
