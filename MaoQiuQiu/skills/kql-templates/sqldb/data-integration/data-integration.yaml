      | extend pm = parse_xml(operation_parameters)

      | extend weekly_retention = pm.InputParameters.WeeklyRetention

      | extend monthly_retention = pm.InputParameters.MonthlyRetention

      | extend yearly_retention = pm.InputParameters.YearlyRetention

      | extend make_backups_immutable = pm.InputParameters.MakeBackupsImmutable

      | extend is_immutability_locked = pm.InputParameters.IsImmutabilityLocked

      | extend has_legalhold = pm.HasLegalHold

      | extend logical_server_name = pm.InputParameters.LogicalServerName

      | extend logical_server_id = pm.InputParameters.LogicalServerId

      | extend logical_database_name = pm.InputParameters.LogicalDatabaseName

      | extend logical_database_id = pm.InputParameters.LogicalDatabaseId

      | extend startTime = TIMESTAMP

      | project startTime, event, logical_server_name, logical_server_id, logical_database_id, logical_database_name, yearly_retention, monthly_retention, weekly_retention, request_id,make_backups_immutable, is_immutability_locked, has_legalhold, operation_parameters, operation_type, ClusterName

      | join kind=leftouter ('
