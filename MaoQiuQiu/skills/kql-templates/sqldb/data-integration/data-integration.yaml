      Following is the telemetry seen when sp\_change\_feed\_reseed\_db\_init execution is stuck waiting for Capture job to get aborted. The sp\_change\_feed\_reseed\_db\_init proc starts aborting all the jobs, but gets stuck waiting for Capture job to get aborted. There is no telemetry in MonSynapseLinkTraces after this.


