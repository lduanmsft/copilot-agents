      | where event=~ "database_backup" and event_type =~ "BACKUP_METADATA_DETAILS"

      | where SubscriptionId =~ subscriptionId

      | project originalEventTimestamp, logical_server_name, logical_database_id, logical_database_name, backup_type, backup_path

      | order by logical_server_name, logical_database_id, originalEventTimestamp desc

      | extend rn = row_number(1, prev(logical_database_id) != logical_database_id or prev(logical_server_name) != logical_server_name)

      | project rn, originalEventTimestamp, logical_server_name, logical_database_id, logical_database_name, backup_type, backup_path

