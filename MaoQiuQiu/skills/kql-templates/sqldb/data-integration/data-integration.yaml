- id: DB-data-integration-280
  Topic: SYNC0062-Re-peering-Of-Data-Sync-VNets-With-A-New-SQL-TR-VNet
  Source: TSG-SQL-DB-DataIntegration/DataSync/SYNC0062-Re-peering-Of-Data-Sync-VNets-With-A-New-SQL-TR-VNet.md
  Prompts:
  - SQL DB resources analysis
  - SQL DB Resources id Json type vnetId deleted vnetIds
  - SQL DB investigate resources
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: Resources
    ExecutedQuery: 'let vnetDetails = Resources

      | where timestamp > ago(2d)

      | where type has "Microsoft.network/virtualnetworkgateways" and not(deleted)

      | extend Json = parse_json(properties)

      | where Json["gatewayType"] == "HyperNet"

      | extend subnetIdParts = split(tostring(Json["ipConfigurations"][0]["properties"]["subnet"]["id"]), ''/'')

      | extend subscriptionId = tostring(subnetIdParts[2])

      | extend vnetName = subnetIdParts[8]

      | extend vnetId = strcat("/subscriptions/", subscriptionId, "/resourceGroups/", resourceGroup, "/providers/Microsoft.Network/virtualNetworks/", vnetName)

      | distinct vnetId, subscriptionId, tenantId, gatewayId = id;

      let subscriptionsWithGateway = vnetDetails

      | distinct subscriptionId, tenantId;

      let vnetIds = vnetDetails

      | distinct vnetId;

      let subscriptionsPeeredWithHypernetVnets = Resources

      | where timestamp > ago(2d)

      | where type has "microsoft.network/virtualNetworks" and not(deleted) and id in~ (vnetIds)

      | extend Json = parse_json(properties)

      | extend peerings = Json["virtualNetworkPeerings"]

      | where peerings != ""

      | mv-expand peerings

      | extend remoteVnetId = tostring(peerings["properties"]["remoteVirtualNetwork"]["id"])

      | extend remoteVnetIdParts = split(remoteVnetId, ''/'')

      | extend subscriptionId = tostring(remoteVnetIdParts[2])

      | distinct subscriptionId, tenantId;

      let validSubs = subscriptionsPeeredWithHypernetVnets

      | union subscriptionsWithGateway;'
