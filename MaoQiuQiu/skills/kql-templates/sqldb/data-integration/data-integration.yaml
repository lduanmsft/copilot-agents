    ExecutedQuery: 'MonLogReaderTraces

      | where TIMESTAMP between (ago(5h) .. now())

      | where LogicalServerName =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}"

      | where (event == "log_pool_cache_miss_aggregation") or event == "repldone_session" or (event == "repl_logscan_session" and phase_number in (1, 2, 7) and phase_state_name == "phase_end")

      | project originalEventTimestamp, TIMESTAMP,AppName,NodeName, event, start_time,duration = todatetime(originalEventTimestamp)-todatetime(start_time), session_id, phase_number, max_trans, command_count, tran_count, log_record_count, phase_state_name,

      consumer_id, log_scan_function, shared_pool_size,log_pool_miss_count, total_read_count, logpool_total_read_count, shared_pool_hit_rate = 100- round((log_pool_miss_count/todouble(total_read_count))*100,1), logpool_hit_rate = 100 - round((log_pool_miss_count/todouble(logpool_total_read_count))*100,1)'
- id: DB-data-integration-386
  Topic: Repl-Perf-RCA
  Source: TSG-SQL-DB-DataIntegration/Replication/content/Repl-Perf-RCA.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonSqlRgHistory event AppTypeName type_desc
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where logical_database_id  =~ "EA03FA70-2730-42CF-A9FF-191CBE228588" and is_primary_replica == 1

      | where event == ''aggregated_virtual_files_io_history''

      | where type_desc == "LOG" and AppTypeName <> ''Worker.Vldb.LogReplica''

      | where originalEventTimestamp  between (start..end)

      | where delta_num_of_reads > 0 or delta_num_of_writes > 0

      | extend IOStallWriteMsPerWrite = delta_io_stall_write_ms*1.0/delta_num_of_writes

      | extend IOStallReadMsPerRead = delta_io_stall_read_ms*1.0/delta_num_of_reads

      | extend duration = duration_time_ms / 1000.

      | extend ReadMBps = (delta_num_of_bytes_read )/ (duration * 1024.0 * 1024)

      | extend WriteMBps = (delta_num_of_bytes_written)/ (duration * 1024.0 * 1024)

      | project end_utc_date = end_aggregated_sample, ReadMBps, IOStallReadMsPerRead

      | order by end_utc_date asc

      | render timechart'
