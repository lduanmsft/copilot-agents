- id: DB-data-integration-152
  Topic: BRDB0401-Backup-Cleanup-Failing-Consistently
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0401-Backup-Cleanup-Failing-Consistently.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonBackupCleanup AppTypeName originalEventTimestamp
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackupCleanup
    ExecutedQuery: 'MonBackupCleanup

      | where originalEventTimestamp > ago(7d)

      | where AppTypeName in (''Worker.ISO'', ''Worker.ISO.Premium'')

      | where cleanup_event_type == ''CLEANUP_FILES''

      | where cleanup_event_status == ''FAILED''

      | where exception_details_scrubbed != ''''

      | where exception_details_scrubbed !contains "server-tridentcacheserver" // trident cache servers are not expected to run backup cleanup

      | extend ExceptionType = case(

      exception_details_scrubbed has ''System.NullReferenceException'', ''NullReferenceException'',

      exception_details_scrubbed has ''System.Data.SqlClient.SqlException'', ''SqlException'',

      exception_details_scrubbed has ''System.IO.InvalidDataException'', ''InvalidDataException'',

      exception_details_scrubbed has ''System.UriFormatException'', ''UriFormatException'',

      exception_details_scrubbed has ''System.InvalidOperationException'', ''InvalidOperationException'',

      exception_details_scrubbed has ''System.OutOfMemoryException'', ''OutOfMemoryException'',

      exception_details_scrubbed has ''KeyNotFoundException'', ''KeyNotFoundException'',

      exception_details_scrubbed has ''System.ArgumentException'', ''ArgumentException'',

      exception_details_scrubbed has ''StorageException'', ''StorageException'',

      extract(@''([A-Za-z\.]+Exception)'', 1, exception_details_scrubbed))

      | extend HasHandler = exception_details_scrubbed has ''SqldbBackupCleanupHandler'' // remove this to include other exceptions outside the backupcleanup handler

      | extend Region = extract(@''\.(\w+\d+-\w)\.'', 1, ClusterName)

      | summarize

      AffectedDBs = dcount(AppName),

      TotalEvents = count(),

      EarliestFailure = min(originalEventTimestamp),

      LatestFailure = max(originalEventTimestamp),

      take_any(exception_details_scrubbed)

      by Region, ExceptionType, HasHandler

      | order by AffectedDBs desc'
