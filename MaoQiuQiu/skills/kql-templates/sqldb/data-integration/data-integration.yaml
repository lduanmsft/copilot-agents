- id: DB-data-integration-19
  Topic: BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space.md
  Prompts:
  - SQL DB restore status
  - SQL DB MonRestoreEvents AppName AppTypeName
  - SQL DB investigate restore
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRestoreEvents
    ExecutedQuery: 'MonRestoreEvents

      | where originalEventTimestamp > ago(1d)

      | where AppTypeName == ''Worker.ISO''

      | where (message contains ''There is insufficient free space on disk volume'' and message contains ''file.core.windows.net'')

      | parse message with * "There is insufficient free space on disk volume ''\\\\" storageAccountName: string ".file.core.windows.net\\" fileShareName: string "\\'' to create the database. The database requires " numBytes: long " additional free by tes, while only " currBytes: long "by tes are available."*

      | summarize arg_max(originalEventTimestamp, storageAccountName, fileShareName, numBytes, currBytes) by AppName

      | join kind= inner ('
- id: DB-data-integration-20
  Topic: BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space.md
  Prompts:
  - SQL DB rg history activity
  - SQL DB MonSqlRgHistory event AppName originalEventTimestamp
  - SQL DB investigate rg history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where originalEventTimestamp > ago(1d)

      | where AppName =~ sqlInstanceNameFilter

      | where event == "pfs_size_history"

      | extend freeSpaceRatio = round(pfs_free_space_bytes / (pfs_total_space_bytes * 1.0) * 100,2)

      | extend pfs_current_max_size_gb = pfs_total_space_bytes / 1024.0 / 1024.0 / 1024.0

      | summarize arg_max(originalEventTimestamp, pfs_free_space_bytes, pfs_total_space_bytes, pfs_max_size_gb,pfs_current_max_size_gb, freeSpaceRatio) by AppName

      ) on AppName

      | join kind=inner ('
- id: DB-data-integration-21
  Topic: BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/BRDB0005-9-Stuck-restore-to-Pool-with-Insufficient-space.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonStorageAccountContainerSnapshot TIMESTAMP
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonStorageAccountContainerSnapshot
    ExecutedQuery: 'MonStorageAccountContainerSnapshot

      | where TIMESTAMP > ago(1d)

      | summarize by storage_account_subscription_id, storageAccountName=storage_account_name

      ) on storageAccountName

      | extend pfs_max_size_mb = pfs_max_size_gb * 1024

      | extend spaceRequiredMb = min_of(toint(100000 + bin(tolong(pfs_total_space_bytes + numBytes - currBytes) / 1024. / 1024., 1)), pfs_max_size_mb)

      //| extend spaceRequiredMb = pfs_max_size_mb

      | extend new_cas_cmd = strcat("Update-FileShareQuota -StorageAccountName ", storageAccountName, " -SubscriptionId ", storage_account_subscription_id, " -FileShareName ", fileShareName, " -QuotaValueInMB ", toint(spaceRequiredMb))

      | project

      AppName,

      pfs_max_size_gb,

      pfs_current_max_size_gb,

      freeSpaceRatio,

      spaceRequiredMb'
