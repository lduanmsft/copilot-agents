      | project adjust_max_trans_time = originalEventTimestamp, AppName, logical_database_guid, physical_database_guid, session_id, log_pool_miss_rate_pct, last_replicated_tx_latency_sec, prev_max_trans, output_max_trans, prev_tran_count, log_full_percent_from_repl, prev_phase2_scan_termination_reason

      | join kind=leftouter ('
- id: DB-data-integration-391
  Topic: Replication-Dynamic_Max_Tran
  Source: TSG-SQL-DB-DataIntegration/Replication/content/Replication-Dynamic_Max_Tran.md
  Prompts:
  - SQL DB log reader traces latency
  - SQL DB MonLogReaderTraces event AppName session_id
  - SQL DB troubleshoot log reader traces latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogReaderTraces
    ExecutedQuery: 'MonLogReaderTraces

      | extend originalEventTimestamp = todatetime(originalEventTimestamp)

      | where originalEventTimestamp >= time_of_interest - 12h

      | where originalEventTimestamp <= time_of_interest + 12h

      | where logical_database_guid == logical_database_guid_input

      | where event == "log_pool_cache_miss_aggregation"

      | summarize min(shared_pool_size) by logical_database_guid, bin(todatetime(originalEventTimestamp), 15m)

      | project shared_pool_size_time = originalEventTimestamp, logical_database_guid, min_shared_pool_size

      ) on logical_database_guid

      | extend shared_pool_size_time = iif(shared_pool_size_time >= adjust_max_trans_time and shared_pool_size_time <= adjust_max_trans_time + 1h, shared_pool_size_time, datetime(null))

      | summarize arg_min(shared_pool_size_time, min_shared_pool_size) by AppName, logical_database_guid, adjust_max_trans_time, physical_database_guid, session_id, log_pool_miss_rate_pct, last_replicated_tx_latency_sec, prev_max_trans, output_max_trans, prev_tran_count, log_full_percent_from_repl, prev_phase2_scan_termination_reason

      | extend min_shared_pool_size = iif(isnull(shared_pool_size_time), long(null), min_shared_pool_size)

      | join kind=leftouter

      ('
- id: DB-data-integration-392
  Topic: Replication-Dynamic_Max_Tran
  Source: TSG-SQL-DB-DataIntegration/Replication/content/Replication-Dynamic_Max_Tran.md
  Prompts:
  - SQL DB log reader traces latency
  - SQL DB MonLogReaderTraces event AppName session_id
  - SQL DB troubleshoot log reader traces latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogReaderTraces
    ExecutedQuery: 'MonLogReaderTraces

      | extend originalEventTimestamp = todatetime(originalEventTimestamp)

      | where originalEventTimestamp >= time_of_interest - 12h

      | where originalEventTimestamp <= time_of_interest + 12h

      | where logical_database_guid == logical_database_guid_input

      | where event == "repl_logscan_session"

      | where phase_number == 7

      | where phase_state_name == "phase_end"

      | project phase7_scan_end_time =  originalEventTimestamp, session_id, logical_database_guid, phase7_log_scan_size_bytes = log_scan_size_bytes

      ) on logical_database_guid, session_id

      | extend phase7_log_scan_size_mb = iff(isnull(phase7_log_scan_size_bytes), real(0), round(phase7_log_scan_size_bytes / 1024.0 / 1024, 1))

      | extend min_shared_pool_size_mb = iff(isnull(min_shared_pool_size), real(0), round(min_shared_pool_size / 1024.0 / 1024, 2))

      | project AppName, logical_database_guid, physical_database_guid, adjust_max_trans_time, session_id, log_pool_miss_rate_pct, min_shared_pool_size_mb, phase7_log_scan_size_mb, last_replicated_tx_latency_sec, prev_max_trans, output_max_trans, prev_tran_count, log_full_percent_from_repl, prev_phase2_scan_termination_reason'
- id: DB-data-integration-393
  Topic: Replication-Dynamic_Max_Tran
  Source: TSG-SQL-DB-DataIntegration/Replication/content/Replication-Dynamic_Max_Tran.md
  Prompts:
  - SQL DB log reader traces latency
  - SQL DB MonLogReaderTraces event originalEventTimestamp
  - SQL DB troubleshoot log reader traces latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogReaderTraces
    ExecutedQuery: 'MonLogReaderTraces

      | extend originalEventTimestamp = todatetime(originalEventTimestamp)

      | where originalEventTimestamp >= time_of_interest - 12h

      | where originalEventTimestamp <= time_of_interest + 12h

      | where logical_database_guid == logical_database_guid_input

      | where event == "repl_logscan_dynamic_maxtrans"

      | summarize

      adjustments_count = countif(output_max_trans != prev_max_trans),

      number_of_increases = countif(output_max_trans > prev_max_trans),

      number_of_decreases = countif(output_max_trans < prev_max_trans),

      smallest_adjustment = min(output_max_trans),

      largest_adjustment = max(output_max_trans),

      count_reached_max_trans = countif(prev_phase2_scan_termination_reason  == "LogScanTerminationReason_MaxTransReached"),

      count_reached_max_trans_after_adjustment = countif(prev_phase2_scan_termination_reason  == "LogScanTerminationReason_MaxTransReached" and prev_max_trans < upper_bound_max_trans) ,

      min_latency_sec_after_adjustment = minif(last_replicated_tx_latency_sec, prev_phase2_scan_termination_reason  == "LogScanTerminationReason_MaxTransReached" and prev_max_trans < upper_bound_max_trans),

      max_latency_sec_after_adjustment = maxif(last_replicated_tx_latency_sec, prev_phase2_scan_termination_reason  == "LogScanTerminationReason_MaxTransReached" and prev_max_trans < upper_bound_max_trans)'
