- id: DB-data-integration-264
  Topic: Single-backup-storage-throttling-errors-requiring_
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/Single-backup-storage-throttling-errors-requiring_.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBackup logical_server_name database_name
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      | where TIMESTAMP > ago(20m)

      | where database_name != ''SBS''

      | where br_exception_message contains ''Cannot open backup device'' or br_exception_message contains ''Storage Errorcode'' or br_exception_message contains ''The request could not be performed because of an I/O device error'' or (br_exception_message contains ''Write on'' and br_exception_message contains ''failed'') | where event_type == ''BACKUP_ERROR''

      | extend storage_account = substring(backup_path, 8, indexof(backup_path, ''blob.core'') - 9)

      | where storage_account ==''wasd2prodneu1abak648'' // Use the storage account name you''re interested in

      | where logical_database_name =~ "{DatabaseName}" or logical_database_name =~ "{DatabaseName}" or logical_server_name contains \"{ServerName}\" // Change the server name filter if needed

      | extend casCommand = strcat(''Select-SqlAzureCluster wasd-prod-northeurope1-a-'', substring(ClusterName,0, indexof(ClusterName, ''.'') ), '';Invoke-BackupServiceAction -ActionType ForceBackup -NodeName '', NodeName, '' -InstanceName '',AppName, '' -BackupType Full -LogicalDatabaseId '', logical_database_id)

      | distinct casCommand'
- id: DB-data-integration-265
  Topic: Single-backup-storage-throttling-errors-requiring_
  Source: TSG-SQL-DB-DataIntegration/BackupRestore/Single-backup-storage-throttling-errors-requiring_.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBackup LogicalServerName AppName TIMESTAMP
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'MonBackup

      |where event_type == "BACKUP_METADATA_DETAILS"  and TIMESTAMP >= ago(1d)

      |extend sz=extract(".*", 0, backup_size, typeof(long))

      |extend

      lgcnt=iff(backup_type == "Log", 1, 0),

      flcnt=iff(backup_type == "Full", 1, 0),

      dfcnt=iff(backup_type == "Diff", 1, 0),

      lgsize=iff(backup_type == "Log", sz, 0),

      flsize=iff(backup_type == "Full", sz, 0),

      dfsize=iff(backup_type == "Diff", sz, 0),

      storage_account=extract("<https://(%5Ba-z,0-9%5D+)>", 1, backup_path)

      | project  SubscriptionId ,  storage_account, LogicalServerName , AppName , logical_database_name , flcnt, dfcnt, lgcnt,  flsize, dfsize, lgsize

