      | where logical_database_name == \"{DatabaseName}\"

      | where TIMESTAMP > ago(2h)

      | project TIMESTAMP, session_id , phase_number,phase_state_name, repldone_phase_name

      - If there are new rows every 5 mintues, it means latest scan is making progress

      - If session\_id changes it means new scan has kicked off i.e scans are running as expected. If you are here because of log near full or log full then verify that there are no cdc\_errors (check the "Errors" section above) If no errors found and scan is running then we need to increase maxLogSize using CDC0001 and contact sqlreplicationcommitters.'
