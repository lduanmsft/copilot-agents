- id: DB-data-integration-465
  Topic: cdc-aggresive-log-truncation-usefulness
  Source: TSG-SQL-DB-DataIntegration/Replication/content/cdc-aggresive-log-truncation-usefulness.md
  Prompts:
  - SQL DB log reader traces latency
  - SQL DB MonLogReaderTraces LogicalServerName TIMESTAMP
  - SQL DB troubleshoot log reader traces latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogReaderTraces
    ExecutedQuery: 'MonLogReaderTraces

      | where TIMESTAMP between (startTime..endTime)

      | where LogicalServerName =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}"

      | where phase_number !in (1,2,6) and (phase_state_name == "phase_end" or repldone_phase_name in("repldone_start", "repldone_end"))

      | where repl_begin_lsn != "00000000:00000000:0000"

      | extend new_session_id = session_id -1

      | project TIMESTAMP, LogicalServerName, logical_database_name, logical_database_guid, new_session_id , repl_begin_lsn, start_lsn )

      on $left.session_id == $right.new_session_id, $left.logical_database_guid == $right.logical_database_guid

      | where start_lsn1 != "" and repl_begin_lsn != ""

      | project-away TIMESTAMP1, new_session_id

      | summarize min(start_lsn1), max(start_lsn1), cdc_scan_count = countif(start_lsn1 != ""), duration = (max(TIMESTAMP) - min(TIMESTAMP)) / time(1s) by  repl_begin_lsn

      | where duration > 60*30

      | extend is_replicated = (min_start_lsn1 == repl_begin_lsn)

      | extend vlf_dist = toint(strcat("0x", substring(max_start_lsn1, 0, 8)))-toint(strcat("0x", substring(repl_begin_lsn, 0, 8)))'
