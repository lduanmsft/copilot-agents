      | where start_utc_date >= ago(6h)

      | where internal_state_desc contains_cs ''PRIMARY''

      | summarize arg_max(start_utc_date, ClusterName, AppTypeName, AppName, NodeName) by logical_database_name, LogicalServerName

      | extend RegionName = extract(''^.*?\\.(.*?)\\.'', 1, ClusterName)

      | extend kill_cmd = strcat("Select-SqlAzureCluster wasd-prod-", RegionName, "; Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, " | Kill-Process -ProcessName SqlSatelliteRunnerHost.exe -ApplicationNameUri fabric:/", AppTypeName, "/", AppName)

      | distinct kill_cmd, logical_database_name, LogicalServerName, clusterName = strcat("wasd-prod-", RegionName)

      ) on logical_database_name and $left.logical_server_name == $right.LogicalServerName

      | join kind=leftouter ('
