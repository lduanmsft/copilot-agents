- id: DB-data-integration-311
  Topic: IE2001-1-Check-Queue-Length
  Source: TSG-SQL-DB-DataIntegration/ImportExport/TSG/IE2001-1-Check-Queue-Length.md
  Prompts:
  - SQL DB import export activity
  - SQL DB MonImportExport MachineName
  - SQL DB investigate import export
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonImportExport
    ExecutedQuery: 'let binWindowHours = 2;

      let secondsPerHour = 60 * 60;

      let baseData = materialize(MonImportExport

      | distinct MachineName

      // Count the machines which have reported doing work recently. This will _under_ count if the region is lightly-loaded

      // and some machines have not serviced jobs within the telemetry retention window.

      | summarize num4CWorkers = countif(MachineName startswith "DB4C"), num16CWorkers = countif(MachineName startswith "DB16C")

      );

      let num4CWorkers = toscalar(baseData | project num4CWorkers);

      let num16CWorkers = toscalar(baseData | project num16CWorkers);'
- id: DB-data-integration-312
  Topic: IE2001-1-Check-Queue-Length
  Source: TSG-SQL-DB-DataIntegration/ImportExport/TSG/IE2001-1-Check-Queue-Length.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event ClusterName
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where TIMESTAMP > ago(7d)

      | where operation_type in (''ImportToNewDatabase'', ''ImportToExistingDatabase'', ''ExportDatabase'')

      | where event == "management_operation_start"

      | extend crRequestTimestamp = originalEventTimestamp

      | project-away originalEventTimestamp

      | join kind=inner (MonImportExport // Determine the time the job started based on the first traces from the TR

      | summarize trStartTimestamp=arg_min(originalEventTimestamp, originalEventTimestamp), trEndTimestamp=arg_max(originalEventTimestamp, originalEventTimestamp) by NodeRole, request_id

      | extend request_id = toupper(request_id), ProcessingTime = (trEndTimestamp - trStartTimestamp)

      | project request_id, NodeRole, trStartTimestamp, ProcessingTime

      )  on request_id

      | extend QueueDurationSeconds = (trStartTimestamp - crRequestTimestamp)

      | extend RequiredHardware = NodeRole1

      | summarize avg(QueueDurationSeconds), sum(ProcessingTime), count() by bin(crRequestTimestamp, binWindowHours * 1h), RequiredHardware, ClusterName

      | extend capacity = iif(RequiredHardware == "DB4C", binWindowHours * secondsPerHour * num4CWorkers, binWindowHours * secondsPerHour * num16CWorkers)

      | render timechart with (ytitle="Average time (Seconds)", xtitle="Time (UTC)")'
