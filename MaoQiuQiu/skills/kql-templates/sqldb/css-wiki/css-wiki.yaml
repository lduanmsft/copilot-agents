- id: DB-css-wiki-611
  Topic: How-to-check-SQL-dump-for-Azure-SQL
  Source: AzureSQLDB/Welcome/Processes/Escalation-Process/CRI-Escalation-Checklists/How-to/How-to-check-SQL-dump-for-Azure-SQL.md
  Prompts:
  - SQL DB sre get bugs from watson dump activity
  - SQL DB SREGetBugsFromWatsonDump DumpCrashTime
  - SQL DB investigate sre get bugs from watson dump
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: SREGetBugsFromWatsonDump
    ExecutedQuery: 'let startTime = ago({TimeRange});

      let endTime = now();

      let appName = "{AppName}";  // app name or SQL instance name

      let serverName = "{ServerName}";  // logical server name

      cluster("sqladhoc").database("sqlazure1").SREGetBugsFromWatsonDump(startTime, endTime, appName, serverName)

      | extend packedRecord = pack_all()

      | summarize Result = make_list (packedRecord) by DumpCrashTime'
- id: DB-css-wiki-612
  Topic: How-to-check-SQL-dump-for-Azure-SQL
  Source: AzureSQLDB/Welcome/Processes/Escalation-Process/CRI-Escalation-Checklists/How-to/How-to-check-SQL-dump-for-Azure-SQL.md
  Prompts:
  - SQL DB dumper activity analysis
  - SQL DB MonSqlDumperActivity NodeName ClusterName
  - SQL DB investigate dumper activity
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlDumperActivity
    ExecutedQuery: 'MonSqlDumperActivity

      | where PreciseTimeStamp between(startTime .. endTime)

      | where TargetLogicalServerName startswith strcat(serverName, ''.'')

      | where TargetAppName contains appName

      | extend WatsonLink = iff(DumpUID != '''',strcat(''https://azurewatson.microsoft.com/?DumpUID='',DumpUID), '''')

      | project DumperStartTime, TargetAppName,NodeName, DumpUID, TargetProcess, StackSignature, WatsonLink, IsFailed, FailReason, ClusterName

      | order by DumperStartTime asc'
- id: DB-css-wiki-613
  Topic: How-to-check-SQL-dump-for-Azure-SQL
  Source: AzureSQLDB/Welcome/Processes/Escalation-Process/CRI-Escalation-Checklists/How-to/How-to-check-SQL-dump-for-Azure-SQL.md
  Prompts:
  - SQL DB watson analysis activity
  - SQL DB MonWatsonAnalysis logical_server_name DatabaseName
  - SQL DB investigate watson analysis
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWatsonAnalysis
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_database_name == DatabaseName

      | where logical_server_name == ServerName

      | where isnotempty(fabric_application_uri)

      | extend AppName = fabric_application_uri

      | extend DatabasePartitionId = tolower(fabric_partition_id), physical_db_id = tolower(physical_database_id), logical_database_id = tolower(logical_database_id)

      | summarize MinLastUpdateTime = min(last_update_time) by AppName, DatabasePartitionId, physical_db_id, logical_database_name, logical_server_name, tenant_ring_name, create_time, logical_database_id;

      let AppSet = DatabaseInfo | summarize make_set(AppName, 1048576);

      let mapDumpToBucketName = MonSqlDumperActivity

      | where CompleteFileName contains ''.dmp''

      | extend AppName=TargetAppName

      | where AppName in (AppSet)

      | extend StackSignature = extract(''SQLDmpr\\.([^.]+)\\.'', 1, CompleteFileName)

      | join kind = leftouter(

      cluster(''sqladhoc'').database(''sqlazure1'').MonWatsonAnalysis

      | where DumpCrashTime >= ago(25d)

      | where FaultingProcess =~ ''sqlservr.exe''

      | where LogicalServerName contains ServerName

      )  on AppName, NodeName

      | where (DumpCrashTime + 2m) between(FileTime..4m)

      | distinct StackSignature, BucketString, AppName, FaultingSourceFile, DumpUID;'
- id: DB-css-wiki-614
  Topic: How-to-check-SQL-dump-for-Azure-SQL
  Source: AzureSQLDB/Welcome/Processes/Escalation-Process/CRI-Escalation-Checklists/How-to/How-to-check-SQL-dump-for-Azure-SQL.md
  Prompts:
  - SQL DB dumper activity activity
  - SQL DB MonSqlDumperActivity AppName NodeName AppSet
  - SQL DB investigate dumper activity
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlDumperActivity
    ExecutedQuery: 'MonSqlDumperActivity

      | where PreciseTimeStamp >= TimeCheckStart and PreciseTimeStamp <= TimeCheckEnd

      | extend AppName=TargetAppName

      | where CompleteFileName contains ''.dmp'' and  AppName in (AppSet)

      | summarize StartDumpTime = min(FileTime) by CompleteFileName, AppName, NodeName

      | join kind = inner DatabaseInfo on AppName

      | extend DumpNodeName = NodeName

      | extend StackSignature = extract(''SQLDmpr.([0-9A-Z]+).'', 1, CompleteFileName)

      | join kind = leftouter mapDumpToBucketName on StackSignature

      | extend WatsonLink = strcat(''https://azurewatson.microsoft.com/DUMPUID/'',DumpUID )

      | project StartDumpTime, BucketString, AppName, DumpNodeName, DatabasePartitionId,WatsonLink, FaultingSourceFile;'
- id: DB-css-wiki-615
  Topic: CAS-Command-Tips
  Source: AzureSQLDB/Welcome/Processes/Escalation-Process/Using-CAS-Commands/CAS-Command-Tips.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_server_name =~ "{LogicalServerName}"

      | order by TIMESTAMP asc nulls first

      | serialize

      | extend prevNodeName=prev(NodeName)

      | extend nextNodeName = next(NodeName)

      | extend isFirst= (NodeName != prevNodeName)

      | extend isLast=(NodeName != nextNodeName)

      | where isFirst == true or isLast == true

      | extend EndTime=next(TIMESTAMP)

      | extend StartTime=TIMESTAMP

      | where isFirst ==true

      | extend PrimaryNodeName=NodeName, PrimaryNodeFirstAppearTime=StartTime, PrimaryNodeLastAppearTime=EndTime

      | extend crString = extract("^([a-zA-Z0-9]+)", 1, ClusterName)

      | extend regionString = extract("([a-zA-Z0-9]+-a)", 1, ClusterName)

      | extend fake="fake"

      | project ClusterName, PrimaryNodeName, AppName, AppTypeName, PrimaryNodeFirstAppearTime, PrimaryNodeLastAppearTime, customer_subscription_id,

      CASCmdClusterString = strcat("Select-SqlAzureCluster Wasd-prod-", regionString, "-", crString)

      | project-away PrimaryNodeName, AppName, AppTypeName

      | summarize arg_max(PrimaryNodeFirstAppearTime, *)'
