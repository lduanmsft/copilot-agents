    ExecutedQuery: 'let subscription = ''----'';

      let database = \"{DatabaseName}\"; MonManagementOperations

      | where subscription_id =~ subscription or SubscriptionId =~ subscription

      | where TIMESTAMP >= ago(8d)

      | where event == ''management_operation_start'' | where operation_parameters contains database

      | project PreciseTimeStamp, request_id, operation_type | join kind = leftouter ( MonManagementOperations

      | where subscription_id =~ subscription or SubscriptionId =~ subscription | where event != ''management_operation_start''

      | where operation_parameters contains database

      | project PreciseTimeStamp, request_id, event,error_code, error_message ) on request_id

      | extend Result=replace(@''management_operation_*'', @''\1'', event) | project PreciseTimeStamp, PreciseTimeStamp1, request_id, Result, operation_type, error_code, error_message

      | project-rename StartTime = PreciseTimeStamp, EndTime = PreciseTimeStamp1 | limit 1000

      //QueryName:''Management Operations'''
