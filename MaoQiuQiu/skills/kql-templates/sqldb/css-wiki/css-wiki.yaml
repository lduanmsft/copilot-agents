- id: DB-css-wiki-693
  Topic: Performance--%2D-Locks-,-timeouts
  Source: AzureSQLDB/Welcome/Tools/Kusto/Performance--%2D-Locks-,-timeouts.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonDmRealTimeResourceStats database_name
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where TIMESTAMP >= datetime({StartTime})

      | where TIMESTAMP <= datetime({EndTime})

      | where LogicalServerName =~ "{ServerName}"

      | where database_name =~ "{DatabaseName}"

      | where replica_type == 0

      | summarize max(avg_cpu_percent), max(avg_data_io_percent), max(avg_log_write_percent) by bin(TIMESTAMP, 5m)

      | extend DTU_Percent= iff(max_avg_cpu_percent > max_avg_data_io_percent, max_avg_cpu_percent , max_avg_data_io_percent)

      | extend DTU_Percent= iff(DTU_Percent > max_avg_log_write_percent, DTU_Percent , max_avg_log_write_percent)

      | project TIMESTAMP, DTU_Percent

      | render timechart'
