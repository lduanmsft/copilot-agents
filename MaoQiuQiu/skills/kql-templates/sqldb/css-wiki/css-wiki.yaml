- id: DB-css-wiki-345
  Topic: Sub-Core-SLO
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/High-IO-Utilization/Sub-Core-SLO.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonDmRealTimeResourceStats event AppName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'let p_check_time_window = 3h;

      // If the high utilization lasts more than 1/6 of the overall time period (avg spike 1min every 6min), then we think it is a strong signal.

      let p_high_time_ratio = 1.0/6;

      // Besides the above cases, if there was any consecutive high usage longer than 10min, we think it is a strong signal for pressures as well.

      let p_high_consecutive_time_window = 10m;

      //

      // Part 1: Check the user-group (DTU) resource limit hit cases, for cpu, IO, log_writes, workers, sessions, or multi-dimensions.

      //

      let p_user_sample_window = 30s;

      let p_high_single_consumption = 90.0;

      // 30% is coming from 99 (over all apps) of 99.9 percentile (over 7 days) for sub-core apps in Prod.

      let p_high_workers = 30.0;

      // If workers are high, also check cpu and IO usage to be greater than 60% to have stronger confidence.

      let p_high_workers_correlated_consumption = 60.0;

      let p_high_multi_dimensions = 180.0;

      let usergroup_usage = MonDmRealTimeResourceStats

      | where TIMESTAMP > ago(p_check_time_window)

      | where AppName == ''{AppName}''

      | where replica_type == 0

      // Max over nodes in case for failovers

      | summarize cpu = max(avg_cpu_percent),io = max(avg_data_io_percent),log_writes = max(avg_log_write_percent), workers = max(max_worker_percent),sessions = max(max_session_percent)

      by AppName, database_name, bin(TIMESTAMP, p_user_sample_window)

      | extend high_cpu = cpu > p_high_single_consumption,high_io = io > p_high_single_consumption,high_log_writes = log_writes > p_high_single_consumption,

      high_sessions = sessions > p_high_single_consumption, high_workers = workers > p_high_workers and(cpu > p_high_workers_correlated_consumption or io > p_high_workers_correlated_consumption),

      high_multiD = cpu + io + log_writes > p_high_multi_dimensions

      | summarize cnt = count(),high_cpu = countif(high_cpu),high_io = countif(high_io),high_logs = countif(high_log_writes),high_sessions = countif(high_sessions),

      high_workers = countif(high_workers), high_multiD = countif(high_multiD) by AppName, bin(TIMESTAMP, p_high_consecutive_time_window)

      | extend consecutive_high_cpu = high_cpu >= cnt,consecutive_high_io = high_io >= cnt,consecutive_high_logs = high_logs >= cnt,consecutive_high_sessions = high_sessions >= cnt,

      consecutive_high_workers = high_workers >= cnt, consecutive_high_multiD = high_multiD >= cnt

      | summarize cnt = 1.0 * sum(cnt),high_cpu = sum(high_cpu),high_io = sum(high_io),high_logs = sum(high_logs),high_sessions = sum(high_sessions),high_workers = sum(high_workers),

      high_multiD = sum(high_multiD), consecutive_high_cpu = countif(consecutive_high_cpu), consecutive_high_io = countif(consecutive_high_io),consecutive_high_logs = countif(consecutive_high_logs),

      consecutive_high_sessions = countif(consecutive_high_sessions),consecutive_high_workers = countif(consecutive_high_workers), consecutive_high_multiD = countif(consecutive_high_multiD),

      min(TIMESTAMP), max(TIMESTAMP) by AppName

      | extend CPU = high_cpu / cnt > p_high_time_ratio or consecutive_high_cpu > 0,IO = high_io / cnt > p_high_time_ratio or consecutive_high_io > 0,

      LogWrites = high_logs / cnt > p_high_time_ratio or consecutive_high_logs > 0,Sessions = high_sessions / cnt > p_high_time_ratio or consecutive_high_sessions > 0,

      Workers = high_workers / cnt > p_high_time_ratio or consecutive_high_workers > 0,MultiDimensions = high_multiD / cnt > p_high_time_ratio or consecutive_high_multiD > 0

      | where CPU or IO or LogWrites or Sessions or Workers or MultiDimensions

      | project AppName, tolong(CPU), tolong(IO), tolong(LogWrites), tolong(Sessions), tolong(Workers), tolong(MultiDimensions), StartTime1 = min_TIMESTAMP, EndTime1 = max_TIMESTAMP

      // Hide MultiDimensions if any single dimension is very high.

      | extend MultiDimensions = iff(CPU == 1 or IO == 1 or LogWrites == 1, 0, MultiDimensions);

      //

      // Part 2: Check high instance cpu usage and memory pressure (oom or kernel high)

      //

      let p_sample_window = 1m;

      let p_high_instance_consumption = 95.0;

      // This 40%(a really high value) comes from 99.9 percentile (over apps) of 99 percentile of Prod sub-core apps, of which the cap is 30 or 60.

      //   For relatively larger cpu caps (e.g. 120 for S2 on Gen5), this kernel high may not have big impacts.

      //   Then using this 40% means we somehow skip the check for them.

      let p_kernel_threshold = 40.0;

      // If we saw two ooms due to user/process, then we think it did have memory pressures.

      let p_oom_cnt = 2;

      let p_oom_sample_window = 5m;

      let instance_cpu_mem_usage = MonRgLoad

      | extend TIMESTAMP = originalEventTimestampFrom

      | where TIMESTAMP > ago(p_check_time_window)

      | where event == ''instance_load'' and code_package_name == ''Code''

      | where application_name contains ''{AppName}'' and application_type == ''Worker.ISO''

      | extend AppName = extract(''fabric:/Worker.ISO/(.+)'', 1, application_name)

      | extend external_pressure = (memory_current_cap != memory_load_cap) or (memory_load*1.0/ memory_load_cap < 0.7)

      | summarize cpu_usage = max(cpu_load * 100.0 / cpu_load_cap), kernel_usage = max(kernel_load*100.0/cpu_load_cap), external_pressure = countif(external_pressure)  by AppName, bin(TIMESTAMP, p_sample_window)

      | summarize cnt = count(), high_instance_cpu = countif(cpu_usage > p_high_instance_consumption), high_kernel = countif(kernel_usage > p_kernel_threshold), external_pressure = sum(external_pressure)

      by AppName, bin(TIMESTAMP, p_high_consecutive_time_window)

      | extend consecutive_high_instance_cpu = high_instance_cpu >= cnt, consecutive_high_kernel = high_kernel >= cnt

      | join kind = leftouter (

      // OOM events, check if the OOM is at process level or user pool level.

      //'
- id: DB-css-wiki-346
  Topic: Sub-Core-SLO
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/High-IO-Utilization/Sub-Core-SLO.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth AppName NodeName TIMESTAMP
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where TIMESTAMP > ago(p_check_time_window)

      | where AppName == ''{AppName}''

      | where (message contains ''MSR'' and message contains ''Memory Manager'') or (message contains ''Error: 701'' and message contains ''There is insufficient system memory in resource pool \''UserPool'')

      | project TIMESTAMP, AppName, NodeName, message

      | extend UserPoolPressure = iff(message contains ''Error: 701'', 1, 0)

      | extend OOMFactor = extract(''Last OOM Factor(.+)'', 1, message, typeof(long))

      | summarize process_pressure = countif(OOMFactor == 1), pool_pressure = countif(OOMFactor == 5), user_pool = sum(tolong(UserPoolPressure)) by AppName, NodeName, bin(TIMESTAMP, p_oom_sample_window)

      | where process_pressure > 0 or (pool_pressure > 0 and user_pool > 0)

      | summarize oom_count = count() by AppName, bin(TIMESTAMP, p_high_consecutive_time_window)

      ) on TIMESTAMP, AppName

      | extend exclude_pressure = iff(external_pressure > 0, 0, 1)

      | summarize cnt = sum(cnt) * 1.0, consecutive_high_kernel = countif(consecutive_high_kernel and exclude_pressure == 0), high_kernel = sum(high_kernel*exclude_pressure),

      consecutive_high_instance_cpu = countif(consecutive_high_instance_cpu), high_instance_cpu = sum(high_instance_cpu),

      oom_cnt = sum(oom_count * exclude_pressure), min(TIMESTAMP), max(TIMESTAMP) by AppName

      | extend Memory = consecutive_high_kernel > 0 or high_kernel / cnt > p_high_time_ratio or oom_cnt >= p_oom_cnt,

      InstanceCpu = consecutive_high_instance_cpu > 0 and high_instance_cpu / cnt > p_high_time_ratio

      | where Memory or InstanceCpu

      | project AppName, tolong(Memory), tolong(InstanceCpu), StartTime2 = min_TIMESTAMP, EndTime2 = max_TIMESTAMP;'
- id: DB-css-wiki-347
  Topic: '[OnePager]-Sub-Core-SLO'
