    ExecutedQuery: 'MonDataSync

      | where AppName =~ "<AppName>"

      | where ComponentAction !contains "metadatatracer" and ComponentAction !contains "scheduler" and Detail contains ''SyncController_ChangeConflictedEvent''

      | project originalEventTimestamp, AppName, TracingId, ComponentAction, collect_current_thread_id, TaskType, Detail, EDetail, SyncGroupId, ClusterName, NodeName, SyncMemberId

      | order by originalEventTimestamp asc

      5. If you believe the conflict resolution is in an infinite loop, please [work with the customer](https://eng.ms/docs/cloud-ai-platform/azure-data/azure-data-azure-databases/sql-/sql-data-sync/azuresql-datasync/sync0050-conflictresolutionisstuckinaninfiniteloop).

      6. Check to make sure the customer is not using a sub-core SLO (S0/1/2) if they are having sync performance issues. If they are, ask them to scale up to at least an S3 and check on the performance.'
