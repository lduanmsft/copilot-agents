SqlSkills:
- id: DB-css-wiki-1
  Topic: Error---17900-%2D-State-25-%2D-A-network-error-occurred-in-the-connection-has-been-closed
  Source: AzureSQLDB/SQL-Database/Common-errors/Error---17900-%2D-State-25-%2D-A-network-error-occurred-in-the-connection-has-been-closed.md
  Prompts:
  - SQL DB error 17900 2 d state 25 2 d a network error occurre
  - SQL DB MonLogin logical_server_name TIMESTAMP
  - SQL DB troubleshoot error 17900 2 d state 25 2 d a network
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where TIMESTAMP >=  ago({TimeRange})

      | where TIMESTAMP <=  now()

      | where logical_server_name =~ "{ServerName}"

      | where connection_peer_id == "connectionId"'
- id: DB-css-wiki-2
  Topic: '[OnePager]-Error%3A-Cannot-open-database--requested-by-the-login.-The-login-failed'
  Source: AzureSQLDB/SQL-Database/Common-errors/[OnePager]-Error%3A-Cannot-open-database--requested-by-the-login.-The-login-failed.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonManagedInstanceResourceStats LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagedInstanceResourceStats
    ExecutedQuery: 'MonManagedInstanceResourceStats

      | where LogicalServerName =~ "{ServerName}"

      | where TIMESTAMP > ago({TimeRange}) and TIMESTAMP < now()

      | project TIMESTAMP, NodeName , reserved_storage_mb, storage_space_used_mb//,avg_cpu_percent, io_requests,, mb_written = io_bytes_written/(1024*1024), node_memory_percent, sku

      | render timechart'
- id: DB-css-wiki-3
  Topic: AAD-Logins-Cause-Performance-Degradation
  Source: AzureSQLDB/SQL-Database/Known-Issues/Active/AAD-Logins-Cause-Performance-Degradation.md
  Prompts:
  - SQL DB AAD auth failures
  - SQL DB MonFedAuthTicketService event logical_server_name
  - SQL DB troubleshoot AAD auth failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonFedAuthTicketService
    ExecutedQuery: 'MonFedAuthTicketService

      //| where AppName == appName

      | where logical_server_name =~ serverName

      | where PreciseTimeStamp > datetime(''2023-12-2 23:45:00'') //and PreciseTimeStamp < now()

      | where event == ''fedauth_webtoken_failure'' and error_state == 79

      | project PreciseTimeStamp, AppName,event,session_id,sql_connection_id,logical_server_name,database_name, logical_database_name,error_state, fedauth_library_type,token_validity,error_message,is_pooled_connection, NodeName, fedauth_adal_workflow, is_mwc_system, is_mwc_user

      | summarize errorscount=count(), MinFailureHappened = arg_min(PreciseTimeStamp, AppName, database_name) by AppName, database_name

      | order by errorscount desc;'
- id: DB-css-wiki-4
  Topic: AAD-Logins-Cause-Performance-Degradation
  Source: AzureSQLDB/SQL-Database/Known-Issues/Active/AAD-Logins-Cause-Performance-Degradation.md
  Prompts:
  - SQL DB security caches errors
  - SQL DB MonSecurityCaches event logical_server_name
  - SQL DB troubleshoot security caches errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSecurityCaches
    ExecutedQuery: 'MonSecurityCaches

      | where TIMESTAMP > ago({TimeRange})// and TIMESTAMP < now()

      | where logical_server_name =~ serverName or LogicalServerName =~ serverName

      | where event =~ ''security_cache_database_timestamp_increment''

      | where logical_database_name =~ "{DatabaseName}"

      | where session_id > 50

      | join kind=inner impactedDBS on AppName

      | project PreciseTimeStamp, ClusterName, AppName, LogicalServerName, event, logical_database_name, session_id, MinFailureHappened

      | summarize incrementscount=count(), MinMasterDBInvalidateSecurityCaches = min(PreciseTimeStamp) by AppName, logical_database_name, MinFailureHappened'
