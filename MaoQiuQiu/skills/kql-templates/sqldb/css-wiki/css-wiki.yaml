- id: DB-css-wiki-77
  Topic: Backup-History-for-automated-database-backups
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Backup,-Restore-and-DB-Import-or-Export/How-to-questions-or-planning-a-recovery-strategy/Backup-History-for-automated-database-backups.md
