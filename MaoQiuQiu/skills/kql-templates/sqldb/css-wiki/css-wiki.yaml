- id: DB-css-wiki-78
  Topic: Import-or-Export-%2D-Export-Fails-on-blob-Storage
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Backup,-Restore-and-DB-Import-or-Export/Import-from-BACPAC-to-create-SQL-DB/Import-or-Export-%2D-Export-Fails-on-blob-Storage.md
  Prompts:
  - SQL DB import export analysis
  - SQL DB MonImportExport logical_server_name AppName
  - SQL DB investigate import export
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonImportExport
