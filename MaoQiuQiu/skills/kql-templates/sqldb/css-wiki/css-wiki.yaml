      | where TIMESTAMP >= datetime(yyyy-MM-dd HH:mm:ss)

      | where TIMESTAMP <= datetime(yyyy-MM-dd HH:mm:ss)

      | where LogicalServerName =~ "{ServerName}"

      | extend ProxyOrRedirect = iif(result == "e_crContinueSameState", "Proxy", "Redirect")

      | extend ProxyOrRedirectEmpty = iif(result == "" and ProxyOrRedirect == "Redirect", "(ignore ProxyOrRedirect)", "")

      | project originalEventTimestamp, type, event, error, state, is_user_error, is_success, os_error, sni_error, sni_consumer_error, lookup_error_code, lookup_state, tds_flags, total_time_ms, package, NodeName, AppName, logical_server_name, database_name, host_name, application_name, peer_address, instance_name, instance_port, is_contained_user, connection_peer_id, connection_id, sockdup_queue_size, result, ProxyOrRedirect, ProxyOrRedirectEmpty, message, session_elapsed_time_ms, is_normal_logout, batch_state, kill_reason

      | limit 10000

      | order by originalEventTimestamp asc'
