  Topic: '[OnePager]-DSS002.3-%2D-Other-Kusto-queries'
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Data-Sync,-Replication,-CDC-and-Change-Tracking/SQL-Data-Sync/[OnePager]-DSS002.3-%2D-Other-Kusto-queries.md
