  Source: AzureSQLDB/SQL-Database/Releases/Gateway-Migration/Connection-Failures-due-to-Gateway-Migration,-Upgrade.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin event logical_server_name AppName
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp > ago(1h) // you might have to change the duration based on the Customer''s Time Zone to see if there was any traffic

      | where logical_server_name =~ svr

      | where event == ''process_login_finish''

      | where package =~ ''xdbgateway'' and AppName =~ ''Gateway''

      | summarize count(), min(originalEventTimestamp), max(originalEventTimestamp) by ClusterName'
- id: DB-css-wiki-57
  Topic: Customer-using-JDBC-Driver
  Source: AzureSQLDB/SQL-Database/Releases/Gateway-Migration/Customer-using-JDBC-Driver.md
  Prompts:
  - SQL DB login events
  - SQL DB MonAnalyticsDBSnapshot event logical_server_name
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: '| where originalEventTimestamp > ago(2d)

      | where event == "process_login_finish" and package == "xdbgateway" and driver_name != "XODBC"

      | extend Region = extract(''(.*)\\.(.*)\\.(worker|control).(database|sqltest-eg1).(windows.net|chinacloudapi.cn|mscds.com|cloudapi.de|usgovcloudapi.net)'', 2,ClusterName, typeof(string))

      | extend e = (encryption_options % 2)

      | summarize count() by Region, logical_server_name, driver_name, tds_version, e, application_name

      | where application_name == "Microsoft SQL Server JDBC Driver" and tds_version != "1946157060" and e == 1

      | summarize lslc = sum(count_) by Region, logical_server_name

      | join (cluster(clstr).database(''sqlazure1'').MonAnalyticsDBSnapshot

      | summarize by ClusterName, logical_server_name, customer_subscription_id) on logical_server_name

      | summarize slc = sum(lslc), server_list = tostring(makelist(logical_server_name)) by Region,customer_subscription_id

      | order by Region,customer_subscription_id'
- id: DB-css-wiki-58
  Topic: Telemetry-and-commonly-used-Kusto-tables
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Telemetry-and-commonly-used-Kusto-tables.md
  Prompts:
  - SQL DB management analysis
  - SQL DB MonManagement event request_id operation_parameters
  - SQL DB investigate management
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where request_id == ''F1A64BA0-C435-458D-A107-EABA98EF516F''

      | where event == ''management_operation_success''

      | project replace_string(operation_parameters, ''><'' ,''>\n<'')'
- id: DB-css-wiki-59
  Topic: Telemetry-and-commonly-used-Kusto-tables
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Telemetry-and-commonly-used-Kusto-tables.md
  Prompts:
  - SQL DB continuous copy status status
  - SQL DB MonDmContinuousCopyStatus LogicalServerName
  - SQL DB investigate continuous copy status
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmContinuousCopyStatus
    ExecutedQuery: 'MonDmContinuousCopyStatus

      | where TIMESTAMP between (TimeCheckStart .. TimeCheckEnd)

      | where LogicalServerName == ServerName and partner_database =~ DatabaseName

      | where isnotempty(local_slo)

      | summarize min(start_utc_date),max(end_utc_date) by LogicalServerName, partner_server, partner_database, local_slo, partner_slo

      | extend IsMisMatched = case(local_slo != partner_slo, ''MismatchedSlo'', ''No'')

      | distinct min_start_utc_date, max_end_utc_date, LogicalServerName, partner_server,  partner_database, IsMisMatched, local_slo , partner_slo'
- id: DB-css-wiki-60
  Topic: Telemetry-and-commonly-used-Kusto-tables
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Telemetry-and-commonly-used-Kusto-tables.md
  Prompts:
  - SQL DB seed traces activity
  - SQL DB MonDbSeedTraces database_name TIMESTAMP
  - SQL DB investigate seed traces
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDbSeedTraces
    ExecutedQuery: 'MonDbSeedTraces

      |where TIMESTAMP > ago(1d)

      |where database_name !contains "-"

      |extend dbFirst = substring(database_name,0,2)

      |summarize count() by database_name

      |take 1000'
- id: DB-css-wiki-61
  Topic: Telemetry-and-commonly-used-Kusto-tables
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Telemetry-and-commonly-used-Kusto-tables.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot event logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_server_name == \"{ServerName}\" or LogicalServerName== \"{ServerName}\"

      //| where logical_database_name == \"{DatabaseName}\"

      //| where TIMESTAMP > ago()

      | distinct logical_database_name, lower_phys_id = tolower(physical_database_id), lower_log_id = tolower(logical_database_id), DBSnap_AppName = sql_instance_name, logical_server_name

      | join kind=rightouter    (MonDbSeedTraces

      | where LogicalServerName== \"{ServerName}\" or LogicalServerName== \"{ServerName}\"

      | where TIMESTAMP >= datetime(<start_time>) and TIMESTAMP <=datetime(<end_time>)

      |extend lower_database_name  = tolower(database_name )

      ) on $left.lower_phys_id == $right.lower_database_name

      | summarize max(TIMESTAMP) by LogicalServerName, database_name, logical_server_name , logical_database_name, lower_phys_id, lower_log_id, AppName, DBSnap_AppName, event, role_desc,   remote_machine_name

      | order by database_name'
- id: DB-css-wiki-62
  Topic: XE-Guidance
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/XE-Guidance.md
  Prompts:
  - SQL DB xevents telemetry analysis
  - SQL DB MonXeventsTelemetry event database_name
  - SQL DB investigate xevents telemetry
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonXeventsTelemetry
    ExecutedQuery: 'MonXeventsTelemetry

      | where TIMESTAMP > ago(7d)

      | where LogicalServerName =~ ''{LogicalServerName}''

      | join kind=leftouter (mapping) on buffer_flush_policy

      | project TIMESTAMP, AppName, database_name, event, session_name,

      EVENT_RETENTION_MODE, NodeName, ClusterName

      | order by TIMESTAMP desc

      | take 100'
- id: DB-css-wiki-63
  Topic: Automated-Backups-%2D-Investigate-PITR-Backup-Billing-Charges
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Backup,-Restore-and-DB-Import-or-Export/Automated-backups/Automated-Backups-%2D-Investigate-PITR-Backup-Billing-Charges.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonManagement event originalEventTimestamp
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where event =~ ''sqldb_backup_billing_complete'' and logical_database_id =~ ''{LogicalDatabaseId}''

      | project billingCalculationTimestamp=originalEventTimestamp, logical_database_id, full_backup_cumulative_size_mb=full_backup_cumulative_size,

      diff_backup_cumulative_size_mb=diff_backup_cumulative_size, log_backup_cumulative_size_mb=log_backup_cumulative_size, cumulative_backup_storage_size_mb=todouble(backup_storage_size)

      | extend full_ratio = full_backup_cumulative_size_mb/cumulative_backup_storage_size_mb, diff_ratio=diff_backup_cumulative_size_mb/cumulative_backup_storage_size_mb,

      log_ratio=log_backup_cumulative_size_mb/cumulative_backup_storage_size_mb

      | join kind=inner

      ('
- id: DB-css-wiki-64
  Topic: Automated-Backups-%2D-Investigate-PITR-Backup-Billing-Charges
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Backup,-Restore-and-DB-Import-or-Export/Automated-backups/Automated-Backups-%2D-Investigate-PITR-Backup-Billing-Charges.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonAnalyticsDBSnapshot logical_server_name
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where logical_database_id =~ ''{LogicalDatabaseId}''

      | project logicalDbSnapshotTimestamp=TIMESTAMP, logical_server_name, logical_database_name, logical_database_id=tolower(logical_database_id), logical_resource_pool_id,

      logical_database_max_size_mb=max_size_bytes/1024.0/1024.0, backup_retention_days, sql_instance_name=tolower(sql_instance_name), physical_database_id=tolower(physical_database_id)

      )'
- id: DB-css-wiki-65
  Topic: Automated-Backups-%2D-Investigate-PITR-Backup-Billing-Charges
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Backup,-Restore-and-DB-Import-or-Export/Automated-backups/Automated-Backups-%2D-Investigate-PITR-Backup-Billing-Charges.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonDmIoVirtualFileStats logical_server_name
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where logical_database_id =~ ''{LogicalDatabaseId}''

      | where type_desc == ''ROWS'' and is_primary_replica == 1

      | summarize physical_database_size_on_disk_mb=sum(size_on_disk_bytes)/1024.0/1024.0 by TIMESTAMP, logical_database_id

      | project physicalDbSnapshotTimestamp=TIMESTAMP, physical_database_size_on_disk_mb, logical_database_id=tolower(logical_database_id)

      ) on logical_database_id

      | where billingCalculationTimestamp > physicalDbSnapshotTimestamp

      | summarize arg_max(physicalDbSnapshotTimestamp, *) by billingCalculationTimestamp, logical_database_id

      | project-away logical_database_id1, logical_database_id2, sql_instance_name, physical_database_id

      | project billingCalculationTimestamp, logical_server_name, logical_database_name, full_backup_cumulative_size_mb, diff_backup_cumulative_size_mb,

      log_backup_cumulative_size_mb, cumulative_backup_storage_size_mb, logical_database_max_size_mb, backup_retention_days

      | project-rename BillingCalculationTimestamp=billingCalculationTimestamp, ServerName=logical_server_name, DatabaseName = logical_database_name,

      FullBackupCumulativeSizeMB=full_backup_cumulative_size_mb, DiffBackupCumulativeSizeMB=diff_backup_cumulative_size_mb, LogBackupCumulativeSizeMB=log_backup_cumulative_size_mb,

      CumulativeBackupStorageMB=cumulative_backup_storage_size_mb, DatabaseMaxSizeMB=logical_database_max_size_mb, BackupRetentionDays=backup_retention_days

      | order by BillingCalculationTimestamp asc'
- id: DB-css-wiki-66
  Topic: Automated-Backups-%2D-Investigate-PITR-Backup-Billing-Charges
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Backup,-Restore-and-DB-Import-or-Export/Automated-backups/Automated-Backups-%2D-Investigate-PITR-Backup-Billing-Charges.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonManagement event originalEventTimestamp
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where event =~ "sqldb_backup_billing_complete"

      | project billingCalculationTimestamp=originalEventTimestamp, logical_database_id, full_backup_cumulative_size, diff_backup_cumulative_size, log_backup_cumulative_size, backup_storage_size

      ) on logical_database_id

      | where billingCalculationTimestamp > logicalDbSnapshotTimestamp

      | project billingCalculationTimestamp, logicalDbSnapshotTimestamp, logical_database_id, logical_database_name, full_backup_cumulative_size_mb=full_backup_cumulative_size, diff_backup_cumulative_size_mb=diff_backup_cumulative_size, log_backup_cumulative_size_mb=log_backup_cumulative_size, cumulative_backup_storage_size_mb=todouble(backup_storage_size), sql_instance_name, physical_database_id

      | extend full_ratio = full_backup_cumulative_size_mb/cumulative_backup_storage_size_mb, diff_ratio=diff_backup_cumulative_size_mb/cumulative_backup_storage_size_mb, log_ratio=log_backup_cumulative_size_mb/cumulative_backup_storage_size_mb

      | summarize arg_max(logicalDbSnapshotTimestamp, *) by billingCalculationTimestamp, logical_database_id, logical_database_name

      | join kind=inner

      ('
- id: DB-css-wiki-67
  Topic: Automated-Backups-%2D-Investigate-PITR-Backup-Billing-Charges
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Backup,-Restore-and-DB-Import-or-Export/Automated-backups/Automated-Backups-%2D-Investigate-PITR-Backup-Billing-Charges.md
