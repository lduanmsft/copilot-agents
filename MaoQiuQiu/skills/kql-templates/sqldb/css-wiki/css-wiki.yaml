- id: DB-css-wiki-508
  Topic: Wait-stats-analysis-(Managed-Instance)
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/Wait-stats-analysis-(Managed-Instance).md
  Prompts:
  - SQL DB QDS wait stats activity
  - SQL DB MonWiQdsWaitStats LogicalServerName AppName
  - SQL DB investigate QDS wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsWaitStats
    ExecutedQuery: 'MonWiQdsWaitStats

      | where  TIMESTAMP >= datetime({StartTime}) and  TIMESTAMP <= datetime({EndTime})

      | where LogicalServerName =~ "{LogicalServerName}" and AppName == "{AppName}"

      | where wait_category =~ "BUFFERIO"

      | where is_primary  == 1  //and exec_type ==3

      | extend query_key = strcat(database_name, ".", query_hash)

      | summarize sum(total_query_wait_time_ms) by query_key

      | top 10 by sum_total_query_wait_time_ms desc nulls last'
- id: DB-css-wiki-509
  Topic: Wait-stats-analysis-(Managed-Instance)
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/Wait-stats-analysis-(Managed-Instance).md
  Prompts:
  - SQL DB QDS wait stats activity
  - SQL DB MonWiQdsWaitStats LogicalServerName AppName
  - SQL DB investigate QDS wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsWaitStats
    ExecutedQuery: 'MonWiQdsWaitStats

      | where  TIMESTAMP >= datetime({StartTime}) and  TIMESTAMP <= datetime({EndTime})

      | where LogicalServerName =~ "{LogicalServerName}" and AppName == "{AppName}"

      | where is_primary  == 1

      | summarize sum(total_query_wait_time_ms) by  bin_at(TIMESTAMP, 15min, datetime({StartTime})),   wait_category

      | extend wait_time_ms_per_sec=toint(sum_total_query_wait_time_ms*1.0/(15*60))

      | project TIMESTAMP, wait_category, wait_time_ms_per_sec

      | render  timechart'
- id: DB-css-wiki-510
  Topic: Wait-stats-analysis-(Managed-Instance)
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/Wait-stats-analysis-(Managed-Instance).md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsWaitStats LogicalServerName AppName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsWaitStats
    ExecutedQuery: 'MonWiQdsWaitStats

      | where  TIMESTAMP >= datetime({StartTime}) and  TIMESTAMP <= datetime({EndTime})

      | where LogicalServerName =~ "{LogicalServerName}" and AppName == "{AppName}"

      //| where query_hash =~ "0xA224D771D6309702"

      | where is_primary  == 1  //and exec_type ==3

      | summarize wait_time_ms_per_sec_per_cpu=sum(total_query_wait_time_ms)/(15*60*cpu_cap_in_sec) by  bin_at(TIMESTAMP, 15min, datetime({StartTime})),    wait_category

      | render  timechart'
- id: DB-css-wiki-511
  Topic: Wait-stats-analysis-(Managed-Instance)
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/Wait-stats-analysis-(Managed-Instance).md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonDmOsSpinlockStats LogicalServerName AppName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsSpinlockStats
    ExecutedQuery: 'MonDmOsSpinlockStats

      | where  TIMESTAMP >= datetime({StartTime}) and  TIMESTAMP <= datetime({EndTime})

      | where LogicalServerName =~ "{LogicalServerName}"  and AppName =~ "{AppName}" and NodeName =~ "{NodeName}"

      | summarize sum(delta_spins) by name

      | extend elapsed_second = datetime_diff (''second'',  datetime({EndTime}), datetime({StartTime}))

      | extend delta_spins_per_sec_per_cpu=round((sum_delta_spins*1.0)/(elapsed_second*cpu_cap_in_sec),0)

      | top 10 by delta_spins_per_sec_per_cpu desc nulls last

      | project name, delta_spins_per_sec_per_cpu

      | order by delta_spins_per_sec_per_cpu desc nulls last

      | render  columnchart'
- id: DB-css-wiki-512
  Topic: '[OnePager]-Higher-Resource-Consumption-Due-To-Workload-Increase'
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/[OnePager]-Higher-Resource-Consumption-Due-To-Workload-Increase.md
  Prompts:
  - SQL DB QDS exec stats analysis
  - SQL DB MonWiQdsExecStats originalEventTimestamp
  - SQL DB investigate QDS exec stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where

      AppName =~  appName and

      originalEventTimestamp between (startDate..endDate) and

      ClusterName =~ clusterName and

      NodeName =~ nodeName and

      LogicalServerName =~ serverName and

      database_name =~ databaseName

      | top-nested of bin(originalEventTimestamp, 1h) by sum(execution_count), top-nested 5 of query_hash by exec_count = sum(execution_count) desc

      | sort by originalEventTimestamp asc nulls last

      | project originalEventTimestamp, query_hash, exec_count

      | render timechart'
