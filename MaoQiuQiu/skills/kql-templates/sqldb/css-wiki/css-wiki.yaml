- id: DB-css-wiki-361
  Topic: Memory-%2D-In-Memory
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Memory-%2D-In-Memory.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonDmDbResourceGovernance database_name
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbResourceGovernance
    ExecutedQuery: 'MonDmDbResourceGovernance

      | where  TIMESTAMP >= startTime

      | where  TIMESTAMP <= endTime

      // | where  TIMESTAMP >= timeRange

      | where server_name =~ srv

      | where database_name =~ db

      | project TIMESTAMP, AppName, NodeName, slo_name, primary_group_max_cpu, min_cores, max_db_memory, primary_group_max_io, primary_max_log_rate, primary_group_max_workers, max_sessions, last_updated_date_utc

      | extend MaxCpuCores = (primary_group_max_cpu*min_cores)/100

      | extend MemoryInMb = (max_db_memory)/1024

      | extend MaxIOPS = primary_group_max_io

      | extend MaxLogKbps = primary_max_log_rate/1024.0

      | extend WorkersLimit = primary_group_max_workers

      | extend SessionsLimit = max_sessions

      | project last_updated_date_utc, AppName, NodeName, slo_name, MaxCpuCores, MemoryInMb, MaxIOPS, MaxLogKbps, WorkersLimit, SessionsLimit

      | summarize min(last_updated_date_utc) by AppName , NodeName, slo_name, MaxCpuCores, MemoryInMb, MaxIOPS, MaxLogKbps, WorkersLimit, SessionsLimit

      ) on AppName, NodeName

      | project min_TIMESTAMP, min_last_updated_date_utc, AppName, NodeName, slo_name, MaxCpuCores, MemoryInMb, MaxIOPS, MaxLogKbps, WorkersLimit, SessionsLimit'
- id: DB-css-wiki-362
  Topic: Memory-%2D-In-Memory
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Memory-%2D-In-Memory.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event NodeName TIMESTAMP endTime
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where  TIMESTAMP >= startTime

      | where  TIMESTAMP <= endTime

      // | where  TIMESTAMP >= timeRange

      | where event == "instance_load"

      | where application_name has_any (AppNames)

      | where NodeName in ("_DB_54", "_DB_9", "_DB_31", "_DB_59")

      | where code_package_name == "Code"

      | extend memory_usage_pct = round((memory_load/memory_load_cap)*100, 2)

      | extend cpu_usage_pct = round((cpu_load/cpu_load_cap)*100, 2)

      | project TIMESTAMP, NodeName, application_name, memory_load_cap, toint(memory_load) , memory_usage_pct, cpu_load_cap, round(cpu_load, 4), cpu_usage_pct

      | order by TIMESTAMP asc

      //| render timechart'
- id: DB-css-wiki-363
  Topic: Memory-%2D-In-Memory
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Memory-%2D-In-Memory.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonSqlMemoryClerkStats LogicalServerName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlMemoryClerkStats
    ExecutedQuery: 'MonSqlMemoryClerkStats

      | where  TIMESTAMP >= startTime

      | where  TIMESTAMP <= endTime

      // | where  TIMESTAMP >= timeRange

      | where LogicalServerName =~ srv

      | extend memory_MB = round(pages_kb/1024.0)

      | extend vm_committed_MB = round(vm_committed_kb/1024.0)

      | where [''memory_clerk_type''] in ("MEMORYCLERK_XTP")

      | where memory_clerk_type !in~ ("MEMORYCLERK_XE_BUFFER")

      //| where [''memory_clerk_type''] in ("MEMORYCLERK_SQLCLR", "MEMORYCLERK_SQLBUFFERPOOL", "CACHESTORE_SQLCP", "CACHESTORE_PHDR")

      | project TIMESTAMP, NodeName, LogicalServerName, AppName, memory_clerk_type, memory_clerk_name, memory_MB, vm_committed_MB //, pages_kb, peak_pages_kb, vm_committed_kb

      ) on AppName, NodeName

      | summarize memory_MB = sum(memory_MB) + sum(vm_committed_MB) by [''memory_clerk_type''], bin(TIMESTAMP, 5min)

      | render timechart'
