- id: DB-css-wiki-600
  Topic: CRI-Escalation-Checklist-for-Data-Integration
  Source: AzureSQLDB/Welcome/Processes/Escalation-Process/CRI-Escalation-Checklists/CRI-Escalation-Checklist-for-Data-Integration.md
  Prompts:
