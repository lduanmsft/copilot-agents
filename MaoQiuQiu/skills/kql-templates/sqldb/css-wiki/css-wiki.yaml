- id: DB-css-wiki-6
  Topic: Bug-2477477
  Source: AzureSQLDB/SQL-Database/Known-Issues/Active/Bug-2477477.md
  Prompts:
  - SQL DB watson analysis status
  - SQL DB MonWatsonAnalysis LogicalServerName AppName
  - SQL DB investigate watson analysis
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWatsonAnalysis
    ExecutedQuery: 'let serverName="{ServerName}";

      let appName="{AppName}";

      let startTime=ago({TimeRange});

      let endTime=now();

      let watson =materialize (cluster("sqladhoc").database("sqlazure1").MonWatsonAnalysis

      | where AppName contains appName

      | extend  AppName =tolower(AppName)

      | where LogicalServerName contains serverName

      | where DumpCrashTime > startTime and DumpCrashTime < endTime

      |where CrashId >0

      |project DumpCrashTime, LogicalServerName ,DumpUID,BucketId,AppName,NodeName,ClusterName);

      let Bugs =materialize (cluster("sqladhoc").database("sqlazure1").MonWatsonBugSnapshot

      | summarize arg_max(TIMESTAMP, AreaPath, CreatedDate, AssignedTo, State, Url, Title) by BucketId

      | project ADOTitle = Title, ADOAreaPath = AreaPath, ADOCreatedDate = CreatedDate, ADOUrl = Url, BucketId);'
- id: DB-css-wiki-7
  Topic: Bug-2477477
  Source: AzureSQLDB/SQL-Database/Known-Issues/Active/Bug-2477477.md
  Prompts:
  - SQL DB dumper activity analysis
  - SQL DB MonSqlDumperActivity AppName TIMESTAMP ADOUrl
  - SQL DB investigate dumper activity
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlDumperActivity
    ExecutedQuery: 'MonSqlDumperActivity

      | where TIMESTAMP >= startTime and TIMESTAMP <endTime

      | extend AppName=tolower(TargetAppName)

      | where AppName contains appName

      | extend DumpURL = strcat(''https://azurewatson.microsoft.com/dumpuid/'', DumpUID)

      | join kind=inner (watson) on NodeName,ClusterName, AppName,DumpUID

      | join kind=inner (Bugs) on BucketId

      | project TIMESTAMP, DumpURL, BugURL=ADOUrl'
- id: DB-css-wiki-8
  Topic: Cannot-upsert-subscription-with-state-Unregistered
  Source: AzureSQLDB/SQL-Database/Known-Issues/Active/Cannot-upsert-subscription-with-state-Unregistered.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event NodeName ClusterName
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where subscription_id == "issue_subscription_id"

      | where originalEventTimestamp > ago({TimeRange})

      | extend ops = parse_xml(operation_parameters)

      | extend targetState = tostring(ops.InputParameters.State)

      | project originalEventTimestamp, ClusterName, NodeName, event, operation_type, targetState, request_id, elapsed_time, error_code, error_message, operation_parameters'
- id: DB-css-wiki-9
  Topic: Different-storage-space-for-elastic-pool-joining-failover-group
  Source: AzureSQLDB/SQL-Database/Known-Issues/Active/Different-storage-space-for-elastic-pool-joining-failover-group.md
  Prompts:
  - SQL DB IO virtual file stats activity
  - SQL DB MonDmIoVirtualFileStats LogicalServerName
  - SQL DB investigate IO virtual file stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where LogicalServerName == \"{ServerName}\" and AppName == "AppName"

      | where type_desc == "ROWS"

      | summarize by ServerName=LogicalServerName, actual_size_gb = size_on_disk_bytes / (1024.0*1024.0*1024.0), actual_max_size_gb = max_size_mb / (1024.0)

      | where actual_size_gb > 0 and actual_max_size_gb > 0

      | project ServerName, actual_size_gb, actual_max_size_gb

      | order by actual_size_gb desc

      | limit 5'
- id: DB-css-wiki-10
  Topic: Different-storage-space-for-elastic-pool-joining-failover-group
  Source: AzureSQLDB/SQL-Database/Known-Issues/Active/Different-storage-space-for-elastic-pool-joining-failover-group.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event originalEventTimestamp
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where originalEventTimestamp >= ago({TimeRange}) and originalEventTimestamp <= now()

      | where operation_parameters contains \"{ServerName}\"

      | where operation_type !in ("ExecuteDatabaseVulnerabilityAssessmentScan", "ResaveServerAuditing", "SendEmailNotificationsV2")

      | project originalEventTimestamp, request_id, event, operation_type, operation_parameters

      | extend ops = parse_xml(operation_parameters)

      | extend ops_string = tostring(ops.InputParameters)

      | extend ops_string = replace_string(ops_string, "{\"@xsi:nil\":\"true\"}", "null")

      | extend ops_string = replace_string(ops_string, "\"@xmlns:xsd\":\"http://www.w3.org/2001/XMLSchema\",\"@xmlns:xsi\":\"http://www.w3.org/2001/XMLSchema-instance\",", "")

      | extend json_ops = todynamic(ops_string)

      | evaluate bag_unpack(json_ops)

      | project-away ops, ops_string, operation_parameters

      | order by originalEventTimestamp asc'
