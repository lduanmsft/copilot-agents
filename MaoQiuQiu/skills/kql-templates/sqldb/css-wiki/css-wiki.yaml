      | where Component != ''Scheduler''

      | where Component != ''MetadataTracer''

      | extend Detail = replace(@''hubstate: 0,'', @''hubstate: 0(UnProvisioned), \1'', Detail)

      | extend Detail = replace(@''hubstate: 1,'', @''hubstate: 1(Provisioning), \1'', Detail)

      | extend Detail = replace(@''hubstate: 2,'', @''hubstate: 2(Provisioned), \1'', Detail)

      | extend Detail = replace(@''hubstate: 3,'', @''hubstate: 3(ProvisionFailed), \1'', Detail)

      | extend Detail = replace(@''hubstate: 13,'', @''hubstate: 13(Reprovisioning), \1'', Detail)

      | extend Detail = replace(@''hubstate: 14,'', @''hubstate: 14(ReprovisionFailed), \1'', Detail)

      | extend Detail = replace(@''hubstate: 17,'', @''hubstate: 17(UnReprovisioned), \1'', Detail)

      | extend Detail = replace(@''memberstate:0,'', @''memberstate: 0(UnProvisioned), \1'', Detail)

      | extend Detail = replace(@''memberstate:1,'', @''memberstate: 1(Provisioning), \1'', Detail)

      | extend Detail = replace(@''memberstate:2,'', @''memberstate: 2(Provisioned), \1'', Detail)

      | extend Detail = replace(@''memberstate:3,'', @''memberstate: 3(ProvisionFailed), \1'', Detail)

      | extend Detail = replace(@''memberstate:4,'', @''memberstate: 4(SyncInProgress), \1'', Detail)

      | extend Detail = replace(@''memberstate:5,'', @''memberstate: 5(SyncSucceeded), \1'', Detail)

      | extend Detail = replace(@''memberstate:6,'', @''memberstate: 6(SyncFailed), \1'', Detail)

      | extend Detail = replace(@''memberstate:10,'', @''memberstate: 10(DisabledTombstoneCleanup), \1'', Detail)

      | extend Detail = replace(@''memberstate:12,'', @''memberstate: 12(SyncSucceededWithWarnings), \1'', Detail)

      | extend Detail = replace(@''memberstate:13,'', @''memberstate: 13(Reprovisioning), \1'', Detail)

      | extend Detail = replace(@''memberstate:14,'', @''memberstate: 14(ReprovisionFailed), \1'', Detail)

      | extend Detail = replace(@''memberstate:15,'', @''memberstate: 15(SyncCancelling), \1'', Detail)

      | extend Detail = replace(@''memberstate:16,'', @''memberstate: 16(SyncCancelled), \1'', Detail)

      | extend Detail = replace(@''memberstate:17,'', @''memberstate: 17(UnReprovisioned), \1'', Detail)

      | where Detail startswith ''The states''  | project TIMESTAMP, Detail'
- id: DB-css-wiki-268
  Topic: DSS002.2-%2D-MonDataSync
