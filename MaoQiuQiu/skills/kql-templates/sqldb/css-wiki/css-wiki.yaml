- id: DB-css-wiki-503
  Topic: Verifying-waitstats
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/Verifying-waitstats.md
  Prompts:
  - SQL DB cloud database wait stats activity
  - SQL DB MonDmCloudDatabaseWaitStats database_name
  - SQL DB investigate cloud database wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: 'MonDmCloudDatabaseWaitStats

      | where end_utc_date > startTime

      | where end_utc_date < endTime

      | where LogicalServerName =~ srv

      | where database_name =~ db

      | extend delta_wait_time_ms_History = delta_wait_time_ms * 1.0 / delta_waiting_tasks_count

      | summarize avg(delta_waiting_tasks_count), max(delta_waiting_tasks_count), avg(delta_signal_wait_time_ms), avg(delta_wait_time_ms_History), max(max_wait_time_ms) by wait_type

      | extend avg_waiting_tasks_count = toint(avg_delta_waiting_tasks_count)

      | extend max_waiting_tasks_count = max_delta_waiting_tasks_count

      | extend avg_signal_time_ms = toint(avg_delta_signal_wait_time_ms)

      | extend avg_wait_time_ms = toint(avg_delta_wait_time_ms_History)

      | extend max_wait_time_ms = toint(max_max_wait_time_ms)

      | where max_wait_time_ms > 10  // reduce noise

      | project wait_type, avg_waiting_tasks_count, max_waiting_tasks_count, avg_signal_time_ms, avg_wait_time_ms, max_wait_time_ms

      | top 20 by avg_wait_time_ms desc'
