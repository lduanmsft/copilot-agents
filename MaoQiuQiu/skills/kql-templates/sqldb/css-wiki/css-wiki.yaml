- id: DB-css-wiki-440
  Topic: QDS-readonly-with-readonly-Reason-131072
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Query-tuning/QDS-readonly-with-readonly-Reason-131072.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonWiQdsExecStats database_name LogicalServerName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

