- id: DB-css-wiki-596
  Topic: Issues-with-poor-Script-Performance
  Source: AzureSQLDB/SQL-Managed-Instance/Troubleshooting-Guides/Reporting,-Analytics-and-Integration/Machine-Learning-Services-for-SQL-Managed-Instance/Performance-issues-and-timeouts/Issues-with-poor-Script-Performance.md
  Prompts:
  - SQL DB extensibility trace activity
  - SQL DB MonExtensibilityTrace
  - SQL DB investigate extensibility trace
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - SubscriptionId
  KustoQueries:
  - TableName: MonExtensibilityTrace
    ExecutedQuery: 'MonExtensibilityTrace

      | extend phase = case(

      trace_message contains "< SQLSatellite_LaunchSatellite", "LaunchSatellite",

      trace_message contains "<= SatelliteRun()", "SatelliteRun",

      trace_message contains "<= ReadDataset()", "ReadDataSet",

      trace_message contains "<= ExecuteScript()", "ExecuteScript",

      trace_message contains "<= WriteDataSet()", "WriteDataSet",

      "")

      | where SubscriptionId == \"{SubscriptionId}\"

      | where isnotempty(phase)

      | summarize TIMESTAMP=max(TIMESTAMP) by phase, session_id

      | order by TIMESTAMP asc

      | evaluate pivot(phase, sum(TIMESTAMP), session_id)

      | project session_id,

      Launch=SatelliteRun-LaunchSatellite,

      Input=ReadDataSet-SatelliteRun,

      Execute=ExecuteScript-ReadDataSet,

      Output=WriteDataSet-ExecuteScript'
