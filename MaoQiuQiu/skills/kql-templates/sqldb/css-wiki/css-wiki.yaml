- id: DB-css-wiki-193
  Topic: Error%3A-A-network%2Drelated-or-instance%2Dspecific-error-%2D-Error-code-10060
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Other-error-not-listed/Error%3A-A-network%2Drelated-or-instance%2Dspecific-error-%2D-Error-code-10060.md
  Prompts:
  - SQL DB AAD auth failures
  - SQL DB MonLogin error state is_success lookup_state
  - SQL DB troubleshoot AAD auth failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      | where connection_peer_id =~ "34caa8cc-f6fe-4ca1-a785-785e21711553"

      //| where * has"34caa8cc-f6fe-4ca1-a785-785e21711553"

      | extend ProxyOrRedirectNew = iif( result =~ "e_crContinue", "Redirect", iif( result =~ "e_crContinueSameState", "Proxy" , ""))

      | extend fedauth_library_type_desc =

      case(

      fedauth_library_type == 0, "SQL Server Authentication",

      fedauth_library_type == 2, "Token Base Authentication",

      fedauth_library_type == 3 and fedauth_adal_workflow == 1, "Azure Active Directory - Password Authentication",

      fedauth_library_type == 3 and fedauth_adal_workflow == 2, "Azure Active Directory - Integrated Authentication",

      fedauth_library_type == 3 and fedauth_adal_workflow == 3, "Azure Active Directory - Universal Authentication",

      strcat(tostring(fedauth_library_type) , "-" , tostring(fedauth_adal_workflow))

      )

      | extend AADUser = iif( fedauth_adal_workflow > 0 or fedauth_library_type > 0, "AAD" , "SQL")

      | project originalEventTimestamp, type, event, error, state, is_user_error, is_success, os_error, sni_error, sni_consumer_error, lookup_error_code, lookup_state, tds_flags, total_time_ms, package, NodeName, AppName, logical_server_name, database_name, host_name, application_name, peer_address, vnet_peer_address, control_ring_address, driver_name, remote_host, is_mars, is_mfa, instance_name, instance_port, is_contained_user, connection_peer_id, connection_id, vnet_link_identifier, sockdup_queue_size, result, ProxyOrRedirectNew, fedauth_library_type_desc, AADUser, message, session_elapsed_time_ms , is_normal_logout , batch_state , kill_reason, extra_info'
