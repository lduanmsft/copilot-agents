    ExecutedQuery: 'MonQueryStoreFailures

      | where TIMESTAMP > datetime({StartTime}) and TIMESTAMP <datetime({EndTime})

      | where LogicalServerName =~''{ServerName}''

      //| where logical_database_name =~''{DatabaseName}'' // may not work if it''s a db in  elastic pool

      | where AppName =~''{AppName}''

      | where  event==''query_store_buffered_items_over_memory_limit'' or ( event==''query_store_resource_total_over_instance_limit'' and query_store_resource_type==''x_QdsResourceType_BufferedItemsMemory'')

      | extend current_buffered_items_size_mb=current_buffered_items_size_kb/1024

      | extend max_buffered_items_size_mb=max_buffered_items_size_kb/1024

      | extend current_instance_total_resource_size_mb=current_instance_total_resource_size_kb/1024

      | extend max_instance_total_resource_size_mb=max_instance_total_resource_size_kb/1024

      | extend max_resource_available_mb=max_resource_available_kb/1024

      | extend max_memory_available_mb=max_memory_available_kb/1024

      | project   TIMESTAMP , event,query_store_resource_type, logical_database_name,current_buffered_items_size_mb,max_buffered_items_size_mb,

      current_instance_total_resource_size_mb,max_instance_total_resource_size_mb,

      max_resource_available_mb, max_memory_available_mb ,AppName

      | order by TIMESTAMP desc

      //| take 5'
- id: DB-css-wiki-456
  Topic: Troubleshooting-QueryStoreReadOnly-error-262144
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Query-tuning/Troubleshooting-QueryStoreReadOnly-error-262144.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonQueryStoreInfo event LogicalServerName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryStoreInfo
    ExecutedQuery: 'MonQueryStoreInfo

      | where AppName =~ "{AppName}"

      | where LogicalServerName =~ "{ServerName}"

      | where originalEventTimestamp between (datetime(2023-06-1)..datetime(2023-06-26))

      | where event == ''query_store_db_diagnostics''////event query_store_db_diagnostics happens every 30 mins.

      | where db_state_actual == 1//ReadOnly

      | where binary_and(query_store_read_only_reason,0x8)==0//exclude readonly secondary

      | extend current_stmt_hash_map_size_mb=current_stmt_hash_map_size_kb/1024

      | extend max_stmt_hash_map_size_mb=max_stmt_hash_map_size_kb/1024

      | extend current_buffered_items_size_mb=current_buffered_items_size_kb/1024

      | extend max_buffered_items_size_mb=max_buffered_items_size_kb/1024

      | extend current_size_mb=current_size_kb/1024

      | extend max_memory_available_mb=max_memory_available_kb/1024

      | serialize rn=row_number(), dummy=0

      | lookup kind=inner(mapping|extend dummy=0) on dummy

      | where binary_and(query_store_read_only_reason,mask)!=0

      | summarize ReadonlyReason=make_set(name) by rn,query_store_read_only_reason,originalEventTimestamp,capture_policy_mode,db_state_desired,undecided_query_count,query_count,queries_used_last_hour, queries_used_last_day, current_stmt_hash_map_size_mb,max_stmt_hash_map_size_mb,current_buffered_items_size_mb,max_buffered_items_size_mb,

      current_size_mb,max_size_mb,max_memory_available_mb, stale_query_threshold_days,flush_interval_seconds,interval_length_minutes,logical_database_name

      | summarize arg_max( originalEventTimestamp,tostring(ReadonlyReason),query_store_read_only_reason,capture_policy_mode,db_state_desired,undecided_query_count,query_count,queries_used_last_hour,queries_used_last_day, current_stmt_hash_map_size_mb,max_stmt_hash_map_size_mb,current_buffered_items_size_mb,max_buffered_items_size_mb,

      current_size_mb,max_size_mb,max_memory_available_mb, stale_query_threshold_days,flush_interval_seconds,interval_length_minutes) by logical_database_name

      | order by originalEventTimestamp asc

      //|take 10'
