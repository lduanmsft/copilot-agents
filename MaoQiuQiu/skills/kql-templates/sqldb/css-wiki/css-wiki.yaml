- id: DB-css-wiki-430
  Topic: Anti-Pattern
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Query-tuning/Anti-Pattern.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonQueryProcessing event LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: MonQueryProcessing
    ExecutedQuery: 'MonQueryProcessing

      | where  (originalEventTimestamp between (ago({TimeRange})..datetime(2023-07-25 14:43:00)))

      | where LogicalServerName =~ "{ServerName}" and logical_database_name =~ "{DatabaseName}"

      | where event =~ ''query_antipattern''

      | extend query_hash = strcat(''0x'', toupper(tohex(query_hash_signed)))

      | where query_hash in ((querySummary | project query_hash))

      | summarize occurrences = count() by query_hash, antipattern_type

      | extend occurrences_by_antipattern_type = strcat(antipattern_type, '': '', tostring(occurrences))

      | summarize occurrences_by_antipattern_type = make_set(occurrences_by_antipattern_type)  by query_hash

      | join kind=inner querySummary on query_hash

      | project query_hash, tostring(occurrences_by_antipattern_type), TotalQueryCPU_ms

      | order by TotalQueryCPU_ms desc'
- id: DB-css-wiki-431
  Topic: Hyperscale-db-query-tuning
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Query-tuning/Hyperscale-db-query-tuning.md
  Prompts:
  - SQL DB IO rbpex stats analysis
  - SQL DB MonDmIoRBPEXStats AppName NodeName TIMESTAMP
  - SQL DB investigate IO rbpex stats
  CustomizedParameters:
  - DatabaseName
  - NodeName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoRBPEXStats
    ExecutedQuery: "MonDmIoRBPEXStats\n| where TIMESTAMP >= datetime(yyyy-MM-dd HH:mm:ss) and TIMESTAMP datetime(yyyy-MM-dd HH:mm:ss)\n| where AppName =~ \"<app_name>\"\n| where NodeName =~ \\\"{NodeName}\\\"\n| where counter_name in (\"DataFCBBytesRead\", \"RbpeFCBBytesRead\") \n| project TIMESTAMP, NodeName, counter_name, value \n| order by TIMESTAMP asc\nThe counter_name \"RbpeFCBBytesRead\" indicates RBPEX/Local cache reads on the compute node, while \"DataFCBBytesRead\" indicates reads on the page server."
- id: DB-css-wiki-432
  Topic: QDS-Hitting-Memory-Limits-Statement-HashMap-131072
