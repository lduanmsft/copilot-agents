- id: DB-css-wiki-475
  Topic: Long-Running-Queries
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/Long-Running-Queries.md
  Prompts:
  - SQL DB blocking investigation
  - SQL DB blocked process report database_name LogicalServerName
  - SQL DB troubleshoot blocking investigation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBlockedProcessReportFiltered
    ExecutedQuery: 'let startTime = datetime(YYYY-MM-DD HH:00:00);

      let endTime = now();

      let blockingchain = MonBlockedProcessReportFiltered

      | where originalEventTimestamp > startTime - 3h and originalEventTimestamp < endTime

      | where AppName !startswith ''b-'' and AppName !startswith ''v-''

      | where LogicalServerName =~ {servername} and database_name =~ {databasename}

      | extend monitorLoop = extract(''monitorLoop=\x22(.*?)\x22'',1,blocked_process_filtered, typeof(int))

      | parse blocked_process_filtered with anystr3:string ''<blocked-process>'' blockee ''</blocked-process>'' discard1

      | parse blocked_process_filtered with anystr4:string''<blocking-process>'' blocker ''</blocking-process>'' discard2

      | extend blockee_session_id = extract(''spid=\x22([0-9]+)\x22'', 1, blockee, typeof(int))

      | extend blockee_waittime_ms = extract(''waittime=\x22([0-9]+)\x22'', 1, blockee, typeof(int))

      | extend blockee_queryhhash = extract(''queryhash=\x22(.*?)\x22'', 1, blockee, typeof(string))

      | extend blocker_session_id = extract(''spid=\x22([0-9]+)\x22'', 1, blocker, typeof(int))

      | extend blocker_queryhhash = extract(''queryhash=\x22(.*?)\x22'', 1, blocker, typeof(string))

      | order by monitorLoop desc nulls last;

      let leadblockers = blockingchain

      | join kind= rightanti ( blockingchain ) on $left.monitorLoop == $right.monitorLoop and $left.blockee_session_id==$right.blocker_session_id

      | extend lead_blocker_session_id = blocker_session_id

      | distinct monitorLoop, lead_blocker_session_id;'
