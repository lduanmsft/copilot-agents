      | extend blockee_waitresource = extract("waitresource=\"(.*?)\"", 1, blockee, typeof(string))

      | extend blocker_session_id = extract("spid=\"([0-9]+)\"", 1, blocker, typeof(int))

      | extend blocker_status = extract("status=\"(.*?)\"", 1, blocker, typeof(string))

      | extend blocker_waittime = extract("waittime=\"([0-9]+)\"", 1, blocker, typeof(int))

      | extend blocker_trancount = extract("trancount=\"([0-9]+)\"", 1, blocker, typeof(int))

      | extend blocker_lasttranstarted = extract("lasttranstarted=\"(.*?)\"", 1, blocker, typeof(datetime))

      | extend blocker_queryhhash = extract("queryhash=\"(.*?)\"", 1, blocker, typeof(string))

      | extend blocker_isolationlevel = extract("isolationlevel=\"(.*?)\"", 1, blocker, typeof(string))

      | extend blocker_lastattention = extract("lastattention=\"(.*?)\"", 1, blocker, typeof(datetime))

      | extend blocker_lastbatchstarted = extract("lastbatchstarted=\"(.*?)\"", 1, blocker, typeof(datetime))

      | order by monitorLoop asc nulls last;

      let leadblockers = blockingchain

      | join kind= rightanti ('
- id: DB-css-wiki-648
  Topic: Commonly-Used-Kusto-Queries
  Source: AzureSQLDB/Welcome/Tools/Kusto/Commonly-Used-Kusto-Queries.md
  Prompts:
  - SQL DB blocking investigation
  - SQL DB MonBlockedProcessReportFiltered AppName
  - SQL DB troubleshoot blocking investigation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBlockedProcessReportFiltered
    ExecutedQuery: 'MonBlockedProcessReportFiltered

      | where AppName == AppName and originalEventTimestamp > StartTime and logical_database_name == \"{DatabaseName}\"spid=\"(.*)\" sbid=",  blocked_process_filtered)

      | extend blocked_and_blocking_xact = extract_all(" xactid=\"(.*)\" currentdb=",  blocked_process_filtered)

      | extend waitresource = extract(" waitresource=\"(.*)\" waittime=",  1, blocked_process_filtered)

      | summarize cnt(), min(originalEventTimestamp), arg_max(originalEventTimestamp, waitresource)

      by blocked_and_blocking_spid = tostring(blocked_and_blocking_spid), blocked_and_blocking_xact = tostring(blocked_and_blocking_xact)'
- id: DB-css-wiki-649
  Topic: Connectivity-%2D-Basic-queries
  Source: AzureSQLDB/Welcome/Tools/Kusto/Connectivity-%2D-Basic-queries.md
  Prompts:
  - SQL DB login failures error 0
  - SQL DB MonLogin event logical_server_name database_name
  - SQL DB troubleshoot login failures error 0
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where TIMESTAMP >= datetime({StartTime}) and TIMESTAMP <= datetime({EndTime})

      | where (logical_server_name =~ "{ServerName}" and database_name =~ "{DatabaseName}") or instance_name contains "{AppName}"

      | where event == "process_login_finish" and package == "sqlserver"

      | extend is_good = iff(error == 0, 1, 0)

      | extend is_bad  = iff(error <> 0, 1, 0)

      | summarize sum(is_bad), sum(is_good) by originalEventTimestamp bin=time(1m)

      | extend pct = (sum_is_good / ((sum_is_bad + sum_is_good) * 1.0)) * 100

      | project originalEventTimestamp, pct

      | render timechart'
