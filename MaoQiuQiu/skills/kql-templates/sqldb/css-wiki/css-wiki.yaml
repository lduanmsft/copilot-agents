- id: DB-css-wiki-367
  Topic: Objectstore-Lock-Manager
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Objectstore-Lock-Manager.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth AppName NodeName TIMESTAMP
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where  TIMESTAMP >= startTime

      | where  TIMESTAMP <= endTime

      //| where  TIMESTAMP >= timeRange

      //| where error_id > 0

      | where message !contains "backup"

      | where message !contains("HaDr")

      | where message !contains("FSTR")

      | where message !contains("Zeroing")

      | where message !contains("Skipped as DB is not encrypted with AKV key")

      | where message !contains("All access check passed")

      | where message !contains("Starting CheckDbAKVAccess")

      | where message !contains("Backup(")

      | where message !contains("[INFO] [CKPT] HkHostDbCtxt::RegisterHkTruncationLsnChange()")

      | where message !contains("[User-provided format string filtered]")

      | where message !contains("Waiting for report fault signal")

      | where message !contains("[Filtered Args] Log was backed up")

      | where message !contains("UpdateHadronTruncationLsn")

      | where message !contains("Skipped as DEK does not exist")

      | where message !contains("Skipped as DB is not encrypted")

      | where message !contains("[VersionCleaner]")

      | where message !contains("Removing xdes id")

      | where message !contains("AutoShrinkLog: Trying to shrink log file")

      | where message !contains("[INFO] HkHostFreezeCkptTrimming()")

      | where message !contains("[INFO] createBackupContextV2()")

      | where message !contains("[INFO] HkHostBackupDeleteContext()")

      | where message != "%ls"

      | project TIMESTAMP, NodeName, AppName, error_id, message

      ) on AppName

      | project error_id, message'
- id: DB-css-wiki-368
  Topic: Shrink-%2D-Monitor-database-size-in-Kusto
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Shrink-%2D-Monitor-database-size-in-Kusto.md
  Prompts:
  - SQL DB transaction log usage
  - SQL DB MonDmIoVirtualFileStats LogicalServerName
  - SQL DB investigate transaction log usage
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where  TIMESTAMP >= startTime

      | where  TIMESTAMP <= endTime

      | where LogicalServerName =~ srv

      | where db_name in ("tempdb", db)

      | extend size_on_disk_mb=(size_on_disk_bytes*1.0/1024/1024)

      | extend max_space_used_percent = toint((1.0 * spaceused_mb / max_size_mb) * 100)

      | project TIMESTAMP, NodeName, AppName, LogicalServerName, db_name, database_id, file_id, type_desc, is_primary_replica, is_remote, storage_type, growth, spaceused_mb, size_on_disk_mb , max_size_mb, max_space_used_percent

      | order by TIMESTAMP asc nulls last, db_name, file_id asc nulls last'
- id: DB-css-wiki-369
  Topic: Shrink-%2D-Monitor-database-size-in-Kusto
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Shrink-%2D-Monitor-database-size-in-Kusto.md
  Prompts:
  - SQL DB analytics DB snapshot activity
  - SQL DB analytics DB snapshot logical_server_name AppName TIMESTAMP
  - SQL DB investigate ago
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'let srv = "{ServerName}";

      let db = "{DatabaseName}";

      let startTime = ago({TimeRange});

      let endTime = now();

      let timeRange = ago(7d);

      let AppNames = MonAnalyticsDBSnapshot

      | where  TIMESTAMP >= startTime

      | where  TIMESTAMP <= endTime

      // | where  TIMESTAMP >= timeRange

      | where logical_server_name =~ srv

      | where logical_database_name =~ db

      | extend AppName = sql_instance_name

      | distinct AppName;

      let PartitionStats=materialize(MonWiDmDbPartitionStats

      | where  TIMESTAMP >= startTime

      | where  TIMESTAMP <= endTime

      // | where  TIMESTAMP >= timeRange

      | where AppName in (AppNames) and logical_database_name !=''master'' and index_id in (0,1)

      | summarize used_page_count=max(used_page_count), row_count=max(row_count) by database_id, logical_database_name, object_id, index_id, partition_number, data_date=bin(TIMESTAMP, 1d));

      let FilteredResults=materialize(MonDatabaseMetadata

      | where AppName in (AppNames) and logical_db_name != ''master''

      | where (table_name==''sysclsobjs'' and class==50) or (table_name==''sysschobjs'' and [''type'']==''U '') or (table_name==''sysidxstats'' and indid in (0,1))

      | project TIMESTAMP, table_name, class, [''type''], id, name, nsid, indid);

      let schemas=FilteredResults

      | where (table_name==''sysclsobjs'' and class==50)

      | summarize by schema_id=id, schema_name=tolower(name);

      let tables=FilteredResults

      | where (table_name==''sysschobjs'' and [''type'']==''U '')

      | summarize by schema_id=nsid, object_id=id, table_name=name;

      let indexes=FilteredResults

      | where (table_name==''sysidxstats'' and indid in (0,1))

      | extend index_type_desc=iff([''type'']==0, ''HEAP'', iff([''type'']==1, ''CLUSTERED'', iff([''type'']==5, ''CCI'', tostring([''type'']))))

      | summarize by object_id=id,index_id=indid,index_type=type,index_type_desc;'
