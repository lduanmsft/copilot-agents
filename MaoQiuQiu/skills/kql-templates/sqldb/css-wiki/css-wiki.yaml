- id: DB-css-wiki-72
  Topic: Export-failing-with-GatewayTimeout
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Backup,-Restore-and-DB-Import-or-Export/Export-from-SQL-DB-to-BACPAC/Export-failing-with-GatewayTimeout.md
  Prompts:
  - SQL DB export failing with gateway timeout
  - SQL DB MonLogin error state is_success lookup_state
  - SQL DB troubleshoot export failing with gateway timeout
  CustomizedParameters:
  - DatabaseName
  - ServerName
