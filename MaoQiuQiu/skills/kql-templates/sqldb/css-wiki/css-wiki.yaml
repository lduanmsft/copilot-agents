- id: DB-css-wiki-675
  Topic: Migration-%3A-Walk-through-for-DMS-to-source-connectivity
  Source: AzureSQLDB/Welcome/Tools/Kusto/Migration-%3A-Walk-through-for-DMS-to-source-connectivity.md
  Prompts:
  - SQL DB get scenarios run on agent errors
  - SQL DB get scenarios run on agent ids WorkerId MessageId ScenarioId
  - SQL DB troubleshoot toscalar errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: GetScenariosRunOnAgent
    ExecutedQuery: 'let serviceWorkerId = toscalar(GetServiceByName("Your Service Name")

      | project WorkerId);

      let ids = GetScenariosRunOnAgent(startDate=ago(2d), workerId=serviceWorkerId)

      | where ScenarioId == "Your scenario"

      | project MessageId;

      ScenarioMessaging | where Level <= 3

      | where MessageId in (ids)

      | project-away EventMessage

      | project-rename ErrorId=ReportedErrorId

      | invoke JoinWithExceptionEvent()

      | project-rename EventMessage=ExcEventMessage

      | invoke JoinWithExceptionStackTrace()

      | project TIMESTAMP, StackTrace'
