    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where AppName =~ "{AppName}"

      | where db_name =~ "{DatabaseName}"

      | where type_desc == "ROWS"

      | where is_primary_replica == 1

      | extend SizeMB = size_on_disk_bytes / 1024 / 1024

