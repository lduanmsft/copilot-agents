- id: DB-css-wiki-177
  Topic: Error-10054-An-existing-connection-was-forcibly-closed-by-the-remote-host
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Dropped-connections/Error-10054-An-existing-connection-was-forcibly-closed-by-the-remote-host.md
  Prompts:
  - SQL DB AAD auth failures
  - SQL DB MonLogin error state is_success event TIMESTAMP
  - SQL DB troubleshoot AAD auth failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      //| where  TIMESTAMP >= timeRange

      | extend ProxyOrRedirect = iif( result =~ "e_crContinue", "Redirect", iif( result =~ "e_crContinueSameState", "Proxy" , ""))

      | extend fedauth_library_type_desc =

      case(

      fedauth_library_type == 0, "SQL Server Authentication",

      fedauth_library_type == 2, "Token Base Authentication",

      fedauth_library_type == 3 and fedauth_adal_workflow == 1, "Azure Active Directory - Password Authentication",

      fedauth_library_type == 3 and fedauth_adal_workflow == 2, "Azure Active Directory - Integrated Authentication",

      fedauth_library_type == 3 and fedauth_adal_workflow == 3, "Azure Active Directory - Universal Authentication",

      strcat(tostring(fedauth_library_type) , "-" , tostring(fedauth_adal_workflow))

      )

      | extend AADUser = iif( fedauth_adal_workflow > 0 or fedauth_library_type > 0, "AAD" , "SQL")

      | extend disconnect_from = iff(extra_info contains "Svr", "TenantRing", "Client")

      | project originalEventTimestamp, type, event, error, state, is_user_error, is_success, os_error, sni_error, sni_consumer_error,

      lookup_error_code, lookup_state, tds_flags, total_time_ms, package, NodeName, AppName, logical_server_name, database_name,

      host_name, application_name, peer_address, vnet_peer_address, control_ring_address, driver_name, remote_host, is_mars, is_mfa,

      instance_name, instance_port, is_contained_user, connection_peer_id, connection_id, vnet_link_identifier, sockdup_queue_size,

      result, ProxyOrRedirect, fedauth_library_type_desc, AADUser, message, session_elapsed_time_ms , is_normal_logout , batch_state ,

      kill_reason, extra_info, disconnect_from

      ) on connection_id'
