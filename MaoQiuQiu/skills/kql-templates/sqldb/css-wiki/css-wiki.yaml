- id: DB-css-wiki-339
  Topic: Plan_regression
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/High-CPU-Utilization/Plan_regression.md
  Prompts:
  - SQL DB QDS exec stats latency
  - SQL DB MonWiQdsExecStats AppName AppTypeName query_id
  - SQL DB troubleshoot QDS exec stats latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where AppTypeName == "Control" and AppName contains "cms"

      | where originalEventTimestamp > now(-6h)

      | extend elapsed_time_millisec1 = 1.0 * elapsed_time / 1000

      | extend interval_start_time_date1 = interval_start_time / 4294967296

      | extend interval_start_time_time1 = interval_start_time - 4294967296 * interval_start_time_date1

      | extend interval_start1 = datetime(1900-1-1) + time(1d) * interval_start_time_date1 + time(1s) * (interval_start_time_time1 / 300.0)

      |extend new_plan_id = plan_id

      |summarize avg(elapsed_time_millisec1), max( interval_start1), count()  by query_id, new_plan_id

      |extend new_plan_execution_count = count_

      | project query_id, new_plan_id , avg_elapsed_time_millisec1, max_interval_start1, new_plan_execution_count

      ) on query_id

      |where  2*avg_elapsed_time_millisec < avg_elapsed_time_millisec1  and max_interval_start <= max_interval_start1 and regressed_plan_id != new_plan_id and avg_elapsed_time_millisec1 >1000'
