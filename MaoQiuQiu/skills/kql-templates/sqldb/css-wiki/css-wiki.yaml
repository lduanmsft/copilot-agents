- id: DB-css-wiki-85
  Topic: Import-or-Export-Stuck-%2D-Sterling
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Backup,-Restore-and-DB-Import-or-Export/Import-from-BACPAC-to-create-SQL-DB/Import-or-Export-Stuck-%2D-Sterling.md
  Prompts:
  - SQL DB management latency
  - SQL DB MonManagement event ClusterName TIMESTAMP
  - SQL DB troubleshoot management latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where TIMESTAMP > ago(7d)

      | where event in ("management_workflow_create_importexport_request_start")

      | join kind=inner (MonImportExport // Determine the time the job started based on the first traces from the TR

      | summarize arg_min(originalEventTimestamp, originalEventTimestamp), arg_max(originalEventTimestamp, originalEventTimestamp) by NodeRole, request_id

      | extend request_id = toupper(request_id), ProcessingTime = (originalEventTimestamp2 - originalEventTimestamp1)

      | project request_id, NodeRole, originalEventTimestamp1, ProcessingTime

      )  on request_id

      | extend QueueDurationSeconds = (originalEventTimestamp1 - originalEventTimestamp)

      | extend RequiredHardware = NodeRole1

      | summarize avg(QueueDurationSeconds), sum(ProcessingTime), count() by bin(originalEventTimestamp1, binWindowHours * 1h), RequiredHardware, ClusterName

      | extend capacity = iif(RequiredHardware == "DB4C", binWindowHours * secondsPerHour * num4CWorkers, binWindowHours * secondsPerHour * num16CWorkers)

      | render timechart with (ytitle="Average time (Seconds)", xtitle="Time (UTC)")'
