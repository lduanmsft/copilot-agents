- id: DB-css-wiki-653
  Topic: Connectivity-%2D-Basic-queries
  Source: AzureSQLDB/Welcome/Tools/Kusto/Connectivity-%2D-Basic-queries.md
  Prompts:
  - SQL DB login errors
  - SQL DB AlrLogin MachineName count_failed_connections
  - SQL DB troubleshoot login errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrLogin
    ExecutedQuery: 'AlrLogin

      | filter TIMESTAMP >= datetime({StartTime}Z)

      | filter TIMESTAMP <= datetime({EndTime}Z)

      | filter database_name == "{DatabaseName}"

      | filter LogicalServerName == "{ServerName}"

      | filter nb_connection_accept_failure_finish <> 0

      | extend count_successful_connections = nb_connection_accept_finish,

      count_failed_connections     = nb_connection_accept_failure_finish,

      count_failed_due_to_system_errors = nb_connection_accept_failure_finish_is_system_error

      | project TIMESTAMP, MachineName, count_successful_connections, count_failed_connections, count_failed_due_to_system_errors

      | limit 1000'
