    ExecutedQuery: 'MonLogin

      | where TIMESTAMP >= ago(lookback)

      | where event == "process_login_finish"

      and (fedauth_adal_workflow > 0 or fedauth_library_type > 0)

      and is_success != 1

      and error == 18456 and (state == 133 or state == 109))

      | summarize arg_max(originalEventTimestamp, ClusterName, AppTypeName, AppName, NodeName) by ClusterName, AppTypeName, AppName, LogicalServerName

      | where AppTypeName !in ("Worker.DW","Worker.VDW.Frontend")

      | project originalEventTimestamp, ClusterName, AppTypeName, AppName, NodeName, LogicalServerName

      | extend cmd1 = strcat("Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, " | Kill-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/", AppTypeName, "/", AppName)

      | extend Region = extract("(.*)\\.(.*)\\.(worker|control).(database|sqltest-eg1).(windows.net|chinacloudapi.cn|mscds.com|usgovcloudapi.net|cloudapi.de)", 2, ClusterName, typeof(string))

