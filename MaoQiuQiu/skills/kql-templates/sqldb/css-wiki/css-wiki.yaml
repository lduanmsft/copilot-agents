- id: DB-css-wiki-689
  Topic: Performance--%2D-Locks-,-timeouts
  Source: AzureSQLDB/Welcome/Tools/Kusto/Performance--%2D-Locks-,-timeouts.md
  Prompts:
  - SQL DB deadlock analysis
  - SQL DB MonDmCloudDatabaseWaitStats database_name
  - SQL DB troubleshoot deadlock
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: 'MonDmCloudDatabaseWaitStats

      | where AppName =~ "{AppName}"

      | where LogicalServerName =~ "{ServerName}"

      | where database_name =~ "{DatabaseName}"

      | where NodeName =~ "{NodeName}"

      | where end_utc_date > datetime(8/3/2016 09:00:00 AM) and end_utc_date < datetime(8/3/2016 3:00:00 PM)

      | where wait_type notlike "PREEMPTIVE" and wait_type <> "BROKER_EVENTHANDLER" and wait_type <> "REQUEST_FOR_DEADLOCK_SEARCH" and wait_type <> "CHECKPOINT_QUEUE" and wait_type <> "LAZYWRITER_SLEEP" and wait_type <> "CLR_AUTO_EVENT" and wait_type <> "DIRTY_PAGE_POLL"

      | extend delta_wait_time_ms_History = delta_wait_time_ms * 1.0 / delta_waiting_tasks_count

      | summarize avg(delta_waiting_tasks_count), avg(delta_signal_wait_time_ms), avg(delta_wait_time_ms_History), max(max_wait_time_ms) by wait_type

      | extend avg_waiting_tasks_count = avg_delta_waiting_tasks_count

      | extend avg_signal_time_ms = avg_delta_signal_wait_time_ms

      | extend avg_wait_time_ms = avg_delta_wait_time_ms_History

      | extend max_wait_time_ms = max_max_wait_time_ms

      | project wait_type, avg_waiting_tasks_count, avg_signal_time_ms, avg_wait_time_ms, max_wait_time_ms

      | top 10 by avg_wait_time_ms desc'
- id: DB-css-wiki-690
  Topic: Performance--%2D-Locks-,-timeouts
  Source: AzureSQLDB/Welcome/Tools/Kusto/Performance--%2D-Locks-,-timeouts.md
  Prompts:
  - SQL DB performance 2 d locks timeouts
  - SQL DB MonDmCloudDatabaseWaitStats database_name
  - SQL DB troubleshoot performance 2 d locks timeouts
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: 'MonDmCloudDatabaseWaitStats

      | where LogicalServerName == "{ServerName}" and database_name == "{DatabaseName}"

      | where wait_type == "{WaitType}"

      | extend waiting_tasks = delta_waiting_tasks_count

      | extend signal_time_ms_per_wait = delta_signal_wait_time_ms / waiting_tasks

      | extend wait_time_ms_per_wait = delta_wait_time_ms / waiting_tasks

      | project TIMESTAMP, wait_time_ms_per_wait

      | render timechart'
