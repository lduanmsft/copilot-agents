- id: DB-css-wiki-705
  Topic: Performance--%2D-Locks-,-timeouts
  Source: AzureSQLDB/Welcome/Tools/Kusto/Performance--%2D-Locks-,-timeouts.md
  Prompts:
  - SQL DB performance 2 d locks timeouts
  - SQL DB MonDmIoVirtualFileStats AppName NodeName
  - SQL DB troubleshoot performance 2 d locks timeouts
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where AppName =~ "{AppName}"

      | where NodeName =~ "{NodeName}"

      | where delta_num_of_writes > 0 or delta_num_of_reads > 0

      | where end_utc_date > datetime(2/5/2017 7:29:40 PM) and end_utc_date < datetime(2/6/2017 7:29:40 PM)

      | extend IOStallMsPerIOHistory = delta_io_stall * 1.0 / (delta_num_of_reads + delta_num_of_writes)

      | extend IOStallWriteMsPerWriteHistory = delta_io_stall_write_ms * 1.0 / delta_num_of_writes

      | extend IOStallReadMsPerReadHistory = delta_io_stall_read_ms * 1.0 / delta_num_of_reads

      | extend TotalIOPsHistory = (delta_num_of_reads + delta_num_of_writes) / ((end_utc_date - start_utc_date)/time(1s))

      | extend ReadIOPsHistory = delta_num_of_reads / ((end_utc_date - start_utc_date)/time(1s))

      | extend WriteIOPsHistory = delta_num_of_writes / ((end_utc_date - start_utc_date)/time(1s))

      | summarize max(IOStallMsPerIOHistory), max(IOStallWriteMsPerWriteHistory), max(IOStallReadMsPerReadHistory), max(TotalIOPsHistory), max(ReadIOPsHistory), max(WriteIOPsHistory) by type_desc, db_name

      | extend Stat = "MAX"

      | extend IOStallMsPerIO = max_IOStallMsPerIOHistory

      | extend IOStallWriteMsPerWrite = max_IOStallWriteMsPerWriteHistory

      | extend IOStallReadMsPerRead = max_IOStallReadMsPerReadHistory

      | extend TotalIOPs = max_TotalIOPsHistory

      | extend ReadIOPs = max_ReadIOPsHistory

      | extend WriteIOPs = max_WriteIOPsHistory

      | project Stat, type_desc, db_name, IOStallMsPerIO, IOStallWriteMsPerWrite, IOStallReadMsPerRead, TotalIOPs, ReadIOPs, WriteIOPs'
- id: DB-css-wiki-706
  Topic: Performance--%2D-Locks-,-timeouts
  Source: AzureSQLDB/Welcome/Tools/Kusto/Performance--%2D-Locks-,-timeouts.md
  Prompts:
  - SQL DB performance 2 d locks timeouts
  - SQL DB MonWiQdsExecStats database_name LogicalServerName
  - SQL DB troubleshoot performance 2 d locks timeouts
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where  TIMESTAMP >= (datetime(2019-02-06 19:50:00)) and  TIMESTAMP <= now()

      | where LogicalServerName =~ {"ServerName"} and database_name =~ {"DatabaseName"}

      |where is_primary == 1

      | summarize total_execution_count=sum(execution_count) by bin(TIMESTAMP, 1m)

      | project TIMESTAMP, total_execution_count

      | sort by TIMESTAMP asc nulls last

      | render timechart'
- id: DB-css-wiki-707
  Topic: Performance--%2D-Locks-,-timeouts
  Source: AzureSQLDB/Welcome/Tools/Kusto/Performance--%2D-Locks-,-timeouts.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonDmDbResourceGovernance database_name
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbResourceGovernance
    ExecutedQuery: 'MonDmDbResourceGovernance

      | where LogicalServerName =~ "{ServerName}"

      | where database_name =~ "{DatabaseName}"

      | project TIMESTAMP, AppName, NodeName, slo_name, primary_group_max_cpu, min_cores, max_db_memory, primary_group_max_io, primary_max_log_rate, primary_group_max_workers, max_sessions, last_updated_date_utc

      | extend MaxCpuCores = (primary_group_max_cpu*min_cores)/100

      | extend MemoryInMb = (max_db_memory)/1024

      | extend MaxIOPS = primary_group_max_io

      | extend MaxLogKbps = primary_max_log_rate/1024.0

      | extend WorkersLimit = primary_group_max_workers

      | extend SessionsLimit = max_sessions

      | project last_updated_date_utc, AppName, NodeName, slo_name, MaxCpuCores, MemoryInMb, MaxIOPS, MaxLogKbps, WorkersLimit, SessionsLimit

      | summarize min(last_updated_date_utc) by AppName , NodeName, slo_name, MaxCpuCores, MemoryInMb, MaxIOPS, MaxLogKbps, WorkersLimit, SessionsLimit'
