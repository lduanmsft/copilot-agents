      //| where query_hash in ("0xB662B6B62D36C008")

      | where max_query_wait_time_ms > 1000  // reduce noise

      | project TIMESTAMP, originalEventTimestamp, exec_type, statement_type,  query_hash, query_id, query_plan_hash, plan_id, is_parameterizable, query_param_type, wait_category, total_query_wait_time_ms, avg_query_wait_time_ms, min_query_wait_time_ms, max_query_wait_time_ms

