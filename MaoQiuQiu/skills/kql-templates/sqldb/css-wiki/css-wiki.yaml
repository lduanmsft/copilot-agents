- id: DB-css-wiki-576
  Topic: AsyncActivate-causes-error-while-adding-AzureSQLDB-to-ElasticPool
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Service-Tiers-or-Scaling-Resources/Issues-scaling-a-database-or-elastic-pool/AsyncActivate-causes-error-while-adding-AzureSQLDB-to-ElasticPool.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event error_message
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where originalEventTimestamp >= ago({TimeRange}) and originalEventTimestamp <= now()

      | where operation_parameters contains \"{ServerName}\"

      | extend region_name = tostring(split(ClusterName,".")[1])

      | extend total_minutes = todouble(elapsed_time_milliseconds)/1000.0/60.0

      | extend ops = parse_xml(operation_parameters)

      | project originalEventTimestamp, region_name, event, operation_result, is_user_error, request_id, operation_type, total_minutes, error_code, error_message,

      error_classification, code_package_version, ops

      | extend ops_string = tostring(ops.InputParameters)

      | extend ops_string = replace_string(ops_string, "{\"@xsi:nil\":\"true\"}", "null")

      | extend ops_string = replace_string(ops_string, "\"@xmlns:xsd\":\"http://www.w3.org/2001/XMLSchema\",\"@xmlns:xsi\":\"http://www.w3.org/2001/XMLSchema-instance\",", "")

      | extend json_ops = todynamic(ops_string)

      | evaluate bag_unpack(json_ops)

      | project-away ops, ops_string, operation_result'
- id: DB-css-wiki-577
