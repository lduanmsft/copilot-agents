- id: DB-css-wiki-141
  Topic: Connectivity-troubleshooting-Kusto-queries
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Connectivity-troubleshooting-Kusto-queries.md
  Prompts:
  - SQL DB AAD auth failures
  - SQL DB MonLogin error state is_success event database_name
  - SQL DB troubleshoot AAD auth failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      |where database_name =~ databasename

      | where logical_server_name =~ ServerName

      |where PreciseTimeStamp > ago({TimeRange}) and PreciseTimeStamp < now()

      | where event == "process_login_finish"

      | where is_success == 0

      | extend AADUser = iif( fedauth_adal_workflow > 0 or fedauth_library_type > 0, "AAD" , "SQL")

      | extend fedauth_library_type_desc =

      case(

      fedauth_library_type == 0, "SQL Server Authentication",

      fedauth_library_type == 2, "Token Base Authentication",

      fedauth_library_type == 3 and fedauth_adal_workflow == 1, "Azure Active Password Authentication",

      fedauth_library_type == 3 and fedauth_adal_workflow == 2, "Azure Active Integrated Authentication",

      fedauth_library_type == 3 and fedauth_adal_workflow == 3, "Active Directory Universal Authentication",

      strcat(tostring(fedauth_library_type) , "-" , tostring(fedauth_adal_workflow))

      )

      | extend LoginType = iff(result == "e_crContinueSameState", "Proxy(e_crContinueSameState)", iff(result == "e_crContinue", "Redirection(e_crContinue)", iff(result == "e_crDisconnect", "Disconnection(e_crDisconnect)", result)))

      | project PreciseTimeStamp, logical_server_name, database_name, MachineName , package, event, is_success, is_user_error, error, state, LoginType , peer_address, is_vnet_address,

      application_name, driver_name, AADUser, fedauth_library_type_desc, total_time_ms, message, connection_id, lookup_state, state_desc'
