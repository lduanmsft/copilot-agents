- id: DB-css-wiki-147
  Topic: Resource-Health-events
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Resource-Health-events.md
  Prompts:
  - SQL DB login failures
  - SQL DB MonLogin error is_success lookup_state event
  - SQL DB troubleshoot login failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where TIMESTAMP >= datetime(yyyy-mm-dd hh:mmZ)

      | where TIMESTAMP <= datetime(yyyy-mm-dd hh:mmZ)

      | where logical_server_name == \"{ServerName}\"

      | where database_name == \"{DatabaseName}\"

      | where event == "process_login_finish" and is_success == false

      | where lookup_state == "1460"

      | project originalEventTimestamp,database_name,AppName,package,event,is_user_error,error,lookup_error_code,lookup_state,login_time_ms,peer_address, [''state''],connection_id'
- id: DB-css-wiki-148
  Topic: The-session-limit-for-the-database-has-been-reached-(Error-10928)
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/The-session-limit-for-the-database-has-been-reached-(Error-10928).md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth LogicalServerName AppName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where TIMESTAMP  between (ago({TimeRange}) .. datetime(2025-01-11 05:00)) //timestamp

      | where LogicalServerName  == \"{ServerName}\"

      | where error_id == 10928

      | project TIMESTAMP, LogicalServerName, error_id,  message, AppName

      | limit 10'
