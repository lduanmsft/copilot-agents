- id: DB-css-wiki-274
  Topic: Why-it-is-too-long-to-complete-the-sync
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Data-Sync,-Replication,-CDC-and-Change-Tracking/SQL-Data-Sync/Why-it-is-too-long-to-complete-the-sync.md
  Prompts:
  - SQL DB data sync latency
  - SQL DB MonDataSync TIMESTAMP id Sync group Ratio
  - SQL DB troubleshoot data sync latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDataSync
    ExecutedQuery: 'MonDataSync

      | where TIMESTAMP between (datetime({StartTime})..datetime({EndTime}))

      | where SyncGroupId =~ "{SyncGroupId}" //Sync group id

      | where ComponentAction == ''CommandAndControlService_SyncStatistics''

      | extend d = parse_xml(Detail)

      | extend DownloadChangesApplied = d.KeyPairs.DownloadChangesApplied

      | extend DownloadChangesFailed = d.KeyPairs.DownloadChangesFailed

      | extend DownloadChangesTotal = d.KeyPairs.DownloadChangesTotal

      | extend UploadChangesApplied = d.KeyPairs.UploadChangesApplied

      | extend UploadChangesFailed = d.KeyPairs.UploadChangesFailed

      | extend UploadChangesTotal = d.KeyPairs.UploadChangesTotal

      | extend SyncStartTime = todatetime(d.KeyPairs.SyncStartTime)

      | extend SyncEndTime = todatetime(d.KeyPairs.SyncEndTime)

      | extend SyncDurationInSeconds = datetime_diff("Second", SyncEndTime, SyncStartTime)

      | extend Ratio = toint(DownloadChangesTotal) / toint(SyncDurationInSeconds)

      | project TIMESTAMP, DownloadChangesTotal, SyncDurationInSeconds, Ratio'
