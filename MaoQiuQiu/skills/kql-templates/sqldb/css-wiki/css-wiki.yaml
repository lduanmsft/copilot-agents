- id: DB-css-wiki-422
  Topic: Lock-Request-Timeout-Error-1222-State-112
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Query-timeouts/Lock-Request-Timeout-Error-1222-State-112.md
  Prompts:
  - SQL DB lock request timeout error 1222 state 112
  - SQL DB MonConfigLogicalServerOverrides Property_Name
  - SQL DB troubleshoot lock request timeout error 1222 state 1
  CustomizedParameters:
