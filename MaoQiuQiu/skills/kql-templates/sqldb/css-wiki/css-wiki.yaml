  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Database-X-on-server-Y-is-not-currently-available-(Error-40613)/Error-40613,-State-22.md
