- id: DB-css-wiki-300
  Topic: GeoDR-%2D-Read-Scale%2DOut-Troubleshooting
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Geo-Replication,-failover-groups-and-DB-Copy/References/GeoDR-%2D-Read-Scale%2DOut-Troubleshooting.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin is_success event logical_server_name
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where logical_server_name =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"

      | where TIMESTAMP between (datetime({StartTime})..datetime({EndTime}))

      | where event == "process_login_finish" and package == "xdbgateway" and event == "process_login_finish"

      | extend bit21 = toint(login_flags / 2097152) % 2

      | extend appIntentReadOnly = bit21

      | summarize count() by bin(originalEventTimestamp, time(1h)), is_success, instance_port, appIntentReadOnly

      | project originalEventTimestamp, appIntentReadOnly, is_success, count_, instance_port

      | sort by originalEventTimestamp desc'
- id: DB-css-wiki-301
  Topic: GeoDR-%2D-Read-Scale%2DOut-Troubleshooting
