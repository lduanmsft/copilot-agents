  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Backup,-Restore-and-DB-Import-or-Export/Restore-a-database/Long-Geo-Restore-on-Hyperscale-VLDB.md
  Prompts:
  - SQL DB blob client latency
  - SQL DB MonBlobClient event originalEventTimestamp
  - SQL DB troubleshoot blob client latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBlobClient
    ExecutedQuery: 'MonBlobClient

      | where event == "cloud_blob_client_operation_complete"

      | where request_id in ("request_id")

      | extend p = parse_json(additional_request_details)["Parameters"]

      | extend copy_id = tostring(p["CopyId"]), copy_status=tostring(p["CopyStatus"]), source=tostring(p["Source"])

      | where api_name == "GetCloudBlobCopyInfoIfExists"

      | project originalEventTimestamp, copy_id, copy_status, source, uri

      | extend source_account=tostring(parse_url(source).Host), target_account=tostring(parse_url(uri).Host)

      | extend source_account=tostring(split(source_account, ".")[0]), target_account=tostring(split(target_account, ".")[0])

      | where isnotempty(source) and isnotempty(source_account)

      | summarize min(originalEventTimestamp), max(originalEventTimestamp) by copy_id, source, source_account, target_account

      | extend duration=datetime_diff(''minute'', max_originalEventTimestamp, min_originalEventTimestamp)

      | summarize round(avg(duration)) by source_account, target_account);

      let stamps = (MonStorageAccountContainerSnapshot | where TIMESTAMP > ago(2d) | summarize by storage_account_name, storage_stamp_name, storage_account_subscription_id);

      let statsWithStamps = (sourceTargetStats

      | join kind=leftouter (stamps | project storage_account_name, source_stamp=storage_stamp_name, source_sub=storage_account_subscription_id) on $left.source_account == $right.storage_account_name

      | join kind=leftouter (stamps | project storage_account_name, target_stamp=storage_stamp_name, target_sub=storage_account_subscription_id) on $left.target_account == $right.storage_account_name);'
