- id: DB-css-wiki-463
  Topic: Code-Package-Versions-and-Primary-Node-History
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Reference/Code-Package-Versions-and-Primary-Node-History.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonDmDbHadrReplicaStates LogicalServerName
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbHadrReplicaStates
    ExecutedQuery: 'MonDmDbHadrReplicaStates

      | where  TIMESTAMP >= startTime

      | where  TIMESTAMP <= endTime

      //| where  TIMESTAMP >= timeRange

      | where LogicalServerName =~ srv

      | where logical_database_name =~ db

      | where is_primary_replica == 1

      | where AppName notcontains "b-"

      | order by TIMESTAMP asc nulls first

      | serialize

      | extend prevNodeName=prev(NodeName)

      | extend nextNodeName = next(NodeName)

      | extend isFirst= (NodeName != prevNodeName)

      | extend isLast=(NodeName != nextNodeName)

      | where isFirst == true or isLast == true

      | extend EndTime=next(TIMESTAMP)

      | extend StartTime=TIMESTAMP

      | where isFirst ==true

      | extend PrimaryNodeName = NodeName, PrimaryNodeFirstAppearTime = StartTime, PrimaryNodeLastAppearTime = EndTime

      | project LogicalServerName, logical_database_name, PrimaryNodeName, AppName, code_package_version, PrimaryNodeFirstAppearTime, PrimaryNodeLastAppearTime, ClusterName'
