- id: DB-css-wiki-699
  Topic: Performance--%2D-Locks-,-timeouts
  Source: AzureSQLDB/Welcome/Tools/Kusto/Performance--%2D-Locks-,-timeouts.md
  Prompts:
  - SQL DB transaction log usage
  - SQL DB MonDmIoVirtualFileStats AppName spaceused_mb
  - SQL DB investigate transaction log usage
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where TIMESTAMP >= ago(48h)

      | where AppName =~ "{AppName}"

      | where db_name =~ "{DatabaseName}"

      | project size_on_disk_bytes, type_desc, db_name , spaceused_mb , TIMESTAMP, PreciseTimeStamp, start_utc_date, end_utc_date, ExtraFields, file_id

      | extend max_size_mb = extractjson("$.max_size_mb", ExtraFields, typeof(long)), sizeondisk_mb = size_on_disk_bytes*1.0/(1024*1024)

      | extend shrinkPotential_mb = sizeondisk_mb - spaceused_mb

      | summarize by spaceused_mb, sizeondisk_mb, shrinkPotential_mb, db_name, type_desc, TIMESTAMP, PreciseTimeStamp, start_utc_date, end_utc_date, max_size_mb, file_id

      | extend spaceused_gb = spaceused_mb/1024, sizeondisk_gb = sizeondisk_mb/1024, size_gb = max_size_mb/1024

      | summarize min(spaceused_gb), max(spaceused_gb), avg(spaceused_gb), max(sizeondisk_gb), avg(sizeondisk_gb), max(size_gb), min(shrinkPotential_mb) by db_name, type_desc, file_id

      | sort by db_name, type_desc, file_id'
- id: DB-css-wiki-700
  Topic: Performance--%2D-Locks-,-timeouts
