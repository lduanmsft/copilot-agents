- id: DB-css-wiki-158
  Topic: 40613-states-%2D-based-on-impact-source
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Database-X-on-server-Y-is-not-currently-available-(Error-40613)/40613-states-%2D-based-on-impact-source.md
  Prompts:
  - SQL DB SQL system health errors
  - SQL DB typically
  - SQL DB troubleshoot typically errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: "| 13 | SQL Server is  paused | Availability | Investigate the cause of the SQL Server being paused for long time. Check \"Database Replicas\" view in XTS for replica health. Also check MonSQLSystemHealth for SQL errors on the primary node. |\n| 81 | Mismatch in the IPv6 DIP prefix | Gateway | Can occur when a client tries to connect using Service Endpoints (MonLogin's peer_address column showing an IPv6 address). The issue occurs because of a mismatch in the IPv6 DIP prefix that is expected for the particular cloud/region and the actual DIP prefix using which the cluster buildout was performed. This causes the packets to be incorrectly classified during login. Requires an IcM for mitigation. |\n| 83 | Opening Logical  Master DB failed | Gateway | See [login_substep_failure](#Retrieving-login_substep_failure-details) for more details on what failed.  |\n| 84 | Connection to Logical Master failed | Gateway | See [Error 40613, State 84](/SQL-Database/Troubleshooting-Guides/Connectivity:-Troubleshoot-DB-Availability-and-Connection-Errors/Database-X-on-server-Y-is-not-currently-available-\\(Error-40613\\)/Error-40613,-State-84) for troubleshooting steps. \n \n Further options: \n 1. Check for a mismatch of the Sql.SecretName property against the CurrentSecretName property in Service Fabric Explorer. \n 2. Check for XOdbc errors. \n 3. Check if XDB host is running on the node. \n \n If this is an on-going issue, then open an IcM to get it mitigated (likely requires to restart the XDB host or the logical master node). |\n| 85 | Executing remote login command failed | Gateway | As part of various workflows, the sql user database tries to connect to the master database under the logical server using XODBC connection. For a successful login, the number of parameters sent by the user db needs to match the number of parameters expected by the stored procedure (sp_cloud_extensions_authenticate_login) that handles this login at master db. Whenever there is a mismatch in the number of parameters, the master db will report Error 40613, State 85 in MonLogin. From MonSqlSystemHealth, you will see an error message referring to sp_cloud_extensions_authenticate_login, complaining about parameters supplied as part of the XODBC call are not valid. \n\n One of the reasons this could happen is if any of the parameters are dynamically added based on a Feature Switch, and the value of Feature Switch is being toggled through a deployment. Until the time the Feature Switch is applied to both the logical user db, and the logical master db we are exposed to this error. Requires IcM for mitigation. |\n| 112 | DosGuard hit an unknown error | Gateway | Requires an IcM if it doesn't self-mitigate.  |\n| 114 | Retrieving the firewall rules failed | Gateway | Requires an IcM if it doesn't self-mitigate. |\n| 115 | Calling AuthenticateLogin failed | Gateway | Might be caused by stuck UpdateSLO on the logical master database. This is causing master to be unavailable and results in an error with this state (115). \nCheck if the master DB is in the middle of an UpdateSLO. You can [see this from CMS](/SQL-Database/Troubleshooting-Guides/Geo-Replication,-failover-groups-and-DB-Copy/Scaling-a-geo%2Dreplicated-database/UpdateSLO-stuck-in-operation%2D-Finding-States-using-CMS-Query) or in XTS from view \"geodr0004_stuckupdateslo.xts\". \nIf it's not related to an updateSLO, see [login_substep_failure](#Retrieving-login_substep_failure-details) for more details. |\n| 125 | Opening the UserDB failed | Availability | See [login_substep_failure](#Retrieving-login_substep_failure-details) for more details. Usually occurs due to a failover. |\n| 127 | Database is not attached to this node (it is not primary) | Availability | This can happen if: \n1. The database is unavailable. Check XTS view \"Database Replicas.xts\". \n2. The database is *available* but the Gateways are not sending the connection to the right node where the primary is hosted; typically occurs after a failover and mitigates itself typically within 8-15 seconds. \n\nOpen an IcM if it doesn't self-mitigate within a short period. |\n| 128 | Retrieving the database firewall rules failed | Availability | See [login_substep_failure](#Retrieving-login_substep_failure-details) (message column) for more details. Usually occurs due to a failover. |\n| 129 | FindLoginForContainedDBAuthUnexpectedFailure | Availability | Cause 1: Database is unusable. SQL Server instance is unavailable right now. Open IcM with Availability PG as it likely requires a forceful failover of the SQL instance. \n\nCause 2: The database might be undergoing recovery. Check for Long Recovery: Open XTS view Database Replicas.xts and take a look at pane Step 4: WinFab Replica State. One or more replicas will have the replica_status_desc INBUILD. Double click on the replica you want to see. Go to Hadron DMV pane. Look for the column \"database_state_desc\" and check if it is Recovering. Mitigation is to let it complete by itself. |\n| 134 | LoginSessDb_DbRecovering | Availability | Requires an IcM if it doesn't self-mitigate. |\n| 136 | UseDbFailedInRetrieveDatabaseFirewallRules | Availability | See [login_substep_failure](#Retrieving-login_substep_failure-details) for more details. |\n| 143 | Deactivating | Performance | Requires an IcM if it doesn't self-mitigate. |\n| 162 | x_elfReplicatedMasterNotReady | Availability | Seen with Managed Instance availability issues. When a user doesn't specify the database name, the logins will be targeted to database master. This state indicates logins are failing for master. First check the health of master at the backend; if master is not available, open IcM with the Availability PG to mitigate. |\n| 169 | ReplicatedMasterNotOnline | Availability | Seen with Managed Instance availability issues, possibly during failovers and reconfigurations. Check for errors related to instance health if the issue persists. |\n| 183 | SQL service processing the login does not allow IPv6 logins |  | The SQL Server Database processing the login is not configured to allow IPv6 logins. \n Risks: Even when it is configured to support IPv6 logins, the customer is expected to add IPv6 firewall rules. If there are no IPv6 firewall rules defined either at the logical master or the logical database, the incoming login will still fail (but throw Error 40615, State 82) |"
- id: DB-css-wiki-159
  Topic: Database-a-on-server-b-is-not-currently-available
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Database-X-on-server-Y-is-not-currently-available-(Error-40613)/Database-a-on-server-b-is-not-currently-available.md
