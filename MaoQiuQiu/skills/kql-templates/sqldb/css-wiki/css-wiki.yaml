- id: DB-css-wiki-395
  Topic: Query-plan-changed-on-readable-secondary
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Other-errors-and-exceptions/Query-plan-changed-on-readable-secondary.md
  Prompts:
  - SQL DB real time resource stats analysis
  - SQL DB MonDmRealTimeResourceStats database_name
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | where AppTypeName !contains ''Worker.Vldb.Storage''

      | where AppName !startswith ''b-'' and AppName !startswith ''v-''

      | where  (originalEventTimestamp between (ago({TimeRange})..datetime(2023-03-27 09:40:00)))

      | order by NodeName, originalEventTimestamp asc

      | serialize

      | extend prevNodeName = prev(NodeName)

      | extend nextNodeName = next(NodeName)

      | extend prevReplicaType = prev(replica_type)

      | extend nextReplicaType = next(replica_type)

      | extend isFirstNodeName = (NodeName != prevNodeName)

      | extend isLastNodeName = (NodeName != nextNodeName)

      | extend isFirstReplicaType = (prevReplicaType != replica_type)

      | extend isLastReplicaType =  (nextReplicaType != replica_type)

      | where isFirstNodeName == true or isLastNodeName == true or isFirstReplicaType == true or isLastReplicaType == true

      | extend start = originalEventTimestamp, end = next(originalEventTimestamp)

      | where isFirstNodeName == true or isFirstReplicaType == true

      | extend replica_node = iff((replica_type == 0), ''Primary'', ''Secondary'')

      | project NodeName, start, end, replica_type, replica_node'
- id: DB-css-wiki-396
