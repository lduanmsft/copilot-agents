  - SQL DB memory pressure analysis
  - SQL DB MonGovernorResourcePools AppName NodeName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonGovernorResourcePools
    ExecutedQuery: 'MonGovernorResourcePools

      | where max_memory_kb > 0

      | where AppName =~ "{AppName}" and NodeName =~ "{NodeName}"

      | where  TIMESTAMP >= datetime({StartTime}) and  TIMESTAMP <= datetime({EndTime})

      //| where name =="SloHkPool"

      | extend avg_used_mem_pct = tolong(used_memory_kb * 100.0 / max_memory_kb)

