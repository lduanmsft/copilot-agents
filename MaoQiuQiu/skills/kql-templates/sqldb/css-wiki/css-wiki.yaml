    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp > datetime({StartTime}) and originalEventTimestamp < datetime({EndTime})

      | where logical_server_name =~ "{LogicalServerName}" and database_name =~ "{LogicalDatabaseName}"

      | where event == "process_login_finish" and package == "sqlserver"

      | extend isSucess = iff(is_success == true, 1, 0)

      | extend notSucess = iff(is_success == false, 1, 0)

      | summarize count_success = sum(isSucess), count_failure = sum(notSucess) by bin(originalEventTimestamp, time(1h)), ClusterName, NodeName

      | project originalEventTimestamp, count_success, count_failure, NodeName, ClusterName

      | sort by originalEventTimestamp desc'
