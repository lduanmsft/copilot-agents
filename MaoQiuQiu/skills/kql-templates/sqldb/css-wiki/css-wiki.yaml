- id: DB-css-wiki-434
  Topic: QDS-Hitting-Memory-Limits-Statement-HashMap-131072
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Query-tuning/QDS-Hitting-Memory-Limits-Statement-HashMap-131072.md
  Prompts:
  - SQL DB query store analysis
  - SQL DB MonQueryStoreInfo event LogicalServerName
  - SQL DB investigate query store
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryStoreInfo
    ExecutedQuery: 'MonQueryStoreInfo

      | where originalEventTimestamp > startTime

      | where originalEventTimestamp < endTime

      | where LogicalServerName == serverName

      | where AppName == appName

      //| where logical_database_name == databaseName

      | where event == "query_store_db_diagnostics"

      | where query_store_read_only_reason != 8

      | summarize max(query_count), max(query_text_count), max(plan_count), max(current_stmt_hash_map_size_kb), max(max_stmt_hash_map_size_kb), max(db_state_actual) by bin(originalEventTimestamp, 60min), database_id

      | extend query_count_k = max_query_count/1000

      | extend query_text_count_k = max_query_text_count/1000

      | extend max_plan_count_k = max_plan_count/1000

      | extend hash_map_size_mb = max_current_stmt_hash_map_size_kb/1024

      | extend instance_hash_map_size_limit = max_max_stmt_hash_map_size_kb*3/1024

      | extend isAnyDbRw = (max_db_state_actual-1) * 1000

      //| project originalEventTimestamp, tostring(database_id), hash_map_size_mb

      | summarize sum(hash_map_size_mb), max(instance_hash_map_size_limit), max(isAnyDbRw) by originalEventTimestamp'
- id: DB-css-wiki-435
  Topic: QDS-readonly-with-readonly-Reason-131072
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Query-tuning/QDS-readonly-with-readonly-Reason-131072.md
  Prompts:
  - SQL DB memory pressure analysis
