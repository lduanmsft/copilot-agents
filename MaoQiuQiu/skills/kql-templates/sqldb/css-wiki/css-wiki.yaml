- id: DB-css-wiki-237
  Topic: Find-out-SQL-DB-name-changed
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Create-or-Drop-Resources/Databases/Find-out-SQL-DB-name-changed.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event LogicalServerName
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where TIMESTAMP>= ago(7d)

      | extend d = parse_xml(operation_parameters)

      | extend SubscriptionId = tostring(d.InputParameters.SubscriptionId)

      | extend LogicalServerName = tostring(d.InputParameters.LogicalServerName)

      | extend OldDBName = tostring(d.InputParameters.LogicalDatabaseName)

      | extend NewDBName = tostring(d.InputParameters.RequestedDatabaseName)

      | where event =~ "management_operation_success"

      | where isnotempty( NewDBName)

      | where NewDBName !~ OldDBName

