- id: DB-css-wiki-428
  Topic: '[OnePager]-Query-timeout-due-to-service-tier-upgrade-error-40549-(Long-Running-Transaction-Termination)'
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Query-timeouts/[OnePager]-Query-timeout-due-to-service-tier-upgrade-error-40549-(Long-Running-Transaction-Termination).md
  Prompts:
  - SQL DB one pager query timeout due to service tier upgrade
  - SQL DB datetime
  - SQL DB troubleshoot one pager query timeout due to service
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'let servername= \"{ServerName}\"; let databasename= \"{DatabaseName}\"; let starttime= ago({TimeRange}); let endtime= now(); MonLogin | filter LogicalServerName=~ servername or logical_server_name == servername | filter database_name=~ databasename | filter originalEventTimestamp>= starttime and originalEventTimestamp <= endtime | where error == ''40549'' | project AppName, connection_id, session_id, originalEventTimestamp, lookup_error_code, lookup_error_state, package, event, host_name, NodeName, sni_consumer_error, application_name, driver_version, peer_address, error, state, killed, kill_reason, session_elapsed_time_ms, batch_state, driver_name, database_name, os_error | order by originalEventTimestamp asc;

      Description: This query checks the logs for sessions that were killed due to error 40549, providing details about the session and the kill reason.

      let TimeCheckStart = datetime(''2023-01-05 06:12:00''); let TimeCheckEnd = datetime(''2023-02-15 06:12:00''); let servername= \"{ServerName}\"; let databasename= \"{DatabaseName}\"; SqlFailovers | where FailoverStartTime >= TimeCheckStart and FailoverEndTime <= TimeCheckEnd | where logical_server_name =~ servername | where logical_database_name =~ databasename | project FailoverStartTime, FailoverEndTime, durationSeconds = round((FailoverEndTime - FailoverStartTime) / 1s, 2), NewPrimary, OldPrimary, ReconfigurationType, CRMAction, PLBConstraintType, ApiFaultReason, IsUnexpectedSQLTermination, ExitCode, PartitionId, FabricServiceUri = fabric_service_uri | order by FailoverStartTime asc;'
- id: DB-css-wiki-429
  Topic: '[OnePager]-Slow_Query_Different_Replicas_Secondary'
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Query-timeouts/[OnePager]-Slow_Query_Different_Replicas_Secondary.md
