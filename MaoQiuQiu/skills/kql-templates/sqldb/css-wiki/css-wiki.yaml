- id: DB-css-wiki-713
  Topic: Sample-connectivity-troubleshooting-steps
  Source: AzureSQLDB/Welcome/Tools/Kusto/Sample-connectivity-troubleshooting-steps.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonGovernorWorkloadGroups AppName NodeName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonGovernorWorkloadGroups
    ExecutedQuery: 'MonGovernorWorkloadGroups

      | where TIMESTAMP > ago({TimeRange}) and TIMESTAMP <  now()

      | where ClusterName contains "tr2.centralus1-a" and NodeName == "{NodeName}"

      | where AppName == "{AppName}"

      | where name == "XOdbcGroup"

      | project end_utc_date , name , pool_id , delta_total_request_count , delta_total_cpu_active_ms , delta_total_cpu_usage_ms , delta_total_cpu_delayed_ms , delta_total_cpu_violation_delay_ms  , delta_read_bytes_total , delta_reads_issued_total , delta_reads_completed_total

      , delta_read_stall_total_ms , delta_write_bytes_total , delta_writes_issued_total , delta_writes_completed_total , delta_write_stall_total_ms , delta_is_valid

      | order by delta_total_cpu_active_ms desc'
