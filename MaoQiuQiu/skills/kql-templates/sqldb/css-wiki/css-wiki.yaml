- id: DB-css-wiki-360
  Topic: Memory-%2D-In-Memory
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Memory-%2D-In-Memory.md
  Prompts:
  - SQL DB primary replica status
