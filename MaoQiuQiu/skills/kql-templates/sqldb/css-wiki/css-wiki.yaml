- id: DB-css-wiki-715
  Topic: Service-Management-%2D-Logs
  Source: AzureSQLDB/Welcome/Tools/Kusto/Service-Management-%2D-Logs.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth LogicalServerName AppName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where TIMESTAMP >= datetime({StartTime}Z)

      | where TIMESTAMP <= datetime({EndTime}Z)

      | where LogicalServerName =~ "{ServerName}"

      | where AppName =~ "{AppName}"

      | filter event == "systemmetadata_written"

      | filter message !has "Log was backed up"

      | filter message !has "log capture is rescheduled"

      | filter message !has "accepting vlf header"

      | filter message !has "log capture becomes idle with partner"

      | project TIMESTAMP , NodeName , message'
