- id: DB-css-wiki-372
  Topic: Shrink-failed-due-to-backups
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Shrink-failed-due-to-backups.md
  Prompts:
  - SQL DB transaction log usage
  - SQL DB MonDmIoVirtualFileStats LogicalServerName
  - SQL DB investigate transaction log usage
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where originalEventTimestamp between ({StartDateTime}..{EndDateTime})

      | where LogicalServerName == ''{ServerName}''

      | where db_name contains "{DBGuid}"

      | where is_primary_replica == 1

      | where type_desc == ''ROWS'' // logs _typically_ do not need to be shrunk

      | project ClusterName, file_id, AppName , NodeName , LogicalServerName, db_name , type_desc, originalEventTimestamp, logical_database_id , spaceused_gb = round(spaceused_mb / 1024.0, 2), max_size_mb , size_on_disk_Gb = round(size_on_disk_bytes / 1024.0 / 1024 / 1024, 2)

      | summarize arg_max(originalEventTimestamp, *) by NodeName, LogicalServerName, db_name, type_desc, file_id

      | extend

      free_percentage = round(iif(spaceused_gb == 0, 0.0 , 100 - spaceused_gb / (size_on_disk_Gb / 100)),2)

      , shrinkPotentialGb = size_on_disk_Gb - spaceused_gb

      | join kind= leftouter ('
- id: DB-css-wiki-373
  Topic: Shrink-failed-due-to-backups
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Shrink-failed-due-to-backups.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot LogicalServerName
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where TIMESTAMP between ({StartDateTime}..{EndDateTime})

      | where logical_database_id contains "{DBGuid}"

      | where  LogicalServerName == ''{ServerName}''

      | project-rename db_name = logical_database_name

      | summarize arg_max(TIMESTAMP, service_level_objective, physical_database_id) by tenant_ring_name, sql_instance_name, LogicalServerName, db_name, logical_database_id

      ) on LogicalServerName, db_name, logical_database_id

      | project-away  db_name1, logical_database_id1

      | extend isWorthShrinking = (spaceused_gb * shrinkBuffer + 20 < size_on_disk_Gb)

      | order by shrinkPotentialGb desc'
