- id: DB-css-wiki-704
  Topic: Performance--%2D-Locks-,-timeouts
  Source: AzureSQLDB/Welcome/Tools/Kusto/Performance--%2D-Locks-,-timeouts.md
  Prompts:
  - SQL DB performance 2 d locks timeouts
  - SQL DB MonWiQdsExecStats database_name LogicalServerName
  - SQL DB troubleshoot performance 2 d locks timeouts
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where TIMESTAMP >= ago(1d)

      | where LogicalServerName =~ "{ServerName}"

      | where database_name =~ "{DatabaseName}"

      | summarize sum(log_bytes_used) by query_hash, statement_type, execution_count

      | where sum_log_bytes_used > 0

      | order by sum_log_bytes_used desc

