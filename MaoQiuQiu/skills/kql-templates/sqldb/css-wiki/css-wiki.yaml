      | extend new_cluster_name = strcat("Wasd-prod-", extracted_region)

      | extend Parameters = pack("serverName", logical_server_name, "endpoint", new_cluster_name)

      | extend OperationId = "Server.Recover"

      | project TIMESTAMP, OperationId, Parameters, new_cluster_name, logical_server_name, state, request_id, operation_type, event, resource_group;

      let MonManagementData ='
