- id: DB-css-wiki-382
  Topic: Tempdb-growth-issue-error-1104-and-error-1105
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Tempdb-growth-issue-error-1104-and-error-1105.md
  Prompts:
  - SQL DB tempdb growth issue error 1104 and error 1105
  - SQL DB MonWiQdsExecStats LogicalServerName AppName
  - SQL DB troubleshoot tempdb growth issue error 1104
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where TIMESTAMP > datetime(issue_start_time) and TIMESTAMP < datetime(issue_end_time)

      | where LogicalServerName =~ "{ServerName}"

      | where AppName == ''app_name''

      | where is_primary == 1 and tempdb_space_used > 0

      | summarize tempdb_gb_used_by_query = max(tempdb_space_used * 8.0 / 1024.0 / 1024.0) by query_hash, bin(originalEventTimestamp, AggInterval)

      | project originalEventTimestamp, tempdb_gb_used_by_query, query_hash

      | order by tempdb_gb_used_by_query desc

      | take 10

      The ASC troubleshooting portal also has a report to display top tempdb usage queries. Please check Performance->Tempdb->Top 5 Queries by TempDB usage.

      Continuing on the same example as in IcM 402942746, the query returned the top 10 `tempdb` consuming queries between 09:45 and 11:30 UTC on June 30th. The results show that query hash `0x19AB332ED291F5C4` is using over 500 GB of tempdb space and the reason for the dramatic increase in `tempdb` usage.'
