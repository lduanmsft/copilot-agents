- id: DB-css-wiki-324
  Topic: '[OnePager]-Identifying-Blocking-Sessions-in-SQL-Server'
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Blocking-and-deadlocks/Compile-and-Locks/[OnePager]-Identifying-Blocking-Sessions-in-SQL-Server.md
  Prompts:
  - SQL DB blocking investigation
  - SQL DB blocked process report database_name LogicalServerName AppName
  - SQL DB troubleshoot blocking investigation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBlockedProcessReportFiltered
    ExecutedQuery: 'let startTime = ago({TimeRange});

      let endTime = now();

      let serverName=\"{ServerName}\";

      let dbName=\"{DatabaseName}\";

      let blockingchain = MonBlockedProcessReportFiltered

      | where originalEventTimestamp > startTime - 3h and originalEventTimestamp < endTime

      | where AppName !startswith ''b-'' and AppName !startswith ''v-''

      | where LogicalServerName =~serverName and database_name =~dbName

      | extend monitorLoop = extract(''monitorLoop=\x22([0-9]+)\x22'',1,blocked_process_filtered, typeof(int))

      | parse blocked_process_filtered with anystr3:string '''' blockee '''' discard1

      | parse blocked_process_filtered with anystr4:string'''' blocker '''' discard2

      | extend blockee_session_id = extract(''spid=\x22([0-9]+)\x22'', 1, blockee, typeof(int))

      | extend blockee_status = extract(''status=\x22(.?)\x22'', 1, blockee, typeof(string))

      | extend blockee_transactionname = extract(''transactionname=\x22(.?)\x22'', 1, blockee, typeof(string))

      | extend blockee_clientapp = extract(''clientapp=\x22(.?)\x22'', 1, blockee, typeof(string))

      | extend blockee_trancount = extract(''trancount=\x22([0-9]+)\x22'', 1, blockee, typeof(int))

      | extend blockeeFrames=extract(@''\s(.?)\s'', 1, blockee, typeof(string))

      | extend blockee_isolationlevel = extract(''isolationlevel=\x22(.?)\x22'', 1, blockee, typeof(string))

      | extend blocker_session_id = extract(''spid=\x22([0-9]+)\x22'', 1, blocker, typeof(int))

      | extend blocker_status = extract(''status=\x22(.?)\x22'', 1, blocker, typeof(string))

      | extend blockerFrames=extract(@''\s*(.?)\s'', 1, blocker, typeof(string))

      | extend blocker_queryhhash = extract(''queryhash=\x22(.?)\x22'', 1, blocker, typeof(string))

      | extend blocker_isolationlevel = extract(''isolationlevel=\x22(.?)\x22'', 1, blocker, typeof(string))

      | order by monitorLoop asc nulls last;'
- id: DB-css-wiki-325
  Topic: '[OnePager]-Wait-type-LCK_M_RS_U'
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Blocking-and-deadlocks/Compile-and-Locks/[OnePager]-Wait-type-LCK_M_RS_U.md
  Prompts:
