    ExecutedQuery: 'MonLogin

      //| where TIMESTAMP >= ago({TimeRange})

      //| where TIMESTAMP <= now()

      | where TIMESTAMP >=ago (1h)

      | filter logical_server_name == servername

      | filter database_name == databasename

