- id: DB-css-wiki-146
  Topic: Login-failed-(Error-18456)
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Login-failed-(Error-18456).md
  Prompts:
  - SQL DB AAD auth failures
  - SQL DB do
  - SQL DB troubleshoot AAD auth failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: "| 1   |  |  | To make it harder for hackers to perform a guessing attack to login in, SQL DB always returns State = 1 in the error message sent to the client application\\. The SQL Server errorlog contains the original state for the error, but customers can't access the errorlog so they may have to call us for assistance\\. We can get the State/SubState from MonLogin\\.   | (x\\_elf) Default   |\n| 2   |  | User ID is not valid\\.   | The login (whether using SQL or Windows Authentication) does not exist\\. For Windows Auth, it likely means that the login hasn't explicitly been given access to SQL Server – which may mean it is not a member of an appropriate domain group\\. It could also mean that you've created a server\\-level login, mapped a database user with a different name to that login, and are trying to connect using the user name, not the login name\\. This is the same as State 5, but State 2 indicates that the login attempt came from a remote machine\\.   | (x\\_elf) SecGetLogin1   |\n| 3   |  |  |  | (x\\_elf) SecUnprotectMem1 |\n| 4   |  |  |  | (x\\_elf) SecUnprotectMem2 |\n| 5   | [Error 18456, State 5](https://supportability.visualstudio.com/AzureSQLDB/_wiki/wikis/AzureSQLDB.wiki/363112/Error-18456-State-5-Login-failed-for-user-'-token-identified-principal-')  | User ID is not valid\\.   | Like state 2, the login does not exist in SQL Server, but the login attempt came from the local machine\\. For both state 2 and 5, prior to SQL Server 2008, the reason was not included in the error log – just the login failed message\\. And starting in Denali, for both state 2 and 5, this error can happen if you specify the correct username and password for a contained database user, but the wrong (or no) database\\. Note that if you are trying to connect to a contained database using the connection dialog in SSMS, and you try to <Browse server…> for the database instead of typing the name explicitly, you will first receive a prompt \"Browsing the available databases on the server requires connecting to the server\\. This may take a few moments\\. Would you like to continue?\" If the SQL auth credentials do not also match a login at the server level, you will then receive an error message, because your contained user does not have access to master\\.sys\\.databases\\. The error message in the UI is, \"Failed to connect to server \\. (Microsoft\\.SqlServer\\.ConnectionInfo)Login failed for user ''\\. (Microsoft SQL Server, Error: 18456)\\.\" The takeaway here: always specify the database name explicitly in the options tab of the connection dialog; do not use the browse feature\\. | (x\\_elf) SecGetLogin2   |\n| 6   |  | Attempting to use an NT account name with SQL Server Authentication\\.   | This means you tried to specify SQL authentication but entered a Windows\\-style login in the form of Domain\\\\Username\\. Make sure you choose Windows Authentication (and you shouldn't have to enter your domain / username when using Win Auth unless you are using runas /netonly to launch Management Studio)\\. In SQL Server 2012 at least, you will only get state 6 if the domain\\\\username format matches an actual domain and username that SQL Server recognizes\\. If the domain is invalid or if the username isn't an actual Windows account in that domain, it will revert to state 5 (for local attempts) or state 2 (for remote attempts), since the login doesn't exist\\.   | (x\\_elf) SecLoginType   |\n| 7   |  | Login is disabled, and the password is incorrect\\.   | The login is disabled \\*and\\* the password is incorrect\\. This shows that password validation occurs first, since if the password is correct and the login is disabled, you get error 18470 (see state 1 above)\\. It's possible that your application is sending cached credentials and the password has been changed or reset in the meantime – you may try logging out and logging back in to refresh these credentials\\.   | (x\\_elf) SecLoginDisabled   |\n| 8   | [Error 18456, State 8](https://supportability\\.visualstudio\\.com/AzureSQLDB/\\_wiki/wikis/AzureSQLDB\\.wiki/395337/) | The password is incorrect\\.   | Probably the simplest of all: the password is incorrect (cASe sEnsiTiVitY catches a lot of folks here)\\. Note that it will say \"the login provided\" even if you attempted to connect as a contained database user but forgot to specify a database, specified the wrong database, or typed the password incorrectly – unless it finds a match, SQL Server doesn't have any idea you were attempting to use a contained database user\\.   | (x\\_elf) SecPasswordNotMatch   |\n| 9   |   | Password is not valid\\.   | Like state 2, I have not seen this in the wild\\. It allegedly means that the password violated a password policy check, but I tried creating a login conforming to a weak password policy, strengthened the policy, and I could still log in fine\\. And obviously you can't create a login with, or later set, a password that doesn't meet the policy\\. Let me know if you've seen it\\.   | (x\\_elf) SecBadPassword   |\n| 10   |  |  | This is a rather complicated variation on state 9; as KB \\#925744 states, this means that password checking could not be performed because the login is disabled or locked on the domain controller (note that if SQL Server does not start, it could be because the account that is locked or disabled is the SQL Server service account)\\. No reason or additional information is provided in the \"verbose\" message in the error log\\.   | (x\\_elf) SecBadResult   |\n| 11   |  |  | Login is valid, but server access failed\\. One possible cause of this error is when the Windows user has access to SQL Server as a member of the local administrators group, but Windows is not providing administrator credentials\\. To connect, start the connecting program using the Run as administrator option, and then add the Windows user to SQL Server as a specific login\\. See more at https://sqlblog\\.org/2020/07/28/troubleshooting\\-error\\-18456   | (x\\_elf) SecFCheckSrvAccess1   |\n| 12   |  |  | Login is valid login, but server access failed\\. See more at https://sqlblog\\.org/2020/07/28/troubleshooting\\-error\\-18456   | (x\\_elf) SecFCheckSrvAccess2   |\n| 13   |  |  | This state occurs when the SQL Server service has been paused\\.   | (x\\_elf) LoginSrvPaused   |\n| 14   |  |  |  | (x\\_elf) LoginType  |\n| 15   | [Error 18456, State 15](https://supportability\\.visualstudio\\.com/AzureSQLDB/\\_wiki/wikis/AzureSQLDB\\.wiki/323244/)  |   |  | LoginSwitchDb  |\n| 16   |  |  | State 16, which only occurs prior to SQL Server 2008, means that the default database was inaccessible\\. This could be because the database has been removed, renamed, or is offline (it may be set to AutoClose)\\. This state does not indicate a reason in the error log\\. In 2008 and beyond, this is reported as state 40 (see below), with a reason\\. In SQL Server 2005, this state may also be reported if the user's default database is online but the database they explicitly requested is not available for the reasons stated above (also see state 27)\\. If you get the pre\\-login handshake message, it may be because you've disabled SSL on the server\\.   | LoginSessDb  |\n| 17   |  |   |  | (x\\_elf) LoginSessLang  |\n| 18   |  | Password must be changed\\.  |  | (x\\_elf) LoginChangePwd  |\n| 19   |  |  |  | (x\\_elf) LoginUnprotectMem  |\n| 20   |  |  |  | (x\\_elf) RedoLoginTrace  |\n| 21   |   |   |   | (x\\_elf) RedoLoginPause   |\n| 22   |   |   |   | (x\\_elf) RedoLoginInitSec   |\n| 23   |   | Access to server validation failed while revalidating the login on the connection\\.   | There could be a few reasons for state 23\\. The most common one is that connections are being attempted while the service is being shut down\\. However if this error occurs and it is not surrounded in the log by messages about SQL Server shutting down, and there is no companion reason along with the message, I would look at KB 