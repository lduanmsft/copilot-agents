    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where TIMESTAMP >= ago(120min)

      | where isnotempty(logical_database_id)

      | summarize arg_max(TIMESTAMP, spaceused_mb) by LogicalServerName, database_id, AppName, type_desc, file_id

      | extend data_size_used_kb = iff (type_desc == ''ROWS'', spaceused_mb * 1024, 0)

      | summarize sum(data_size_used_kb) by LogicalServerName, database_id, AppName ) on LogicalServerName, database_id, AppName

      | join kind = leftouter( MonResourcePoolStats

      | where TIMESTAMP >= ago(60min)

      | summarize arg_max(TIMESTAMP, data_storage_percent, resource_pool_storage_limit) by LogicalServerName, AppName

      | project LogicalServerName, AppName, pool_size_used_kb = toreal(resource_pool_storage_limit) * data_storage_percent / 100, pool_size_max_kb = toreal(resource_pool_storage_limit) ) on LogicalServerName, AppName

      | project LogicalServerName, database_id, AppName, db_space_left = strcat( round(sum_data_size_max_kb/1024.0/1024.0, 1) , ''GB - '', round(sum_data_size_used_kb/1024.0/1024.0, 1), ''GB = '', round((sum_data_size_max_kb - sum_data_size_used_kb)/1024.0/1024.0, 1), ''GB''), pool_space_left = strcat( round(pool_size_used_kb/1024.0/1024.0, 1), ''GB / '', round(pool_size_max_kb/1024.0/1024.0, 1) , ''GB = ''

      ,round((pool_size_max_kb - pool_size_used_kb)/1024.0/1024.0, 1), ''GB'')'
