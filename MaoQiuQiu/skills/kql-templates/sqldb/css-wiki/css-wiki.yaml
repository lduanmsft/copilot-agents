- id: DB-css-wiki-279
  Topic: '[OnePager]-DSS017-%2D-Invalid-column-name'
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Data-Sync,-Replication,-CDC-and-Change-Tracking/SQL-Data-Sync/[OnePager]-DSS017-%2D-Invalid-column-name.md
  Prompts:
  - SQL DB data sync errors
  - SQL DB MonDataSync originalEventTimestamp Level
  - SQL DB troubleshoot data sync errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDataSync
    ExecutedQuery: 'MonDataSync

      //| where originalEventTimestamp >= ago(1d)

      | where TracingId =~ ''{TracingId}''

      | where ComponentAction has_any ("SyncController_Provision_Table_Item_Begin", "SyncController_Provision_Table_Item_End", "DbProvider_SqlSyncScopeProvisioning_Error")

      or ComponentAction == ''SyncController_Provision_Table_Item_End''

      or ComponentAction == ''DbProvider_SqlSyncScopeProvisioning_Error''

      | order by originalEventTimestamp asc

      | serialize

      | extend IsBeforeError = iif(next(ComponentAction) == ''DbProvider_SqlSyncScopeProvisioning_Error'',1,0)

      | where ComponentAction == ''DbProvider_SqlSyncScopeProvisioning_Error'' or IsBeforeError == 1

      | parse Detail with * ''<tableName>'' TableName ''</tableName><itemName>'' ItemName ''</itemName>'' *

      | project originalEventTimestamp, TracingId, ComponentAction, Level, TableName, ItemName, Detail'
