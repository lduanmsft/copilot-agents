- id: DB-css-wiki-579
  Topic: '[OnePager]-Scaling-failure-due-to-incorrect-max-size-configured'
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Service-Tiers-or-Scaling-Resources/Issues-scaling-a-database-or-elastic-pool/[OnePager]-Scaling-failure-due-to-incorrect-max-size-configured.md
  Prompts:
  - SQL DB one pager scaling failure due to incorrect max size
  - SQL DB MonManagement error state event action exception
  - SQL DB troubleshoot one pager scaling failure due to incorr
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement//| where subscription_id == ''''

      | where request_id == ''request_id''

      //| where action == ''EventCancel''

      | project TIMESTAMP, event, fsm_event, caller_state_machine_type, caller_keys, action, state_machine_type, old_state, new_state, state, message, exception, error, operation_parameters

      The error message is quite straight forward that the size configured is incorrect based on current database edition. If a logical resource pool was in VCore model earlier, databases added to it inherited maxsize options from VCore pricing model which provides granularity of 1GB. When this pool was migrated to DTU model, update workflow will not change maxsize configurations for any existing databases, but it will start enforcing limits on any new databases being created or moved into the pool.'
