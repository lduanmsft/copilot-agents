- id: DB-css-wiki-427
  Topic: Query-timeout-due-to-service-tier-upgrade-error-40549
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Query-timeouts/Query-timeout-due-to-service-tier-upgrade-error-40549.md
