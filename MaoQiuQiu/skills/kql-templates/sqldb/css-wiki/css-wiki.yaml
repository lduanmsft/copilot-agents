      | where AppName =~ "<>" and TIMESTAMP between (datetime()..datetime()) and NodeName =~ ""

      | where LogicalServerName =~ '''' and database_name =~ ''''

      | summarize StartTime=min(TIMESTAMP), EndTime=max(TIMESTAMP) by AppName, slo_name

