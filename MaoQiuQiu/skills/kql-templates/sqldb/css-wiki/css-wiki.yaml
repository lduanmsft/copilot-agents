- id: DB-css-wiki-397
  Topic: Query-plan-changed-on-readable-secondary
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Other-errors-and-exceptions/Query-plan-changed-on-readable-secondary.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonWiQdsExecStats database_name LogicalServerName
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWiQdsExecStats
    ExecutedQuery: 'MonWiQdsExecStats

      | where TIMESTAMP > ago({TimeRange})  and TIMESTAMP < now()

      | where LogicalServerName =~ "{ServerName}" and database_name =~ "{DatabaseName}"

      | where NodeName =~ "{NodeName}" //Specify the secondary replica here

      | where query_hash  == "0xCB1910F5855166DE"

      | extend interval_start_time_date = interval_start_time / 4294967296

      | extend interval_start_time_time = interval_start_time - 4294967296 * interval_start_time_date

      | extend interval_start = datetime(1900-1-1) + time(1d) * interval_start_time_date + time(1s) * (interval_start_time_time / 300.0)

      | extend interval_start_time_date = interval_start_time / 4294967296

      | extend interval_start_time_time = interval_start_time - 4294967296 * interval_start_time_date

      | extend interval_start = datetime(1900-1-1) + time(1d) * interval_start_time_date + time(1s) * (interval_start_time_time / 300.0)

      | extend interval_end_time_date = interval_end_time / 4294967296

      | extend interval_end_time_time = interval_end_time - 4294967296 * interval_end_time_date

      | extend interval_end = datetime(1900-1-1) + time(1d) * interval_end_time_date + time(1s) * (interval_end_time_time / 300.0)

      | extend Average_cpu_time_us = cpu_time / execution_count,

      Average_logical_reads = logical_reads / execution_count,

      Average_logical_writes = logical_writes / execution_count,

      Average_physical_reads = physical_reads / execution_count,

      Average_elapsed_time_s = elapsed_time / execution_count/1000.0/1000.0,

      elapsed_time_s = elapsed_time/1000.0/1000.0,

      Average_log_bytes_used = log_bytes_used / execution_count,

      Average_rowcount = rowcount / execution_count

      |project interval_start,interval_end,originalEventTimestamp,query_id,plan_id,exec_type,execution_count,Average_cpu_time_us,max_cpu_time,cpu_time,Average_logical_reads,max_logical_reads,logical_reads,Average_elapsed_time_s,elapsed_time_s,

      query_hash,query_plan_hash,Average_rowcount,max_rowcount,rowcount,statement_type,NodeName,AppName,dop,max_dop, Average_physical_reads'
