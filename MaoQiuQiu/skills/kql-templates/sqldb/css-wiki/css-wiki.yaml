- id: DB-css-wiki-563
  Topic: Investigating-TDE-errors-for-an-Azure-SQL-DB
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Security,-Privacy-and-Compliance/TDE,-CMK-(Customer-Managed-Key)-and-Azure-Key-Vault-(AKV)/Investigating-TDE-errors-for-an-Azure-SQL-DB.md
  Prompts:
  - SQL DB TLS encryption checks
  - SQL DB MonManagementOperations event originalEventTimestamp
  - SQL DB investigate TLS encryption
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where originalEventTimestamp between(startTime .. endTime)

      | where event == ''management_operation_start''

      | where operation_parameters has serverName

      | extend InputParams = tostring(parse_xml(operation_parameters).InputParameters)

      | extend InputParams = iif(isempty(InputParams), operation_parameters, InputParams)

      | extend LogicalDatabaseName = parse_xml(operation_parameters).InputParameters.LogicalDatabaseName

      | extend DatabaseName = parse_xml(operation_parameters).InputParameters.DatabaseName

      | extend ManagedDatabaseName = parse_xml(operation_parameters).InputParameters.ManagedDatabaseName

      | extend HubLogicalDatabaseName = parse_xml(operation_parameters).InputParameters.HubLogicalDatabaseName

      | extend HubDatabaseName = parse_xml(operation_parameters).InputParameters.HubDatabaseName

      | extend TargetDatabase = parse_xml(operation_parameters).InputParameters.TargetDatabase

      | extend TargetLogicalDatabaseName = parse_xml(operation_parameters).InputParameters.TargetLogicalDatabaseName

      | extend TargetManagedDatabaseName = parse_xml(operation_parameters).InputParameters.TargetManagedDatabaseName

      | extend SourceDatabase = parse_xml(operation_parameters).InputParameters.SourceDatabase

      | extend SourceDatabaseName = parse_xml(operation_parameters).InputParameters.SourceDatabaseName

      | extend SourceManagedDatabaseName = parse_xml(operation_parameters).InputParameters.SourceManagedDatabaseName

      | extend MinimalTlsVersion = tostring(parse_xml(operation_parameters).InputParameters.MinimalTlsVersion)

      | extend Database = iif(isnotempty(database_name), database_name, '''')

      | extend Database = iif(isempty(Database) and isnotempty(logical_database_name), logical_database_name, Database)

      | extend Database = iif(isempty(Database) and isnotempty(LogicalDatabaseName), LogicalDatabaseName, Database)

      | extend Database = iif(isempty(Database) and isnotempty(DatabaseName), DatabaseName, Database)

      | extend Database = iif(isempty(Database) and isnotempty(ManagedDatabaseName), ManagedDatabaseName, Database)

      | extend Database = iif(isempty(Database) and isnotempty(HubLogicalDatabaseName), HubLogicalDatabaseName, Database)

      | extend Database = iif(isempty(Database) and isnotempty(HubDatabaseName), HubDatabaseName, Database)

      | extend Database = iif(isempty(Database) and isnotempty(TargetDatabase), TargetDatabase, Database)

      | extend Database = iif(isempty(Database) and isnotempty(TargetLogicalDatabaseName), TargetLogicalDatabaseName, Database)

      | extend Database = iif(isempty(Database) and isnotempty(TargetManagedDatabaseName), TargetManagedDatabaseName, Database)

      | extend Database = iif(isempty(Database) and isnotempty(SourceDatabase), SourceDatabase, Database)

      | extend Database = iif(isempty(Database) and isnotempty(SourceDatabaseName), SourceDatabaseName, Database)

      | extend Database = iif(isempty(Database) and isnotempty(SourceManagedDatabaseName), SourceManagedDatabaseName, Database)

      | where operation_type != ''ExecuteDatabaseVulnerabilityAssessmentScan''

      | where operation_type != ''SendEmailNotificationsV2''

      | where operation_type != ''GetPurviewScanRunInfo''

      | parse operation_parameters with * ''<SubmitResourceHydration>'' NotViaARM:bool ''</SubmitResourceHydration>'' *

      | extend NotRequestedViaARM = iif(isempty(NotViaARM),'''', iif(NotViaARM == 1, ''True'', ''False''))

      | project originalEventTimestamp, request_id, operation_type, operation_parameters, Database,InputParams, NotRequestedViaARM, MinimalTlsVersion

      | join kind = leftouter

      ('
- id: DB-css-wiki-564
  Topic: Investigating-TDE-errors-for-an-Azure-SQL-DB
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Security,-Privacy-and-Compliance/TDE,-CMK-(Customer-Managed-Key)-and-Azure-Key-Vault-(AKV)/Investigating-TDE-errors-for-an-Azure-SQL-DB.md
  Prompts:
  - SQL DB TLS encryption checks
  - SQL DB MonManagementOperations event error_message
  - SQL DB investigate TLS encryption
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where originalEventTimestamp >= startTime

      and originalEventTimestamp <= endTime //comment out to check for operations completing after EndTime

      | where event != ''management_operation_start''

      | where operation_parameters has serverName

      | project originalEventTimestamp, request_id, event,error_code, error_message, operation_result

      ) on request_id

      | extend Result=replace_regex(event, ''management_operation_(.*)'', @''\1'')

      | extend OutputParams = tostring(parse_xml(operation_result).OutputParameters)

      | extend OutputParams = iif(isempty(OutputParams), operation_result, OutputParams)

      | summarize EndTime= min(originalEventTimestamp1), Result = tostring(make_set(Result)) by StartTime = originalEventTimestamp, Database, request_id

      , operation_type, error_code, error_message, InputParams, OutputParams, NotRequestedViaARM, MinimalTlsVersion

      , bin(originalEventTimestamp1,5s) //this is to combine timeout and cancel in the same row

      | project StartTime, EndTime, Database, request_id, Result, operation_type, error_code, error_message, InputParams, OutputParams, NotRequestedViaARM, MinimalTlsVersion

      | project-away InputParams, OutputParams // comment out to see InputParams, OutputParams

      | project-away MinimalTlsVersion // comment out to see if MinimalTlsVersion was set, and to what

      | order by StartTime asc'
