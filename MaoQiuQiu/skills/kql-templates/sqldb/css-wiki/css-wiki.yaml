      by AppName, database_name, bin(TIMESTAMP, p_user_sample_window)

      | extend high_cpu = cpu > p_high_single_consumption,high_io = io > p_high_single_consumption,high_log_writes = log_writes > p_high_single_consumption,

      high_sessions = sessions > p_high_single_consumption, high_workers = workers > p_high_workers and(cpu > p_high_workers_correlated_consumption or io > p_high_workers_correlated_consumption),

      high_multiD = cpu + io + log_writes > p_high_multi_dimensions

      | summarize cnt = count(),high_cpu = countif(high_cpu),high_io = countif(high_io),high_logs = countif(high_log_writes),high_sessions = countif(high_sessions),

      high_workers = countif(high_workers), high_multiD = countif(high_multiD) by AppName, bin(TIMESTAMP, p_high_consecutive_time_window)

      | extend consecutive_high_cpu = high_cpu >= cnt,consecutive_high_io = high_io >= cnt,consecutive_high_logs = high_logs >= cnt,consecutive_high_sessions = high_sessions >= cnt,

      consecutive_high_workers = high_workers >= cnt, consecutive_high_multiD = high_multiD >= cnt

      | summarize cnt = 1.0 * sum(cnt),high_cpu = sum(high_cpu),high_io = sum(high_io),high_logs = sum(high_logs),high_sessions = sum(high_sessions),high_workers = sum(high_workers),

      high_multiD = sum(high_multiD), consecutive_high_cpu = countif(consecutive_high_cpu), consecutive_high_io = countif(consecutive_high_io),consecutive_high_logs = countif(consecutive_high_logs),

      consecutive_high_sessions = countif(consecutive_high_sessions),consecutive_high_workers = countif(consecutive_high_workers), consecutive_high_multiD = countif(consecutive_high_multiD),

      min(TIMESTAMP), max(TIMESTAMP) by AppName

      | extend CPU = high_cpu / cnt > p_high_time_ratio or consecutive_high_cpu > 0,IO = high_io / cnt > p_high_time_ratio or consecutive_high_io > 0,

      LogWrites = high_logs / cnt > p_high_time_ratio or consecutive_high_logs > 0,Sessions = high_sessions / cnt > p_high_time_ratio or consecutive_high_sessions > 0,

      Workers = high_workers / cnt > p_high_time_ratio or consecutive_high_workers > 0,MultiDimensions = high_multiD / cnt > p_high_time_ratio or consecutive_high_multiD > 0

      | where CPU or IO or LogWrites or Sessions or Workers or MultiDimensions

      | project AppName, tolong(CPU), tolong(IO), tolong(LogWrites), tolong(Sessions), tolong(Workers), tolong(MultiDimensions), StartTime1 = min_TIMESTAMP, EndTime1 = max_TIMESTAMP'
