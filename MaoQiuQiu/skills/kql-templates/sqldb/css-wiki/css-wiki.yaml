- id: DB-css-wiki-720
  Topic: Service-Management-%2D-Logs
  Source: AzureSQLDB/Welcome/Tools/Kusto/Service-Management-%2D-Logs.md
  Prompts:
  - SQL DB op logs status
  - SQL DB MonOpLogs originalEventTimestamp Status
  - SQL DB investigate op logs
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonOpLogs
    ExecutedQuery: 'MonOpLogs

      | where ResourceID contains "{ServerName}"

      | where ResourceID contains "{DatabaseName}"

      | extend StartTime= originalEventTimestamp

      | project originalEventTimestamp, StartTime, Status, Description, CorrelationId, CallerCredentialType, SubscriptionID, ResourceID

      | join ('
- id: DB-css-wiki-721
  Topic: Service-Management-%2D-Logs
  Source: AzureSQLDB/Welcome/Tools/Kusto/Service-Management-%2D-Logs.md
  Prompts:
  - SQL DB op logs status
  - SQL DB MonOpLogs Status EndTime FinalStatus CorrelationId
  - SQL DB investigate op logs
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonOpLogs
    ExecutedQuery: 'MonOpLogs

      | where Status <> "Started"

      | extend EndTime= originalEventTimestamp, FinalStatus= Status

      | project EndTime, FinalStatus, CorrelationId

      )'
- id: DB-css-wiki-722
  Topic: Service-Management-%2D-Logs
  Source: AzureSQLDB/Welcome/Tools/Kusto/Service-Management-%2D-Logs.md
  Prompts:
  - SQL DB management errors
  - SQL DB MonManagement event error_message action
  - SQL DB troubleshoot management errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where request_id == "{RequestId}"

      | project originalEventTimestamp, transaction_id, event, state_machine_type, server_state , old_state, new_state, action, fsm_event, exception_type, message, error_message'
- id: DB-css-wiki-723
  Topic: Service-Management-%2D-Logs
  Source: AzureSQLDB/Welcome/Tools/Kusto/Service-Management-%2D-Logs.md
  Prompts:
  - SQL DB real time resource stats analysis
  - SQL DB MonDmRealTimeResourceStats database_name
  - SQL DB investigate real time resource stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmRealTimeResourceStats
    ExecutedQuery: 'MonDmRealTimeResourceStats

      | where TIMESTAMP >= datetime({StartTime}) and TIMESTAMP <= datetime({EndTime})

      | where LogicalServerName =~ "{Server}"

      | where database_name =~ "{Database}"

      | project PreciseTimeStamp , slo_name , database_name'
- id: DB-css-wiki-724
  Topic: Service-Management-%2D-Logs
  Source: AzureSQLDB/Welcome/Tools/Kusto/Service-Management-%2D-Logs.md
  Prompts:
  - SQL DB database metadata analysis
  - SQL DB MonDatabaseMetadata LogicalServerName NodeName
  - SQL DB investigate database metadata
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'MonDatabaseMetadata

      | where table_name == "sysdbreg"

      | project TIMESTAMP, SubscriptionId, LogicalServerName, logical_db_name, logical_database_guid, cmptlevel , NodeName

      | where LogicalServerName == "{ServerName}" and logical_db_name == "{DatabaseName}" and [''id''] != 1

      | project TIMESTAMP , SubscriptionId, LogicalServerName, logical_db_name, logical_database_guid, cmptlevel, NodeName

      | order by TIMESTAMP asc'
- id: DB-css-wiki-725
  Topic: Service-Management-%2D-Logs
  Source: AzureSQLDB/Welcome/Tools/Kusto/Service-Management-%2D-Logs.md
  Prompts:
  - SQL DB management errors
  - SQL DB MonManagement event error_message action
  - SQL DB troubleshoot management errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where operation_parameters contains \"{ServerName}\"

      | project originalEventTimestamp, transaction_id, event, state_machine_type, server_state , old_state, new_state, action, fsm_event, exception_type, message, error_message, stack_trace'
- id: DB-css-wiki-727
  Topic: TSG%3A%3A[OnePager]-Performance-%2D-Basic-Queries
  Source: AzureSQLDB/Welcome/Tools/Kusto/TSG%3A%3A[OnePager]-Performance-%2D-Basic-Queries.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonResourcePoolStats LogicalServerName start_time
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonResourcePoolStats
    ExecutedQuery: 'MonResourcePoolStats

      | filter TIMESTAMP >= datetime({StartTime})

      | filter TIMESTAMP <= datetime({EndTime})

      | where LogicalServerName =~ "{ServerName}"

      | where resource_pool_name =~ "{PoolName}"

      | project start_time, avg_cpu_percent, avg_data_io_percent, avg_log_write_percent, avg_memory_usage_percent'
