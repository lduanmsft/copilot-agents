- id: DB-css-wiki-317
  Topic: Deadlocks
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Blocking-and-deadlocks/Deadlocks.md
  Prompts:
  - SQL DB deadlock analysis
  - SQL DB MonDeadlockReportsFiltered event LogicalServerName
  - SQL DB troubleshoot deadlock
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDeadlockReportsFiltered
    ExecutedQuery: 'MonDeadlockReportsFiltered

      | where TIMESTAMP > starttime

      | where TIMESTAMP < endtime

      | where LogicalServerName =~ servername

      | where event =~ ''xml_deadlock_report_filtered''

      | where xml_report_filtered contains ""

      | extend dljson = parse_xml(xml_report_filtered).deadlock

      | extend victimpid1 = iff(isempty(dljson["victim-list"]["victimProcess"]["@id"]), dljson["victim-list"]["victimProcess"][0]["@id"], dljson["victim-list"]["victimProcess"]["@id"])

      | extend victimpid2 = dljson["victim-list"]["victimProcess"][1]["@id"]

      | extend victimpid3 = dljson["victim-list"]["victimProcess"][2]["@id"]

      | extend victimpid4 = dljson["victim-list"]["victimProcess"][3]["@id"]

      | extend victimpid5 = dljson["victim-list"]["victimProcess"][4]["@id"]

      | extend victims = trim_end('',"'',replace_string(strcat(''"'', victimpid1, ''","'', victimpid2, ''","'', victimpid3, ''","'', victimpid4, ''","'', victimpid5, ''","''), '',""'', ''''))

      | extend processid1 = dljson["process-list"]["process"][0]["@id"]

      | extend processid2 = dljson["process-list"]["process"][1]["@id"]

      | extend processid3 = dljson["process-list"]["process"][2]["@id"]

      | extend processid4 = dljson["process-list"]["process"][3]["@id"]

      | extend processid5 = dljson["process-list"]["process"][4]["@id"]

      | extend database1 = dljson["process-list"]["process"][0]["@currentdbname"]

      | extend database2 = dljson["process-list"]["process"][1]["@currentdbname"]

      | extend database3 = dljson["process-list"]["process"][2]["@currentdbname"]

      | extend database4 = dljson["process-list"]["process"][3]["@currentdbname"]

      | extend database5 = dljson["process-list"]["process"][4]["@currentdbname"]

      | extend queryhash1 = dljson["process-list"]["process"][0]["executionStack"]["frame"]["@queryhash"]

      | extend queryhash2 = dljson["process-list"]["process"][1]["executionStack"]["frame"]["@queryhash"]

      | extend queryhash3 = dljson["process-list"]["process"][2]["executionStack"]["frame"]["@queryhash"]

      | extend queryhash4 = dljson["process-list"]["process"][3]["executionStack"]["frame"]["@queryhash"]

      | extend queryhash5 = dljson["process-list"]["process"][4]["executionStack"]["frame"]["@queryhash"]

      | extend waitresource1 = dljson["process-list"]["process"][0]["@waitresource"]

      | extend waitresource2 = dljson["process-list"]["process"][1]["@waitresource"]

      | extend waitresource3 = dljson["process-list"]["process"][2]["@waitresource"]

      | extend waitresource4 = dljson["process-list"]["process"][3]["@waitresource"]

      | extend waitresource5 = dljson["process-list"]["process"][4]["@waitresource"]

      | project TIMESTAMP, victims, processid1, database1, queryhash1, waitresource1, processid2, database2, queryhash2, waitresource2, processid3, database3, queryhash3, waitresource3, processid4, database4, queryhash4, waitresource4, processid5, database5, queryhash5, waitresource5, dljson

      | order by TIMESTAMP desc

      | limit 100'
