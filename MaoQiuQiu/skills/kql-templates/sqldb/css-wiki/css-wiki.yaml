      | project originalEventTimestamp, Region, ClusterName, AppTypeName, AppName, cmd1=strcat(ClusterCmd,cmd1), NodeName, LogicalServerName

      | extend Endpoint = strcat("wasd-prod-", extract("^[^.]*\\.([^.]*)\\.", 1, ClusterName))

      | extend appUri=strcat("fabric:/",AppTypeName,"/",AppName)

      | project AppName, ClusterName, NodeName, AppTypeName, Endpoint, appUri, LogicalServerName

      | join kind=leftouter('
- id: DB-css-wiki-23
  Topic: Expired-Certificates-blocking-logins-for-AAD-users
  Source: AzureSQLDB/SQL-Database/Known-Issues/Active/Expired-Certificates-blocking-logins-for-AAD-users.md
  Prompts:
  - SQL DB audit analysis
  - SQL DB MonNonPiiAudit LogicalServerName ClusterName
  - SQL DB investigate audit
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonNonPiiAudit
    ExecutedQuery: 'MonNonPiiAudit

      | where TIMESTAMP > ago(lookback)

      | where request_action contains "KillProcess"

      | where request contains "sqlservr.exe"

      | where request contains "Worker.ISO" or request contains "Worker.ISO.Premium" or request contains "Worker.Vldb.Compute"

      | where request !contains "serviceManifestName"

      | where username contains "GenevaAutomationConnector"

      | summarize arg_max(TIMESTAMP, *) by ClusterName, request

      | extend MitigatedAppUri = url_decode(extract(".*appUri=%27(.*)%27", 1, request))

      | project TIMESTAMP, ClusterName, MitigatedAppUri

      ) on $left.appUri == $right.MitigatedAppUri

      | where LogicalServerName =~ srvr_name

      | where MitigatedAppUri == '''''
- id: DB-css-wiki-24
  Topic: Increase-database-size-stuck-due-to-conflict-operations
  Source: AzureSQLDB/SQL-Database/Known-Issues/Active/Increase-database-size-stuck-due-to-conflict-operations.md
  Prompts:
