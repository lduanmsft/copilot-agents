- id: DB-css-wiki-584
  Topic: Purchasing-Models-%2D-Databases
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Service-Tiers-or-Scaling-Resources/Purchasing-models-(DTU,-vCore,-reserved-capacity,-etc)/Purchasing-Models-%2D-Databases.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonDmDbResourceGovernance database_name
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbResourceGovernance
    ExecutedQuery: 'MonDmDbResourceGovernance

      | where server_name =~ "{srvName}" and database_name =~"{dbName}"

      | project TIMESTAMP, AppName, NodeName, slo_name, primary_group_max_cpu, min_cores, max_db_memory, primary_group_max_io, primary_max_log_rate, primary_group_max_workers, max_sessions, last_updated_date_utc

      | extend MaxCpuCores = (primary_group_max_cpu*min_cores)/100

      | extend MemoryInMb = (max_db_memory)/1024

      | extend MaxIOPS = primary_group_max_io

      | extend MaxLogKbps = primary_max_log_rate/1024.0

      | extend WorkersLimit = primary_group_max_workers

      | extend SessionsLimit = max_sessions

      | project last_updated_date_utc, AppName, NodeName, slo_name, MaxCpuCores, MemoryInMb, MaxIOPS, MaxLogKbps, WorkersLimit, SessionsLimit

