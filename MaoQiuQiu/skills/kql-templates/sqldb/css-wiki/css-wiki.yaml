- id: DB-css-wiki-376
  Topic: Sudden-increase-in-data-used-space-for-the-user-database
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Performance-and-Query-Execution/Managing-space-for-databases-and-pools/Sudden-increase-in-data-used-space-for-the-user-database.md
