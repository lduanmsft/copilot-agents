- id: DB-css-wiki-214
  Topic: Persisted-Version-Store
  Source: AzureSQLDB/SQL-Database/Troubleshooting-Guides/Connectivity%3A-Troubleshoot-DB-Availability-and-Connection-Errors/Reference/Persisted-Version-Store.md
  Prompts:
  - SQL DB IO virtual file stats activity
