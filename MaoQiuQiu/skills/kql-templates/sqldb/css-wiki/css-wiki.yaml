      | project TIMESTAMP, LogicalServerName, logical_database_name, AppName, server_name, event, event_type, details, backup_type, backup_start_date, backup_end_date, backup_duration, backup_size, uncompressed_backup_size, first_lsn, last_lsn, differential_base_lsn, backup_relative_path

