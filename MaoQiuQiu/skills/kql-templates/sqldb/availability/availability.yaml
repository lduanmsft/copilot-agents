- id: DB-availability-752
  Topic: Analyze-XStore-outage-impact-on-Log-Service
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Useful-Commands/Analyze-XStore-outage-impact-on-Log-Service.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot state LogicalServerName
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where TIMESTAMP between (_startTime .. _endTime)

      | summarize arg_max(TIMESTAMP, state, physical_database_state, fabric_application_uri) by PartitionId=tolower(fabric_partition_id), logical_database_name, AppName=sql_instance_name

      ) on PartitionId, AppName

      | extend env = iff(ClusterName contains ''sqltest-eg1'', ''STAGING'', ''PROD'')

      | order by GetRegionNameFromFabricCluster(ClusterName) asc

      | project LogicalServerName, logical_database_name, ClusterName, ServiceName, PartitionId, numReadyReplicas, MinTimeStamp, Duration, state, physical_database_state, Description, count_, env, fabric_application_uri

      //

      // Each row is at fabric service level but we don''t want to create incidents for each service in unheathy apps.

      // So group by ClusterName, fabric_application_uri but keep the whole row as a JSON object so we can display it

      // in IcM''s summary as a HTML table

      //

      | evaluate narrow()

      | summarize

      env=anyif(Value, Column == ''env''),

      LogicalServerName=anyif(Value, Column == ''LogicalServerName''),

      LogicalDbName=anyif(Value, Column == ''logical_database_name''),

      ClusterName=anyif(Value, Column == ''ClusterName''),

      fabric_application_uri=anyif(Value, Column == ''fabric_application_uri''),

      ServiceSummary=make_bag(pack(Column, Value)) by Row

      | summarize summary=make_list(ServiceSummary) by env, LogicalServerName, LogicalDbName, ClusterName, fabric_application_uri'
