    ExecutedQuery: 'MonSocrates

      | where originalEventTimestamp between (start .. end)

      | where event in ("rbpex_seeding_started", "rbpex_seeding_completed")

      | project originalEventTimestamp, event, AppName, NodeName

      | order by AppName, NodeName, originalEventTimestamp asc

      | extend rbpex_seeding_started = iff(AppName == prev(AppName) and NodeName == prev(NodeName) and prev(event) == "rbpex_seeding_started", prev(originalEventTimestamp), datetime(null))

      | where rbpex_seeding_started != datetime(null)

      | extend rbpex_seeding_completed = originalEventTimestamp

      | project AppName, NodeName, rbpex_seeding_started, rbpex_seeding_completed

      ) on AppName, NodeName

      | where originalEventTimestamp between (rbpex_seeding_started .. rbpex_seeding_completed)'
