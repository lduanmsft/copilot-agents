SqlSkills:
- id: DB-availability-1
  Topic: LoginOutagesBackfill
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/LoginOutagesBackfill.md
  Prompts:
  - SQL DB dump process audit
  - SQL DB MonNonPiiAudit request_action username endtime
  - SQL DB investigate dump process
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonNonPiiAudit
    ExecutedQuery: 'MonNonPiiAudit

      | where PreciseTimeStamp between (starttime .. endtime)

      | where parameters contains "ISO.Premium"

      | where username contains "GenevaAutomationConnector"

      | where request_action == "DumpProcess"

      | extend sql_instance_name = extract(@"ISO\.Premium/([^\""]+)", 1, parameters)

      | summarize count() by sql_instance_name;

      // Join to get common sql_instance_name values'
- id: DB-availability-2
  Topic: Disable-UCS-TLS-1.3
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Disable-UCS-TLS-1.3.md
  Prompts:
  - SQL DB mirroring transport status
  - SQL DB MonDmDbMirroringConnections LogicalServerName
  - SQL DB investigate mirroring transport
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbMirroringConnections
    ExecutedQuery: 'MonDmDbMirroringConnections

      | where TIMESTAMP > ago(30m)

      | where TIMESTAMP < now()

      | where LogicalServerName =~ "{ServerName}"

      | where AppTypeName == ''Worker.Vldb.Compute''

      |distinct address, transport_stream_id, AppName, AppTypeName, NodeName, ClusterName

      | where address contains "-2]"

      | extend [''# cas''] = strcat("Reset-SqlProcessUcConnection -FabricClusterName ", ClusterName, " -ApplicationNameUri fabric:/", AppTypeName, "/", AppName, " -NodeName ", NodeName,

      " -TransportId ",transport_stream_id)

      | project address, transport_stream_id, [''# cas'']'
- id: DB-availability-3
  Topic: Edit-ClientTlsSettings.ps1
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Edit-ClientTlsSettings.ps1.md
  Prompts:
  - SQL DB encrypted UCS connections
  - SQL DB MonDmDbMirroringConnections AppName start_utc_date
  - SQL DB investigate encrypted UCS connections
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbMirroringConnections
    ExecutedQuery: 'MonDmDbMirroringConnections

      | where AppName == ''{app_name}''

      | where start_utc_date > ago(1h)

      | summarize dcount(connection_id) by encryption_algorithm

      | where encryption_algorithm == 4

      If the above query returns any rows, it means there are indeed encrypted UCS connection. Further check if the mitigation has been applied to the server by running'
