- id: DB-availability-406
  Topic: Soc106-Investigating-RBPEX-performance-issues
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc106-Investigating-RBPEX-performance-issues.md
  Prompts:
  - SQL DB rg history latency
  - SQL DB MonSqlRgHistory event AppName end start
  - SQL DB troubleshoot rg history latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where end_aggregated_sample between (start .. end)

      | where AppName == computeApp

      | where event == ''aggregated_virtual_files_io_history''

      //| where file_id == 0

      | where delta_num_of_reads > 0 or delta_num_of_writes > 0

      | extend filestr = iif((file_id == 0 or file_id ==2), "LocalSSD","FCB")

      | where filestr == "LocalSSD"

      | extend IOStallWriteMsPerWrite = round(iif(delta_num_of_writes>0,delta_io_stall_write_ms*1.0/delta_num_of_writes,0.0),1)

      | extend IOStallReadMsPerRead = round(iif(delta_num_of_reads > 0, delta_io_stall_read_ms * 1.0 / delta_num_of_reads, 0.0),2)

      | extend IOStallQueueMsPerRead = round (iif(delta_num_of_reads > 0,delta_io_stall_queued_read_ms*1.0/delta_num_of_reads,0.0),2)

      | extend IOStallQueueMsPerWrite = round (iif(delta_num_of_writes > 0,delta_io_stall_queued_write_ms*1.0/delta_num_of_writes,0.0),2)

      | extend duration = round(duration_time_ms / 1000.,1)

      | extend ReadMbps = round((delta_num_of_bytes_read )/ (duration * 1024.0*1024),1)

      | extend KbPerread = round(delta_num_of_bytes_read*1.0/delta_num_of_reads/1024.0,1)

      | extend ReadIOPs = delta_num_of_reads / (0.001 * duration_time_ms)

      | extend WriteIOPs = delta_num_of_writes / (0.001 * duration_time_ms)

      | extend TotalIOPs = ReadIOPs + WriteIOPs

      | where IOStallReadMsPerRead + IOStallWriteMsPerWrite >0 and ReadMbps>0

      | project end_utc_date = end_aggregated_sample, AppName, IOStallReadMsPerRead,IOStallQueueMsPerRead, IOStallWriteMsPerWrite, IOStallQueueMsPerWrite,

      KbPerread, ReadMbps,ReadIOPs,WriteIOPs, TotalIOPs, type_desc , filestr, database_id, file_id'
