      | project-rename LogicalServerName = name

      | join kind=leftouter ('
- id: DB-availability-5
  Topic: Edit-ClientTlsSettings.ps1
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Edit-ClientTlsSettings.ps1.md
  Prompts:
  - SQL DB TLS encryption checks
  - SQL DB MonDmDbMirroringConnections LogicalServerName
  - SQL DB investigate TLS encryption
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: MonDmDbMirroringConnections
    ExecutedQuery: 'MonDmDbMirroringConnections

      | where start_utc_date > ago(30m)

      | where encryption_algorithm == 4

      | summarize dcount(connection_id), min(login_time) by LogicalServerName, AppName, AppTypeName

      ) on LogicalServerName

      | extend [''Mitigation Has Been Apply?''] = max_start_utc_date_last_rollover_time > ago({TimeRange}) and min_login_time > max_start_utc_date_last_rollover_time

      | project LogicalServerName, AppName, AppTypeName, max_start_utc_date_last_rollover_time, min_login_time, [''Mitigation Has Been Apply?'']'
- id: DB-availability-6
  Topic: Edit-ClientTlsSettings.ps1
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Edit-ClientTlsSettings.ps1.md
  Prompts:
  - SQL DB UCS message latency
  - SQL DB MonSocrates event LogicalServerName AppName
  - SQL DB troubleshoot UCS message latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocrates
    ExecutedQuery: 'MonSocrates

      | where AppTypeName == "Worker.Vldb.Compute"

      | where TIMESTAMP > ago(1d)

      | where event == "rbio_msg_lifetime_stats"

      | where rbio_msg_type == "rbmtAsyncReadRequestV4"

      | where prev_event == "uaeRbIoSendInitiated"

      | where curr_event == "uaeUcsAppendedToBoxcar"

      | where percentile_95 > 5000000

      | where tracked_count > 10000

      | summarize DurationInSeconds = avg(percentile_95)/1000000., MsgCount = avg(tracked_count) by bin(originalEventTimestamp,15m), ClusterName, LogicalServerName, AppName

      | order by DurationInSeconds desc

      | limit 100'
