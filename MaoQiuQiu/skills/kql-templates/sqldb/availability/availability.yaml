- id: DB-availability-660
  Topic: Soc062-7-HS-Migration-stuck-at-WaitingSourceTailLogBackup
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc062-Sterling-to-Hyperscale-Migration-Failed/Soc062-7-HS-Migration-stuck-at-WaitingSourceTailLogBackup.md
  Prompts:
  - SQL DB blocking investigation
  - SQL DB MonBlockedProcessReportFiltered AppName
  - SQL DB troubleshoot blocking investigation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: MonBlockedProcessReportFiltered
    ExecutedQuery: 'MonBlockedProcessReportFiltered

      | where originalEventTimestamp between (ago({TimeRange}) .. datetime(2026-03-30 23:00:00))

      | where AppName == "{AppName}"

      | where NodeName == "{NodeName}"

      | parse blocked_process_filtered with * "<blocked-process>" * "<process" blocked_process_md ">" * "<blocking-process>" * "<process" blocking_process_md ">" *

      | extend blocked_md_xml = parse_xml(strcat("<p ", blocked_process_md, " />")),

      blocking_md_xml = parse_xml(strcat("<p ", blocking_process_md, " />"))

      | project originalEventTimestamp,

      database_id, object_id, index_id, lock_mode, resource_owner_type,

      blocked_resource = tostring(blocked_md_xml.p[''@waitresource'']),

      blocked_waittime = tolong(blocked_md_xml.p[''@waittime'']),

      blocked_xact = tostring(blocked_md_xml.p[''@transactionname'']),

      blocked_xact_start = todatetime(blocked_md_xml.p[''@lasttranstarted'']),

      blocked_lock_mode = tostring(blocked_md_xml.p[''@lockMode'']),

      blocked_spid = tolong(blocked_md_xml.p[''@spid'']),

      blocking_spid = toint(blocking_md_xml.p[''@spid'']),

      blocking_status = tostring(blocking_md_xml.p[''@status''])

      | summarize count(),

      min(originalEventTimestamp), max(originalEventTimestamp),

      max(blocked_waittime)

      by database_id, object_id, index_id, lock_mode, resource_owner_type,

      blocking_spid, blocked_spid, blocked_resource, blocked_xact, blocked_lock_mode, blocking_status

      | extend dur_m = round((max_originalEventTimestamp - min_originalEventTimestamp) / 1m, 1),

      dur_h = round((max_originalEventTimestamp - min_originalEventTimestamp) / 1h, 1)

      | order by min_originalEventTimestamp asc'
