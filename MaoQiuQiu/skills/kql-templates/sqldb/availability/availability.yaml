  Topic: Soc106-Investigating-RBPEX-performance-issues
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc106-Investigating-RBPEX-performance-issues.md
  Prompts:
