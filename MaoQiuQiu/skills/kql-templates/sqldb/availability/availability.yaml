      | join kind = inner ('
- id: DB-availability-425
  Topic: Soc110--IO-requests-taking-longer
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc110--IO-requests-taking-longer.md
  Prompts:
  - SQL DB socrates activity
  - SQL DB MonSocrates event AppName AppTypeName NodeName
  - SQL DB investigate socrates
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocrates
    ExecutedQuery: 'MonSocrates

      | where originalEventTimestamp between (start .. end)

      | where AppTypeName == "Worker.Vldb.Storage"

      | where event == "rbio_redo_log_progress"

      | summarize by bin(originalEventTimestamp, 5m), AppName, NodeName, current_bsn, start_page_id, end_page_id, foreign_file_id

      | order by originalEventTimestamp asc , AppName, NodeName

      | extend replica_current_bsn = iff( AppName == prev(AppName) and originalEventTimestamp == prev(originalEventTimestamp) and NodeName != prev(NodeName), prev(current_bsn), -1) // -1 is default = not reported

      | extend replica_current_bsn = iff( AppName == next(AppName) and originalEventTimestamp == next(originalEventTimestamp) and NodeName != next(NodeName), next(current_bsn), replica_current_bsn)

      | project Pageserver = AppName,  redo_progress_timestamp = originalEventTimestamp, PageserverNode = NodeName, current_bsn, replica_current_bsn, start_page_id, end_page_id, foreign_file_id

      ) on Pageserver, PageserverNode

      | where redo_progress_timestamp between( (pageserver_telemetry_timestamp - 2.5m) .. (pageserver_telemetry_timestamp + 2.5m)) //plus or minus 2.5m to account for telemtry windows

      | project-away Pageserver1, PageserverNode1

      | where foreign_file_id in (FileIds)

      | join kind = inner ('
