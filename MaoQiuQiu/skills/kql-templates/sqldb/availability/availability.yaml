- id: DB-availability-107
  Topic: Redo-Lag-Analysis
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Sterling-HA-Replicas/Redo-Lag-Analysis.md
  Prompts:
  - SQL DB fabric debug latency
  - SQL DB MonFabricDebug event AppName originalEventTimestamp
