- id: DB-availability-417
  Topic: Soc108-RBPEX-Uncovered-Segments
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc108-RBPEX-Uncovered-Segments.md
  Prompts:
