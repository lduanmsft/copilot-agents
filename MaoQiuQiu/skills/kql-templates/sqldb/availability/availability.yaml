- id: DB-availability-32
  Topic: CRGW0001-Login-success-rate-is-below-99%-LoginErrorsFound_40613_127
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/AutoTSG/CRGW0001-Login-success-rate-is-below-99%-LoginErrorsFound_40613_127.md
  Prompts:
  - SQL DB login failures error 0
  - SQL DB MonLogin is_success event logical_server_name
  - SQL DB troubleshoot login failures error 0
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where TIMESTAMP >= START_TIME and TIMESTAMP <= END_TIME

      | where logical_server_name =~ SERVER_NAME and database_name =~ DB_NAME

      | where event == "process_login_finish"

      | where is_success == 0

      | where is_user_error == 0

      | extend ReadOnlyIntent = (login_flags / 2097152) % 2

      | summarize

      FailureCount = count(),

      ReadOnlyIntentFailureCount = countif(ReadOnlyIntent == 1),

      MachineNames = make_set(MachineName, 10),

      Packages = make_set(package, 100),

      Events = make_set(event, 100),

      Errors = make_set(error, 100),

      States = make_set(state, 100),

      HostNames = make_set(host_name, 10),

      PeerAddresses = make_set(peer_address, 10)

      by TimeBucket = bin(TIMESTAMP, 1m)

      | order by TimeBucket desc

      | limit 500'
- id: DB-availability-33
  Topic: CRGW0001-Login-success-rate-is-below-99%-LoginErrorsFound_40613_127
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/AutoTSG/CRGW0001-Login-success-rate-is-below-99%-LoginErrorsFound_40613_127.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonDmDbHadrReplicaStates LogicalServerName
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbHadrReplicaStates
    ExecutedQuery: 'MonDmDbHadrReplicaStates

      | where TIMESTAMP >= START_TIME and TIMESTAMP <= END_TIME

      | where LogicalServerName =~ SERVER_NAME and logical_database_name =~ DB_NAME

      | sort by replica_id, NodeName, PreciseTimeStamp asc

      | extend prev_internal_state = prev(internal_state_desc, 1, "")

      | extend prev_replica = prev(replica_id), prev_node = prev(NodeName)

      | extend prev_sync_state = prev(synchronization_state_desc, 1, ""), prev_db_state = prev(database_state_desc, 1, "")

      | extend is_first_record = (replica_id != prev_replica or NodeName != prev_node)

      | extend next_replica = next(replica_id), next_node = next(NodeName)

      | extend is_last_record = (replica_id != next_replica or NodeName != next_node or isnull(next_replica))

      | extend internal_state_changed = (not(is_first_record) and internal_state_desc != prev_internal_state)

      | extend sync_state_changed = (not(is_first_record) and synchronization_state_desc != prev_sync_state)

      | extend db_state_changed = (not(is_first_record) and database_state_desc != prev_db_state)

      | extend initial_state = iff(is_first_record,

      bag_pack(

      "timestamp", PreciseTimeStamp,

      "is_primary_replica", is_primary_replica,

      "is_local", is_local,

      "internal_state_desc", internal_state_desc,

      "synchronization_state_desc", synchronization_state_desc,

      "synchronization_health_desc", synchronization_health_desc,

      "database_state_desc", database_state_desc,

      "is_suspended", is_suspended,

      "suspend_reason_desc", suspend_reason_desc,

      "is_forwarder", is_forwarder,

      "is_commit_participant", is_commit_participant

      ), dynamic(null))

      | extend final_state = iff(is_last_record,

      bag_pack(

      "timestamp", PreciseTimeStamp,

      "is_primary_replica", is_primary_replica,

      "is_local", is_local,

      "internal_state_desc", internal_state_desc,

      "synchronization_state_desc", synchronization_state_desc,

      "synchronization_health_desc", synchronization_health_desc,

      "database_state_desc", database_state_desc,

      "is_suspended", is_suspended,

      "suspend_reason_desc", suspend_reason_desc,

      "is_forwarder", is_forwarder,

      "is_commit_participant", is_commit_participant

      ), dynamic(null))

      | extend internal_state_transition = iff(internal_state_changed,

      bag_pack("from", prev_internal_state, "to", internal_state_desc, "timestamp", PreciseTimeStamp), dynamic(null))

      | extend sync_state_transition = iff(sync_state_changed,

      bag_pack("from", prev_sync_state, "to", synchronization_state_desc, "timestamp", PreciseTimeStamp), dynamic(null))

      | extend db_state_transition = iff(db_state_changed,

      bag_pack("from", prev_db_state, "to", database_state_desc, "timestamp", PreciseTimeStamp), dynamic(null))

      | where is_first_record or is_last_record or internal_state_changed or sync_state_changed or db_state_changed

      | summarize

      initial_state = take_anyif(initial_state, isnotnull(initial_state)),

      final_state = take_anyif(final_state, isnotnull(final_state)),

      internal_state_transitions = make_list_if(internal_state_transition, isnotnull(internal_state_transition)),

      sync_state_transitions = make_list_if(sync_state_transition, isnotnull(sync_state_transition)),

      db_state_transitions = make_list_if(db_state_transition, isnotnull(db_state_transition))

      by replica_id, NodeName, group_id

      | project replica_id, NodeName, group_id,

      initial_state,

      final_state,

      internal_state_desc_changes = internal_state_transitions,

      synchronization_state_desc_changes = sync_state_transitions,

      database_state_desc_changes = db_state_transitions

      | order by replica_id, NodeName'
