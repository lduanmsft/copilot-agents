- id: DB-availability-103
  Topic: Primary-Log-generation-rate-throttling
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Hyperscale/Primary-Log-generation-rate-throttling.md
