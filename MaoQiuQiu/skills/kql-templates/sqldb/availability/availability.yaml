- id: DB-availability-663
  Topic: Soc066-1-PageLSN-Mismatch-Incident
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc066-Page-Server-Snapshot%2DBased-Corruption-Detection-(SBCD)-triggered/Soc066-1-PageLSN-Mismatch-Incident.md
  Prompts:
  - SQL DB socrates foreign file validatIOn activity
  - SQL DB MonSocratesForeignFileValidation event AppName
  - SQL DB investigate socrates foreign file validatIOn
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocratesForeignFileValidation
    ExecutedQuery: 'MonSocratesForeignFileValidation

      | where originalEventTimestamp between (startTime .. endTime)

      | where AppName == appName

      | where event == ''ffv_page_lsn_mismatch''

      | extend isFirstPageLsnLarger = strcmp(first_page_lsn, second_page_lsn)

      | extend corruptFile = iff (isFirstPageLsnLarger == true, second_file_name, first_file_name)

      | extend missed_LSN = iff (isFirstPageLsnLarger == true, first_page_lsn, second_page_lsn)

      | project originalEventTimestamp, AppName, ss_name=column_ifexists(''second_name'', ""), page_id, physical_database_guid, first_file_name, isFirstPageLsnLarger, corruptFile, missed_LSN

      | summarize min(missed_LSN) by corruptFile, physical_database_guid

      | join(MonSocrates

      | where originalEventTimestamp > ago (1h)

      | where AppName == appName

      | where event == "wb_checkpoint_progress"

      | project originalEventTimestamp, NodeName, ClusterName, file_path = foreign_file_path

      ) on $left.corruptFile == $right.file_path

      | summarize arg_max(originalEventTimestamp, *) by corruptFile

      | project NodeName, ClusterName, physical_database_guid, corruptFile, min_missed_LSN

      If the NodeName in above result matches NodeName in the CAS command, follow through remaining steps of this section. Otherwise, there is change in file ownership. please jump to "Execute-Mitigation CAS is not populated on incident" section below.'
