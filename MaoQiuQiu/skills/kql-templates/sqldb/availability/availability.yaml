- id: DB-availability-307
  Topic: Soc032---Log-generation-rate-throttled-under-10-MB
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc032---Log-generation-rate-throttled-under-10-MB.md
  Prompts:
