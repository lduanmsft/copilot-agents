  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc107-%2D-Investigating-'RbpexLsnVerifier%3A%3AAnalyzeResults'-dumps-and-errors.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth LogicalServerName AppName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'cluster(clstr).database("sqlazure1").MonSQLSystemHealth

      | where AppName == appName and NodeName == nodeName and ClusterName == clusterName

      | where TIMESTAMP between (minTimestamp .. 5m)

      | where message has "Rbpex"

      | project TIMESTAMP, LogicalServerName, AppName, NodeName, process_id, message, code_package_version, ClusterName'
- id: DB-availability-414
  Topic: Soc108-RBPEX-Uncovered-Segments
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc108-RBPEX-Uncovered-Segments.md
  Prompts:
  - SQL DB IO rbpex config analysis
  - SQL DB MonDmIoRBPEXConfig AppName NodeName TIMESTAMP
  - SQL DB investigate IO rbpex config
  CustomizedParameters:
  - AppName
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoRBPEXConfig
    ExecutedQuery: 'MonDmIoRBPEXConfig

      | where TIMESTAMP > ago(3h)

      | where AppName contains \"{AppName}\" // PageServer AppName

      | where NodeName == "{NodeName}" // PageServer Replica

      | extend SizeAccountedForUncoveredSegmentsInMb  = uncovered_segment_count * 128

      | project TIMESTAMP, NodeName, RBPEXMaxSizeInMb = bpe_max_size_mb, RBPEXSizeInMb = bpe_size_on_disk_mb, UncoveredSegmentCount = uncovered_segment_count, SizeAccountedForUncoveredSegmentsInMb

      | order by TIMESTAMP asc'
- id: DB-availability-415
  Topic: Soc108-RBPEX-Uncovered-Segments
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc108-RBPEX-Uncovered-Segments.md
  Prompts:
  - SQL DB perf counters activity
  - SQL DB MonSqlPerfCounters originalEventTimestamp
  - SQL DB investigate perf counters
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlPerfCounters
    ExecutedQuery: 'MonSqlPerfCounters

      | where originalEventTimestamp > ago(3h)

      | where logical_db_id =~ "D7C50F64-EF08-4A5F-831C-ED450BEEE81A"

      | where performance_counter_type == "RBPEX_fast_FallbackReasons"

      | where instance_id2 == 7 // RBPEX_fast_FallbackReasons = NonCoveringSegment

      | summarize sum(hits) by bin(TIMESTAMP, 15m), tostring(instance_id1)

      | render timechart'
- id: DB-availability-416
