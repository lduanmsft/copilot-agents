- id: DB-availability-10
  Topic: Edit-ClientTlsSettings.ps1
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Edit-ClientTlsSettings.ps1.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonAnalyticsDBSnapshot logical_server_name
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: 'MonAnalyticsDBSnapshot

      | where start_utc_date > ago(3h)

      | summarize argmax(TIMESTAMP, logical_database_name) by logical_server_name, sql_instance_name

      | project-rename AppName = sql_instance_name

      | project-rename LogicalServerName = logical_server_name

      ) on LogicalServerName, AppName

      | extend [''# cas''] = strcat(''Reset-UcsConnection -ForceActionOnProtectedCustomers "reset ucs connection to pickup GCM cipher" -LogicalServerName '', LogicalServerName, '' -LogicalDatabaseName '', max_TIMESTAMP_logical_database_name, '' -TransportId '', transport_stream_id, '';Write-Output $(Get-Date -Format FileDateTime)'')

      | extend A = rand(100000000)

      | order by A

      | project [''# cas'']//, transport_stream_id'
- id: DB-availability-11
  Topic: Expose-Restart-or-Failover-option-in-Azure-portal
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Expose-Restart-or-Failover-option-in-Azure-portal.md
  Prompts:
  - SQL DB HTTP request analysis
  - SQL DB HttpIncomingRequests PreciseTimeStamp TIMESTAMP
  - SQL DB investigate HTTP request
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: HttpIncomingRequests
    ExecutedQuery: '// Replace 5177b77f-2486-4eed-bfbc-b86e6c766c9c with appropriate request_id from MonManagementOperations and update TIMESTAMP

      let requestId = ''5177b77f-2486-4eed-bfbc-b86e6c766c9c'';

      let ARMPRODEntityGroup = entity_group [cluster(''armprodeus.eastus.kusto.windows.net''),

      cluster(''armprodweu.westeurope.kusto.windows.net''),

      cluster(''armprodsea.southeastasia.kusto.windows.net'')]; // ARM clusters – no changes needed

      macro-expand isfuzzy=true ARMPRODEntityGroup as X

      (

      X.database(''Requests'').HttpIncomingRequests

      | where subscriptionId == tolower(''10A238D6-A139-46D0-818D-D091394072B6'')

      | where TIMESTAMP between (ago({TimeRange}) .. 1d)

      | where targetResourceProvider == ''MICROSOFT.SQL''

      | where httpMethod == ''POST''

      | where TaskName !in (''HttpIncomingRequestStart'')

      | where serviceRequestId =~ requestId

      | where targetUri contains ''failover?''

      | extend Result = extract(''HttpIncomingRequestEndWith(.*)'', 1, TaskName)

      | extend clientApplicationId = iif(clientApplicationId == ''c44b4083-3bb0-49c1-b47d-974e53cbdf3c'', ''(Azure Portal)'', clientApplicationId)

      | project PreciseTimeStamp, correlationId, Result, httpMethod, durationInMilliseconds, operationName, serviceRequestId = toupper(serviceRequestId) , clientApplicationId, userAgent

      | order by PreciseTimeStamp asc

      )

      | join kind=inner ('
- id: DB-availability-12
  Topic: Expose-Restart-or-Failover-option-in-Azure-portal
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Expose-Restart-or-Failover-option-in-Azure-portal.md
  Prompts:
  - SQL DB management operations
  - SQL DB MonManagementOperations event TIMESTAMP
  - SQL DB investigate management operations
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: MonManagementOperations
    ExecutedQuery: 'MonManagementOperations

      | where TIMESTAMP between (ago({TimeRange}) .. 1d)

      | where request_id =~ requestId

      | where event != ''management_operation_rads_signal''

      | project TIMESTAMP, request_id = toupper(request_id), event, operation_parameters

      ) on $left.serviceRequestId == $right.request_id'
- id: DB-availability-13
  Topic: Known-Service-Fabric-Issues
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Known-Service-Fabric-Issues.md
  Prompts:
  - SQL DB cluster load
  - SQL DB MonClusterLoad event ClusterName PreciseTimeStamp
  - SQL DB investigate cluster load
  CustomizedParameters:
  - DatabaseName
  - NodeName
  - ServerName
  KustoQueries:
