- id: DB-availability-614
  Topic: Soc061-2---Stale-Permanent-Lease-Detected
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc061---Investigating-Log-Leasing-Service-errors/Soc061-2---Stale-Permanent-Lease-Detected.md
  Prompts:
  - SQL DB xlog server latency
  - SQL DB MonXlogSrv event LogicalServerName AppName
  - SQL DB troubleshoot xlog server latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonXlogSrv
    ExecutedQuery: 'let MaxVlfDistanceInGb = 512;

      let startTime = <datetime(2024-02-06 08:00)> - 1h; // change date time to incident creation time.

      let XLogLogicalDbId = MonXlogSrv

      | where event == "log_lease_info"

      | where TIMESTAMP > startTime

      //| where logical_db_id != "00000000-0000-0000-0000-000000000000"

      | distinct AppName, logical_db_id, logical_db_name;

      let MaxPermanentLeaseQuery = MonXlogSrv

      | where TIMESTAMP > startTime

      | where event == "log_lease_info"

      | where lease_duration_min == long(4294967295) // infinite lease.

      | summarize MaxVlf = max(vlf_id) by AppName, logical_db_name;

      let LeasesByConsumer = MonXlogSrv

      | where TIMESTAMP > startTime

      | where event == "log_lease_info"

      | where lease_duration_min == long(4294967295) // infinite lease.

      | where consumer_id !contains "PITR_PAGESRV" // PITR leases can be 1... to 30 days behind so do not count them now.

      | extend UpperLogicalDBID = toupper(logical_db_name)

      | summarize ConsumerVlfId = max(vlf_id) by AppName, ConsumerId=consumer_id, ClusterName, LogicalServerName, UpperLogicalDBID;

      let VlfSizeInMB = MonXlogSrv

      | where TIMESTAMP > startTime

      |  where event == "storage_properties" or event == "scan_and_attach_completed"

      | extend

      FirstVLF = iif(first_vlf > 0, first_vlf, -1),

      VlfCount = iif(vlf_count > 0, vlf_count, tos_lz_vlf_count),

      VlfSizeMB = iif (vlf_size_mb > 0 , vlf_size_mb, tos_lz_vlf_size_in_mb)

      | summarize FirstVlf = max(FirstVLF), VlfCount = max(VlfCount), VlfSizeMB = max(VlfSizeMB) by AppName

      | project AppName, FirstVlf, VlfCount, VlfSizeMB, VlfSizeInGB = VlfSizeMB/1024.0;

      let GeoDrStatus = MonDmContinuousCopyStatus

      | where PreciseTimeStamp > startTime

      | extend IsGeoSecondary = iff(is_target_role == 1, "Yes", "No")

      | summarize arg_max(PreciseTimeStamp, IsGeoSecondary) by LogicalServerName, partner_server, partner_database

      | join kind = inner (MonSocrates

      | where PreciseTimeStamp > startTime

      | distinct LogicalServerName,logical_database_name, logical_database_guid

      ) on $left.LogicalServerName == $right.LogicalServerName and $left.partner_database == $right.logical_database_name

      | project LogicalServerName, logical_database_guid, logical_database_name, IsGeoSecondary, partner_server, partner_database;'
- id: DB-availability-615
  Topic: Soc061-2---Stale-Permanent-Lease-Detected
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc061---Investigating-Log-Leasing-Service-errors/Soc061-2---Stale-Permanent-Lease-Detected.md
