      | extend adr_sweep_pages_skipped_hobt_locks_not_taken_size_gb = (adr_sweep_pages_skipped_hobt_locks_not_taken * 8)/(1024*1024)

      | extend pvs_off_row_page_skipped_oldest_aborted_xdesid_size_gb = (pvs_off_row_page_skipped_oldest_aborted_xdesid * 8)/(1024*1024)

      | extend pvs_off_row_page_skipped_oldest_active_xdesid_size_gb = (pvs_off_row_page_skipped_oldest_active_xdesid * 8)/(1024*1024)

      | extend pvs_off_row_page_skipped_low_water_mark_size_gb = (pvs_off_row_page_skipped_low_water_mark * 8)/(1024*1024)

      | project TIMESTAMP, adr_sweep_pages_skipped_alloc_unit_dropped_size_gb, adr_sweep_pages_skipped_hobt_lock_not_found_size_gb, adr_sweep_pages_skipped_hobt_locks_not_taken_size_gb, pvs_off_row_page_skipped_oldest_aborted_xdesid_size_gb, pvs_off_row_page_skipped_oldest_active_xdesid_size_gb, pvs_off_row_page_skipped_low_water_mark_size_gb

