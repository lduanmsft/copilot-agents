  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Log-Service/Soc100---Log-Replica-Overview-(Start-Here)/Soc100.12-%2D-LR-Quorum-Loss-due-to-bad-remote-disk.md
