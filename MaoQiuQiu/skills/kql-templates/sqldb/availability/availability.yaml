    ExecutedQuery: 'MonSocrates

      | where TIMESTAMP > startTime

      //| where event == "storage_engine_performance_counters"

      | where logical_db_id != "00000000-0000-0000-0000-000000000000" and logical_db_id != "" and logical_db_name != ""

      | extend UpperLogicalDBID = toupper(logical_db_id)

      | summarize arg_max(originalEventTimestamp, logical_db_name) by LogicalServerName, UpperLogicalDBID

      | extend sourceDbName = logical_db_name

      ) on LogicalServerName, UpperLogicalDBID

      | project LogicalServerName, AppName, ConsumerId, ConsumerVlfId, DatabaseMaxVlfId = MaxVlf, LogLeaseDistanceInGB, ClusterName, LogicalDatabaseId = logical_db_id, UpperLogicalDBID, VlfSizeInGB, TotalConsumers, IsGeoSecondary, partner_server, partner_database, sourceDbName

      | extend Region = tostring(split(ClusterName, ".", 1)[0])

      | extend Environment = iff(ClusterName contains ".lkgtst", "TEST", iif(ClusterName contains ".sqltest", "STAGING", "PROD"))

      | extend ThresholdInGb = MaxVlfDistanceInGb

      | limit 20'
