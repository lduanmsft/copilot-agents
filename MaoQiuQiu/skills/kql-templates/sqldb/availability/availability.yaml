- id: DB-availability-500
  Topic: Soc100.6-Log-IO-taking-longer
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Log-Service/Soc100---Log-Replica-Overview-(Start-Here)/Soc100.6-Log-IO-taking-longer.md
  Prompts:
