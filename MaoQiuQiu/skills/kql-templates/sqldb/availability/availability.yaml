  - SQL DB MonSocrates event LogicalServerName AppName
  - SQL DB investigate socrates
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocrates
    ExecutedQuery: 'MonSocrates

      | where TIMESTAMP > ago(2h)

      | where event == "storage_engine_performance_counters"

      | where database_id > long(4)

      | where physical_db_id != "00000000-0000-0000-0000-000000000000"

      | project AppName, physical_db_id = tolower(physical_db_id)

      | summarize by AppName, physical_db_id

