- id: DB-availability-400
  Topic: Soc103-LR-OOM-investigation
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc103-LR-OOM-investigation.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonSqlIdleMemCollectorStats event AppName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlIdleMemCollectorStats
    ExecutedQuery: 'MonSqlIdleMemCollectorStats

      | where AppName == appName

      | where originalEventTimestamp between (incidentStartTime .. incidentEndTime)

      | where event== "sql_memory_perf_stats"

      //| where NodeName== "{NodeName}"

      | project TIMESTAMP,

      initial_job_memory_cap_mb=initial_job_memory_cap*8/1024,

      current_job_memory_cap_mb=current_job_memory_cap*8/1024,

      node_available_physical_memory_mb=node_available_physical_memory*8/1024,

      current_target_mb=current_target*8/1024,

      ideal_target_mb = ideal_target*8/1024,

      memory_usage_mb=memory_usage*8/1024,

      current_commit_mb=current_commit*8/1024,

      non_sos_usage_mb=non_sos_usage*8/1024

      // | render timechart

      current_target_mb shows the total sos memory for that app  and memory_usage_mb gives total in use memory. If memory_usage_mb > current_target_mb, i.e LR is trying to use more memory than available and is hitting OOM.'
