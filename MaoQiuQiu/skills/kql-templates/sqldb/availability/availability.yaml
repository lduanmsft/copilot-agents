- id: DB-availability-346
  Topic: Soc061---Investigating-Log-Leasing-Service-errors
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc061---Investigating-Log-Leasing-Service-errors.md
  Prompts:
  - SQL DB timeout analysis
  - SQL DB MonXlogSrv event LogicalServerName AppName
  - SQL DB troubleshoot timeout
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonXlogSrv
    ExecutedQuery: 'MonXlogSrv

      | where TIMESTAMP > ago (12h)

      | where event == ''log_leasing_result''

      // | where AppName == <AppName>

      | where hresult < 0 // interested in errors.

      | summarize ErrorCount = count() by bin(TIMESTAMP, 1h), logical_db_id, AppName, hresult, LogicalServerName, ClusterName, consumer_id

      | extend hresult_hex = strcat("0x", tohex(toint(hresult), 8))

      | where hresult != toint(''0x88010004'') // Lock Acquisition failed. Known issue on large DBs.

      | where hresult != toint(''0x80071bff'') // Fabric Timeout.

      | summarize Hours =  count(), TotalErrorCount = sum(ErrorCount) by logical_db_id, AppName, hresult, LogicalServerName, ClusterName, consumer_id, hresult_hex

      | extend  LeaseType =  iff(consumer_id startswith "PRIMARY", "PRIMARY",

      iff(consumer_id startswith "PITR_PAGESRV", "PITR_PAGESRV",

      iff(consumer_id startswith "SECONDARY_", "SECONDARY",

      iff(consumer_id startswith "PAGESRV", "PAGESRV",

      iff(consumer_id startswith "ANALYSIS", "ANALYSIS", "UNKNOWN")))))

      | summarize UniqueComsumers = count(), TotalHours=sum(Hours), TotalErrorCount = sum(TotalErrorCount), AnyConsumerID = any(consumer_id)

      by LogicalDatabaseId=logical_db_id, XLogAppName = AppName, hresult, LogicalServerName, ClusterName, LeaseType, hresult_hex

      | extend AvgHoursPerApp = TotalHours/UniqueComsumers, AvgErrorByConsumer = TotalErrorCount*1.0/UniqueComsumers

      | extend Region = tostring(split(ClusterName, ".", 1)[0])

      | extend Environment = iff(ClusterName contains ".lkgtst", "TEST", iif(ClusterName contains ".sqltest", "STAGING", "PROD"))

      | where LeaseType !in ("SECONDARY", "ANALYSIS")

      // For now focus on Permanent and PITR leases.

      | where not (hresult_hex == "0x88010002" and AvgErrorByConsumer == 1 and LeaseType in ("PAGESRV"))

      // PageServer timing out a lease request on an XLog that is newly created (PITR), then re-requesting the lease after DB Restart.

      | where not (hresult_hex == "0x88010002" and TotalErrorCount < 25 and LeaseType in ("PRIMARY"))

      // Primary Compute requests too many leases, and some of them timeout-retry and trigger the bug. Fix is ADO 1351712

      | where not (hresult_hex == "0x88010002" and AvgHoursPerApp <= 1 and LeaseType in ("PITR_PAGESRV"))

      // Remove one-off PITR_PAGESRV due to miss-read fabric property error.

      | where not (hresult_hex == "0x80071bd6" and TotalErrorCount <= 6)

      // Sporadic FABRIC_E_WRITE_CONFLICT, limiting to 6 errors per LeaseType

      | limit 25 // in case there is a massive regression, do not create hundreds of IcMs'
