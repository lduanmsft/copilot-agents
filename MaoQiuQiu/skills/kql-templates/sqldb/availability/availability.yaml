- id: DB-availability-102
  Topic: Heavy-WAIT_REDO_CATCHUP-waits
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Hyperscale/Heavy-WAIT_REDO_CATCHUP-waits.md
  Prompts:
