      | where filename !startswith physical_db_id

      | extend CasCommand = strcat("Set-WinfabProperty ", ''"'', ClusterName, ''" '', ''"fabric:/Worker.Vldb.Storage/'', AppName, ''/SQL.UserDb/'', physical_db_id, ''" "WriteTrackingMap-'', filename, ''" $propertyValue -Force'')

