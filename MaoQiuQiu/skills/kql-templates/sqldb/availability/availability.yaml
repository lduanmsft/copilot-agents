- id: DB-availability-493
  Topic: Soc100.12-%2D-LR-Quorum-Loss-due-to-bad-remote-disk
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Log-Service/Soc100---Log-Replica-Overview-(Start-Here)/Soc100.12-%2D-LR-Quorum-Loss-due-to-bad-remote-disk.md
  Prompts:
  - SQL DB cluster load
  - SQL DB MonClusterLoad event ClusterName TIMESTAMP
  - SQL DB investigate cluster load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonClusterLoad
    ExecutedQuery: 'MonClusterLoad

      | where TIMESTAMP >= startTime and TIMESTAMP <= endTime

      | where event == "node_state_report"

      | where ClusterName == "{ClusterName}"

      | where health_state != "Ok" or node_status != "Up"

      // | where node_name in ("_DB_37", "_DB_23")

      | project TIMESTAMP, node_name, health_state, node_status

      | summarize dcount(node_name) by bin(TIMESTAMP, 10min)

      If both node is down that time, go to        [https://aka.ms/sqlnodehealthdashboard](https://nam06.safelinks.protection.outlook.com/?url=https%3A%2F%2Faka.ms%2Fsqlnodehealthdashboard&data=05%7C02%7Clinyangdu%40microsoft.com%7C5c2625e9c5fd456e94f008dd1a910988%7C72f988bf86f141af91ab2d7cd011db47%7C1%7C0%7C638695932516014891%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=%2BOgjHUHXtEnrKUnsMU%2FhwSXTon633lS22gl%2F%2Fx%2BhNw0%3D&reserved=0) (use SAW to access)to check eventlog for these two node around that time see if there are errors.'
