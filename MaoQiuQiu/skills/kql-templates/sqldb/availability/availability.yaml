- id: DB-availability-297
  Topic: Soc027---Higher-read-latency-on-Page-server-due-mu
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc027---Higher-read-latency-on-Page-server-due-mu.md
  Prompts:
  - SQL DB backup status
  - SQL DB MonBackup LogicalServerName AppName AppTypeName
  - SQL DB investigate backup
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonBackup
    ExecutedQuery: 'cluster(clstr).database("sqlazure1").MonBackup

      | where AppTypeName == ''Worker.Vldb.Storage'' and originalEventTimestamp > ago(12h)

      | where [''details''] contains "before starting the next iteration" and sessionName == "xdbbackupservice_monitoring"

      | project ClusterName, originalEventTimestamp, LogicalServerName, AppName, sessionName,NodeName, [''details'']

      | extend BackupIterationInMins = round(extract("Waiting for ([0-9]+)", 1, [''details''], typeof(long)) / 60.0)

      | summarize arg_max(originalEventTimestamp, BackupIterationInMins) by ClusterName, LogicalServerName, AppName

      | project ClusterName, LogicalServerName,AppName, BackupIterationInMins

      | where BackupIterationInMins > 12

      | join kind=inner

      ( cluster(clstr).database("sqlazure1").MonSocrates

      | where AppTypeName == ''Worker.Vldb.Storage'' and TIMESTAMP > ago(6h)

      | where logical_database_name !in ('''', ''master'', ''tempdb'', ''msdb'', ''model'') and isnotempty(logical_db_id)

      and logical_db_id != "00000000-0000-0000-0000-000000000000"

      | distinct AppName, logical_db_id , logical_database_name

      ) on AppName

      | project ClusterName, LogicalServerName, logical_database_name, logical_db_id, AppName, BackupIterationInMins

      | summarize PageServerCount = count() by ClusterName = tostring(split(ClusterName, ''.'')[1]), LogicalServerName, logical_database_name, logical_db_id, BackupIterationInMins

      | extend changeClusterName = strcat("Select-SqlAzureCluster Wasd-prod-" , ClusterName, "-CR1")

      | extend command =

      strcat("Set-ServerConfigurationParameters -ServerName ", LogicalServerName, " -RemovedParameters @(''SQL.Config_BackupService_VldbPageServerSnapshotIntervalInSeconds'')")'
