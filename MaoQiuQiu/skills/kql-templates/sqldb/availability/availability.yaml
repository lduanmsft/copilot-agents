- id: DB-availability-22
  Topic: TRDB0105-Deployment--blocker
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/TRDB0105-Deployment--blocker.md
  Prompts:
  - SQL DB snapshot status
