  - SQL DB MonSocrates
  - SQL DB troubleshoot socrates latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocrates
    ExecutedQuery: 'MonSocrates

      | where originalEventTimestamp between (start .. end)

      | where event in ("rbio_redo_log_progress", "compute_notify_new_block_progress")

      | project originalEventTimestamp, logical_db_id, AppTypeName, foreign_file_id, AppName, physical_db_id, NodeName, EOL = linear_bsn, redo = current_bsn

      ) on logical_db_id

      | where originalEventTimestamp >= min_ts

      | where AppName in (psApp, computeApp)

      | extend elapsed_s = (originalEventTimestamp - min_ts)/1s

      | extend bsn_diff = coalesce(EOL, redo) - min_eol

      | project originalEventTimestamp

      , ID = strcat_delim("_", iif(isempty(EOL), "Redo", "EOL"), trim_start("Worker.Vldb.", AppTypeName), foreign_file_id, AppName, physical_db_id, NodeName)

