- id: DB-availability-130
  Topic: SM0003-Transferring-to-Storage-Management-Queue-for-RCA
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/Storage-Management/SM0003-Transferring-to-Storage-Management-Queue-for-RCA.md
  Prompts:
  - SQL DB SQL RG history errors
  - SQL DB SQL RG history AppName originalEventTimestamp blobs
  - SQL DB troubleshoot now errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let startTime = now()-1h;

      let endTime = now();

      let blobs = MonSqlRgHistory

      | where db_name == "db name"

      | where file_path endswith ".ldf" or file_path endswith ".mdf" or file_path endswith ".ndf"

      | where originalEventTimestamp between (startTime .. endTime)

      | summarize by insights_info=file_path;

      let updateslo = MonSQLXStore

      | where originalEventTimestamp between (startTime .. endTime)

      | where file_path in (blobs)

      | summarize by AppName

      | summarize count()

      | extend  insights_info = iif(count_ > 1, "[Storage Management INFO] During this timeframe, an UpdateSLO operation was triggered. As part of this process, a new SQL App instance was created for the general-purpose database, and it took ownership of the database files—causing the previous SQL App to lose ownership. As expected by design, this resulted in lease failures and related upper-layer errors (e.g., error codes 823, 900) on the old SQL App. This behavior is normal and does not require any action from the Storage Management team.", "There is no UpdateSlo triggred in this timeframe.")

      | project insights_info;

      let targetApp = MonSQLXStore

      | where originalEventTimestamp between (startTime .. endTime)

      | where file_path in (blobs)

      | where lease_action == ''XIOLeaseBreak''

      | extend insights_info = strcat("targetApp of this UpdateSlo is ", tostring(AppName))

      | project insights_info;'
- id: DB-availability-131
  Topic: SM0003-Transferring-to-Storage-Management-Queue-for-RCA
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/Storage-Management/SM0003-Transferring-to-Storage-Management-Queue-for-RCA.md
  Prompts:
  - SQL DB SQL RG history errors
  - SQL DB SQL RG history event originalEventTimestamp blobs db_name
  - SQL DB troubleshoot now errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let startTime = now()-1h;

      let endTime = now();

      let blobs = MonSqlRgHistory

      | where db_name == "db name"

      | where file_path endswith ".ldf" or file_path endswith ".mdf" or file_path endswith ".ndf"

      | where originalEventTimestamp between (startTime .. endTime)

      | summarize by insights_info=file_path;

      let non_retrible_failure=MonSQLXStore

      | where event == ''xio_request_finalized''

      | where originalEventTimestamp between (startTime .. endTime)

      | where file_path in (blobs)

      | where errorcode == ''InvalidRange''

      | limit 1

      | extend insights_info = "[Storage Management Issue] We’ve encountered a non-retriable failure that may indicate a serious issue—our recommendation is to engage the Storage Management team for deeper investigation."

      | project insights_info;'
- id: DB-availability-132
  Topic: SM0003-Transferring-to-Storage-Management-Queue-for-RCA
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/Storage-Management/SM0003-Transferring-to-Storage-Management-Queue-for-RCA.md
  Prompts:
  - SQL DB management errors
  - SQL DB management event originalEventTimestamp blobs db_name
  - SQL DB troubleshoot now errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'If the UpdateSLO operation has rolled back, then logins must be directed to the source application. Please cross-check with MonManagement table as well to confirm.

      If those logins are failing in source app for live incident, please run the following query which will detect if the source app''s lease acquisition is failing due to a lower lease order ID, we may need to break the lease using a CAS in that case.

      Please check investigation related past incidents - [Incident-650194269](https://portal.microsofticm.com/imp/v5/incidents/details/650194269/summary)

      let startTime = now()-1h;

      let endTime = now();

      let blobs = MonSqlRgHistory

      | where db_name == "db name"

      | where file_path endswith ".ldf" or file_path endswith ".mdf" or file_path endswith ".ndf"

      | where originalEventTimestamp between (startTime .. endTime)

      | summarize by insights_info=file_path;

      let non_retrible_failure=MonSQLXStore

      | where event == ''xstore_acquire_lease''

      | where file_path in (blobs)

      | where originalEventTimestamp between (startTime .. endTime)

      | where old_lease_order_id > new_lease_order_id'
