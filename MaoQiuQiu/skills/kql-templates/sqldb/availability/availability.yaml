- id: DB-availability-491
  Topic: Soc100.12-%2D-LR-Quorum-Loss-due-to-bad-remote-disk
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Log-Service/Soc100---Log-Replica-Overview-(Start-Here)/Soc100.12-%2D-LR-Quorum-Loss-due-to-bad-remote-disk.md
  Prompts:
  - SQL DB RG load errors
  - SQL DB MonRgLoad NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot RG load errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP >= startTime and TIMESTAMP <= endTime

      | summarize count() by ClusterName, NodeName

      ) on $left.ClusterName == $right.ClusterName and $left.NodeName == $right.NodeName

      | project tostring(originalEventTimestamp), NodeName, event = "node_startup", error_code = 0, result = 0

      )

      | order by originalEventTimestamp asc

      The first time WRITE_QUORUM show up is the QL start time, take that time out and put in below query, then we will know the other two nodes of the LR.'
