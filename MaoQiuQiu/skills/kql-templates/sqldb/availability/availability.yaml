  - SQL DB investigate RG load
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(1d)

      | where ClusterName contains "tr10.lkgtst3-a.worker.sqltest-eg1.mscds.com"

      | where NodeName contains "DB_HS1.3" // PageServer Node

      | where event contains "drive_usage_report_load"

      | where drive_name contains "S:"

