- id: DB-availability-94
  Topic: Category-Frozen-VM
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Common-Unavailability-Root-Causes/Category-Frozen-VM.md
  Prompts:
  - SQL DB caddaily activity
  - SQL DB CADDAILY NodeName NodeId StartTime OSLastSeen
  - SQL DB investigate caddaily
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: CADDAILY
    ExecutedQuery: 'let sqlnodes = cluster(''Vmainsight'').database(''vmadb'').CADDAILY

      | where (ResourceId contains ":DB_IN" or ResourceId contains ":WF_IN" or ResourceId contains ":MN_IN" or ResourceId contains ":GW_IN" )

      | where StartTime > ago(20d)

      | extend NodeName=extract("[0-9A-Za-z]*:([0-9A-Za-z_]*)", 1, ResourceId)

      | summarize argmin(StartTime, *), argmax(StartTime, *) by TenantName, NodeId, NodeName, ResourceId, NodeSS_OSBaseImageName

      | project TenantName, NodeId, NodeName, ResourceId, NodeSS_OSBaseImageName, OSFirstSeen = min_StartTime, OSLastSeen = max_StartTime;

      let sqltenantrings = cluster(''SqlAdHoc'').database(''sqlazure1'').TRtoAzureClusterMap

      | extend SqlClusterName = ClusterName

      | join kind=rightouter (sqlnodes) on $left.TenantId==$right.TenantName

      | project AzureClusterName, SqlClusterName, TenantName, NodeName, NodeId, ResourceId, NodeSS_OSBaseImageName, OSFirstSeen, OSLastSeen;'
