    ExecutedQuery: '| join kind = leftouter

      (

      //

      // Filter out anything that shares a stack trace keep the one with shortest JobName

      //

      cluster(''https://kusto.aria.microsoft.com/'').database(''6b1f75d0c60440f08f2122bf0e241388'').testcase

