- id: DB-availability-467
  Topic: Broad-Queries-For-Manual-Signoff-Process
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Livesite-Management-Guides/Broad-Queries-For-Manual-Signoff-Process.md
  Prompts:
  - SQL DB cv branch build versIOn metadata activity
  - SQL DB MonCvBranchBuildVersionMetadata Train Suffix
  - SQL DB investigate cv branch build versIOn metadata
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCvBranchBuildVersionMetadata
    ExecutedQuery: 'let suffixes = cluster(''https://sqladhoc.kustomfa.windows.net'').database(''sqlazure1'').MonCvBranchBuildVersionMetadata

      | where ReportedTime > ago(120d)

      // Filter release branches

      | extend BranchType = case(BranchName contains ''rel/'', ''Rel'', ''Other'')

      | where BranchType == ''Rel''

      // Filter by Ttrains

      | extend TTrain=tostring(split(split(BranchName, ''/'')[2], ''_'')[0])

      | where substring(TTrain, 0, 1) == ''T''

      | extend Train=toint(extract(''T(.*)'', 1, TTrain))

      | where isnotempty(Train)

      // Filter by out special builds

      | order by ReportedTime desc

      | where BranchName matches regex "rel\\/db\\/(T\\d{2,3})_(\\d{8})_((?:\\w|\\d){8})\\b"

      // Create suffix for dump query

      | extend Suffix=substring(BranchName, string_size(BranchName)-17, 17)

      | distinct Suffix

      | summarize make_set(Suffix);

      cluster(''https://sqladhoc.kustomfa.windows.net'').database(''sqlazure1'').MonCvBranchBuildVersionMetadata

      | where BranchName has_any (suffixes)

      | where BranchName has_any ("rc/db", "rel/db", "stabn/DsStabn") and BranchName matches regex "_(\\d{8})_((?:\\w|\\d){8})\\b"

      | distinct BranchName'
