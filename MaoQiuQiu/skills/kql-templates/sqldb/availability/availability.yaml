      | where TIMESTAMP  between (start .. end)

      | where AppName == app

      | where object_id == long(916250369)

      | where xtp_object_id == long(-2147483473)

      | where index_id == long(2)

      | where bucket_count == long(16384)

      | project end_utc_date, approx_avg_chain_length, approx_max_chain_length

