- id: DB-availability-330
  Topic: Soc051-Socrates-Long-Failover
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc051-Socrates-Long-Failover.md
  Prompts:
  - SQL DB fabric api errors
  - SQL DB MonFabricApi event AppName NodeName end
  - SQL DB troubleshoot fabric api errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonFabricApi
    ExecutedQuery: 'MonFabricApi

      | where originalEventTimestamp between ((startTime-10m) .. (endTime+5m))

      | where AppName == appName

      | where NodeName == nodeName

      | where event in ("hadr_fabric_api_replicator_begin_change_role", "hadr_fabric_api_replica_end_change_role")

      | project

      ts = originalEventTimestamp

      , AppName

      , NodeName

      , event

      , current_state_desc

      , new_role_desc

      , code_package_version

      , process_id

      , partition_id

      , fault_reason_desc

      , fault_type_desc

      , error_code

      , error_message

      , message

      | order by NodeName asc, ts asc

      | extend next_ts = next(ts)

      | extend dur_s = round((next_ts-ts)/1s)

      | where event == "hadr_fabric_api_replicator_begin_change_role"

      | where new_role_desc == "PRIMARY"

      | extend start = bin(ts,1s), end = bin(next_ts, 1s)+1s

      | project start, end, AppName, NodeName, current_state_desc, new_role_desc, code_package_version, process_id, dur_s

      | order by start asc'
