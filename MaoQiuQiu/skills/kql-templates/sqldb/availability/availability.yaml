    ExecutedQuery: 'MonClusterLoad

      | where PreciseTimeStamp > ago({TimeRange})

      | where ClusterName == "{ClusterName}" and node_name == \"{NodeName}\"

      | where event == ''node_state_report''

      | project SnapshotTimestamp, code_version, health_state, node_status'
- id: DB-availability-14
  Topic: TRDB0058-Repeated-Seeding-Failures
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/TRDB0058-Repeated-Seeding-Failures.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth event AppName NodeName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where TIMESTAMP between (datetime(''{StartTime}'')..datetime(''{EndTime}''))

      | where AppName =~ ''{AppName}''

      | where event == "errorlog_written"

      | where message contains "Error: 3999"

      | project originalEventTimestamp, ClusterName, NodeName, AppName, process_id, error_id, message'
- id: DB-availability-15
  Topic: TRDB0103-Frequent-failover
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/TRDB0103-Frequent-failover.md
  Prompts:
  - SQL DB fabric api errors
  - SQL DB MonFabricApi event AppName AppTypeName NodeName
  - SQL DB troubleshoot fabric api errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonFabricApi
    ExecutedQuery: 'MonFabricApi

      | where originalEventTimestamp between (datetime(''{StartTime}'')..datetime(''{EndTime}''))

      | where AppName =~ ''{AppName}''

      | where event in~ (''hadr_fabric_api_replica_begin_change_role'', ''hadr_fabric_api_replica_begin_open'', ''hadr_fabric_replica_exception'', ''hadr_fabric_replica_fault'', ''stack_trace'')

      | where ((isempty(new_role_desc)) or (new_role_desc contains ''PRIMARY''))

      | project originalEventTimestamp, ClusterName, NodeName, AppTypeName, AppName, process_id, event, new_role_desc, fault_type_desc, fault_reason_desc, error_code, error_message

      | order by originalEventTimestamp asc;'
- id: DB-availability-16
  Topic: TRDB0103-Frequent-failover
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/TRDB0103-Frequent-failover.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth AppName NodeName ClusterName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where originalEventTimestamp between (datetime(''{StartTime}'')-1h..datetime(''{EndTime}'')+1h)

      | where AppName =~ ''{AppName}''

      | extend hour_present = toint(hourofday(originalEventTimestamp))

      | summarize log_entry_count = count(), earliest_timestamp = min(originalEventTimestamp), latest_timestamp = max(originalEventTimestamp), hours_present = tostring(array_sort_asc(make_set(hour_present))) by ClusterName, NodeName, AppName, process_id

      | extend hours_present = iif(datetime_diff(''minute'', datetime(''{EndTime}''), datetime(''{StartTime}'')) >= 1320, ''<Timespan too large for this calculation>'', hours_present)

      | order by earliest_timestamp asc, latest_timestamp desc, process_id asc

      | extend gap_from_previous_in_seconds = iif(earliest_timestamp > prev(latest_timestamp), datetime_diff(''second'', earliest_timestamp, prev(latest_timestamp)), -1);'
- id: DB-availability-17
  Topic: TRDB0103-Frequent-failover
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/TRDB0103-Frequent-failover.md
  Prompts:
  - SQL DB node trace diagnostics
  - SQL DB MonNodeTraceETW NodeName ClusterName TIMESTAMP
  - SQL DB investigate node trace diagnostics
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonNodeTraceETW
    ExecutedQuery: 'MonNodeTraceETW

      | where TIMESTAMP between (datetime({StartTime})-1h..datetime({EndTime})+1h)

      | where ClusterName =~ ''{ClusterName}'' and NodeName =~ ''{NodeName}''

      | where Message contains '' CodePackageName "Code" ServiceManifest Name "SQL"''

      | where Message has ''{AppName}''

      | extend Message = extract(@'' Message : "(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{2}\s+\w+\s+)?(.+?)[\r\n]?"'', 2, Message)

      | where isnotempty(Message)

      | project TIMESTAMP, ClusterName, NodeName, Pid, Message;'
- id: DB-availability-18
  Topic: TRDB0103-Frequent-failover
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/TRDB0103-Frequent-failover.md
  Prompts:
  - SQL DB node trace diagnostics
  - SQL DB MonNodeTraceETW NodeName ClusterName TIMESTAMP
  - SQL DB investigate node trace diagnostics
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonNodeTraceETW
    ExecutedQuery: 'MonNodeTraceETW

      | where TIMESTAMP between (datetime({StartTime})-1h..datetime({EndTime})+1h)

      | where ClusterName =~ ''{ClusterName}'' and NodeName =~ ''{NodeName}''

      | where Message contains '' CodePackageName "Code" ServiceManifest Name "SQL"''

      | where Message has ''{AppName}''

      | extend Message = extract(@'' Message : "(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{2}\s+\w+\s+)?(.+?)[\r\n]?"'', 2, Message)

      | where isnotempty(Message)

      | where Message !contains ''Not reporting metrics''

      | summarize LogEntryCount = count(), arg_min(TIMESTAMP, Message), arg_max(TIMESTAMP, Message) by ClusterName, NodeName, Pid

      | project EarliestEventTimestamp = TIMESTAMP, LatestEventTimestamp = TIMESTAMP1, EntriesTimespanInSeconds = datetime_diff(''second'', TIMESTAMP1, TIMESTAMP), ClusterName, NodeName, Pid, LogEntryCount, FirstMessage = Message, LastMessage = Message1

      | order by EarliestEventTimestamp asc, LatestEventTimestamp desc;'
