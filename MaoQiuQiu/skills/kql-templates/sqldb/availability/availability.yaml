- id: DB-availability-61
  Topic: Auxiliary-Replica-running-at-100-resource-allocation
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Auxiliary-Replica-TSGs/Resource-Governance/Auxiliary-Replica-running-at-100-resource-allocation.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad event ClusterName TIMESTAMP slo_size
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(1.5h)

      | where event == "instance_load"

      | where code_package_name == "Code"

      | where application_name contains "Worker.ISO.Premium"

      | summarize by cpu_load_cap,ClusterName,bin(TIMESTAMP,1d) , slo_size

      | summarize max(cpu_load_cap) by ClusterName,bin(TIMESTAMP,1d) , slo_size

      | extend reminder = max_cpu_load_cap / 100 * 0.3 % 2

      | extend mutiCoreAuxCpuCap = iff(reminder == 0, tolong(max_cpu_load_cap / 100 * 0.3 * 100), tolong((max_cpu_load_cap / 100 * 0.3 + 2 - reminder) * 100))

      | extend auxCpuCap = iff(max_cpu_load_cap <= 200, tolong(max_cpu_load_cap * 0.3), mutiCoreAuxCpuCap)

      | extend cpuDiff = max_cpu_load_cap - auxCpuCap

      | summarize avg(cpuDiff) , avg(max_cpu_load_cap), avg(auxCpuCap) by slo_size, ClusterName;'
