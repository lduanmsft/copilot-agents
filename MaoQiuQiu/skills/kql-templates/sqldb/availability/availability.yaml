- id: DB-availability-705
  Topic: Soc077-1-SBCD-Full-Scan-on-File
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc077---SBCD-Full-Scan-on-File/Soc077-1-SBCD-Full-Scan-on-File.md
  Prompts:
