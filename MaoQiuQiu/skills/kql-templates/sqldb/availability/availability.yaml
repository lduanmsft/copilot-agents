- id: DB-availability-712
  Topic: Soc077-2-SBCD-Full-SCAN-on-List-of-Apps
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc077---SBCD-Full-Scan-on-File/Soc077-2-SBCD-Full-SCAN-on-List-of-Apps.md
  Prompts:
