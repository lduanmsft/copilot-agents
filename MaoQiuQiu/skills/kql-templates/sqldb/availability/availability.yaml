- id: DB-availability-422
  Topic: Soc110--IO-requests-taking-longer
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc110--IO-requests-taking-longer.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth LogicalServerName AppName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where originalEventTimestamp between (start .. end)

      | where LogicalServerName == logicalServerName

      | where message has "I/O requests taking longer than 15 seconds to complete on file"

      | extend FileId = iff(AppTypeName == "Worker.Vldb.Compute", substring(message, (indexof(message, "_", 0, 1000, 3) + 1), (indexof(message, "df]")-2 - (indexof(message, "_", 0, 1000, 3) + 1))), "")

      | extend FileId = iff(AppTypeName == "Worker.Vldb.Storage", substring(message, (indexof(message, "_F_", 0, 1000, 1) + 3), (indexof(message, "_r_")-2 - (indexof(message, "_F_", 0, 1000, 1) + 1))), FileId)

      | project originalEventTimestamp, AppName, message, tostring(tolong(FileId)), AppTypeName, ClusterName, NodeName

      | extend FileName = substring(message, (indexof(message, "[", 0, 1000, 1) + 1), (indexof(message, "df")+2 - (indexof(message, "[", 0, 1000, 1) + 1)))

      | summarize count(), min(originalEventTimestamp), max(originalEventTimestamp), make_set(NodeName) by AppName, AppTypeName, ClusterName, FileName, FileId'
- id: DB-availability-423
  Topic: Soc110--IO-requests-taking-longer
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc110--IO-requests-taking-longer.md
  Prompts:
  - SQL DB perf counters activity
  - SQL DB MonSqlPerfCounters LogicalServerName AppName
  - SQL DB investigate perf counters
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlPerfCounters
    ExecutedQuery: 'MonSqlPerfCounters

      | where originalEventTimestamp between (start .. end)

      | where LogicalServerName == logicalServerName

      | where AppTypeName == "Worker.Vldb.Compute"

      | where logical_db_id != "00000000-0000-0000-0000-000000000000"

      | where performance_counter_type == "RBIO_AsyncReadRequestClient"

      | where max > 15000000 //15 seconds

      | summarize max_client_read_time = max(max) by compute_telemetry_timestamp = originalEventTimestamp, Compute = AppName, NodeName, logical_db_id

      | order by max_client_read_time desc'
- id: DB-availability-424
  Topic: Soc110--IO-requests-taking-longer
