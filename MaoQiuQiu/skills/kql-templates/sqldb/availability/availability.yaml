- id: DB-availability-128
  Topic: SM0001-High-retry-Winhttp-errors
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/Storage-Management/SM0001-High-retry-Winhttp-errors.md
  Prompts:
  - SQL DB timeout analysis
  - SQL DB MonSQLXStore event AppTypeName ClusterName
  - SQL DB troubleshoot timeout
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: 'MonSQLXStore

      | where originalEventTimestamp between (datetime(''{StartTime}'')..datetime(''{EndTime}''))

      | where event == ''xio_request_finalized''

      | where ClusterName !contains ''onebox'' and ClusterName !contains ''sqltest-eg1''

      | where file_path endswith ''.mdf'' or file_path endswith ''.ndf'' or file_path endswith ''.ldf''

      | where AppTypeName =~ ''Worker.ISO''

      | where request_type contains ''XIOTypeGetProperties''

      | extend storageaccount = substring(file_path, 0, indexof(file_path, ''/'', 0, strlen(file_path), 3))

      | extend SQLRoleInstanceName = replace(@''\.'', @''_IN_'', NodeName)

      | summarize count1 = countif(winhttp_timeout_count < 10 and winhttp_timeout_count > 4), count2 = countif(winhttp_timeout_count >= 10 and winhttp_timeout_count < 15),

      count3 = countif(winhttp_timeout_count >= 15), dcount(request_context), make_set(storageaccount, MaxSize=5), make_set(mapped_errorcode), dcount(file_path) by AppName, NodeName, ClusterName, SQLRoleInstanceName, LogicalServerName

      | where count1 > 5 or count2 > 3 or count3 > 2)

      | extend Region = extract("(.*)\\.(.*)\\.(worker|control).(database|sqltest-eg1).(windows.net|chinacloudapi.cn|mscds.com|usgovcloudapi.net|cloudapi.de)", 2, ClusterName, typeof(string))

      | summarize dcount(AppName) by Region'
