    ExecutedQuery: 'MonSocrates

      | where logical_db_id == logicalDbId

      | where originalEventTimestamp between (start .. end)

      | where AppTypeName == "Worker.Vldb.Compute"

      | where event == "connection_statistics"

      | where conn_rebalance_endpoint > 0

      | extend fileid = tostring(split(conn_id, ":")[1])

      | project originalEventTimestamp, conn_id, remote_endpoint, conn_rebalance_endpoint, fileid

