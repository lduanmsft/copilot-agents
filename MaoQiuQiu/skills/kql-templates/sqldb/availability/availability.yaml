- id: DB-availability-170
  Topic: CCI_INF0004%2DMonitor%2DTuple%2DMover%2Dperformance
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/StorageEngine/CCI_INF0004%2DMonitor%2DTuple%2DMover%2Dperformance.md
  Prompts:
  - SQL DB apollo status
  - SQL DB MonApollo event AppName TIMESTAMP EndTime
  - SQL DB investigate apollo
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonApollo
    ExecutedQuery: 'MonApollo

      | where AppName has TargetApp

      | where event == "columnstore_rowgroup_merge_complete" or

      event == "columnstore_rowgroup_merge_failed"  or

      event == "columnstore_tuple_mover_end_compress"  or

      (event == "columnstore_rowgroup_operation" and operation == "ROWGROUP_DELETE")

      | where TIMESTAMP between(StartTime..EndTime)

      | summarize

      total_activity=count(),

      sum(is_aggressive_compression),

      sum(is_background_merge),

      delta_compression=sum(iff(event == "columnstore_tuple_mover_end_compress", 1, 0)),

      reorganize=sum(iff((event == "columnstore_rowgroup_merge_complete" and 0 == is_aggressive_compression and 0 == is_background_merge),1,0)),

      rowgroup_cleanup_tombstone=sum(iif(event == "columnstore_rowgroup_operation" and rowgroup_state_desc == ''TOMBSTONE'' and operation == "ROWGROUP_DELETE", 1,0)),

      rowgroup_cleanup_invisible=sum(iif(event == "columnstore_rowgroup_operation" and rowgroup_state_desc == ''INVISIBLE'' and operation == "ROWGROUP_DELETE", 1,0))

      by bin(TIMESTAMP, 1h)

      | render timechart'
