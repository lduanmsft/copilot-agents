- id: DB-availability-100
  Topic: Category-Unknown-_-IsSqlPartitionInErrorStateFromW
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Common-Unavailability-Root-Causes/Category-Unknown-_-IsSqlPartitionInErrorStateFromW.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth error_message TIMESTAMP
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where TIMESTAMP > ago(15m)

      | where * contains ''cd374c800980'' //sql_app_name

      | where message matches regex ''Error: [d+''](file//d)

      | project TIMESTAMP, error_id, error_message = extract(''.s+.*spidd+ss+(.*)'', 1, message), message

      | summarize count() by error_id, error_message'
