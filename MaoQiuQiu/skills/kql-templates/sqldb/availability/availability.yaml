- id: DB-availability-65
  Topic: InitialGuide
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Availability-RCA-101-TSGs/InitialGuide.md
  Prompts:
  - SQL DB analytics DB snapshot errors
  - SQL DB cross
  - SQL DB troubleshoot cross errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonAnalyticsDBSnapshot
    ExecutedQuery: '| `{ServerName}` | Logical server hosting the database. | Step 1 (MonAnalyticsDBSnapshot) or case notes. |

      | `{DatabaseName}` | Friendly database name (logical). | Step 1 snapshot output. |

      | `{PhysicalDatabaseId}` | Physical database GUID. | Step 1 snapshot (`physical_database_id`). |

      | `{logical_database_id}` | Logical database GUID (if needed for ErrorLog filters). | Step 1 snapshot. |

      | `{partition_id}` / `{PartitionId}` | Service Fabric partition GUID. | Step 1 snapshot (`fabric_partition_id`) or WinFab outputs. |

      | `{AppName}` | SQL instance/app identifier. | Step 1 snapshot (`AppName`) or ErrorLog lines. |

      | `{NodeName}` / `{NodeEntityName}` | Underlying node name. | Step 1 snapshot, WinFab logs, or Service Fabric health tables. |

      | `{ClusterName}` | Service Fabric cluster. | Often present in WinFab logs; cross-check tenant runbook. |

      | `{WorkflowStartTime}`, `{WorkflowEndTime}` | Window for workflow tracking. | Align to automation timeline from control plane alerts. |

      | `{WorkflowId}`, `{ContentId}`, `{RequestId}` | Identifiers for management workflows. | Output from the first MonManagement query. |

      | `{NodeWindowStart}`, `{NodeWindowEnd}` | Time span for node availability checks. | Use the incident window or node reboot times. |

      | `{NodeHealthStartTime}`, `{NodeHealthEndTime}` | Slice for Service Fabric health events. | Combine Step 5–8 findings with alert timestamps. |

      | `{PartitionHealthStartTime}` | Start time for partition health review. | Same as `{StartTime}` unless you need a narrower window. |

      | `{ThrottleStartTime}`, `{ThrottleEndTime}` | Window for log throttle diagnostics. | Match customer complaint period or redo stall window. |

      | `{GeoPairStartTime}`, `{GeoPairEndTime}` | Window for geo-replication checks. | Align to the cross-region incident period. |

      | `{UcsStartTime}`, `{UcsEndTime}` | Window for UCS connectivity queries. | Use periods where connectivity spikes were observed. |

      | `{RecoveryStartTime}`, `{RecoveryEndTime}` | Window for log recovery trace. | Start when recovery kicked off; end when customer was back online. |

      | `{ActivityId}` | Activity identifier for deep ETW searches. | ErrorLog or UCS output that references the correlation ID. |'
