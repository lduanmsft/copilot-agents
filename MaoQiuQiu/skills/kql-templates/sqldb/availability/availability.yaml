- id: DB-availability-696
  Topic: SOC077---SBCD-Full-Scan-on-Page-Servers
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc077---SBCD-Full-Scan-on-File/SOC077---SBCD-Full-Scan-on-Page-Servers.md
  Prompts:
  - SQL DB socrates analysis
  - SQL DB MonSocrates event LogicalServerName AppName
  - SQL DB investigate socrates
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocrates
    ExecutedQuery: 'MonSocrates

      | where AppName in (appNames)

      | where event == "collected_foreign_file_paths"

      | parse foreign_file1 with * "data/" filename1

      | parse foreign_file2 with * "data/" filename2

      | distinct physical_db_id, AppName, ClusterName, LogicalServerName, filename1, filename2

      | where filename1 !startswith physical_db_id

      | where filename2 !startswith physical_db_id

      | extend TotalBuffers = propertyValueSize * 8

      | extend command = strcat("$propertyValue_", AppName, " = [char[]]@(For ($i=1; $i -le ", propertyValueSize, "; $i++) {255})")

      | extend CasCommandForReplica1 = strcat(command, ";Set-WinfabProperty ", ''"'', ClusterName, ''" '', ''"fabric:/Worker.Vldb.Storage/'', AppName, ''/SQL.UserDb/'', physical_db_id, ''" "WriteTrackingMap-'', filename1, ''" $propertyValue_'', AppName, '' -Force'')

      | extend CasCommandForReplica2 = strcat(command, ";Set-WinfabProperty ", ''"'', ClusterName, ''" '', ''"fabric:/Worker.Vldb.Storage/'', AppName, ''/SQL.UserDb/'', physical_db_id, ''" "WriteTrackingMap-'', filename2, ''" $propertyValue_'', AppName, '' -Force'')

      | distinct AppName, physical_db_id, TotalBuffers, CasCommandForReplica1, CasCommandForReplica2'
- id: DB-availability-697
  Topic: SOC077---SBCD-Full-Scan-on-Page-Servers
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc077---SBCD-Full-Scan-on-File/SOC077---SBCD-Full-Scan-on-Page-Servers.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonDmDbHadrReplicaStates AppName TIMESTAMP
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbHadrReplicaStates
    ExecutedQuery: 'MonDmDbHadrReplicaStates

      | where AppName in (appNames)

      | where TIMESTAMP > ago(1h)

      | where is_primary_replica == 1 and internal_state == 2

      | extend KillSqlCasCommand = strcat("Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, " | Kill-Process -ProcessName sqlservr.exe -ApplicationNameUri fabric:/Worker.Vldb.Storage/", AppName, " -SkipDumpPrompt")

      | distinct KillSqlCasCommand'
- id: DB-availability-698
  Topic: SOC077---SBCD-Full-Scan-on-Page-Servers
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc077---SBCD-Full-Scan-on-File/SOC077---SBCD-Full-Scan-on-Page-Servers.md
  Prompts:
  - SQL DB socrates foreign file validatIOn activity
  - SQL DB MonSocratesForeignFileValidation AppName
  - SQL DB investigate socrates foreign file validatIOn
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocratesForeignFileValidation
    ExecutedQuery: 'MonSocratesForeignFileValidation

      | where TIMESTAMP > ago(2h)

      | where AppName in (appNames)

      | where physical_db_id != ""

      | summarize argmax(set_bits, TIMESTAMP) by AppName, physical_db_id

      | extend is_scan_started = iif(max_set_bits == expected_set_bits, "YES", "NO, waiting for 14 mins")

      | project AppName, physical_db_id, max_set_bits, expected_set_bits, max_set_bits_TIMESTAMP, is_scan_started'
- id: DB-availability-699
  Topic: SOC077---SBCD-Full-Scan-on-Page-Servers
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc077---SBCD-Full-Scan-on-File/SOC077---SBCD-Full-Scan-on-Page-Servers.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonDmDbHadrReplicaStates AppName NodeName
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbHadrReplicaStates
    ExecutedQuery: 'MonDmDbHadrReplicaStates

      | where AppName in (appNames)

      | where TIMESTAMP > ago(1h)

      | where internal_state == 2  // Primary replica

      or internal_state == 6 // Active Secondary

      | summarize by AppName, ClusterName, NodeName

      | extend EnableTraceFlagCommand = strcat("Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, " | Invoke-DbccCommand -AppName ", AppName, " -Command TRACEON -TraceFlag 13425")

      | distinct EnableTraceFlagCommand'
- id: DB-availability-700
  Topic: SOC077---SBCD-Full-Scan-on-Page-Servers
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc077---SBCD-Full-Scan-on-File/SOC077---SBCD-Full-Scan-on-Page-Servers.md
  Prompts:
  - SQL DB socrates foreign file validatIOn activity
  - SQL DB MonSocratesForeignFileValidation event AppName
  - SQL DB investigate socrates foreign file validatIOn
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocratesForeignFileValidation
    ExecutedQuery: 'MonSocratesForeignFileValidation

      | where TIMESTAMP between (startTime..endTime)

      | where AppName in (appNames)

      | where event == "ffv_validation_batch_end"

      | extend pageidlist = split(starting_pageids, ",")

      | mv-expand pageidlist

      | extend start_page_id = toint(pageidlist)

      | where isnotnull(start_page_id)

      | summarize count_distinct(start_page_id) by AppName, physical_db_id, file_id

      | join kind = inner

      (MonSocratesForeignFileValidation

      | where TIMESTAMP between (startTime..endTime)

      | where event == "ffv_validated_all_bits"

      | where AppName in (appNames)

      | summarize max(max_validatable_bit) by max_validatable_bit_crossed, AppName, physical_db_id) on AppName, physical_db_id

      | extend is_scan_completed = iif(count_distinct_start_page_id >= max_max_validatable_bit, "completed", "in progress")

      | project AppName, physical_db_id, file_id, pages_to_validated, count_distinct_start_page_id, is_scan_completed, max_max_validatable_bit, max_validatable_bit_crossed'
