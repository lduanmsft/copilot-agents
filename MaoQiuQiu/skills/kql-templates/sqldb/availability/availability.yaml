  - SQL DB MonSQLSystemHealth event AppName TIMESTAMP
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where TIMESTAMP > ago(6h)

      | where AppName in (appNames)

      | where logical_database_guid != "00000000-0000-0000-0000-000000000000"

      | distinct AppName, logical_database_guid

      // Get the logical_database_guid column for all input apps

      |join kind=inner (MonBillingVldbStatus2

      | where TIMESTAMP > ago(2h)

      ) on $left.logical_database_guid ==  $right.database_id

      | distinct AppName, logical_database_guid, storage_version

      |join kind=leftouter

      // Create propertyValue array for V1 apps

      (MonDmIoVirtualFileStats

      | where originalEventTimestamp > ago(6h)

      | where isnotempty( logical_database_id)

      | where AppName in (appNames)

      | where file_id == 3

      | extend propertyValueSizeV1 = max_size_mb/32

      | extend propertyValueCommandV1 = strcat("$propertyValue_", AppName," = [char[]]@(For ($i=1; $i -le ", propertyValueSizeV1 ,"; $i++) {255})")

      ) on AppName

      | distinct AppName, logical_database_guid,propertyValueCommandV1, storage_version

      |join kind=leftouter

      // Create propertyValue array for V2 apps

      (MonSocrates

      | where TIMESTAMP > ago(2d)

      | where AppName in (appNames)

      | where event == "foreign_checkpoint_end"

      | extend max_size_mbV2 = ((end_page_id - start_page_id)*8)/1024

      | extend propertyValueSizeV2 = max_size_mbV2/32

      | extend propertyValueCommandV2 = strcat("$propertyValue_", AppName," = [char[]]@(For ($i=1; $i -le ", propertyValueSizeV2 ,"; $i++) {255})")

      ) on AppName

      | extend database_type = iff(storage_version == "StorageV2", "StorageV2", "StorageV1")

      | extend command = iff(storage_version == "StorageV2", propertyValueCommandV2, propertyValueCommandV1) // Depending on storage_version select array.

      | distinct database_type, AppName,command, logical_database_guid, start_page_id, end_page_id, max_size_mbV2

      | join kind=inner (

      // Get the file names of 2 replicas to set propertyValue array'
