      | project end_utc_date, NodeName, object_id, xtp_object_id, index_id, bucket_count, scanned_bucket_count, approx_filled_count, approx_avg_chain_length, approx_max_chain_length, buckets_with_chain_length_between_100_1000, buckets_with_chain_length_between_1000_10000, buckets_with_chain_length_greater_than_10000, buckets_with_chain_length_greater_than_max_rows_to_scan_per_buc'
- id: DB-availability-120
  Topic: High-Redo-Lag-caused-by-Misconfigured-Hekaton-Hash-Index
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Sterling-HA-Replicas/Redo-Lag-Analysis/High-Redo-Lag-caused-by-Misconfigured-Hekaton-Hash-Index.md
