- id: DB-availability-97
  Topic: Category-HasSqlDump
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Common-Unavailability-Root-Causes/Category-HasSqlDump.md
  Prompts:
  - SQL DB watson analysis analysis
  - SQL DB MonWatsonAnalysis AppName DumpUID Followup
  - SQL DB investigate watson analysis
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWatsonAnalysis
    ExecutedQuery: 'cluster(''sqladhoc'').database(''sqlazure1'').MonWatsonAnalysis

      | where AppName contains ''{app_name}''

      | where isnotempty(DumpCrashTime) and isnotnull(DumpCrashTime)

      | where DumpCrashTime > datetime(''{start_time}'') and DumpCrashTime < datetime(''{end_time}'')

      | join kind=leftouter (cluster(''sqladhoc'').database(''sqlazure1'').MonWatsonBucketComponents) on BucketString

      | sort by DumpCrashTime asc nulls last

      | project DumpUID, ComponentCode, BucketString, Followup, FaultingSourceFile, FaultingSourceLineNumber, FaultingModule, FaultingModuleVer, RoutingDerivation

      | take 1'
- id: DB-availability-98
  Topic: Category-IsXstoreIssue-HasXStoreErrors
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Common-Unavailability-Root-Causes/Category-IsXstoreIssue-HasXStoreErrors.md
