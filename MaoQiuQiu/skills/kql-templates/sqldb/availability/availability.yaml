  Prompts:
  - SQL DB watson odata ingestIOn pipeline errors
  - SQL DB WatsonODATAIngestionPipeline TIMESTAMP DumpUID
  - SQL DB troubleshoot watson odata ingestIOn pipeline errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: WatsonODATAIngestionPipeline
    ExecutedQuery: 'MonSqlDumperActivity

      | where TIMESTAMP >= datetime(''{start_time}'') and TIMESTAMP <= datetime(''{end_time}'')

      | where TargetAppName contains "{app_name}"

      | extend ExceptionStackSignature = StackSignature

      | join kind=leftouter ( cluster(''sqladhoc'').database(''sqlazure1'').WatsonODATAIngestionPipeline) on DumpUID

      | summarize Count=count(), DumpFirstSeen=min(TIMESTAMP), DumpLastSeen=max(TIMESTAMP), take_any(DumpUID, DumpErrorDetails) by ExceptionStackSignature

      | project Count, DumpFirstSeen, DumpLastSeen, ExceptionStackSignature, DumpUID, DumpErrorDetails

      | order by Count desc'
