- id: DB-availability-172
  Topic: CCI_INF0004%2DMonitor%2DTuple%2DMover%2Dperformance
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/StorageEngine/CCI_INF0004%2DMonitor%2DTuple%2DMover%2Dperformance.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonApollo event AppName NodeName total_time_sec
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonApollo
    ExecutedQuery: 'MonApollo

      | where AppName has "d0b52dccb1fc"

      | where event == "columnstore_rowgroup_merge_complete" or event == "columnstore_tuple_mover_end_compress" or event == "columnstore_rowgroup_merge_failed"

      | extend failed_merge=iff(event == "columnstore_rowgroup_merge_failed",1,0)

      | extend merge_failed_sec=iif(event == "columnstore_rowgroup_merge_failed",5,0)

      | summarize

      merge_work_time_sec=sum(cpu_time)/1000.0/1000.0,

      delta_compression_sec=sum(duration)/1000.0,

      work_time_sec=(sum(cpu_time)/1000.0 + sum(duration))/1000.0,

      total_TM_activity=count(),

      total_time_sec= (sum(cpu_time)/1000.0 + sum(duration))/1000.0 + 5*count() + sum(merge_failed_sec),

      sum(merge_failed_sec)

      by bin(TIMESTAMP, 1h), NodeName

      | extend formatted_total_time=unixtime_seconds_todatetime(total_time_sec) - datetime(1970-01-01 00:00:00)

      | project TIMESTAMP, NodeName,delta_compression_sec,merge_work_time_sec, total_time_sec, sum_merge_failed_sec, 3600_sec=3600

      | render timechart'
