- id: DB-availability-381
  Topic: Soc077---SBCD-Full-Scan-on-File
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc077---SBCD-Full-Scan-on-File.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth event AppName NodeName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where TIMESTAMP > ago(6h)

      | where AppName == appName

      | where logical_database_guid != "00000000-0000-0000-0000-000000000000"

      | distinct AppName, logical_database_guid

      // Get the logical_database_guid column for all input apps

      // Create propertyValue array for V1 apps

      |join kind=leftouter

      (MonDmIoVirtualFileStats

      | where originalEventTimestamp > ago(6h)

      | where isnotempty( logical_database_id)

      | where AppName == appName

      | where file_id == 3

      | extend propertyValueSizeV1 = max_size_mb/32

      | extend propertyValueCommandV1 = strcat("$propertyValue_", AppName," = [char[]]@(For ($i=1; $i -le ", propertyValueSizeV1 ,"; $i++) {255})")

      ) on AppName

      | distinct AppName, logical_database_guid,propertyValueCommandV1, propertyValueSizeV1

      // Create propertyValue array for V2 apps

      |join kind=leftouter

      (MonSocrates

      | where TIMESTAMP > ago(2d)

      | where AppName == appName

      | where event == "foreign_checkpoint_end"

      | extend max_size_mbV2 = ((end_page_id - start_page_id)*8)/1024

      | extend propertyValueSizeV2 = max_size_mbV2/32

      | extend propertyValueCommandV2 = strcat("$propertyValue_", AppName," = [char[]]@(For ($i=1; $i -le ", propertyValueSizeV2 ,"; $i++) {255})")

      ) on AppName

      | extend database_type = iff(storage_version == "StorageV2", "StorageV2", "StorageV1")

      | extend command = iff(storage_version == "StorageV2", propertyValueCommandV2, propertyValueCommandV1) // Depending on storage_version select array.

      | extend propertyValueSize = iff(storage_version == "StorageV2", propertyValueSizeV2, propertyValueSizeV1)

      | distinct database_type, AppName,command, logical_database_guid, max_size_mbV2, propertyValueSize

      // Get the file names of 2 replicas to set propertyValue array

      | join kind=inner

      (MonSocrates

      | where event == "wb_checkpoint_progress"

      | where physical_db_id == physDbId

      | parse foreign_file_path with prefix "data/" filename

      | distinct AppName, filename, NodeName, ClusterName, physical_db_id) on AppName

      | distinct filename, AppName,ClusterName, propertyValueSize, command, physical_db_id

      | extend TotalBuffers = propertyValueSize*8

      | extend CasCommand = strcat(command,";Set-WinfabProperty ", ''"'', ClusterName, ''" '', ''"fabric:/Worker.Vldb.Storage/'', AppName, ''/SQL.UserDb/'', physical_db_id, ''" "WriteTrackingMap-'', filename, ''" $propertyValue_'', AppName,'' -Force'')

      | distinct propertyValueSize, TotalBuffers, CasCommand'
