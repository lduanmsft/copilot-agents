      let FilterOutRetailIfThereIsDebug = SocratesTestFailures

      | summarize make_set(SessionName) by JobName

      | extend hasRetailAndDebug = iff(tostring(set_SessionName) has ''Retail'' and tostring(set_SessionName) has ''Debug'', ''Yes'', ''No'')

