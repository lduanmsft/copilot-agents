      If you did not notice an improvement in read latencies and still notice high IOPS, you can reduce the read amplification factor further up to 8 (set it to 32, 16 and then 8) and check if that helps the read performance. To verify the issue is mitigated, you should stop seeing IO stalls and RBPEX reads should go back to around 200us. Note that kusto could take up to 20 minutes to update.'
