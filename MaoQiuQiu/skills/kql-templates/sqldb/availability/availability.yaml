    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP > ago(3h)

      | where event == "aggregated_virtual_files_io_history"

      | where AppTypeName ==  "Worker.Vldb.Storage"

      | summarize file_size= max(size_on_disk_bytes/1024.0/1024.0/1024.0) by ClusterName, NodeName, AppName, file_path

      | where file_path contains ".BPE"

      | extend folder = extract("(Worker.Vldb.Storage_App[0-9]+)", 1, file_path , typeof(string))

      ) on ClusterName, NodeName, folder

      | extend file_name = "resbpoolext.BPE"

      | extend path_len = strlen(file_path), file_len = strlen(file_name)

      | extend folder_path = substring(file_path, 0, path_len - file_len - 1)

      |  extend cas = strcat("Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, " | Remove-FabricNodeFile -Directory ", folder_path , " -Filename ",file_name)

      | project ClusterName, NodeName, AppName, cas, target_directory, folder_size, file_path, file_size, deployment_status, max_consecutive_detection, stale_detected_time = min_originalEventTimestamp, last_stale_check_time = max_originalEventTimestamp'
