- id: DB-availability-184
  Topic: CCI_SOP0005%2DSlow%2Ddeletes%2Dcaused%2Dby%2Dlarge%2Dmapping%2Dindex
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/StorageEngine/CCI_SOP0005%2DSlow%2Ddeletes%2Dcaused%2Dby%2Dlarge%2Dmapping%2Dindex.md
  Prompts:
  - SQL DB database metadata status
  - SQL DB MonDatabaseMetadata AppName name id nsid
  - SQL DB investigate database metadata
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'let myAppName = "{AppName}";

      let mappingIndexRowCountThreshold=10000;

      let FilteredResults=materialize(MonDatabaseMetadata

      | where AppName has myAppName

      | where (table_name==''sysclsobjs'' and class==50) or (table_name==''sysschobjs'' and (substring([''type''],0,1)==''U'' or [''type'']==''ET'')) or (table_name==''sysidxstats'' and indid in (0,1)) or (table_name==''sysiscols'' and idminor==1 and binary_and(status, 0x10)==0 and tinyprop2==0) or (table_name==''sysiscols'' and idminor in (0,1) and tinyprop2<>0) or (table_name==''syssingleobjrefs'' and class==7) or (table_name==''sysclsobjs'' and class==31 and [''type'']==''PS'') or (table_name==''syssingleobjrefs'' and class==31) or (table_name==''sysclsobjs'' and class==30) or (table_name==''syscolpars'')

      | project TIMESTAMP, table_name, class, [''type''], id, name, nsid, created, modified, indid, idmajor, idminor, subid, tinyprop1, tinyprop2, depid, indepid, intprop, status, colid);

      let schemas=FilteredResults

      | where (table_name==''sysclsobjs'' and class==50)

      | summarize by schema_id=id, schema_name=tolower(name);

      let tables=FilteredResults

      | where (table_name==''sysschobjs'' and (substring([''type''],0,1)==''U'' or [''type'']==''ET''))

      | extend is_external=iif([''type'']==''ET'',1,0)

      | summarize by schema_id=nsid, object_id=id, table_name=name, is_external, created, modified, data_date=bin(TIMESTAMP, 1d);

      let indexes=FilteredResults

      | where (table_name==''sysidxstats'' and indid in (0,1))

      | extend index_type_desc=iff([''type'']==0, ''HEAP'', iff([''type'']==1, ''CLUSTERED'', iff([''type'']==5, ''CCI'', tostring([''type'']))))

      | summarize by object_id=id,index_id=indid,index_type=type,index_type_desc;

      let index_columns=FilteredResults

      | where (table_name==''sysiscols'' and idminor==1 and binary_and(status, 0x10)==0 and tinyprop2==0)

      | summarize by object_id=idmajor, index_id=idminor, index_column_id=subid, column_id=intprop, key_ordinal=tinyprop1, is_descending_key=binary_and(status, 0x4);

      let partition_columns=FilteredResults

      | where (table_name==''sysiscols'' and idminor in (0,1) and tinyprop2<>0)

      | summarize by object_id=idmajor, index_id=idminor, index_column_id=subid, column_id=intprop, partition_ordinal=tinyprop2;

      let object_PSch=FilteredResults

      | where (table_name==''syssingleobjrefs'' and class==7)

      | summarize by object_id=depid, data_space_id=indepid;

      let partition_schemes=FilteredResults

      | where (table_name==''sysclsobjs'' and class==31 and [''type'']==''PS'')

      | summarize by data_space_name=name, data_space_id=id;

      let PSch_PFunc=FilteredResults

      | where (table_name==''syssingleobjrefs'' and class==31)

      | summarize by data_space_id=depid, function_id=indepid;

      let partition_functions=FilteredResults

      | where (table_name==''sysclsobjs'' and class==30)

      | summarize by function_name=name, function_id=id, boundary_value_on_right=status, partition_count=intprop;

      let columns=FilteredResults

      | where (table_name==''syscolpars'')

      | summarize by object_id=id, column_id=colid, column_name=name;

      let partition_details=partition_columns

      | join kind=inner (object_PSch) on object_id

      | join kind=inner (partition_schemes) on data_space_id

      | join kind=inner (PSch_PFunc) on data_space_id

      | join kind=inner (partition_functions) on function_id

      | join kind=inner (columns) on object_id, column_id

      | project object_id, index_id, column_id, column_name, partition_ordinal, data_space_id, data_space_name, function_id, function_name, boundary_value_on_right, partition_count;

      let clustred_index_columns=index_columns

      | join kind=inner (columns) on object_id, column_id

      | sort by object_id asc, index_id asc, key_ordinal asc

      | summarize index_columns=makeset(todynamic(iif(is_descending_key==0,strcat(''['',column_name, ''] asc''),strcat(''['',column_name, ''] desc'')))) by object_id, index_id

      | summarize by object_id, index_id, index_columns=tostring(index_columns)

      | project object_id, index_id, index_columns=replace(@'','','', '',replace(@''^\['','''',replace(@''\]$'','''',translate(''"'','''',tostring(index_columns)))));

      let db_user_tables = materialize('
- id: DB-availability-185
  Topic: CCI_SOP0005%2DSlow%2Ddeletes%2Dcaused%2Dby%2Dlarge%2Dmapping%2Dindex
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/StorageEngine/CCI_SOP0005%2DSlow%2Ddeletes%2Dcaused%2Dby%2Dlarge%2Dmapping%2Dindex.md
