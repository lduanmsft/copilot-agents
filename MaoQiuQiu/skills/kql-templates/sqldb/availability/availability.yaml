- id: DB-availability-112
  Topic: Redo-Lag-Analysis
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Sterling-HA-Replicas/Redo-Lag-Analysis.md
  Prompts:
  - SQL DB recovery trace activity
  - SQL DB MonRecoveryTrace event AppName TIMESTAMP
  - SQL DB investigate recovery trace
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRecoveryTrace
    ExecutedQuery: 'MonRecoveryTrace

      | where TIMESTAMP between (_bc_startTime .. _bc_endTime)

      | where AppName == _bc_app

      | where event == "database_recovery_trace"

