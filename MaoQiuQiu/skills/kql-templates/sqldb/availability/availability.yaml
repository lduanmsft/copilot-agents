    ExecutedQuery: 'MonSQLSystemHealth

      | where TIMESTAMP > ago(7d)

      | where AppName == appName

      | where NodeName == nodeName

      | where message contains "sp_vldb_snapshot_foreign_file"

      | extend endLSN = extract(''EndLSN = ([\\w\\d]+:[\\w\\d]+:[\\w\\d]+)'', 1, message)

      | extend snapshotContainsMinLSN = iff(isnotempty(endLSN) and strcmp(endLSN, minLSN) > 0, "Yes", "-")

      | parse kind = regex message with ".*?x-ms-meta-EndTime = " endTime:datetime

      | where isnotempty(endTime) or snapshotContainsMinLSN == "Yes"

      | project TIMESTAMP, message, endLSN, snapshotContainsMinLSN'
- id: DB-availability-368
  Topic: Soc066-Page-Server-Snapshot%2DBased-Corruption-Detection-(SBCD)-triggered
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc066-Page-Server-Snapshot%2DBased-Corruption-Detection-(SBCD)-triggered.md
  Prompts:
  - SQL DB socrates analysis
  - SQL DB socrates event AppName NodeName TIMESTAMP
  - SQL DB investigate toscalar
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocrates
    ExecutedQuery: 'let appName = "{AppName}";

      let nodeName = "DB_HS2.19";

      let rollbackLSN = "0000654B:000037D8:0119";

      // Find the closest BSN corresponding to the rollback LSN

      //

      let rollbackBSN = toscalar(MonSocrates

      | where TIMESTAMP > ago(1d)

      | where AppName == appName

      | where NodeName == nodeName

      | where event == "rbio_redo_log_progress"

      | project originalEventTimestamp, NodeName, current_bsn, current_lsn

      | order by originalEventTimestamp desc

      | where strcmp(rollbackLSN, current_lsn) > 0

      | take 1

      | project current_bsn);'
- id: DB-availability-369
  Topic: Soc066-Page-Server-Snapshot%2DBased-Corruption-Detection-(SBCD)-triggered
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc066-Page-Server-Snapshot%2DBased-Corruption-Detection-(SBCD)-triggered.md
  Prompts:
  - SQL DB socrates analysis
  - SQL DB MonSocrates event AppName NodeName TIMESTAMP
  - SQL DB investigate socrates
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocrates
    ExecutedQuery: 'MonSocrates

      | where TIMESTAMP > ago(1d)

      | where AppName == appName

      | where NodeName == nodeName

      | where event == "rbio_redo_log_progress"

      | project originalEventTimestamp, NodeName, current_bsn, current_lsn

      | order by originalEventTimestamp desc

      | take 1

      | extend diffInGBs = (current_bsn - rollbackBSN) * 512.0 / (1024.0 * 1024.0 * 1024.0)

      | project diffInGBs'
