      (deleted_rows > 100 * 1024) or total_rows - deleted_rows == 0)

      | extend DisqualifiedByDictFromReorg = toint(total_rows < pow(2,20)*0.9 and trim_reason_desc == ''DICTIONARY_SIZE'')

      | extend DisqualifiedByNotMeetingDelFromReorg = toint((deleted_rows < 100 * 1024) and total_rows - deleted_rows != 0)

      | extend QualifiedForTmMerge = toint((total_rows < pow(2,20)*0.1 and trim_reason_desc != ''DICTIONARY_SIZE'') or

      (deleted_rows > 300 * 1024) or total_rows - deleted_rows == 0)

      | summarize

      RowGroupCount=count()

      ,RgCntQualifiedForReorg=sum(QualifiedForReorg)

      ,RgCntDisqualifiedByDictFromReorg=sum(DisqualifiedByDictFromReorg)

      ,RgCntDisqualifiedByNotMeetingDelFromReorg=sum(DisqualifiedByNotMeetingDelFromReorg)

      ,RgCntQualifiedForTmMerge = sum(QualifiedForTmMerge)

      ,tot_rows=sum(total_rows)

      ,AvgRowCountPerRg=round(avg(total_rows-deleted_rows),2)

      ,MaxRowCount=max(total_rows-deleted_rows)

      ,tot_deleted_rows=sum(deleted_rows)

      ,del_perc=round(sum(deleted_rows)*100.0/sum(total_rows), 2)

      by schema_name, table_name'
