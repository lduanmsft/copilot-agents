- id: DB-availability-726
  Topic: Soc110.3-Long-Waits-of-Type-WAIT_REDO_CATCHUP
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc110--IO-requests-taking-longer/Soc110.3-Long-Waits-of-Type-WAIT_REDO_CATCHUP.md
  Prompts:
  - SQL DB primary replica status
  - SQL DB MonDmDbHadrReplicaStates AppName NodeName
  - SQL DB investigate primary replica
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbHadrReplicaStates
    ExecutedQuery: 'MonDmDbHadrReplicaStates

      | where TIMESTAMP between (start .. end)

      | where is_local == 1

      | summarize PrimaryLsn = minif(last_hardened_lsn, is_primary_replica == 1), MostBehindSecondaryLsn = minif(last_hardened_lsn, is_primary_replica == 0) by bin(TIMESTAMP, 1m), AppName

      ) on AppName

      | where TIMESTAMP between( (redo_progress_timestamp - 31s) .. (redo_progress_timestamp + 31s))

      | extend vlfsSinceBaseVlfPrimaryLsn = toint(substring(PrimaryLsn, 0, strlen(PrimaryLsn)-15)) - first_vlf

      | extend vlfsSinceBaseVlfMostBehindSecondaryLsn = toint(substring(MostBehindSecondaryLsn,  0, strlen(MostBehindSecondaryLsn)-15)) - first_vlf

      | extend OffsetPrimaryLsn = toint(substring(PrimaryLsn, -15, 10))

      | extend OffsetMostBehindSecondaryLsn = toint(substring(MostBehindSecondaryLsn, -15, 10))

      | extend PrimaryBsn = ((vlfsSinceBaseVlfPrimaryLsn*vlf_size_mb*1024*1024)+OffsetPrimaryLsn*512)/512

      | extend MostBehindSecondaryBsn = ((vlfsSinceBaseVlfMostBehindSecondaryLsn*vlf_size_mb*1024*1024)+OffsetMostBehindSecondaryLsn*512)/512

      | extend DistanceBehindMb = ((PrimaryBsn - current_bsn)*512)/1024/1024

      | extend LrSecondaryDistanceBehindMb = ((PrimaryBsn - MostBehindSecondaryBsn)*512)/1024/1024

      | project redo_progress_timestamp, DistanceBehindMb, current_bsn, NodeName, AppName

      | render timechart with (ysplit=panels)'
