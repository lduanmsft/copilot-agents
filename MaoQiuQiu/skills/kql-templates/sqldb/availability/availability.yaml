      | extend JobName = TestSuite

      | summarize TIMESTAMP = max(TIMESTAMP), ProbationStartUtc = max(ProbationStartUtc), ProbationEndUtc = max(ProbationEndUtc) by JobName, TestOwners

      )

      on $left.JobName == $right.JobName

