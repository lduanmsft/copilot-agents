- id: DB-availability-723
  Topic: Soc110.2-Long-IO-from-Compute-to-Log-Replica
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc110--IO-requests-taking-longer/Soc110.2-Long-IO-from-Compute-to-Log-Replica.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth error AppName AppTypeName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where originalEventTimestamp between (start .. end)

      | where AppName == appName

      | where message contains "error"

      | extend sql_error = iff(isnotempty(error_code), tostring(error_code),

      iff(message has "[ERROR]" and isnotempty(extract("ERROR\\W*\\S*", 0, message)), extract("ERROR\\W*\\S*", 0, message),

      iff(message has "Error: " and isnotempty(extract("Error: \\S*", 0, message)), extract("Error: \\S*", 0, message), message)))

      | where message !has "Error: 608" // this is a benign error for LogReplica and often just clouds results

      | project originalEventTimestamp, AppName, AppTypeName, NodeName, process_id, sql_error, message

      | summarize message = take_any(message) by bin(originalEventTimestamp, 1m), AppName, AppTypeName, NodeName, process_id, sql_error

      | summarize MinutesPresent = count(), message = take_any(message), min(originalEventTimestamp), max(originalEventTimestamp) by AppName, AppTypeName, NodeName, sql_error

      | order by MinutesPresent desc'
