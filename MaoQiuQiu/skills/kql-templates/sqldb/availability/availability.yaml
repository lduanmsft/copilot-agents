- id: DB-availability-353
  Topic: Soc062-Sterling-to-Hyperscale-Migration-Failed
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc062-Sterling-to-Hyperscale-Migration-Failed.md
  Prompts:
  - SQL DB management latency
  - SQL DB MonManagement event originalEventTimestamp
  - SQL DB troubleshoot management latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagement
    ExecutedQuery: 'MonManagement

      | where originalEventTimestamp > ago(1d)

      | where request_id == "00E3A543-4C7C-41D3-B582-25470206E51F"

      | where event == "fsm_changed_state"

      | where state_machine_type == "VldbMigrationRequestStateMachine"

      | distinct originalEventTimestamp

      , old_state

      , new_state

      , collect_current_thread_id

      | order by originalEventTimestamp asc

      | extend prev_ts = prev(originalEventTimestamp, 1)

      | extend duration_s = (originalEventTimestamp-prev_ts)/1s

      | project originalEventTimestamp

      , old_state

      , new_state

      , collect_current_thread_id

      , round(duration_s)

      , duration_m = round(duration_s/60,1)

      , duration_h = round(duration_s/3600,1)'
