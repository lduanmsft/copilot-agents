- id: DB-availability-530
  Topic: Soc001-16---Compute-PS-error-5123
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Soc001---Unhealthy-Socrates-database/Soc001-16---Compute-PS-error-5123.md
  Prompts:
  - SQL DB soc001 16 compute ps error 5123
  - SQL DB socrates AppName AppTypeName NodeName ClusterName
  - SQL DB troubleshoot soc001 16 compute ps error 5123
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocrates
    ExecutedQuery: 'let startTime = ago(30m); // start time of issue

      let endTime = now(); // end time of issue

      let appName = "{AppName}"; // compute or page server app of interest

      // ==================================================================================================================================================================

      //

      let allPSApps = MonSocrates

      | where originalEventTimestamp between (startTime .. endTime)

      | where AppName == appName

      | summarize by AppName, ClusterName;

      // ==================================================================================================================================================================

      //

      let allRBPEX5123 = MonSQLSystemHealth

      | where TIMESTAMP between (startTime .. endTime)

      | where AppTypeName == "Worker.Vldb.Storage"

      | where message has "failed with {Major=51 Minor=23 Error=5123 Severity=16 State=13}"

      | summarize count() by NodeName, ClusterName, AppName;

      // ==================================================================================================================================================================

      //

      let allNodeIds = WinFabLogs

      | where TIMESTAMP > ago(7d)

      | where TaskName == ''FM'' and EventType == ''NodeState'' and Text contains ''NodeName:''

      | extend NodeId = Id

      | extend MappedNodeName = extract(''NodeName: ([^\n\t\r ]+)'', 1, Text)

      | distinct NodeId, MappedNodeName, ClusterName;

      // ==================================================================================================================================================================

      //

      let allAuxReports = WinFabLogs

      | where ETWTimestamp between(startTime .. endTime)

      | where TaskName has "PLB"

      | where EventType in("UpdateLoadOnNode")

      | extend IDSUInt=extract(''InstanceDiskSpaceUsed:(.*) on node'', 1, Text, typeof(int))

      | extend NodeId = extract(''on node (.*)'', 1, Text, typeof(string))

      | extend partitionrole = extract(''for role (.*) with'', 1, Text, typeof(string))

      | extend metricName = extract(''with (.*):'', 1, Text, typeof(string))

      | extend partitionid = Id

      | where metricName has "InstanceDiskSpaceUsed"

      | summarize roles = make_set(partitionrole), max(IDSUInt) by ClusterName, NodeId, partitionid

      | where set_has_element(roles, ''Auxiliary'') and array_length(roles) > 1;

      // ==================================================================================================================================================================

      //'
