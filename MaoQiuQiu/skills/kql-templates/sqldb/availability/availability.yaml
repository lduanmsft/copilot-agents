  - SQL DB MonSocrates event AppName AppTypeName NodeName
  - SQL DB investigate socrates
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSocrates
    ExecutedQuery: 'MonSocrates

      | where originalEventTimestamp between (startTime .. endTime)

      | where event == "rbio_redo_log_progress"

      | where AppName == problemPSAppName

      | where logical_db_id =~ ldbId

      | where physical_db_id == physDbId

      | summarize  max(current_bsn) by logical_db_id, AppTypeName,   foreign_file_id, AppName, physical_db_id, NodeName, bin(originalEventTimestamp, 1m)

      | project originalEventTimestamp, current_bsn = max_current_bsn, ID = strcat_delim("_", AppName, AppTypeName, NodeName))

      | extend distanceInMb = (current_bsn - StartingBSN) * 512 / 1024 / 1024

      | project-away current_bsn

      | render timechart'
