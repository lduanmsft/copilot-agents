- id: DB-availability-199
  Topic: Investigate-large-PVS-size
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/StorageEngine/Investigate-large-PVS-size.md
  Prompts:
  - SQL DB resource pool stats activity
  - SQL DB MonResourcePoolStats LogicalServerName AppName
  - SQL DB investigate resource pool stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonResourcePoolStats
    ExecutedQuery: 'MonResourcePoolStats

      | where TIMESTAMP >= ago(60min)

      | summarize arg_max(TIMESTAMP, data_storage_percent, resource_pool_storage_limit) by LogicalServerName, AppName

      | project LogicalServerName, AppName,

      pool_size_used_kb = toreal(resource_pool_storage_limit) * data_storage_percent / 100,

      pool_size_max_kb = toreal(resource_pool_storage_limit)

      ) on LogicalServerName, AppName

      | project LogicalServerName, database_id, AppName,

      db_space_left = strcat(

      round(sum_data_size_max_kb/1024.0/1024.0, 1) , ''GB - '',

      round(sum_data_size_used_kb/1024.0/1024.0, 1), ''GB = '',

      round((sum_data_size_max_kb - sum_data_size_used_kb)/1024.0/1024.0, 1), ''GB''),

      pool_space_left = strcat(

      round(pool_size_used_kb/1024.0/1024.0, 1), ''GB / '',

      round(pool_size_max_kb/1024.0/1024.0, 1) , ''GB = '',

      round((pool_size_max_kb - pool_size_used_kb)/1024.0/1024.0, 1), ''GB'')'
