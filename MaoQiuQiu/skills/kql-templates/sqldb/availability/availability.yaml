  Topic: TRDB0102-Quorum-Loss
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/Common-Unavailability-Root-Causes/TRDB0102-Quorum-Loss.md
  Prompts:
  - SQL DB primary replica status
