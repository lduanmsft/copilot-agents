- id: DB-availability-23
  Topic: TRDB0105-Deployment--blocker
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/HA/TRDB0105-Deployment--blocker.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB MonCapacityTenantSnapshot NodeName ClusterName
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCapacityTenantSnapshot
    ExecutedQuery: 'MonCapacityTenantSnapshot

      | where TIMESTAMP > ago(1d) and TIMESTAMP < now()

      | where is_paas_v2_multi_az == 1

      | where tenant_ring_name contains "tr"

      | distinct ClusterName = tenant_ring_name

      | extend is_paasv2 = 1

      | union

      (MonDmDbHadrReplicaStates

      | where TIMESTAMP > ago(1d) and TIMESTAMP < now()

      | where NodeName contains "hs"

      | where ClusterName contains "tr"

      | distinct ClusterName

      | extend is_paasv2 = 0

      )

      ) on ClusterName'
