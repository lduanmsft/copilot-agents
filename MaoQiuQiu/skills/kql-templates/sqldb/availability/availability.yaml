  - TableName: MonCapacityTenantSnapshot
    ExecutedQuery: 'MonCapacityTenantSnapshot

      | where TIMESTAMP between (ago(1d)..now()) // use the same time window as above

      | extend is_SQLDB_non_isolated = iff(isempty(placement_affinity_tag) and isempty(capacity_tag) and placement_preference_tag_isolation_flag != 1, 1, 0)

      | where is_SQLDB_non_isolated == 1

      | summarize arg_max(TIMESTAMP, *) by tenant_ring_name;'
- id: DB-availability-769
  Topic: Identify-Bad-SSDs
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Useful-Commands/Identify-Bad-SSDs.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB LogContainerSnapshot ClusterName TIMESTAMP
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: LogContainerSnapshot
    ExecutedQuery: 'MonCapacityTenantSnapshot

      | where TIMESTAMP between ((startTime - 15m) ..(endTime + 15m))

      | summarize by tenant_ring_name, hosted_service_subscription_id

      | where tenant_ring_name contains ClusterName

      | join kind=inner(

      cluster(''azurecm'').database(''AzureCM'').LogContainerSnapshot

      | where TIMESTAMP between (startTime..endTime)

      | summarize by subscriptionId, tenantName, containerId, roleInstanceName, nodeId

      ) on $left.hosted_service_subscription_id == $right.subscriptionId

      | project tenantName, roleInstanceName, nodeId, containerId, tenant_ring_name, subscriptionId

      | join kind=leftouter (

      cluster(''azurecm'').database(''AzureCM'').LogRoleInstanceSnapshot

      | where TIMESTAMP between (startTime..endTime)

      | summarize arg_max(TIMESTAMP, *) by containerId, roleInstanceName

      ) on $left.roleInstanceName == $right.roleInstanceName and $left.containerId == $right.containerId

      | project tenant_ring_name, tenantName, nodeId, containerId, roleInstanceName, updateDomain, faultDomain, roleState

      | where roleInstanceName == RoleInstanceName'
- id: DB-availability-770
  Topic: Identify-Bad-SSDs
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Useful-Commands/Identify-Bad-SSDs.md
  Prompts:
  - SQL DB vma agent ping activity
  - SQL DB VMAAgentPing ClusterName TIMESTAMP endTime
  - SQL DB investigate vma agent ping
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: VMAAgentPing
    ExecutedQuery: 'let startTime =  ago({TimeRange});

      let endTime =  now();

      let NodeName = "{NodeName}";

      let ClusterName = "{ClusterName}";

      let RoleInstanceName = replace_string(NodeName, ''.'', ''_IN_'');

      cluster(''vmainsight'').database(''vmadb'').VMAAgentPing

      | where TIMESTAMP between (startTime .. endTime) and HostingService == "SQLProd"

      | summarize VMAMinTimestamp = min(TIMESTAMP), VMAMaxTimestamp = max(TIMESTAMP)

      by CustomerCluster, Cluster, ContainerId, NodeId, RoleInstance

      | where ClusterName == CustomerCluster and RoleInstanceName == RoleInstance'
- id: DB-availability-771
  Topic: Identify-Bad-SSDs
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Hyperscale-TSGs/Useful-Commands/Identify-Bad-SSDs.md
  Prompts:
  - SQL DB dcm inventory component disk history analysis
  - SQL DB dcmInventoryComponentDiskHistory NodeId
  - SQL DB investigate dcm inventory component disk history
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: dcmInventoryComponentDiskHistory
    ExecutedQuery: 'let startTime = ago({TimeRange});

      let endTime = now();

      cluster(''sparklefollower.centralus'').database(''AzureDCMDb'').dcmInventoryComponentDiskHistory

      | where DataCollectedOn between (startTime .. endTime)

      | where Description !in ("Microsoft Virtual Disk")

      | where SystemDrive != true

      | where NodeId == "1b060abc-2417-4f63-98db-52ad8b8574b9"

      | distinct DriveProductId, HardwareId, FirmwareRevision, NodeId'
