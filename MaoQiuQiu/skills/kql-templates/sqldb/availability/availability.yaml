      | summarize max(dirty_page_count) by bin(TIMESTAMP, 5m)'
- id: DB-availability-113
  Topic: Redo-Lag-Analysis
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Sterling-HA-Replicas/Redo-Lag-Analysis.md
  Prompts:
  - SQL DB rg history latency
  - SQL DB MonSqlRgHistory originalEventTimestamp mbs
  - SQL DB troubleshoot rg history latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where originalEventTimestamp between (varStartTime .. varEndTime)

      and AppName == "{AppName}" and NodeName == "{NodeName}"

      and type_desc == ''LOG''

      and physical_database_name =~ "{DatabaseName}"

      | project end_aggregated_sample, delta_num_of_writes, delta_num_of_bytes_written, delta_io_stall_write_ms, duration_time_ms

      | extend avg_ms = round(delta_io_stall_write_ms / (1. * delta_num_of_writes), 2)

      | extend mbs = delta_num_of_bytes_written / ( 1024 * 1024. * duration_time_ms * 0.001)

      | project end_aggregated_sample, mbs

      | render timechart'
- id: DB-availability-114
  Topic: Redo-Lag-Analysis
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Sterling-HA-Replicas/Redo-Lag-Analysis.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonSqlRgHistory event AppName end_utc_date
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      |where event == ''aggregated_workload_groups_plus_history''

      | where AppName == "{AppName}"

      | where  end_aggregated_sample > ago (15d)

      | where delta_total_cpu_usage_ms <> total_cpu_usage_ms

      | project end_utc_date = end_aggregated_sample , name = group_name , start_utc_date = start_aggregated_sample , delta_total_cpu_usage_ms,  delta_total_request_count, active_request_count = active_request_count_max , active_session_count = active_session_count_max  , delta_writes_completed_total, delta_reads_completed_total,delta_log_bytes_used_total, delta_log_temp_db_bytes_used_total, used_databasepages_kb = 0    , physical_database_name

      | extend duration =  (end_utc_date - start_utc_date)/time(1s)

      | extend CpuCoreUsage = (delta_total_cpu_usage_ms/1000.0)/ duration

      | project end_utc_date, CpuCoreUsage, name

      | render timechart'
- id: DB-availability-115
  Topic: Redo-Lag-Analysis
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Sterling-HA-Replicas/Redo-Lag-Analysis.md
  Prompts:
  - SQL DB recovery trace latency
  - SQL DB MonRecoveryTrace event LogicalServerName
  - SQL DB troubleshoot recovery trace latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRecoveryTrace
    ExecutedQuery: 'MonRecoveryTrace

      | where originalEventTimestamp > ago(3d)

      | where (event in (''log_redo_stats'') and log_op == ''LOP_END_CKPT'') or (event == ''recovery_force_catchup_to_lsn'')

      | where LogicalServerName == _lsn and AppName == _appName and database_id == _dbId

      | summarize page_flush_ms = sum(elapsed_time_ms), max_io_throttle_stall_ms = max(io_throttle_stall_ms), max_redone_ms = max(max_time_us)/1000.0

      by bin(originalEventTimestamp, 15m), ClusterName

      | project-away page_flush_ms //optional, allows you to view total time spent flushing pages

      | render timechart

      If your results show spikes of max_io_throttle_stall_ms around the same time you see spikes in max_redone_ms for LOP_END_CKPT redo (like below), it indicates that the IOs are being throttled while flushing for the LOP_END_CKPT redo. Ideally, there should be no io_throttle_stall_ms time at all.'
- id: DB-availability-116
  Topic: Redo-Lag-Analysis
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Sterling-HA-Replicas/Redo-Lag-Analysis.md
  Prompts:
  - SQL DB resource governance activity
  - SQL DB MonDmDbResourceGovernance AppName TIMESTAMP
  - SQL DB investigate resource governance
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmDbResourceGovernance
    ExecutedQuery: 'MonDmDbResourceGovernance

      | where TIMESTAMP  > ago(24h)

      | where AppName in (_appName)

      | summarize by checkpoint_rate_io, checkpoint_rate_mbps, primary_checkpoint_page_limit, primary_group_max_io, instance_max_log_rate, volume_managed_xstore_iops, pool_max_io, pool_max_log_rate'
- id: DB-availability-117
  Topic: Redo-Lag-Analysis
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Sterling-HA-Replicas/Redo-Lag-Analysis.md
  Prompts:
  - SQL DB rg history latency
  - SQL DB MonSqlRgHistory event AppName TIMESTAMP
  - SQL DB troubleshoot rg history latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'MonSqlRgHistory

      | where TIMESTAMP  > ago (3d)

      | where AppName in (_appName)

      | where event contains "group" and event contains "aggregated"

      | where group_name contains "checkpoint" or group_name contains "laz" or group_name contains "recovery" or group_name contains "redo"

      | project end_aggregated_sample

      , group_name

      // , delta_writes_completed_total

      //, delta_writes_queued_total

      //, delta_writes_throttled_total

      , wps = round(delta_writes_completed_total / (0.001 * duration_time_ms), 2) // delta writes / time in seconds

      , wmbps = round(delta_write_bytes_total / (0.001 * duration_time_ms * 1024 * 1024), 2)

      , mwps = round(writes_completed_total_per_second_max, 2) //

      , mwmbps = round(write_bytes_total_per_second_max / 1024 / 1024., 2)

      , delta_ios_pool_iops_delayed

      , delta_ios_group_iops_delayed

      , delta_ios_volume_iops_delayed

      , delta_ios_volume_throughput_delayed

      , delta_ios_volume_type_iops_delayed

      , delta_ios_volume_type_throughput_delayed

      , delta_ios_not_delayed

      , delta_writes_queued_total

      , delta_writes_throttled_total

      , delta_writes_completed_total'
- id: DB-availability-118
  Topic: Redo-Lag-Analysis
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Sterling-HA-Replicas/Redo-Lag-Analysis.md
