    ExecutedQuery: 'MonColumnStoreRowGroupPhysicalStats

      | where AppName has app_name and TIMESTAMP > ago(1d)

      | extend distribution=toint(substring(logical_database_name, 13, 5))

      | join kind=inner(

      dw_user_table_mappings(app_name)

      | where table_name == user_table_name)

      on $left.object_id == $right.physical_object_id and distribution

      | extend delete_perc = deleted_rows*100/total_rows

