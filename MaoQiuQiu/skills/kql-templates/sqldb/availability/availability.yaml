      // summarize sum(duration) by strcat(mode, resource_type), bin(originalEventTimestamp, 10m) | render timechart'
- id: DB-availability-108
  Topic: Redo-Lag-Analysis
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Sterling-HA-Replicas/Redo-Lag-Analysis.md
  Prompts:
  - SQL DB blocking investigation
  - SQL DB MonFabricDebug event AppName TIMESTAMP mode
  - SQL DB troubleshoot blocking investigation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonFabricDebug
    ExecutedQuery: 'MonFabricDebug

      | where AppName == "{AppName}"

      | where TIMESTAMP between(startTime..endTime)

      | where event contains "lock_redo_unblocked"

      | where mode == "SCH_M" and resource_type == "METADATA"

      | extend hex_resource_0 = tohex(resource_0)

      | where tostring(hex_resource_0) endswith "02"

      | extend MDLockType = binary_and(resource_0, 0xFF), // Value of 2 – Should indicate STATS.

      object_id_temp = binary_and(binary_shift_right(resource_0, 8), 0xFFFFFFFF) + binary_shift_left(binary_and(resource_1, 0xFF), 24),

      stats_id_temp = binary_and(binary_shift_right(resource_1, 8), 0xFFFFFFFF) + binary_shift_left(binary_and(resource_2, 0xFF), 24)

      | summarize blocking_sec = sum(duration / 1000000) by object_id_temp, stats_id_temp

      | sort by blocking_sec desc'
- id: DB-availability-109
  Topic: Redo-Lag-Analysis
  Source: TSG-SQL-DB-Availability/content/TSGs/SQL-DB-Availability-TSGs/ReadScale/Sterling-HA-Replicas/Redo-Lag-Analysis.md
  Prompts:
  - SQL DB counter one minute latency
  - SQL DB MonCounterOneMinute NodeName ClusterName
  - SQL DB troubleshoot counter one minute latency
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonCounterOneMinute
    ExecutedQuery: 'MonCounterOneMinute

      | where (NodeName == "{NodeName}" or NodeName == "{NodeName}") and ClusterName =~ "{ClusterName}"

      | where TIMESTAMP > ago(1d)

      | extend Category = case(strlen(extract(@"\\LogicalDisk\([A-Z]:\)\\Avg. Disk sec/(Read|Write)", 0, CounterName, typeof(string))) >0, "Disk", "Other")

      | where Category != "Other"

      | where CounterName contains "(S:)"

      | project TIMESTAMP, strcat(NodeName, " ", CounterName) , LatencyMs = CounterValue * 1000

      | render timechart'
