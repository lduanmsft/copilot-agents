  - id: "disconnects"
    title: "Disconnects"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
    parameters:
      - ClusterNameVar
      - NodeNameVar
      - RegionFqdn
      - SqlInstances
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          let shouldSkipAppNameFilter = iff(isnull(SqlInstances), True, False);
          range originalEventTimestamp from bin(_startTime, 1m) to _endTime step 1m
          | extend matchCol = 1
          | join kind=inner (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster == true
              | where originalEventTimestamp  between (_startTime.._endTime)
              | where isempty(ClusterNameVar) or ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where event == "process_close_connection"
              | where AppName has_any (SqlInstances) or shouldSkipAppNameFilter
              | extend endresult = iff(event =~ "process_close_connection", iff(isempty(parse_xml(extra_info)['events']), 'Success', strcat('ReadError_', parse_xml(extra_info)['events']['Error_SniRead'])), 'N/A')
              | project originalEventTimestamp, ClusterName, database_name, NodeName, AppName, event, endresult, error, kill_reason, state, package, message
              | summarize by DisconnectType = strcat(NodeName, "_", AppName, "_", error, "_", state, "_", kill_reason), matchCol =  1
          ) on matchCol
          | project originalEventTimestamp, DisconnectType
          | join kind=leftouter (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster == true
              | where originalEventTimestamp  between (_startTime.._endTime)
              | where isempty(ClusterNameVar) or ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where event == "process_close_connection"
              | where AppName has_any (SqlInstances) or shouldSkipAppNameFilter
              | extend endresult = iff(event =~ "process_close_connection", iff(isempty(parse_xml(extra_info)['events']), 'Success', strcat('ReadError_', parse_xml(extra_info)['events']['Error_SniRead'])), 'N/A')
              | project originalEventTimestamp, ClusterName, database_name, NodeName, AppName, event, endresult, error, kill_reason, state, package, message
              | summarize count() by DisconnectType = strcat(NodeName, "_", AppName, "_", error, "_", state, "_", kill_reason), bin(originalEventTimestamp, 1m)
          ) on originalEventTimestamp, DisconnectType
          | project originalEventTimestamp, DisconnectType, count_
      };
      _ExecuteForProdClusters
      | extend count_ = iff(isempty(count_), 0, count_)

