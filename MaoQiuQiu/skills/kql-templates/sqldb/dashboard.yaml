  - id: "top-5-cpu-consumer"
    title: "Top 5 CPU consumer"
    category: "css-dashboard"
    tables:
      - MonWiQdsExecStats
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let timeBucket = iff(datetime_diff('second', _endTime, _startTime) < 1000, 1s, iff(datetime_diff('minute', _endTime, _startTime) < 1000, 1m, 10m));
      let SingleCluster = (clstr: string)
      {
          let top5cpu = (cluster(clstr).database("sqlazure1").MonWiQdsExecStats
      | where LogicalServerName =~ _logicalServerName
      | where database_name =~ _databaseName or isempty(_databaseName)
      | where TIMESTAMP between (_startTime .. _endTime)
       | top-nested 5 of query_hash by sum(cpu_time) desc);
          cluster(clstr).database("sqlazure1").MonWiQdsExecStats
      | where LogicalServerName =~ _logicalServerName
      | where database_name =~ _databaseName or isempty(_databaseName)
      | where TIMESTAMP between (_startTime .. _endTime)
      | extend  LastTime=datetime_add('day',last_exec_time_date,make_datetime(1,1,1)) + totimespan(last_exec_time_time_ms),FirstTime=datetime_add('day',first_exec_time_date,make_datetime(1,1,1)) + totimespan(first_exec_time_time_ms)
      | project-reorder TIMESTAMP,elapsed_time,FirstTime,LastTime,cpu_time,query_hash,query_plan_hash,query_id,plan_id,statement_type,exec_type,logical_reads,physical_reads,logical_writes,dop,execution_count,rowcount
      | where query_hash  in (top5cpu)
      | summarize
          total_cputime = sum(cpu_time)
          ,    total_elapsed_time = sum(elapsed_time)
          by bin(originalEventTimestamp, 15m),query_hash
      };
      _ExecuteForProdClusters

