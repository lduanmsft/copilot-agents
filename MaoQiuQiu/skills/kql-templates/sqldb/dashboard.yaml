  - id: "average-total-time-ms-on-xdbhost-and-sum-lgnpoolwaittimems-o"
    title: "Average total_time_ms on xdbhost and sum LgnPoolWaitTimeMs on SQL per app"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
    parameters:
      - ClusterNameVar
      - NodeNameVar
      - RegionFqdn
      - SqlInstances
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Compute gross login results across all apps on node
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          let shouldSkipAppNameFilter = iff(isnull(SqlInstances), True, False);
          range originalEventTimestamp from bin(_startTime, 1m) to _endTime step 1m
          | where shouldRunForCluster==True
          | extend matchCol = 1
          | lookup kind=inner (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where event =~ 'process_login_finish'
              | where isnotempty(server_name) and server_name !startswith 'azuresql-probe'
              | summarize by sql_instance_name = tolower(extract('([a-f0-9]+)..*', 1, server_name)), matchCol = 1
              | where sql_instance_name in (SqlInstances) or shouldSkipAppNameFilter
              ) on matchCol
          | join kind = leftouter(cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where event =~ 'process_login_finish'
              | where isnotempty(server_name) and server_name !startswith 'azuresql-probe'
              | extend LgnPoolWaitTimeOldParser = toint(iff(AppName =~ 'Worker', 0, parse_json(strcat('{', extra_info, '}'))['LgnPoolWait']))
              | extend LgnPoolWaitTimeNewParser = toint(iff(AppName =~ 'Worker', 0, parse_xml(extra_info)['events']['Wait_LoginDispatcher']))
              | extend sql_instance_name = tolower(extract('([a-f0-9]+)..*', 1, server_name))
              | where sql_instance_name in (SqlInstances) or shouldSkipAppNameFilter
              | summarize avg_total_time_ms_xdbhost = avgif(total_time_ms, AppTypeName=~'Worker'), old_parser_sum_login_pool_wait_time_ms = sumif(LgnPoolWaitTimeOldParser, AppTypeName!~'Worker'), new_parser_sum_login_pool_wait_time_ms = sumif(LgnPoolWaitTimeNewParser, AppTypeName!~'Worker') by bin(originalEventTimestamp, 1m), sql_instance_name) on originalEventTimestamp, sql_instance_name
              | project originalEventTimestamp, sql_instance_name, avg_total_time_ms_xdbhost, old_parser_sum_login_pool_wait_time_ms, new_parser_sum_login_pool_wait_time_ms
              | extend avg_total_time_ms_xdbhost = iff(isempty(avg_total_time_ms_xdbhost), 0.0, avg_total_time_ms_xdbhost), old_parser_sum_login_pool_wait_time_ms = iff(isempty(old_parser_sum_login_pool_wait_time_ms), 0, old_parser_sum_login_pool_wait_time_ms), new_parser_sum_login_pool_wait_time_ms = iff(isempty(new_parser_sum_login_pool_wait_time_ms), 0, new_parser_sum_login_pool_wait_time_ms)
      };
      _ExecuteForProdClusters

  - id: "diff-between-received-logins-and-processed-logins-positive-n"
    title: "Diff Between Received Logins and Processed Logins(Positive/negative values indicate there is a diff)"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
      - MonXdbhost
    parameters:
      - ClusterNameVar
      - NodeNameVar
      - RegionFqdn
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Compute difference between incoming logins and processed logins on xdbhost
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          cluster(clstr).database("sqlazure1").MonXdbhost
          | where shouldRunForCluster == True
          | where originalEventTimestamp between(_startTime.._endTime)
          | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
          | where text contains "performing"
          | extend sql_instance_name = extract("Performing lookup with ServerName '([0-9a-f]+)',", 1, text)
          | summarize monxdbhostLoginReceivedCount = count() by bin(originalEventTimestamp, 1m), sql_instance_name
          | join kind = inner (
              cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster == True
              | where originalEventTimestamp between(_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where event =~ 'process_login_finish'
              | where AppName =~ 'Worker'
              | summarize count() by sql_instance_name = extract('([a-f0-9]+)..*', 1, server_name), bin(originalEventTimestamp, 1m)
          ) on originalEventTimestamp, sql_instance_name
          | project originalEventTimestamp, sql_instance_name, count_, monxdbhostLoginReceivedCount
          | join kind=rightouter (
              range originalEventTimestamp from _startTime to _endTime step 1m
              | where shouldRunForCluster == True
              | extend matchCol = 1 
              | join kind=inner (
                  cluster(clstr).database("sqlazure1").MonLogin 
                  | where shouldRunForCluster == True
                  | where originalEventTimestamp between(_startTime.._endTime) 
                  | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar) 
                  | summarize by sql_instance_name = AppName
                  | where sql_instance_name !~ 'worker' 
                  | extend matchCol = 1
              ) on matchCol
          ) on originalEventTimestamp, sql_instance_name
          | project originalEventTimestamp = originalEventTimestamp1, sql_instance_name = sql_instance_name1, count_, monxdbhostLoginReceivedCount
          | extend XDBHostLogins = iff(isempty(count_), 0, count_), monxdbhostLoginReceivedCount = iff(isempty(monxdbhostLoginReceivedCount), 0, monxdbhostLoginReceivedCount)
          | extend DiffInLogins = monxdbhostLoginReceivedCount-XDBHostLogins
          | project originalEventTimestamp, sql_instance_name, DiffInLogins
      }; 
      _ExecuteForProdClusters

