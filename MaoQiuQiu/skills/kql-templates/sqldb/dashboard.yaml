  - id: "user-cpu-usage-including-resource-stats-and-query-store"
    title: "User CPU Usage Including Resource Stats and Query Store"
    category: "css-dashboard"
    tables:
      - MonDmRealTimeResourceStats
      - MonDmRealTimeResourceStats_Sample_sec
      - MonQueryProcessing
      - MonWiQdsExecStats
      - MonWiQueryParamData
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      //User CPU normalized
      // this query will work even with SLO change.
      // there is a small window in aggInterval where both SLO will appear in same aggInterval
      // in such case cpu_cap_in_sec will be min of the SLOs
      // MonDmRealTimeResourceStats is computed to core first and then average it out because avg over avg may not be accurate
      let AggInterval = time(15m);
      let TotalMillisecondsInInterval = AggInterval / time(1millisecond); 
      let TotalMicrosecondsInInterval = AggInterval / time(1microsecond);
      let TotalSecondsInInterval = AggInterval / time(1s);
      let MonDmRealTimeResourceStats_Sample_sec = 15;
      let SingleCluster = (clstr: string)
      {
      let cap_interval     = materialize(
          cluster(clstr).database("sqlazure1").MonDmRealTimeResourceStats
          | where originalEventTimestamp between (_startTime.._endTime)
          | where LogicalServerName =~ _logicalServerName and database_name =~ _databaseName
          | summarize min(cpu_cap_in_sec) by bin (originalEventTimestamp, AggInterval));
      let ResourceStatsCPU = materialize(
          cluster(clstr).database("sqlazure1").MonDmRealTimeResourceStats
          | where originalEventTimestamp between (_startTime.._endTime)
          | where LogicalServerName =~ _logicalServerName and database_name =~ _databaseName
          | extend avg_cores=avg_cpu_percent * 0.01 * cpu_cap_in_sec * MonDmRealTimeResourceStats_Sample_sec //normalize it to cores first
          | summarize sum_cores=round(sum(avg_cores), 1) by bin(originalEventTimestamp, AggInterval)
          | extend avg_cpu_per_sec = sum_cores / TotalSecondsInInterval
          | extend Category='Total User CPU');
      let qds_execcpu      = materialize(
          cluster(clstr).database("sqlazure1").MonWiQdsExecStats
          | where originalEventTimestamp between (_startTime.._endTime)
          | where LogicalServerName =~ _logicalServerName and database_name =~ _databaseName
          | summarize avg_cpu_per_sec=sum(cpu_time) / TotalMicrosecondsInInterval by bin(originalEventTimestamp, AggInterval)
          | extend Category='Query_Exec_CPU');
      let successful_compilecpu = materialize(
          cluster(clstr).database("sqlazure1").MonWiQueryParamData
          | where originalEventTimestamp between (_startTime.._endTime)
          | where LogicalServerName =~ _logicalServerName and logical_database_name =~ _databaseName
          | summarize avg_cpu_per_sec=sum(compile_cpu_time) / TotalMicrosecondsInInterval by bin(originalEventTimestamp, AggInterval)
          | extend Category='Successful_Compile_CPU');
      let failed_compilecpu = materialize(
          cluster(clstr).database("sqlazure1").MonQueryProcessing 
          | where originalEventTimestamp between (_startTime.._endTime)
          | where LogicalServerName =~_logicalServerName and logical_database_name =~ _databaseName
          | where event =~ 'failed_compilation' 
          | summarize avg_cpu_per_sec=sum(compile_cpu) / TotalMillisecondsInInterval by bin(originalEventTimestamp, AggInterval)
          | extend Category='Failed_Compile_CPU'); 
      union kind=outer ResourceStatsCPU, qds_execcpu, successful_compilecpu, failed_compilecpu
      | lookup kind=inner (cap_interval) on originalEventTimestamp
      | extend avg_cpu_percent=round(100.0 * avg_cpu_per_sec / min_cpu_cap_in_sec, 3)
      | project originalEventTimestamp, Category, avg_cpu_percent
      | order by originalEventTimestamp asc
      //Ring:'Prod'
      //DiagnosticType:'Data'
      //SessionId:'ca05b942-f243-4cde-a67c-e5f01caeae51'
      //RequestId:'e3956614-f7e6-40b8-8e32-7b75207b5438'
      //Client:'AzureSupportCenter'
      //QueryName:'User CPU Usage Including Resource Stats and Query Store'
      };
      _ExecuteForProdClusters

  - id: "resource-governor-resource-pool-cpu-usage"
    title: "Resource Governor Resource Pool CPU Usage"
    category: "css-dashboard"
    tables:
      - MonDmRealTimeResourceStats
      - MonSqlRgHistory
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _sqlAppName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      // aggregated_resource_pools_plus_history is captured at 15 min interval.
      // Do not use interval less than 15 min. Otherwise, it gives incorrect results.
      let aggInterval_doNOTchange = time(15m);
      let SingleCluster = (clstr: string)
      {let cap_interval = materialize(
          cluster(clstr).database("sqlazure1").MonDmRealTimeResourceStats
          | where originalEventTimestamp between (_startTime.._endTime)
          | where LogicalServerName =~ _logicalServerName and database_name =~ _databaseName
          | summarize min(cpu_cap_in_sec) by bin (originalEventTimestamp, aggInterval_doNOTchange));
      cluster(clstr).database("sqlazure1").MonSqlRgHistory
      | where originalEventTimestamp between (_startTime.._endTime)
      | where AppName has_any (_sqlAppName)
      | where event =~ 'aggregated_resource_pools_plus_history'
      | extend originalEventTimestamp = end_aggregated_sample
      | summarize
          delta_total_cpu_usage_ms = sum(delta_total_cpu_usage_ms)
          start_aggregated_sample = min(start_aggregated_sample)
          end_aggregated_sample = max(end_aggregated_sample)
          by
          originalEventTimestamp = bin(end_aggregated_sample, aggInterval_doNOTchange)
          pool_name
      | extend avg_cores_sec = delta_total_cpu_usage_ms / ((end_aggregated_sample - start_aggregated_sample) / 1ms)
      | project-away delta_total_cpu_usage_ms
      | lookup kind=leftouter (cap_interval) on originalEventTimestamp
      | extend PercentCPU = round(100.0 * avg_cores_sec / min_cpu_cap_in_sec, 3)
      | project originalEventTimestamp, pool_name, PercentCPU
      | order by originalEventTimestamp asc
      //Ring:'Prod'
      //DiagnosticType:'Data'
      //SessionId:'ca05b942-f243-4cde-a67c-e5f01caeae51'
      //RequestId:'e3956614-f7e6-40b8-8e32-7b75207b5438'
      //Client:'AzureSupportCenter'
      //QueryName:'Resource Governor Resource Pool CPU Usage'
      };
      _ExecuteForProdClusters

  - id: "workgroup-cpu-usage"
    title: "Workgroup CPU Usage"
    category: "css-dashboard"
    tables:
      - MonDmRealTimeResourceStats
      - MonSqlRgHistory
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _sqlAppName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      // Aggregate workgroup CPU usage at 15 min interval
      // Do not use interval less than 15 min. Otherwise, it gives incorrect results.
      let aggInterval_doNOTchange= time(15m);
      let SingleCluster = (clstr: string)
      {
      let cap_interval=materialize(
          cluster(clstr).database("sqlazure1").MonDmRealTimeResourceStats
          | where originalEventTimestamp between (_startTime.._endTime)
          | where LogicalServerName =~ _logicalServerName and database_name =~ _databaseName
          | summarize min(cpu_cap_in_sec) by bin (originalEventTimestamp, aggInterval_doNOTchange));
      cluster(clstr).database("sqlazure1").MonSqlRgHistory
      | where originalEventTimestamp between (_startTime.._endTime)
      | where LogicalServerName =~_logicalServerName 
      //| where db_name =~_databaseName and is_primary_replica==bool(True)
      | where AppName has_any (_sqlAppName)
      | where event =~ 'aggregated_workload_groups_plus_history'
      | extend originalEventTimestamp = end_aggregated_sample
      | summarize
          delta_total_cpu_usage_ms = sum(delta_total_cpu_usage_ms)
          start_aggregated_sample = min(start_aggregated_sample)
          end_aggregated_sample = max(end_aggregated_sample)
          by
          originalEventTimestamp = bin(end_aggregated_sample, aggInterval_doNOTchange)
          group_name
      | extend avg_cores_sec = delta_total_cpu_usage_ms / ((end_aggregated_sample - start_aggregated_sample) / 1ms)
      | lookup kind = leftouter(cap_interval) on originalEventTimestamp
      | extend PercentCPU = round(100.0 * avg_cores_sec / min_cpu_cap_in_sec, 3)
      | project originalEventTimestamp, group_name, PercentCPU
      | order by originalEventTimestamp asc
      //Ring:'Prod'
      //DiagnosticType:'Data'
      //SessionId:'ca05b942-f243-4cde-a67c-e5f01caeae51'
      //RequestId:'e3956614-f7e6-40b8-8e32-7b75207b5438'
      //Client:'AzureSupportCenter'
      //QueryName:'Workgroup CPU Usage'
      };
      _ExecuteForProdClusters

