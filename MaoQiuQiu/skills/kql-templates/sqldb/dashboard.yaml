    query: |
      // Notes： Sometimes the information was missed from MonClusterLoad.
      
      let SingleCluster = (clstr: string)
      {
      cluster(clstr).database("sqlazure1"). MonDmRealTimeResourceStats
      | where TIMESTAMP between (_startTime .. _endTime)
      | where LogicalServerName == _logicalServerName
      | where database_name != "master" //and replica_type ==0
      //| where  replica_role ==0
      | where AppTypeName != 'Worker.Vldb.Storage' and AppTypeName != 'Worker.Vldb.XLog'
      | summarize StartTime=min(TIMESTAMP), EndTime=max(TIMESTAMP) by LogicalServerName, replica_role, AppName, AppTypeName, database_name, slo_name, SubscriptionId, ClusterName, NodeName, code_package_version
      | join kind=inner(
