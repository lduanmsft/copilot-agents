  - id: "xdbhost-inst-registeration"
    title: "xdbhost inst registeration"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
      - MonXdbhost
    parameters:
      - RegionFqdn
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
      let instlist = 
      cluster(clstr).database("sqlazure1").MonLogin
          | where originalEventTimestamp  between (_startTime.._endTime)
          | where logical_server_name in (_logicalServerName) and database_name in (_databaseName)
      | where package == "xdbgateway"
      | where event == "process_login_finish"
      | extend read_only_intent = toint(login_flags / 2097152) % 2
      | extend inst = tostring(split(instance_name, ".")[0])
      | where error == 0
      | summarize by  inst
      ;    
          cluster(clstr).database("sqlazure1").MonXdbhost
          | where shouldRunForCluster == true
          | where originalEventTimestamp  between (_startTime.._endTime)
      | where text has_any (instlist) and  text has "SocketDupInstanceHash::"
      | where event == "trace_event"
      | project originalEventTimestamp, NodeName, ClusterName, process_id, text
      };
      _ExecuteForProdClusters

  - id: "gw-lookup-at-last-min-40613-10"
    title: "GW lookup at Last min 40613/10"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
    parameters:
      - RegionFqdn
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          let lastmin=
          cluster(clstr).database("sqlazure1").MonLogin
          | where shouldRunForCluster == true
          | where originalEventTimestamp  between (_startTime.._endTime)
          | where logical_server_name in (_logicalServerName) and database_name in (_databaseName)
          | where error == 40613 and state == 10
          | summarize max(originalEventTimestamp)
          | project max_originalEventTimestamp;
          let kmin =   toscalar(lastmin);
          cluster(clstr).database("sqlazure1").MonLogin
          | where shouldRunForCluster == true
          | where originalEventTimestamp  between ((kmin-1m)..kmin)
          | where logical_server_name in (_logicalServerName) and database_name in (_databaseName)
          | where event == "process_login_finish" and package == "xdbgateway"
           | summarize count(), makeset(NodeName) by ClusterName,fabric_node_name, bin(originalEventTimestamp, 5s)   
      };
      _ExecuteForProdClusters

