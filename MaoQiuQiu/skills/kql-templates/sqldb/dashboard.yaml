  - id: "maintenance-notification-history-in-last-7-days-or-in-the-ti"
    title: "Maintenance Notification History in Last 7 days or in the time range"
    category: "css-dashboard"
    tables:
      - MonRolloutProgress
    parameters:
      - _TrackingId4Maintenance
      - _endTime
      - _startTime
      - _subId
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      //let _subId ='c247899f-2417-42fb-8000-b3f316435dec';
      //let _logicalServerName = 'krazepsdb0031';
      //let _startTime = ago(7d);//datetime(2024-08-13T00:00:00Z);
      //let _endTime = now();//datetime(2024-08-15T00:00:00Z);
      let SingleCluster = (clstr: string)
      {
      cluster(clstr).database("sqlazure1").MonRolloutProgress
      | where originalEventTimestamp between  (_startTime ..  _endTime) or originalEventTimestamp >ago(7d)
      | where event == 'notification_message_trace'
      | where azure_comms_event_id =~_TrackingId4Maintenance or isempty(_TrackingId4Maintenance )
      | where notification_published_content contains "publishing the notification stage"
      | where iff(isnotempty('') and '' !contains 'event_id' , azure_comms_event_id contains "", true)
      | extend partition_id = substring(notification_published_content, indexof(notification_published_content, "partition") + strlen("partition") + 2, strlen(tostring(new_guid())))
      | extend ind_stage_1 = indexof(notification_published_content, "'", 0, -1, 1)
      | extend ind_stage_2 = indexof(notification_published_content, "'", 0, -1, 2)
      | extend stage = substring(notification_published_content, ind_stage_1 + 1, ind_stage_2 - ind_stage_1 - 1)
      | project stage, planned_deployment_window, current_deployment_window, azure_comms_event_id, partition_id
      | join kind = inner (cluster(clstr).database("sqlazure1").MonRolloutProgress
      | where originalEventTimestamp  between  (_startTime ..  _endTime)  or originalEventTimestamp >ago(7d)
      | where event == "notification_message_published"
      | where iff(isnotempty('') and '' !contains 'event_id', azure_comms_event_id contains "", true)
      | extend split(notification_published_content, 'Title: ')
      | extend notification_message=tostring(notification_published_content[1])
      | extend notification_subs = subscriptions
      | extend partition_id = substring(notification_published_content, indexof(notification_published_content, "partition") + strlen("partition") + 1, strlen(tostring(new_guid())))
      | extend split(subscriptions, ",")
      | mv-expand subscriptions
      | extend subscription_id = tostring(subscriptions)
      | where iff(isnotempty('') and '' !contains 'subscription_id', subscription_id contains "", true)
      ) on partition_id, azure_comms_event_id
      | summarize originalEventTimestamp=min(originalEventTimestamp) by azure_comms_event_id, application_type_name, subscription_id, stage, partition_id, current_deployment_window, notification_message, notification_subs,notification_id
      | extend current_deployment_window = iff(current_deployment_window contains "Z", current_deployment_window, strcat(split(current_deployment_window, '_')[0], 'Z_', split(current_deployment_window, '_')[1], 'Z'))
      | extend mw_start_time = tostring(split(current_deployment_window, '_')[0])
      | extend mw_end_time = tostring(split(current_deployment_window, '_')[1])
      | project originalEventTimestamp, azure_comms_event_id, application_type_name, subscription_id, stage, current_deployment_window, mw_start_time, mw_end_time, notification_message, notification_subs,notification_id
      | where subscription_id =~ _subId
      | project originalEventTimestamp, stage, mw_start_time, mw_end_time,azure_comms_event_id,notification_id, notification_message
      | order by originalEventTimestamp desc
      };
      _ExecuteForProdClusters

  - id: "storage-io-latency"
    title: "Storage IO Latency"
    category: "css-dashboard"
    tables:
      - MonAnalyticsDBSnapshot
      - MonSqlRgHistory
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let timeBucket = iff(datetime_diff('second', _endTime, _startTime) < 1000, 1s, iff(datetime_diff('minute', _endTime, _startTime) < 1000, 1m, 15m));
      let SingleCluster = (clstr: string)
      {
          let FileStats= cluster(clstr).database("sqlazure1").MonSqlRgHistory
          | where event =~ 'aggregated_virtual_files_io_history'
          | extend application_name = AppName
          | where originalEventTimestamp between  (_startTime .. _endTime)
          | where LogicalServerName =~_logicalServerName 
          | where is_primary_replica==bool(True)
          | where db_name =~ _databaseName or isempty(_databaseName) 
          | join kind=inner(
              cluster(clstr).database("sqlazure1").MonAnalyticsDBSnapshot
              | where  PreciseTimeStamp between  (_startTime .. _endTime)
              | where logical_server_name =~ _logicalServerName
              | where  logical_database_name =~ _databaseName or isempty(_databaseName) 
              | summarize by AppName = sql_instance_name, logical_database_id, logical_database_name
              )
              on AppName, logical_database_id
          | project-away AppName1, logical_database_id1
          | extend IOStallMsPerIO = iif(delta_num_of_reads + delta_num_of_writes > 0, delta_io_stall * 1.0 / (delta_num_of_reads + delta_num_of_writes), 0.0)
          | extend StorageReadMsPerRead = iif(delta_num_of_reads > 0, (delta_io_stall_read_ms - delta_io_stall_queued_read_ms) * 1.0 / delta_num_of_reads, 0.0)
          | extend StorageWriteMsPerWrite = iif(delta_num_of_writes > 0, (delta_io_stall_write_ms - delta_io_stall_queued_write_ms) * 1.0 / delta_num_of_writes, 0.0)
          | where type_desc != ''
          | summarize
              avg(IOStallMsPerIO)
              avg(StorageReadMsPerRead)
              avg(StorageWriteMsPerWrite)
              by bin(originalEventTimestamp, 15m), type_desc, logical_database_name
          | project
              originalEventTimestamp
              type_desc
              io_stalls = avg_IOStallMsPerIO
              storage_io_read_in_ms = avg_StorageReadMsPerRead
              storage_io_write_in_ms  = avg_StorageWriteMsPerWrite;
      FileStats
      | where type_desc =~ 'LOG'
      | project
          originalEventTimestamp
          log_io_ms = io_stalls
          log_storage_write_ms = storage_io_write_in_ms
      | join (
          FileStats
          | where type_desc =~ 'ROWS'
          | project
              originalEventTimestamp
              data_io_ms = io_stalls
              data_storage_read_ms = storage_io_read_in_ms
          )
          on originalEventTimestamp
      | project-away originalEventTimestamp1
      | order by originalEventTimestamp asc
      | render timechart
      };
      _ExecuteForProdClusters

