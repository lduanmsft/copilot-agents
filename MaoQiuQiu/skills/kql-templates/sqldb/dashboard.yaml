  - id: "data-sync-recent-errors"
    title: "Data Sync Recent Errors"
    category: "css-dashboard"
    tables:
      - MonDataSync
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
      let SyncGroupIds = (cluster(clstr).database("sqlazure1").MonDataSync
          | where Component == 'MetadataTracer'
      | where ServerName startswith _logicalServerName and DatabaseName =~ _databaseName
          | distinct SyncGroupId);
      cluster(clstr).database("sqlazure1").MonDataSync
      | where SyncGroupId in (SyncGroupIds)
      | where TIMESTAMP  between (_startTime .. _endTime)
      | where ComponentAction == 'CommandAndControlService_TaskDetails'
      | where TaskState != 'Succeeded'
      | summarize arg_min(originalEventTimestamp, *) by SyncGroupId, SyncMemberId, Level, TracingId, TaskType, TaskState, TaskFailureLog
      | summarize
          Count = count()
          LatestOccurrence = max(originalEventTimestamp)
          TaskFailureLogs = makeset(TaskFailureLog, 5)
          by SyncGroupId, TaskType, TaskState
      | project
          LatestOccurrence
          SyncGroupId
          SyncGroupName = '(Unknown)'
          TaskType
          TaskState
          Count
          TaskFailureLogs
      | order by LatestOccurrence desc
      | join kind = leftouter (datatable(TaskType: string, TaskTypeStr: string)
      [
          0, 'Refresh Schema'
          1, 'Provision'
          2, 'Sync'
          3, 'Cleanup Tombstone'
          5, 'Deprovision'
          6, 'Unregister Database'
          7, 'Reprovision'
      ]
          )
          on TaskType
      | extend TaskType = iif(strlen(TaskTypeStr) > 0, TaskTypeStr, TaskType)
      | project-away TaskTypeStr, TaskType1
      };
      _ExecuteForProdClusters

