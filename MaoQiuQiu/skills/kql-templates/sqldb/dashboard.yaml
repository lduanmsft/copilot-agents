      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          let shouldSkipAppNameFilter = iff(isnull(SqlInstances), True, False);
          let isPartitionIdProvided = iff(isnull(PartitionIds) or isempty(PartitionIds), False, True);
          let NodeSet = cluster(clstr).database("sqlazure1").MonDmDbHadrReplicaStates
                        | where shouldRunForCluster == true and isPartitionIdProvided == True
                        | where TIMESTAMP between (_startTime .. _endTime)
                        | where AppName in (SqlInstances)
                        | summarize make_set(NodeName);
          cluster(clstr).database("sqlazure1").WinFabLogs
          | where shouldRunForCluster == true and isPartitionIdProvided == True
          | where TIMESTAMP between (_startTime .. _endTime)
          | where (Id has_any (PartitionIds) or Text has_any (PartitionIds)) //and isnotempty(PartitionIds)
          | where (((TaskName == 'CRM' and EventType == 'Operation' ) or (EventType == 'FTQuorumLoss') or (EventType == 'FTQuorumRestored') or (TaskName == 'RA' and EventType == 'ReconfigurationCompleted')) and (Id has_any (PartitionIds) or Text has_any (PartitionIds))) or (((TaskName == 'Hosting' and EventType == 'HostedServiceUnexpectedTermination')
      or (TaskName == 'Hosting' and EventType == 'ProcessUnexpectedTermination')) and NodeName in (NodeSet))
          | project ETWTimestamp
                  NodeName
                  Level
                  TaskName
                  EventType
                  Text
          | sort by ETWTimestamp asc
          | limit 5000
      };
      _ExecuteForProdClusters

