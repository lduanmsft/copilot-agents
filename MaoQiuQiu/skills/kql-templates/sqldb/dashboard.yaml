  - id: "executions-over-time-for-the-top-5-queries-by-cpu-consumptio"
    title: "Executions Over Time for the Top 5 Queries by CPU Consumption"
    category: "css-dashboard"
    tables:
      - MonWiQdsExecStats
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      //Executions Over Time for the Top 5 Queries by CPU Consumption
      // To ensure the final returned result, for each query_hash, contains timestamps that are equally spaced with bin size = `QDSAggIntervalInMin`
      // (ie. there is no huge time gap when plotting the timeline graph later), the rightouter join with `top_5_with_timestamps` table is necessary.
      let QDSAggIntervalInMin = time(15m);
      let SingleCluster = (clstr: string)
      {let top_5 = materialize(
          cluster(clstr).database("sqlazure1").MonWiQdsExecStats
          | where TIMESTAMP between (_startTime .. _endTime)
          | where LogicalServerName =~ _logicalServerName
          | where database_name =~ _databaseName or isempty(_databaseName)
          | top-nested 5 of query_hash by sum(cpu_time) desc);
      let top_5_executions_counts = materialize(
          cluster(clstr).database("sqlazure1").MonWiQdsExecStats
          | where TIMESTAMP between (_startTime .. _endTime)
          | where LogicalServerName =~ _logicalServerName
          | where database_name =~ _databaseName or isempty(_databaseName)
          | lookup kind = inner (top_5) on query_hash
          | summarize TotalExecutions = sum(execution_count) by bin(originalEventTimestamp, QDSAggIntervalInMin), query_hash
          | project
              originalEventTimestamp
              query_hash
              total_executions_per_min = toreal(TotalExecutions) / (QDSAggIntervalInMin / time(1m)));
      // Create a temporary table containing rows of timestamps that are binned with size 'QDSAggIntervalInMin'.
      // The timestamps range between the smallest and the largest timestamp retrieved from 'top_5_executions_counts' table
      let timestamps = range
              originalEventTimestamp
          from bin(toscalar(top_5_executions_counts | summarize min(originalEventTimestamp)), QDSAggIntervalInMin)
          to bin(toscalar(top_5_executions_counts | summarize max(originalEventTimestamp)), QDSAggIntervalInMin)
          step QDSAggIntervalInMin;
      // CROSS JOIN. The new table will contain a new column originalEventTimestamp such that the timestamps are binned equally for each query_hash.
      // The cardinality of this new table will be 5 * NumOfRows(timestamps)
      let top_5_with_timestamps = timestamps
          | extend tmp_join_col = 1 // temporary column with a dummy value 1 for cross-join
          | join kind = inner (
              top_5
              | project query_hash
              | extend tmp_join_col = 1 // temporary column with a dummy value 1 for cross-join
              )
              on tmp_join_col
          | project query_hash, originalEventTimestamp;
      // Final results
      top_5_executions_counts
      | join kind = rightouter(top_5_with_timestamps) on query_hash, originalEventTimestamp
      | project
          originalEventTimestamp=originalEventTimestamp1
          query_hash=query_hash1
          total_executions_per_min
      | extend total_executions_per_min = case(isnull(total_executions_per_min), 0.0, total_executions_per_min) // fill missing value with 0
      | sort by originalEventTimestamp asc
      //| render timechart 
      };
      _ExecuteForProdClusters

  - id: "most-recent-elastic-pool-related-operations"
    title: "Most Recent Elastic Pool Related Operations"
    category: "css-dashboard"
    tables:
      - MonManagementOperations
      - MonManagementResourceProvider
    parameters:
      - _endTime
      - _epName
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
                          cluster(clstr).database("sqlazure1").MonManagementOperations
                      | where PreciseTimeStamp between (_startTime .. _endTime)
                      | where operation_parameters contains _logicalServerName
                      | where operation_parameters contains _epName
                      | summarize make_list(event), make_list(PreciseTimeStamp), min(PreciseTimeStamp), arg_min(operation_parameters, PreciseTimeStamp), any(operation_category)  by request_id, operation_type
                      | order by min_PreciseTimeStamp desc
                      | take 100
                      | extend ongoing_operation = array_length(list_event) == 1 and list_event[0] == 'management_operation_start'
                      | extend succeeded_operation = array_length(list_event) >= 1 and list_event contains 'management_operation_success'
                      | extend ongoing_operation = case(ongoing_operation == 0, 'False', 'True')
                      | extend succeeded_operation = case(succeeded_operation == 0, 'False', 'True')
                      | extend event_list = tostring(list_event)
                      | extend event_timestamp = tostring(list_PreciseTimeStamp)
                      | project-rename TimeStamp = min_PreciseTimeStamp
                      | project-rename operation_category = any_operation_category
                      | project-away list_event, list_PreciseTimeStamp, PreciseTimeStamp, event_timestamp
                      | project TimeStamp, operation_type, operation_parameters, request_id, ongoing_operation, succeeded_operation
                      | join kind=fullouter (
                          cluster(clstr).database("sqlazure1").MonManagementResourceProvider
                          | where PreciseTimeStamp between (_startTime .. _endTime)
                          | where request_url contains _logicalServerName
                          | where request_url contains _epName
                          | where http_verb != 'GET'
                          | summarize LatestWebApiTimeStamp=max(originalEventTimestamp) by stack_trace, correlation_id, request_id, http_verb, request_url
                          | project-rename web_api_stack_trace=stack_trace) on request_id
                      | extend TimeStamp = iff(isnull(TimeStamp), LatestWebApiTimeStamp, TimeStamp)
                      | project TimeStamp, OperationType=operation_type, OperationParameters=operation_parameters, RequestId=request_id, IsOngoingOperation=ongoing_operation, HasOperationSucceeded=succeeded_operation, WebApiStackTrace=web_api_stack_trace, CorrelationId=correlation_id, HttpVerb=http_verb, RequestUrl=request_url
                      | where (WebApiStackTrace != '' and RequestId == '') or RequestId != ''
      };
      _ExecuteForProdClusters

  - id: "maintenance-windows-change"
    title: "Maintenance Windows Change"
    category: "css-dashboard"
    tables:
      - MonManagementOperations
    parameters:
      - _endTime
      - _epName
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
          cluster(clstr).database("sqlazure1").MonManagementOperations
      | where originalEventTimestamp between(_startTime .. _endTime)
      | where operation_type == 'UpdateLogicalElasticPool' or operation_type == 'CreateLogicalElasticPool'
      | where event == 'management_operation_start'
      //| where operation_parameters contains subscription
      | where operation_parameters contains _logicalServerName and operation_parameters contains _epName
      | where operation_parameters has '<RequestedMaintConfigInternalId>' or operation_parameters has '<MaintConfigInternalId>'
      | extend InputArgumentsParsed = parse_xml(operation_parameters)['InputParameters']
      | extend MaintenanceWindow = coalesce(InputArgumentsParsed['RequestedMaintConfigInternalId'], InputArgumentsParsed['MaintConfigInternalId'])
      | project
          PreciseTimeStamp
          request_id
          operation_type
          operation_parameters
          MaintenanceWindow
      | join kind = leftouter
          (
          cluster(clstr).database("sqlazure1").MonManagementOperations
          | where originalEventTimestamp  between(_startTime .. _endTime)//remove to check for operations completing after EndTime
          | where operation_type == 'UpdateLogicalElasticPool' or operation_type == 'CreateLogicalElasticPool'
          | where event != 'management_operation_start' and event != 'management_operation_released'
          //| where operation_parameters contains subscription
          | where operation_parameters contains _logicalServerName and operation_parameters contains _epName
          | project PreciseTimeStamp, request_id, event, error_code, error_message, operation_result
          )
          on request_id 
      | extend Result = replace(@'management_operation_(.*)', @'\1', event)
      | project
          PreciseTimeStamp
          PreciseTimeStamp1
          request_id
          operation_type
          MaintenanceWindow
          Result
          error_code
          error_message
      | project-rename StartTime = PreciseTimeStamp, EndTime = PreciseTimeStamp1
      | order by StartTime asc
      };
      _ExecuteForProdClusters

  - id: "databases-in-elastic-pool-retention-14-days"
    title: "Databases in elastic pool (retention 14 days)"
    category: "css-dashboard"
    tables:
      - MonAnalyticsDBSnapshot
      - MonBillingResourcePoolStatus
      - MonBillingVldbPoolStatus
    parameters:
      - _endTime
      - _epName
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
          let logicalElasticPoolID=toscalar(
              cluster(clstr).database("sqlazure1").MonBillingResourcePoolStatus
              | where TIMESTAMP between (_startTime .. _endTime)
              | where billing_server_name =~ _logicalServerName and resource_pool_name =~ _epName
              | union (
                  cluster(clstr).database("sqlazure1").MonBillingVldbPoolStatus
                  | where TIMESTAMP between (_startTime .. _endTime)
                  | where billing_server_name =~ _logicalServerName and vldb_pool_name =~ _epName
                  | extend vldb_pool_name
                  | extend resource_pool_id = vldb_pool_id)
              | summarize argmax(TIMESTAMP, resource_pool_id)
              | project-away max_TIMESTAMP
              );
              cluster(clstr).database("sqlazure1").MonAnalyticsDBSnapshot
          | where TIMESTAMP between (_startTime .. _endTime)
          | where isnotempty(logicalElasticPoolID)
          | where logical_resource_pool_id == logicalElasticPoolID
          | summarize arg_max(TIMESTAMP, *) by logical_database_name
          | extend ResourceUri = strcat('/subscriptions/', customer_subscription_id, '/resourcegroups/', resource_group, '/providers/Microsoft.Sql/servers/', logical_server_name, '/databases/', logical_database_name)
          | project
              DatabaseName=logical_database_name
