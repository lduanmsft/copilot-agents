      | extend RequestedServiceLevelObjectiveId=tostring(ops.InputParameters.RequestedServiceLevelObjectiveId)
      | extend RequestedEdition=tostring(ops.InputParameters.RequestedEdition)
      | extend RequestedMaxSizeBytes=tostring(ops.InputParameters.RequestedMaxSizeBytes)
      | extend RequestedBackupRetentionDays=tostring(ops.InputParameters.RequestedBackupRetentionDays)
      | extend RequestedInternalBackupRetentionDays=tostring(ops.InputParameters.RequestedInternalBackupRetentionDays)
      | extend RequestedDiffBackupIntervalMinutes=tostring(ops.InputParameters.RequestedDiffBackupIntervalMinutes)
      | extend RequestedSafetyChecks=tostring(ops.InputParameters.RequestedSafetyChecks)
      | extend RequestedMinCapacity=tostring(ops.InputParameters.RequestedMinCapacity)
      | extend RequestedVldbPageServerServiceLevelObjectiveId=tostring(ops.InputParameters.RequestedVldbPageServerServiceLevelObjectiveId)
      | extend RequestedLogicalAvailabilityZone=tostring(ops.InputParameters.RequestedLogicalAvailabilityZone)
      | project PreciseTimeStamp,ClusterName,NodeName,request_id,operation_type, event, elapsed_time_total_minutes, error_code,error_severity, error_message,RequestedServiceObjectiveName
      UserRequested,RequestedCapacity,RequestedEdition,RequestedServiceLevelObjectiveId,RequestedMaxSizeBytes,RequestedBackupRetentionDays
      RequestedInternalBackupRetentionDays
      RequestedDiffBackupIntervalMinutes
      RequestedSafetyChecks
      RequestedMinCapacity
      RequestedVldbPageServerServiceLevelObjectiveId
      RequestedLogicalAvailabilityZone
      | order by PreciseTimeStamp asc
      };
