  - id: "gateway-node-ids"
    title: "Gateway Node IDs"
    category: "connectivity-dashboard"
    tables:
      - MonCapacityTenantSnapshot
      - MonLogin
    parameters:
      - ClusterNameVar
      - NodeNameVar
      - RegionFqdn
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Find apps on selected nodes
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          cluster(clstr).database("sqlazure1").MonLogin
          | where shouldRunForCluster==True
          | where originalEventTimestamp > ago(1d)
          | where ClusterName contains RegionFqdn
          | where isempty(['ClusterNameVar']) or ClusterName in (ClusterNameVar) 
          | where isempty(['NodeNameVar']) or NodeName in (NodeNameVar)
          | where AppTypeName == "Gateway"
          | where event == "process_login_finish"
          | summarize by tenant_ring_name = ClusterName, NodeName
          | extend SQLRoleInstanceName = replace(@'\.', @'_IN_', NodeName)
          | join kind = leftouter  (
              cluster(clstr).database("sqlazure1").MonCapacityTenantSnapshot
              | where TIMESTAMP > ago(3h)
              | summarize arg_max(TIMESTAMP, *) by tenant_ring_name, tenant_name
              | project TIMESTAMP, tenant_ring_name, tenant_name
          ) on $left.tenant_ring_name == $right.tenant_ring_name
      }; 
      _ExecuteForProdClusters
      | join kind=inner (
           cluster('azurecm').database('AzureCM').LogContainerSnapshot
          | where TIMESTAMP > ago(2d)
          | summarize arg_max(TIMESTAMP, *) by tenantName, roleInstanceName
      ) on $left.tenant_name == $right.tenantName and $left.SQLRoleInstanceName == $right.roleInstanceName
      | project  tenant_ring_name, Tenant, containerId, nodeId, tenantName, subscriptionId, SQLRoleInstanceName
      | summarize by tenant_ring_name, SQLRoleInstanceName, Tenant, nodeId, containerId

