  - id: "hardware-changes"
    title: "Hardware Changes"
    category: "css-dashboard"
    tables:
      - MonCapacityTenantSnapshot
      - MonDmDbResourceGovernance
      - MonDmRealTimeResourceStats
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
          let SloHardwareBasetable=(
      	    cluster(clstr).database("sqlazure1").MonDmRealTimeResourceStats
      	    | where originalEventTimestamp between (_startTime .. _endTime)
      	    | where LogicalServerName =~ _logicalServerName and database_name =~ _databaseName
      	    | where AppTypeName != 'Worker.Vldb.Storage' and AppTypeName != 'Worker.Vldb.XLog'
      	    | project originalEventTimestamp, slo_name, ClusterName
      	    | order by originalEventTimestamp asc
      	    | serialize
      	    | extend prev_slo_name = prev(slo_name), next_slo_name = next(slo_name)
      	    | extend isFirst = (slo_name != prev_slo_name)
      	    | extend isLast = (slo_name != next_slo_name)
      	    | where isFirst == true or isLast == true
      	    | extend EndTime = next(originalEventTimestamp, 1, ago(7d))
      	    | extend StartTime = originalEventTimestamp
      	    | where isFirst == true
      	    | project StartTime, EndTime, slo_name, ClusterName
      	    | lookup kind=leftouter
      	        (
      	        cluster(clstr).database("sqlazure1").MonDmDbResourceGovernance
      	        | where LogicalServerName =~ _logicalServerName and database_name =~ _databaseName
      	        | extend MaxCPUCores = case (primary_bucket_fill_rate_cpu == 0, (primary_group_max_cpu * min_cores) / 100.0, primary_bucket_fill_rate_cpu / 1000.0)
      	        | extend MaxMemoryMB = case (min_memory == 0, max_db_memory / 1024.0, min_memory / 1024.0)
      	        | extend MaxMemoryGB = round(MaxMemoryMB / 1024.0, 2)
      	        | extend MaxIOPS = primary_group_max_io
      	        | extend WorkersLimitPerDB = primary_group_max_workers
      	        | extend WorkersLimitPerPool = primary_pool_max_workers
      	        | extend SessionsLimit = max_sessions
      	        | extend MaxDbDizeGb = max_db_max_size_in_mb / 1024
      	        | extend MaxLogKbps = primary_max_log_rate / 1024.0
      	        | summarize
      	            MaxCPUCores = take_any(MaxCPUCores)
      	            MaxMemoryGB = take_any(MaxMemoryGB)
      	            MaxIOPS = take_any(MaxIOPS)
      	            MaxLogKbps = take_any(MaxLogKbps)
      	            MaxDbDizeGb = take_any(MaxDbDizeGb)
      	            WorkersLimitPerPool = take_any(WorkersLimitPerPool)
      	            WorkersLimitPerDB = take_any(WorkersLimitPerDB)
      	            SessionsLimit = take_any(SessionsLimit)
      	            DatabaseDTULimit = take_any(dtu_limit)
      	            by slo_name
      	        )
      	        on slo_name
      	    | lookup kind=leftouter 
      	       (
      	        cluster(clstr).database("sqlazure1").MonCapacityTenantSnapshot
      	        | where isnotempty(vm_size)
      	        | extend ClusterName = iff(tenant_ring_name startswith_cs 'hs', extract('hs[[:alnum:]][[:graph:]](.+)', 1, tenant_ring_name), tenant_ring_name)
      	        | summarize by vm_size = toupper(vm_size), ClusterName
      	        | extend Silicon = iff(vm_size endswith 'IAD', 'AMD', 'INTEL')
      	        //| extend Generation = extract('[G|GEN]([0-9]+)', 1, vm_size)//we don't expose this info right now.
      	        | summarize by Hardware=vm_size, Silicon, ClusterName
      	        )
      	        on ClusterName
      	    | project
      	        StartTime
      	        EndTime
      	        slo_name
      	        Hardware
      	        Silicon
      	        MaxCPUCores
      	        MaxMemoryGB
      	        MaxIOPS
      	        MaxLogKbps
      	        MaxDbDizeGb
      	        WorkersLimitPerPool
      	        WorkersLimitPerDB
      	        SessionsLimit
      	        DatabaseDTULimit
      	    | order by StartTime asc);
      let distinctSloName=toscalar(SloHardwareBasetable | summarize dcount(slo_name));
      let distinctHardware=toscalar(SloHardwareBasetable | summarize dcount(Hardware));
      SloHardwareBasetable
      | extend distinctSloName=distinctSloName
      | extend distinctHardware=distinctHardware
      };
      _ExecuteForProdClusters

  - id: "query-store"
    title: "Query Store"
    category: "css-dashboard"
    tables:
      - MonQueryStoreInfo
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
          cluster(clstr).database("sqlazure1").MonQueryStoreInfo
      | where originalEventTimestamp between (_startTime .. _endTime)
      | where LogicalServerName =~ _logicalServerName
      | where logical_database_name =~ _databaseName
      | where AppTypeName !contains 'Worker.Vldb.Storage'//filterd out hyperscale stroage node.
      | where event == 'query_store_db_settings_and_state'////event query_store_db_diagnostics happens every 60 mins.
      | extend ActualState = case (db_state_actual == 0, 'Off', db_state_actual == 1, 'ReadOnly', db_state_actual == 2, 'ReadWrite', db_state_actual == 3, 'Error', db_state_desired == 4, 'READ_CAPTURE_SECONDARY', 'Other')
      | extend DesiredState = case (db_state_desired == 0, 'Off', db_state_desired == 1, 'ReadOnly', db_state_desired == 2, 'ReadWrite', db_state_desired == 3, 'Error', db_state_desired == 4, 'READ_CAPTURE_SECONDARY', 'Other')
      | extend CaptureMode = case
                             (
                                 capture_policy_mode =~ 'x_qdsCaptureModeAuto'
                                 'Auto'
                                 capture_policy_mode =~ 'x_qdsCaptureModeAll'
                                 'All'
                                 capture_policy_mode =~ 'x_qdsCaptureModeNone'
                                 'None'
                                 capture_policy_mode =~ 'x_qdsCaptureModeCustom'
                                 'Custom'
                                 'Other'
                             )
      | top 1  by PreciseTimeStamp desc
      | project Packed=pack
                       (
                           'ActualState'
                           ActualState
                           'DesiredState'
                           DesiredState
                           'CaptureMode'
                           CaptureMode
                           'max_size_mb'
                           tostring(max_size_mb)
                           'capture_policy_execution_count'
                           tostring(capture_policy_execution_count)
                           'capture_policy_total_compile_cpu_ms'
                           tostring(capture_policy_total_compile_cpu_ms)
                           'capture_policy_total_execution_cpu_ms'
                           tostring(capture_policy_total_execution_cpu_ms)
                           'flush_interval_seconds'
                           tostring(flush_interval_seconds)
                           'interval_length_minutes'
                           tostring(interval_length_minutes)
                           'stale_query_threshold_days'
                           tostring(stale_query_threshold_days)
                           'capture_policy_stale_threshold_hours'
                           tostring(capture_policy_stale_threshold_hours)
                           'max_plans_per_query'
                           tostring(max_plans_per_query)
                           'size_based_cleanup_mode'
                           size_based_cleanup_mode
                           'wait_stats_capture_mode'
                           wait_stats_capture_mode
                           'fast_path_optimization_mode'
                           fast_path_optimization_mode
                       )
      | mvexpand Packed
      | parse tostring(Packed) with '{\x22'Property'\x22:\x22'Value'\x22}'
      | project Property, Value
      };
      _ExecuteForProdClusters

  - id: "query-store-read-only-reason"
    title: "Query Store Read-only Reason"
    category: "css-dashboard"
    tables:
      - MonQueryStoreInfo
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
      let mapping=datatable(mask:int, name:string)
      [
          65536, 'QDSMaxSizeLimitIsReached(65536)'
          131072, 'StmtHashMapMemoryLimitIsReached(131072)'
          262144, 'BufferedItemsMemoryLimitIsReached(262144)'
          524288, 'DBMaxSizeIsReached(524288)'
      ];
      cluster(clstr).database("sqlazure1").MonQueryStoreInfo
      | where  originalEventTimestamp between (_startTime.._endTime)
      | where LogicalServerName =~ _logicalServerName
      | where logical_database_name =~  _databaseName
      | where event == 'query_store_db_diagnostics'////event query_store_db_diagnostics happens every 30 mins.
      | where db_state_actual == 1//ReadOnly
      | where binary_and(query_store_read_only_reason,0x8)==0//exclude readonly secondary
      | extend current_stmt_hash_map_size_mb=current_stmt_hash_map_size_kb/1024
      | extend max_stmt_hash_map_size_mb=max_stmt_hash_map_size_kb/1024
      | extend current_buffered_items_size_mb=current_buffered_items_size_kb/1024
      | extend max_buffered_items_size_mb=max_buffered_items_size_kb/1024
      | extend current_size_mb=current_size_kb/1024
      | extend max_memory_available_mb=max_memory_available_kb/1024
      | serialize rn=row_number(), dummy=0                      
      | lookup kind=inner(mapping|extend dummy=0) on dummy
      | where binary_and(query_store_read_only_reason,mask)!=0
      | summarize ReadonlyReason=make_set(name) by rn,query_store_read_only_reason,originalEventTimestamp,capture_policy_mode,db_state_desired,undecided_query_count, current_stmt_hash_map_size_mb,max_stmt_hash_map_size_mb,current_buffered_items_size_mb,max_buffered_items_size_mb
      current_size_mb,max_size_mb,max_memory_available_mb, stale_query_threshold_days,flush_interval_seconds,interval_length_minutes
      |project originalEventTimestamp,tostring(ReadonlyReason),query_store_read_only_reason,capture_policy_mode,db_state_desired,undecided_query_count, current_stmt_hash_map_size_mb,max_stmt_hash_map_size_mb,current_buffered_items_size_mb,max_buffered_items_size_mb
      current_size_mb,max_size_mb,max_memory_available_mb, stale_query_threshold_days,flush_interval_seconds,interval_length_minutes
      |order by originalEventTimestamp desc
      };
      _ExecuteForProdClusters

  - id: "monblockedprocessreportfiltered"
    title: "MonBlockedProcessReportFiltered"
    category: "css-dashboard"
    tables:
      - MonBlockedProcessReportFiltered
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
      let blockingchain=cluster(clstr).database("sqlazure1").MonBlockedProcessReportFiltered
      | where LogicalServerName =~ _logicalServerName
      | where isempty(_databaseName) or database_name =~ _databaseName
      | where  TIMESTAMP between (_startTime .. _endTime)
      | extend monitorLoop = extract("monitorLoop=\"([0-9]+)\"", 1, blocked_process_filtered, typeof(int))
      | parse blocked_process_filtered with anystr1:string "<blocked-process>" blockee "</blocked-process>" discard1
      | parse blocked_process_filtered with anystr2:string"<blocking-process>" blocker "</blocking-process>" discard2
      | parse blockee with anystr3:string "<stackFrames>" unparsedblockeecallstack "</stackFrames>" discard3
      | parse blocker with anystr4:string "<stackFrames>" unparsedblockercallstack "</stackFrames>" discard4
      | extend blockee_session_id = extract("spid=\"([0-9]+)\"", 1, blockee, typeof(int))
      | extend blockee_status = extract("status=\"(.*?)\"", 1, blockee, typeof(string))
      | extend blockee_waittime = extract("waittime=\"([0-9]+)\"", 1, blockee, typeof(int))
      | extend blockee_trancount = extract("trancount=\"([0-9]+)\"", 1, blockee, typeof(int))
      | extend blockee_lasttranstarted = extract("lasttranstarted=\"(.*?)\"", 1, blockee, typeof(datetime))
      | extend blockee_queryhhash = extract("queryhash=\"(.*?)\"", 1, blockee, typeof(string))
      | extend blockee_isolationlevel = extract("isolationlevel=\"(.*?)\"", 1, blockee, typeof(string))
      | extend blockee_lastattention = extract("lastattention=\"(.*?)\"", 1, blockee, typeof(datetime))
      | extend blockee_lastattention = extract("lastattention=\"(.*?)\"", 1, blockee, typeof(datetime))
      | extend blockee_lastbatchstarted = extract("lastbatchstarted=\"(.*?)\"", 1, blockee, typeof(datetime))
      | extend blockee_waitresource = extract("waitresource=\"(.*?)\"", 1, blockee, typeof(string))
      | extend blocker_session_id = extract("spid=\"([0-9]+)\"", 1, blocker, typeof(int))
      | extend blocker_status = extract("status=\"(.*?)\"", 1, blocker, typeof(string))
      | extend blocker_waittime = extract("waittime=\"([0-9]+)\"", 1, blocker, typeof(int))
      | extend blocker_trancount = extract("trancount=\"([0-9]+)\"", 1, blocker, typeof(int))
      | extend blocker_lasttranstarted = extract("lasttranstarted=\"(.*?)\"", 1, blocker, typeof(datetime))
      | extend blocker_queryhhash = extract("queryhash=\"(.*?)\"", 1, blocker, typeof(string))
      | extend blocker_isolationlevel = extract("isolationlevel=\"(.*?)\"", 1, blocker, typeof(string))
      | extend blocker_lastattention = extract("lastattention=\"(.*?)\"", 1, blocker, typeof(datetime))
      | extend blocker_lastbatchstarted = extract("lastbatchstarted=\"(.*?)\"", 1, blocker, typeof(datetime))
      | extend removeunknownblockeecallstack= replace_regex(unparsedblockeecallstack, '<frame id="\\d+" address="0x[0-9A-Fa-f]+" pdb="[^"]*" age="\\d+" guid="[^"]*" module="Unknown@[^"]*" rva="[^"]*" />', "")
      | extend blockeecallstack =replace_regex(removeunknownblockeecallstack, '<frame id="\\d+" address="0x[0-9A-Fa-f]+" pdb="[^"]*" age="\\d+" guid="[^"]*" module="([^"]+)" rva="(0x[0-9A-Fa-f]+|0)" />', "\\1+\\2\n")
      | extend removeunknownblockercallstack= replace_regex(unparsedblockercallstack, '<frame id="\\d+" address="0x[0-9A-Fa-f]+" pdb="[^"]*" age="\\d+" guid="[^"]*" module="Unknown@[^"]*" rva="[^"]*" />', "")
      | extend blockercallstack =replace_regex(removeunknownblockercallstack, '<frame id="\\d+" address="0x[0-9A-Fa-f]+" pdb="[^"]*" age="\\d+" guid="[^"]*" module="([^"]+)" rva="(0x[0-9A-Fa-f]+|0)" />', "\\1+\\2\n")
      //| project PreciseTimeStamp, monitorLoop, blockee_session_id , blocker_session_id
      | order by monitorLoop asc nulls last;
      let leadblockers=blockingchain
      | join kind= rightanti (
         blockingchain
      ) on $left.monitorLoop == $right.monitorLoop and $left.blockee_session_id==$right.blocker_session_id
      | extend lead_blocker_session_id = blocker_session_id
      |  distinct monitorLoop, lead_blocker_session_id;
      leadblockers
      | join kind= inner (
          blockingchain
      ) on $left.monitorLoop == $right.monitorLoop and $left.lead_blocker_session_id==$right.blocker_session_id
      | order by TIMESTAMP asc nulls last
      | project PreciseTimeStamp,database_name, lead_blocker_session_id,  blocker_session_id, blocker_trancount, blocker_lastattention , blocker_queryhhash=toupper(blocker_queryhhash), blocker_status 
      blockee_session_id, blockee_waitresource , blockee_queryhhash=toupper(blockee_queryhhash) , blockee_waittime, blockee_status,blockeecallstack,blockercallstack,  blocked_process_filtered=toupper(blocked_process_filtered)
      //| top 20 by blockee_waittime desc
      | order by PreciseTimeStamp asc nulls last
      };
      _ExecuteForProdClusters

  - id: "qds-retention-clean-up-jobs"
    title: "QDS retention clean up jobs"
