  - id: "databaseadvisors-resume-triggered-by-database-blade"
    title: "DatabaseAdvisors - Resume triggered by database blade,"
    category: "css-dashboard"
    tables:
      - MonManagementResourceProvider
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      // One very common scenario where customers can see the database resume without any activity is due to Database Advisors. 
      // Database Advisors get invoked whenever user opens the database blade on portal. 
      // Customer can look at SQL servers blade on portal to see databases status (which one is online or paused)
      // this does not resume any database, but once customer open a database blade, it will resume the database (in case db was in paused state).
      // This is reflected as part of DatabaseAdvisors call
      let SingleCluster = (clstr: string)
      {
          cluster(clstr).database("sqlazure1").MonManagementResourceProvider
      | where originalEventTimestamp between (_startTime .. _endTime)
      | where request_url contains _logicalServerName and request_url contains _databaseName
      | where logical_database_name =~ _databaseName
      | where resource_type in ("DatabaseAdvisors") 
      | where event == "arm_operation_end"
      | project originalEventTimestamp,request_id,client_request_id,client_session_id,correlation_id,action_name,elapsed_time_milliseconds,response_code, request_url, resource_type
      };
      _ExecuteForProdClusters

