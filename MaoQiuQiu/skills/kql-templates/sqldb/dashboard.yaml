      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          let isOnlyOneAppnameSelected = iff(isnull(SqlInstances), False, iff(array_length(SqlInstances)==1, True, False));
          // let isOnlyOneNodeNameSelected = iff(isnull(NodeNameVar), False, iff(array_length(NodeNameVar)==1, True, False));
          let generateParsedDict = (cpuMask:long)
          {
              pack('Proc1', binary_and(cpuMask, 1), 'Proc2', binary_and(cpuMask, 2), 'Proc3', binary_and(cpuMask, 4), 'Proc4', binary_and(cpuMask, 8), 'Proc5', binary_and(cpuMask, 16), 'Proc6', binary_and(cpuMask, 32), 'Proc7', binary_and(cpuMask, 64), 'Proc8', binary_and(cpuMask, 128)
              'Proc9', binary_and(cpuMask, 256), 'Proc10', binary_and(cpuMask, 512), 'Proc11', binary_and(cpuMask, 1024), 'Proc12', binary_and(cpuMask, 2048),     'Proc13', binary_and(cpuMask, 4096), 'Proc14', binary_and(cpuMask, 8192), 'Proc15', binary_and(cpuMask, 16384), 'Proc16', binary_and(cpuMask, 32768)
              'Proc17', binary_and(cpuMask, 65536), 'Proc18', binary_and(cpuMask, 131072), 'Proc19', binary_and(cpuMask, 262144), 'Proc20', binary_and(cpuMask, 524288),     'Proc21', binary_and(cpuMask, 1048576), 'Proc22', binary_and(cpuMask, 2097152), 'Proc23', binary_and(cpuMask, 4194304), 'Proc24', binary_and(cpuMask, 8388608)
              'Proc25', binary_and(cpuMask, 16777216), 'Proc26', binary_and(cpuMask, 33554432), 'Proc27', binary_and(cpuMask, 67108864), 'Proc28', binary_and(cpuMask, 134217728),     'Proc29', binary_and(cpuMask, 268435456), 'Proc30', binary_and(cpuMask, 536870912), 'Proc31', binary_and(cpuMask, 1073741824), 'Proc32', binary_and(cpuMask, 2147483648)
              'Proc33', binary_and(cpuMask, 4294967296), 'Proc34', binary_and(cpuMask, 8589934592), 'Proc35', binary_and(cpuMask, 17179869184), 'Proc36', binary_and(cpuMask, 34359738368),     'Proc37', binary_and(cpuMask, 68719476736), 'Proc38', binary_and(cpuMask, 137438953472), 'Proc39', binary_and(cpuMask, 274877906944), 'Proc40', binary_and(cpuMask, 549755813888)
              'Proc41', binary_and(cpuMask, 1099511627776), 'Proc42', binary_and(cpuMask, 2199023255552), 'Proc43', binary_and(cpuMask, 4398046511104), 'Proc44', binary_and(cpuMask, 8796093022208),     'Proc45', binary_and(cpuMask, 17592186044416), 'Proc46', binary_and(cpuMask, 35184372088832), 'Proc47', binary_and(cpuMask, 70368744177664), 'Proc48', binary_and(cpuMask, 140737488355328)
              'Proc49', binary_and(cpuMask, 281474976710656), 'Proc50', binary_and(cpuMask, 562949953421312))
          };
          let generateCpuFilter = (cpuDict:dynamic, cpuGroup:string, cpuFiltersString:string)
          {
              strcat(cpuFiltersString
              iff((cpuDict.Proc1)==0, '', strcat('Processor Information(', cpuGroup, ',0);')), iff((cpuDict.Proc2)==0, '', strcat('Processor Information(', cpuGroup, ',1);')), iff((cpuDict.Proc3)==0, '', strcat('Processor Information(', cpuGroup, ',2);')), iff((cpuDict.Proc4)==0, '', strcat('Processor Information(', cpuGroup, ',3);'))
              iff((cpuDict.Proc5)==0, '', strcat('Processor Information(', cpuGroup, ',4);')), iff((cpuDict.Proc6)==0, '', strcat('Processor Information(', cpuGroup, ',5);')), iff((cpuDict.Proc7)==0, '', strcat('Processor Information(', cpuGroup, ',6);')), iff((cpuDict.Proc8)==0, '', strcat('Processor Information(', cpuGroup, ',7);'))
              iff((cpuDict.Proc9)==0, '', strcat('Processor Information(', cpuGroup, ',8);')), iff((cpuDict.Proc10)==0, '', strcat('Processor Information(', cpuGroup, ',9);')), iff((cpuDict.Proc11)==0, '', strcat('Processor Information(', cpuGroup, ',10);')), iff((cpuDict.Proc12)==0, '', strcat('Processor Information(', cpuGroup, ',11);'))
              iff((cpuDict.Proc13)==0, '', strcat('Processor Information(', cpuGroup, ',12);')), iff((cpuDict.Proc14)==0, '', strcat('Processor Information(', cpuGroup, ',13);')), iff((cpuDict.Proc15)==0, '', strcat('Processor Information(', cpuGroup, ',14);')), iff((cpuDict.Proc16)==0, '', strcat('Processor Information(', cpuGroup, ',15);'))
              iff((cpuDict.Proc17)==0, '', strcat('Processor Information(', cpuGroup, ',16);')), iff((cpuDict.Proc18)==0, '', strcat('Processor Information(', cpuGroup, ',17);')), iff((cpuDict.Proc19)==0, '', strcat('Processor Information(', cpuGroup, ',18);')), iff((cpuDict.Proc20)==0, '', strcat('Processor Information(', cpuGroup, ',19);'))
              iff((cpuDict.Proc21)==0, '', strcat('Processor Information(', cpuGroup, ',20);')), iff((cpuDict.Proc22)==0, '', strcat('Processor Information(', cpuGroup, ',21);')), iff((cpuDict.Proc23)==0, '', strcat('Processor Information(', cpuGroup, ',22);')), iff((cpuDict.Proc24)==0, '', strcat('Processor Information(', cpuGroup, ',23);'))
              iff((cpuDict.Proc25)==0, '', strcat('Processor Information(', cpuGroup, ',24);')), iff((cpuDict.Proc26)==0, '', strcat('Processor Information(', cpuGroup, ',25);')), iff((cpuDict.Proc27)==0, '', strcat('Processor Information(', cpuGroup, ',26);')), iff((cpuDict.Proc28)==0, '', strcat('Processor Information(', cpuGroup, ',27);'))
              iff((cpuDict.Proc29)==0, '', strcat('Processor Information(', cpuGroup, ',28);')), iff((cpuDict.Proc30)==0, '', strcat('Processor Information(', cpuGroup, ',29);')), iff((cpuDict.Proc31)==0, '', strcat('Processor Information(', cpuGroup, ',30);')), iff((cpuDict.Proc32)==0, '', strcat('Processor Information(', cpuGroup, ',31);'))
              iff((cpuDict.Proc33)==0, '', strcat('Processor Information(', cpuGroup, ',32);')), iff((cpuDict.Proc34)==0, '', strcat('Processor Information(', cpuGroup, ',33);')), iff((cpuDict.Proc35)==0, '', strcat('Processor Information(', cpuGroup, ',34);')), iff((cpuDict.Proc36)==0, '', strcat('Processor Information(', cpuGroup, ',35);'))
              iff((cpuDict.Proc37)==0, '', strcat('Processor Information(', cpuGroup, ',36);')), iff((cpuDict.Proc38)==0, '', strcat('Processor Information(', cpuGroup, ',37);')), iff((cpuDict.Proc39)==0, '', strcat('Processor Information(', cpuGroup, ',38);')), iff((cpuDict.Proc40)==0, '', strcat('Processor Information(', cpuGroup, ',39);'))
              iff((cpuDict.Proc41)==0, '', strcat('Processor Information(', cpuGroup, ',40);')), iff((cpuDict.Proc42)==0, '', strcat('Processor Information(', cpuGroup, ',41);')), iff((cpuDict.Proc43)==0, '', strcat('Processor Information(', cpuGroup, ',42);')), iff((cpuDict.Proc44)==0, '', strcat('Processor Information(', cpuGroup, ',43);'))
              iff((cpuDict.Proc45)==0, '', strcat('Processor Information(', cpuGroup, ',44);')), iff((cpuDict.Proc46)==0, '', strcat('Processor Information(', cpuGroup, ',45);')), iff((cpuDict.Proc47)==0, '', strcat('Processor Information(', cpuGroup, ',46);')), iff((cpuDict.Proc48)==0, '', strcat('Processor Information(', cpuGroup, ',47);'))
              iff((cpuDict.Proc49)==0, '', strcat('Processor Information(', cpuGroup, ',48);')), iff((cpuDict.Proc50)==0, '', strcat('Processor Information(', cpuGroup, ',49);')))
          };
          let cpuFilters = 
          cluster(clstr).database("sqlazure1").MonRgLoad
          | where shouldRunForCluster == true and isOnlyOneAppnameSelected == true //and isOnlyOneNodeNameSelected == true
          | where TIMESTAMP  between (_startTime.._endTime)
          | where ClusterName in (ClusterNameVar)
          | where NodeName in (NodeNameVar)
          | where application_name has_any(SqlInstances)
          | summarize by allocated_cpus
          | where isnotempty(allocated_cpus)
          | extend allocated_cpus = parse_json(allocated_cpus)
          | extend group0Cpus = allocated_cpus.Group0, group1Cpus = allocated_cpus.Group1
          | extend cpuGroup = iff(isnotempty(group0Cpus), 0, 1), cpuMask = iff(isnotempty(group0Cpus), group0Cpus, group1Cpus)
          | extend cpuDict = generateParsedDict(cpuMask)
          | extend cpuFiltersString = generateCpuFilter(cpuDict, cpuGroup, '')
          | extend cpuGroup = iff(isnotempty(group1Cpus), 1, 0), cpuMask = iff(isnotempty(group1Cpus), group1Cpus, group0Cpus)
          | extend cpuDict = generateParsedDict(cpuMask)
          | extend cpuFiltersString = generateCpuFilter(cpuDict, cpuGroup, cpuFiltersString)
          | extend cpuFiltersString = trim_end(';', tostring(cpuFiltersString))
          | extend cpuFilters = split(cpuFiltersString, ';')
          | project cpuFilters;
          cluster(clstr).database("sqlazure1").MonCounterOneMinute
