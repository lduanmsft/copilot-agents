  - id: "login-results-on-node-by-minute-sql-and-xdbhost"
    title: "Login Results on Node By Minute (SQL and XDBHost)"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
    parameters:
      - ClusterNameVar
      - NodeNameVar
      - RegionFqdn
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Compute gross login results across all apps on node
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          range originalEventTimestamp from bin(_startTime, 1m) to _endTime step 1m
          | where shouldRunForCluster==True
          | extend matchCol = 1
          | join kind=inner (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where event =~ 'process_login_finish'
              | where isnotempty(server_name) and server_name !startswith 'azuresql-probe'
              | extend LoginResult = iff(is_success == 1, 'Success', iff(is_user_error == 0 or total_time_ms > 10000, 'SystemError', 'UserError'))
              | extend LoginResult = strcat(LoginResult, '_', package, iff(is_success == 0, strcat('_', error, '/', state), ''))
              | summarize by LoginResult, matchCol = 1) on matchCol
          | join kind=leftouter (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where event =~ 'process_login_finish'
              | where isnotempty(server_name) and server_name !startswith 'azuresql-probe'
              | extend LoginResult = iff(is_success == 1, 'Success', iff(is_user_error == 0 or total_time_ms > 10000, 'SystemError', 'UserError'))
              | extend LoginResult = strcat(LoginResult, '_', package, iff(is_success == 0, strcat('_', error, '/', state), ''))
              | summarize count() by LoginResult, bin(originalEventTimestamp, 1m)) on LoginResult, originalEventTimestamp
          | extend Count = iff(isempty(count_), 0, count_)
          | project originalEventTimestamp, LoginResult, Count
      };
      _ExecuteForProdClusters

  - id: "login-results-by-app-per-minute-on-xdbhost"
    title: "Login Results By App Per Minute on XDBHost"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
    parameters:
      - ClusterNameVar
      - NodeNameVar
      - RegionFqdn
      - SqlInstances
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Compute per app login trend per minute
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          let shouldSkipAppNameFilter = iff(isnull(SqlInstances), True, False);
          range originalEventTimestamp from bin(_startTime, 1m) to _endTime step 1m
          | extend matchCol = 1
          | join kind=inner (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where event =~ 'process_login_finish' and AppName =~ 'worker'
              | where isnotempty(server_name) and server_name !startswith 'azuresql-probe'
              | extend LoginResult = iff(is_success == 1, 'Success', iff(is_user_error == 0 or total_time_ms > 10000, 'SystemError', 'UserError')), sql_instance_name = extract('([a-f0-9]+)..*', 1, server_name)
              | where sql_instance_name in (SqlInstances) or shouldSkipAppNameFilter
              | extend LoginResult = strcat(sql_instance_name, '_', NodeName, '_', LoginResult, iff(is_success == 0, strcat('_', error, '/', state), ''))
              | summarize by LoginResult, matchCol = 1) on matchCol
          | project originalEventTimestamp, LoginResult
          | join kind=leftouter (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where event =~ 'process_login_finish' and AppName =~ 'worker'
              | where isnotempty(server_name) and server_name !startswith 'azuresql-probe'
              | extend LoginResult = iff(is_success == 1, 'Success', iff(is_user_error == 0 or total_time_ms > 10, 'SystemError', 'UserError')), sql_instance_name = extract('([a-f0-9]+)..*', 1, server_name)
              | where sql_instance_name in (SqlInstances) or shouldSkipAppNameFilter
              | extend LoginResult = strcat(sql_instance_name, '_', NodeName, '_', LoginResult, iff(is_success == 0, strcat('_', error, '/', state), ''))
              | summarize count() by LoginResult, bin(originalEventTimestamp, 1m)) on originalEventTimestamp, LoginResult
              | extend Count = iff(isempty(count_), 0, count_)
          | project originalEventTimestamp, LoginResult, Count
      };
      _ExecuteForProdClusters

