  - id: "login-results"
    title: "Login Results"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
    parameters:
      - RegionFqdn
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Compute per app login trend per minute
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          range originalEventTimestamp from bin(_startTime, 1m) to _endTime step 1m
          | extend matchCol = 1
          | join kind=inner (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where event =~ 'process_login_finish'
              | where logical_server_name =~ _logicalServerName and database_name =~ _databaseName
              | extend LoginResult = iff(is_success == 1, 'Success', iff(is_user_error == 0 or total_time_ms > 10000, 'SystemError', 'UserError'))
              | extend node_name = iff(NodeRole =~ 'GW', NodeRole, NodeName)
              | extend LoginResult = strcat(AppName, '_', node_name, '_', LoginResult, iff(is_success == 0, strcat('_', error, '/', state), ''))
              | summarize by LoginResult, matchCol = 1) on matchCol
          | project originalEventTimestamp, LoginResult
          | join kind=leftouter (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where event =~ 'process_login_finish'
              | where logical_server_name =~ _logicalServerName and database_name =~ _databaseName
              | extend LoginResult = iff(is_success == 1, 'Success', iff(is_user_error == 0 or total_time_ms > 10000, 'SystemError', 'UserError'))
              | extend node_name = iff(NodeRole =~ 'GW', NodeRole, NodeName)
              | extend LoginResult = strcat(AppName, '_', node_name, '_', LoginResult, iff(is_success == 0, strcat('_', error, '/', state), ''))
              | extend LoginArrivalTime = datetime_add('millisecond', (0-total_time_ms), originalEventTimestamp)
              | summarize count() by LoginResult, originalEventTimestamp = bin(LoginArrivalTime, 1m)) on originalEventTimestamp, LoginResult
              | extend Count = iff(isempty(count_), 0, count_)
          | project originalEventTimestamp, LoginResult, Count
      };
      _ExecuteForProdClusters

  - id: "login-success-rate"
    title: "Login Success Rate"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
    parameters:
      - RegionFqdn
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Compute per app login trend per minute
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where event =~ 'process_login_finish'
              | where logical_server_name =~ _logicalServerName and database_name =~ _databaseName
              | extend LoginArrivalTime = datetime_add('millisecond', (0-total_time_ms), originalEventTimestamp)
              | summarize successfulLogins = countif(is_success == 1), systemErrors = countif(is_success == 0 and is_user_error == 0), userErrors = countif(is_success == 0 and is_user_error == 1) by LoginArrivalTime = bin(LoginArrivalTime, 1m), package
              | extend totalLogins = successfulLogins + systemErrors + userErrors
              | extend loginSuccessRate = 100.0 - (systemErrors * 100.0 / totalLogins)
              | project LoginArrivalTime, loginSuccessRate, package
      };
      _ExecuteForProdClusters

