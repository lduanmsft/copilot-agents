  - id: "monlogin-leftouter-monredirector"
    title: "Monlogin leftouter Monredirector"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
      - MonLoginTime
      - MonRedirector
      - MonRedirectorTime
      - MonXdbHost
    parameters:
      - ClusterNameVar
      - FabAliasUriVar
      - NodeNameVar
      - RegionFqdn
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      let a_fabric_alias_uri = strcat("fabric:/Alias/XDBAlias/" , _logicalServerName, "/", _databaseName); // "hsserverless-cdb/hsserverless-cdb";
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Compute incoming connection request trend from traces in MonXdbHost
      //
      let SingleCluster = (clstr: string)
      {
      let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          cluster(clstr).database("sqlazure1").MonLogin
          | where shouldRunForCluster==True
          | where TIMESTAMP between ((_startTime-1h) .. (_endTime+1h))
          | where AppName == 'Gateway'
          | where event == 'process_login_finish'
          | where ClusterName in (ClusterNameVar) and (NodeName in (NodeNameVar))
          | where fabric_alias_uri == a_fabric_alias_uri or (fabric_alias_uri startswith FabAliasUriVar and FabAliasUriVar != 'None')
          | join kind=leftouter (
              cluster(clstr).database("sqlazure1").MonRedirector
              | where shouldRunForCluster==True
              | where TIMESTAMP between ((_startTime-1h) .. (_endTime+1h))
              | where ClusterName in (ClusterNameVar) and (NodeName in (NodeNameVar))
              | where AppName == 'Gateway'
              | where event == 'sql_alias_cache_update'
              | where lookup_name == a_fabric_alias_uri or (lookup_name startswith FabAliasUriVar and FabAliasUriVar != 'None')
          )
          on $left.fabric_alias_uri == $right.lookup_name and 
          $left.connection_id == $right.connection_id
      | extend monlogin_alias_cache_version_int = tolong(lookup_alias_cache_version) - tolong(datetime(1601-01-01 00:00:00.0000000))
      monredirector_alias_cache_version = version
      aliasdb = source_uri1
      ring=extract("(.*).control",1,ClusterName)
      | extend MonLoginTime = originalEventTimestamp, MonRedirectorTime = originalEventTimestamp1
      | extend originalEventTimestamp = max_of(MonLoginTime, MonRedirectorTime)
      | extend is_hit_aliasdb = tobool(new_version)
      | project-reorder ring, originalEventTimestamp, monlogin_alias_cache_version_int, monredirector_alias_cache_version
      is_hit_aliasdb
      total_time_ms, result, proxy_override,alias_cache_type, aliasdb
      NodeName, NodeName1
      MonLoginTime, MonRedirectorTime
      connection_id, connection_id1
      fabric_instance_uri, endpoint
      fabric_alias_uri, lookup_name
      };
      _ExecuteForProdAndStageClusters

