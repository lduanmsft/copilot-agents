  - id: "crud-result-in-monmanagementoperation"
    title: "CRUD result in MonManagementOperation"
    category: "css-dashboard"
    tables:
      - MonManagementOperations
    parameters:
      - _databaseName
      - _endTime
      - _epName
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr:string)
      {
      cluster(clstr).database("sqlazure1").MonManagementOperations
      | where TIMESTAMP between (_startTime .. _endTime)
      | where event == 'management_operation_start' 
      | where operation_parameters has _logicalServerName or (operation_parameters has _logicalServerName and (operation_parameters  has _databaseName or operation_parameters has _epName))
      | extend InputParams = tostring(parse_xml(operation_parameters).InputParameters)
      | extend InputParams = iif(isempty(InputParams), operation_parameters, InputParams)
      | extend LogicalDatabaseName = parse_xml(operation_parameters).InputParameters.LogicalDatabaseName
      | extend DatabaseName = parse_xml(operation_parameters).InputParameters.DatabaseName
      | extend HubLogicalDatabaseName = parse_xml(operation_parameters).InputParameters.HubLogicalDatabaseName
      | extend HubDatabaseName = parse_xml(operation_parameters).InputParameters.HubDatabaseName
      | extend SourceDatabase = parse_xml(operation_parameters).InputParameters.SourceDatabase
      | extend TargetDatabase = parse_xml(operation_parameters).InputParameters.TargetDatabase
      | extend Database = iif(isnotempty(database_name), database_name, '')
      | extend Database = iif(isempty(Database) and isnotempty(logical_database_name), logical_database_name, Database)
      | extend Database = iif(isempty(Database) and isnotempty(LogicalDatabaseName), LogicalDatabaseName, Database)
      | extend Database = iif(isempty(Database) and isnotempty(DatabaseName), DatabaseName, Database)
      | extend Database = iif(isempty(Database) and isnotempty(HubLogicalDatabaseName), HubLogicalDatabaseName, Database)
      | extend Database = iif(isempty(Database) and isnotempty(HubDatabaseName), HubDatabaseName, Database)
      | extend Database = iif(isempty(Database) and isnotempty(TargetDatabase), TargetDatabase, Database)
      | extend Database = iif(isempty(Database) and isnotempty(SourceDatabase), SourceDatabase, Database)
      | where operation_type != 'ExecuteDatabaseVulnerabilityAssessmentScan'
      | where operation_type != 'SendEmailNotificationsV2'
      | where operation_type != 'GetPurviewScanRunInfo'
      | parse operation_parameters with * '<SubmitResourceHydration>' NotViaARM:bool '</SubmitResourceHydration>' *
      | extend NotRequestedViaARM = iif(isempty(NotViaARM),'', iif(NotViaARM == 1, 'True', 'False'))
      | project originalEventTimestamp, request_id, operation_type, operation_parameters, Database,InputParams, NotRequestedViaARM
      | join kind = leftouter
      (
      cluster(clstr).database("sqlazure1").MonManagementOperations
      | where TIMESTAMP between (_startTime .. _endTime)
      | where event != 'management_operation_start' 
      | where operation_parameters has _logicalServerName or (operation_parameters has _logicalServerName and (operation_parameters  has _databaseName or operation_parameters has _epName))
      | project originalEventTimestamp, request_id, event,error_code, error_message, operation_result
      ) on request_id 
      | extend Result=replace_regex(event, 'management_operation_(.*)', @'\1')
      | extend OutputParams = tostring(parse_xml(operation_result).OutputParameters)
      | extend OutputParams = iif(isempty(OutputParams), operation_result, OutputParams)
      | project originalEventTimestamp, originalEventTimestamp1, Database, request_id, Result, operation_type, error_code, error_message, InputParams, OutputParams, NotRequestedViaARM
      | extend Duration=originalEventTimestamp1 -originalEventTimestamp
      | project-rename StartTime = originalEventTimestamp, EndTime = originalEventTimestamp1
      | project-reorder StartTime,EndTime,Duration
      | limit 1000
      };
      _ExecuteForProdClusters

