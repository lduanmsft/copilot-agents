  - id: "overview-of-database-wait-statistics-from-mondmclouddatabase"
    title: " Overview of Database Wait Statistics from MonDmCloudDatabaseWaitStats"
    category: "css-dashboard"
    tables:
      - MonDmCloudDatabaseWaitStats
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let AggInterval=time(5m);
      let DurationInSec=AggInterval/1s;
      let SingleCluster = (clstr: string)
      {
          cluster(clstr).database("sqlazure1").MonDmCloudDatabaseWaitStats
      | where LogicalServerName =~_logicalServerName
      | where database_name =~_databaseName or isempty(_databaseName)
      | where TIMESTAMP between (_startTime .. _endTime)
      | where wait_type != 'XE_LIVE_TARGET_TVF' // This type of wait is normal and expected when XE live targets are used (such as with audit).
      | top-nested of bin(PreciseTimeStamp, AggInterval) by sum(delta_wait_time_ms) asc
          , top-nested 5 of wait_type by total_wait_time_ms_per_sec = round(sum(delta_wait_time_ms)/DurationInSec,1) desc
      | sort by PreciseTimeStamp asc nulls last
      | project PreciseTimeStamp, wait_type, total_wait_time_ms_per_sec
      };
      _ExecuteForProdClusters

  - id: "table-size-statistics-in-last-7-days-works-for-mi-as-well"
    title: "Table Size Statistics in Last 7 Days (works for MI as well)"
    category: "css-dashboard"
    tables:
      - MonDatabaseMetadata
      - MonWiDmDbPartitionStats
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
      let PartitionStats=materialize(cluster(clstr).database("sqlazure1").MonWiDmDbPartitionStats
      | where PreciseTimeStamp > ago(7d)
      | where LogicalServerName =~ _logicalServerName
      | where logical_database_name =~ _databaseName or  database_name =~ _databaseName
      | where index_id in (0,1)
      //| where logical_database_name !in ("managed_model", "model_msdb", "model_replicatedmaster", "replicatedmaster")
      | summarize used_page_count=max(used_page_count), row_count=max(row_count) by LogicalServerName, database_id, logical_database_name, object_id, index_id, partition_number, data_date=bin(TIMESTAMP, 1d));
      let FilteredResults=materialize(cluster(clstr).database("sqlazure1").MonDatabaseMetadata
      | where PreciseTimeStamp between (_startTime .. _endTime)
      | where LogicalServerName =~ _logicalServerName
      | where logical_db_name =~ _databaseName
      //| where logical_db_name !in ("managed_model", "model_msdb", "model_replicatedmaster", "replicatedmaster")
      | where (table_name=='sysclsobjs' and class==50) or (table_name=='sysschobjs' and ['type']=='U ') or (table_name=='sysidxstats' and indid in (0,1))
      | project TIMESTAMP, LogicalServerName, table_name, class, ['type'], id, name, nsid, indid, created_time, created);
      let schemas=FilteredResults
      | where (table_name=='sysclsobjs' and class==50)
      | summarize by schema_id=id, schema_name=tolower(name);
      let tables=FilteredResults
      | where (table_name=='sysschobjs' and ['type']=='U ')
      | summarize by schema_id=nsid, object_id=id, table_name=name;
      let indexes=FilteredResults
      | where (table_name=='sysidxstats' and indid in (0,1))
      | extend index_type_desc=iff(['type']==0, 'HEAP', iff(['type']==1, 'CLUSTERED', iff(['type']==5, 'CCI', tostring(['type']))))
      | summarize by object_id=id,index_id=indid,index_type=type,index_type_desc, created_time, created;
      tables
      | join kind=inner (schemas) on schema_id
      | join kind=inner (indexes) on object_id
      | join kind=inner (PartitionStats) on object_id
      | project  data_date,table_name,row_count
      };
      _ExecuteForProdClusters

