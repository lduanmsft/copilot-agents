      | extend NodeNum = iff(NodeName has '_', todouble(extract('([0-9.]+)', 1, NodeName)), todouble(extract('([0-9]+)', 1, NodeName)))
      | sort by NodeRole asc, NodeNum asc 
      | extend RowNum = row_number()
      | union (datatable (NodeName: string, RowNum: long ) ['None', 0])
      | sort by RowNum asc
      | project NodeName

  - id: "query-on-monlogin"
    title: "Query on MonLogin"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
    parameters:
