          | summarize argmax(TIMESTAMP, TracingId) by DatabaseId
          | project-rename TracingId = max_TIMESTAMP_TracingId, LatestTelemetryAt = max_TIMESTAMP
          | project-away DatabaseId);
      TracingIds
      | join kind = inner(cluster(clstr).database("sqlazure1").MonDataSync | where ComponentAction == 'MetadataTracer_Agent') on TracingId
      | extend Status = iif(originalEventTimestamp - todatetime(AgentLastAlive) > totimespan(3m), 'Offline', 'Online')
