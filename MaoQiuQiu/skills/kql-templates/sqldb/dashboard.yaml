  - id: "zr-databases-impacted-by-proxy-throttle"
    title: "ZR databases impacted by Proxy Throttle"
    category: "connectivity-dashboard"
    tables:
      - MonAnalyticsDBSnapshot
      - MonLogin
    parameters:
      - RegionFqdn
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Find apps on selected nodes
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName contains (RegionFqdn) 
              | where is_success == false and is_user_error == false and AppTypeName in ("Gateway")
              | where ['state'] == 22 and lookup_state != 10060
              | extend bucket = strcat(AppTypeName, "_", package, "_", error, "_", state)
              | summarize by gatewayfailed_serverdb = strcat(tolower(logical_server_name), "<>", tolower(database_name))//, bucket
              | join kind = inner   
              (
                  cluster(clstr).database("sqlazure1").MonAnalyticsDBSnapshot
                  | where shouldRunForCluster==True
                  | where TIMESTAMP > _startTime - time(1d)
                  | where zone_resilient == true
                  | summarize by multiazdbs_serverdb = strcat(tolower(logical_server_name), "<>", tolower(logical_database_name))
              ) on $left.gatewayfailed_serverdb == $right.multiazdbs_serverdb
              | join kind=inner (
                  cluster(clstr).database("sqlazure1").LoginOutages
                  | where TIMESTAMP between (_startTime.._endTime)
                  | extend serverdb = strcat(tolower(logical_server_name), "<>", tolower(database_name))
                  | where OutageReasonLevel1 !in ("NodeDown", "UnhealthyNode")
                  | summarize total_impact_in_seconds = sum(durationSeconds) by serverdb    
              ) on $left.gatewayfailed_serverdb == $right.serverdb
      }; 
      _ExecuteForProdClusters
      | summarize count()

