      | summarize max(TIMESTAMP) by node_name, fault_domain, upgrade_domain, ClusterName
      ) on $left.NodeName==$right.node_name and $left.ClusterName==$right.ClusterName
      |extend AvailabilityZone=tostring(split(upgrade_domain, '/')[1])
