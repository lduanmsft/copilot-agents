      //| where event =~ "xio_failed_request"
      //| where audit_name contains "SqlDbAuditing_ServerAudit"
      | extend cred_type =case
                          (
                              credential_type == 0
                              "SAS"
                              credential_type == 1
                              "SAK"
                              credential_type == 2
                              "SP"
                              credential_type == 3
                              "MSI"
                              credential_type == 5
                              "UI"
                              credential_type == 6
                              "AccessKey"
                              credential_type == -1
                              "EmptyCredential"
