  - id: "top-5-regressed-queries-by-duration-percent-increase"
    title: "Top 5 Regressed Queries by Duration Percent Increase"
    category: "css-dashboard"
    tables:
      - MonWiQdsExecStats
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let topXQueries = 5;
      let SingleCluster = (clstr: string)
      {
      let histElapsedTime = cluster(clstr).database("sqlazure1").MonWiQdsExecStats
          | extend interval_start_time_date = interval_start_time / 4294967296
          | extend interval_start_time_time = interval_start_time - 4294967296 * interval_start_time_date
          | extend qdsStatsIntervalStart = datetime(1900-1-1) + time(1d) * interval_start_time_date + time(1s) * (interval_start_time_time / 300.0)
          | where qdsStatsIntervalStart between (_startTime-7d .. _startTime)
          | where LogicalServerName =~ _logicalServerName
          | where database_name =~ _databaseName or isempty(_databaseName)
          | summarize hist_avg_elapsed_time_ms = avg(elapsed_time / execution_count / 1000.0)
              by query_hash
          | project query_hash, hist_avg_elapsed_time_ms;
      let currElapsedTime = cluster(clstr).database("sqlazure1").MonWiQdsExecStats
          | extend interval_start_time_date = interval_start_time / 4294967296
          | extend interval_start_time_time = interval_start_time - 4294967296 * interval_start_time_date
          | extend qdsStatsIntervalStart = datetime(1900-1-1) + time(1d) * interval_start_time_date + time(1s) * (interval_start_time_time / 300.0)
          | where qdsStatsIntervalStart between (_startTime .. _endTime)
          | where LogicalServerName =~ _logicalServerName
          | where database_name =~ _databaseName or isempty(_databaseName)
          | summarize
              curr_avg_elapsed_time_ms = avg(elapsed_time / execution_count / 1000.0)
              
              total_curr_execution_count = sum(execution_count)
              by query_hash
          | project query_hash, curr_avg_elapsed_time_ms, total_curr_execution_count;
      let diffPercentChange = currElapsedTime
          | join kind = inner (histElapsedTime
              )
              on query_hash
          | project
              query_hash
              curr_avg_elapsed_time_ms
              total_curr_execution_count
              hist_avg_elapsed_time_ms
              
              elapsed_time_diff_ms = (curr_avg_elapsed_time_ms - hist_avg_elapsed_time_ms)
              
              elapsed_time_pct_change = (((curr_avg_elapsed_time_ms - hist_avg_elapsed_time_ms) / hist_avg_elapsed_time_ms) * 100.0);
      diffPercentChange
      | where elapsed_time_diff_ms > 0
      | where total_curr_execution_count > 30
      | extend curr_avg_elapsed_time_ms = round(curr_avg_elapsed_time_ms, 3)
      | extend hist_avg_elapsed_time_ms = round(hist_avg_elapsed_time_ms, 3)
      | extend elapsed_time_diff_ms = round(elapsed_time_diff_ms, 3)
      | extend elapsed_time_pct_change = round(elapsed_time_pct_change, 2)
      | extend total_added_duration_sec = (elapsed_time_diff_ms * total_curr_execution_count) / 1000.0
      | project
          query_hash
          curr_avg_elapsed_time_ms
          hist_avg_elapsed_time_ms
          elapsed_time_diff_ms
          elapsed_time_pct_change
          total_added_duration_sec
      | top topXQueries by elapsed_time_pct_change desc
      };
      _ExecuteForProdClusters

