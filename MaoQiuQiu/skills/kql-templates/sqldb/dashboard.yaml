  - id: "query-128"
    title: "%"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
    parameters:
      - ClusterNameVar
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Find all nodes in selected cluster
      //
      let offset = 6h;
      let st=(_startTime-offset);
      let en=(_endTime+offset);
      let binSize = 1h;
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
              cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where TIMESTAMP between (st .. en)
              | where ClusterName in (ClusterNameVar) 
              | where AppName == 'Gateway'
              | where event == 'process_login_finish'
              // | extend extra_info_parsed = parse_xml(strcat(extra_info))
              // | extend Set_ResolveQueryDone = tolong(extra_info_parsed['events'].Set_ResolveQueryDone), Pending_UriLocationLookup = tolong(extra_info_parsed['events'].Pending_UriLocationLookup)
              // | extend isUsingCache = extra_info !contains 'Pending_UriLocationLookup' // approximation, better use Set_ResolveQueryDone
          | extend isUsingCache = extra_info !contains 'Set_ResolveQueryDone'
          | summarize percentageUseCacheOnGW=countif(isUsingCache)*100.0/cnt() by bin(TIMESTAMP, binSize), _=strcat(extract("(.*)control",1,ClusterName))  
      };
      union
      _ExecuteForProdClusters
      (
          range x from 1 to 2 step 1 
          | project TIMESTAMP=bin(iff(x % 2 == 0, st, en), binSize), _='SLA', percentageUseCacheOnGW=95.0
      )

