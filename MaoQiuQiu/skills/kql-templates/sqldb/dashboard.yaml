  - id: "node-agent-debug-trace"
    title: "Node Agent Debug Trace"
    category: "css-dashboard"
    tables:
      - MonNodeAgentEvents
    parameters:
      - _endTime
      - _requestId
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
      let AgentEvents= materialize(cluster(clstr).database("sqlazure1").MonNodeAgentEvents
      | where originalEventTimestamp  between (_startTime.._endTime)
      | where event startswith "wcf_request_"
      | where correlation_request_id =~_requestId);
      let _threadid=AgentEvents
      | distinct collect_current_thread_id;
      let StartTime=toscalar(AgentEvents
      | summarize min(originalEventTimestamp));
      let EndTime=toscalar(AgentEvents
      | summarize max(originalEventTimestamp));
      cluster(clstr).database("sqlazure1").MonNodeAgentEvents
      | where originalEventTimestamp  between (StartTime-1m..EndTime+1m)
      | where collect_current_thread_id in (_threadid)
      | project-reorder  originalEventTimestamp,collect_current_thread_id,event,event_type,stack_trace,message,exception_message
      };
      _ExecuteForProdClusters

