  - id: "mondeadlockreportsfiltered"
    title: "MonDeadlockReportsFiltered"
    category: "css-dashboard"
    tables:
      - MonDeadlockReportsFiltered
    parameters:
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
      cluster(clstr).database("sqlazure1").MonDeadlockReportsFiltered
      | where LogicalServerName =~ _logicalServerName
      | where TIMESTAMP between (_startTime .. _endTime)
      | where event == "xml_deadlock_report_filtered"
      | parse xml_report_filtered with anystr: string "<victim-list>"victim" </victim-list>" anystring "<process-list>" pslist "</process-list>" discard
      | parse pslist with anystr1: string "<executionStack>" P1executionStack "</executionStack>" anystr2: string "<stackFrames>" P1stackFrames  "</stackFrames>" anystr3: string"<executionStack>" P2executionStack "</executionStack>" anystr4: string "<stackFrames>" P2stackFrames "</stackFrames>" discard4 
      | parse pslist with anystr5: string "<process" p1 ">" anystr6: string "<process" p2 ">"  discard2
      |extend victimProcessId =  extract("victimProcess id=\"(.*?)\"", 1, victim, typeof(string))
      | extend waitresource1 = extract("waitresource=\"(.*?)\"", 1, p1, typeof(string))
      | extend waittime1 = extract("waittime=\"([0-9]+)\"", 1, p1, typeof(int))
      | extend lockTimeout1 = extract("lockTimeout=\"([0-9]+)\"", 1, p1, typeof(int))
      | extend lasttranstarted1 = extract("lasttranstarted=\"(.*?)\"", 1, p1, typeof(datetime))
      | extend lastbatchstarted1 = extract("lastbatchstarted=\"(.*?)\"", 1, p1, typeof(datetime))
      | extend lastbatchcompleted1 = extract("lastbatchcompleted=\"(.*?)\"", 1, p1, typeof(datetime))
      | extend ProcessId1 = extract("id=\"(.*?)\"", 1, p1, typeof(string))
      | extend lockMode1 = extract("lockMode=\"(.*?)\"", 1, p1, typeof(string))
      | extend clientapp1 = extract("clientapp=\"(.*?)\"", 1, p1, typeof(string))
      | extend isolationlevel1 = extract("isolationlevel=\"(.*?)\"", 1, p1, typeof(string))
      | extend queryhash1 = extract("queryhash=\"(.*?)\"", 1, P1executionStack, typeof(string))
      | extend queryplanhash1 = extract("queryplanhash=\"(.*?)\"", 1, P1executionStack, typeof(string))
      | extend spid1 = extract("spid=\"([0-9]+)\"", 1, p1, typeof(int))
      | extend currentdbname1 = extract("currentdbname=\"(.*?)\"", 1, p1, typeof(string))
      | extend ProcessId2 = extract("id=\"(.*?)\"", 1, p2, typeof(string))
      | extend waitresource2 = extract("waitresource=\"(.*?)\"", 1, p2, typeof(string))
      | extend waittime2 = extract("waittime=\"([0-9]+)\"", 1, p2, typeof(int))
      | extend queryhash2 = extract("queryhash=\"(.*?)\"", 1, P2executionStack, typeof(string))
      | extend queryplanhash2 = extract("queryplanhash=\"(.*?)\"", 1, P2executionStack, typeof(string))
      | extend lockTimeout2 = extract("lockTimeout=\"([0-9]+)\"", 1, p2, typeof(int))
      | extend lasttranstarted2 = extract("lasttranstarted=\"(.*?)\"", 1, p2, typeof(datetime))
      | extend lastbatchstarted2 = extract("lastbatchstarted=\"(.*?)\"", 1, p2, typeof(datetime))
      | extend lastbatchcompleted2 = extract("lastbatchcompleted=\"(.*?)\"", 1, p2, typeof(datetime))
      | extend lockMode2 = extract("lockMode=\"(.*?)\"", 1, p2, typeof(string))
      | extend clientapp2 = extract("clientapp=\"(.*?)\"", 1, p2, typeof(string))
      | extend isolationlevel2 = extract("isolationlevel=\"(.*?)\"", 1, p2, typeof(string))
      | extend spid2 = extract("spid=\"([0-9]+)\"", 1, p2, typeof(int))
      | extend currentdbname2 = extract("currentdbname=\"(.*?)\"", 1, p1, typeof(string))
      | extend P1removeunknown= replace_regex(P1stackFrames, '<frame id="\\d+" address="0x[0-9A-Fa-f]+" pdb="[^"]*" age="\\d+" guid="[^"]*" module="Unknown@[^"]*" rva="[^"]*" />', "")
      | extend P1callstack =replace_regex(P1removeunknown, '<frame id="\\d+" address="0x[0-9A-Fa-f]+" pdb="[^"]*" age="\\d+" guid="[^"]*" module="([^"]+)" rva="(0x[0-9A-Fa-f]+|0)" />', "\\1+\\2\n")
      | extend P2removeunknown= replace_regex(P2stackFrames, '<frame id="\\d+" address="0x[0-9A-Fa-f]+" pdb="[^"]*" age="\\d+" guid="[^"]*" module="Unknown@[^"]*" rva="[^"]*" />', "")
      | extend P2callstack =replace_regex(P2removeunknown, '<frame id="\\d+" address="0x[0-9A-Fa-f]+" pdb="[^"]*" age="\\d+" guid="[^"]*" module="([^"]+)" rva="(0x[0-9A-Fa-f]+|0)" />', "\\1+\\2\n")
      | project-reorder
          originalEventTimestamp,victimProcessId,ProcessId1,ProcessId2
          lockMode1
          spid1,queryhash1,queryplanhash1
          waitresource1
          waittime1
          lockTimeout1
          spid2
          lockMode2,queryhash2,queryplanhash2
          waitresource2
          waittime2
          lockTimeout2
          lasttranstarted1
          lastbatchstarted1
          lastbatchcompleted1
          isolationlevel1
          currentdbname1
          clientapp1
          currentdbname2
          clientapp2
          lasttranstarted2
          lastbatchstarted2
          lastbatchcompleted2
          isolationlevel2
          P1callstack
          P2callstack
          P1executionStack
          P2executionStack
          p1,p2
          pslist
      };
      _ExecuteForProdClusters

