  - id: "node-details-to-provide-other-azure-services"
    title: "Node details(To provide other Azure Services)"
    category: "css-dashboard"
    tables:
      - MonClusterLoad
      - MonFabricClusters
    parameters:
      - ClusterNameVar
      - RegionVar
      - _endTime
      - _sqlAppName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionVar)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      let sql_instance_name = iff(isnull(_sqlAppName), 'ReplaceWithAppname', iff(array_length(_sqlAppName)==1, tostring(_sqlAppName[0]), tostring(_sqlAppName[0])));
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          let ringData = cluster(clstr).database("sqlazure1").MonFabricClusters
          | where shouldRunForCluster==True
          | where TIMESTAMP between ((_startTime-1d)..(_endTime+1d))
          | where ClusterName has RegionVar
          | where name in (ClusterNameVar)
          | summarize Clusters = strcat_array(make_set(name), ', ') by SubscriptionId = tolower(hosted_service_subscription_id), is_paas_v2
          | join kind=inner(cluster(clstr).database("sqlazure1").MonClusterLoad | summarize by Clusters = ClusterName, node_name | where isnotempty(node_name)) on Clusters
          | extend roleInstanceName = iff(is_paas_v2 == 1, node_name, strcat_array(split(node_name, '.'), '_IN_'))
          | project Clusters, SubscriptionId, NodeName = node_name, roleInstanceName;
          let subs = ringData | summarize by SubscriptionId;
          cluster('azurecm.kusto.windows.net').database('AzureCM').LogContainerSnapshot 
          | where shouldRunForCluster==True
          | where subscriptionId in (subs)
          | where TIMESTAMP between ((_startTime-1d)..(_endTime+1d))
          | extend SubscriptionId = tolower(subscriptionId)
          | summarize arg_max(TIMESTAMP, *) by roleInstanceName, containerId
          | join kind=inner (ringData) on SubscriptionId, roleInstanceName
          | extend KustoCluster = tolower(clstr)
      }; 
      _ExecuteForProdClusters
      | extend NetworkingDashboardLink = strcat('https://dataexplorer.azure.com/dashboards/bea4ccac-baf1-45f3-b160-533232cbfdaa?p-_startTime=',_startTime,'&p-_endTime=',_endTime,'&p-_NodeId=v-',nodeId,'&p-_ContainerId=v-',containerId,'&p-_ICMId=v-#2f4843e6-c1e5-4564-ad27-cde71cebc7c7')
      | extend NodeIoStatsDashboardLink = strcat('https://dataexplorer.azure.com/dashboards/1c73be4a-2be6-4637-ad1d-e6f1ca75dec3?p-_startTime=',_startTime,'&p-_endTime=',_endTime,'&p-_cluster=v-',Clusters,'&p-_node=v-',NodeName,'&p-_kusto=v-',KustoCluster,'&p-_appname=v-',sql_instance_name,'#3ab050ae-2c02-47db-89fa-b4ae2282d7d5')
      | project-reorder Clusters, NodeName, roleInstanceName, containerId, nodeId, tenantName, Tenant, NetworkingDashboardLink, NodeIoStatsDashboardLink, containerType, DataCenterName, AvailabilityZone, creationTime
      | extend NodeNum = toint(extract('([0-9]+)', 1, NodeName))
      | sort by Clusters asc, NodeNum asc 
      | project-away SubscriptionId1, roleInstanceName1, KustoCluster, NodeNum

  - id: "connection-for-the-adf-pipeline-activity"
    title: "Connection For the ADF Pipeline Activity"
