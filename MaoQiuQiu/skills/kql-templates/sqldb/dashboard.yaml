  - id: "certificatewatchdog-in-monmachinelocalwatchdog"
    title: "CertificateWatchdog in MonMachineLocalWatchdog"
    category: "css-dashboard"
    tables:
      - MonMachineLocalWatchdog
    parameters:
      - ClusterNameVar
      - _endTime
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
          cluster(clstr).database("sqlazure1").MonMachineLocalWatchdog
      | where TIMESTAMP between (_startTime-7d .. _endTime)
      | where ClusterName has_any (ClusterNameVar)
      | where component == "CertificateWatchdog"
      | where message_resourcename has "LocalMachine"
      | extend new_message = message_resourcename
      | extend tokens=split(new_message, ";")
      | extend Subject=extract(@"Subject=(.*)", 1, tostring(tokens[1]))
      | extend Thumbprint=extract(@"Thumbprint=(.*)", 1, tostring(tokens[2]))
      | extend Created=extract(@"Created=(.*)", 1, tostring(tokens[3]))
      | extend Expires=extract(@"Expires=(.*)", 1, tostring(tokens[4]))
      | extend LogicalName = iff(array_length(tokens) > 4, extract(@"RegistryLogicalName=(.*)", 1, tostring(tokens[5])), "")
      | extend CertStore = iff(array_length(tokens) > 5, extract(@"CertStore=(.*)", 1, tostring(tokens[6])), "")
      | extend Key = strcat(ClusterName, "_", NodeName)
      | where LogicalName in ("ClusterCertificate", "ClusterZoneCertificate", "GatewayServerCertificate", "GatewaySqlAliasClient"
      "GatewayToServiceFabricCertificate", "RingIdentityCertificate", "SqlAliasSsl", "XdbHostTdsSslClusterCertificate")
      | extend exp = todatetime(Expires)
      | summarize count(), expire = max(exp) by Subject, LogicalName,Thumbprint, ClusterName
      };
      _ExecuteForProdClusters

