          | where TIMESTAMP between (_startTime.._endTime)
          | where LogicalServerName =~ serverName
          | where logical_database_name =~ databaseName or isempty(databaseName)
          | where is_primary_replica == 1 and is_local == 1
          | sort by TIMESTAMP asc 
          | serialize 
          | extend rowRank = row_rank_dense(replica_id)
          | summarize From = min(TIMESTAMP), To = max(TIMESTAMP) by sql_instance_name = AppName, tenant_ring_name = ClusterName, PrimaryNode = NodeName, replica_id, rowRank) on sql_instance_name, tenant_ring_name
          | project From, To, logical_database_name, tenant_ring_name, sql_instance_name, PrimaryNode, replica_id, service_level_objective, fabric_partition_id
