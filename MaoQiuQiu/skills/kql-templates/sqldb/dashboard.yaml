  - id: "existing-sync-groups-on-other-hub-databases"
    title: "Existing Sync Groups on other hub databases"
    category: "css-dashboard"
    tables:
      - MonBillingServerStatus2
      - MonDataSync
      - MonLogin
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
      let subscriptionID= toscalar(cluster(clstr).database("sqlazure1").MonLogin
      | where TIMESTAMP between (_startTime .. _endTime)
      | where LogicalServerName =~ _logicalServerName or logical_server_name =~_logicalServerName or sni_server_name  contains _logicalServerName
      | where database_name =~_databaseName or isempty(_databaseName)
      | where event == "process_login_finish"
      | where isnotempty(subscription_id)
      | take 1
      | project subscription_id);
      let check_subscription_id = (s:string)
      {
          assert(isnotempty(s), "Subscription Id is empty") and
          assert(tobool(strcmp(s,'00000000-0000-0000-0000-000000000000')), "Subscription Id is empty 00000000-0000-0000-0000-000000000000")
      };
                  let servers = cluster(clstr).database("sqlazure1").MonBillingServerStatus2
                  | where TIMESTAMP between (_startTime .. _endTime)
                  | where check_subscription_id(subscriptionID)
                  | where subscription_id =~ subscriptionID or SubscriptionId =~ subscriptionID
                  | summarize arg_max(TIMESTAMP, server_name) by server_name
                  | extend server_name = strcat(server_name,'.database.windows.net')
                  | project server_name;
                  let TracingIds = cluster(clstr).database("sqlazure1").MonDataSync
                  | where TIMESTAMP between (_startTime .. _endTime)
                  | where ComponentAction == 'MetadataTracer_UserDatabase'
                  | where ServerName in (servers) and (not(ServerName startswith strcat(_logicalServerName,'.') and DatabaseName =~ _databaseName))
                  | where AgentId == SyncGroupId
                  | summarize arg_max(TIMESTAMP,*) by AppName
                  | project-rename LatestTelemetryAt = TIMESTAMP
                  | distinct TracingId, LatestTelemetryAt, ServerName, DatabaseName;
                  TracingIds
                  | join kind= inner (cluster(clstr).database("sqlazure1").MonDataSync | where ComponentAction == 'MetadataTracer_SyncGroup') on TracingId
                  | extend SyncGroupName = Name
                  | extend HubServer = replace(@'.database.windows.net', @'\1', ServerName)
                  | extend HubDatabase = DatabaseName
                  | join kind = leftouter (datatable(State:string, DatabaseStateStr:string)
                  [0, 'Active'
                   1, 'Deleting'
                   2, 'DeleteFailed'
                   3, 'NotReady']
                   ) on State
                  | extend State = iif(strlen(DatabaseStateStr) > 0, DatabaseStateStr, State)
                  | distinct HubServer, HubDatabase, SyncGroupName, SyncGroupId, AppName, State, LatestTelemetryAt
                  | order by HubServer, HubDatabase, SyncGroupName
      };
      _ExecuteForProdClusters

