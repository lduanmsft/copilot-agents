skills:
  - id: "database-details"
    title: "Database Details"
    category: "css-dashboard"
    tables:
      - MonAnalyticsDBSnapshot
      - MonDmRealTimeResourceStats
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr:string)
      {
          cluster(clstr).database("sqlazure1").MonAnalyticsDBSnapshot
          | where TIMESTAMP between (_startTime.._endTime)
          | where logical_server_name =~ _logicalServerName
          | where logical_database_name =~ _databaseName or isempty(_databaseName)
          | extend AppTypeName = tostring(split(fabric_application_uri, '/')[1])
           | extend maxsize_GB=max_size_bytes/1024/1024/1024
          | summarize arg_max(TIMESTAMP, *) by logical_database_name,physical_database_state,state, sql_instance_name, service_level_objective, logical_database_id, tenant_ring_name, fabric_partition_id, AppTypeName,maxsize_GB
          | join kind=inner(cluster(clstr).database("sqlazure1").MonDmRealTimeResourceStats
          | summarize by sql_instance_name = AppName, cpu_limit) on sql_instance_name
          | project TIMESTAMP,logical_server_name, logical_database_name, logical_database_id, sql_instance_name, service_level_objective,physical_database_state,state, cpu_limit, AppTypeName, tenant_ring_name,fabric_partition_id,maxsize_GB
      };
      _ExecuteForProdClusters

