  - id: "user-pool-s-oom-factor-with-msr"
    title: "User Pool's OOM Factor with MSR"
    category: "css-dashboard"
    tables:
      - MonSQLSystemHealth
    parameters:
      - _endTime
      - _logicalServerName
      - _sqlAppName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
      //
      // For each user memory pool, spid and MSRNumber, get the first and last of the Memory Pool MSR
      //
      let tag = 'MSR-';
      let first_last_Memory_Pool = materialize(
          cluster(clstr).database("sqlazure1").MonSQLSystemHealth
          | where TIMESTAMP between (_startTime .. _endTime)
          | where AppName  in (_sqlAppName)
          | where LogicalServerName =~ _logicalServerName
          | where message contains tag
              and message contains 'Memory Pool'
              and (message contains 'UserPool' or message contains 'SloSharedPool')
          | extend pool_name = extract('\\((.+)\\)', 1, message)
          | extend MSRNumber = strcat(tag, extract(strcat(tag, '([0-9]+)'), 1, message, typeof(int)))
          | extend spid = extract('\\s(spid[^\\s]+)\\s', 1, message)
          | summarize
              (start_time, first_Memory_Pool_MSR) = arg_min(originalEventTimestamp, message)
              (end_time, last_Memory_Pool_MSR) = arg_max(originalEventTimestamp, message)
              by pool_name, MSRNumber, spid
          | project first_Memory_Pool_MSR, last_Memory_Pool_MSR, pool_name, MSRNumber, spid);
      //
      // For each OOM, get the first and last of the Memory Manager MSR. Also, get the first/last MSRNumber and spid for the joining later
      //
      let first_last_Memory_Manager_per_OOM = cluster(clstr).database("sqlazure1").MonSQLSystemHealth
          | where TIMESTAMP between (_startTime .. _endTime)
          | where AppName  in (_sqlAppName)
          | where LogicalServerName =~ _logicalServerName
          | where message contains tag and message contains 'Memory Manager'
          | extend LastOOMFactor = extract('Last OOM Factor(.+)', 1, message, typeof(long))
          | summarize
              (OOM_start_time, first_Memory_Manager_MSR) = arg_min(originalEventTimestamp, message)
              (OOM_end_time, last_Memory_Manager_MSR) = arg_max(originalEventTimestamp, message)
              OOM_Occurences=count()
              by LastOOMFactor
          | extend first_MSRNumber = strcat(tag, extract(strcat(tag, '([0-9]+)'), 1, first_Memory_Manager_MSR, typeof(int)))
          | extend last_MSRNumber = strcat(tag, extract(strcat(tag, '([0-9]+)'), 1, last_Memory_Manager_MSR, typeof(int)))
          | extend first_spid = extract('\\s(spid[^\\s]+)\\s', 1, first_Memory_Manager_MSR)
          | extend last_spid = extract('\\s(spid[^\\s]+)\\s', 1, last_Memory_Manager_MSR)
          | project
              LastOOMFactor
              OOM_start_time
              OOM_end_time
              first_spid
              last_spid
              first_MSRNumber
              last_MSRNumber
              first_Memory_Manager_MSR
              last_Memory_Manager_MSR
              OOM_Occurences;
      //
      // For each MSRNumber and spid, get the first and last of the Process/System Counts MSR
      //
      let first_last_Process_or_System_Counts = materialize(
          cluster(clstr).database("sqlazure1").MonSQLSystemHealth
          | where TIMESTAMP between (_startTime .. _endTime)
          | where AppName in (_sqlAppName)
          | where LogicalServerName =~ _logicalServerName
          | where message contains tag and message contains 'Process/System Counts'
          | extend MSRNumber = strcat(tag, extract(strcat(tag, '([0-9]+)'), 1, message, typeof(int)))
          | extend spid = extract('\\s(spid[^\\s]+)\\s', 1, message)
          | summarize
              (start_time, first_Process_or_System_Counts_MSR) = arg_min(originalEventTimestamp, message)
              (end_time, last_Process_or_System_Counts_MSR) = arg_max(originalEventTimestamp, message)
              by MSRNumber, spid
          | project
              first_Process_or_System_Counts_MSR
              last_Process_or_System_Counts_MSR
              MSRNumber
              spid);
      //
      // Combine the tables to get final result
      //
      first_last_Memory_Manager_per_OOM
      // this inner join gets the pool name and first Memory Pool MSR
      | join kind = inner (first_last_Memory_Pool | project-away last_Memory_Pool_MSR) on $left.first_MSRNumber == $right.MSRNumber and $left.first_spid == $right.spid
      // this inner join gets the last Memory Pool MSR
      | join kind = inner (first_last_Memory_Pool | project-away first_Memory_Pool_MSR) on $left.last_MSRNumber == $right.MSRNumber and $left.last_spid == $right.spid and $left.pool_name == $right.pool_name
      // this inner join gets the first Process/System Counts
      | join kind = inner (
          first_last_Process_or_System_Counts
          | project-away last_Process_or_System_Counts_MSR)
          on $left.first_MSRNumber == $right.MSRNumber and $left.first_spid == $right.spid
      // this inner join gets the last Process/System Counts
      | join kind = inner (
          first_last_Process_or_System_Counts
          | project-away first_Process_or_System_Counts_MSR)
          on $left.last_MSRNumber == $right.MSRNumber and $left.last_spid == $right.spid
      | project
          pool_name
          LastOOMFactor
          OOM_start_time
          OOM_end_time
          OOM_Occurences
          first_Memory_Pool_MSR
          last_Memory_Pool_MSR
          first_Memory_Manager_MSR
          last_Memory_Manager_MSR
          first_Process_or_System_Counts_MSR
          last_Process_or_System_Counts_MSR
      //Ring:'Prod'
      //DiagnosticType:'Data'
      //SessionId:'05f01109-13ac-43a6-b136-6b8acf7fec71'
      //RequestId:'5591f411-8cc8-4f04-945a-c9c39f726668'
      //Client:'AzureSupportCenter'
      //QueryName:'User Pool's OOM Factor with MSR'
      };
      _ExecuteForProdClusters

  - id: "memory-violations-and-dynamic-rg-actions"
    title: "Memory Violations and Dynamic RG actions"
    category: "css-dashboard"
    tables:
      - MonRgManager
      - MonSqlIdleMemCollectorStats
    parameters:
      - ClusterNameVar
      - NodeNameVar
      - _endTime
      - _sqlAppName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let timeBucket = iff(datetime_diff('second', _endTime, _startTime) < 1000, 15s, iff(datetime_diff('minute', _endTime, _startTime) < 1000, 15m, 1h));
      let SingleCluster = (clstr: string)
      {
      let mempressure = cluster(clstr).database("sqlazure1").MonSqlIdleMemCollectorStats
          | where originalEventTimestamp between (_startTime .. _endTime)
          | where AppName in (_sqlAppName)
          | where event == 'sql_memory_perf_stats' and memory_pressure == 'overbooking_mem_pressure_active_instance'
          | summarize Occurrences = count() by bin(originalEventTimestamp, 15m), ClusterName, NodeName, AppName
          | extend resource = 'MEMORY';
      let drg = cluster(clstr).database("sqlazure1").MonRgManager
          | where originalEventTimestamp between (_startTime .. _endTime)
          | where AppName in (_sqlAppName)
          | where event == 'dynamic_rg_cap_change' and resource == 'MEMORY'
          | extend Condition = case
                           (
                               new_cap > old_cap
                               'MEMORY_DRG_Increase'
              
                               new_cap < old_cap
                               'MEMORY_DRG_Decrease'
              
                               'Other'
                           )
          | summarize Occurrences = count() by bin(originalEventTimestamp, 15m), ClusterName, NodeName, Condition;
      let mrg = cluster(clstr).database("sqlazure1").MonRgManager
          | where originalEventTimestamp between (_startTime .. _endTime)
          | where  ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
          | where event == 'multi_instance_mem_rg_recliam_target'
          | extend Condition = 'MRG'
          | extend resource = 'MEMORY'
          | summarize Occurrences = count() by bin(originalEventTimestamp, 15m), ClusterName, NodeName, Condition;
      mempressure
      | union drg
      | union mrg
      | project originalEventTimestamp, Condition, Occurrences
      | order by originalEventTimestamp asc
      };
      _ExecuteForProdClusters

  - id: "automatic-tunning-state"
    title: "Automatic Tunning State"
    category: "css-dashboard"
    tables:
      - MonAutomaticTuningState
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
          cluster(clstr).database("sqlazure1").MonAutomaticTuningState
      | where PreciseTimeStamp between (_startTime .. _endTime)
      | where LogicalServerName =~ _logicalServerName and (logical_db_name =~ _databaseName or isempty(_databaseName))
      | extend modeDesiredState = case(
                                      mode_desired_state == 0
                                      "NotSet"
                                      mode_desired_state == 1
                                      "Inherit"
                                      mode_desired_state == 2
                                      "Custom"
                                      mode_desired_state == 3
                                      "Auto"
                                      "Unknown")
      | extend modeActualState =  case(
                                      mode_actual_state == 0
                                      "NotSet"
                                      mode_actual_state == 1
                                      "Inherit"
                                      mode_actual_state == 2
                                      "Custom"
                                      mode_actual_state == 3
                                      "Auto"
                                      "Unknown")
      | extend optionDesiredState = case(
                                        option_desired_state == 0
                                        "Off"
                                        option_desired_state == 1
                                        "On"
                                        option_desired_state == 2
                                        "Default"
                                        "Unknown")
      | extend optionActualState = case(
                                       option_actual_state == 0
                                       "Off"
                                       option_actual_state == 1
                                       "On"
                                       option_actual_state == 2
                                       "Default"
                                       "Unknown")
      | extend optionDisableReason = case(
                                         option_reason == 0
                                         "None"
                                         option_reason == 1
                                         "Feature switched Off"
                                         option_reason == 2
                                         "AutoConfigured"
                                         option_reason == 3
                                         "Inherited from server"
                                         option_reason == 11
                                         "QDS Off"
                                         option_reason == 12
                                         "QDS Read only"
                                         "Unknown")
      | distinct
          logical_db_name
          AppName
          option_name
          option_desired_state,optionDesiredState
          option_actual_state,optionActualState
          option_reason,optionDisableReason
          option_system_disabled
          
          mode_desired_state,modeDesiredState
          mode_actual_state,modeActualState
      };
      _ExecuteForProdClusters

