  - id: "monfabricclient-timeout"
    title: "MonFabricClient timeout"
    category: "css-dashboard"
    tables:
      - MonFabricClient
      - MonRegionalDeployMgr
    parameters:
      - RegionVar
      - _endTime
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr:string)
      {
          cluster(clstr).database("sqlazure1").MonFabricClient
      | where originalEventTimestamp between (_startTime .. _endTime)
      | where ClusterName contains RegionVar and ClusterName contains 'database.windows.net' 
      | where event !contains "fabric_get"
      | where elapsed_time_milliseconds >= 1000 // the fabric call took more than LongRunningFabricCallInMilliseconds millisecond.
      | where isnotempty(exception_type)
      | summarize min(PreciseTimeStamp), sum(elapsed_time_milliseconds), count() by request_id, fabric_cluster_name
      | where count_ >= 5 // retried 5 times.
      | extend sum_elapsed_time_minutes = sum_elapsed_time_milliseconds / 1000.0 / 60.0
      | summarize sum(sum_elapsed_time_minutes), count(), min(min_PreciseTimeStamp) by fabric_cluster_name
      | project-rename sum_elapsed_time_minutes = sum_sum_elapsed_time_minutes, min_PreciseTimeStamp = min_min_PreciseTimeStamp, request_count = count_
      | where sum_elapsed_time_minutes > 60 and request_count > 10
      | join kind=inner (
      cluster(clstr).database("sqlazure1").MonRegionalDeployMgr
       | where event == "inventory_snapshot_end" and entity_type == "FabricCluster" and TIMESTAMP between (_startTime .. _endTime)
       | summarize arg_max(snapshot_start_time, snapshot_id) by ClusterName
       | join kind = inner(
      cluster(clstr).database("sqlazure1").MonRegionalDeployMgr
       | where event == "fabric_cluster_inventory" and TIMESTAMP between (_startTime .. _endTime)
       | extend props = parse_json(properties)
       | extend global_cluster_address = props.GlobalClusterAddress
       | where product_family == "SQLDB-v2"
       | where status == "Live"
       | where type == "Tenant")
       on $left.snapshot_id == $right.snapshot_id
       | summarize by name
      )
      on $left.fabric_cluster_name==$right.name
      | project fabric_cluster_name, sum_elapsed_time_minutes, min_PreciseTimeStamp, request_count
      };
      _ExecuteForProdClusters

