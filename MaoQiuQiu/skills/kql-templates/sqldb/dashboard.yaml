  - id: "list-all-scaling-operations"
    title: "List all Scaling Operations"
    category: "css-dashboard"
    tables:
      - MonManagementOperations
    parameters:
      - _databaseName
      - _endTime
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr:string)
      {
          cluster(clstr).database("sqlazure1").MonManagementOperations
      | where originalEventTimestamp between (_startTime .._endTime )
      | where operation_parameters contains _databaseName
      | where operation_type contains "update"
      | extend region_name = tostring(split(ClusterName,".")[1])
      | extend elapsed_time_total_minutes = todouble(elapsed_time_milliseconds)/1000.0/60.0
      | extend ops = parse_xml(operation_parameters)
      | extend RequestedServiceObjectiveName = tostring(ops.InputParameters.RequestedServiceObjectiveName)
      | where RequestedServiceObjectiveName <> ""
