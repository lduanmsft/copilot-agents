  - id: "serverlesspauseresumemgr-loginhook-from-monlogin"
    title: "ServerlessPauseResumeMgr LoginHook from Monlogin"
    category: "css-dashboard"
    tables:
      - MonLogin
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      // https://learn.microsoft.com/en-us/azure/azure-sql/database/serverless-tier-overview?view=azuresql&tabs=general-purpose#auto-resuming
      // If a serverless database is paused, the first connection attempt resumes the database and returns an error stating that the database
      // is unavailable with error code 40613. Once the database is resumed, the login can be retried to establish connectivity.
      // The latency to auto-resume and auto-pause a serverless database is generally order of 1 minute to auto-resume and 1-10 minutes
      // after the expiration of the delay period to auto-pause.
      let SingleCluster = (clstr: string)
      {
          cluster(clstr).database("sqlazure1").MonLogin
      | where originalEventTimestamp between (_startTime .. _endTime)
      | where LogicalServerName =~ _logicalServerName or logical_server_name =~_logicalServerName or sni_server_name  contains _logicalServerName
      | where database_name =~ _databaseName or isempty(_databaseName)
      | where is_success ==false //and error == long(40613) and state ==long(4)
      | where activation_time_ms!=0 and isnotnull(activation_time_ms)
      | where event =='process_login_finish'
      | project-reorder  originalEventTimestamp,event,AppName,activation_time_ms,is_success,is_user_error,error,error_detail,state_desc,state,application_name,peer_address,peer_port,proxy_override,is_azure_ip,is_vnet_address,is_vnet_private_access_address,set_result,result,peer_activity_id,connection_peer_id,connection_id
      client_connection_id,total_time_ms,login_flags,driver_name,fedauth_adal_workflow,fedauth_library_type,is_contained_user,is_mfa,validated_driver_name_and_version
      };
      _ExecuteForProdClusters

  - id: "sync-metadata-database"
    title: "Sync Metadata Database"
    category: "css-dashboard"
    tables:
      - MonLogin
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
      let subscriptionID= toscalar(cluster(clstr).database("sqlazure1").MonLogin
      | where TIMESTAMP between (_startTime .. _endTime)
      | where LogicalServerName =~ _logicalServerName or logical_server_name =~_logicalServerName or sni_server_name  contains _logicalServerName
      | where database_name =~_databaseName or isempty(_databaseName)
      | where event == "process_login_finish"
      | where isnotempty(subscription_id) 
      | distinct subscription_id
      | take 1);
      let check_subscription_id = (len:long, s:string)
      {
          assert(len > 0, "Length must be greater than zero") and
          strlen(s) > len
      };
      cluster(clstr).database("sqlazure1").MonLogin
      | where TIMESTAMP between (_startTime .. _endTime)
      | where check_subscription_id(len=1,subscriptionID)
      | where SubscriptionId =~ subscriptionID or subscription_id =~ subscriptionID
      | where event == 'process_login_finish'
      | where application_name == 'Microsoft Azure SQL Database data sync - control'
      | order by TIMESTAMP desc
      | summarize LastSeenAt=max(TIMESTAMP) by logical_server_name,database_name
      };
      _ExecuteForProdClusters

  - id: "sync-group"
    title: "Sync Group"
    category: "css-dashboard"
    tables:
      - MonDataSync
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
      let TracingIds =(cluster(clstr).database("sqlazure1").MonDataSync
      | where TIMESTAMP between (_startTime .. _endTime)
      | where ComponentAction == 'MetadataTracer_UserDatabase'
      | where ServerName startswith _logicalServerName and DatabaseName =~ _databaseName
      | where AgentId == SyncGroupId
      | summarize argmax(TIMESTAMP, TracingId) by DatabaseId
      | project-rename TracingId = max_TIMESTAMP_TracingId, LatestTelemetryAt = max_TIMESTAMP
      | project-away DatabaseId);
      TracingIds
      | join kind= inner (cluster(clstr).database("sqlazure1").MonDataSync | where ComponentAction == 'MetadataTracer_SyncGroup') on TracingId
      | join kind = inner (cluster(clstr).database("sqlazure1").MonDataSync | where ComponentAction == 'MetadataTracer_UserDatabase') on TracingId, DatabaseId
      | extend SyncGroupName = Name
      | extend HubServer = replace(@'.database.windows.net', @'\1', ServerName1)
      | extend HubDatabase = DatabaseName1
      | join kind = leftouter (datatable(State: string, DatabaseStateStr: string)
      [0, 'Active'
      1, 'Deleting'
      2, 'DeleteFailed'
      3, 'NotReady']
      ) on State
      | extend State = iif(strlen(DatabaseStateStr) > 0, DatabaseStateStr, State)
      | join kind = leftouter (datatable(ConflictResolution: string, ConflictResolutionStr: string)
      [0, 'Member win'
      1, 'Hub win']
      ) on ConflictResolution
      | extend ConflictResolution = iif(strlen(ConflictResolutionStr) > 0, ConflictResolutionStr, ConflictResolution)
      | extend SyncInterval = iif(SyncInterval == '-1', 'Automatic Sync is Off', strcat(SyncInterval, ' seconds'))
      | extend SchemaMatchesUserDb = iif(SchemaMatchesUserDb == 0, 'False', 'True')
      | project SyncGroupName, SyncGroupId, HubServer, HubDatabase, AppName, State, ConflictResolution, SyncInterval, SchemaMatchesUserDb, LatestTelemetryAt
      | order by SyncGroupName asc nulls last
      };
      _ExecuteForProdClusters

  - id: "sync-agent-s"
    title: "Sync Agent(s)"
    category: "css-dashboard"
    tables:
      - MonDataSync
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
      let TracingIds = (cluster(clstr).database("sqlazure1").MonDataSync
          | where TIMESTAMP between (_startTime .. _endTime)
          | where ComponentAction == 'MetadataTracer_UserDatabase'
          | where ServerName startswith _logicalServerName and DatabaseName =~ _databaseName
