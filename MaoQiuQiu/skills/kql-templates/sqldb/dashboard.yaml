  - id: "hyperscale-pageserver-fabric-log-winfablogs"
    title: "HyperScale PageServer Fabric log (WinFabLogs)"
    category: "css-dashboard"
    tables:
      - MonAnalyticsDBSnapshot
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let TimeCheckStart = _startTime;
      let TimeCheckEnd = _endTime;
      let ServerName = (_logicalServerName);
      let DatabaseName = (_databaseName);
      let SingleCluster = (clstr: string)
      {
      let DatabaseInfo =
          cluster(clstr).database("sqlazure1").MonAnalyticsDBSnapshot
          | where logical_database_name =~ DatabaseName
          | where logical_server_name =~ ServerName
          | extend AppName = extract('fabric:/.*/(.*)', 1, fabric_application_uri)
          | extend
              DatabasePartitionId = tolower(fabric_partition_id)
              physical_db_id = tolower(physical_database_id)
              logical_database_id = tolower(logical_database_id)
          | extend AppType = extract('fabric:/(.*)/.*', 1, fabric_application_uri)
          | where AppType == 'Worker.Vldb.Storage'
          | summarize MinLastUpdateTime = min(last_update_time)
              by
              AppName
              DatabasePartitionId
              physical_db_id
              logical_database_name
              logical_server_name
              tenant_ring_name
              create_time
              logical_database_id;
      // Gather all the partition ids
      let PartitionIds = DatabaseInfo | summarize makeset(DatabasePartitionId, 1048576);
      cluster(clstr).database("sqlazure1").WinFabLogs
          | where ETWTimestamp >= TimeCheckStart
              and ETWTimestamp <= TimeCheckEnd
              and isnotempty(Id)
          | extend IdLower = tolower(Id)
          | where IdLower in (PartitionIds)
          | project-reorder ETWTimestamp,TaskName,EventType,Id,Text
      };
      _ExecuteForProdClusters

  - id: "active-transaction"
    title: "Active Transaction"
    category: "css-dashboard"
    tables:
      - MonDmTranActiveTransactions
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let mapping_transaction_type=datatable(transaction_type:long,transaction_type_desc:string)
                                  [
                                       1,'Read/write transaction'
                                       2,'Read-only transaction'
                                       3,'System transaction'
                                       4,'Distributed transaction'
                                  ];
                                  let mapping_transaction_state=datatable(transaction_state:long,transaction_state_desc:string)
                                  [
                                       0,'The transaction has not been completely initialized yet'
                                       1,'The transaction has been initialized but has not started'
                                       2,'The transaction is active'
                                       3,'The transaction has ended. This is used for read-only transactions'
                                       4,'The commit process has been initiated on the distributed transaction. This is for distributed transactions only. The distributed transaction is still active but further processing cannot take place'
                                       5,'The transaction is in a prepared state and waiting resolution'
                                       6,'The transaction has been committed'
                                       7,'The transaction is being rolled back'
                                       8,'The transaction has been rolled back'
                                  ];
      let SingleCluster = (clstr: string)
      {
                              MonDmTranActiveTransactions
                              | where  PreciseTimeStamp between (_startTime.._endTime)
                              | where LogicalServerName =~ _logicalServerName and (isempty(_databaseName) or user_db_name =~ _databaseName or user_db_name == 'tempdb')
                              | where session_id != -1
                              | extend duration_hour = round((end_utc_date - transaction_begin_time) / time(1h),1)
                              | summarize max_duration_hour = arg_max(duration_hour
                                  NodeName
                                  session_id
                                  transaction_begin_time
                                  transaction_type
                                  transaction_state
                                  program_name
                                  status
                                  accessed_tempdb
                                  report_time = end_utc_date)
                                  by transaction_id, user_db_name, database_id
                              | top 20 by max_duration_hour desc
                              | lookup kind=leftouter mapping_transaction_type on transaction_type
                              | lookup kind=leftouter mapping_transaction_state on transaction_state
                              | project-away transaction_type,transaction_state
                              | project transaction_id, user_db_name, database_id,max_duration_hour, NodeName
                                  session_id
                                  transaction_begin_time
                                  transaction_type=transaction_type_desc
                                  transaction_state=transaction_state_desc
                                  program_name
                                  status
                                  accessed_tempdb
                                  report_time
      //Ring:'Prod'
      //DiagnosticType:'Data'
      //SessionId:'74191fac-6f1c-4adf-b62e-02185e9ccbf9'
      //RequestId:'c5f6b8f7-a7c1-4282-8521-a6b29010c1ec'
      //Client:'AzureSupportCenter'
      //QueryName:'Top 20 Long Running Transactions'
      };
      _ExecuteForProdClusters

  - id: "geodr-partner-information"
    title: "GeoDR Partner Information"
    category: "css-dashboard"
    tables:
      - MonAnalyticsDBSnapshot
      - MonDmContinuousCopyStatus
      - MonGeoDRFailoverGroups
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr:string)
      {
          cluster(clstr).database("sqlazure1").MonAnalyticsDBSnapshot
      | where TIMESTAMP between (_startTime .. _endTime)
      | where logical_server_name == tolower(_logicalServerName) and logical_database_name =~ _databaseName
      | join kind=inner(
          cluster(clstr).database("sqlazure1").MonDmContinuousCopyStatus
          | where TIMESTAMP between (_startTime .. _endTime) and link_type != 'LAG_REPLICA_LINK_TYPE_UPDATE_SLO'
          | summarize by partner_server, partner_database, physical_database_id, LogicalServerName, is_target_role, link_type
      ) on $left.physical_database_id == $right.physical_database_id
      | join kind = leftouter 
      (
      cluster(clstr).database("sqlazure1").MonGeoDRFailoverGroups
      | where TIMESTAMP between (_startTime .. _endTime)
      | distinct failover_group_id, failover_group_name
      ) on failover_group_id
      | extend LocalRole=iff(link_type == 'LAG_REPLICA_LINK_TYPE_DATABASE_COPY'
          , iff(is_target_role == 0, 'Source', 'Target')
          , iff(is_target_role == 0, 'Primary', 'Secondary')
      )
      | extend PartnerRole=case(LocalRole == 'Primary', 'Secondary'
          , LocalRole == 'Secondary', 'Primary'
          , LocalRole == 'Source', 'Target'
          , LocalRole == 'Target', 'Source', 'Unknown'
      )
      | distinct partner_server, partner_database, PartnerRole, LocalRole, failover_group_name, logical_server_name, logical_database_name, link_type
      | project LocalServer = logical_server_name, LocalDatabase = logical_database_name, LocalRole, PartnerServer = partner_server, PartnerDatabase = partner_database, PartnerRole, FailoverGroup = failover_group_name, LinkType = link_type;
      //Ring:'Prod'
      //DiagnosticType:'Data'
      //SessionId:'65b14e1d-adc7-4d9a-9f78-b07346f83ed6'
      //RequestId:'507fa0aa-cb0b-4560-93ab-f42488a8cad3'
      //Client:'AzureSupportCenter'
      //QueryName:'GeoDR Partner Information'
      };
      _ExecuteForProdClusters

  - id: "failover-group-information-retention-28-days"
    title: "Failover Group Information (Retention 28 days)"
    category: "css-dashboard"
    tables:
      - MonAnalyticsDBSnapshot
      - MonGeoDRFailoverGroups
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let retention = _endTime > ago(28d);
      let SingleCluster = (clstr:string)
      {
      let T = cluster(clstr).database("sqlazure1").MonAnalyticsDBSnapshot
      | where retention == true
      | where TIMESTAMP between(_startTime.._endTime)
      | where logical_server_name =~ _logicalServerName and logical_database_name =~ _databaseName
      | where isnotempty(failover_group_id)
      | summarize arg_max(TIMESTAMP,failover_group_id,logical_database_name) by logical_database_id
      | project failover_group_id,logical_database_name
      | join kind= leftouter (
      cluster(clstr).database("sqlazure1").MonGeoDRFailoverGroups
      | where retention == true
      | where TIMESTAMP between(_startTime.._endTime)
      | where logical_server_name =~ _logicalServerName or partner_server_name =~ _logicalServerName
      | summarize arg_max(TIMESTAMP, failover_group_name, logical_server_name, role, failover_group_create_time, partner_server_name, partner_region, failover_policy, failover_with_data_loss_grace_period_in_minutes) by failover_group_id
      ) on failover_group_id
      | project logical_database_name,failover_group_name, failover_group_id, format_datetime(failover_group_create_time, 'yyyy-MM-dd HH:mm:ss.fff'), logical_server_name, role
      , partner_server_name, partner_region, failover_policy, GracePeriodHours = failover_with_data_loss_grace_period_in_minutes/60;
      let T_has_records = toscalar(T |take 1| summarize count() > 0);
      union 
      (T | where T_has_records == true)
      (datatable(logical_database_name:string)['Database not in a failover group in this time range'] |where T_has_records == false and retention == true)
      (datatable(logical_database_name:string)['Data has been retired. Retention policy is 28 days'] | where retention == false and T_has_records == false )
      | order by failover_group_create_time asc 
      //Ring:'Prod'
      //DiagnosticType:'Data'
      //SessionId:'9cab943e-28fa-4318-84b5-9c4bbd9157d0'
      //RequestId:'44b3bbdf-2b35-41ca-870a-9fb0adbd9e5c'
      //Client:'AzureSupportCenter'
      //QueryName:'Failover Group'
      };
      _ExecuteForProdClusters

