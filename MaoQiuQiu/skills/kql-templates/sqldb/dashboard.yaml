  - id: "query-cpu-consumption-chart"
    title: "Query CPU Consumption chart"
    category: "connectivity-dashboard"
    tables:
      - MonRgLoad
      - MonWiQdsExecStats
    parameters:
      - ClusterNameVar
      - RegionFqdn
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      let aggIntervalMins = 60;
      let aggIntervalTimespanMins = 15m;
      // Find apps on selected nodes
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          let vCoreCount = toscalar (
              cluster(clstr).database("sqlazure1").MonRgLoad
              | where shouldRunForCluster==True
              | where TIMESTAMP between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar)
              | where event =~ 'instance_load'
              | where application_name startswith 'fabric:/Worker.ISO.Control/'
              | where slo_size =~ "AliasDb"
              | where code_package_name =~ "Code"
              | where service_manifest_name =~ "SQL"
              | distinct cpu_count
          );
          cluster(clstr).database("sqlazure1").MonWiQdsExecStats
          | where shouldRunForCluster==True
          | where TIMESTAMP between (_startTime.._endTime)
          | where ClusterName in (ClusterNameVar)
          | where AppTypeName =~ 'Worker.ISO.Control'
          | summarize
              avg_cpu_time_per_sec_interval = (sum(cpu_time)*1.0/(1000))/1000/60/aggIntervalMins
              by TIMESTAMP=bin(TIMESTAMP, aggIntervalTimespanMins), alias_instance = strcat(AppName, '_', NodeName)
          | extend query_exec_cpu_pct = (avg_cpu_time_per_sec_interval / vCoreCount) * 100.0
          | project TIMESTAMP, alias_instance, query_exec_cpu_pct
      }; 
      _ExecuteForProdClusters

  - id: "query-on-moncapacitytenantsnapshot"
    title: "Query on MonCapacityTenantSnapshot"
    category: "connectivity-dashboard"
    tables:
      - MonCapacityTenantSnapshot
    parameters:
      - RegionFqdn
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Find clusters in selected regions
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          cluster(clstr).database("sqlazure1").MonCapacityTenantSnapshot 
          | where shouldRunForCluster == True
          | where TIMESTAMP between ((_startTime-6h)..(_endTime+6h))
          | summarize arg_max(PreciseTimeStamp, *) by tenant_ring_name 
          | where tenant_ring_name has_any(RegionFqdn)
          | where placement_affinity_tag in ("", "DWDedicated", "DWPestoDedicated", "DWPestoDedicatedCmw", "DWPestoMiniDedicated", "SynapseSql", "Polaris", "BeingEmptiedOutForMigration_SQLRings")
          | extend ClusterName = tolower(iff(tenant_ring_name startswith "hs", extract('hs[0-9].(.*)', 1, tenant_ring_name), tenant_ring_name))
          | project ClusterName
      };
      _ExecuteForProdClusters
      | extend trNum = toint(extract('[ct]r([0-9]+)..*', 1, ClusterName)), regionName = extract('[ct]r[0-9]+.([a-zA-Z0-9-]+)..*', 1, ClusterName)
      | order by regionName asc, trNum asc
      | extend RowNum = row_number()
      | project ClusterName, RowNum
      | union (datatable (ClusterName: string, RowNum: long ) ['None', 0])
      | sort by RowNum asc
      | project ClusterName

