  - id: "connection-limit-on-apps-error-17809-and-17810"
    title: "Connection limit on apps (Error 17809 and 17810)"
    category: "connectivity-dashboard"
    tables:
      - MonSQLSystemHealth
    parameters:
      - ClusterNameVar
      - NodeNameVar
      - RegionFqdn
      - SqlInstances
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Compute per app login trend per minute
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          let shouldSkipAppNameFilter = iff(isnull(SqlInstances), True, False);
          range originalEventTimestamp from bin(_startTime, 1m) to _endTime step 1m
          | extend matchCol = 1
          | join kind=inner (cluster(clstr).database("sqlazure1").MonSQLSystemHealth
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where AppName in (SqlInstances) or shouldSkipAppNameFilter
              | where event endswith 'written'
              | summarize by AppName, matchCol = 1) on matchCol
          | project originalEventTimestamp, AppName
          | join kind=leftouter (cluster(clstr).database("sqlazure1").MonSQLSystemHealth
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where AppName in (SqlInstances) or shouldSkipAppNameFilter
              | where event endswith 'written'
              | where message contains "Error: 17809" or message contains "Error: 17810"
              | summarize UserConnLimit = countif(message contains "Error: 17809"), DacLimit = countif(message contains "Error: 17810") by AppName, bin(originalEventTimestamp, 1m)) on originalEventTimestamp, AppName
          | extend UserConnLimit = iff(isempty(UserConnLimit), 0, UserConnLimit), DacLimit = iff(isempty(DacLimit), 0, DacLimit)
          | project originalEventTimestamp, AppName, UserConnLimit, DacLimit
      };
      _ExecuteForProdClusters

