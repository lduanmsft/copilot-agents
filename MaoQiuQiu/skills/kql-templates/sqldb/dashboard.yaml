  - id: "failed-login-request"
    title: "Failed login request"
    category: "css-dashboard"
    tables:
      - MonLogin
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      // Comments
      let SingleCluster = (clstr: string)
      {
      let _Allconnections=(cluster(clstr).database("sqlazure1").MonLogin
          | where TIMESTAMP between (_startTime .. _endTime)
          | where logical_server_name =~_logicalServerName or LogicalServerName =~_logicalServerName or sni_server_name contains _logicalServerName
          //| where is_success == false
          | where event == "process_login_finish"
      | where database_name =~_databaseName or isempty(_databaseName)
      );
      let _failureConnections = (_Allconnections
      | where is_success == false
      | where connection_peer_id !='00000000-0000-0000-0000-000000000000'
      | distinct connection_peer_id
      );
      let _failurecount =  toscalar(_failureConnections | count) > 0;
      _Allconnections
      | where  _failurecount > 0 
      | where connection_peer_id in (_failureConnections)
      | extend bit21 = toint(login_flags / 2097152) % 2 
      | extend appIntentReadOnly = bit21
      | extend ProxyOrRedirectNew = iif( result =~ "e_crContinue", "Redirect", iif( result =~ "e_crContinueSameState", "Proxy" , "Unknow"))
      | extend UserType = iif( fedauth_adal_workflow > 0 or fedauth_library_type > 0, "AAD" , "SQL")
      | extend fedauth_library_type_desc =
      case (
      fedauth_library_type == 0, "SQL Auth"
      fedauth_library_type == 2, "Token Based"
      fedauth_library_type == 3 and fedauth_adal_workflow == 1, "AAD Password"
      fedauth_library_type == 3 and fedauth_adal_workflow == 2, "AAD Integrated"
      fedauth_library_type == 3 and fedauth_adal_workflow == 3, "AAD Universal MFA"
      fedauth_library_type == 4, "Windows Auth"
      strcat(tostring(fedauth_library_type) , "-" , tostring(fedauth_adal_workflow)))
      | project-reorder  originalEventTimestamp,event,AppName,application_name,peer_address,peer_port,total_time_ms,is_success,is_user_error,error,state,error_detail,state_desc,xodbc_authentication_type,enqueue_time_ms,netread_time_ms,ssl_time_ms,ssl_read_time_ms,find_login_ms,contained_authentication_time_ms,login_time_ms
      login_flags,appIntentReadOnly,driver_name,fedauth_adal_workflow,fedauth_library_type,is_contained_user,is_azure_ip,is_mfa,is_vnet_address,is_vnet_private_access_address,validated_driver_name_and_version
      UserType,fedauth_library_type_desc,ProxyOrRedirectNew,peer_activity_id,connection_peer_id,connection_id,client_connection_id,message,extra_info
      };
      _ExecuteForProdClusters

