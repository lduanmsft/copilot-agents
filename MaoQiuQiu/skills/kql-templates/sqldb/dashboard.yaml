          | extend matchCol = 1
          | join kind=inner (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where AppName in (SqlInstances) or shouldSkipAppNameFilter
              | summarize by AppName, matchCol = 1) on matchCol
          | project originalEventTimestamp, AppName
          | join kind=leftouter (
              (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where AppName in (SqlInstances) or shouldSkipAppNameFilter
              | where event =~ 'process_close_connection'
              | project ConnectionCloseTime = originalEventTimestamp, connection_id, session_elapsed_time_ms
              | join kind=rightouter (cluster(clstr).database("sqlazure1").MonLogin
