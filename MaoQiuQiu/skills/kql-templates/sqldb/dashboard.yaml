          | where ClusterName in (ClusterNameVar)
          | where NodeName in (NodeNameVar)
          | where CounterName startswith "\\Processor Information" and CounterName endswith "Processor Time"
          | where CounterName has_any (cpuFilters) 
          | project TIMESTAMP, CounterName, MaxVal
      };
      _ExecuteForProdClusters

  - id: "incoming-login-rate-on-xdbhost-derived-from-monxdbhost-trace"
    title: "Incoming Login Rate on XDBHost (Derived from MonXdbhost traces)"
    category: "connectivity-dashboard"
    tables:
      - MonXdbHost
      - MonXdbhost
    parameters:
      - ClusterNameVar
      - NodeNameVar
      - RegionFqdn
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Compute incoming connection request trend from traces in MonXdbHost
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          range originalEventTimestamp from bin(_startTime, 1m) to _endTime step 1m
          | where shouldRunForCluster==True
          | extend matchCol = 1
          | join kind=inner (cluster(clstr).database("sqlazure1").MonXdbhost
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | summarize by NodeName, matchCol = 1) on matchCol
          | join kind=leftouter (cluster(clstr).database("sqlazure1").MonXdbhost
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | where text startswith "Performing"
              | summarize LoginRate=count() by bin(originalEventTimestamp, 1m), NodeName) on originalEventTimestamp, NodeName
          | extend LoginRate = iff(isempty(LoginRate), 0, LoginRate)
          | project originalEventTimestamp, NodeName, LoginRate
      };
      _ExecuteForProdClusters

  - id: "count-of-proxy-logins-to-the-node-by-login-result"
    title: "Count of proxy logins to the node by login result"
    category: "connectivity-dashboard"
    tables:
      - MonLogin
      - MonRgManager
    parameters:
      - ClusterNameVar
      - NodeNameVar
      - RegionFqdn
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Compute proxy logins to filtered nodes by login result
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          range originalEventTimestamp from bin(_startTime, 1m) to _endTime step 1m
          | where shouldRunForCluster==True
          | extend matchCol = 1
          | join kind=inner (cluster(clstr).database("sqlazure1").MonRgManager
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where ClusterName in (ClusterNameVar) and NodeName in (NodeNameVar)
              | summarize by NodeName, matchCol = 1) on matchCol
          | join kind = leftouter (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where AppTypeName == "Gateway"
              | where event =~ 'process_login_finish'
              | where result !~ "e_crContinue"
              | where instance_name has_any (ClusterNameVar)
              | extend NodeName = tostring(split(fabric_node_name, "\\")[1])
              | where NodeName in (NodeNameVar)
              | summarize by LoginResult = iff(is_success == 1, 'Success', strcat(iff(is_user_error == 0 or total_time_ms > 14000, 'SystemError', 'UserError'), '_', error, '/', state)), matchCol = 1) on matchCol
          | join kind = leftouter (cluster(clstr).database("sqlazure1").MonLogin
              | where shouldRunForCluster==True
              | where originalEventTimestamp between (_startTime.._endTime)
              | where AppTypeName == "Gateway"
              | where event =~ 'process_login_finish'
              | where result !~ "e_crContinue"
              | where instance_name has_any (ClusterNameVar)
              | extend NodeName = tostring(split(fabric_node_name, "\\")[1])
              | where NodeName in (NodeNameVar)
              | extend LoginResult = iff(is_success == 1, 'Success', strcat(iff(is_user_error == 0 or total_time_ms > 14000, 'SystemError', 'UserError'), '_', error, '/', state))
              | summarize ProxyConnectionCount = count() by bin(originalEventTimestamp, 1m), NodeName, LoginResult) on originalEventTimestamp, NodeName, LoginResult
          | project originalEventTimestamp, LoginResult = strcat(NodeName, ': ', LoginResult), ProxyConnectionCount
          | extend ProxyConnectionCount = iff(isempty(ProxyConnectionCount), 0, ProxyConnectionCount)
      };
      _ExecuteForProdClusters

