  - id: "sql-alias-high-cpu"
    title: "SQL Alias high CPU"
    category: "connectivity-dashboard"
    tables:
      - MonRgLoad
    source: "dashboard-Connectivity TS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
          cluster(clstr).database("sqlazure1").MonRgLoad
          | where TIMESTAMP > ago(7d)
          | where event =~ 'instance_load'
          | where application_name startswith 'fabric:/Worker.ISO.Control/'
          | where slo_size =~ "AliasDb"
          | where code_package_name =~ "Code"
          | where service_manifest_name =~ "SQL" 
          | extend UserCpuUsagePeakPercent = round((cpu_load_peak*1.0/cpu_load_cap)*100.0,1)
          | where UserCpuUsagePeakPercent > 50
          | extend sql_alias_db = strcat(ClusterName, "-", tostring(extract('fabric:/Worker.ISO.Control/([a-f0-9A-F]+)', 1, application_name)))
          | make-series peak_process_user_cpu_percent = max(UserCpuUsagePeakPercent) on TIMESTAMP step 15m by sql_alias_db, NodeName
      };
      _ExecuteForProdAndStageClusters
      | render timechart

  - id: "t-train-deployment"
    title: "T Train deployment"
    category: "connectivity-dashboard"
    tables:
      - MonCounterFiveMinute
      - MonLogin
      - MonRedirector
    parameters:
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
          let clusterName = 'cr';
          cluster(clstr).database("sqlazure1").MonRedirector
          | where TIMESTAMP between (['_startTime'] .. ['_endTime'])
          | where ClusterName startswith clusterName// and NodeName == nodeName
          | where event contains "sql_alias_cache_delete"
          | summarize alias_delete = countif(event contains "sql_alias_cache_delete") by bin(originalEventTimestamp, 1h) //odbc = countif(event contains "odbc")
          | join kind = inner
          (
              cluster(clstr).database("sqlazure1").MonLogin
              | where originalEventTimestamp between (['_startTime'] .. ['_endTime'])
              | where ClusterName startswith clusterName //and NodeName == nodeName
              | where event == "process_login_finish" and error == 40613
              | summarize TotalFailures = count() by bin(originalEventTimestamp, 1h)
          ) on originalEventTimestamp
          | project-away originalEventTimestamp1
          | lookup kind = inner
          (
          cluster(clstr).database("sqlazure1").MonCounterFiveMinute
          | where TIMESTAMP between (['_startTime'] .. ['_endTime'])
          | where CounterName == "\\Process(xdbgatewaymain)\\Thread Count"
          | where ClusterName startswith clusterName //and NodeName == nodeName
          | extend originalEventTimestamp = TIMESTAMP
          | project originalEventTimestamp, ThreadCount = CounterValue
          | summarize ThreadCount = max(ThreadCount) by bin(originalEventTimestamp, 1h)
          ) on originalEventTimestamp
      };
      _ExecuteForProdAndStageClusters
      | render timechart with (ysplit=panels)
      // This clearly shows that the odbc failures and the login failures are correlated, likely causated. ODBC failed, so logins failed because it couldn't access aliasdb.

  - id: "all-subscriptions-impacted-1-min-outage-in-the-region"
    title: "All Subscriptions impacted >1 min outage in the region"
    category: "connectivity-dashboard"
    tables:
      - MonAnalyticsDBSnapshot
      - MonLogin
    parameters:
      - RegionFqdn
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Find apps on selected nodes
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          cluster(clstr).database("sqlazure1").MonLogin
          | where shouldRunForCluster==True
          | where originalEventTimestamp between (_startTime.._endTime)
          | where ClusterName contains (RegionFqdn)
          | where event == "process_login_finish" 
          | where AppTypeName == "Gateway"
          | where is_success == false and is_user_error == false
          | extend logical_server_name = tolower(logical_server_name)
          | extend database_name = tolower(database_name)
          | summarize TotalLoginFailures = count() by logical_server_name, database_name, ErrorDetails = strcat("Error: ", error, " State: ", state, " State_Desc: ", state_desc, " Lookup_state/ErrorCode: ", lookup_state, "/", lookup_error_code), bin(originalEventTimestamp, 1m)
          | summarize TotalLoginFailures = sum(TotalLoginFailures), OutageInMinutes = dcount(originalEventTimestamp) by ErrorDetails, logical_server_name, database_name
          | where OutageInMinutes > 1
          | join kind=inner (
              cluster(clstr).database("sqlazure1").MonAnalyticsDBSnapshot
              | where TIMESTAMP > ago(1d)
              | summarize arg_max(TIMESTAMP, customer_subscription_id) by logical_server_name, logical_database_name
          ) on $left.logical_server_name == $right.logical_server_name and $left.database_name == $right.logical_database_name
          | summarize MaxOutageInMinutes = max(OutageInMinutes) by customer_subscription_id, ErrorDetails
          | summarize TotalOutageMinutes = sum(MaxOutageInMinutes), TotalImpactedSubs = dcount(customer_subscription_id) by ErrorDetails
          | order by TotalImpactedSubs desc
      }; 
      _ExecuteForProdClusters

  - id: "input-time-region-and-custom-data-to-jsonvnetfailsrunnercust"
    title: "Input time, region and "Custom Data" to jsonVnetFailsRunnerCustomData"
    category: "connectivity-dashboard"
    tables:
      - MonManagement
      - MonManagementResourceProvider
    parameters:
      - RegionFqdn
      - _endTime
      - _startTime
      - jsonVnetFailsRunnerCustomData
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | where ClusterShortName in (RegionFqdn)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Find all nodes in selected cluster
      //
      let offset = 6h;
      let st=(_startTime-offset);
      let en=(_endTime+offset);
      let binSize = 1h;
      let SingleCluster = (clstr: string)
      {
      let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
      let data = 
          print jsonString = jsonVnetFailsRunnerCustomData
      ;
      let rids = data
      | extend jsonObj = parse_json(jsonString)
      | mv-expand jsonObj to typeof(dynamic)
      | mv-expand SubscriptionId = bag_keys(jsonObj), Record = jsonObj to typeof(dynamic)
      | mv-expand t=jsonObj[strcat(SubscriptionId)] to typeof(dynamic)
      | extend  OperationType=t.OperationType
      | mv-expand RequestId=t.RequestId
      | project-reorder SubscriptionId, Record, t, RequestId, OperationType
      | project toupper(RequestId);
      //let rid = '2c7af5b4-3207-43d3-9816-502618cac3cc';
      union 
      (
              cluster(clstr).database("sqlazure1").MonManagementResourceProvider
              | where shouldRunForCluster==True
      | where TIMESTAMP between (st..en)
      | where toupper(request_id) in (rids)
      | extend trace=extract('at Microsoft.SqlServer.Management.Service.Workflows.ManagementWorkflows(.*)',1,stack_trace)
      | summarize  TIMESTAMP=max(TIMESTAMP), message=strcat(cnt(), ": ", make_set(error_description_code), make_set(operation_name)) by trace, extra_parameters, logical_server_name, resource_group, subscription_id, action_name, controller_name, api_version, request_id
      | where trace !='' or extra_parameters !=''
      | extend extra_parameters = strcat( " [", logical_server_name, "]  [", resource_group, "]  [", subscription_id, "]  [", action_name, "]  [", controller_name, "]  [", api_version,  "]  ", extra_parameters)
      | summarize  TIMESTAMP=max(TIMESTAMP), message=strcat("MonManagementResourceProvider:", make_set(message), make_set(extra_parameters)) by trace, rid=toupper(request_id)
      )
      
      (cluster(clstr).database("sqlazure1").MonManagement
      | where shouldRunForCluster==True 
      | where TIMESTAMP between (st..en)
      | where toupper(request_id) in (rids)
      | where message!=''
      | summarize TIMESTAMP=max(TIMESTAMP), message=strcat("MonManagement: ", cnt(), ": ", make_set(state), " : ", make_set(message)) by trace=substring(stack_trace, 0, 100), rid=toupper(request_id))
      };
      union
      (_ExecuteForProdClusters)

