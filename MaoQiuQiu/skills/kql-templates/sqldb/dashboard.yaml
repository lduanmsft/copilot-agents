  - id: "restore-failures-monrestorerequests"
    title: "Restore failures (MonRestoreRequests)"
    category: "css-dashboard"
    tables:
      - MonRestoreRequests
    parameters:
      - _databaseName
      - _endTime
      - _logicalServerName
      - _restoreId
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let serverName = _logicalServerName;
      let databaseName = _databaseName;
      //let sqlAppName= _sqlAppName;
      let restoreRequestId = _restoreId;
      let SingleCluster = (clstr:string)
      {
          cluster(clstr).database("sqlazure1").MonRestoreRequests
      | where start_time between (_startTime.._endTime)
      | extend SourceServer = iif(archived_backup_resource_id!= ''
          extract('/longTermRetentionServers/(.*)/longTermRetentionDatabases/', 1, archived_backup_resource_id)
          source_logical_server_name)
      | extend SourceDatabase = iif(archived_backup_resource_id!= ''
          extract('/longTermRetentionDatabases/(.*)/longTermRetentionBackups/', 1, archived_backup_resource_id)
          source_logical_database_name)
      | extend TargetServer = target_logical_server_name, TargetDatabase = target_logical_database_name
      | where (SourceServer =~ serverName) or (TargetServer =~ serverName)
      | where restore_request_id =~ restoreRequestId
      | summarize arg_max(TIMESTAMP, *) by restore_request_id
      //| extend point_in_time = iif(getyear(point_in_time) < 2000, '', format_datetime(point_in_time, 'yyyy-MM-dd HH:mm:ss'))
      | extend error_code = iif(error_code == -1 , '', tostring(error_code))
      | project start_time, end_time, operation_type, restore_request_id, state, SourceServer, SourceDatabase, source_edition
                point_in_time, TargetServer, TargetDatabase, target_edition, operation_details, error_code, error_message, archived_backup_resource_id
      | order by start_time asc
      | where state =~ "Failed"
      | project start_time, end_time, restore_request_id, state, point_in_time, error_code, error_message, operation_details
      , SourceServer, SourceDatabase, TargetServer, TargetDatabase
      };
      _ExecuteForProdClusters

