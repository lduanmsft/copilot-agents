  - id: "list-ep-in-target-server"
    title: "List EP in Target Server"
    category: "css-dashboard"
    tables:
      - MonResourcePoolStats
    parameters:
      - _endTime
      - _logicalServerName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let SingleCluster = (clstr: string)
      {
          cluster(clstr).database("sqlazure1").MonResourcePoolStats
      	| where server_name == _logicalServerName
          | where TIMESTAMP between (_startTime .. _endTime)
      	| summarize arg_max(PreciseTimeStamp, resource_pool_cpu_limit, resource_pool_dtu_limit, resource_pool_storage_limit, data_storage_percent, allocated_data_storage_percent) by resource_pool_name, SubscriptionId, ResourceGroup, server_name
      	| extend StorageLimitMB = tolong(resource_pool_storage_limit) / 1024
      	| extend AllocatedDataStoragePercent = round(allocated_data_storage_percent, 3)
      	| extend DataStoragePercent = round(data_storage_percent, 3)
      	| extend DTU = iff(isempty(resource_pool_dtu_limit), 0, toint(resource_pool_dtu_limit))
      	| extend VCore = iff(isempty(resource_pool_cpu_limit), 0, toint(resource_pool_cpu_limit))
      	| extend ResourceUri = strcat('/subscriptions/', SubscriptionId, '/resourcegroups/', ResourceGroup, '/providers/Microsoft.Sql/servers/', server_name, '/elasticPools/', resource_pool_name)
      	| project-rename
      	    ElasticPoolName = resource_pool_name
      	    StorageLimitKB = resource_pool_storage_limit
      	| project-away
      	    data_storage_percent
      	    allocated_data_storage_percent
      	    resource_pool_dtu_limit
          resource_pool_cpu_limit
          };
      _ExecuteForProdClusters

