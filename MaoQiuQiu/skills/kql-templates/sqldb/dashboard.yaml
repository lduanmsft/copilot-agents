    parameters:
      - _endTime
      - _logicalServerName
      - _sqlAppName
      - _startTime
    source: "dashboard-AzureSQLDB - CSS.json"
    query: |
      let timeBucket = iff(datetime_diff('second', _endTime, _startTime) < 1000, 1s, iff(datetime_diff('minute', _endTime, _startTime) < 1000, 15m, 1h));
      let SingleCluster = (clstr: string)
      {
          cluster(clstr).database("sqlazure1").MonSqlMemoryClerkStats
      | where originalEventTimestamp between (_startTime .. _endTime)
      | where AppName in (_sqlAppName)
      | where LogicalServerName =~ _logicalServerName
      | lookup kind = leftouter(
