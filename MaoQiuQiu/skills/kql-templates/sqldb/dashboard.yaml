      - NodeNameVar
      - _endTime
      - _startTime
    source: "dashboard-Connectivity TS.json"
    query: |
      // Create a scalar comma separated string of kusto cluster URLs corresponding to the region filter
      //
      let clustersOfInterest = toscalar(cluster("https://sqladhoc.kustomfa.windows.net").database("sqlazure1").KustoClusterMappings
      | summarize by ClusterName = tolower(ClusterName), ClusterUrl = tolower(ClusterUrl)
      | extend ClusterShortName = extract('wasd-(prod|stage)-([a-z0-9-]+)', 2, ClusterName)
      | summarize relevantClusters = strcat_array(make_set(ClusterUrl), ', '));
      // Find all nodes in selected cluster
      //
      let SingleCluster = (clstr: string)
      {
          let shouldRunForCluster = iff(clustersOfInterest has clstr , True, False);
          cluster(clstr).database("sqlazure1").MonLogin
          | where shouldRunForCluster==True
          | where TIMESTAMP between ((_startTime-6h) .. (_endTime + 6h)) or (TIMESTAMP > ago(12h))
          | where AppName == 'Gateway'
          | where event == 'process_login_finish'
          | where ClusterName in (ClusterNameVar) and 
          NodeName in (NodeNameVar)
          | where fabric_alias_uri !in ('', 'fabric:/Alias/XDBAlias/sphomemsit/notifications')
          | extend defaultlen = strlen('fabric:/Alias/XDBAlias/spa')
          | extend speciallen1 = strlen('fabric:/Alias/XDBAlias/sql-123')
          | extend speciallen2 = strlen('fabric:/Alias/XDBAlias/spartan-srv-emea-d365opsprod-1bd344634aef/db_d365opsprod_123')
          | extend prefix = substring(fabric_alias_uri, 0, defaultlen)
          | extend speciallen = 
      iff(
          prefix in (
      'fabric:/Alias/XDBAlias/sql'
      'fabric:/Alias/XDBAlias/eau')
      
      speciallen1 
      
      iff(
          prefix in (
      'fabric:/Alias/XDBAlias/spa'
      'fabric:/Alias/XDBAlias/od-'
      )
      
      speciallen2
      
      defaultlen))
          | extend prefix = substring(fabric_alias_uri, 0, speciallen)
          | distinct prefix
      };
      _ExecuteForProdClusters
      | summarize by prefix
      | sort by prefix asc
      | extend RowNum = row_number()
      | union (datatable (prefix: string, RowNum: long ) ['None', 0])
      | sort by RowNum asc
      | project prefix

