- id: DB-query-store-11
  Topic: QDS0007-How-to-fix-Query-Store_QDS_-initialization
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0007-How-to-fix-Query-Store_QDS_-initialization.md
  Prompts:
