- id: DB-query-store-18
  Topic: QDS0010-How-to-mitigate-QueryStore_StatementConten
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0010-How-to-mitigate-QueryStore_StatementConten.md
  Prompts:
  - SQL DB wafl log entries status
  - SQL DB MonWaflLogEntries AppName tag CommandType
  - SQL DB investigate wafl log entries
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWaflLogEntries
    ExecutedQuery: 'MonWaflLogEntries

      | where AppName == "QdsMitigator"

      | where tag == "Command"

      | where message contains "Qds statement contention issue"

      | where message contains "{DbName}"

      | where message contains "{ServerName}"

      | extend Cmd = parsejson(message)

      | extend CommandType = tostring(Cmd.CommandType), ExecutionStatus = toint(Cmd.ExecutionStatus)

      | where CommandType == "QdsOffCommand" and ExecutionStatus == 4'
- id: DB-query-store-19
  Topic: QDS0010-How-to-mitigate-QueryStore_StatementConten
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0010-How-to-mitigate-QueryStore_StatementConten.md
  Prompts:
  - SQL DB os wait stats activity
  - SQL DB MonDmOsWaitStats AppName AppTypeName ClusterName
  - SQL DB investigate os wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsWaitStats
    ExecutedQuery: 'let period = 5h;

      let granularity = 5m;

      let timestamps =  MonDmOsWaitStats

      | where TIMESTAMP > ago(period)

      | summarize by bin(TIMESTAMP, granularity);

      let wait_stats =  MonDmOsWaitStats

      | where AppTypeName == "Control"

      | where TIMESTAMP > ago(5h)

      | extend waiting_tasks = delta_waiting_tasks_count

      | extend signal_time_ms_per_wait = delta_signal_wait_time_ms / waiting_tasks

      | extend wait_time_ms_per_wait = delta_wait_time_ms / waiting_tasks

      | summarize avg(waiting_tasks), avg(signal_time_ms_per_wait), avg(wait_time_ms_per_wait), max(max_wait_time_ms) by ClusterName, AppName , wait_type, bin(TIMESTAMP, 5m)

      | where wait_type == "RESOURCE_SEMAPHORE_QUERY_COMPILE" or wait_type == "QDS_STMT"

      | project TIMESTAMP, wait_type , avg_wait_time_ms_per_wait;

      let qds_stmt_all =   timestamps

      | join kind = leftouter

      ('
- id: DB-query-store-20
  Topic: QDS0010-How-to-mitigate-QueryStore_StatementConten
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0010-How-to-mitigate-QueryStore_StatementConten.md
  Prompts:
  - SQL DB cloud database wait stats activity
  - SQL DB MonDmCloudDatabaseWaitStats AppName ClusterName
  - SQL DB investigate cloud database wait stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmCloudDatabaseWaitStats
    ExecutedQuery: 'let App = "{AppName}";

      let period = 5h;

      let granularity = 5m;

      let timestamps =  MonDmCloudDatabaseWaitStats

      | where TIMESTAMP > ago(period)

      |summarize by bin(TIMESTAMP, granularity);

      let cloud_database_wait_stats = MonDmCloudDatabaseWaitStats

      | where AppName == App

      | where TIMESTAMP > ago(period)

      | extend waiting_tasks = delta_waiting_tasks_count

      | extend signal_time_ms_per_wait = delta_signal_wait_time_ms / waiting_tasks

      | extend wait_time_ms_per_wait = delta_wait_time_ms / waiting_tasks

      | summarize avg(waiting_tasks), avg(signal_time_ms_per_wait), avg(wait_time_ms_per_wait), max(max_wait_time_ms) by ClusterName, AppName , wait_type, bin(TIMESTAMP, granularity)

      | where wait_type == "RESOURCE_SEMAPHORE_QUERY_COMPILE" or wait_type == "QDS_STMT"

      | project TIMESTAMP, wait_type , avg_wait_time_ms_per_wait;

      let qds_stmt_all =   timestamps

      | join kind = leftouter

      ('
