SqlSkills:
- id: DB-query-store-1
  Topic: QDS0003-Check-state-of-QDS-for-a-Database
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0003-Check-state-of-QDS-for-a-Database.md
  Prompts:
  - SQL DB query store analysis
  - SQL DB MonQueryStoreInfo event LogicalServerName
  - SQL DB investigate query store
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryStoreInfo
    ExecutedQuery: 'MonQueryStoreInfo

      | where TIMESTAMP > now(-2h)

      | where LogicalServerName =~ "{logical_server_name}"

      | where logical_database_name =~ "{logical_database_name}"

      | where event contains "query_store_db_diagnostics"

      | top 1 by TIMESTAMP desc

      | project db_state_actual'
- id: DB-query-store-2
  Topic: QDS0003-Check-state-of-QDS-for-a-Database
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0003-Check-state-of-QDS-for-a-Database.md
  Prompts:
  - SQL DB query store analysis
  - SQL DB MonQueryStoreInfo event LogicalServerName
  - SQL DB investigate query store
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryStoreInfo
    ExecutedQuery: 'MonQueryStoreInfo

      | where LogicalServerName == "{logical_server_name}"

      | where logical_database_name == "{logical_database_name}"

      | where event == "query_store_disk_size_info" or event == "query_store_loaded"'
- id: DB-query-store-3
  Topic: QDS0005-How-to-investigate-AIMS-alert-QueryStoreUn
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0005-How-to-investigate-AIMS-alert-QueryStoreUn.md
  Prompts:
  - SQL DB os exceptIOn stats analysis
  - SQL DB MonDmOsExceptionStats AppName TIMESTAMP
  - SQL DB investigate os exceptIOn stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsExceptionStats
    ExecutedQuery: 'MonDmOsExceptionStats

      | where AppName == "<AppName>" and exception_id != 12412

      | where TIMESTAMP > datetime(<alert_start_time>) and TIMESTAMP < datetime(<alert_end_time>)

      | where exception_count != delta_exception_count

      | project TIMESTAMP, start_utc_date, end_utc_date, exception_id, delta_exception_count'
- id: DB-query-store-4
  Topic: QDS0005-How-to-investigate-AIMS-alert-QueryStoreUn
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0005-How-to-investigate-AIMS-alert-QueryStoreUn.md
  Prompts:
  - SQL DB SQL system health
  - SQL DB MonSQLSystemHealth event LogicalServerName
  - SQL DB investigate SQL system health
  CustomizedParameters:
  - DatabaseName
  - NodeName
  - ServerName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'MonSQLSystemHealth

      | where event == "errorlog_written"

      | where message !contains "Backup" and message !contains "18057" and message !contains "will drop"

      | where LogicalServerName == \"{ServerName}\" and NodeName == \"{NodeName}\"

      | where TIMESTAMP > datetime(<alert_start_time>) and TIMESTAMP < datetime(<alert_end_time>)

      | project TIMESTAMP, database_id, call_stack, message

      | order by TIMESTAMP desc

      | take 20'
- id: DB-query-store-5
  Topic: QDS0005-How-to-investigate-AIMS-alert-QueryStoreUn
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0005-How-to-investigate-AIMS-alert-QueryStoreUn.md
  Prompts:
  - SQL DB os exceptIOn stats analysis
  - SQL DB MonDmOsExceptionStats AppName TIMESTAMP
  - SQL DB investigate os exceptIOn stats
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsExceptionStats
    ExecutedQuery: 'MonDmOsExceptionStats

      | where AppName == "<AppName>"

      | where exception_id in (12412, 12414, 12415, 12428, 12429, 12434, 12435, 12436)

      | where TIMESTAMP > ago(1h)

      | project TIMESTAMP, exception_id, delta_exception_count

      | order by TIMESTAMP desc'
- id: DB-query-store-6
  Topic: QDS0006-How-to-mitigate-QueryStore_HighMemCacheRS_
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0006-How-to-mitigate-QueryStore_HighMemCacheRS_.md
  Prompts:
  - SQL DB wafl log entries status
  - SQL DB MonWaflLogEntries LogicalServerName TIMESTAMP
  - SQL DB investigate wafl log entries
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWaflLogEntries
    ExecutedQuery: 'MonWaflLogEntries

      | where TIMESTAMP > ago(2h)

      | where tag == "Command"

      | extend Cmd = parsejson(message)

      | extend LogicalServerName= tostring(Cmd.ServerName), LogicalDatabaseName= tostring(Cmd.DatabaseName), ExecutionStatus = toint(Cmd.ExecutionStatus), CommandType = tostring(Cmd.CommandType)

      | where CommandType == "QdsOffCommand" and ExecutionStatus == 4 and (LogicalServerName== "{ServerName}") and LogicalDatabaseName == "{DatabaseName}"

      | order by TIMESTAMP desc'
- id: DB-query-store-7
  Topic: QDS0006-How-to-mitigate-QueryStore_HighMemCacheRS_
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0006-How-to-mitigate-QueryStore_HighMemCacheRS_.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonGovernorResourcePools LogicalServerName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonGovernorResourcePools
    ExecutedQuery: 'MonGovernorResourcePools

      | where PreciseTimeStamp > ago(75m)

      | where ago(60m) > PreciseTimeStamp

      | where name == "internal" and AppTypeName in ("Worker.ISO", "Worker.ISO.Premium")

      | project ClusterName , AppName , LogicalServerName , name, used_memory_kb , max_memory_kb, NodeName, AppTypeName

      | summarize AvailableMemoryKb = max(max_memory_kb) by ClusterName, AppTypeName , AppName, LogicalServerName

      | project ClusterName , AppTypeName , AppName , LogicalServerName , AvailableMemoryKb

      | join kind=inner

      ('
- id: DB-query-store-8
  Topic: QDS0006-How-to-mitigate-QueryStore_HighMemCacheRS_
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0006-How-to-mitigate-QueryStore_HighMemCacheRS_.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonDmOsMemoryClerks LogicalServerName AppName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmOsMemoryClerks
    ExecutedQuery: 'MonDmOsMemoryClerks

      | where (PreciseTimeStamp >= ago(75m))

      | where (PreciseTimeStamp < ago(60m))

      | where pages_kb > 10000

      | where ((type == "CACHESTORE_QDSRUNTIMESTATS") or (type == "USERSTORE_QDSSTMT" ))

      | summarize MinPagesKb = min(pages_kb), MaxPagesKb = max(pages_kb), AvgPagesKb = avg(pages_kb)

      by ClusterName, AppName, LogicalServerName, AppTypeName, type, name

      | project ClusterName, AppName, LogicalServerName, AppTypeName, type, name, MinPagesKb , MaxPagesKb , AvgPagesKb

      )

      on ClusterName , AppTypeName, AppName, LogicalServerName

      | project ClusterName , AppTypeName , AppName , LogicalServerName , AvailableMemoryKb, type, name,

      MinPagesKb , MaxPagesKb , AvgPagesKb

      | extend AvgMemoryUsagePercent = bin(100.0 * AvgPagesKb / AvailableMemoryKb , 0.1)

      | extend MaxMemoryUsagePercent = bin(100.0 * MaxPagesKb / AvailableMemoryKb , 0.1)

      | project ClusterName , AppTypeName , AppName , LogicalServerName , AvgMemoryUsagePercent,

      MaxMemoryUsagePercent , AvailableMemoryKb, type, name, MinPagesKb , MaxPagesKb , AvgPagesKb

      | join kind=leftouter

      ('
- id: DB-query-store-9
  Topic: QDS0006-How-to-mitigate-QueryStore_HighMemCacheRS_
  Source: TSG-SQL-DB-QueryStore/TSGs/QDS0006-How-to-mitigate-QueryStore_HighMemCacheRS_.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonQueryStoreInfo LogicalServerName DatabaseName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonQueryStoreInfo
    ExecutedQuery: 'MonQueryStoreInfo

      | where TIMESTAMP > ago(2h)

      | project ClusterName , AppTypeName , AppName , LogicalServerName , logical_database_name

      | summarize by ClusterName , AppTypeName , AppName , LogicalServerName , logical_database_name

      )

      on ClusterName , AppTypeName , AppName , LogicalServerName

      | project ClusterName , AppTypeName , AppName , ServerName = LogicalServerName,

      DatabaseName = logical_database_name , DatabaseId = -1, AvgMemoryUsagePercent,

      MaxMemoryUsagePercent , AvailableMemoryKb, type, name, MinPagesKb , MaxPagesKb , AvgPagesKb

      | where MaxMemoryUsagePercent > 20

      | where DatabaseName <> "msdb"

      | project ClusterName, ServerName, DatabaseName, DatabaseId'
