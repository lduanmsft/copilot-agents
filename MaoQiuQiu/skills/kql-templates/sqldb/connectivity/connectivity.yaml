  - SQL DB MonRgLoad event AppName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP > ago(20d)

      | where ClusterName in (tenantrings)

      | where event == "instance_load"

      | where service_manifest_name == "SQL"

      | where code_package_name == "Code"

      | extend AppName = tostring(split(application_name, ''/'')[-1])

      | where AppName in (appnames)

      | summarize by application_name, AppName, cpu_count, allocated_cpus

      | extend parsed_allocated_cpus = parse_json(allocated_cpus)

      | extend cpumask = tostring(iff(isempty(parsed_allocated_cpus.Group0), parsed_allocated_cpus.Group1, parsed_allocated_cpus.Group0))

      | extend cpu_count_from_cpumask = bitset_count_ones(tolong(cpumask))

      | project application_name, AppName, cpu_count, cpumask, cpu_count_from_cpumask

      | distinct application_name, cpu_count, cpu_count_from_cpumask;'
- id: DB-connectivity-281
  Topic: enable-instance-level-throttling
