- id: DB-connectivity-182
  Topic: high-memory-consumption-on-gateway
  Source: TSG-SQL-DB-Connectivity/TSG/gateway/high-memory-consumption-on-gateway.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonRgLoad event AppName AppTypeName NodeName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
