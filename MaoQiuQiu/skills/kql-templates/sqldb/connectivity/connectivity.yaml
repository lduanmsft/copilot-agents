- id: DB-connectivity-180
  Topic: gateway-capacity
  Source: TSG-SQL-DB-Connectivity/TSG/gateway/gateway-capacity.md
  Prompts:
  - SQL DB login failures error 0
  - SQL DB MonLogin error event AppTypeName ClusterName
  - SQL DB troubleshoot login failures error 0
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where TIMESTAMP >= datetime(2018/7/11 10:00)

      | where ClusterName =~ "{ClusterName}"

      | where event == "process_login_finish"

      //| where NodeName in ("GW.40")

      | where extra_info != "" and error == 0

      //and total_time_ms >= 5000

      | extend tokens=split(extra_info, ",")

      | extend SslS1= toint(extract(""SslS":"(.*)"", 1, tostring(tokens[2])))

      | extend SslE1= toint(extract(""SslE":"(.*)"", 1, tostring(tokens[4])))

      | extend schannelacpt1 = SslE1 - SslS1

      | extend SslS2= toint(extract(""SslS":"(.*)"", 1, tostring(tokens[5])))

      | extend SslE2= toint(extract(""SslE":"(.*)"", 1, tostring(tokens[7])))

      | extend schannelacpt2 = SslE2 - SslS2

      | extend aceptsec1 = toint(extract(""AcptSec":"(.*)"", 1, tostring(tokens[3])))

      | extend aceptsec2 = toint(extract(""AcptSec":"(.*)"", 1, tostring(tokens[6])))

      | where AppTypeName == "Gateway"

      //| summarize schannel_acpt1 = avg(schannelacpt1), schannel_acpt2 = avg(schannelacpt2) , acptsec1_max=max(aceptsec1), acptsec2_max=max(aceptsec2) by process_id, NodeName, tm = bin(originalEventTimestamp, 30s)

      | where aceptsec1 > GWcore or aceptsec2 > GWcore

      | extend busy = iff(aceptsec1 < GWcore, "normal", iff(aceptsec1 < GWcore * 2, "busy", iff(aceptsec1 < GWcore * 5, "extra busy", "super busy")))

      //| project schannel_acpt1 , schannel_acpt2 ,process_id, tm , NodeName , acptsec1_max, acptsec2_max

      | summarize count() by busy, bin(originalEventTimestamp, 30s)

      | render timechart'
