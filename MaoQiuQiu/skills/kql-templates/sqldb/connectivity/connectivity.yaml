    ExecutedQuery: 'let varAzureClusterName = "{ClusterName}";

      cluster("Azurecm").database("AzureCM").LogNodeSnapshot

      | where Tenant contains varAzureClusterName

      | project PreciseTimeStamp, Tenant, nodeState, nodeAvailabilityState, nodeId, faultDomain, containerCount, aliveContainerCount

