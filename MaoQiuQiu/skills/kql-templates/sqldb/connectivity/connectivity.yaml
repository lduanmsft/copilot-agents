- id: DB-connectivity-12
  Topic: get-application-certificate-details
  Source: TSG-SQL-DB-Connectivity/TSG/auth-certificates-tls/get-application-certificate-details.md
  Prompts:
  - SQL DB certificate rotation
  - SQL DB MonLogin event AppTypeName NodeName ClusterName
  - SQL DB investigate certificate rotation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp >= ago(15m)

      //| where ClusterName contains "tr8399.eastus2-a.worker.database.windows.net" and NodeName == "{NodeName}"

      | where event == "certificate_report"

      | where cert_name != "" and thumbprint != ""

      | summarize count() , arg_max(originalEventTimestamp, thumbprint)  by cert_name,  AppTypeName, ClusterName, package //, NodeName'
- id: DB-connectivity-13
  Topic: set-xdbcertificatethumbprint-cas-command
  Source: TSG-SQL-DB-Connectivity/TSG/auth-certificates-tls/set-xdbcertificatethumbprint-cas-command.md
  Prompts:
  - SQL DB certificate watchdog rotation
  - SQL DB MonMachineLocalWatchdog component NodeName
  - SQL DB investigate certificate watchdog rotation
  CustomizedParameters:
  - ClusterName
  - DatabaseName
  - NodeName
  - ServerName
  KustoQueries:
  - TableName: MonMachineLocalWatchdog
    ExecutedQuery: 'MonMachineLocalWatchdog

      | where component == "CertificateWatchdog"

      | where PreciseTimeStamp > ago(4d) and PreciseTimeStamp < ago(3d)

      | where ClusterName == \"{ClusterName}\" and NodeName == \"{NodeName}\"

      | extend  new_message = message_resourcename

      | where message_resourcename  has "LocalMachine/My"

      | summarize argmax(TIMESTAMP, new_message) by ClusterName, NodeName, new_message, code_package_version, package

      | extend tokens=split(max_TIMESTAMP_new_message, ";")

      | extend Created= todatetime(extract("Created=(.*)", 1, tostring(tokens[3])))

      | extend Expires= todatetime(extract("Expires=(.*)", 1, tostring(tokens[4])))

      | extend Subject=extract("Subject=(.*)", 1, tostring(tokens[1]))

      | extend Thumbprint=extract("Thumbprint=(.*)", 1, tostring(tokens[2]))

      | where Subject !startswith "CN=sakenc" and Subject !startswith "CN=storagekey"

      | project ClusterName, NodeName, code_package_version, package, Created, Expires, Thumbprint, Subject

      | sort by Created'
