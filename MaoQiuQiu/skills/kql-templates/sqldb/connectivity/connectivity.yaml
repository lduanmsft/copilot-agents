- id: DB-connectivity-113
  Topic: low-customer-database-availability-rca
  Source: TSG-SQL-DB-Connectivity/TSG/customer/low-customer-database-availability-rca.md
  Prompts:
  - SQL DB get runner log errors
  - SQL DB GetSqlRunnerLog TIMESTAMP TR Port Region
  - SQL DB troubleshoot get runner log errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: GetSqlRunnerLog
    ExecutedQuery: 'let DB= \"{DatabaseName}\";

      let startTime= ago({TimeRange});

      let endTime= now();

      let Region = "westus1-a";

      cluster(''sqlazureeas2.kusto.windows.net'').database(''sqlazure1'').GetSqlRunnerLog()

      | where TIMESTAMP between (startTime .. endTime)

      | where InstanceName contains "WalmartDatabaseNodeAvailability" and  UserField1 contains Region and UserField1 !startswith "After RefreshCache"

      | summarize by InstanceName

      | join kind=inner  cluster(''sqlazureeas2.kusto.windows.net'').database(''sqlazure1'').GetSqlRunnerLog()

      on $left.InstanceName==$right.InstanceName

      | where InstanceName =~ "AzureSQLDB.Mon.WalmartDatabaseNodeAvailabilityProbeRunnerInstanceProdWus1a" or InstanceName =~ "AzureSQLDB.Mon.WalmartDatabaseNodeAvailabilityProbeRunnerGeoLocatedInstanceProdWus1a"

      | where TIMESTAMP between (startTime .. endTime)

      | where (UserField1 contains "error" or UserField1 contains "exception" or UserField1 contains "fail" )  and  UserField1 contains DB

      | extend TRandPort =  extract(@"(tr\d+\.\w+-\w+\.\w+\.database\.windows\.net:\d+)", 0, UserField1)

      | extend TR=  tostring(split(TRandPort,":" )[0] )

      | extend Port = tostring(split(TRandPort,":" )[1] )

      | extend DB = extract(@"(_DB_\d+)", 0, UserField1 )

      | project Tenant, RoleInstance, UserField1, TR, Port, DB'
