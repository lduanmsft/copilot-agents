- id: DB-connectivity-273
  Topic: runner-login-issues
  Source: TSG-SQL-DB-Connectivity/TSG/web-query-endpoint/runner-login-issues.md
  Prompts:
  - SQL DB web query endpoint errors
  - SQL DB MonWebQueryEndpoint event logical_server_name
  - SQL DB troubleshoot web query endpoint errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonWebQueryEndpoint
    ExecutedQuery: 'MonWebQueryEndpoint

      | where package == "WebQueryEndpointPackage" and operation_name == "POST/DATABASES/QUERY" and event == "waf_operation_end"

      | extend url = parse_url(request_url)

      | extend server = tostring(url.Host)

      | extend database = url_decode(extract("^/databases/([^/]+)/", 1, tostring(url.Path)))

      | extend success = response_code < 500

      | extend error_code = strcat("HTTP ", response_code)

      )

      | summarize database = any(database), logical_server_name = any(server), backend_cluster_name = any(ClusterName), backend_node_name = any(NodeName), app_name = any(AppName),

      failure_count = countif(success == 0 or elapsed_time_milliseconds > 14000), success_count = countif(success == 1), total_count = count() by bin(originalEventTimestamp, 1min)

      | extend availability = iff(99 > ((success_count / total_count) * 100), "unavailable", "available")

      | project originalEventTimestamp, [''database''], app_name, logical_server_name, backend_cluster_name, backend_node_name, availability

      | summarize server = any(logical_server_name), backend_cluster = any(backend_cluster_name), backend_node = any(backend_node_name), app = any(app_name), mins_unavailable = countif(availability == "unavailable") by [''database'']'
