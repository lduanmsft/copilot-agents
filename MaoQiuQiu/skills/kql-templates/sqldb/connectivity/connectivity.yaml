- id: DB-connectivity-16
  Topic: connections-with-tls-10-and-tls-11-getting-proxied
  Source: TSG-SQL-DB-Connectivity/TSG/auth-certificates-tls/deprecation-of-tls-10-and-tls-11/connections-with-tls-10-and-tls-11-getting-proxied.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin is_success event logical_server_name
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: "MonLogin\n| where originalEventTimestamp > \n| where logical_server_name =~ \\\"{ServerName}\\\"\n| where event == \"process_login_finish\"\n| where package =~ \"xdbgateway\"\n| where database_name =~ \\\"{DatabaseName}\\\"\n| extend ConnectionPolicy = iff(result == \"e_crContinueSameState\", \"Proxy\", \"Redirect\")\n| summarize count() by package, is_success, ssl_protocol,ConnectionPolicy,result, application_name, tohex(tds_version)"
- id: DB-connectivity-17
  Topic: connections-with-tls-10-and-tls-11-getting-proxied
  Source: TSG-SQL-DB-Connectivity/TSG/auth-certificates-tls/deprecation-of-tls-10-and-tls-11/connections-with-tls-10-and-tls-11-getting-proxied.md
  Prompts:
