- id: DB-connectivity-164
  Topic: alias-mismatch-tolower-issue
  Source: TSG-SQL-DB-Connectivity/TSG/gateway/alias-mismatch-tolower-issue.md
  Prompts:
  - SQL DB login failures
  - SQL DB MonLogin error state event logical_server_name
  - SQL DB troubleshoot login failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp >= startTime and originalEventTimestamp <= endTime

      | where event == ''process_login_finish''

      | where error != 0 or state != 0

      | where isnotempty(logical_server_name) and isnotempty(database_name)

      | extend errorInfo = strcat_delim("_", tostring(error), tostring(state))

      | summarize errorCount = count(), errorSet = make_set(errorInfo) by oneMinuteBucket = bin(originalEventTimestamp,1m), logical_server_name, database_name

      | where errorCount > 0

      | summarize numOneMinWindowsWithErrors = count() by logical_server_name, database_name, errors = tostring(errorSet)

      | where numOneMinWindowsWithErrors > numOneMinWindowsWithErrorsTolerance

      | project logical_server_name, database_name, errors

      // Next, identify the fabric_alias_uri that the Gateway is using while looking up the database location.

      | join kind=inner ('
- id: DB-connectivity-165
  Topic: alias-mismatch-tolower-issue
  Source: TSG-SQL-DB-Connectivity/TSG/gateway/alias-mismatch-tolower-issue.md
  Prompts:
  - SQL DB login failures
  - SQL DB MonLogin event logical_server_name database_name
  - SQL DB troubleshoot login failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp >= startTime and originalEventTimestamp <= endTime

      | where event == ''process_login_finish'' and package == "xdbgateway"

      | summarize by logical_server_name, database_name, fabric_alias_uri

      ) on logical_server_name, database_name

      | project logical_server_name, database_name, errors, fabric_alias_uri

      | where isnotempty(fabric_alias_uri)

      // Then look for recent updates to the SQL alias cache for that fabric_alias_uri.

      // Use case insensitive comparison while checking for updates, in case the casing

      // for the update is different.

      | extend fabric_alias_uri_lower = tolower(fabric_alias_uri)

      | join kind=inner ('
- id: DB-connectivity-166
  Topic: alias-mismatch-tolower-issue
  Source: TSG-SQL-DB-Connectivity/TSG/gateway/alias-mismatch-tolower-issue.md
  Prompts:
  - SQL DB redirector failures
  - SQL DB MonRedirector event logical_server_name
  - SQL DB troubleshoot redirector failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRedirector
    ExecutedQuery: 'MonRedirector

      | where originalEventTimestamp >= (startTime - sqlAliasCacheLookback) and originalEventTimestamp <= endTime

      | where event == "sql_alias_cache_insert" or event == "sql_alias_cache_update"

      | summarize by lookup_name

      | extend lookup_name_lower = tolower(lookup_name)) on $left.fabric_alias_uri_lower == $right.lookup_name_lower

      | project logical_server_name, database_name, errors, fabric_alias_uri, lookup_name

      // Finally, filter the results to include only those where the casing for the update

      // does not match the casing for the lookup.

      | where lookup_name != fabric_alias_uri'
- id: DB-connectivity-167
  Topic: batch-kill-gateways
  Source: TSG-SQL-DB-Connectivity/TSG/gateway/batch-kill-gateways.md
  Prompts:
  - SQL DB login activity
  - SQL DB MonLogin NodeName ClusterName originalEventTimestamp
  - SQL DB investigate login
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      // Discovery

      | where originalEventTimestamp >= ago(1h)

      | where NodeName startswith nodeNamePrefix

      | where ClusterName contains regionNameSearchStr

      | extend clusterShortName = substring(ClusterName, 0 , indexof(ClusterName, "."))

      | where clusterShortName in (targetClusters)

      | summarize by ClusterName, clusterShortName, NodeName

      | where not(NodeName in (nodeNamesToExclude))

      // Sorting

      | extend nodeNo = extract("\\d+", 0, NodeName, typeof(int))

      | order by clusterShortName asc, nodeNo asc

      // Merging to kill one instance from each CLuster

      | extend killOrder = row_number(1, ClusterName != prev(ClusterName))

      | sort by killOrder asc

      // Setting kill commands

      | extend Cmd= strcat("Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, "  | ", killCmd)

      | extend Cmd = iif(killOrder != prev(killOrder,1,1), strcat("echo \"Start-Sleep -Seconds " , killPeriodInSeconds , "\"\r\n", "Start-Sleep -Seconds " , killPeriodInSeconds , "\r\n", "echo \"", Cmd, "\"\r\n", Cmd, "\r\n") , strcat("echo \"", Cmd, "\"\r\n", Cmd, "\r\n"))

      // Aggregating the commands to build script file content.

      | summarize SessionCount = max(killOrder), GatewayCount = count(), CmdSet = make_set(Cmd)

      // Get a string value of the array

      | extend CmdScript = strcat_array(CmdSet, "")

      | extend TimeToKillAllGWs = killPeriodInSeconds * SessionCount * 1s

      | project GatewayCount, SessionCount, TimeToKillAllGWs, CmdScript'
