- id: DB-connectivity-301
  Topic: high-thread-count-on-XDB host
  Source: TSG-SQL-DB-Connectivity/TSG/XDB host/high-thread-count-on-XDB host.md
  Prompts:
  - SQL DB CPU pressure analysis
  - SQL DB MonRgLoad NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot CPU pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where TIMESTAMP between (_startTime .. _endTime)

      | where ClusterName =~ ClusterNameVar

      | where NodeName =~ NodeNameVar

      | where application_name =~ ''fabric:/Worker''

      | summarize by allocated_cpus

      | where isnotempty(allocated_cpus)

      | extend allocated_cpus = parse_json(allocated_cpus)

      | extend group0Cpus = allocated_cpus.Group0, group1Cpus = allocated_cpus.Group1

      | extend cpuGroup = iff(isnotempty(group0Cpus), 0, 1), cpuMask = iff(isnotempty(group0Cpus), group0Cpus, group1Cpus)

      | extend cpuDict = generateParsedDict(cpuMask)

      | extend cpuFiltersString = generateCpuFilter(cpuDict, cpuGroup, '''')

      | extend cpuGroup = iff(isnotempty(group1Cpus), 1, 0), cpuMask = iff(isnotempty(group1Cpus), group1Cpus, group0Cpus)

      | extend cpuDict = generateParsedDict(cpuMask)

      | extend cpuFiltersString = generateCpuFilter(cpuDict, cpuGroup, cpuFiltersString)

      | extend cpuFiltersString = trim_end('';'', tostring(cpuFiltersString))

      | extend cpuFilters = split(cpuFiltersString, '';'')

      | project cpuFilters;'
