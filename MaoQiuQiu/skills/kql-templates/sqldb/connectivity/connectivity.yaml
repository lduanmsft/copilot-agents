  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp between (_startTime .. _endTime)

      | where ClusterName =~ ClusterNameVar and NodeName =~ NodeNameVar

      | where event =~ ''process_login_finish'' and AppName =~ ''worker''

      | where isnotempty(server_name) and server_name !startswith ''azuresql-probe''

      | extend acceptSecContextArray = parse_xml(extra_info).events.AcceptSecurityContext

      | extend AcceptSecurityContextThreads = max_of(toint(acceptSecContextArray[0]), toint(acceptSecContextArray[1]))

      | project originalEventTimestamp, AcceptSecurityContextThreads, ssl_secure_call_time_ms, process_id = tostring(process_id)

      | make-series MaxAcceptSecurityContextThreads = max(AcceptSecurityContextThreads) on originalEventTimestamp from bin(_startTime, 1m) to _endTime step 30s by process_id'
