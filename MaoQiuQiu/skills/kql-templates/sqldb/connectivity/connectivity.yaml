SqlSkills:
- id: DB-connectivity-1
  Topic: alias-db-failure-alert
  Source: TSG-SQL-DB-Connectivity/TSG/alias/alias-db-failure-alert.md
  Prompts:
  - SQL DB alias ODBC failures
  - SQL DB MonRedirector event AppTypeName ClusterName
  - SQL DB troubleshoot alias ODBC failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRedirector
    ExecutedQuery: 'MonRedirector

      | where originalEventTimestamp > ago(30m)

      | where event == "sql_alias_odbc_failure"

      | where AppTypeName =~ ''gateway''

      | summarize FailureCount = count(), FailureStartTime = min(originalEventTimestamp), FailureEndTime = max(originalEventTimestamp), GatewayNodesWithFailure = strcat_array(make_set(NodeName), '','') by AppTypeName, ClusterName;'
- id: DB-connectivity-2
  Topic: alias-db-failure-alert
  Source: TSG-SQL-DB-Connectivity/TSG/alias/alias-db-failure-alert.md
  Prompts:
  - SQL DB login failures error 40613
  - SQL DB MonLogin error state lookup_state event
  - SQL DB troubleshoot login failures error 40613
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where TIMESTAMP between (st .. et)

      | where event == "process_login_finish"

      | where ClusterName =~ cr

      | where error==40613 and state ==4 //and lookup_state =="FABRIC_E_SERVICE_DOES_NOT_EXIST"

      | summarize count(), make_set(NodeName), dcount(logical_server_name), make_set(lookup_error_code) by package, error, state, bin(originalEventTimestamp, 3m)

      | order by count_;'
- id: DB-connectivity-3
  Topic: alias-db-log-full
  Source: TSG-SQL-DB-Connectivity/TSG/alias/alias-db-log-full.md
  Prompts:
  - SQL DB transaction log usage
  - SQL DB MonDmIoVirtualFileStats AppName AppTypeName
  - SQL DB investigate transaction log usage
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonDmIoVirtualFileStats
    ExecutedQuery: 'MonDmIoVirtualFileStats

      | where PreciseTimeStamp >= ago(4h)

      | where ClusterName ==  clusterName and AppName  == appName

      | where  db_name contains "sqlaliasdatabase" and type_desc == "LOG" and is_primary_replica == 1 and AppTypeName  == "Worker.ISO.Control"

      | summarize argmin(originalEventTimestamp, spaceused_mb, max_size_mb) by bin(originalEventTimestamp, time(10m)), AppTypeName, AppName, ClusterName

      | project originalEventTimestamp, spaceused_mb = min_originalEventTimestamp_spaceused_mb, max_size_mb = min_originalEventTimestamp_max_size_mb, AppTypeName, AppName, ClusterName

      | extend max_size_usage_percentage = round(10000 * spaceused_mb / todouble(max_size_mb)) / 100'
- id: DB-connectivity-4
  Topic: alias-db-node-error-state
  Source: TSG-SQL-DB-Connectivity/TSG/alias/alias-db-node-error-state.md
  Prompts:
  - SQL DB node health issues
  - SQL DB AlrWinFabHealthNodeEvent NodeName ClusterName
  - SQL DB troubleshoot node health issues
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrWinFabHealthNodeEvent
    ExecutedQuery: 'AlrWinFabHealthNodeEvent

      | where TIMESTAMP between (startTime .. endTime)

      | where ClusterName == <clusterName>

      | where HealthState != "Ok"

      | where NodeName == <emitterNode>

      | project TIMESTAMP, NodeName, NodeEntityName, HealthState, SourceId, Property, Description'
- id: DB-connectivity-5
  Topic: alias-db-node-error-state
  Source: TSG-SQL-DB-Connectivity/TSG/alias/alias-db-node-error-state.md
  Prompts:
  - SQL DB application health issues
  - SQL DB AlrWinFabHealthApplicationState NodeName
  - SQL DB troubleshoot application health issues
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrWinFabHealthApplicationState
    ExecutedQuery: 'AlrWinFabHealthApplicationState

      | where TIMESTAMP between (startTime .. endTime)

      | where HealthState != "Ok"

      | where NodeName == <emitterNode>

      | project TIMESTAMP, NodeName, ApplicationName, HealthState, ReasonUnhealthy'
- id: DB-connectivity-6
  Topic: missing-alias-records
  Source: TSG-SQL-DB-Connectivity/TSG/alias/missing-alias-records.md
  Prompts:
  - SQL DB login failures
  - SQL DB MonLogin error state is_success lookup_state
  - SQL DB troubleshoot login failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp >= ago(<time window>)

      | where event == "process_login_finish"

      | where is_success == 0

      | summarize count() by AppTypeName, error, state, lookup_state, database_name,logical_server_name,ClusterName,AppName,fabric_instance_uri, fabric_alias_uri, fabric_node_name'
- id: DB-connectivity-7
  Topic: missing-server-dns-alias-records
  Source: TSG-SQL-DB-Connectivity/TSG/alias/missing-server-dns-alias-records.md
  Prompts:
  - SQL DB login failures
  - SQL DB MonLogin error state is_success lookup_state
  - SQL DB troubleshoot login failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp >= ago(<time window>)

      | where logical_server_name =~ svr and database_name =~ db

      | where event == "process_login_finish"

      | where is_success == 0

      | summarize count() by AppTypeName, error, state, lookup_state, database_name,logical_server_name,ClusterName,AppName,fabric_instance_uri, fabric_alias_uri, fabric_node_name'
- id: DB-connectivity-8
  Topic: aad-fed-auth-login-failures
  Source: TSG-SQL-DB-Connectivity/TSG/auth-certificates-tls/aad-fed-auth-login-failures.md
  Prompts:
  - SQL DB login failures
  - SQL DB MonLogin error state event logical_server_name
  - SQL DB troubleshoot login failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp > ago(12h)

      | where logical_server_name =~ \"{ServerName}\" and database_name =~ \"{DatabaseName}\"

      | where event == "process_login_finish" and not(isnull(error)) and error != 0

      | project originalEventTimestamp, AppName, NodeName, error, state, state_desc'
- id: DB-connectivity-9
  Topic: emergency-certificate-rotation
  Source: TSG-SQL-DB-Connectivity/TSG/auth-certificates-tls/emergency-certificate-rotation.md
  Prompts:
  - SQL DB certificate watchdog rotation
  - SQL DB MonMachineLocalWatchdog component NodeName
  - SQL DB investigate certificate watchdog rotation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonMachineLocalWatchdog
    ExecutedQuery: 'MonMachineLocalWatchdog

      | where PreciseTimeStamp > ago(3d)

      | where component == "CertificateWatchdog"

      | where message_resourcename has "LocalMachine"

      | extend new_message = message_resourcename

      | extend tokens=split(new_message, ";")

      | extend Subject=extract("Subject=(.*)", 1, tostring(tokens[1]))

      | extend Thumbprint=extract("Thumbprint=(.*)", 1, tostring(tokens[2]))

      | extend Created=extract("Created=(.*)", 1, tostring(tokens[3]))

      | extend Expires=extract("Expires=(.*)", 1, tostring(tokens[4]))

      | extend LogicalName = iff(arraylength(tokens) > 4, extract("RegistryLogicalName=(.*)", 1, tostring(tokens[5])), "")

      | extend CertStore = iff(arraylength(tokens) > 5, extract("CertStore=(.*)", 1, tostring(tokens[6])), "")

      | extend Key = strcat(ClusterName, "_", NodeName)

      | where ClusterName contains clu

      | extend exp = todatetime(Expires)

      | where LogicalName in ("ClusterCertificate", "ClusterZoneCertificate", "GatewayServerCertificate", "GatewaySqlAliasClient", "GatewayToServiceFabricCertificate", "RingIdentityCertificate", "SqlAliasSsl", "XdbHostTdsSslClusterCertificate")

      | summarize count(), expire = max(exp) by Subject, LogicalName,Thumbprint, ClusterName //,NodeName

      | where expire < now(45d)'
- id: DB-connectivity-10
  Topic: emergency-certificate-rotation
  Source: TSG-SQL-DB-Connectivity/TSG/auth-certificates-tls/emergency-certificate-rotation.md
  Prompts:
  - SQL DB certificate rotation
  - SQL DB MonLogin event AppTypeName ClusterName Thumbprint
  - SQL DB investigate certificate rotation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp >= ago(10h)

      | where AppTypeName  in ("Gateway", "Worker", "Worker.ISO.Control")

      | where event == "certificate_report"

      | summarize by cert_name,AppTypeName,  ClusterName, Thumbprint = thumbprint, package, process_id, bin(originalEventTimestamp, 1d)

      | join kind=leftouter

      ('
- id: DB-connectivity-11
  Topic: emergency-certificate-rotation
  Source: TSG-SQL-DB-Connectivity/TSG/auth-certificates-tls/emergency-certificate-rotation.md
  Prompts:
  - SQL DB certificate watchdog rotation
  - SQL DB MonMachineLocalWatchdog component ClusterName
  - SQL DB investigate certificate watchdog rotation
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonMachineLocalWatchdog
    ExecutedQuery: 'MonMachineLocalWatchdog

      | where PreciseTimeStamp > ago(3d)

      | where component == "CertificateWatchdog"

      | where message_resourcename has "LocalMachine"

      | extend new_message = message_resourcename

      | extend tokens=split(new_message, ";")

      | extend Subject=extract("Subject=(.*)", 1, tostring(tokens[1]))

      | extend Thumbprint=extract("Thumbprint=(.*)", 1, tostring(tokens[2]))

      | extend Created=extract("Created=(.*)", 1, tostring(tokens[3]))

      | extend Expires=extract("Expires=(.*)", 1, tostring(tokens[4]))

      | extend LogicalName = iff(arraylength(tokens) > 4, extract("RegistryLogicalName=(.*)", 1, tostring(tokens[5])), "")

      | extend CertStore = iff(arraylength(tokens) > 5, extract("CertStore=(.*)", 1, tostring(tokens[6])), "")

      | extend Key = strcat(ClusterName, "_", NodeName)

      | summarize count(), tostring(make_set(LogicalName)), nodes = dcount(NodeName), arg_max(originalEventTimestamp, Thumbprint) by Thumbprint, Subject, ClusterName, Expires

