  - SQL DB sum ClusterName TIMESTAMP SuccessRate
  - SQL DB troubleshoot sum errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: AlrLogin
    ExecutedQuery: '(WASD2Prod)AlrLogin

      | where TIMESTAMP >= ago(1h)

      | summarize sum(nb_connection_accept_failure_finish_is_system_error),

      sum(nb_connection_accept_finish + nb_connection_accept_failure_finish)

      by ClusterName, TIMESTAMP bin = time(1m)

      | extend TotalFailures = sum_nb_connection_accept_failure_finish_is_system_error

      | extend TotalSuccesses = sum_

      | extend SuccessRate = (TotalSuccesses * 1.0 / (TotalSuccesses * 1.0 + TotalFailures * 1.0)) * 100

      | project TIMESTAMP, SuccessRate, ClusterName

      | render timechart;'
