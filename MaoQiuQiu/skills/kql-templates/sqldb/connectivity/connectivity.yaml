- id: DB-connectivity-183
  Topic: high-memory-consumption-on-gateway
  Source: TSG-SQL-DB-Connectivity/TSG/gateway/high-memory-consumption-on-gateway.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonRgLoad event AppName AppTypeName NodeName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where originalEventTimestampFrom >= ago(1h)

      | where event == "instance_load" and ClusterName startswith "{ClusterName}"

      | where ClusterName contains regionNameSearchStr

      | summarize min(memory_load), avg(memory_load_cap) by ClusterName, AppTypeName, AppName, NodeName, NodeRole, application_name, code_package_name, service_manifest_name, bin(originalEventTimestampFrom, 15m)

      | project originalEventTimestampFrom, ClusterName, AppName, AppTypeName, NodeName, NodeRole, application_name, code_package_name, service_manifest_name, min_memory_load, avg_memory_load_cap

      | where NodeRole == "GW" and application_name == "fabric:/Gateway" and code_package_name == "Gateway.Code"

      | extend percent = min_memory_load*100 / avg_memory_load_cap

      | summarize arg_max(originalEventTimestampFrom, *) by ClusterName, NodeName

      | where percent > highMemThresholdPercentage

      | project ClusterName, NodeName, AppTypeName = "Gateway", AppName = "Gateway", percent

      | sort by ClusterName desc, percent desc

      | extend HighMemOrder = row_number(1, ClusterName != prev(ClusterName))

      | where HighMemOrder > TopSkipRecordCountForBot

      | sort by ClusterName desc

      | extend killOrder = row_number(1, ClusterName != prev(ClusterName))

      | sort by killOrder asc

      | extend Cmd= strcat("Get-FabricNode -NodeName ", NodeName, " -NodeClusterName ", ClusterName, "  | ", killCmd)

      | extend Cmd = iif(killOrder != prev(killOrder,1,1), strcat("echo \"Start-Sleep -Seconds " , killPeriodInSeconds , "\"\r\n", "Start-Sleep -Seconds " , killPeriodInSeconds , "\r\n", "echo \"", Cmd, "\"\r\n", Cmd, "\r\n") , strcat("echo \"", Cmd, "\"\r\n", Cmd, "\r\n"))

      // get a string value of the array

      // Aggregating the commands to build script file content.

      | summarize SessionCount = max(killOrder), GatewayCount = count(), CmdSet = make_set(Cmd)

      | extend CmdScript = strcat_array(CmdSet, "")

      | extend TimeToKillAllGWs = killPeriodInSeconds * SessionCount * 1s

      | project GatewayCount, SessionCount, TimeToKillAllGWs, CmdScript'
