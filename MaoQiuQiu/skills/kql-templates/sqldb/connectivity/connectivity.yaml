- id: DB-connectivity-72
  Topic: ucs-connection-failures
  Source: TSG-SQL-DB-Connectivity/TSG/connection/ucs-connection-failures.md
  Prompts:
  - SQL DB ucs connection failures
  - SQL DB ReplaceWithAppropriateTimestamp event name
  - SQL DB troubleshoot ucs connection failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonFabricClusters
    ExecutedQuery: 'let clusterName = "ReplaceWithAppropriateValue";

      let startTime = ReplaceWithAppropriateTimestamp;

      let perLogicalServerErrorPercentTolerance = 3;

      let monClustersTableLookback = ago(1d);

      let lookbackForLogicalServersInScope =  max_of(ago(3h), startTime);

      // Create a map of IP address to ClusterName for all CR

      let addressOfCluster = (MonFabricClusters

      | where PreciseTimeStamp >= monClustersTableLookback

      | where name == clusterName

      | summarize by ipv4_address);

      // Compute the number of logical servers for which UCS connections arrive

      let addressToNumLogicalServersMap = (MonUcsConnections

      | where originalEventTimestamp >= lookbackForLogicalServersInScope and originalEventTimestamp <= (now() - 15m)

      | where event == "ucs_connection_setup"

      | extend addressWithoutPrefix = replace_string(address, "tcp://", "")

      | extend addressWithoutPrefixParts = split(addressWithoutPrefix, ":")

      | extend ipAddress = tostring(addressWithoutPrefixParts[0])

      | where ipAddress in (addressOfCluster)

      | extend logicalServerId = strcat_delim("#", SubscriptionId, LogicalServerName)

      | summarize numLogicalServersPerCR = dcount(logicalServerId) by address);

      // Figure out which logical servers encountered errors.

      let logicalServersWithErrors = (MonUcsConnections

      | where originalEventTimestamp >= lookbackForLogicalServersInScope and originalEventTimestamp <= (now() - 15m)

      | extend addressWithoutPrefix = replace_string(address, "tcp://", "")

      | extend addressWithoutPrefixParts = split(addressWithoutPrefix, ":")

      | extend ipAddress = tostring(addressWithoutPrefixParts[0])

      | where ipAddress in (addressOfCluster)

      | where event == "ucs_connection_setup" and stream_status == "ConnectionError"

      | extend logicalServerId = strcat_delim("#", SubscriptionId, LogicalServerName)

      | summarize by logicalServerId);'
- id: DB-connectivity-73
  Topic: ucs-connection-failures
  Source: TSG-SQL-DB-Connectivity/TSG/connection/ucs-connection-failures.md
  Prompts:
  - SQL DB ucs connection failures
  - SQL DB MonUcsConnections event error_message address
  - SQL DB troubleshoot ucs connection failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonUcsConnections
    ExecutedQuery: 'MonUcsConnections

      | where originalEventTimestamp >= startTime and originalEventTimestamp <= (now() - 15m)

      | extend addressWithoutPrefix = replace_string(address, "tcp://", "")

      | extend addressWithoutPrefixParts = split(addressWithoutPrefix, ":")

      | extend ipAddress = tostring(addressWithoutPrefixParts[0])

      | where ipAddress in (addressOfCluster)

      | extend logicalServerId = strcat_delim("#", SubscriptionId, LogicalServerName)

      | where logicalServerId in (logicalServersWithErrors)

      | where event == "ucs_connection_setup" and (stream_status == "ConnectionError" or (stream_status == "None" and isempty(error_message)))

      | extend isError = case(stream_status == "ConnectionError", 1, 0)

      | summarize errorCount = sum(isError), totalCount = count() by timeBucket = bin(originalEventTimestamp,15m), logicalServerId, address

      | extend errorPercent = (100.0 * errorCount)/totalCount

      | where errorPercent > perLogicalServerErrorPercentTolerance

      | summarize numLogicalServersWithErrorsAboveThreshold = dcount(logicalServerId) by timeBucket, address

      | join kind=inner (addressToNumLogicalServersMap) on address

      | extend percentLogicalServersWithErrorsAboveThreshold = (100.0 * numLogicalServersWithErrorsAboveThreshold)/numLogicalServersPerCR

      | project timeBucket, percentLogicalServersWithErrorsAboveThreshold

      | render timechart'
