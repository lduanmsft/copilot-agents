- id: DB-connectivity-186
  Topic: proxy-login-throttle-failfast
  Source: TSG-SQL-DB-Connectivity/TSG/gateway/proxy-login-throttle-failfast.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin lookup_state event AppName ClusterName
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp >= ago(4h)

      | where event == "process_login_finish" and AppName =~ "gateway"

      | where extra_info contains "Start_Proxy"

      | where extra_info endswith ">"

      | extend events = iff(extra_info endswith "", extra_info, strcat(extra_info, ""))

      | extend info_json = parse_xml(events)

      | where isnull(info_json.events.Start_Proxy) == false

      | extend startprx = toint(info_json.events.Start_Proxy)

      | extend endprx = toint(info_json.events.End_ProxyOpen)

      | extend banprx = toint(info_json.events.Prxy_Banned)

      | extend prxtime = iff(lookup_state == 1460, total_time_ms - startprx, iff(lookup_state != "3050", endprx - startprx, banprx - startprx))

      | extend tr = split(instance_name, ".")

      | extend tre = iff(tr[1] startswith "HS", strcat(tr[1], ".", tr[2]), tr[1])

      | extend failedTR = iff(lookup_state != "SERVICE_ENDPOINT", strcat(fabric_node_name, ":", tre), "")

      | extend failedGW = iff(lookup_state != "SERVICE_ENDPOINT", NodeName, "")

      | extend timeopen = originalEventTimestamp - prxtime * 1ms

      | summarize count(), percentiles(prxtime, 95, 90, 80, 70), GWNode=dcount(NodeName), TR_num=dcount(tre), failedTRs = tostring(makeset(failedTR)), failedGWs = tostring(makeset(failedGW)) by ClusterName, lookup_state, tm = bin(timeopen,15s)'
- id: DB-connectivity-187
  Topic: proxy-login-throttle-failfast
  Source: TSG-SQL-DB-Connectivity/TSG/gateway/proxy-login-throttle-failfast.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin lookup_state event AppName tm events
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  - TimeRange
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp >= ago(1h)

      //| where originalEventTimestamp between (ago({TimeRange})..datetime(2023-10-05 03:00:00.0000000))

      | where event == "process_login_finish" and AppName =~ "gateway"

      | where extra_info contains "Start_Proxy"

      | where extra_info endswith ">"

      | extend events = iff(extra_info endswith "", extra_info, strcat(extra_info, ""))

      | extend info_json = parse_xml(events)

      | where isnull(info_json.events.Start_Proxy) == false

      | extend startprx = toint(info_json.events.Start_Proxy)

      | extend endprx = toint(info_json.events.End_ProxyOpen)

      | extend banprx = toint(info_json.events.Prxy_Banned)

      | extend prxtime = iff(lookup_state == 1460, total_time_ms - startprx, iff(lookup_state != "3050", endprx - startprx, banprx - startprx))

      | extend tr = split(instance_name, ".")

      | extend tre = iff(tr[1] startswith "HS", strcat(tr[1], ".", tr[2]), tr[1])

      | extend failedTR = iff(lookup_state != "SERVICE_ENDPOINT", strcat(fabric_node_name, ":", tre), "")

      | extend failedGW = iff(lookup_state != "SERVICE_ENDPOINT", NodeName, "")

      | extend timeopen = originalEventTimestamp - prxtime * 1ms

      | extend prxtimefix = iff(toint(lookup_state) > 10000, prxtime * -1, prxtime)

      | where instance_name contains targettr

      | summarize avg(prxtimefix) by lookup_state, tm = bin(timeopen,30s)

      | render timechart'
