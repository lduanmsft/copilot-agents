- id: DB-connectivity-287
  Topic: error-17803-state-13
  Source: TSG-SQL-DB-Connectivity/TSG/XDB host/error-17803-state-13.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonRgLoad NodeName ClusterName TIMESTAMP
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'cluster(clstr).database("sqlazure1").MonRgLoad

      | where TIMESTAMP > ago(7d)

      | where application_type in ("Worker.ISO", "Worker.ISO.Premium", "Worker.Vldb.Compute", "Worker.Vldb.LogReplica", "Worker.Vldb.Storage")

