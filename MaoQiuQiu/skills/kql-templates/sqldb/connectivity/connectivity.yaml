- id: DB-connectivity-30
  Topic: check-if-a-ring-has-accelerated-networking
  Source: TSG-SQL-DB-Connectivity/TSG/clusters-rings/check-if-a-ring-has-accelerated-networking.md
  Prompts:
  - SQL DB snapshot status
  - SQL DB LogContainerSnapshot PreciseTimeStamp nodeId
  - SQL DB investigate snapshot
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: LogContainerSnapshot
    ExecutedQuery: 'let incidentTime = now();

      let delta = 2d;

      let startTime = incidentTime - delta;

      let endTime = incidentTime + delta;

      cluster("azurecm").database("AzureCM").LogContainerSnapshot

      | where containerType startswith "SQL"

      | where roleInstanceName startswith "GW"

      | where PreciseTimeStamp between (startTime..endTime)

      | summarize by nodeId, roleInstanceName, containerId, subscriptionId

      | join (

      cluster("aznwsdn").database("aznwmds").ContainerInformationEvent

      | where PreciseTimeStamp > ago(2d)

      | summarize by ContainerId, NmAgentBuildInfo, GoalIOV , IOVEnabled , AccelNetEnabled , AccelNetGoalState , GftInUse , MacFilterSet , IsActive, PortId

      ) on $left.containerId == $right.ContainerId

      | where AccelNetGoalState == "Disable" and AccelNetEnabled == false

      | summarize by subscriptionId'
