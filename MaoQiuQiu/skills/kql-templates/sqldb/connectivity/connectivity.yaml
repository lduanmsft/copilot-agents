- id: DB-connectivity-299
  Topic: high-thread-count-on-XDB host
  Source: TSG-SQL-DB-Connectivity/TSG/XDB host/high-thread-count-on-XDB host.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin event AppName NodeName ClusterName
  - SQL DB investigate login events
  CustomizedParameters:
