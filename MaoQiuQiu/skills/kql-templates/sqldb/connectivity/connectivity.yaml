      | where event == ''process_login_finish'' and is_success == 0 and is_user_error == 0

      | where package =~ "xdbgateway" and AppName  =~ "Gateway"

      | summarize SystemErrorCount = count() by ClusterName, SubscriptionId, error, state, state_desc

      | sort by SystemErrorCount desc

      If the impact is seen on a single or a small set of subscription IDs,

      - Refer the TSGs in [Login Errors](https://eng.ms/docs/cloud-ai-platform/azure-data/azure-data-azure-databases/sql-/sql-connectivity/sql-db-connectivity/connection/login-errors/login-errors)

      - The most common errors with GW will be [40613 state 4](https://eng.ms/docs/cloud-ai-platform/azure-data/azure-data-azure-databases/sql-/sql-connectivity/sql-db-connectivity/connection/login-errors/error-40613-database-on-server-is-not-available#xdbgatewaystate-4), [40613 state 22](https://eng.ms/docs/cloud-ai-platform/azure-data/azure-data-azure-databases/sql-/sql-connectivity/sql-db-connectivity/connection/login-errors/error-40613-database-on-server-is-not-available#xdbgatewaystate-22). Use the respective TSGs to take further action

      - Depending on the error and state, triage locally and engage Gateway expert queue for further assistance. For 40613 state 22, the error may be occurring due to an issue with tenant rings. Proceed with steps outlined in the next section, [Determine Detailed Impact on Tenant Rings](#determine-detailed-impact-on-tenant-rings).'
