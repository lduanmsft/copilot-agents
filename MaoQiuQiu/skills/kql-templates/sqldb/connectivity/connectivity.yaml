- id: DB-connectivity-19
  Topic: logins-failing-with-171
  Source: TSG-SQL-DB-Connectivity/TSG/auth-certificates-tls/deprecation-of-tls-10-and-tls-11/logins-failing-with-171.md
  Prompts:
  - SQL DB login failures
  - SQL DB MonLogin error state is_success event AppTypeName
  - SQL DB troubleshoot login failures
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp >= ago(1d)

      | where event == "process_login_finish"

      | where (package == "xdbgateway" and AppTypeName =~ "Gateway")

      | where state == 171

      | where logical_server_name =~ \"{ServerName}\"  //Enter server name here

      | summarize count(),min(originalEventTimestamp),max(originalEventTimestamp) by ClusterName,logical_server_name, ssl_protocol, is_success, error, state, state_desc, is_user_error'
- id: DB-connectivity-20
  Topic: logins-failing-with-171
  Source: TSG-SQL-DB-Connectivity/TSG/auth-certificates-tls/deprecation-of-tls-10-and-tls-11/logins-failing-with-171.md
