- id: DB-connectivity-25
  Topic: azure-sql-gateways-in-region-have-availability-problems
  Source: TSG-SQL-DB-Connectivity/TSG/clusters-rings/azure-sql-gateways-in-region-have-availability-problems.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin event logical_server_name database_name
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp > ago(1d)

      | where ClusterName =~ ringname

      | where event =~ "process_login_finish"

      | where isnotempty(logical_server_name) and isnotempty(database_name)

      | top-nested 10 of logical_server_name by count(), top-nested 1 of database_name by count()

      ) on logical_server_name, database_name

      | project strcat(''sqlcmd -S '',logical_server_name, ''.'', extract("[a-z0-9]+.[a-z0-9-]+.[a-z]+.([a-z.]+)", 1, ringname), '' -d '', database_name, '' -U test -P test'')'
- id: DB-connectivity-26
  Topic: azure-sql-gateways-in-region-have-availability-problems
  Source: TSG-SQL-DB-Connectivity/TSG/clusters-rings/azure-sql-gateways-in-region-have-availability-problems.md
  Prompts:
  - SQL DB login failures error 0
  - SQL DB MonLogin event NodeName ClusterName ringname
  - SQL DB troubleshoot login failures error 0
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp > ago(1d)

      | where event =~ "process_login_finish"

      | where ClusterName =~ ringname

      | summarize totalLogins = count(), total_failures = countif(is_success == 0 and (is_user_error == 0 or total_time_ms > 14000)) by NodeName, bin(originalEventTimestamp, 5m)

      | extend successRate = (totalLogins - total_failures) * 100 / totalLogins

      | project originalEventTimestamp, NodeName, totalLogins, successRate, ZeroRate = 0

      | render timechart'
- id: DB-connectivity-27
  Topic: azure-sql-tenant-ring-availability-problems-for-customer-spo
  Source: TSG-SQL-DB-Connectivity/TSG/clusters-rings/azure-sql-tenant-ring-availability-problems-for-customer-spo.md
  Prompts:
  - SQL DB sqlx store errors
  - SQL DB MonSQLXStore event AppName AppTypeName NodeName
  - SQL DB troubleshoot sqlx store errors
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonSQLXStore
    ExecutedQuery: 'MonSQLXStore

      | where originalEventTimestamp > ago(7d)

      | where http_errorcode == 500

      | where event == "xio_failed_request"

      | where (file_path endswith ".mdf" or file_path endswith ".ldf" or file_path endswith ".ndf")

      | where AppTypeName =~ "Worker.ISO"

