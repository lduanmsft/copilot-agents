  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where originalEventTimestamp > ago(10d)

      | where logical_server_name =~ "{ServerName}" //contains "testcreategw31"

      | where event == "process_login_finish"

      | where package =~ "xdbgateway"

      | where application_name == "SQLCMD"

      | where database_name =~ "{DatabaseName}"

      | extend ConnectionPolicy = iff(result == "e_crContinueSameState", "Proxy", "Redirect")

      | summarize count() by package, is_success, ssl_protocol,ConnectionPolicy,result, application_name, tohex(tds_version)'
