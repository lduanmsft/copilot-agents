- id: DB-connectivity-157
  Topic: connectivity-kusto-queries
  Source: TSG-SQL-DB-Connectivity/TSG/diagnostics-monitoring/connectivity-kusto-queries.md
  Prompts:
  - SQL DB login events
  - SQL DB MonLogin is_success event ClusterName package
  - SQL DB investigate login events
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonLogin
    ExecutedQuery: 'MonLogin

      | where event == "process_login_finish" and package == "xdbgateway" and is_success == true and ClusterName !contains "local"

      | summarize by ClusterName , peer_address, result, TIMESTAMP bin =time(1h)

      | extend is_proxy = iff(TIMESTAMP <= ago(6d) and result == "e_crContinueSameState", 1,0 )

      | extend is_redirect = iff(TIMESTAMP <= ago(6d) and result == "e_crContinue", 1,0 )

      | extend is_redirect_now = iff(TIMESTAMP >= ago(1d) and result == "e_crContinue", 1,0 )

      | extend is_proxy_now = iff(TIMESTAMP >= ago(1d) and result == "e_crContinueSameState", 1,0 )

      | summarize sum(is_proxy), sum(is_redirect), sum(is_redirect_now), sum(is_proxy_now) by peer_address, ClusterName

      | where sum_is_proxy <> 0 and sum_is_redirect_now <> 0 and sum_is_redirect == 0

      | extend redirect_percent_before = sum_is_redirect*1.0 /(sum_is_redirect *1.0+ sum_is_proxy *1.0) *100

      | extend redirect_percent_now = sum_is_redirect_now*1.0 / (sum_is_redirect_now *1.0 + sum_is_proxy_now*1.0) *100

      | where (redirect_percent_now - redirect_percent_before) >20

      | join ('
- id: DB-connectivity-158
