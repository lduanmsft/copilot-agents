- id: DB-connectivity-160
  Topic: gw-high-memory-consumption
  Source: TSG-SQL-DB-Connectivity/TSG/diagnostics-monitoring/monitoring/monitors/gateway-node/gw-high-memory-consumption.md
  Prompts:
  - SQL DB memory pressure analysis
  - SQL DB MonRgLoad event AppName AppTypeName NodeName
  - SQL DB troubleshoot memory pressure
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

      | where event == "instance_load" and ClusterName startswith "{ClusterName}"

      | summarize min(memory_load), avg(memory_load_cap) by ClusterName, AppTypeName, AppName, NodeName, NodeRole, application_name, code_package_name, service_manifest_name, bin(originalEventTimestampFrom, 15m)

      | project originalEventTimestampFrom, ClusterName, AppName, AppTypeName, NodeName ,NodeRole, application_name, code_package_name, service_manifest_name, min_memory_load, avg_memory_load_cap

      | where NodeRole == "GW" and application_name == "fabric:/Gateway" and code_package_name == "Gateway.Code"

      | extend percent = min_memory_load*100 / avg_memory_load_cap

      | summarize arg_max(originalEventTimestampFrom, *) by ClusterName, NodeName

      | where percent > 60

      | sort by percent desc

      | project ClusterName, NodeName, AppTypeName = "Gateway", AppName = "Gateway"

      | limit 2'
- id: DB-connectivity-161
  Topic: port-exhaustion-alert
  Source: TSG-SQL-DB-Connectivity/TSG/diagnostics-monitoring/monitoring/monitors/gateway-node/port-exhaustion-alert.md
