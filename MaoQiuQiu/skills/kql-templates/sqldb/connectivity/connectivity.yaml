- id: DB-connectivity-208
  Topic: decom-hypernet-gateway
  Source: TSG-SQL-DB-Connectivity/TSG/infra/decoms/decom-hypernet-gateway.md
  Prompts:
  - SQL DB resources analysis
  - SQL DB Resources id any Json Keep only type VNets
  - SQL DB investigate resources
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: Resources
    ExecutedQuery: 'let table1 = cluster(''argwus2nrpone.westus2.kusto.windows.net'').database(''AzureResourceGraph'').Resources;

      let table2 = cluster(''genevareference.westcentralus.kusto.windows.net'').database(''Shared'').DataStudio_ServiceTree_AzureSubscription_Snapshot;

      let vnetIds = table1

      | where timestamp > ago(2d)

      | where type has "Microsoft.network/virtualnetworkgateways" and not(deleted)

      | extend Json = parse_json(properties)

      | where Json["gatewayType"] == "HyperNet"

      | extend subnetIdParts = split(tostring(Json["ipConfigurations"][0]["properties"]["subnet"]["id"]), ''/'')

      | extend subscriptionId = tostring(subnetIdParts[2])

      | extend vnetName = subnetIdParts[8]

      | extend vnetId = strcat("/subscriptions/", subscriptionId, "/resourceGroups/", resourceGroup, "/providers/Microsoft.Network/virtualNetworks/", vnetName)

      | distinct vnetId;

      let vnetsWithRouteTable = table1

      | where id in (vnetIds)

      | extend subnets = parse_json(properties).subnets

      | mv-expand subnets                                // Flatten the subnets array into individual rows

      | extend routeTable = tostring(subnets.properties.routeTable)  // Extract routeTable for each subnet

      | extend hasRouteTable = isnotempty(routeTable)

      | where hasRouteTable == true                   // Keep only VNets without any routeTable

      | distinct  id;

      let vnetIdsWithoutRouteTable = vnetIds

      | where vnetId !in (vnetsWithRouteTable);'
