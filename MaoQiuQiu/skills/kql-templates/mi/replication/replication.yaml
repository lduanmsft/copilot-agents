- id: MI-replication-17
  Topic: TSGTRCL00036-Replication-Agent-Failures-Due-To-SQL-Agent-Memory-Leak
  Source: TSG-SQL-MI-TransactionalReplication/TransactionalReplication/TSGTRCL00036-Replication-Agent-Failures-Due-To-SQL-Agent-Memory-Leak.md
  Prompts:
  - MI resource governor load telemetry trend by event, memory_load
  - MonRgLoad event memory_load application_name App
  - Troubleshoot replication lag
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonRgLoad
    ExecutedQuery: 'MonRgLoad

