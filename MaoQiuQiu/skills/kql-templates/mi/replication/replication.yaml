  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Data-Import,-Export,-Replication-and-Transactions/Change-Data-Capture-and-Change-Tracking/CDC-14-Insights-from-Kusto.md
  Prompts:
