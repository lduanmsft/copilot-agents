  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSQLSystemHealth
    ExecutedQuery: 'let endTime = now();
let startTime = ago({TimeRange});
MonSQLSystemHealth

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      //| where  TIMESTAMP >= timeRange

      | where LogicalServerName =~ "{ServerName}"

      | where error_id in (1133, 1105, 1101, 3911, 3619, 5901, 9002, 22001) // space-related errors

      | summarize count() by error_id

      | extend message = case(

      error_id == 1101,  "Could not allocate a new page for database because of insufficient disk space in filegroup."

      error_id == 1105,  "Could not allocate space for object in database because the filegroup is full. Add storage or free up existing space."

      error_id == 1133,  "The managed instance has reached its storage limit."

      error_id == 3619,  "Could not write a checkpoint record in database because the log is out of space."

      error_id == 3911,  "Persistent version store is full. New version(s) could not be added. A transaction that needs to access the version store may be rolled back."

      error_id == 5901,  "One or more recovery units belonging to database failed to generate a checkpoint. This is typically caused by lack of system resources such as disk or memory."

      error_id == 9002,  "The transaction log for database is full."

      error_id == 22001, "FreeStaleVersionSpace failed for page for database. It will be retired in the next iteration of the version cleaner."

      "other")

      | order by count_ desc'
