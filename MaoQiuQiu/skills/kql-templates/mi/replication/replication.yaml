  - Managed Instance CDC-14-Insights-from-Kusto
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlRgHistory
    ExecutedQuery: 'let endTime = now();
let startTime = ago({TimeRange});
MonSqlRgHistory

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      //| where  TIMESTAMP >= timeRange

      | where LogicalServerName =~ "{ServerName}"

      | where event == "aggregated_workload_groups_plus_history"

      | where group_name in ("default")

      | project end_utc_date = end_aggregated_sample, name = group_name, start_utc_date = start_aggregated_sample, delta_total_cpu_usage_ms, delta_total_request_count, active_request_count = active_request_count_max
      active_session_count = active_session_count_max, delta_writes_completed_total, delta_reads_completed_total, delta_log_bytes_used_total, delta_log_temp_db_bytes_used_total, used_databasepages_kb =
      used_data_space_kb_avg

      | extend duration =  (end_utc_date - start_utc_date)/time(1s)

      | extend CpuCoreUsage = (delta_total_cpu_usage_ms/1000.0)/ duration

      | extend TotalRequests = (delta_total_request_count * 1.0) /1.0

      | extend ActiveRequests = (active_request_count *1.0)  /1.0

      | extend ActiveSessions = (active_session_count *1.0) /1.0

      | extend TotalIOPS = ((delta_reads_completed_total + delta_writes_completed_total)*1.0)/duration

      | extend ReadIOPS = (delta_reads_completed_total*1.0)/duration

      | extend WriteIOPS = (delta_writes_completed_total*1.0)/duration

      | extend LogKbps = (delta_log_bytes_used_total)/(1024.0*duration)

      | extend LogMbps = (delta_log_bytes_used_total)/(1024.0*1024.0*duration)

      | extend TempDbLogKbps = (delta_log_temp_db_bytes_used_total)/(1024.0*duration)

      | extend TempDbLogMbps = (delta_log_temp_db_bytes_used_total)/(1024.0*1024.0*duration)

      //| extend UsedDatabasePagesMb = used_databasepages_kb*1.0/(1024) // SQL DB

      | project end_utc_date, name, CpuCoreUsage, TotalIOPS, ReadIOPS, WriteIOPS, LogMbps, TempDbLogMbps, TotalRequests, ActiveRequests, ActiveSessions

      | project TimeStamp = end_utc_date, CpuCoreUsage, ReadIOPS, WriteIOPS, LogMbps, TempDbLogMbps, ActiveRequests, ActiveSessions

      | summarize CpuUsage = max(CpuCoreUsage), ReadIOPS = max(ReadIOPS), WriteIOPS = max(WriteIOPS), LogMbps = max(LogMbps), TempDbLogMbps = max(TempDbLogMbps), ActiveRequests = max(ActiveRequests), ActiveSessions
      = max(ActiveSessions) by bin(TimeStamp, 1h)

      | render timechart'
