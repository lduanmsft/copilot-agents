  - TimeRange
  KustoQueries:
  - TableName: MonManagedInstanceResourceStats
    ExecutedQuery: 'let srv = "{ServerName}";

      let db = "{DatabaseName}";

      let logdb = "5FE6B098-50A8-46D5-BCDE-B4D3C1C238CF";

      let startTime = ago({TimeRange});

      let endTime = now();

      let timeRange = ago(1d);

      let InstanceStorage = materialize(MonManagedInstanceResourceStats

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      //| where  TIMESTAMP >= timeRange

      | where LogicalServerName =~ "{ServerName}"

      | extend 90PercentFull = (storage_space_used_mb >= reserved_storage_mb * 0.9)

      | summarize inst_reserved_storage_mb = max(reserved_storage_mb), inst_storage_space_used_mb = max(storage_space_used_mb), inst_90PercentFull = max(90PercentFull)  by timeStamp = bin(originalEventTimestamp
      60min)

      | project timeStamp, inst_reserved_storage_mb, inst_storage_space_used_mb, inst_90PercentFull

      );

      let AllDbStorage = materialize(MonDmIoVirtualFileStats

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      //| where  TIMESTAMP >= timeRange

      | where LogicalServerName =~ "{ServerName}"

      | extend sizeondisk_mb = size_on_disk_bytes * 1.0 / (1024 * 1024)

      | summarize spaceused_mb = sum(spaceused_mb), sizeondisk_mb = sum(sizeondisk_mb) by timeStamp = bin(start_utc_date, 60min)

      | extend shrinkPotential_mb = sizeondisk_mb - spaceused_mb

      | project timeStamp, alldb_spaceused_mb = spaceused_mb, alldb_sizeondisk_mb = sizeondisk_mb, alldb_shrinkPotential_mb = shrinkPotential_mb

      );

      let DbStorage = materialize(MonDmIoVirtualFileStats

      | where TIMESTAMP >= startTime

      | where TIMESTAMP <= endTime

      //| where  TIMESTAMP >= timeRange

      | where LogicalServerName =~ "{ServerName}"

      | where db_name =~ logdb

