      | project originalEventTimestamp, TIMESTAMP,LogicalServerName,database_name,query_id,query_hash,query_plan_hash,exec_type,Average_cpu_time,Average_logical_reads,Average_logical_writes,Average_physical_reads

      Average_elapsed_time,Average_log_bytes_used,Average_rowcount ,logical_writes,logical_reads,min_logical_reads,max_logical_reads,physical_reads,min_physical_reads,max_physical_reads,execution_count,cpu_time,rowcount,elapsed_time
