- id: MI-general-8
  Topic: DB info (MonManagedDatabases
  Source: asmi-troubleshooter-package/DB info (MonManagedDatabases.md
  Prompts:
  - MI restore request status
  - MonManagedDatabases PreciseTimeStamp managed_server_id
  - Check MonManagedDatabases managed_server_id
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedDatabases
    ExecutedQuery: 'let startTime = ago(12d);

      let endTime = ago(5d);

      let serverId = ''"{ManagedServerId}"'';

      let databaseName = ''<Databasename>'';

      MonManagedDatabases

      | where PreciseTimeStamp >= startTime and PreciseTimeStamp <= endTime

      | where managed_server_id == serverId

      | where managed_database_name == databaseName

      | summarize arg_max(TIMESTAMP,*) by [''state'']'
- id: MI-general-9
  Topic: DB info (MonManagedDatabases
  Source: asmi-troubleshooter-package/DB info (MonManagedDatabases.md
  Prompts:
  - MI restore request status
  - MonManagedServers managed_server_id state TIMESTAMP
  - Check MonManagedServers managed_server_id state
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonManagedServers
    ExecutedQuery: 'MonManagedServers

      | where managed_server_id == serverId

      | distinct managed_server_id, name) on managed_server_id

      | project TIMESTAMP, managed_server_id, managed_server_name = name, managed_database_id, managed_database_name, [''state'']'
