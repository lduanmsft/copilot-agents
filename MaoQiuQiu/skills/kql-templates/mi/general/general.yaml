- id: MI-general-26
  Topic: Availability-Zones
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Missing-Features-and-Functionalities/I-need-the-following-feature-or-functionality/Availability-Zones.md
  Prompts:
  - MI Availability-Zones
  - Managed Instance Availability-Zones
  CustomizedParameters:
  - DatabaseName
  - ServerName
  KustoQueries:
  - TableName: MonManagedServers
    ExecutedQuery: 'let serverName = "{ServerName}";

      let TR = MonManagedServers | where TIMESTAMP >= ago(7d) and name =~ "{ServerName}"

      | summarize arg_max(create_time, private_cluster_tenant_ring_name, private_cluster_id)

      | distinct private_cluster_tenant_ring_name;

      let hostedSubscriptionID = (MonFabricClusters | where TIMESTAMP >= ago(7d) and name in (TR)

      | where isnotempty(hosted_service_subscription_id)

      | summarize by hosted_service_subscription_id);

      let inNodeName=MonDmDbHadrReplicaStates

      | where end_utc_date between(ago(7d)..now())

      | where LogicalServerName =~ "{ServerName}"

      | where is_local == 1 and is_primary_replica == 1 and internal_state == 2

      | extend DbId = tolower(logical_database_name)

      | distinct end_utc_date, NodeName, code_package_version, ClusterName, DbId

      | extend FormattedNodeName = replace_string(NodeName, ".", "_IN_")

      | project FormattedNodeName;

      cluster(''azurecm.kusto.windows.net'').database(''AzureCM'').LogContainerSnapshot

      | where TIMESTAMP > ago(2d)

      | where subscriptionId in (hostedSubscriptionID)

      | where roleInstanceName in (inNodeName)

      | project TIMESTAMP, subscriptionId, roleInstanceName, AvailabilityZone, tenantName

      | summarize min(TIMESTAMP), max(TIMESTAMP), make_set(roleInstanceName) by MI_Hosted_Subscription_ID=subscriptionId, AvailabilityZone, tenantName'
- id: MI-general-27
  Topic: November-2022-Feature-Wave
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Missing-Features-and-Functionalities/I-need-the-following-feature-or-functionality/November-2022-Feature-Wave.md
