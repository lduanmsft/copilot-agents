  Topic: November-2022-Feature-Wave
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Missing-Features-and-Functionalities/I-need-the-following-feature-or-functionality/November-2022-Feature-Wave.md
  Prompts:
  - MI November-2022-Feature-Wave
