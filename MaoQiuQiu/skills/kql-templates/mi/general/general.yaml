    ExecutedQuery: 'MonManagedServers

      | where TIMESTAMP >= ago(10d)

      | where name == ''sqlmi''

      | summarize TelemetryeAt = arg_max(TIMESTAMP,*) by name, managed_server_id, service_level_objective,zone_redundant, create_time

