  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/Reporting,-Analytics-and-Integration/Machine-Learning-Services-for-SQL-Managed-Instance/Script-error-or-incorrect-results/Msg-39019-%2D-external-script-error-occurred.md
  Prompts:
  - MI MI Msg 39019   external script error occurred
  - Managed Instance Msg-39019---external-script-error-occurred
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: AlrWinFabHealthNodeEvent
    ExecutedQuery: 'AlrWinFabHealthNodeEvent

      | where TIMESTAMP > ago(90d)

      | where ClusterName contains ''tr47929'' //MI''s tenant ID

      | where Property == ''OperatingSystemInformation''

