- id: MI-general-14
  Topic: Database Options (MonDatabaseMetadata
  Source: asmi-troubleshooter-package/Database Options (MonDatabaseMetadata.md
  Prompts:
  - MI restore request status by server
  - MonDatabaseMetadata TIMESTAMP LogicalServerName
  - Check MonDatabaseMetadata is_parameterization_forced status2
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonDatabaseMetadata
    ExecutedQuery: 'let ServerName = "{ServerName}" ;

      let daysAgo=7d;

      MonDatabaseMetadata

      | where AppName !startswith ''b-'' and AppName !startswith ''v-''

      | where TIMESTAMP > ago(daysAgo)

      | where LogicalServerName =~ ServerName

      //| where table_name== ''sysdbreg''

      | extend is_parameterization_forced = (binary_and(status2, 0x08000000) == 0x08000000)'
