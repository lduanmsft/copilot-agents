      | summarize min(TIMESTAMP), max(TIMESTAMP) by Description, ClusterName, NodeEntityName'
- id: MI-general-49
  Topic: Emails-not-being-sent.-Error-14607-and-7412
  Source: AzureSQLMI/SQL-Managed-Instance/Troubleshooting-Guides/SQL-Agent,-Messaging-and-queuing/Email-server-integration-and-DBMail/Emails-not-being-sent.-Error-14607-and-7412.md
  Prompts:
  - MI Emails-not-being-sent.-Error-14607-and-7412
  - Managed Instance Emails-not-being-sent.-Error-14607-and-7412
  CustomizedParameters:
  - ServerName
  - DatabaseName
  KustoQueries:
  - TableName: MonSqlAgent
    ExecutedQuery: 'MonSqlAgent

      | where LogicalServerName =~ "{ServerName}"

      | where originalEventTimestamp >= ago(3d) // or more, depends when agent stopped working

      | where resource_id !in (152, 177, 184, 248, 249)

      | extend startup_common_msg = iff(message_type == ''STARTUP_MSG'' and resource_id in (73, 125, 474, 260, 375, 396),0, 1)

      | where startup_common_msg == 1

      | project originalEventTimestamp, AppName, NodeName, package, event, message_type,message

      | order by originalEventTimestamp desc'
